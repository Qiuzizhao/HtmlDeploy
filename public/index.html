<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>项目站</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f0f9ff;
      --panel: #ffffff;
      --panel-soft: #f0f9ff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --brand: #0ea5e9;
      --brand-dark: #0284c7;
      --accent: #10b981;
      --accent-soft: #d1fae5;
      --danger: #ef4444;
      --shadow: 0 20px 40px rgba(14, 165, 233, 0.08);
      --soft-shadow: 0 10px 25px rgba(14, 165, 233, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(14, 165, 233, 0.3);
      outline-offset: 2px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 max(24px, calc((100vw - 1120px) / 2));
      background: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 12px 32px rgba(23, 32, 51, 0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      font-size: 20px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(14, 165, 233, 0.3);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .admin-link {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      font-weight: 650;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .admin-link:hover {
      border-color: #7dd3fc;
      background: #f0f9ff;
      color: var(--brand-dark);
      transform: translateY(-1px);
    }

    .upload-button,
    .primary-button {
      min-height: 40px;
      padding: 0 18px;
      border-radius: 8px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #fff;
      font-weight: 650;
      box-shadow: 0 8px 16px rgba(14, 165, 233, 0.25);
    }

    .upload-button:hover,
    .primary-button:hover {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(14, 165, 233, 0.35);
    }

    .upload-button:disabled,
    .primary-button:disabled {
      cursor: not-allowed;
      background: #9aa8ba;
      opacity: 0.82;
      box-shadow: none;
      transform: none;
    }

    .secondary-button {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      font-weight: 600;
    }

    .secondary-button:hover {
      border-color: #7dd3fc;
      background: #f0f9ff;
      color: var(--brand-dark);
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #e0f2fe;
      color: var(--brand-dark);
      font-size: 22px;
      line-height: 1;
      transition: all 0.2s ease;
    }

    .icon-button:hover {
      background: #bae6fd;
      transform: scale(1.05);
    }

    main {
      width: min(1120px, calc(100vw - 40px));
      margin: 30px auto 64px;
    }

    .class-filter-bar {
      margin-bottom: 24px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.6);
      box-shadow: var(--soft-shadow);
    }

    .class-filter-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .class-tabs {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      gap: 10px;
      padding: 2px;
      overflow-x: auto;
    }

    .class-refresh-button {
      flex: 0 0 auto;
      width: 76px;
      min-height: 42px;
      border-color: transparent;
      background: linear-gradient(135deg, #fb923c, #f97316);
      color: #fff;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(249, 115, 22, 0.28);
      transition: background 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
    }

    .class-refresh-button:hover {
      border-color: transparent;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #fff;
      box-shadow: 0 10px 22px rgba(249, 115, 22, 0.34);
    }

    .class-refresh-button:disabled {
      cursor: wait;
      opacity: 0.72;
      transform: none;
      box-shadow: none;
    }

    .class-tab {
      min-height: 42px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--text);
      font-weight: 700;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .class-tab:hover {
      border-color: #7dd3fc;
      background: #f0f9ff;
      color: var(--brand-dark);
      transform: translateY(-1px);
    }

    .class-tab.is-active {
      border-color: transparent;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #fff;
      box-shadow: 0 8px 16px rgba(14, 165, 233, 0.25);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    .site-card {
      min-height: 182px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      border-left: 5px solid #38bdf8;
      box-shadow: var(--soft-shadow);
      text-align: left;
      transition: all 0.2s ease;
    }

    .site-card:hover {
      border-color: #7dd3fc;
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(14, 165, 233, 0.12);
      background: #ffffff;
    }

    .site-card-main {
      min-width: 0;
    }

    .site-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      margin-bottom: 15px;
      overflow: hidden;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      background: linear-gradient(135deg, #e0f2fe, #ecfdf5);
    }

    .site-cover img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .site-cover-placeholder {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--brand-dark);
      font-size: 14px;
      font-weight: 750;
    }

    .site-heading {
      display: flex;
      align-items: baseline;
      gap: 9px;
      min-width: 0;
      margin-bottom: 12px;
    }

    .site-number {
      flex: 0 0 auto;
      padding: 3px 7px;
      border-radius: 6px;
      background: #f0f9ff;
      color: var(--brand);
      font-size: 19px;
      font-weight: 800;
      line-height: 1;
      border: 1px solid #bae6fd;
    }

    .site-content {
      min-width: 0;
      padding-top: 2px;
    }

    .site-title {
      margin: 0;
      font-size: 19px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .site-tags {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .site-class-tag {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      padding: 5px 9px;
      border: 1px solid #a7f3d0;
      border-radius: 8px;
      background: #ecfdf5;
      color: #047857;
      font-size: 13px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .site-author-tag {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      padding: 5px 9px;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      background: #f0f9ff;
      color: #0369a1;
      font-size: 13px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .site-url {
      display: inline-block;
      max-width: 100%;
      padding: 6px 9px;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      background: #f0f9ff;
      color: var(--brand-dark);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .card-actions .primary-button,
    .card-actions .secondary-button {
      min-height: 38px;
    }

    .empty {
      padding: 56px 20px;
      border: 2px dashed #bae6fd;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.6);
      text-align: center;
      color: var(--brand-dark);
      box-shadow: var(--soft-shadow);
    }

    .unlock-panel {
      grid-column: 1 / -1;
      width: min(520px, 100%);
      display: grid;
      gap: 16px;
      justify-self: center;
      padding: 24px;
      border: 1px solid #bae6fd;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 20px 40px rgba(14, 165, 233, 0.1);
    }

    .unlock-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
    }

    .unlock-copy {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .unlock-actions {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .unlock-actions label {
      flex: 1 1 220px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.56);
    }

    .overlay.is-open {
      display: flex;
    }

    .preview-overlay.is-open {
      display: flex;
    }

    body.is-previewing {
      overflow: hidden;
    }

    body.is-code-viewing {
      overflow: hidden;
    }

    body.is-previewing > .topbar,
    body.is-previewing > main {
      display: none;
    }

    .preview-backdrop {
      position: fixed;
      inset: 0;
      z-index: 99;
      display: none;
      overflow: hidden;
      pointer-events: none;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
    }

    .preview-backdrop.is-open {
      display: block;
    }

    .preview-backdrop::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.56);
    }

    .preview-backdrop-content {
      transform: translateY(calc(-1 * var(--preview-scroll-offset, 0px)));
    }

    .preview-overlay {
      background: transparent;
    }

    .modal {
      width: min(460px, calc(100vw - 32px));
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 25px 50px rgba(14, 165, 233, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.8);
      overflow: hidden;
    }

    .modal-head,
    .preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .modal-title,
    .preview-title {
      min-width: 0;
      margin: 0;
      font-size: 18px;
      overflow-wrap: anywhere;
    }

    .modal-body {
      display: grid;
      gap: 16px;
      padding: 20px;
    }

    .current-class {
      padding: 11px 12px;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      background: #f0f9ff;
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 700;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    input[type="text"],
    input[type="password"],
    input[type="file"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fcfdff;
      color: var(--text);
      padding: 10px 12px;
    }

    input[type="text"],
    input[type="password"],
    input[type="file"] {
      min-height: 44px;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.5;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="file"]:focus,
    textarea:focus {
      border-color: #38bdf8;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 20px 20px;
    }

    .message {
      min-height: 20px;
      color: var(--danger);
      font-size: 13px;
    }

    .preview {
      position: relative;
      width: min(1280px, calc(100vw - 48px));
      height: min(840px, calc(100vh - 48px));
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 16px;
      box-shadow: 0 24px 52px rgba(15, 23, 42, 0.24);
    }

    .preview-head {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1;
      min-height: 64px;
      box-sizing: border-box;
      border-radius: 15px 15px 0 0;
    }

    .preview-meta {
      min-width: 0;
    }

    .preview-url {
      margin-top: 4px;
      color: var(--accent);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .preview-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #previewFrame {
      display: block;
      position: absolute;
      top: 65px;
      right: 1px;
      bottom: 1px;
      left: 1px;
      width: calc(100% - 2px);
      height: calc(100% - 66px);
      border: 0;
      background: #000;
    }

    .code-window {
      width: min(1000px, calc(100vw - 32px));
      height: min(760px, calc(100vh - 32px));
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 16px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: 0 25px 50px rgba(15, 23, 42, 0.22);
    }

    .code-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .code-title-wrap {
      min-width: 0;
    }

    .code-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .code-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .code-message {
      min-height: 34px;
      padding: 9px 18px;
      color: var(--brand-dark);
      font-size: 14px;
      font-weight: 650;
      border-bottom: 1px solid var(--line);
      background: #f8fbff;
    }

    .code-message.is-error {
      color: var(--danger);
    }

    .code-viewer {
      min-height: 0;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 0;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
      resize: none;
      line-height: 1.55;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
    }

    .code-viewer:focus {
      outline: none;
    }

    .code-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }

    @media (max-width: 700px) {
      .topbar {
        height: 66px;
        padding: 0 18px;
      }

      .brand {
        font-size: 18px;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
      }

      .upload-button {
        min-height: 38px;
        padding: 0 13px;
      }

      .top-actions {
        gap: 8px;
      }

      .admin-link {
        min-height: 38px;
        padding: 0 11px;
      }

      main {
        width: min(100vw - 24px, 1120px);
        margin-top: 22px;
      }

      .class-tabs {
        gap: 8px;
      }

      .class-filter-bar {
        margin-bottom: 16px;
        padding: 10px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .site-card {
        min-height: 174px;
        padding: 16px;
      }

      .unlock-panel {
        padding: 18px;
      }

      .unlock-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .site-heading {
        gap: 8px;
      }

      .card-actions .primary-button,
      .card-actions .secondary-button {
        flex: 1 1 130px;
      }

      .overlay {
        padding: 12px;
      }

      .preview {
        width: calc(100vw - 24px);
        height: calc(100vh - 24px);
        border-radius: 12px;
      }

      .preview-head {
        min-height: 92px;
        align-items: flex-start;
        flex-direction: column;
        border-radius: 11px 11px 0 0;
      }

      .preview-actions {
        width: 100%;
        justify-content: space-between;
      }

      #previewFrame {
        top: 93px;
        height: calc(100% - 94px);
      }

      .code-window {
        width: calc(100vw - 24px);
        height: calc(100vh - 24px);
        border-radius: 12px;
      }

      .code-head,
      .code-actions {
        padding: 12px;
      }

      .code-actions {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">H</span>
      <span>项目站</span>
    </div>
    <div class="top-actions">
      <a class="admin-link" href="/admin.html">后台管理</a>
      <button class="upload-button" id="openUpload" type="button">＋ 上传网页</button>
    </div>
  </header>

  <main>
    <section class="class-filter-bar">
      <div class="class-filter-row">
        <nav class="class-tabs" id="classTabs" aria-label="班级"></nav>
        <button class="secondary-button class-refresh-button" id="refreshClassSites" type="button">刷新</button>
      </div>
      <div id="classProjectCount" style="margin-top: 14px; font-size: 14px; color: var(--muted); font-weight: 600; padding: 0 4px;"></div>
    </section>
    <section class="grid" id="siteGrid" aria-live="polite"></section>
    <div class="empty" id="emptyState">还没有项目，点击右上角上传一个。</div>
  </main>

  <div class="overlay" id="uploadOverlay" aria-hidden="true">
    <form class="modal" id="uploadForm">
      <div class="modal-head">
        <h2 class="modal-title">上传网页</h2>
        <button class="icon-button" id="closeUpload" type="button" aria-label="关闭上传弹窗">×</button>
      </div>
      <div class="modal-body">
        <div class="current-class" id="currentClassLabel"></div>
        <label>
          网页名字
          <input id="titleInput" name="title" type="text" maxlength="80" placeholder="例如：我的小游戏" required>
        </label>
        <label>
          作者署名
          <input id="authorInput" name="author" type="text" maxlength="40" placeholder="如：张三" required>
        </label>
        <label>
          HTML 文件
          <input id="fileInput" name="file" type="file" accept=".html,text/html">
        </label>
        <label>
          HTML 代码
          <textarea id="uploadHtmlContent" name="htmlContent" placeholder="可以直接粘贴完整 HTML 代码。上传文件和填写代码二选一即可。"></textarea>
        </label>
        <div class="message" id="uploadMessage"></div>
      </div>
      <div class="modal-actions">
        <button class="secondary-button" id="cancelUpload" type="button">取消</button>
        <button class="secondary-button" id="previewUpload" type="button">预览</button>
        <button class="primary-button" type="submit">确定上传</button>
      </div>
    </form>
  </div>

  <div class="preview-backdrop" id="previewBackdrop" aria-hidden="true"></div>

  <div class="overlay preview-overlay" id="previewOverlay" aria-hidden="true">
    <section class="preview">
      <div class="preview-head">
        <div class="preview-meta">
          <h2 class="preview-title" id="previewTitle"></h2>
          <div class="preview-url" id="previewUrl"></div>
        </div>
        <div class="preview-actions">
          <button class="secondary-button" id="openPreviewExternal" type="button">新页面打开</button>
          <button class="secondary-button" id="refreshPreview" type="button">刷新</button>
          <button class="icon-button" id="closePreview" type="button" aria-label="关闭预览窗口">×</button>
        </div>
      </div>
      <iframe id="previewFrame" title="项目预览" tabindex="0" allow="fullscreen; accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"></iframe>
    </section>
  </div>

  <div class="overlay" id="codeOverlay" aria-hidden="true">
    <section class="code-window" role="dialog" aria-modal="true" aria-labelledby="codeTitle">
      <header class="code-head">
        <div class="code-title-wrap">
          <h2 class="code-title" id="codeTitle">项目代码</h2>
          <div class="code-meta" id="codeMeta"></div>
        </div>
        <button class="icon-button" id="closeCode" type="button" aria-label="关闭代码窗口">×</button>
      </header>
      <div class="code-message" id="codeMessage"></div>
      <textarea class="code-viewer" id="codeViewer" spellcheck="false" readonly aria-label="项目代码"></textarea>
      <footer class="code-actions">
        <button class="secondary-button" id="copyCode" type="button">复制</button>
      </footer>
    </section>
  </div>

  <script>
    const classTabs = document.getElementById('classTabs');
    const siteGrid = document.getElementById('siteGrid');
    const emptyState = document.getElementById('emptyState');
    const uploadOverlay = document.getElementById('uploadOverlay');
    const previewBackdrop = document.getElementById('previewBackdrop');
    const previewOverlay = document.getElementById('previewOverlay');
    const codeOverlay = document.getElementById('codeOverlay');
    const uploadForm = document.getElementById('uploadForm');
    const titleInput = document.getElementById('titleInput');
    const authorInput = document.getElementById('authorInput');
    const fileInput = document.getElementById('fileInput');
    const uploadHtmlContent = document.getElementById('uploadHtmlContent');
    const previewUploadButton = document.getElementById('previewUpload');
    const uploadMessage = document.getElementById('uploadMessage');
    const previewTitle = document.getElementById('previewTitle');
    const previewUrl = document.getElementById('previewUrl');
    const previewFrame = document.getElementById('previewFrame');
    const openPreviewExternal = document.getElementById('openPreviewExternal');
    const refreshPreview = document.getElementById('refreshPreview');
    const openUploadButton = document.getElementById('openUpload');
    const refreshClassSitesButton = document.getElementById('refreshClassSites');
    const classProjectCount = document.getElementById('classProjectCount');
    const currentClassLabel = document.getElementById('currentClassLabel');
    const codeTitle = document.getElementById('codeTitle');
    const codeMeta = document.getElementById('codeMeta');
    const codeMessage = document.getElementById('codeMessage');
    const codeViewer = document.getElementById('codeViewer');
    const copyCodeButton = document.getElementById('copyCode');

    let currentPreviewUrl = '';
    let currentPreviewExternalUrl = '';
    let currentPreviewObjectUrl = '';
    let currentCodeText = '';
    let classes = [];
    let uploadRules = { forbiddenWords: [] };
    let currentClassId = '';
    const unlockedClassIds = new Set();

    function getCurrentClass() {
      return classes.find((item) => item.id === currentClassId);
    }

    function hasCurrentClassAccess() {
      const currentClass = getCurrentClass();
      return Boolean(currentClassId && currentClass && (currentClass.passwordEnabled === false || unlockedClassIds.has(currentClassId)));
    }

    function canUploadCurrentClass() {
      const currentClass = getCurrentClass();
      return Boolean(hasCurrentClassAccess() && currentClass.uploadEnabled !== false);
    }

    function findForbiddenWordMatch(title, author) {
      const forbiddenWords = Array.isArray(uploadRules.forbiddenWords) ? uploadRules.forbiddenWords : [];
      const fields = [
        { label: '网页名字', value: title },
        { label: '作者署名', value: author }
      ];

      for (const field of fields) {
        const text = String(field.value || '').toLocaleLowerCase();
        for (const word of forbiddenWords) {
          if (text.includes(String(word).toLocaleLowerCase())) {
            return `${field.label}不能包含违禁词「${word}」`;
          }
        }
      }

      return '';
    }

    function updateUploadButtonState() {
      const currentClass = getCurrentClass();
      const uploadDisabledByClass = Boolean(currentClassId && currentClass && currentClass.uploadEnabled === false);
      openUploadButton.disabled = !classes.length || !currentClassId || !hasCurrentClassAccess() || uploadDisabledByClass;
      openUploadButton.title = uploadDisabledByClass ? '当前班级已禁用上传网页' : '';
    }

    function openOverlay(overlay) {
      overlay.classList.add('is-open');
      overlay.setAttribute('aria-hidden', 'false');
    }

    function closeOverlay(overlay) {
      overlay.classList.remove('is-open');
      overlay.setAttribute('aria-hidden', 'true');
    }

    function openUpload() {
      if (!currentClassId) {
        emptyState.textContent = '请先到后台创建班级，再上传网页。';
        emptyState.style.display = 'block';
        return;
      }

      if (!unlockedClassIds.has(currentClassId)) {
        // 尝试从当前的文本中提取数量，或者重新加载
        loadSites();
        return;
      }

      if (!canUploadCurrentClass()) {
        emptyState.textContent = '当前班级已禁用上传网页功能。';
        emptyState.style.display = 'block';
        return;
      }

      uploadMessage.textContent = '';
      uploadForm.reset();
      const currentClass = getCurrentClass();
      currentClassLabel.textContent = `当前班级：${currentClass ? currentClass.name : '未选择'}`;
      openOverlay(uploadOverlay);
      titleInput.focus();
    }

    function closeUpload() {
      closeOverlay(uploadOverlay);
    }

    function focusPreviewFrame() {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          previewFrame.focus();
          try {
            previewFrame.contentWindow?.focus();
          } catch {
            // Same-origin previews can be focused; ignore browser focus denials.
          }
        });
      });
    }

    function stripCloneIds(element) {
      element.removeAttribute('id');
      element.querySelectorAll('[id]').forEach((item) => item.removeAttribute('id'));
    }

    function renderPreviewBackdrop() {
      previewBackdrop.innerHTML = '';
      previewBackdrop.style.setProperty('--preview-scroll-offset', `${window.scrollY}px`);

      const content = document.createElement('div');
      content.className = 'preview-backdrop-content';

      [document.querySelector('.topbar'), document.querySelector('main')].forEach((source) => {
        if (!source) {
          return;
        }

        const clone = source.cloneNode(true);
        stripCloneIds(clone);
        content.append(clone);
      });

      previewBackdrop.append(content);
      previewBackdrop.classList.add('is-open');
    }

    function clearPreviewBackdrop() {
      previewBackdrop.classList.remove('is-open');
      previewBackdrop.innerHTML = '';
    }

    function openProjectWindow(site) {
      const availableWidth = window.screen?.availWidth || window.innerWidth;
      const availableHeight = window.screen?.availHeight || window.innerHeight;
      const width = Math.min(1280, Math.max(960, Math.round(availableWidth * 0.82)));
      const height = Math.min(840, Math.max(640, Math.round(availableHeight * 0.82)));
      const left = Math.max(0, Math.round((availableWidth - width) / 2));
      const top = Math.max(0, Math.round((availableHeight - height) / 2));
      const features = [
        'popup=yes',
        `width=${width}`,
        `height=${height}`,
        `left=${left}`,
        `top=${top}`
      ].join(',');
      const targetName = `htmlDeployPreview_${String(site.id || 'site').replace(/[^a-z0-9_-]/gi, '_')}`;

      const opened = window.open(site.previewUrl || site.url, targetName, features);
      if (opened) {
        opened.opener = null;
        opened.focus();
        return;
      }

      openPreview(site);
    }

    function clearPreviewObjectUrl() {
      if (currentPreviewObjectUrl) {
        URL.revokeObjectURL(currentPreviewObjectUrl);
        currentPreviewObjectUrl = '';
      }
    }

    function openPreview(site) {
      clearPreviewObjectUrl();
      renderPreviewBackdrop();
      currentPreviewUrl = site.url;
      currentPreviewExternalUrl = site.previewUrl || site.url;
      previewTitle.textContent = site.title;
      previewUrl.textContent = site.url;
      previewFrame.src = site.url;
      openOverlay(previewOverlay);
      document.body.classList.add('is-previewing');
      focusPreviewFrame();
    }

    function openUploadDraftPreview(htmlContent) {
      clearPreviewObjectUrl();
      const draftUrl = URL.createObjectURL(new Blob([htmlContent], { type: 'text/html' }));
      currentPreviewObjectUrl = draftUrl;
      renderPreviewBackdrop();
      currentPreviewUrl = draftUrl;
      currentPreviewExternalUrl = draftUrl;
      previewTitle.textContent = titleInput.value.trim() || '上传预览';
      previewUrl.textContent = '上传前预览，不会保存';
      previewFrame.src = draftUrl;
      openOverlay(previewOverlay);
      document.body.classList.add('is-previewing');
      focusPreviewFrame();
    }

    function closePreview() {
      previewFrame.removeAttribute('src');
      currentPreviewUrl = '';
      currentPreviewExternalUrl = '';
      clearPreviewObjectUrl();
      closeOverlay(previewOverlay);
      document.body.classList.remove('is-previewing');
      clearPreviewBackdrop();
    }

    function setCodeMessage(text, isError = false) {
      codeMessage.textContent = text;
      codeMessage.classList.toggle('is-error', isError);
    }

    function setCodeBusy(isBusy) {
      copyCodeButton.disabled = isBusy || !currentCodeText;
    }

    async function openCodeWindow(site) {
      currentCodeText = '';
      codeTitle.textContent = `代码：${site.title}`;
      codeMeta.textContent = site.url;
      codeViewer.value = '';
      setCodeBusy(true);
      setCodeMessage('正在加载代码...');
      openOverlay(codeOverlay);
      document.body.classList.add('is-code-viewing');

      const response = await fetch(`/api/sites/${encodeURIComponent(site.id)}/public-code`);
      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '加载代码失败' }));
        setCodeMessage(result.error || '加载代码失败', true);
        return;
      }

      const result = await response.json();
      currentCodeText = result.combinedText || '';
      codeViewer.value = currentCodeText;
      const fileCount = Array.isArray(result.files) ? result.files.length : 0;
      codeMeta.textContent = `${fileCount} 个文件 · ${result.url || site.url}`;
      setCodeMessage('代码为只读，可以复制完整项目代码。');
      setCodeBusy(false);
      codeViewer.focus();
    }

    function closeCodeWindow() {
      currentCodeText = '';
      codeViewer.value = '';
      closeOverlay(codeOverlay);
      document.body.classList.remove('is-code-viewing');
      setCodeBusy(true);
      setCodeMessage('');
    }

    function copyCodeWithSelectionFallback() {
      const wasReadonly = codeViewer.readOnly;
      codeViewer.readOnly = false;
      try {
        codeViewer.focus();
        codeViewer.select();
        codeViewer.setSelectionRange(0, codeViewer.value.length);
        return document.execCommand('copy');
      } finally {
        codeViewer.readOnly = wasReadonly;
      }
    }

    async function copyProjectCode() {
      if (!currentCodeText) {
        return;
      }

      try {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(currentCodeText);
        } else {
          copyCodeWithSelectionFallback();
        }
        setCodeMessage('已复制完整项目代码。');
      } catch {
        if (copyCodeWithSelectionFallback()) {
          setCodeMessage('已复制完整项目代码。');
          return;
        }
        setCodeMessage('已选中全部代码，请按 Ctrl/Cmd+C 复制。');
      }
    }

    async function unlockClass(classId, password, messageElement) {
      const unlockUrl = classId
        ? `/api/classes/${encodeURIComponent(classId)}/unlock`
        : '/api/all/unlock';
      const response = await fetch(unlockUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '密码错误' }));
        messageElement.textContent = result.error || '密码错误';
        return;
      }

      unlockedClassIds.add(classId);
      if (currentClassId === classId) {
        await loadSites();
      }
    }

    function renderClassPasswordPrompt(message = '请输入班级密码后查看项目。', count = 0) {
      siteGrid.innerHTML = '';
      emptyState.style.display = 'none';

      const currentClassName = currentClassId ? (classes.find(c => c.id === currentClassId)?.name || '当前班级') : '全部';
      classProjectCount.textContent = `${currentClassName}共有 ${count} 个项目`;

      const currentClass = classes.find((item) => item.id === currentClassId);
      const panel = document.createElement('form');
      panel.className = 'unlock-panel';

      const title = document.createElement('h2');
      title.className = 'unlock-title';
      title.textContent = currentClassId
        ? `解锁「${currentClass ? currentClass.name : '班级'}」`
        : '解锁「全部」';

      const copy = document.createElement('p');
      copy.className = 'unlock-copy';
      copy.textContent = message;

      const actions = document.createElement('div');
      actions.className = 'unlock-actions';

      const label = document.createElement('label');
      label.textContent = currentClassId ? '班级密码' : '全部密码';

      const input = document.createElement('input');
      input.type = 'password';
      input.inputMode = 'numeric';
      input.maxLength = 6;
      input.autocomplete = 'current-password';
      input.required = true;

      const button = document.createElement('button');
      button.className = 'primary-button';
      button.type = 'submit';
      button.textContent = currentClassId ? '解锁班级' : '解锁全部';

      const error = document.createElement('div');
      error.className = 'message';

      label.append(input);
      actions.append(label, button);
      panel.append(title, copy, actions, error);
      panel.addEventListener('submit', async (event) => {
        event.preventDefault();
        error.textContent = '';
        await unlockClass(currentClassId, input.value.trim(), error);
      });

      siteGrid.append(panel);
      input.focus();
    }

    function renderSites(sites) {
      siteGrid.innerHTML = '';
      
      const currentClassName = currentClassId ? (classes.find(c => c.id === currentClassId)?.name || '当前班级') : '全部';
      classProjectCount.textContent = `${currentClassName}共有 ${sites.length} 个项目`;

      if (!classes.length) {
        emptyState.textContent = '请先到后台创建班级。';
      } else if (!currentClassId) {
        emptyState.textContent = '还没有可查看的项目。';
      } else {
        emptyState.textContent = '当前班级还没有项目。';
      }
      emptyState.style.display = sites.length ? 'none' : 'block';

      sites.forEach((site, index) => {
        const card = document.createElement('article');
        card.className = 'site-card';

        const cardMain = document.createElement('div');
        cardMain.className = 'site-card-main';

        const cover = document.createElement('div');
        cover.className = 'site-cover';
        if (site.thumbnailUrl) {
          const image = document.createElement('img');
          image.src = site.thumbnailUrl;
          image.alt = `${site.title} 的封面图`;
          image.loading = 'lazy';
          cover.append(image);
        } else {
          const placeholder = document.createElement('div');
          placeholder.className = 'site-cover-placeholder';
          placeholder.textContent = '暂无封面';
          cover.append(placeholder);
        }

        const content = document.createElement('div');
        content.className = 'site-content';

        const heading = document.createElement('div');
        heading.className = 'site-heading';

        const number = document.createElement('span');
        number.className = 'site-number';
        number.textContent = site.number;

        const title = document.createElement('h2');
        title.className = 'site-title';
        title.textContent = site.title;

        heading.append(number, title);

        const tagsContainer = document.createElement('div');
        tagsContainer.className = 'site-tags';

        const classTag = document.createElement('div');
        classTag.className = 'site-class-tag';
        classTag.textContent = site.className || '未分配';
        tagsContainer.append(classTag);

        if (site.author) {
          const authorTag = document.createElement('div');
          authorTag.className = 'site-author-tag';
          authorTag.textContent = site.author;
          tagsContainer.append(authorTag);
        }

        const url = document.createElement('div');
        url.className = 'site-url';
        url.textContent = site.url;
        tagsContainer.append(url);

        content.append(heading, tagsContainer);
        cardMain.append(cover, content);

        const actions = document.createElement('div');
        actions.className = 'card-actions';

        const previewButton = document.createElement('button');
        previewButton.className = 'primary-button';
        previewButton.type = 'button';
        previewButton.textContent = '预览项目';
        previewButton.addEventListener('click', () => openProjectWindow(site));

        const codeButton = document.createElement('button');
        codeButton.className = 'secondary-button';
        codeButton.type = 'button';
        codeButton.textContent = '查看代码';
        codeButton.addEventListener('click', () => openCodeWindow(site));

        actions.append(previewButton, codeButton);
        card.append(cardMain, actions);

        siteGrid.append(card);
      });
    }

    function renderClasses() {
      classTabs.innerHTML = '';
      updateUploadButtonState();

      const allButton = document.createElement('button');
      allButton.className = `class-tab${currentClassId ? '' : ' is-active'}`;
      allButton.type = 'button';
      allButton.textContent = '全部';
      allButton.addEventListener('click', () => selectClass(''));
      classTabs.append(allButton);

      classes.forEach((classItem) => {
        const button = document.createElement('button');
        button.className = `class-tab${classItem.id === currentClassId ? ' is-active' : ''}`;
        button.type = 'button';
        button.textContent = classItem.name;
        button.addEventListener('click', () => selectClass(classItem.id));
        classTabs.append(button);
      });
    }

    async function loadClasses() {
      const response = await fetch('/api/classes');
      classes = await response.json();

      if (!classes.some((item) => item.id === currentClassId)) {
        currentClassId = '';
      }

      renderClasses();
    }

    async function loadUploadRules() {
      const response = await fetch('/api/upload-rules');
      if (!response.ok) {
        uploadRules = { forbiddenWords: [] };
        return;
      }

      uploadRules = await response.json();
    }

    async function selectClass(classId) {
      currentClassId = classId;
      renderClasses();
      await loadSites();
    }

    async function loadSites() {
      const sitesUrl = currentClassId
        ? `/api/sites?classId=${encodeURIComponent(currentClassId)}`
        : '/api/sites';
      const response = await fetch(sitesUrl);
      if (response.status === 401) {
        updateUploadButtonState();
        const data = await response.json().catch(() => ({}));
        renderClassPasswordPrompt('请输入班级密码后查看项目。', data.count || 0);
        return;
      }

      if (!response.ok) {
        updateUploadButtonState();
        throw new Error('加载项目失败');
      }

      const sites = await response.json();
      if (currentClassId) {
        unlockedClassIds.add(currentClassId);
      }
      updateUploadButtonState();
      renderSites(sites);
    }

    async function refreshCurrentClassSites() {
      refreshClassSitesButton.disabled = true;
      try {
        await loadSites();
      } catch (error) {
        emptyState.textContent = error.message || '刷新项目失败';
        emptyState.style.display = 'block';
      } finally {
        refreshClassSitesButton.disabled = false;
      }
    }

    async function getUploadPreviewHtml() {
      const file = fileInput.files && fileInput.files[0];
      if (file) {
        const fileName = file.name.toLowerCase();
        if (!fileName.endsWith('.html') && !fileName.endsWith('.htm')) {
          throw new Error('当前版本只支持预览 HTML 文件。');
        }
        return await file.text();
      }

      return uploadHtmlContent.value.trim();
    }

    async function previewUploadDraft() {
      uploadMessage.textContent = '';

      try {
        const htmlContent = await getUploadPreviewHtml();
        if (!htmlContent) {
          uploadMessage.textContent = '请上传 HTML 文件或填写 HTML 代码后再预览。';
          return;
        }

        openUploadDraftPreview(htmlContent);
      } catch (error) {
        uploadMessage.textContent = error.message || '预览失败';
      }
    }

    uploadForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      uploadMessage.textContent = '';

      const file = fileInput.files && fileInput.files[0];
      const htmlContent = uploadHtmlContent.value.trim();
      const title = titleInput.value.trim();
      const author = authorInput.value.trim();
      const forbiddenMessage = findForbiddenWordMatch(title, author);
      if (forbiddenMessage) {
        uploadMessage.textContent = forbiddenMessage;
        return;
      }

      if (!file && !htmlContent) {
        uploadMessage.textContent = '请上传 HTML 文件或填写 HTML 代码。';
        return;
      }

      const fileName = file ? file.name.toLowerCase() : '';
      if (file && !fileName.endsWith('.html') && !fileName.endsWith('.htm')) {
        uploadMessage.textContent = '当前版本只支持上传 HTML 文件。';
        return;
      }

      const formData = new FormData();
      formData.append('title', title);
      formData.append('author', author);
      formData.append('classId', currentClassId);
      formData.append('htmlContent', htmlContent);
      if (file) {
        formData.append('file', file, file.name);
      }

      const response = await fetch('/api/sites', {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '上传失败' }));
        uploadMessage.textContent = result.error || '上传失败';
        return;
      }

      closeUpload();
      await loadSites();
    });

    openUploadButton.addEventListener('click', openUpload);
    refreshClassSitesButton.addEventListener('click', refreshCurrentClassSites);
    previewUploadButton.addEventListener('click', previewUploadDraft);
    document.getElementById('closeUpload').addEventListener('click', closeUpload);
    document.getElementById('cancelUpload').addEventListener('click', closeUpload);
    document.getElementById('closePreview').addEventListener('click', closePreview);
    document.getElementById('closeCode').addEventListener('click', closeCodeWindow);
    copyCodeButton.addEventListener('click', copyProjectCode);
    openPreviewExternal.addEventListener('click', () => {
      if (currentPreviewExternalUrl) {
        window.open(currentPreviewExternalUrl, '_blank', 'noopener');
      }
    });
    refreshPreview.addEventListener('click', () => {
      if (currentPreviewUrl) {
        previewFrame.src = currentPreviewUrl;
        focusPreviewFrame();
      }
    });

    uploadOverlay.addEventListener('click', (event) => {
      if (event.target === uploadOverlay) {
        closeUpload();
      }
    });

    previewOverlay.addEventListener('click', (event) => {
      if (event.target === previewOverlay) {
        closePreview();
      }
    });

    codeOverlay.addEventListener('click', (event) => {
      if (event.target === codeOverlay) {
        closeCodeWindow();
      }
    });

    async function boot() {
      await loadUploadRules();
      await loadClasses();
      await loadSites();
    }

    boot().catch((error) => {
      emptyState.textContent = `加载项目失败：${error.message}`;
      emptyState.style.display = 'block';
    });
  </script>
</body>
</html>
