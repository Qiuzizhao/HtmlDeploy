<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>项目站</title>
  <link rel="icon" href="/favicon-site-mark.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --bg: #eef1f4;
      --panel: #ffffff;
      --panel-soft: #f3f4f6;
      --text: #111827;
      --muted: #6b7280;
      --line: #d1d5db;
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --accent: #047857;
      --accent-soft: #ecfdf5;
      --danger: #dc2626;
      --warning: #b45309;
      --warning-soft: #fffbeb;
      --shadow: none;
      --soft-shadow: none;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: none;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.22);
      outline-offset: 2px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 max(20px, calc((100vw - 1240px) / 2));
      background: #334155;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      font-size: 20px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .topbar .brand {
      color: #f9fafb;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 4px;
      background: #f9fafb;
      color: #111827;
      font-size: 18px;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .admin-link {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #475569;
      color: #e5e7eb;
      display: inline-flex;
      align-items: center;
      font-weight: 650;
      text-decoration: none;
    }

    .admin-link:hover {
      border-color: #94a3b8;
      background: #64748b;
      color: #fff;
    }

    .upload-button,
    .primary-button {
      min-height: 40px;
      padding: 0 18px;
      border: 1px solid var(--brand-dark);
      border-radius: 4px;
      background: var(--brand);
      color: #fff;
      font-weight: 650;
    }

    .upload-button:hover,
    .primary-button:hover {
      background: var(--brand-dark);
    }

    .upload-button:disabled,
    .primary-button:disabled {
      cursor: not-allowed;
      border-color: #9aa8ba;
      background: #9aa8ba;
      opacity: 0.82;
      transform: none;
    }

    button.is-loading {
      pointer-events: none;
    }

    button.is-loading::before {
      content: "";
      width: 14px;
      height: 14px;
      margin-right: 8px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: loading-spin 0.72s linear infinite;
    }

    .secondary-button {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      color: var(--text);
      font-weight: 600;
    }

    .secondary-button:hover {
      border-color: #9ca3af;
      background: #f3f4f6;
      color: var(--text);
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      background: #f3f4f6;
      color: var(--text);
      font-size: 22px;
      line-height: 1;
    }

    .icon-button:hover {
      background: #e5e7eb;
    }

    main {
      width: min(1240px, calc(100vw - 40px));
      margin: 30px auto 64px;
    }

    .class-filter-bar {
      margin-bottom: 24px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .class-filter-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .class-tabs {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      gap: 10px;
      padding: 2px;
      overflow-x: auto;
    }

    .class-refresh-button {
      flex: 0 0 auto;
      width: 76px;
      min-height: 42px;
      border-color: var(--brand-dark);
      background: var(--brand);
      color: #fff;
      font-weight: 800;
    }

    .class-refresh-button:hover {
      border-color: var(--brand-dark);
      background: var(--brand-dark);
      color: #fff;
    }

    .class-refresh-button:disabled {
      cursor: wait;
      opacity: 0.72;
      transform: none;
    }

    .class-tab {
      min-height: 42px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      color: var(--text);
      font-weight: 700;
      white-space: nowrap;
    }

    .class-tab:hover {
      border-color: #9ca3af;
      background: #f3f4f6;
      color: var(--text);
    }

    .class-tab.is-active {
      border-color: var(--brand-dark);
      background: var(--brand);
      color: #fff;
    }

    .project-filter-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .project-search {
      flex: 1 1 auto;
      min-width: 0;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      color: var(--text);
      padding: 0 14px;
      font-weight: 600;
    }

    .project-search::placeholder {
      color: var(--muted);
      font-weight: 500;
    }

    .star-filter-button {
      flex: 0 0 auto;
      min-width: 86px;
      min-height: 42px;
      border-color: #facc15;
      background: var(--warning-soft);
      color: var(--warning);
      font-weight: 800;
    }

    .star-filter-button:hover,
    .star-filter-button.is-active {
      border-color: #f59e0b;
      background: #fef3c7;
      color: var(--warning);
    }

    .order-toggle-button {
      flex: 0 0 auto;
      min-width: 96px;
      min-height: 42px;
      font-weight: 800;
    }

    .order-toggle-button.is-random {
      border-color: #93c5fd;
      background: #eff6ff;
      color: var(--brand-dark);
    }

    .order-toggle-button.is-ascending,
    .order-toggle-button.is-descending {
      border-color: #9ca3af;
      background: #f3f4f6;
      color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .site-card {
      content-visibility: auto;
      contain-intrinsic-size: 182px 260px;
      min-height: 182px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      border-left: 5px solid var(--brand);
      text-align: left;
      transition: none;
    }

    .site-card.is-starred {
      border-color: #fcd34d;
      border-left-color: #f59e0b;
      background: #fffbeb;
    }

    .site-card:hover {
      border-color: #9ca3af;
      background: #f9fafb;
    }

    .site-card.is-starred:hover {
      border-color: #f59e0b;
      background: #fef3c7;
    }

    .site-card-main {
      min-width: 0;
    }

    .site-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      margin-bottom: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f3f4f6;
    }

    .site-cover img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .site-cover-placeholder {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--brand-dark);
      font-size: 14px;
      font-weight: 750;
    }

    .site-heading {
      display: flex;
      align-items: baseline;
      gap: 9px;
      min-width: 0;
      margin-bottom: 8px;
    }

    .site-number {
      flex: 0 0 auto;
      padding: 3px 7px;
      border-radius: 6px;
      background: #eff6ff;
      color: var(--brand);
      font-size: 19px;
      font-weight: 800;
      line-height: 1;
      border: 1px solid #bfdbfe;
    }

    .site-content {
      min-width: 0;
      padding-top: 2px;
    }

    .site-title {
      margin: 0;
      font-size: 19px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .site-star-icon {
      flex: 0 0 auto;
      color: #f59e0b;
      font-size: 21px;
      font-weight: 900;
      line-height: 1;
    }

    .site-tags {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .site-class-tag {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      padding: 5px 9px;
      border: 1px solid #a7f3d0;
      border-radius: 4px;
      background: #ecfdf5;
      color: #047857;
      font-size: 13px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .site-author-tag {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      padding: 5px 9px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: #f9fafb;
      color: #374151;
      font-size: 13px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .site-usage-tag {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      padding: 5px 9px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: #f9fafb;
      color: #374151;
      font-size: 13px;
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .site-url {
      display: inline-block;
      max-width: 100%;
      padding: 6px 9px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: #f9fafb;
      color: var(--brand-dark);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .card-actions .primary-button,
    .card-actions .secondary-button {
      min-height: 38px;
    }

    .empty {
      padding: 56px 20px;
      border: 2px dashed var(--line);
      border-radius: 6px;
      background: #fff;
      text-align: center;
      color: var(--brand-dark);
    }

    .loading-state {
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--brand-dark);
      font-size: 15px;
      font-weight: 700;
    }

    .loading-state[hidden],
    .empty[hidden] {
      display: none;
    }

    .loading-spinner {
      width: 42px;
      height: 42px;
      border: 4px solid #cbd5e1;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: loading-spin 0.8s linear infinite;
    }

    @keyframes loading-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .unlock-panel {
      grid-column: 1 / -1;
      width: min(520px, 100%);
      display: grid;
      gap: 16px;
      justify-self: center;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .unlock-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
    }

    .unlock-copy {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .unlock-actions {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .unlock-actions label {
      flex: 1 1 220px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.56);
    }

    .overlay.is-open {
      display: flex;
    }

    .preview-overlay.is-open {
      display: flex;
    }

    body.is-previewing {
      overflow: hidden;
    }

    body.is-code-viewing {
      overflow: hidden;
    }

    body.is-previewing > .topbar,
    body.is-previewing > main {
      display: none;
    }

    .preview-backdrop {
      position: fixed;
      inset: 0;
      z-index: 99;
      display: none;
      overflow: hidden;
      pointer-events: none;
      background: var(--bg);
    }

    .preview-backdrop.is-open {
      display: block;
    }

    .preview-backdrop::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.56);
    }

    .preview-backdrop-content {
      transform: translateY(calc(-1 * var(--preview-scroll-offset, 0px)));
    }

    .preview-overlay {
      background: transparent;
    }

    .modal {
      width: min(460px, calc(100vw - 32px));
      border-radius: 6px;
      background: var(--panel);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .modal-head,
    .preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .modal-title,
    .preview-title {
      min-width: 0;
      margin: 0;
      font-size: 18px;
      overflow-wrap: anywhere;
    }

    .modal-body {
      display: grid;
      gap: 16px;
      padding: 20px;
    }

    .current-class {
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f9fafb;
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 700;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    input[type="text"],
    input[type="password"],
    input[type="file"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fcfdff;
      color: var(--text);
      padding: 10px 12px;
    }

    input[type="text"],
    input[type="password"],
    input[type="file"] {
      min-height: 44px;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.5;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="file"]:focus,
    textarea:focus {
      border-color: var(--brand);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 20px 20px;
    }

    .message {
      min-height: 20px;
      color: var(--danger);
      font-size: 13px;
    }

    .preview {
      position: relative;
      width: min(1280px, calc(100vw - 48px));
      height: min(840px, calc(100vh - 48px));
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 6px;
    }

    .preview-head {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1;
      min-height: 64px;
      box-sizing: border-box;
      border-radius: 5px 5px 0 0;
    }

    .preview-meta {
      min-width: 0;
    }

    .preview-url {
      margin-top: 4px;
      color: var(--accent);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .preview-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #previewFrame {
      display: block;
      position: absolute;
      top: 65px;
      right: 1px;
      bottom: 1px;
      left: 1px;
      width: calc(100% - 2px);
      height: calc(100% - 66px);
      border: 0;
      background: #000;
    }

    .code-window {
      width: min(1000px, calc(100vw - 32px));
      height: min(760px, calc(100vh - 32px));
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 6px;
      overflow: hidden;
      background: var(--panel);
    }

    .code-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .code-title-wrap {
      min-width: 0;
    }

    .code-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .code-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .code-message {
      min-height: 34px;
      padding: 9px 18px;
      color: var(--brand-dark);
      font-size: 14px;
      font-weight: 650;
      border-bottom: 1px solid var(--line);
      background: #f9fafb;
    }

    .code-message.is-error {
      color: var(--danger);
    }

    .code-viewer {
      min-height: 0;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 0;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
      resize: none;
      line-height: 1.55;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
    }

    .code-viewer:focus {
      outline: none;
    }

    .code-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }

    @media (max-width: 1024px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 700px) {
      .topbar {
        height: 66px;
        padding: 0 12px;
      }

      .brand {
        font-size: 18px;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
      }

      .upload-button {
        min-height: 38px;
        padding: 0 13px;
      }

      .top-actions {
        gap: 8px;
      }

      .admin-link {
        min-height: 38px;
        padding: 0 11px;
      }

      main {
        width: min(100vw - 24px, 1120px);
        margin-top: 22px;
      }

      .class-tabs {
        gap: 8px;
      }

      .project-filter-row {
        align-items: stretch;
        flex-direction: column;
      }

      .star-filter-button {
        width: 100%;
      }

      .order-toggle-button {
        width: 100%;
      }

      .class-filter-bar {
        margin-bottom: 16px;
        padding: 10px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .site-card {
        contain-intrinsic-size: 174px 320px;
        min-height: 174px;
        padding: 10px;
      }

      .unlock-panel {
        padding: 18px;
      }

      .unlock-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .site-heading {
        gap: 8px;
      }

      .card-actions .primary-button,
      .card-actions .secondary-button {
        flex: 1 1 130px;
      }

      .overlay {
        padding: 12px;
      }

      .preview {
        width: calc(100vw - 24px);
        height: calc(100vh - 24px);
        border-radius: 6px;
      }

      .preview-head {
        min-height: 92px;
        align-items: flex-start;
        flex-direction: column;
        border-radius: 5px 5px 0 0;
      }

      .preview-actions {
        width: 100%;
        justify-content: space-between;
      }

      #previewFrame {
        top: 93px;
        height: calc(100% - 94px);
      }

      .code-window {
        width: calc(100vw - 24px);
        height: calc(100vh - 24px);
        border-radius: 6px;
      }

      .code-head,
      .code-actions {
        padding: 12px;
      }

      .code-actions {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">H</span>
      <span>项目站</span>
    </div>
    <div class="top-actions">
      <a class="admin-link" href="/admin.html">后台管理</a>
      <button class="upload-button" id="openUpload" type="button">＋ 上传网页</button>
    </div>
  </header>

  <main>
    <section class="class-filter-bar">
      <div class="class-filter-row">
        <nav class="class-tabs" id="classTabs" aria-label="班级"></nav>
        <button class="secondary-button class-refresh-button" id="refreshClassSites" type="button">刷新</button>
      </div>
      <div class="project-filter-row">
        <input class="project-search" id="projectSearchInput" type="search" placeholder="搜索项目名称、作者、编号" aria-label="搜索项目">
        <button class="secondary-button order-toggle-button is-descending" id="projectOrderButton" type="button" aria-pressed="false">降序</button>
        <button class="secondary-button star-filter-button" id="starredFilterButton" type="button" aria-pressed="false">星标</button>
      </div>
      <div id="classProjectCount" style="margin-top: 14px; font-size: 14px; color: var(--muted); font-weight: 600; padding: 0 4px;"></div>
    </section>
    <div class="loading-state" id="loadingState" role="status" aria-live="polite">
      <span class="loading-spinner" aria-hidden="true"></span>
      <span>正在加载项目...</span>
    </div>
    <section class="grid" id="siteGrid" aria-live="polite"></section>
    <div class="empty" id="emptyState" hidden>还没有项目，点击右上角上传一个。</div>
  </main>

  <div class="overlay" id="uploadOverlay" aria-hidden="true">
    <form class="modal" id="uploadForm">
      <div class="modal-head">
        <h2 class="modal-title">上传网页</h2>
        <button class="icon-button" id="closeUpload" type="button" aria-label="关闭上传弹窗">×</button>
      </div>
      <div class="modal-body">
        <div class="current-class" id="currentClassLabel"></div>
        <label>
          网页名字
          <input id="titleInput" name="title" type="text" maxlength="80" placeholder="例如：我的小游戏" required>
        </label>
        <label>
          作者署名
          <input id="authorInput" name="author" type="text" maxlength="40" placeholder="如：张三" required>
        </label>
        <label>
          HTML 文件
          <input id="fileInput" name="file" type="file" accept=".html,text/html">
        </label>
        <label>
          HTML 代码
          <textarea id="uploadHtmlContent" name="htmlContent" placeholder="可以直接粘贴完整 HTML 代码。上传文件和填写代码二选一即可。"></textarea>
        </label>
        <div class="message" id="uploadMessage"></div>
      </div>
      <div class="modal-actions">
        <button class="secondary-button" id="cancelUpload" type="button">取消</button>
        <button class="secondary-button" id="previewUpload" type="button">预览</button>
        <button class="primary-button" type="submit">确定上传</button>
      </div>
    </form>
  </div>

  <div class="overlay" id="uploadSuccessOverlay" aria-hidden="true">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="uploadSuccessTitle">
      <div class="modal-head">
        <h2 class="modal-title" id="uploadSuccessTitle">上传成功</h2>
      </div>
      <div class="modal-body">
        <p style="margin: 0; color: var(--text); line-height: 1.7; font-weight: 650;">上传成功，请勿重复上传。</p>
      </div>
      <div class="modal-actions">
        <button class="primary-button" id="closeUploadSuccess" type="button">我知道了</button>
      </div>
    </section>
  </div>

  <div class="preview-backdrop" id="previewBackdrop" aria-hidden="true"></div>

  <div class="overlay preview-overlay" id="previewOverlay" aria-hidden="true">
    <section class="preview">
      <div class="preview-head">
        <div class="preview-meta">
          <h2 class="preview-title" id="previewTitle"></h2>
          <div class="preview-url" id="previewUrl"></div>
        </div>
        <div class="preview-actions">
          <button class="secondary-button" id="openPreviewExternal" type="button">新页面打开</button>
          <button class="secondary-button" id="refreshPreview" type="button">刷新</button>
          <button class="icon-button" id="closePreview" type="button" aria-label="关闭预览窗口">×</button>
        </div>
      </div>
      <iframe id="previewFrame" title="项目预览" tabindex="0" allow="fullscreen; accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"></iframe>
    </section>
  </div>

  <div class="overlay" id="codeOverlay" aria-hidden="true">
    <section class="code-window" role="dialog" aria-modal="true" aria-labelledby="codeTitle">
      <header class="code-head">
        <div class="code-title-wrap">
          <h2 class="code-title" id="codeTitle">项目代码</h2>
          <div class="code-meta" id="codeMeta"></div>
        </div>
        <button class="icon-button" id="closeCode" type="button" aria-label="关闭代码窗口">×</button>
      </header>
      <div class="code-message" id="codeMessage"></div>
      <textarea class="code-viewer" id="codeViewer" spellcheck="false" readonly aria-label="项目代码"></textarea>
      <footer class="code-actions">
        <button class="secondary-button" id="copyCode" type="button">复制</button>
      </footer>
    </section>
  </div>

  <script>
    const classTabs = document.getElementById('classTabs');
    const siteGrid = document.getElementById('siteGrid');
    const loadingState = document.getElementById('loadingState');
    const emptyState = document.getElementById('emptyState');
    const uploadOverlay = document.getElementById('uploadOverlay');
    const previewBackdrop = document.getElementById('previewBackdrop');
    const previewOverlay = document.getElementById('previewOverlay');
    const codeOverlay = document.getElementById('codeOverlay');
    const uploadSuccessOverlay = document.getElementById('uploadSuccessOverlay');
    const uploadForm = document.getElementById('uploadForm');
    const titleInput = document.getElementById('titleInput');
    const authorInput = document.getElementById('authorInput');
    const fileInput = document.getElementById('fileInput');
    const uploadHtmlContent = document.getElementById('uploadHtmlContent');
    const previewUploadButton = document.getElementById('previewUpload');
    const uploadMessage = document.getElementById('uploadMessage');
    const previewTitle = document.getElementById('previewTitle');
    const previewUrl = document.getElementById('previewUrl');
    const previewFrame = document.getElementById('previewFrame');
    const openPreviewExternal = document.getElementById('openPreviewExternal');
    const refreshPreview = document.getElementById('refreshPreview');
    const openUploadButton = document.getElementById('openUpload');
    const refreshClassSitesButton = document.getElementById('refreshClassSites');
    const projectSearchInput = document.getElementById('projectSearchInput');
    const projectOrderButton = document.getElementById('projectOrderButton');
    const starredFilterButton = document.getElementById('starredFilterButton');
    const classProjectCount = document.getElementById('classProjectCount');
    const currentClassLabel = document.getElementById('currentClassLabel');
    const codeTitle = document.getElementById('codeTitle');
    const codeMeta = document.getElementById('codeMeta');
    const codeMessage = document.getElementById('codeMessage');
    const codeViewer = document.getElementById('codeViewer');
    const copyCodeButton = document.getElementById('copyCode');
    const CLASS_SELECTION_STORAGE_KEY = 'project-site-selected-class-id';
    const SITE_RENDER_BATCH_SIZE = 12;

    function getStoredClassId() {
      try {
        return localStorage.getItem(CLASS_SELECTION_STORAGE_KEY) || '';
      } catch {
        return '';
      }
    }

    function rememberSelectedClassId(classId) {
      try {
        if (classId) {
          localStorage.setItem(CLASS_SELECTION_STORAGE_KEY, classId);
        } else {
          localStorage.removeItem(CLASS_SELECTION_STORAGE_KEY);
        }
      } catch {
        return;
      }
    }

    let currentPreviewUrl = '';
    let currentPreviewExternalUrl = '';
    let currentPreviewObjectUrl = '';
    let currentCodeText = '';
    let classes = [];
    let loadedSites = [];
    let siteSearchQuery = '';
    let starredOnly = false;
    let projectOrderMode = 'descending';
    let randomSiteOrder = new Map();
    let uploadRules = { forbiddenWords: [] };
    let uploadRulesLoaded = false;
    let uploadRulesPromise = null;
    let currentClassId = getStoredClassId();
    let siteSearchDebounceTimer = null;
    let siteRenderToken = 0;
    let siteLoadToken = 0;
    
    function getUnlockedClasses() {
      try {
        return new Set(JSON.parse(sessionStorage.getItem('unlocked_classes') || '[]'));
      } catch {
        return new Set();
      }
    }
    const unlockedClassIds = getUnlockedClasses();
    function saveUnlockedClasses() {
      try {
        sessionStorage.setItem('unlocked_classes', JSON.stringify([...unlockedClassIds]));
      } catch {}
    }

    function showLoadingState() {
      siteRenderToken += 1;
      loadingState.hidden = false;
      emptyState.hidden = true;
      emptyState.style.display = 'none';
      siteGrid.innerHTML = '';
      classProjectCount.textContent = '正在加载项目...';
    }

    function hideLoadingState() {
      loadingState.hidden = true;
    }

    function setButtonLoading(button, isLoading, text) {
      if (!button) {
        return;
      }

      if (!button.dataset.idleText) {
        button.dataset.idleText = button.textContent;
      }

      button.disabled = isLoading;
      button.classList.toggle('is-loading', isLoading);
      button.textContent = isLoading ? text : button.dataset.idleText;
    }

    function showEmptyState(message) {
      siteRenderToken += 1;
      siteGrid.innerHTML = '';
      emptyState.textContent = message;
      emptyState.hidden = false;
      emptyState.style.display = 'block';
    }

    function hideEmptyState() {
      emptyState.hidden = true;
      emptyState.style.display = 'none';
    }

    function getCurrentClass() {
      return classes.find((item) => item.id === currentClassId);
    }

    function hasCurrentClassAccess() {
      const currentClass = getCurrentClass();
      return Boolean(currentClassId && currentClass && (currentClass.passwordEnabled === false || unlockedClassIds.has(currentClassId)));
    }

    function canUploadCurrentClass() {
      const currentClass = getCurrentClass();
      return Boolean(hasCurrentClassAccess() && currentClass.uploadEnabled !== false);
    }

      function findForbiddenWordMatch(title, author) {
        const forbiddenWords = Array.isArray(uploadRules.forbiddenWords) ? uploadRules.forbiddenWords : [];
        const fields = [
        { label: '网页名字', value: title },
        { label: '作者署名', value: author }
      ];

      for (const field of fields) {
        const text = String(field.value || '').toLocaleLowerCase();
        for (const word of forbiddenWords) {
          if (text.includes(String(word).toLocaleLowerCase())) {
            return `${field.label}不能包含违禁词「${word}」`;
          }
        }
      }

        return '';
      }

      function validateBasicHtmlDocument(htmlContent) {
        const content = String(htmlContent || '').trim();
        if (!content) {
          return '';
        }

        const hasStructuralMarker = /<!doctype\s+html\b|<html[\s>]|<head[\s>]|<body[\s>]/i.test(content);
        const hasHtmlElement = /<\/?(?:html|head|title|meta|link|style|body|main|section|article|nav|header|footer|div|span|p|h[1-6]|canvas|script|button|input|form|label|ul|ol|li|table|thead|tbody|tr|td|th|img|video|audio|svg)\b[^>]*>/i.test(content);

        if (!hasStructuralMarker || !hasHtmlElement) {
          return 'HTML 代码结构不完整，请上传包含 <!doctype html>、<html>、<head>/<body> 等基本结构的完整 HTML 页面。';
        }

        return '';
      }

      function updateUploadButtonState() {
        const currentClass = getCurrentClass();
      const uploadDisabledByClass = Boolean(currentClassId && currentClass && currentClass.uploadEnabled === false);
      openUploadButton.disabled = !classes.length || !currentClassId || !hasCurrentClassAccess() || uploadDisabledByClass;
      openUploadButton.title = uploadDisabledByClass ? '当前班级已禁用上传网页' : '';
    }

    function updateProjectFilterControls() {
      const isRandom = projectOrderMode === 'random';
      const isAscending = projectOrderMode === 'ascending';
      const orderLabels = {
        random: '随机',
        ascending: '升序',
        descending: '降序'
      };
      projectOrderButton.classList.toggle('is-random', isRandom);
      projectOrderButton.classList.toggle('is-ascending', isAscending);
      projectOrderButton.classList.toggle('is-descending', projectOrderMode === 'descending');
      projectOrderButton.textContent = orderLabels[projectOrderMode] || orderLabels.random;
      projectOrderButton.setAttribute('aria-pressed', isRandom ? 'true' : 'false');
      projectOrderButton.title = isRandom
        ? '当前随机排列，点击切换为编号升序'
        : isAscending
          ? '当前按编号升序排列，点击切换为编号降序'
          : '当前按编号降序排列，点击切换为随机排列';
      starredFilterButton.classList.toggle('is-active', starredOnly);
      starredFilterButton.setAttribute('aria-pressed', starredOnly ? 'true' : 'false');
      starredFilterButton.title = starredOnly ? '点击显示全部项目' : '点击只看星标项目';
    }

    function openOverlay(overlay) {
      overlay.classList.add('is-open');
      overlay.setAttribute('aria-hidden', 'false');
    }

    function closeOverlay(overlay) {
      overlay.classList.remove('is-open');
      overlay.setAttribute('aria-hidden', 'true');
    }

    function openUpload() {
      if (!currentClassId) {
        showEmptyState('请先到后台创建班级，再上传网页。');
        return;
      }

      if (!unlockedClassIds.has(currentClassId)) {
        // 尝试从当前的文本中提取数量，或者重新加载
        loadSites();
        return;
      }

      if (!canUploadCurrentClass()) {
        showEmptyState('当前班级已禁用上传网页功能。');
        return;
      }

      uploadMessage.textContent = '';
      uploadForm.reset();
      const currentClass = getCurrentClass();
      currentClassLabel.textContent = `当前班级：${currentClass ? currentClass.name : '未选择'}`;
      openOverlay(uploadOverlay);
      titleInput.focus();
      ensureUploadRulesLoaded().catch(() => {
        uploadMessage.textContent = '上传规则加载失败，将以服务器校验为准。';
      });
    }

    function closeUpload() {
      closeOverlay(uploadOverlay);
    }

    function openUploadSuccess() {
      openOverlay(uploadSuccessOverlay);
    }

    function closeUploadSuccess() {
      closeOverlay(uploadSuccessOverlay);
    }

    function focusPreviewFrame() {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          previewFrame.focus();
          try {
            previewFrame.contentWindow?.focus();
          } catch {
            // Same-origin previews can be focused; ignore browser focus denials.
          }
        });
      });
    }

    function stripCloneIds(element) {
      element.removeAttribute('id');
      element.querySelectorAll('[id]').forEach((item) => item.removeAttribute('id'));
    }

    function renderPreviewBackdrop() {
      previewBackdrop.innerHTML = '';
      previewBackdrop.style.setProperty('--preview-scroll-offset', `${window.scrollY}px`);

      const content = document.createElement('div');
      content.className = 'preview-backdrop-content';

      [document.querySelector('.topbar'), document.querySelector('main')].forEach((source) => {
        if (!source) {
          return;
        }

        const clone = source.cloneNode(true);
        stripCloneIds(clone);
        content.append(clone);
      });

      previewBackdrop.append(content);
      previewBackdrop.classList.add('is-open');
    }

    function clearPreviewBackdrop() {
      previewBackdrop.classList.remove('is-open');
      previewBackdrop.innerHTML = '';
    }

    function openProjectWindow(site) {
      const availableWidth = window.screen?.availWidth || window.innerWidth;
      const availableHeight = window.screen?.availHeight || window.innerHeight;
      const width = Math.min(1280, Math.max(960, Math.round(availableWidth * 0.82)));
      const height = Math.min(840, Math.max(640, Math.round(availableHeight * 0.82)));
      const left = Math.max(0, Math.round((availableWidth - width) / 2));
      const top = Math.max(0, Math.round((availableHeight - height) / 2));
      const features = [
        'popup=yes',
        `width=${width}`,
        `height=${height}`,
        `left=${left}`,
        `top=${top}`
      ].join(',');
      const targetName = `htmlDeployPreview_${String(site.id || 'site').replace(/[^a-z0-9_-]/gi, '_')}`;

      const opened = window.open(site.previewUrl || site.url, targetName, features);
      if (opened) {
        opened.opener = null;
        opened.focus();
        return;
      }

      openPreview(site);
    }

    function clearPreviewObjectUrl() {
      if (currentPreviewObjectUrl) {
        URL.revokeObjectURL(currentPreviewObjectUrl);
        currentPreviewObjectUrl = '';
      }
    }

    function openPreview(site) {
      clearPreviewObjectUrl();
      renderPreviewBackdrop();
      currentPreviewUrl = site.url;
      currentPreviewExternalUrl = site.previewUrl || site.url;
      previewTitle.textContent = site.title;
      previewUrl.textContent = site.url;
      previewFrame.src = site.url;
      openOverlay(previewOverlay);
      document.body.classList.add('is-previewing');
      focusPreviewFrame();
    }

    function openUploadDraftPreview(htmlContent) {
      clearPreviewObjectUrl();
      const draftUrl = URL.createObjectURL(new Blob([htmlContent], { type: 'text/html' }));
      currentPreviewObjectUrl = draftUrl;
      renderPreviewBackdrop();
      currentPreviewUrl = draftUrl;
      currentPreviewExternalUrl = draftUrl;
      previewTitle.textContent = titleInput.value.trim() || '上传预览';
      previewUrl.textContent = '上传前预览，不会保存';
      previewFrame.src = draftUrl;
      openOverlay(previewOverlay);
      document.body.classList.add('is-previewing');
      focusPreviewFrame();
    }

    function closePreview() {
      previewFrame.removeAttribute('src');
      currentPreviewUrl = '';
      currentPreviewExternalUrl = '';
      clearPreviewObjectUrl();
      closeOverlay(previewOverlay);
      document.body.classList.remove('is-previewing');
      clearPreviewBackdrop();
    }

    function setCodeMessage(text, isError = false) {
      codeMessage.textContent = text;
      codeMessage.classList.toggle('is-error', isError);
    }

    function setCodeBusy(isBusy) {
      copyCodeButton.disabled = isBusy || !currentCodeText;
    }

    async function openCodeWindow(site) {
      currentCodeText = '';
      codeTitle.textContent = `代码：${site.title}`;
      codeMeta.textContent = site.url;
      codeViewer.value = '';
      setCodeBusy(true);
      setCodeMessage('正在加载代码...');
      openOverlay(codeOverlay);
      document.body.classList.add('is-code-viewing');

      const response = await fetch(`/api/sites/${encodeURIComponent(site.id)}/public-code`);
      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '加载代码失败' }));
        setCodeMessage(result.error || '加载代码失败', true);
        return;
      }

      const result = await response.json();
      currentCodeText = result.combinedText || '';
      codeViewer.value = currentCodeText;
      const fileCount = Array.isArray(result.files) ? result.files.length : 0;
      codeMeta.textContent = `${fileCount} 个文件 · ${result.url || site.url}`;
      setCodeMessage('代码为只读，可以复制完整项目代码。');
      setCodeBusy(false);
      codeViewer.focus();
    }

    function closeCodeWindow() {
      currentCodeText = '';
      codeViewer.value = '';
      closeOverlay(codeOverlay);
      document.body.classList.remove('is-code-viewing');
      setCodeBusy(true);
      setCodeMessage('');
    }

    function copyCodeWithSelectionFallback() {
      const wasReadonly = codeViewer.readOnly;
      codeViewer.readOnly = false;
      try {
        codeViewer.focus();
        codeViewer.select();
        codeViewer.setSelectionRange(0, codeViewer.value.length);
        return document.execCommand('copy');
      } finally {
        codeViewer.readOnly = wasReadonly;
      }
    }

    async function copyProjectCode() {
      if (!currentCodeText) {
        return;
      }

      try {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(currentCodeText);
        } else {
          copyCodeWithSelectionFallback();
        }
        setCodeMessage('已复制完整项目代码。');
      } catch {
        if (copyCodeWithSelectionFallback()) {
          setCodeMessage('已复制完整项目代码。');
          return;
        }
        setCodeMessage('已选中全部代码，请按 Ctrl/Cmd+C 复制。');
      }
    }

    async function unlockClass(classId, password, messageElement) {
      const unlockUrl = classId
        ? `/api/classes/${encodeURIComponent(classId)}/unlock`
        : '/api/all/unlock';
      const response = await fetch(unlockUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '密码错误' }));
        messageElement.textContent = result.error || '密码错误';
        return;
      }

      unlockedClassIds.add(classId);
      saveUnlockedClasses();
      if (currentClassId === classId) {
        await loadSites();
      }
    }

    function renderClassPasswordPrompt(message = '请输入班级密码后查看项目。', count = 0) {
      siteRenderToken += 1;
      loadedSites = [];
      hideLoadingState();
      hideEmptyState();

      const currentClassName = currentClassId ? (classes.find(c => c.id === currentClassId)?.name || '当前班级') : '全部作品';
      const countText = count === '...' ? '...' : count;
      classProjectCount.textContent = `${currentClassName}共有 ${countText} 个项目`;

      if (siteGrid.querySelector('.unlock-panel')) {
        return;
      }

      siteGrid.innerHTML = '';

      const currentClass = classes.find((item) => item.id === currentClassId);
      const panel = document.createElement('form');
      panel.className = 'unlock-panel';

      const title = document.createElement('h2');
      title.className = 'unlock-title';
      title.textContent = currentClassId
        ? `解锁「${currentClass ? currentClass.name : '班级'}」`
        : '解锁「全部」';

      const copy = document.createElement('p');
      copy.className = 'unlock-copy';
      copy.textContent = message;

      const actions = document.createElement('div');
      actions.className = 'unlock-actions';

      const label = document.createElement('label');
      label.textContent = currentClassId ? '班级密码' : '全部作品页密码';

      const input = document.createElement('input');
      input.type = 'password';
      input.inputMode = 'numeric';
      input.maxLength = 6;
      input.autocomplete = 'current-password';
      input.required = true;

      const button = document.createElement('button');
      button.className = 'primary-button';
      button.type = 'submit';
      button.textContent = currentClassId ? '解锁班级' : '解锁全部';

      const error = document.createElement('div');
      error.className = 'message';

      label.append(input);
      actions.append(label, button);
      panel.append(title, copy, actions, error);
      panel.addEventListener('submit', async (event) => {
        event.preventDefault();
        error.textContent = '';
        setButtonLoading(button, true, '解锁中...');
        try {
          await unlockClass(currentClassId, input.value.trim(), error);
        } finally {
          setButtonLoading(button, false);
        }
      });

      siteGrid.append(panel);
      input.focus();
    }

    function getFilteredSites() {
      const keyword = siteSearchQuery.trim().toLowerCase();
      const filteredSites = loadedSites.filter((site) => {
        if (starredOnly && site.starred !== true) {
          return false;
        }

        if (!keyword) {
          return true;
        }

        return [
          site.title,
          site.author,
          site.className,
          site.number,
          site.id,
          site.url
        ].some((value) => String(value || '').toLowerCase().includes(keyword));
      });

      return sortSitesForDisplay(filteredSites);
    }

    function getSiteNumberValue(site) {
      const number = Number(site.number);
      return Number.isFinite(number) ? number : Number.MAX_SAFE_INTEGER;
    }

    function resetRandomSiteOrder(sites = loadedSites) {
      const ids = sites.map((site) => site.id);
      for (let index = ids.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [ids[index], ids[swapIndex]] = [ids[swapIndex], ids[index]];
      }
      randomSiteOrder = new Map(ids.map((id, index) => [id, index]));
    }

    function getRandomSiteRank(site) {
      if (!randomSiteOrder.has(site.id)) {
        randomSiteOrder.set(site.id, randomSiteOrder.size);
      }
      return randomSiteOrder.get(site.id);
    }

    function sortSitesForDisplay(sites) {
      const sortedSites = [...sites];
      if (projectOrderMode === 'ascending' || projectOrderMode === 'descending') {
        sortedSites.sort((a, b) => {
          const numberDiff = getSiteNumberValue(a) - getSiteNumberValue(b);
          if (numberDiff !== 0) {
            return projectOrderMode === 'descending' ? -numberDiff : numberDiff;
          }
          const idDiff = String(a.id || '').localeCompare(String(b.id || ''));
          return projectOrderMode === 'descending' ? -idDiff : idDiff;
        });
        return sortedSites;
      }

      sortedSites.sort((a, b) => getRandomSiteRank(a) - getRandomSiteRank(b));
      return sortedSites;
    }

    function renderFilteredSites() {
      renderSites(getFilteredSites());
    }

    function debounceProjectSearchRender() {
      if (siteSearchDebounceTimer) {
        window.clearTimeout(siteSearchDebounceTimer);
      }

      siteSearchDebounceTimer = window.setTimeout(() => {
        siteSearchQuery = projectSearchInput.value;
        renderFilteredSites();
      }, 300);
    }

    function createSiteCard(site, index = 0) {
      const card = document.createElement('article');
      card.className = site.starred === true ? 'site-card is-starred' : 'site-card';

      const cardMain = document.createElement('div');
      cardMain.className = 'site-card-main';

      const cover = document.createElement('div');
      cover.className = 'site-cover';
      if (site.thumbnailUrl) {
        const image = document.createElement('img');
        image.src = site.thumbnailUrl;
        image.alt = `${site.title} 的封面图`;
        image.decoding = 'async';
        image.loading = index < 8 ? 'eager' : 'lazy';
        image.fetchPriority = index < 8 ? 'high' : 'low';
        cover.append(image);
      } else {
        const placeholder = document.createElement('div');
        placeholder.className = 'site-cover-placeholder';
        placeholder.textContent = '暂无封面';
        cover.append(placeholder);
      }

      const content = document.createElement('div');
      content.className = 'site-content';

      const heading = document.createElement('div');
      heading.className = 'site-heading';

      const number = document.createElement('span');
      number.className = 'site-number';
      number.textContent = site.number;

      const title = document.createElement('h2');
      title.className = 'site-title';
      title.textContent = site.title;

      heading.append(number, title);
      if (site.starred === true) {
        const starIcon = document.createElement('span');
        starIcon.className = 'site-star-icon';
        starIcon.textContent = '★';
        starIcon.title = '星标项目';
        starIcon.setAttribute('aria-label', '星标项目');
        heading.append(starIcon);
      }

      const tagsContainer = document.createElement('div');
      tagsContainer.className = 'site-tags';

      const classTag = document.createElement('div');
      classTag.className = 'site-class-tag';
      classTag.textContent = site.className || '未分配';
      tagsContainer.append(classTag);

      if (site.author) {
        const authorTag = document.createElement('div');
        authorTag.className = 'site-author-tag';
        authorTag.textContent = site.author;
        tagsContainer.append(authorTag);
      }

      const usageCount = Math.max(0, Number(site.usageCount) || 0);
      const usageTag = document.createElement('div');
      usageTag.className = 'site-usage-tag';
      usageTag.textContent = `${usageCount} 次`;
      tagsContainer.append(usageTag);

      content.append(heading, tagsContainer);
      cardMain.append(cover, content);

      const actions = document.createElement('div');
      actions.className = 'card-actions';

      const previewButton = document.createElement('button');
      previewButton.className = 'primary-button';
      previewButton.type = 'button';
      previewButton.textContent = '预览项目';
      previewButton.addEventListener('click', () => openProjectWindow(site));

      const codeButton = document.createElement('button');
      codeButton.className = 'secondary-button';
      codeButton.type = 'button';
      codeButton.textContent = '查看代码';
      codeButton.addEventListener('click', () => openCodeWindow(site));

      actions.append(previewButton, codeButton);
      card.append(cardMain, actions);
      return card;
    }

    function appendSiteCardBatch(sites, startIndex, renderToken) {
      if (renderToken !== siteRenderToken) {
        return;
      }

      const endIndex = Math.min(startIndex + SITE_RENDER_BATCH_SIZE, sites.length);
      const fragment = document.createDocumentFragment();
      for (let index = startIndex; index < endIndex; index += 1) {
        const site = sites[index];
        fragment.append(createSiteCard(site, index));
      }
      siteGrid.append(fragment);

      if (endIndex < sites.length) {
        requestAnimationFrame(() => appendSiteCardBatch(sites, endIndex, renderToken));
      }
    }

    function renderSites(sites) {
      hideLoadingState();
      siteGrid.innerHTML = '';
      const renderToken = ++siteRenderToken;

      const currentClassName = currentClassId ? (classes.find(c => c.id === currentClassId)?.name || '当前班级') : '全部作品';
      const hasFilter = Boolean(siteSearchQuery.trim()) || starredOnly;
      classProjectCount.textContent = hasFilter
        ? `${currentClassName}当前显示 ${sites.length} 个 / 共 ${loadedSites.length} 个项目`
        : `${currentClassName}共有 ${sites.length} 个项目`;

      if (sites.length) {
        hideEmptyState();
      } else if (!classes.length) {
        showEmptyState('请先到后台创建班级。');
      } else if (hasFilter && loadedSites.length) {
        showEmptyState('没有匹配的项目。');
      } else if (!currentClassId) {
        showEmptyState('还没有可查看的项目。');
      } else {
        showEmptyState('当前班级还没有项目。');
      }

      appendSiteCardBatch(sites, 0, renderToken);
    }

    function renderClasses() {
      classTabs.innerHTML = '';
      updateUploadButtonState();

      const allButton = document.createElement('button');
      allButton.className = `class-tab${currentClassId ? '' : ' is-active'}`;
      allButton.type = 'button';
      allButton.textContent = '全部作品';
      allButton.addEventListener('click', () => selectClass(''));
      classTabs.append(allButton);

      classes.forEach((classItem) => {
        const button = document.createElement('button');
        button.className = `class-tab${classItem.id === currentClassId ? ' is-active' : ''}`;
        button.type = 'button';
        button.textContent = classItem.name;
        button.addEventListener('click', () => selectClass(classItem.id));
        classTabs.append(button);
      });
    }

    async function loadClasses() {
      const cacheKey = 'classes_cache_public';
      let hasCachedData = false;
      try {
        const cached = sessionStorage.getItem(cacheKey);
        if (cached) {
          classes = JSON.parse(cached);
          if (!classes.some((item) => item.id === currentClassId)) {
            currentClassId = '';
            rememberSelectedClassId('');
          }
          renderClasses();
          hasCachedData = true;
        }
      } catch (e) {}

      const fetchPromise = (async () => {
        try {
          const response = await fetch('/api/classes');
          const newClasses = await response.json();

          if (!hasCachedData || JSON.stringify(classes) !== JSON.stringify(newClasses)) {
            classes = newClasses;
            if (!classes.some((item) => item.id === currentClassId)) {
              currentClassId = '';
              rememberSelectedClassId('');
            }
            renderClasses();
            try {
              sessionStorage.setItem(cacheKey, JSON.stringify(classes));
            } catch (e) {}
          }
        } catch(e) {}
      })();

      if (!hasCachedData) {
        await fetchPromise;
      }
    }

    async function loadUploadRules() {
      try {
        const response = await fetch('/api/upload-rules');
        if (!response.ok) {
          uploadRules = { forbiddenWords: [] };
          uploadRulesLoaded = true;
          return uploadRules;
        }

        uploadRules = await response.json();
        uploadRulesLoaded = true;
        return uploadRules;
      } catch (error) {
        uploadRules = { forbiddenWords: [] };
        uploadRulesLoaded = true;
        throw error;
      }
    }

    async function ensureUploadRulesLoaded() {
      if (uploadRulesLoaded) {
        return uploadRules;
      }

      if (!uploadRulesPromise) {
        uploadRulesPromise = loadUploadRules().finally(() => {
          uploadRulesPromise = null;
        });
      }

      return uploadRulesPromise;
    }

    async function selectClass(classId) {
      currentClassId = classId;
      rememberSelectedClassId(classId);
      renderClasses();
      await loadSites();
    }

    async function loadSites() {
      const loadToken = ++siteLoadToken;
      
      let needsPassword = false;
      if (currentClassId) {
        const currentClass = classes.find(c => c.id === currentClassId);
        if (currentClass && currentClass.passwordEnabled !== false && !unlockedClassIds.has(currentClassId)) {
          needsPassword = true;
        }
      }

      const sitesUrl = currentClassId
        ? `/api/sites?classId=${encodeURIComponent(currentClassId)}`
        : '/api/sites';

      const cacheKey = `sites_cache_${currentClassId || 'all'}`;
      let hasCachedData = false;

      if (!needsPassword) {
        try {
          const cached = sessionStorage.getItem(cacheKey);
          if (cached) {
            const parsed = JSON.parse(cached);
            loadedSites = parsed;
            resetRandomSiteOrder(parsed);
            if (currentClassId) {
              unlockedClassIds.add(currentClassId);
              saveUnlockedClasses();
            }
            updateUploadButtonState();
            renderFilteredSites();
            hasCachedData = true;
          }
        } catch (e) {}
      }

      if (needsPassword) {
        const countCacheKey = `class_count_${currentClassId || 'all'}`;
        const cachedCount = sessionStorage.getItem(countCacheKey) || '...';
        renderClassPasswordPrompt('请输入班级密码后查看项目。', cachedCount);
      } else if (!hasCachedData) {
        showLoadingState();
      }

      const fetchPromise = (async () => {
        try {
          const response = await fetch(sitesUrl);
          if (loadToken !== siteLoadToken) return;

          if (response.status === 401) {
            loadedSites = [];
            updateUploadButtonState();
            const data = await response.json().catch(() => ({}));
            if (data.count !== undefined) {
              sessionStorage.setItem(`class_count_${currentClassId || 'all'}`, data.count);
            }
            renderClassPasswordPrompt('请输入班级密码后查看项目。', data.count !== undefined ? data.count : '...');
            return;
          }

          if (!response.ok) {
            if (!hasCachedData) {
              hideLoadingState();
              updateUploadButtonState();
              throw new Error('加载项目失败');
            }
            return;
          }

          const sites = await response.json();
          
          if (!hasCachedData || JSON.stringify(loadedSites) !== JSON.stringify(sites)) {
            loadedSites = sites;
            resetRandomSiteOrder(sites);
            if (currentClassId) {
              unlockedClassIds.add(currentClassId);
              saveUnlockedClasses();
            }
            updateUploadButtonState();
            renderFilteredSites();
            try {
              sessionStorage.setItem(cacheKey, JSON.stringify(sites));
            } catch (e) {}
          }
        } catch (e) {
          if (!hasCachedData) {
            hideLoadingState();
            updateUploadButtonState();
            throw e;
          }
        }
      })();

      if (!hasCachedData && !needsPassword) {
        await fetchPromise;
      }
    }

    async function refreshCurrentClassSites() {
      setButtonLoading(refreshClassSitesButton, true, '刷新中...');
      try {
        await loadSites();
      } catch (error) {
        hideLoadingState();
        showEmptyState(error.message || '刷新项目失败');
      } finally {
        setButtonLoading(refreshClassSitesButton, false);
      }
    }

    async function getUploadPreviewHtml() {
      const file = fileInput.files && fileInput.files[0];
      if (file) {
        const fileName = file.name.toLowerCase();
        if (!fileName.endsWith('.html') && !fileName.endsWith('.htm')) {
          throw new Error('当前版本只支持预览 HTML 文件。');
        }
        return await file.text();
      }

      return uploadHtmlContent.value.trim();
    }

    async function previewUploadDraft() {
      uploadMessage.textContent = '';
      setButtonLoading(previewUploadButton, true, '预览中...');

      try {
        const htmlContent = await getUploadPreviewHtml();
          if (!htmlContent) {
            uploadMessage.textContent = '请上传 HTML 文件或填写 HTML 代码后再预览。';
            return;
          }

          const htmlStructureMessage = validateBasicHtmlDocument(htmlContent);
          if (htmlStructureMessage) {
            uploadMessage.textContent = htmlStructureMessage;
            return;
          }

          openUploadDraftPreview(htmlContent);
        } catch (error) {
        uploadMessage.textContent = error.message || '预览失败';
      } finally {
        setButtonLoading(previewUploadButton, false);
      }
    }

    uploadForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      uploadMessage.textContent = '';
      const uploadSubmitButton = uploadForm.querySelector('button[type="submit"]');
      setButtonLoading(uploadSubmitButton, true, '上传中...');

      try {
        const file = fileInput.files && fileInput.files[0];
        const htmlContent = uploadHtmlContent.value.trim();
        const title = titleInput.value.trim();
        const author = authorInput.value.trim();
        try {
          await ensureUploadRulesLoaded();
        } catch {
          uploadMessage.textContent = '上传规则加载失败，将继续由服务器校验。';
        }
        const forbiddenMessage = findForbiddenWordMatch(title, author);
        if (forbiddenMessage) {
          uploadMessage.textContent = forbiddenMessage;
          return;
        }

        if (!file && !htmlContent) {
          uploadMessage.textContent = '请上传 HTML 文件或填写 HTML 代码。';
          return;
        }

        const fileName = file ? file.name.toLowerCase() : '';
        if (file && !fileName.endsWith('.html') && !fileName.endsWith('.htm')) {
          uploadMessage.textContent = '当前版本只支持上传 HTML 文件。';
          return;
        }

        let submittedHtmlContent = htmlContent;
        if (file) {
          try {
            submittedHtmlContent = await file.text();
          } catch {
            uploadMessage.textContent = '读取 HTML 文件失败，请重新选择文件。';
            return;
          }
        }

        const htmlStructureMessage = validateBasicHtmlDocument(submittedHtmlContent);
        if (htmlStructureMessage) {
          uploadMessage.textContent = htmlStructureMessage;
          return;
        }

        const formData = new FormData();
        formData.append('title', title);
        formData.append('author', author);
        formData.append('classId', currentClassId);
        formData.append('htmlContent', htmlContent);
        if (file) {
          formData.append('file', file, file.name);
        }

        const response = await fetch('/api/sites', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const result = await response.json().catch(() => ({ error: '上传失败' }));
          uploadMessage.textContent = result.error || '上传失败';
          return;
        }

        closeUpload();
        await loadSites();
        openUploadSuccess();
      } finally {
        setButtonLoading(uploadSubmitButton, false);
      }
    });

    uploadForm.addEventListener('reset', () => {
      const uploadSubmitButton = uploadForm.querySelector('button[type="submit"]');
      setButtonLoading(uploadSubmitButton, false);
    });

    openUploadButton.addEventListener('click', openUpload);
    refreshClassSitesButton.addEventListener('click', refreshCurrentClassSites);
    projectSearchInput.addEventListener('input', debounceProjectSearchRender);
    projectOrderButton.addEventListener('click', () => {
      if (projectOrderMode === 'random') {
        projectOrderMode = 'ascending';
      } else if (projectOrderMode === 'ascending') {
        projectOrderMode = 'descending';
      } else {
        projectOrderMode = 'random';
        resetRandomSiteOrder();
      }
      updateProjectFilterControls();
      renderFilteredSites();
    });
    starredFilterButton.addEventListener('click', () => {
      starredOnly = !starredOnly;
      updateProjectFilterControls();
      renderFilteredSites();
    });
    previewUploadButton.addEventListener('click', previewUploadDraft);
    document.getElementById('closeUpload').addEventListener('click', closeUpload);
    document.getElementById('cancelUpload').addEventListener('click', closeUpload);
    document.getElementById('closeUploadSuccess').addEventListener('click', closeUploadSuccess);
    document.getElementById('closePreview').addEventListener('click', closePreview);
    document.getElementById('closeCode').addEventListener('click', closeCodeWindow);
    copyCodeButton.addEventListener('click', copyProjectCode);
    openPreviewExternal.addEventListener('click', () => {
      if (currentPreviewExternalUrl) {
        window.open(currentPreviewExternalUrl, '_blank', 'noopener');
      }
    });
    refreshPreview.addEventListener('click', () => {
      if (currentPreviewUrl) {
        previewFrame.src = currentPreviewUrl;
        focusPreviewFrame();
      }
    });

    uploadOverlay.addEventListener('click', (event) => {
      if (event.target === uploadOverlay) {
        closeUpload();
      }
    });

    uploadSuccessOverlay.addEventListener('click', (event) => {
      if (event.target === uploadSuccessOverlay) {
        closeUploadSuccess();
      }
    });

    previewOverlay.addEventListener('click', (event) => {
      if (event.target === previewOverlay) {
        closePreview();
      }
    });

    codeOverlay.addEventListener('click', (event) => {
      if (event.target === codeOverlay) {
        closeCodeWindow();
      }
    });

    async function boot() {
      updateProjectFilterControls();
      await loadClasses();
      await loadSites();
    }

    boot().catch((error) => {
      hideLoadingState();
      showEmptyState(`加载项目失败：${error.message}`);
    });
  </script>
</body>
</html>
