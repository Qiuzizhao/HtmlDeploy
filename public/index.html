<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HtmlDeploy</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f0f9ff;
      --panel: #ffffff;
      --panel-soft: #f0f9ff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --brand: #0ea5e9;
      --brand-dark: #0284c7;
      --accent: #10b981;
      --accent-soft: #d1fae5;
      --danger: #ef4444;
      --shadow: 0 20px 40px rgba(14, 165, 233, 0.08);
      --soft-shadow: 0 10px 25px rgba(14, 165, 233, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(14, 165, 233, 0.3);
      outline-offset: 2px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 max(24px, calc((100vw - 1120px) / 2));
      background: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 12px 32px rgba(23, 32, 51, 0.06);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      font-size: 20px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(14, 165, 233, 0.3);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .admin-link {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      font-weight: 650;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .admin-link:hover {
      border-color: #7dd3fc;
      background: #f0f9ff;
      color: var(--brand-dark);
      transform: translateY(-1px);
    }

    .upload-button,
    .primary-button {
      min-height: 40px;
      padding: 0 18px;
      border-radius: 8px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #fff;
      font-weight: 650;
      box-shadow: 0 8px 16px rgba(14, 165, 233, 0.25);
    }

    .upload-button:hover,
    .primary-button:hover {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(14, 165, 233, 0.35);
    }

    .upload-button:disabled,
    .primary-button:disabled {
      cursor: not-allowed;
      background: #9aa8ba;
      opacity: 0.82;
      box-shadow: none;
      transform: none;
    }

    .secondary-button {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      font-weight: 600;
    }

    .secondary-button:hover {
      border-color: #7dd3fc;
      background: #f0f9ff;
      color: var(--brand-dark);
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #e0f2fe;
      color: var(--brand-dark);
      font-size: 22px;
      line-height: 1;
      transition: all 0.2s ease;
    }

    .icon-button:hover {
      background: #bae6fd;
      transform: scale(1.05);
    }

    main {
      width: min(1120px, calc(100vw - 40px));
      margin: 30px auto 64px;
    }

    .class-filter-bar {
      margin-bottom: 24px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      box-shadow: var(--soft-shadow);
    }

    .class-tabs {
      display: flex;
      gap: 10px;
      padding: 2px;
      overflow-x: auto;
    }

    .class-tab {
      min-height: 42px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--text);
      font-weight: 700;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .class-tab:hover {
      border-color: #7dd3fc;
      background: #f0f9ff;
      color: var(--brand-dark);
      transform: translateY(-1px);
    }

    .class-tab.is-active {
      border-color: transparent;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #fff;
      box-shadow: 0 8px 16px rgba(14, 165, 233, 0.25);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    .site-card {
      min-height: 182px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border-left: 5px solid #38bdf8;
      box-shadow: var(--soft-shadow);
      text-align: left;
      transition: all 0.2s ease;
    }

    .site-card:hover {
      border-color: #7dd3fc;
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(14, 165, 233, 0.12);
      background: #ffffff;
    }

    .site-card-main {
      min-width: 0;
    }

    .site-heading {
      display: flex;
      align-items: baseline;
      gap: 9px;
      min-width: 0;
      margin-bottom: 12px;
    }

    .site-number {
      flex: 0 0 auto;
      padding: 3px 7px;
      border-radius: 6px;
      background: #f0f9ff;
      color: var(--brand);
      font-size: 19px;
      font-weight: 800;
      line-height: 1;
      border: 1px solid #bae6fd;
    }

    .site-content {
      min-width: 0;
      padding-top: 2px;
    }

    .site-title {
      margin: 0;
      font-size: 19px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .site-class-tag {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      margin-bottom: 10px;
      padding: 5px 9px;
      border: 1px solid #a7f3d0;
      border-radius: 8px;
      background: #ecfdf5;
      color: #047857;
      font-size: 13px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .site-url {
      display: inline-block;
      max-width: 100%;
      padding: 6px 9px;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      background: #f0f9ff;
      color: var(--brand-dark);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .card-actions .primary-button,
    .card-actions .secondary-button {
      min-height: 38px;
    }

    .empty {
      padding: 56px 20px;
      border: 2px dashed #bae6fd;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.6);
      text-align: center;
      color: var(--brand-dark);
      box-shadow: var(--soft-shadow);
    }

    .unlock-panel {
      grid-column: 1 / -1;
      width: min(520px, 100%);
      display: grid;
      gap: 16px;
      justify-self: center;
      padding: 24px;
      border: 1px solid #bae6fd;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 40px rgba(14, 165, 233, 0.1);
    }

    .unlock-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
    }

    .unlock-copy {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .unlock-actions {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .unlock-actions label {
      flex: 1 1 220px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(23, 32, 51, 0.56);
      backdrop-filter: blur(8px);
    }

    .overlay.is-open {
      display: flex;
    }

    .modal {
      width: min(460px, calc(100vw - 32px));
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 25px 50px rgba(14, 165, 233, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.8);
      overflow: hidden;
    }

    .modal-head,
    .preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .modal-title,
    .preview-title {
      min-width: 0;
      margin: 0;
      font-size: 18px;
      overflow-wrap: anywhere;
    }

    .modal-body {
      display: grid;
      gap: 16px;
      padding: 20px;
    }

    .current-class {
      padding: 11px 12px;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      background: #f0f9ff;
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 700;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    input[type="text"],
    input[type="password"],
    input[type="file"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fcfdff;
      color: var(--text);
      padding: 10px 12px;
    }

    input[type="text"],
    input[type="password"],
    input[type="file"] {
      min-height: 44px;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.5;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="file"]:focus,
    textarea:focus {
      border-color: #38bdf8;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 20px 20px;
    }

    .message {
      min-height: 20px;
      color: var(--danger);
      font-size: 13px;
    }

    .preview {
      width: min(1180px, calc(100vw - 32px));
      height: min(780px, calc(100vh - 32px));
      display: flex;
      flex-direction: column;
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 25px 50px rgba(14, 165, 233, 0.15);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.85);
    }

    .preview-meta {
      min-width: 0;
    }

    .preview-url {
      margin-top: 4px;
      color: var(--accent);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .preview-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: 0;
      background: #fff;
    }

    @media (max-width: 700px) {
      .topbar {
        height: 66px;
        padding: 0 18px;
      }

      .brand {
        font-size: 18px;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
      }

      .upload-button {
        min-height: 38px;
        padding: 0 13px;
      }

      .top-actions {
        gap: 8px;
      }

      .admin-link {
        min-height: 38px;
        padding: 0 11px;
      }

      main {
        width: min(100vw - 24px, 1120px);
        margin-top: 22px;
      }

      .class-tabs {
        gap: 8px;
      }

      .class-filter-bar {
        margin-bottom: 16px;
        padding: 10px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .site-card {
        min-height: 174px;
        padding: 16px;
      }

      .unlock-panel {
        padding: 18px;
      }

      .unlock-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .site-heading {
        gap: 8px;
      }

      .card-actions .primary-button,
      .card-actions .secondary-button {
        flex: 1 1 130px;
      }

      .overlay {
        padding: 12px;
      }

      .preview {
        height: calc(100vh - 24px);
      }

      .preview-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .preview-actions {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">H</span>
      <span>HtmlDeploy</span>
    </div>
    <div class="top-actions">
      <a class="admin-link" href="/admin.html">后台管理</a>
      <button class="upload-button" id="openUpload" type="button">＋ 上传网页</button>
    </div>
  </header>

  <main>
    <section class="class-filter-bar">
      <nav class="class-tabs" id="classTabs" aria-label="班级"></nav>
      <div id="classProjectCount" style="margin-top: 14px; font-size: 14px; color: var(--muted); font-weight: 600; padding: 0 4px;"></div>
    </section>
    <section class="grid" id="siteGrid" aria-live="polite"></section>
    <div class="empty" id="emptyState">还没有项目，点击右上角上传一个。</div>
  </main>

  <div class="overlay" id="uploadOverlay" aria-hidden="true">
    <form class="modal" id="uploadForm">
      <div class="modal-head">
        <h2 class="modal-title">上传网页</h2>
        <button class="icon-button" id="closeUpload" type="button" aria-label="关闭上传弹窗">×</button>
      </div>
      <div class="modal-body">
        <div class="current-class" id="currentClassLabel"></div>
        <label>
          网页名字
          <input id="titleInput" name="title" type="text" maxlength="80" placeholder="例如：我的小游戏" required>
        </label>
        <label>
          作者署名
          <input id="authorInput" name="author" type="text" maxlength="40" placeholder="如：张三" required>
        </label>
        <label>
          HTML 文件
          <input id="fileInput" name="file" type="file" accept=".html,text/html">
        </label>
        <label>
          HTML 代码
          <textarea id="uploadHtmlContent" name="htmlContent" placeholder="可以直接粘贴完整 HTML 代码。上传文件和填写代码二选一即可。"></textarea>
        </label>
        <div class="message" id="uploadMessage"></div>
      </div>
      <div class="modal-actions">
        <button class="secondary-button" id="cancelUpload" type="button">取消</button>
        <button class="primary-button" type="submit">确定上传</button>
      </div>
    </form>
  </div>

  <div class="overlay" id="previewOverlay" aria-hidden="true">
    <section class="preview">
      <div class="preview-head">
        <div class="preview-meta">
          <h2 class="preview-title" id="previewTitle"></h2>
          <div class="preview-url" id="previewUrl"></div>
        </div>
        <div class="preview-actions">
          <button class="secondary-button" id="openPreviewExternal" type="button">新页面打开</button>
          <button class="secondary-button" id="refreshPreview" type="button">刷新</button>
          <button class="icon-button" id="closePreview" type="button" aria-label="关闭预览窗口">×</button>
        </div>
      </div>
      <iframe id="previewFrame" title="项目预览"></iframe>
    </section>
  </div>

  <script>
    const classTabs = document.getElementById('classTabs');
    const siteGrid = document.getElementById('siteGrid');
    const emptyState = document.getElementById('emptyState');
    const uploadOverlay = document.getElementById('uploadOverlay');
    const previewOverlay = document.getElementById('previewOverlay');
    const uploadForm = document.getElementById('uploadForm');
    const titleInput = document.getElementById('titleInput');
    const authorInput = document.getElementById('authorInput');
    const fileInput = document.getElementById('fileInput');
    const uploadHtmlContent = document.getElementById('uploadHtmlContent');
    const uploadMessage = document.getElementById('uploadMessage');
    const previewTitle = document.getElementById('previewTitle');
    const previewUrl = document.getElementById('previewUrl');
    const previewFrame = document.getElementById('previewFrame');
    const openPreviewExternal = document.getElementById('openPreviewExternal');
    const refreshPreview = document.getElementById('refreshPreview');
    const openUploadButton = document.getElementById('openUpload');
    const classProjectCount = document.getElementById('classProjectCount');
    const currentClassLabel = document.getElementById('currentClassLabel');

    let currentPreviewUrl = '';
    let classes = [];
    let currentClassId = '';
    const unlockedClassIds = new Set();

    function openOverlay(overlay) {
      overlay.classList.add('is-open');
      overlay.setAttribute('aria-hidden', 'false');
    }

    function closeOverlay(overlay) {
      overlay.classList.remove('is-open');
      overlay.setAttribute('aria-hidden', 'true');
    }

    function openUpload() {
      if (!currentClassId) {
        emptyState.textContent = '请先到后台创建班级，再上传网页。';
        emptyState.style.display = 'block';
        return;
      }

      if (!unlockedClassIds.has(currentClassId)) {
        renderClassPasswordPrompt('请先输入班级密码，再上传网页。');
        return;
      }

      uploadMessage.textContent = '';
      uploadForm.reset();
      const currentClass = classes.find((item) => item.id === currentClassId);
      currentClassLabel.textContent = `当前班级：${currentClass ? currentClass.name : '未选择'}`;
      openOverlay(uploadOverlay);
      titleInput.focus();
    }

    function closeUpload() {
      closeOverlay(uploadOverlay);
    }

    function openPreview(site) {
      currentPreviewUrl = site.url;
      previewTitle.textContent = site.title;
      previewUrl.textContent = site.url;
      previewFrame.src = site.url;
      openOverlay(previewOverlay);
    }

    function closePreview() {
      previewFrame.removeAttribute('src');
      currentPreviewUrl = '';
      closeOverlay(previewOverlay);
    }

    async function unlockClass(classId, password, messageElement) {
      const unlockUrl = classId
        ? `/api/classes/${encodeURIComponent(classId)}/unlock`
        : '/api/all/unlock';
      const response = await fetch(unlockUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '密码错误' }));
        messageElement.textContent = result.error || '密码错误';
        return;
      }

      unlockedClassIds.add(classId);
      if (currentClassId === classId) {
        await loadSites();
      }
    }

    function renderClassPasswordPrompt(message = '请输入班级密码后查看项目。') {
      siteGrid.innerHTML = '';
      emptyState.style.display = 'none';

      const currentClass = classes.find((item) => item.id === currentClassId);
      const panel = document.createElement('form');
      panel.className = 'unlock-panel';

      const title = document.createElement('h2');
      title.className = 'unlock-title';
      title.textContent = currentClassId
        ? `解锁「${currentClass ? currentClass.name : '班级'}」`
        : '解锁「全部」';

      const copy = document.createElement('p');
      copy.className = 'unlock-copy';
      copy.textContent = message;

      const actions = document.createElement('div');
      actions.className = 'unlock-actions';

      const label = document.createElement('label');
      label.textContent = currentClassId ? '班级密码' : '全部密码';

      const input = document.createElement('input');
      input.type = 'password';
      input.inputMode = 'numeric';
      input.maxLength = 6;
      input.autocomplete = 'current-password';
      input.required = true;

      const button = document.createElement('button');
      button.className = 'primary-button';
      button.type = 'submit';
      button.textContent = currentClassId ? '解锁班级' : '解锁全部';

      const error = document.createElement('div');
      error.className = 'message';

      label.append(input);
      actions.append(label, button);
      panel.append(title, copy, actions, error);
      panel.addEventListener('submit', async (event) => {
        event.preventDefault();
        error.textContent = '';
        await unlockClass(currentClassId, input.value.trim(), error);
      });

      siteGrid.append(panel);
      input.focus();
    }

    function renderSites(sites) {
      siteGrid.innerHTML = '';
      if (!classes.length) {
        emptyState.textContent = '请先到后台创建班级。';
      } else if (!currentClassId) {
        emptyState.textContent = '还没有可查看的项目。';
      } else {
        emptyState.textContent = '当前班级还没有项目。';
      }
      emptyState.style.display = sites.length ? 'none' : 'block';

      sites.forEach((site, index) => {
        const card = document.createElement('article');
        card.className = 'site-card';

        const cardMain = document.createElement('div');
        cardMain.className = 'site-card-main';

        const content = document.createElement('div');
        content.className = 'site-content';

        const heading = document.createElement('div');
        heading.className = 'site-heading';

        const number = document.createElement('span');
        number.className = 'site-number';
        number.textContent = site.number;

        const title = document.createElement('h2');
        title.className = 'site-title';
        title.textContent = site.title;

        if (site.author) {
          const author = document.createElement('div');
          author.style.fontSize = '13px';
          author.style.color = 'var(--muted)';
          author.style.marginTop = '4px';
          author.textContent = `作者：${site.author}`;
          heading.append(number, title, author);
        } else {
          heading.append(number, title);
        }

        const classTag = document.createElement('div');
        classTag.className = 'site-class-tag';
        classTag.textContent = site.className || '未分配';

        const url = document.createElement('div');
        url.className = 'site-url';
        url.textContent = site.url;

        content.append(heading, classTag, url);
        cardMain.append(content);

        const actions = document.createElement('div');
        actions.className = 'card-actions';

        const previewButton = document.createElement('button');
        previewButton.className = 'primary-button';
        previewButton.type = 'button';
        previewButton.textContent = '预览项目';
        previewButton.addEventListener('click', () => openPreview(site));

        actions.append(previewButton);
        card.append(cardMain, actions);

        siteGrid.append(card);
      });
    }

    function renderClasses() {
      classTabs.innerHTML = '';
      openUploadButton.disabled = !classes.length || !currentClassId;

      const allButton = document.createElement('button');
      allButton.className = `class-tab${currentClassId ? '' : ' is-active'}`;
      allButton.type = 'button';
      allButton.textContent = '全部';
      allButton.addEventListener('click', () => selectClass(''));
      classTabs.append(allButton);

      classes.forEach((classItem) => {
        const button = document.createElement('button');
        button.className = `class-tab${classItem.id === currentClassId ? ' is-active' : ''}`;
        button.type = 'button';
        button.textContent = classItem.name;
        button.addEventListener('click', () => selectClass(classItem.id));
        classTabs.append(button);
      });
    }

    async function loadClasses() {
      const response = await fetch('/api/classes');
      classes = await response.json();

      if (!classes.some((item) => item.id === currentClassId)) {
        currentClassId = '';
      }

      renderClasses();
    }

    async function selectClass(classId) {
      currentClassId = classId;
      renderClasses();
      await loadSites();
    }

    async function loadSites() {
      const sitesUrl = currentClassId
        ? `/api/sites?classId=${encodeURIComponent(currentClassId)}`
        : '/api/sites';
      const response = await fetch(sitesUrl);
      if (response.status === 401) {
        renderClassPasswordPrompt('请输入班级密码后查看项目。');
        return;
      }

      if (!response.ok) {
        throw new Error('加载项目失败');
      }

      const sites = await response.json();
      if (currentClassId) {
        unlockedClassIds.add(currentClassId);
      }
      renderSites(sites);
    }

    uploadForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      uploadMessage.textContent = '';

      const file = fileInput.files && fileInput.files[0];
      const htmlContent = uploadHtmlContent.value.trim();
      if (!file && !htmlContent) {
        uploadMessage.textContent = '请上传 HTML 文件或填写 HTML 代码。';
        return;
      }

      const fileName = file ? file.name.toLowerCase() : '';
      if (file && !fileName.endsWith('.html') && !fileName.endsWith('.htm')) {
        uploadMessage.textContent = '当前版本只支持上传 HTML 文件。';
        return;
      }

      const formData = new FormData();
      formData.append('title', titleInput.value.trim());
      formData.append('author', authorInput.value.trim());
      formData.append('classId', currentClassId);
      formData.append('htmlContent', htmlContent);
      if (file) {
        formData.append('file', file, file.name);
      }

      const response = await fetch('/api/sites', {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '上传失败' }));
        uploadMessage.textContent = result.error || '上传失败';
        return;
      }

      closeUpload();
      await loadSites();
    });

    openUploadButton.addEventListener('click', openUpload);
    document.getElementById('closeUpload').addEventListener('click', closeUpload);
    document.getElementById('cancelUpload').addEventListener('click', closeUpload);
    document.getElementById('closePreview').addEventListener('click', closePreview);
    openPreviewExternal.addEventListener('click', () => {
      if (currentPreviewUrl) {
        window.open(currentPreviewUrl, '_blank', 'noopener');
      }
    });

    uploadOverlay.addEventListener('click', (event) => {
      if (event.target === uploadOverlay) {
        closeUpload();
      }
    });

    previewOverlay.addEventListener('click', (event) => {
      if (event.target === previewOverlay) {
        closePreview();
      }
    });

    async function boot() {
      await loadClasses();
      await loadSites();
    }

    boot().catch((error) => {
      emptyState.textContent = `加载项目失败：${error.message}`;
      emptyState.style.display = 'block';
    });
  </script>
</body>
</html>
