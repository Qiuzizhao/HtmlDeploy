<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>后台管理 - HtmlDeploy</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f0f9ff;
      --panel: #ffffff;
      --panel-soft: #f0f9ff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --brand: #0ea5e9;
      --brand-dark: #0284c7;
      --accent: #10b981;
      --danger: #ef4444;
      --danger-soft: #fef2f2;
      --shadow: 0 20px 40px rgba(14, 165, 233, 0.08);
      --soft-shadow: 0 10px 25px rgba(14, 165, 233, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(14, 165, 233, 0.3);
      outline-offset: 2px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      font-size: 20px;
      font-weight: 750;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(14, 165, 233, 0.3);
    }

    .button,
    .primary-button,
    .danger-button {
      min-height: 40px;
      padding: 0 15px;
      border-radius: 8px;
      font-weight: 650;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .primary-button {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #fff;
      box-shadow: 0 8px 16px rgba(14, 165, 233, 0.25);
    }

    .primary-button:hover {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(14, 165, 233, 0.35);
    }

    .button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      color: var(--text);
    }

    .button:hover {
      border-color: #7dd3fc;
      background: #f0f9ff;
      color: var(--brand-dark);
    }

    .danger-button {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid #fecdd3;
    }

    .danger-button:hover {
      background: #fecdd3;
      transform: translateY(-1px);
    }

    .admin-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 232px minmax(0, 1fr);
    }

    .admin-sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 24px;
      padding: 22px 16px;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 10px 0 30px rgba(23, 32, 51, 0.05);
      backdrop-filter: blur(14px);
    }

    .side-nav {
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .nav-button {
      min-height: 44px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 13px;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-weight: 750;
      text-align: left;
    }

    .nav-button:hover {
      background: #f0f9ff;
      color: var(--brand-dark);
    }

    .nav-button.is-active {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #fff;
      box-shadow: 0 8px 16px rgba(14, 165, 233, 0.25);
    }

    .sidebar-footer {
      display: grid;
      gap: 10px;
    }

    .sidebar-footer .button {
      width: 100%;
    }

    .admin-main {
      min-width: 0;
      padding: 28px min(36px, 4vw) 56px;
    }

    .workspace-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, 1fr));
      gap: 10px;
    }

    .summary-card {
      min-width: 118px;
      padding: 12px 14px;
      border: 1px solid #bae6fd;
      border-radius: 12px;
      background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
      box-shadow: var(--soft-shadow);
    }

    .summary-value {
      display: block;
      color: var(--brand);
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .summary-label {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .workspace {
      display: none;
    }

    .workspace.is-active {
      display: block;
    }

    .panel {
      border: 1px solid #e0f2fe;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(14, 165, 233, 0.08);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .message {
      color: var(--muted);
      font-size: 13px;
    }

    .message.is-error {
      color: var(--danger);
    }

    .create-form {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(180px, 0.6fr) minmax(260px, 1fr);
      gap: 12px;
      padding: 20px;
      align-items: end;
    }

    .wide-field {
      grid-column: 1 / -1;
    }

    .class-form {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(160px, 0.6fr) auto auto auto;
      gap: 12px;
      padding: 20px;
      align-items: end;
    }

    .all-password-form {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto auto;
      gap: 12px;
      padding: 20px 20px 0;
      align-items: end;
    }

    .class-list {
      display: grid;
      gap: 10px;
      padding: 0 20px 20px;
    }

    .class-row {
      display: grid;
      grid-template-columns: 24px minmax(180px, 1fr) minmax(130px, 0.5fr) auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid #bae6fd;
      border-radius: 12px;
      background: #f0f9ff;
      transition: box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .class-row.is-dragging {
      opacity: 0.5;
      box-shadow: 0 8px 16px rgba(14, 165, 233, 0.2);
    }

    .drag-handle {
      cursor: grab;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    input[type="text"],
    input[type="password"],
    input[type="search"],
    input[type="file"],
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fcfdff;
      color: var(--text);
      padding: 10px 12px;
    }

    input[type="text"],
    input[type="password"],
    input[type="search"],
    input[type="file"],
    select {
      min-height: 44px;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.5;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
    }

    input:focus,
    textarea:focus {
      border-color: #38bdf8;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfdff;
    }

    .toolbar-left,
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toolbar input {
      max-width: 360px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 860px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      background: #f0f9ff;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .index-cell {
      width: 72px;
      color: var(--brand);
      font-size: 24px;
      font-weight: 800;
    }

    .url {
      display: inline-block;
      max-width: 220px;
      color: var(--accent);
      overflow-wrap: anywhere;
      text-decoration: none;
    }

    .url:hover {
      text-decoration: underline;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .edit-file {
      max-width: 210px;
      font-size: 13px;
    }

    .class-select {
      min-width: 150px;
    }

    .empty {
      padding: 42px 20px;
      text-align: center;
      color: var(--brand-dark);
    }

    @media (max-width: 860px) {
      .admin-shell {
        grid-template-columns: 1fr;
      }

      .admin-sidebar {
        position: static;
        height: auto;
        grid-template-rows: auto auto auto;
        gap: 14px;
        padding: 16px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .side-nav {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .nav-button {
        justify-content: center;
      }

      .admin-main {
        padding: 18px 12px 40px;
      }

      .workspace-top {
        align-items: stretch;
        flex-direction: column;
      }

      .panel-head,
      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .create-form {
        grid-template-columns: 1fr;
      }

      .all-password-form,
      .class-form {
        grid-template-columns: 1fr;
      }

      .class-row {
        grid-template-columns: 24px 1fr;
      }

      .toolbar input {
        max-width: none;
      }

      .toolbar-left,
      .toolbar-right,
      .toolbar-left input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="brand">
        <span class="brand-mark">H</span>
        <span>后台管理</span>
      </div>
      <nav class="side-nav" aria-label="后台功能">
        <button class="nav-button is-active" type="button" data-view-target="projects">项目管理</button>
        <button class="nav-button" type="button" data-view-target="create">新增项目</button>
        <button class="nav-button" type="button" data-view-target="classes">班级管理</button>
      </nav>
      <div class="sidebar-footer">
        <a class="button" href="/">返回首页</a>
      </div>
    </aside>

    <main class="admin-main">
      <header class="workspace-top">
        <div>
          <p class="eyebrow">HtmlDeploy 后台</p>
          <h1 class="page-title" id="activeViewTitle">项目管理</h1>
        </div>
        <div class="summary-grid" aria-label="后台统计">
          <div class="summary-card">
            <span class="summary-value" id="projectCount">0</span>
            <span class="summary-label">项目</span>
          </div>
          <div class="summary-card">
            <span class="summary-value" id="classCount">0</span>
            <span class="summary-label">班级</span>
          </div>
        </div>
      </header>

      <section data-admin-view="projects" class="workspace is-active">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">项目管理</h2>
            <div class="message" id="listMessage"></div>
          </div>
          <div class="toolbar">
            <div class="toolbar-left">
              <input id="searchInput" type="search" placeholder="搜索项目名称或 ID">
            </div>
            <div class="toolbar-right">
              <button class="button" id="reloadButton" type="button">刷新列表</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>序号</th>
                  <th>网页名字</th>
                  <th>班级</th>
                  <th>访问链接</th>
                  <th>上传时间</th>
                  <th>替换文件</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="siteRows"></tbody>
            </table>
          </div>
          <div class="empty" id="emptyState">还没有项目。</div>
        </div>
      </section>

      <section data-admin-view="create" class="workspace">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">新增项目</h2>
            <div class="message" id="createMessage"></div>
          </div>
          <form class="create-form" id="createForm">
            <label>
              网页名字
              <input id="createTitle" name="title" type="text" maxlength="80" placeholder="例如：我的小游戏" required>
            </label>
            <label>
              所属班级
              <select id="createClassId" name="classId" required></select>
            </label>
            <label>
              HTML 文件
              <input id="createFile" name="file" type="file" accept=".html,text/html">
            </label>
            <label class="wide-field">
              HTML 代码
              <textarea id="createHtmlContent" name="htmlContent" placeholder="可以直接粘贴完整 HTML 代码。上传文件和填写代码二选一即可。"></textarea>
            </label>
            <button class="primary-button" type="submit">新增项目</button>
          </form>
        </div>
      </section>

      <section data-admin-view="classes" class="workspace">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">班级管理</h2>
            <div class="message" id="classMessage"></div>
          </div>
          <form class="all-password-form" id="allPasswordForm">
            <label>
              全部密码
              <input id="allPasswordInput" name="allPassword" type="password" inputmode="numeric" maxlength="6" placeholder="6位数字" required>
            </label>
            <button class="button" id="toggleAllPassword" type="button">显示</button>
            <button class="button" id="generateAllPassword" type="button">随机生成</button>
            <button class="primary-button" id="saveAllPassword" type="submit">保存全部密码</button>
          </form>
          <form class="class-form" id="classForm">
            <label>
              班级名称
              <input id="classNameInput" name="name" type="text" maxlength="40" placeholder="例如：三年级一班" required>
            </label>
            <label>
              班级密码
              <input id="classPasswordInput" name="password" type="password" inputmode="numeric" maxlength="6" placeholder="6位数字" required>
            </label>
            <button class="button" id="toggleClassPassword" type="button">显示</button>
            <button class="button" id="generateClassPassword" type="button">随机生成</button>
            <button class="primary-button" type="submit">新增班级</button>
          </form>
          <div class="class-list" id="classList"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const createForm = document.getElementById('createForm');
    const createTitle = document.getElementById('createTitle');
    const createClassId = document.getElementById('createClassId');
    const createFile = document.getElementById('createFile');
    const createHtmlContent = document.getElementById('createHtmlContent');
    const classForm = document.getElementById('classForm');
    const allPasswordForm = document.getElementById('allPasswordForm');
    const allPasswordInput = document.getElementById('allPasswordInput');
    const classNameInput = document.getElementById('classNameInput');
    const classPasswordInput = document.getElementById('classPasswordInput');
    const classList = document.getElementById('classList');
    const classMessage = document.getElementById('classMessage');
    const createMessage = document.getElementById('createMessage');
    const listMessage = document.getElementById('listMessage');
    const siteRows = document.getElementById('siteRows');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');
    const navButtons = Array.from(document.querySelectorAll('[data-view-target]'));
    const workspaces = Array.from(document.querySelectorAll('[data-admin-view]'));
    const activeViewTitle = document.getElementById('activeViewTitle');
    const projectCount = document.getElementById('projectCount');
    const classCount = document.getElementById('classCount');

    let sites = [];
    let classes = [];
    let settings = {};
    const viewTitles = {
      projects: '项目管理',
      create: '新增项目',
      classes: '班级管理'
    };

    function setMessage(element, text, isError = false) {
      element.textContent = text;
      element.classList.toggle('is-error', isError);
    }

    function switchView(viewName) {
      navButtons.forEach((button) => {
        button.classList.toggle('is-active', button.dataset.viewTarget === viewName);
      });

      workspaces.forEach((workspace) => {
        workspace.classList.toggle('is-active', workspace.dataset.adminView === viewName);
      });

      activeViewTitle.textContent = viewTitles[viewName] || viewTitles.projects;
    }

    function updateSummary() {
      projectCount.textContent = String(sites.length);
      classCount.textContent = String(classes.length);
    }

    function formatDate(value) {
      if (!value) {
        return '-';
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return '-';
      }

      return date.toLocaleString('zh-CN', { hour12: false });
    }

    function isHtmlFile(file) {
      if (!file) {
        return true;
      }

      const name = file.name.toLowerCase();
      return name.endsWith('.html') || name.endsWith('.htm');
    }

    function generatePassword() {
      return String(Math.floor(Math.random() * 1000000)).padStart(6, '0');
    }

    function togglePasswordVisibility(input, button) {
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      button.textContent = isHidden ? '隐藏' : '显示';
    }

    function fillClassSelect(select, value = '') {
      select.innerHTML = '';
      const empty = document.createElement('option');
      empty.value = '';
      empty.textContent = classes.length ? '请选择班级' : '先新增班级';
      select.append(empty);

      classes.forEach((classItem) => {
        const option = document.createElement('option');
        option.value = classItem.id;
        option.textContent = classItem.name;
        select.append(option);
      });

      select.value = value;
    }

    function renderClassList() {
      classList.innerHTML = '';
      fillClassSelect(createClassId, createClassId.value);

      classes.forEach((classItem) => {
        const row = document.createElement('div');
        row.className = 'class-row';
        row.dataset.id = classItem.id;
        row.draggable = true;

        const dragHandle = document.createElement('div');
        dragHandle.className = 'drag-handle';
        dragHandle.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"></line>
            <line x1="8" y1="12" x2="21" y2="12"></line>
            <line x1="8" y1="18" x2="21" y2="18"></line>
            <line x1="3" y1="6" x2="3.01" y2="6"></line>
            <line x1="3" y1="12" x2="3.01" y2="12"></line>
            <line x1="3" y1="18" x2="3.01" y2="18"></line>
          </svg>
        `;
        dragHandle.title = '拖拽调整顺序';

        const input = document.createElement('input');
        input.type = 'text';
        input.maxLength = 40;
        input.value = classItem.name;
        input.setAttribute('aria-label', `${classItem.name} 的班级名称`);

        const passwordInput = document.createElement('input');
        passwordInput.type = 'password';
        passwordInput.inputMode = 'numeric';
        passwordInput.maxLength = 6;
        passwordInput.value = classItem.password || '';
        passwordInput.setAttribute('aria-label', `${classItem.name} 的班级密码`);

        const actions = document.createElement('div');
        actions.className = 'row-actions';

        const toggleButton = document.createElement('button');
        toggleButton.className = 'button';
        toggleButton.type = 'button';
        toggleButton.textContent = '显示';
        toggleButton.addEventListener('click', () => {
          togglePasswordVisibility(passwordInput, toggleButton);
        });

        const generateButton = document.createElement('button');
        generateButton.className = 'button';
        generateButton.type = 'button';
        generateButton.textContent = '随机';
        generateButton.addEventListener('click', () => {
          passwordInput.value = generatePassword();
        });

        const saveButton = document.createElement('button');
        saveButton.className = 'primary-button';
        saveButton.type = 'button';
        saveButton.textContent = '保存';
        saveButton.addEventListener('click', () => updateClass(classItem, input, passwordInput));

        const deleteButton = document.createElement('button');
        deleteButton.className = 'danger-button';
        deleteButton.type = 'button';
        deleteButton.textContent = '删除';
        deleteButton.addEventListener('click', () => deleteClass(classItem));

        actions.append(toggleButton, generateButton, saveButton, deleteButton);
        row.append(dragHandle, input, passwordInput, actions);
        classList.append(row);
      });
    }

    async function loadSettings() {
      const response = await fetch('/api/admin/settings');
      if (!response.ok) {
        setMessage(classMessage, '加载全部密码失败', true);
        return;
      }

      settings = await response.json();
      allPasswordInput.value = settings.allPassword || '';
    }

    async function saveAllPassword(event) {
      event.preventDefault();
      const allPassword = allPasswordInput.value.trim();

      if (!/^\d{6}$/.test(allPassword)) {
        setMessage(classMessage, '全部密码必须是 6 位数字', true);
        return;
      }

      const response = await fetch('/api/admin/settings', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ allPassword })
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '保存全部密码失败' }));
        setMessage(classMessage, result.error || '保存全部密码失败', true);
        return;
      }

      settings = await response.json();
      allPasswordInput.value = settings.allPassword || '';
      setMessage(classMessage, '保存全部密码成功');
    }

    async function loadClasses() {
      const response = await fetch('/api/admin/classes');
      if (!response.ok) {
        setMessage(classMessage, '加载班级失败', true);
        return;
      }

      classes = await response.json();
      renderClassList();
      updateSummary();
      setMessage(classMessage, `${classes.length} 个班级`);
    }

    function renderRows() {
      const keyword = searchInput.value.trim().toLowerCase();
      const filtered = sites.filter((site) => {
        return site.title.toLowerCase().includes(keyword)
          || site.id.toLowerCase().includes(keyword)
          || (site.className || '').toLowerCase().includes(keyword);
      });

      siteRows.innerHTML = '';
      emptyState.style.display = filtered.length ? 'none' : 'block';

      filtered.forEach((site, index) => {
        const row = document.createElement('tr');

        const indexCell = document.createElement('td');
        indexCell.className = 'index-cell';
        indexCell.textContent = site.number || String(index + 1);

        const titleCell = document.createElement('td');
        const titleInput = document.createElement('input');
        titleInput.type = 'text';
        titleInput.maxLength = 80;
        titleInput.value = site.title;
        titleInput.setAttribute('aria-label', `${site.title} 的网页名字`);
        titleCell.append(titleInput);

        const classCell = document.createElement('td');
        const classSelect = document.createElement('select');
        classSelect.className = 'class-select';
        classSelect.setAttribute('aria-label', `${site.title} 的所属班级`);
        fillClassSelect(classSelect, site.classId || '');
        classCell.append(classSelect);

        const urlCell = document.createElement('td');
        const url = document.createElement('a');
        url.className = 'url';
        url.href = site.url;
        url.target = '_blank';
        url.rel = 'noopener';
        url.textContent = site.url;
        urlCell.append(url);

        const createdCell = document.createElement('td');
        createdCell.textContent = formatDate(site.createdAt);

        const fileCell = document.createElement('td');
        const fileInput = document.createElement('input');
        fileInput.className = 'edit-file';
        fileInput.type = 'file';
        fileInput.accept = '.html,text/html';
        fileInput.setAttribute('aria-label', `替换 ${site.title} 的 HTML 文件`);
        fileCell.append(fileInput);

        const actionCell = document.createElement('td');
        const actions = document.createElement('div');
        actions.className = 'row-actions';

        const saveButton = document.createElement('button');
        saveButton.className = 'primary-button';
        saveButton.type = 'button';
        saveButton.textContent = '保存';
        saveButton.addEventListener('click', () => updateSite(site, titleInput, classSelect, fileInput));

        const previewLink = document.createElement('a');
        previewLink.className = 'button';
        previewLink.href = site.url;
        previewLink.target = '_blank';
        previewLink.rel = 'noopener';
        previewLink.textContent = '预览';

        const downloadLink = document.createElement('a');
        downloadLink.className = 'button';
        downloadLink.href = `/api/sites/${encodeURIComponent(site.id)}/download`;
        downloadLink.download = '';
        downloadLink.textContent = '下载';

        const deleteButton = document.createElement('button');
        deleteButton.className = 'danger-button';
        deleteButton.type = 'button';
        deleteButton.textContent = '删除';
        deleteButton.addEventListener('click', () => deleteSite(site));

        actions.append(saveButton, previewLink, downloadLink, deleteButton);
        actionCell.append(actions);

        row.append(indexCell, titleCell, classCell, urlCell, createdCell, fileCell, actionCell);
        siteRows.append(row);
      });
    }

    async function loadSites() {
      setMessage(listMessage, '加载中...');
      const response = await fetch('/api/admin/sites');
      if (!response.ok) {
        setMessage(listMessage, '加载项目失败', true);
        return;
      }

      sites = await response.json();
      renderRows();
      updateSummary();
      setMessage(listMessage, `${sites.length} 个项目`);
    }

    async function createSite(event) {
      event.preventDefault();
      setMessage(createMessage, '');

      const file = createFile.files && createFile.files[0];
      const htmlContent = createHtmlContent.value.trim();

      if (!file && !htmlContent) {
        setMessage(createMessage, '请上传 HTML 文件或填写 HTML 代码', true);
        return;
      }

      if (file && !isHtmlFile(file)) {
        setMessage(createMessage, '请选择 HTML 文件', true);
        return;
      }

      const formData = new FormData();
      formData.append('title', createTitle.value.trim());
      formData.append('classId', createClassId.value);
      formData.append('htmlContent', htmlContent);
      if (file) {
        formData.append('file', file, file.name);
      }

      const response = await fetch('/api/sites', {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '新增失败' }));
        setMessage(createMessage, result.error || '新增失败', true);
        return;
      }

      createForm.reset();
      setMessage(createMessage, '新增成功');
      await loadSites();
      switchView('projects');
    }

    async function updateSite(site, titleInput, classSelect, fileInput) {
      const title = titleInput.value.trim();
      const classId = classSelect.value;
      const file = fileInput.files && fileInput.files[0];

      if (!title) {
        setMessage(listMessage, '网页名字不能为空', true);
        return;
      }

      if (!classId) {
        setMessage(listMessage, '请选择班级', true);
        return;
      }

      if (file && !isHtmlFile(file)) {
        setMessage(listMessage, '替换文件必须是 HTML', true);
        return;
      }

      const formData = new FormData();
      formData.append('title', title);
      formData.append('classId', classId);
      if (file) {
        formData.append('file', file, file.name);
      }

      const response = await fetch(`/api/sites/${encodeURIComponent(site.id)}`, {
        method: 'PUT',
        body: formData
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '保存失败' }));
        setMessage(listMessage, result.error || '保存失败', true);
        return;
      }

      setMessage(listMessage, '保存成功');
      await loadSites();
    }

    async function createClass(event) {
      event.preventDefault();
      const name = classNameInput.value.trim();
      const password = classPasswordInput.value.trim();

      if (!name) {
        setMessage(classMessage, '班级名称不能为空', true);
        return;
      }

      if (!/^\d{6}$/.test(password)) {
        setMessage(classMessage, '班级密码必须是 6 位数字', true);
        return;
      }

      const response = await fetch('/api/classes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, password })
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '新增班级失败' }));
        setMessage(classMessage, result.error || '新增班级失败', true);
        return;
      }

      classForm.reset();
      setMessage(classMessage, '新增班级成功');
      await loadClasses();
      await loadSites();
    }

    async function updateClass(classItem, input, passwordInput) {
      const name = input.value.trim();
      const password = passwordInput.value.trim();
      if (!name) {
        setMessage(classMessage, '班级名称不能为空', true);
        return;
      }

      if (!/^\d{6}$/.test(password)) {
        setMessage(classMessage, '班级密码必须是 6 位数字', true);
        return;
      }

      const response = await fetch(`/api/classes/${encodeURIComponent(classItem.id)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, password })
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '保存班级失败' }));
        setMessage(classMessage, result.error || '保存班级失败', true);
        return;
      }

      setMessage(classMessage, '保存班级成功');
      await loadClasses();
      await loadSites();
    }

    async function deleteClass(classItem) {
      if (!confirm(`确定删除班级「${classItem.name}」吗？`)) {
        return;
      }

      const response = await fetch(`/api/classes/${encodeURIComponent(classItem.id)}`, {
        method: 'DELETE'
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '删除班级失败' }));
        setMessage(classMessage, result.error || '删除班级失败', true);
        return;
      }

      setMessage(classMessage, '删除班级成功');
      await loadClasses();
      await loadSites();
    }

    async function deleteSite(site) {
      if (!confirm(`确定删除「${site.title}」吗？`)) {
        return;
      }

      const response = await fetch(`/api/sites/${encodeURIComponent(site.id)}`, {
        method: 'DELETE'
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '删除失败' }));
        setMessage(listMessage, result.error || '删除失败', true);
        return;
      }

      setMessage(listMessage, '删除成功');
      await loadSites();
    }

    let draggedRow = null;

    classList.addEventListener('dragstart', (e) => {
      const row = e.target.closest('.class-row');
      if (row) {
        draggedRow = row;
        row.classList.add('is-dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', row.dataset.id);
      }
    });

    classList.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      
      const row = e.target.closest('.class-row');
      if (row && row !== draggedRow) {
        const rect = row.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        if (e.clientY < midY) {
          row.parentNode.insertBefore(draggedRow, row);
        } else {
          row.parentNode.insertBefore(draggedRow, row.nextSibling);
        }
      }
    });

    classList.addEventListener('dragend', async (e) => {
      const row = e.target.closest('.class-row');
      if (row) {
        row.classList.remove('is-dragging');
      }
      if (!draggedRow) return;
      draggedRow = null;
      
      const classIds = Array.from(classList.querySelectorAll('.class-row')).map(r => r.dataset.id);
      classes.sort((a, b) => classIds.indexOf(a.id) - classIds.indexOf(b.id));
      
      try {
        const response = await fetch('/api/classes/order', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ classIds })
        });
        
        if (!response.ok) {
          throw new Error('保存排序失败');
        }
        setMessage(classMessage, '班级排序已保存');
        fillClassSelect(createClassId, createClassId.value);
      } catch (error) {
        setMessage(classMessage, error.message, true);
        await loadClasses();
      }
    });

    allPasswordForm.addEventListener('submit', saveAllPassword);
    const toggleAllPassword = document.getElementById('toggleAllPassword');
    toggleAllPassword.addEventListener('click', () => {
      togglePasswordVisibility(allPasswordInput, toggleAllPassword);
    });
    document.getElementById('generateAllPassword').addEventListener('click', () => {
      allPasswordInput.value = generatePassword();
    });
    classForm.addEventListener('submit', createClass);
    const toggleClassPassword = document.getElementById('toggleClassPassword');
    toggleClassPassword.addEventListener('click', () => {
      togglePasswordVisibility(classPasswordInput, toggleClassPassword);
    });
    document.getElementById('generateClassPassword').addEventListener('click', () => {
      classPasswordInput.value = generatePassword();
    });
    createForm.addEventListener('submit', createSite);
    searchInput.addEventListener('input', renderRows);
    navButtons.forEach((button) => {
      button.addEventListener('click', () => switchView(button.dataset.viewTarget));
    });
    document.getElementById('reloadButton').addEventListener('click', async () => {
      await loadSettings();
      await loadClasses();
      await loadSites();
    });

    async function boot() {
      await loadSettings();
      await loadClasses();
      await loadSites();
    }

    boot().catch((error) => {
      setMessage(listMessage, `加载项目失败：${error.message}`, true);
    });
  </script>
</body>
</html>
