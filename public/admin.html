<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>后台管理 - 项目站</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --bg: #f0f9ff;
      --panel: #ffffff;
      --panel-soft: #f0f9ff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --brand: #0ea5e9;
      --brand-dark: #0284c7;
      --accent: #10b981;
      --danger: #ef4444;
      --danger-soft: #fef2f2;
      --shadow: 0 20px 40px rgba(14, 165, 233, 0.08);
      --soft-shadow: 0 10px 25px rgba(14, 165, 233, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body.is-code-window-open,
    body.is-directed-ai-open {
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(14, 165, 233, 0.3);
      outline-offset: 2px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      font-size: 20px;
      font-weight: 750;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(14, 165, 233, 0.3);
    }

    .button,
    .primary-button,
    .danger-button {
      min-height: 40px;
      padding: 0 15px;
      border-radius: 8px;
      font-weight: 650;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .primary-button {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #fff;
      box-shadow: 0 8px 16px rgba(14, 165, 233, 0.25);
    }

    .primary-button:hover {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(14, 165, 233, 0.35);
    }

    .button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      color: var(--text);
    }

    .button:hover {
      border-color: #7dd3fc;
      background: #f0f9ff;
      color: var(--brand-dark);
    }

    .danger-button {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid #fecdd3;
    }

    .danger-button:hover {
      background: #fecdd3;
      transform: translateY(-1px);
    }

    .warning-button {
      min-height: 40px;
      padding: 0 15px;
      border: 1px solid #fed7aa;
      border-radius: 8px;
      background: #fff7ed;
      color: #c2410c;
      font-weight: 650;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .warning-button:hover {
      background: #fed7aa;
      transform: translateY(-1px);
    }

    .upload-toggle-button.is-disabled {
      border-color: #fecdd3;
      background: #fff1f2;
      color: var(--danger);
    }

    .password-toggle-button.is-disabled {
      border-color: #fecdd3;
      background: #fff1f2;
      color: var(--danger);
    }

    .admin-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 232px minmax(0, 1fr);
    }

    .admin-sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 24px;
      padding: 22px 16px;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 10px 0 30px rgba(23, 32, 51, 0.05);
      backdrop-filter: blur(14px);
    }

    .side-nav {
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .nav-button {
      min-height: 44px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 13px;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-weight: 750;
      text-align: left;
    }

    .nav-button:hover {
      background: #f0f9ff;
      color: var(--brand-dark);
    }

    .nav-button.is-active {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #fff;
      box-shadow: 0 8px 16px rgba(14, 165, 233, 0.25);
    }

    .sidebar-footer {
      display: grid;
      gap: 10px;
    }

    .sidebar-footer .button {
      width: 100%;
    }

    .admin-main {
      min-width: 0;
      padding: 28px min(36px, 4vw) 56px;
    }

    .workspace-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(110px, 1fr));
      gap: 10px;
    }

    .summary-card {
      min-width: 118px;
      padding: 12px 14px;
      border: 1px solid #bae6fd;
      border-radius: 12px;
      background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
      box-shadow: var(--soft-shadow);
    }

    .summary-value {
      display: block;
      color: var(--brand);
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .summary-label {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .storage-cell {
      color: #0f766e;
      font-weight: 750;
      white-space: nowrap;
    }

    .workspace {
      display: none;
    }

    .workspace.is-active {
      display: block;
    }

    .panel {
      border: 1px solid #e0f2fe;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(14, 165, 233, 0.08);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .message {
      color: var(--muted);
      font-size: 13px;
    }

    .message.is-error {
      color: var(--danger);
    }

    .create-form {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(180px, 0.6fr) minmax(260px, 1fr);
      gap: 12px;
      padding: 20px;
      align-items: end;
    }

    .wide-field {
      grid-column: 1 / -1;
    }

    .class-form {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(160px, 0.6fr) auto auto auto;
      gap: 12px;
      padding: 20px;
      align-items: end;
    }

    .all-password-form {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto auto auto;
      gap: 12px;
      padding: 20px 20px 0;
      align-items: end;
    }

    .forbidden-words-form {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 12px;
      padding: 16px 20px 20px;
      align-items: end;
      border-top: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .forbidden-search-form {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto auto;
      gap: 12px;
      padding: 20px 20px 0;
      align-items: end;
    }

    .settings-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 14px;
      padding: 20px;
      align-items: end;
    }

    .settings-form .settings-actions {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .settings-hint {
      grid-column: 1 / -1;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .key-status {
      grid-column: 1 / -1;
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .forbidden-words-form textarea {
      min-height: 84px;
      resize: vertical;
    }

    .forbidden-results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
      gap: 8px;
      max-height: min(52vh, 520px);
      margin: 16px 20px 0;
      padding: 12px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
    }

    .forbidden-word-row {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #1e293b;
      font-size: 13px;
      line-height: 1.35;
      overflow-wrap: anywhere;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    .forbidden-word-text {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .forbidden-word-delete {
      flex: 0 0 auto;
      min-height: 28px;
      padding: 0 9px;
      border: 1px solid #fecdd3;
      border-radius: 6px;
      background: #fff1f2;
      color: var(--danger);
      font-size: 12px;
      font-weight: 700;
    }

    .forbidden-pagination {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px 20px 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .forbidden-pagination span {
      min-width: 220px;
      text-align: center;
    }

    .forbidden-results .empty-state {
      grid-column: 1 / -1;
      padding: 28px 12px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .class-list {
      display: grid;
      gap: 10px;
      padding: 0 20px 20px;
    }

    .class-row {
      display: grid;
      grid-template-columns: 24px minmax(180px, 1fr) minmax(130px, 0.5fr) minmax(110px, auto) minmax(110px, auto) auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid #bae6fd;
      border-radius: 12px;
      background: #f0f9ff;
      transition: box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .class-row.is-upload-disabled {
      border-color: #e5e7eb;
      background: #f8fafc;
    }

    .class-row.is-dragging {
      opacity: 0.5;
      box-shadow: 0 8px 16px rgba(14, 165, 233, 0.2);
    }

    .drag-handle {
      cursor: grab;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    input[type="search"],
    input[type="file"],
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fcfdff;
      color: var(--text);
      padding: 10px 12px;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    input[type="search"],
    input[type="file"],
    select {
      min-height: 44px;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.5;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
    }

    textarea.wrap-input {
      min-height: 44px;
      height: auto;
      resize: none;
      overflow: hidden;
      font-family: inherit;
      font-size: inherit;
      padding-top: 12px;
      padding-bottom: 12px;
      word-break: break-all;
    }

    input:focus,
    textarea:focus {
      border-color: #38bdf8;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfdff;
    }

    .toolbar-left,
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toolbar input {
      max-width: 360px;
    }

    .ai-log-panel {
      display: none;
      gap: 8px;
      max-height: 180px;
      margin: 0;
      padding: 12px 20px;
      overflow: auto;
      border-bottom: 1px solid var(--line);
      background: #f8fbff;
    }

    .ai-log-panel.has-logs {
      display: grid;
    }

    .ai-log-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 34px;
      padding: 8px 10px;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      line-height: 1.4;
    }

    .ai-log-row.is-running {
      border-color: #7dd3fc;
      background: #f0f9ff;
    }

    .ai-log-row.is-success {
      border-color: #a7f3d0;
      background: #ecfdf5;
    }

    .ai-log-row.is-error {
      border-color: #fecdd3;
      background: #fff1f2;
    }

    .ai-log-text {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .ai-log-time {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 860px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      background: #f0f9ff;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    tr.is-disabled-project td {
      background: #fff1f2;
      border-bottom-color: #fecdd3;
    }

    tr.is-disabled-project .wrap-input,
    tr.is-disabled-project input,
    tr.is-disabled-project select {
      border-color: #fecdd3;
      background: #fffafa;
    }

    .index-cell {
      width: 72px;
      color: var(--brand);
      font-size: 24px;
      font-weight: 800;
    }

    .project-disabled-warning {
      display: inline-grid;
      place-items: center;
      width: 20px;
      height: 20px;
      margin-right: 6px;
      border-radius: 999px;
      background: var(--danger);
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
      vertical-align: middle;
    }

    .url {
      display: inline-block;
      max-width: 220px;
      color: var(--accent);
      overflow-wrap: anywhere;
      text-decoration: none;
    }

    .url:hover {
      text-decoration: underline;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .thumbnail-cell {
      width: 96px;
    }

    .thumbnail-image,
    .thumbnail-placeholder {
      width: 96px;
      height: 54px;
      display: block;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      background: #f0f9ff;
    }

    .thumbnail-image {
      object-fit: cover;
    }

    .thumbnail-placeholder {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .class-select {
      min-width: 150px;
    }

    .empty {
      padding: 42px 20px;
      text-align: center;
      color: var(--brand-dark);
    }

    .code-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.58);
    }

    .code-overlay.is-open {
      display: flex;
    }

    .code-window {
      width: min(1120px, calc(100vw - 32px));
      height: min(84vh, 860px);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      border: 1px solid #bae6fd;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
      overflow: hidden;
    }

    .directed-ai-window {
      width: min(560px, calc(100vw - 32px));
      display: grid;
      grid-template-rows: auto auto auto;
      border: 1px solid #bae6fd;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
      overflow: hidden;
    }

    .directed-ai-body {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .directed-ai-body label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .directed-ai-body textarea {
      min-height: 150px;
      font-family: inherit;
      font-size: 14px;
    }

    .directed-ai-message {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .directed-ai-message.is-error {
      color: var(--danger);
    }

    .code-window-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .code-title-wrap {
      min-width: 0;
    }

    .code-title {
      margin: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 18px;
      line-height: 1.35;
    }

    .code-meta {
      margin-top: 4px;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 12px;
    }

    .code-message {
      min-height: 34px;
      padding: 8px 18px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 15px;
      font-weight: 650;
    }

    .code-message.is-error {
      color: var(--danger);
    }

    .code-editor {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      border-radius: 0;
      background: #0f172a;
      color: #e2e8f0;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.55;
      resize: none;
    }

    .code-editor:focus {
      border-color: transparent;
      outline-offset: -3px;
    }

    .code-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 18px;
      border-top: 1px solid var(--line);
      background: #fbfdff;
    }

    .code-actions-left,
    .code-actions-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 860px) {
      .admin-shell {
        grid-template-columns: 1fr;
      }

      .admin-sidebar {
        position: static;
        height: auto;
        grid-template-rows: auto auto auto;
        gap: 14px;
        padding: 16px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .side-nav {
        grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
      }

      .nav-button {
        justify-content: center;
      }

      .admin-main {
        padding: 18px 12px 40px;
      }

      .workspace-top {
        align-items: stretch;
        flex-direction: column;
      }

      .panel-head,
      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .create-form {
        grid-template-columns: 1fr;
      }

      .all-password-form,
      .forbidden-search-form,
      .forbidden-words-form,
      .settings-form,
      .class-form {
        grid-template-columns: 1fr;
      }

      .settings-form .settings-actions,
      .settings-hint,
      .key-status {
        grid-column: auto;
      }

      .forbidden-pagination {
        align-items: stretch;
        flex-direction: column;
      }

      .forbidden-pagination span {
        min-width: 0;
      }

      .class-row {
        grid-template-columns: 24px 1fr;
      }

      .toolbar input {
        max-width: none;
      }

      .toolbar-left,
      .toolbar-right,
      .toolbar-left input,
      .toolbar-left select {
        width: 100%;
      }

      .code-overlay {
        padding: 10px;
      }

      .code-window {
        width: calc(100vw - 20px);
        height: calc(100vh - 20px);
      }

      .code-window-head,
      .code-actions {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="brand">
        <span class="brand-mark">H</span>
        <span>后台管理</span>
      </div>
      <nav class="side-nav" aria-label="后台功能">
        <button class="nav-button is-active" type="button" data-view-target="projects">项目管理</button>
        <button class="nav-button" type="button" data-view-target="create">新增项目</button>
        <button class="nav-button" type="button" data-view-target="classes">班级管理</button>
        <button class="nav-button" type="button" data-view-target="forbidden">违禁词</button>
        <button class="nav-button" type="button" data-view-target="settings">设置</button>
      </nav>
      <div class="sidebar-footer">
        <a class="button" href="/">返回首页</a>
      </div>
    </aside>

    <main class="admin-main">
      <header class="workspace-top">
        <div>
          <p class="eyebrow">项目站后台</p>
          <h1 class="page-title" id="activeViewTitle">项目管理</h1>
        </div>
        <div class="summary-grid" aria-label="后台统计">
          <div class="summary-card">
            <span class="summary-value" id="projectCount">0</span>
            <span class="summary-label">项目</span>
          </div>
          <div class="summary-card">
            <span class="summary-value" id="classCount">0</span>
            <span class="summary-label">班级</span>
          </div>
          <div class="summary-card">
            <span class="summary-value" id="storageUsage">0 B</span>
            <span class="summary-label">总存储占用</span>
          </div>
        </div>
      </header>

      <section data-admin-view="projects" class="workspace is-active">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">项目管理</h2>
            <div class="message" id="listMessage"></div>
          </div>
          <div class="toolbar">
            <div class="toolbar-left">
              <input id="searchInput" type="search" placeholder="搜索项目名称、ID 或序号">
              <select id="filterClassId" class="class-select" aria-label="按班级筛选"></select>
            </div>
            <div class="toolbar-right">
              <button class="button" id="dedupeSitesButton" type="button">查重</button>
              <button class="warning-button" id="auditForbiddenSitesButton" type="button">违禁词审查</button>
              <button class="button" id="generateThumbnailsButton" type="button">刷新全部封面</button>
              <button class="button" id="reloadButton" type="button">刷新列表</button>
            </div>
          </div>
          <div class="ai-log-panel" id="aiOptimizeLog" aria-live="polite"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>序号</th>
                  <th>网页名字</th>
                  <th>作者</th>
                  <th>班级</th>
                  <th>访问链接</th>
                  <th>上传时间</th>
                  <th>存储占用</th>
                  <th>封面</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="siteRows"></tbody>
            </table>
          </div>
          <div class="empty" id="emptyState">还没有项目。</div>
        </div>
      </section>

      <section data-admin-view="create" class="workspace">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">新增项目</h2>
            <div class="message" id="createMessage"></div>
          </div>
          <form class="create-form" id="createForm">
            <label>
              网页名字
              <input id="createTitle" name="title" type="text" maxlength="80" placeholder="例如：我的小游戏" required>
            </label>
            <label>
              作者署名
              <input id="createAuthor" name="author" type="text" maxlength="40" placeholder="如：张三" required>
            </label>
            <label>
              所属班级
              <select id="createClassId" name="classId" required></select>
            </label>
            <label>
              HTML 文件
              <input id="createFile" name="file" type="file" accept=".html,text/html">
            </label>
            <label class="wide-field">
              HTML 代码
              <textarea id="createHtmlContent" name="htmlContent" placeholder="可以直接粘贴完整 HTML 代码。上传文件和填写代码二选一即可。"></textarea>
            </label>
            <button class="primary-button" type="submit">新增项目</button>
          </form>
        </div>
      </section>

      <section data-admin-view="classes" class="workspace">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">班级管理</h2>
            <div class="message" id="classMessage"></div>
          </div>
          <form class="all-password-form" id="allPasswordForm">
            <label>
              全部密码
              <input id="allPasswordInput" name="allPassword" type="password" inputmode="numeric" maxlength="6" placeholder="6位数字" required>
            </label>
            <button class="button" id="toggleAllPassword" type="button">显示</button>
            <button class="button" id="generateAllPassword" type="button">随机生成</button>
            <button class="primary-button" id="saveAllPassword" type="submit">保存全部密码</button>
            <button class="button password-toggle-button" id="toggleAllPasswordEnabled" type="button">密码已启用</button>
          </form>
          <form class="class-form" id="classForm">
            <label>
              班级名称
              <input id="classNameInput" name="name" type="text" maxlength="40" placeholder="例如：三年级一班" required>
            </label>
            <label>
              班级密码
              <input id="classPasswordInput" name="password" type="password" inputmode="numeric" maxlength="6" placeholder="6位数字" required>
            </label>
            <button class="button" id="toggleClassPassword" type="button">显示</button>
            <button class="button" id="generateClassPassword" type="button">随机生成</button>
            <button class="primary-button" type="submit">新增班级</button>
          </form>
          <div class="class-list" id="classList"></div>
        </div>
      </section>

      <section data-admin-view="forbidden" class="workspace">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">违禁词</h2>
            <div class="message" id="forbiddenWordsMessage"></div>
          </div>
          <form class="forbidden-search-form" id="forbiddenWordsSearchForm">
            <label>
              查询违禁词
              <input id="forbiddenWordsSearchInput" type="search" placeholder="输入关键词查询，留空显示第一页">
            </label>
            <button class="primary-button" id="searchForbiddenWords" type="submit">查询</button>
            <button class="button" id="clearForbiddenWordsSearch" type="button">清空</button>
          </form>
          <div class="forbidden-results" id="forbiddenWordsResults"></div>
          <div class="forbidden-pagination">
            <button class="button" id="prevForbiddenWordsPage" type="button">上一页</button>
            <span id="forbiddenWordsPageInfo">未查询</span>
            <button class="button" id="nextForbiddenWordsPage" type="button">下一页</button>
          </div>
          <form class="forbidden-words-form" id="forbiddenWordsForm">
            <label>
              追加违禁词
              <textarea id="forbiddenWordsInput" name="forbiddenWords" placeholder="一行一个词，或用逗号分隔。追加保存不会覆盖现有词库。"></textarea>
            </label>
            <button class="primary-button" id="saveForbiddenWords" type="submit">追加保存</button>
          </form>
        </div>
      </section>

      <section data-admin-view="settings" class="workspace">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">AI 功能设置</h2>
            <div class="message" id="aiSettingsMessage"></div>
          </div>
          <form class="settings-form" id="aiSettingsForm">
            <div class="key-status" id="aiApiKeyStatus">当前 Key：未配置</div>
            <p class="settings-hint">API Key 留空保存会保留当前 Key，只有点击清除才会删除。保存后 AI 优化和 AI 命名会立即使用新的配置。</p>
            <label>
              API Key
              <input id="aiApiKeyInput" name="apiKey" type="password" autocomplete="off" placeholder="留空则保留当前 Key">
            </label>
            <label>
              API Base URL
              <input id="aiBaseUrlInput" name="baseUrl" type="text" placeholder="https://api.deepseek.com">
            </label>
            <label>
              模型
              <input id="aiModelInput" name="model" type="text" placeholder="deepseek-chat">
            </label>
            <label>
              AI 优化温度
              <input id="aiTemperatureInput" name="temperature" type="number" min="0" max="2" step="0.1">
            </label>
            <label>
              AI 命名温度
              <input id="aiNameTemperatureInput" name="nameTemperature" type="number" min="0" max="2" step="0.1">
            </label>
            <label>
              Thinking Type
              <input id="aiThinkingTypeInput" name="thinkingType" type="text" placeholder="可留空，例如 disabled">
            </label>
            <div class="settings-actions">
              <button class="primary-button" type="submit">保存AI设置</button>
              <button class="danger-button" id="clearAiApiKey" type="button">清除API Key</button>
              <button class="button" id="reloadAiSettings" type="button">重新加载</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <div class="code-overlay" id="codeOverlay" aria-hidden="true">
    <section class="code-window" role="dialog" aria-modal="true" aria-labelledby="codeWindowTitle">
      <header class="code-window-head">
        <div class="code-title-wrap">
          <h2 class="code-title" id="codeWindowTitle">项目代码</h2>
          <div class="code-meta" id="codeWindowMeta"></div>
        </div>
        <button class="button" id="closeCodeWindow" type="button">关闭</button>
      </header>
      <div class="code-message" id="codeMessage"></div>
      <textarea class="code-editor" id="codeEditor" spellcheck="false" aria-label="项目 HTML 代码"></textarea>
      <footer class="code-actions">
        <div class="code-actions-left">
          <input id="codeFileInput" type="file" accept=".html,text/html">
          <button class="button" id="reloadCodeButton" type="button">重新加载</button>
        </div>
        <div class="code-actions-right">
          <button class="button" id="optimizeCodeButton" type="button">AI优化</button>
          <button class="button" id="previewCodeButton" type="button">预览</button>
          <button class="primary-button" id="saveCodeButton" type="button">保存代码</button>
        </div>
      </footer>
    </section>
  </div>

  <div class="code-overlay" id="directedAiOverlay" aria-hidden="true">
    <section class="directed-ai-window" role="dialog" aria-modal="true" aria-labelledby="directedAiTitle">
      <header class="code-window-head">
        <div class="code-title-wrap">
          <h2 class="code-title" id="directedAiTitle">定向AI优化</h2>
          <div class="code-meta" id="directedAiMeta"></div>
        </div>
        <button class="button" id="closeDirectedAiWindow" type="button">关闭</button>
      </header>
      <div class="directed-ai-body">
        <label>
          优化提示词
          <textarea id="directedAiInstruction" maxlength="1200" placeholder="例如：重点优化手机端性能，减少动画卡顿，保留原有视觉风格。"></textarea>
        </label>
        <div class="directed-ai-message" id="directedAiMessage"></div>
      </div>
      <footer class="code-actions">
        <div class="code-actions-left"></div>
        <div class="code-actions-right">
          <button class="button" id="cancelDirectedAi" type="button">取消</button>
          <button class="primary-button" id="startDirectedAi" type="button">开始优化</button>
        </div>
      </footer>
    </section>
  </div>

  <script>
    const createForm = document.getElementById('createForm');
    const createTitle = document.getElementById('createTitle');
    const createAuthor = document.getElementById('createAuthor');
    const createClassId = document.getElementById('createClassId');
    const createFile = document.getElementById('createFile');
    const createHtmlContent = document.getElementById('createHtmlContent');
    const classForm = document.getElementById('classForm');
    const allPasswordForm = document.getElementById('allPasswordForm');
    const allPasswordInput = document.getElementById('allPasswordInput');
    const toggleAllPasswordEnabled = document.getElementById('toggleAllPasswordEnabled');
    const forbiddenWordsForm = document.getElementById('forbiddenWordsForm');
    const forbiddenWordsSearchForm = document.getElementById('forbiddenWordsSearchForm');
    const forbiddenWordsSearchInput = document.getElementById('forbiddenWordsSearchInput');
    const clearForbiddenWordsSearch = document.getElementById('clearForbiddenWordsSearch');
    const forbiddenWordsInput = document.getElementById('forbiddenWordsInput');
    const forbiddenWordsResults = document.getElementById('forbiddenWordsResults');
    const prevForbiddenWordsPage = document.getElementById('prevForbiddenWordsPage');
    const nextForbiddenWordsPage = document.getElementById('nextForbiddenWordsPage');
    const forbiddenWordsPageInfo = document.getElementById('forbiddenWordsPageInfo');
    const aiSettingsForm = document.getElementById('aiSettingsForm');
    const aiSettingsMessage = document.getElementById('aiSettingsMessage');
    const aiApiKeyStatus = document.getElementById('aiApiKeyStatus');
    const aiApiKeyInput = document.getElementById('aiApiKeyInput');
    const aiBaseUrlInput = document.getElementById('aiBaseUrlInput');
    const aiModelInput = document.getElementById('aiModelInput');
    const aiTemperatureInput = document.getElementById('aiTemperatureInput');
    const aiNameTemperatureInput = document.getElementById('aiNameTemperatureInput');
    const aiThinkingTypeInput = document.getElementById('aiThinkingTypeInput');
    const clearAiApiKeyButton = document.getElementById('clearAiApiKey');
    const classNameInput = document.getElementById('classNameInput');
    const classPasswordInput = document.getElementById('classPasswordInput');
    const classList = document.getElementById('classList');
    const classMessage = document.getElementById('classMessage');
    const forbiddenWordsMessage = document.getElementById('forbiddenWordsMessage');
    const createMessage = document.getElementById('createMessage');
    const listMessage = document.getElementById('listMessage');
    const siteRows = document.getElementById('siteRows');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');
    const filterClassId = document.getElementById('filterClassId');
    const dedupeSitesButton = document.getElementById('dedupeSitesButton');
    const auditForbiddenSitesButton = document.getElementById('auditForbiddenSitesButton');
    const generateThumbnailsButton = document.getElementById('generateThumbnailsButton');
    const aiOptimizeLog = document.getElementById('aiOptimizeLog');
    const navButtons = Array.from(document.querySelectorAll('[data-view-target]'));
    const workspaces = Array.from(document.querySelectorAll('[data-admin-view]'));
    const activeViewTitle = document.getElementById('activeViewTitle');
    const projectCount = document.getElementById('projectCount');
    const classCount = document.getElementById('classCount');
    const storageUsage = document.getElementById('storageUsage');
    const codeOverlay = document.getElementById('codeOverlay');
    const codeWindowTitle = document.getElementById('codeWindowTitle');
    const codeWindowMeta = document.getElementById('codeWindowMeta');
    const codeMessage = document.getElementById('codeMessage');
    const codeEditor = document.getElementById('codeEditor');
    const codeFileInput = document.getElementById('codeFileInput');
    const reloadCodeButton = document.getElementById('reloadCodeButton');
    const optimizeCodeButton = document.getElementById('optimizeCodeButton');
    const previewCodeButton = document.getElementById('previewCodeButton');
    const saveCodeButton = document.getElementById('saveCodeButton');
    const directedAiOverlay = document.getElementById('directedAiOverlay');
    const directedAiMeta = document.getElementById('directedAiMeta');
    const directedAiInstruction = document.getElementById('directedAiInstruction');
    const directedAiMessage = document.getElementById('directedAiMessage');
    const startDirectedAi = document.getElementById('startDirectedAi');
    const AI_OPTIMIZE_LOG_STORAGE_KEY = 'project-site-ai-optimize-log';

    let sites = [];
    let classes = [];
    let settings = {};
    let currentCodeSite = null;
    let currentDirectedAiSite = null;
    let currentDirectedAiButton = null;
    let aiOptimizeLogItems = loadAiOptimizeLog();
    const runningAiOptimizations = new Set();
    const runningAiNaming = new Set();
    let forbiddenWordsState = {
      query: '',
      offset: 0,
      limit: 100,
      total: 0,
      allTotal: 0
    };
    const viewTitles = {
      projects: '项目管理',
      create: '新增项目',
      classes: '班级管理',
      forbidden: '违禁词',
      settings: '设置'
    };

    function renderAllPasswordEnabledButton() {
      const enabled = settings.allPasswordEnabled !== false;
      toggleAllPasswordEnabled.classList.toggle('is-disabled', !enabled);
      toggleAllPasswordEnabled.textContent = enabled ? '密码已启用' : '密码已解除';
      toggleAllPasswordEnabled.title = enabled ? '点击解除全部项目查看密码' : '点击启用全部项目查看密码';
    }

    function setMessage(element, text, isError = false) {
      element.textContent = text;
      element.classList.toggle('is-error', isError);
    }

    function formatLogTime(date = new Date()) {
      return date.toLocaleTimeString('zh-CN', { hour12: false });
    }

    function loadAiOptimizeLog() {
      try {
        const rawLogs = localStorage.getItem(AI_OPTIMIZE_LOG_STORAGE_KEY);
        const parsedLogs = JSON.parse(rawLogs || '[]');
        if (!Array.isArray(parsedLogs)) {
          return [];
        }

        return parsedLogs
          .filter((item) => item && typeof item.text === 'string' && typeof item.time === 'string')
          .map((item) => ({
            text: item.text,
            status: ['running', 'success', 'error'].includes(item.status) ? item.status : 'running',
            time: item.time
          }))
          .slice(0, 30);
      } catch {
        return [];
      }
    }

    function saveAiOptimizeLog() {
      try {
        localStorage.setItem(AI_OPTIMIZE_LOG_STORAGE_KEY, JSON.stringify(aiOptimizeLogItems.slice(0, 30)));
      } catch {
        // localStorage may be unavailable in restricted browser contexts.
      }
    }

    function renderAiOptimizeLog() {
      aiOptimizeLog.innerHTML = '';
      aiOptimizeLog.classList.toggle('has-logs', aiOptimizeLogItems.length > 0);

      aiOptimizeLogItems.forEach((item) => {
        const row = document.createElement('div');
        row.className = `ai-log-row is-${item.status}`;

        const text = document.createElement('div');
        text.className = 'ai-log-text';
        text.textContent = item.text;

        const time = document.createElement('div');
        time.className = 'ai-log-time';
        time.textContent = item.time;

        row.append(text, time);
        aiOptimizeLog.append(row);
      });
    }

    function addAiOptimizeLog(text, status = 'running') {
      aiOptimizeLogItems.unshift({
        text,
        status,
        time: formatLogTime()
      });
      aiOptimizeLogItems = aiOptimizeLogItems.slice(0, 30);
      saveAiOptimizeLog();
      renderAiOptimizeLog();
    }

    function getRunningAiText() {
      const count = runningAiOptimizations.size;
      return count ? `正在执行 ${count} 个 AI 优化任务` : '';
    }

    function switchView(viewName) {
      navButtons.forEach((button) => {
        button.classList.toggle('is-active', button.dataset.viewTarget === viewName);
      });

      workspaces.forEach((workspace) => {
        workspace.classList.toggle('is-active', workspace.dataset.adminView === viewName);
      });

      activeViewTitle.textContent = viewTitles[viewName] || viewTitles.projects;
    }

    function updateSummary() {
      const totalStorageBytes = sites.reduce((total, site) => total + (site.storageBytes || 0), 0);
      projectCount.textContent = String(sites.length);
      classCount.textContent = String(classes.length);
      storageUsage.textContent = formatBytes(totalStorageBytes);
    }

    function formatDate(value) {
      if (!value) {
        return '-';
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return '-';
      }

      return date.toLocaleString('zh-CN', { hour12: false });
    }

    function formatBytes(value) {
      const bytes = Number(value) || 0;
      if (bytes < 1024) {
        return `${bytes} B`;
      }

      const units = ['KB', 'MB', 'GB', 'TB'];
      let size = bytes / 1024;
      let unitIndex = 0;
      while (size >= 1024 && unitIndex < units.length - 1) {
        size /= 1024;
        unitIndex += 1;
      }

      return `${size >= 10 ? size.toFixed(1) : size.toFixed(2)} ${units[unitIndex]}`;
    }

    function isHtmlFile(file) {
      if (!file) {
        return true;
      }

      const name = file.name.toLowerCase();
      return name.endsWith('.html') || name.endsWith('.htm');
    }

    function generatePassword() {
      return String(Math.floor(Math.random() * 1000000)).padStart(6, '0');
    }

    function togglePasswordVisibility(input, button) {
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      button.textContent = isHidden ? '隐藏' : '显示';
    }

    function parseForbiddenWords(value) {
      const seen = new Set();
      return String(value || '')
        .split(/[\n,，、;；]+/)
        .map((word) => word.trim())
        .filter((word) => {
          const key = word.toLocaleLowerCase();
          if (!word || seen.has(key)) {
            return false;
          }

          seen.add(key);
          return true;
        });
    }

    function formatForbiddenWords(words) {
      return Array.isArray(words) ? words.join('\n') : '';
    }

    function findForbiddenWordMatch(title, author) {
      const forbiddenWords = Array.isArray(settings.forbiddenWords) ? settings.forbiddenWords : [];
      const fields = [
        { label: '网页名字', value: title },
        { label: '作者署名', value: author }
      ];

      for (const field of fields) {
        const text = String(field.value || '').toLocaleLowerCase();
        for (const word of forbiddenWords) {
          if (text.includes(String(word).toLocaleLowerCase())) {
            return `${field.label}不能包含违禁词「${word}」`;
          }
        }
      }

      return '';
    }

    function fillClassSelect(select, value = '', emptyText = null) {
      select.innerHTML = '';
      const empty = document.createElement('option');
      empty.value = '';
      empty.textContent = emptyText !== null ? emptyText : (classes.length ? '请选择班级' : '先新增班级');
      select.append(empty);

      classes.forEach((classItem) => {
        const option = document.createElement('option');
        option.value = classItem.id;
        option.textContent = classItem.name;
        select.append(option);
      });

      select.value = value;
    }

    function openProjectWindow(site) {
      const availableWidth = window.screen?.availWidth || window.innerWidth;
      const availableHeight = window.screen?.availHeight || window.innerHeight;
      const width = Math.min(1280, Math.max(960, Math.round(availableWidth * 0.82)));
      const height = Math.min(840, Math.max(640, Math.round(availableHeight * 0.82)));
      const left = Math.max(0, Math.round((availableWidth - width) / 2));
      const top = Math.max(0, Math.round((availableHeight - height) / 2));
      const features = [
        'popup=yes',
        `width=${width}`,
        `height=${height}`,
        `left=${left}`,
        `top=${top}`
      ].join(',');
      const targetName = `htmlDeployPreview_${String(site.id || 'site').replace(/[^a-z0-9_-]/gi, '_')}`;
      const opened = window.open(site.previewUrl || site.url, targetName, features);

      if (!opened) {
        return false;
      }

      opened.opener = null;
      opened.focus();
      return true;
    }

    function setCodeMessage(text, isError = false) {
      codeMessage.textContent = text;
      codeMessage.classList.toggle('is-error', isError);
    }

    function setCodeBusy(isBusy) {
      codeEditor.disabled = isBusy;
      saveCodeButton.disabled = isBusy;

    async function saveCurrentCode() {
      if (!currentCodeSite) {
        return;
      }

      const htmlContent = codeEditor.value;
      if (!htmlContent.trim()) {
        setCodeMessage('代码不能为空', true);
        return;
      }

      setCodeBusy(true);
      setCodeMessage('正在保存代码...');
      const formData = new FormData();
      formData.append('htmlContent', htmlContent);

      const response = await fetch(`/api/sites/${encodeURIComponent(currentCodeSite.id)}/code`, {
        method: 'PUT',
        body: formData
      });
      setCodeBusy(false);

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '保存代码失败' }));
        setCodeMessage(result.error || '保存代码失败', true);
        return;
      }

      const updatedSite = await response.json();
      const index = sites.findIndex((site) => site.id === updatedSite.id);
      if (index !== -1) {
        sites[index] = updatedSite;
        currentCodeSite = updatedSite;
      }
      renderRows();
      setCodeMessage('代码已保存，封面会在后台自动刷新。');
      setMessage(listMessage, `「${updatedSite.title}」代码已保存`);
    }

    function previewCurrentCode() {
      if (!currentCodeSite) {
        return;
      }

      const htmlContent = codeEditor.value;
      if (!htmlContent.trim()) {
        setCodeMessage('代码不能为空', true);
        codeEditor.focus();
        return;
      }

      const previewBlob = new Blob([htmlContent], { type: 'text/html' });
      const previewUrl = window.URL.createObjectURL(previewBlob);
      const opened = openProjectWindow({
        id: `${currentCodeSite.id}-draft`,
        url: previewUrl,
        previewUrl
      });

      if (!opened) {
        window.URL.revokeObjectURL(previewUrl);
        setCodeMessage('预览窗口被浏览器拦截，请允许弹窗后重试。', true);
        return;
      }

      window.setTimeout(() => window.URL.revokeObjectURL(previewUrl), 60000);
      setCodeMessage('已打开临时预览窗口，保存前不会影响线上项目。');
    }

    async function optimizeSiteCode(site, button, options = {}) {
      if (runningAiOptimizations.has(site.id)) {
        addAiOptimizeLog(`「${site.title}」已经在 AI 优化中，请等待完成。`, 'running');
        return;
      }

      const instruction = String(options.instruction || '').trim();
      const isDirected = options.directed === true;
      const idleText = isDirected ? '定向AI优化' : 'AI优化';

      runningAiOptimizations.add(site.id);
      if (button) {
        button.disabled = true;
        button.textContent = '优化中...';
      }
      addAiOptimizeLog(`正在${isDirected ? '定向 ' : ' '}AI 优化「${site.title}」...`, 'running');
      setMessage(listMessage, getRunningAiText() || `正在${isDirected ? '定向 ' : ' '}AI 优化并保存「${site.title}」...`);

      try {
        const response = await fetch(`/api/sites/${encodeURIComponent(site.id)}/ai-optimize-save`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(instruction ? { instruction } : {})
        });

        if (!response.ok) {
          const result = await response.json().catch(() => ({ error: 'AI 优化失败' }));
          const errorMessage = result.error || 'AI 优化失败';
          addAiOptimizeLog(`「${site.title}」AI 优化失败：${errorMessage}`, 'error');
          setMessage(listMessage, errorMessage, true);
          return;
        }

        const result = await response.json();
        const updatedSite = result.site;
        const index = sites.findIndex((item) => item.id === updatedSite.id);
        if (index !== -1) {
          sites[index] = updatedSite;
        }
        addAiOptimizeLog(`「${updatedSite.title}」${isDirected ? '定向 ' : ''}AI 优化完成并已保存${result.model ? `（${result.model}）` : ''}。`, 'success');
        runningAiOptimizations.delete(site.id);
        renderRows();
        setMessage(listMessage, getRunningAiText() || `「${updatedSite.title}」${isDirected ? '定向 ' : ''}AI 优化已保存，封面会在后台自动刷新。`);
      } catch (error) {
        addAiOptimizeLog(`「${site.title}」${isDirected ? '定向 ' : ''}AI 优化失败：${error.message || '网络错误'}`, 'error');
        setMessage(listMessage, error.message || 'AI 优化失败', true);
      } finally {
        const wasRunning = runningAiOptimizations.delete(site.id);
        if (button) {
          button.disabled = false;
          button.textContent = idleText;
        }
        const runningText = getRunningAiText();
        if (runningText) {
          setMessage(listMessage, runningText);
        } else if (wasRunning) {
          renderRows();
        }
      }
    }

    function renderForbiddenWords(words) {
      forbiddenWordsResults.innerHTML = '';
      if (!words.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = forbiddenWordsState.query ? '没有匹配的违禁词' : '暂无违禁词';
        forbiddenWordsResults.append(empty);
        return;
      }

      words.forEach((word) => {
        const row = document.createElement('div');
        row.className = 'forbidden-word-row';

        const text = document.createElement('span');
        text.className = 'forbidden-word-text';
        text.textContent = word;

        const deleteButton = document.createElement('button');
        deleteButton.className = 'forbidden-word-delete';
        deleteButton.type = 'button';
        deleteButton.textContent = '删除';
        deleteButton.addEventListener('click', () => deleteForbiddenWord(word, deleteButton));

        row.append(text, deleteButton);
        forbiddenWordsResults.append(row);
      });
    }

    function updateForbiddenWordsPagination() {
      const { offset, limit, total, allTotal, query } = forbiddenWordsState;
      const start = total ? offset + 1 : 0;
      const end = Math.min(offset + limit, total);
      forbiddenWordsPageInfo.textContent = query
        ? `匹配 ${total} 条 / 全部 ${allTotal} 条，当前 ${start}-${end}`
        : `全部 ${allTotal} 条，当前 ${start}-${end}`;
      prevForbiddenWordsPage.disabled = offset <= 0;
      nextForbiddenWordsPage.disabled = offset + limit >= total;
    }

    async function loadForbiddenWords({ query = forbiddenWordsState.query, offset = forbiddenWordsState.offset } = {}) {
      forbiddenWordsState.query = query;
      forbiddenWordsState.offset = Math.max(0, offset);
      setMessage(forbiddenWordsMessage, '正在查询违禁词...');

      const params = new URLSearchParams({
        q: forbiddenWordsState.query,
        offset: String(forbiddenWordsState.offset),
        limit: String(forbiddenWordsState.limit)
      });
      const response = await fetch(`/api/admin/forbidden-words?${params.toString()}`);
      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '查询违禁词失败' }));
        setMessage(forbiddenWordsMessage, result.error || '查询违禁词失败', true);
        return;
      }

      const result = await response.json();
      forbiddenWordsState = {
        ...forbiddenWordsState,
        query: result.query || '',
        offset: result.offset || 0,
        limit: result.limit || forbiddenWordsState.limit,
        total: result.total || 0,
        allTotal: result.allTotal || 0
      };
      renderForbiddenWords(result.words || []);
      updateForbiddenWordsPagination();
      setMessage(forbiddenWordsMessage, forbiddenWordsState.query
        ? `查询到 ${forbiddenWordsState.total} 条匹配词`
        : `${forbiddenWordsState.allTotal} 个违禁词`);
    }

    async function saveForbiddenWords(event) {
      event.preventDefault();

      if (!forbiddenWords.length) {
        setMessage(forbiddenWordsMessage, '请输入要追加的违禁词', true);

        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ forbiddenWords })
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '追加违禁词失败' }));
        setMessage(forbiddenWordsMessage, result.error || '追加违禁词失败', true);
        return;
      }

      const result = await response.json();
      forbiddenWordsInput.value = '';
      forbiddenWordsState.offset = 0;
      await loadForbiddenWords({ offset: 0 });
      setMessage(forbiddenWordsMessage, result.added
        ? `已追加 ${result.added} 个违禁词，总计 ${result.total} 个`
        : `没有新增词条，总计 ${result.total} 个`);
    }

    async function deleteForbiddenWord(word, button) {
      if (!confirm(`确定删除违禁词「${word}」吗？`)) {
        return;
      }

      button.disabled = true;
      setMessage(forbiddenWordsMessage, `正在删除「${word}」...`);

      const response = await fetch('/api/admin/forbidden-words', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ word })
      });

      if (!response.ok) {
        button.disabled = false;
        const result = await response.json().catch(() => ({ error: '删除违禁词失败' }));
        setMessage(forbiddenWordsMessage, result.error || '删除违禁词失败', true);
        return;
      }

      const result = await response.json();
      forbiddenWordsState.allTotal = result.total;
      forbiddenWordsState.total = Math.max(0, forbiddenWordsState.total - result.removed);
      const nextOffset = forbiddenWordsState.offset >= forbiddenWordsState.total
        ? Math.max(0, forbiddenWordsState.offset - forbiddenWordsState.limit)
        : forbiddenWordsState.offset;
      await loadForbiddenWords({ query: forbiddenWordsState.query, offset: nextOffset });
      setMessage(forbiddenWordsMessage, `已删除「${word}」，总计 ${result.total} 个`);
    }

        const matchKeyword = site.title.toLowerCase().includes(keyword)
          || site.id.toLowerCase().includes(keyword)
          || (site.className || '').toLowerCase().includes(keyword)
          || (site.author || '').toLowerCase().includes(keyword)
          || siteNumber.includes(keyword);
        const matchClass = selectedClass ? site.classId === selectedClass : true;
        return matchKeyword && matchClass;
      });

      siteRows.innerHTML = '';
      emptyState.style.display = filtered.length ? 'none' : 'block';

      filtered.forEach((site, index) => {
        const enabled = site.enabled !== false;
        const forbiddenWhitelisted = site.forbiddenWhitelist === true;
        const starred = site.starred === true;
        const row = document.createElement('tr');
        row.classList.toggle('is-disabled-project', !enabled);

        const indexCell = document.createElement('td');

        titleInput.addEventListener('input', function() {

        row.append(indexCell, titleCell, authorCell, classCell, urlCell, createdCell, storageCell, thumbnailCell, actionCell);

    async function createSite(event) {
      event.preventDefault();
      setMessage(createMessage, '');

      const title = createTitle.value.trim();
      const author = createAuthor.value.trim();
      const file = createFile.files && createFile.files[0];
      const htmlContent = createHtmlContent.value.trim();
      const forbiddenMessage = findForbiddenWordMatch(title, author);
      if (forbiddenMessage) {
        setMessage(createMessage, forbiddenMessage, true);
        return;
      }

      if (!file && !htmlContent) {
        setMessage(createMessage, '请上传 HTML 文件或填写 HTML 代码', true);
        return;
      }

      if (file && !isHtmlFile(file)) {
        setMessage(createMessage, '请选择 HTML 文件', true);
        return;
      }

      const formData = new FormData();
      formData.append('title', title);
      formData.append('author', author);
      formData.append('classId', createClassId.value);
      formData.append('htmlContent', htmlContent);
      if (file) {
        formData.append('file', file, file.name);
      }

      const response = await fetch('/api/sites', {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '新增失败' }));
        setMessage(createMessage, result.error || '新增失败', true);
        return;
      }

      createForm.reset();
      setMessage(createMessage, '新增成功');
      await loadSites();
      switchView('projects');
    }

    async function updateSite(site, titleInput, authorInput, classSelect, row) {
      const title = titleInput.value.trim();
      const author = authorInput.value.trim();
      const classId = classSelect.value;

      if (!title) {
        setMessage(listMessage, '网页名字不能为空', true);
        return;
      }

      if (!author) {
        setMessage(listMessage, '作者署名不能为空', true);
        return;
      }

      const forbiddenMessage = site.forbiddenWhitelist === true ? '' : findForbiddenWordMatch(title, author);
      if (forbiddenMessage) {
        setMessage(listMessage, forbiddenMessage, true);
        return;
      }

      if (!classId) {
        setMessage(listMessage, '请选择班级', true);
        return;
      }

      const formData = new FormData();
      formData.append('title', title);
      formData.append('author', author);
      formData.append('classId', classId);

      const response = await fetch(`/api/sites/${encodeURIComponent(site.id)}`, {
        method: 'PUT',
        body: formData
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '保存失败' }));
        setMessage(listMessage, result.error || '保存失败', true);
        return;
      }

      const updatedSite = await response.json();
      // 更新本地数据，只更新当前行而不是整个列表刷新
      const index = sites.findIndex((s) => s.id === site.id);
      if (index !== -1) {
        sites[index] = updatedSite;

        // 同步更新 className，以防修改了班级
        const newClass = classes.find((c) => c.id === updatedSite.classId);
        if (newClass) {
          sites[index].className = newClass.name;
        }
      }

      setMessage(listMessage, '保存成功');
    }

        return;
      }

      const updatedClass = await response.json();
      const index = classes.findIndex(c => c.id === classItem.id);
      if (index !== -1) {
        classes[index] = updatedClass;
      }
      classItem.passwordEnabled = updatedClass.passwordEnabled !== false;

      const passwordEnabled = classItem.passwordEnabled !== false;
      button.classList.toggle('is-disabled', !passwordEnabled);
      button.textContent = passwordEnabled ? '密码已启用' : '密码已解除';
      button.title = passwordEnabled ? '点击解除该班级查看密码' : '点击启用该班级查看密码';
      setMessage(classMessage, passwordEnabled ? '已启用该班级密码' : '已解除该班级密码');
    }

    async function updateClass(classItem, input, passwordInput, row) {
      const name = input.value.trim();
      const password = passwordInput.value.trim();
      if (!name) {
        setMessage(classMessage, '班级名称不能为空', true);
        return;
      }

      if (!/^\d{6}$/.test(password)) {
        setMessage(classMessage, '班级密码必须是 6 位数字', true);
        return;
      }

      const response = await fetch(`/api/classes/${encodeURIComponent(classItem.id)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, password })
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '保存班级失败' }));
        setMessage(classMessage, result.error || '保存班级失败', true);
        return;
      }

      const updatedClass = await response.json();
      // 更新本地数据
      const index = classes.findIndex(c => c.id === classItem.id);
      if (index !== -1) {
        classes[index] = updatedClass;
      }
      // 更新项目列表中的班级名称
      sites.forEach(s => {
        if (s.classId === updatedClass.id) {
          s.className = updatedClass.name;
        }
      });
      // 重新渲染项目列表以反映更新后的班级名，但不刷新整个页面或重新请求
      renderRows();
      setMessage(classMessage, '保存班级成功');
    }

    async function deleteClass(classItem) {
      if (!confirm(`确定删除班级「${classItem.name}」吗？`)) {
        return;
      }

      const response = await fetch(`/api/classes/${encodeURIComponent(classItem.id)}`, {
        method: 'DELETE'
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '删除班级失败' }));
        setMessage(classMessage, result.error || '删除班级失败', true);
        return;
      }

      setMessage(classMessage, '删除班级成功');
      await loadClasses();
      await loadSites();
    }

    async function deleteSite(site) {
      if (!confirm(`确定删除「${site.title}」吗？`)) {
        return;
      }

      const response = await fetch(`/api/sites/${encodeURIComponent(site.id)}`, {
        method: 'DELETE'
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({ error: '删除失败' }));
        setMessage(listMessage, result.error || '删除失败', true);
        return;
      }

      setMessage(listMessage, '删除成功');
      await loadSites();
    }

    let draggedRow = null;

    classList.addEventListener('dragstart', (e) => {
      const row = e.target.closest('.class-row');
      if (row) {
        draggedRow = row;
        row.classList.add('is-dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', row.dataset.id);
      }
    });

    classList.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      
      const row = e.target.closest('.class-row');
      if (row && row !== draggedRow) {
        const rect = row.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        if (e.clientY < midY) {
          row.parentNode.insertBefore(draggedRow, row);
        } else {
          row.parentNode.insertBefore(draggedRow, row.nextSibling);
        }
      }
    });

    classList.addEventListener('dragend', async (e) => {
      const row = e.target.closest('.class-row');
      if (row) {
        row.classList.remove('is-dragging');
        row.draggable = false;
      }
      if (!draggedRow) return;
      draggedRow = null;
      
      const classIds = Array.from(classList.querySelectorAll('.class-row')).map(r => r.dataset.id);
      classes.sort((a, b) => classIds.indexOf(a.id) - classIds.indexOf(b.id));
      
      try {
        const response = await fetch('/api/classes/order', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ classIds })
        });
        
        if (!response.ok) {
          throw new Error('保存排序失败');
        }
        setMessage(classMessage, '班级排序已保存');
        fillClassSelect(createClassId, createClassId.value);
      } catch (error) {
        setMessage(classMessage, error.message, true);
        await loadClasses();
      }
    });

    allPasswordForm.addEventListener('submit', saveAllPassword);
    aiSettingsForm.addEventListener('submit', saveAiSettings);
    clearAiApiKeyButton.addEventListener('click', clearAiApiKey);
    document.getElementById('reloadAiSettings').addEventListener('click', loadAiSettings);
    forbiddenWordsForm.addEventListener('submit', saveForbiddenWords);
    forbiddenWordsSearchForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      await loadForbiddenWords({ query: forbiddenWordsSearchInput.value.trim(), offset: 0 });
    });
    clearForbiddenWordsSearch.addEventListener('click', async () => {
      forbiddenWordsSearchInput.value = '';
      await loadForbiddenWords({ query: '', offset: 0 });
    });
    prevForbiddenWordsPage.addEventListener('click', async () => {
      await loadForbiddenWords({
        offset: Math.max(0, forbiddenWordsState.offset - forbiddenWordsState.limit)
      });
    });
    nextForbiddenWordsPage.addEventListener('click', async () => {
      await loadForbiddenWords({
        offset: forbiddenWordsState.offset + forbiddenWordsState.limit
      });
    });
    const toggleAllPassword = document.getElementById('toggleAllPassword');
    toggleAllPassword.addEventListener('click', () => {
      togglePasswordVisibility(allPasswordInput, toggleAllPassword);
    });
    toggleAllPasswordEnabled.addEventListener('click', toggleAllProjectsPasswordEnabled);
    document.getElementById('generateAllPassword').addEventListener('click', () => {
      allPasswordInput.value = generatePassword();
    });
    classForm.addEventListener('submit', createClass);
    const toggleClassPassword = document.getElementById('toggleClassPassword');
    toggleClassPassword.addEventListener('click', () => {
      togglePasswordVisibility(classPasswordInput, toggleClassPassword);
    });
    document.getElementById('generateClassPassword').addEventListener('click', () => {
      classPasswordInput.value = generatePassword();
    });
    createForm.addEventListener('submit', createSite);
    searchInput.addEventListener('input', renderRows);
    filterClassId.addEventListener('change', renderRows);
    navButtons.forEach((button) => {
      button.addEventListener('click', () => switchView(button.dataset.viewTarget));
    });
    document.getElementById('reloadButton').addEventListener('click', async () => {
      await loadSettings();
      await loadClasses();
      await loadSites();
    });
    auditForbiddenSitesButton.addEventListener('click', auditForbiddenSites);
    dedupeSitesButton.addEventListener('click', dedupeSites);
    generateThumbnailsButton.addEventListener('click', generateAllThumbnails);
    document.getElementById('closeCodeWindow').addEventListener('click', closeCodeWindow);
    document.getElementById('closeDirectedAiWindow').addEventListener('click', closeDirectedAiWindow);
    document.getElementById('cancelDirectedAi').addEventListener('click', closeDirectedAiWindow);
    startDirectedAi.addEventListener('click', startDirectedAiOptimize);
    directedAiInstruction.addEventListener('keydown', (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
        event.preventDefault();
        startDirectedAiOptimize();
      }
    });
    reloadCodeButton.addEventListener('click', () => {
      if (currentCodeSite) {
        loadSiteCode(currentCodeSite);
      }
    });
    optimizeCodeButton.addEventListener('click', optimizeCurrentCode);
    previewCodeButton.addEventListener('click', previewCurrentCode);
    saveCodeButton.addEventListener('click', saveCurrentCode);
    codeFileInput.addEventListener('change', async () => {
      const file = codeFileInput.files && codeFileInput.files[0];
      if (!file) {
        return;
      }

      if (!isHtmlFile(file)) {
        setCodeMessage('请选择 HTML 文件', true);
        codeFileInput.value = '';
        return;
      }

      codeEditor.value = await file.text();
      setCodeMessage(`已读取「${file.name}」，保存后会替换当前项目代码。`);
      codeEditor.focus();
    });
    codeOverlay.addEventListener('click', (event) => {
      if (event.target === codeOverlay) {
        closeCodeWindow();
      }
    });
    directedAiOverlay.addEventListener('click', (event) => {
      if (event.target === directedAiOverlay) {
        closeDirectedAiWindow();
      }
    });
    codeOverlay.addEventListener('wheel', (event) => {
      if (event.target !== codeEditor) {
        event.preventDefault();
      }
    }, { passive: false });
    directedAiOverlay.addEventListener('wheel', (event) => {
      if (event.target !== directedAiInstruction) {
        event.preventDefault();
      }
    }, { passive: false });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        if (directedAiOverlay.classList.contains('is-open')) {
          closeDirectedAiWindow();
        } else if (codeOverlay.classList.contains('is-open')) {
          closeCodeWindow();
        }
      }
    });

    async function boot() {
      renderAiOptimizeLog();
      await loadSettings();
      await loadAiSettings();
      await loadForbiddenWords({ offset: 0 });
      await loadClasses();
      await loadSites();
    }

    boot().catch((error) => {
      setMessage(listMessage, `加载项目失败：${error.message}`, true);
    });
  </script>
</body>
</html>
