<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>霓虹星跃 (Neon Leap: Astro Dash)</title>
    <!-- 引入 Lucide 图标库用于 UI -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #00f0ff;
            --success: #39ff14;
            --warning: #ffb703;
            --bg-dark: #0a0c14;
            --panel-bg: rgba(15, 18, 36, 0.85);
            --font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: var(--font-family);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 游戏容器，限制 16:9 最大比例保证画面完美 */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1024px;
            max-height: 576px;
            aspect-ratio: 16/9;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.15);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(0, 240, 255, 0.2);
            background: radial-gradient(circle at center, #14192f 0%, #05070f 100%);
            contain: strict;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 全屏覆盖界面基础样式 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 7, 15, 0.85);
            z-index: 20;
            transition: opacity 0.4s ease, visibility 0.4s;
            opacity: 1;
            visibility: visible;
        }

        .overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* 霓虹按钮样式 */
        .btn {
            background: transparent;
            color: #fff;
            border: 2px solid var(--secondary);
            padding: 12px 36px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            outline: none;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .btn:hover {
            background: var(--secondary);
            color: var(--bg-dark);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .btn-pink {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.2);
        }

        .btn-pink:hover {
            background: var(--primary);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* 主菜单特殊样式 */
        #menu-screen h1 {
            font-size: 3.5rem;
            margin: 0 0 5px 0;
            font-style: italic;
            background: linear-gradient(135deg, var(--secondary) 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            font-weight: 900;
            letter-spacing: 4px;
        }

        #menu-screen p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        /* 游戏界面顶部HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        .hud-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .hud-value {
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffffff;
        }

        .hud-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 道具激活指示器 */
        #buffs-container {
            position: absolute;
            bottom: 20px;
            left: 25px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            z-index: 10;
        }

        .buff-icon {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--panel-bg);
            padding: 6px 12px;
            border-radius: 8px;
            border-left: 4px solid var(--secondary);
            font-size: 0.8rem;
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(-30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* 伤害反馈红幕 */
        #damage-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.3);
            pointer-events: none;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.15s ease-out;
        }

        /* 自适应移动端虚拟按键（仅在检测到触摸设备时通过JS显示） */
        #touch-controls {
            position: absolute;
            bottom: 25px;
            right: 25px;
            display: none;
            gap: 15px;
            z-index: 10;
        }

        .touch-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .touch-btn:active {
            background: rgba(0, 240, 255, 0.3);
            border-color: var(--secondary);
            transform: scale(0.92);
        }

        /* 结算界面排版 */
        .score-row {
            font-size: 1.5rem;
            margin: 10px 0;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .score-row span {
            font-weight: bold;
            color: var(--secondary);
        }

        /* 游戏玩法指南 */
        .guides {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            align-items: center;
        }

        .guide-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .kbd {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #fff;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 顶栏数据监控 -->
    <div id="hud">
        <div class="hud-panel">
            <i data-lucide="zap" style="color: var(--secondary); width: 18px;"></i>
            <div>
                <div class="hud-label">得分 (Score)</div>
                <div id="hud-score" class="hud-value">0</div>
            </div>
        </div>
        <div class="hud-panel">
            <i data-lucide="award" style="color: var(--warning); width: 18px;"></i>
            <div>
                <div class="hud-label">最高纪录 (Best)</div>
                <div id="hud-highscore" class="hud-value">0</div>
            </div>
        </div>
        <div class="hud-panel">
            <i data-lucide="activity" style="color: var(--primary); width: 18px;"></i>
            <div>
                <div class="hud-label">生命能量 (Shield)</div>
                <div id="hud-shields" class="hud-value" style="color: var(--primary);">⚡⚡⚡</div>
            </div>
        </div>
    </div>

    <!-- 粒子运动主视窗 -->
    <canvas id="gameCanvas"></canvas>

    <!-- 屏幕受击红闪特效 -->
    <div id="damage-flash"></div>

    <!-- Buff 持续时间提示区 -->
    <div id="buffs-container"></div>

    <!-- 移动端控制区 -->
    <div id="touch-controls">
        <div class="touch-btn" id="ctrl-dash">
            <i data-lucide="sparkles" style="width: 28px; height: 28px;"></i>
        </div>
        <div class="touch-btn" id="ctrl-jump">
            <i data-lucide="arrow-up" style="width: 28px; height: 28px;"></i>
        </div>
    </div>

    <!-- 界面一：开始主菜单 -->
    <div id="menu-screen" class="overlay">
        <h1>NEON LEAP</h1>
        <p>A S T R O   D A S H</p>

        <div class="guides">
            <div class="guide-item">
                <span class="kbd">空格 Space</span> 或 <span class="kbd">W</span> 跃迁跳跃（支持二段跳跃 ⚡）
            </div>
            <div class="guide-item">
                <span class="kbd">J</span> 或 <span class="kbd">L</span> 聚能前冲（冲刺具有无敌判定）
            </div>
        </div>

        <button class="btn" onclick="app.launchGame()">
            <i data-lucide="play-circle"></i> 启动引擎
        </button>
    </div>

    <!-- 界面二：游戏结束/结算 -->
    <div id="gameover-screen" class="overlay hidden">
        <h2 style="color: var(--primary); font-size: 2.5rem; letter-spacing: 2px;">能源耗尽</h2>
        <p style="color: rgba(255, 255, 255, 0.4);">你的引擎由于撞击导致核心熔毁</p>

        <div class="score-row">
            <i data-lucide="flag" style="color: var(--secondary)"></i>
            最终得分: <span id="final-score">0</span>
        </div>
        <div class="score-row" style="font-size: 1.1rem; margin-bottom: 25px; opacity: 0.8;">
            <i data-lucide="trophy" style="color: var(--warning)"></i>
            最高纪录: <span id="final-best">0</span>
        </div>

        <button class="btn btn-pink" onclick="app.resetGame()">
            <i data-lucide="rotate-ccw"></i> 重启引擎
        </button>
    </div>
</div>

<script>
    // 基础防御：防范未加载完毕的图标报错
    function safeCreateIcons() {
        if (typeof lucide !== 'undefined' && lucide.createIcons) {
            try { lucide.createIcons(); } catch(e) { console.warn(e); }
        }
    }

    // --- 极简 Web Audio API 智能音效合成器 ---
    const SoundFX = {
        ctx: null,
        noiseBuffer: null,
        init() {
            try {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx && this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            } catch (e) {
                console.warn("Web Audio API not supported/blocked on this browser.");
            }
        },
        getNoiseBuffer() {
            if (!this.ctx) return null;
            if (!this.noiseBuffer) {
                const bufferSize = Math.floor(this.ctx.sampleRate * 0.2);
                this.noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = this.noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
            }
            return this.noiseBuffer;
        },
        playJump() {
            this.init();
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(450, this.ctx.currentTime + 0.15);

            gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);

            osc.start();
            osc.stop(this.ctx.currentTime + 0.15);
        },
        playCoin() {
            this.init();
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(587.33, this.ctx.currentTime);
            osc.frequency.setValueAtTime(880, this.ctx.currentTime + 0.08);

            gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.25);

            osc.start();
            osc.stop(this.ctx.currentTime + 0.25);
        },
        playDash() {
            this.init();
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, this.ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(80, this.ctx.currentTime + 0.2);

            gain.gain.setValueAtTime(0.25, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);

            osc.start();
            osc.stop(this.ctx.currentTime + 0.2);
        },
        playHit() {
            this.init();
            if (!this.ctx) return;
            try {
                const noise = this.ctx.createBufferSource();
                noise.buffer = this.getNoiseBuffer();

                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, this.ctx.currentTime);
                filter.frequency.linearRampToValueAtTime(10, this.ctx.currentTime + 0.2);

                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);

                noise.start();
                noise.stop(this.ctx.currentTime + 0.2);
            } catch (err) {
                // 回退简易合成器
                const osc = this.ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            }
        },
        playPowerup() {
            this.init();
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);

            osc.type = 'square';
            osc.frequency.setValueAtTime(220, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, this.ctx.currentTime + 0.3);

            gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.35);

            osc.start();
            osc.stop(this.ctx.currentTime + 0.35);
        }
    };

    // --- 游戏主控制器 ---
    class NeonLeapGame {
        constructor() {
            this.canvas = document.getElementById('gameCanvas');
            this.ctx = this.canvas.getContext('2d', { alpha: false, desynchronized: true }) || this.canvas.getContext('2d');
            this.bestScore = parseInt(localStorage.getItem('neonleap_best') || '0');
            this.ui = {
                score: document.getElementById('hud-score'),
                highscore: document.getElementById('hud-highscore'),
                shields: document.getElementById('hud-shields'),
                menu: document.getElementById('menu-screen'),
                gameover: document.getElementById('gameover-screen'),
                finalScore: document.getElementById('final-score'),
                finalBest: document.getElementById('final-best'),
                buffs: document.getElementById('buffs-container'),
                damageFlash: document.getElementById('damage-flash'),
                touchControls: document.getElementById('touch-controls'),
                jumpControl: document.getElementById('ctrl-jump'),
                dashControl: document.getElementById('ctrl-dash')
            };
            this.maxParticles = 72;
            this.lastScoreText = '';
            this.lastBestScoreText = '';
            this.lastShieldsText = '';
            this.lastBuffSignature = '';
            this.damageFlashTimer = 0;
            this.gameOverTimer = 0;
            this.isGameOver = false;
            this.renderTime = 0;
            this.fixedStepMs = 1000 / 60;
            this.accumulatorMs = 0;
            this.lastFrameTime = 0;

            // 物理渲染尺寸锁定 (16:9 比例)
            this.renderWidth = 1024;
            this.renderHeight = 576;
            this.canvas.width = this.renderWidth;
            this.canvas.height = this.renderHeight;
            this.ctx.imageSmoothingEnabled = false;

            // Canvas 绘制圆角兼容补丁
            if (typeof this.ctx.roundRect !== 'function') {
                this.ctx.roundRect = function (x, y, w, h, r) {
                    if (typeof r === 'undefined') r = 0;
                    if (typeof r === 'number') {
                        r = {tl: r, tr: r, br: r, bl: r};
                    } else {
                        var defaultVals = {tl: 0, tr: 0, br: 0, bl: 0};
                        for (var key in defaultVals) {
                            r[key] = r[key] || defaultVals[key];
                        }
                    }
                    this.beginPath();
                    this.moveTo(x + r.tl, y);
                    this.lineTo(x + w - r.tr, y);
                    this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                    this.lineTo(x + w, y + h - r.br);
                    this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                    this.lineTo(x + r.bl, y + h);
                    this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                    this.lineTo(x, y + r.tl);
                    this.quadraticCurveTo(x, y, x + r.tl, y);
                    this.closePath();
                    return this;
                }
            }

            // 核心状态
            this.isPlaying = false;
            this.score = 0;
            this.shields = 3;
            this.distance = 0;
            this.gameSpeed = 6;
            this.maxSpeed = 15;

            // 特效系统容器
            this.player = null;
            this.platforms = [];
            this.entities = [];
            this.particles = [];
            this.backgroundStars = [];

            // 关卡生成器状态
            this.platformYTrend = 400;

            // Buff 激活状态（存帧数）
            this.activeBuffs = {
                magnet: 0,
                double: 0,
                invincible: 0
            };

            // 监听键盘按键
            this.keys = {};
            window.addEventListener('keydown', e => {
                // 拦截空格和方向键的默认行为状态，避免触发当前处于Focus状态的UI按钮以及网页上下滚动
                if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown') {
                    e.preventDefault();
                }
                if (e.repeat) return; // 拦截并防止按键连发/粘滞导致的连跃 Bug
                this.keys[e.code] = true;
                this.handleKeyPress(e.code);
            });
            window.addEventListener('keyup', e => {
                this.keys[e.code] = false;
            });
            window.addEventListener('blur', () => {
                this.keys = {}; // 避免窗口失焦时按键锁定
            });

            // 移动端控制绑定 (兼容电脑模拟点击)
            const handleTouchJump = (e) => {
                e.preventDefault();
                this.executeJump();
            };
            const handleTouchDash = (e) => {
                e.preventDefault();
                this.executeDash();
            };

            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                this.ui.touchControls.style.display = 'flex';
                if (window.PointerEvent) {
                    this.ui.jumpControl.addEventListener('pointerdown', handleTouchJump, { passive: false });
                    this.ui.dashControl.addEventListener('pointerdown', handleTouchDash, { passive: false });
                } else {
                    this.ui.jumpControl.addEventListener('touchstart', handleTouchJump, { passive: false });
                    this.ui.dashControl.addEventListener('touchstart', handleTouchDash, { passive: false });
                }
            }

            // 初始化背景静态粒子
            for (let i = 0; i < 36; i++) {
                this.backgroundStars.push({
                    x: Math.random() * this.renderWidth,
                    y: Math.random() * this.renderHeight,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.8 + 0.1
                });
            }

            // 初始化 UI
            safeCreateIcons();
            this.setBestScore(this.bestScore);
        }

        setScore(value) {
            const text = String(value);
            if (text !== this.lastScoreText) {
                this.ui.score.textContent = text;
                this.lastScoreText = text;
            }
        }

        setBestScore(value) {
            const text = String(value);
            if (text !== this.lastBestScoreText) {
                this.ui.highscore.textContent = text;
                this.lastBestScoreText = text;
            }
        }

        removeEntityAt(index) {
            const lastIndex = this.entities.length - 1;
            if (index < 0 || index > lastIndex) return;
            this.entities[index] = this.entities[lastIndex];
            this.entities.pop();
        }

        compactParticles() {
            let writeIndex = 0;
            for (let i = 0; i < this.particles.length; i++) {
                const p = this.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;
                if (p.alpha > 0) {
                    this.particles[writeIndex++] = p;
                }
            }
            this.particles.length = writeIndex;
        }

        compactWorldArrays() {
            let platformWrite = 0;
            for (let i = 0; i < this.platforms.length; i++) {
                const p = this.platforms[i];
                if (p.x + p.width > -100) {
                    this.platforms[platformWrite++] = p;
                }
            }
            this.platforms.length = platformWrite;

            let entityWrite = 0;
            for (let i = 0; i < this.entities.length; i++) {
                const ent = this.entities[i];
                if (ent.x > -100) {
                    this.entities[entityWrite++] = ent;
                }
            }
            this.entities.length = entityWrite;
        }

        // 启动游戏
        launchGame() {
            // 强行剥夺当前点击按钮的 HTML 聚焦状态，防止后续按空格时误触发点击事件
            if (document.activeElement && typeof document.activeElement.blur === 'function') {
                document.activeElement.blur();
            }
            SoundFX.init();
            this.ui.menu.classList.add('hidden');
            this.resetGame();
            this.isPlaying = true;
        }

        // 重置状态
        resetGame() {
            // 强行剥夺重置按钮的 HTML 聚焦状态
            if (document.activeElement && typeof document.activeElement.blur === 'function') {
                document.activeElement.blur();
            }
            this.score = 0;
            this.shields = 3;
            this.distance = 0;
            this.gameSpeed = 6;
            this.platforms = [];
            this.entities = [];
            this.particles = [];
            this.platformYTrend = 380;
            this.activeBuffs = { magnet: 0, double: 0, invincible: 0 };
            this.isGameOver = false;
            clearTimeout(this.gameOverTimer);
            clearTimeout(this.damageFlashTimer);
            this.ui.damageFlash.style.opacity = '0';
            this.lastBuffSignature = '';

            this.setScore(0);
            this.updateShieldsHUD();
            this.updateBuffIndicators();
            this.ui.gameover.classList.add('hidden');

            // 实例化玩家
            this.player = {
                x: 150,
                y: 200,
                width: 30,
                height: 44,
                vy: 0,
                gravity: 0.7,
                jumpForce: -13.5,
                isGrounded: false,
                isDashing: false,
                dashCooldown: 0,
                dashTimer: 0,
                coyoteTimer: 0,
                jumpCount: 0,   // 跳跃计数器，用于支持二段跳
                hue: 190,
                colorPulse: 0
            };

            // 生成初始安全地面
            this.spawnPlatform(0, 450, 400);
            for (let i = 0; i < 6; i++) {
                this.generateNextSegment();
            }

            this.isPlaying = true;
        }

        updateShieldsHUD() {
            const shieldText = "⚡".repeat(Math.max(0, this.shields)) || "CRITICAL";
            if (shieldText !== this.lastShieldsText) {
                this.ui.shields.textContent = shieldText;
                this.lastShieldsText = shieldText;
            }
            if (this.shields <= 1) {
                this.ui.shields.style.color = '#ff007f';
            } else {
                this.ui.shields.style.color = '#00f0ff';
            }
        }

        // 核心键盘触发
        handleKeyPress(code) {
            if (!this.isPlaying) return;
            if (code === 'KeyW' || code === 'Space') {
                this.executeJump();
            }
            if (code === 'KeyJ' || code === 'KeyL') {
                this.executeDash();
            }
        }

        // 触发跳跃
        executeJump() {
            if (!this.isPlaying || !this.player) return;
            // 一段跳 (在地面或土狼时间内)
            if (this.player.isGrounded || this.player.coyoteTimer > 0) {
                this.player.vy = this.player.jumpForce;
                this.player.isGrounded = false;
                this.player.coyoteTimer = 0;
                this.player.jumpCount = 1; // 记录已跳跃一次
                SoundFX.playJump();
                this.createDustBurst(this.player.x + 15, this.player.y + 40, '#00f0ff');
            }
            // 二段跳
            else if (this.player.jumpCount < 2) {
                this.player.vy = this.player.jumpForce * 0.9; // 稍微轻盈的二次起跳
                this.player.jumpCount = 2; // 锁定跳跃
                SoundFX.playJump();
                // 喷出粉紫色粒子特效
                this.createDustBurst(this.player.x + 15, this.player.y + 30, '#ff007f', 12);
            }
        }

        // 触发前冲
        executeDash() {
            if (!this.isPlaying || !this.player) return;
            if (this.player.dashCooldown <= 0 && !this.player.isDashing) {
                this.player.isDashing = true;
                this.player.dashTimer = 18;
                this.player.dashCooldown = 60;
                this.player.vy = 0;
                SoundFX.playDash();
                this.createDustBurst(this.player.x, this.player.y + 20, '#ff007f', 15);
            }
        }

        // 生成一段新区域（已彻底重构：基于屏幕实际坐标动态生成新平台，100%防止由于世界滚动导致的绝对远景死角）
        generateNextSegment() {
            // 1. 读取屏幕上当前存在的最后一个平台的实际右边缘
            let referenceX = 0;
            if (this.platforms.length > 0) {
                const lastPlat = this.platforms[this.platforms.length - 1];
                referenceX = lastPlat.x + lastPlat.width;
            } else {
                referenceX = 150; // 防御空数组状态
            }

            // 限制斜度波折程度，平滑高度跃变
            const yOffset = (Math.random() - 0.5) * 80;
            const nextY = Math.max(240, Math.min(480, this.platformYTrend + yOffset));
            const heightDiff = nextY - this.platformYTrend; // 负值代表向上爬，正值代表向下掉

            // 2. 高度-间距自适应耦合算法：向上高度差越多，最大间距就限制得越紧凑，100%确保物理可跳达
            let maxRandGap = 80;
            if (heightDiff < 0) {
                maxRandGap = Math.max(30, 80 - Math.abs(heightDiff) * 1.0);
            }

            // 计算最终间距：基于当前的速度进行小幅度的平滑伸缩
            const speedFactor = Math.min(this.gameSpeed * 4.0, 80);
            const gap = Math.random() * maxRandGap + 50 + speedFactor;

            this.platformYTrend = nextY;

            const platWidth = Math.random() * 140 + 120;
            const platX = referenceX + gap;
            const platY = this.platformYTrend;

            this.spawnPlatform(platX, platY, platWidth);

            // 动态生成金币
            const coinCount = Math.floor(Math.random() * 3) + 1;
            const coinSpacing = 28;
            for (let i = 0; i < coinCount; i++) {
                if (Math.random() > 0.1) {
                    this.entities.push({
                        type: 'coin',
                        x: platX + (platWidth / 2) - (coinCount * coinSpacing / 2) + (i * coinSpacing),
                        y: platY - 40 - Math.sin((i / coinCount) * Math.PI) * 20,
                        size: 8,
                        pulse: Math.random() * 10
                    });
                }
            }

            // 15% 概率生成功能道具
            if (Math.random() < 0.15) {
                const buffTypes = ['magnet', 'double', 'shield_box'];
                const selected = buffTypes[Math.floor(Math.random() * buffTypes.length)];
                this.entities.push({
                    type: 'powerup',
                    subtype: selected,
                    x: platX + platWidth / 2,
                    y: platY - 50,
                    size: 11,
                    pulse: 0
                });
            }

            // 在平台上随机生成障碍物
            if (this.gameSpeed > 7 && Math.random() < 0.45) {
                this.entities.push({
                    type: 'obstacle',
                    x: platX + Math.random() * (platWidth - 40) + 20,
                    y: platY - 14,
                    width: 22,
                    height: 22,
                    color: '#ff007f'
                });
            }

            // 高空下生成等离子飞弹
            if (this.gameSpeed > 9 && Math.random() < 0.3) {
                this.entities.push({
                    type: 'plasma_projectile',
                    x: platX + platWidth + 50,
                    y: platY - 100 - Math.random() * 100,
                    size: 10,
                    vy: (Math.random() - 0.5) * 3
                });
            }
        }

        spawnPlatform(x, y, w) {
            const h = 16;
            this.platforms.push({ x, y, width: w, height: h });
        }

        // 粒子发生器
        createDustBurst(x, y, color, count = 8) {
            count = Math.min(count, 8);
            for (let i = 0; i < count; i++) {
                this.particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6 - 2,
                    vy: (Math.random() - 0.5) * 6,
                    radius: Math.random() * 4 + 1.5,
                    color: color,
                    alpha: 1,
                    decay: Math.random() * 0.03 + 0.02,
                    blend: true
                });
            }
            if (this.particles.length > this.maxParticles) {
                this.particles.splice(0, this.particles.length - this.maxParticles);
            }
        }

        // 游戏核心循环：计算物理与逻辑
        updatePhysics() {
            this.distance += this.gameSpeed * 0.1;
            if (this.gameSpeed < this.maxSpeed) {
                this.gameSpeed += 0.0008;
            }

            // 1. 处理激活中的 Buff 计时器，当发生整秒跳变时刷新 UI (防静止 Bug)
            let buffTimerChanged = false;
            Object.keys(this.activeBuffs).forEach(key => {
                if (this.activeBuffs[key] > 0) {
                    const prevSec = Math.ceil(this.activeBuffs[key] / 60);
                    this.activeBuffs[key]--;
                    const nextSec = Math.ceil(this.activeBuffs[key] / 60);
                    if (prevSec !== nextSec) {
                        buffTimerChanged = true;
                    }
                }
            });
            if (buffTimerChanged) {
                this.updateBuffIndicators();
            }

            // 2. 玩家状态
            this.player.dashCooldown = Math.max(0, this.player.dashCooldown - 1);
            if (this.player.isDashing) {
                this.player.dashTimer--;
                this.player.vy = 0;
                // 跑酷冲刺残影
                if (this.player.dashTimer % 2 === 0) {
                    this.particles.push({
                        x: this.player.x,
                        y: this.player.y,
                        vx: -this.gameSpeed * 0.5,
                        vy: 0,
                        radius: 8,
                        color: 'rgba(255, 0, 127, 0.4)',
                        alpha: 0.6,
                        decay: 0.05,
                        blend: true
                    });
                    if (this.particles.length > this.maxParticles) {
                        this.particles.shift();
                    }
                }
                if (this.player.dashTimer <= 0) {
                    this.player.isDashing = false;
                }
            } else {
                this.player.vy += this.player.gravity;
                if (this.player.vy > 14) this.player.vy = 14;
            }

            this.player.y += this.player.vy;

            // 3. 土狼时间处理
            if (this.player.isGrounded) {
                this.player.coyoteTimer = 8;
            } else {
                this.player.coyoteTimer = Math.max(0, this.player.coyoteTimer - 1);
            }

            // 4. 世界平滑向左滚动
            for (let i = 0; i < this.platforms.length; i++) {
                this.platforms[i].x -= this.gameSpeed;
            }
            for (let i = 0; i < this.entities.length; i++) {
                this.entities[i].x -= this.gameSpeed;
            }

            this.compactWorldArrays();

            // 5. 补充生成新平台
            while (this.platforms.length < 8) {
                this.generateNextSegment();
            }

            // 6. 核心物理检测：落脚平台
            let previouslyGrounded = this.player.isGrounded;
            this.player.isGrounded = false;

            for (let i = 0; i < this.platforms.length; i++) {
                const p = this.platforms[i];
                if (this.player.x + this.player.width > p.x &&
                    this.player.x < p.x + p.width) {

                    if (this.player.y + this.player.height >= p.y &&
                        this.player.vy >= 0 &&
                        this.player.y + this.player.height - this.player.vy <= p.y + 8) {

                        this.player.y = p.y - this.player.height;
                        this.player.vy = 0;
                        this.player.isGrounded = true;
                        this.player.jumpCount = 0; // 落地时重置跳跃次数，保证再次起跳/双击二段跳正常工作

                        if (!previouslyGrounded) {
                            this.createDustBurst(this.player.x + 15, this.player.y + 40, 'rgba(0, 240, 255, 0.6)');
                        }
                    }
                }
            }

            // 7. 碰撞检测（采用倒序 for 循环，杜绝 splice 后的索引漂移 Bug）
            for (let i = this.entities.length - 1; i >= 0; i--) {
                const ent = this.entities[i];

                if (ent.type === 'plasma_projectile') {
                    ent.y += ent.vy;
                    if (ent.y < 50 || ent.y > this.renderHeight - 50) ent.vy = -ent.vy;
                }

                // 道具磁吸
                if (this.activeBuffs.magnet > 0 && (ent.type === 'coin' || ent.type === 'powerup')) {
                    const dx = this.player.x + 15 - ent.x;
                    const dy = this.player.y + 22 - ent.y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq > 0.01 && distSq < 40000) {
                        const pull = 11 / Math.sqrt(distSq);
                        ent.x += dx * pull;
                        ent.y += dy * pull;
                    }
                }

                // 碰撞体积计算
                const entWidth = ent.width || ent.size * 2 || 20;
                const entHeight = ent.height || ent.size * 2 || 20;
                const entX = ent.type === 'coin' || ent.type === 'plasma_projectile' || ent.type === 'powerup' ? ent.x - entWidth/2 : ent.x;
                const entY = ent.type === 'coin' || ent.type === 'plasma_projectile' || ent.type === 'powerup' ? ent.y - entHeight/2 : ent.y;

                if (this.player.x + this.player.width > entX &&
                    this.player.x < entX + entWidth &&
                    this.player.y + this.player.height > entY &&
                    this.player.y < entY + entHeight) {

                    if (ent.type === 'coin') {
                        let gain = this.activeBuffs.double > 0 ? 20 : 10;
                        this.score += gain;
                        this.setScore(this.score);
                        SoundFX.playCoin();
                        this.createDustBurst(ent.x, ent.y, '#ffd166', 5);
                        this.removeEntityAt(i);
                    }
                    else if (ent.type === 'powerup') {
                        SoundFX.playPowerup();
                        this.triggerPowerup(ent.subtype);
                        this.removeEntityAt(i);
                    }
                    else if (ent.type === 'obstacle' || ent.type === 'plasma_projectile') {
                        this.triggerDamageHit(ent, i);
                        if (!this.isPlaying) return;
                    }
                }
            }

            // 清理无用越界道具
            this.compactWorldArrays();

            // 8. 深渊坠毁
            if (this.player.y > this.renderHeight) {
                this.triggerFatalFall();
                return;
            }

            // 9. 更新粒子，原地压缩避免频繁 splice 触发数组搬移
            this.compactParticles();

            // 背景星流动
            for (let i = 0; i < this.backgroundStars.length; i++) {
                const star = this.backgroundStars[i];
                star.x -= star.speed * (this.gameSpeed * 0.2);
                if (star.x < 0) {
                    star.x = this.renderWidth;
                    star.y = Math.random() * this.renderHeight;
                }
            }
        }

        // 触发道具效果
        triggerPowerup(type) {
            if (type === 'magnet') {
                this.activeBuffs.magnet = 360;
            } else if (type === 'double') {
                this.activeBuffs.double = 360;
            } else if (type === 'shield_box') {
                if (this.shields < 5) {
                    this.shields++;
                    this.updateShieldsHUD();
                }
                this.activeBuffs.invincible = 120;
            }
            this.updateBuffIndicators();
            this.createDustBurst(this.player.x + 15, this.player.y + 20, '#39ff14', 12);
        }

        updateBuffIndicators() {
            const magnetSeconds = Math.ceil(this.activeBuffs.magnet / 60);
            const doubleSeconds = Math.ceil(this.activeBuffs.double / 60);
            const invincibleSeconds = Math.ceil(this.activeBuffs.invincible / 60);
            const signature = `${magnetSeconds}|${doubleSeconds}|${invincibleSeconds}`;
            if (signature === this.lastBuffSignature) return;
            this.lastBuffSignature = signature;

            let html = '';

            if (this.activeBuffs.magnet > 0) {
                html += `
                    <div class="buff-icon" style="border-color: var(--secondary)">
                        <i data-lucide="magnet" style="color: var(--secondary); width: 14px;"></i>
                        <span>高磁重力场: ${magnetSeconds}s</span>
                    </div>
                `;
            }
            if (this.activeBuffs.double > 0) {
                html += `
                    <div class="buff-icon" style="border-color: var(--warning)">
                        <i data-lucide="sparkles" style="color: var(--warning); width: 14px;"></i>
                        <span>双倍超载: ${doubleSeconds}s</span>
                    </div>
                `;
            }
            if (this.activeBuffs.invincible > 0) {
                html += `
                    <div class="buff-icon" style="border-color: var(--success)">
                        <i data-lucide="shield" style="color: var(--success); width: 14px;"></i>
                        <span>量子屏障: ${invincibleSeconds}s</span>
                    </div>
                `;
            }
            this.ui.buffs.innerHTML = html;
            safeCreateIcons();
        }

        // 遭受障碍撞击
        triggerDamageHit(ent, entIndex) {
            if (this.player.isDashing || this.activeBuffs.invincible > 0) {
                this.createDustBurst(ent.x, ent.y, ent.color || '#ff007f', 15);
                this.removeEntityAt(entIndex);
                SoundFX.playHit();
                this.score += 30;
                this.setScore(this.score);
                return;
            }

            this.shields--;
            this.updateShieldsHUD();
            this.removeEntityAt(entIndex);
            SoundFX.playHit();

            clearTimeout(this.damageFlashTimer);
            this.ui.damageFlash.style.opacity = '1';
            this.damageFlashTimer = setTimeout(() => {
                this.ui.damageFlash.style.opacity = '0';
            }, 150);

            this.createDustBurst(this.player.x + 15, this.player.y + 22, '#ff007f', 20);

            this.activeBuffs.invincible = 90;
            this.updateBuffIndicators();

            if (this.shields <= 0) {
                this.endGame();
            }
        }

        triggerFatalFall() {
            this.shields = 0;
            this.updateShieldsHUD();
            this.endGame();
        }

        endGame() {
            if (this.isGameOver) return;
            this.isGameOver = true;
            this.isPlaying = false;
            SoundFX.playHit();

            if (this.score > this.bestScore) {
                this.bestScore = this.score;
                localStorage.setItem('neonleap_best', this.bestScore);
                this.setBestScore(this.bestScore);
            }

            this.ui.finalScore.textContent = this.score;
            this.ui.finalBest.textContent = this.bestScore;

            clearTimeout(this.gameOverTimer);
            this.gameOverTimer = setTimeout(() => {
                if (this.isGameOver) {
                    this.ui.gameover.classList.remove('hidden');
                }
            }, 600);
        }

        // --- 核心霓虹视觉渲染逻辑 ---
        draw() {
            this.ctx.fillStyle = '#05070f';
            this.ctx.fillRect(0, 0, this.renderWidth, this.renderHeight);

            // 静态/动态深空星辰层
            this.ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            for (let i = 0; i < this.backgroundStars.length; i++) {
                const star = this.backgroundStars[i];
                this.ctx.fillRect(star.x, star.y, star.size, star.size);
            }

            this.ctx.save();

            // 1. 渲染平台（霓虹发光）
            this.ctx.shadowBlur = 5;
            this.ctx.shadowColor = 'rgba(0, 240, 255, 0.3)';
            for (let i = 0; i < this.platforms.length; i++) {
                const p = this.platforms[i];
                if (p.x > this.renderWidth || p.x + p.width < 0) continue;
                this.ctx.shadowBlur = 5;
                this.ctx.shadowColor = 'rgba(0, 240, 255, 0.3)';

                this.ctx.strokeStyle = '#00f0ff';
                this.ctx.lineWidth = 2.5;
                this.ctx.strokeRect(p.x, p.y, p.width, p.height);

                this.ctx.fillStyle = 'rgba(10, 18, 40, 0.9)';
                this.ctx.fillRect(p.x, p.y, p.width, p.height);

                this.ctx.fillStyle = 'rgba(0, 240, 255, 0.05)';
                this.ctx.fillRect(p.x, p.y + p.height, p.width, 20);
            }

            // 2. 渲染各种实体
            for (let i = 0; i < this.entities.length; i++) {
                const ent = this.entities[i];
                const cullSize = ent.width || ent.size * 3 || 32;
                if (ent.x + cullSize < 0 || ent.x - cullSize > this.renderWidth) continue;
                this.ctx.shadowBlur = 7;

                if (ent.type === 'coin') {
                    ent.pulse += 0.07;
                    const animatedSize = ent.size + Math.sin(ent.pulse) * 1.5;
                    this.ctx.shadowColor = '#ffd166';

                    this.ctx.beginPath();
                    this.ctx.arc(ent.x, ent.y, animatedSize, 0, Math.PI * 2);
                    this.ctx.fillStyle = 'rgba(255, 209, 102, 0.25)';
                    this.ctx.fill();
                    this.ctx.strokeStyle = '#ffd166';
                    this.ctx.lineWidth = 2;
                    this.ctx.stroke();

                    this.ctx.beginPath();
                    this.ctx.arc(ent.x, ent.y, animatedSize * 0.4, 0, Math.PI * 2);
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.fill();
                }
                else if (ent.type === 'powerup') {
                    ent.pulse += 0.05;
                    const offset = Math.sin(ent.pulse) * 4;
                    this.ctx.shadowColor = '#39ff14';

                    this.ctx.beginPath();
                    this.ctx.arc(ent.x, ent.y + offset, ent.size, 0, Math.PI * 2);
                    this.ctx.strokeStyle = '#39ff14';
                    this.ctx.lineWidth = 2;
                    this.ctx.stroke();

                    this.ctx.fillStyle = 'rgba(57, 255, 20, 0.1)';
                    this.ctx.fill();

                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.font = 'bold 10px sans-serif';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    let label = 'U';
                    if (ent.subtype === 'magnet') label = 'M';
                    if (ent.subtype === 'double') label = '2X';
                    if (ent.subtype === 'shield_box') label = '🛡️';
                    this.ctx.fillText(label, ent.x, ent.y + offset);
                }
                else if (ent.type === 'obstacle') {
                    this.ctx.shadowColor = '#ff007f';
                    this.ctx.beginPath();
                    this.ctx.moveTo(ent.x, ent.y + ent.height);
                    this.ctx.lineTo(ent.x + ent.width / 2, ent.y);
                    this.ctx.lineTo(ent.x + ent.width, ent.y + ent.height);
                    this.ctx.closePath();

                    this.ctx.fillStyle = 'rgba(255, 0, 127, 0.25)';
                    this.ctx.fill();
                    this.ctx.strokeStyle = '#ff007f';
                    this.ctx.lineWidth = 2;
                    this.ctx.stroke();
                }
                else if (ent.type === 'plasma_projectile') {
                    this.ctx.shadowColor = '#9b59b6';
                    this.ctx.beginPath();
                    this.ctx.arc(ent.x, ent.y, ent.size * 1.25, 0, Math.PI * 2);
                    this.ctx.fillStyle = 'rgba(155, 89, 182, 0.28)';
                    this.ctx.fill();
                    this.ctx.beginPath();
                    this.ctx.arc(ent.x, ent.y, ent.size * 0.58, 0, Math.PI * 2);
                    this.ctx.fillStyle = '#d6a2e8';
                    this.ctx.fill();
                }
            }

            // 3. 渲染拖尾粒子系统
            for (let i = 0; i < this.particles.length; i++) {
                const p = this.particles[i];
                if (p.x + p.radius < 0 || p.x - p.radius > this.renderWidth) continue;
                this.ctx.shadowBlur = p.blend ? 3 : 0;
                this.ctx.shadowColor = p.color;
                this.ctx.fillStyle = p.color;
                this.ctx.globalAlpha = p.alpha;
                this.ctx.beginPath();
                this.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                this.ctx.fill();
            }
            this.ctx.globalAlpha = 1.0;

            // 4. 绘制玩家战甲
            if (this.player) {
                this.player.colorPulse += 0.1;
                let playerHue = this.activeBuffs.invincible > 0 ? (this.renderTime / 3) % 360 : this.player.hue;
                let activeColor = `hsla(${playerHue}, 100%, 65%, 1)`;

                this.ctx.shadowBlur = 8;
                this.ctx.shadowColor = activeColor;

                this.ctx.fillStyle = activeColor;
                this.ctx.beginPath();
                this.ctx.roundRect(this.player.x, this.player.y, this.player.width, this.player.height, 6);
                this.ctx.fill();

                this.ctx.fillStyle = '#ffffff';
                this.ctx.fillRect(this.player.x + 18, this.player.y + 8, 10, 5);

                if (!this.player.isGrounded && !this.player.isDashing) {
                    let engineFlameSize = 5 + Math.sin(this.player.colorPulse) * 4;
                    this.ctx.fillStyle = '#ff007f';
                    this.ctx.shadowColor = '#ff007f';
                    this.ctx.beginPath();
                    this.ctx.moveTo(this.player.x, this.player.y + 25);
                    this.ctx.lineTo(this.player.x - 12 - engineFlameSize, this.player.y + 29);
                    this.ctx.lineTo(this.player.x, this.player.y + 33);
                    this.ctx.closePath();
                    this.ctx.fill();
                }

                if (this.player.isDashing) {
                    this.ctx.strokeStyle = '#ffffff';
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();
                    this.ctx.arc(this.player.x + 15, this.player.y + 22, 28, -Math.PI/3, Math.PI/3);
                    this.ctx.stroke();
                }

                if (this.activeBuffs.invincible > 0) {
                    this.ctx.strokeStyle = '#39ff14';
                    this.ctx.lineWidth = 2.5;
                    this.ctx.shadowColor = '#39ff14';
                    this.ctx.beginPath();
                    this.ctx.arc(this.player.x + 15, this.player.y + 22, 34, 0, Math.PI * 2);
                    this.ctx.stroke();
                }
            }

            this.ctx.restore();
        }

        // 运行主循环
        updateIdleScene() {
            // 即使不开始游戏，背景星空和粒子也自动漂移（增加沉浸美感）
            for (let i = 0; i < this.backgroundStars.length; i++) {
                const star = this.backgroundStars[i];
                star.x -= star.speed * 1.2;
                if (star.x < 0) {
                    star.x = this.renderWidth;
                    star.y = Math.random() * this.renderHeight;
                }
            }
            this.compactParticles();
        }

        run(timestamp = 0) {
            if (!this.lastFrameTime) {
                this.lastFrameTime = timestamp;
            }

            const deltaMs = Math.min(timestamp - this.lastFrameTime, 100);
            this.lastFrameTime = timestamp;
            this.renderTime = timestamp;
            this.accumulatorMs += deltaMs;

            let steps = 0;
            while (this.accumulatorMs >= this.fixedStepMs && steps < 5) {
                if (this.isPlaying) {
                    this.updatePhysics();
                } else {
                    this.updateIdleScene();
                }
                this.accumulatorMs -= this.fixedStepMs;
                steps += 1;
            }

            if (steps === 5) {
                this.accumulatorMs = 0;
            }

            this.draw();
            requestAnimationFrame((nextTimestamp) => this.run(nextTimestamp));
        }
    }

    // 实例和全局绑定
    const app = new NeonLeapGame();
    window.neonLeapApp = app;
    requestAnimationFrame((timestamp) => app.run(timestamp));
</script>
