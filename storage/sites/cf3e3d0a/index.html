<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D城市发展大亨（修复版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            overflow: hidden;
            background: #eee;
        }
        #threeCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        .ui-panel {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 10;
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            max-width: 360px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .title {
            font-size: 22px;
            text-align: center;
            color: #222;
            margin-bottom: 15px;
        }
        .money-box {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .income {
            margin-top: 6px;
            color: #2e7d32;
            font-weight: bold;
        }
        .build-item {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            background: #f9f9f9;
        }
        .build-name {
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 5px;
        }
        .build-info {
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
        }
        .count {
            color: #e64a19;
            font-weight: bold;
        }
        .build-btn {
            width: 100%;
            padding: 8px;
            background: #2196f3;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .build-btn:hover {
            background: #1976d2;
        }
        .build-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="threeCanvas"></div>

    <div class="ui-panel">
        <h2 class="title">🏙️ 3D城市大亨（修复版）</h2>
        <div class="money-box">
            <div>💰 资金：<span id="money">100000000</span> 元</div>
            <div class="income">📈 每秒收益：<span id="income">0</span> 元</div>
        </div>
        <div id="buildList"></div>
    </div>

<!-- 稳定匹配版本 -->
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>

<script>
const game = {
    money: 100000000,
    incomePerSecond: 0,
    buildPosX: 0,
    buildPosZ: 0,
    buildings: [
        { name: "便民报刊亭", cost: 5000, income: 50, count: 0, size: {w:1,h:1,d:1}, color:0x8bc34a },
        { name: "单层居民房", cost: 20000, income: 200, count: 0, size: {w:2,h:2,d:2}, color:0xffc107 },
        { name: "路边便利店", cost: 80000, income: 800, count: 0, size: {w:2,h:2.5,d:2}, color:0xff9800 },
        { name: "小型商铺", cost: 300000, income: 3000, count: 0, size: {w:3,h:3,d:3}, color:0xff5722 },
        { name: "多层居民楼", cost: 800000, income: 8000, count: 0, size: {w:3,h:5,d:3}, color:0x9c27b0 },
        { name: "连锁超市", cost: 2000000, income: 20000, count: 0, size: {w:4,h:4,d:4}, color:0x673ab7 },
        { name: "低层写字楼", cost: 5000000, income: 50000, count: 0, size: {w:4,h:6,d:4}, color:0x3f51b5 },
        { name: "高档公寓楼", cost: 12000000, income: 120000, count: 0, size: {w:4,h:8,d:4}, color:0x2196f3 },
        { name: "中型商场", cost: 30000000, income: 300000, count: 0, size: {w:5,h:5,d:5}, color:0x009688 },
        { name: "高层写字楼", cost: 80000000, income: 800000, count: 0, size: {w:5,h:12,d:5}, color:0x00bcd4 },
        { name: "五星级酒店", cost: 200000000, income: 2000000, count: 0, size: {w:6,h:10,d:6}, color:0x00acc1 },
        { name: "超级商业中心", cost: 500000000, income: 5000000, count: 0, size: {w:7,h:14,d:7}, color:0x00838f }
    ]
};

let scene, camera, renderer, controls;

function init3D() {
    try {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 蓝天

        // 相机：位置拉远，正对原点
        camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            2000
        );
        camera.position.set(20, 25, 30);
        camera.lookAt(0, 0, 0); // 看向地面中心

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87ceeb);
        document.getElementById('threeCanvas').appendChild(renderer.domElement);

        // 控制器
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        // 地面
        const groundGeo = new THREE.PlaneGeometry(120, 120);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        // 灯光（很重要）
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(30, 50, 20);
        scene.add(dirLight);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
        console.log("3D 初始化成功");
    } catch (e) {
        console.error("3D初始化错误：", e);
        alert("3D初始化失败，请用现代浏览器（Chrome/Edge）打开");
    }
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

function createBuilding(buildCfg) {
    const geo = new THREE.BoxGeometry(buildCfg.size.w, buildCfg.size.h, buildCfg.size.d);
    const mat = new THREE.MeshLambertMaterial({ color: buildCfg.color });
    const building = new THREE.Mesh(geo, mat);

    building.position.set(game.buildPosX, buildCfg.size.h / 2, game.buildPosZ);
    scene.add(building);

    game.buildPosX += buildCfg.size.w + 2;
    if (game.buildPosX > 50) {
        game.buildPosX = 0;
        game.buildPosZ += 8;
    }
}

function formatNum(num) {
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

function buy(index) {
    const b = game.buildings[index];
    if (game.money >= b.cost) {
        game.money -= b.cost;
        b.count += 1;
        game.incomePerSecond += b.income;
        createBuilding(b);
        renderUI();
    }
}

function renderUI() {
    document.getElementById("money").innerText = formatNum(game.money);
    document.getElementById("income").innerText = formatNum(game.incomePerSecond);

    const list = document.getElementById("buildList");
    list.innerHTML = "";
    game.buildings.forEach((b, idx) => {
        const div = document.createElement("div");
        div.className = "build-item";
        div.innerHTML = `
            <div class="build-name">${b.name}</div>
            <div class="build-info">
                造价：${formatNum(b.cost)} 元<br>
                每秒收益：${formatNum(b.income)} 元<br>
                已有：<span class="count">${b.count}</span> 栋
            </div>
            <button class="build-btn" ${game.money < b.cost ? "disabled" : ""} onclick="buy(${idx})">建造</button>
        `;
        list.appendChild(div);
    });
}

setInterval(() => {
    game.money += game.incomePerSecond;
    renderUI();
}, 1000);

window.onload = function() {
    init3D();
    renderUI();
};
</script>
</body>
</html>
