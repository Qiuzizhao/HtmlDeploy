<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字猜猜猜 🎮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .desc {
            color: #666;
            margin-bottom: 25px;
            font-size: 15px;
        }

        .input-box {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            text-align: center;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .input-box:focus {
            border-color: #667eea;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px 25px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .reset-btn {
            background: #ff6b6b;
        }

        .reset-btn:hover {
            background: #ff5252;
        }

        .message {
            margin: 20px 0;
            font-size: 17px;
            font-weight: bold;
            min-height: 25px;
        }

        .count {
            color: #555;
            font-size: 15px;
        }

        .success {
            color: #2ecc71;
        }

        .warning {
            color: #f39c12;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>数字猜猜猜</h1>
        <p class="desc">我已经想好了 1~100 之间的一个数字，来猜猜看吧！</p>
        
        <input type="number" class="input-box" id="guessInput" placeholder="输入你的数字">
        <br>
        <button class="btn" onclick="checkGuess()">提交答案</button>
        <button class="btn reset-btn" onclick="resetGame()">重新开始</button>
        
        <div class="message" id="msg"></div>
        <p class="count">已猜次数：<span id="count">0</span></p>
    </div>

    <script>
        // 生成随机答案
        let answer = Math.floor(Math.random() * 100) + 1;
        let count = 0;

        // 检查猜测
        function checkGuess() {
            const input = document.getElementById('guessInput');
            const msg = document.getElementById('msg');
            const countText = document.getElementById('count');
            
            const userGuess = parseInt(input.value);

            // 输入验证
            if (isNaN(userGuess) || userGuess < 1 || userGuess > 100) {
                msg.textContent = '请输入 1~100 之间的有效数字！';
                msg.className = 'message warning';
                input.value = '';
                return;
            }

            // 计数+1
            count++;
            countText.textContent = count;

            // 判断结果
            if (userGuess === answer) {
                msg.textContent = `🎉 恭喜你猜对了！答案就是 ${answer}，一共猜了 ${count} 次！`;
                msg.className = 'message success';
            } else if (userGuess > answer) {
                msg.textContent = '🔽 猜大了，再小一点试试！';
                msg.className = 'message warning';
            } else {
                msg.textContent = '🔼 猜小了，再大一点试试！';
                msg.className = 'message warning';
            }

            input.value = '';
            input.focus();
        }

        // 重置游戏
        function resetGame() {
            answer = Math.floor(Math.random() * 100) + 1;
            count = 0;
            document.getElementById('count').textContent = 0;
            document.getElementById('msg').textContent = '';
            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').focus();
        }

        // 回车提交
        document.getElementById('guessInput').addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                checkGuess();
            }
        });
    </script>
</body>
</html>
