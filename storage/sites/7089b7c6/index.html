<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字陷阱 小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 35px 25px;
            border-radius: 16px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        h1 {
            color: #2d3748;
            font-size: 26px;
            margin-bottom: 25px;
        }

        .setting-box {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .setting-item label {
            font-size: 14px;
            color: #666;
            margin-bottom: 6px;
        }

        .setting-item input {
            width: 100px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            text-align: center;
        }

        .info-panel {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 16px;
            color: #444;
        }

        .tip-text {
            font-size: 18px;
            font-weight: bold;
            min-height: 28px;
            margin: 15px 0;
        }

        .safe {
            color: #22c55e;
        }

        .danger {
            color: #ef4444;
        }

        .input-area {
            margin: 20px 0;
        }

        #guessNum {
            width: 70%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        #guessNum:focus {
            border-color: #3b82f6;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        button {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        #startBtn {
            background-color: #3b82f6;
            color: #fff;
        }

        #submitBtn {
            background-color: #10b981;
            color: #fff;
        }

        #resetBtn {
            background-color: #f97316;
            color: #fff;
        }

        .history {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🕳️ 数字陷阱</h1>

        <!-- 难度设置区 -->
        <div class="setting-box">
            <div class="setting-item">
                <label>数字最大值</label>
                <input type="number" id="maxNum" value="50" min="10">
            </div>
            <div class="setting-item">
                <label>陷阱数量</label>
                <input type="number" id="trapCount" value="5" min="1">
            </div>
        </div>

        <button id="startBtn">开始游戏</button>

        <!-- 游戏信息 -->
        <div class="info-panel">
            <p id="rangeText">请先点击开始游戏</p>
            <p>已猜测次数：<span id="guessCount">0</span></p>
        </div>

        <!-- 提示文字 -->
        <div class="tip-text" id="tipText"></div>

        <!-- 答题输入框 -->
        <div class="input-area">
            <input type="number" id="guessNum" placeholder="输入你要猜的数字" disabled>
        </div>

        <!-- 按钮组 -->
        <div class="btn-group">
            <button id="submitBtn" disabled>确认猜测</button>
            <button id="resetBtn">重新开局</button>
        </div>

        <!-- 猜测记录 -->
        <div class="history">
            已猜数字：<span id="historyList">暂无</span>
        </div>
    </div>

    <script>
        // DOM 元素
        const maxNumInput = document.getElementById('maxNum');
        const trapCountInput = document.getElementById('trapCount');
        const startBtn = document.getElementById('startBtn');
        const rangeText = document.getElementById('rangeText');
        const guessCount = document.getElementById('guessCount');
        const tipText = document.getElementById('tipText');
        const guessNum = document.getElementById('guessNum');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const historyList = document.getElementById('historyList');

        // 游戏变量
        let maxNum = 0;
        let trapNumList = []; // 陷阱数字数组
        let trapCount = 0;
        let gameRunning = false;
        let totalGuess = 0;
        let guessHistory = [];

        // 生成随机陷阱数字（不重复）
        function createTraps(max, count) {
            trapNumList = [];
            // 范围 1 ~ max
            while (trapNumList.length < count) {
                let random = Math.floor(Math.random() * max) + 1;
                if (!trapNumList.includes(random)) {
                    trapNumList.push(random);
                }
            }
        }

        // 初始化游戏
        function initGame() {
            // 重置数据
            totalGuess = 0;
            guessHistory = [];
            gameRunning = false;
            tipText.innerText = '';
            tipText.className = 'tip-text';
            guessNum.value = '';
            guessCount.innerText = '0';
            historyList.innerText = '暂无';

            // 校验输入
            maxNum = parseInt(maxNumInput.value) || 50;
            trapCount = parseInt(trapCountInput.value) || 5;

            if (maxNum < 10) maxNum = 10;
            if (trapCount < 1) trapCount = 1;
            // 陷阱数不能超过总数字数量
            if (trapCount >= maxNum) trapCount = Math.floor(maxNum / 2);

            maxNumInput.value = maxNum;
            trapCountInput.value = trapCount;

            rangeText.innerText = `数字范围：1 ~ ${maxNum}，陷阱数量：${trapCount}`;
            guessNum.disabled = true;
            submitBtn.disabled = true;
        }

        // 开始游戏
        function startGame() {
            initGame();
            createTraps(maxNum, trapCount);
            gameRunning = true;

            guessNum.disabled = false;
            submitBtn.disabled = false;
            tipText.innerText = '游戏开始！请输入数字避开陷阱 🚀';
            guessNum.focus();
        }

        // 提交猜测
        function checkGuess() {
            if (!gameRunning) return;

            let num = parseInt(guessNum.value);
            if (isNaN(num) || num < 1 || num > maxNum) {
                tipText.innerText = `请输入 1 ~ ${maxNum} 范围内的有效数字！`;
                tipText.className = 'tip-text danger';
                return;
            }

            // 记录猜测
            totalGuess++;
            guessCount.innerText = totalGuess;
            guessHistory.push(num);
            historyList.innerText = guessHistory.join('、');

            // 判断是否踩到陷阱
            if (trapNumList.includes(num)) {
                tipText.innerText = `💥 踩到陷阱数字【${num}】！游戏结束！`;
                tipText.className = 'tip-text danger';
                gameRunning = false;
                guessNum.disabled = true;
                submitBtn.disabled = true;
            } else {
                tipText.innerText = `✅ 数字【${num}】安全，继续挑战！`;
                tipText.className = 'tip-text safe';
            }
            guessNum.value = '';
            guessNum.focus();
        }

        // 事件绑定
        startBtn.addEventListener('click', startGame);
        submitBtn.addEventListener('click', checkGuess);
        resetBtn.addEventListener('click', initGame);

        // 回车快捷提交
        guessNum.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                checkGuess();
            }
        });

        // 页面初始化
        window.onload = initGame;
    </script>
</body>
</html>
