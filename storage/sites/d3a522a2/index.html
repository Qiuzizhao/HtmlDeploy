<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>吃丹修仙 - 在线修仙游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #0c0a20, #1a1635);
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .title {
            text-align: center;
            font-size: 32px;
            color: #f6d365;
            margin: 20px 0;
            text-shadow: 0 0 10px #f6d365;
        }

        .info {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #6441a5, #2a0845);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin: 5px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #6441a5;
        }

        .btn-yellow {
            background: linear-gradient(90deg, #f7971e, #ffd200);
            color: #000;
            font-weight: bold;
        }

        .btn-red {
            background: linear-gradient(90deg, #e52d27, #b31217);
        }

        .dan-item {
            display: inline-block;
            width: 100px;
            text-align: center;
            background: rgba(255,255,255,0.07);
            border-radius: 8px;
            padding: 10px;
            margin: 6px;
        }

        .log {
            height: 180px;
            overflow-y: auto;
            background: #111;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        .log::-webkit-scrollbar { width: 6px; }
        .log::-webkit-scrollbar-thumb { background: #666; border-radius: 3px; }

        .state {
            color: #00ffcc;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🍀 吃丹修仙</h1>

        <div class="info">
            <div>境界：<span id="realm" class="state">练气一层</span></div>
            <div>修为：<span id="exp">0</span></div>
            <div>战力：<span id="power">100</span></div>
            <div>灵石：<span id="coin">1000</span></div>
        </div>

        <div class="card">
            <h3>🌿 背包丹药</h3>
            <div id="bag" style="margin-top:10px; display:flex; flex-wrap:wrap;"></div>
        </div>

        <div class="card">
            <h3>⚔️ 修仙操作</h3>
            <button class="btn btn-yellow" onclick="getDan()">采集丹药</button>
            <button class="btn" onclick="breakThrough()">突破境界</button>
            <button class="btn" onclick="fight()">挑战怪物</button>
            <button class="btn-red" onclick="resetGame()">重置修仙</button>
        </div>

        <div class="card">
            <h3>📜 修仙日志</h3>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script>
        // 游戏数据
        let game = {
            exp: 0,
            power: 100,
            coin: 1000,
            realm: "练气一层",
            realmLevel: 1,
            bag: {
                "气血丹": 5,
                "灵力丹": 3,
                "倍率丹": 2,
                "九转仙丹": 1
            }
        };

        const realms = [
            "练气一层","练气二层","练气三层","练气四层","练气五层",
            "筑基初期","筑基中期","筑基后期",
            "金丹初期","金丹中期","金丹后期",
            "元婴初期","元婴中期","元婴后期",
            "化神期","炼虚期","合体期","大乘期","飞升"
        ];

        // 界面刷新
        function refresh() {
            document.getElementById("exp").innerText = game.exp;
            document.getElementById("power").innerText = game.power;
            document.getElementById("coin").innerText = game.coin;
            document.getElementById("realm").innerText = game.realm;
            renderBag();
        }

        // 渲染背包
        function renderBag() {
            let dom = "";
            for (let name in game.bag) {
                let cnt = game.bag[name];
                dom += `
                <div class="dan-item">
                    <div>${name}</div>
                    <div>x${cnt}</div>
                    <button class="btn" style="padding:4px 8px; font-size:12px; margin-top:5px" onclick="useDan('${name}')">服用</button>
                </div>`;
            }
            document.getElementById("bag").innerHTML = dom;
        }

        // 服用丹药
        function useDan(name) {
            if (game.bag[name] <= 0) {
                addLog("❌ 没有" + name + "了！");
                return;
            }
            game.bag[name]--;

            let add = 0;
            let msg = "";

            switch (name) {
                case "气血丹":
                    add = 20;
                    game.power += add;
                    msg = `服用气血丹，战力 +${add}`;
                    break;
                case "灵力丹":
                    add = 50;
                    game.exp += add;
                    msg = `服用灵力丹，修为 +${add}`;
                    break;
                case "倍率丹":
                    add = 5;
                    game.power = Math.floor(game.power * 1.05);
                    msg = "服用倍率丹，全属性小幅提升！";
                    break;
                case "九转仙丹":
                    add = 500;
                    game.power += add;
                    game.exp += 200;
                    msg = `服用九转仙丹！战力 +${add}，修为暴涨！`;
                    break;
            }

            addLog("✅ " + msg);
            refresh();
        }

        // 采集丹药
        function getDan() {
            const pool = ["气血丹", "灵力丹", "倍率丹", "九转仙丹"];
            const rand = Math.random();
            let get;

            if (rand < 0.5) get = "气血丹";
            else if (rand < 0.8) get = "灵力丹";
            else if (rand < 0.95) get = "倍率丹";
            else get = "九转仙丹";

            game.bag[get]++;
            addLog("🌿 你采集到了【" + get + "】x1");
            refresh();
        }

        // 突破境界
        function breakThrough() {
            let nextLv = game.realmLevel + 1;
            if (nextLv >= realms.length) {
                addLog("🎉 你已经飞升成仙，天下无敌！");
                return;
            }

            let needExp = game.realmLevel * 100;
            if (game.exp < needExp) {
                addLog(`❌ 突破需要 ${needExp} 修为，你的修为不足！`);
                return;
            }

            game.exp -= needExp;
            game.power += Math.floor(game.power * 0.2);
            game.realmLevel = nextLv;
            game.realm = realms[nextLv - 1];
            addLog(`🎉 突破成功！进入【${game.realm}】，战力大幅提升！`);
            refresh();
        }

        // 挑战怪物
        function fight() {
            let monsterPower = 200 + (game.realmLevel * 80);
            if (game.power >= monsterPower) {
                let winExp = Math.floor(Math.random() * 100) + 50;
                let winCoin = Math.floor(Math.random() * 200) + 100;
                game.exp += winExp;
                game.coin += winCoin;
                addLog(`⚔️ 胜利！获得 ${winExp} 修为，${winCoin} 灵石`);
            } else {
                addLog(`❌ 挑战失败，你的战力不足！`);
            }
            refresh();
        }

        // 日志
        function addLog(text) {
            let log = document.getElementById("log");
            log.innerHTML += "[" + new Date().toLocaleTimeString() + "] " + text + "<br>";
            log.scrollTop = log.scrollHeight;
        }

        // 重置
        function resetGame() {
            if (!confirm("确定要重置修仙吗？所有进度清空！")) return;
            game = {
                exp: 0,
                power: 100,
                coin: 1000,
                realm: "练气一层",
                realmLevel: 1,
                bag: {
                    "气血丹": 5,
                    "灵力丹": 3,
                    "倍率丹": 2,
                    "九转仙丹": 1
                }
            };
            addLog("🔄 修仙已重置");
            refresh();
        }

        // 初始化
        refresh();
        addLog("🎮 欢迎来到吃丹修仙世界，开始你的修仙之路！");
    </script>
</body>
</html>
