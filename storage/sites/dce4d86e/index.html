<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素打砖块 · 终极版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #11141a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            background: #1a1f29;
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05);
            border: 2px solid #2c3e50;
        }
        canvas {
            background: #0d1117;
            display: block;
            border-radius: 8px;
            cursor: none; /* 在游戏区域隐藏鼠标指针 */
        }
        .ui-layer {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: bold;
            color: #8b9bb4;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .ui-layer span {
            color: #00ffcc;
        }
        .screen {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 480px;
            height: 600px;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            z-index: 10;
        }
        h2 {
            font-size: 32px;
            margin: 0 0 10px 0;
            color: #fff;
            text-shadow: 0 0 10px rgba(0,255,204,0.5);
        }
        p {
            color: #8b9bb4;
            margin: 0 0 20px 0;
            font-size: 14px;
        }
        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #00ffcc, #0099ff);
            color: #0d1117;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,255,204,0.4);
            transition: all 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,255,204,0.6);
        }
        #startScreen { display: flex; }
        #gameOverScreen { display: none; }
        #winScreen { display: none; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="ui-layer">
        <div>分数: <span id="score">0</span></div>
        <div>关卡: <span id="level">1/3</span></div>
        <div>生命: <span id="lives">❤️❤️❤️</span></div>
    </div>

    <canvas id="gameCanvas" width="480" height="600"></canvas>

    <div id="startScreen" class="screen">
        <h2>像素打砖块</h2>
        <p>移动鼠标控制挡板，接住弹球并消灭所有砖块！</p>
        <button onclick="startGame()">开始游戏</button>
    </div>

    <div id="gameOverScreen" class="screen">
        <h2 style="color: #ff4757; text-shadow: 0 0 10px rgba(255,71,87,0.5);">游戏结束</h2>
        <p>最终得分: <span id="finalScore" style="color: #fff; font-weight: bold;">0</span></p>
        <button onclick="restartGame()">再试一次</button>
    </div>

    <div id="winScreen" class="screen">
        <h2 style="color: #2ed573; text-shadow: 0 0 10px rgba(46,213,115,0.5);">完美通关！</h2>
        <p>传奇诞生！你成功摧毁了所有维度的砖块！</p>
        <button onclick="restartGame()">重新挑战</button>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// UI 元素
const scoreEl = document.getElementById("score");
const levelEl = document.getElementById("level");
const livesEl = document.getElementById("lives");
const startScreen = document.getElementById("startScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const winScreen = document.getElementById("winScreen");
const finalScoreEl = document.getElementById("finalScore");

// 8-Bit 算法音效系统 (Web Audio API)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'hit') { // 撞击砖块
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'paddle') { // 撞击挡板
        osc.type = 'sine';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        osc.start(); osc.stop(audioCtx.currentTime + 0.08);
    } else if (type === 'lose') { // 掉落丢命
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'win') { // 胜利音效
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
        osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }
}

// 游戏核心配置
let score = 0;
let lives = 3;
let currentLevel = 1;
const maxLevels = 3;
let gameState = "menu"; // menu, playing, gameover, win

// 挡板配置
const paddle = {
    width: 90,
    height: 13,
    x: (canvas.width - 90) / 2,
    y: canvas.height - 40,
    color: "#00ffcc",
    targetX: (canvas.width - 90) / 2 // 用于平滑鼠标跟随
};

// 弹球配置
const ball = {
    x: canvas.width / 2,
    y: canvas.height - 60,
    radius: 7,
    speed: 5,
    dx: 4,
    dy: -4,
    color: "#ffffff"
};

// 砖块矩阵配置
const brickConfig = {
    rowCounts: [3, 4, 5], // 不同关卡的行数
    colCount: 6,
    width: 65,
    height: 20,
    padding: 8,
    offsetTop: 60,
    offsetLeft: 23
};
let bricks = [];

// 粒子特效系统 (消除砖块时的碎片)
let particles = [];
function createParticles(x, y, color) {
    for (let i = 0; i < 8; i++) {
        particles.push({
            x: x,
            y: y,
            dx: (Math.random() - 0.5) * 6,
            dy: (Math.random() - 0.5) * 6,
            radius: Math.random() * 3 + 1,
            color: color,
            alpha: 1,
            decay: Math.random() * 0.03 + 0.02
        });
    }
}

// 关卡地图生成 (根据关卡返回不同的耐撞度和颜色)
function initBricks() {
    bricks = [];
    const rows = brickConfig.rowCounts[currentLevel - 1];
    const colors = ["#ff4757", "#ffa502", "#2ed573", "#1e90ff", "#9b59b6"];
    
    for (let r = 0; r < rows; r++) {
        bricks[r] = [];
        for (let c = 0; c < brickConfig.colCount; c++) {
            // 关卡2和3加入不同血量的砖块逻辑（这里简单用颜色和分值区分）
            bricks[r][c] = { 
                x: 0, 
                y: 0, 
                status: 1, 
                color: colors[r % colors.length],
                points: (rows - r) * 10
            };
        }
    }
}

// 监听鼠标控制挡板
canvas.addEventListener("mousemove", (e) => {
    const relativeX = e.clientX - canvas.getBoundingClientRect().left;
    if (relativeX > 0 && relativeX < canvas.width) {
        paddle.targetX = relativeX - paddle.width / 2;
    }
});

// 核心控制器
function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    startScreen.style.display = "none";
    gameState = "playing";
    resetLevel(1);
}

function restartGame() {
    gameOverScreen.style.display = "none";
    winScreen.style.display = "none";
    score = 0;
    lives = 3;
    scoreEl.innerText = score;
    updateLivesUI();
    gameState = "playing";
    resetLevel(1);
}

function resetLevel(lvl) {
    currentLevel = lvl;
    levelEl.innerText = `${currentLevel}/${maxLevels}`;
    initBricks();
    resetBallAndPaddle();
}

function resetBallAndPaddle() {
    paddle.x = (canvas.width - paddle.width) / 2;
    paddle.targetX = paddle.x;
    ball.x = canvas.width / 2;
    ball.y = paddle.y - ball.radius - 5;
    // 随关卡提高球的初始基础速度
    const baseSpeed = 4 + currentLevel;
    ball.dx = baseSpeed * (Math.random() > 0.5 ? 1 : -1) * 0.7;
    ball.dy = -baseSpeed;
}

function updateLivesUI() {
    livesEl.innerText = "❤️".repeat(Math.max(0, lives)) || "无";
}

// 物理碰撞与状态更新
function update() {
    if (gameState !== "playing") return;

    // 1. 缓动平滑移动挡板，使其更有操作手感
    paddle.x += (paddle.targetX - paddle.x) * 0.3;
    if (paddle.x < 0) paddle.x = 0;
    if (paddle.x > canvas.width - paddle.width) paddle.x = canvas.width - paddle.width;

    // 2. 移动弹球
    ball.x += ball.dx;
    ball.y += ball.dy;

    // 3. 墙壁碰撞检测 (左右)
    if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
        ball.dx = -ball.dx;
        playSound('paddle');
    }
    // 墙壁碰撞检测 (上)
    if (ball.y + ball.dy < ball.radius) {
        ball.dy = -ball.dy;
        playSound('paddle');
    }

    // 4. 挡板碰撞检测
    if (ball.y + ball.radius >= paddle.y && ball.y - ball.radius <= paddle.y + paddle.height) {
        if (ball.x >= paddle.x && ball.x <= paddle.x + paddle.width) {
            // 根据球撞击挡板的位置，计算反弹角度（撞两边角度大，撞中间垂直弹）
            let collidePoint = ball.x - (paddle.x + paddle.width / 2);
            collidePoint = collidePoint / (paddle.width / 2); // 归一化为 -1 到 1
            
            let angle = collidePoint * (Math.PI / 3); // 最大反弹角 60 度
            const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
            
            ball.dx = speed * Math.sin(angle);
            ball.dy = -speed * Math.cos(angle);
            
            // 确保球在受到极大角度折射时也有向上的速度，避免贴地死循环
            if(Math.abs(ball.dy) < 1.5) ball.dy = -1.5; 

            playSound('paddle');
        }
    }

    // 5. 落地检测 (丢命)
    if (ball.y + ball.radius > canvas.height) {
        lives--;
        updateLivesUI();
        playSound('lose');
        if (lives <= 0) {
            gameState = "gameover";
            finalScoreEl.innerText = score;
            gameOverScreen.style.display = "flex";
        } else {
            resetBallAndPaddle();
        }
    }

    // 6. 砖块碰撞检测
    let allDestroyed = true;
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < brickConfig.colCount; c++) {
            const b = bricks[r][c];
            if (b.status === 1) {
                allDestroyed = false; // 只要还有一块就没赢
                
                // 简单的 AABB 碰撞检测
                if (ball.x + ball.radius > b.x && ball.x - ball.radius < b.x + brickConfig.width &&
                    ball.y + ball.radius > b.y && ball.y - ball.radius < b.y + brickConfig.height) {
                    
                    ball.dy = -ball.dy;
                    b.status = 0; // 摧毁砖块
                    score += b.points;
                    scoreEl.innerText = score;
                    
                    // 生成爆炸粒子
                    createParticles(b.x + brickConfig.width/2, b.y + brickConfig.height/2, b.color);
                    playSound('hit');
                }
            }
        }
    }

    // 7. 检查是否进入下一关或通关
    if (allDestroyed) {
        if (currentLevel < maxLevels) {
            playSound('win');
            resetLevel(currentLevel + 1);
        } else {
            gameState = "win";
            playSound('win');
            winScreen.style.display = "flex";
        }
    }

    // 8. 更新粒子系统
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.dx;
        p.y += p.dy;
        p.alpha -= p.decay;
        if (p.alpha <= 0) {
            particles.splice(i, 1);
        }
    }
}

// 渲染图形
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); // 清屏

    // 1. 绘制砖块
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < brickConfig.colCount; c++) {
            if (bricks[r][c].status === 1) {
                const brickX = c * (brickConfig.width + brickConfig.padding) + brickConfig.offsetLeft;
                const brickY = r * (brickConfig.height + brickConfig.padding) + brickConfig.offsetTop;
                bricks[r][c].x = brickX;
                bricks[r][c].y = brickY;
                
                // 绘制带圆角的渐变砖块
                ctx.fillStyle = bricks[r][c].color;
                ctx.beginPath();
                ctx.roundRect(brickX, brickY, brickConfig.width, brickConfig.height, 4);
                ctx.fill();
                // 砖块高光边框线
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
    }

    // 2. 绘制挡板
    ctx.fillStyle = paddle.color;
    ctx.shadowBlur = 15;
    ctx.shadowColor = paddle.color; // 挡板霓虹霓虹发光特效
    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 6);
    ctx.fill();
    ctx.shadowBlur = 0; // 重置阴影，避免影响后续绘制

    // 3. 绘制弹球
    ctx.fillStyle = ball.color;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.closePath();

    // 4. 绘制消除粒子
    particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    });
}

// 游戏主循环
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// 初始化结构但先不运行物理，等待玩家点击
initBricks();
gameLoop();
</script>

</body>
</html>
