<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>三年暗恋 · 江禹封视角（升级版）</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"微软雅黑","黑体",sans-serif;
        }

        body{
            background:#f6f9fc;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .game-box{
            width:100%;
            max-width:600px;
            background:white;
            border-radius:16px;
            box-shadow:0 8px 30px rgba(0,0,0,0.1);
            overflow:hidden;
        }

        .header{
            background:#425a70;
            color:white;
            padding:18px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
        }

        .scene{
            padding:20px;
            color:#333;
            min-height:120px;
            background:#fdfefe;
            font-size:16px;
            line-height:1.7;
        }

        .name{
            font-weight:bold;
            margin-bottom:6px;
        }

        .yu{
            color:#2c3e50;
        }

        .tang{
            color:#e74c3c;
        }

        .dialog{
            padding:14px 20px;
            background:#f8f9fa;
            border-left:4px solid #425a70;
            margin:10px 0;
            border-radius:8px;
        }

        .choices{
            display:flex;
            flex-direction:column;
            gap:10px;
            padding:20px;
        }

        .btn{
            padding:14px;
            border:none;
            border-radius:10px;
            background:#425a70;
            color:white;
            font-size:15px;
            cursor:pointer;
            transition:0.2s;
        }

        .btn:hover{
            background:#33475b;
        }

        .ending{
            text-align:center;
            padding:30px 20px;
            font-size:17px;
            color:#425a70;
            font-weight:bold;
            line-height:1.8;
        }

        .hide{
            display:none;
        }
    </style>
</head>

<body>
<div class="game-box">
    <div class="header">三年暗恋 · 江禹封视角（升级版）</div>
    <div class="scene" id="scene">
        我是江禹封。
        <br>
        别人都觉得我冷淡、难接近。
        <br>
        只有我自己知道，我已经默默喜欢凌雨棠……三年了。
    </div>

    <div class="choices" id="choices">
        <button class="btn" onclick="start()">开始与凌雨棠的相遇</button>
    </div>
</div>

<script>
    let scene = document.getElementById('scene');
    let choices = document.getElementById('choices');

    function clean(){
        scene.innerHTML = '';
        choices.innerHTML = '';
    }

    // 开头
    function start(){
        clean();
        scene.innerHTML = `
        <div class="name tang">凌雨棠（笑着挥手）</div>
        <div class="dialog">江禹封！早上好呀！</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p1()">嗯，早。（冷淡）</button>
        <button class="btn" onclick="p2()">……（假装没听见，心跳却很快）</button>
        `;
    }

    // 1. 早上打招呼
    function p1(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">我只敢发出最简单的声音，怕多说一句就暴露情绪。</div>
        <div class="name tang">凌雨棠</div>
        <div class="dialog">你今天还是这么酷～一起去教室吗？</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p3()">……好。</button>
        <button class="btn" onclick="p4()">我自己走。</button>
        `;
    }

    function p2(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">我不敢回应。我怕她听出我声音在抖。</div>
        <div class="name tang">凌雨棠（小声）</div>
        <div class="dialog">嗯……那我不打扰你啦，拜拜～</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="end1()">看着她离开（暗恋日常）</button>
        `;
    }

    // 2. 一起走
    function p3(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">她走在我旁边，阳光落在她头发上。
        <br>我心跳快得要炸开，却依旧面无表情。</div>
        <div class="name tang">凌雨棠</div>
        <div class="dialog">江禹封，你是不是其实人很好呀？</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p5()">……（不敢回答）</button>
        <button class="btn" onclick="p6()">（轻声）……嗯。</button>
        `;
    }

    function p4(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">我说了违心的话。
        <br>我其实想和她一起走。</div>
        <div class="name tang">凌雨棠（失落）</div>
        <div class="dialog">哦……好吧。</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="end1()">沉默离开</button>
        `;
    }

    // 3. 教室情节
    function p5(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">我沉默着。
        <br>但凌雨棠只是笑，好像一点都不生气。</div>
        <div class="name tang">凌雨棠</div>
        <div class="dialog">对了！我笔记忘带了，下课能借我吗？</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p7()">……给你。</button>
        `;
    }

    function p6(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">我第一次认真回应她。
        <br>她眼睛一下子亮了。</div>
        <div class="name tang">凌雨棠（开心）</div>
        <div class="dialog">那以后我天天找你一起走！
        <br>对了，笔记借我好不好？</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p7()">……给你。</button>
        `;
    }

    // 4. 递笔记
    function p7(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">我把笔记递给她。
        <br>指尖不小心碰到一起，我立刻收回手。</div>
        <div class="name tang">凌雨棠</div>
        <div class="dialog">哇！你的笔记好整齐！谢谢你！</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p8()">下午体育课见。</button>
        `;
    }

    // 5. 体育课送水
    function p8(){
        clean();
        scene.innerHTML = `
        <div class="name tang">凌雨棠（跑完步，满头汗）</div>
        <div class="dialog">呼……好渴！</div>
        <div class="name yu">我（内心）</div>
        <div class="dialog">我手里一直握着一瓶没开封的水。
        <br>本来是给自己买的，但我想给她。</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p9()">（递水）给你。</button>
        `;
    }

    // 6. 送水成功
    function p9(){
        clean();
        scene.innerHTML = `
        <div class="name tang">凌雨棠（惊讶）</div>
        <div class="dialog">给我的？！
        <br>谢谢你江禹封！你人真的超好！</div>
        <div class="name yu">我（内心）</div>
        <div class="dialog">我别过头，不让她看见我耳朵红了。</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p10()">放学等我。</button>
        `;
    }

    // 7. 雨天撑伞
    function p10(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">放学突然下雨。
        <br>我看着她站在教学楼门口发愁。
        <br>我走了过去。</div>
        <div class="name tang">凌雨棠</div>
        <div class="dialog">江禹封？你有伞吗？</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p11()">一起走。</button>
        `;
    }

    // 8. 共撑一伞
    function p11(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">伞很小。
        <br>我们靠得很近，我几乎能闻到她头发的香味。
        <br>我悄悄把伞往她那边倾斜。</div>
        <div class="name tang">凌雨棠</div>
        <div class="dialog">江禹封，你是不是……一直都很照顾我？</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="end2()">……嗯。</button>
        `;
    }

    // —— 结局 ——
    function end1(){
        clean();
        scene.innerHTML = `<div class="ending">暗恋，就是一场无人知晓的心动。
        <br>我会继续等。
        <br>等一个敢走向她的未来。</div>`;
    }

    function end2(){
        clean();
        scene.innerHTML = `<div class="ending">我轻轻点头。
        <br>雨还在下，伞下却很暖。
        <br>
        <br>凌雨棠忽然笑了：
        <br>“江禹封，我等你这句话……等了好久。”
        <br>
        <br>我的三年暗恋，
        <br>终于被她接住了。
        <br>
        <br>—— 完 ——</div>`;
    }
</script>
</body>
</html>
