<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霓虹赛博钢琴</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    min-height:100vh;
    background:#050118;
    background-image:radial-gradient(#1b0b36,#050118);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}
.title{
    font-size:42px;
    color:#fff;
    margin-bottom:40px;
    text-shadow:0 0 8px #0ff,0 0 20px #0cf,0 0 40px #08f;
    letter-spacing:4px;
}
.piano-wrap{
    display:flex;
    position:relative;
    padding:40px 20px;
    background:#090422;
    border-radius:16px;
    box-shadow:0 0 25px #f0f7,inset 0 0 30px #40f3;
}
.key-white{
    width:52px;
    height:210px;
    background:#0c0629;
    border:1px solid #7cf;
    border-bottom-left-radius:8px;
    border-bottom-right-radius:8px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding-bottom:12px;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
    transition:0.12s transform ease,0.12s background ease,0.12s box-shadow ease;
    box-shadow:inset 0 0 12px #0ff4,0 0 6px #0ff5;
    will-change:transform;
    outline:none;
}
.key-white.active{
    transform:translateY(4px);
    background:#0ff3;
    box-shadow:0 0 22px #0ff,inset 0 0 25px #0ff8;
}
.key-black{
    width:34px;
    height:132px;
    background:#110022;
    margin:0 -17px;
    z-index:9;
    border:none;
    border-bottom-left-radius:6px;
    border-bottom-right-radius:6px;
    color:#fff;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding-bottom:10px;
    cursor:pointer;
    user-select:none;
    box-shadow:0 0 8px #f0f6,inset 0 0 10px #f0f4;
    transition:0.12s transform ease,0.12s background ease,0.12s box-shadow ease;
    will-change:transform;
    outline:none;
}
.key-black.active{
    transform:translateY(3px);
    background:#f0f4;
    box-shadow:0 0 25px #f0f,inset 0 0 20px #f0f9;
}
.tip{
    margin-top:32px;
    color:#cdf;
    text-shadow:0 0 6px #0cf;
    font-size:17px;
}
</style>
</head>
<body>
<h1 class="title">🎹 NEON 霓虹钢琴</h1>
<div class="piano-wrap">
    <div class="key-white" data-note="C4" data-key="a" role="button" tabindex="0">A</div>
    <div class="key-black" data-note="C#4" data-key="w" role="button" tabindex="-1">W</div>
    <div class="key-white" data-note="D4" data-key="s" role="button" tabindex="0">S</div>
    <div class="key-black" data-note="D#4" data-key="e" role="button" tabindex="-1">E</div>
    <div class="key-white" data-note="E4" data-key="d" role="button" tabindex="0">D</div>
    <div class="key-white" data-note="F4" data-key="f" role="button" tabindex="0">F</div>
    <div class="key-black" data-note="F#4" data-key="t" role="button" tabindex="-1">T</div>
    <div class="key-white" data-note="G4" data-key="g" role="button" tabindex="0">G</div>
    <div class="key-black" data-note="G#4" data-key="y" role="button" tabindex="-1">Y</div>
    <div class="key-white" data-note="A4" data-key="h" role="button" tabindex="0">H</div>
    <div class="key-black" data-note="A#4" data-key="u" role="button" tabindex="-1">U</div>
    <div class="key-white" data-note="B4" data-key="j" role="button" tabindex="0">J</div>
    <div class="key-white" data-note="C5" data-key="k" role="button" tabindex="0">K</div>
</div>
<p class="tip">鼠标点击按键｜键盘 A W S E D F T G Y H U J K 弹奏</p>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const allKeys = document.querySelectorAll('.key-white, .key-black');
    const BASE_URL = 'https://assets.mixkit.co/sound-effects/sfx/235469/piano-';
    var audioPool = [];

    // 播放钢琴音效（使用对象池优化）
    function playSound(noteName) {
        if (!noteName) return;
        var url = BASE_URL + noteName.toLowerCase() + '.mp3';
        var audio = audioPool.find(function(a) { return a.paused; });
        if (!audio) {
            audio = new Audio();
            audioPool.push(audio);
        }
        audio.src = url;
        audio.volume = 0.75;
        audio.play().catch(function(e) {
            // 静默处理网络或加载错误
        });
    }

    // 按键霓虹激活动画
    function keyDownAnim(el) {
        if (!el) return;
        el.classList.add('active');
        setTimeout(function() {
            el.classList.remove('active');
        }, 110);
    }

    // 鼠标点击事件
    allKeys.forEach(function(k) {
        k.addEventListener('click', function() {
            playSound(k.dataset.note);
            keyDownAnim(k);
        });
    });

    // 键盘监听
    document.addEventListener('keydown', function(ev) {
        var kCode = ev.key.toLowerCase();
        var findKey = document.querySelector('[data-key="' + kCode + '"]');
        if (findKey) {
            ev.preventDefault();
            playSound(findKey.dataset.note);
            keyDownAnim(findKey);
        }
    });

    // 后台预加载一个常用音符，降低首次点击延迟
    var preloadAudio = new Audio(BASE_URL + 'c4.mp3');
    preloadAudio.volume = 0.75;
    preloadAudio.preload = 'auto';
});
</script>
</body>
</html>
