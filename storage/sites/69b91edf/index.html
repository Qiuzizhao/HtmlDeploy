<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霓虹赛博钢琴</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    min-height: 100vh;
    background: #050118;
    background-image: radial-gradient(#1b0b36, #050118);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.title {
    font-size: 42px;
    color: #fff;
    margin-bottom: 40px;
    text-shadow: 0 0 8px #0ff, 0 0 20px #0cf, 0 0 40px #08f;
    letter-spacing: 4px;
}
.piano-wrap {
    display: flex;
    position: relative;
    padding: 40px 20px;
    background: #090422;
    border-radius: 16px;
    box-shadow: 0 0 25px rgba(240, 0, 255, 0.4), inset 0 0 30px rgba(64, 0, 255, 0.2);
}
.key-white {
    width: 52px;
    height: 210px;
    background: #0c0629;
    border: 1px solid #7cf;
    border-bottom-left-radius: 8px;
    border-bottom-right-radius: 8px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 12px;
    color: #7cf;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    transition: transform 0.08s ease, background 0.08s ease, box-shadow 0.08s ease;
    box-shadow: inset 0 0 12px rgba(0, 255, 255, 0.25), 0 0 6px rgba(0, 255, 255, 0.3);
    will-change: transform, background, box-shadow;
    outline: none;
}
.key-white.active {
    transform: translateY(4px);
    background: rgba(0, 255, 255, 0.3);
    color: #fff;
    box-shadow: 0 0 25px #0ff, inset 0 0 25px rgba(0, 255, 255, 0.8);
}
.key-black {
    width: 34px;
    height: 132px;
    background: #110022;
    margin: 0 -17px;
    z-index: 9;
    border: 1px solid #f0f;
    border-bottom-left-radius: 6px;
    border-bottom-right-radius: 6px;
    color: #f0f;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 10px;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 0 8px rgba(240, 0, 255, 0.4), inset 0 0 10px rgba(240, 0, 255, 0.2);
    transition: transform 0.08s ease, background 0.08s ease, box-shadow 0.08s ease;
    will-change: transform, background, box-shadow;
    outline: none;
}
.key-black.active {
    transform: translateY(3px);
    background: rgba(240, 0, 255, 0.5);
    color: #fff;
    box-shadow: 0 0 25px #f0f, inset 0 0 20px rgba(240, 0, 255, 0.9);
}
.tip {
    margin-top: 32px;
    color: #cdf;
    text-shadow: 0 0 6px #0cf;
    font-size: 17px;
}
</style>
</head>
<body>
<h1 class="title">🎹 NEON 霓虹钢琴</h1>
<div class="piano-wrap">
    <div class="key-white" data-note="C4" data-key="a" role="button" tabindex="0">A</div>
    <div class="key-black" data-note="C#4" data-key="w" role="button" tabindex="-1">W</div>
    <div class="key-white" data-note="D4" data-key="s" role="button" tabindex="0">S</div>
    <div class="key-black" data-note="D#4" data-key="e" role="button" tabindex="-1">E</div>
    <div class="key-white" data-note="E4" data-key="d" role="button" tabindex="0">D</div>
    <div class="key-white" data-note="F4" data-key="f" role="button" tabindex="0">F</div>
    <div class="key-black" data-note="F#4" data-key="t" role="button" tabindex="-1">T</div>
    <div class="key-white" data-note="G4" data-key="g" role="button" tabindex="0">G</div>
    <div class="key-black" data-note="G#4" data-key="y" role="button" tabindex="-1">Y</div>
    <div class="key-white" data-note="A4" data-key="h" role="button" tabindex="0">H</div>
    <div class="key-black" data-note="A#4" data-key="u" role="button" tabindex="-1">U</div>
    <div class="key-white" data-note="B4" data-key="j" role="button" tabindex="0">J</div>
    <div class="key-white" data-note="C5" data-key="k" role="button" tabindex="0">K</div>
</div>
<p class="tip">鼠标点击/长按按键 ｜ 键盘 A W S E D F T G Y H U J K 弹奏</p>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const allKeys = document.querySelectorAll('.key-white, .key-black');
    
    // 1. 标准音名对照科学音高频率表 (Hz)
    const noteFrequencies = {
        "C4": 261.63, "C#4": 277.18, "D4": 293.66, "D#4": 311.13, 
        "E4": 329.63, "F4": 349.23, "F#4": 369.99, "G4": 392.00, 
        "G#4": 415.30, "A4": 440.00, "A#4": 466.16, "B4": 493.88, "C5": 523.25
    };

    // 2. 初始化 Web Audio Context (现代浏览器音频核心)
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // 存储当前正在发声的音符实例，用于精准控制松开长音
    const activeNodes = {};

    // 3. 核心：使用 Web Audio 实时合成赛博风格音效
    function startNote(noteName) {
        initAudio(); // 确保用户交互后激活音频环境
        if (!noteName || !noteFrequencies[noteName]) return;

        // 如果该音符已经在响，先把它释放掉，防止多重叠加爆音
        if (activeNodes[noteName]) {
            stopNote(noteName);
        }

        const freq = noteFrequencies[noteName];
        
        // 创建振荡器（声源）和增益器（音量控制）
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        // 设置赛博朋克风的混合波形
        osc.type = 'sine'; // 基础纯净正弦波
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

        // 音量包络线：按下时瞬间达到最大音量，随后略微衰减
        const now = audioCtx.currentTime;
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.4, now + 0.01); // 0.01秒内淡入防止咔哒声
        gainNode.gain.setTargetAtTime(0.25, now + 0.01, 0.2);  // 按住时的维持音量

        // 连接节点并启动
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(now);

        // 保存实例
        activeNodes[noteName] = { osc, gainNode };
    }

    function stopNote(noteName) {
        if (!activeNodes[noteName]) return;
        
        const { osc, gainNode } = activeNodes[noteName];
        const now = audioCtx.currentTime;
        
        // 钢琴余音：松开时音量在 0.3 秒内线性淡出，听起来极其自然
        try {
            gainNode.gain.cancelScheduledValues(now);
            gainNode.gain.setValueAtTime(gainNode.gain.value, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3); 
            osc.stop(now + 0.3);
        } catch(e) {
            osc.stop();
        }
        
        delete activeNodes[noteName];
    }

    // 4. 视觉与状态控制逻辑
    function pressKey(el) {
        if (!el || el.classList.contains('active')) return;
        el.classList.add('active');
        startNote(el.dataset.note);
    }

    function releaseKey(el) {
        if (!el || !el.classList.contains('active')) return;
        el.classList.remove('active');
        stopNote(el.dataset.note);
    }

    // 5. 鼠标/触摸事件监听
    allKeys.forEach(function(k) {
        // 按下鼠标
        k.addEventListener('mousedown', function(e) {
            e.preventDefault();
            pressKey(k);
        });
        // 移出按键区域
        k.addEventListener('mouseleave', function() {
            releaseKey(k);
        });
    });
    
    // 全局鼠标抬起事件（防止在琴键外松开鼠标导致按键卡死高亮）
    document.addEventListener('mouseup', function() {
        allKeys.forEach(k => releaseKey(k));
    });

    // 6. 键盘事件监听 (支持多键齐发、长按琴键)
    document.addEventListener('keydown', function(ev) {
        if (ev.repeat) return; // 核心：拦截键盘原生连击，防止长按时声音碎裂
        
        const kCode = ev.key.toLowerCase();
        const findKey = document.querySelector(`[data-key="${kCode}"]`);
        if (findKey) {
            ev.preventDefault();
            pressKey(findKey);
        }
    });

    document.addEventListener('keyup', function(ev) {
        const kCode = ev.key.toLowerCase();
        const findKey = document.querySelector(`[data-key="${kCode}"]`);
        if (findKey) {
            ev.preventDefault();
            releaseKey(findKey);
        }
    });
});
</script>
</body>
</html>
