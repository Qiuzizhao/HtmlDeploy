<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>猛鬼宿舍-网页版(带血条)</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:#111;color:#fff;overflow:hidden}
        #gameBox{width:100vw;height:100vh;position:relative;background:#222633}
        .room{
            width:120px;height:140px;border:2px solid #666;
            position:absolute;background:#333848;cursor:pointer;
            display:flex;flex-direction:column;align-items:center;padding:5px
        }
        .room.used{background:#264036}
        .bed{width:60px;height:40px;background:#795548;margin-top:10px;border-radius:4px}
        .doorWrap{width:50px}
        .door{width:50px;height:20px;background:#8b4513;border:2px solid #522810}
        /*门血条样式*/
        .hpBarBox{width:50px;height:6px;background:#333;margin-bottom:2px}
        .doorHp{height:100%;background:#2ecc71;transition:0.2s}
        .turret{width:30px;height:30px;background:#555;border-radius:50%;margin-top:5px}
        #ghost{
            width:50px;height:60px;background:#992222;
            border-radius:8px;position:absolute;transition:0.6s;
            display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:bold
        }
        /*鬼血条*/
        .ghostHpBox{width:46px;height:7px;background:#222;margin-bottom:3px}
        .ghostHp{height:100%;background:#e74c3c;transition:0.2s}
        #ui{
            position:fixed;top:10px;left:10px;z-index:99;
            background:rgba(0,0,0,0.7);padding:12px;border-radius:6px
        }
        .btn{
            padding:6px 10px;margin:3px;background:#2868c9;border:none;color:#fff;
            border-radius:3px;cursor:pointer
        }
        .tip{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:#0008;padding:8px;border-radius:4px}
    </style>
</head>
<body>
<div id="gameBox">
    <div id="ui">
        <div>金币：<span id="gold">0</span></div>
        <div id="doorHpText">大门血量：--</div>
        <div id="ghostHpText">猎梦者血量：--</div>
        <button class="btn" onclick="upBed()">升级床铺(20金)</button>
        <button class="btn" onclick="upDoor()">升级大门(30金)</button>
        <button class="btn" onclick="buildTurret()">建造炮台(100金)</button>
    </div>
    <div id="ghost">
        <div class="ghostHpBox"><div class="ghostHp" id="ghostHpDom"></div></div>
        鬼
    </div>
    <div class="tip">点击空房间上床发育，躲避猎梦者破门，血条绿色门血、红色鬼血</div>
</div>

<script>
// 游戏数据
let gold = 0;
let bedLv = 1;
let doorLv = 1;
let turretNum = 0;
let inRoom = null;

//血量数据
let doorMaxHp = 100;
let doorCurHp = 100;
let ghostMaxHp = 200;
let ghostCurHp = 200;

const ghost = document.getElementById('ghost');
const goldDom = document.getElementById('gold');
const game = document.getElementById('gameBox');
const ghostHpDom = document.getElementById('ghostHpDom');
const doorHpText = document.getElementById('doorHpText');
const ghostHpText = document.getElementById('ghostHpText');

// 房间坐标配置
const roomPos = [
    {x:50,y:80},{x:200,y:80},{x:350,y:80},
    {x:50,y:250},{x:200,y:250},{x:350,y:250},
    {x:50,y:420},{x:200,y:420},{x:350,y:420}
];
let roomList = [];
let doorHpDom = null;

// 生成房间
function createRoom(){
    roomPos.forEach((pos,i)=>{
        let div = document.createElement('div');
        div.className = 'room';
        div.style.left = pos.x+'px';
        div.style.top = pos.y+'px';
        div.dataset.id = i;
        // 加入门血条结构
        div.innerHTML = `
            <div class="doorWrap">
                <div class="hpBarBox"><div class="doorHp"></div></div>
                <div class="door"></div>
            </div>
            <div class="bed"></div>
        `;
        div.onclick = ()=>enterRoom(div,i);
        game.appendChild(div);
        roomList.push({dom:div,used:false,x:pos.x,y:pos.y});
    })
}

// 入住房间
function enterRoom(dom,idx){
    if(inRoom)return;
    roomList[idx].used = true;
    dom.classList.add('used');
    inRoom = roomList[idx];
    doorHpDom = dom.querySelector('.doorHp');
    //重置血量
    doorMaxHp = 100*doorLv;
    doorCurHp = doorMaxHp;
    ghostMaxHp = 200;
    ghostCurHp = ghostMaxHp;
    // 猎梦者出生随机位置
    ghost.style.left = (Math.random()*500+450)+'px';
    ghost.style.top = (Math.random()*200)+'px';
    updateHpUI();
}

//更新血条显示
function updateHpUI(){
    if(!inRoom) return;
    //门血条百分比
    let doorPercent = doorCurHp/doorMaxHp*100;
    doorHpDom.style.width = doorPercent+'%';
    if(doorPercent<30) doorHpDom.style.background='#e74c3c';
    else if(doorPercent<60) doorHpDom.style.background='#f39c12';
    else doorHpDom.style.background='#2ecc71';

    //鬼血条百分比
    let ghostPer = ghostCurHp/ghostMaxHp*100;
    ghostHpDom.style.width = ghostPer+'%';

    doorHpText.innerText = `大门血量：${doorCurHp}/${doorMaxHp}`;
    ghostHpText.innerText = `猎梦者血量：${ghostCurHp}/${ghostMaxHp}`;
}

// 金币自动产出
setInterval(()=>{
    if(inRoom){
        gold += bedLv*2;
        goldDom.innerText = gold;
    }
},1000);

// 升级床【修改消耗20】
window.upBed = function(){
    if(gold>=20 && inRoom){
        gold -=20;bedLv++;goldDom.innerText=gold;
    }
}
// 升级门【修改消耗30】
window.upDoor = function(){
    if(gold>=30 && inRoom){
        gold -=30;doorLv++;
        doorMaxHp = 100*doorLv;
        doorCurHp = doorMaxHp;
        goldDom.innerText=gold;
        updateHpUI();
    }
}
// 造炮台
window.buildTurret = function(){
    if(gold>=100 && inRoom){
        gold -=100;turretNum++;goldDom.innerText=gold;
        let tur = document.createElement('div');
        tur.className='turret';
        inRoom.dom.appendChild(tur);
    }
}

// 猎梦者AI破门+血量逻辑
setInterval(()=>{
    if(!inRoom)return;
    // 鬼移动到玩家房间
    ghost.style.left = (inRoom.x+30)+'px';
    ghost.style.top = (inRoom.y-20)+'px';

    //炮台攻击猎梦者
    let turDmg = turretNum*8;
    ghostCurHp -= turDmg;
    if(ghostCurHp<=0){
        alert('击杀猎梦者！游戏胜利，刷新重开');
        location.reload();
    }

    //鬼攻击大门
    let ghostAtk = Math.max(5,12-doorLv);
    doorCurHp -= ghostAtk;
    if(doorCurHp<=0){
        alert('大门被破，你被抓！游戏结束，刷新重新开始');
        location.reload();
    }
    updateHpUI();
},2000);

createRoom();
</script>
</body>
</html>
