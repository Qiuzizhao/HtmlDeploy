<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>迷你世界网页完整版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei}
body{background:#222;overflow:hidden;color:#fff}
.topBar{height:45px;background:#333;display:flex;align-items:center;padding:0 15px;gap:20px}
.info{font-size:15px}
#game{display:block;background:#87CEEB}
.hotBar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;padding:6px;background:rgba(0,0,0,0.6);border-radius:8px}
.hotItem{width:46px;height:46px;border:2px solid #666;cursor:pointer;border-radius:4px}
.hotItem.active{border:#fff solid 2px}
.panelBox{position:fixed;top:60px;right:10px;background:rgba(0,0,0,0.75);padding:10px;border-radius:6px}
.inv,.craft{display:grid;grid-template-columns:repeat(4,40px);gap:4px;margin-bottom:10px}
.cell{width:40px;height:40px;border:1px solid #555;background:#3a3a3a;cursor:pointer}
.cell.has{position:relative}
.cell>span{position:absolute;right:2px;bottom:0;font-size:11px;color:#fff}
.craftBtn{width:100%;padding:5px;background:#286828;border:none;color:#fff;border-radius:3px;cursor:pointer}
.tip{position:fixed;left:10px;bottom:70px;font-size:13px;color:#ddd}
</style>
</head>
<body>
<div class="topBar">
    <div class="info">WASD移动｜左键放方块｜右键挖方块｜B打开背包合成｜ESC关闭面板</div>
    <div class="info">当前：<span id="nowName">草地</span></div>
</div>
<canvas id="game"></canvas>
<!--快捷栏-->
<div class="hotBar" id="hotBar"></div>
<!--背包&合成面板-->
<div class="panelBox" id="panel" style="display:none">
    <div>背包</div>
    <div class="inv" id="invBox"></div>
    <div>合成台</div>
    <div class="craft" id="craftBox"></div>
    <button class="craftBtn" id="makeBtn">合成选中物品</button>
</div>
<div class="tip">生物：鸡鸭随机生成，触碰无伤害</div>

<script>
//=========配置项=========
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const BLOCK_SIZE=32;
let player={x:12,y:8,speed:0.12};
let keys={};
let world={};
let inventory=[]; //背包
let hotBar=[
    {type:1,num:64},{type:2,num:64},{type:3,num:64},{type:4,num:32},{type:5,num:16},{type:6,num:16},{type:7,num:8}
];
let selectHot=0;
let creatures=[]; //动物生物数组
const blockCfg={
    1:{name:"草地",color:"#69c147"},
    2:{name:"石头",color:"#888888"},
    3:{name:"细沙",color:"#e2c48c"},
    4:{name:"原木",color:"#8b5a2b"},
    5:{name:"树叶",color:"#399939"},
    6:{name:"玻璃",color:"#bce6ff"},
    7:{name:"铁矿",color:"#a88870"}
}
//合成配方 [原料类型,数量,产出类型,产出数量]
const craftRecipes=[
    {need:[{t:2,n:3}],get:{t:7,n:1}},
    {need:[{t:4,n:2}],get:{t:5,n:4}},
    {need:[{t:3,n:2}],get:{t:6,n:1}}
]
let openPanel=false;
let saveKey="miniWorldSaveFull";

//画布自适应
function resize(){
    canvas.width=innerWidth;
    canvas.height=innerHeight-45;
}
resize();
window.onresize=resize;

//生成随机地形+树木+矿物+动物
function createWorld(){
    const maxX=Math.floor(canvas.width/BLOCK_SIZE);
    const maxY=Math.floor(canvas.height/BLOCK_SIZE);
    for(let x=0;x<maxX;x++){
        let groundY=Math.floor(maxY*0.65+Math.sin(x*0.13)*4+(Math.random()*2-1));
        //地层生成
        for(let y=0;y<maxY;y++){
            let k=x+","+y;
            if(y===groundY)world[k]=1;
            else if(y>groundY&&y<groundY+3)world[k]=2;
            else if(y>=groundY+3&&y<groundY+6)world[k]=Math.random()>0.88?7:2;
            else if(y>=groundY+6)world[k]=3;
        }
        //随机种树
        if(Math.random()>0.92){
            let treeBase=groundY;
            world[x+","+(treeBase-1)]=4;
            world[x+","+(treeBase-2)]=4;
            world[x+","+(treeBase-3)]=4;
            world[(x-1)+","+(treeBase-3)]=5;
            world[x+","+(treeBase-4)]=5;
            world[(x+1)+","+(treeBase-3)]=5;
        }
    }
    //生成小动物
    creatures=[];
    for(let i=0;i<12;i++){
        let cx=Math.floor(Math.random()*maxX);
        let cy=findGround(cx);
        creatures.push({x:cx,y:cy,type:Math.random()>0.5?"chicken":"duck",vx:(Math.random()>0.5?1:-1)*0.02})
    }
}
//查找地面坐标
function findGround(x){
    let maxY=Math.floor(canvas.height/BLOCK_SIZE);
    for(let y=0;y<maxY;y++){
        if(world[x+","+y])return y-1;
    }
    return maxY/2;
}

//渲染游戏
function render(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    //天空渐变
    let grad=ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,"#87CEEB");
    grad.addColorStop(1,"#c7e6f7");
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    //绘制所有方块
    let bw=Math.floor(canvas.width/BLOCK_SIZE);
    let bh=Math.floor(canvas.height/BLOCK_SIZE);
    for(let x=0;x<bw;x++){
        for(let y=0;y<bh;y++){
            let k=x+","+y;
            if(!world[k])continue;
            let cfg=blockCfg[world[k]];
            ctx.fillStyle=cfg.color;
            ctx.fillRect(x*BLOCK_SIZE,y*BLOCK_SIZE,BLOCK_SIZE-1,BLOCK_SIZE-1);
            ctx.strokeStyle="#222";
            ctx.strokeRect(x*BLOCK_SIZE,y*BLOCK_SIZE,BLOCK_SIZE-1,BLOCK_SIZE-1);
        }
    }

    //绘制生物
    creatures.forEach(c=>{
        let px=c.x*BLOCK_SIZE,py=c.y*BLOCK_SIZE;
        ctx.fillStyle=c.type=="chicken"?"#fff":"#ffd260";
        ctx.beginPath();
        ctx.arc(px+BLOCK_SIZE/2,py+BLOCK_SIZE/2,BLOCK_SIZE/3,0,Math.PI*2);
        ctx.fill();
    })

    //绘制玩家小人
    ctx.fillStyle="#ff4444";
    ctx.fillRect(player.x*BLOCK_SIZE+4,player.y*BLOCK_SIZE+4,BLOCK_SIZE-8,BLOCK_SIZE-8);

    //生物自动移动
    creatures.forEach(c=>{
        c.x+=c.vx;
        //碰到边界反向
        if(c.x<0||c.x>bw-1)c.vx*=-1;
    })
}

//玩家移动逻辑
function playerMove(){
    let nx=player.x,ny=player.y;
    if(keys["w"]||keys["W"])ny-=player.speed;
    if(keys["s"]||keys["S"])ny+=player.speed;
    if(keys["a"]||keys["A"])nx-=player.speed;
    if(keys["d"]||keys["D"])nx+=player.speed;
    //碰撞检测不能穿方块
    let checkX=Math.floor(nx),checkY=Math.floor(ny);
    if(!world[checkX+","+checkY]){
        player.x=nx;player.y=ny;
    }
}

//鼠标方块操作
canvas.onmousedown=e=>{
    e.preventDefault();
    let mx=Math.floor(e.offsetX/BLOCK_SIZE);
    let my=Math.floor(e.offsetY/BLOCK_SIZE);
    let k=mx+","+my;
    let nowBlock=hotBar[selectHot];
    if(e.button===0){
        //左键放置
        world[k]=nowBlock.type;
        reduceItem(selectHot,1);
    }else if(e.button===2){
        //右键挖掘
        if(world[k]){
            addInv(world[k],1);
            delete world[k];
        }
    }
    saveGame();
}
canvas.oncontextmenu=e=>e.preventDefault();

//物品增减
function reduceItem(idx,num){
    if(hotBar[idx].num>=num)hotBar[idx].num-=num;
    refreshHotUI();
}
function addInv(type,num){
    //优先背包堆叠
    let has=false;
    for(let i=0;i<inventory.length;i++){
        if(inventory[i].type===type){
            inventory[i].num+=num;has=true;break;
        }
    }
    if(!has)inventory.push({type:type,num:num});
    refreshInvUI();
}

//刷新快捷栏UI
function refreshHotUI(){
    const hotBox=document.getElementById("hotBar");
    hotBox.innerHTML="";
    hotBar.forEach((item,i)=>{
        let div=document.createElement("div");
        div.className="hotItem"+(i===selectHot?" active":"");
        div.style.background=blockCfg[item.type].color;
        div.onclick=()=>{
            selectHot=i;
            document.getElementById("nowName").innerText=blockCfg[hotBar[i].type].name;
            refreshHotUI();
        }
        hotBox.appendChild(div);
    })
    document.getElementById("nowName").innerText=blockCfg[hotBar[selectHot].type].name;
}
//刷新背包UI
function refreshInvUI(){
    let box=document.getElementById("invBox");
    box.innerHTML="";
    for(let i=0;i<16;i++){
        let d=document.createElement("div");
        d.className="cell";
        if(inventory[i]){
            d.style.background=blockCfg[inventory[i].type].color;
            d.innerHTML=`<span>${inventory[i].num}</span>`;
        }
        box.appendChild(d);
    }
}

//合成功能
document.getElementById("makeBtn").onclick=()=>{
    for(let r of craftRecipes){
        let ok=true;
        //校验材料
        for(let need of r.need){
            let find=inventory.find(p=>p.type===need.t&&p.num>=need.n);
            if(!find){ok=false;break}
        }
        if(!ok)continue;
        //扣除材料
        for(let need of r.need){
            for(let j=0;j<inventory.length;j++){
                if(inventory[j].type===need.t){
                    inventory[j].num-=need.n;
                    if(inventory[j].num<=0)inventory.splice(j,1);
                    break;
                }
            }
        }
        //获得产物
        addInv(r.get.t,r.get.n);
        refreshInvUI();
        return;
    }
    alert("材料不足无法合成");
}

//键盘监听
document.onkeydown=e=>{
    keys[e.key]=true;
    //B打开背包 ESC关闭
    if(e.key==="b"||e.key==="B"){
        openPanel=!openPanel;
        document.getElementById("panel").style.display=openPanel?"block":"none";
        refreshInvUI();
    }
    if(e.key==="Escape"){openPanel=false;document.getElementById("panel").style.display="none"}
}
document.onkeyup=e=>keys[e.key]=false;

//存档读写
function saveGame(){
    let saveData={world,hotBar,inventory,creatures,player};
    localStorage.setItem(saveKey,JSON.stringify(saveData));
}
function loadGame(){
    let d=localStorage.getItem(saveKey);
    if(d){
        let s=JSON.parse(d);
        world=s.world;hotBar=s.hotBar;inventory=s.inventory||[];creatures=s.creatures;player=s.player;
    }else createWorld();
    refreshHotUI();
}

//游戏主循环
function loop(){
    playerMove();
    render();
    requestAnimationFrame(loop);
}

//启动
loadGame();
loop();
</script>
</body>
</html>
