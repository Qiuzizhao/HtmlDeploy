<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火影忍者 木叶激战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: linear-gradient(#0f141c, #1a2435);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            color: #fff;
            overflow-x: hidden;
        }
        .top-bar {
            width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: linear-gradient(90deg,#782000,#ff7700,#782000);
            border: 3px solid #ffdd70;
            border-radius: 8px 8px 0 0;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 4px #000;
        }
        .char-select {
            display: flex;
            gap: 10px;
        }
        .char-btn {
            padding: 4px 10px;
            border: 2px solid #fff;
            background: rgba(0,0,0,0.4);
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
        }
        .char-btn.active {
            background: #ff7700;
            color: #000;
        }
        #gameBox {
            width: 900px;
            height: 550px;
            background: url("") linear-gradient(#274060,#102038);
            background-image: radial-gradient(#304868 0%, #102038 100%);
            border: 4px solid #ff9000;
            box-shadow: 0 0 25px #ff660088;
            position: relative;
            overflow: hidden;
        }
        /* 地面木叶装饰 */
        #gameBox::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(#503010,#281808);
        }
        .player {
            width: 55px;
            height: 65px;
            border-radius: 10px;
            position: absolute;
            bottom: 40px;
            box-shadow: 0 0 12px rgba(255,255,255,0.4);
        }
        /* 四名角色配色 */
        .naruto { background: linear-gradient(#ffc840,#e64a00); }
        .sasuke { background: linear-gradient(#4060ff,#102080); }
        .sakura { background: linear-gradient(#ff60b0,#b02060); }
        .kakashi { background: linear-gradient(#90a0b0,#304050); }

        /* 忍术子弹 */
        .jutsu {
            border-radius: 50%;
            position: absolute;
        }
        .rasengan {
            width: 22px;
            height: 22px;
            background: radial-gradient(#fff,#00eeff);
            box-shadow: 0 0 16px #00eeff, 0 0 30px #00aaff;
        }
        .chidori {
            width: 24px;
            height: 24px;
            background: radial-gradient(#fff,#4080ff);
            box-shadow: 0 0 16px #2060ff, 0 0 30px #0040ff;
        }
        .punch {
            width: 30px;
            height: 12px;
            background: radial-gradient(#fff,#ff4090);
            border-radius: 6px;
            box-shadow: 0 0 12px #ff4090;
        }
        .raikiri {
            width: 26px;
            height: 26px;
            background: radial-gradient(#fff,#aaccff);
            box-shadow: 0 0 20px #aaddff;
        }

        /* 敌人 */
        .enemy {
            border-radius: 50%;
            position: absolute;
        }
        .fireball {
            width: 45px;
            height: 45px;
            background: radial-gradient(#ffdd00,#ff2200);
            box-shadow: 0 0 20px #ff3300;
        }
        .shuriken {
            width: 20px;
            height: 20px;
            background: #777;
            box-shadow: 0 0 6px #222;
        }
        .soundwave {
            width: 35px;
            height: 35px;
            background: radial-gradient(#fff,#aa22ff);
            box-shadow: 0 0 14px #aa22ff;
        }
        .explode {
            width: 60px;
            height: 60px;
            background: radial-gradient(#fff,#ffaa00,#ff220000);
            border-radius: 50%;
            position: absolute;
            animation: boom 0.4s forwards;
        }
        @keyframes boom {
            0% { transform: scale(0.2); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        .ui-bottom {
            width: 900px;
            display: flex;
            justify-content: space-between;
            padding: 8px 16px;
            background: #111;
            border: 3px solid #ff9000;
            border-top: none;
            border-radius: 0 0 8px 8px;
        }
        .hp-bar-box {
            width: 180px;
            height: 22px;
            border: 2px solid #fff;
            background: #222;
            border-radius: 4px;
            overflow: hidden;
        }
        #hpBar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg,#ff2222,#ff6600,#ffdd00);
            transition: width 0.2s;
        }
        .info-text {
            display: flex;
            gap: 24px;
        }
        button {
            padding: 6px 14px;
            background: linear-gradient(#ff9000,#dd5500);
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover { filter: brightness(1.2); }
        .tips {
            margin-top: 10px;
            color: #ccc;
            text-align: center;
            line-height: 1.6;
        }
        .start-mask {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99;
        }
        .start-mask h2 {
            font-size: 42px;
            color: #ff9000;
            text-shadow: 0 0 12px #ff6600;
            margin-bottom: 20px;
        }
        .hide { display: none !important; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="char-select">
            <button class="char-btn active" data-char="naruto">鸣人</button>
            <button class="char-btn" data-char="sasuke">佐助</button>
            <button class="char-btn" data-char="sakura">小樱</button>
            <button class="char-btn" data-char="kakashi">卡卡西</button>
        </div>
        <span>🔥 火影木叶激战 🔥</span>
        <button id="restartBtn">重新开局</button>
    </div>
    <div id="gameBox">
        <div class="start-mask" id="startMask">
            <h2>火影忍者 · 木叶保卫战</h2>
            <p style="margin-bottom:20px; font-size:18px;">← → 移动 | 空格释放专属忍术</p>
            <button id="startGameBtn" style="font-size:22px; padding:10px 30px;">开始游戏</button>
        </div>
        <div class="player naruto" id="player"></div>
    </div>
    <div class="ui-bottom">
        <div class="hp-bar-box">
            <div id="hpBar"></div>
        </div>
        <div class="info-text">
            <span>得分：<span id="score">0</span></span>
            <span>连击：<span id="combo">0</span></span>
            <span>难度等级：<span id="level">1</span></span>
        </div>
    </div>
    <div class="tips">
        角色忍术：鸣人-螺旋丸 | 佐助-千鸟 | 小樱-怪力拳 | 卡卡西-雷切
        <br>躲避火球/手里剑/音波弹，击毁敌人累积连击高分！
    </div>

    <script>
        // 全局配置
        const WIDTH = 900;
        const HEIGHT = 550;
        const GROUND_HEIGHT = 40;
        const playerEl = document.getElementById("player");
        const gameBox = document.getElementById("gameBox");
        const hpBar = document.getElementById("hpBar");
        const scoreText = document.getElementById("score");
        const comboText = document.getElementById("combo");
        const levelText = document.getElementById("level");
        const startMask = document.getElementById("startMask");
        const startBtn = document.getElementById("startGameBtn");
        const restartBtn = document.getElementById("restartBtn");
        const charBtns = document.querySelectorAll(".char-btn");

        // 游戏状态
        let gameStart = false;
        let gameRun = true;
        let currentChar = "naruto";
        let playerX = WIDTH / 2 - 27;
        const playerSpeed = 9;
        let hp = 100;
        let score = 0;
        let combo = 0;
        let comboTimer = null;
        let level = 1;
        let spawnInterval = 900;

        // 按键
        const keys = { left: false, right: false };

        // 忍术子弹、敌人、爆炸容器
        let jutsus = [];
        let enemies = [];
        let explosions = [];

        // 角色切换
        charBtns.forEach(btn => {
            btn.onclick = () => {
                charBtns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentChar = btn.dataset.char;
                playerEl.className = "player " + currentChar;
            }
        })

        // 开始游戏遮罩
        startBtn.onclick = () => {
            startMask.classList.add("hide");
            gameStart = true;
            startGameLoop();
            startSpawnEnemy();
            startLevelUp();
        }

        // 重置游戏
        restartBtn.onclick = resetGame;
        function resetGame() {
            jutsus.forEach(j => j.el.remove());
            enemies.forEach(e => e.el.remove());
            explosions.forEach(ex => ex.remove());
            jutsus = []; enemies = []; explosions = [];
            hp = 100; score = 0; combo = 0; level = 1;
            spawnInterval = 900;
            playerX = WIDTH / 2 - 27;
            hpBar.style.width = hp + "%";
            scoreText.textContent = score;
            comboText.textContent = combo;
            levelText.textContent = level;
            gameRun = true;
            if (!gameStart) startMask.classList.remove("hide");
        }

        // 键盘监听
        document.addEventListener("keydown", e => {
            if (!gameRun || !gameStart) return;
            if (e.code === "ArrowLeft") keys.left = true;
            if (e.code === "ArrowRight") keys.right = true;
            if (e.code === "Space") shootJutsu();
        })
        document.addEventListener("keyup", e => {
            if (e.code === "ArrowLeft") keys.left = false;
            if (e.code === "ArrowRight") keys.right = false;
        })

        // 释放专属忍术
        function shootJutsu() {
            let jutsuClass, speed, size;
            switch (currentChar) {
                case "naruto": jutsuClass = "rasengan"; speed = 14; size = 22; break;
                case "sasuke": jutsuClass = "chidori"; speed = 16; size = 24; break;
                case "sakura": jutsuClass = "punch"; speed = 12; size = 30; break;
                case "kakashi": jutsuClass = "raikiri"; speed = 15; size = 26; break;
            }
            const el = document.createElement("div");
            el.className = "jutsu " + jutsuClass;
            el.style.left = playerX + 15 + "px";
            el.style.bottom = GROUND_HEIGHT + 65 + "px";
            gameBox.appendChild(el);
            jutsus.push({
                el, x: playerX + 15, y: GROUND_HEIGHT + 65, speed, w: size, h: size
            })
        }

        // 随机生成敌人三种类型
        function spawnEnemy() {
            if (!gameRun || !gameStart) return;
            const types = ["fireball", "shuriken", "soundwave"];
            const type = types[Math.floor(Math.random() * types.length)];
            const el = document.createElement("div");
            el.className = "enemy " + type;
            let w, h, baseSpeed;
            switch (type) {
                case "fireball": w = 45; h = 45; baseSpeed = 3; break;
                case "shuriken": w = 20; h = 20; baseSpeed = 5; break;
                case "soundwave": w = 35; h = 35; baseSpeed = 3.8; break;
            }
            const randX = Math.random() * (WIDTH - w);
            el.style.left = randX + "px";
            el.style.top = "-50px";
            gameBox.appendChild(el);
            enemies.push({
                el, x: randX, y: -50, w, h, speed: baseSpeed + level * 0.4, type
            })
        }

        // 生成爆炸动画
        function createBoom(x, y) {
            const el = document.createElement("div");
            el.className = "explode";
            el.style.left = x + "px";
            el.style.top = y + "px";
            gameBox.appendChild(el);
            explosions.push(el);
            setTimeout(() => el.remove(), 400);
        }

        // 碰撞检测
        function hit(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
        }

        // 主循环
        function startGameLoop() {
            function loop() {
                if (!gameRun) return;
                // 玩家移动
                if (keys.left && playerX > 0) playerX -= playerSpeed;
                if (keys.right && playerX < WIDTH - 55) playerX += playerSpeed;
                playerEl.style.left = playerX + "px";

                // 更新忍术子弹
                for (let i = jutsus.length - 1; i >= 0; i--) {
                    const j = jutsus[i];
                    j.y += j.speed;
                    j.el.style.bottom = j.y + "px";
                    if (j.y > HEIGHT) {
                        j.el.remove(); jutsus.splice(i, 1); continue;
                    }
                    // 忍术击中敌人
                    for (let k = enemies.length - 1; k >= 0; k--) {
                        const e = enemies[k];
                        if (hit(j, e)) {
                            createBoom(e.x, e.y);
                            // 连击加分
                            combo++;
                            clearTimeout(comboTimer);
                            comboTimer = setTimeout(() => { combo = 0; comboText.textContent = combo; }, 1200);
                            const addScore = 10 * combo;
                            score += addScore;
                            scoreText.textContent = score;
                            comboText.textContent = combo;
                            e.el.remove(); enemies.splice(k, 1);
                            j.el.remove(); jutsus.splice(i, 1);
                            break;
                        }
                    }
                }

                // 更新敌人
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    e.y += e.speed;
                    e.el.style.top = e.y + "px";
                    // 敌人出屏幕
                    if (e.y > HEIGHT) {
                        e.el.remove(); enemies.splice(i, 1); continue;
                    }
                    // 敌人撞击玩家扣血
                    const playerObj = { x: playerX, y: HEIGHT - GROUND_HEIGHT - 65, w: 55, h: 65 };
                    if (hit(playerObj, e)) {
                        let damage = e.type === "fireball" ? 20 : e.type === "soundwave" ? 15 : 8;
                        hp -= damage;
                        hpBar.style.width = hp + "%";
                        createBoom(e.x, e.y);
                        e.el.remove(); enemies.splice(i, 1);
                        combo = 0;
                        comboText.textContent = combo;
                        if (hp <= 0) gameOver();
                    }
                }
                requestAnimationFrame(loop);
            }
            loop();
        }

        // 定时生成敌人
        let spawnTimer;
        function startSpawnEnemy() {
            clearInterval(spawnTimer);
            spawnTimer = setInterval(spawnEnemy, spawnInterval);
        }

        // 难度递增
        let levelTimer;
        function startLevelUp() {
            clearInterval(levelTimer);
            levelTimer = setInterval(() => {
                level++;
                levelText.textContent = level;
                spawnInterval = Math.max(350, spawnInterval - 60);
                startSpawnEnemy();
            }, 12000)
        }

        // 游戏结束
        function gameOver() {
            gameRun = false;
            alert(`游戏结束！\n最终得分：${score}\n最高连击：${combo}\n到达难度等级：${level}`);
        }

        // 初始化血条
        hpBar.style.width = "100%";
    </script>
</body>
</html>
