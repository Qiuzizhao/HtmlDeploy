<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini MC 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            margin: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .tip {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 10px 14px;
            border-radius: 6px;
            z-index: 9;
            font-size: 14px;
            line-height: 1.5;
            user-select: none;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .cross {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.85);
            border-radius: 2px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 8;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.3);
        }
        .cross::before,
        .cross::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
        }
        .cross::before {
            width: 1px;
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }
        .cross::after {
            width: 100%;
            height: 1px;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }
        @media (max-width: 600px) {
            .tip {
                font-size: 12px;
                padding: 8px 10px;
                top: 6px;
                left: 6px;
            }
            .cross {
                width: 16px;
                height: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="tip">WASD移动 | 鼠标拖拽旋转<br>左键挖方块 | 右键放石头</div>
    <div class="cross"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 场景核心对象 ---
        let scene, camera, renderer, controls;
        let blockGroup;
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        const clock = new THREE.Clock();

        // --- 状态管理 ---
        const keyState = {};
        // 用 Map 记录所有方块位置 -> mesh 映射，用于快速冲突检测和删除
        const blockMap = new Map();

        // --- 共享几何体 & 材质 (性能优化: 避免重复创建) ---
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const matGrass = new THREE.MeshLambertMaterial({ color: 0x60ad4e });
        const matDirt = new THREE.MeshLambertMaterial({ color: 0x916037 });
        const matStone = new THREE.MeshLambertMaterial({ color: 0x777777 });

        // --- 工具函数: 坐标规范化 ---
        function snapCoord(v) {
            return Math.round(v);
        }

        function makeKey(x, y, z) {
            return `${snapCoord(x)},${snapCoord(y)},${snapCoord(z)}`;
        }

        function keyFromPos(pos) {
            return makeKey(pos.x, pos.y, pos.z);
        }

        // --- 方块管理 ---
        function addBlockToMap(mesh) {
            const key = keyFromPos(mesh.position);
            blockMap.set(key, mesh);
        }

        function removeBlockFromMap(mesh) {
            const key = keyFromPos(mesh.position);
            blockMap.delete(key);
        }

        function hasBlockAt(x, y, z) {
            return blockMap.has(makeKey(x, y, z));
        }

        function createBlock(geometry, material, x, y, z) {
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            mesh.castShadow = false;
            mesh.receiveShadow = false;
            return mesh;
        }

        // --- 生成地形 ---
        function buildTerrain() {
            const m = 12;
            for (let x = -m; x <= m; x++) {
                for (let z = -m; z <= m; z++) {
                    // 泥土层 y = -1
                    const dirt = createBlock(boxGeo, matDirt, x, -1, z);
                    blockGroup.add(dirt);
                    addBlockToMap(dirt);

                    // 草丛层 y = 0
                    const grass = createBlock(boxGeo, matGrass, x, 0, z);
                    blockGroup.add(grass);
                    addBlockToMap(grass);
                }
            }
        }

        // --- 初始化场景 ---
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 12, 16);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.body.prepend(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.target.set(0, 0, 0);
            controls.minDistance = 2;
            controls.maxDistance = 80;

            const ambient = new THREE.AmbientLight(0xffffff, 0.55);
            const sun = new THREE.DirectionalLight(0xffffff, 0.7);
            sun.position.set(20, 30, 10);
            scene.add(ambient, sun);

            blockGroup = new THREE.Group();
            scene.add(blockGroup);

            buildTerrain();
        }

        // --- 鼠标交互: 挖/放 ---
        function setupMouseInteraction() {
            const canvas = renderer.domElement;

            canvas.addEventListener('mousedown', (e) => {
                const rect = canvas.getBoundingClientRect();
                pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

                raycaster.setFromCamera(pointer, camera);
                const hits = raycaster.intersectObjects(blockGroup.children, false);
                if (!hits.length) return;

                const hit = hits[0];
                const hitMesh = hit.object;

                if (e.button === 0) {
                    // 左键: 挖方块 (仅移除可交互的方块，不删除不可见的底层)
                    if (hitMesh.parent === blockGroup) {
                        blockGroup.remove(hitMesh);
                        removeBlockFromMap(hitMesh);
                        // 清理几何体引用 (共享几何体不dispose)
                        hitMesh.material = undefined;
                    }
                } else if (e.button === 2) {
                    // 右键: 放置石头
                    const normal = hit.face.normal.clone();
                    // 计算放置位置: 命中点沿法线偏移0.5，然后对齐到整数网格
                    const placePos = hit.point.clone().add(normal.multiplyScalar(0.5));
                    const px = snapCoord(placePos.x);
                    const py = snapCoord(placePos.y);
                    const pz = snapCoord(placePos.z);

                    // 边界保护: 防止在地图外无限放置
                    if (Math.abs(px) > 30 || Math.abs(pz) > 30 || py > 20 || py < -10) return;

                    // 冲突检测: 如果该位置已有方块则忽略
                    if (hasBlockAt(px, py, pz)) return;

                    const stone = createBlock(boxGeo, matStone, px, py, pz);
                    blockGroup.add(stone);
                    addBlockToMap(stone);
                }
            });

            canvas.addEventListener('contextmenu', (ev) => ev.preventDefault());

            // 窗口尺寸变化自适应
            window.addEventListener('resize', () => {
                const w = window.innerWidth;
                const h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            });
        }

        // --- 键盘控制 ---
        function setupKeyboard() {
            document.addEventListener('keydown', (e) => {
                keyState[e.key.toLowerCase()] = true;
            });
            document.addEventListener('keyup', (e) => {
                keyState[e.key.toLowerCase()] = false;
            });
            // 页面失焦时重置按键状态，防止卡键
            window.addEventListener('blur', () => {
                for (const k in keyState) keyState[k] = false;
            });
        }

        // --- 相机移动 (基于时间增量) ---
        function updateMovement(delta) {
            const speed = 6.0 * delta;
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            dir.y = 0;
            dir.normalize();

            const right = new THREE.Vector3();
            right.crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();

            let moved = false;
            if (keyState['w']) { camera.position.addScaledVector(dir, speed);
                moved = true; }
            if (keyState['s']) { camera.position.addScaledVector(dir, -speed);
                moved = true; }
            if (keyState['a']) { camera.position.addScaledVector(right, -speed);
                moved = true; }
            if (keyState['d']) { camera.position.addScaledVector(right, speed);
                moved = true; }

            // 轻微限制相机高度，防止陷入地下
            if (camera.position.y < 0.5) camera.position.y = 0.5;
        }

        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            updateMovement(delta);
            controls.update();
            renderer.render(scene, camera);
        }

        // --- 启动 ---
        function start() {
            try {
                initScene();
                setupMouseInteraction();
                setupKeyboard();
                animate();
            } catch (err) {
                console.error('Mini MC 3D 初始化失败:', err);
                // 显示友好的错误提示
                const tip = document.querySelector('.tip');
                if (tip) {
                    tip.innerHTML = '⚠️ 加载失败，请刷新页面重试<br>如果问题持续，请检查网络连接';
                    tip.style.background = 'rgba(180,40,40,0.8)';
                }
            }
        }

        // DOM 准备就绪后启动
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', start);
        } else {
            start();
        }
    </script>
</body>
</html>
