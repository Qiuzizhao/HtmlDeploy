<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恐怖游戏屋 · Horror Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://pic.588ku.com/background/20210120/our/588ku_1611154559490222.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 心跳闪烁动画 */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 22%, 24%, 55% { opacity: 0.6; }
        }

        .header {
            text-align: center;
            padding: 60px 20px 30px;
            animation: flicker 3s infinite alternate;
        }

        .header h1 {
            font-size: 48px;
            color: #b71c1c;
            text-shadow: 0 0 10px #000, 0 0 20px #b71c1c;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 18px;
            color: #aaa;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 音效按钮 */
        .sound-control {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #222;
            color: #b71c1c;
            border: 1px solid #b71c1c;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 999;
            transition: 0.3s;
        }
        .sound-control:hover {
            background: #b71c1c;
            color: #000;
        }

        /* 游戏卡片 */
        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .game-card {
            background: rgba(20,20,20,0.7);
            border: 1px solid #444;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.4s;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: #b71c1c;
            box-shadow: 0 0 25px #b71c1c;
        }

        .game-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            filter: brightness(0.6);
            transition: 0.4s;
        }

        .game-card:hover img {
            filter: brightness(0.9);
        }

        .game-info {
            padding: 20px;
        }

        .game-info h3 {
            color: #fff;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .game-info p {
            color: #999;
            font-size: 14px;
            line-height: 1.5;
        }

        .start-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #b71c1c;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .start-btn:hover {
            background: #8b0000;
        }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- 音效控制 -->
<button class="sound-control" id="soundBtn">🔊 开启恐怖音效</button>

<!-- 头部 -->
<div class="header">
    <h1>恐怖游戏屋</h1>
    <p>胆小勿入 · 心跳加速 · 沉浸式恐怖体验</p>
</div>

<!-- 游戏列表 -->
<div class="game-container">
    <!-- 游戏1 -->
    <div class="game-card" onclick="startGame(1)">
        <img src="https://img0.baidu.com/it/u=889545086,2564555067&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=751" alt="恐怖迷宫">
        <div class="game-info">
            <h3>午夜迷宫</h3>
            <p>黑暗中只有一丝微光，你必须找到出口，但有东西在跟着你…</p>
            <button class="start-btn">开始游戏</button>
        </div>
    </div>

    <!-- 游戏2 -->
    <div class="game-card" onclick="startGame(2)">
        <img src="https://img2.baidu.com/it/u=1246121806,2064015507&fm=253&fmt=auto&app=120&f=JPEG?w=500&h=741" alt="鬼屋逃脱">
        <div class="game-info">
            <h3>废弃医院</h3>
            <p>你被困在闹鬼医院，寻找线索逃生，随时会遭遇灵异事件。</p>
            <button class="start-btn">开始游戏</button>
        </div>
    </div>

    <!-- 游戏3 -->
    <div class="game-card" onclick="startGame(3)">
        <img src="https://img1.baidu.com/it/u=1270206005,4207486669&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=749" alt="恐惧追击">
        <div class="game-info">
            <h3>暗夜追击</h3>
            <p>它在追你！不要回头，不要停下，活下去是唯一目标。</p>
            <button class="start-btn">开始游戏</button>
        </div>
    </div>
</div>

<!-- 底部 -->
<div class="footer">
    <p>Horror Games © 2025 胆小者禁止访问</p>
</div>

<script>
    // 恐怖背景音乐（自动播放）
    let audio = new Audio('https://cdn.freesound.org/previews/410/410810_8493252-lq.mp3');
    audio.loop = true;
    audio.volume = 0.4;
    let soundOn = false;

    const soundBtn = document.getElementById('soundBtn');
    soundBtn.onclick = () => {
        if(!soundOn){
            audio.play();
            soundBtn.innerText = '🔇 关闭恐怖音效';
            soundOn = true;
        }else{
            audio.pause();
            soundBtn.innerText = '🔊 开启恐怖音效';
            soundOn = false;
        }
    }

    // 开始游戏
    function startGame(num){
        if(num === 1){
            alert('🧟 进入【午夜迷宫】\n胆小慎入！');
            window.open('https://www.example.com/horror-maze', '_blank');
        }else if(num === 2){
            alert('🏥 进入【废弃医院】\n你能活下来吗？');
            window.open('https://www.example.com/haunted-hospital', '_blank');
        }else if(num === 3){
            alert('👹 进入【暗夜追击】\n快跑！！');
            window.open('https://www.example.com/horror-run', '_blank');
        }
    }
</script>

</body>
</html>
