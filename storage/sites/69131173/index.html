<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D跑酷 - 二段跳完美版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
            z-index: 10;
            pointer-events: none;
            letter-spacing: 1px;
        }
        .ui span {
            color: #ffd93d;
        }

        .tips {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 24px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .tips kbd {
            background: rgba(255, 255, 255, 0.15);
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin: 0 2px;
        }

        .over {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            padding: 48px 64px 40px;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            min-width: 320px;
        }
        #gameOver {
            font-size: 52px;
            color: #ff6b6b;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(255, 80, 80, 0.3);
            font-weight: 900;
            letter-spacing: 2px;
        }
        #finalScore {
            font-size: 22px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 28px;
            font-weight: 300;
        }
        #finalScore span {
            color: #ffd93d;
            font-weight: 700;
            font-size: 26px;
        }
        #restart {
            padding: 14px 40px;
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 20px rgba(238, 90, 36, 0.4);
            letter-spacing: 1px;
        }
        #restart:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 30px rgba(238, 90, 36, 0.6);
        }
        #restart:active {
            transform: translateY(1px) scale(0.98);
        }

        @media (max-width: 640px) {
            .ui {
                font-size: 22px;
                top: 14px;
                left: 14px;
            }
            .tips {
                font-size: 12px;
                padding: 8px 16px;
                white-space: normal;
                bottom: 16px;
                max-width: 92%;
            }
            .over {
                padding: 32px 28px 28px;
                min-width: 260px;
            }
            #gameOver {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>

    <div class="ui">🏆 分数 <span id="score">0</span></div>
    <div class="tips">
        <kbd>A</kbd> <kbd>D</kbd> 左右移动 &nbsp;·&nbsp; <kbd>空格</kbd> 二段跳
    </div>
    <div class="over" id="overlay">
        <div id="gameOver">游戏结束</div>
        <div id="finalScore">得分 <span id="finalScoreValue">0</span></div>
        <button id="restart">重新开始</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // ─── DOM 引用 ───────────────────────────────────────────────
        const scoreEl = document.getElementById('score');
        const overlayEl = document.getElementById('overlay');
        const finalScoreEl = document.getElementById('finalScoreValue');
        const restartBtn = document.getElementById('restart');

        // ─── 游戏状态 ───────────────────────────────────────────────
        let score = 0;
        let gameRunning = true;
        let jumpCount = 0;
        const MAX_JUMP = 2;
        const MOVE_SPEED = 18;       // 前进速度
        const SIDE_SPEED = 14;       // 左右移动速度
        const JUMP_POWER = 13;       // 跳跃力度
        const PLAYER_HALF = 1;
        const PLAYER_HEIGHT = 4;
        const OBSTACLE_HALF = 2.5;
        const OBSTACLE_HEIGHT = 8;
        const GROUND_Y = -5;
        const DESPAWN_Z = 40;

        let animFrameId = null;
        let particleFrameId = null;
        let activeObstacles = [];
        const keys = {};

        // ─── Three.js 场景 ──────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 120, 260);

        const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 400);
        camera.position.set(0, 14, 28);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.prepend(renderer.domElement);

        // ─── 灯光 ──────────────────────────────────────────────────
        const ambient = new THREE.AmbientLight(0x8899bb, 0.6);
        scene.add(ambient);

        const hemi = new THREE.HemisphereLight(0x87ceeb, 0x3e2a1e, 0.6);
        scene.add(hemi);

        const sun = new THREE.DirectionalLight(0xffeedd, 1.8);
        sun.position.set(30, 40, 20);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 1024;
        sun.shadow.mapSize.height = 1024;
        sun.shadow.camera.near = 1;
        sun.shadow.camera.far = 120;
        sun.shadow.camera.left = -40;
        sun.shadow.camera.right = 40;
        sun.shadow.camera.top = 40;
        sun.shadow.camera.bottom = -40;
        sun.shadow.bias = -0.001;
        scene.add(sun);

        // ─── 地面 ──────────────────────────────────────────────────
        const groundGeo = new THREE.PlaneGeometry(600, 1000);
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x4a7c59,
            roughness: 0.85,
            metalness: 0.0,
        });
        const groundMesh = new THREE.Mesh(groundGeo, groundMat);
        groundMesh.rotation.x = -Math.PI / 2;
        groundMesh.position.y = GROUND_Y;
        groundMesh.receiveShadow = true;
        scene.add(groundMesh);

        // 地面条纹（动态复用，防止跑出边界）
        const stripeGroup = new THREE.Group();
        scene.add(stripeGroup);
        const stripeMat = new THREE.MeshStandardMaterial({
            color: 0x3d6b4a,
            roughness: 0.9,
        });
        for (let i = -20; i <= 60; i++) {
            const stripe = new THREE.Mesh(new THREE.PlaneGeometry(36, 3), stripeMat);
            stripe.rotation.x = -Math.PI / 2;
            stripe.position.set(0, GROUND_Y + 0.02, -i * 14);
            stripe.receiveShadow = true;
            stripeGroup.add(stripe);
        }

        // ─── 玩家 ──────────────────────────────────────────────────
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        const boxMat = new THREE.MeshStandardMaterial({
            color: 0xff5252,
            roughness: 0.3,
            metalness: 0.1,
            emissive: 0xff2222,
            emissiveIntensity: 0.08,
        });
        const playerMesh = new THREE.Mesh(new THREE.BoxGeometry(2, PLAYER_HEIGHT, 2), boxMat);
        playerMesh.castShadow = true;
        playerMesh.receiveShadow = true;
        playerMesh.position.y = PLAYER_HEIGHT / 2; // 中心对齐组内
        playerGroup.add(playerMesh);

        // 眼睛装饰
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        for (let side = -1; side <= 1; side += 2) {
            const eye = new THREE.Mesh(new THREE.SphereGeometry(0.22, 8, 8), eyeMat);
            eye.position.set(side * 0.55, PLAYER_HEIGHT * 0.65, -1.01);
            playerGroup.add(eye);
            const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.10, 6, 6), pupilMat);
            pupil.position.set(side * 0.55, PLAYER_HEIGHT * 0.65, -1.13);
            playerGroup.add(pupil);
        }

        // ─── Cannon.js 物理世界 ────────────────────────────────────
        const world = new CANNON.World();
        world.gravity.set(0, -35, 0);
        world.broadphase = new CANNON.SAPBroadphase(world);

        // 地面刚体
        const groundBody = new CANNON.Body({
            mass: 0,
            shape: new CANNON.Box(new CANNON.Vec3(300, 0.5, 500))
        });
        groundBody.position.set(0, GROUND_Y - 0.5, 0);
        world.addBody(groundBody);

        // 玩家刚体
        const playerBody = new CANNON.Body({
            mass: 5,
            shape: new CANNON.Box(new CANNON.Vec3(PLAYER_HALF, PLAYER_HEIGHT / 2, PLAYER_HALF)),
            position: new CANNON.Vec3(0, 2, 0),
            fixedRotation: true,
            linearDamping: 0.0,
        });
        world.addBody(playerBody);

        // ─── 障碍物系统 ────────────────────────────────────────────
        const obsMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.7 });
        const obsMatDark = new THREE.MeshStandardMaterial({ color: 0x6b3f1a, roughness: 0.8 });

        function createObstacleMesh() {
            const group = new THREE.Group();
            const main = new THREE.Mesh(new THREE.BoxGeometry(OBSTACLE_HALF * 2, OBSTACLE_HEIGHT, OBSTACLE_HALF * 2), obsMat);
            main.castShadow = true;
            main.receiveShadow = true;
            main.position.y = OBSTACLE_HEIGHT / 2;
            group.add(main);

            const top = new THREE.Mesh(new THREE.BoxGeometry(OBSTACLE_HALF * 2.2, 0.6, OBSTACLE_HALF * 2.2), obsMatDark);
            top.castShadow = true;
            top.position.y = OBSTACLE_HEIGHT + 0.3;
            group.add(top);

            return group;
        }

        function spawnObstacle(z) {
            const lane = Math.floor(Math.random() * 5) - 2; // -2, -1, 0, 1, 2
            const x = lane * 4.5;
            const y = GROUND_Y;

            const mesh = createObstacleMesh();
            scene.add(mesh);

            const body = new CANNON.Body({
                mass: 0,
                shape: new CANNON.Box(new CANNON.Vec3(OBSTACLE_HALF, OBSTACLE_HEIGHT / 2, OBSTACLE_HALF)),
                position: new CANNON.Vec3(x, y + OBSTACLE_HEIGHT / 2, z)
            });
            world.addBody(body);

            const entry = { mesh, body, active: true };
            activeObstacles.push(entry);
        }

        function buildTrack() {
            for (let i = 0; i < 30; i++) {
                spawnObstacle(-i * 22 - 30);
            }
        }

        // ─── 核心逻辑 ───────────────────────────────────────────────
        let lastTime = performance.now();

        function gameLoop(time) {
            if (!gameRunning) return;

            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;

            // 物理步进
            world.step(1 / 60);

            // 玩家物理控制：自动向前 + 左右移动
            playerBody.velocity.z = -MOVE_SPEED;

            if (keys['KeyA'] || keys['ArrowLeft']) {
                playerBody.velocity.x = -SIDE_SPEED;
            } else if (keys['KeyD'] || keys['ArrowRight']) {
                playerBody.velocity.x = SIDE_SPEED;
            } else {
                playerBody.velocity.x = 0;
            }

            // 边界约束
            if (playerBody.position.x < -10) playerBody.position.x = -10;
            if (playerBody.position.x > 10) playerBody.position.x = 10;

            // 落地检测（精确判断刚体底部是否接近地面）
            const isGrounded = playerBody.position.y <= GROUND_Y + PLAYER_HEIGHT / 2 + 0.05;
            if (isGrounded) {
                jumpCount = 0;
            }

            // 同步玩家视觉
            playerGroup.position.copy(playerBody.position);
            // 左右移动倾斜特效
            const targetRotZ = -(playerBody.velocity.x / SIDE_SPEED) * 0.08;
            playerGroup.rotation.z += (targetRotZ - playerGroup.rotation.z) * 0.1;

            // 动态循环回收障碍物
            const playerZ = playerBody.position.z;
            for (let i = 0; i < activeObstacles.length; i++) {
                const obs = activeObstacles[i];
                // 如果障碍物已经被玩家抛在脑后
                if (obs.body.position.z > playerZ + DESPAWN_Z) {
                    const lane = Math.floor(Math.random() * 5) - 2;
                    obs.body.position.z -= activeObstacles.length * 22; // 循环挪到最前方
                    obs.body.position.x = lane * 4.5;
                }
                // 让 Mesh 完美同步物理坐标
                obs.mesh.position.copy(obs.body.position);
                obs.mesh.position.y = obs.body.position.y - OBSTACLE_HEIGHT / 2;
            }

            // 地面条纹无限循环效果
            stripeGroup.children.forEach(stripe => {
                if (stripe.position.z > playerZ + 40) {
                    stripe.position.z -= stripeGroup.children.length * 14;
                }
            });

            // 死亡检测：高空坠落或掉落（理论上有了刚体不会掉落，除非被挤出边缘）
            if (playerBody.position.y < GROUND_Y - 2) {
                endGame();
                return;
            }

            // 计分
            score += dt * 10;
            scoreEl.textContent = Math.floor(score);

            // 平滑相机跟随
            const targetCamX = playerBody.position.x * 0.5;
            const targetCamY = playerBody.position.y + 10;
            const targetCamZ = playerBody.position.z + 24;
            camera.position.x += (targetCamX - camera.position.x) * 0.1;
            camera.position.y += (targetCamY - camera.position.y) * 0.1;
            camera.position.z += (targetCamZ - camera.position.z) * 0.1;
            camera.lookAt(playerBody.position.x * 0.3, playerBody.position.y * 0.5 + 2, playerBody.position.z - 5);

            renderer.render(scene, camera);
            animFrameId = requestAnimationFrame(gameLoop);
        }

        // ─── 碰撞触发死亡 ───────────────────────────────────────────
        playerBody.addEventListener('collide', (e) => {
            // 如果撞击的不是地面，说明撞到了障碍物
            if (e.body !== groundBody) {
                endGame();
            }
        });

        // ─── 跳跃粒子 ──────────────────────────────────────────────
        const particles = [];

        function spawnJumpParticles(x, y, z) {
            const count = 15;
            for (let i = 0; i < count; i++) {
                const geo = new THREE.SphereGeometry(0.1, 4, 4);
                const mat = new THREE.MeshBasicMaterial({
                    color: 0xffd93d,
                    transparent: true,
                    opacity: 0.9,
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x + (Math.random() - 0.5), y, z + (Math.random() - 0.5));
                
                const vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 6,
                    Math.random() * 4 + 2,
                    (Math.random() - 0.5) * 4
                );
                scene.add(mesh);
                particles.push({ mesh, vel, life: 1.0 });
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.vel.y -= 9.8 * dt; // 粒子重力
                p.mesh.position.addScaledVector(p.vel, dt);
                p.life -= dt * 2.0;
                p.mesh.material.opacity = Math.max(0, p.life);
                p.mesh.scale.setScalar(p.life);
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.geometry.dispose();
                    p.mesh.material.dispose();
                    particles.splice(i, 1);
                }
            }
        }

        // ─── 事件监听 ───────────────────────────────────────────────
        function onKeyDown(e) {
            keys[e.code] = true;
            
            // 将跳跃逻辑完全移入 KeyDown 单次触发，完美解决无限跳 Bug
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameRunning && jumpCount < MAX_JUMP) {
                    playerBody.velocity.y = JUMP_POWER;
                    jumpCount++;
                    spawnJumpParticles(playerBody.position.x, playerBody.position.y - PLAYER_HEIGHT / 2, playerBody.position.z);
                }
            }
        }

        function onKeyUp(e) {
            keys[e.code] = false;
        }

        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onResize);

        // ─── 游戏生命周期管理 ────────────────────────────────────────
        function endGame() {
            if (!gameRunning) return;
            gameRunning = false;
            
            if (animFrameId) cancelAnimationFrame(animFrameId);
            
            finalScoreEl.textContent = Math.floor(score);
            overlayEl.style.display = 'block';
        }

        function restartGame() {
            overlayEl.style.display = 'none';
            
            // 清理旧障碍物
            for (const obs of activeObstacles) {
                scene.remove(obs.mesh);
                world.removeBody(obs.body);
                obs.mesh.traverse((child) => {
                    if (child.isMesh) {
                        child.geometry.dispose();
                        child.material.dispose();
                    }
                });
            }
            activeObstacles = [];

            // 清理旧粒子
            for (const p of particles) {
                scene.remove(p.mesh);
                p.mesh.geometry.dispose();
                p.mesh.material.dispose();
            }
            particles.length = 0;

            // 重置玩家状态与物理刚体
            playerBody.position.set(0, 2, 0);
            playerBody.velocity.set(0, 0, 0);
            playerGroup.position.set(0, 2, 0);
            playerGroup.rotation.set(0, 0, 0);
            jumpCount = 0;
            score = 0;
            scoreEl.textContent = '0';

            // 重新初始化轨道
            buildTrack();

            // 重新启动循环
            gameRunning = true;
            lastTime = performance.now();
            animFrameId = requestAnimationFrame(gameLoop);
        }

        restartBtn.addEventListener('click', restartGame);

        // ─── 启动 ──────────────────────────────────────────────────
        buildTrack();
        lastTime = performance.now();
        animFrameId = requestAnimationFrame(gameLoop);

        // 独立于游戏主循环更新粒子
        function tickParticles() {
            if (gameRunning) updateParticles(1 / 60);
            particleFrameId = requestAnimationFrame(tickParticles);
        }
        tickParticles();

        console.log('🏃 3D跑酷已完美启动 — [空格]二段跳 | [A/D]或[左右方向键]控制移动');
    </script>
</body>
</html>
