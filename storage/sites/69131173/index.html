<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D跑酷 - 二段跳版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        canvas { display: block; }

        .ui {
            position: absolute; top: 20px; left: 20px;
            color: white; font-size: 24px;
            text-shadow: 2px 2px 4px #000;
            z-index: 999;
            pointer-events: none;
        }

        .tips {
            position: absolute; top: 55px; left: 20px;
            color: #0ff; font-size: 16px;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }

        .over {
            position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; display: none;
            z-index: 1000;
        }

        #gameOver {
            font-size: 60px; color: #f44;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #000;
        }

        #restart {
            padding: 10px 25px; font-size: 20px;
            background: #222; color: white;
            border: 2px solid white; cursor: pointer;
            transition: background 0.2s;
        }
        #restart:hover { background: #444; }
        #restart:active { background: #555; }
    </style>
</head>
<body>

<div class="ui">分数：<span id="score">0</span></div>
<div class="tips">W前进 A/D左右移动 | 空格二段跳 | 红框=碰撞箱</div>
<div class="over">
    <div id="gameOver">游戏结束</div>
    <button id="restart" onclick="restartGame()">重新开始</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.min.js"></script>

<script>
(function() {
    'use strict';

    let score = 0;
    let gameRunning = true;
    const moveSpeed = 8;
    const jumpPower = 9;
    let jumpCount = 0;
    const maxJump = 2;

    let scene, camera, renderer;
    let world;
    let player, playerBody;
    let playerHelper;
    let groundBody;

    const keys = {};
    const keyDownHandler = (e) => { keys[e.code] = true; };
    const keyUpHandler = (e) => { keys[e.code] = false; };
    document.addEventListener('keydown', keyDownHandler);
    document.addEventListener('keyup', keyUpHandler);

    const scoreElement = document.getElementById('score');
    const overElement = document.querySelector('.over');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        world = new CANNON.World();
        world.gravity.set(0, -25, 0);
        world.broadphase = new CANNON.SAPBroadphase(world);
        world.defaultContactMaterial.friction = 0.3;

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(30, 100, 30);
        light.castShadow = true;
        light.shadow.mapSize.width = 1024;
        light.shadow.mapSize.height = 1024;
        const d = 50;
        light.shadow.camera.left = -d;
        light.shadow.camera.right = d;
        light.shadow.camera.top = d;
        light.shadow.camera.bottom = -d;
        light.shadow.camera.near = 1;
        light.shadow.camera.far = 200;
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const groundGeo = new THREE.BoxGeometry(22, 10, 8000);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x3a7d44 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.y = -5;
        ground.receiveShadow = true;
        scene.add(ground);

        groundBody = new CANNON.Body({
            mass: 0,
            shape: new CANNON.Box(new CANNON.Vec3(11, 5, 4000)),
            position: new CANNON.Vec3(0, -5, 0)
        });
        world.addBody(groundBody);

        const playerGeo = new THREE.BoxGeometry(2, 4, 2);
        const playerMat = new THREE.MeshLambertMaterial({ color: 0xff5252 });
        player = new THREE.Mesh(playerGeo, playerMat);
        player.castShadow = true;
        scene.add(player);

        playerHelper = new THREE.BoxHelper(player, 0xff0000);
        scene.add(playerHelper);

        playerBody = new CANNON.Body({
            mass: 6,
            shape: new CANNON.Box(new CANNON.Vec3(1, 2, 1)),
            position: new CANNON.Vec3(0, 10, 0),
            fixedRotation: true,
            linearDamping: 0.1
        });
        world.addBody(playerBody);

        for (let i = 1; i < 200; i++) {
            const z = -i * 28;
            const x = (Math.random() > 0.5 ? 5 : -5) + (Math.random() - 0.5) * 4;
            createObstacle(x, 0, z);
        }
    }

    function createObstacle(x, y, z) {
        const geo = new THREE.BoxGeometry(5, 8, 5);
        const mat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, y, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);

        const body = new CANNON.Body({
            mass: 0,
            shape: new CANNON.Box(new CANNON.Vec3(2.5, 4, 2.5)),
            position: new CANNON.Vec3(x, y, z)
        });
        world.addBody(body);

        body.addEventListener('collide', (e) => {
            if (gameRunning && e.body === playerBody) {
                gameOver();
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (!gameRunning) return;

        world.step(1 / 60);

        player.position.copy(playerBody.position);
        player.quaternion.copy(playerBody.quaternion);
        playerHelper.update();

        playerBody.position.z -= moveSpeed * 1.1;
        playerBody.velocity.z = 0;

        if (keys['KeyA'] || keys['ArrowLeft']) {
            playerBody.position.x = THREE.MathUtils.lerp(playerBody.position.x, -8, 0.12);
        }
        if (keys['KeyD'] || keys['ArrowRight']) {
            playerBody.position.x = THREE.MathUtils.lerp(playerBody.position.x, 8, 0.12);
        }

        if (keys['Space'] && jumpCount < maxJump) {
            playerBody.velocity.y = jumpPower;
            jumpCount++;
            keys['Space'] = false;
        }

        if (playerBody.position.y < 5.5) {
            jumpCount = 0;
        }

        if (playerBody.position.y < -30) {
            gameOver();
        }

        score += 0.1;
        scoreElement.textContent = Math.floor(score);

        const targetPos = new THREE.Vector3(
            player.position.x,
            player.position.y + 9,
            player.position.z + 24
        );
        camera.position.lerp(targetPos, 0.12);
        camera.lookAt(player.position.x, player.position.y + 2, player.position.z);

        renderer.render(scene, camera);
    }

    function gameOver() {
        gameRunning = false;
        overElement.style.display = 'block';
    }

    window.restartGame = function() {
        window.location.reload();
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
    animate();
})();
</script>
</body>
</html>
