<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D跑酷 - 纯净无限大陆版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
            z-index: 10;
            pointer-events: none;
            letter-spacing: 1px;
        }
        .ui span {
            color: #ffd93d;
        }

        .tips {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 24px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .tips kbd {
            background: rgba(255, 255, 255, 0.15);
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin: 0 2px;
        }

        .over {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            padding: 48px 64px 40px;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            min-width: 320px;
        }
        #gameOver {
            font-size: 52px;
            color: #ff6b6b;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(255, 80, 80, 0.3);
            font-weight: 900;
            letter-spacing: 2px;
        }
        #finalScore {
            font-size: 22px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 28px;
            font-weight: 300;
        }
        #finalScore span {
            color: #ffd93d;
            font-weight: 700;
            font-size: 26px;
        }
        #restart {
            padding: 14px 40px;
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 20px rgba(238, 90, 36, 0.4);
            letter-spacing: 1px;
        }
        #restart:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 30px rgba(238, 90, 36, 0.6);
        }
        #restart:active {
            transform: translateY(1px) scale(0.98);
        }

        @media (max-width: 640px) {
            .ui {
                font-size: 22px;
                top: 14px;
                left: 14px;
            }
            .tips {
                font-size: 12px;
                padding: 8px 16px;
                white-space: normal;
                bottom: 16px;
                max-width: 92%;
            }
            .over {
                padding: 32px 28px 28px;
                min-width: 260px;
            }
            #gameOver {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>

    <div class="ui">🏆 分数 <span id="score">0</span></div>
    <div class="tips">
        <kbd>A</kbd> <kbd>D</kbd> 左右移动 &nbsp;·&nbsp; <kbd>空格</kbd> 二段跳
    </div>
    <div class="over" id="overlay">
        <div id="gameOver">游戏结束</div>
        <div id="finalScore">得分 <span id="finalScoreValue">0</span></div>
        <button id="restart">重新开始</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // ─── DOM 引用 ───────────────────────────────────────────────
        const scoreEl = document.getElementById('score');
        const overlayEl = document.getElementById('overlay');
        const finalScoreEl = document.getElementById('finalScoreValue');
        const restartBtn = document.getElementById('restart');

        // ─── 游戏状态与核心配置 ───────────────────────────────────────
        let score = 0;
        let gameRunning = true;
        let jumpCount = 0;
        const MAX_JUMP = 2;
        const MOVE_SPEED = 24;       // 前进速度
        const SIDE_SPEED = 16;       // 左右移动速度
        const JUMP_POWER = 14;       // 跳跃力度
        const PLAYER_HALF = 1;
        const PLAYER_HEIGHT = 4;
        const OBSTACLE_HALF = 2.5;
        const OBSTACLE_HEIGHT = 8;
        const GROUND_Y = -5;
        const DESPAWN_Z = 40;

        const CHUNK_LENGTH = 400;    // 单个地板块的长度
        const TRACK_WIDTH = 60;      // 地板网格的视觉宽度

        let animFrameId = null;
        let activeObstacles = [];
        const keys = {};

        // ─── Three.js 场景初始化 ──────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 120, 280);

        const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 400);
        camera.position.set(0, 14, 28);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.prepend(renderer.domElement);

        // ─── 环境光与太阳光（定向阴影） ──────────────────────────────────
        const ambient = new THREE.AmbientLight(0x8899bb, 0.6);
        scene.add(ambient);

        const hemi = new THREE.HemisphereLight(0x87ceeb, 0x3e2a1e, 0.6);
        scene.add(hemi);

        const sun = new THREE.DirectionalLight(0xffeedd, 1.8);
        sun.position.set(25, 45, -35); // 位于前方，使阴影自然向后投射
        sun.castShadow = true;
        sun.shadow.mapSize.width = 1024;
        sun.shadow.mapSize.height = 1024;
        sun.shadow.camera.near = 1;
        sun.shadow.camera.far = 160;
        sun.shadow.camera.left = -40;
        sun.shadow.camera.right = 40;
        sun.shadow.camera.top = 40;
        sun.shadow.camera.bottom = -40;
        sun.shadow.bias = -0.0008;
        scene.add(sun);

        // ─── Cannon.js 物理世界初始化 ─────────────────────────────────
        const world = new CANNON.World();
        world.gravity.set(0, -38, 0); 
        world.broadphase = new CANNON.SAPBroadphase(world);

        // 配置无摩擦材质，实现贴地自动狂奔
        const groundPhysicsMaterial = new CANNON.Material('groundMat');
        const playerPhysicsMaterial = new CANNON.Material('playerMat');

        const contactMat = new CANNON.ContactMaterial(playerPhysicsMaterial, groundPhysicsMaterial, {
            friction: 0.0,
            restitution: 0.0
        });
        world.addContactMaterial(contactMat);

        // ─── 创建双块无限交替循环地板（去除了斑马线条纹） ─────────────────────
        const groundGeo = new THREE.PlaneGeometry(TRACK_WIDTH, CHUNK_LENGTH);
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x4a7c59,
            roughness: 0.85,
            metalness: 0.0,
        });

        // 物理碰撞形状
        const groundShape = new CANNON.Box(new CANNON.Vec3(TRACK_WIDTH, 0.5, CHUNK_LENGTH / 2));

        // 地板 1 号
        const groundMesh1 = new THREE.Mesh(groundGeo, groundMat);
        groundMesh1.rotation.x = -Math.PI / 2;
        groundMesh1.position.set(0, GROUND_Y, -CHUNK_LENGTH / 2);
        groundMesh1.receiveShadow = true;
        scene.add(groundMesh1);

        const groundBody1 = new CANNON.Body({ mass: 0, shape: groundShape, material: groundPhysicsMaterial });
        groundBody1.position.set(0, GROUND_Y - 0.5, -CHUNK_LENGTH / 2);
        world.addBody(groundBody1);

        // 地板 2 号（紧密接龙拼接）
        const groundMesh2 = new THREE.Mesh(groundGeo, groundMat);
        groundMesh2.rotation.x = -Math.PI / 2;
        groundMesh2.position.set(0, GROUND_Y, -CHUNK_LENGTH * 1.5);
        groundMesh2.receiveShadow = true;
        scene.add(groundMesh2);

        const groundBody2 = new CANNON.Body({ mass: 0, shape: groundShape, material: groundPhysicsMaterial });
        groundBody2.position.set(0, GROUND_Y - 0.5, -CHUNK_LENGTH * 1.5);
        world.addBody(groundBody2);

        // ─── 玩家角色构建 ────────────────────────────────────────────
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        const boxMat = new THREE.MeshStandardMaterial({
            color: 0xff5252,
            roughness: 0.3,
            metalness: 0.1,
            emissive: 0xff2222,
            emissiveIntensity: 0.08,
        });
        const playerMesh = new THREE.Mesh(new THREE.BoxGeometry(2, PLAYER_HEIGHT, 2), boxMat);
        playerMesh.castShadow = true;
        playerMesh.receiveShadow = true;
        playerMesh.position.y = PLAYER_HEIGHT / 2;
        playerGroup.add(playerMesh);

        // 角色大眼睛
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        for (let side = -1; side <= 1; side += 2) {
            const eye = new THREE.Mesh(new THREE.SphereGeometry(0.22, 8, 8), eyeMat);
            eye.position.set(side * 0.55, PLAYER_HEIGHT * 0.65, -1.01);
            playerGroup.add(eye);
            const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.10, 6, 6), pupilMat);
            pupil.position.set(side * 0.55, PLAYER_HEIGHT * 0.65, -1.13);
            playerGroup.add(pupil);
        }

        // 玩家物理实体
        const playerBody = new CANNON.Body({
            mass: 5,
            shape: new CANNON.Box(new CANNON.Vec3(PLAYER_HALF, PLAYER_HEIGHT / 2, PLAYER_HALF)),
            position: new CANNON.Vec3(0, 2, 0),
            fixedRotation: true,
            linearDamping: 0.0,
            material: playerPhysicsMaterial
        });
        world.addBody(playerBody);

        // ─── 障碍物循环生成系统 ────────────────────────────────────────
        const obsMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.7 });
        const obsMatDark = new THREE.MeshStandardMaterial({ color: 0x6b3f1a, roughness: 0.8 });

        function createObstacleMesh() {
            const group = new THREE.Group();
            const main = new THREE.Mesh(new THREE.BoxGeometry(OBSTACLE_HALF * 2, OBSTACLE_HEIGHT, OBSTACLE_HALF * 2), obsMat);
            main.castShadow = true;
            main.receiveShadow = true;
            main.position.y = OBSTACLE_HEIGHT / 2;
            group.add(main);

            const top = new THREE.Mesh(new THREE.BoxGeometry(OBSTACLE_HALF * 2.2, 0.6, OBSTACLE_HALF * 2.2), obsMatDark);
            top.castShadow = true;
            top.position.y = OBSTACLE_HEIGHT + 0.3;
            group.add(top);

            return group;
        }

        function spawnObstacle(z) {
            const lane = Math.floor(Math.random() * 5) - 2; 
            const x = lane * 4.5;
            const y = GROUND_Y;

            const mesh = createObstacleMesh();
            scene.add(mesh);

            const body = new CANNON.Body({
                mass: 0,
                shape: new CANNON.Box(new CANNON.Vec3(OBSTACLE_HALF, OBSTACLE_HEIGHT / 2, OBSTACLE_HALF)),
                position: new CANNON.Vec3(x, y + OBSTACLE_HEIGHT / 2, z)
            });
            world.addBody(body);

            activeObstacles.push({ mesh, body });
        }

        function buildTrack() {
            for (let i = 0; i < 35; i++) {
                spawnObstacle(-i * 22 - 45);
            }
        }

        // ─── 核心游戏帧渲染循环 ────────────────────────────────────────
        let lastTime = performance.now();

        function gameLoop(time) {
            if (!gameRunning) return;

            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;

            world.step(1 / 60);

            // 1. 恒定自动前向冲锋物理速度
            playerBody.velocity.z = -MOVE_SPEED;

            // 左右转向操纵
            if (keys['KeyA'] || keys['ArrowLeft']) {
                playerBody.velocity.x = -SIDE_SPEED;
            } else if (keys['KeyD'] || keys['ArrowRight']) {
                playerBody.velocity.x = SIDE_SPEED;
            } else {
                playerBody.velocity.x = 0;
            }

            // 2. 严密的赛道左右边缘空气墙锁
            const MAX_X_BORDER = 9.2;
            if (playerBody.position.x < -MAX_X_BORDER) {
                playerBody.position.x = -MAX_X_BORDER;
                if(playerBody.velocity.x < 0) playerBody.velocity.x = 0;
            }
            if (playerBody.position.x > MAX_X_BORDER) {
                playerBody.position.x = MAX_X_BORDER;
                if(playerBody.velocity.x > 0) playerBody.velocity.x = 0;
            }

            // 地面接触与二段跳恢复状态
            const isGrounded = playerBody.position.y <= GROUND_Y + PLAYER_HEIGHT / 2 + 0.05;
            if (isGrounded) {
                jumpCount = 0;
            }

            // 同步玩家渲染网格
            playerGroup.position.copy(playerBody.position);
            const targetRotZ = -(playerBody.velocity.x / SIDE_SPEED) * 0.08;
            playerGroup.rotation.z += (targetRotZ - playerGroup.rotation.z) * 0.1;

            const playerZ = playerBody.position.z;

            // 3. 双块大平板无缝衔接无限交替拼接逻辑
            if (playerZ < groundMesh1.position.z - CHUNK_LENGTH / 2) {
                groundMesh1.position.z -= CHUNK_LENGTH * 2;
                groundBody1.position.z -= CHUNK_LENGTH * 2;
            }
            if (playerZ < groundMesh2.position.z - CHUNK_LENGTH / 2) {
                groundMesh2.position.z -= CHUNK_LENGTH * 2;
                groundBody2.position.z -= CHUNK_LENGTH * 2;
            }

            // 纵向无限循环回收并重新分配远端障碍物
            for (let i = 0; i < activeObstacles.length; i++) {
                const obs = activeObstacles[i];
                if (obs.body.position.z > playerZ + DESPAWN_Z) {
                    const lane = Math.floor(Math.random() * 5) - 2;
                    obs.body.position.z -= activeObstacles.length * 22; 
                    obs.body.position.x = lane * 4.5;
                }
                obs.mesh.position.copy(obs.body.position);
                obs.mesh.position.y = obs.body.position.y - OBSTACLE_HEIGHT / 2;
            }

            // 万一穿模意外落下的坠落兜底
            if (playerBody.position.y < GROUND_Y - 4) {
                endGame();
                return;
            }

            // 自动计算奔跑分数
            score += dt * 12;
            scoreEl.textContent = Math.floor(score);

            // 高动态摄像机顺滑跟随
            const targetCamX = playerBody.position.x * 0.5;
            const targetCamY = playerBody.position.y + 10;
            const targetCamZ = playerBody.position.z + 24;
            camera.position.x += (targetCamX - camera.position.x) * 0.1;
            camera.position.y += (targetCamY - camera.position.y) * 0.1;
            camera.position.z += (targetCamZ - camera.position.z) * 0.1;
            camera.lookAt(playerBody.position.x * 0.3, playerBody.position.y * 0.5 + 2, playerBody.position.z - 5);

            // 太阳光死死锚定玩家前进距离，保证阴影稳定性
            sun.position.set(playerBody.position.x + 25, 45, playerBody.position.z - 35);
            sun.target = playerGroup;

            renderer.render(scene, camera);
            animFrameId = requestAnimationFrame(gameLoop);
        }

        // ─── 物理撞击毁灭判定 ─────────────────────────────────────────
        playerBody.addEventListener('collide', (e) => {
            if (e.body !== groundBody1 && e.body !== groundBody2) {
                endGame();
            }
        });

        // ─── 跳跃专属喷气粒子特效 ──────────────────────────────────────
        const particles = [];

        function spawnJumpParticles(x, y, z) {
            const count = 15;
            for (let i = 0; i < count; i++) {
                const geo = new THREE.SphereGeometry(0.1, 4, 4);
                const mat = new THREE.MeshBasicMaterial({
                    color: 0xffd93d,
                    transparent: true,
                    opacity: 0.9,
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x + (Math.random() - 0.5), y, z + (Math.random() - 0.5));
                
                const vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 6,
                    Math.random() * 4 + 2,
                    (Math.random() - 0.5) * 4
                );
                scene.add(mesh);
                particles.push({ mesh, vel, life: 1.0 });
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.vel.y -= 9.8 * dt;
                p.mesh.position.addScaledVector(p.vel, dt);
                p.life -= dt * 2.0;
                p.mesh.material.opacity = Math.max(0, p.life);
                p.mesh.scale.setScalar(p.life);
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.geometry.dispose();
                    p.mesh.material.dispose();
                    particles.splice(i, 1);
                }
            }
        }

        // ─── 输入监听事件 ─────────────────────────────────────────────
        function onKeyDown(e) {
            keys[e.code] = true;
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameRunning && jumpCount < MAX_JUMP) {
                    playerBody.velocity.y = JUMP_POWER;
                    jumpCount++;
                    spawnJumpParticles(playerBody.position.x, playerBody.position.y - PLAYER_HEIGHT / 2, playerBody.position.z);
                }
            }
        }

        function onKeyUp(e) {
            keys[e.code] = false;
        }

        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onResize);

        // ─── 游戏结束与重启重置 ────────────────────────────────────────
        function endGame() {
            if (!gameRunning) return;
            gameRunning = false;
            if (animFrameId) cancelAnimationFrame(animFrameId);
            finalScoreEl.textContent = Math.floor(score);
            overlayEl.style.display = 'block';
        }

        function restartGame() {
            overlayEl.style.display = 'none';
            
            // 销毁老旧的障碍物资源
            for (const obs of activeObstacles) {
                scene.remove(obs.mesh);
                world.removeBody(obs.body);
                obs.mesh.traverse((child) => {
                    if (child.isMesh) {
                        child.geometry.dispose();
                        child.material.dispose();
                    }
                });
            }
            activeObstacles = [];

            // 清理粒子
            for (const p of particles) {
                scene.remove(p.mesh);
                p.mesh.geometry.dispose();
                p.mesh.material.dispose();
            }
            particles.length = 0;

            // 还原双块物理地板位置
            groundMesh1.position.set(0, GROUND_Y, -CHUNK_LENGTH / 2);
            groundBody1.position.set(0, GROUND_Y - 0.5, -CHUNK_LENGTH / 2);
            groundMesh2.position.set(0, GROUND_Y, -CHUNK_LENGTH * 1.5);
            groundBody2.position.set(0, GROUND_Y - 0.5, -CHUNK_LENGTH * 1.5);

            // 还原玩家状态
            playerBody.position.set(0, 2, 0);
            playerBody.velocity.set(0, 0, 0);
            playerGroup.position.set(0, 2, 0);
            playerGroup.rotation.set(0, 0, 0);
            jumpCount = 0;
            score = 0;
            scoreEl.textContent = '0';

            buildTrack();

            gameRunning = true;
            lastTime = performance.now();
            animFrameId = requestAnimationFrame(gameLoop);
        }

        restartBtn.addEventListener('click', restartGame);

        // ─── 启动引擎 ────────────────────────────────────────────────
        buildTrack();
        lastTime = performance.now();
        animFrameId = requestAnimationFrame(gameLoop);

        function tickParticles() {
            if (gameRunning) updateParticles(1 / 60);
            requestAnimationFrame(tickParticles);
        }
        tickParticles();

        console.log('🚀 纯净版无限大陆跑酷已启动，横杠装饰已移除！');
    </script>
</body>
</html>
