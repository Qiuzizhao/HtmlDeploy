<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规则怪谈 - 深夜值班室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "SimSun", serif;
        }
        body {
            background: #0c0c0c;
            color: #cccccc;
            overflow: hidden;
            user-select: none;
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 开始界面 */
        #startPage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        #startPage h1 {
            font-size: 3rem;
            color: #992222;
            letter-spacing: 8px;
            animation: flicker 3s infinite;
        }
        #startPage p {
            font-size: 18px;
            max-width: 600px;
            line-height: 1.8;
            text-align: center;
            color: #aaa;
        }
        .btn {
            padding: 12px 40px;
            font-size: 18px;
            background: #222;
            color: #ddd;
            border: 1px solid #666;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: #441111;
            border-color: #992222;
        }

        /* 规则界面 */
        #rulePage {
            display: none;
            max-width: 700px;
            background: #1a1a1a;
            padding: 30px;
            border: 1px solid #555;
            line-height: 2;
            font-size: 17px;
        }
        #rulePage h2 {
            text-align: center;
            color: #bb3333;
            margin-bottom: 20px;
        }
        .rule-item {
            margin: 8px 0;
        }
        .warn {
            color: #dd4444;
        }

        /* 选择交互界面 */
        #gamePage {
            display: none;
            max-width: 700px;
            text-align: center;
        }
        #gamePage .dialog {
            font-size: 19px;
            line-height: 2;
            margin-bottom: 40px;
            padding: 20px;
            background: #151515;
            border: 1px dashed #444;
        }
        .choice-box {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* 结局界面 */
        #endPage {
            display: none;
            max-width: 650px;
            text-align: center;
            line-height: 2.2;
            font-size: 18px;
        }
        .end-normal {
            color: #88cc88;
        }
        .end-bad {
            color: #cc6666;
        }
        .end-dark {
            color: #9977aa;
        }

        /* 灯光闪烁动画 */
        @keyframes flicker {
            0%, 90%, 100% { opacity: 1; }
            95% { opacity: 0.7; }
        }
        /* 诡异抖动 */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.3s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 开始页面 -->
        <div id="startPage">
            <h1>深夜值班室</h1>
            <p>你被安排独自值守深夜办公楼值班室。<br>进门后你发现墙上贴着一份诡异的值班室规则。<br>请牢记所有规则，活下去，直到天亮。</p>
            <button class="btn" id="startBtn">进入值班室</button>
        </div>

        <!-- 规则阅读页面 -->
        <div id="rulePage">
            <h2>【值班室生存规则】</h2>
            <div class="rule-item">1. 值班室工作时间：22:00 ~ 06:00，天亮前不要试图离开房间。</div>
            <div class="rule-item">2. 门外会传来脚步声、敲门声，<span class="warn">绝对不要开门，不要回应。</span></div>
            <div class="rule-item">3. 房间内只有一盏白炽灯，若灯光变暗，立刻低头闭眼，数10秒再睁眼。</div>
            <div class="rule-item">4. 桌上的老式收音机只能播放新闻，<span class="warn">一旦传出歌声，马上关闭。</span></div>
            <div class="rule-item">5. 值班室只有你一人，如果看到第二个人影，假装没有看见。</div>
            <div class="rule-item">6. 凌晨3点整，会响起电话铃声，<span class="warn">禁止接听。</span></div>
            <br>
            <p style="text-align:center;color:#888;">请仔细阅读，记住所有规则 →</p>
            <div style="text-align:center;margin-top:20px;">
                <button class="btn" id="knowRuleBtn">我已牢记规则</button>
            </div>
        </div>

        <!-- 游戏主选择界面 -->
        <div id="gamePage">
            <div class="dialog" id="dialogText"></div>
            <div class="choice-box" id="choiceBox"></div>
        </div>

        <!-- 结局页面 -->
        <div id="endPage">
            <div id="endContent"></div>
            <button class="btn" id="restartBtn" style="margin-top:30px;">重新开始</button>
        </div>
    </div>

    <script>
        // 页面元素
        const startPage = document.getElementById('startPage');
        const rulePage = document.getElementById('rulePage');
        const gamePage = document.getElementById('gamePage');
        const endPage = document.getElementById('endPage');

        const startBtn = document.getElementById('startBtn');
        const knowRuleBtn = document.getElementById('knowRuleBtn');
        const restartBtn = document.getElementById('restartBtn');
        const dialogText = document.getElementById('dialogText');
        const choiceBox = document.getElementById('choiceBox');

        // 游戏进度、状态
        let step = 0;
        let ruleBroken = false; // 是否违反规则

        // 切换页面
        function showPage(page) {
            startPage.style.display = 'none';
            rulePage.style.display = 'none';
            gamePage.style.display = 'none';
            endPage.style.display = 'none';
            page.style.display = 'flex';
        }

        // 生成选择按钮
        function createChoice(text1, cb1, text2, cb2) {
            choiceBox.innerHTML = '';
            let b1 = document.createElement('button');
            let b2 = document.createElement('button');
            b1.className = 'btn';
            b2.className = 'btn';
            b1.innerText = text1;
            b2.innerText = text2;
            b1.onclick = cb1;
            b2.onclick = cb2;
            choiceBox.appendChild(b1);
            choiceBox.appendChild(b2);
        }

        // 进入结局
        function goEnd(type) {
            showPage(endPage);
            let content = document.getElementById('endContent');
            if(type === "normal"){
                content.className = "end-normal";
                content.innerHTML = `
                    <h2>【正常结局 · 安然天亮】</h2>
                    <p>你严格遵守了所有规则，熬到清晨六点。<br>窗外天色亮起，办公楼恢复了人声。<br>你平安走出值班室，今夜的诡异仿佛只是一场噩梦。<br>恭喜你，成功存活。</p>
                `;
            } else if(type === "bad1"){
                content.className = "end-bad";
                document.body.classList.add('shake');
                content.innerHTML = `
                    <h2>【坏结局 · 门外之物】</h2>
                    <p>你违背规则打开了门。<br>门外空无一物，但一股冰冷的气息涌入房间。<br>你再也没能等到天亮，永远留在了这间值班室……</p>
                `;
            } else if(type === "bad2"){
                content.className = "end-bad";
                document.body.classList.add('shake');
                content.innerHTML = `
                    <h2>【坏结局 · 迷失黑暗】</h2>
                    <p>灯光变暗时你没有闭眼。<br>黑暗中无数视线盯住了你。<br>意识逐渐模糊，你彻底迷失在了这片黑暗里。</p>
                `;
            } else if(type === "dark"){
                content.className = "end-dark";
                document.body.classList.add('shake');
                content.innerHTML = `
                    <h2>【诡异结局 · 同化】</h2>
                    <p>你接起了凌晨三点的电话。<br>听筒里没有声音，只有轻柔的歌声。<br>慢慢的，你开始习惯这里的一切，<br>从今往后，你也成为了值班室的“一部分”。</p>
                `;
            }
        }

        // 重置游戏
        function resetGame() {
            step = 0;
            ruleBroken = false;
            document.body.classList.remove('shake');
            showPage(startPage);
        }

        // 第一步：敲门声
        function step1() {
            dialogText.innerText = "刚坐下没多久，门外传来清晰的敲门声，还有模糊的呼唤声。\n你要开门查看吗？";
            createChoice("开门", ()=>goEnd("bad1"), "无视，不理会", step2);
        }

        // 第二步：灯光变暗
        function step2() {
            dialogText.innerText = "敲门声渐渐消失。突然，房间里的白炽灯开始慢慢变暗，四周变得昏暗。\n你选择？";
            createChoice("低头闭眼数10秒", step3, "抬头四处查看", ()=>goEnd("bad2"));
        }

        // 第三步：收音机唱歌
        function step3() {
            dialogText.innerText = "灯光恢复正常。桌上的老式收音机自动开启，原本的新闻播报，渐渐变成了阴冷的歌声。\n你要怎么做？";
            createChoice("立刻关闭收音机", step4, "继续听下去", step4);
        }

        // 第四步：凌晨三点电话
        function step4() {
            dialogText.innerText = "时间来到凌晨三点，桌上的老式电话突然尖锐地响了起来，整间屋子都在回荡铃声。\n你选择？";
            createChoice("挂断/不接听", ()=>goEnd("normal"), "伸手接起电话", ()=>goEnd("dark"));
        }

        // 事件绑定
        startBtn.addEventListener('click', () => {
            showPage(rulePage);
        });

        knowRuleBtn.addEventListener('click', () => {
            showPage(gamePage);
            step1();
        });

        restartBtn.addEventListener('click', resetGame);
    </script>
</body>
</html>
