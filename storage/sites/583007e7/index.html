<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>谁是卧底 人机对战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei}
body{background:#181c26;color:#fff;padding:20px;max-width:900px;margin:0 auto}
.card{background:#272c3a;border-radius:12px;padding:20px;margin-bottom:16px}
h1{text-align:center;color:#ffdd57;margin-bottom:20px}
h3{margin:10px 0;color:#eee}
.row{margin:12px 0}
label{display:inline-block;width:130px}
input,textarea{padding:8px 10px;border-radius:6px;border:0;font-size:16px}
input{width:160px;background:#3a4050;color:#fff}
textarea{width:100%;height:110px;background:#3a4050;color:#fff;resize:none}
.btn{padding:10px 16px;border:0;border-radius:6px;font-size:16px;cursor:pointer;margin:4px}
.btn-blue{background:#348eda;color:#fff}
.btn-green{background:#28b968;color:#fff}
.btn-red{background:#e74c3c;color:#fff}
.player-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin:16px 0}
.player-item{background:#3a4050;padding:12px;border-radius:8px;text-align:center}
.player-item.me{border:2px solid #ffdd57}
.player-item.out{opacity:0.3;text-decoration:line-through}
.tip{color:#b0b8c4;font-size:14px;margin:6px 0}
.word-box{font-size:26px;text-align:center;padding:30px;background:#254270;border-radius:10px;margin:20px 0;display:none}
.ai-talk{background:#303644;padding:10px;border-radius:8px;margin:8px 0}
.vote-btn-group{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.result-text{font-size:20px;text-align:center;margin:15px 0;font-weight:bold}
</style>
</head>
<body>
<h1>谁是卧底 人机对战</h1>

<!-- 设置面板 -->
<div class="card" id="setBox">
    <div class="row">
        <label>AI机器人数量：</label>
        <input type="number" id="aiNum" min="2" max="8" value="3">
    </div>
    <div class="row">
        <label>卧底总数：</label>
        <input type="number" id="underTotal" min="1" max="4" value="1">
    </div>
    <div class="row">
        <label>词库(平民|卧底)：</label>
        <textarea id="wordLib">奶茶|果茶
苹果|梨
手机|平板
火锅|麻辣烫
自行车|电动车
书桌|电脑桌
明星|网红
汉堡|肉夹馍</textarea>
    </div>
    <div>
        <button class="btn btn-green" onclick="startGame()">开启人机对局</button>
        <button class="btn btn-red" onclick="resetAll()">重置</button>
    </div>
    <div class="tip">总人数=1人类+AI数量；卧底不能≥总人数</div>
</div>

<!-- 游戏面板 -->
<div class="card" id="gameBox" style="display:none">
    <h3>第<span id="round">1</span>轮对局</h3>
    <div class="player-wrap" id="playerWrap"></div>

    <div class="word-box" id="myWordBox">
        你的词语：<span id="showWord"></span>
    </div>

    <div>
        <button class="btn btn-green" onclick="showMyWord()">查看我的词</button>
        <button class="btn btn-blue" onclick="aiSpeak()">AI依次发言</button>
        <button class="btn btn-blue" onclick="openVote()">开始投票</button>
    </div>

    <div id="talkBox"></div>

    <div id="votePanel" style="display:none;margin-top:15px">
        <h3>请投票淘汰一名玩家</h3>
        <div class="vote-btn-group" id="voteBtnWrap"></div>
        <button class="btn btn-green" onclick="submitVote()">确认投票</button>
        <div class="tip" id="voteTip"></div>
    </div>

    <div class="result-text" id="resText"></div>
</div>

<script>
let game = {
    players:[],
    civilWord:'',
    underWord:'',
    round:1,
    myVote:null,
    gameOver:false
};

// AI描述素材库
const aiDesc = {
    "奶茶":["饮品","甜的","店里常卖","有奶有茶","夏天常喝"],
    "果茶":["带水果","酸甜饮料","冲泡饮品","冷饮居多"],
    "苹果":["水果","红色居多","可以削皮吃","一年四季都有"],
    "梨":["水分很大","清热水果","形状圆圆的","生吃煲汤都行"],
    "手机":["随身通讯工具","能刷视频","触屏","每天离不开"],
    "平板":["大屏电子产品","追剧神器","手写画画","便携大屏"],
    "火锅":["多人一起吃","滚烫锅底","涮菜吃肉","聚餐首选"],
    "麻辣烫":["串串类小吃","汤汁浓郁","自选食材","街边美食"],
    "自行车":["两轮代步","靠脚蹬","绿色出行","锻炼身体"],
    "电动车":["充电两轮车","速度快","短途代步","不用蹬"],
    "书桌":["放书本","学习用家具","家里书房有"],
    "电脑桌":["放键盘显示器","办公打游戏","宽大台面"],
    "明星":["荧幕公众人物","粉丝很多","会拍戏唱歌"],
    "网红":["网络走红","直播带货","短视频博主"],
    "汉堡":["西式快餐","面包夹肉","速食食品"],
    "肉夹馍":["陕西小吃","面饼夹肉","街边小吃"]
};

// 解析词库
function getRandomWordPair(){
    let txt = document.getElementById('wordLib').value.trim();
    let arr = txt.split('\n').filter(s=>s.includes('|'));
    let pair = arr[Math.floor(Math.random()*arr.length)].split('|');
    return {civil:pair[0].trim(),under:pair[1].trim()};
}

// 初始化玩家（第一个是人，其余AI）
function initPlayers(aiCount,underCount){
    let total = aiCount + 1;
    let list = [];
    // 人类玩家
    list.push({id:1,name:'你',isMe:true,isUnder:false,out:false});
    // AI玩家
    for(let i=2;i<=total;i++){
        list.push({id:i,name:`AI${i-1}`,isMe:false,isUnder:false,out:false});
    }
    // 随机分配卧底
    let idxPool = [...Array(total).keys()];
    let underIdx = [];
    while(underIdx.length < underCount){
        let r = idxPool[Math.floor(Math.random()*idxPool.length)];
        if(!underIdx.includes(r)) underIdx.push(r);
    }
    underIdx.forEach(i=>list[i].isUnder=true);
    return list;
}

// 开始游戏
function startGame(){
    let aiNum = +document.getElementById('aiNum').value;
    let underTotal = +document.getElementById('underTotal').value;
    let totalPeople = aiNum + 1;
    if(underTotal >= totalPeople){
        alert('卧底数量不能大于等于总人数！');
        return;
    }
    let wordPair = getRandomWordPair();
    game.civilWord = wordPair.civil;
    game.underWord = wordPair.under;
    game.players = initPlayers(aiNum,underTotal);
    game.round = 1;
    game.gameOver = false;
    game.myVote = null;

    document.getElementById('setBox').style.display = 'none';
    document.getElementById('gameBox').style.display = 'block';
    document.getElementById('round').innerText = game.round;
    document.getElementById('talkBox').innerHTML = '';
    document.getElementById('resText').innerText = '';
    document.getElementById('votePanel').style.display = 'none';
    renderPlayer();
}

// 渲染玩家卡片
function renderPlayer(){
    let wrap = document.getElementById('playerWrap');
    wrap.innerHTML = '';
    game.players.forEach(p=>{
        let div = document.createElement('div');
        div.className = 'player-item '+(p.isMe?'me':'') + (p.out?'out':'');
        div.innerHTML = `<div>${p.name}</div><div style="font-size:12px;margin-top:4px">${p.out?'已出局':'在场'}</div>`;
        wrap.appendChild(div);
    })
}

// 查看自己词语
function showMyWord(){
    if(game.gameOver)return;
    let me = game.players.find(p=>p.isMe);
    let word = me.isUnder ? game.underWord : game.civilWord;
    document.getElementById('showWord').innerText = word;
    let box = document.getElementById('myWordBox');
    box.style.display = 'block';
    setTimeout(()=>{
        box.style.display = 'none';
        document.getElementById('showWord').innerText = '';
    },4000);
}

// AI自动发言
function aiSpeak(){
    if(game.gameOver)return;
    let talkWrap = document.getElementById('talkBox');
    talkWrap.innerHTML = '<h3>本轮发言：</h3>';
    game.players.filter(p=>!p.out && !p.isMe).forEach(ai=>{
        let word = ai.isUnder ? game.underWord : game.civilWord;
        let descList = aiDesc[word] || ['一个常见物品'];
        let say = descList[Math.floor(Math.random()*descList.length)];
        let item = document.createElement('div');
        item.className = 'ai-talk';
        item.innerHTML = `<b>${ai.name}</b>：${say}`;
        talkWrap.appendChild(item);
    })
}

// 打开投票面板
function openVote(){
    if(game.gameOver)return;
    game.myVote = null;
    document.getElementById('voteTip').innerText = '';
    let panel = document.getElementById('votePanel');
    let btnWrap = document.getElementById('voteBtnWrap');
    btnWrap.innerHTML = '';
    panel.style.display = 'block';
    // 只显示在场玩家
    game.players.filter(p=>!p.out).forEach(p=>{
        let btn = document.createElement('button');
        btn.className = 'btn btn-blue';
        btn.innerText = p.name;
        btn.onclick = ()=>{
            game.myVote = p.id;
            document.getElementById('voteTip').innerText = `你选择投：${p.name}`;
        }
        btnWrap.appendChild(btn);
    })
}

// 提交投票+AI自动投票+结算淘汰
function submitVote(){
    if(!game.myVote){
        alert('请先选择投票对象');
        return;
    }
    let alive = game.players.filter(p=>!p.out);
    let voteMap = {};
    // 人类投票
    voteMap[game.myVote] = (voteMap[game.myVote]||0)+1;
    // AI随机投票
    alive.filter(p=>!p.isMe).forEach(ai=>{
        // AI简单逻辑：卧底倾向投平民，平民随机乱投
        let targets;
        if(ai.isUnder){
            targets = alive.filter(x=>!x.isUnder).map(x=>x.id);
        }else{
            targets = alive.filter(x=>x.id!==ai.id).map(x=>x.id);
        }
        let pick = targets[Math.floor(Math.random()*targets.length)];
        voteMap[pick] = (voteMap[pick]||0)+1;
    })
    // 得票最高出局
    let maxVote = Math.max(...Object.values(voteMap));
    let outIds = Object.keys(voteMap).filter(k=>voteMap[k]==maxVote).map(Number);
    let outId = outIds[0]; //平票淘汰第一个
    let outPlayer = game.players.find(p=>p.id===outId);
    outPlayer.out = true;

    renderPlayer();
    document.getElementById('votePanel').style.display = 'none';

    // 判断胜负
    let nowAlive = game.players.filter(p=>!p.out);
    let underLeft = nowAlive.filter(p=>p.isUnder).length;
    let civilLeft = nowAlive.length - underLeft;
    let resBox = document.getElementById('resText');

    if(underLeft === 0){
        game.gameOver = true;
        resBox.style.color='#56e39f';
        resBox.innerText = `平民胜利！卧底词：${game.underWord}，你的词：${game.civilWord}`;
    }else if(underLeft >= civilLeft){
        game.gameOver = true;
        let me = game.players.find(p=>p.isMe);
        if(me.isUnder){
            resBox.style.color='#ff7b7b';
            resBox.innerText = `你是卧底，卧底胜利！平民词：${game.civilWord}`;
        }else{
            resBox.style.color='#ff7b7b';
            resBox.innerText = `平民失败！卧底词：${game.underWord}`;
        }
    }else{
        game.round++;
        document.getElementById('round').innerText = game.round;
        resBox.style.color='#fff';
        resBox.innerText = `${outPlayer.name}被淘汰，进入第${game.round}轮`;
    }
}

// 全部重置
function resetAll(){
    game = {players:[],civilWord:'',underWord:'',round:1,myVote:null,gameOver:false};
    document.getElementById('setBox').style.display = 'block';
    document.getElementById('gameBox').style.display = 'none';
}
</script>
</body>
</html>
