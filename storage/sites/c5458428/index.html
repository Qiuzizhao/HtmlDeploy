<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星梦轨迹 - 乙女互动游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 自定义Tailwind配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#d8a8d8',
                        secondary: '#b486b4',
                        accent: '#ffc0dd',
                        dark: '#2a1a2a',
                        light: '#f8f0f8'
                    },
                    fontFamily: {
                        sans: ['Segoe UI', 'Microsoft YaHei', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'glow': 'glow 2s ease-in-out infinite',
                        'fade': 'fade 1s ease-in-out',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        glow: {
                            '0%, 100%': { boxShadow: '0 0 15px rgba(216, 168, 216, 0.5)' },
                            '50%': { boxShadow: '0 0 25px rgba(255, 192, 221, 0.8)' },
                        },
                        fade: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 0 2px 10px rgba(216, 168, 216, 0.5);
            }
            .bg-gradient-love {
                background: linear-gradient(135deg, #f8f0f8 0%, #f0e0f0 100%);
            }
            .character-card {
                backdrop-filter: blur(10px);
                background: rgba(255, 255, 255, 0.9);
                transition: all 0.3s ease;
            }
            .character-card:hover {
                transform: translateY(-5px) scale(1.02);
            }
            .dialog-box {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(8px);
            }
            .heart-float {
                position: absolute;
                pointer-events: none;
                animation: heart 1s ease-out forwards;
            }
            @keyframes heart {
                0% { transform: scale(0) rotate(0deg); opacity: 1; }
                100% { transform: scale(1.5) rotate(20deg); opacity: 0; }
            }
        }
    </style>
</head>
<body class="bg-gradient-love min-h-screen text-dark overflow-x-hidden">
    <!-- 粒子背景 -->
    <div id="particles" class="fixed top-0 left-0 w-full h-full pointer-events-none opacity-50"></div>

    <!-- 游戏主容器 -->
    <div class="max-w-6xl mx-auto px-4 py-6 relative z-10">
        <!-- 游戏标题 -->
        <header class="text-center mb-8 animate-fade">
            <h1 class="text-[clamp(2rem,5vw,3.5rem)] font-bold text-secondary text-shadow mb-2">星梦轨迹</h1>
            <p class="text-[clamp(1rem,2vw,1.2rem)] text-secondary/80">与命中注定的他，书写浪漫篇章</p>
        </header>

        <!-- 游戏主界面 -->
        <main id="game-container" class="animate-fade">
            <!-- 开始界面 -->
            <div id="start-screen" class="flex flex-col items-center justify-center py-12">
                <div class="w-full max-w-md rounded-2xl character-card shadow-xl p-8 text-center animate-glow">
                    <div class="mb-6">
                        <div class="w-32 h-32 mx-auto rounded-full bg-gradient-to-br from-primary to-accent flex items-center justify-center mb-4">
                            <i class="fa fa-heart text-4xl text-white"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-secondary mb-2">欢迎来到星梦轨迹</h2>
                        <p class="text-gray-600 mb-6">在这个充满浪漫与惊喜的世界，遇见属于你的真爱</p>
                    </div>
                    <button id="start-btn" class="bg-gradient-to-r from-primary to-secondary text-white px-8 py-3 rounded-full text-lg font-semibold hover:opacity-90 transition-all shadow-lg hover:shadow-xl w-full">
                        开始游戏
                    </button>
                </div>
            </div>

            <!-- 角色选择界面 -->
            <div id="character-screen" class="hidden">
                <h2 class="text-2xl font-bold text-secondary text-center mb-8">选择你的心动角色</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- 角色1 -->
                    <div class="character-card rounded-2xl shadow-lg overflow-hidden">
                        <div class="h-80 bg-gradient-to-br from-blue-100 to-blue-200 relative overflow-hidden">
                            <div class="absolute inset-0 flex items-center justify-center">
                                <i class="fa fa-user-circle-o text-7xl text-blue-400"></i>
                            </div>
                            <div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-white/90 to-transparent">
                                <h3 class="text-xl font-bold text-blue-600">顾言泽</h3>
                                <p class="text-sm text-gray-600">温柔治愈 · 音乐才子</p>
                            </div>
                        </div>
                        <div class="p-4">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-sm text-gray-500">好感度</span>
                                <span id="favor-1" class="text-primary font-semibold">0</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2 mb-4">
                                <div id="favor-bar-1" class="bg-primary h-2 rounded-full" style="width: 0%"></div>
                            </div>
                            <button onclick="selectCharacter(1)" class="w-full bg-primary/90 text-white py-2 rounded-lg hover:bg-primary transition-all">
                                选择他
                            </button>
                        </div>
                    </div>

                    <!-- 角色2 -->
                    <div class="character-card rounded-2xl shadow-lg overflow-hidden">
                        <div class="h-80 bg-gradient-to-br from-purple-100 to-purple-200 relative overflow-hidden">
                            <div class="absolute inset-0 flex items-center justify-center">
                                <i class="fa fa-user-circle-o text-7xl text-purple-400"></i>
                            </div>
                            <div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-white/90 to-transparent">
                                <h3 class="text-xl font-bold text-purple-600">凌辰宇</h3>
                                <p class="text-sm text-gray-600">高冷傲娇 · 天才设计师</p>
                            </div>
                        </div>
                        <div class="p-4">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-sm text-gray-500">好感度</span>
                                <span id="favor-2" class="text-primary font-semibold">0</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2 mb-4">
                                <div id="favor-bar-2" class="bg-primary h-2 rounded-full" style="width: 0%"></div>
                            </div>
                            <button onclick="selectCharacter(2)" class="w-full bg-primary/90 text-white py-2 rounded-lg hover:bg-primary transition-all">
                                选择他
                            </button>
                        </div>
                    </div>

                    <!-- 角色3 -->
                    <div class="character-card rounded-2xl shadow-lg overflow-hidden">
                        <div class="h-80 bg-gradient-to-br from-pink-100 to-pink-200 relative overflow-hidden">
                            <div class="absolute inset-0 flex items-center justify-center">
                                <i class="fa fa-user-circle-o text-7xl text-pink-400"></i>
                            </div>
                            <div class="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-white/90 to-transparent">
                                <h3 class="text-xl font-bold text-pink-600">夏星辞</h3>
                                <p class="text-sm text-gray-600">阳光开朗 · 偶像歌手</p>
                            </div>
                        </div>
                        <div class="p-4">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-sm text-gray-500">好感度</span>
                                <span id="favor-3" class="text-primary font-semibold">0</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2 mb-4">
                                <div id="favor-bar-3" class="bg-primary h-2 rounded-full" style="width: 0%"></div>
                            </div>
                            <button onclick="selectCharacter(3)" class="w-full bg-primary/90 text-white py-2 rounded-lg hover:bg-primary transition-all">
                                选择他
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 剧情互动界面 -->
            <div id="story-screen" class="hidden">
                <div class="flex flex-col md:flex-row gap-6">
                    <!-- 角色展示 -->
                    <div class="md:w-1/3 flex justify-center">
                        <div id="character-display" class="w-full max-w-xs rounded-2xl character-card shadow-xl p-4 animate-float">
                            <div id="char-img" class="h-80 rounded-xl bg-gradient-to-br from-primary/20 to-accent/20 flex items-center justify-center mb-4">
                                <i class="fa fa-heart text-6xl text-primary/70"></i>
                            </div>
                            <h3 id="char-name" class="text-2xl font-bold text-secondary text-center mb-1">角色名</h3>
                            <p id="char-desc" class="text-gray-600 text-center text-sm mb-4">角色描述</p>
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-sm text-gray-500">当前好感度</span>
                                <span id="current-favor" class="text-primary font-bold text-lg">0</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2.5">
                                <div id="current-favor-bar" class="bg-primary h-2.5 rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 剧情对话 -->
                    <div class="md:w-2/3 flex flex-col">
                        <div class="dialog-box rounded-2xl shadow-lg p-6 mb-4 h-64 overflow-y-auto">
                            <div id="dialog-content" class="text-lg leading-relaxed">
                                请选择你想要互动的选项，提升与他的好感度吧~
                            </div>
                        </div>

                        <!-- 互动选项 -->
                        <div class="grid grid-cols-1 gap-3">
                            <button id="option-1" onclick="chooseOption(1)" class="bg-white border-2 border-primary/50 hover:border-primary text-secondary py-3 px-4 rounded-xl text-left transition-all">
                                加载中...
                            </button>
                            <button id="option-2" onclick="chooseOption(2)" class="bg-white border-2 border-primary/50 hover:border-primary text-secondary py-3 px-4 rounded-xl text-left transition-all">
                                加载中...
                            </button>
                            <button id="option-3" onclick="chooseOption(3)" class="bg-white border-2 border-primary/50 hover:border-primary text-secondary py-3 px-4 rounded-xl text-left transition-all">
                                加载中...
                            </button>
                        </div>

                        <!-- 控制按钮 -->
                        <div class="flex justify-between mt-4">
                            <button onclick="backToCharacter()" class="text-secondary flex items-center hover:text-primary transition-all">
                                <i class="fa fa-arrow-left mr-2"></i> 返回选择
                            </button>
                            <button id="reset-btn" onclick="resetGame()" class="text-gray-500 hover:text-red-500 transition-all">
                                <i class="fa fa-refresh mr-1"></i> 重置游戏
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="text-center mt-12 text-gray-500 text-sm">
            <p>💖 星梦轨迹 © 2025 乙女互动游戏 | 纯前端体验版</p>
        </footer>
    </div>

    <script>
        // 游戏数据
        const gameData = {
            currentScreen: 'start',
            selectedChar: null,
            favorData: {
                1: 0,
                2: 0,
                3: 0
            },
            characters: [
                {
                    id: 1,
                    name: "顾言泽",
                    desc: "温柔治愈的音乐才子，总能用琴声抚平你的所有烦恼",
                    color: "blue",
                    stories: [
                        {
                            text: "你在音乐教室门口遇见了正在练琴的顾言泽，他注意到了你，温柔地对你笑了笑",
                            options: [
                                { text: "主动上前打招呼，夸赞他的琴声", favor: 15 },
                                { text: "安静地站在门口聆听，不打扰他", favor: 10 },
                                { text: "害羞地低下头，悄悄离开", favor: 5 }
                            ]
                        }
                    ]
                },
                {
                    id: 2,
                    name: "凌辰宇",
                    desc: "高冷傲娇的天才设计师，外冷内热，只对你展现温柔",
                    color: "purple",
                    stories: [
                        {
                            text: "你不小心撞到了正在看设计稿的凌辰宇，文件散落一地",
                            options: [
                                { text: "连忙道歉并认真帮他整理好所有文件", favor: 15 },
                                { text: "慌张地道歉后不知所措", favor: 5 },
                                { text: "假装没事发生，快速离开", favor: -5 }
                            ]
                        }
                    ]
                },
                {
                    id: 3,
                    name: "夏星辞",
                    desc: "阳光开朗的偶像歌手，像小太阳一样时刻温暖着你",
                    color: "pink",
                    stories: [
                        {
                            text: "夏星辞在练习室看到你，兴奋地向你挥手，邀请你观看他的练习",
                            options: [
                                { text: "开心地答应，为他加油打气", favor: 15 },
                                { text: "有些害羞但还是点头同意", favor: 10 },
                                { text: "委婉拒绝，说自己还有事情", favor: 0 }
                            ]
                        }
                    ]
                }
            ]
        };

        // DOM元素
        const startScreen = document.getElementById('start-screen');
        const characterScreen = document.getElementById('character-screen');
        const storyScreen = document.getElementById('story-screen');
        const startBtn = document.getElementById('start-btn');

        // 初始化事件
        startBtn.addEventListener('click', startGame);

        // 开始游戏
        function startGame() {
            playSound();
            showScreen('character');
        }

        // 选择角色
        function selectCharacter(charId) {
            playSound();
            gameData.selectedChar = charId;
            const char = gameData.characters.find(c => c.id === charId);
            
            // 更新角色展示
            document.getElementById('char-name').textContent = char.name;
            document.getElementById('char-desc').textContent = char.desc;
            document.getElementById('char-img').className = `h-80 rounded-xl bg-gradient-to-br from-${char.color}-100 to-${char.color}-200 flex items-center justify-center mb-4`;
            
            // 更新好感度
            updateFavorDisplay(charId);
            
            // 设置剧情
            setStory(charId);
            
            showScreen('story');
        }

        // 设置剧情
        function setStory(charId) {
            const char = gameData.characters.find(c => c.id === charId);
            const story = char.stories[0];
            
            document.getElementById('dialog-content').textContent = story.text;
            
            // 设置选项
            document.getElementById('option-1').textContent = story.options[0].text;
            document.getElementById('option-2').textContent = story.options[1].text;
            document.getElementById('option-3').textContent = story.options[2].text;
        }

        // 选择选项
        function chooseOption(optionId) {
            playSound();
            createHeart();
            
            const charId = gameData.selectedChar;
            const char = gameData.characters.find(c => c.id === charId);
            const favorChange = char.stories[0].options[optionId-1].favor;
            
            // 更新好感度
            gameData.favorData[charId] = Math.max(0, gameData.favorData[charId] + favorChange);
            updateFavorDisplay(charId);
            
            // 更新对话
            let responseText = "";
            if (favorChange > 0) {
                responseText = `❤️ ${char.name}对你的好感度提升了${favorChange}点！`;
            } else if (favorChange < 0) {
                responseText = `💔 ${char.name}对你的好感度下降了${Math.abs(favorChange)}点...`;
            } else {
                responseText = `🤍 ${char.name}对你的好感度没有变化`;
            }
            
            document.getElementById('dialog-content').textContent = responseText;
            
            // 禁用按钮
            document.getElementById('option-1').disabled = true;
            document.getElementById('option-2').disabled = true;
            document.getElementById('option-3').disabled = true;
            
            setTimeout(() => {
                document.getElementById('option-1').disabled = false;
                document.getElementById('option-2').disabled = false;
                document.getElementById('option-3').disabled = false;
                setStory(charId);
            }, 2000);
        }

        // 更新好感度显示
        function updateFavorDisplay(charId) {
            const favor = gameData.favorData[charId];
            const percent = Math.min(100, favor);
            
            // 更新列表中的好感度
            document.getElementById(`favor-${charId}`).textContent = favor;
            document.getElementById(`favor-bar-${charId}`).style.width = `${percent}%`;
            
            // 更新剧情页的好感度
            if (gameData.currentScreen === 'story') {
                document.getElementById('current-favor').textContent = favor;
                document.getElementById('current-favor-bar').style.width = `${percent}%`;
            }
        }

        // 返回角色选择
        function backToCharacter() {
            playSound();
            showScreen('character');
        }

        // 重置游戏
        function resetGame() {
            if (confirm('确定要重置游戏吗？所有好感度数据将会清空！')) {
                gameData.favorData = {1: 0, 2: 0, 3: 0};
                updateFavorDisplay(1);
                updateFavorDisplay(2);
                updateFavorDisplay(3);
                showScreen('character');
            }
        }

        // 显示指定界面
        function showScreen(screenName) {
            gameData.currentScreen = screenName;
            
            startScreen.classList.add('hidden');
            characterScreen.classList.add('hidden');
            storyScreen.classList.add('hidden');
            
            if (screenName === 'start') startScreen.classList.remove('hidden');
            if (screenName === 'character') characterScreen.classList.remove('hidden');
            if (screenName === 'story') storyScreen.classList.remove('hidden');
        }

        // 播放音效
        function playSound() {
            // 轻量级交互音效
            const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJmWnZtBj+b2sSLBzwD/6PD58/Do8PHg2d7Y1cVLznqE5QEAAPj7/P/8/v/6+vn19fHu7uXg3d/Ly87Oz9HExMfGx8C/v7+wsLCysrKqqqqjo6Oenp6YmJiJiYGBgX19fXp6eno6OjqampqLi4uLi4uKysrKioqKampqenp6jo6Ovr6+/w8PDx8fH19fX5+fn9/f3+/v7+/w==');
            audio.volume = 0.2;
            audio.play().catch(() => {});
        }

        // 创建爱心特效
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart-float';
            heart.innerHTML = '<i class="fa fa-heart text-primary"></i>';
            heart.style.left = Math.random() * 80 + 10 + '%';
            heart.style.top = '50%';
            document.getElementById('game-container').appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 1000);
        }

        // 粒子背景效果
        (function createParticles() {
            const particles = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'absolute rounded-full bg-primary/20';
                particle.style.width = particle.style.height = Math.random() * 8 + 2 + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animation = `float ${Math.random() * 3 + 2}s ease-in-out infinite`;
                particle.style.animationDelay = Math.random() * 2 + 's';
                particles.appendChild(particle);
            }
        })();
    </script>
</body>
</html>
