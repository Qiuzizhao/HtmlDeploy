<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园跑酷</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{background:#e8f4ff;display:flex;flex-direction:column;align-items:center;padding-top:20px}
        #gameBox{
            width:800px;height:400px;
            background:linear-gradient(#a8d8ff 30%,#96c990 30%);
            border:3px solid #333;
            position:relative;
            overflow:hidden;
        }
        /* 地面跑道 */
        .road{width:100%;height:70px;background:#777;position:absolute;bottom:0}
        /* 玩家角色 学生 */
        #player{
            width:50px;height:70px;
            background:#ff6666;border-radius:8px;
            position:absolute;left:100px;bottom:70px;
            transition:bottom 0.3s ease;
        }
        /* 障碍物：课桌、垃圾桶 */
        .obstacle{
            position:absolute;bottom:70px;
            background:#664433;
        }
        .trash{background:#555;width:35px;height:45px}
        .desk{width:60px;height:55px}
        /* 收集物：书本 */
        .book{
            width:30px;height:30px;background:#ffdd00;
            position:absolute;bottom:110px;border-radius:4px;
        }
        #score{font-size:24px;margin-bottom:10px;font-weight:bold}
        #tip{margin:8px 0;color:#555}
        #gameOver{
            position:absolute;top:150px;left:280px;font-size:45px;
            color:red;display:none;font-weight:bold;background:#fff;padding:10px
        }
    </style>
</head>
<body>
    <div id="score">得分：<span id="num">0</span></div>
    <div id="tip">操作：← → 左右移动 | 空格 跳跃</div>
    <div id="gameBox">
        <div class="road"></div>
        <div id="player"></div>
        <div id="gameOver">游戏结束！刷新页面重新开始</div>
    </div>

    <script>
        const game = document.getElementById('gameBox');
        const player = document.getElementById('player');
        const scoreDom = document.getElementById('num');
        const gameOverTip = document.getElementById('gameOver');

        // 玩家基础数据
        let playerX = 100;
        let playerY = 70;
        let speedX = 8;
        let jumpPower = 120;
        let isJump = false;
        let gravity = 3;
        let score = 0;
        let gameRun = true;
        let obstacleArr = [];
        let bookArr = [];

        // 键盘控制
        const key = {};
        document.onkeydown = e=>{
            key[e.code]=true;
            // 空格跳跃
            if(e.code==='Space'&&!isJump&&gameRun){
                isJump=true;
                let jumpTimer = setInterval(()=>{
                    playerY += gravity*-6;
                    player.style.bottom = playerY+'px';
                    if(playerY>=70+jumpPower){
                        clearInterval(jumpTimer);
                        // 下落
                        let down = setInterval(()=>{
                            playerY += gravity;
                            player.style.bottom = playerY+'px';
                            if(playerY<=70){
                                playerY=70;
                                player.style.bottom='70px';
                                clearInterval(down);
                                isJump=false;
                            }
                        },20)
                    }
                },20)
            }
        }
        document.onkeyup = e=>key[e.code]=false;

        // 玩家左右移动
        function movePlayer(){
            if(!gameRun) return;
            if(key['ArrowLeft']&&playerX>0){
                playerX -= speedX;
            }
            if(key['ArrowRight']&&playerX<game.offsetWidth-player.offsetWidth){
                playerX += speedX;
            }
            player.style.left = playerX+'px';
        }

        // 随机生成障碍物
        function createObstacle(){
            if(!gameRun)return;
            // 随机课桌/垃圾桶
            let isDesk = Math.random()>0.4;
            let obs = document.createElement('div');
            obs.className = isDesk?'obstacle desk':'obstacle trash';
            let w = isDesk?60:35;
            obs.style.left = game.offsetWidth + 'px';
            game.appendChild(obs);
            obstacleArr.push({dom:obs,x:game.offsetWidth,w:w});
        }

        // 生成书本加分
        function createBook(){
            if(!gameRun)return;
            let book = document.createElement('div');
            book.className='book';
            book.style.left = game.offsetWidth+'px';
            game.appendChild(book);
            bookArr.push({dom:book,x:game.offsetWidth});
        }

        // 物体左移、碰撞检测
        function objectMove(){
            if(!gameRun)return;
            // 障碍物移动
            obstacleArr.forEach((item,idx)=>{
                item.x -=6;
                item.dom.style.left = item.x+'px';
                // 出屏幕删除
                if(item.x<-item.w){
                    item.dom.remove();
                    obstacleArr.splice(idx,1);
                }
                // 碰撞检测（撞到障碍物=游戏结束）
                let pL = playerX,pR=playerX+50;
                let oL=item.x,oR=item.x+item.w;
                let pBot = playerY, oBot=70;
                if(pR>oL&&pL<oR&&pBot<=75){
                    gameOver();
                }
            })
            // 书本移动+拾取加分
            bookArr.forEach((item,idx)=>{
                item.x -=6;
                item.dom.style.left = item.x+'px';
                if(item.x<-30){
                    item.dom.remove();
                    bookArr.splice(idx,1);
                }
                // 吃到书本加分
                let pL = playerX,pR=playerX+50;
                let bL=item.x,bR=item.x+30;
                if(pR>bL&&pL<bR&&playerY+70>110){
                    score+=10;
                    scoreDom.innerText=score;
                    item.dom.remove();
                    bookArr.splice(idx,1);
                }
            })
        }

        // 游戏结束
        function gameOver(){
            gameRun = false;
            gameOverTip.style.display='block';
        }

        // 循环帧
        function gameLoop(){
            movePlayer();
            objectMove();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();

        // 定时生成障碍物和书本
        setInterval(createObstacle,1200);
        setInterval(createBook,1800);
    </script>
</body>
</html>
