<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>双人决斗：战士VS法师 普攻+多特效+冷却</title>
<style>
body{background:#1a1a1a;color:white;font-family:Arial;text-align:center;margin:0;padding:20px}
#game{width:900px;height:400px;background:#333;margin:0 auto;position:relative;border:3px solid #777;overflow:hidden}
.hp{position:absolute;top:10px;width:180px;height:20px;background:#555;border:2px solid #fff}
#hp1{left:50px}
#hp2{right:50px}
.hp-inner{height:100%;background:#ff4444;width:100%}
.player{width:70px;height:110px;position:absolute;bottom:0;color:white;line-height:110px;text-align:center;font-weight:bold;transition: bottom 0.05s linear;z-index:2;}
#p1{left:100px;background:#2196F3}
#p2{right:100px;background:#4CAF50}

/* 子弹样式 */
.bullet{position:absolute;width:12px;height:12px;border-radius:50%;z-index:1}
.fireball{background:orange;box-shadow:0 0 8px orange}
.ice{background:cyan;box-shadow:0 0 8px cyan}
.light-bullet{background:#eeeeee;box-shadow:0 0 6px #fff;width:8px;height:8px;}

/* 受击动画 */
.hit{animation:hit 0.2s}
@keyframes hit{0%{filter:brightness(2)}100%{filter:brightness(1)}}

/* 技能&普攻特效 */
.skill-effect{position:absolute;pointer-events:none;z-index:1;}
.charge{width:140px;height:110px;border:3px solid #ff8800;border-radius:8px;animation:scale 0.4s}
.defend{width:80px;height:120px;border:3px solid #88ccff;border-radius:50%;animation:fade 0.8s}
.whirl{width:180px;height:180px;border:4px solid #ffff00;border-radius:50%;animation:rotate 0.6s}
.shield-magic{width:90px;height:120px;border:3px solid #cc66ff;border-radius:50%;animation:fade 0.8s}
.atk-normal1{width:90px;height:80px;border:2px solid #66aaff;animation:slash 0.3s}
.atk-normal2{width:60px;height:60px;border:2px solid #ddddff;border-radius:50%;animation:pulse 0.3s}

@keyframes scale{0%{transform:scale(0.5);opacity:1}100%{transform:scale(1.2);opacity:0}}
@keyframes fade{0%{opacity:0.8}100%{opacity:0}}
@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes slash{0%{transform:scaleX(0.3);opacity:1}100%{transform:scaleX(1.5);opacity:0}}
@keyframes pulse{0%{transform:scale(0.6);opacity:1}100%{transform:scale(1.3);opacity:0}}

#tip{font-size:22px;color:#ffd700;margin:10px 0}
.cd-box{display:flex;justify-content:space-around;width:900px;margin:10px auto;font-size:16px}
.rule{line-height: 1.8; color: #ccc; margin-top: 10px;}
</style>
</head>
<body>
<h1>战士 VS 法师 双人决斗</h1>
<div id="tip">游戏开始，空格/上方向键跳跃躲避远程攻击</div>

<!-- 冷却显示区域 -->
<div class="cd-box">
    <div id="cd1">战士：J冲锋斩 K盾反 L旋风斩 | Q普攻</div>
    <div id="cd2">法师：1火球 2冰弹 3魔法盾 | 0普攻</div>
</div>

<div class="hp" id="hp1"><div class="hp-inner" id="bar1"></div></div>
<div class="hp" id="hp2"><div class="hp-inner" id="bar2"></div></div>
<div id="game">
  <div class="player" id="p1">战士</div>
  <div class="player" id="p2">法师</div>
</div>

<div class="rule">
【战士】A/D移动 | 空格跳跃 | Q普攻 J冲锋斩 K盾反 L旋风斩<br>
【法师】←/→移动 | ↑跳跃 | 0普攻 1火球术 2冰弹 3魔法盾<br>
💡 跳起可躲所有远程，普攻无冷却，技能强度越高冷却越长
</div>

<script>
const game = document.getElementById('game');
const p1 = document.getElementById('p1');
const p2 = document.getElementById('p2');
const bar1 = document.getElementById('bar1');
const bar2 = document.getElementById('bar2');
const tip = document.getElementById('tip');
const cd1Dom = document.getElementById('cd1');
const cd2Dom = document.getElementById('cd2');

// 基础属性
let hp1 = 100, hp2 = 100;
let x1 = 100, x2 = 730;
let speed = 6;
let gameover = false;
let shield1 = false, shield2 = false;

// 跳跃配置
const jumpHeight = 90;
const jumpSpeed = 8;
let p1Jump = false, p2Jump = false;
let p1Bottom = 0, p2Bottom = 0;

// ========== 技能冷却配置 (ms) ==========
const SKILL_CD = {
    charge: 4000,
    defend: 3000,
    whirl: 5000
};
const MAGIC_CD = {
    fire: 4000,
    ice: 2000,
    magicShield: 3000
};
let cd = {
    charge: 0, defend: 0, whirl: 0,
    fire: 0, ice: 0, magicShield: 0
};

// 刷新冷却文本
function updateCDText(){
    cd1Dom.innerHTML = `战士：J冲锋斩(${cd.charge>0 ? (cd.charge/1000).toFixed(1)+'s' : '就绪'}) 
    K盾反(${cd.defend>0 ? (cd.defend/1000).toFixed(1)+'s' : '就绪'}) 
    L旋风斩(${cd.whirl>0 ? (cd.whirl/1000).toFixed(1)+'s' : '就绪'}) | Q普攻`;

    cd2Dom.innerHTML = `法师：1火球(${cd.fire>0 ? (cd.fire/1000).toFixed(1)+'s' : '就绪'}) 
    2冰弹(${cd.ice>0 ? (cd.ice/1000).toFixed(1)+'s' : '就绪'}) 
    3魔法盾(${cd.magicShield>0 ? (cd.magicShield/1000).toFixed(1)+'s' : '就绪'}) | 0普攻`;
}

// 冷却倒计时
setInterval(()=>{
    for(let key in cd){
        if(cd[key] > 0) cd[key] -= 100;
    }
    updateCDText();
}, 100);

// 更新角色位置
function updatePos(){
  p1.style.left = x1 + 'px';
  p1.style.bottom = p1Bottom + 'px';
  p2.style.left = x2 + 'px';
  p2.style.bottom = p2Bottom + 'px';
}

// 更新血条
function updateHP(){
  bar1.style.width = hp1 + '%';
  bar2.style.width = hp2 + '%';
  hp1 = Math.max(hp1, 0);
  hp2 = Math.max(hp2, 0);
}

// 受击闪烁
function hit(who){
  who.classList.add('hit');
  setTimeout(()=>who.classList.remove('hit'),200);
}

// 生成特效
function createEffect(target, className, offsetX = 0, offsetY = 0){
    let eff = document.createElement('div');
    eff.className = 'skill-effect ' + className;
    eff.style.left = (parseInt(target.style.left) + offsetX) + 'px';
    eff.style.bottom = (parseInt(target.style.bottom) + offsetY) + 'px';
    game.appendChild(eff);
    setTimeout(()=>eff.remove(), 800);
}

// 提示文字
function msg(t){tip.innerText = t}

// 碰撞判定（近战专用）
function isNear(a, b){
    let aRect = a.getBoundingClientRect();
    let bRect = b.getBoundingClientRect();
    return !(aRect.right < bRect.left || aRect.left > bRect.right);
}

// ========== 战士 普攻 + 三大技能 ==========
// 战士 Q 普攻
function normalAtk1(){
    if(gameover) return;
    createEffect(p1, 'atk-normal1', 20, 10);
    if(isNear(p1, p2)){
        hp2 -= 10;
        hit(p2);
        msg("战士 普攻命中！");
    }else{
        msg("战士 普攻落空！");
    }
    updateHP();check();
}

function skillCharge(){
  if(gameover || cd.charge > 0) return;
  cd.charge = SKILL_CD.charge;
  createEffect(p1, 'charge', 0, 0);
  let d = Math.abs(x2 - x1);
  if(d < 120){
    hp2 -= 25;
    hit(p2);
    msg("战士 冲锋斩 命中！")
  }else{
    msg("冲锋距离不足！")
  }
  updateHP();check();
}
function skillDefend(){
  if(gameover || cd.defend > 0) return;
  cd.defend = SKILL_CD.defend;
  createEffect(p1, 'defend', -5, 0);
  shield1 = true;
  msg("战士 开启盾反！")
  setTimeout(()=>shield1=false,1200)
}
function skillWhirl(){
  if(gameover || cd.whirl > 0) return;
  cd.whirl = SKILL_CD.whirl;
  createEffect(p1, 'whirl', -55, -35);
  let d = Math.abs(x2 - x1);
  if(d < 200){
    hp2 -= 18;
    hit(p2);
    msg("战士 旋风斩 范围攻击！")
  }else{
    msg("距离太远，旋风斩未命中")
  }
  updateHP();check();
}

// ========== 法师 通用弹道函数 ==========
function createBullet(bType,dmg,shooter,targetPlayer){
  if(gameover)return
  let b = document.createElement('div');
  b.className = 'bullet '+bType;
  game.appendChild(b);
  let bx = parseInt(shooter.style.left) + 30;
  let by = parseInt(shooter.style.bottom) + 50;
  b.style.left = bx + 'px';
  b.style.bottom = by + 'px';

  let fly = setInterval(()=>{
    bx -= 12;
    b.style.left = bx + 'px';

    const tLeft = parseInt(targetPlayer.style.left);
    const tRight = tLeft + 70;
    const bLeft = bx;
    const bRight = bx + 12;

    if(bRight > tLeft && bLeft < tRight && !gameover){
      // 跳跃躲避
      if(parseInt(targetPlayer.style.bottom) > 10){
        msg("跳起躲避成功！");
        clearInterval(fly);
        b.remove();
        return;
      }
      clearInterval(fly);
      b.remove();
      // 盾反判定
      if(shield1){
        msg("盾反触发！反弹伤害");
        hp2 -= dmg/2;
        hit(p2)
      }else{
        hp1 -= dmg;
        hit(p1);
        msg("远程攻击命中！")
      }
      updateHP();check();
    }
    if(bx < -20){
      clearInterval(fly);
      b.remove()
    }
  },20)
}

// ========== 法师 普攻 + 三大技能 ==========
// 法师 0 普攻
function normalAtk2(){
    if(gameover) return;
    createEffect(p2, 'atk-normal2', -20, 10);
    createBullet('light-bullet', 8, p2, p1);
    msg("法师 普通光弹出击！");
}

function magicFire(){
  if(gameover || cd.fire > 0) return;
  cd.fire = MAGIC_CD.fire;
  createBullet('fireball',22, p2, p1);
  msg("法师 火球术 出击！")
}
function magicIce(){
  if(gameover || cd.ice > 0) return;
  cd.ice = MAGIC_CD.ice;
  createBullet('ice',14, p2, p1);
  msg("法师 冰弹 出击！")
}
function magicShield(){
  if(gameover || cd.magicShield > 0) return;
  cd.magicShield = MAGIC_CD.magicShield;
  createEffect(p2, 'shield-magic', -10, 0);
  shield2=true;
  msg("法师 魔法盾开启！");
  setTimeout(()=>shield2=false,1500)
}

// ========== 跳跃逻辑 ==========
function jumpPlayer1(){
  if(p1Jump || gameover) return;
  p1Jump = true;
  let up = setInterval(()=>{
    p1Bottom += jumpSpeed;
    if(p1Bottom >= jumpHeight){
      clearInterval(up);
      let down = setInterval(()=>{
        p1Bottom -= jumpSpeed;
        if(p1Bottom <= 0){
          p1Bottom = 0;
          clearInterval(down);
          p1Jump = false;
        }
        updatePos();
      },20)
    }
    updatePos();
  },20)
}
function jumpPlayer2(){
  if(p2Jump || gameover) return;
  p2Jump = true;
  let up = setInterval(()=>{
    p2Bottom += jumpSpeed;
    if(p2Bottom >= jumpHeight){
      clearInterval(up);
      let down = setInterval(()=>{
        p2Bottom -= jumpSpeed;
        if(p2Bottom <= 0){
          p2Bottom = 0;
          clearInterval(down);
          p2Jump = false;
        }
        updatePos();
      },20)
    }
    updatePos();
  },20)
}

// 胜负判断
function check(){
  if(hp1<=0){msg("🎉 法师获得胜利！");gameover=true}
  if(hp2<=0){msg("🎉 战士获得胜利！");gameover=true}
}

// 键盘监听
document.addEventListener('keydown',e=>{
  if(gameover)return
  const k = e.key.toLowerCase()
  // 玩家1 战士
  if(k=='a') x1=Math.max(0,x1-speed)
  if(k=='d') x1=Math.min(830,x1+speed)
  if(k==' ') jumpPlayer1()
  if(k=='q') normalAtk1()   // 普攻
  if(k=='j') skillCharge()
  if(k=='k') skillDefend()
  if(k=='l') skillWhirl()

  // 玩家2 法师
  if(k=='arrowleft') x2=Math.max(0,x2-speed)
  if(k=='arrowright') x2=Math.min(830,x2+speed)
  if(k=='arrowup') jumpPlayer2()
  if(k=='0') normalAtk2()   // 普攻
  if(k=='1') magicFire()
  if(k=='2') magicIce()
  if(k=='3') magicShield()

  updatePos()
})

// 初始化
updatePos()
updateHP()
updateCDText()
</script>
</body>
</html>
