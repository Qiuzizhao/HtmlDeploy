<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叶罗丽 - 冰公主快跑</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(#5A88C8, #B0D8F8);
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }

        .game-title {
            font-size: 36px;
            color: #2E1A66;
            margin-bottom: 12px;
            text-shadow: 0 0 8px #fff, 2px 2px 4px #6A4C93;
            letter-spacing: 4px;
        }

        #gameCanvas {
            border: 4px solid #7B61FF;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(123, 97, 255, 0.6), 0 0 40px rgba(135, 206, 250, 0.4);
        }

        .tips {
            margin-top: 15px;
            color: #2E1A66;
            font-size: 17px;
            text-align: center;
            text-shadow: 1px 1px 2px #fff;
        }

        #restartBtn {
            margin-top: 12px;
            padding: 10px 24px;
            font-size: 17px;
            background: linear-gradient(135deg, #7B61FF, #5A42D1);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        #restartBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <h1 class="game-title">❄️ 叶罗丽 · 冰公主快跑 ❄️</h1>
    <canvas id="gameCanvas" width="900" height="420"></canvas>
    <p class="tips">👉 空格键跳跃 | 躲避冰晶障碍 | 挑战高分</p>
    <button id="restartBtn">重新开始</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const restartBtn = document.getElementById('restartBtn');

        // 游戏基础配置
        const groundY = 330;
        // 冰公主角色
        const princess = {
            x: 80,
            y: groundY,
            width: 65,
            height: 85,
            velocity: 0,
            gravity: 0.75,
            jumpPower: -16,
            isJumping: false
        };

        // 障碍物数组：多种叶罗丽冰晶/冰块障碍
        let obstacles = [];
        let gameScore = 0;
        let gameOver = false;
        let gameFrame;
        let bgSpeed = 3;
        let cloudList = [];

        // 初始化云朵
        function initClouds() {
            for(let i = 0; i < 5; i++){
                cloudList.push({
                    x: Math.random() * canvas.width,
                    y: 30 + Math.random() * 120,
                    size: 20 + Math.random() * 40,
                    speed: 0.5 + Math.random() * 1
                });
            }
        }
        initClouds();

        // 随机生成障碍物
        function createObstacle() {
            const types = ['ice', 'crystal', 'iceBlock'];
            const type = types[Math.floor(Math.random() * types.length)];
            let w, h;
            switch(type){
                case 'ice':
                    w = 35; h = 45;
                    break;
                case 'crystal':
                    w = 28; h = 55;
                    break;
                default:
                    w = 45; h = 40;
            }
            obstacles.push({
                x: canvas.width + 50,
                y: groundY + 85 - h,
                width: w,
                height: h,
                speed: 7 + gameScore * 0.15,
                type: type
            });
        }

        // 绘制渐变天空+远景山峦（叶罗丽冰雪场景）
        function drawBackground() {
            // 天空渐变
            const skyGrad = ctx.createLinearGradient(0,0,0,canvas.height);
            skyGrad.addColorStop(0, '#4A7BC6');
            skyGrad.addColorStop(0.5, '#82B8F0');
            skyGrad.addColorStop(1, '#C6E2FF');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制云朵
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            cloudList.forEach(cloud => {
                drawCloud(cloud.x, cloud.y, cloud.size);
                cloud.x -= cloud.speed;
                if(cloud.x < -cloud.size * 3) cloud.x = canvas.width + 50;
            });

            // 远处冰雪山峦
            ctx.fillStyle = 'rgba(180, 210, 255, 0.6)';
            ctx.beginPath();
            ctx.moveTo(0, 280);
            ctx.quadraticCurveTo(150, 240, 300, 270);
            ctx.quadraticCurveTo(500, 230, 700, 260);
            ctx.quadraticCurveTo(850, 245, 900, 280);
            ctx.lineTo(900, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.fill();

            // 地面 冰雪纹路地面
            const groundGrad = ctx.createLinearGradient(0, groundY, 0, canvas.height);
            groundGrad.addColorStop(0, '#A8D8FF');
            groundGrad.addColorStop(1, '#73A8E8');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

            // 地面冰晶线条
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 1;
            for(let i = 0; i < canvas.width; i += 40){
                ctx.beginPath();
                ctx.moveTo(i, groundY + 10);
                ctx.lineTo(i + 20, groundY + 25);
                ctx.stroke();
            }
        }

        // 绘制云朵
        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y - size * 0.2, size * 0.7, 0, Math.PI * 2);
            ctx.arc(x + size * 1.4, y, size * 0.8, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制叶罗丽冰公主（精致造型+冰系配色）
        function drawPrincess() {
            const p = princess;
            ctx.save();
            // 裙摆/身体 冰蓝色系
            const bodyGrad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.height);
            bodyGrad.addColorStop(0, '#E8F4FF');
            bodyGrad.addColorStop(1, '#94C8FF');
            ctx.fillStyle = bodyGrad;
            ctx.fillRect(p.x + 8, p.y + 25, p.width - 16, p.height - 25);

            // 长发 冰紫渐变
            const hairGrad = ctx.createLinearGradient(p.x, p.y - 15, p.x + p.width, p.y + 10);
            hairGrad.addColorStop(0, '#B49CFF');
            hairGrad.addColorStop(1, '#7B61FF');
            ctx.fillStyle = hairGrad;
            ctx.fillRect(p.x + 5, p.y - 15, p.width - 10, 40);

            // 脸部
            ctx.fillStyle = '#FFE8D8';
            ctx.fillRect(p.x + 18, p.y + 8, 29, 26);

            // 冰系眼眸
            ctx.fillStyle = '#297FFF';
            ctx.fillRect(p.x + 22, p.y + 16, 6, 4);
            ctx.fillRect(p.x + 36, p.y + 16, 6, 4);

            // 冰晶装饰（叶罗丽元素）
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.beginPath();
            ctx.moveTo(p.x + 32, p.y - 8);
            ctx.lineTo(p.x + 28, p.y + 2);
            ctx.lineTo(p.x + 36, p.y + 2);
            ctx.closePath();
            ctx.fill();

            // 周身微光特效
            ctx.globalAlpha = 0.2;
            ctx.fillStyle = '#B4E0FF';
            ctx.beginPath();
            ctx.arc(p.x + p.width/2, p.y + p.height/2, 50, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        // 绘制不同类型冰晶障碍物（叶罗丽冰系元素）
        function drawObstacles() {
            obstacles.forEach(obs => {
                ctx.save();
                let grad;
                if(obs.type === 'ice'){
                    grad = ctx.createLinearGradient(obs.x, obs.y, obs.x + obs.width, obs.y + obs.height);
                    grad.addColorStop(0, '#A0D8FF');
                    grad.addColorStop(1, '#579EFF');
                    ctx.fillStyle = grad;
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
                } else if(obs.type === 'crystal'){
                    // 菱形冰晶
                    ctx.fillStyle = 'rgba(160, 220, 255, 0.85)';
                    ctx.beginPath();
                    ctx.moveTo(obs.x + obs.width/2, obs.y);
                    ctx.lineTo(obs.x + obs.width, obs.y + obs.height/2);
                    ctx.lineTo(obs.x + obs.width/2, obs.y + obs.height);
                    ctx.lineTo(obs.x, obs.y + obs.height/2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                } else {
                    // 大冰块
                    grad = ctx.createLinearGradient(obs.x, obs.y, obs.x, obs.y + obs.height);
                    grad.addColorStop(0, '#D0E8FF');
                    grad.addColorStop(1, '#73B8FF');
                    ctx.fillStyle = grad;
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                }
                ctx.restore();
            });
        }

        // 绘制分数与UI
        function drawUI() {
            // 分数面板
            ctx.fillStyle = 'rgba(46, 26, 102, 0.8)';
            ctx.roundRect(15, 15, 140, 40, 8);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 22px Microsoft YaHei';
            ctx.fillText(`分数：${gameScore}`, 25, 42);
        }

        // 游戏结束界面
        function drawGameOver() {
            // 半透明遮罩
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 46px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束', canvas.width/2, canvas.height/2 - 40);
            ctx.font = 'bold 30px Microsoft YaHei';
            ctx.fillText(`最终分数：${gameScore}`, canvas.width/2, canvas.height/2 + 10);
            ctx.font = '22px Microsoft YaHei';
            ctx.fillText('点击下方按钮重新挑战', canvas.width/2, canvas.height/2 + 50);
            ctx.textAlign = 'left';
        }

        // 角色物理更新
        function updatePrincess() {
            if(gameOver) return;
            princess.velocity += princess.gravity;
            princess.y += princess.velocity;

            if(princess.y >= groundY) {
                princess.y = groundY;
                princess.velocity = 0;
                princess.isJumping = false;
            }
        }

        // 障碍物更新 & 碰撞检测
        function updateObstacles() {
            if(gameOver) return;
            // 随机生成障碍
            if(Math.random() < 0.025) {
                createObstacle();
            }
            // 移动障碍
            obstacles.forEach((obs, index) => {
                obs.x -= obs.speed;
                // 移出屏幕则删除并加分
                if(obs.x + obs.width < 0) {
                    obstacles.splice(index, 1);
                    gameScore++;
                }
                // 碰撞检测
                if(
                    princess.x < obs.x + obs.width &&
                    princess.x + princess.width > obs.x &&
                    princess.y < obs.y + obs.height &&
                    princess.y + princess.height > obs.y
                ) {
                    gameOver = true;
                    restartBtn.style.display = 'block';
                }
            });
        }

        // 跳跃逻辑
        function jump() {
            if(!princess.isJumping && !gameOver) {
                princess.velocity = princess.jumpPower;
                princess.isJumping = true;
            }
        }

        // 游戏主循环
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawObstacles();
            drawPrincess();
            drawUI();

            updatePrincess();
            updateObstacles();

            if(gameOver) {
                drawGameOver();
                cancelAnimationFrame(gameFrame);
                return;
            }
            gameFrame = requestAnimationFrame(gameLoop);
        }

        // 重置游戏
        function restartGame() {
            princess.y = groundY;
            princess.velocity = 0;
            princess.isJumping = false;
            obstacles = [];
            gameScore = 0;
            gameOver = false;
            restartBtn.style.display = 'none';
            gameLoop();
        }

        // 事件监听
        window.addEventListener('keydown', e => {
            if(e.code === 'Space') jump();
        });
        restartBtn.addEventListener('click', restartGame);

        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
