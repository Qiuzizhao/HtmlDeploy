<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>终极枪战完整版(带重开)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:#111;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:10px;
    font-family:Microsoft Yahei,sans-serif;color:#fff;
}
.info{display:flex;gap:20px;margin-bottom:6px;font-size:18px;flex-wrap:wrap;justify-content:center}
#game{border:3px solid #eee;background:#050505;touch-action:none;cursor:crosshair;max-width:100%}
.tips{margin-top:6px;color:#aaa;font-size:14px;text-align:center}
#restartBtn{
    margin-top:8px;padding:8px 22px;font-size:17px;
    background:#28a745;color:#fff;border:none;border-radius:6px;cursor:pointer;
}
#restartBtn:hover{background:#218838}
</style>
</head>
<body>
<div class="info">
    <div>分数：<span id="score">0</span></div>
    <div>生命：<span id="hp">3</span></div>
    <div>武器：<span id="gun">手枪[1]</span></div>
    <div>护盾：<span id="shield">无</span></div>
</div>
<canvas id="game" width="800" height="600"></canvas>
<button id="restartBtn">一键重新开局(R键)</button>
<div class="tips">WASD移动｜1手枪 2霰弹 3机枪｜手机拖动移动，点击射击｜R键随时重开｜绿补血、蓝护盾、黄双倍弹、紫BOSS</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreDom = document.getElementById('score');
const hpDom = document.getElementById('hp');
const gunDom = document.getElementById('gun');
const shieldDom = document.getElementById('shield');
const restartBtn = document.getElementById('restartBtn');

//=====音频系统=====
let audioCtx = null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(type){
    initAudio();
    const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    const now=audioCtx.currentTime;
    switch(type){
        case'shoot':osc.type='square';osc.frequency.setValueAtTime(220,now);osc.frequency.exponentialRampToValueAtTime(70,now+0.07);gain.gain.setValueAtTime(0.14,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.07);osc.start(now);osc.stop(now+0.07);break;
        case'hit':osc.type='triangle';osc.frequency.setValueAtTime(580,now);osc.frequency.exponentialRampToValueAtTime(180,now+0.05);gain.gain.setValueAtTime(0.11,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.05);osc.start(now);osc.stop(now+0.05);break;
        case'hurt':osc.type='sawtooth';osc.frequency.setValueAtTime(140,now);osc.frequency.exponentialRampToValueAtTime(35,now+0.18);gain.gain.setValueAtTime(0.19,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.18);osc.start(now);osc.stop(now+0.18);break;
        case'gameover':osc.type='sine';osc.frequency.setValueAtTime(270,now);osc.frequency.exponentialRampToValueAtTime(25,now+0.55);gain.gain.setValueAtTime(0.21,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.55);osc.start(now);osc.stop(now+0.55);break;
        case'pick':osc.type='sine';osc.frequency.setValueAtTime(700,now);osc.frequency.exponentialRampToValueAtTime(1200,now+0.1);gain.gain.setValueAtTime(0.12,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.1);osc.start(now);osc.stop(now+0.1);break;
        case'bossboom':osc.type='sawtooth';osc.frequency.setValueAtTime(90,now);osc.frequency.exponentialRampToValueAtTime(20,now+0.3);gain.gain.setValueAtTime(0.25,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.3);osc.start(now);osc.stop(now+0.3);break;
    }
}

//=====全局变量(单独封装，用于重置)=====
let score,hp,gameOver,spawnSpeed,gunIndex,shieldTime,infiniteBulletTime;
const gunList = [
    {name:'手枪[1]',bulletNum:1,speed:11,spread:0,score:10},
    {name:'霰弹[2]',bulletNum:6,speed:9,spread:0.42,score:15},
    {name:'机枪[3]',bulletNum:1,speed:13.5,spread:0.09,score:8}
];
const keys={w:false,a:false,s:false,d:false};
let player;
let bullets=[],enemies=[],bossList=[],bossBullet=[],particles=[],floatTexts=[],items=[],walls=[];
let spawnTimer;
let touch={x:0,y:0,down:false};

//=====游戏初始化/重置函数【重开核心】=====
function initGame(){
    //清除旧定时器
    clearInterval(spawnTimer);
    //重置数值
    score=0;hp=3;gameOver=false;spawnSpeed=1200;gunIndex=0;
    shieldTime=0;infiniteBulletTime=0;
    //重置玩家
    player={x:canvas.width/2,y:canvas.height/2,size:25,speed:5,color:'#0f0'};
    //清空所有物体数组
    bullets=[],enemies=[],bossList=[],bossBullet=[],particles=[],floatTexts=[],items=[];
    //重建墙体
    walls=[];
    for(let i=0;i<12;i++){
        walls.push({
            x:Math.random()*(canvas.width-100)+50,
            y:Math.random()*(canvas.height-100)+50,
            w:60+Math.random()*70,
            h:60+Math.random()*70
        })
    }
    //刷新UI文字
    scoreDom.textContent=score;hpDom.textContent=hp;
    gunDom.textContent=gunList[gunIndex].name;shieldDom.textContent='无';
    //重启小怪生成计时器
    spawnTimer = setInterval(spawnEnemy,spawnSpeed);
}

//=====补给生成=====
function spawnItem(){
    if(gameOver)return;
    const types=['hp','shield','inf'];
    const t=types[Math.floor(Math.random()*3)];
    items.push({
        x:Math.random()*(canvas.width-80)+40,
        y:Math.random()*(canvas.height-80)+40,
        size:16,
        type:t,
        color:t==='hp'?'#0f0':t==='shield'?'#0cf':'#ff0'
    })
}
setInterval(spawnItem,7000);

//=====BOSS生成=====
function spawnBoss(){
    if(gameOver)return;
    let x=Math.random()>0.5?-40:canvas.width+40,y=Math.random()*canvas.height;
    bossList.push({
        x,y,size:45,speed:1.2,hp:30,shootCd:0
    })
}
setInterval(spawnBoss,22000);

//=====爆炸粒子=====
function createBoom(x,y,num=18){
    for(let i=0;i<num;i++){
        const ang=Math.PI*2/num*i,spd=2+Math.random()*3.5;
        particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,size:2+Math.random()*4,life:28,color:['#f33','#ff0','#f90','#ff5599'][Math.floor(Math.random()*4)]})
    }
}
function addFloat(x,y,num){floatTexts.push({x,y,text:'+'+num,life:42})}

//=====碰撞检测=====
function hitCircle(a,b){return Math.hypot(a.x-b.x,a.y-b.y)<a.size+b.size}
function inWall(x,y,r){
    for(let w of walls){
        if(x+r>w.x&&x-r<w.x+w.w&&y+r>w.y&&y-r<w.y+w.h)return true;
    }
    return false;
}

//=====键盘监听(移动+换枪+R重开)=====
document.addEventListener('keydown',e=>{
    if(e.key==='w')keys.w=true;if(e.key==='s')keys.s=true;
    if(e.key==='a')keys.a=true;if(e.key==='d')keys.d=true;
    if(e.key==='1'){gunIndex=0;gunDom.textContent=gunList[0].name}
    if(e.key==='2'){gunIndex=1;gunDom.textContent=gunList[1].name}
    if(e.key==='3'){gunIndex=2;gunDom.textContent=gunList[2].name}
    //R键一键重开
    if(e.key.toLowerCase()==='r') initGame();
})
document.addEventListener('keyup',e=>{
    if(e.key==='w')keys.w=false;if(e.key==='s')keys.s=false;
    if(e.key==='a')keys.a=false;if(e.key==='d')keys.d=false;
})

//=====按钮点击重开=====
restartBtn.onclick = initGame;

//=====手机触屏=====
canvas.addEventListener('touchstart',e=>{
    e.preventDefault();initAudio();
    const t=e.touches[0];
    const rect=canvas.getBoundingClientRect();
    touch.x=t.clientX-rect.left;touch.y=t.clientY-rect.top;touch.down=true;
    shootByPos(touch.x,touch.y);
})
canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    const t=e.touches[0];
    const rect=canvas.getBoundingClientRect();
    touch.x=t.clientX-rect.left;touch.y=t.clientY-rect.top;
})
canvas.addEventListener('touchend',()=>touch.down=false)

//=====鼠标射击=====
canvas.onclick=e=>{
    initAudio();
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    shootByPos(mx,my);
}
function shootByPos(mx,my){
    if(gameOver)return;
    playSound('shoot');
    const gun=gunList[gunIndex];
    const baseDx=mx-player.x,baseDy=my-player.y;
    const baseLen=Math.hypot(baseDx,baseDy);
    const baseDirX=baseDx/baseLen,baseDirY=baseDy/baseLen;
    let fireNum=infiniteBulletTime>0?gun.bulletNum*2:gun.bulletNum;
    for(let i=0;i<fireNum;i++){
        const randAng=(Math.random()-0.5)*gun.spread;
        const cosA=Math.cos(randAng),sinA=Math.sin(randAng);
        const dX=baseDirX*cosA-baseDirY*sinA;
        const dY=baseDirX*sinA+baseDirY*cosA;
        bullets.push({x:player.x,y:player.y,size:5,speed:gun.speed,dx:dX,dy:dY,score:gun.score})
    }
}

//=====小怪刷新=====
function spawnEnemy(){
    if(gameOver)return;
    let x,y;
    if(Math.random()>0.5){x=Math.random()>0.5?-25:canvas.width+25;y=Math.random()*canvas.height}
    else{x=Math.random()*canvas.width;y=Math.random()>0.5?-25:canvas.height+25}
    enemies.push({x,y,size:20,speed:1.8+score/900})
    clearInterval(spawnTimer);
    spawnSpeed=Math.max(320,spawnSpeed-3);
    spawnTimer=setInterval(spawnEnemy,spawnSpeed);
}

//=====游戏结束=====
function gameOverFunc(){gameOver=true;playSound('gameover')}

//=====主循环=====
function loop(){
    ctx.fillStyle='#050505';ctx.fillRect(0,0,canvas.width,canvas.height);
    //护盾倒计时
    if(shieldTime>0){shieldTime--;shieldDom.textContent='有效'}else shieldDom.textContent='无';
    if(infiniteBulletTime>0)infiniteBulletTime--;

    if(gameOver){
        ctx.fillStyle='#f33';ctx.font='62px Arial';ctx.textAlign='center';
        ctx.fillText('游戏结束',canvas.width/2,canvas.height/2-35);
        ctx.font='30px Arial';
        ctx.fillText('最终分数：'+score,canvas.width/2,canvas.height/2+18);
        ctx.fillText('点击下方按钮 / 按R重开',canvas.width/2,canvas.height/2+65);
        requestAnimationFrame(loop);
        return;
    }

    //绘制墙体
    ctx.fillStyle='#555';
    for(let w of walls){ctx.fillRect(w.x,w.y,w.w,w.h)}

    //玩家移动 PC+手机
    let moveX=0,moveY=0;
    if(keys.w)moveY-=player.speed;if(keys.s)moveY+=player.speed;
    if(keys.a)moveX-=player.speed;if(keys.d)moveX+=player.speed;
    if(touch.down){
        const dx=touch.x-player.x,dy=touch.y-player.y;
        moveX+=dx*0.06;moveY+=dy*0.06;
    }
    let newX=player.x+moveX,newY=player.y+moveY;
    if(!inWall(newX,player.y,player.size)&&newX>player.size&&newX<canvas.width-player.size)player.x=newX;
    if(!inWall(player.x,newY,player.size)&&newY>player.size&&newY<canvas.height-player.size)player.y=newY;

    //玩家+护盾外圈
    if(shieldTime>0){
        ctx.strokeStyle='#0cf';ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(player.x,player.y,player.size+5,0,Math.PI*2);ctx.stroke();
    }
    ctx.fillStyle=player.color;ctx.beginPath();ctx.arc(player.x,player.y,player.size,0,Math.PI*2);ctx.fill();

    //道具
    for(let i=items.length-1;i>=0;i--){
        const it=items[i];
        ctx.fillStyle=it.color;ctx.beginPath();ctx.arc(it.x,it.y,it.size,0,Math.PI*2);ctx.fill();
        if(hitCircle(player,it)){
            playSound('pick');
            switch(it.type){
                case'hp':hp=Math.min(hp+1,5);hpDom.textContent=hp;break;
                case'shield':shieldTime=360;break;
                case'inf':infiniteBulletTime=480;break;
            }
            items.splice(i,1);
        }
    }

    //子弹
    for(let i=bullets.length-1;i>=0;i--){
        const b=bullets[i];
        b.x+=b.dx*b.speed;b.y+=b.dy*b.speed;
        if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height||inWall(b.x,b.y,b.size)){bullets.splice(i,1);continue}
        ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(b.x,b.y,b.size,0,Math.PI*2);ctx.fill();
    }

    //小怪
    for(let ei=enemies.length-1;ei>=0;ei--){
        const e=enemies[ei];
        const dx=player.x-e.x,dy=player.y-e.y;
        const len=Math.hypot(dx,dy);
        let nx=e.x+dx/len*e.speed,ny=e.y+dy/len*e.speed;
        if(!inWall(nx,e.y,e.size))e.x=nx;
        if(!inWall(e.x,ny,e.size))e.y=ny;

        ctx.fillStyle='#f33';ctx.beginPath();ctx.arc(e.x,e.y,e.size,0,Math.PI*2);ctx.fill();
        //子弹命中
        for(let bi=bullets.length-1;bi>=0;bi--){
            if(hitCircle(bullets[bi],e)){
                createBoom(e.x,e.y);addFloat(e.x,e.y,bullets[bi].score);
                score+=bullets[bi].score;scoreDom.textContent=score;
                enemies.splice(ei,1);bullets.splice(bi,1);playSound('hit');break;
            }
        }
        //碰玩家
        if(hitCircle(player,e)){
            if(shieldTime<=0){hp--;hpDom.textContent=hp;playSound('hurt');if(hp<=0)gameOverFunc()}
            enemies.splice(ei,1);
        }
    }

    //BOSS+弹幕
    for(let bi=bossList.length-1;bi>=0;bi--){
        const b=bossList[bi];
        const dx=player.x-b.x,dy=player.y-b.y;
        const len=Math.hypot(dx,dy);
        b.x+=dx/len*b.speed;b.y+=dy/len*b.speed;
        ctx.fillStyle='#93f';ctx.beginPath();ctx.arc(b.x,b.y,b.size,0,Math.PI*2);ctx.fill();
        b.shootCd++;
        if(b.shootCd>90){
            b.shootCd=0;
            for(let a=0;a<6;a++){
                const ang=Math.PI*2/6*a;
                bossBullet.push({x:b.x,y:b.y,size:7,speed:3.2,dx:Math.cos(ang),dy:Math.sin(ang)})
            }
        }
        //子弹打BOSS
        for(let j=bullets.length-1;j>=0;j--){
            if(hitCircle(bullets[j],b)){
                b.hp-=1;bullets.splice(j,1);
                if(b.hp<=0){
                    createBoom(b.x,b.y,50);playSound('bossboom');
                    const add=80;score+=add;scoreDom.textContent=score;addFloat(b.x,b.y,add);
                    bossList.splice(bi,1);break;
                }
            }
        }
        if(hitCircle(player,b)){
            if(shieldTime<=0){hp-=2;hpDom.textContent=hp;playSound('hurt');if(hp<=0)gameOverFunc()}
            bossList.splice(bi,1);
        }
    }

    //BOSS子弹
    for(let i=bossBullet.length-1;i>=0;i--){
        const bb=bossBullet[i];
        bb.x+=bb.dx*bb.speed;bb.y+=bb.dy*bb.speed;
        if(bb.x<0||bb.x>canvas.width||bb.y<0||bb.y>canvas.height||inWall(bb.x,bb.y,bb.size)){bossBullet.splice(i,1);continue}
        ctx.fillStyle='#f06';ctx.beginPath();ctx.arc(bb.x,bb.y,bb.size,0,Math.PI*2);ctx.fill();
        if(hitCircle(player,bb)){
            if(shieldTime<=0){hp--;hpDom.textContent=hp;playSound('hurt');if(hp<=0)gameOverFunc()}
            bossBullet.splice(i,1);
        }
    }

    //粒子
    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.x+=p.vx;p.y+=p.vy;p.life--;p.vx*=0.94;p.vy*=0.94;
        if(p.life<=0){particles.splice(i,1);continue}
        ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
    }

    //飘字加分
    ctx.font='bold 19px Arial';
    for(let i=floatTexts.length-1;i>=0;i--){
        const f=floatTexts[i];f.y-=1.3;f.life--;
        ctx.fillStyle='#ff0';ctx.fillText(f.text,f.x,f.y);
        if(f.life<=0)floatTexts.splice(i,1);
    }

    requestAnimationFrame(loop);
}

//开局初始化
initGame();
loop();
</script>
</body>
</html>
