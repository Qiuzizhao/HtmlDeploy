<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>第一人称射击小游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
        
        /* 准星 */
        .crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 20px; height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .crosshair::before, .crosshair::after {
            content: ''; position: absolute;
            background: white;
        }
        .crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
        .crosshair::after { width: 20px; height: 2px; left: 0; top: 9px; }

        /* UI */
        .ui {
            position: fixed; top: 15px; left: 15px;
            color: white; font-size: 18px;
            text-shadow: 1px 1px #000;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="ui">分数: <span id="score">0</span></div>
    <div class="crosshair"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // 基础场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 10, 60);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias:true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 光照
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // 鼠标视角锁定
        const controls = new THREE.PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());

        // 地面
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshLambertMaterial({ color: 0x555555 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 围墙
        function wall(x, z, w) {
            const m = new THREE.Mesh(
                new THREE.BoxGeometry(w, 4, 2),
                new THREE.MeshLambertMaterial({ color: 0x888888 })
            );
            m.position.set(x, 2, z);
            scene.add(m);
        }
        wall(-30, 0, 25);
        wall(30, 0, 25);
        wall(0, -30, 25);
        wall(0, 30, 25);

        camera.position.y = 2;

        // 按键控制
        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (k === 'w') keys.w = true;
            if (k === 'a') keys.a = true;
            if (k === 's') keys.s = true;
            if (k === 'd') keys.d = true;
        });
        document.addEventListener('keyup', e => {
            const k = e.key.toLowerCase();
            if (k === 'w') keys.w = false;
            if (k === 'a') keys.a = false;
            if (k === 's') keys.s = false;
            if (k === 'd') keys.d = false;
        });

        // 敌人
        let enemies = [];
        let score = 0;

        function spawnEnemy() {
            const enemy = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 2, 1.5),
                new THREE.MeshLambertMaterial({ color: 0xff3333 })
            );
            const angle = Math.random() * Math.PI * 2;
            const r = 40 + Math.random() * 20;
            enemy.position.set(Math.cos(angle)*r, 1, Math.sin(angle)*r);
            enemy.userData.speed = 0.06;
            enemies.push(enemy);
            scene.add(enemy);
        }

        // 生成10个敌人
        for (let i=0; i<10; i++) spawnEnemy();

        // 射击
        document.addEventListener('mousedown', () => {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(enemies);

            if (hits.length > 0) {
                const hit = hits[0].object;
                scene.remove(hit);
                enemies = enemies.filter(e => e !== hit);
                score += 10;
                document.getElementById('score').innerText = score;
                spawnEnemy();
            }
        });

        // 移动
        function movePlayer() {
            const speed = 0.15;
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            dir.y = 0;
            dir.normalize();
            const right = new THREE.Vector3().crossVectors(dir, camera.up).normalize();

            if (keys.w) camera.position.addScaledVector(dir, speed);
            if (keys.s) camera.position.addScaledVector(dir, -speed);
            if (keys.a) camera.position.addScaledVector(right, -speed);
            if (keys.d) camera.position.addScaledVector(right, speed);
        }

        // 敌人追玩家
        function enemyAI() {
            enemies.forEach(en => {
                const dx = camera.position.x - en.position.x;
                const dz = camera.position.z - en.position.z;
                const dist = Math.hypot(dx, dz);
                if (dist > 2) {
                    en.position.x += dx * en.userData.speed;
                    en.position.z += dz * en.userData.speed;
                }
            });
        }

        // 窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 游戏循环
        function loop() {
            requestAnimationFrame(loop);
            movePlayer();
            enemyAI();
            renderer.render(scene, camera);
        }
        loop();
    </script>
</body>
</html>
