<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恶魔轮盘 Buckshot Roulette</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #111;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #222;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px #000;
        }

        h1 {
            color: #ff4444;
            margin-bottom: 10px;
        }

        .hp {
            font-size: 20px;
            margin: 10px 0;
            color: #eee;
        }

        .bullet-info {
            font-size: 18px;
            margin: 15px 0;
            color: #ffcc00;
        }

        .gun {
            width: 180px;
            height: 80px;
            background: #444;
            margin: 20px auto;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #fff;
        }

        .btn {
            padding: 12px 24px;
            margin: 8px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #ff4444;
            color: white;
            transition: 0.2s;
        }

        .btn:hover {
            background: #cc0000;
        }

        .btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .log {
            background: #181818;
            padding: 15px;
            border-radius: 6px;
            height: 120px;
            overflow-y: auto;
            text-align: left;
            margin-top: 20px;
            font-size: 14px;
            color: #ccc;
        }

        .status {
            font-size: 18px;
            color: #0f0;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>恶魔轮盘</h1>
        <div class="hp">你的血量：<span id="playerHp">2</span></div>
        <div class="hp">恶魔血量：<span id="devilHp">2</span></div>
        <div class="bullet-info" id="bulletTip">实弹：？ | 空包弹：？</div>
        <div class="gun" id="gun">🔫 准备射击</div>
        <div class="status" id="status">轮到你行动</div>

        <button class="btn" id="shootSelf">朝自己开枪</button>
        <button class="btn" id="shootDevil">朝恶魔开枪</button>
        <button class="btn" id="restart" style="display:none;">重新开始</button>

        <div class="log" id="log">游戏日志：</div>
    </div>

    <script>
        // 游戏核心数据
        let playerHp = 2;
        let devilHp = 2;
        let bullets = [];
        let currentBullet = 0;
        let gameOver = false;

        // DOM
        const playerHpEl = document.getElementById("playerHp");
        const devilHpEl = document.getElementById("devilHp");
        const bulletTipEl = document.getElementById("bulletTip");
        const statusEl = document.getElementById("status");
        const logEl = document.getElementById("log");
        const shootSelfBtn = document.getElementById("shootSelf");
        const shootDevilBtn = document.getElementById("shootDevil");
        const restartBtn = document.getElementById("restart");

        // 初始化
        startGame();

        // 按钮事件
        shootSelfBtn.addEventListener("click", () => shoot(true));
        shootDevilBtn.addEventListener("click", () => shoot(false));
        restartBtn.addEventListener("click", startGame);

        // 开始游戏
        function startGame() {
            playerHp = 2;
            devilHp = 2;
            gameOver = false;
            restartBtn.style.display = "none";
            shootSelfBtn.disabled = false;
            shootDevilBtn.disabled = false;
            generateBullets();
            updateUI();
            addLog("游戏开始！装填子弹...");
            statusEl.textContent = "轮到你行动";
        }

        // 随机生成子弹（实弹+空包弹）
        function generateBullets() {
            bullets = [];
            const live = Math.random() > 0.5 ? 1 : 2;
            const blank = 2;
            for (let i = 0; i < live; i++) bullets.push(true);
            for (let i = 0; i < blank; i++) bullets.push(false);
            bullets.sort(() => Math.random() - 0.5);
            currentBullet = 0;
            bulletTipEl.textContent = `实弹：${live} | 空包弹：${blank}`;
        }

        // 射击
        function shootSelf) {
            if (gameOver || currentBullet >= bullets.length) {
                generateBullets();
                return;
            }

            const isLive = bullets[currentBullet];
            currentBullet++;
            let msg = "";

            if (isLive) {
                if (shootSelf) {
                    playerHp--;
                    msg = "你朝自己开枪 → 实弹！你掉1血";
                } else {
                    devilHp--;
                    msg = "你朝恶魔开枪 → 实弹！恶魔掉1血";
                }
            } else {
                msg = shootSelf ? "朝自己开枪 → 空包弹！你继续行动" : "朝恶魔开枪 → 空包弹！回合结束";
            }

            addLog(msg);
            checkGameOver();
            updateUI();

            if (gameOver) return;

            // 空包弹自残 → 继续回合
            if (shootSelf && !isLive) {
                statusEl.textContent = "你继续行动！";
                return;
            }

            // 恶魔回合
            setTimeout(devilTurn, 1200);
        }

        // 恶魔行动
        function devilTurn() {
            if (gameOver) return;
            statusEl.textContent = "恶魔正在行动...";

            setTimeout(() => {
                const isLive = bullets[currentBullet];
                currentBullet++;
                let msg = "";

                if (isLive) {
                    playerHp--;
                    msg = "恶魔朝你开枪 → 实弹！你掉1血";
                } else {
                    msg = "恶魔朝自己开枪 → 空包弹！恶魔继续行动";
                }

                addLog(msg);
                checkGameOver();
                updateUI();

                if (!gameOver && !isLive) {
                    setTimeout(devilTurn, 1200);
                } else {
                    statusEl.textContent = "轮到你行动";
                }
            }, 1200);
        }

        // 检查游戏结束
        function checkGameOver() {
            if (playerHp <= 0) {
                statusEl.textContent = "💀 你输了！";
                gameOver = true;
            }
            if (devilHp <= 0) {
                statusEl.textContent = "🎉 你赢了！";
                gameOver = true;
            }

            if (gameOver) {
                shootSelfBtn.disabled = true;
                shootDevilBtn.disabled = true;
                restartBtn.style.display = "inline-block";
            }
        }

        // 更新界面
        function updateUI() {
            playerHpEl.textContent = playerHp;
            devilHpEl.textContent = devilHp;
        }

        // 日志
        function addLog(text) {
            logEl.innerHTML += `<br/>• ${text}`;
            logEl.scrollTop = logEl.scrollHeight;
        }
    </script>
</body>
</html>
