<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>迷你KARDS网页卡牌</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei, sans-serif}
body{background:#1a1e24;color:#fff;padding:15px;line-height:1.4}
.container{max-width:1300px;margin:0 auto}
.title{text-align:center;margin:10px 0;font-size:22px;color:#ffcc00}

/* 信息栏 */
.info{padding:12px;margin:10px 0;background:#2d343a;border-radius:8px}
#infoText{font-size:16px;font-weight:bold;color:#4ade80}
.opt{margin:10px 0;display:flex;gap:10px}
button{padding:8px 16px;cursor:pointer;border:none;border-radius:6px;background:#3b82f6;color:white;font-weight:bold;transition:0.2s}
button:hover{background:#2563eb}
button:disabled{background:#666;cursor:not-allowed}

/* 对手区域 */
.enemy-area{border:2px solid #ef4444;padding:12px;background:#3b1818;border-radius:8px;margin-bottom:10px}
.enemy-area h3{color:#fca5a5;margin-bottom:8px}

/* 中间战场分割 */
.battle{display:flex;gap:12px;margin:12px 0}
.front,.back{width:50%;border:2px solid #555;padding:12px;min-height:140px;border-radius:8px}
.front{background:#166534;border-color:#10b981}
.back{background:#1e3a8a;border-color:#3b82f6}
.front h4,.back h4{margin-bottom:8px;color:#e0e0e0}

/* 我方区域 */
.my-area{border:2px solid #22c55e;padding:12px;background:#052e16;border-radius:8px}
.my-area h3{color:#86efac;margin-bottom:8px}

/* 卡牌样式 */
.card{
    display:inline-block;width:100px;padding:8px;margin:4px;
    background:#292d3e;border-radius:8px;border:2px solid #888;cursor:pointer;
    vertical-align:top;min-height:120px;text-align:center;font-size:13px;
    transition:0.2s;user-select:none;
}
.card:hover{transform:translateY(-2px);border-color:#ccc}
.card.cantPlay{opacity:0.5;cursor:not-allowed}
.card.canAtk{border:2px solid #10b981;background:#134e4a}
.card.selected{border:2px solid #fbbf24;background:#473307}

/* 区域标签 */
.zone-label{font-size:12px;color:#999;margin-top:4px}
</style>
</head>
<body>
<div class="container">
    <div class="title">🎖️ 迷你KARDS - 二战卡牌对战 🎖️</div>
    <div class="info">
        <span id="infoText">游戏初始化...</span>
        <div class="opt">
            <button id="endBtn" onclick="endTurn()">结束回合</button>
            <button onclick="attackHQ()">全军进攻大本营</button>
            <button onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <!-- 敌方 -->
    <div class="enemy-area">
        <h3>🏴 敌方｜大本营血量:<span id="enemyHp">20</span>｜费用:<span id="enemyMana">0</span>/<span id="enemyMaxMana">0</span></h3>
        <div>📛 前线战场：<div id="enemyFront"></div></div>
        <div>📛 后备阵地：<div id="enemyBack"></div></div>
        <div>🖐️ 敌方手牌：<span id="enemyHandCnt">0</span>张</div>
    </div>

    <div class="battle">
        <div class="front"><h4>✅ 我方前线阵地（只能攻击敌方前线）</h4><div id="myFront"></div></div>
        <div class="back"><h4>✅ 我方后备阵地（只能攻击敌方后备）</h4><div id="myBack"></div></div>
    </div>

    <!-- 我方 -->
    <div class="my-area">
        <h3>🏳️ 我方｜大本营血量:<span id="myHp">20</span>｜费用:<span id="myMana">0</span>/<span id="myMaxMana">0</span></h3>
        <div>🖐️ 手牌：<div id="myHand"></div></div>
    </div>
</div>

<script>
// 卡牌模板 复刻KARDS：步兵/坦克/反坦克/侦察
const cardDB = [
    {name:"美军步兵",cost:1,atk:2,hp:2,desc:"基础步兵"},
    {name:"三号坦克",cost:3,atk:4,hp:3,desc:"德国主战坦克"},
    {name:"苏军侦察兵",cost:2,atk:3,hp:1,desc:"高速突击"},
    {name:"工程兵",cost:2,atk:1,hp:4,desc:"高血量肉盾"},
    {name:"反坦克炮",cost:4,atk:5,hp:2,desc:"重甲杀手"}
];

// 玩家数据
let my = {hp:20,mana:0,maxMana:0,hand:[],front:[],back:[],deck:[]};
let enemy = {hp:20,mana:0,maxMana:0,hand:[],front:[],back:[],deck:[]};
let isMyTurn = true;
window.tempAtk = null; // 选中的攻击单位

// 生成卡组
function initDeck(){
    let arr = [];
    for(let i=0;i<20;i++) {
        arr.push({...cardDB[Math.floor(Math.random()*cardDB.length)],canAtk:false});
    }
    return arr.sort(()=>Math.random()-0.5);
}

// 抽卡
function drawCard(who,n=1){
    for(let i=0;i<n;i++){
        if(who.deck.length===0) return;
        who.hand.push(who.deck.shift());
    }
    renderAll();
}

// 重新开始游戏
function restartGame(){
    if(confirm("确定要重新开始游戏吗？")){
        location.reload();
    }
}

// 开局
function initGame(){
    my.deck = initDeck();
    enemy.deck = initDeck();
    drawCard(my,4);
    drawCard(enemy,4);
    newTurn();
}

// 新回合
function newTurn(){
    document.getElementById("endBtn").disabled = !isMyTurn;
    
    if(isMyTurn){
        my.maxMana = Math.min(my.maxMana+1,10);
        my.mana = my.maxMana;
        drawCard(my,1);
        // 我方所有单位本回合可攻击
        [...my.front,...my.back].forEach(c=>c.canAtk=true);
        setInfo("✅ 我方回合，请出牌、进攻或结束回合");
    }else{
        enemy.maxMana = Math.min(enemy.maxMana+1,10);
        enemy.mana = enemy.maxMana;
        drawCard(enemy,1);
        [...enemy.front,...enemy.back].forEach(c=>c.canAtk=true);
        setInfo("⏳ 敌方回合正在行动...");
        setTimeout(aiRun,1200);
    }
    renderAll();
}

// 打出卡牌到阵地
function playCard(idx,zone){
    if(!isMyTurn) return;
    let c = my.hand[idx];
    if(my.mana < c.cost){
        setInfo("❌ 费用不足！");
        return;
    }
    // 阵地数量限制
    if(my[zone].length >= 5){
        setInfo(`❌ ${zone=="front"?"前线":"后备"}阵地已满！`);
        return;
    }
    
    my.mana -= c.cost;
    c.canAtk = false; // 上场疲劳，不能立即攻击
    my[zone].push(c);
    my.hand.splice(idx,1);
    setInfo(`✅ 成功打出【${c.name}】到${zone=="front"?"前线":"后备"}`);
    renderAll();
}

// 攻击逻辑：修复KARDS前线/后备对应规则
function attack(atkZone,atkIdx,defZone,defIdx){
    // 核心规则：前线只能打前线，后备只能打后备
    if(atkZone !== defZone){
        setInfo(`❌ 规则：${atkZone=="front"?"前线":"后备"}单位只能攻击对应阵地！`);
        return;
    }

    let atkList = my[atkZone], defList = enemy[defZone];
    let atk = atkList[atkIdx];
    let def = defList[defIdx];
    
    if(!atk.canAtk){
        setInfo("❌ 该单位本回合无法攻击！");
        return;
    }
    
    // KARDS互伤规则 互相扣血
    def.hp -= atk.atk;
    atk.hp -= def.atk;
    atk.canAtk = false;
    
    // 移除死亡单位
    my[atkZone] = atkList.filter(x=>x.hp>0);
    enemy[defZone] = defList.filter(x=>x.hp>0);
    
    setInfo(`⚔️ 【${atk.name}】攻击【${def.name}】，互相造成伤害！`);
    checkWin();
    window.tempAtk = null;
    renderAll();
}

// 全体攻击大本营
function attackHQ(){
    if(!isMyTurn) return;
    
    let dmg = 0;
    let atkUnits = [...my.front,...my.back].filter(c=>c.canAtk);
    
    if(atkUnits.length === 0){
        setInfo("❌ 没有可以攻击大本营的单位！");
        return;
    }
    
    atkUnits.forEach(c=>{
        dmg += c.atk;
        c.canAtk = false;
    })
    
    enemy.hp -= dmg;
    setInfo(`💥 全军突击！对敌方基地造成 ${dmg} 点伤害！`);
    checkWin();
    renderAll();
}

// 结束回合
function endTurn(){
    if(!isMyTurn) return;
    isMyTurn = false;
    window.tempAtk = null; // 清空选中状态
    setInfo("⏳ 回合结束，等待敌方行动...");
    newTurn();
}

// AI智能行动优化
function aiRun(){
    // AI优先出牌
    for(let i=enemy.hand.length-1; i>=0; i--){
        let c = enemy.hand[i];
        if(enemy.mana >= c.cost){
            enemy.mana -= c.cost;
            c.canAtk = false;
            // 优先填满前线，再放后备
            if(enemy.front.length < 5) enemy.front.push(c);
            else if(enemy.back.length <5) enemy.back.push(c);
            enemy.hand.splice(i,1);
        }
    }

    // AI攻击逻辑：有单位优先攻击玩家基地
    let dmg=0;
    [...enemy.front,...enemy.back].forEach(c=>{
        if(c.canAtk){
            dmg += c.atk;
            c.canAtk = false;
        }
    })
    
    if(dmg>0){
        my.hp -= dmg;
        setInfo(`💥 敌方进攻！我方基地受到 ${dmg} 点伤害`);
    }else{
        setInfo("⏳ 敌方回合结束");
    }
    
    checkWin();
    isMyTurn = true;
    setTimeout(newTurn,800);
}

// 胜负判定
function checkWin(){
    if(my.hp <= 0){
        alert("💀 你输了！敌方攻破了你的基地！");
        restartGame();
    }
    if(enemy.hp <= 0){
        alert("🎉 胜利！你攻破了敌方基地！");
        restartGame();
    }
}

function setInfo(s){
    document.getElementById("infoText").innerText = s;
}

// 页面渲染
function renderAll(){
    // 基础数据渲染
    document.getElementById("myHp").innerText = my.hp;
    document.getElementById("enemyHp").innerText = enemy.hp;
    document.getElementById("myMana").innerText = my.mana;
    document.getElementById("myMaxMana").innerText = my.maxMana;
    document.getElementById("enemyMana").innerText = enemy.mana;
    document.getElementById("enemyMaxMana").innerText = enemy.maxMana;
    document.getElementById("enemyHandCnt").innerText = enemy.hand.length;

    // 渲染我方手牌
    let handDom = document.getElementById("myHand");
    handDom.innerHTML = "";
    my.hand.forEach((c,i)=>{
        let div = document.createElement("div");
        div.className = "card" + (my.mana < c.cost ? " cantPlay" : "");
        div.innerHTML = `${c.name}<br>费用:${c.cost}<br>攻:${c.atk} 血:${c.hp}<br><span class="zone-label">${c.desc}</span>`;
        div.onclick = ()=>{
            let z = confirm("放到【前线】？\n确定=前线 / 取消=后备") ? "front" : "back";
            playCard(i,z);
        }
        handDom.appendChild(div);
    })

    // 统一渲染战场
    function renderZone(domId, arr, isEnemy=false, zoneKey){
        let dom = document.getElementById(domId);
        dom.innerHTML = "";
        
        arr.forEach((c,i)=>{
            let d = document.createElement("div");
            let cls = "card";
            if(c.canAtk && !isEnemy) cls += " canAtk";
            if(window.tempAtk && window.tempAtk.z === zoneKey && window.tempAtk.idx === i && !isEnemy) cls += " selected";
            d.className = cls;
            
            d.innerHTML = `${c.name}<br>攻:${c.atk} 血:${c.hp}`;

            // 我方单位：点击选中准备攻击
            if(!isEnemy && c.canAtk && isMyTurn){
                d.onclick = ()=>{
                    window.tempAtk = {z: zoneKey, idx: i};
                    setInfo(`🎯 已选中【${c.name}】，请点击敌方${zoneKey=="front"?"前线":"后备"}单位攻击`);
                    renderAll();
                }
            }
            // 敌方单位：被我方选中单位攻击
            if(isEnemy && isMyTurn && window.tempAtk){
                d.onclick = ()=>{
                    attack(window.tempAtk.z, window.tempAtk.idx, zoneKey, i);
                }
            }
            dom.appendChild(d);
        })
    }

    renderZone("myFront", my.front, false, "front");
    renderZone("myBack", my.back, false, "back");
    renderZone("enemyFront", enemy.front, true, "front");
    renderZone("enemyBack", enemy.back, true, "back");
}

// 启动游戏
initGame();
</script>
</body>
</html>
