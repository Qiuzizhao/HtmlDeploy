<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>高级俄罗斯方块</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{
    background:#121218;
    display:flex;
    justify-content:center;
    padding:30px;
    color:#fff;
    gap:30px;
}
#main{display:flex;gap:20px}
#game{border:3px solid #333;background:#000}
.info{display:flex;flex-direction:column;gap:15px;width:160px}
.box{
    background:#1e1e28;
    padding:12px;
    border-radius:8px;
    border:1px solid #383850;
}
h4{margin-bottom:8px;color:#7cf}
p{font-size:18px;margin:3px 0}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
button{
    padding:8px;
    border:none;
    border-radius:4px;
    background:#296;
    color:#fff;
    cursor:pointer;
    font-size:15px;
}
button:nth-child(2){background:#c43}
button:nth-child(3){background:#359}
</style>
</head>
<body>
<div id="main">
    <canvas id="game" width="240" height="480"></canvas>
    <div class="info">
        <div class="box">
            <h4>下一个</h4>
            <canvas id="next" width="90" height="90"></canvas>
        </div>
        <div class="box">
            <h4>暂存(H)</h4>
            <canvas id="hold" width="90" height="90"></canvas>
        </div>
        <div class="box">
            <h4>数据</h4>
            <p>分数：<span id="score">0</span></p>
            <p>行数：<span id="lines">0</span></p>
            <p>等级：<span id="lv">1</span></p>
        </div>
        <div class="box btns">
            <button id="pause">暂停</button>
            <button id="restart">重启</button>
            <button id="holdBtn">暂存</button>
        </div>
        <div class="box">
            <h4>操作</h4>
            <p>←→移动 | ↑旋转</p>
            <p>↓软落 | 空格硬落</p>
            <p>H暂存方块</p>
        </div>
    </div>
</div>

<script>
// 画布初始化
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const nextC = document.getElementById('next');
const nextCtx = nextC.getContext('2d');
const holdC = document.getElementById('hold');
const holdCtx = holdC.getContext('2d');

// DOM 缓存
const scoreSpan = document.getElementById('score');
const linesSpan = document.getElementById('lines');
const lvSpan = document.getElementById('lv');
const pauseBtn = document.getElementById('pause');
const restartBtn = document.getElementById('restart');
const holdBtn = document.getElementById('holdBtn');

// 配置
const COLS = 10;
const ROWS = 20;
const SIZE = 24;
const COLORS = [null, '#0cf', '#0c0', '#f90', '#c0c', '#f33', '#09f', '#ff0'];

// 7种方块形状 I O T L J S Z
const SHAPES = [
    [[0,1],[1,1],[2,1],[3,1]],
    [[1,0],[2,0],[1,1],[2,1]],
    [[1,0],[0,1],[1,1],[2,1]],
    [[2,0],[0,1],[1,1],[2,1]],
    [[0,0],[0,1],[1,1],[2,1]],
    [[1,0],[2,0],[0,1],[1,1]],
    [[0,0],[1,0],[1,1],[2,1]]
];

let map = Array.from({length: ROWS}, () => Array(COLS).fill(0));
let score = 0;
let lines = 0;
let lv = 1;
let speed = 800;
let cur = {shape: [], x: 3, y: 0, type: 0};
let next = null;
let hold = null;
let isHoldUsed = false;
let pause = false;
let gameOverFlag = false;
let timer = null;

// 更新数据显示
function updateData() {
    scoreSpan.textContent = score;
    linesSpan.textContent = lines;
    lvSpan.textContent = lv;
}

// 随机方块
function randomShape() {
    const t = Math.floor(Math.random() * 7);
    return {shape: SHAPES[t], type: t + 1};
}

// 生成下一个（首次或创建新方块时调用）
function createNew() {
    // 如果没有下一个，先生成一个
    if (!next) {
        next = randomShape();
    }
    cur = next;
    cur.x = Math.floor((COLS - 4) / 2);
    cur.y = 0;
    next = randomShape();
    isHoldUsed = false;
    drawNext();
    if (checkCrash(cur.x, cur.y, cur.shape)) {
        gameOver();
    }
}

// 碰撞检测
function checkCrash(x, y, arr) {
    for (const [dx, dy] of arr) {
        const nx = x + dx;
        const ny = y + dy;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
        if (ny >= 0 && map[ny][nx]) return true;
    }
    return false;
}

// 落地固定
function lock() {
    for (const [dx, dy] of cur.shape) {
        const x = cur.x + dx;
        const y = cur.y + dy;
        if (y >= 0) map[y][x] = cur.type;
    }
    clearLine();
    createNew();
}

// 消行
function clearLine() {
    let cleared = 0;
    for (let y = ROWS - 1; y >= 0; y--) {
        if (map[y].every(v => v !== 0)) {
            map.splice(y, 1);
            map.unshift(Array(COLS).fill(0));
            cleared++;
            y++; // 继续检查同一行（新移下来的行）
        }
    }
    if (cleared > 0) {
        const add = [0, 100, 300, 500, 800][cleared];
        score += add * lv;
        lines += cleared;
        const newLv = Math.floor(lines / 10) + 1;
        if (newLv > lv) {
            lv = newLv;
            speed = Math.max(150, 800 - (lv - 1) * 70);
            restartTimer();
        }
        updateData();
    }
}

// 下落一格
function drop() {
    if (gameOverFlag) return;
    if (pause) return;
    if (!checkCrash(cur.x, cur.y + 1, cur.shape)) {
        cur.y++;
    } else {
        lock();
    }
    render();
}

// 硬降落
function hardDrop() {
    if (gameOverFlag) return;
    if (pause) return;
    while (!checkCrash(cur.x, cur.y + 1, cur.shape)) {
        cur.y++;
    }
    lock();
    render();
}

// 旋转
function rotate() {
    if (gameOverFlag) return;
    if (pause) return;
    const nd = cur.shape.map(([x, y]) => [-y, x]);
    if (!checkCrash(cur.x, cur.y, nd)) {
        cur.shape = nd;
    }
    render();
}

// 暂存
function swapHold() {
    if (gameOverFlag) return;
    if (pause) return;
    if (isHoldUsed) return;
    isHoldUsed = true;
    const temp = hold;
    hold = {shape: cur.shape.slice(), type: cur.type, x: cur.x, y: cur.y};
    if (temp) {
        cur = temp;
        cur.x = Math.floor((COLS - 4) / 2);
        cur.y = 0;
    } else {
        createNew(); // 会重新生成 cur 和 next，但 hold 已存
    }
    drawHold();
    render();
}

// 绘制单个方块（用于主画布）
function drawBlock(px, py, color) {
    ctx.fillStyle = color;
    ctx.fillRect(px, py, SIZE - 1, SIZE - 1);
}

// 影子落点
function drawShadow() {
    let sy = cur.y;
    while (!checkCrash(cur.x, sy + 1, cur.shape)) sy++;
    ctx.globalAlpha = 0.3;
    for (const [dx, dy] of cur.shape) {
        drawBlock((cur.x + dx) * SIZE, (sy + dy) * SIZE, COLORS[cur.type]);
    }
    ctx.globalAlpha = 1;
}

// 主渲染
function render() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 地图
    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            if (map[y][x]) {
                drawBlock(x * SIZE, y * SIZE, COLORS[map[y][x]]);
            }
        }
    }

    // 影子
    drawShadow();

    // 当前方块
    for (const [dx, dy] of cur.shape) {
        drawBlock((cur.x + dx) * SIZE, (cur.y + dy) * SIZE, COLORS[cur.type]);
    }
}

// 预览下一个
function drawNext() {
    nextCtx.fillStyle = '#111';
    nextCtx.fillRect(0, 0, 90, 90);
    if (!next) return;
    const s = 18;
    const ox = 20;
    const oy = 20;
    nextCtx.fillStyle = COLORS[next.type];
    next.shape.forEach(([x, y]) => {
        nextCtx.fillRect(ox + x * s, oy + y * s, s - 1, s - 1);
    });
}

// 暂存画布
function drawHold() {
    holdCtx.fillStyle = '#111';
    holdCtx.fillRect(0, 0, 90, 90);
    if (!hold) return;
    const s = 18;
    const ox = 20;
    const oy = 20;
    holdCtx.fillStyle = COLORS[hold.type];
    hold.shape.forEach(([x, y]) => {
        holdCtx.fillRect(ox + x * s, oy + y * s, s - 1, s - 1);
    });
}

// 定时器重启
function restartTimer() {
    clearInterval(timer);
    timer = setInterval(() => {
        if (!pause && !gameOverFlag) {
            drop();
        }
    }, speed);
}

// 游戏结束
function gameOver() {
    gameOverFlag = true;
    pause = true;
    clearInterval(timer);
    ctx.fillStyle = '#f33';
    ctx.font = '26px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2);
}

// 重启游戏
function resetGame() {
    gameOverFlag = false;
    pause = false;
    clearInterval(timer);
    map = Array.from({length: ROWS}, () => Array(COLS).fill(0));
    score = 0;
    lines = 0;
    lv = 1;
    speed = 800;
    hold = null;
    isHoldUsed = false;
    next = randomShape();
    createNew();
    drawHold();
    updateData();
    restartTimer();
    render();
    pauseBtn.textContent = '暂停';
}

// 键盘事件
document.addEventListener('keydown', e => {
    // 阻止默认行为（如方向键滚动页面）
    e.preventDefault();

    if (gameOverFlag) return;
    if (pause) return;

    switch (e.key) {
        case 'ArrowLeft':
            if (!checkCrash(cur.x - 1, cur.y, cur.shape)) cur.x--;
            render();
            break;
        case 'ArrowRight':
            if (!checkCrash(cur.x + 1, cur.y, cur.shape)) cur.x++;
            render();
            break;
        case 'ArrowDown':
            drop();
            break;
        case 'ArrowUp':
            rotate();
            break;
        case ' ':
            hardDrop();
            break;
        case 'h':
        case 'H':
            swapHold();
            break;
        default:
            // 不处理其他键
            break;
    }
});

// 按钮事件
pauseBtn.onclick = () => {
    if (gameOverFlag) return;
    pause = !pause;
    if (pause) {
        pauseBtn.textContent = '继续';
        ctx.fillStyle = '#fff';
        ctx.font = '22px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('已暂停', canvas.width / 2, canvas.height / 2);
    } else {
        pauseBtn.textContent = '暂停';
        render();
    }
};

restartBtn.onclick = resetGame;
holdBtn.onclick = swapHold;

// 启动游戏
resetGame(); // 使用 resetGame 统一初始化
</script>
</body>
</html>
