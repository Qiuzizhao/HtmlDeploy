<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>高级俄罗斯方块</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{
    background:#121218;
    display:flex;
    justify-content:center;
    padding:30px;
    color:#fff;
    gap:30px;
}
#main{display:flex;gap:20px}
#game{border:3px solid #333;background:#000}
.info{display:flex;flex-direction:column;gap:15px;width:160px}
.box{
    background:#1e1e28;
    padding:12px;
    border-radius:8px;
    border:1px solid #383850;
}
h4{margin-bottom:8px;color:#7cf}
p{font-size:18px;margin:3px 0}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
button{
    padding:8px;
    border:none;
    border-radius:4px;
    background:#296;
    color:#fff;
    cursor:pointer;
    font-size:15px;
}
button:nth-child(2){background:#c43}
button:nth-child(3){background:#359}
</style>
</head>
<body>
<div id="main">
    <canvas id="game" width="240" height="480"></canvas>
    <div class="info">
        <div class="box">
            <h4>下一个</h4>
            <canvas id="next" width="90" height="90"></canvas>
        </div>
        <div class="box">
            <h4>暂存(H)</h4>
            <canvas id="hold" width="90" height="90"></canvas>
        </div>
        <div class="box">
            <h4>数据</h4>
            <p>分数：<span id="score">0</span></p>
            <p>行数：<span id="lines">0</span></p>
            <p>等级：<span id="lv">1</span></p>
        </div>
        <div class="box btns">
            <button id="pause">暂停</button>
            <button id="restart">重启</button>
            <button id="holdBtn">暂存</button>
        </div>
        <div class="box">
            <h4>操作</h4>
            <p>←→移动 | ↑旋转</p>
            <p>↓软落 | 空格硬落</p>
            <p>H暂存方块</p>
        </div>
    </div>
</div>

<script>
// 画布初始化
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const nextC=document.getElementById('next');
const nextCtx=nextC.getContext('2d');
const holdC=document.getElementById('hold');
const holdCtx=holdC.getContext('2d');

// 配置
const COLS=10,ROWS=20,SIZE=24;
const COLORS=[
    null,'#0cf','#0c0','#f90','#c0c','#f33','#09f','#ff0'
]
// 7种方块形状 I O T L J S Z
const SHAPES=[
    [[0,1],[1,1],[2,1],[3,1]],
    [[1,0],[2,0],[1,1],[2,1]],
    [[1,0],[0,1],[1,1],[2,1]],
    [[2,0],[0,1],[1,1],[2,1]],
    [[0,0],[0,1],[1,1],[2,1]],
    [[1,0],[2,0],[0,1],[1,1]],
    [[0,0],[1,0],[1,1],[2,1]]
]

let map=Array(ROWS).fill().map(()=>Array(COLS).fill(0));
let score=0,lines=0,lv=1,speed=800;
let cur={shape:[],x:3,y:0,type:0};
let next={shape:[],type:0};
let hold=null;
let isHoldUsed=false;
let pause=false;
let timer=null;

// DOM
const $=s=>document.querySelector(s);
const updateData=()=>{
    $('#score').textContent=score;
    $('#lines').textContent=lines;
    $('#lv').textContent=lv;
}

// 随机方块
function randomShape(){
    let t=Math.floor(Math.random()*7);
    return {shape:SHAPES[t],type:t+1}
}
function createNew(){
    cur=next||randomShape();
    cur.x=Math.floor((COLS-4)/2);cur.y=0;
    next=randomShape();
    isHoldUsed=false;
    drawNext();
    if(checkCrash(cur.x,cur.y,cur.shape)){
        gameOver();
    }
}

// 碰撞检测
function checkCrash(x,y,arr){
    for(let [dx,dy] of arr){
        let nx=x+dx,ny=y+dy;
        if(nx<0||nx>=COLS||ny>=ROWS)return true;
        if(ny>=0&&map[ny][nx])return true;
    }
    return false;
}

// 落地固定
function lock(){
    for(let [dx,dy] of cur.shape){
        let x=cur.x+dx,y=cur.y+dy;
        if(y>=0)map[y][x]=cur.type;
    }
    clearLine();
    createNew();
}

// 消行
function clearLine(){
    let cl=0;
    for(let y=ROWS-1;y>=0;y--){
        if(map[y].every(v=>v!==0)){
            map.splice(y,1);
            map.unshift(Array(COLS).fill(0));
            cl++;y++;
        }
    }
    if(cl>0){
        let add=[0,100,300,500,800][cl];
        score+=add*lv;
        lines+=cl;
        //升级
        let newLv=Math.floor(lines/10)+1;
        if(newLv>lv){
            lv=newLv;
            speed=Math.max(150,800-(lv-1)*70);
            restartTimer();
        }
        updateData();
    }
}

// 下落一格
function drop(){
    if(!checkCrash(cur.x,cur.y+1,cur.shape))cur.y++;
    else lock();
    render();
}

// 硬降落
function hardDrop(){
    while(!checkCrash(cur.x,cur.y+1,cur.shape))cur.y++;
    lock();render();
}

// 旋转
function rotate(){
    let nd=cur.shape.map(([x,y])=>[-y,x]);
    if(!checkCrash(cur.x,cur.y,nd))cur.shape=nd;
    render();
}

// 暂存
function swapHold(){
    if(isHoldUsed)return;
    isHoldUsed=true;
    let temp=hold;
    hold={...cur};
    if(temp)cur=temp;
    else createNew();
    drawHold();render();
}

// 绘制单个方块
function drawBlock(ct,px,py,size=SIZE){
    ctx.fillStyle=COLORS[ct];
    ctx.fillRect(px,py,size-1,size-1);
}

// 影子落点
function drawShadow(){
    let sy=cur.y;
    while(!checkCrash(cur.x,sy+1,cur.shape))sy++;
    ctx.globalAlpha=0.3;
    for(let [dx,dy] of cur.shape){
        drawBlock(cur.type, (cur.x+dx)*SIZE,(sy+dy)*SIZE);
    }
    ctx.globalAlpha=1;
}

// 主渲染
function render(){
    ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);
    //地图
    for(let y=0;y<ROWS;y++)
        for(let x=0;x<COLS;x++)
            if(map[y][x])drawBlock(map[y][x],x*SIZE,y*SIZE);
    //影子
    drawShadow();
    //当前方块
    for(let [dx,dy] of cur.shape){
        drawBlock(cur.type,(cur.x+dx)*SIZE,(cur.y+dy)*SIZE);
    }
}

//预览下一个
function drawNext(){
    nextCtx.fillStyle='#111';nextCtx.fillRect(0,0,90,90);
    const s=18,ox=20,oy=20;
    nextCtx.fillStyle=COLORS[next.type];
    next.shape.forEach(([x,y])=>{
        nextCtx.fillRect(ox+x*s,oy+y*s,s-1,s-1);
    })
}
//暂存画布
function drawHold(){
    holdCtx.fillStyle='#111';holdCtx.fillRect(0,0,90,90);
    if(!hold)return;
    const s=18,ox=20,oy=20;
    holdCtx.fillStyle=COLORS[hold.type];
    hold.shape.forEach(([x,y])=>{
        holdCtx.fillRect(ox+x*s,oy+y*s,s-1,s-1);
    })
}

//定时器
function restartTimer(){
    clearInterval(timer);
    timer=setInterval(()=>{if(!pause)drop()},speed);
}

//游戏结束
function gameOver(){
    pause=true;
    clearInterval(timer);
    ctx.fillStyle='#f33';ctx.font='26px Arial';
    ctx.textAlign='center';
    ctx.fillText('游戏结束',canvas.width/2,canvas.height/2);
}
//重启
function resetGame(){
    map=Array(ROWS).fill().map(()=>Array(COLS).fill(0));
    score=lines=0;lv=1;speed=800;hold=null;pause=false;
    updateData();
    next=randomShape();
    createNew();drawHold();restartTimer();render();
}

//键盘绑定
document.addEventListener('keydown',e=>{
    if(pause&&e.key!==' ')return;
    switch(e.key){
        case 'ArrowLeft':if(!checkCrash(cur.x-1,cur.y,cur.shape))cur.x--;break;
        case 'ArrowRight':if(!checkCrash(cur.x+1,cur.y,cur.shape))cur.x++;break;
        case 'ArrowDown':drop();break;
        case 'ArrowUp':rotate();break;
        case ' ':hardDrop();break;
        case 'h':case 'H':swapHold();break;
    }
    render();
})

//按钮
$('#pause').onclick=()=>{
    pause=!pause;
    if(pause){
        ctx.fillStyle='#fff';ctx.font='22px Arial';
        ctx.textAlign='center';ctx.fillText('已暂停',canvas.width/2,canvas.height/2);
    }else render();
}
$('#restart').onclick=resetGame;
$('#holdBtn').onclick=swapHold;

//启动
createNew();
restartTimer();
render();
drawHold();
</script>
</body>
</html>
