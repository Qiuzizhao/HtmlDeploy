<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>高级俄罗斯方块</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{
    background:#121218;
    display:flex;
    justify-content:center;
    padding:30px;
    color:#fff;
    gap:30px;
}
#main{display:flex;gap:20px}
#game{border:3px solid #333;background:#000}
.info{display:flex;flex-direction:column;gap:15px;width:160px}
.box{
    background:#1e1e28;
    padding:12px;
    border-radius:8px;
    border:1px solid #383850;
}
h4{margin-bottom:8px;color:#7cf}
p{font-size:18px;margin:3px 0}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
button{
    padding:8px;
    border:none;
    border-radius:4px;
    background:#296;
    color:#fff;
    cursor:pointer;
    font-size:15px;
}
button:nth-child(2){background:#c43}
button:nth-child(3){background:#359}
</style>
</head>
<body>
<div id="main">
    <canvas id="game" width="240" height="480"></canvas>
    <div class="info">
        <div class="box">
            <h4>下一个</h4>
            <canvas id="next" width="90" height="90"></canvas>
        </div>
        <div class="box">
            <h4>暂存(H)</h4>
            <canvas id="hold" width="90" height="90"></canvas>
        </div>
        <div class="box">
            <h4>数据</h4>
            <p>分数：<span id="score">0</span></p>
            <p>行数：<span id="lines">0</span></p>
            <p>等级：<span id="lv">1</span></p>
        </div>
        <div class="box btns">
            <button id="pause">暂停</button>
            <button id="restart">重启</button>
            <button id="holdBtn">暂存</button>
        </div>
        <div class="box">
            <h4>操作</h4>
            <p>←→移动 | ↑旋转</p>
            <p>↓软落 | 空格硬落</p>
            <p>H暂存方块</p>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const nextC = document.getElementById('next');
    const nextCtx = nextC.getContext('2d');
    const holdC = document.getElementById('hold');
    const holdCtx = holdC.getContext('2d');

    const scoreSpan = document.getElementById('score');
    const linesSpan = document.getElementById('lines');
    const lvSpan = document.getElementById('lv');
    const pauseBtn = document.getElementById('pause');
    const restartBtn = document.getElementById('restart');
    const holdBtn = document.getElementById('holdBtn');

    const COLS = 10;
    const ROWS = 20;
    const SIZE = 24;
    const COLORS = [null, '#0cf', '#0c0', '#f90', '#c0c', '#f33', '#09f', '#ff0'];

    const SHAPES = [
        [[0,1],[1,1],[2,1],[3,1]],
        [[1,0],[2,0],[1,1],[2,1]],
        [[1,0],[0,1],[1,1],[2,1]],
        [[2,0],[0,1],[1,1],[2,1]],
        [[0,0],[0,1],[1,1],[2,1]],
        [[1,0],[2,0],[0,1],[1,1]],
        [[0,0],[1,0],[1,1],[2,1]]
    ];

    let map = [];
    let score = 0;
    let lines = 0;
    let lv = 1;
    let speed = 800;
    let cur = {shape: [], x: 3, y: 0, type: 0};
    let next = null;
    let hold = null;
    let isHoldUsed = false;
    let pause = false;
    let gameOverFlag = false;
    let timer = null;

    function initMap() {
        map = [];
        for (let i = 0; i < ROWS; i++) {
            map.push(new Array(COLS).fill(0));
        }
    }

    function updateData() {
        scoreSpan.textContent = score;
        linesSpan.textContent = lines;
        lvSpan.textContent = lv;
    }

    function randomShape() {
        const t = Math.floor(Math.random() * 7);
        return {shape: SHAPES[t].slice(), type: t + 1};
    }

    function createNew() {
        if (!next) {
            next = randomShape();
        }
        cur = {shape: next.shape.slice(), x: Math.floor((COLS - 4) / 2), y: 0, type: next.type};
        next = randomShape();
        isHoldUsed = false;
        drawNext();
        if (checkCrash(cur.x, cur.y, cur.shape)) {
            gameOver();
        }
    }

    function checkCrash(x, y, arr) {
        for (let i = 0; i < arr.length; i++) {
            const dx = arr[i][0];
            const dy = arr[i][1];
            const nx = x + dx;
            const ny = y + dy;
            if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
            if (ny >= 0 && map[ny][nx]) return true;
        }
        return false;
    }

    function lock() {
        for (let i = 0; i < cur.shape.length; i++) {
            const dx = cur.shape[i][0];
            const dy = cur.shape[i][1];
            const x = cur.x + dx;
            const y = cur.y + dy;
            if (y >= 0) map[y][x] = cur.type;
        }
        clearLine();
        createNew();
    }

    function clearLine() {
        let cleared = 0;
        for (let y = ROWS - 1; y >= 0; y--) {
            let full = true;
            for (let x = 0; x < COLS; x++) {
                if (map[y][x] === 0) {
                    full = false;
                    break;
                }
            }
            if (full) {
                map.splice(y, 1);
                map.unshift(new Array(COLS).fill(0));
                cleared++;
                y++;
            }
        }
        if (cleared > 0) {
            const add = [0, 100, 300, 500, 800][cleared];
            score += add * lv;
            lines += cleared;
            const newLv = Math.floor(lines / 10) + 1;
            if (newLv > lv) {
                lv = newLv;
                speed = Math.max(150, 800 - (lv - 1) * 70);
                restartTimer();
            }
            updateData();
        }
    }

    function drop() {
        if (gameOverFlag || pause) return;
        if (!checkCrash(cur.x, cur.y + 1, cur.shape)) {
            cur.y++;
        } else {
            lock();
        }
        render();
    }

    function hardDrop() {
        if (gameOverFlag || pause) return;
        while (!checkCrash(cur.x, cur.y + 1, cur.shape)) {
            cur.y++;
        }
        lock();
        render();
    }

    function rotate() {
        if (gameOverFlag || pause) return;
        const nd = cur.shape.map(([x, y]) => [-y, x]);
        if (!checkCrash(cur.x, cur.y, nd)) {
            cur.shape = nd;
        }
        render();
    }

    function swapHold() {
        if (gameOverFlag || pause || isHoldUsed) return;
        isHoldUsed = true;
        const temp = hold;
        hold = {shape: cur.shape.slice(), type: cur.type};
        if (temp) {
            cur = {shape: temp.shape.slice(), x: Math.floor((COLS - 4) / 2), y: 0, type: temp.type};
        } else {
            createNew();
        }
        drawHold();
        render();
    }

    function drawBlock(px, py, color) {
        ctx.fillStyle = color;
        ctx.fillRect(px, py, SIZE - 1, SIZE - 1);
    }

    function drawShadow() {
        let sy = cur.y;
        while (!checkCrash(cur.x, sy + 1, cur.shape)) sy++;
        ctx.globalAlpha = 0.3;
        for (let i = 0; i < cur.shape.length; i++) {
            const dx = cur.shape[i][0];
            const dy = cur.shape[i][1];
            drawBlock((cur.x + dx) * SIZE, (sy + dy) * SIZE, COLORS[cur.type]);
        }
        ctx.globalAlpha = 1;
    }

    function render() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
                if (map[y][x]) {
                    drawBlock(x * SIZE, y * SIZE, COLORS[map[y][x]]);
                }
            }
        }

        drawShadow();

        for (let i = 0; i < cur.shape.length; i++) {
            const dx = cur.shape[i][0];
            const dy = cur.shape[i][1];
            drawBlock((cur.x + dx) * SIZE, (cur.y + dy) * SIZE, COLORS[cur.type]);
        }
    }

    function drawNext() {
        nextCtx.fillStyle = '#111';
        nextCtx.fillRect(0, 0, 90, 90);
        if (!next) return;
        const s = 18;
        const ox = 20;
        const oy = 20;
        nextCtx.fillStyle = COLORS[next.type];
        for (let i = 0; i < next.shape.length; i++) {
            const x = next.shape[i][0];
            const y = next.shape[i][1];
            nextCtx.fillRect(ox + x * s, oy + y * s, s - 1, s - 1);
        }
    }

    function drawHold() {
        holdCtx.fillStyle = '#111';
        holdCtx.fillRect(0, 0, 90, 90);
        if (!hold) return;
        const s = 18;
        const ox = 20;
        const oy = 20;
        holdCtx.fillStyle = COLORS[hold.type];
        for (let i = 0; i < hold.shape.length; i++) {
            const x = hold.shape[i][0];
            const y = hold.shape[i][1];
            holdCtx.fillRect(ox + x * s, oy + y * s, s - 1, s - 1);
        }
    }

    function restartTimer() {
        if (timer) clearInterval(timer);
        timer = setInterval(function() {
            if (!pause && !gameOverFlag) {
                drop();
            }
        }, speed);
    }

    function gameOver() {
        gameOverFlag = true;
        pause = true;
        if (timer) clearInterval(timer);
        ctx.fillStyle = '#f33';
        ctx.font = '26px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2);
    }

    function resetGame() {
        gameOverFlag = false;
        pause = false;
        if (timer) clearInterval(timer);
        initMap();
        score = 0;
        lines = 0;
        lv = 1;
        speed = 800;
        hold = null;
        isHoldUsed = false;
        next = randomShape();
        createNew();
        drawHold();
        updateData();
        restartTimer();
        render();
        pauseBtn.textContent = '暂停';
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === ' ' || e.key.startsWith('Arrow') || e.key === 'h' || e.key === 'H') {
            e.preventDefault();
        }
        if (gameOverFlag || pause) return;

        switch (e.key) {
            case 'ArrowLeft':
                if (!checkCrash(cur.x - 1, cur.y, cur.shape)) cur.x--;
                render();
                break;
            case 'ArrowRight':
                if (!checkCrash(cur.x + 1, cur.y, cur.shape)) cur.x++;
                render();
                break;
            case 'ArrowDown':
                drop();
                break;
            case 'ArrowUp':
                rotate();
                break;
            case ' ':
                hardDrop();
                break;
            case 'h':
            case 'H':
                swapHold();
                break;
        }
    });

    pauseBtn.onclick = function() {
        if (gameOverFlag) return;
        pause = !pause;
        if (pause) {
            pauseBtn.textContent = '继续';
            ctx.fillStyle = '#fff';
            ctx.font = '22px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('已暂停', canvas.width / 2, canvas.height / 2);
        } else {
            pauseBtn.textContent = '暂停';
            render();
        }
    };

    restartBtn.onclick = resetGame;
    holdBtn.onclick = swapHold;

    resetGame();
})();
</script>
</body>
</html>
