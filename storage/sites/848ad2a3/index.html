<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节奏音游</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }

        body {
            background: #121227;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
        }

        .title {
            font-size: 26px;
            font-weight: 600;
            color: #e5d9f6;
        }

        .score {
            font-size: 18px;
            color: #c4b5fd;
        }

        .game {
            width: 320px;
            height: 520px;
            background: #1e1e3f;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            border: 2px solid #7c3aed;
        }

        .line {
            position: absolute;
            bottom: 100px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #7c3aed, #ec4899);
            z-index: 10;
        }

        .lanes {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            display: flex;
        }

        .lane {
            flex: 1;
            border-top: 1px solid #3f3f74;
        }

        .note {
            position: absolute;
            width: 70%;
            height: 18px;
            background: linear-gradient(90deg, #a78bfa, #ec4899);
            border-radius: 9px;
            left: 15%;
            will-change: transform;
        }

        .effect {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            color: white;
            transform: translate(-50%, -50%);
            animation: fly 0.5s forwards;
            pointer-events: none;
        }

        @keyframes fly {
            0% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -80px); }
        }

        #start {
            padding: 10px 28px;
            border-radius: 30px;
            border: none;
            background: #7c3aed;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        #start:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div class="title">🎵 节奏音游</div>
    <div class="score">分数: <span id="score">0</span></div>

    <div class="game">
        <div class="line"></div>
        <div class="lanes">
            <div class="lane"></div>
            <div class="lane"></div>
            <div class="lane"></div>
            <div class="lane"></div>
        </div>
    </div>

    <button id="start">开始游戏</button>

    <script>
        const scoreEl = document.getElementById('score');
        const game = document.querySelector('.game');
        const lanes = document.querySelectorAll('.lane');
        const startBtn = document.getElementById('start');

        let score = 0;
        let running = false;
        const notes = [];
        const speed = 6;

        // 谱面
        const map = [
            { lane:0, t:500 }, { lane:2, t:800 },
            { lane:1, t:1100 }, { lane:3, t:1400 },
            { lane:0, t:1700 }, { lane:1, t:2000 },
            { lane:2, t:2300 }, { lane:3, t:2600 },
            { lane:0, t:2900 }, { lane:1, t:3200 },
            { lane:2, t:3500 }, { lane:3, t:3800 },
        ];

        // 主循环
        function loop() {
            if (!running) return;
            updateNotes();
            requestAnimationFrame(loop);
        }

        // 创建音符
        function spawn(laneIndex) {
            const note = document.createElement('div');
            note.classList.add('note');
            lanes[laneIndex].appendChild(note);
            notes.push({ dom: note, lane: laneIndex, y: -20 });
        }

        // 更新所有音符
        function updateNotes() {
            for (let i = notes.length - 1; i >= 0; i--) {
                const n = notes[i];
                n.y += speed;
                n.dom.style.transform = `translateY(${n.y}px)`;

                if (n.y > 400) {
                    n.dom.remove();
                    notes.splice(i, 1);
                }
            }
        }

        // 点击判定
        lanes.forEach((lane, i) => {
            lane.addEventListener('click', () => {
                if (!running) return;

                const hit = notes.find(n => 
                    n.lane === i && n.y > 350 && n.y < 420
                );

                if (hit) {
                    score += 100;
                    hit.dom.remove();
                    notes.splice(notes.indexOf(hit), 1);
                    showEffect("完美", i, "#fcd34d");
                } else {
                    showEffect("失误", i, "#ef4444");
                }
                scoreEl.textContent = score;
            });
        });

        // 特效
        function showEffect(text, lane, color) {
            const e = document.createElement('div');
            e.classList.add('effect');
            e.textContent = text;
            e.style.color = color;
            const box = lanes[lane].getBoundingClientRect();
            e.style.left = box.left + box.width / 2 + 'px';
            e.style.top = box.top + 40 + 'px';
            document.body.appendChild(e);
            setTimeout(() => e.remove(), 500);
        }

        // 开始
        startBtn.onclick = () => {
            if (running) return;
            running = true;
            score = 0;
            scoreEl.textContent = 0;
            requestAnimationFrame(loop);

            map.forEach(n => setTimeout(() => spawn(n.lane), n.t));
            setTimeout(() => {
                running = false;
                alert(`游戏结束！分数：${score}`);
            }, 5000);
        };
    </script>
</body>
</html>
