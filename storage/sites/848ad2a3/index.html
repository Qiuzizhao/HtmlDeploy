<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>节奏音游 - 完美融合版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background: #121227;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .title {
            font-size: 26px;
            font-weight: 600;
            color: #e5d9f6;
            user-select: none;
        }

        .score {
            font-size: 18px;
            color: #c4b5fd;
            user-select: none;
            min-height: 28px;
        }

        .game {
            width: 320px;
            height: 520px;
            background: #1e1e3f;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            border: 2px solid #7c3aed;
            flex-shrink: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 判定线 */
        .line {
            position: absolute;
            bottom: 100px;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #7c3aed, #ec4899);
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 0 8px #7c3aed;
        }

        /* 轨道容器 - 提高 z-index 确保点击灵敏，并允许内部元素正常渲染 */
        .lanes {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            display: flex;
            background: rgba(255, 255, 255, 0.02);
            z-index: 15;
        }

        .lane {
            flex: 1;
            border-top: 1px solid #3f3f74;
            border-right: 1px solid rgba(63, 63, 116, 0.3);
            cursor: pointer;
            position: relative;
            transition: background-color 0.05s ease;
        }
        .lane:last-child {
            border-right: none;
        }

        /* 轨道点击/按住时的高亮打击感 */
        .lane.active {
            background-color: rgba(124, 58, 237, 0.3);
        }

        /* PC端按键提示小标签 */
        .key-tip {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: bold;
            color: #8b5cf6;
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 8px;
            border-radius: 4px;
            pointer-events: none;
            user-select: none;
        }

        /* 音符从顶端 top:0 往下掉 */
        .note {
            position: absolute;
            top: 0;
            width: 20%; 
            height: 16px;
            background: linear-gradient(90deg, #a78bfa, #ec4899);
            border-radius: 8px;
            will-change: transform;
            pointer-events: none;
            z-index: 5; /* 放在判定层下方，防止阻挡点击事件 */
            box-shadow: 0 2px 6px rgba(236, 72, 153, 0.4);
        }

        /* 打击特效提示 */
        .effect {
            position: absolute;
            font-size: 22px;
            font-weight: bold;
            left: var(--effect-left, 50%);
            top: 420px; /* 完美对齐判定线 */
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 25;
            animation: effectFly 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
        }

        @keyframes effectFly {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.8);
            }
            30% {
                transform: translate(-50%, -50%) scale(1.1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -100px) scale(1);
            }
        }

        #start {
            padding: 12px 36px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s, box-shadow 0.2s;
            touch-action: manipulation;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        #start:active {
            transform: scale(0.95);
        }

        #start:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="title">🎵 节奏音游</div>
    <div class="score">分数: <span id="score">0</span></div>

    <div class="game" id="gameContainer">
        <div class="line"></div>
        <div class="lanes" id="lanesContainer">
            <div class="lane" data-lane="0"><span class="key-tip">D</span></div>
            <div class="lane" data-lane="1"><span class="key-tip">F</span></div>
            <div class="lane" data-lane="2"><span class="key-tip">J</span></div>
            <div class="lane" data-lane="3"><span class="key-tip">K</span></div>
        </div>
    </div>

    <button id="start">开始游戏</button>

    <script>
        (function() {
            "use strict";

            // ---------- DOM 引用 ----------
            const scoreEl = document.getElementById('score');
            const gameEl = document.getElementById('gameContainer');
            const lanesContainer = document.getElementById('lanesContainer');
            const laneEls = document.querySelectorAll('.lane');
            const startBtn = document.getElementById('start');

            // ---------- 常量 ----------
            const SPEED = 380; // 像素/秒
            const LANE_COUNT = 4;
            const GAME_DURATION_MS = 5000;
            const JUDGE_MIN = 390; // 判定线位于 420 像素位置，上下宽容度
            const JUDGE_MAX = 450;
            const REMOVE_Y = 530;  // 越过整个面板后销毁
            const NOTE_INIT_Y = -20;
            const SCORE_PER_HIT = 100;
            const MAX_DELTA_MS = 50; 
            
            // 键盘映射表
            const KEY_MAP = { 'd': 0, 'f': 1, 'j': 2, 'k': 3, 'D': 0, 'F': 1, 'J': 2, 'K': 3 };

            // ---------- 状态 ----------
            let score = 0;
            let running = false;
            let rafId = null;
            let timers = [];
            let notes = [];

            // ---------- 谱面 ----------
            const MAP = [
                { lane: 0, t: 500 },
                { lane: 2, t: 800 },
                { lane: 1, t: 1100 },
                { lane: 3, t: 1400 },
                { lane: 0, t: 1700 },
                { lane: 1, t: 2000 },
                { lane: 2, t: 2300 },
                { lane: 3, t: 2600 },
                { lane: 0, t: 2900 },
                { lane: 1, t: 3200 },
                { lane: 2, t: 3500 },
                { lane: 3, t: 3800 },
            ];

            // ---------- 工具函数 ----------
            function safeSplice(arr, item) {
                const idx = arr.indexOf(item);
                if (idx !== -1) arr.splice(idx, 1);
            }

            function clearTimers() {
                timers.forEach(clearTimeout);
                timers = [];
            }

            // ---------- 特效 ----------
            function showEffect(text, laneIndex, color) {
                const e = document.createElement('div');
                e.className = 'effect';
                e.textContent = text;
                e.style.color = color;

                const laneWidth = 100 / LANE_COUNT;
                const leftPercent = laneIndex * laneWidth + laneWidth / 2;
                e.style.setProperty('--effect-left', `${leftPercent}%`);

                gameEl.appendChild(e);
                
                const timer = setTimeout(() => {
                    e.remove();
                }, 400);
                timers.push(timer);
            }

            // ---------- 音符管理 ----------
            function spawn(laneIndex) {
                const note = document.createElement('div');
                note.className = 'note';
                
                // 计算横向百分比定位并居中
                const laneWidth = 100 / LANE_COUNT;
                const leftPercent = laneIndex * laneWidth + (laneWidth - 20) / 2;
                note.style.left = `${leftPercent}%`;
                
                gameEl.appendChild(note);
                
                notes.push({
                    dom: note,
                    lane: laneIndex,
                    y: NOTE_INIT_Y
                });
            }

            function removeNote(noteObj) {
                if (noteObj.dom) noteObj.dom.remove();
                safeSplice(notes, noteObj);
            }

            function clearAllNotes() {
                notes.forEach(n => { if (n.dom) n.dom.remove(); });
                notes.length = 0;
            }

            // ---------- 更新逻辑 ----------
            function updateNotes(deltaSec) {
                const move = SPEED * deltaSec;
                for (let i = notes.length - 1; i >= 0; i--) {
                    const n = notes[i];
                    n.y += move;
                    n.dom.style.transform = `translateY(${n.y}px)`;

                    if (n.y > REMOVE_Y) {
                        removeNote(n);
                    }
                }
            }

            // ---------- 判定 ----------
            function judge(laneIndex) {
                if (!running) return;

                let hit = null;
                // 寻找该轨道上最接近判定线（420px）的音符
                for (let i = 0; i < notes.length; i++) {
                    const n = notes[i];
                    if (n.lane === laneIndex && n.y > JUDGE_MIN && n.y < JUDGE_MAX) {
                        if (!hit || Math.abs(n.y - 420) < Math.abs(hit.y - 420)) {
                            hit = n;
                        }
                    }
                }

                if (hit) {
                    score += SCORE_PER_HIT;
                    removeNote(hit);
                    showEffect('完美', laneIndex, '#fcd34d');
                } else {
                    showEffect('失误', laneIndex, '#ef4444');
                }
                scoreEl.textContent = score;
            }

            // ---------- 游戏循环 ----------
            let lastTime = 0;

            function gameLoop(timestamp) {
                if (!running) return;
                if (lastTime === 0) {
                    lastTime = timestamp;
                    rafId = requestAnimationFrame(gameLoop);
                    return;
                }
                let delta = timestamp - lastTime;
                lastTime = timestamp;
                
                if (delta > MAX_DELTA_MS) delta = MAX_DELTA_MS;
                const deltaSec = delta / 1000;

                updateNotes(deltaSec);
                rafId = requestAnimationFrame(gameLoop);
            }

            // ---------- 游戏控制 ----------
            function resetGame() {
                running = false;
                if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
                clearTimers();
                clearAllNotes();
                score = 0;
                scoreEl.textContent = '0';
                lastTime = 0;
                startBtn.disabled = false;
                startBtn.textContent = '开始游戏';
            }

            function endGame() {
                if (!running) return;
                running = false;
                if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
                clearTimers();
                clearAllNotes();
                startBtn.disabled = false;
                startBtn.textContent = '开始游戏';
                
                setTimeout(() => {
                    alert('游戏结束！分数：' + score);
                }, 50);
            }

            function startGame() {
                if (running) return;
                resetGame();

                running = true;
                startBtn.disabled = true;
                startBtn.textContent = '进行中...';

                rafId = requestAnimationFrame(gameLoop);

                MAP.forEach(item => {
                    const timer = setTimeout(() => {
                        if (running) spawn(item.lane);
                    }, item.t);
                    timers.push(timer);
                });

                const endTimer = setTimeout(endGame, GAME_DURATION_MS);
                timers.push(endTimer);
            }

            // ---------- 事件绑定（高性能委托 + 反馈） ----------
            
            // 鼠标点击/手机触摸
            lanesContainer.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                const laneEl = e.target.closest('.lane');
                if (!laneEl) return;

                const idx = parseInt(laneEl.getAttribute('data-lane'), 10);
                if (!isNaN(idx)) {
                    judge(idx);
                    
                    // 触发亮起特效
                    laneEl.classList.add('active');
                    setTimeout(() => laneEl.classList.remove('active'), 80);
                }
            });

            // 键盘按键提示响应
            window.addEventListener('keydown', (e) => {
                if (!running) return;
                const laneIdx = KEY_MAP[e.key];
                if (laneIdx !== undefined) {
                    judge(laneIdx);
                    
                    const laneEl = laneEls[laneIdx];
                    if (laneEl) {
                        laneEl.classList.add('active');
                        setTimeout(() => laneEl.classList.remove('active'), 80);
                    }
                }
            });

            startBtn.addEventListener('click', startGame);

            window.addEventListener('beforeunload', () => {
                running = false;
                if (rafId) cancelAnimationFrame(rafId);
                clearTimers();
                clearAllNotes();
            });

        })();
    </script>
</body>
</html>
