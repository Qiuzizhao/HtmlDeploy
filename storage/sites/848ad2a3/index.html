<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>节奏音游 - 修正掉落版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background: #121227;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .title {
            font-size: 26px;
            font-weight: 600;
            color: #e5d9f6;
            user-select: none;
        }

        .score {
            font-size: 18px;
            color: #c4b5fd;
            user-select: none;
            min-height: 28px;
        }

        .game {
            width: 320px;
            height: 520px;
            background: #1e1e3f;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            border: 2px solid #7c3aed;
            flex-shrink: 0;
        }

        /* 这里的 line 距离底部 100px，相当于距离顶部 420px */
        .line {
            position: absolute;
            bottom: 100px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #7c3aed, #ec4899);
            z-index: 10;
            pointer-events: none;
        }

        .lanes {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            display: flex;
        }

        .lane {
            flex: 1;
            border-top: 1px solid #3f3f74;
            border-right: 1px solid rgba(63, 63, 116, 0.5);
            cursor: pointer;
            position: relative;
        }
        .lane:last-child { border-right: none; }

        /* 【修正】音符现在相对于 .game 绝对定位，从 top: 0 开始往下掉 */
        .note {
            position: absolute;
            top: 0;
            width: 20%; 
            height: 18px;
            background: linear-gradient(90deg, #a78bfa, #ec4899);
            border-radius: 9px;
            will-change: transform;
            pointer-events: none;
        }

        .effect {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            color: white;
            left: 50%;
            top: 420px; /* 特效显示在判定线附近 */
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 20;
            animation: effectFly 0.5s ease-out forwards;
        }

        @keyframes effectFly {
            0% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -120px); }
        }

        #start {
            padding: 10px 28px;
            border-radius: 30px;
            border: none;
            background: #7c3aed;
            color: white;
            font-size: 16px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s, background 0.2s;
            touch-action: manipulation;
        }

        #start:active { transform: scale(0.96); }
        #start:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
    <div class="title">🎵 节奏音游</div>
    <div class="score">分数: <span id="score">0</span></div>

    <div class="game" id="gameContainer">
        <div class="line"></div>
        <div class="lanes">
            <div class="lane" data-lane="0"></div>
            <div class="lane" data-lane="1"></div>
            <div class="lane" data-lane="2"></div>
            <div class="lane" data-lane="3"></div>
        </div>
    </div>

    <button id="start">开始游戏</button>

    <script>
        (function() {
            "use strict";

            const scoreEl = document.getElementById('score');
            const gameEl = document.getElementById('gameContainer');
            const laneEls = document.querySelectorAll('.lane');
            const startBtn = document.getElementById('start');

            // ---------- 【修正】调整了判定高度数值 ----------
            const SPEED = 360; 
            const LANE_COUNT = 4;
            const GAME_DURATION_MS = 5000;
            const JUDGE_MIN = 390; // 判定线是 420px 处，给上下留出判定区间
            const JUDGE_MAX = 450;
            const REMOVE_Y = 530;  // 超过游戏高度(520px)后销毁
            const NOTE_INIT_Y = -20;
            const SCORE_PER_HIT = 100;
            const MAX_DELTA_MS = 50; 

            let score = 0;
            let running = false;
            let rafId = null;
            let timers = [];
            const notes = [];

            const MAP = [
                { lane: 0, t: 500 },
                { lane: 2, t: 800 },
                { lane: 1, t: 1100 },
                { lane: 3, t: 1400 },
                { lane: 0, t: 1700 },
                { lane: 1, t: 2000 },
                { lane: 2, t: 2300 },
                { lane: 3, t: 2600 },
                { lane: 0, t: 2900 },
                { lane: 1, t: 3200 },
                { lane: 2, t: 3500 },
                { lane: 3, t: 3800 },
            ];

            function safeSplice(arr, item) {
                var idx = arr.indexOf(item);
                if (idx !== -1) arr.splice(idx, 1);
            }

            function clearTimers() {
                timers.forEach(function(t) { clearTimeout(t); });
                timers = [];
            }

            function showEffect(text, laneIndex, color) {
                var e = document.createElement('div');
                e.className = 'effect';
                e.textContent = text;
                e.style.color = color;

                var laneWidth = 100 / LANE_COUNT;
                var leftPercent = laneIndex * laneWidth + laneWidth / 2;
                e.style.left = leftPercent + '%';
                e.style.top = '420px'; 

                gameEl.appendChild(e);
                var timer = setTimeout(function() {
                    if (e.parentNode) e.remove();
                }, 500);
                timers.push(timer);
            }

            // ---------- 【修正】音符生成在 game 容器中 ----------
            function spawn(laneIndex) {
                var note = document.createElement('div');
                note.className = 'note';
                
                // 计算横向百分比定位
                var laneWidth = 100 / LANE_COUNT;
                var leftPercent = laneIndex * laneWidth + (laneWidth - 20) / 2; // 居中处理
                note.style.left = leftPercent + '%';
                
                gameEl.appendChild(note); // 挂载到大背景上
                
                notes.push({
                    dom: note,
                    lane: laneIndex,
                    y: NOTE_INIT_Y
                });
            }

            function removeNote(noteObj) {
                if (noteObj.dom && noteObj.dom.parentNode) {
                    noteObj.dom.remove();
                }
                safeSplice(notes, noteObj);
            }

            function clearAllNotes() {
                for (var i = notes.length - 1; i >= 0; i--) {
                    var n = notes[i];
                    if (n.dom && n.dom.parentNode) n.dom.remove();
                }
                notes.length = 0;
            }

            function updateNotes(deltaSec) {
                var move = SPEED * deltaSec;
                for (var i = notes.length - 1; i >= 0; i--) {
                    var n = notes[i];
                    n.y += move;
                    n.dom.style.transform = 'translateY(' + n.y + 'px)';

                    if (n.y > REMOVE_Y) {
                        removeNote(n);
                    }
                }
            }

            // ---------- 【修正】判定核心逻辑优化 ----------
            function judge(laneIndex) {
                if (!running) return;

                var hit = null;
                for (var i = 0; i < notes.length; i++) {
                    var n = notes[i];
                    if (n.lane === laneIndex && n.y > JUDGE_MIN && n.y < JUDGE_MAX) {
                        // 谁最接近判定线（420px）就判定谁
                        if (!hit || Math.abs(n.y - 420) < Math.abs(hit.y - 420)) {
                            hit = n;
                        }
                    }
                }

                if (hit) {
                    score += SCORE_PER_HIT;
                    removeNote(hit);
                    showEffect('完美', laneIndex, '#fcd34d');
                } else {
                    showEffect('失误', laneIndex, '#ef4444');
                }
                scoreEl.textContent = score;
            }

            var lastTime = 0;
            function gameLoop(timestamp) {
                if (!running) return;
                if (lastTime === 0) {
                    lastTime = timestamp;
                    rafId = requestAnimationFrame(gameLoop);
                    return;
                }
                var delta = timestamp - lastTime;
                lastTime = timestamp;
                if (delta > MAX_DELTA_MS) delta = MAX_DELTA_MS;
                var deltaSec = delta / 1000;

                updateNotes(deltaSec);
                rafId = requestAnimationFrame(gameLoop);
            }

            function resetGame() {
                running = false;
                if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
                clearTimers();
                clearAllNotes();
                score = 0;
                scoreEl.textContent = '0';
                lastTime = 0;
                startBtn.disabled = false;
                startBtn.textContent = '开始游戏';
            }

            function endGame() {
                if (!running) return;
                running = false;
                if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
                clearTimers();
                clearAllNotes();
                startBtn.disabled = false;
                startBtn.textContent = '开始游戏';
                alert('游戏结束！分数：' + score);
            }

            function startGame() {
                if (running) return;
                resetGame();

                running = true;
                startBtn.disabled = true;
                startBtn.textContent = '进行中...';

                rafId = requestAnimationFrame(gameLoop);

                MAP.forEach(function(item) {
                    var timer = setTimeout(function() {
                        if (running) spawn(item.lane);
                    }, item.t);
                    timers.push(timer);
                });

                var endTimer = setTimeout(function() {
                    endGame();
                }, GAME_DURATION_MS);
                timers.push(endTimer);
            }

            function onLanePointer(e) {
                e.preventDefault();
                var laneEl = e.currentTarget;
                var idx = parseInt(laneEl.getAttribute('data-lane'), 10);
                if (!isNaN(idx)) {
                    judge(idx);
                }
            }

            for (var i = 0; i < laneEls.length; i++) {
                var lane = laneEls[i];
                lane.setAttribute('data-lane', i);
                lane.addEventListener('pointerdown', onLanePointer);
            }

            startBtn.addEventListener('click', startGame);

            window.addEventListener('beforeunload', function() {
                running = false;
                if (rafId) cancelAnimationFrame(rafId);
                clearTimers();
                clearAllNotes();
            });

        })();
    </script>
</body>
</html>
