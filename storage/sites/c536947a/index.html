<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>躲避球小游戏-高速版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            color: white;
            user-select: none;
            overflow: hidden;
        }
        #gameCanvas {
            border: 3px solid #ffffff;
            background: #000;
            touch-action: none;
        }
        .score {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .tips {
            margin-top: 10px;
            font-size: 16px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="score">分数: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="tips">方向键控制移动 | 碰到小球游戏结束 | 空格重新开始</div>

    <script>
        (function() {
            'use strict';

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreElement = document.getElementById('score');

            const W = canvas.width;
            const H = canvas.height;

            const PLAYER_WIDTH = 30;
            const PLAYER_HEIGHT = 30;
            const PLAYER_SPEED = 6;
            const PLAYER_START_X = W / 2 - PLAYER_WIDTH / 2;
            const PLAYER_START_Y = H - 50;

            const BALL_MIN_RADIUS = 12;
            const BALL_MAX_RADIUS = 24;
            const BALL_MIN_SPEED = 5;
            const BALL_MAX_SPEED = 9;
            const SPAWN_INTERVAL_MS = 450;

            const player = {
                x: PLAYER_START_X,
                y: PLAYER_START_Y,
                w: PLAYER_WIDTH,
                h: PLAYER_HEIGHT,
                speed: PLAYER_SPEED
            };

            let balls = [];
            let keys = {};
            let score = 0;
            let lastDisplayedScore = -1;
            let gameOver = false;
            let gameRunning = false;
            let spawnTimerId = null;
            let animationFrameId = null;

            // ── 键盘事件 ──
            function onKeyDown(e) {
                const key = e.key;
                keys[key] = true;
                if (key === ' ') {
                    e.preventDefault();
                    if (gameOver) resetGame();
                }
                if (key.startsWith('Arrow')) {
                    e.preventDefault();
                }
            }

            function onKeyUp(e) {
                keys[e.key] = false;
            }

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // ── 小球生成 ──
            function spawnBall() {
                if (gameOver) return;
                const radius = BALL_MIN_RADIUS + Math.random() * (BALL_MAX_RADIUS - BALL_MIN_RADIUS);
                const x = radius + Math.random() * (W - 2 * radius);
                const y = -radius;
                const speed = BALL_MIN_SPEED + Math.random() * (BALL_MAX_SPEED - BALL_MIN_SPEED);
                balls.push({ x, y, radius, speed });
            }

            // ── 玩家移动 ──
            function movePlayer() {
                if (gameOver) return;
                if (keys['ArrowLeft'] && player.x > 0) {
                    player.x -= player.speed;
                }
                if (keys['ArrowRight'] && player.x < W - player.w) {
                    player.x += player.speed;
                }
                if (keys['ArrowUp'] && player.y > 0) {
                    player.y -= player.speed;
                }
                if (keys['ArrowDown'] && player.y < H - player.h) {
                    player.y += player.speed;
                }
            }

            // ── 更新小球 ──
            function updateBalls() {
                if (gameOver) return;
                let scoreGain = 0;
                const alive = [];
                for (let i = 0; i < balls.length; i++) {
                    const ball = balls[i];
                    ball.y += ball.speed;
                    if (ball.y - ball.radius > H) {
                        scoreGain++;
                    } else {
                        alive.push(ball);
                    }
                }
                balls = alive;
                if (scoreGain > 0) {
                    score += scoreGain;
                    if (score !== lastDisplayedScore) {
                        scoreElement.textContent = score;
                        lastDisplayedScore = score;
                    }
                }
            }

            // ── 圆形与矩形碰撞检测 ──
            function circleRectCollision(cx, cy, cr, rx, ry, rw, rh) {
                const closestX = Math.max(rx, Math.min(cx, rx + rw));
                const closestY = Math.max(ry, Math.min(cy, ry + rh));
                const dx = cx - closestX;
                const dy = cy - closestY;
                return (dx * dx + dy * dy) < (cr * cr);
            }

            function checkCollision() {
                if (gameOver) return;
                const px = player.x;
                const py = player.y;
                const pw = player.w;
                const ph = player.h;
                for (let i = 0; i < balls.length; i++) {
                    const b = balls[i];
                    if (circleRectCollision(b.x, b.y, b.radius, px, py, pw, ph)) {
                        gameOver = true;
                        if (spawnTimerId !== null) {
                            clearInterval(spawnTimerId);
                            spawnTimerId = null;
                        }
                        return;
                    }
                }
            }

            // ── 渲染 ──
            function draw() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, W, H);

                ctx.fillStyle = '#fff';
                ctx.fillRect(player.x, player.y, player.w, player.h);

                ctx.fillStyle = '#ff3333';
                for (let i = 0; i < balls.length; i++) {
                    const b = balls[i];
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (gameOver) {
                    ctx.fillStyle = '#ff3333';
                    ctx.font = '40px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('游戏结束', W / 2, H / 2 - 40);

                    ctx.font = '20px Arial';
                    ctx.fillText('最终得分: ' + score, W / 2, H / 2 + 10);
                    ctx.fillText('按空格重新开始', W / 2, H / 2 + 45);
                }
            }

            // ── 游戏主循环 ──
            function gameLoop(timestamp) {
                if (!gameRunning) return;
                if (!gameOver) {
                    movePlayer();
                    updateBalls();
                    checkCollision();
                }
                draw();
                animationFrameId = requestAnimationFrame(gameLoop);
            }

            // ── 重置游戏 ──
            function resetGame() {
                if (spawnTimerId !== null) {
                    clearInterval(spawnTimerId);
                    spawnTimerId = null;
                }
                player.x = PLAYER_START_X;
                player.y = PLAYER_START_Y;
                balls = [];
                score = 0;
                lastDisplayedScore = -1;
                scoreElement.textContent = '0';
                gameOver = false;
                spawnTimerId = setInterval(spawnBall, SPAWN_INTERVAL_MS);
            }

            // ── 启动游戏 ──
            function startGame() {
                if (gameRunning) return;
                gameRunning = true;
                resetGame();
                gameLoop();
            }

            startGame();

            // ── 页面可见性变化时保持稳定 ──
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    if (spawnTimerId !== null) {
                        clearInterval(spawnTimerId);
                        spawnTimerId = null;
                    }
                } else {
                    if (gameRunning && !gameOver && spawnTimerId === null) {
                        spawnTimerId = setInterval(spawnBall, SPAWN_INTERVAL_MS);
                    }
                }
            });

        })();
    </script>
</body>
</html>
