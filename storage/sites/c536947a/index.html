<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>躲避球小游戏-高速版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            color: white;
            user-select: none;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        #gameCanvas {
            border: 3px solid #ffffff;
            background: #000;
            touch-action: none;
            max-width: 100vw;
            max-height: 80vh;
            display: block;
        }
        .score {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
            text-align: center;
        }
        .tips {
            margin-top: 10px;
            font-size: 16px;
            color: #ccc;
            text-align: center;
            padding: 0 12px;
        }
        @media (max-width: 420px) {
            .score {
                font-size: 20px;
                margin-bottom: 6px;
            }
            .tips {
                font-size: 13px;
                margin-top: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="score">分数: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="tips">方向键控制移动 | 碰到小球游戏结束 | 空格重新开始</div>

    <script>
        (function() {
            'use strict';

            // ─── DOM ──────────────────────────────────────────
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreEl = document.getElementById('score');

            const W = canvas.width;
            const H = canvas.height;

            // ─── 配置 ─────────────────────────────────────────
            const PLAYER_W = 30;
            const PLAYER_H = 30;
            const PLAYER_SPEED = 6;
            const PLAYER_START_X = W / 2 - PLAYER_W / 2;
            const PLAYER_START_Y = H - 50;

            const BALL_RADIUS_MIN = 12;
            const BALL_RADIUS_MAX = 24;
            const BALL_SPEED_MIN = 5;
            const BALL_SPEED_MAX = 9;
            const SPAWN_INTERVAL_MS = 450;

            // ─── 状态 ─────────────────────────────────────────
            const player = {
                x: PLAYER_START_X,
                y: PLAYER_START_Y,
                w: PLAYER_W,
                h: PLAYER_H,
                speed: PLAYER_SPEED
            };

            let balls = [];
            let score = 0;
            let gameOver = false;
            let gameRunning = false;

            let animId = null;
            let lastTime = 0;
            let spawnAccum = 0;

            // ─── 键盘 ─────────────────────────────────────────
            const keys = {};

            function onKeyDown(e) {
                const key = e.key;
                keys[key] = true;

                if (key === ' ') {
                    e.preventDefault();
                    if (gameOver) resetGame();
                    return;
                }

                if (key.startsWith('Arrow')) {
                    e.preventDefault();
                }
            }

            function onKeyUp(e) {
                keys[e.key] = false;
            }

            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);

            // ─── 触摸 / 鼠标 ─────────────────────────────────
            let touchActive = false;

            function getCanvasCoords(clientX, clientY) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            }

            function movePlayerTo(clientX, clientY) {
                if (gameOver) return;
                const pos = getCanvasCoords(clientX, clientY);
                player.x = Math.max(0, Math.min(pos.x - player.w / 2, W - player.w));
                player.y = Math.max(0, Math.min(pos.y - player.h / 2, H - player.h));
            }

            function onTouchStart(e) {
                e.preventDefault();
                const touch = e.touches[0];
                if (!touch) return;
                touchActive = true;
                if (gameOver) {
                    resetGame();
                    return;
                }
                movePlayerTo(touch.clientX, touch.clientY);
            }

            function onTouchMove(e) {
                e.preventDefault();
                if (!touchActive || gameOver) return;
                const touch = e.touches[0];
                if (!touch) return;
                movePlayerTo(touch.clientX, touch.clientY);
            }

            function onTouchEnd(e) {
                e.preventDefault();
                touchActive = false;
            }

            function onTouchCancel(e) {
                e.preventDefault();
                touchActive = false;
            }

            canvas.addEventListener('touchstart', onTouchStart, { passive: false });
            canvas.addEventListener('touchmove', onTouchMove, { passive: false });
            canvas.addEventListener('touchend', onTouchEnd, { passive: false });
            canvas.addEventListener('touchcancel', onTouchCancel, { passive: false });

            // 鼠标支持（可选，提升桌面体验）
            let mouseDown = false;

            function onMouseDown(e) {
                mouseDown = true;
                if (gameOver) {
                    resetGame();
                    return;
                }
                movePlayerTo(e.clientX, e.clientY);
            }

            function onMouseMove(e) {
                if (!mouseDown || gameOver) return;
                movePlayerTo(e.clientX, e.clientY);
            }

            function onMouseUp(e) {
                mouseDown = false;
            }

            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);

            // ─── 小球 ─────────────────────────────────────────
            function spawnBall() {
                const radius = BALL_RADIUS_MIN + Math.random() * (BALL_RADIUS_MAX - BALL_RADIUS_MIN);
                const x = radius + Math.random() * (W - 2 * radius);
                const speed = BALL_SPEED_MIN + Math.random() * (BALL_SPEED_MAX - BALL_SPEED_MIN);
                balls.push({ x, y: -radius, radius, speed });
            }

            // ─── 碰撞 ─────────────────────────────────────────
            function circleRectCollision(cx, cy, cr, rx, ry, rw, rh) {
                const closestX = Math.max(rx, Math.min(cx, rx + rw));
                const closestY = Math.max(ry, Math.min(cy, ry + rh));
                const dx = cx - closestX;
                const dy = cy - closestY;
                return (dx * dx + dy * dy) < (cr * cr);
            }

            // ─── 更新 ─────────────────────────────────────────
            function update(deltaMs) {
                if (gameOver) return;

                // 键盘移动
                if (keys['ArrowLeft'] || keys['a']) player.x = Math.max(0, player.x - player.speed);
                if (keys['ArrowRight'] || keys['d']) player.x = Math.min(W - player.w, player.x + player.speed);
                if (keys['ArrowUp'] || keys['w']) player.y = Math.max(0, player.y - player.speed);
                if (keys['ArrowDown'] || keys['s']) player.y = Math.min(H - player.h, player.y + player.speed);

                // 生成小球（基于时间累积）
                spawnAccum += deltaMs;
                while (spawnAccum >= SPAWN_INTERVAL_MS) {
                    spawnBall();
                    spawnAccum -= SPAWN_INTERVAL_MS;
                }

                // 更新小球位置 & 计分
                let gained = 0;
                for (let i = balls.length - 1; i >= 0; i--) {
                    const b = balls[i];
                    b.y += b.speed;
                    if (b.y - b.radius > H) {
                        gained++;
                        balls.splice(i, 1);
                    }
                }

                if (gained > 0) {
                    score += gained;
                    scoreEl.textContent = score;
                }

                // 碰撞检测
                const px = player.x;
                const py = player.y;
                const pw = player.w;
                const ph = player.h;
                for (let i = 0; i < balls.length; i++) {
                    const b = balls[i];
                    if (circleRectCollision(b.x, b.y, b.radius, px, py, pw, ph)) {
                        gameOver = true;
                        break;
                    }
                }
            }

            // ─── 渲染 ─────────────────────────────────────────
            function draw() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, W, H);

                // 玩家
                ctx.fillStyle = '#fff';
                ctx.fillRect(player.x, player.y, player.w, player.h);

                // 小球
                ctx.fillStyle = '#ff3333';
                for (let i = 0; i < balls.length; i++) {
                    const b = balls[i];
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 游戏结束
                if (gameOver) {
                    ctx.fillStyle = '#ff3333';
                    ctx.font = '40px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('游戏结束', W / 2, H / 2 - 40);

                    ctx.font = '20px Arial';
                    ctx.fillText('最终得分: ' + score, W / 2, H / 2 + 10);
                    ctx.fillText('按空格重新开始', W / 2, H / 2 + 45);
                }
            }

            // ─── 主循环 ───────────────────────────────────────
            function loop(timestamp) {
                if (!gameRunning) return;

                if (lastTime === 0) {
                    lastTime = timestamp;
                }

                const delta = Math.min(timestamp - lastTime, 50); // 防止长时间切后台后跳跃
                lastTime = timestamp;

                update(delta);
                draw();

                animId = requestAnimationFrame(loop);
            }

            function startLoop() {
                if (animId !== null) return;
                lastTime = 0;
                spawnAccum = 0;
                gameRunning = true;
                animId = requestAnimationFrame(loop);
            }

            function stopLoop() {
                if (animId !== null) {
                    cancelAnimationFrame(animId);
                    animId = null;
                }
                gameRunning = false;
                lastTime = 0;
            }

            // ─── 重置 ─────────────────────────────────────────
            function resetGame() {
                stopLoop();

                player.x = PLAYER_START_X;
                player.y = PLAYER_START_Y;
                balls = [];
                score = 0;
                spawnAccum = 0;
                lastTime = 0;
                gameOver = false;

                scoreEl.textContent = '0';

                startLoop();
            }

            // ─── 可见性 ───────────────────────────────────────
            function onVisibilityChange() {
                if (document.hidden) {
                    if (gameRunning) {
                        stopLoop();
                    }
                } else {
                    if (!gameRunning && !gameOver) {
                        // 游戏进行中被暂停，恢复
                        startLoop();
                    } else if (gameOver) {
                        // 游戏结束状态，确保循环已停止
                        if (animId !== null) {
                            cancelAnimationFrame(animId);
                            animId = null;
                            gameRunning = false;
                        }
                        // 重新绘制一次显示结束画面
                        draw();
                    }
                }
            }

            document.addEventListener('visibilitychange', onVisibilityChange);

            // 页面卸载时清理
            window.addEventListener('beforeunload', function() {
                stopLoop();
                window.removeEventListener('keydown', onKeyDown);
                window.removeEventListener('keyup', onKeyUp);
            });

            // ─── 启动 ─────────────────────────────────────────
            startLoop();

        })();
    </script>
</body>
</html>
