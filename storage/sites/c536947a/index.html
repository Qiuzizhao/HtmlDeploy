<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>躲避球小游戏-高速版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            color: white;
        }
        #gameCanvas {
            border: 3px solid #ffffff;
            background: #000;
        }
        .score {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .tips {
            margin-top: 10px;
            font-size: 16px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="score">分数: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="tips">方向键控制移动 | 碰到小球游戏结束 | 空格重新开始</div>

    <script>
        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // 游戏核心参数
        const player = {
            x: canvas.width / 2 - 15,
            y: canvas.height - 50,
            width: 30,
            height: 30,
            speed: 6 // 玩家移速小幅提升
        };

        let balls = []; // 存储所有躲避球
        let keys = {}; // 键盘按键状态
        let score = 0;
        let gameOver = false;
        let spawnInterval;

        // 键盘监听
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (gameOver && e.key === ' ') resetGame();
        });
        document.addEventListener('keyup', (e) => keys[e.key] = false);

        // 生成高速小球
        function spawnBall() {
            if (gameOver) return;
            const ball = {
                x: Math.random() * (canvas.width - 20),
                y: -20,
                size: 12 + Math.random() * 12,
                speed: 5 + Math.random() * 4 // 下落速度大幅加快
            };
            balls.push(ball);
        }

        // 玩家移动控制
        function movePlayer() {
            if (gameOver) return;
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) player.x += player.speed;
            if (keys['ArrowUp'] && player.y > 0) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y < canvas.height - player.height) player.y += player.speed;
        }

        // 更新小球位置
        function updateBalls() {
            if (gameOver) return;
            for (let i = 0; i < balls.length; i++) {
                balls[i].y += balls[i].speed;
                if (balls[i].y > canvas.height) {
                    balls.splice(i, 1);
                    score++;
                    scoreElement.textContent = score;
                    i--;
                }
            }
        }

        // 碰撞检测
        function checkCollision() {
            for (const ball of balls) {
                if (
                    player.x < ball.x + ball.size &&
                    player.x + player.width > ball.x &&
                    player.y < ball.y + ball.size &&
                    player.y + player.height > ball.y
                ) {
                    gameOver = true;
                    clearInterval(spawnInterval);
                }
            }
        }

        // 绘制游戏元素
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#ff3333';
            for (const ball of balls) {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
                ctx.fill();
            }
            if (gameOver) {
                ctx.fillStyle = '#ff3333';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 30);
                ctx.font = '20px Arial';
                ctx.fillText('最终得分: ' + score, canvas.width / 2, canvas.height / 2 + 10);
                ctx.fillText('按空格重新开始', canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        // 游戏主循环
        function gameLoop() {
            movePlayer();
            updateBalls();
            checkCollision();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 重置游戏
        function resetGame() {
            player.x = canvas.width / 2 - 15;
            player.y = canvas.height - 50;
            balls = [];
            score = 0;
            scoreElement.textContent = score;
            gameOver = false;
            spawnInterval = setInterval(spawnBall, 450); // 生成间隔从800→450，刷球更快
        }

        // 启动游戏
        gameLoop();
        spawnInterval = setInterval(spawnBall, 450);
    </script>
</body>
</html>
