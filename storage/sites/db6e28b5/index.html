<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园模拟器 - 学校小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 100, 255, 0.15);
            padding: 25px;
            border: 3px solid #4a90e2;
        }

        .title {
            text-align: center;
            color: #d63384;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            background: #e3f2fd;
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: bold;
            color: #0d6efd;
        }

        .status-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .status-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid #4a90e2;
        }

        .status-card h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .status-card .value {
            font-size: 22px;
            font-weight: bold;
            color: #d63384;
        }

        .student-avatar {
            text-align: center;
            margin: 20px 0;
        }

        .student-avatar img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #ffc107;
            object-fit: cover;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .btn-class {
            background: #0d6efd;
            color: white;
        }

        .btn-rest {
            background: #198754;
            color: white;
        }

        .btn-study {
            background: #fd7e14;
            color: white;
        }

        .btn-sport {
            background: #6f42c1;
            color: white;
        }

        .event-box {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 15px;
            border-radius: 10px;
            min-height: 60px;
            margin-bottom: 15px;
            font-size: 15px;
            color: #664d03;
        }

        .game-over {
            text-align: center;
            font-size: 22px;
            color: #dc3545;
            font-weight: bold;
            padding: 20px;
            display: none;
        }

        .restart-btn {
            background: #d63384;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            margin-top: 15px;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1 class="title">🎒 校园模拟器</h1>

    <div class="info-bar">
        <div>⏰ 时间：<span id="time">8:00</span></div>
        <div>📌 状态：<span id="scene">早读时间</span></div>
    </div>

    <div class="student-avatar">
        <img src="https://picsum.photos/id/64/200/200" alt="学生头像">
    </div>

    <div class="status-panel">
        <div class="status-card">
            <h3>😊 心情</h3>
            <div class="value" id="mood">80</div>
        </div>
        <div class="status-card">
            <h3>💪 体力</h3>
            <div class="value" id="energy">90</div>
        </div>
        <div class="status-card">
            <h3>📚 成绩</h3>
            <div class="value" id="score">60</div>
        </div>
        <div class="status-card">
            <h3>⭐ 综合评价</h3>
            <div class="value" id="level">普通</div>
        </div>
    </div>

    <div class="event-box" id="event">欢迎来到校园模拟器！选择行动开始一天的校园生活～</div>

    <div class="action-buttons">
        <button class="btn btn-class" id="goClass">📖 上课听讲</button>
        <button class="btn btn-rest" id="goRest">☕ 休息放松</button>
        <button class="btn btn-study" id="goStudy">📝 自习刷题</button>
        <button class="btn btn-sport" id="goSport">🏃 运动锻炼</button>
    </div>

    <div class="game-over" id="gameOver">
        🎓 今天的校园生活结束啦！<br>
        最终成绩：<span id="finalScore">0</span><br>
        <button class="restart-btn" onclick="restartGame()">重新开始</button>
    </div>
</div>

<script>
    // 游戏数据
    let game = {
        time: 8,
        minute: 0,
        mood: 80,
        energy: 90,
        score: 60,
        scene: "早读",
        isClass: false,
        isOver: false
    };

    // DOM元素
    const timeEl = document.getElementById("time");
    const sceneEl = document.getElementById("scene");
    const moodEl = document.getElementById("mood");
    const energyEl = document.getElementById("energy");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const eventEl = document.getElementById("event");
    const gameOverEl = document.getElementById("gameOver");
    const finalScoreEl = document.getElementById("finalScore");

    // 格式化时间
    function formatTime() {
        let m = game.minute < 10 ? "0" + game.minute : game.minute;
        return game.time + ":" + m;
    }

    // 更新界面
    function updateUI() {
        timeEl.innerText = formatTime();
        sceneEl.innerText = game.scene;
        moodEl.innerText = game.mood;
        energyEl.innerText = game.energy;
        scoreEl.innerText = game.score;

        // 评价等级
        let level = "普通";
        if (game.score >= 90) level = "学霸";
        else if (game.score >= 80) level = "优秀";
        else if (game.score >= 70) level = "良好";
        else if (game.score < 60) level = "待进步";
        levelEl.innerText = level;
    }

    // 时间流逝
    function timeFlow() {
        if (game.isOver) return;

        game.minute += 10;
        if (game.minute >= 60) {
            game.minute = 0;
            game.time++;
        }

        // 切换上课/下课
        if (game.time >= 8 && game.time < 12) {
            game.scene = (game.time % 2 === 0) ? "上课中" : "下课休息";
            game.isClass = (game.time % 2 === 0);
        } else if (game.time === 12) {
            game.scene = "午休时间";
        } else if (game.time > 12 && game.time < 17) {
            game.scene = (game.time % 2 === 0) ? "上课中" : "下课休息";
            game.isClass = (game.time % 2 === 0);
        } else {
            endGame();
            return;
        }

        // 自然消耗体力
        if (!game.isClass) game.energy = Math.min(100, game.energy + 5);
        else game.energy = Math.max(0, game.energy - 3);

        // 心情波动
        if (game.energy < 30) {
            game.mood = Math.max(0, game.mood - 5);
            showEvent("😫 太累了，心情有点差！");
        }

        updateUI();
    }

    // 显示事件
    function showEvent(text) {
        eventEl.innerText = text;
    }

    // 行动：上课
    document.getElementById("goClass").onclick = function() {
        if (game.isOver) return;
        if (!game.isClass) {
            showEvent("🔔 现在是下课时间，不能上课哦！");
            return;
        }
        game.score = Math.min(100, game.score + 8);
        game.energy = Math.max(0, game.energy - 10);
        game.mood = Math.max(0, game.mood - 3);
        showEvent("📖 认真上课，成绩提升了！");
        timeFlow();
    };

    // 行动：休息
    document.getElementById("goRest").onclick = function() {
        if (game.isOver) return;
        game.energy = Math.min(100, game.energy + 20);
        game.mood = Math.min(100, game.mood + 10);
        showEvent("☕ 休息了一会，体力和心情都恢复啦！");
        timeFlow();
    };

    // 行动：自习
    document.getElementById("goStudy").onclick = function() {
        if (game.isOver) return;
        game.score = Math.min(100, game.score + 12);
        game.energy = Math.max(0, game.energy - 15);
        game.mood = Math.max(0, game.mood - 8);
        showEvent("📝 疯狂刷题，成绩大涨！但有点累...");
        timeFlow();
    };

    // 行动：运动
    document.getElementById("goSport").onclick = function() {
        if (game.isOver) return;
        game.energy = Math.min(100, game.energy + 10);
        game.mood = Math.min(100, game.mood + 15);
        game.score = Math.max(0, game.score - 3);
        showEvent("🏃 运动超开心！但学习时间减少了...");
        timeFlow();
    };

    // 游戏结束
    function endGame() {
        game.isOver = true;
        finalScoreEl.innerText = game.score;
        gameOverEl.style.display = "block";
        showEvent("🎒 放学啦！今天的校园生活结束。");
    }

    // 重新开始
    function restartGame() {
        game = {
            time: 8,
            minute: 0,
            mood: 80,
            energy: 90,
            score: 60,
            scene: "早读",
            isClass: false,
            isOver: false
        };
        gameOverEl.style.display = "none";
        showEvent("🎒 新的一天开始啦！好好努力吧～");
        updateUI();
    }

    // 初始化
    updateUI();
</script>
</body>
</html>
