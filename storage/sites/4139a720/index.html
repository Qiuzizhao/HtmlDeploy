<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双人合作闯关｜6关完整版</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(#16213e,#0f3460);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;color:#fff;font-family:system-ui}
#gameCanvas{border:4px solid #60a5fa;border-radius:12px;box-shadow:0 0 30px #2563eb60}
.ctrl-bar{margin-top:12px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;justify-content:center}
button{padding:8px 18px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
#levelInfo{color:#facc15;font-size:18px}
#msg{min-height:26px;color:#86efac;font-size:19px;margin-top:6px}
</style>
</head>
<body>
<h1 class="text-[26px] mb-2">双人协作闯关 · 6大关卡</h1>
<div id="levelInfo">当前关卡：第1关</div>
<canvas id="gameCanvas" width="880" height="520"></canvas>
<div id="msg"></div>
<div class="ctrl-bar mt-3">
    <button onclick="restartLevel()" class="bg-blue-500 text-white">本关重置</button>
    <button onclick="prevLevel()" class="bg-slate-500 text-white">上一关</button>
    <button onclick="nextLevel()" class="bg-emerald-500 text-white">下一关</button>
</div>
<div class="mt-2 text-sm text-gray-300">P1蓝：W A D | P2红：方向键 | 双人全部抵达终点通关</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const msgBox = document.getElementById('msg');
const levelText = document.getElementById('levelInfo');

// 物理常量
const GRAVITY = 0.62;
const MOVE_SPEED = 5.2;
const JUMP_FORCE = -14.5;

// 玩家数据
let players = [
    {x:40,y:400,w:38,h:50,vx:0,vy:0,onGround:false,color:'#3b82f6',hasKey:false},
    {x:90,y:400,w:38,h:50,vx:0,vy:0,onGround:false,color:'#ef4444',hasKey:false}
];

// ========== 6关完整地图数据 [平台、尖刺、弹簧、钥匙、终点、门] ==========
const levels = [
// 第1关 新手入门
{
    plat:[[0,470,880,50],[130,395,150,18],[320,330,170,18],[530,265,150,18],[700,200,110,18]],
    spike:[],
    spring:[],
    key:[],
    door:null,
    goal:{x:735,y:150,w:36,h:50}
},
// 第2关 加入尖刺陷阱
{
    plat:[[0,470,320,50],[380,420,130,18],[550,350,140,18],[720,280,150,18]],
    spike:[[320,452,60,18]],
    spring:[{x:420,y:402,w:32,h:18}],
    key:[],
    door:null,
    goal:{x:780,y:230,w:36,h:50}
},
//第3关 钥匙开门
{
    plat:[[0,470,420,50],[480,390,160,18],[680,310,180,18]],
    spike:[[260,452,55,18]],
    spring:[{x:330,y:452,w:32,h:18}],
    key:[{x:530,y:350,w:26,h:26}],
    door:{x:660,y:260,w:32,h:50},
    goal:{x:790,y:260,w:36,h:50}
},
//第4关 多层高空+多弹簧
{
    plat:[[0,470,220,50],[280,410,120,18],[450,340,130,18],[290,250,140,18],[480,180,160,18],[700,220,150,18]],
    spike:[[350,452,65,18],[560,322,50,18]],
    spring:[{x:310,y:392,w:32,h:18},{x:510,y:322,w:32,h:18}],
    key:[{x:320,y:210,w:26,h:26}],
    door:{x:675,y:170,w:32,h:50},
    goal:{x:795,y:170,w:36,h:50}
},
//第5关 分段断层超多陷阱
{
    plat:[[0,470,180,50],[240,420,110,18],[400,350,120,18],[560,280,130,18],[380,200,150,18],[620,140,220,18]],
    spike:[[190,452,45,18],[350,332,48,18],[520,262,45,18]],
    spring:[{x:270,y:402,w:32,h:18},{x:435,y:332,w:32,h:18}],
    key:[{x:420,y:160,w:26,h:26}],
    door:{x:595,y:90,w:32,h:50},
    goal:{x:798,y:90,w:36,h:50}
},
//第6关 最终高难综合关
{
    plat:[[0,470,140,50],[200,430,90,18],[330,370,110,18],[470,310,100,18],[320,230,120,18],[490,160,130,18],[660,210,200,18]],
    spike:[[150,452,42,18],[295,352,45,18],[425,292,42,18],[560,142,45,18]],
    spring:[{x:230,y:412,w:32,h:18},{x:365,y:352,w:32,h:18}],
    key:[{x:355,y:190,w:26,h:26}],
    door:{x:632,y:160,w:32,h:50},
    goal:{x:802,y:160,w:36,h:50}
}
];

let curLv = 0;
let map = JSON.parse(JSON.stringify(levels[curLv]));
let keyGet = false; //本关是否拾取钥匙
const keys = {};

document.addEventListener('keydown',e=>keys[e.code]=true);
document.addEventListener('keyup',e=>keys[e.code]=false);

// 碰撞工具
function isCollide(a,b){
    return a.x < b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// 重置当前关卡
function resetLevel(){
    players = [
        {x:40,y:400,w:38,h:50,vx:0,vy:0,onGround:false,color:'#3b82f6',hasKey:false},
        {x:90,y:400,w:38,h:50,vx:0,vy:0,onGround:false,color:'#ef4444',hasKey:false}
    ];
    map = JSON.parse(JSON.stringify(levels[curLv]));
    keyGet = false;
    msgBox.textContent = "";
}
function nextLevel(){
    if(curLv < levels.length-1){curLv++;resetLevel();updateLevelUI()}
    else msgBox.textContent="已是最后一关！";
}
function prevLevel(){
    if(curLv>0){curLv--;resetLevel();updateLevelUI()}
}
function updateLevelUI(){levelText.innerText = `当前关卡：第${curLv+1}关`;}

// 游戏更新
function update(){
    msgBox.textContent = "";
    const p1=players[0],p2=players[1];
    // P1控制
    p1.vx=0;
    if(keys['KeyA'])p1.vx=-MOVE_SPEED;
    if(keys['KeyD'])p1.vx=MOVE_SPEED;
    if(keys['KeyW']&&p1.onGround)p1.vy=JUMP_FORCE;
    // P2控制
    p2.vx=0;
    if(keys['ArrowLeft'])p2.vx=-MOVE_SPEED;
    if(keys['ArrowRight'])p2.vx=MOVE_SPEED;
    if(keys['ArrowUp']&&p2.onGround)p2.vy=JUMP_FORCE;

    for(let p of players){
        p.vy += GRAVITY;
        p.x += p.vx;
        p.y += p.vy;
        p.onGround = false;

        // 平台碰撞落地
        for(let pt of map.plat){
            let [px,py,pw,ph]=pt;
            if(p.x+p.w>px&&p.x<px+pw){
                if(p.y+p.h>=py && p.y+p.h <= py+ph+10 && p.vy>0){
                    p.y = py-p.h;
                    p.vy=0;
                    p.onGround=true;
                }
            }
        }
        // 边界
        if(p.x<0)p.x=0;
        if(p.x+p.w>canvas.width)p.x=canvas.width-p.w;
        // 掉落重置
        if(p.y>canvas.height){resetLevel();msgBox.textContent="掉落啦，关卡重置！"}
    }

    // 尖刺判定：踩刺回起点
    for(let sp of map.spike){
        let s={x:sp[0],y:sp[1],w:sp[2],h:sp[3]};
        for(let p of players){
            if(isCollide(p,s)){resetLevel();msgBox.textContent="碰到尖刺，重新开始！"}
        }
    }

    // 弹簧弹跳
    for(let sp of map.spring){
        for(let p of players){
            if(isCollide(p,sp)&&p.vy>0){p.vy = JUMP_FORCE*1.7;}
        }
    }

    // 拾取钥匙
    if(map.key.length>0 && !keyGet){
        let k = {x:map.key[0][0],y:map.key[0][1],w:map.key[0][2],h:map.key[0][3]};
        for(let p of players){
            if(isCollide(p,k)){
                keyGet=true;
                map.key=[];
                players[0].hasKey=true;
                players[1].hasKey=true;
                msgBox.textContent="✅拿到钥匙，大门开启！";
                map.door=null;
            }
        }
    }

    // 通关判定：两人到达终点
    let g = map.goal;
    let win1=isCollide(p1,g),win2=isCollide(p2,g);
    if(win1&&win2){
        msgBox.textContent="🎉双人全部通关！点下一关继续！";
    }
}

// 精美绘制
function render(){
    // 渐变天空背景
    let grad = ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,'#192a56');
    grad.addColorStop(1,'#273c75');
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // 绘制平台
    ctx.fillStyle='#22c55e';
    for(let p of map.plat){
        let [x,y,w,h]=p;
        ctx.fillRect(x,y,w,h);
        ctx.fillStyle='#15803d';
        ctx.fillRect(x,y,w,4);
        ctx.fillStyle='#22c55e';
    }
    //尖刺红色
    ctx.fillStyle='#ef4444';
    for(let s of map.spike){
        let [x,y,w,h]=s;
        ctx.beginPath();
        ctx.moveTo(x,y+h);
        ctx.lineTo(x+w/2,y);
        ctx.lineTo(x+w,y+h);
        ctx.closePath();
        ctx.fill();
    }
    //弹簧橙色
    ctx.fillStyle='#fb923c';
    for(let s of map.spring){
        ctx.fillRect(s.x,s.y,s.w,s.h);
        ctx.fillStyle='#fef3c7';
        ctx.fillRect(s.x+3,s.y+3,s.w-6,4);
        ctx.fillStyle='#fb923c';
    }
    //钥匙黄色
    if(map.key.length>0){
        let k=map.key[0];
        ctx.fillStyle='#facc15';
        ctx.beginPath();
        ctx.arc(k[0]+13,k[1]+13,12,0,Math.PI*2);
        ctx.fill();
    }
    //关门
    if(map.door){
        ctx.fillStyle='#78350f';
        ctx.fillRect(map.door.x,map.door.y,map.door.w,map.door.h);
    }
    //终点旗子
    let g=map.goal;
    ctx.fillStyle='#facc15';
    ctx.fillRect(g.x,g.y,g.w,g.h);
    ctx.fillStyle='#000';
    ctx.font="13px Arial";
    ctx.fillText("终点",g.x+3,g.y+24);

    //绘制玩家
    for(let p of players){
        ctx.fillStyle=p.color;
        ctx.fillRect(p.x,p.y,p.w,p.h);
        //眼睛细节美化
        ctx.fillStyle="#fff";
        ctx.fillRect(p.x+8,p.y+12,7,7);
        ctx.fillRect(p.x+22,p.y+12,7,7);
    }
}

function gameLoop(){
    update();render();
    requestAnimationFrame(gameLoop);
}
updateLevelUI();
gameLoop();
</script>
</body>
</html>
