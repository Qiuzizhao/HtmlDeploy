<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D自由沙盒建造</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            overflow: hidden;
            background: #87CEEB;
        }
        /* 顶部工具栏 */
        .toolbar {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }
        .tool-item {
            width: 42px;
            height: 42px;
            border: 3px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tool-item.active {
            border-color: #ffd700;
            transform: scale(1.1);
        }
        .clear-btn {
            padding: 0 18px;
            background: #f44336;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }
        .clear-btn:hover {
            background: #d32f2f;
        }
        /* 操作提示 */
        .tip {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            z-index: 100;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="tool-item active" id="grass" style="background:#66CC33;"></div>
        <div class="tool-item" id="stone" style="background:#888888;"></div>
        <div class="tool-item" id="wood" style="background:#CD853F;"></div>
        <div class="tool-item" id="sand" style="background:#F4D35E;"></div>
        <div class="tool-item" id="glass" style="background:rgba(173,216,230,0.7);"></div>
        <div class="tool-item" id="erase" style="background:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;">❌</div>
        <button class="clear-btn">清空世界</button>
    </div>

    <div class="tip">
        左键：放置/删除方块 | 左键拖拽：旋转视角 | 右键拖拽：平移 | 滚轮：缩放
    </div>

    <div id="container"></div>

    <!-- 引入Three.js与轨道控制器 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 全局配置
        const BLOCK_SIZE = 2;
        let currentType = 'grass';
        const blockList = [];
        const toolArr = ['grass','stone','wood','sand','glass','erase'];

        // 1. 初始化场景、相机、渲染器
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(15, 15, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        // 2. 轨道控制器（视角控制）
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 3. 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // 4. 方块材质配置
        const matMap = {
            grass: new THREE.MeshLambertMaterial({ color: 0x66CC33 }),
            stone: new THREE.MeshLambertMaterial({ color: 0x888888 }),
            wood: new THREE.MeshLambertMaterial({ color: 0xCD853F }),
            sand: new THREE.MeshLambertMaterial({ color: 0xF4D35E }),
            glass: new THREE.MeshPhongMaterial({ 
                color: 0xADD8E6, 
                transparent: true, 
                opacity: 0.7 
            })
        };
        const geometry = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);

        // 5. 射线检测（拾取方块）
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDown = false;

        // 坐标网格对齐
        function snapPos(val) {
            return Math.round(val / BLOCK_SIZE) * BLOCK_SIZE;
        }

        // 创建3D方块
        function createBlock(x, y, z, type) {
            const mat = matMap[type];
            const mesh = new THREE.Mesh(geometry, mat.clone());
            mesh.position.set(snapPos(x), snapPos(y), snapPos(z));
            mesh.userData.type = type;
            scene.add(mesh);
            blockList.push(mesh);
        }

        // 删除方块
        function removeBlock(mesh) {
            scene.remove(mesh);
            blockList.splice(blockList.indexOf(mesh), 1);
        }

        // 鼠标移动更新坐标
        function setMousePos(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        // 放置/删除逻辑
        function handleClick(e) {
            setMousePos(e);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(blockList);

            if (currentType === 'erase') {
                // 删除模式
                if (intersects.length > 0) {
                    removeBlock(intersects[0].object);
                }
            } else {
                // 放置模式
                if (intersects.length > 0) {
                    const hit = intersects[0];
                    const pos = hit.point.clone().add(hit.face.normal.clone().multiplyScalar(BLOCK_SIZE/2));
                    createBlock(pos.x, pos.y, pos.z, currentType);
                } else {
                    // 空地默认地面生成
                    createBlock(0, 0, 0, currentType);
                }
            }
        }

        // 事件监听
        renderer.domElement.addEventListener('mousedown', e => {
            isDown = true;
            handleClick(e);
        });
        renderer.domElement.addEventListener('mousemove', e => {
            if(isDown) handleClick(e);
        });
        renderer.domElement.addEventListener('mouseup', () => isDown = false);

        // 工具栏切换
        const tools = document.querySelectorAll('.tool-item');
        tools.forEach(tool => {
            tool.addEventListener('click', () => {
                tools.forEach(t => t.classList.remove('active'));
                tool.classList.add('active');
                currentType = tool.id;
            });
        });

        // 清空世界
        document.querySelector('.clear-btn').addEventListener('click', () => {
            if(confirm('确定清空所有3D方块？')){
                blockList.forEach(mesh => scene.remove(mesh));
                blockList.length = 0;
            }
        });

        // 窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 渲染循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
