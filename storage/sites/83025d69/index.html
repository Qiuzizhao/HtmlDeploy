<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>躺平发育</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .game-title {
            font-size: 28px;
            margin-bottom: 15px;
            color: #ff3333;
            text-shadow: 0 0 5px black;
        }

        .game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .game-map {
            width: 800px;
            height: 500px;
            background: #222;
            border: 3px solid #555;
            position: relative;
            overflow: hidden;
        }

        /* 房间样式 */
        .room {
            width: 160px;
            height: 120px;
            background: #333;
            border: 2px solid #666;
            position: absolute;
            cursor: pointer;
        }

        .room1 { top: 50px; left: 50px; }
        .room2 { top: 50px; left: 250px; }
        .room3 { top: 50px; left: 450px; }
        .room4 { top: 50px; left: 650px; }
        .room5 { top: 250px; left: 50px; }
        .room6 { top: 250px; left: 250px; }

        /* 门 */
        .door {
            width: 40px;
            height: 100px;
            background: #8B4513;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            line-height: 100px;
            font-weight: bold;
        }

        /* 床 */
        .bed {
            width: 50px;
            height: 50px;
            background: #FFE4B5;
            border-radius: 5px;
            position: absolute;
            top: 20px;
            left: 20px;
            cursor: pointer;
        }

        /* 炮塔 */
        .turret {
            width: 35px;
            height: 35px;
            background: #4169E1;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
        }

        /* 怪物 */
        .monster {
            width: 50px;
            height: 50px;
            background: #FF4500;
            border-radius: 50%;
            position: absolute;
            transition: all 0.3s;
        }

        /* 建造面板 */
        .build-panel {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .build-btn {
            padding: 8px 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .build-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        /* 游戏结束 */
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border: 3px solid red;
            border-radius: 10px;
            text-align: center;
            font-size: 30px;
            z-index: 999;
        }

        .restart-btn {
            margin-top: 20px;
            padding: 10px 25px;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="game-title">躺平发育</div>
    <div class="game-info">
        <div>金币：<span id="gold">50</span></div>
        <div>血量：<span id="hp">100</span></div>
        <div>等级：<span id="level">1</span></div>
    </div>

    <div class="game-map" id="map">
        <!-- 房间会自动生成 -->
    </div>

    <div class="build-panel">
        <button class="build-btn" id="buildTurret">建造炮塔（50金币）</button>
        <button class="build-btn" id="upgradeDoor">升级大门（100金币）</button>
        <button class="build-btn" id="upgradeBed">升级床（80金币）</button>
    </div>

    <script>
        // 游戏数据
        const game = {
            gold: 50,
            hp: 100,
            level: 1,
            inRoom: false,
            currentRoom: null,
            doorLevel: 1,
            bedLevel: 1,
            turretCount: 0,
            monster: null,
            gameOver: false
        };

        // DOM元素
        const goldEl = document.getElementById('gold');
        const hpEl = document.getElementById('hp');
        const levelEl = document.getElementById('level');
        const mapEl = document.getElementById('map');
        const buildTurretBtn = document.getElementById('buildTurret');
        const upgradeDoorBtn = document.getElementById('upgradeDoor');
        const upgradeBedBtn = document.getElementById('upgradeBed');

        // 初始化房间
        function initRooms() {
            const rooms = [
                {class: 'room1', x: 50, y: 50},
                {class: 'room2', x: 250, y: 50},
                {class: 'room3', x: 450, y: 50},
                {class: 'room4', x: 650, y: 50},
                {class: 'room5', x: 50, y: 250},
                {class: 'room6', x: 250, y: 250}
            ];

            rooms.forEach(roomData => {
                const room = document.createElement('div');
                room.className = `room ${roomData.class}`;
                
                // 点击上床
                room.onclick = () => enterRoom(room);
                
                // 门
                const door = document.createElement('div');
                door.className = 'door';
                door.innerText = '门1级';
                room.appendChild(door);
                
                // 床
                const bed = document.createElement('div');
                bed.className = 'bed';
                bed.innerText = '床';
                room.appendChild(bed);
                
                mapEl.appendChild(room);
            });
        }

        // 进入房间
        function enterRoom(room) {
            if (game.inRoom) return;
            
            game.inRoom = true;
            game.currentRoom = room;
            startGoldGrowth();
            spawnMonster();
        }

        // 自动产金币
        function startGoldGrowth() {
            setInterval(() => {
                if (game.gameOver) return;
                
                // 床等级越高产钱越快
                game.gold += game.bedLevel;
                updateUI();
            }, 1000);
        }

        // 建造炮塔
        buildTurretBtn.onclick = () => {
            if (!game.inRoom || game.gold < 50 || game.turretCount >= 3 || game.gameOver) return;
            
            game.gold -= 50;
            game.turretCount++;
            
            const turret = document.createElement('div');
            turret.className = 'turret';
            turret.style.left = 80 + game.turretCount * 40 + 'px';
            turret.style.top = '30px';
            turret.innerText = '炮';
            game.currentRoom.appendChild(turret);
            
            updateUI();
            startTurretAttack();
        };

        // 升级大门
        upgradeDoorBtn.onclick = () => {
            if (!game.inRoom || game.gold < 100 || game.doorLevel >= 5 || game.gameOver) return;
            
            game.gold -= 100;
            game.doorLevel++;
            const door = game.currentRoom.querySelector('.door');
            door.innerText = `门${game.doorLevel}级`;
            door.style.background = ['#8B4513', '#A0522D', '#CD853F', '#D2691E', '#FFDEAD'][game.doorLevel-1];
            
            updateUI();
        };

        // 升级床
        upgradeBedBtn.onclick = () => {
            if (!game.inRoom || game.gold < 80 || game.bedLevel >= 5 || game.gameOver) return;
            
            game.gold -= 80;
            game.bedLevel++;
            const bed = game.currentRoom.querySelector('.bed');
            bed.style.background = ['#FFE4B5', '#FFD700', '#FFA500', '#FF8C00', '#FF4500'][game.bedLevel-1];
            
            updateUI();
        };

        // 生成怪物
        function spawnMonster() {
            const monster = document.createElement('div');
            monster.className = 'monster';
            monster.innerText = '鬼';
            monster.style.left = '370px';
            monster.style.top = '200px';
            mapEl.appendChild(monster);
            game.monster = monster;
            
            // 自动攻击门
            setInterval(() => {
                if (game.gameOver) return;
                attackDoor();
            }, 1500);
        }

        // 怪物攻击门
        function attackDoor() {
            if (!game.inRoom) return;
            
            // 门等级越高越耐打
            const damage = Math.max(1, game.level - game.doorLevel + 1);
            game.hp = Math.max(0, game.hp - damage);
            
            if (game.hp <= 0) {
                gameOver(false);
            }
            
            updateUI();
        }

        // 炮塔攻击
        function startTurretAttack() {
            setInterval(() => {
                if (game.gameOver || !game.monster) return;
                
                // 炮塔越多伤害越高
                game.level += game.turretCount * 0.1;
                levelEl.innerText = Math.floor(game.level);
                
                // 怪物被击败
                if (Math.floor(game.level) >= 10) {
                    gameOver(true);
                }
            }, 1000);
        }

        // 更新界面
        function updateUI() {
            goldEl.innerText = game.gold;
            hpEl.innerText = game.hp;
        }

        // 游戏结束
        function gameOver(isWin) {
            game.gameOver = true;
            
            const over = document.createElement('div');
            over.className = 'game-over';
            over.innerHTML = isWin ? 
                '<span style="color:green">胜利！你成功抵御了怪物！</span>' : 
                '<span style="color:red">失败！门被攻破了！</span>';
            
            const restart = document.createElement('button');
            restart.className = 'restart-btn';
            restart.innerText = '重新开始';
            restart.onclick = () => location.reload();
            over.appendChild(restart);
            
            document.body.appendChild(over);
        }

        // 启动游戏
        initRooms();
    </script>
</body>
</html>
