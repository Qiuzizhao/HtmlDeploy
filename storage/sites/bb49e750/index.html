<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>甜甜的恋爱模拟器</title>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:微软雅黑, sans-serif;
  }
  body{
    background:#ffeff6;
    display:flex;
    justify-content:center;
    padding-top:30px;
  }
  .game{
    width:380px;
    background:white;
    border-radius:20px;
    box-shadow:0 0 20px #ffc0d5;
    overflow:hidden;
  }
  .header{
    background:#ff7ba7;
    color:white;
    padding:15px;
    text-align:center;
    font-size:19px;
    font-weight:bold;
  }
  .avatar{
    width:100px;
    height:100px;
    background:#ffc0dc;
    border-radius:50%;
    margin:20px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
  }
  .dialog{
    padding:0 25px 20px;
    text-align:center;
    font-size:16px;
    color:#555;
    min-height:70px;
  }
  .choices{
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .btn{
    padding:12px;
    border:none;
    border-radius:12px;
    background:#ff7ba7;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.2s;
  }
  .btn:hover{
    background:#ff5b92;
  }
  .heart{
    text-align:center;
    font-size:18px;
    color:#ff5b92;
    margin-bottom:10px;
  }
</style>
</head>
<body>

<div class="game">
  <div class="header">甜甜的恋爱模拟器</div>
  <div class="avatar">💖</div>
  <div class="heart">好感度：<span id="love">0</span></div>
  <div class="dialog" id="text">你今天看起来心情不错～</div>
  <div class="choices">
    <button class="btn" onclick="say(1)">主动打招呼</button>
    <button class="btn" onclick="say(2)">温柔笑一笑</button>
    <button class="btn" onclick="say(3)">害羞低下头</button>
  </div>
</div>

<script>
  let love = 0;
  let step = 0;

  function txt(s){
    document.getElementById("text").innerHTML = s;
  }

  function up(){
    love += 10;
    document.getElementById("love").innerHTML = love;
  }

  function say(n){
    if(step == 0){
      if(n==1){
        txt("你：嗨～你好呀！\nTA：哇，你好热情！");
      }else if(n==2){
        txt("你对TA温柔一笑。\nTA：你笑起来好甜……");
      }else{
        txt("你害羞低下头。\nTA：你好可爱呀！");
      }
      up();
      step = 1;
    }
    else if(step == 1){
      txt("TA：今天天气真好，要不要一起走走？");
      step = 2;
    }
    else if(step == 2){
      if(n==1){
        txt("你：好呀好呀！我们走吧～");
      }else if(n==2){
        txt("你：嗯……我想和你一起。");
      }else{
        txt("你轻轻点头，脸红红的。");
      }
      up();
      step = 3;
    }
    else if(step == 3){
      txt("TA：其实……我一直很喜欢你。");
      step = 4;
    }
    else if(step == 4){
      if(n==1){
        txt("你：我……我也喜欢你！");
      }else if(n==2){
        txt("你：真的吗？我超开心！");
      }else{
        txt("你：嗯……我愿意！");
      }
      up();
      step = 5;
    }
    else if(step == 5){
      txt("💖 你们正式在一起啦！恋爱达成！");
      step = 99;
    }
  }
</script>
</body>
</html>
