<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凶宅多层追逐 - 恐怖逃生</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: "Microsoft Yahei", sans-serif;
        }
        /* 游戏主容器 */
        #gameBox {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #1a1a1a;
            overflow: hidden;
        }
        /* 手电筒黑暗遮罩 */
        .light-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9;
            background: radial-gradient(circle at var(--light-x) var(--light-y), transparent 80px, rgba(0,0,0,0.92) 220px);
        }
        /* 玩家角色 */
        #player {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #4285f4;
            border-radius: 4px;
            z-index: 3;
        }
        /* 追逐女鬼 */
        #ghost {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #8b0000;
            border-radius: 50%;
            z-index: 2;
            box-shadow: 0 0 20px #ff0000;
            transition: opacity 0.3s;
        }
        /* 钥匙道具 */
        .key {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ffd700;
            border-radius: 50%;
            z-index: 2;
            animation: shine 1.5s infinite alternate;
        }
        @keyframes shine {
            from {box-shadow: 0 0 8px #ffd700;}
            to {box-shadow: 0 0 18px #ffd700;}
        }
        /* 逃生大门 */
        #door {
            position: absolute;
            width: 60px;
            height: 80px;
            background: #5c3a21;
            right: 50px;
            top: 50%;
            transform: translateY(-50%);
            border: 3px solid #332010;
            z-index: 2;
        }
        /* 楼梯 楼层切换点 */
        .stairs {
            position: absolute;
            width: 50px;
            height: 70px;
            background: #444;
            border: 2px dashed #888;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
        }
        /* 躲避掩体（柜子/角落） */
        .hide-spot {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #333;
            border: 2px solid #666;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 12px;
        }
        /* UI面板 */
        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 18px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 6px;
            z-index: 100;
        }
        .tip {
            position: fixed;
            top: 70px;
            left: 20px;
            color: #ff9900;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 6px 10px;
            border-radius: 4px;
            z-index: 100;
        }
        /* 弹窗界面 */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            color: #fff;
        }
        .popup h2 {
            font-size: 42px;
            margin-bottom: 20px;
            color: #ff4444;
        }
        .popup p {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        .btn {
            padding: 12px 36px;
            font-size: 20px;
            background: #990000;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn:hover {
            background: #bb0000;
        }
        .hide {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 开始界面 -->
    <div class="popup" id="startPop">
        <h2>凶宅多层追逐</h2>
        <p>WASD/方向键 移动角色<br>
        共3层楼层，通过楼梯上下楼<br>
        躲进【掩体】可暂时避开女鬼追击<br>
        收集全部钥匙，前往1楼大门逃生！</p>
        <button class="btn" onclick="startGame()">开始游戏</button>
    </div>

    <!-- 失败界面 -->
    <div class="popup hide" id="losePop">
        <h2>你被抓住了...</h2>
        <p>黑暗吞噬了你，游戏结束</p>
        <button class="btn" onclick="restartGame()">重新开始</button>
    </div>

    <!-- 胜利界面 -->
    <div class="popup hide" id="winPop">
        <h2>成功逃离！</h2>
        <p>你逃出了这座多层凶宅</p>
        <button class="btn" onclick="restartGame()">再来一局</button>
    </div>

    <!-- 游戏主体 -->
    <div id="gameBox">
        <div class="ui">
            楼层：<span id="floorText">1</span> |
            钥匙：<span id="keyNum">0</span> / 3
        </div>
        <div class="tip">靠近楼梯切换楼层 | 躲入掩体隐身避险</div>

        <div id="player"></div>
        <div id="ghost"></div>
        <div id="door"></div>
        <div class="light-mask"></div>
    </div>

    <script>
        // 元素获取
        const gameBox = document.getElementById('gameBox');
        const player = document.getElementById('player');
        const ghost = document.getElementById('ghost');
        const door = document.getElementById('door');
        const lightMask = document.querySelector('.light-mask');
        const keyNumText = document.getElementById('keyNum');
        const floorText = document.getElementById('floorText');
        const startPop = document.getElementById('startPop');
        const losePop = document.getElementById('losePop');
        const winPop = document.getElementById('winPop');

        // 游戏全局配置
        const config = {
            playerSpeed: 4,
            ghostSpeed: 2.2,
            totalKey: 3,
            maxFloor: 3,        // 总楼层数
            currentFloor: 1,     // 当前楼层
            gameRun: false,
            isHide: false        // 是否处于躲避状态
        };

        // 坐标变量
        let playerX = 80;
        let playerY = window.innerHeight / 2;
        let ghostX = window.innerWidth / 2;
        let ghostY = 100;
        let collectKey = 0;
        let keyMap = {};

        // 楼层数据：每层 钥匙、楼梯、掩体 位置
        const floorData = {
            1: {
                keys: [{x: 200, y: 150}],
                stairsUp: {x: 150, y: window.innerHeight - 120},
                stairsDown: null,
                hides: [{x: 400, y: 300}, {x: 600, y: 200}]
            },
            2: {
                keys: [{x: 300, y: 220}],
                stairsUp: {x: 700, y: 100},
                stairsDown: {x: 150, y: window.innerHeight - 120},
                hides: [{x: 250, y: 400}, {x: 550, y: 350}]
            },
            3: {
                keys: [{x: 450, y: 280}],
                stairsUp: null,
                stairsDown: {x: 700, y: 100},
                hides: [{x: 200, y: 200}, {x: 650, y: 420}]
            }
        };

        // 键盘监听
        document.addEventListener('keydown', e => keyMap[e.key] = true);
        document.addEventListener('keyup', e => keyMap[e.key] = false);

        // 清空场景元素
        function clearScene() {
            document.querySelectorAll('.key,.stairs,.hide-spot').forEach(el => el.remove());
        }

        // 加载当前楼层场景
        function loadFloor(floor) {
            clearScene();
            config.currentFloor = floor;
            floorText.innerText = floor;
            const data = floorData[floor];

            // 生成钥匙
            data.keys.forEach(pos => {
                const key = document.createElement('div');
                key.className = 'key';
                key.style.left = pos.x + 'px';
                key.style.top = pos.y + 'px';
                gameBox.appendChild(key);
            });

            // 生成上楼楼梯
            if(data.stairsUp) {
                const stair = document.createElement('div');
                stair.className = 'stairs';
                stair.innerText = "上楼";
                stair.style.left = data.stairsUp.x + 'px';
                stair.style.top = data.stairsUp.y + 'px';
                gameBox.appendChild(stair);
            }
            // 生成下楼楼梯
            if(data.stairsDown) {
                const stair = document.createElement('div');
                stair.className = 'stairs';
                stair.innerText = "下楼";
                stair.style.left = data.stairsDown.x + 'px';
                stair.style.top = data.stairsDown.y + 'px';
                gameBox.appendChild(stair);
            }

            // 生成躲避掩体
            data.hides.forEach(pos => {
                const hide = document.createElement('div');
                hide.className = 'hide-spot';
                hide.innerText = "掩体";
                hide.style.left = pos.x + 'px';
                hide.style.top = pos.y + 'px';
                gameBox.appendChild(hide);
            });

            // 1楼显示大门，其他楼层隐藏
            door.style.display = floor === 1 ? 'block' : 'none';
        }

        // 初始化游戏位置与场景
        function initPos() {
            playerX = 80;
            playerY = window.innerHeight / 2;
            ghostX = window.innerWidth / 2;
            ghostY = 100;
            collectKey = 0;
            config.currentFloor = 1;
            config.isHide = false;
            keyNumText.innerText = collectKey;
            ghost.style.opacity = 1;

            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';
            ghost.style.left = ghostX + 'px';
            ghost.style.top = ghostY + 'px';

            loadFloor(1);
        }

        // 开始游戏
        function startGame() {
            startPop.classList.add('hide');
            config.gameRun = true;
            initPos();
            gameLoop();
        }

        // 重新开始
        function restartGame() {
            losePop.classList.add('hide');
            winPop.classList.add('hide');
            config.gameRun = true;
            initPos();
            gameLoop();
        }

        // 玩家移动
        function movePlayer() {
            const speed = config.playerSpeed;
            if(keyMap['w'] || keyMap['ArrowUp']) playerY -= speed;
            if(keyMap['s'] || keyMap['ArrowDown']) playerY += speed;
            if(keyMap['a'] || keyMap['ArrowLeft']) playerX -= speed;
            if(keyMap['d'] || keyMap['ArrowRight']) playerX += speed;

            // 边界限制
            playerX = Math.max(0, Math.min(playerX, window.innerWidth - 40));
            playerY = Math.max(0, Math.min(playerY, window.innerHeight - 40));

            // 更新手电筒
            lightMask.style.setProperty('--light-x', (playerX + 20) + 'px');
            lightMask.style.setProperty('--light-y', (playerY + 20) + 'px');

            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';
        }

        // 怪物追逐逻辑 + 掩体躲避判定
        function ghostChase() {
            const speed = config.ghostSpeed;
            const pRect = player.getBoundingClientRect();
            let inHide = false;

            // 判断玩家是否在掩体中
            document.querySelectorAll('.hide-spot').forEach(hide => {
                const hRect = hide.getBoundingClientRect();
                if(isOverlap(pRect, hRect)) inHide = true;
            });
            config.isHide = inHide;

            // 在掩体里：怪物停止追击、半透明
            if(inHide) {
                ghost.style.opacity = 0.3;
                return;
            } else {
                ghost.style.opacity = 1;
            }

            // 正常追击
            if(ghostX < playerX) ghostX += speed;
            else if(ghostX > playerX) ghostX -= speed;
            if(ghostY < playerY) ghostY += speed;
            else if(ghostY > playerY) ghostY -= speed;

            ghost.style.left = ghostX + 'px';
            ghost.style.top = ghostY + 'px';
        }

        // 碰撞检测：钥匙、楼梯、掩体、怪物、大门
        function checkCollision() {
            const pRect = player.getBoundingClientRect();

            // 收集钥匙
            document.querySelectorAll('.key').forEach(key => {
                const kRect = key.getBoundingClientRect();
                if(isOverlap(pRect, kRect)) {
                    key.remove();
                    collectKey++;
                    keyNumText.innerText = collectKey;
                }
            });

            // 楼层切换（楼梯碰撞）
            document.querySelectorAll('.stairs').forEach(stair => {
                const sRect = stair.getBoundingClientRect();
                if(isOverlap(pRect, sRect)) {
                    const text = stair.innerText;
                    if(text === "上楼" && config.currentFloor < config.maxFloor) {
                        loadFloor(config.currentFloor + 1);
                        playerX = 80;
                    }
                    if(text === "下楼" && config.currentFloor > 1) {
                        loadFloor(config.currentFloor - 1);
                        playerX = 80;
                    }
                }
            });

            // 被怪物抓到
            const gRect = ghost.getBoundingClientRect();
            if(!config.isHide && isOverlap(pRect, gRect)) {
                gameLose();
            }

            // 通关（1楼大门+集齐钥匙）
            if(config.currentFloor === 1 && collectKey >= config.totalKey) {
                const dRect = door.getBoundingClientRect();
                if(isOverlap(pRect, dRect)) {
                    gameWin();
                }
            }
        }

        // 矩形碰撞判断
        function isOverlap(a, b) {
            return !(
                a.right < b.left ||
                a.left > b.right ||
                a.bottom < b.top ||
                a.top > b.bottom
            );
        }

        // 游戏失败
        function gameLose() {
            config.gameRun = false;
            losePop.classList.remove('hide');
        }

        // 游戏胜利
        function gameWin() {
            config.gameRun = false;
            winPop.classList.remove('hide');
        }

        // 主循环
        function gameLoop() {
            if(!config.gameRun) return;
            movePlayer();
            ghostChase();
            checkCollision();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
