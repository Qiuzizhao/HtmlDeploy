<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>合成大西瓜</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{background:#f8e9c8;display:flex;flex-direction:column;align-items:center;padding:10px}
        #gameBox{
            width:400px;height:600px;background:#fff8e0;border:3px solid #e2b872;
            position:relative;overflow:hidden;border-radius:8px
        }
        .fruit{
            border-radius:50%;position:absolute;cursor:default;
            display:flex;align-items:center;justify-content:center;font-weight:bold
        }
        #tip{margin:8px 0;font-size:18px}
        #score{font-size:22px;color:#c83c3c;font-weight:bold}
    </style>
</head>
<body>
    <div id="tip">得分：<span id="score">0</span>｜点击屏幕投放水果，相同水果碰撞合成升级</div>
    <div id="gameBox" onclick="dropFruit(event)"></div>

    <script>
        // 水果配置：尺寸、分数、名称，从小到大
        const fruitList = [
            {size:30,score:1,name:'樱桃'},
            {size:40,score:2,name:'草莓'},
            {size:50,score:3,name:'葡萄'},
            {size:62,score:5,name:'橙子'},
            {size:75,score:8,name:'苹果'},
            {size:90,score:12,name:'菠萝'},
            {size:110,score:20,name:'哈密瓜'},
            {size:130,score:30,name:'西瓜'}
        ]
        let scoreNum = 0
        const game = document.getElementById('gameBox')
        let fruitArr = [] // 存放所有水果元素数据

        // 更新分数
        function updateScore(){
            document.getElementById('score').innerText = scoreNum
        }

        // 随机生成低级水果(前3种)
        function getRandomFruit(){
            let ran = Math.floor(Math.random()*3)
            return {...fruitList[ran]}
        }

        // 点击下落水果
        function dropFruit(e){
            let rect = game.getBoundingClientRect()
            let x = e.clientX - rect.left
            let fruitData = getRandomFruit()
            createFruitDom(x,fruitData)
        }

        // 创建DOM水果
        function createFruitDom(x,data){
            let div = document.createElement('div')
            div.className = 'fruit'
            div.style.width = data.size+'px'
            div.style.height = data.size+'px'
            div.style.left = (x-data.size/2)+'px'
            div.style.top = '0px'
            div.style.background = getColor(data.name)
            div.innerText = data.name
            game.appendChild(div)
            let fruitObj = {dom:div,x:x-data.size/2,y:0,info:data,speed:3}
            fruitArr.push(fruitObj)
            fallFruit(fruitObj)
        }

        // 水果配色
        function getColor(name){
            let map={
                '樱桃':'#ff4757','草莓':'#ff6b81','葡萄':'#6c5ce7','橙子':'#ffa502',
                '苹果':'#ee5a24','菠萝':'#fed330','哈密瓜':'#26de81','西瓜':'#20bf6b'
            }
            return map[name]
        }

        // 重力下落逻辑
        function fallFruit(fruit){
            function loop(){
                // 碰到底部停止
                let maxBottom = game.clientHeight - fruit.info.size
                // 碰撞其他水果检测
                let isStop = false
                for(let item of fruitArr){
                    if(item===fruit) continue
                    let disX = Math.abs(fruit.x - item.x)
                    let disY = Math.abs(fruit.y - item.y)
                    let r1 = fruit.info.size/2, r2 = item.info.size/2
                    // 两圆碰撞
                    if(disX<r1+r2 && disY<r1+r2){
                        // 落在上方停下
                        if(fruit.y+fruit.info.size >= item.y){
                            fruit.y = item.y - fruit.info.size
                            isStop = true
                            // 相同水果合成
                            if(fruit.info.name === item.info.name){
                                mergeFruit(fruit,item)
                            }
                            break
                        }
                    }
                }
                if(fruit.y >= maxBottom) isStop=true

                if(!isStop){
                    fruit.y += fruit.speed
                    fruit.dom.style.top = fruit.y+'px'
                    requestAnimationFrame(loop)
                }
            }
            loop()
        }

        // 合成水果
        function mergeFruit(f1,f2){
            // 移除两个旧水果
            f1.dom.remove()
            f2.dom.remove()
            // 数组剔除
            fruitArr = fruitArr.filter(v=>v!==f1&&v!==f2)
            let nowIdx = fruitList.findIndex(i=>i.name===f1.info.name)
            // 已经是西瓜无法合成
            if(nowIdx >= fruitList.length-1){
                scoreNum += f1.info.score + f2.info.score
                updateScore()
                return
            }
            // 生成高级水果
            let newFruit = {...fruitList[nowIdx+1]}
            scoreNum += newFruit.score
            updateScore()
            createFruitDom((f1.x+f2.x)/2,newFruit)
        }
    </script>
</body>
</html>
