<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心动攻略手册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .game-title {
            text-align: center;
            font-size: 32px;
            color: #ff5e8d;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .characters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .char-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .char-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        .char-card.selected {
            border-color: #ff5e8d;
        }

        .char-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            pointer-events: none;
        }

        .char-name {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .char-desc {
            text-align: center;
            font-size: 13px;
            color: #777;
            margin-bottom: 10px;
        }

        .game-area {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: none;
            margin-top: 30px;
        }

        .game-area.active {
            display: block;
        }

        .selected-char {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .char-info h2 {
            color: #ff5e8d;
            margin-bottom: 5px;
        }

        .favorability {
            margin: 20px 0;
        }

        .favor-title {
            font-size: 16px;
            color: #555;
            margin-bottom: 10px;
        }

        .favor-bar {
            width: 100%;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
        }

        .favor-progress {
            height: 100%;
            background: linear-gradient(90deg, #ff9a9e 0%, #ff5e8d 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .dialogue {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            min-height: 100px;
            margin: 20px 0;
            font-size: 15px;
            line-height: 1.6;
            color: #444;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: #ff5e8d;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            background: #ff3d74;
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-back {
            background: #888;
        }

        .btn-back:hover {
            background: #666;
        }

        @media (max-width: 600px) {
            .game-title {
                font-size: 26px;
            }
            .characters {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="game-title">💖 心动攻略手册</h1>
        <p class="subtitle">选择你的心动攻略对象，开启专属恋爱剧情</p>

        <div class="characters" id="charList">
            <div class="char-card" data-id="1" data-name="林屿" data-tag="温柔帅气竹马邻家哥哥" data-type="1">
                <div class="char-avatar">🌿</div>
                <div class="char-name">林屿</div>
                <div class="char-desc">温柔帅气竹马邻家哥哥</div>
            </div>
            <div class="char-card" data-id="2" data-name="沈星辞" data-tag="顶流爱豆" data-type="2">
                <div class="char-avatar">⭐</div>
                <div class="char-name">沈星辞</div>
                <div class="char-desc">万众瞩目顶流爱豆</div>
            </div>
            <div class="char-card" data-id="3" data-name="陆烬" data-tag="痞帅黑帮大佬" data-type="3">
                <div class="char-avatar">🖤</div>
                <div class="char-name">陆烬</div>
                <div class="char-desc">痞帅深情黑帮大佬</div>
            </div>
            <div class="char-card" data-id="4" data-name="苏晚辞" data-tag="古代长发病弱少爷" data-type="4">
                <div class="char-avatar">🎐</div>
                <div class="char-name">苏晚辞</div>
                <div class="char-desc">古代长发病弱少爷</div>
            </div>
            <div class="char-card" data-id="5" data-name="江澈" data-tag="少年感校草" data-type="5">
                <div class="char-avatar">☀️</div>
                <div class="char-name">江澈</div>
                <div class="char-desc">阳光少年感校草</div>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <div class="selected-char">
                <div class="char-avatar" id="currentAvatar">🌿</div>
                <div class="char-info">
                    <h2 id="currentName">角色名</h2>
                    <p id="currentTag">角色标签</p>
                </div>
            </div>

            <div class="favorability">
                <div class="favor-title">好感度：<span id="favorNum">0</span></div>
                <div class="favor-bar">
                    <div class="favor-progress" id="favorBar"></div>
                </div>
            </div>

            <div class="dialogue" id="dialogueText">
                选择互动方式，提升他的好感度吧～
            </div>

            <div class="action-buttons">
                <button class="btn" id="act1">温柔问候</button>
                <button class="btn" id="act2">贴心陪伴</button>
                <button class="btn" id="act3">专属惊喜</button>
                <button class="btn btn-back" id="backBtn">返回选择</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const charDialogues = Object.freeze({
                1: {
                    greet: "小笨蛋，怎么才来呀，我等你很久了～",
                    company: "有你在身边，我就觉得特别安心。",
                    surprise: "你准备的东西我很喜欢，谢谢你一直在我身边。"
                },
                2: {
                    greet: "嘘，别声张，我专门抽空来见你的。",
                    company: "舞台再亮，也比不上你眼里的光。",
                    surprise: "这份礼物我会珍藏，这是只属于我们的秘密。"
                },
                3: {
                    greet: "丫头，敢靠近我，不怕吗？",
                    company: "有我在，没人敢动你一根手指头。",
                    surprise: "你是第一个敢给我送东西的人，有点意思。"
                },
                4: {
                    greet: "姑娘费心了，能见到你，我身子都轻快了些。",
                    company: "长夜漫漫，有你相伴，便不觉孤寂。",
                    surprise: "如此贵重的心意，我……无以为报。"
                },
                5: {
                    greet: "早啊！一起去教室吗？",
                    company: "和你待在一起，上课都变得有趣了。",
                    surprise: "哇！谢谢你，我太喜欢了！"
                }
            });

            const cards = document.querySelectorAll('.char-card');
            const gameArea = document.getElementById('gameArea');
            const charList = document.getElementById('charList');
            const currentAvatar = document.getElementById('currentAvatar');
            const currentName = document.getElementById('currentName');
            const currentTag = document.getElementById('currentTag');
            const favorNum = document.getElementById('favorNum');
            const favorBar = document.getElementById('favorBar');
            const dialogueText = document.getElementById('dialogueText');
            const act1 = document.getElementById('act1');
            const act2 = document.getElementById('act2');
            const act3 = document.getElementById('act3');
            const backBtn = document.getElementById('backBtn');

            let currentChar = null;
            let favorability = 0;

            function updateFavorDisplay() {
                favorNum.textContent = favorability;
                favorBar.style.width = favorability + '%';
            }

            function updateGameUI() {
                if (!currentChar) return;
                currentAvatar.textContent = currentChar.avatar;
                currentName.textContent = currentChar.name;
                currentTag.textContent = currentChar.tag;
                updateFavorDisplay();
                dialogueText.textContent = "选择互动方式，提升他的好感度吧～";
                gameArea.classList.add('active');
                charList.style.display = 'none';
            }

            function selectCharacter(card) {
                cards.forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                currentChar = {
                    id: card.dataset.id,
                    name: card.dataset.name,
                    tag: card.dataset.tag,
                    avatar: card.querySelector('.char-avatar').textContent,
                    type: card.dataset.type
                };
                favorability = 0;
                updateGameUI();
            }

            function handleAction(increment, dialogueKey) {
                if (!currentChar) return;
                favorability = Math.min(100, favorability + increment);
                updateFavorDisplay();
                const dialogues = charDialogues[currentChar.type];
                if (dialogues && dialogues[dialogueKey]) {
                    dialogueText.textContent = dialogues[dialogueKey];
                }
            }

            function goBack() {
                gameArea.classList.remove('active');
                charList.style.display = 'grid';
                cards.forEach(c => c.classList.remove('selected'));
                currentChar = null;
                favorability = 0;
            }

            cards.forEach(card => {
                card.addEventListener('click', function() {
                    selectCharacter(this);
                });
            });

            act1.addEventListener('click', function() {
                handleAction(10, 'greet');
            });

            act2.addEventListener('click', function() {
                handleAction(15, 'company');
            });

            act3.addEventListener('click', function() {
                handleAction(20, 'surprise');
            });

            backBtn.addEventListener('click', goBack);
        })();
    </script>
</body>
</html>
