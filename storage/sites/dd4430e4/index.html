<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字消消乐 - 网页小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .title {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .score-box {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            font-size: 18px;
            color: #555;
        }

        .number-display {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            background: #4facfe;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .number-display:hover {
            transform: scale(1.05);
        }

        .number-display:active {
            transform: scale(0.95);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: #764ba2;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #667eea;
        }

        .tips {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .game-over {
            font-size: 24px;
            color: #e74c3c;
            margin: 20px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="title">数字消消乐</h1>
        <div class="score-box">
            <div>得分：<span id="score">0</span></div>
            <div>剩余次数：<span id="life">10</span></div>
        </div>

        <div id="numBox" class="number-display">50</div>

        <div class="btn-group">
            <button onclick="checkBigger()">比上一个大</button>
            <button onclick="checkSmaller()">比上一个小</button>
        </div>

        <div id="gameOverText" class="game-over" style="display:none;">游戏结束！</div>
        <button onclick="restartGame()" style="display:none;" id="restartBtn">重新开始</button>

        <div class="tips">💡 规则：点击数字生成新数，判断新数比旧数大还是小</div>
    </div>

    <script>
        let lastNum = 50;
        let score = 0;
        let life = 10;
        let gameOver = false;

        const numBox = document.getElementById('numBox');
        const scoreEl = document.getElementById('score');
        const lifeEl = document.getElementById('life');
        const gameOverText = document.getElementById('gameOverText');
        const restartBtn = document.getElementById('restartBtn');

        // 生成新随机数
        function generateNewNum() {
            if (gameOver) return;
            let newNum;
            do {
                newNum = Math.floor(Math.random() * 100) + 1;
            } while (newNum === lastNum);
            numBox.innerText = newNum;
            return newNum;
        }

        // 判断更大
        function checkBigger() {
            const newNum = generateNewNum();
            if (newNum > lastNum) {
                addScore();
            } else {
                loseLife();
            }
            lastNum = newNum;
        }

        // 判断更小
        function checkSmaller() {
            const newNum = generateNewNum();
            if (newNum < lastNum) {
                addScore();
            } else {
                loseLife();
            }
            lastNum = newNum;
        }

        // 加分
        function addScore() {
            score++;
            scoreEl.innerText = score;
        }

        // 扣生命
        function loseLife() {
            life--;
            lifeEl.innerText = life;
            if (life <= 0) {
                endGame();
            }
        }

        // 游戏结束
        function endGame() {
            gameOver = true;
            gameOverText.style.display = 'block';
            restartBtn.style.display = 'inline-block';
            numBox.style.pointerEvents = 'none';
        }

        // 重新开始
        function restartGame() {
            lastNum = 50;
            score = 0;
            life = 10;
            gameOver = false;
            
            numBox.innerText = 50;
            scoreEl.innerText = 0;
            lifeEl.innerText = 10;
            
            gameOverText.style.display = 'none';
            restartBtn.style.display = 'none';
            numBox.style.pointerEvents = 'auto';
        }
    </script>
</body>
</html>
