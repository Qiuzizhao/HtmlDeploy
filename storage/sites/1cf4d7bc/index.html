<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2D正视图枪战完整版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;cursor:none;}
        body{background:#0a0a0a;height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;font-family:Arial;}
        #gameBox{position:relative;}
        canvas{border:3px solid #333;}
        #cross{
            position:absolute;width:24px;height:24px;border:2px solid #ff2222;border-radius:50%;
            pointer-events:none;transform:translate(-50%,-50%);z-index:999;
        }
        .ui{position:absolute;color:#fff;text-shadow:2px 2px 3px #000;}
        #scoreUI{top:12px;left:12px;font-size:28px;}
        #hpUI{top:48px;left:12px;font-size:22px;}
        #ammoUI{top:80px;left:12px;font-size:22px;}
        #weaponUI{bottom:12px;left:12px;font-size:22px;background:rgba(0,0,0,0.6);padding:8px 14px;border-radius:8px;}
        #reloadTip{bottom:70px;left:12px;font-size:20px;color:#ffcc00;display:none;}
    </style>
</head>
<body>
    <div id="gameBox">
        <div id="cross"></div>
        <canvas id="game" width="1100" height="680"></canvas>
        <div class="ui" id="scoreUI">击杀：0</div>
        <div class="ui" id="hpUI">玩家血量：100</div>
        <div class="ui" id="ammoUI">弹药：12/36</div>
        <div class="ui" id="weaponUI">1手枪 | 2步枪 | 3狙击 | R换弹</div>
        <div class="ui" id="reloadTip">换弹中...</div>
    </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const cross = document.getElementById('cross');
//UI元素
const scoreUI = document.getElementById('scoreUI');
const hpUI = document.getElementById('hpUI');
const ammoUI = document.getElementById('ammoUI');
const reloadTip = document.getElementById('reloadTip');

//鼠标坐标
let mx = 0, my = 0;
document.addEventListener('mousemove',e=>{
    const rect = canvas.getBoundingClientRect();
    mx = e.clientX - rect.left;
    my = e.clientY - rect.top;
    cross.style.left = e.clientX+'px';
    cross.style.top = e.clientY+'px';
})

//武器配置
const weapons = {
    pistol:{dmg:15,fireRate:300,bulletSpeed:18,mag:12,total:36,name:'手枪',reloadTime:1200},
    rifle:{dmg:25,fireRate:120,bulletSpeed:28,mag:30,total:90,name:'步枪',reloadTime:1800},
    sniper:{dmg:90,fireRate:900,bulletSpeed:45,mag:5,total:20,name:'狙击',reloadTime:2500}
};
let curWep = 'pistol';
let lastFire = 0;
let magAmmo = weapons.pistol.mag;
let totalAmmo = weapons.pistol.total;
let isReloading = false;

//玩家数据
let playerHP = 100;
let killScore = 0;
const player = {x:canvas.width/2, y:canvas.height/2, w:36, h:52, hurtTimer:0};

//游戏实体数组
let bullets = [];
let enemies = [];
let covers = [];
let drops = []; //补给箱：blood/ammo

//音效
const shootSnd = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-technological-game-single-shot-1689.mp3');
const hitSnd = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-arcade-mechanical-bling-210.mp3');
const reloadSnd = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-gun-magazine-insert-1340.mp3');
const pickupSnd = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-coin-win-notification-1990.mp3');

//=== 1.R键换弹逻辑 ===
document.addEventListener('keydown',e=>{
    //武器切换
    if(e.key==='1'){switchWep('pistol')}
    if(e.key==='2'){switchWep('rifle')}
    if(e.key==='3'){switchWep('sniper')}
    //R换弹
    if(e.key.toLowerCase()==='r' && !isReloading){
        startReload();
    }
})
//切换武器重置弹药
function switchWep(key){
    curWep = key;
    magAmmo = weapons[key].mag;
    totalAmmo = weapons[key].total;
    isReloading = false;
    reloadTip.style.display = 'none';
}
//执行换弹
function startReload(){
    const wp = weapons[curWep];
    const needFill = wp.mag - magAmmo;
    if(needFill <=0 || totalAmmo <=0) return;
    isReloading = true;
    reloadTip.style.display = 'block';
    reloadSnd.volume=0.3;
    reloadSnd.play().catch(()=>{});

    setTimeout(()=>{
        const add = Math.min(needFill, totalAmmo);
        magAmmo += add;
        totalAmmo -= add;
        isReloading = false;
        reloadTip.style.display = 'none';
    }, wp.reloadTime);
}

//=== 2.点击射击（换弹中不能开枪）===
canvas.addEventListener('click',()=>{
    if(isReloading) return;
    const now = Date.now();
    const wp = weapons[curWep];
    if(now-lastFire < wp.fireRate || magAmmo<=0) return;

    lastFire = now;
    magAmmo--;
    shootSnd.volume=0.25;
    shootSnd.play().catch(()=>{});

    //子弹从玩家位置射向准星
    const angle = Math.atan2(my - player.y, mx - player.x);
    bullets.push({
        x:player.x+player.w/2,
        y:player.y+10,
        vx:Math.cos(angle)*wp.bulletSpeed,
        vy:Math.sin(angle)*wp.bulletSpeed,
        dmg:wp.dmg
    })
})

//=== 初始化掩体（木箱+汽车）===
function initCover(){
    covers.push({x:150,y:200,w:85,h:85,type:'box'});
    covers.push({x:420,y:280,w:90,h:90,type:'box'});
    covers.push({x:680,y:160,w:170,h:75,type:'car'});
    covers.push({x:280,y:440,w:155,h:70,type:'car'});
    covers.push({x:820,y:360,w:145,h:72,type:'car'});
    covers.push({x:950,y:520,w:160,h:74,type:'car'});
}

//=== 生成敌人（正面人形，会追玩家、攻击扣血）===
function spawnEnemy(){
    let x,y,safe=false;
    while(!safe){
        x = Math.random()*(canvas.width-70)+35;
        y = Math.random()*(canvas.height-90)+40;
        safe=true;
        //避开掩体生成
        for(let c of covers){
            if(x>c.x-50&&x<c.x+c.w+50&&y>c.y-60&&y<c.y+c.h+60){safe=false;break;}
        }
    }
    enemies.push({
        x:x,y:y,w:36,h:52,hp:100,speed:1.1,attackCd:0,dirX:0,dirY:0
    })
}

//=== 敌人死亡掉落补给箱 ===
function spawnDrop(x,y){
    //50%血包 50%弹药箱
    const type = Math.random()>0.5 ? 'blood' : 'ammo';
    drops.push({x:x,y:y,w:28,h:28,type:type,life:12000});//12秒消失
}

//=== 矩形碰撞检测 ===
function rectCollide(a,b){
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}
//子弹线段撞掩体
function lineHitRect(bul,rect){
    const bx2 = bul.x - bul.vx*3;
    const by2 = bul.y - bul.vy*3;
    const minX=Math.min(bul.x,bx2),maxX=Math.max(bul.x,bx2);
    const minY=Math.min(bul.y,by2),maxY=Math.max(bul.y,by2);
    if(maxX<rect.x||minX>rect.x+rect.w)return false;
    if(maxY<rect.y||minY>rect.y+rect.h)return false;
    return true;
}

//=== 绘制正视图人形函数 ===
//drawHuman(x,y,w,h,color,isPlayer)
function drawHuman(x,y,w,h,color,isPlayer){
    //头部
    ctx.fillStyle='#ffdfc4';
    ctx.beginPath();
    ctx.arc(x+w/2,y+12,12,0,Math.PI*2);
    ctx.fill();
    //身体躯干
    ctx.fillStyle=color;
    ctx.fillRect(x+6,y+22,w-12,h-32);
    //腿
    ctx.fillStyle='#222';
    ctx.fillRect(x+8,y+h-12,8,12);
    ctx.fillRect(x+w-16,y+h-12,8,12);
    //玩家额外画枪械
    if(isPlayer){
        ctx.fillStyle='#333';
        ctx.fillRect(x+w/2,y+30,22,6);
    }
}

//=== 游戏主循环 ===
function loop(){
    //绘制渐变战场背景（天空+草地）
    const skyGrad = ctx.createLinearGradient(0,0,0,canvas.height*0.55);
    skyGrad.addColorStop(0,'#87b8e8');
    skyGrad.addColorStop(1,'#b4d2ee');
    ctx.fillStyle=skyGrad;
    ctx.fillRect(0,0,canvas.width,canvas.height*0.55);
    //远山
    ctx.fillStyle='#7a9c72';
    ctx.beginPath();
    ctx.moveTo(0,canvas.height*0.55);
    ctx.quadraticCurveTo(280,canvas.height*0.42,550,canvas.height*0.55);
    ctx.quadraticCurveTo(820,canvas.height*0.40,1100,canvas.height*0.55);
    ctx.lineTo(1100,canvas.height);
    ctx.lineTo(0,canvas.height);
    ctx.closePath();
    ctx.fill();
    //草地地面
    const grassGrad = ctx.createLinearGradient(0,canvas.height*0.55,0,canvas.height);
    grassGrad.addColorStop(0,'#6b9962');
    grassGrad.addColorStop(1,'#4d7247');
    ctx.fillStyle=grassGrad;
    ctx.fillRect(0,canvas.height*0.55,canvas.width,canvas.height*0.45);

    //绘制掩体
    for(let c of covers){
        if(c.type==='box'){
            ctx.fillStyle='#8b5a2b';
            ctx.fillRect(c.x,c.y,c.w,c.h);
            ctx.strokeStyle='#5a3818';
            ctx.lineWidth=4;
            ctx.strokeRect(c.x,c.y,c.w,c.h);
            //木箱木纹线条
            ctx.strokeStyle='#442810';
            ctx.lineWidth=2;
            ctx.beginPath();
            ctx.moveTo(c.x,c.y+c.h/2);ctx.lineTo(c.x+c.w,c.y+c.h/2);
            ctx.moveTo(c.x+c.w/2,c.y);ctx.lineTo(c.x+c.w/2,c.y+c.h);
            ctx.stroke();
        }else{
            //汽车掩体
            ctx.fillStyle='#3a3a3a';
            ctx.fillRect(c.x,c.y,c.w,c.h);
            ctx.fillStyle='#222';
            ctx.fillRect(c.x+12,c.y+10,c.w-24,c.h-20);
            ctx.fillStyle='#111';
            ctx.beginPath();
            ctx.arc(c.x+18,c.y+c.h,10,0,Math.PI*2);
            ctx.arc(c.x+c.w-18,c.y+c.h,10,0,Math.PI*2);
            ctx.fill();
        }
    }

    //绘制补给箱
    for(let i=drops.length-1;i>=0;i--){
        const d = drops[i];
        d.life -= 16;
        if(d.life<=0){drops.splice(i);continue;}
        if(d.type==='blood'){
            ctx.fillStyle='#ff3333';
            ctx.fillRect(d.x,d.y,d.w,d.h);
            ctx.fillStyle='#fff';
            ctx.font='bold 22px Arial';
            ctx.fillText('+',d.x+6,d.y+22);
        }else{
            ctx.fillStyle='#ffbb00';
            ctx.fillRect(d.x,d.y,d.w,d.h);
            ctx.fillStyle='#000';
            ctx.font='bold 16px Arial';
            ctx.fillText('弹',d.x+2,d.y+20);
        }
        //玩家拾取判定
        if(rectCollide(player,d)){
            pickupSnd.volume=0.3;
            pickupSnd.play().catch(()=>{});
            if(d.type==='blood') playerHP = Math.min(100, playerHP+35);
            if(d.type==='ammo') totalAmmo += weapons[curWep].mag*2;
            drops.splice(i);
        }
    }

    //更新&绘制子弹
    for(let i=bullets.length-1;i>=0;i--){
        const b = bullets[i];
        b.x += b.vx; b.y += b.vy;
        //出界销毁
        if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){bullets.splice(i);continue;}
        //撞掩体销毁
        let hitC = false;
        for(let c of covers){if(lineHitRect(b,c)){hitC=true;break;}}
        if(hitC){bullets.splice(i);continue;}
        //画子弹光点
        ctx.fillStyle='#ffe600';
        ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();
        //击中敌人
        for(let j=enemies.length-1;j>=0;j--){
            const e = enemies[j];
            if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
                e.hp -= b.dmg;
                bullets.splice(i);
                hitSnd.play().catch(()=>{});
                //敌人死亡
                if(e.hp<=0){
                    spawnDrop(e.x,e.y); //掉落补给
                    enemies.splice(j);
                    killScore++;
                }
                break;
            }
        }
    }

    //更新敌人（追玩家+攻击扣血）
    for(let e of enemies){
        //朝向玩家移动
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.hypot(dx,dy);
        if(dist>10){
            e.x += (dx/dist)*e.speed;
            e.y += (dy/dist)*e.speed;
        }
        //敌人攻击玩家（贴近持续掉血）
        e.attackCd -=16;
        if(rectCollide(player,e) && e.attackCd<=0){
            playerHP -=8;
            e.attackCd = 800;//0.8秒攻击一次
            if(playerHP<=0) playerHP=0;
        }

        //绘制敌人（红色人形）
        drawHuman(e.x,e.y,e.w,e.h,'#c82222',false);
        //敌人血条
        ctx.fillStyle='#222';
        ctx.fillRect(e.x,e.y-10,e.w,5);
        ctx.fillStyle='#2ecc71';
        ctx.fillRect(e.x,e.y-10,e.w*(e.hp/100),5);
    }

    //绘制玩家（蓝色正面人形）
    drawHuman(player.x,player.y,player.w,player.h,'#2266cc',true);
    //玩家受伤闪烁
    if(player.hurtTimer>0) player.hurtTimer-=16;

    //刷新UI文字
    const wp = weapons[curWep];
    scoreUI.textContent = `击杀：${killScore}`;
    hpUI.textContent = `玩家血量：${playerHP}`;
    ammoUI.textContent = `弹药：${magAmmo}/${totalAmmo}`;

    requestAnimationFrame(loop);
}

//初始化启动
initCover();
setInterval(spawnEnemy,2400);
spawnEnemy();spawnEnemy();
loop();
</script>
</body>
</html>
