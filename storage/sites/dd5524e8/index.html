<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>连发枪战生存</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Microsoft Yahei', 'PingFang SC', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        .game-box {
            position: relative;
            border: 2px solid #39ff14;
            border-radius: 6px;
            box-shadow: 0 0 30px #39ff1444, inset 0 0 10px #39ff1411;
        }
        #gameCanvas {
            background: #0c0c0c;
            display: block;
            cursor: none;
            touch-action: none;
            max-width: 100vw;
            max-height: 100vh;
        }
        .ui {
            position: absolute;
            top: 12px;
            left: 12px;
            color: #39ff14;
            font-size: 17px;
            font-weight: bold;
            z-index: 9;
            text-shadow: 0 0 8px #39ff1488;
            pointer-events: none;
            line-height: 1.5;
        }
        .ui .reload-hint {
            color: #ffaa14;
            font-size: 14px;
            display: none;
            margin-left: 8px;
        }
        .ui .reload-hint.active {
            display: inline;
        }
        .tip {
            position: absolute;
            top: 12px;
            right: 12px;
            color: #aaa;
            font-size: 13px;
            text-align: right;
            z-index: 9;
            line-height: 1.6;
            pointer-events: none;
        }
        .gameover {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #f33;
            z-index: 20;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 20px;
        }
        .gameover h1 {
            font-size: 52px;
            margin-bottom: 15px;
            text-shadow: 0 0 12px #f33;
            letter-spacing: 4px;
        }
        .gameover p {
            font-size: 22px;
            color: #fff;
            margin: 8px 0;
            text-shadow: 0 0 6px rgba(255,255,255,0.2);
        }
        #restart {
            margin-top: 28px;
            padding: 13px 40px;
            font-size: 20px;
            font-weight: bold;
            background: #39ff14;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 20px #39ff1444;
            color: #0c0c0c;
            touch-action: manipulation;
        }
        #restart:hover {
            background: #2bc70f;
            transform: scale(1.05);
            box-shadow: 0 0 30px #39ff1466;
        }
        #restart:active {
            transform: scale(0.95);
        }
        .ammo-status {
            color: #39ff14;
            transition: color 0.15s;
        }
        .ammo-status.reloading {
            color: #ffaa14;
        }
        .ammo-status.empty {
            color: #ff4545;
            animation: pulse 0.6s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        @media (max-width: 920px) {
            .game-box { border-width: 1px; }
            .ui { font-size: 14px; top: 8px; left: 8px; }
            .tip { font-size: 11px; top: 8px; right: 8px; }
            .gameover h1 { font-size: 36px; }
            .gameover p { font-size: 18px; }
            #restart { padding: 10px 28px; font-size: 17px; }
        }
    </style>
</head>
<body>
<div class="game-box">
    <canvas id="gameCanvas" width="900" height="650"></canvas>
    <div class="ui">
        HP:<span id="hp">100</span> ｜ 分数:<span id="score">0</span> ｜
        弹药:<span id="ammo" class="ammo-status">30/30</span>
        <span class="reload-hint" id="reloadHint">[ 按R换弹 ]</span>
    </div>
    <div class="tip">
        WASD移动 ｜ 按住左键连发 ｜ R换弹<br>
        难度等级:<span id="level">1</span>
    </div>
    <div class="gameover" id="overBox">
        <h1>游戏结束</h1>
        <p>最终得分：<span id="finalScore">0</span></p>
        <p>存活等级：<span id="finalLv">1</span></p>
        <button id="restart">重新开局</button>
    </div>
</div>

<script>
    (function () {
        'use strict';

        // ============================================================
        //  DOM 引用
        // ============================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const hpDom = document.getElementById('hp');
        const scoreDom = document.getElementById('score');
        const ammoDom = document.getElementById('ammo');
        const levelDom = document.getElementById('level');
        const reloadHint = document.getElementById('reloadHint');
        const overBox = document.getElementById('overBox');
        const finalScore = document.getElementById('finalScore');
        const finalLv = document.getElementById('finalLv');
        const restartBtn = document.getElementById('restart');

        // ============================================================
        //  配置常量
        // ============================================================
        const CONFIG = {
            W: canvas.width,
            H: canvas.height,
            PLAYER_RADIUS: 26,
            PLAYER_SPEED: 5.2,
            MAX_HP: 100,
            MAX_AMMO: 30,
            SHOOT_COOLDOWN: 80,
            RELOAD_TIME: 1200,
            BULLET_RADIUS: 4.5,
            BULLET_SPEED: 13,
            ENEMY_BASE_RADIUS: 16,
            ENEMY_RADIUS_VARY: 9,
            ENEMY_BASE_SPEED: 1.1,
            ENEMY_SPEED_PER_LEVEL: 0.22,
            BOSS_RADIUS: 55,
            BOSS_BASE_HP: 80,
            BOSS_HP_PER_LEVEL: 22,
            BOSS_SPEED: 0.75,
            DIFF_INTERVAL: 14000,
            INITIAL_SPAWN_GAP: 750,
            MIN_SPAWN_GAP: 280,
            SPAWN_GAP_DECAY: 35,
            BOSS_SPAWN_CHANCE_BASE: 0.018,
            BOSS_SPAWN_CHANCE_PER_LEVEL: 0.004,
            MAX_PARTICLES_BLOOD: 30,
            MAX_PARTICLES_MUZZLE: 15,
            ENEMY_DAMAGE: 1.2,
            BOSS_DAMAGE: 3,
            GRID_SPACING: 45,
        };

        // ============================================================
        //  离屏 Canvas — 缓存网格背景
        // ============================================================
        const bgCanvas = document.createElement('canvas');
        bgCanvas.width = CONFIG.W;
        bgCanvas.height = CONFIG.H;
        const bgCtx = bgCanvas.getContext('2d');
        (function buildBg() {
            bgCtx.fillStyle = '#0c0c0c';
            bgCtx.fillRect(0, 0, CONFIG.W, CONFIG.H);
            bgCtx.strokeStyle = '#1a1a1a';
            bgCtx.lineWidth = 1;
            bgCtx.beginPath();
            for (let x = 0; x <= CONFIG.W; x += CONFIG.GRID_SPACING) {
                bgCtx.moveTo(x, 0);
                bgCtx.lineTo(x, CONFIG.H);
            }
            for (let y = 0; y <= CONFIG.H; y += CONFIG.GRID_SPACING) {
                bgCtx.moveTo(0, y);
                bgCtx.lineTo(CONFIG.W, y);
            }
            bgCtx.stroke();
        })();

        // ============================================================
        //  游戏状态
        // ============================================================
        const state = {
            score: 0,
            level: 1,
            nowAmmo: CONFIG.MAX_AMMO,
            isReloading: false,
            isOver: false,
            spawnGap: CONFIG.INITIAL_SPAWN_GAP,
            spawnTimerId: null,
            diffTimerId: null,
            uiDirty: true,
            animFrameId: null,
        };

        // ============================================================
        //  玩家
        // ============================================================
        const player = {
            x: CONFIG.W / 2,
            y: CONFIG.H / 2,
            r: CONFIG.PLAYER_RADIUS,
            speed: CONFIG.PLAYER_SPEED,
            hp: CONFIG.MAX_HP,
            maxHp: CONFIG.MAX_HP,
            color: '#39ff14',
        };

        // ============================================================
        //  输入状态
        // ============================================================
        const keys = { w: 0, a: 0, s: 0, d: 0 };
        const mouse = { x: CONFIG.W / 2, y: CONFIG.H / 2 };
        let isMouseDown = false;
        let isPointerInside = true;

        // ============================================================
        //  实体容器
        // ============================================================
        const entities = {
            bullets: [],
            enemies: [],
            particles: { blood: [], muzzle: [] },
            boss: null,
        };

        // ============================================================
        //  工具函数
        // ============================================================
        function dist(x1, y1, x2, y2) {
            const dx = x1 - x2;
            const dy = y1 - y2;
            return Math.hypot(dx, dy);
        }

        function hit(a, b) {
            return dist(a.x, a.y, b.x, b.y) < a.r + b.r;
        }

        function clamp(val, min, max) {
            return Math.max(min, Math.min(max, val));
        }

        function rand(min, max) {
            return Math.random() * (max - min) + min;
        }

        // ============================================================
        //  UI 更新
        // ============================================================
        function updateUI() {
            hpDom.textContent = Math.floor(player.hp);
            scoreDom.textContent = state.score;
            levelDom.textContent = state.level;

            if (state.isReloading) {
                ammoDom.textContent = '换弹中...';
                ammoDom.className = 'ammo-status reloading';
                reloadHint.classList.remove('active');
            } else if (state.nowAmmo === 0) {
                ammoDom.textContent = '0/' + CONFIG.MAX_AMMO;
                ammoDom.className = 'ammo-status empty';
                reloadHint.classList.add('active');
            } else {
                ammoDom.textContent = state.nowAmmo + '/' + CONFIG.MAX_AMMO;
                ammoDom.className = 'ammo-status';
                reloadHint.classList.remove('active');
            }
            state.uiDirty = false;
        }

        function markUIDirty() {
            state.uiDirty = true;
        }

        // ============================================================
        //  游戏结束
        // ============================================================
        function gameOver() {
            if (state.isOver) return;
            state.isOver = true;
            isMouseDown = false;

            clearInterval(state.spawnTimerId);
            state.spawnTimerId = null;
            clearInterval(state.diffTimerId);
            state.diffTimerId = null;

            if (state.animFrameId) {
                cancelAnimationFrame(state.animFrameId);
                state.animFrameId = null;
            }

            player.hp = 0;
            finalScore.textContent = state.score;
            finalLv.textContent = state.level;
            overBox.style.display = 'flex';
            markUIDirty();
            updateUI();
        }

        // ============================================================
        //  重置游戏
        // ============================================================
        function resetGame() {
            clearInterval(state.spawnTimerId);
            state.spawnTimerId = null;
            clearInterval(state.diffTimerId);
            state.diffTimerId = null;
            if (state.animFrameId) {
                cancelAnimationFrame(state.animFrameId);
                state.animFrameId = null;
            }

            state.score = 0;
            state.level = 1;
            state.nowAmmo = CONFIG.MAX_AMMO;
            state.isReloading = false;
            state.isOver = false;
            state.spawnGap = CONFIG.INITIAL_SPAWN_GAP;

            player.x = CONFIG.W / 2;
            player.y = CONFIG.H / 2;
            player.hp = CONFIG.MAX_HP;

            entities.bullets.length = 0;
            entities.enemies.length = 0;
            entities.particles.blood.length = 0;
            entities.particles.muzzle.length = 0;
            entities.boss = null;

            isMouseDown = false;
            overBox.style.display = 'none';

            markUIDirty();
            updateUI();

            startSpawnTimer();
            startDiffTimer();

            if (!state.animFrameId) {
                gameLoop();
            }
        }

        // ============================================================
        //  生成敌人
        // ============================================================
        function spawnEnemy() {
            if (state.isOver) return;

            const r = CONFIG.ENEMY_BASE_RADIUS + Math.random() * CONFIG.ENEMY_RADIUS_VARY;
            const speed = CONFIG.ENEMY_BASE_SPEED + state.level * CONFIG.ENEMY_SPEED_PER_LEVEL + Math.random() * 0.6;
            const hp = Math.floor(2 + state.level * 0.35);

            let x, y;
            const side = Math.floor(Math.random() * 4);
            switch (side) {
                case 0: x = -r; y = Math.random() * CONFIG.H; break;
                case 1: x = CONFIG.W + r; y = Math.random() * CONFIG.H; break;
                case 2: x = Math.random() * CONFIG.W; y = -r; break;
                default: x = Math.random() * CONFIG.W; y = CONFIG.H + r;
            }

            entities.enemies.push({
                x, y, r,
                speed,
                hp: hp,
                maxHp: hp,
                color: '#ff4545',
            });
        }

        // ============================================================
        //  Boss 生成
        // ============================================================
        function trySpawnBoss() {
            if (state.isOver || entities.boss) return;
            const chance = CONFIG.BOSS_SPAWN_CHANCE_BASE + state.level * CONFIG.BOSS_SPAWN_CHANCE_PER_LEVEL;
            if (Math.random() >= chance) return;

            const side = Math.floor(Math.random() * 4);
            const offset = CONFIG.BOSS_RADIUS + 10;
            let x, y;
            switch (side) {
                case 0: x = -offset; y = Math.random() * CONFIG.H; break;
                case 1: x = CONFIG.W + offset; y = Math.random() * CONFIG.H; break;
                case 2: x = Math.random() * CONFIG.W; y = -offset; break;
                default: x = Math.random() * CONFIG.W; y = CONFIG.H + offset;
            }

            entities.boss = {
                x, y,
                r: CONFIG.BOSS_RADIUS,
                speed: CONFIG.BOSS_SPEED,
                hp: CONFIG.BOSS_BASE_HP + state.level * CONFIG.BOSS_HP_PER_LEVEL,
                maxHp: CONFIG.BOSS_BASE_HP + state.level * CONFIG.BOSS_HP_PER_LEVEL,
                color: '#9922ff',
            };
        }

        // ============================================================
        //  计时器
        // ============================================================
        function startSpawnTimer() {
            clearInterval(state.spawnTimerId);
            state.spawnTimerId = setInterval(() => {
                if (state.isOver) return;
                spawnEnemy();
                trySpawnBoss();
            }, state.spawnGap);
        }

        function startDiffTimer() {
            clearInterval(state.diffTimerId);
            state.diffTimerId = setInterval(() => {
                if (state.isOver) return;
                state.level++;
                state.spawnGap = Math.max(CONFIG.MIN_SPAWN_GAP, state.spawnGap - CONFIG.SPAWN_GAP_DECAY);
                startSpawnTimer();
                markUIDirty();
            }, CONFIG.DIFF_INTERVAL);
        }

        // ============================================================
        //  射击 / 换弹
        // ============================================================
        let lastShootTime = 0;

        function fire() {
            if (state.isOver || state.isReloading) return;

            if (state.nowAmmo <= 0) {
                reload();
                return;
            }

            const now = performance.now();
            if (now - lastShootTime < CONFIG.SHOOT_COOLDOWN) return;
            lastShootTime = now;

            state.nowAmmo--;

            const dx = mouse.x - player.x;
            const dy = mouse.y - player.y;
            const len = Math.hypot(dx, dy);
            if (len < 0.001) return;

            const normDx = dx / len;
            const normDy = dy / len;

            entities.bullets.push({
                x: player.x + normDx * 32,
                y: player.y + normDy * 32,
                r: CONFIG.BULLET_RADIUS,
                speed: CONFIG.BULLET_SPEED,
                dx: normDx,
                dy: normDy,
                color: '#fffd70',
            });

            if (entities.particles.muzzle.length < CONFIG.MAX_PARTICLES_MUZZLE) {
                entities.particles.muzzle.push({
                    x: player.x + normDx * 32,
                    y: player.y + normDy * 32,
                    life: 7,
                    maxLife: 7,
                });
            }

            markUIDirty();
        }

        let reloadTimerId = null;

        function reload() {
            if (state.isOver || state.isReloading) return;
            if (state.nowAmmo === CONFIG.MAX_AMMO) return;

            state.isReloading = true;
            markUIDirty();
            updateUI();

            clearTimeout(reloadTimerId);
            reloadTimerId = setTimeout(() => {
                reloadTimerId = null;
                if (state.isOver) return;
                state.nowAmmo = CONFIG.MAX_AMMO;
                state.isReloading = false;
                markUIDirty();
                updateUI();
            }, CONFIG.RELOAD_TIME);
        }

        // ============================================================
        //  更新逻辑
        // ============================================================
        function update() {
            if (state.isOver) return;

            // 玩家移动
            if (keys.w && player.y > player.r) player.y -= player.speed;
            if (keys.s && player.y < CONFIG.H - player.r) player.y += player.speed;
            if (keys.a && player.x > player.r) player.x -= player.speed;
            if (keys.d && player.x < CONFIG.W - player.r) player.x += player.speed;

            // 连发
            if (isMouseDown && isPointerInside) fire();

            // ---------- 子弹更新 ----------
            const bullets = entities.bullets;
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.dx * b.speed;
                b.y += b.dy * b.speed;

                if (b.x < -50 || b.x > CONFIG.W + 50 || b.y < -50 || b.y > CONFIG.H + 50) {
                    bullets.splice(i, 1);
                    continue;
                }

                let used = false;

                // vs 敌人
                const enemies = entities.enemies;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (hit(b, e)) {
                        e.hp--;
                        used = true;
                        if (entities.particles.blood.length < CONFIG.MAX_PARTICLES_BLOOD) {
                            entities.particles.blood.push({ x: b.x, y: b.y, life: 12, maxLife: 12 });
                        }
                        if (e.hp <= 0) {
                            state.score += 12 * state.level;
                            enemies.splice(j, 1);
                            markUIDirty();
                        }
                        break;
                    }
                }
                if (used) { bullets.splice(i, 1); continue; }

                // vs Boss
                const boss = entities.boss;
                if (boss && hit(b, boss)) {
                    boss.hp--;
                    used = true;
                    if (entities.particles.blood.length < CONFIG.MAX_PARTICLES_BLOOD) {
                        entities.particles.blood.push({ x: b.x, y: b.y, life: 12, maxLife: 12 });
                    }
                    if (boss.hp <= 0) {
                        state.score += 220 * state.level;
                        entities.boss = null;
                        markUIDirty();
                    }
                    bullets.splice(i, 1);
                }
            }

            // ---------- 敌人更新 ----------
            const enemies = entities.enemies;
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const d = dist(e.x, e.y, player.x, player.y);
                if (d > 0.1) {
                    const step = e.speed / d;
                    e.x += (player.x - e.x) * step;
                    e.y += (player.y - e.y) * step;
                }

                if (hit(e, player)) {
                    player.hp -= CONFIG.ENEMY_DAMAGE;
                    enemies.splice(i, 1);
                    if (player.hp <= 0) { player.hp = 0; gameOver(); }
                    markUIDirty();
                }
            }

            // ---------- Boss 更新 ----------
            const boss = entities.boss;
            if (boss) {
                const d = dist(boss.x, boss.y, player.x, player.y);
                if (d > 0.1) {
                    const step = boss.speed / d;
                    boss.x += (player.x - boss.x) * step;
                    boss.y += (player.y - boss.y) * step;
                }

                if (hit(boss, player)) {
                    player.hp -= CONFIG.BOSS_DAMAGE;
                    if (player.hp <= 0) { player.hp = 0; gameOver(); }
                    markUIDirty();
                }
            }

            // ---------- 粒子更新 ----------
            const blood = entities.particles.blood;
            for (let i = blood.length - 1; i >= 0; i--) {
                if (--blood[i].life <= 0) blood.splice(i, 1);
            }
            const muzzle = entities.particles.muzzle;
            for (let i = muzzle.length - 1; i >= 0; i--) {
                if (--muzzle[i].life <= 0) muzzle.splice(i, 1);
            }

            if (state.uiDirty) updateUI();
        }

        // ============================================================
        //  绘制逻辑
        // ============================================================
        function draw() {
            // 背景网格（离屏缓存）
            ctx.drawImage(bgCanvas, 0, 0);

            // 瞄准线
            ctx.save();
            ctx.strokeStyle = '#39ff1466';
            ctx.lineWidth = 1.8;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.stroke();
            ctx.restore();

            // 玩家
            ctx.save();
            ctx.fillStyle = player.color;
            ctx.shadowColor = '#39ff14';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();

            // 玩家血条
            const barW = player.r * 1.6;
            const barH = 5;
            ctx.fillStyle = '#333';
            ctx.fillRect(player.x - barW / 2, player.y - player.r - 12, barW, barH);
            ctx.fillStyle = '#39ff14';
            ctx.fillRect(player.x - barW / 2, player.y - player.r - 12, barW * (player.hp / player.maxHp), barH);

            // 子弹
            ctx.save();
            for (const b of entities.bullets) {
                ctx.fillStyle = b.color;
                ctx.shadowColor = '#fffd70';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            ctx.restore();

            // 敌人
            for (const e of entities.enemies) {
                ctx.save();
                ctx.fillStyle = e.color;
                ctx.shadowColor = '#ff4545';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();

                const bw = e.r * 1.4;
                const bh = 3.5;
                ctx.fillStyle = '#222';
                ctx.fillRect(e.x - bw / 2, e.y - e.r - 8, bw, bh);
                ctx.fillStyle = '#f44';
                ctx.fillRect(e.x - bw / 2, e.y - e.r - 8, bw * (e.hp / e.maxHp), bh);
            }

            // Boss
            const boss = entities.boss;
            if (boss) {
                ctx.save();
                ctx.fillStyle = boss.color;
                ctx.shadowColor = '#9922ff';
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.arc(boss.x, boss.y, boss.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();

                const bw = boss.r * 1.8;
                const bh = 6;
                ctx.fillStyle = '#222';
                ctx.fillRect(boss.x - bw / 2, boss.y - boss.r - 14, bw, bh);
                ctx.fillStyle = '#a44aff';
                ctx.fillRect(boss.x - bw / 2, boss.y - boss.r - 14, bw * (boss.hp / boss.maxHp), bh);
            }

            // 枪口闪光
            ctx.save();
            for (const f of entities.particles.muzzle) {
                const alpha = f.life / f.maxLife;
                ctx.fillStyle = `rgba(255, 220, 50, ${alpha})`;
                ctx.shadowColor = '#ffdd44';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(f.x, f.y, 7 + (1 - alpha) * 5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            ctx.restore();

            // 血液粒子
            for (const bl of entities.particles.blood) {
                const alpha = bl.life / bl.maxLife;
                ctx.fillStyle = `rgba(220, 30, 30, ${alpha})`;
                ctx.beginPath();
                ctx.arc(bl.x, bl.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            // 瞄准准星
            ctx.save();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            const s = 12;
            ctx.beginPath();
            ctx.moveTo(mouse.x - s, mouse.y);
            ctx.lineTo(mouse.x + s, mouse.y);
            ctx.moveTo(mouse.x, mouse.y - s);
            ctx.lineTo(mouse.x, mouse.y + s);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 3, 0, Math.PI * 2);
            ctx.strokeStyle = '#39ff14';
            ctx.stroke();
            ctx.restore();
        }

        // ============================================================
        //  游戏循环
        // ============================================================
        function gameLoop() {
            if (state.isOver) {
                draw();
                state.animFrameId = null;
                return;
            }
            update();
            draw();
            state.animFrameId = requestAnimationFrame(gameLoop);
        }

        // ============================================================
        //  事件绑定
        // ============================================================

        // ---- 键盘 ----
        document.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'w') keys.w = 1;
            else if (k === 's') keys.s = 1;
            else if (k === 'a') keys.a = 1;
            else if (k === 'd') keys.d = 1;
            else if (k === 'r') { reload(); e.preventDefault(); }
            if (['w', 's', 'a', 'd', 'r'].includes(k)) e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'w') keys.w = 0;
            else if (k === 's') keys.s = 0;
            else if (k === 'a') keys.a = 0;
            else if (k === 'd') keys.d = 0;
            if (['w', 's', 'a', 'd'].includes(k)) e.preventDefault();
        });

        // ---- 鼠标 ----
        function updateMousePos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouse.x = clamp((clientX - rect.left) * scaleX, 0, CONFIG.W);
            mouse.y = clamp((clientY - rect.top) * scaleY, 0, CONFIG.H);
        }

        canvas.addEventListener('mousemove', (e) => {
            updateMousePos(e.clientX, e.clientY);
        });

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isMouseDown = true;
                isPointerInside = true;
                fire();
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 0) isMouseDown = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isPointerInside = false;
            isMouseDown = false;
        });

        canvas.addEventListener('mouseenter', () => {
            isPointerInside = true;
        });

        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        // ---- 触摸 (移动端) ----
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            updateMousePos(t.clientX, t.clientY);
            isMouseDown = true;
            isPointerInside = true;
            fire();
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            updateMousePos(t.clientX, t.clientY);
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isMouseDown = false;
            // 如果还有剩余触摸，更新位置
            if (e.touches.length > 0) {
                const t = e.touches[0];
                updateMousePos(t.clientX, t.clientY);
            }
        }, { passive: false });

        canvas.addEventListener('touchcancel', (e) => {
            e.preventDefault();
            isMouseDown = false;
        }, { passive: false });

        // ---- 窗口失焦时重置按键 ----
        window.addEventListener('blur', () => {
            keys.w = keys.a = keys.s = keys.d = 0;
            isMouseDown = false;
        });

        // ---- 重启 ----
        restartBtn.addEventListener('click', resetGame);
        restartBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            resetGame();
        });

        // ============================================================
        //  初始化
        // ============================================================
        resetGame();

    })();
</script>
</body>
</html>
