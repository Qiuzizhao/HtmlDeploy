<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仿地铁跑酷</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{display:flex;justify-content:center;background:#333;padding:20px}
        #game{
            width:320px;height:600px;
            background:#71c554;
            position:relative;
            overflow:hidden;
            border:3px solid #222;
        }
        /* 三条跑道 */
        .road{
            width:100px;height:600px;
            background:#999;
            float:left;
            border-right:2px dashed #fff;
            position:relative;
        }
        .road:last-child{border:none}
        /* 地面滚动线条 */
        .line{
            width:8px;height:40px;
            background:#fff;
            position:absolute;left:46px;top:-50px;
        }
        /* 玩家角色 */
        #player{
            width:50px;height:70px;
            background:#ff5555;
            border-radius:8px;
            position:absolute;
            bottom:30px;left:135px;
            transition:left 0.15s;
            z-index:9;
        }
        /* 障碍物 */
        .block{
            width:55px;height:70px;
            background:#663300;
            border-radius:4px;
            position:absolute;bottom:0;
        }
        /* 金币 */
        .coin{
            width:30px;height:30px;
            background:#ffd700;
            border-radius:50%;
            position:absolute;
        }
        #score{
            position:fixed;top:10px;color:#fff;font-size:24px;font-weight:bold;
        }
        #tips{
            position:fixed;bottom:20px;color:#fff;text-align:center;width:320px;
        }
    </style>
</head>
<body>
<div id="score">分数：0</div>
<div id="game">
    <div class="road" data-lane="0"></div>
    <div class="road" data-lane="1"></div>
    <div class="road" data-lane="2"></div>
    <div id="player"></div>
</div>
<div id="tips">←→切换跑道｜↑跳跃｜↓下蹲</div>

<script>
const game = document.getElementById('game');
const player = document.getElementById('player');
const scoreText = document.getElementById('score');
// 三条跑道横坐标
const laneX = [22,122,222];
let nowLane = 1; // 初始中间跑道
let isJump = false,isDown = false;
let score = 0;
let gameSpeed = 6;
let gameRun;
let blockArr = [];
let coinArr = [];

// 玩家位置初始化
function setPlayerPos(){
    player.style.left = laneX[nowLane]+'px';
}
setPlayerPos();

// 键盘控制
document.addEventListener('keydown',e=>{
    switch(e.key){
        case 'ArrowLeft':
            if(nowLane>0){nowLane--;setPlayerPos()}
            break;
        case 'ArrowRight':
            if(nowLane<2){nowLane++;setPlayerPos()}
            break;
        case 'ArrowUp':
            if(!isJump){
                isJump=true;
                player.style.bottom='120px';
                setTimeout(()=>{player.style.bottom='30px';isJump=false},450)
            }
            break;
        case 'ArrowDown':
            if(!isDown){
                isDown=true;
                player.style.height='30px';
                setTimeout(()=>{player.style.height='70px';isDown=false},400)
            }
            break;
    }
})

// 随机生成障碍物
function createBlock(){
    let lane = Math.floor(Math.random()*3);
    let b = document.createElement('div');
    b.className='block';
    b.style.left=laneX[lane]+'px';
    b.style.top='-80px';
    game.appendChild(b);
    blockArr.push({dom:b,lane,top:-80});
}

// 随机生成金币
function createCoin(){
    let lane = Math.floor(Math.random()*3);
    let c = document.createElement('div');
    c.className='coin';
    c.style.left=laneX[lane]+'px';
    c.style.top='-40px';
    game.appendChild(c);
    coinArr.push({dom:c,lane,top:-40});
}

// 游戏主循环
function gameLoop(){
    // 地面白线滚动
    document.querySelectorAll('.line').forEach(line=>{
        let t = parseInt(line.style.top)+gameSpeed;
        if(t>600) t=-50;
        line.style.top = t+'px';
    })
    // 障碍物下移
    blockArr.forEach((item,idx)=>{
        item.top += gameSpeed;
        item.dom.style.top = item.top+'px';
        // 碰撞判定
        if(item.top>480&&item.top<550&&item.lane===nowLane){
            // 下蹲规避
            if(!isDown&&!isJump){
                alert('游戏结束！得分：'+score);
                cancelAnimationFrame(gameRun);
                location.reload();
            }
        }
        // 出屏幕删除
        if(item.top>620){
            item.dom.remove();
            blockArr.splice(idx,1);
        }
    })
    // 金币收集
    coinArr.forEach((item,idx)=>{
        item.top += gameSpeed;
        item.dom.style.top = item.top+'px';
        // 吃到金币
        if(item.top>470&&item.top<530&&item.lane===nowLane){
            score+=10;
            scoreText.innerText='分数：'+score;
            item.dom.remove();
            coinArr.splice(idx,1);
        }else if(item.top>620){
            item.dom.remove();
            coinArr.splice(idx,1);
        }
    })
    gameRun = requestAnimationFrame(gameLoop);
}

// 定时生成道具
setInterval(createBlock,1200);
setInterval(createCoin,700);
// 生成跑道白线
for(let i=0;i<12;i++){
    document.querySelectorAll('.road').forEach(rd=>{
        let line = document.createElement('div');
        line.className='line';
        line.style.top = (i*70)+'px';
        rd.appendChild(line);
    })
}
gameLoop();
</script>
</body>
</html>
