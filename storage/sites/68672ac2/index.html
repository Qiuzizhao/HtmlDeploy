<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Realistic FPS 写实射击</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;cursor:none;}
body{background:#000;overflow:hidden;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = innerWidth;
canvas.height = innerHeight;
window.addEventListener('resize',()=>{
    canvas.width = innerWidth;
    canvas.height = innerHeight;
})

//玩家配置
const player = {
    x: canvas.width/2,
    y: canvas.height/2,
    speed:4,
    angle:0,
    hp:100,
    recoil:0,
    hurtFlash:0 //受伤屏幕变红计时器
}
const keys = {};
const mouse = {x:0,y:0,down:false};
let bullets = [];
let enemies = [];
let particles = [];

//墙体障碍物
const walls = [
    {x:200,y:150,w:180,h:320},
    {x:600,y:220,w:240,h:160},
    {x:350,y:550,w:300,h:140},
    {x:900,y:300,w:200,h:350}
]

//按键鼠标监听
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true)
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false)
canvas.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY})
canvas.addEventListener('mousedown',()=>mouse.down=true)
canvas.addEventListener('mouseup',()=>mouse.down=false)

//生成敌人
function spawnEnemy(){
    let side = Math.floor(Math.random()*4);
    let ex,ey;
    switch(side){
        case 0: ex=Math.random()*canvas.width; ey=-40; break;
        case 1: ex=canvas.width+40; ey=Math.random()*canvas.height; break;
        case 2: ex=Math.random()*canvas.width; ey=canvas.height+40; break;
        case 3: ex=-40; ey=Math.random()*canvas.height; break;
    }
    enemies.push({
        x:ex,y:ey,speed:1.1,hp:3,atkCd:0,atkDmg:8 //攻击冷却、单次伤害
    })
}

//开枪
function shoot(){
    let spread = (Math.random()-0.5)*0.07 + player.recoil*0.02;
    let ang = player.angle + spread;
    bullets.push({
        x:player.x+Math.cos(ang)*26,
        y:player.y+Math.sin(ang)*26,
        vx:Math.cos(ang)*15,
        vy:Math.sin(ang)*15,
        life:95
    })
    //弹壳粒子
    particles.push({
        x:player.x-Math.cos(ang+1.4)*20,
        y:player.y-Math.sin(ang+1.4)*20,
        vx:(Math.random()-0.5)*2.2,
        vy:-3.5,
        gravity:0.18,
        life:130,
        col:'#b8a270'
    })
    player.recoil +=2.3;
}

//游戏主循环
function loop(){
    //背景天空+地面
    let skyGrad = ctx.createLinearGradient(0,0,0,canvas.height);
    skyGrad.addColorStop(0,'#839eb0');
    skyGrad.addColorStop(0.5,'#a5b9c8');
    skyGrad.addColorStop(1,'#5c6e79');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#737d6d';
    ctx.fillRect(0,canvas.height*0.64,canvas.width,canvas.height*0.36);

    //受伤全屏红色遮罩
    if(player.hurtFlash>0){
        ctx.fillStyle=`rgba(180,20,20,${player.hurtFlash/255})`;
        ctx.fillRect(0,0,canvas.width,canvas.height);
        player.hurtFlash--;
    }

    //玩家朝向
    player.angle = Math.atan2(mouse.y-player.y, mouse.x-player.x);
    //WASD移动
    if(keys['w']) player.y -= player.speed;
    if(keys['s']) player.y += player.speed;
    if(keys['a']) player.x -= player.speed;
    if(keys['d']) player.x += player.speed;
    //后坐力衰减
    if(player.recoil>0) player.recoil *=0.87;

    //持续开火
    if(mouse.down) shoot();

    //绘制墙体
    walls.forEach(w=>{
        ctx.fillStyle='#585b5e';
        ctx.fillRect(w.x,w.y,w.w,w.h);
        ctx.fillStyle='#434648';
        ctx.fillRect(w.x+5,w.y+5,w.w,w.h);
    })

    //更新子弹
    for(let i=bullets.length-1;i>=0;i--){
        let b = bullets[i];
        b.x += b.vx; b.y += b.vy; b.life--;
        ctx.fillStyle='#ffec99';
        ctx.beginPath();
        ctx.arc(b.x,b.y,3,0,Math.PI*2);
        ctx.fill();
        if(b.life<=0) bullets.splice(i,1);
    }

    //粒子物理
    for(let i=particles.length-1;i>=0;i--){
        let p = particles[i];
        if(p.gravity) p.vy += p.gravity;
        p.x += p.vx; p.y += p.vy; p.life--;
        ctx.fillStyle=p.col;
        ctx.fillRect(p.x,p.y,4,4);
        if(p.life<=0) particles.splice(i,1);
    }

    //随机刷新敌人
    if(Math.random()<0.007) spawnEnemy();

    //敌人AI+攻击逻辑
    for(let i=enemies.length-1;i>=0;i--){
        let e = enemies[i];
        let dirAng = Math.atan2(player.y-e.y,player.x-e.x);
        e.x += Math.cos(dirAng)*e.speed;
        e.y += Math.sin(dirAng)*e.speed;
        e.atkCd--;

        //子弹击中敌人
        for(let bi=bullets.length-1;bi>=0;bi--){
            let b=bullets[bi];
            let dist = Math.hypot(b.x-e.x,b.y-e.y);
            if(dist<22){
                e.hp--;
                bullets.splice(bi,1);
                //中弹尘土
                for(let s=0;s<5;s++){
                    particles.push({
                        x:e.x,y:e.y,
                        vx:(Math.random()-0.5)*4,
                        vy:(Math.random()-0.5)*4,
                        life:45,col:'#867a66'
                    })
                }
                if(e.hp<=0) enemies.splice(i,1);
                break;
            }
        }

        //敌人近身攻击玩家
        let disToPlayer = Math.hypot(player.x-e.x,player.y-e.y);
        if(disToPlayer<32 && e.atkCd<=0){
            player.hp -= e.atkDmg;
            player.hurtFlash=100; //屏幕变红
            e.atkCd=70; //攻击冷却
            if(player.hp<0) player.hp=0;
        }

        //绘制敌人
        ctx.fillStyle='#393939';
        ctx.beginPath();
        ctx.arc(e.x,e.y,19,0,Math.PI*2);
        ctx.fill();
    }

    //绘制手中枪械
    ctx.save();
    ctx.translate(player.x,player.y);
    ctx.rotate(player.angle + player.recoil*0.016);
    ctx.fillStyle='#202020';
    ctx.fillRect(13,-5,40,9);
    ctx.fillStyle='#303030';
    ctx.fillRect(9,-3,7,5);
    ctx.restore();

    //十字准星
    ctx.strokeStyle='#151515';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(mouse.x,mouse.y,13,0,Math.PI*2);
    ctx.moveTo(mouse.x-19,mouse.y);ctx.lineTo(mouse.x+19,mouse.y);
    ctx.moveTo(mouse.x,mouse.y-19);ctx.lineTo(mouse.x,mouse.y+19);
    ctx.stroke();

    //血条HUD
    ctx.fillStyle='#222';
    ctx.fillRect(24,22,206,25);
    ctx.fillStyle=player.hp>35?'#3ea04a':'#d13838';
    ctx.fillRect(26,24,player.hp*2,21);
    ctx.fillStyle='#fff';
    ctx.font='17px Arial';
    ctx.fillText(`HP:${player.hp}`,30,42);

    //血量归零游戏结束
    if(player.hp<=0){
        ctx.fillStyle='rgba(0,0,0,0.65)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle='#ff4444';
        ctx.font='bold 50px Arial';
        ctx.textAlign='center';
        ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2);
        ctx.textAlign='left';
    }

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
