<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Three.js 赛车 Pro - 真实物理与小地图</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
        }
        #minimap {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            border: 2px solid #555;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div id="ui">
        SPEED: <span id="speed">0</span> KM/H<br>
        GEAR: <span id="gear">D</span>
    </div>
    <div id="minimap"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js">
    </script>

    <script>
        (function() {
            'use strict';

            /* ============================================================
             *  配置
             * ============================================================ */
            const CONFIG = {
                mass: 150,
                engineForce: 1500,
                brakeForce: 100,
                steerValue: 0.5,
                cameraOffset: new THREE.Vector3(0, 4, -10),
                cameraLerpFactor: 0.1,
                minimapSize: 200,
                minimapMargin: 20,
                groundSize: 1000,
                trackRadius: 80,
                trackWidth: 5,
                // 小地图每 N 帧更新一次 (优化性能)
                minimapUpdateInterval: 2,
                // 物理固定时间步长
                physicsStep: 1 / 60,
                // 最大物理累积时间，防止螺旋
                maxPhysicsAccum: 0.1,
            };

            /* ============================================================
             *  状态 & 全局变量
             * ============================================================ */
            let scene, renderer, world;
            let camera, miniMapCamera;
            let carVehicle, chassisBody;
            let wheelMeshes = [],
                chassisMesh;
            const keys = { w: false, s: false, a: false, d: false };

            const loader = new THREE.GLTFLoader();

            // DOM 引用
            const speedEl = document.getElementById('speed');
            const gearEl = document.getElementById('gear');

            // ---- 复用临时对象，减少 GC ----
            const _v3 = new THREE.Vector3();
            const _v3b = new THREE.Vector3();
            const _q = new THREE.Quaternion();
            const _offset = new THREE.Vector3();
            const _targetPos = new THREE.Vector3();

            // 小地图帧计数器
            let minimapFrameCounter = 0;

            // 物理累积时间
            let physicsAccum = 0;

            // 上一帧时间戳
            let lastTime = 0;

            // 模型加载标志
            let modelLoaded = false;

            /* ============================================================
             *  初始化
             * ============================================================ */
            function init() {
                // --- 场景 ---
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x333333);

                // --- 渲染器 ---
                renderer = new THREE.WebGLRenderer({
                    antialias: true,
                    powerPreference: "high-performance"
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                document.body.appendChild(renderer.domElement);

                // --- 主相机 ---
                camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);

                // --- 小地图相机 (正交俯视) ---
                miniMapCamera = new THREE.OrthographicCamera(-50, 50, 50, -50, 1, 500);
                miniMapCamera.up.set(0, 0, -1);

                // --- 物理世界 ---
                world = new CANNON.World();
                world.gravity.set(0, -9.82, 0);
                world.defaultContactMaterial.friction = 0.1;

                // --- 灯光 ---
                const ambient = new THREE.AmbientLight(0xffffff, 0.5);
                scene.add(ambient);

                const sun = new THREE.DirectionalLight(0xffffff, 1);
                sun.position.set(50, 100, 50);
                sun.castShadow = true;
                sun.shadow.mapSize.width = 2048;
                sun.shadow.mapSize.height = 2048;
                const d = 100;
                sun.shadow.camera.left = -d;
                sun.shadow.camera.right = d;
                sun.shadow.camera.top = d;
                sun.shadow.camera.bottom = -d;
                sun.shadow.camera.near = 0.1;
                sun.shadow.camera.far = 300;
                scene.add(sun);

                // --- 构建场景 ---
                createLevel();
                createPhysicsCar();
                loadCarModel();
                setupControls();

                // 启动
                lastTime = performance.now();
                animate();
            }

            /* ============================================================
             *  赛道 & 地面
             * ============================================================ */
            function createLevel() {
                // 物理地面
                const groundMat = new CANNON.Material("ground");
                const groundBody = new CANNON.Body({ mass: 0, material: groundMat });
                groundBody.addShape(new CANNON.Plane());
                groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
                world.addBody(groundBody);

                // 视觉网格
                const grid = new THREE.GridHelper(CONFIG.groundSize, 100, 0x444444, 0x222222);
                scene.add(grid);

                // 赛道圆环 (视觉参考)
                const trackGeo = new THREE.TorusGeometry(CONFIG.trackRadius, CONFIG.trackWidth, 16, 100);
                const trackMat = new THREE.MeshStandardMaterial({
                    color: 0xcc0000,
                    roughness: 0.7,
                    metalness: 0.2
                });
                const trackMesh = new THREE.Mesh(trackGeo, trackMat);
                trackMesh.rotation.x = Math.PI / 2;
                trackMesh.position.y = 0.1;
                trackMesh.receiveShadow = true;
                scene.add(trackMesh);
            }

            /* ============================================================
             *  物理车辆
             * ============================================================ */
            function createPhysicsCar() {
                // 底盘
                const chassisShape = new CANNON.Box(new CANNON.Vec3(1, 0.4, 2));
                chassisBody = new CANNON.Body({ mass: CONFIG.mass });
                chassisBody.addShape(chassisShape);
                chassisBody.position.set(0, 4, 0);

                // RaycastVehicle
                carVehicle = new CANNON.RaycastVehicle({
                    chassisBody: chassisBody,
                    indexForwardAxis: 2,
                    indexRightAxis: 0,
                    indexUpAxis: 1
                });

                const wheelOptions = {
                    radius: 0.5,
                    directionLocal: new CANNON.Vec3(0, -1, 0),
                    suspensionStiffness: 30,
                    suspensionRestLength: 0.3,
                    frictionSlip: 1.4,
                    dampingRelaxation: 2.3,
                    dampingCompression: 4.4,
                    maxSuspensionForce: 100000,
                    rollInfluence: 0.01,
                    axleLocal: new CANNON.Vec3(-1, 0, 0),
                    chassisConnectionPointLocal: new CANNON.Vec3(1, 1, 0)
                };

                const positions = [
                    new CANNON.Vec3(-1, -0.2, 1.5),
                    new CANNON.Vec3(1, -0.2, 1.5),
                    new CANNON.Vec3(-1, -0.2, -1.5),
                    new CANNON.Vec3(1, -0.2, -1.5)
                ];

                positions.forEach(function(p) {
                    wheelOptions.chassisConnectionPointLocal.copy(p);
                    carVehicle.addWheel(wheelOptions);
                });

                carVehicle.addToWorld(world);

                // 轮子视觉 (圆柱体)
                const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 20);
                wheelGeo.rotateZ(Math.PI / 2);
                const wheelMat = new THREE.MeshStandardMaterial({
                    color: 0x111111,
                    roughness: 0.8
                });
                for (var i = 0; i < 4; i++) {
                    var w = new THREE.Mesh(wheelGeo, wheelMat);
                    w.castShadow = true;
                    w.receiveShadow = true;
                    scene.add(w);
                    wheelMeshes.push(w);
                }
            }

            /* ============================================================
             *  加载车身模型 (GLTF)
             * ============================================================ */
            function loadCarModel() {
                var modelUrl =
                    'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Ferrari.glb';

                loader.load(modelUrl,
                    function(gltf) {
                        chassisMesh = gltf.scene;
                        chassisMesh.scale.set(0.022, 0.022, 0.022);
                        chassisMesh.traverse(function(child) {
                            if (child.isMesh) {
                                child.castShadow = true;
                                child.receiveShadow = true;
                            }
                        });
                        scene.add(chassisMesh);
                        modelLoaded = true;
                    },
                    undefined,
                    function(error) {
                        console.error('模型加载失败，使用后备几何体', error);
                        var backupGeo = new THREE.BoxGeometry(2, 0.8, 4);
                        var backupMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
                        chassisMesh = new THREE.Mesh(backupGeo, backupMat);
                        chassisMesh.castShadow = true;
                        chassisMesh.receiveShadow = true;
                        scene.add(chassisMesh);
                        modelLoaded = true;
                    }
                );
            }

            /* ============================================================
             *  驾驶控制
             * ============================================================ */
            function updateDrive() {
                // 先重置所有
                carVehicle.applyEngineForce(0, 2);
                carVehicle.applyEngineForce(0, 3);
                carVehicle.setSteeringValue(0, 0);
                carVehicle.setSteeringValue(0, 1);
                carVehicle.setBrake(0, 0);
                carVehicle.setBrake(0, 1);
                carVehicle.setBrake(0, 2);
                carVehicle.setBrake(0, 3);

                // 根据按键施加
                if (keys.w) {
                    carVehicle.applyEngineForce(-CONFIG.engineForce, 2);
                    carVehicle.applyEngineForce(-CONFIG.engineForce, 3);
                }
                if (keys.s) {
                    carVehicle.applyEngineForce(CONFIG.engineForce * 0.5, 2);
                    carVehicle.applyEngineForce(CONFIG.engineForce * 0.5, 3);
                }
                if (keys.a) {
                    carVehicle.setSteeringValue(CONFIG.steerValue, 0);
                    carVehicle.setSteeringValue(CONFIG.steerValue, 1);
                }
                if (keys.d) {
                    carVehicle.setSteeringValue(-CONFIG.steerValue, 0);
                    carVehicle.setSteeringValue(-CONFIG.steerValue, 1);
                }

                // 无油门/刹车时轻制动
                if (!keys.w && !keys.s) {
                    var brake = CONFIG.brakeForce * 0.2;
                    carVehicle.setBrake(brake, 0);
                    carVehicle.setBrake(brake, 1);
                }
            }

            /* ============================================================
             *  动画主循环
             * ============================================================ */
            function animate() {
                requestAnimationFrame(animate);

                var now = performance.now();
                var delta = (now - lastTime) / 1000;
                lastTime = now;

                // 限制 delta 防止物理爆炸
                if (delta > 0.05) delta = 0.05;

                // ---- 物理步进 (固定时间步长) ----
                physicsAccum += delta;
                if (physicsAccum > CONFIG.maxPhysicsAccum) {
                    physicsAccum = CONFIG.maxPhysicsAccum;
                }
                while (physicsAccum >= CONFIG.physicsStep) {
                    world.step(CONFIG.physicsStep);
                    physicsAccum -= CONFIG.physicsStep;
                }

                // ---- 驱动逻辑 ----
                updateDrive();

                // ---- 同步底盘视觉 ----
                if (chassisMesh) {
                    chassisMesh.position.copy(chassisBody.position);
                    chassisMesh.quaternion.copy(chassisBody.quaternion);
                }

                // ---- 同步轮子视觉 ----
                var wheelInfos = carVehicle.wheelInfos;
                for (var i = 0; i < wheelInfos.length; i++) {
                    carVehicle.updateWheelTransform(i);
                    var t = wheelInfos[i].worldTransform;
                    wheelMeshes[i].position.copy(t.position);
                    wheelMeshes[i].quaternion.copy(t.quaternion);
                }

                // ---- 主相机跟随 (复用临时对象) ----
                var carPos = chassisBody.position;
                var carQuat = chassisBody.quaternion;

                _offset.copy(CONFIG.cameraOffset);
                // 将偏移量转换到车辆局部方向
                _offset.applyQuaternion(carQuat);
                _targetPos.copy(carPos).add(_offset);

                camera.position.lerp(_targetPos, CONFIG.cameraLerpFactor);
                camera.lookAt(carPos);

                // ---- 小地图相机 ----
                miniMapCamera.position.set(carPos.x, 100, carPos.z);
                miniMapCamera.lookAt(carPos.x, 0, carPos.z);

                // ---- 渲染主场景 ----
                renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
                renderer.setScissorTest(false);
                renderer.render(scene, camera);

                // ---- 小地图 (降低更新频率) ----
                minimapFrameCounter++;
                if (minimapFrameCounter >= CONFIG.minimapUpdateInterval) {
                    minimapFrameCounter = 0;
                    renderMiniMap();
                }

                // ---- UI 更新 ----
                var speedKmh = (chassisBody.velocity.length() * 3.6).toFixed(0);
                speedEl.textContent = speedKmh;
                gearEl.textContent = 'D';
            }

            /* ============================================================
             *  小地图渲染
             * ============================================================ */
            function renderMiniMap() {
                var mapSize = CONFIG.minimapSize;
                var margin = CONFIG.minimapMargin;
                var x = window.innerWidth - mapSize - margin;
                var y = window.innerHeight - mapSize - margin;

                renderer.setScissorTest(true);
                renderer.setScissor(x, y, mapSize, mapSize);
                renderer.setViewport(x, y, mapSize, mapSize);
                renderer.clear(true, true, true);
                renderer.render(scene, miniMapCamera);
                renderer.setScissorTest(false);
            }

            /* ============================================================
             *  控制绑定
             * ============================================================ */
            function setupControls() {
                // ---- 键盘 ----
                window.addEventListener('keydown', function(e) {
                    var key = e.key.toLowerCase();
                    if (key in keys) keys[key] = true;
                });
                window.addEventListener('keyup', function(e) {
                    var key = e.key.toLowerCase();
                    if (key in keys) keys[key] = false;
                });

                // ---- 窗口失焦时重置按键 (防止"幽灵按键") ----
                window.addEventListener('blur', function() {
                    keys.w = false;
                    keys.s = false;
                    keys.a = false;
                    keys.d = false;
                });

                // ---- 窗口缩放 ----
                window.addEventListener('resize', function() {
                    var w = window.innerWidth;
                    var h = window.innerHeight;
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                    renderer.setSize(w, h);
                });

                // ---- 触摸控制 ----
                var touchStartX = 0,
                    touchStartY = 0;
                var touchActive = false;

                window.addEventListener('touchstart', function(e) {
                    var touch = e.touches[0];
                    touchStartX = touch.clientX;
                    touchStartY = touch.clientY;
                    touchActive = true;
                    // 默认前进
                    keys.w = true;
                    keys.s = false;
                    keys.a = false;
                    keys.d = false;
                }, { passive: true });

                window.addEventListener('touchmove', function(e) {
                    e.preventDefault();
                    if (!touchActive) return;
                    var touch = e.touches[0];
                    var dx = touch.clientX - touchStartX;
                    var dy = touch.clientY - touchStartY;
                    var threshold = 20;

                    keys.w = false;
                    keys.s = false;
                    keys.a = false;
                    keys.d = false;

                    if (dy < -threshold) {
                        keys.w = true;
                    } else if (dy > threshold) {
                        keys.s = true;
                    } else {
                        keys.w = true;
                    }
                    if (dx < -threshold) {
                        keys.a = true;
                    } else if (dx > threshold) {
                        keys.d = true;
                    }
                }, { passive: false });

                window.addEventListener('touchend', function() {
                    touchActive = false;
                    keys.w = false;
                    keys.s = false;
                    keys.a = false;
                    keys.d = false;
                }, { passive: true });

                window.addEventListener('touchcancel', function() {
                    touchActive = false;
                    keys.w = false;
                    keys.s = false;
                    keys.a = false;
                    keys.d = false;
                }, { passive: true });
            }

            /* ============================================================
             *  启动
             * ============================================================ */
            // 检查 WebGL 支持
            try {
                var testCanvas = document.createElement('canvas');
                var gl = testCanvas.getContext('webgl') || testCanvas.getContext('experimental-webgl');
                if (!gl) {
                    throw new Error('WebGL 不被支持');
                }
            } catch (e) {
                document.body.innerHTML =
                    '<div style="color:red;font-size:24px;text-align:center;margin-top:20%;">您的浏览器不支持 WebGL，请使用现代浏览器。</div>';
                return;
            }

            init();

        })();
    </script>

</body>
</html>
