<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恐怖老奶奶 - 躲猫猫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 游戏容器 */
        #game {
            width: 900px;
            height: 600px;
            background: #222;
            border: 3px solid #444;
            position: relative;
            overflow: hidden;
        }

        /* 玩家 */
        #player {
            width: 35px;
            height: 35px;
            background: #00aaff;
            border-radius: 50%;
            position: absolute;
            z-index: 10;
        }

        /* 老奶奶 */
        .granny {
            width: 45px;
            height: 45px;
            background: #654321;
            border-radius: 5px;
            position: absolute;
            z-index: 9;
        }

        /* 躲藏点 */
        .hide-spot {
            width: 60px;
            height: 60px;
            background: #555;
            position: absolute;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
        }

        /* 游戏提示 */
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 999;
            font-size: 18px;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 5px;
        }

        /* 游戏结束 */
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            color: red;
            font-weight: bold;
            display: none;
            z-index: 999;
            text-align: center;
        }

        #restart {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            cursor: pointer;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="game">
        <div id="ui">
            存活时间：<span id="time">0</span> 秒 | 按【空格】躲藏
        </div>

        <div id="player"></div>
        <div class="granny" id="granny1"></div>
        <div class="granny" id="granny2"></div>

        <!-- 躲藏点 -->
        <div class="hide-spot" style="top:100px; left:150px">衣柜</div>
        <div class="hide-spot" style="top:400px; left:700px">床底</div>
        <div class="hide-spot" style="top:250px; left:300px">角落</div>

        <!-- 游戏结束 -->
        <div id="gameOver">
            被老奶奶抓住了！
            <br>
            <button id="restart">重新开始</button>
        </div>
    </div>

    <script>
        // 获取元素
        const game = document.getElementById('game');
        const player = document.getElementById('player');
        const granny1 = document.getElementById('granny1');
        const granny2 = document.getElementById('granny2');
        const timeText = document.getElementById('time');
        const gameOverScreen = document.getElementById('gameOver');
        const restartBtn = document.getElementById('restart');

        // 游戏参数
        let gameWidth = 900;
        let gameHeight = 600;
        let playerX = 400, playerY = 300;
        let speed = 5;
        let hiding = false;
        let gameOver = false;
        let time = 0;

        // 按键状态
        let keys = {
            w: false, a: false, s: false, d: false
        };

        // 初始化位置
        player.style.left = playerX + 'px';
        player.style.top = playerY + 'px';
        granny1.style.left = '100px';
        granny1.style.top = '100px';
        granny2.style.left = '700px';
        granny2.style.top = '400px';

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if(gameOver) return;
            switch(e.key.toLowerCase()) {
                case 'w': keys.w = true; break;
                case 'a': keys.a = true; break;
                case 's': keys.s = true; break;
                case 'd': keys.d = true; break;
                case ' ': hiding = true; player.style.background = '#333'; break;
            }
        });

        document.addEventListener('keyup', (e) => {
            if(gameOver) return;
            switch(e.key.toLowerCase()) {
                case 'w': keys.w = false; break;
                case 'a': keys.a = false; break;
                case 's': keys.s = false; break;
                case 'd': keys.d = false; break;
                case ' ': hiding = false; player.style.background = '#00aaff'; break;
            }
        });

        // 老奶奶移动逻辑
        function moveGranny(granny) {
            let gx = parseInt(granny.style.left);
            let gy = parseInt(granny.style.top);

            // 向玩家靠近
            if(!hiding) {
                if(gx < playerX) gx += 1.8;
                else gx -= 1.8;
                if(gy < playerY) gy += 1.8;
                else gy -= 1.8;
            }

            granny.style.left = gx + 'px';
            granny.style.top = gy + 'px';

            // 碰撞检测
            let dx = Math.abs(gx - playerX);
            let dy = Math.abs(gy - playerY);
            if(dx < 40 && dy < 40 && !hiding && !gameOver) {
                endGame();
            }
        }

        // 游戏结束
        function endGame() {
            gameOver = true;
            gameOverScreen.style.display = 'block';
        }

        // 重新开始
        restartBtn.onclick = () => {
            location.reload();
        };

        // 游戏主循环
        function gameLoop() {
            if(gameOver) return;

            // 玩家移动
            if(keys.w && playerY > 0) playerY -= speed;
            if(keys.s && playerY < gameHeight - 35) playerY += speed;
            if(keys.a && playerX > 0) playerX -= speed;
            if(keys.d && playerX < gameWidth - 35) playerX += speed;

            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';

            // 老奶奶移动
            moveGranny(granny1);
            moveGranny(granny2);

            // 计时
            time += 0.016;
            timeText.innerText = Math.floor(time);

            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
