<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>宠 · 宠物乐园</title>
    <style>
        :root {
            --color-primary: #FF8C94;
            --color-primary-dark: #e07a82;
            --color-secondary: #FFD4A8;
            --color-bg: #FFF8F0;
            --color-card: #FFFFFF;
            --color-text: #3D2C2E;
            --color-text-light: #7A6A6C;
            --color-gold: #F9A825;
            --color-gold-light: #FFF3E0;
            --color-success: #66BB6A;
            --color-border: #F0E0D8;
            --color-shadow: rgba(255, 140, 148, 0.18);
            --radius: 18px;
            --radius-sm: 12px;
            --font-cute: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-cute);
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px 12px 40px;
            background-image: radial-gradient(circle at 20% 30%, #FFEEDD 0%, #FFF5E6 70%);
        }

        .app {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }

        /* ── 顶栏 ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
            background: var(--color-card);
            border-radius: var(--radius);
            box-shadow: 0 4px 20px var(--color-shadow);
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px 16px;
            border: 1px solid var(--color-border);
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--color-text);
        }
        .header-title span {
            background: var(--color-primary);
            color: #fff;
            font-size: 1rem;
            padding: 0 8px;
            border-radius: 30px;
            line-height: 1.6;
        }

        .gold-display {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--color-gold-light);
            padding: 8px 18px 8px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.2rem;
            color: #5D4037;
            border: 1px solid #FFE0B2;
            box-shadow: 0 2px 8px rgba(249, 168, 37, 0.15);
            transition: var(--transition);
            user-select: none;
        }
        .gold-display .coin {
            font-size: 1.5rem;
            line-height: 1;
        }
        .gold-display .num {
            min-width: 3ch;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        .gold-display.shake {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-6px);
            }
            40% {
                transform: translateX(6px);
            }
            60% {
                transform: translateX(-4px);
            }
            80% {
                transform: translateX(4px);
            }
        }

        /* ── 区块标题 ── */
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            padding: 6px 4px 12px 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--color-text);
            border-bottom: 2px dashed var(--color-border);
            margin-bottom: 14px;
        }
        .section-title .badge {
            background: var(--color-primary);
            color: #fff;
            font-size: 0.7rem;
            padding: 0 10px;
            border-radius: 20px;
            line-height: 1.8;
            margin-left: 4px;
        }

        /* ── 宠物网格 ── */
        .pet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }

        .pet-card {
            background: var(--color-card);
            border-radius: var(--radius-sm);
            padding: 16px 12px 14px;
            text-align: center;
            box-shadow: 0 2px 12px var(--color-shadow);
            border: 1px solid var(--color-border);
            transition: transform var(--transition), box-shadow var(--transition);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .pet-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 24px var(--color-shadow);
        }
        .pet-card:active {
            transform: scale(0.97);
        }

        .pet-card .emoji {
            font-size: 3rem;
            line-height: 1.2;
            margin-bottom: 4px;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.06));
        }
        .pet-card .name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 2px;
        }
        .pet-card .info {
            font-size: 0.8rem;
            color: var(--color-text-light);
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .pet-card .info span {
            display: inline-block;
            margin: 0 2px;
        }

        .pet-card .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 8px 18px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            max-width: 120px;
            font-family: inherit;
            background: var(--color-secondary);
            color: var(--color-text);
            box-shadow: 0 2px 6px rgba(255, 212, 168, 0.3);
        }
        .pet-card .btn:hover:not(:disabled) {
            transform: scale(1.04);
            box-shadow: 0 4px 14px rgba(255, 140, 148, 0.25);
        }
        .pet-card .btn:active:not(:disabled) {
            transform: scale(0.94);
        }
        .pet-card .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        .pet-card .btn.buy {
            background: var(--color-primary);
            color: #fff;
        }
        .pet-card .btn.upgrade {
            background: var(--color-success);
            color: #fff;
        }
        .pet-card .btn.maxed {
            background: #BDBDBD;
            color: #fff;
        }

        .pet-card .level-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--color-primary);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(255, 140, 148, 0.3);
            border: 2px solid #fff;
        }

        /* ── 空状态 ── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 32px 12px;
            color: var(--color-text-light);
            background: var(--color-card);
            border-radius: var(--radius-sm);
            border: 1px dashed var(--color-border);
        }
        .empty-state .big {
            font-size: 2.6rem;
            display: block;
            margin-bottom: 6px;
        }
        .empty-state p {
            font-size: 0.95rem;
        }

        /* ── 通知 ── */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            width: 90%;
            max-width: 400px;
        }
        .toast {
            background: var(--color-card);
            padding: 12px 22px;
            border-radius: 40px;
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.12);
            border: 1px solid var(--color-border);
            font-weight: 600;
            font-size: 0.95rem;
            animation: toastIn 0.35s ease, toastOut 0.35s ease 2.2s forwards;
            pointer-events: auto;
            text-align: center;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.92);
            max-width: 100%;
        }
        .toast.error {
            border-left: 5px solid #EF5350;
        }
        .toast.success {
            border-left: 5px solid var(--color-success);
        }
        .toast.info {
            border-left: 5px solid #42A5F5;
        }
        .toast.warning {
            border-left: 5px solid #FFA726;
        }

        @keyframes toastIn {
            0% {
                opacity: 0;
                transform: translateY(-30px) scale(0.92);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes toastOut {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
        }

        /* ── 响应式 ── */
        @media (max-width: 480px) {
            .header {
                padding: 14px 16px;
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .header-title {
                font-size: 1.25rem;
                justify-content: center;
            }
            .gold-display {
                justify-content: center;
                font-size: 1.05rem;
                padding: 6px 14px;
            }
            .pet-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 10px;
            }
            .pet-card {
                padding: 14px 8px 12px;
            }
            .pet-card .emoji {
                font-size: 2.4rem;
            }
            .pet-card .btn {
                font-size: 0.8rem;
                padding: 6px 12px;
                max-width: 100%;
            }
            .section-title {
                font-size: 1.05rem;
            }
            .toast {
                font-size: 0.85rem;
                padding: 10px 16px;
            }
        }

        @media (max-width: 360px) {
            .pet-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .pet-card .emoji {
                font-size: 2rem;
            }
        }

        /* ── 滚动条美化 ── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--color-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--color-secondary);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-primary);
        }
    </style>
</head>
<body>
    <div class="app" role="main">
        <!-- 顶栏 -->
        <header class="header">
            <div class="header-title">
                🐾 宠
                <span>乐园</span>
            </div>
            <div class="gold-display" id="goldDisplay" aria-live="polite">
                <span class="coin">🪙</span>
                <span class="num" id="goldNum">500</span>
            </div>
        </header>

        <!-- 宠物商店 -->
        <section aria-label="宠物商店">
            <div class="section-title">
                🏪 宠物商店
                <span class="badge" id="shopBadge">NEW</span>
            </div>
            <div class="pet-grid" id="shopGrid"></div>
        </section>

        <!-- 我的宠物 -->
        <section aria-label="我的宠物">
            <div class="section-title">
                🏡 我的宠物
                <span class="badge" id="myBadge">0</span>
            </div>
            <div class="pet-grid" id="myGrid"></div>
        </section>
    </div>

    <!-- 通知容器 -->
    <div class="toast-container" id="toastContainer" aria-live="assertive"></div>

    <script>
        (function() {
            'use strict';

            // ─── 宠物配置 ───
            const PET_CONFIGS = [{
                id: 'cat',
                name: '小猫咪',
                emoji: '🐱',
                buyPrice: 100,
                maxLevel: 10,
                upgradeCostBase: 50,
            }, {
                id: 'dog',
                name: '小狗狗',
                emoji: '🐶',
                buyPrice: 150,
                maxLevel: 8,
                upgradeCostBase: 65,
            }, {
                id: 'rabbit',
                name: '小兔子',
                emoji: '🐰',
                buyPrice: 120,
                maxLevel: 12,
                upgradeCostBase: 40,
            }, {
                id: 'fox',
                name: '小狐狸',
                emoji: '🦊',
                buyPrice: 200,
                maxLevel: 6,
                upgradeCostBase: 85,
            }, {
                id: 'panda',
                name: '小熊猫',
                emoji: '🐼',
                buyPrice: 250,
                maxLevel: 5,
                upgradeCostBase: 100,
            }, {
                id: 'hamster',
                name: '小仓鼠',
                emoji: '🐹',
                buyPrice: 80,
                maxLevel: 15,
                upgradeCostBase: 30,
            }, ];

            // ─── 状态 ───
            let gold = 500;
            // 已拥有的宠物: { id, currentLevel }
            let myPets = [];

            // DOM 缓存
            const goldNumEl = document.getElementById('goldNum');
            const goldDisplayEl = document.getElementById('goldDisplay');
            const shopGrid = document.getElementById('shopGrid');
            const myGrid = document.getElementById('myGrid');
            const myBadge = document.getElementById('myBadge');
            const shopBadge = document.getElementById('shopBadge');
            const toastContainer = document.getElementById('toastContainer');

            // ─── 工具 ───
            function getPetConfig(id) {
                return PET_CONFIGS.find(p => p.id === id);
            }

            function getMyPet(id) {
                return myPets.find(p => p.id === id);
            }

            function getUpgradeCost(config, level) {
                return config.upgradeCostBase * level;
            }

            function isMaxLevel(config, level) {
                return level >= config.maxLevel;
            }

            // ─── 金币更新 ───
            function setGold(value) {
                gold = Math.max(0, value);
                goldNumEl.textContent = gold;
                // 震动反馈仅当金币变化较大时
                renderAll();
            }

            function canAfford(cost) {
                return gold >= cost;
            }

            function deductGold(cost) {
                if (!canAfford(cost)) return false;
                setGold(gold - cost);
                return true;
            }

            // ─── Toast 通知 ───
            function showToast(message, type) {
                type = type || 'info';
                const el = document.createElement('div');
                el.className = 'toast ' + type;
                el.textContent = message;
                toastContainer.appendChild(el);
                // 动画结束后移除
                setTimeout(() => {
                    if (el.parentNode) el.parentNode.removeChild(el);
                }, 2600);
            }

            // ─── 渲染商店 ───
            function renderShop() {
                let html = '';
                for (const config of PET_CONFIGS) {
                    const owned = getMyPet(config.id);
                    const alreadyOwned = !!owned;
                    html += `
                        <div class="pet-card" data-id="${config.id}" data-type="shop">
                            <div class="emoji">${config.emoji}</div>
                            <div class="name">${config.name}</div>
                            <div class="info">
                                <span>💰 ${config.buyPrice}</span>
                                <span>·</span>
                                <span>🏅 ${config.maxLevel}级</span>
                            </div>
                            <button class="btn buy" data-action="buy" data-id="${config.id}" ${alreadyOwned ? 'disabled' : ''}>
                                ${alreadyOwned ? '已拥有 ✅' : '购买'}
                            </button>
                            ${alreadyOwned ? `<div class="level-badge">Lv.${owned.currentLevel}</div>` : ''}
                        </div>
                    `;
                }
                shopGrid.innerHTML = html;
                shopBadge.textContent = PET_CONFIGS.length + '种';
            }

            // ─── 渲染我的宠物 ───
            function renderMyPets() {
                if (myPets.length === 0) {
                    myGrid.innerHTML = `
                        <div class="empty-state">
                            <span class="big">🐾</span>
                            <p>还没有宠物哦，去商店领一只吧！</p>
                        </div>
                    `;
                    myBadge.textContent = '0';
                    return;
                }

                let html = '';
                // 按购买顺序显示
                for (const my of myPets) {
                    const config = getPetConfig(my.id);
                    if (!config) continue;
                    const level = my.currentLevel;
                    const maxed = isMaxLevel(config, level);
                    const cost = getUpgradeCost(config, level);
                    const canUp = !maxed && canAfford(cost);

                    let btnHtml = '';
                    if (maxed) {
                        btnHtml = `<button class="btn maxed" disabled>🌟 满级</button>`;
                    } else {
                        btnHtml =
                            `<button class="btn upgrade" data-action="upgrade" data-id="${config.id}" ${!canUp ? 'disabled' : ''}>
                                升级 🪙${cost}
                            </button>`;
                    }

                    html += `
                        <div class="pet-card" data-id="${config.id}" data-type="my">
                            <div class="emoji">${config.emoji}</div>
                            <div class="name">${config.name}</div>
                            <div class="info">
                                <span>Lv.${level}</span>
                                <span>·</span>
                                <span>🏅 ${config.maxLevel}</span>
                            </div>
                            ${btnHtml}
                            <div class="level-badge">Lv.${level}</div>
                        </div>
                    `;
                }
                myGrid.innerHTML = html;
                myBadge.textContent = myPets.length;
            }

            // ─── 全量渲染 ───
            function renderAll() {
                renderShop();
                renderMyPets();
                // 金币显示数字已更新
                goldNumEl.textContent = gold;
            }

            // ─── 购买宠物 ───
            function handleBuy(petId) {
                const config = getPetConfig(petId);
                if (!config) return;

                // 检查是否已拥有
                if (getMyPet(petId)) {
                    showToast('🐾 这只宠物已经拥有啦！', 'warning');
                    return;
                }

                if (!deductGold(config.buyPrice)) {
                    showToast(`💰 金币不足！需要 ${config.buyPrice} 金币`, 'error');
                    return;
                }

                // 添加宠物（初始1级）
                myPets.push({ id: petId, currentLevel: 1 });
                showToast(`🎉 成功购买 ${config.name}！欢迎来到家园！`, 'success');
                renderAll();
            }

            // ─── 升级宠物 ───
            function handleUpgrade(petId) {
                const config = getPetConfig(petId);
                if (!config) return;

                const my = getMyPet(petId);
                if (!my) {
                    showToast('❓ 还没有这只宠物呢', 'warning');
                    return;
                }

                if (isMaxLevel(config, my.currentLevel)) {
                    showToast(`🌟 ${config.name} 已经满级啦！`, 'info');
                    renderAll();
                    return;
                }

                const cost = getUpgradeCost(config, my.currentLevel);
                if (!deductGold(cost)) {
                    showToast(`💰 金币不足！升级需要 ${cost} 金币`, 'error');
                    renderAll();
                    return;
                }

                my.currentLevel++;
                showToast(`⬆️ ${config.name} 升级成功！当前 Lv.${my.currentLevel}`, 'success');
                renderAll();
            }

            // ─── 事件委托 ───
            function handleGridClick(e) {
                const btn = e.target.closest('button[data-action]');
                if (!btn) return;
                const action = btn.getAttribute('data-action');
                const id = btn.getAttribute('data-id');
                if (!action || !id) return;

                e.preventDefault();

                if (action === 'buy') {
                    handleBuy(id);
                } else if (action === 'upgrade') {
                    handleUpgrade(id);
                }
            }

            // 将事件监听挂载到容器（事件委托）
            shopGrid.addEventListener('click', handleGridClick);
            myGrid.addEventListener('click', handleGridClick);

            // ─── 键盘辅助 ───
            document.addEventListener('keydown', function(e) {
                // 忽略输入框内的按键
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                // 无快捷键需求，预留
            });

            // ─── 兼容性: 旧版浏览器 placeholder ───
            if (!Element.prototype.matches) {
                Element.prototype.matches = Element.prototype.msMatchesSelector || Element.prototype.webkitMatchesSelector;
            }

            // ─── 初始化 ───
            function init() {
                // 设置初始金币
                gold = 500;
                myPets = [];
                renderAll();
                showToast('🐾 欢迎来到宠物乐园！初始金币 500 🪙', 'info');
            }

            // DOM ready 检查
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // ─── 暴露给调试（非必需） ───
            window.__PET_APP = {
                gold,
                myPets,
                configs: PET_CONFIGS,
                buy: handleBuy,
                upgrade: handleUpgrade,
                render: renderAll,
            };

        })();
    </script>
</body>
</html>
