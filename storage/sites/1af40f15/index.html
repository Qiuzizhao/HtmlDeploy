<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC 3D 闯关大冒险</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #87CEEB;
            font-family: Arial, sans-serif;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            opacity: 0.8;
            z-index: 10;
        }
        .ui-top {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            text-shadow: 1px 1px 3px #000;
            font-size: 16px;
            z-index: 10;
        }
        .ui-info {
            position: absolute;
            top: 40px;
            left: 10px;
            color: #ffff00;
            font-size: 18px;
            text-shadow: 1px 1px 3px #000;
            z-index: 10;
        }
        .ui-status {
            position: absolute;
            top: 70px;
            left: 10px;
            color: #ff4444;
            font-size: 17px;
            text-shadow: 1px 1px 3px #000;
            z-index: 10;
        }
        .pop-box {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 50px 80px;
            border-radius: 16px;
            text-align: center;
            z-index: 20;
        }
        .pop-box h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .win h1 { color: #4cd964; }
        .fail h1 { color: #ff5555; }
        .pop-box p {
            color: #fff;
            font-size: 20px;
            margin-bottom: 30px;
        }
        .pop-box button {
            padding: 12px 32px;
            font-size: 18px;
            border: none;
            border-radius: 6px;
            background: #2196F3;
            color: #fff;
            cursor: pointer;
            margin: 0 8px;
        }
    </style>
</head>
<body>
    <div class="ui-top">WASD移动 | 空格跳跃 | 左键挖方块 | 右键放方块 | ESC解锁鼠标</div>
    <div class="ui-info" id="levelTip">第 1 关：突破障碍到达金色终点</div>
    <div class="ui-status" id="status">❤️ 血量: 100 | ⏱ 时间: 90</div>
    <div id="crosshair"></div>

    <!-- 通关弹窗 -->
    <div class="pop-box win" id="winBox">
        <h1>🎉 关卡通关！</h1>
        <p id="winText">准备进入下一关</p>
        <button id="nextBtn">下一关</button>
        <button id="restartAllBtn">重新开始</button>
    </div>

    <!-- 失败弹窗 -->
    <div class="pop-box fail" id="failBox">
        <h1>💀 挑战失败</h1>
        <p id="failText">血量耗尽 / 时间结束</p>
        <button id="retryBtn">重新挑战</button>
        <button id="restartAllBtn2">从头开始</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script>
        // 基础场景
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 光照
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 所有材质
        const grassMat = new THREE.MeshLambertMaterial({ color: 0x3D9970 });
        const dirtMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
        const stoneMat = new THREE.MeshLambertMaterial({ color: 0x808080 });
        const wallMat = new THREE.MeshLambertMaterial({ color: 0x9c27b0 });
        const lavaMat = new THREE.MeshBasicMaterial({ color: 0xff3300 });
        const goalMat = new THREE.MeshBasicMaterial({ color: 0xffd700, wireframe: true });
        const mobMat = new THREE.MeshLambertMaterial({ color: 0x222222 });

        // 全局数据
        const blocks = {};
        const mobs = [];
        let currentLevel = 1;
        const maxLevel = 3;
        let gameOver = false;
        let playerHP = 100;
        let leftTime = 90;
        let timerInterval = null;

        // DOM元素
        const winBox = document.getElementById('winBox');
        const failBox = document.getElementById('failBox');
        const levelTip = document.getElementById('levelTip');
        const statusText = document.getElementById('status');
        const winText = document.getElementById('winText');
        const failText = document.getElementById('failText');
        const nextBtn = document.getElementById('nextBtn');
        const retryBtn = document.getElementById('retryBtn');
        const restartAllBtn = document.getElementById('restartAllBtn');
        const restartAllBtn2 = document.getElementById('restartAllBtn2');

        // 玩家参数
        const player = {
            x: 0, y: 6, z: 0,
            velY: 0,
            onGround: false,
            speed: 0.15,
            jumpPower: 0.35,
            gravity: 0.015
        };

        const keys = {};
        let mouseX = 0, mouseY = 0;
        const mouseSens = 0.15;

        // 方块操作
        function addBlock(x, y, z, mat) {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const block = new THREE.Mesh(geo, mat);
            block.position.set(x, y, z);
            block.castShadow = true;
            block.receiveShadow = true;
            scene.add(block);
            blocks[`${x},${y},${z}`] = block;
        }
        function removeBlock(x, y, z) {
            const key = `${x},${y},${z}`;
            if (blocks[key]) {
                scene.remove(blocks[key]);
                delete blocks[key];
            }
        }

        // 生成怪物
        function spawnMob(x, y, z) {
            const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const mob = new THREE.Mesh(geo, mobMat);
            mob.position.set(x, y, z);
            mob.userData = { baseX: x, baseZ: z, speed: 0.03 };
            scene.add(mob);
            mobs.push(mob);
        }

        // 清空场景
        function clearScene() {
            Object.values(blocks).forEach(b => scene.remove(b));
            Object.keys(blocks).length = 0;
            mobs.forEach(m => scene.remove(m));
            mobs.length = 0;
        }

        // 生成对应关卡地图
        function buildLevel(level) {
            clearScene();
            player.x = 0;
            player.y = 6;
            player.z = -12;

            // 通用地面
            for (let x = -8; x <= 8; x++) {
                for (let z = -15; z <= 20; z++) {
                    addBlock(x, 0, z, grassMat);
                    addBlock(x, -1, z, dirtMat);
                    addBlock(x, -2, z, stoneMat);
                }
            }

            // 两侧围墙
            for (let z = -12; z <= 18; z++) {
                for (let y = 1; y <= 4; y++) {
                    addBlock(-8, y, z, wallMat);
                    addBlock(8, y, z, wallMat);
                }
            }

            // 终点固定位置
            addBlock(0, 1, 18, goalMat);

            if (level === 1) {
                levelTip.innerText = "第 1 关：简单障碍，熟悉操作";
                // 简单墙体障碍
                for (let x = -3; x <= 3; x++) {
                    for (let y = 1; y <= 3; y++) {
                        addBlock(x, y, -2, wallMat);
                    }
                }
                leftTime = 90;
                playerHP = 100;
            } else if (level === 2) {
                levelTip.innerText = "第 2 关：新增岩浆陷阱，碰到扣血！";
                // 多层障碍 + 岩浆
                for (let x = -3; x <= 3; x++) {
                    for (let y = 1; y <= 3; y++) {
                        addBlock(x, y, -2, wallMat);
                        addBlock(x, y, 5, wallMat);
                    }
                }
                // 岩浆陷阱
                for (let x = -2; x <= 2; x++) {
                    addBlock(x, 0, 10, lavaMat);
                }
                leftTime = 70;
                playerHP = 100;
            } else if (level === 3) {
                levelTip.innerText = "第 3 关：最终关卡！障碍+岩浆+巡逻怪物！";
                // 密集障碍
                for (let x = -4; x <= 4; x++) {
                    for (let y = 1; y <= 3; y++) {
                        addBlock(x, y, -2, wallMat);
                        addBlock(x, y, 4, wallMat);
                        addBlock(x, y, 9, wallMat);
                    }
                }
                // 大片岩浆
                for (let x = -3; x <= 3; x++) {
                    addBlock(x, 0, 12, lavaMat);
                }
                // 生成巡逻怪物
                spawnMob(-5, 1, 2);
                spawnMob(5, 1, 6);
                leftTime = 60;
                playerHP = 100;
            }
        }

        // 开始倒计时
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameOver) return;
                leftTime--;
                updateStatus();
                if (leftTime <= 0) {
                    gameFail("时间耗尽！");
                }
            }, 1000);
        }

        // 更新状态文字
        function updateStatus() {
            statusText.innerText = `❤️ 血量: ${playerHP} | ⏱ 时间: ${leftTime}`;
        }

        // 扣血逻辑
        function takeDamage(dmg) {
            if (gameOver) return;
            playerHP -= dmg;
            updateStatus();
            if (playerHP <= 0) {
                gameFail("血量归零！");
            }
        }

        // 关卡通关
        function gameWin() {
            gameOver = true;
            clearInterval(timerInterval);
            document.exitPointerLock();
            if (currentLevel >= maxLevel) {
                winText.innerText = "恭喜你通关全部关卡！";
                nextBtn.style.display = "none";
            } else {
                winText.innerText = "即将进入下一关";
                nextBtn.style.display = "inline-block";
            }
            winBox.style.display = "block";
        }

        // 游戏失败
        function gameFail(reason) {
            gameOver = true;
            clearInterval(timerInterval);
            document.exitPointerLock();
            failText.innerText = reason;
            failBox.style.display = "block";
        }

        // 重置当前关卡
        function resetLevel() {
            gameOver = false;
            winBox.style.display = "none";
            failBox.style.display = "none";
            buildLevel(currentLevel);
            startTimer();
            updateStatus();
        }

        // 从头开始游戏
        function resetAll() {
            currentLevel = 1;
            resetLevel();
        }

        // 下一关
        function goNextLevel() {
            currentLevel++;
            resetLevel();
        }

        // 鼠标视角
        document.addEventListener('click', () => {
            if (!gameOver) document.body.requestPointerLock();
        });
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === document.body && !gameOver) {
                mouseX += e.movementX * mouseSens;
                mouseY -= e.movementY * mouseSens;
                mouseY = Math.max(-90, Math.min(90, mouseY));
            }
        });

        // 键盘监听
        document.addEventListener('keydown', e => keys[e.code] = true);
        document.addEventListener('keyup', e => keys[e.code] = false);

        // 挖方块 / 放方块
        document.addEventListener('mousedown', e => {
            if (gameOver) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera({ x: 0, y: 0 }, camera);
            const hit = ray.intersectObjects(Object.values(blocks));
            if (hit.length > 0) {
                const obj = hit[0];
                const x = Math.round(obj.object.position.x);
                const y = Math.round(obj.object.position.y);
                const z = Math.round(obj.object.position.z);
                // 禁止挖岩浆和终点
                if (obj.object.material === lavaMat || obj.object.material === goalMat) return;

                if (e.button === 0) {
                    removeBlock(x, y, z);
                } else if (e.button === 2) {
                    e.preventDefault();
                    const p = hit.point.clone().sub(hit.face.normal.clone().multiplyScalar(0.5));
                    addBlock(Math.round(p.x), Math.round(p.y), Math.round(p.z), grassMat);
                }
            }
        });
        document.addEventListener('contextmenu', e => e.preventDefault());

        // 怪物移动 + 碰撞检测
        function updateMobs() {
            mobs.forEach(mob => {
                const ud = mob.userData;
                mob.position.x += ud.speed;
                // 来回巡逻
                if (Math.abs(mob.position.x - ud.baseX) > 4) {
                    ud.speed *= -1;
                }
                // 玩家碰到怪物扣血
                const dist = Math.hypot(mob.position.x - player.x, mob.position.z - player.z);
                if (dist < 1) {
                    takeDamage(1);
                }
            });
        }

        // 检测岩浆 & 终点
        function checkHazardAndGoal() {
            // 到达终点
            const goalDist = Math.hypot(player.x, player.z - 18);
            if (goalDist < 1.5 && !gameOver) {
                gameWin();
            }
            // 踩到岩浆扣血
            const key = `${Math.round(player.x)},${Math.round(player.y - 1)},${Math.round(player.z)}`;
            if (blocks[key] && blocks[key].material === lavaMat) {
                takeDamage(2);
            }
        }

        // 更新玩家移动
        function updatePlayer() {
            if (gameOver) return;

            camera.rotation.order = 'YXZ';
            camera.rotation.y = mouseX * Math.PI / 180;
            camera.rotation.x = mouseY * Math.PI / 180;

            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            forward.y = 0; right.y = 0;
            forward.normalize(); right.normalize();

            // WASD移动
            if (keys.KeyW) { player.x += forward.x * player.speed; player.z += forward.z * player.speed; }
            if (keys.KeyS) { player.x -= forward.x * player.speed; player.z -= forward.z * player.speed; }
            if (keys.KeyA) { player.x -= right.x * player.speed; player.z -= right.z * player.speed; }
            if (keys.KeyD) { player.x += right.x * player.speed; player.z += right.z * player.speed; }

            // 重力与跳跃
            player.velY -= player.gravity;
            player.y += player.velY;
            if (player.y <= 6) {
                player.y = 6;
                player.velY = 0;
                player.onGround = true;
            } else {
                player.onGround = false;
            }
            if (keys.Space && player.onGround) player.velY = player.jumpPower;

            camera.position.set(player.x, player.y, player.z);

            checkHazardAndGoal();
            updateMobs();
        }

        // 主循环
        function animate() {
            requestAnimationFrame(animate);
            updatePlayer();
            renderer.render(scene, camera);
        }

        // 窗口适配
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 按钮事件
        nextBtn.addEventListener('click', goNextLevel);
        retryBtn.addEventListener('click', resetLevel);
        restartAllBtn.addEventListener('click', resetAll);
        restartAllBtn2.addEventListener('click', resetAll);

        // 游戏初始化
        resetAll();
        animate();
    </script>
</body>
</html>
