<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>像素闯关小游戏</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#222;display:flex;flex-direction:column;align-items:center;padding-top:20px}
        canvas{border:3px solid #fff;background:#71c5cf}
        .info{color:#fff;margin-top:10px;font-size:16px}
    </style>
</head>
<body>
<canvas id="game" width="600" height="400"></canvas>
<div class="info">A/D左右移动 | W跳跃 | 收集黄色星星得分，避开红色刺球</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

//玩家数据
const player = {
    x:50,
    y:300,
    w:30,
    h:30,
    speed:5,
    jumpPower:12,
    gravity:0.5,
    vy:0,
    onGround:false
}

let score = 0;
//按键状态
const keys = {a:false,d:false,w:false}

//平台数组
const platforms = [
    {x:0,y:370,w:600,h:30},
    {x:100,y:300,w:120,h:20},
    {x:280,y:240,w:100,h:20},
    {x:420,y:180,w:130,h:20},
    {x:200,y:120,w:100,h:20}
]

//星星收集物
let stars = [
    {x:150,y:260,size:15,got:false},
    {x:320,y:200,size:15,got:false},
    {x:470,y:140,size:15,got:false},
    {x:240,y:80,size:15,got:false}
]

//危险刺球
let spikes = [
    {x:220,y:340,size:20},
    {x:380,y:340,size:20}
]

//键盘监听
document.addEventListener('keydown',e=>{
    if(e.key === 'a' || e.key === 'A') keys.a = true;
    if(e.key === 'd' || e.key === 'D') keys.d = true;
    if(e.key === 'w' || e.key === 'W') keys.w = true;
})
document.addEventListener('keyup',e=>{
    if(e.key === 'a' || e.key === 'A') keys.a = false;
    if(e.key === 'd' || e.key === 'D') keys.d = false;
    if(e.key === 'w' || e.key === 'W') keys.w = false;
})

//碰撞检测函数
function rectCollision(a,b){
    return a.x < b.x + b.w && a.x+a.w > b.x && a.y < b.y + b.h && a.y+a.h > b.y;
}

//圆形方形碰撞
function circleRect(circle,rect){
    let cx = Math.max(rect.x, Math.min(circle.x, rect.x+rect.w));
    let cy = Math.max(rect.y, Math.min(circle.y, rect.y+rect.h));
    let dx = circle.x - cx;
    let dy = circle.y - cy;
    return (dx*dx + dy*dy) < (circle.size*circle.size);
}

//游戏循环
function loop(){
    //清空画布
    ctx.clearRect(0,0,canvas.width,canvas.height);

    //玩家左右移动
    if(keys.a) player.x -= player.speed;
    if(keys.d) player.x += player.speed;
    //边界限制
    if(player.x <0) player.x=0;
    if(player.x+player.w>canvas.width) player.x=canvas.width-player.w;

    //跳跃+重力
    if(keys.w && player.onGround){
        player.vy = -player.jumpPower;
        player.onGround = false;
    }
    player.vy += player.gravity;
    player.y += player.vy;

    //落地平台检测
    player.onGround = false;
    const playerBox = {x:player.x,y:player.y,w:player.w,h:player.h};
    platforms.forEach(plat=>{
        if(rectCollision(playerBox, plat)){
            //下落踩平台
            if(player.vy>0){
                player.y = plat.y - player.h;
                player.vy = 0;
                player.onGround = true;
            }
        }
    })

    //绘制平台
    ctx.fillStyle = '#654321';
    platforms.forEach(p=>{
        ctx.fillRect(p.x,p.y,p.w,p.h);
    })

    //绘制星星+收集判定
    stars.forEach(star=>{
        if(!star.got){
            ctx.fillStyle='#ffdd00';
            ctx.beginPath();
            ctx.arc(star.x,star.y,star.size,0,Math.PI*2);
            ctx.fill();
            //碰到加分
            if(circleRect(star,playerBox)){
                star.got = true;
                score += 10;
            }
        }
    })

    //绘制刺球+受伤重置
    ctx.fillStyle='#ff2222';
    spikes.forEach(sp=>{
        ctx.beginPath();
        ctx.arc(sp.x,sp.y,sp.size,0,Math.PI*2);
        ctx.fill();
        if(circleRect(sp,playerBox)){
            //撞到刺球回到起点，分数扣5
            player.x=50;
            player.y=300;
            player.vy=0;
            score = Math.max(0,score-5);
        }
    })

    //绘制玩家小人
    ctx.fillStyle='#3388ff';
    ctx.fillRect(player.x,player.y,player.w,player.h);

    //绘制分数文字
    ctx.fillStyle='#fff';
    ctx.font='20px Arial';
    ctx.fillText('分数：'+score,10,30);

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
