<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>吃丹修仙 - 在线修仙游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #0c0a20, #1a1635);
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .title {
            text-align: center;
            font-size: 32px;
            color: #f6d365;
            margin: 20px 0;
            text-shadow: 0 0 10px #f6d365;
        }

        .info {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #6441a5, #2a0845);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin: 5px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #6441a5;
        }

        .btn-yellow {
            background: linear-gradient(90deg, #f7971e, #ffd200);
            color: #000;
            font-weight: bold;
        }

        .btn-red {
            background: linear-gradient(90deg, #e52d27, #b31217);
        }

        .dan-item {
            display: inline-block;
            width: 110px;
            text-align: center;
            background: rgba(255,255,255,0.07);
            border-radius: 8px;
            padding: 10px;
            margin: 6px;
        }

        .log {
            height: 200px;
            overflow-y: auto;
            background: #111;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        .log::-webkit-scrollbar { width: 6px; }
        .log::-webkit-scrollbar-thumb { background: #666; border-radius: 3px; }

        .state {
            color: #00ffcc;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🍀 吃丹修仙</h1>

        <div class="info">
            <div>境界：<span id="realm" class="state">练气一层</span></div>
            <div>修为：<span id="exp">0</span></div>
            <div>战力：<span id="power">100</span></div>
            <div>灵石：<span id="coin">1000</span></div>
        </div>

        <div class="card">
            <h3>🌿 背包丹药</h3>
            <div id="bag" style="margin-top:10px; display:flex; flex-wrap:wrap;"></div>
        </div>

        <div class="card">
            <h3>⚔️ 修仙操作</h3>
            <button class="btn btn-yellow" onclick="getDan()">采集丹药</button>
            <button class="btn" onclick="breakThrough()">突破境界</button>
            <button class="btn" onclick="fight()">挑战怪物</button>
            <button class="btn-red" onclick="resetGame()">重置修仙</button>
        </div>

        <div class="card">
            <h3>📜 修仙日志</h3>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script>
        // 游戏数据
        let game = {
            exp: 0,
            power: 100,
            coin: 1000,
            realm: "练气一层",
            realmLevel: 1,
            bag: {
                "气血丹": 5,
                "灵力丹": 3,
                "聚气丹": 2,
                "清灵丹": 2,
                "倍率丹": 1,
                "洗髓丹": 1,
                "易经丹": 1,
                "金丹丹": 1,
                "元婴丹": 1,
                "九转仙丹": 1,
                "混沌道丹": 0,
                "造化神丹": 0
            }
        };

        // 超多境界
        const realms = [
            "练气一层","练气二层","练气三层","练气四层","练气五层","练气六层","练气七层","练气八层","练气九层","练气大圆满",
            "筑基初期","筑基中期","筑基后期","筑基大圆满",
            "金丹初期","金丹中期","金丹后期","金丹大圆满",
            "元婴初期","元婴中期","元婴后期","元婴大圆满",
            "化神初期","化神中期","化神后期","化神大圆满",
            "炼虚初期","炼虚中期","炼虚后期","炼虚大圆满",
            "合体初期","合体中期","合体后期","合体大圆满",
            "大乘初期","大乘中期","大乘后期","大乘大圆满",
            "渡劫期",
            "地仙",
            "天仙",
            "金仙",
            "太乙金仙",
            "大罗金仙",
            "准圣",
            "圣人",
            "天道",
            "鸿蒙至尊"
        ];

        // 界面刷新
        function refresh() {
            document.getElementById("exp").innerText = game.exp;
            document.getElementById("power").innerText = game.power;
            document.getElementById("coin").innerText = game.coin;
            document.getElementById("realm").innerText = game.realm;
            renderBag();
        }

        // 渲染背包
        function renderBag() {
            let dom = "";
            for (let name in game.bag) {
                let cnt = game.bag[name];
                dom += `
                <div class="dan-item">
                    <div>${name}</div>
                    <div>x${cnt}</div>
                    <button class="btn" style="padding:4px 8px; font-size:12px; margin-top:5px" onclick="useDan('${name}')">服用</button>
                </div>`;
            }
            document.getElementById("bag").innerHTML = dom;
        }

        // 服用丹药
        function useDan(name) {
            if (game.bag[name] <= 0) {
                addLog("❌ 没有" + name + "了！");
                return;
            }
            game.bag[name]--;

            let msg = "";

            switch (name) {
                case "气血丹":
                    game.power += 20;
                    msg = `服用气血丹，战力 +20`;
                    break;
                case "灵力丹":
                    game.exp += 50;
                    msg = `服用灵力丹，修为 +50`;
                    break;
                case "聚气丹":
                    game.exp += 100;
                    game.power += 30;
                    msg = `服用聚气丹，修为+100，战力+30`;
                    break;
                case "清灵丹":
                    game.exp += 180;
                    msg = `服用清灵丹，涤荡灵力，修为 +180`;
                    break;
                case "倍率丹":
                    game.power = Math.floor(game.power * 1.08);
                    msg = "服用倍率丹，战力小幅提升！";
                    break;
                case "洗髓丹":
                    game.power += 120;
                    game.exp += 200;
                    msg = "服用洗髓丹，洗经伐髓，战力大增！";
                    break;
                case "易经丹":
                    game.power += 200;
                    game.exp += 350;
                    msg = "服用易经丹，易经锻骨，修为暴涨！";
                    break;
                case "金丹丹":
                    game.power += 400;
                    game.exp += 600;
                    msg = "服用金丹丹，金丹凝聚，实力飞跃！";
                    break;
                case "元婴丹":
                    game.power += 800;
                    game.exp += 1200;
                    msg = "服用元婴丹，元婴初成，神通大涨！";
                    break;
                case "九转仙丹":
                    game.power += 1500;
                    game.exp += 2000;
                    msg = "服用九转仙丹！神力灌体，修为狂飙！";
                    break;
                case "混沌道丹":
                    game.power = Math.floor(game.power * 1.3);
                    game.exp += 5000;
                    msg = "服用混沌道丹！道基稳固，全属性大幅提升！";
                    break;
                case "造化神丹":
                    game.power = Math.floor(game.power * 1.5);
                    game.exp += 10000;
                    msg = "服用造化神丹！感悟大道，修为直接飙升！";
                    break;
            }

            addLog("✅ " + msg);
            refresh();
        }

        // 采集丹药
        function getDan() {
            const rand = Math.random();
            let get;

            if (rand < 0.25) get = "气血丹";
            else if (rand < 0.45) get = "灵力丹";
            else if (rand < 0.60) get = "聚气丹";
            else if (rand < 0.72) get = "清灵丹";
            else if (rand < 0.80) get = "倍率丹";
            else if (rand < 0.86) get = "洗髓丹";
            else if (rand < 0.90) get = "易经丹";
            else if (rand < 0.93) get = "金丹丹";
            else if (rand < 0.95) get = "元婴丹";
            else if (rand < 0.98) get = "九转仙丹";
            else if (rand < 0.995) get = "混沌道丹";
            else get = "造化神丹";

            game.bag[get]++;
            addLog("🌿 你采集到了【" + get + "】x1");
            refresh();
        }

        // 突破境界
        function breakThrough() {
            let nextLv = game.realmLevel + 1;
            if (nextLv > realms.length) {
                addLog("🎉 你已证道鸿蒙，超脱三界，无敌永恒！");
                return;
            }

            let needExp = game.realmLevel * 120;
            if (game.exp < needExp) {
                addLog(`❌ 突破需要 ${needExp} 修为，你的修为不足！`);
                return;
            }

            game.exp -= needExp;
            game.power += Math.floor(game.power * 0.25);
            game.realmLevel = nextLv;
            game.realm = realms[nextLv - 1];

            addLog(`🎉 突破成功！进入【${game.realm}】，战力大幅提升！`);
            refresh();
        }

        // 挑战怪物
        function fight() {
            let monsterPower = 200 + (game.realmLevel * 100);
            if (game.power >= monsterPower) {
                let winExp = Math.floor(Math.random() * 200) + 100;
                let winCoin = Math.floor(Math.random() * 300) + 200;
                game.exp += winExp;
                game.coin += winCoin;
                addLog(`⚔️ 胜利！获得 ${winExp} 修为，${winCoin} 灵石`);
            } else {
                addLog(`❌ 挑战失败，怪物战力太强了！`);
            }
            refresh();
        }

        // 日志
        function addLog(text) {
            let log = document.getElementById("log");
            log.innerHTML += "[" + new Date().toLocaleTimeString() + "] " + text + "<br>";
            log.scrollTop = log.scrollHeight;
        }

        // 重置
        function resetGame() {
            if (!confirm("确定要重置修仙吗？所有进度清空！")) return;
            game = {
                exp: 0,
                power: 100,
                coin: 1000,
                realm: "练气一层",
                realmLevel: 1,
                bag: {
                    "气血丹": 5,
                    "灵力丹": 3,
                    "聚气丹": 2,
                    "清灵丹": 2,
                    "倍率丹": 1,
                    "洗髓丹": 1,
                    "易经丹": 1,
                    "金丹丹": 1,
                    "元婴丹": 1,
                    "九转仙丹": 1,
                    "混沌道丹": 0,
                    "造化神丹": 0
                }
            };
            document.getElementById("log").innerHTML = "";
            addLog("🔄 修仙已重置");
            refresh();
        }

        // 初始化
        refresh();
        addLog("🎮 欢迎来到吃丹修仙世界，开始你的修仙之路！");
    </script>
</body>
</html>
