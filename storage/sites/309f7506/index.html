<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOJO的奇妙冒险 - 替身之战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .game-title {
            font-size: 42px;
            color: #f7d700;
            text-shadow: 0 0 10px #ff006e, 0 0 20px #f7d700;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        .character-select {
            display: flex;
            gap: 30px;
            margin: 30px 0;
        }

        .character-card {
            width: 180px;
            height: 280px;
            background: #0f3460;
            border: 3px solid #f7d700;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(247, 215, 0, 0.5);
        }

        .character-card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: #ff006e;
            box-shadow: 0 0 25px rgba(255, 0, 110, 0.7);
        }

        .jojo-img {
            width: 140px;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .char-name {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }

        .battle-area {
            width: 90%;
            height: 300px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #ff006e;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            position: relative;
        }

        .stand-attack {
            position: absolute;
            font-size: 60px;
            font-weight: bold;
            color: #f7d700;
            text-shadow: 0 0 15px #ff006e;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .ora {
            left: 20%;
        }

        .muda {
            right: 20%;
        }

        .stand-attack.active {
            animation: standPulse 1s ease-out forwards;
        }

        @keyframes standPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0; }
        }

        .attack-btn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            background: #ff006e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            display: none;
        }

        .attack-btn:hover {
            background: #f7d700;
            color: #000;
            box-shadow: 0 0 15px #f7d700;
        }

        .battle-text {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #f7d700;
            text-shadow: 0 0 10px #ff006e;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            .game-title {
                font-size: 28px;
            }
            .character-select {
                flex-direction: column;
                gap: 20px;
            }
            .character-card {
                width: 140px;
                height: 220px;
            }
            .jojo-img {
                width: 100px;
                height: 150px;
            }
            .battle-area {
                height: 200px;
                padding: 0 20px;
            }
            .stand-attack {
                font-size: 40px;
            }
            .battle-text {
                font-size: 18px;
                white-space: normal;
                text-align: center;
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">JOJO的奇妙冒险 ✦ 替身之战</h1>
        
        <div class="character-select" id="charSelect">
            <div class="character-card" data-char="空条承太郎" data-stand="白金之星" data-attack="ORA！">
                <img class="jojo-img" src="https://img1.baidu.com/it/u=889655134,2534130904&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=751" alt="空条承太郎" loading="lazy">
                <div class="char-name">空条承太郎</div>
            </div>
            <div class="character-card" data-char="迪奥·布兰度" data-stand="世界" data-attack="MUDA！">
                <img class="jojo-img" src="https://img0.baidu.com/it/u=3000592201,3651160104&fm=253&fmt=auto&app=120&f=JPEG?w=500&h=745" alt="迪奥·布兰度" loading="lazy">
                <div class="char-name">迪奥·布兰度</div>
            </div>
        </div>

        <div class="battle-area" id="battleArea">
            <div class="battle-text" id="battleText">选择角色开始战斗！</div>
            <div class="stand-attack ora" id="ora">ORA！</div>
            <div class="stand-attack muda" id="muda">MUDA！</div>
        </div>

        <button class="attack-btn" id="attackBtn">替身攻击！</button>
    </div>

    <script>
        (function() {
            const charSelect = document.getElementById('charSelect');
            const battleArea = document.getElementById('battleArea');
            const attackBtn = document.getElementById('attackBtn');
            const battleText = document.getElementById('battleText');
            const oraEl = document.getElementById('ora');
            const mudaEl = document.getElementById('muda');

            let selectedChar = '';
            let selectedStand = '';
            let attackText = '';

            function selectCharacter(name, stand, attack) {
                selectedChar = name;
                selectedStand = stand;
                attackText = attack;

                charSelect.style.display = 'none';
                battleArea.style.display = 'flex';
                attackBtn.style.display = 'block';
                battleText.textContent = name + ' - ' + stand + ' 已就绪！';
            }

            function attack() {
                if (!attackText) return;

                const targetEl = attackText === 'ORA！' ? oraEl : mudaEl;

                targetEl.classList.remove('active');
                void targetEl.offsetWidth;
                targetEl.classList.add('active');

                battleText.textContent = selectedStand + '：' + attackText;

                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.15);
                } catch (e) {
                    // 静默降级
                }
            }

            charSelect.addEventListener('click', function(e) {
                const card = e.target.closest('.character-card');
                if (!card) return;
                const name = card.dataset.char;
                const stand = card.dataset.stand;
                const attack = card.dataset.attack;
                if (name && stand && attack) {
                    selectCharacter(name, stand, attack);
                }
            });

            attackBtn.addEventListener('click', attack);
        })();
    </script>
</body>
</html>
