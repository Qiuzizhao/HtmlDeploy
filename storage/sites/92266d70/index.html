<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>璀璨星空：摘星星小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", system-ui, sans-serif;
            /* 禁止手机端双击缩放和长按选中文本 */
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            overflow: hidden;
            height: 100vh;
            background: linear-gradient(160deg, #0c0c36 0%, #151042 40%, #060220 100%);
            position: relative;
        }

        /* 背景静态繁星纹理 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff90, transparent),
                radial-gradient(1px 1px at 60px 120px, #fff, transparent),
                radial-gradient(2px 2px at 130px 80px, #ffeebb, transparent),
                radial-gradient(1px 1px at 200px 160px, #fff, transparent),
                radial-gradient(2px 2px at 300px 240px, #fffdd0, transparent);
            background-repeat: repeat;
            background-size: 350px 350px;
            opacity: 0.4;
            z-index: 0;
        }

        /* 顶部玻璃拟态信息栏 */
        .info-bar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: min(92%, 700px);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 999px;
            color: #fff;
            font-size: 18px;
            z-index: 999;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .info-item span {
            color: #ffdd70;
            font-weight: bold;
            font-size: 22px;
            transition: all 0.2s;
            display: inline-block;
        }
        /* 倒计时紧张状态动画 */
        .time-hurry {
            color: #ff4a4a !important;
            animation: shake 0.1s infinite alternate;
            text-shadow: 0 0 10px #ff4a4a;
        }
        @keyframes shake {
            0% { transform: scale(1.2) rotate(-3deg); }
            100% { transform: scale(1.2) rotate(3deg); }
        }

        /* 渐变按钮 */
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(90deg, #526aff, #9b59ff);
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(100, 80, 255, 0.35);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(100, 80, 255, 0.5);
            background: linear-gradient(90deg, #647aff, #aa6cff);
        }
        .btn:active {
            transform: translateY(0);
        }

        /* 基础星星容器 */
        .star {
            position: absolute;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            z-index: 10;
            will-change: transform, opacity;
        }
        .star:hover {
            transform: scale(1.3);
        }

        /* 1. 金色普通星 +1分 */
        .star-gold {
            font-size: 38px;
            color: #fff890;
            filter: drop-shadow(0 0 12px #ffe640);
            animation: twinkle 1.2s infinite alternate ease-in-out;
        }
        /* 2. 银色疾速星 +3分，闪烁更快、存活短 */
        .star-silver {
            font-size: 28px;
            color: #ffffff;
            filter: drop-shadow(0 0 15px #ffffff);
            animation: twinkle 0.5s infinite alternate ease-in-out;
        }
        /* 3. 红色危险星 -5分，爆炸图标，脉冲放大 */
        .star-danger {
            font-size: 34px;
            color: #ff5252;
            filter: drop-shadow(0 0 12px #ff1a1a);
            animation: pulse 0.8s infinite alternate ease-in-out;
        }

        @keyframes twinkle {
            0% { opacity: 0.4; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.1); }
        }
        @keyframes pulse {
            0% { transform: scale(0.85); filter: drop-shadow(0 0 8px #ff1a1a); }
            100% { transform: scale(1.2); filter: drop-shadow(0 0 18px #ff1a1a); }
        }

        /* 粒子爆破特效微粒 */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 99;
            animation: explode 0.6s forwards cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        /* 加分/扣分上浮文字 */
        .score-popup {
            position: absolute;
            font-weight: bold;
            font-size: 30px;
            pointer-events: none;
            animation: floatUp 0.8s forwards ease-out;
            z-index: 100;
        }
        .popup-positive {
            color: #ffdd00;
            text-shadow: 0 0 8px #ffdd00;
        }
        .popup-negative {
            color: #ff3333;
            text-shadow: 0 0 8px #ff3333;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1.2); }
            100% { opacity: 0; transform: translateY(-70px) scale(0.7); }
        }

        /* 游戏结束弹窗 玻璃质感 */
        .game-over {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            gap: 32px;
        }
        .modal-card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.18);
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            width: min(85%, 400px);
        }
        .modal-title {
            font-size: 36px;
            margin-bottom: 16px;
            background: linear-gradient(90deg, #ffe670, #ffb850);
            -webkit-background-clip: text;
            color: transparent;
            font-weight: bold;
        }
        .modal-score {
            font-size: 24px;
            margin-bottom: 24px;
        }
        .modal-score span {
            font-size: 38px;
            color: #ffdd70;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 221, 112, 0.5);
        }
    </style>
</head>
<body>
    <!-- 顶部状态栏 -->
    <div class="info-bar">
        <div class="info-item">⭐ 得分：<span id="score">0</span></div>
        <div class="info-item">⏱ 时间：<span id="time">60</span>s</div>
        <button class="btn" id="restartBtn">重新开局</button>
    </div>

    <!-- 结算弹窗 -->
    <div class="game-over" id="overModal">
        <div class="modal-card">
            <div class="modal-title">✨ 时间到 ✨</div>
            <div class="modal-score">本次得分：<span id="finalScore">0</span> 分</div>
            <button class="btn" id="playAgain">再来一局</button>
        </div>
    </div>

    <script>
        // 全局游戏变量
        let score = 0;
        let timeLeft = 60;
        let timer = null;
        let starInterval = null;
        let gameActive = false;

        // DOM元素缓存
        const container = document.body;
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const overModal = document.getElementById('overModal');
        const finalScoreEl = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const playAgainBtn = document.getElementById('playAgain');

        // 初始化/重置游戏
        function initGame() {
            score = 0;
            timeLeft = 60;
            gameActive = true;
            scoreEl.textContent = score;
            timeEl.textContent = timeLeft;
            timeEl.classList.remove('time-hurry');
            overModal.style.display = 'none';
            
            // 清空页面所有星星、粒子、加分文字
            document.querySelectorAll('.star, .score-popup, .particle').forEach(el => el.remove());

            // 清除旧定时器
            clearInterval(timer);
            clearInterval(starInterval);

            // 倒计时计时器
            timer = setInterval(() => {
                timeLeft--;
                timeEl.textContent = timeLeft;

                // 剩余10秒红色抖动警告
                if (timeLeft <= 10) {
                    timeEl.classList.add('time-hurry');
                }

                if (timeLeft <= 0) gameEnd();
            }, 1000);

            // 每550ms生成一颗星星
            starInterval = setInterval(createStar, 550);
        }

        // 随机生成三种星星
        function createStar() {
            if (!gameActive) return;

            const star = document.createElement('div');
            star.className = 'star';
            
            // 概率分配：70%金星 +1，15%银星 +3，15%红星 -5
            const rand = Math.random();
            let starType;

            if (rand > 0.85) {
                // 危险红星
                starType = { type: 'danger', text: '💥', class: 'star-danger', duration: 4000 };
            } else if (rand > 0.70) {
                // 高分银星
                starType = { type: 'silver', text: '✨', class: 'star-silver', duration: 2500 };
            } else {
                // 普通金星
                starType = { type: 'gold', text: '★', class: 'star-gold', duration: 5500 };
            }

            star.classList.add(starType.class);
            star.innerHTML = starType.text;
            
            // 坐标限制，避免超出屏幕、遮挡顶部UI
            const size = 50; 
            const maxX = window.innerWidth - size;
            const maxY = window.innerHeight - size;
            const minY = 90;

            const x = Math.random() * Math.max(maxX, 0);
            const y = minY + Math.random() * Math.max(maxY - minY, 0);
            
            star.style.left = x + 'px';
            star.style.top = y + 'px';

            // 点击星星事件（pointerdown解决移动端300ms延迟）
            star.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                const centerX = x + size / 2;
                const centerY = y + size / 2;
                handleStarClick(starType.type, centerX, centerY);
                star.remove();
            });

            container.appendChild(star);

            // 超时自动消失
            setTimeout(() => {
                if (star.parentElement) star.remove();
            }, starType.duration);
        }

        // 处理星星点击计分逻辑
        function handleStarClick(type, cx, cy) {
            let points = 0;
            let burstColor = '#ffdd00';

            switch(type) {
                case 'gold':
                    points = 1;
                    burstColor = '#fff890';
                    break;
                case 'silver':
                    points = 3;
                    burstColor = '#ffffff';
                    break;
                case 'danger':
                    points = -5;
                    burstColor = '#ff4a4a';
                    break;
            }

            score += points;
            // 最低分数限制0，不出现负分
            if (score < 0) score = 0; 
            scoreEl.textContent = score;

            // 弹出加减分文字 + 粒子爆炸
            showPopup(cx, cy, points);
            createBurst(cx, cy, burstColor);
        }

        // 星星爆炸粒子特效
        function createBurst(x, y, color) {
            const particleCount = 10;
            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                
                const size = Math.random() * 6 + 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.backgroundColor = color;
                p.style.boxShadow = `0 0 8px ${color}`;
                
                p.style.left = x + 'px';
                p.style.top = y + 'px';

                // 随机散开角度距离
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 60 + 40;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                
                p.style.setProperty('--dx', dx + 'px');
                p.style.setProperty('--dy', dy + 'px');

                container.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        // 浮动加分文字
        function showPopup(x, y, points) {
            const popup = document.createElement('div');
            popup.className = 'score-popup ' + (points >= 0 ? 'popup-positive' : 'popup-negative');
            popup.textContent = points >= 0 ? `+${points}` : `${points}`;
            popup.style.left = (x - 15) + 'px';
            popup.style.top = (y - 20) + 'px';
            
            container.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        // 游戏结束逻辑
        function gameEnd() {
            gameActive = false;
            clearInterval(timer);
            clearInterval(starInterval);
            finalScoreEl.textContent = score;
            overModal.style.display = 'flex';
        }

        // 按钮绑定
        restartBtn.addEventListener('click', initGame);
        playAgainBtn.addEventListener('click', initGame);

        // 页面加载自动开局
        window.onload = initGame;

        // 窗口缩放自动适配
        window.addEventListener('resize', () => {});
    </script>
</body>
</html>
