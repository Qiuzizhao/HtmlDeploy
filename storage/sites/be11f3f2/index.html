<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>和白鹿聊天小屋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #ffe6ef, #fce4f0);
            padding: 30px;
        }
        .main-box {
            width: 750px;
            margin: 0 auto;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 5px 25px rgba(230, 120, 160, 0.25);
            overflow: hidden;
        }
        .head {
            background: #f299bb;
            text-align: center;
            padding: 18px;
            color: white;
        }
        .head h1 {
            font-size: 26px;
            letter-spacing: 2px;
        }
        .favor-box {
            font-size: 17px;
            margin-top: 6px;
        }
        #favor {
            font-weight: bold;
            font-size: 22px;
        }
        .avatar-area {
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .avatar {
            width: 220px;
            height: 280px;
            border-radius: 14px;
            overflow: hidden;
            border: 3px solid #f299bb;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .chat-window {
            width: 90%;
            height: 320px;
            margin: 0 auto;
            background: #fdf2f7;
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .msg-self {
            text-align: right;
            margin: 10px 0;
        }
        .msg-self span {
            display: inline-block;
            background: #f299bb;
            color: white;
            padding: 8px 14px;
            border-radius: 16px 4px 16px 16px;
            max-width: 70%;
            line-height: 1.5;
        }
        .msg-bailu {
            text-align: left;
            margin: 10px 0;
        }
        .msg-bailu span {
            display: inline-block;
            background: #e8e8e8;
            color: #333;
            padding: 8px 14px;
            border-radius: 4px 16px 16px 16px;
            max-width: 70%;
            line-height: 1.5;
        }
        .input-area {
            display: flex;
            gap: 10px;
            padding: 0 20px 25px;
        }
        #input-text {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #f299bb;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 0 22px;
            background: #f299bb;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        button:hover {
            background: #e078a1;
        }
        .reset-btn {
            display: block;
            margin: 12px auto 30px;
            background: #c45e86;
        }
        .happy-anim {
            animation: heartBeat 0.7s ease-in-out;
        }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="main-box">
        <div class="head">
            <h1>和白鹿线上聊天小屋</h1>
            <div class="favor-box">当前好感度：<span id="favor">0</span> / 100</div>
        </div>
        <div class="avatar-area">
            <div class="avatar">
                <img id="bailu-img" src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/916a702c9c3e4611902d49f66d30d011~tplv-a9rns2rl98-image.image">
            </div>
        </div>
        <div class="chat-window" id="chat-box">
            <div class="msg-bailu">
                <span>哈喽～我是白鹿！很高兴认识你，快来和我聊聊天吧！</span>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="input-text" placeholder="输入想对白鹿说的话，比如夸她、聊剧、日常问候...">
            <button onclick="sendMsg()">发送</button>
        </div>
        <button class="reset-btn" onclick="resetGame()">重置聊天&清空好感</button>
    </div>

    <script>
        // 全局变量
        let favor = 0;
        const maxFavor = 100;
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('input-text');
        const favorText = document.getElementById('favor');
        const bailuImg = document.getElementById('bailu-img');
        // 三种形象：普通、开心、满好感亲密
        const imgList = {
            normal: "https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/916a702c9c3e4611902d49f66d30d011~tplv-a9rns2rl98-image.image",
            happy: "https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/208f4168f66c4239946277d32747f867~tplv-a9rns2rl98-image.image",
            fullLove: "https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/4d083c61f94d49739d3070331d210d54~tplv-a9rns2rl98-image.image"
        }

        // 白鹿回复库，关键词匹配+好感增减
        const replyLib = [
            {
                key: ["你好", "哈喽", "嗨", "在吗"],
                reply: "我在呢！今天过得怎么样呀？",
                addFavor: 3
            },
            {
                key: ["好看", "漂亮", "好美", "颜值高"],
                reply: "呜呜谢谢夸奖！被你夸得有点害羞啦～",
                addFavor: 12
            },
            {
                key: ["长月烬明", "黎苏苏", "澹台烬", "沧九旻"],
                reply: "没想到你也看过长月！苏苏真的是我很用心塑造的角色，很高兴你喜欢～",
                addFavor: 15
            },
            {
                key: ["宁安如梦", "姜雪宁", "张遮", "燕临"],
                reply: "雪宁的一生跌宕起伏，能被大家记住真的很开心，你最喜欢剧中哪段剧情？",
                addFavor: 14
            },
            {
                key: ["综艺", "奔跑吧", "快乐大本营"],
                reply: "录综艺的时候超放松！玩游戏虽然总输但特别快乐哈哈",
                addFavor: 8
            },
            {
                key: ["喜欢你", "我爱你", "超爱你", "粉你"],
                reply: "天呐，听到你这么说我心里暖暖的，我也会一直好好拍戏不辜负你的喜欢！",
                addFavor: 25
            },
            {
                key: "唱歌",
                reply: "偶尔会哼歌啦，唱功还有进步空间，以后有机会唱给大家听～",
                addFavor: 7
            },
            {
                key: "辛苦", "注意休息", "别太累", "好好照顾自己",
                reply: "谢谢你的关心，我会照顾好自己的，你也要好好生活哦！",
                addFavor: 18
            },
            {
                key: ["不好看", "一般", "演得差"],
                reply: "收到你的建议啦，我会继续打磨演技，努力变得更好的。",
                addFavor: -10
            }
        ]
        // 通用兜底回复
        const defaultReply = [
            "这个话题好有意思，再多和我说说吧～",
            "原来是这样！我第一次听到这个说法耶",
            "哈哈，你的想法好特别，我记住啦",
            "嗯嗯，我认真听着呢，继续聊～"
        ]

        // 更新好感与人物图片
        function updateState() {
            favorText.innerText = favor;
            bailuImg.classList.remove("happy-anim");
            if (favor >= maxFavor) {
                bailuImg.src = imgList.fullLove;
            } else if (favor >= 60) {
                bailuImg.src = imgList.happy;
                bailuImg.classList.add("happy-anim");
            } else {
                bailuImg.src = imgList.normal;
            }
        }

        // 发送消息逻辑
        function sendMsg() {
            let text = input.value.trim();
            if (!text) {
                alert("请输入内容再发送！");
                return;
            }
            // 渲染用户消息
            chatBox.innerHTML += `<div class="msg-self"><span>${text}</span></div>`;
            input.value = "";
            // 匹配回复
            let matchReply = "";
            let addNum = 0;
            let lowerText = text.toLowerCase();
            for (let item of replyLib) {
                let isMatch = false;
                if (Array.isArray(item.key)) {
                    for (let k of item.key) {
                        if (lowerText.includes(k)) {
                            isMatch = true;
                            break;
                        }
                    }
                } else {
                    if (lowerText.includes(item.key)) isMatch = true;
                }
                if (isMatch) {
                    matchReply = item.reply;
                    addNum = item.addFavor;
                    break;
                }
            }
            // 无匹配随机兜底
            if (!matchReply) {
                let randomIdx = Math.floor(Math.random() * defaultReply.length);
                matchReply = defaultReply[randomIdx];
            }
            // 增减好感，限制区间
            favor += addNum;
            if (favor < 0) favor = 0;
            if (favor > maxFavor) favor = maxFavor;
            // 延迟模拟白鹿打字效果
            setTimeout(() => {
                chatBox.innerHTML += `<div class="msg-bailu"><span>${matchReply}</span></div>`;
                // 满好感专属剧情弹窗
                if (favor >= maxFavor) {
                    alert("✨好感度已满！白鹿偷偷对你说：以后要常来找我聊天，我们一直做很好的朋友！");
                }
                // 滚动到底部
                chatBox.scrollTop = chatBox.scrollHeight;
                updateState();
            }, 600);
        }

        // 重置游戏
        function resetGame() {
            favor = 0;
            chatBox.innerHTML = `<div class="msg-bailu"><span>哈喽～我是白鹿！很高兴认识你，快来和我聊聊天吧！</span>`;
            updateState();
        }

        // 回车快捷发送
        input.addEventListener("keydown", function (e) {
            if (e.key === "Enter") sendMsg();
        })
        updateState();
    </script>
</body>
</html>
