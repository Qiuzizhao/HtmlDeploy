<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>浮木漂流·10分钟一岛·签到7天送百万</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            touch-action: none;
            background-color: #0a2f3a;
        }
        .game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }
        .stats-bar {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 8px;
        }
        .stat-card {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-left: 3px solid #ffaa55;
            color: #f5e7d9;
            font-weight: bold;
            pointer-events: auto;
        }
        .stat-value {
            color: #ffcc77;
            font-size: 18px;
        }
        .hp-bar-bg {
            width: 70px;
            background: #4a2a1a;
            border-radius: 20px;
            overflow: hidden;
            height: 6px;
        }
        .hp-bar-fill {
            width: 100%;
            height: 100%;
            background: #e85d3a;
            border-radius: 20px;
        }
        .action-buttons {
            position: absolute;
            bottom: 20px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: auto;
            z-index: 400;
        }
        .btn {
            background: #2e3b2c;
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            backdrop-filter: blur(4px);
            background: rgba(30, 45, 35, 0.95);
            border: 1px solid #c97e3a;
            transition: transform 0.08s linear;
            cursor: pointer;
            width: 110px;
            text-align: center;
        }
        .btn:active { transform: scale(0.96); }
        .btn-gold { background: rgba(212, 165, 45, 0.95); border-color: #ffdf8c; color: #2a2410; }
        .shop-panel {
            position: absolute;
            left: 15px;
            bottom: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(16px);
            border-radius: 30px;
            padding: 12px 16px;
            width: 210px;
            border: 1px solid #ffaa66;
            pointer-events: auto;
            transition: 0.2s;
            z-index: 400;
        }
        .shop-title {
            font-size: 16px;
            text-align: center;
            margin-bottom: 8px;
            color: #ffdd99;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
            font-size: 12px;
            border-bottom: 1px solid #5a4a3a;
            padding: 4px 0;
        }
        .shop-buy {
            background: #d4a52d;
            border: none;
            border-radius: 40px;
            padding: 4px 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .event-toast {
            position: absolute;
            bottom: 35%;
            left: 10%;
            right: 10%;
            background: #1e2a1cd9;
            border-radius: 40px;
            padding: 14px;
            text-align: center;
            color: #ffd966;
            backdrop-filter: blur(12px);
            border: 1px solid #ffaa55;
            transition: opacity 0.25s;
            pointer-events: none;
            z-index: 200;
            font-weight: bold;
        }
        .gameover-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(12px);
            padding: 24px 28px;
            border-radius: 48px;
            text-align: center;
            color: #ffebc2;
            border: 2px solid #ffaa55;
            pointer-events: auto;
            z-index: 500;
            min-width: 240px;
        }
        .combat-panel {
            position: absolute;
            bottom: 40%;
            left: 20%;
            right: 20%;
            background: #1a2a1ad9;
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(16px);
            border: 2px solid #ff8866;
            pointer-events: auto;
            z-index: 450;
        }
        .combat-btn {
            background: #cc5533;
            margin: 8px;
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            color: white;
        }
        .timer-text {
            position: absolute;
            top: 70px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 13px;
            pointer-events: none;
            z-index: 400;
            font-weight: bold;
            color: #ffdd99;
        }
        @media (max-width: 600px) {
            .stat-card { font-size: 10px; padding: 4px 8px; }
            .btn { padding: 7px 10px; font-size: 11px; width: 95px; }
            .shop-panel { width: 180px; }
        }
    </style>
</head>
<body>
<div class="game-ui">
    <div class="stats-bar">
        <div class="stat-card">🪵 <span class="stat-value" id="woodAmount">0</span></div>
        <div class="stat-card">💰 <span class="stat-value" id="goldAmount">0</span></div>
        <div class="stat-card">⚔️ <span class="stat-value" id="attackPower">1</span></div>
        <div class="stat-card">❤️ <span id="raftHp">100</span>%<div class="hp-bar-bg"><div class="hp-bar-fill" id="hpFill" style="width:100%"></div></div></div>
        <div class="stat-card">🏆 <span id="killCount">0</span></div>
    </div>
    <div class="timer-text" id="islandTimer">🏝️ 剩余 10:00</div>
    <div class="shop-panel">
        <div class="shop-title">🏪 漂流商店</div>
        <div class="shop-item">🪵 修复浮木 (+30耐久) <button class="shop-buy" id="repairBtn">20🪵</button></div>
        <div class="shop-item">⚔️ 锋利鱼叉 (+1攻击) <button class="shop-buy" id="atkUpBtn">50💰</button></div>
        <div class="shop-item">🛡️ 木甲术 (最大耐久+20) <button class="shop-buy" id="maxHpBtn">80💰</button></div>
        <div class="shop-item">📦 浮木礼包 (+100🪵) <button class="shop-buy" id="woodPackBtn">30💰</button></div>
    </div>
    <div class="action-buttons">
        <button class="btn" id="signBtn">📅 签到</button>
        <button class="btn btn-gold" id="resetBtn">🔄 重来</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
    
    // ---------- 核心数据 ----------
    let wood = 200;
    let gold = 50;
    let attack = 2;
    let raftHealth = 100;
    let maxRaftHealth = 100;
    let totalKills = 0;
    let gameActive = true;
    
    let currentNPC = null;
    let combatActive = false;
    
    // 时间系统: 现实1秒 = 游戏1分钟
    // 岛屿间隔改为现实10分钟 = 600秒
    let islandTimerSeconds = 600;          // 剩余现实秒数
    const ISLAND_REAL_SECONDS = 600;        // 10分钟
    
    // 漂浮浮木生成间隔: 游戏内每2分钟生成一个 (现实2秒)
    let minutesSinceLastLog = 0;
    const LOG_SPAWN_INTERVAL_MINUTES = 2;
    
    // NPC遭遇间隔: 游戏内每12~27分钟随机一次 (现实12~27秒)
    let minutesSinceLastNPC = 0;
    let nextNPCMinutes = 12 + Math.random() * 15;
    
    let floatingLogs = [];
    const MAX_LOGS = 8;
    
    // 签到系统 (连续7天送100万浮木)
    let lastSignDate = "";
    let signStreak = 0;
    let todaySigned = false;
    
    // 3D 场景
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x052c3a);
    scene.fog = new THREE.FogExp2(0x052c3a, 0.008);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.set(6, 5, 9);
    camera.lookAt(0, 0, 0);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);
    
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 1.0;
    controls.zoomSpeed = 1.0;
    controls.enableZoom = true;
    controls.enablePan = false;
    controls.target.set(0, 0.5, 0);
    
    // 光照
    const ambient = new THREE.AmbientLight(0x446688);
    scene.add(ambient);
    const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    mainLight.position.set(5, 12, 6);
    mainLight.castShadow = true;
    scene.add(mainLight);
    const fillLight = new THREE.PointLight(0x88aacc, 0.5);
    fillLight.position.set(-2, 3, 4);
    scene.add(fillLight);
    const backLight = new THREE.PointLight(0xffaa66, 0.3);
    backLight.position.set(0, 2, -3);
    scene.add(backLight);
    
    // 海洋
    const oceanMat = new THREE.MeshStandardMaterial({ color: 0x3a86bd, roughness: 0.3, metalness: 0.7, transparent: true, opacity: 0.92 });
    const oceanPlane = new THREE.Mesh(new THREE.PlaneGeometry(28, 28), oceanMat);
    oceanPlane.rotation.x = -Math.PI / 2;
    oceanPlane.position.y = -0.55;
    oceanPlane.receiveShadow = true;
    scene.add(oceanPlane);
    
    // 浮木
    const raftGroup = new THREE.Group();
    const woodMat = new THREE.MeshStandardMaterial({ color: 0xbc8f5a, roughness: 0.8 });
    const baseWood = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.35, 3.0), woodMat);
    baseWood.castShadow = true;
    raftGroup.add(baseWood);
    for (let i = -1; i <= 1; i++) {
        const side = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.25, 3.2), woodMat);
        side.position.set(i * 1.3, 0.15, 0);
        side.castShadow = true;
        raftGroup.add(side);
        const sideZ = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.25, 0.3), woodMat);
        sideZ.position.set(0, 0.15, i * 1.3);
        sideZ.castShadow = true;
        raftGroup.add(sideZ);
    }
    const fireGlow = new THREE.PointLight(0xff6600, 0.6, 5);
    fireGlow.position.set(0, 0.5, 0);
    raftGroup.add(fireGlow);
    raftGroup.position.y = -0.2;
    scene.add(raftGroup);
    
    // 小人
    const characterGroup = new THREE.Group();
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4a90e2, roughness: 0.3 });
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.6, 8), bodyMat);
    body.castShadow = true;
    body.position.y = 0.3;
    characterGroup.add(body);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.2 });
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 24, 24), headMat);
    head.position.y = 0.7;
    head.castShadow = true;
    characterGroup.add(head);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), eyeMat);
    leftEye.position.set(-0.12, 0.78, 0.32);
    const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), eyeMat);
    rightEye.position.set(0.12, 0.78, 0.32);
    const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
    const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), pupilMat);
    leftPupil.position.set(0, 0, 0.05);
    const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), pupilMat);
    rightPupil.position.set(0, 0, 0.05);
    leftEye.add(leftPupil);
    rightEye.add(rightPupil);
    characterGroup.add(leftEye);
    characterGroup.add(rightEye);
    const hatMat = new THREE.MeshStandardMaterial({ color: 0xaa7a4c });
    const hatBase = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.45, 0.12, 8), hatMat);
    hatBase.position.y = 0.92;
    hatBase.castShadow = true;
    characterGroup.add(hatBase);
    const hatTop = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.28, 0.1, 8), hatMat);
    hatTop.position.y = 0.99;
    hatTop.castShadow = true;
    characterGroup.add(hatTop);
    const armMat = new THREE.MeshStandardMaterial({ color: 0x4a90e2 });
    const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.5, 6), armMat);
    leftArm.position.set(-0.45, 0.55, 0);
    leftArm.rotation.z = 0.4;
    leftArm.rotation.x = 0.2;
    leftArm.castShadow = true;
    const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.5, 6), armMat);
    rightArm.position.set(0.45, 0.55, 0);
    rightArm.rotation.z = -0.4;
    rightArm.rotation.x = -0.2;
    rightArm.castShadow = true;
    characterGroup.add(leftArm);
    characterGroup.add(rightArm);
    characterGroup.position.y = -0.1;
    characterGroup.castShadow = true;
    raftGroup.add(characterGroup);
    
    let timeAcc = 0;
    
    // 漂浮浮木
    function createFloatingLogMesh(x, z) {
        const logMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6c, roughness: 0.6 });
        const logMesh = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.2, 0.45), logMat);
        logMesh.position.set(x, 0.05, z);
        logMesh.castShadow = true;
        scene.add(logMesh);
        return logMesh;
    }
    
    function spawnFloatingLog() {
        if (!gameActive) return;
        if (floatingLogs.length >= MAX_LOGS) return;
        const angle = Math.random() * Math.PI * 2;
        const radius = 2.5 + Math.random() * 3.5;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const mesh = createFloatingLogMesh(x, z);
        const woodValue = 8 + Math.floor(Math.random() * 12);
        floatingLogs.push({ mesh, value: woodValue, x, z });
    }
    
    function collectFloatingLog(logObj) {
        if (!gameActive) return;
        wood += logObj.value;
        scene.remove(logObj.mesh);
        const idx = floatingLogs.indexOf(logObj);
        if (idx !== -1) floatingLogs.splice(idx, 1);
        updateUI();
        saveGame();
        showEventMessage(`+${logObj.value} 浮木 🪵`, true);
    }
    
    function updateFloatingLogs(deltaMinutes) {
        for (let log of floatingLogs) {
            log.mesh.position.x += (Math.sin(Date.now() * 0.8 + log.mesh.position.z) * 0.008);
            log.mesh.position.z += (Math.cos(Date.now() * 0.6 + log.mesh.position.x) * 0.008);
            log.mesh.rotation.y += 0.02;
            if (Math.abs(log.mesh.position.x) > 6) log.mesh.position.x *= 0.99;
            if (Math.abs(log.mesh.position.z) > 6) log.mesh.position.z *= 0.99;
        }
    }
    
    let npcMesh = null;
    function createNPCModel(x, z) {
        const group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({ color: 0x88aa66 }));
        body.castShadow = true;
        group.add(body);
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshStandardMaterial({ color: 0xddbb88 }));
        head.position.y = 0.7;
        group.add(head);
        group.position.set(x, -0.1, z);
        scene.add(group);
        return group;
    }
    
    function removeNPC() {
        if (npcMesh) {
            scene.remove(npcMesh);
            npcMesh = null;
        }
        currentNPC = null;
    }
    
    function showEventMessage(msg, isGood = true) {
        let toast = document.querySelector('.event-toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.className = 'event-toast';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.backgroundColor = isGood ? '#1e3a2ad9' : '#6a2a2ad9';
        toast.style.opacity = '1';
        setTimeout(() => { if(toast) toast.style.opacity = '0'; }, 2500);
    }
    
    function updateUI() {
        document.getElementById('woodAmount').innerText = Math.floor(wood);
        document.getElementById('goldAmount').innerText = Math.floor(gold);
        document.getElementById('attackPower').innerText = attack;
        const hpPercent = (raftHealth / maxRaftHealth) * 100;
        document.getElementById('raftHp').innerHTML = `${Math.floor(raftHealth)}%`;
        document.getElementById('hpFill').style.width = `${hpPercent}%`;
        document.getElementById('killCount').innerText = totalKills;
        // 显示剩余分钟:秒
        const mins = Math.floor(islandTimerSeconds / 60);
        const secs = Math.floor(islandTimerSeconds % 60);
        document.getElementById('islandTimer').innerHTML = `🏝️ 剩余 ${mins}:${secs < 10 ? '0'+secs : secs}`;
    }
    
    function damageRaft(amount) {
        if (!gameActive) return;
        raftHealth = Math.max(0, raftHealth - amount);
        updateUI();
        raftGroup.position.y = -0.28;
        setTimeout(() => { if(raftGroup) raftGroup.position.y = -0.2; }, 150);
        if (raftHealth <= 0) {
            gameActive = false;
            showGameOver();
        }
    }
    
    function repairRaft() {
        if (wood >= 20 && raftHealth < maxRaftHealth) {
            wood -= 20;
            raftHealth = Math.min(maxRaftHealth, raftHealth + 30);
            updateUI();
            saveGame();
            showEventMessage("🪵 修复浮木 +30耐久", true);
        } else if (raftHealth >= maxRaftHealth) {
            showEventMessage("浮木已完整", false);
        } else {
            showEventMessage("木材不足20", false);
        }
    }
    
    function buyAttack() {
        if (gold >= 50) {
            gold -= 50;
            attack++;
            updateUI();
            saveGame();
            showEventMessage(`攻击力提升至 ${attack}`, true);
        } else showEventMessage("金币不足", false);
    }
    function buyMaxHp() {
        if (gold >= 80) {
            gold -= 80;
            maxRaftHealth += 20;
            raftHealth += 20;
            updateUI();
            saveGame();
            showEventMessage("最大耐久 +20", true);
        } else showEventMessage("金币不足", false);
    }
    function buyWoodPack() {
        if (gold >= 30) {
            gold -= 30;
            wood += 100;
            updateUI();
            saveGame();
            showEventMessage("获得 +100 浮木", true);
        } else showEventMessage("金币不足", false);
    }
    
    // 签到系统（连续7天送100万浮木）
    function doSign() {
        const today = new Date().toDateString();
        if (todaySigned) {
            showEventMessage("今日已签到过", false);
            return;
        }
        
        let rewardWood = 80;
        let rewardGold = 30;
        
        // 计算连续签到
        if (lastSignDate) {
            const last = new Date(lastSignDate);
            const diff = (new Date(today) - last) / (1000 * 3600 * 24);
            if (diff === 1) {
                signStreak++;
            } else if (diff > 1) {
                signStreak = 1;
            } else {
                // diff === 0 理论上不会发生，因为 todaySigned 已拦截
                signStreak = 1;
            }
        } else {
            signStreak = 1;
        }
        
        // 如果连续签到达到7天，赠送100万浮木
        let extraWood = 0;
        if (signStreak === 7) {
            extraWood = 1000000;
            rewardWood = 0; // 基础奖励取消，直接给百万大奖
            rewardGold = 0;
            showEventMessage(`🎉 连续签到7天！获得 ${extraWood} 浮木！ 🎉`, true);
        } else {
            // 常规奖励加成
            rewardWood += Math.min(200, signStreak * 15);
            rewardGold += Math.min(80, signStreak * 5);
        }
        
        wood += rewardWood + extraWood;
        gold += rewardGold;
        todaySigned = true;
        lastSignDate = today;
        
        // 如果连续签到超过7天，重置连签计数？为了可重复获得百万，可以重置连签（第8天重新从1开始）
        if (signStreak === 7) {
            signStreak = 0; // 重置，第8天再次从1计数，为下一次7天做准备
        }
        
        updateUI();
        saveGame();
        if (extraWood === 0) {
            showEventMessage(`签到成功！+${rewardWood}🪵 +${rewardGold}💰 连签${signStreak}天`, true);
        }
    }
    
    function saveGame() {
        const data = { wood, gold, attack, raftHealth, maxRaftHealth, totalKills, lastSignDate, signStreak, todaySigned, islandTimerSeconds };
        localStorage.setItem('RaftAdventureSave', JSON.stringify(data));
    }
    function loadGame() {
        const raw = localStorage.getItem('RaftAdventureSave');
        if (!raw) return false;
        try {
            const d = JSON.parse(raw);
            wood = d.wood; gold = d.gold; attack = d.attack; raftHealth = d.raftHealth;
            maxRaftHealth = d.maxRaftHealth; totalKills = d.totalKills;
            lastSignDate = d.lastSignDate || ""; signStreak = d.signStreak || 0; todaySigned = d.todaySigned || false;
            islandTimerSeconds = d.islandTimerSeconds !== undefined ? d.islandTimerSeconds : ISLAND_REAL_SECONDS;
            if (raftHealth <= 0) raftHealth = maxRaftHealth;
            gameActive = true;
            updateUI();
            return true;
        } catch(e) { return false; }
    }
    
    function showNPCInteraction(npcType, npcData) {
        if (!gameActive) return;
        const panel = document.createElement('div');
        panel.className = 'combat-panel';
        if (npcType === 'gift') {
            panel.innerHTML = `<h3>🎁 友善漂流者</h3><p>他送你 <strong style="color:#ffaa66">${npcData.woodReward}</strong> 浮木！</p><button class="combat-btn" id="acceptGiftBtn">接受馈赠</button><button class="combat-btn" id="ignoreBtn">无视</button>`;
            document.body.appendChild(panel);
            document.getElementById('acceptGiftBtn').onclick = () => {
                wood += npcData.woodReward;
                updateUI();
                saveGame();
                showEventMessage(`获得 ${npcData.woodReward} 浮木`, true);
                removeNPC();
                panel.remove();
            };
            document.getElementById('ignoreBtn').onclick = () => {
                showEventMessage("你无视了对方", false);
                removeNPC();
                panel.remove();
            };
        } 
        else if (npcType === 'robber') {
            panel.innerHTML = `<h3>⚔️ 危险掠夺者</h3><p>他要抢夺你的浮木！攻击力 ${npcData.attack} 生命 ${npcData.health}</p><button class="combat-btn" id="defendBtn">保卫浮木 (战斗)</button><button class="combat-btn" id="surrenderBtn">交出30浮木</button>`;
            document.body.appendChild(panel);
            document.getElementById('defendBtn').onclick = () => {
                panel.remove();
                startCombat(npcData);
            };
            document.getElementById('surrenderBtn').onclick = () => {
                const loss = Math.min(30, wood);
                wood -= loss;
                updateUI();
                showEventMessage(`你交出了 ${loss} 浮木，对方离去`, false);
                removeNPC();
                panel.remove();
                saveGame();
            };
        }
        else if (npcType === 'neutral') {
            panel.innerHTML = `<h3>🧑 普通漂流者</h3><p>你可以尝试抢夺他的资源！</p><button class="combat-btn" id="robBtn">主动抢夺 (战斗)</button><button class="combat-btn" id="leaveBtn">离开</button>`;
            document.body.appendChild(panel);
            document.getElementById('robBtn').onclick = () => {
                panel.remove();
                startCombat(npcData, true);
            };
            document.getElementById('leaveBtn').onclick = () => {
                removeNPC();
                panel.remove();
                showEventMessage("你离开了", false);
            };
        }
    }
    
    function startCombat(npcData, isPlayerInitiated = false) {
        if (combatActive) return;
        combatActive = true;
        let npcCurrHealth = npcData.health;
        const npcAtk = npcData.attack;
        const rewardWood = npcData.rewardWood;
        
        const combatUI = document.createElement('div');
        combatUI.className = 'combat-panel';
        combatUI.innerHTML = `<h3>⚔️ 战斗进行中 ⚔️</h3><p>你的攻击力: ${attack}</p><p>敌人生命: <span id="npcHp">${npcCurrHealth}</span></p><button class="combat-btn" id="attackBtn">⚡ 攻击</button>`;
        document.body.appendChild(combatUI);
        
        const attackBtn = document.getElementById('attackBtn');
        const updateCombat = () => {
            if (!combatActive) return;
            document.getElementById('npcHp').innerText = npcCurrHealth;
        };
        
        attackBtn.onclick = () => {
            if (!combatActive) return;
            npcCurrHealth -= attack;
            updateCombat();
            if (npcCurrHealth <= 0) {
                wood += rewardWood;
                totalKills++;
                updateUI();
                saveGame();
                showEventMessage(`胜利！获得 ${rewardWood} 浮木`, true);
                combatActive = false;
                combatUI.remove();
                removeNPC();
                return;
            }
            const dmg = Math.max(1, npcAtk - 1 + Math.floor(Math.random() * 3));
            damageRaft(dmg);
            if (!gameActive) {
                combatActive = false;
                combatUI.remove();
                removeNPC();
                showGameOver();
                return;
            }
            showEventMessage(`敌人反击造成 ${dmg} 伤害`, false);
            updateUI();
        };
    }
    
    function spawnRandomNPC() {
        if (!gameActive) return;
        if (currentNPC !== null) return;
        const rand = Math.random();
        let npcType = '';
        let npcData = {};
        if (rand < 0.35) {
            npcType = 'gift';
            const woodReward = 50 + Math.floor(Math.random() * 80);
            npcData = { woodReward };
        } else if (rand < 0.7) {
            npcType = 'robber';
            const health = 25 + Math.floor(Math.random() * 35);
            const atk = 5 + Math.floor(Math.random() * 8);
            const rewardWood = 70 + Math.floor(Math.random() * 100);
            npcData = { health, attack: atk, rewardWood };
        } else {
            npcType = 'neutral';
            const health = 20 + Math.floor(Math.random() * 40);
            const atk = 4 + Math.floor(Math.random() * 10);
            const rewardWood = 60 + Math.floor(Math.random() * 120);
            npcData = { health, attack: atk, rewardWood };
        }
        const angle = Math.random() * Math.PI * 2;
        const radius = 3.2 + Math.random() * 1.5;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        npcMesh = createNPCModel(x, z);
        currentNPC = { type: npcType, data: npcData, mesh: npcMesh };
        showEventMessage(`远处漂来一个人...`, true);
        setTimeout(() => {
            if (currentNPC && currentNPC.type === npcType && gameActive) {
                showNPCInteraction(npcType, npcData);
            }
        }, 600);
    }
    
    function arriveAtIsland() {
        if (!gameActive) return;
        const reward = 10000;
        wood += reward;
        updateUI();
        saveGame();
        showEventMessage(`🏝️ 你发现了一座小岛！获得 ${reward} 浮木！ 🏝️`, true);
        islandTimerSeconds = ISLAND_REAL_SECONDS;  // 重置为10分钟
        camera.position.y += 0.1;
        setTimeout(() => { camera.position.y -= 0.1; }, 200);
    }
    
    function showGameOver() {
        const modal = document.createElement('div');
        modal.className = 'gameover-modal';
        modal.innerHTML = `<h2>💀 浮木沉没 💀</h2><p>你坚持了 ... 消灭 ${totalKills} 敌人</p><button id="restartGameBtn" style="background:#ffaa44; padding:8px 20px; border-radius:40px; margin-top:12px;">重新开始</button>`;
        document.body.appendChild(modal);
        document.getElementById('restartGameBtn').onclick = () => {
            modal.remove();
            fullReset();
        };
    }
    
    function fullReset() {
        wood = 200;
        gold = 50;
        attack = 2;
        raftHealth = 100;
        maxRaftHealth = 100;
        totalKills = 0;
        gameActive = true;
        combatActive = false;
        islandTimerSeconds = ISLAND_REAL_SECONDS;
        todaySigned = false;
        lastSignDate = "";
        signStreak = 0;
        
        minutesSinceLastLog = 0;
        minutesSinceLastNPC = 0;
        nextNPCMinutes = 12 + Math.random() * 15;
        
        if (currentNPC) removeNPC();
        currentNPC = null;
        
        floatingLogs.forEach(l => scene.remove(l.mesh));
        floatingLogs = [];
        
        const panels = document.querySelectorAll('.combat-panel, .gameover-modal');
        panels.forEach(p => p.remove());
        
        updateUI();
        saveGame();
        showEventMessage("重新开始漂流之旅", true);
    }
    
    // 时间推进 (deltaSeconds 现实秒)
    function advanceGameTime(deltaSeconds) {
        if (!gameActive) return;
        
        // 小岛倒计时 (现实秒)
        islandTimerSeconds -= deltaSeconds;
        if (islandTimerSeconds <= 0) {
            islandTimerSeconds = 0;
            arriveAtIsland();
        }
        updateUI();
        
        // 生成漂浮浮木 (游戏内每2分钟 = 现实2秒)
        const deltaMinutes = deltaSeconds; // 因为1秒=1分钟
        minutesSinceLastLog += deltaMinutes;
        if (minutesSinceLastLog >= LOG_SPAWN_INTERVAL_MINUTES) {
            spawnFloatingLog();
            minutesSinceLastLog -= LOG_SPAWN_INTERVAL_MINUTES;
        }
        
        // NPC遭遇
        if (currentNPC === null && !combatActive) {
            minutesSinceLastNPC += deltaMinutes;
            if (minutesSinceLastNPC >= nextNPCMinutes) {
                spawnRandomNPC();
                minutesSinceLastNPC = 0;
                nextNPCMinutes = 12 + Math.random() * 15;
            }
        }
    }
    
    const raycaster = new THREE.Raycaster();
    const mouseVec = new THREE.Vector2();
    function onGameTap(event) {
        if (!gameActive) return;
        let clientX, clientY;
        if (event.touches) {
            clientX = event.touches[0].clientX;
            clientY = event.touches[0].clientY;
            event.preventDefault();
        } else {
            clientX = event.clientX;
            clientY = event.clientY;
        }
        const rect = renderer.domElement.getBoundingClientRect();
        mouseVec.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        mouseVec.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouseVec, camera);
        
        const logMeshes = floatingLogs.map(l => l.mesh);
        const logHits = raycaster.intersectObjects(logMeshes);
        if (logHits.length > 0) {
            const hitLog = floatingLogs.find(l => l.mesh === logHits[0].object);
            if (hitLog) {
                collectFloatingLog(hitLog);
                return;
            }
        }
        if (currentNPC && !combatActive && npcMesh) {
            const npcHit = raycaster.intersectObject(npcMesh, true);
            if (npcHit.length > 0) {
                showNPCInteraction(currentNPC.type, currentNPC.data);
                return;
            }
        }
    }
    
    let lastRealTime = performance.now() / 1000;
    function animate() {
        const now = performance.now() / 1000;
        let deltaRealSec = Math.min(0.1, now - lastRealTime);
        lastRealTime = now;
        
        advanceGameTime(deltaRealSec);
        updateFloatingLogs(deltaRealSec); // deltaRealSec 当作分钟使用（因为1秒=1分钟）
        
        // 小人动画
        timeAcc += deltaRealSec;
        const floatY = Math.sin(timeAcc * 3) * 0.02;
        characterGroup.position.y = -0.1 + floatY;
        const armAngle = Math.sin(timeAcc * 4) * 0.3;
        const leftArmObj = characterGroup.children.find(c => c.position && Math.abs(c.position.x + 0.45) < 0.1);
        const rightArmObj = characterGroup.children.find(c => c.position && Math.abs(c.position.x - 0.45) < 0.1);
        if (leftArmObj) leftArmObj.rotation.z = 0.4 + armAngle * 0.5;
        if (rightArmObj) rightArmObj.rotation.z = -0.4 - armAngle * 0.5;
        
        oceanPlane.position.y = -0.55 + Math.sin(Date.now() * 0.002) * 0.025;
        fireGlow.intensity = 0.5 + Math.sin(Date.now() * 0.012) * 0.2;
        if (npcMesh) {
            npcMesh.position.y = -0.1 + Math.sin(Date.now() * 5) * 0.03;
        }
        
        controls.update();
        renderer.render(scene, camera);
        labelRenderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    
    // 绑定事件
    renderer.domElement.addEventListener('click', onGameTap);
    renderer.domElement.addEventListener('touchstart', (e) => { e.preventDefault(); onGameTap(e); }, { passive: false });
    document.getElementById('repairBtn').onclick = repairRaft;
    document.getElementById('atkUpBtn').onclick = buyAttack;
    document.getElementById('maxHpBtn').onclick = buyMaxHp;
    document.getElementById('woodPackBtn').onclick = buyWoodPack;
    document.getElementById('signBtn').onclick = doSign;
    document.getElementById('resetBtn').onclick = () => fullReset();
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    const hasSave = loadGame();
    if (!hasSave) {
        islandTimerSeconds = ISLAND_REAL_SECONDS;
        minutesSinceLastLog = 0;
        minutesSinceLastNPC = 0;
        nextNPCMinutes = 12 + Math.random() * 15;
    }
    updateUI();
    animate();
</script>
</body>
</html>
