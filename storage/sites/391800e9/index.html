<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>三角洲特种部队 - 网页版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* 游戏容器 */
        #gameContainer {
            position: relative;
            width: 1200px;
            height: 700px;
            border: 3px solid #333;
            background: #7a9667;
            background-image:
                radial-gradient(circle, #8a2be2 1px, transparent 1px),
                linear-gradient(#6b8a58 1px, transparent 1px),
                linear-gradient(90deg, #6b8a58 1px, transparent 1px);
            background-size: 40px 40px;
            touch-action: none;
            cursor: crosshair;
        }

        /* 玩家 */
        #player {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #0066ff;
            border-radius: 50%;
            box-shadow: 0 0 15px #0066ff;
            z-index: 10;
            will-change: transform;
            pointer-events: none;
        }

        /* 子弹 */
        .bullet {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ff0;
            border-radius: 50%;
            z-index: 5;
            will-change: transform;
            pointer-events: none;
        }

        /* 敌人 */
        .enemy {
            position: absolute;
            width: 28px;
            height: 28px;
            background: #ff3300;
            border-radius: 50%;
            box-shadow: 0 0 12px #ff3300;
            z-index: 8;
            will-change: transform;
            pointer-events: none;
        }

        /* UI面板 */
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 3px #000;
            z-index: 999;
            user-select: none;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff3300;
            font-size: 60px;
            font-weight: bold;
            text-shadow: 0 0 20px #000;
            display: none;
            z-index: 9999;
            user-select: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            血量: <span id="hp">100</span> | 杀敌: <span id="score">0</span>
        </div>
        <div id="player"></div>
        <div id="gameOver">任务失败！</div>
    </div>

    <script>
        'use strict';

        // ========== 配置 ==========
        const CONFIG = {
            mapWidth: 1200,
            mapHeight: 700,
            moveSpeed: 5,
            bulletSpeed: 12,
            enemySpeed: 1.6,
            enemySpawnInterval: 2000,
            playerRadius: 15,
            enemyRadius: 14,
            bulletRadius: 3
        };

        // ========== DOM 引用 ==========
        const container = document.getElementById('gameContainer');
        const playerEl = document.getElementById('player');
        const hpText = document.getElementById('hp');
        const scoreText = document.getElementById('score');
        const gameOverEl = document.getElementById('gameOver');

        // ========== 游戏状态 ==========
        const state = {
            player: {
                x: CONFIG.mapWidth / 2,
                y: CONFIG.mapHeight / 2,
                hp: 100
            },
            score: 0,
            gameOver: false,
            keys: {
                w: false,
                a: false,
                s: false,
                d: false
            },
            bullets: [],
            enemies: []
        };

        // ========== 渲染函数 ==========
        function renderPlayer() {
            const px = state.player.x - CONFIG.playerRadius;
            const py = state.player.y - CONFIG.playerRadius;
            playerEl.style.transform = 'translate(' + px + 'px, ' + py + 'px)';
        }

        function renderBullet(bullet) {
            const px = bullet.x - CONFIG.bulletRadius;
            const py = bullet.y - CONFIG.bulletRadius;
            bullet.el.style.transform = 'translate(' + px + 'px, ' + py + 'px)';
        }

        function renderEnemy(enemy) {
            const px = enemy.x - CONFIG.enemyRadius;
            const py = enemy.y - CONFIG.enemyRadius;
            enemy.el.style.transform = 'translate(' + px + 'px, ' + py + 'px)';
        }

        function updateUI() {
            hpText.textContent = state.player.hp;
            scoreText.textContent = state.score;
        }

        // ========== 玩家输入 ==========
        function handleKeyDown(e) {
            if (e.key in state.keys) {
                state.keys[e.key] = true;
                e.preventDefault();
            }
        }

        function handleKeyUp(e) {
            if (e.key in state.keys) {
                state.keys[e.key] = false;
                e.preventDefault();
            }
        }

        function handlePlayerMove() {
            const s = CONFIG.moveSpeed;
            const p = state.player;
            const maxX = CONFIG.mapWidth - CONFIG.playerRadius;
            const maxY = CONFIG.mapHeight - CONFIG.playerRadius;
            const minX = CONFIG.playerRadius;
            const minY = CONFIG.playerRadius;

            if (state.keys.w && p.y > minY) p.y -= s;
            if (state.keys.s && p.y < maxY) p.y += s;
            if (state.keys.a && p.x > minX) p.x -= s;
            if (state.keys.d && p.x < maxX) p.x += s;

            renderPlayer();
        }

        // ========== 射击 ==========
        function shoot(e) {
            if (state.gameOver) return;

            // 转换触摸事件或鼠标事件
            let clientX, clientY;
            if (e.touches) {
                if (e.touches.length === 0) return;
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const rect = container.getBoundingClientRect();
            const mouseX = clientX - rect.left;
            const mouseY = clientY - rect.top;

            const dx = mouseX - state.player.x;
            const dy = mouseY - state.player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 1) return;

            const vx = (dx / dist) * CONFIG.bulletSpeed;
            const vy = (dy / dist) * CONFIG.bulletSpeed;

            const bulletEl = document.createElement('div');
            bulletEl.className = 'bullet';
            container.appendChild(bulletEl);

            const bullet = {
                el: bulletEl,
                x: state.player.x,
                y: state.player.y,
                vx: vx,
                vy: vy
            };

            state.bullets.push(bullet);
            renderBullet(bullet);
        }

        // ========== 生成敌人 ==========
        function spawnEnemy() {
            if (state.gameOver) return;

            const enemyEl = document.createElement('div');
            enemyEl.className = 'enemy';
            container.appendChild(enemyEl);

            let x, y;
            if (Math.random() > 0.5) {
                x = Math.random() > 0.5 ? -CONFIG.enemyRadius * 2 : CONFIG.mapWidth + CONFIG.enemyRadius * 2;
                y = Math.random() * CONFIG.mapHeight;
            } else {
                x = Math.random() * CONFIG.mapWidth;
                y = Math.random() > 0.5 ? -CONFIG.enemyRadius * 2 : CONFIG.mapHeight + CONFIG.enemyRadius * 2;
            }

            const enemy = {
                el: enemyEl,
                x: x,
                y: y,
                speed: CONFIG.enemySpeed
            };

            state.enemies.push(enemy);
            renderEnemy(enemy);
        }

        // ========== 更新逻辑 ==========
        function updateEnemies() {
            const p = state.player;
            for (let i = 0; i < state.enemies.length; i++) {
                const enemy = state.enemies[i];
                const dx = p.x - enemy.x;
                const dy = p.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0.5) {
                    enemy.x += (dx / dist) * enemy.speed;
                    enemy.y += (dy / dist) * enemy.speed;
                }
                renderEnemy(enemy);

                // 敌人碰到玩家（持续伤害）
                if (dist < CONFIG.playerRadius + CONFIG.enemyRadius) {
                    state.player.hp -= 1;
                }
            }
        }

        function updateBullets() {
            const aliveBullets = [];
            for (let i = 0; i < state.bullets.length; i++) {
                const bullet = state.bullets[i];
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                renderBullet(bullet);

                // 边界检测
                if (bullet.x < -10 || bullet.x > CONFIG.mapWidth + 10 ||
                    bullet.y < -10 || bullet.y > CONFIG.mapHeight + 10) {
                    bullet.el.remove();
                    continue;
                }

                // 子弹与敌人碰撞检测
                let bulletHit = false;
                for (let j = state.enemies.length - 1; j >= 0; j--) {
                    const enemy = state.enemies[j];
                    const dx = bullet.x - enemy.x;
                    const dy = bullet.y - enemy.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < CONFIG.bulletRadius + CONFIG.enemyRadius) {
                        // 消灭敌人
                        enemy.el.remove();
                        state.enemies.splice(j, 1);
                        bulletHit = true;
                        state.score++;
                        break;
                    }
                }

                if (bulletHit) {
                    bullet.el.remove();
                } else {
                    aliveBullets.push(bullet);
                }
            }
            state.bullets = aliveBullets;
            updateUI();
        }

        function checkGameOver() {
            if (state.player.hp <= 0) {
                state.gameOver = true;
                state.player.hp = 0;
                updateUI();
                gameOverEl.style.display = 'block';
                return true;
            }
            return false;
        }

        // ========== 游戏主循环 ==========
        function gameLoop() {
            if (state.gameOver) {
                return;
            }

            // 1. 处理移动
            handlePlayerMove();

            // 2. 更新敌人
            updateEnemies();

            // 3. 更新子弹
            updateBullets();

            // 4. 检查游戏结束
            checkGameOver();

            requestAnimationFrame(gameLoop);
        }

        // ========== 事件绑定 ==========
        document.addEventListener('keydown', handleKeyDown);
        document.addEventListener('keyup', handleKeyUp);
        container.addEventListener('click', shoot);
        container.addEventListener('touchstart', shoot, { passive: false });

        // ========== 初始化 ==========
        function init() {
            // 状态重置
            state.player.x = CONFIG.mapWidth / 2;
            state.player.y = CONFIG.mapHeight / 2;
            state.player.hp = 100;
            state.score = 0;
            state.gameOver = false;
            state.keys = { w: false, a: false, s: false, d: false };

            // 清理旧的 DOM 元素
            state.bullets.forEach(b => b.el.remove());
            state.enemies.forEach(e => e.el.remove());
            state.bullets = [];
            state.enemies = [];

            gameOverEl.style.display = 'none';

            renderPlayer();
            updateUI();

            // 启动循环
            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        init();

        // 每2秒生成一个敌人
        setInterval(spawnEnemy, CONFIG.enemySpawnInterval);
    </script>
</body>
</html>
