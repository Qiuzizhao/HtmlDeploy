<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页版我的世界 - 加速版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            border: 2px solid #fff;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.8;
        }
        .tip {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="crosshair"></div>
    <div class="tip">点击屏幕锁定鼠标 | WASD极速移动 | 空格高跳 | 左键破坏 | 右键放置 | ESC解锁鼠标</div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let world = [];
        const blockSize = 1;
        const worldSize = 32;

        // ========== 加速参数（已调高）==========
        const moveState = {
            forward: false, back: false, left: false, right: false,
            jump: false, canJump: true, velocity: new THREE.Vector3()
        };
        const moveSpeed = 12;   // 原5 → 12 大幅提速
        const jumpPower = 12;   // 原8 → 12 跳更高
        const gravity = -9.8;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x87ceeb, 20, 60);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(worldSize/2, 5, worldSize/2);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x87ceeb);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            controls = new THREE.PointerLockControls(camera, document.body);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 40, 20);
            dirLight.castShadow = true;
            scene.add(dirLight);

            createWorld();
            bindEvents();
            animate();
        }

        function createWorld() {
            const grassMat = new THREE.MeshLambertMaterial({ color: 0x3d9970 });
            const dirtMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
            const stoneMat = new THREE.MeshLambertMaterial({ color: 0x808080 });
            const blockGeo = new THREE.BoxGeometry(blockSize, blockSize, blockSize);

            for (let x = 0; x < worldSize; x++) {
                world[x] = [];
                for (let z = 0; z < worldSize; z++) {
                    const height = Math.floor(Math.sin(x * 0.2) * 3 + Math.cos(z * 0.2) * 3 + 4);
                    world[x][z] = [];

                    for (let y = 0; y < height; y++) {
                        let mat;
                        if (y === height - 1) mat = grassMat;
                        else if (y > height - 4) mat = dirtMat;
                        else mat = stoneMat;

                        const block = new THREE.Mesh(blockGeo, mat);
                        block.position.set(x, y, z);
                        block.castShadow = true;
                        block.receiveShadow = true;
                        block.userData = { x, y, z };
                        scene.add(block);
                        world[x][z][y] = block;
                    }
                }
            }
        }

        function bindEvents() {
            document.body.addEventListener('click', () => {
                controls.lock();
            });

            document.addEventListener('keydown', (e) => {
                switch(e.code) {
                    case 'KeyW': moveState.forward = true; break;
                    case 'KeyS': moveState.back = true; break;
                    case 'KeyA': moveState.left = true; break;
                    case 'KeyD': moveState.right = true; break;
                    case 'Space': if(moveState.canJump) moveState.jump = true; break;
                }
            });

            document.addEventListener('keyup', (e) => {
                switch(e.code) {
                    case 'KeyW': moveState.forward = false; break;
                    case 'KeyS': moveState.back = false; break;
                    case 'KeyA': moveState.left = false; break;
                    case 'KeyD': moveState.right = false; break;
                }
            });

            document.addEventListener('mousedown', (e) => {
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const intersects = raycaster.intersectObjects(scene.children.filter(obj => obj.userData.x !== undefined));

                if (intersects.length > 0) {
                    const hit = intersects[0];
                    const {x, y, z} = hit.object.userData;

                    if (e.button === 0) {
                        scene.remove(hit.object);
                        world[x][z][y] = null;
                    }
                    if (e.button === 2) {
                        const newMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
                        const newGeo = new THREE.BoxGeometry(1,1,1);
                        const newBlock = new THREE.Mesh(newGeo, newMat);
                        const pos = hit.point.clone().add(hit.face.normal);
                        newBlock.position.set(Math.round(pos.x), Math.round(pos.y), Math.round(pos.z));
                        newBlock.userData = {
                            x: Math.round(pos.x),
                            y: Math.round(pos.y),
                            z: Math.round(pos.z)
                        };
                        scene.add(newBlock);
                        world[newBlock.userData.x][newBlock.userData.z][newBlock.userData.y] = newBlock;
                    }
                }
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            document.addEventListener('contextmenu', e => e.preventDefault());
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = 0.016;

            moveState.velocity.y += gravity * delta;

            if (moveState.jump && moveState.canJump) {
                moveState.velocity.y = jumpPower;
                moveState.jump = false;
                moveState.canJump = false;
            }

            const dir = new THREE.Vector3();
            const forward = new THREE.Vector3();
            const right = new THREE.Vector3();

            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();
            right.crossVectors(camera.up, forward).normalize();

            if (moveState.forward) dir.add(forward);
            if (moveState.back) dir.sub(forward);
            if (moveState.left) dir.add(right);
            if (moveState.right) dir.sub(right);

            if (dir.length() > 0) dir.normalize();
            dir.multiplyScalar(moveSpeed * delta);

            camera.position.add(dir);
            camera.position.y += moveState.velocity.y * delta;

            if (camera.position.y <= 5) {
                camera.position.y = 5;
                moveState.velocity.y = 0;
                moveState.canJump = true;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
