<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>卡通射击游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2a3a5a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
#game{border:3px solid #fff;border-radius:10px;background:#3a4a6a}
</style>
</head>
<body>
<canvas id="game" width="1280" height="720"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

//玩家
let player={
    x:canvas.width/2,
    y:canvas.height/2,
    size:35,
    speed:5,
    aiming:false,
    angle:0
};

//子弹数组
let bullets=[];
//目标数组
let targets=[];
let score=0;

//按键
const keys={w:false,a:false,s:false,d:false};

//创建目标
function createTargets(){
    for(let i=0;i<8;i++){
        targets.push({
            x:Math.random()*(canvas.width-100)+50,
            y:Math.random()*(canvas.height-100)+50,
            size:Math.random()*20+20,
            color:`hsl(${Math.random()*360},70%,70%)`,
            vx:(Math.random()-0.5)*2,
            vy:(Math.random()-0.5)*2
        });
    }
}
createTargets();

//鼠标移动
canvas.addEventListener("mousemove",(e)=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const my=e.clientY-rect.top;
    player.angle=Math.atan2(my-player.y,mx-player.x);
});

//右键瞄准
canvas.addEventListener("mousedown",(e)=>{
    if(e.button===2) player.aiming=true;
    //左键发射25颗子弹
    if(e.button===0&&player.aiming){
        for(let i=0;i<25;i++){
            const spreadAngle=player.angle+(Math.random()-0.5)*0.6;
            bullets.push({
                x:player.x,
                y:player.y,
                vx:Math.cos(spreadAngle)*12,
                vy:Math.sin(spreadAngle)*12,
                size:4,
                color:`hsl(${Math.random()*60+20},100%,60%)`
            });
        }
    }
});

canvas.addEventListener("mouseup",(e)=>{
    if(e.button===2) player.aiming=false;
});
//禁止右键菜单
canvas.addEventListener("contextmenu",e=>e.preventDefault());

//键盘控制
document.addEventListener("keydown",e=>{
    if(e.key==="w")keys.w=true;
    if(e.key==="a")keys.a=true;
    if(e.key==="s")keys.s=true;
    if(e.key==="d")keys.d=true;
});
document.addEventListener("keyup",e=>{
    if(e.key==="w")keys.w=false;
    if(e.key==="a")keys.a=false;
    if(e.key==="s")keys.s=false;
    if(e.key==="d")keys.d=false;
});

//碰撞检测
function checkHit(bullet,target){
    const dx=bullet.x-target.x;
    const dy=bullet.y-target.y;
    return Math.sqrt(dx*dx+dy*dy)<target.size+bullet.size;
}

//绘制
function draw(){
    //背景
    ctx.fillStyle="#3a4a6a";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    
    //网格
    ctx.strokeStyle="#4a5a7a";
    ctx.lineWidth=1;
    for(let i=0;i<canvas.width;i+=40){
        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i,canvas.height);
        ctx.stroke();
    }
    for(let i=0;i<canvas.height;i+=40){
        ctx.beginPath();
        ctx.moveTo(0,i);
        ctx.lineTo(canvas.width,i);
        ctx.stroke();
    }
    
    //移动
    if(!player.aiming){
        if(keys.w&&player.y>player.size)player.y-=player.speed;
        if(keys.s&&player.y<canvas.height-player.size)player.y+=player.speed;
        if(keys.a&&player.x>player.size)player.x-=player.speed;
        if(keys.d&&player.x<canvas.width-player.size)player.x+=player.speed;
    }
    
    //绘制玩家
    ctx.fillStyle="#5599ff";
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle="#fff";
    ctx.lineWidth=3;
    ctx.stroke();
    
    //眼睛
    ctx.fillStyle="#fff";
    ctx.beginPath();
    ctx.arc(player.x-12,player.y-12,8,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(player.x+12,player.y-12,8,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="#000";
    ctx.beginPath();
    ctx.arc(player.x-12,player.y-12,4,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(player.x+12,player.y-12,4,0,Math.PI*2);
    ctx.fill();
    
    //嘴巴
    ctx.beginPath();
    ctx.arc(player.x,player.y+5,10,0,Math.PI);
    ctx.strokeStyle="#000";
    ctx.lineWidth=2;
    ctx.stroke();
    
    //瞄准线
    if(player.aiming){
        ctx.strokeStyle="#ff5555";
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.moveTo(player.x,player.y);
        ctx.lineTo(player.x+Math.cos(player.angle)*100,player.y+Math.sin(player.angle)*100);
        ctx.stroke();
    }
    
    //更新子弹
    for(let i=bullets.length-1;i>=0;i--){
        const b=bullets[i];
        b.x+=b.vx;
        b.y+=b.vy;
        
        //出界删除
        if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){
            bullets.splice(i,1);
            continue;
        }
        
        //绘制子弹
        ctx.fillStyle=b.color;
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
        ctx.fill();
        ctx.strokeStyle="#fff";
        ctx.lineWidth=1;
        ctx.stroke();
    }
    
    //更新目标
    for(let i=targets.length-1;i>=0;i--){
        const t=targets[i];
        t.x+=t.vx;
        t.y+=t.vy;
        
        //反弹
        if(t.x<t.size||t.x>canvas.width-t.size)t.vx*=-1;
        if(t.y<t.size||t.y>canvas.height-t.size)t.vy*=-1;
        
        //命中检测
        let hit=false;
        for(let j=bullets.length-1;j>=0;j--){
            if(checkHit(bullets[j],t)){
                bullets.splice(j,1);
                targets.splice(i,1);
                targets.push({
                    x:Math.random()*(canvas.width-100)+50,
                    y:Math.random()*(canvas.height-100)+50,
                    size:Math.random()*20+20,
                    color:`hsl(${Math.random()*360},70%,70%)`,
                    vx:(Math.random()-0.5)*2,
                    vy:(Math.random()-0.5)*2
                });
                score+=10;
                hit=true;
                break;
            }
        }
        if(hit)continue;
        
        //绘制目标
        ctx.fillStyle=t.color;
        ctx.beginPath();
        ctx.arc(t.x,t.y,t.size,0,Math.PI*2);
        ctx.fill();
        ctx.strokeStyle="#fff";
        ctx.lineWidth=2;
        ctx.stroke();
    }
    
    //分数
    ctx.fillStyle="#fff";
    ctx.font="28px Arial";
    ctx.fillText(`分数: ${score}`,20,40);
    
    //提示
    ctx.fillText("WASD移动 右键瞄准 左键发射25颗子弹",canvas.width/2-280,canvas.height-20);
    
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
