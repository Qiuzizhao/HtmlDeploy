<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>左右移动跑酷小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #ececec;
            padding-top:30px;
            font-family: system-ui;
        }
        .info{
            font-size:20px;
            margin-bottom:10px;
        }
        .game-box{
            width:900px;
            height:320px;
            background:#bfe2ff;
            border:3px solid #333;
            position:relative;
            overflow:hidden;
        }
        .ground{
            position:absolute;
            bottom:0;
            width:100%;
            height:25px;
            background:#795548;
        }
        .player{
            width:48px;
            height:52px;
            background:#e63946;
            border-radius:6px;
            position:absolute;
            bottom:25px;
            left:80px;
            transition:left 0.03s linear;
        }
        .obstacle{
            position:absolute;
            bottom:25px;
            background:#2a9d8f;
            border-radius:4px;
        }
        .gameover-tip{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            font-size:40px;
            color:#d62828;
            font-weight:bold;
            display:none;
            text-align:center;
            background:#fff9;
            padding:20px 40px;
            border-radius:10px;
        }
        #restart{
            margin-top:12px;
            padding:8px 22px;
            font-size:18px;
            border:none;
            background:#457b9d;
            color:#fff;
            border-radius:6px;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <div class="info">分数：<span id="score">0</span>｜操作：A/←左移  D/→右移  空格跳跃</div>
    <div class="game-box" id="gameWrap">
        <div class="ground"></div>
        <div class="player" id="hero"></div>
        <div class="gameover-tip" id="overBox">
            游戏结束！
            <br>
            <button id="restart">重新开始</button>
        </div>
    </div>

    <script>
        const gameWrap = document.getElementById('gameWrap');
        const hero = document.getElementById('hero');
        const scoreDom = document.getElementById('score');
        const overBox = document.getElementById('overBox');
        const restartBtn = document.getElementById('restart');

        // 游戏参数
        let score = 0;
        let gameOver = false;
        let heroX = 80;
        const moveSpeed = 6; //左右移动速度
        let isJump = false;
        let gravity = 3;
        let jumpHeight = 0;
        let jumpPower = 140;
        let obstacleArr = []; //存放所有障碍物
        let gameSpeed = 4; //障碍物基础速度

        //按键监听
        const keyStatus = {};
        document.addEventListener('keydown',e=>{
            keyStatus[e.code]=true;
            //空格跳跃
            if(e.code==='Space'&&!isJump&&!gameOver){
                isJump=true;
            }
        })
        document.addEventListener('keyup',e=>keyStatus[e.code]=false);

        // 左右移动逻辑
        function movePlayer(){
            //左移 A/←
            if((keyStatus['KeyA']||keyStatus['ArrowLeft'])&&heroX>0){
                heroX -= moveSpeed;
            }
            //右移 D/→
            if((keyStatus['KeyD']||keyStatus['ArrowRight'])&&heroX<gameWrap.offsetWidth-hero.offsetWidth){
                heroX += moveSpeed;
            }
            hero.style.left = heroX+'px';
        }

        //跳跃重力
        function jumpRun(){
            if(!isJump) return;
            jumpHeight += gravity;
            hero.style.bottom = (25 + jumpPower - jumpHeight)+'px';
            //落地
            if(jumpPower - jumpHeight <=0){
                isJump=false;
                jumpHeight=0;
                hero.style.bottom='25px';
            }
        }

        //随机生成障碍物
        function createObstacle(){
            if(gameOver) return;
            //随机宽高
            const w = 25+Math.random()*25;
            const h = 35+Math.random()*30;
            const obs = document.createElement('div');
            obs.className='obstacle';
            obs.style.width = w+'px';
            obs.style.height = h+'px';
            obs.style.left = gameWrap.offsetWidth+'px';
            gameWrap.appendChild(obs);
            obstacleArr.push(obs);
        }

        //障碍物移动+碰撞+计分
        function obstacleUpdate(){
            for(let i=obstacleArr.length-1;i>=0;i--){
                let obs = obstacleArr[i];
                let nowLeft = parseFloat(obs.style.left);
                nowLeft -= gameSpeed;
                obs.style.left = nowLeft+'px';

                //获取角色、障碍物矩形
                const hRect = hero.getBoundingClientRect();
                const oRect = obs.getBoundingClientRect();
                const gRect = gameWrap.getBoundingClientRect();
                //相对画布坐标
                const hX = hRect.left - gRect.left;
                const hY = hRect.top - gRect.top;
                const oX = oRect.left - gRect.left;
                const oY = oRect.top - gRect.top;

                //碰撞检测
                if(
                    hX < oX+oRect.width &&
                    hX+hRect.width > oX &&
                    hY < oY+oRect.height &&
                    hY+hRect.height > oY
                ){
                    gameEnd();
                    return;
                }

                //跑出左侧屏幕，加分+删除
                if(nowLeft < -parseFloat(obs.style.width)){
                    obs.remove();
                    obstacleArr.splice(i,1);
                    score++;
                    scoreDom.innerText=score;
                    //分数越高速度越快，提升难度
                    if(score%8===0) gameSpeed+=0.15;
                }
            }
        }

        //游戏结束
        function gameEnd(){
            gameOver=true;
            overBox.style.display='block';
        }

        //游戏循环
        function gameLoop(){
            if(!gameOver){
                movePlayer();
                jumpRun();
                obstacleUpdate();
            }
            requestAnimationFrame(gameLoop);
        }

        //定时生成障碍物
        setInterval(()=>{
            if(!gameOver) createObstacle();
        },900)

        //重启游戏
        restartBtn.onclick=()=>{
            //清空所有障碍物
            obstacleArr.forEach(item=>item.remove());
            obstacleArr=[];
            score=0;
            gameSpeed=4;
            gameOver=false;
            heroX=80;
            hero.style.left=heroX+'px';
            hero.style.bottom='25px';
            overBox.style.display='none';
            scoreDom.innerText=score;
        }

        gameLoop();
    </script>
</body>
</html>
