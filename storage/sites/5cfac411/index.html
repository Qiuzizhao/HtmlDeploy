<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>简易下落音游</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;color:#fff;overflow:hidden}
        .gameBox{width:420px;height:600px;border:2px solid #444;background:#111;position:relative;margin-top:10px}
        .keyLine{position:absolute;bottom:80px;width:100%;height:6px;background:#0cf;opacity:0.7}
        .keyArea{position:absolute;bottom:0;width:100%;height:80px;display:flex}
        .key{flex:1;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:22px;color:#9cf}
        .note{width:calc(100%/4 - 4px);height:32px;background:#0cf;border-radius:6px;position:absolute}
        .scoreBox{width:420px;padding:8px;display:flex;justify-content:space-between;font-size:18px}
    </style>
</head>
<body>
    <div class="scoreBox">
        <span>分数：<span id="score">0</span></span>
        <span>连击：<span id="combo">0</span></span>
    </div>
    <div class="gameBox" id="game">
        <div class="keyLine"></div>
        <div class="keyArea">
            <div class="key">D</div>
            <div class="key">F</div>
            <div class="key">J</div>
            <div class="key">K</div>
        </div>
    </div>

    <script>
        const game = document.getElementById('game')
        const scoreDom = document.getElementById('score')
        const comboDom = document.getElementById('combo')
        // 四键位对应
        const keys = ['d','f','j','k']
        let score = 0,combo = 0
        let noteList = []
        const colWidth = 420/4

        // 随机生成音符
        function createNote(){
            const col = Math.floor(Math.random()*4)
            const note = document.createElement('div')
            note.className = 'note'
            note.style.left = col*colWidth + 2 + 'px'
            note.style.top = '-35px'
            game.appendChild(note)
            noteList.push({dom:note,y:-35,col,speed:3.2})
        }

        // 音符下落动画
        function moveNote(){
            noteList.forEach((item,idx)=>{
                item.y += item.speed
                item.dom.style.top = item.y+'px'
                // 错过音符，断连击
                if(item.y>520){
                    item.dom.remove()
                    noteList.splice(idx,1)
                    combo = 0
                    comboDom.innerText = combo
                }
            })
        }

        // 按键判定
        document.addEventListener('keydown',e=>{
            const keyIdx = keys.indexOf(e.key.toLowerCase())
            if(keyIdx === -1)return
            // 寻找对应列、落在判定线附近的音符
            let hit = false
            for(let i=noteList.length-1;i>=0;i--){
                const n = noteList[i]
                if(n.col===keyIdx && n.y>495 && n.y<550){
                    score += 100 + combo*5
                    combo++
                    scoreDom.innerText = score
                    comboDom.innerText = combo
                    n.dom.remove()
                    noteList.splice(i,1)
                    hit=true
                    break
                }
            }
            if(!hit){//空敲断连击
                combo=0
                comboDom.innerText=combo
            }
        })

        // 定时生成音符
        setInterval(createNote,750)
        // 帧动画
        setInterval(moveNote,20)
    </script>
</body>
</html>
