        }

        // 生成东方明珠 (Oriental Pearl Tower) - 2x2
        function createOrientalPearl(x, z) {
            const group = new THREE.Group();
            group.userData = { isBuilding: true, isLandmark: true, multiGrid: true, size: 2 };

            // 基础广场 (圆形地基)
            const groundGeo = new THREE.PlaneGeometry(1.9, 1.9);
            groundGeo.rotateX(-Math.PI / 2);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0xe2e8f0 }); // 浅灰白底座
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.position.y = 0.015;
            ground.receiveShadow = true;
            group.add(ground);

            const baseCircle = new THREE.Mesh(
                new THREE.CylinderGeometry(0.8, 0.9, 0.1, 32),
                new THREE.MeshLambertMaterial({ color: 0x94a3b8 })
            );
            baseCircle.position.y = 0.06;
            baseCircle.castShadow = true;
            group.add(baseCircle);

            // 材质定义
            const concreteMat = new THREE.MeshLambertMaterial({ color: 0xcbd5e1 }); // 混凝土颜色
            const sphereMat = new THREE.MeshLambertMaterial({ 
                color: 0xec4899, // 粉红色球体
                emissive: 0xbe185d,
                emissiveIntensity: isNight ? 0.6 : 0,
                transparent: true,
                opacity: 0.9
            });
            windowMaterials.push(sphereMat); // 加入夜间发光控制

            // 1. 三根斜向支撑柱 (鼎立状)
            for(let i=0; i<3; i++) {
                const angle = (i/3) * Math.PI * 2;
                const legGroup = new THREE.Group();
                const leg = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.06, 0.1, 1.8, 8), // 高度 1.2 -> 1.8
                    concreteMat
                );
                leg.position.set(0, 0.9, 0); // y位置 0.6 -> 0.9
                legGroup.add(leg);
                
                // 将支柱推向外侧并向内倾斜
                legGroup.position.set(Math.cos(angle)*0.4, 0, Math.sin(angle)*0.4);
                legGroup.lookAt(0, 3.0, 0); // 指向的中心点 2.0 -> 3.0
                legGroup.rotateX(Math.PI / 2); // 调整 lookAt 带来的旋转
                group.add(legGroup);
            }

            // 2. 下球体 (最大的球)
            const lowerSphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 32, 32),
                sphereMat
            );
            lowerSphere.position.y = 1.5; // 1.0 -> 1.5
            lowerSphere.scale.y = 0.9; // 稍微压扁一点
            group.add(lowerSphere);

            // 3. 中间主柱 (连接上下球体)
            const midPillar = new THREE.Mesh(
                new THREE.CylinderGeometry(0.12, 0.15, 2.2, 16),
                concreteMat
            );
            midPillar.position.y = 2.55; 
            group.add(midPillar);

            // 中间的三根细小立柱 (环绕主柱)
            for(let i=0; i<3; i++) {
                const angle = (i/3) * Math.PI * 2;
                const smallPillar = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.02, 0.02, 2.2, 8),
                    concreteMat
                );
                smallPillar.position.set(Math.cos(angle)*0.25, 2.55, Math.sin(angle)*0.25);
                group.add(smallPillar);
            }

            // 4. 上球体 (较小的球)
            const upperSphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 32, 32),
                sphereMat
            );
            upperSphere.position.y = 3.6;
            group.add(upperSphere);

            // 4.5. 上部连接柱 (新增：连接上球体和顶部太空舱)
            const upperPillar = new THREE.Mesh(
                new THREE.CylinderGeometry(0.06, 0.08, 0.8, 16),
                concreteMat
            );
            upperPillar.position.y = 4.1; // 跨度 3.7 到 4.5，完美连接
            group.add(upperPillar);

            // 5. 顶部太空舱 (最小的球)
            const topSphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 16, 16),
                sphereMat
            );
            topSphere.position.y = 4.5;
            group.add(topSphere);

            // 6. 天线桅杆
            const antenna1 = new THREE.Mesh(
                new THREE.CylinderGeometry(0.04, 0.06, 1.2, 8),
                concreteMat
            );
            antenna1.position.y = 5.1; // 跨度 4.5 到 5.7
            group.add(antenna1);

            const antenna2 = new THREE.Mesh(
                new THREE.CylinderGeometry(0.01, 0.04, 0.9, 8),
                new THREE.MeshLambertMaterial({ color: 0x94a3b8 })
            );
            antenna2.position.y = 6.15; // 跨度 5.7 到 6.6
            group.add(antenna2);

            // 天线顶端的红灯
            const beaconMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const beacon = new THREE.Mesh(new THREE.SphereGeometry(0.03), beaconMat);
            beacon.position.y = 6.6;
            group.add(beacon);

            // 整体产生阴影
            group.traverse(child => {
                if(child.isMesh) {
                    child.castShadow = true;
                }
            });

            group.position.set(x + 0.5, 0, z + 0.5);
            return group;
        }

        // --- 5. 交通系统 (移动的车流) ---
        const carsGroup = new THREE.Group();
        scene.add(carsGroup);
        const activeCars = []; // 存储所有活动车辆

        // 生成小汽车模型
        function createCar() {
            const car = new THREE.Group();
            
            // 车身颜色池
            const carColors = [0xef4444, 0x3b82f6, 0xeab308, 0xffffff, 0x1f2937];
            const color = carColors[Math.floor(Math.random() * carColors.length)];
            
            // 车身底座
            const bodyGeo = new THREE.BoxGeometry(0.3, 0.1, 0.15);
            const bodyMat = new THREE.MeshLambertMaterial({ 
                color: color, 
                transparent: true, 
                opacity: 1,
                emissive: new THREE.Color(color),
                emissiveIntensity: isNight ? 0.4 : 0 // 夜晚车身微亮
            });
            bodyMat.userData = { isCarBody: true };
            windowMaterials.push(bodyMat); // 加入缓存以便昼夜切换
            
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.08;
            body.castShadow = true;
            car.add(body);

            // 车顶
            const topGeo = new THREE.BoxGeometry(0.15, 0.1, 0.12);
            const topMat = new THREE.MeshLambertMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 1,
                emissive: new THREE.Color(0xffffff),
                emissiveIntensity: isNight ? 0.2 : 0
            }); 
            topMat.userData = { isCarBody: true };
            windowMaterials.push(topMat);

            const top = new THREE.Mesh(topGeo, topMat);
            top.position.set(-0.02, 0.18, 0);
            top.castShadow = true;
            car.add(top);
            
            // 前车灯 (左右两个发光点)
            const lightGeo = new THREE.BoxGeometry(0.02, 0.04, 0.04);
            const lightMat = new THREE.MeshBasicMaterial({ 
                color: 0xffffee,
                transparent: true,
                opacity: isNight ? 1 : 0 // 白天隐藏车灯，夜晚显示
            });
            windowMaterials.push(lightMat); // 使用 windowMaterials 缓存统一管理
            
            const lightL = new THREE.Mesh(lightGeo, lightMat);
            lightL.position.set(0.15, 0.08, 0.05);
            car.add(lightL);
            
            const lightR = new THREE.Mesh(lightGeo, lightMat);
            lightR.position.set(0.15, 0.08, -0.05);
            car.add(lightR);
            
            // 为车灯添加一个标识，方便在昼夜切换时改变透明度而不是发光强度
            lightMat.userData = { isCarLight: true };

            return car;
        }

        // 生成公交车模型
        function createBus() {
            const bus = new THREE.Group();
            
            // 公交车颜色 (经典绿色或蓝色)
            const busColors = [0x10b981, 0x0284c7, 0xf59e0b];
            const color = busColors[Math.floor(Math.random() * busColors.length)];
            
            // 公交车车身 (更长、更高)
            const bodyGeo = new THREE.BoxGeometry(0.6, 0.25, 0.18);
            const bodyMat = new THREE.MeshLambertMaterial({ 
                color: color, 
                transparent: true, 
                opacity: 1,
                emissive: new THREE.Color(color),
                emissiveIntensity: isNight ? 0.2 : 0 
            });
            bodyMat.userData = { isCarBody: true };
            windowMaterials.push(bodyMat);
            
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.15;
            body.castShadow = true;
            bus.add(body);

            // 公交车车窗 (侧面长条)
            const windowGeo = new THREE.BoxGeometry(0.5, 0.1, 0.19);
            const windowMat = new THREE.MeshLambertMaterial({ 
                color: 0x93c5fd, // 浅蓝色玻璃
                transparent: true, 
                opacity: 0.7,
                emissive: new THREE.Color(0xfef08a), // 夜晚透出温暖的黄光
                emissiveIntensity: isNight ? 0.8 : 0
            });
            windowMat.userData = { isWindow: true }; // 借用建筑窗户的夜景逻辑
            windowMaterials.push(windowMat);

            const windows = new THREE.Mesh(windowGeo, windowMat);
            windows.position.set(0, 0.18, 0);
            bus.add(windows);
            
            // 前车灯
            const lightGeo = new THREE.BoxGeometry(0.02, 0.04, 0.04);
            const lightMat = new THREE.MeshBasicMaterial({ 
                color: 0xffffee,
                transparent: true,
                opacity: isNight ? 1 : 0
            });
            windowMaterials.push(lightMat);
            lightMat.userData = { isCarLight: true };
            
            const lightL = new THREE.Mesh(lightGeo, lightMat);
            lightL.position.set(0.3, 0.1, 0.06);
            bus.add(lightL);
            
            const lightR = new THREE.Mesh(lightGeo, lightMat);
            lightR.position.set(0.3, 0.1, -0.06);
            bus.add(lightR);

            return bus;
        }

        // 生成并添加一辆新车
        function spawnCar() {
            // 找到所有道路
            const roadKeys = [];
            cityMap.forEach((cellObjs, key) => {
                cellObjs.forEach(obj => {
                    if (obj.type.startsWith('road') || obj.type === 'bridge' || obj.type === 'ramp') {
                        roadKeys.push({ key, level: obj.level, obj });
                    }
                });
            });

            if (roadKeys.length === 0) return; // 没有道路不生成车
            if (activeCars.length > Math.min(20, roadKeys.length * 2)) return; // 限制车辆总数

            // 随机选一个起点道路
            const startNode = roadKeys[Math.floor(Math.random() * roadKeys.length)];
            const [startX, startZ] = startNode.key.split(',').map(Number);
            const startLevel = startNode.level;

            // 20%的概率生成公交车，80%生成小汽车
            const isBus = Math.random() < 0.2;
            const carMesh = isBus ? createBus() : createCar();
            
            // 随机一个移动方向 (0: +x, 1: -x, 2: +z, 3: -z)
            const dir = Math.floor(Math.random() * 4);
            let velocity = new THREE.Vector3();
            if (dir === 0) { velocity.set(1, 0, 0); carMesh.rotation.y = 0; }
            else if (dir === 1) { velocity.set(-1, 0, 0); carMesh.rotation.y = Math.PI; }
            else if (dir === 2) { velocity.set(0, 0, 1); carMesh.rotation.y = -Math.PI / 2; }
            else { velocity.set(0, 0, -1); carMesh.rotation.y = Math.PI / 2; }

            // 根据物理车道计算初始坐标（靠右侧 0.2 单位）
            const rightOffset = 0.2;
            let spawnX = startX;
            let spawnZ = startZ;
            let spawnY = startLevel * 0.5; // 根据层级设置高度
            
            if (Math.abs(velocity.x) > 0.5) {
                // 横向行驶，偏移Z轴：+X方向Z加0.2，-X方向Z减0.2
                spawnZ += velocity.x * rightOffset;
            } else {
                // 纵向行驶，偏移X轴：+Z方向X减0.2，-Z方向X加0.2
                spawnX += -velocity.z * rightOffset;
            }

            carMesh.position.set(spawnX, spawnY, spawnZ);
            carsGroup.add(carMesh);

            // 公交车速度稍微慢一点
            const baseSpeed = isBus ? 0.015 : 0.02;

            activeCars.push({
                mesh: carMesh,
                velocity: velocity,
                targetVelocity: velocity.clone(),
                turnPoint: null,
                currentGridKey: startNode.key,
                currentLevel: startLevel,
                hasTurnedInCurrentGrid: true, // 出生格子不需要立即转向
                speed: baseSpeed + Math.random() * 0.01, // 随机速度
                lifespan: 3000 + Math.random() * 3000 // 赋予随机寿命帧数 (延长消失时间)
            });
        }

        // 更新车流逻辑
        function updateTraffic() {
            // 每隔一段时间尝试生成新车
            if (Math.random() < 0.02) spawnCar();

            for (let i = activeCars.length - 1; i >= 0; i--) {
                const car = activeCars[i];
                
                // 寿命递减与渐隐逻辑
                car.lifespan -= 1;
                if (car.lifespan < 100) {
                    // 最后100帧开始逐渐透明
                    const opacity = Math.max(0, car.lifespan / 100);
                    car.mesh.children.forEach(child => {
                        if (child.material) {
                            child.material.opacity = opacity;
                        }
                    });
                }

                // 如果寿命耗尽，移除车辆
                if (car.lifespan <= 0) {
                    carsGroup.remove(car.mesh);
                    activeCars.splice(i, 1);
                    continue;
                }
                
                // 移动车辆 (水平移动)
                car.mesh.position.x += car.velocity.x * car.speed;
                car.mesh.position.z += car.velocity.z * car.speed;

                // 获取当前所在的网格坐标
                const gridX = Math.floor(car.mesh.position.x) + 0.5;
                const gridZ = Math.floor(car.mesh.position.z) + 0.5;
                const currentKey = `${gridX},${gridZ}`;

                // 动态更新车辆当前层级（通过其实际高度判断，允许有一定的误差）
                car.currentLevel = Math.round(car.mesh.position.y / 0.5);

                let currentRoad = null;
                if (cityMap.has(currentKey)) {
                    const cellObjs = cityMap.get(currentKey);
                    // 寻找匹配当前层级的道路或坡道
                    currentRoad = cellObjs.find(obj => {
                        if (!(obj.type.startsWith('road') || obj.type === 'bridge' || obj.type === 'ramp')) return false;
                        if (obj.type === 'ramp') {
                            return obj.mesh.userData.levelStart === car.currentLevel || obj.mesh.userData.levelEnd === car.currentLevel;
                        }
                        return obj.level === car.currentLevel;
                    });
                }

                // 高度与俯仰角计算
                const prevY = car.mesh.position.y;
                let targetY = prevY;

                if (currentRoad) {
                    if (currentRoad.type === 'ramp') {
                        const rampData = currentRoad.mesh.userData;
                        const px = car.mesh.position.x - gridX;
                        const pz = car.mesh.position.z - gridZ;
                        let progress = 0;
                        if (rampData.orientation === 0) progress = pz + 0.5;
                        else if (rampData.orientation === 1) progress = px + 0.5;
                        else if (rampData.orientation === 2) progress = 0.5 - pz;
                        else if (rampData.orientation === 3) progress = 0.5 - px;
                        
                        targetY = (1 - progress) * (rampData.levelStart * 0.5) + progress * (rampData.levelEnd * 0.5);
                    } else {
                        targetY = currentRoad.level * 0.5;
                    }
                }

                // 平滑过渡高度并计算俯仰角
                car.mesh.position.y = targetY;
                const dy = targetY - prevY;
                
                // 因为汽车模型的车头朝向是 +X，所以俯仰角应该是围绕Z轴的旋转
                // 我们限制最大俯仰角，防止在刚进入平路时瞬间抖动
                const maxSin = Math.max(-1, Math.min(1, dy / car.speed));
                let targetPitch = Math.asin(maxSin);
                
                // 平滑俯仰角
                if (currentRoad && currentRoad.type !== 'ramp') {
                    targetPitch = 0;
                }
                car.mesh.rotation.z = car.mesh.rotation.z * 0.8 + targetPitch * 0.2;

                // 初始化或进入新网格时，计算目标方向和转向点
                if (car.currentGridKey !== currentKey) {
                    car.currentGridKey = currentKey;
                    
                    if (currentRoad) {
                        const roadType = currentRoad.mesh.userData.roadType;
                        const orientation = currentRoad.mesh.userData.orientation;
                        
                        const vX = Math.round(car.velocity.x);
                        const vZ = Math.round(car.velocity.z);
                        
                        // 计算出路口的出口方向
                        let targetVX = vX, targetVZ = vZ, targetRotY = car.mesh.rotation.y;
                        
                        if (roadType === 'curve') {
                            if (orientation === 0) {
                                if (vX === 1 && vZ === 0) { targetVX = 0; targetVZ = 1; }
                                else if (vZ === -1 && vX === 0) { targetVX = -1; targetVZ = 0; }
                            } else if (orientation === 1) {
                                if (vX === -1 && vZ === 0) { targetVX = 0; targetVZ = 1; }
                                else if (vZ === -1 && vX === 0) { targetVX = 1; targetVZ = 0; }
                            } else if (orientation === 2) {
                                if (vX === -1 && vZ === 0) { targetVX = 0; targetVZ = -1; }
                                else if (vZ === 1 && vX === 0) { targetVX = 1; targetVZ = 0; }
                            } else if (orientation === 3) {
                                if (vX === 1 && vZ === 0) { targetVX = 0; targetVZ = -1; }
                                else if (vZ === 1 && vX === 0) { targetVX = -1; targetVZ = 0; }
                            }
                        } else if (roadType === 'straight') {
                            if (orientation % 2 === 0 && vX !== 0) {
                                targetVX = 0; targetVZ = Math.random() > 0.5 ? 1 : -1;
                            } else if (orientation % 2 === 1 && vZ !== 0) {
                                targetVX = Math.random() > 0.5 ? 1 : -1; targetVZ = 0;
                            }
                        } else if (roadType === 'cross') {
                            const rand = Math.random();
                            if (rand < 0.33) { targetVX = vZ; targetVZ = -vX; } // 左转
                            else if (rand < 0.66) { targetVX = -vZ; targetVZ = vX; } // 右转
                        } else if (roadType === 't_junction') {
                            let allowedDirs = [];
                            if (orientation === 0) allowedDirs = [[-1, 0], [1, 0], [0, 1]];
                            else if (orientation === 1) allowedDirs = [[0, -1], [0, 1], [1, 0]];
                            else if (orientation === 2) allowedDirs = [[-1, 0], [1, 0], [0, -1]];
                            else if (orientation === 3) allowedDirs = [[0, -1], [0, 1], [-1, 0]];
                            const possibleExits = allowedDirs.filter(d => d[0] !== -vX || d[1] !== -vZ);
                            if (possibleExits.length > 0) {
                                const exit = possibleExits[Math.floor(Math.random() * possibleExits.length)];
                                targetVX = exit[0]; targetVZ = exit[1];
                            } else {
                                targetVX = -vX; targetVZ = -vZ; // 掉头
                            }
                        }

                        // 如果目标方向和当前方向不同，则需要转向
                        if (targetVX !== vX || targetVZ !== vZ) {
                            car.targetVelocity.set(targetVX, 0, targetVZ);
                            
                            // 确定目标朝向
                            if (targetVX === 1) targetRotY = 0;
                            else if (targetVX === -1) targetRotY = Math.PI;
                            else if (targetVZ === 1) targetRotY = -Math.PI / 2;
                            else if (targetVZ === -1) targetRotY = Math.PI / 2;
                            car.targetRotY = targetRotY;

                            // 计算转向交点 (Turn Point)
                            // 物理车道靠右偏移0.2
                            const rightOffset = 0.2;
                            if (targetVX === -vX && targetVZ === -vZ) {
                                // 网格内的特殊掉头
                                car.turnPoint = {
                                    x: gridX + (targetVZ === 0 ? 0 : -targetVZ * rightOffset),
                                    z: gridZ + (targetVX === 0 ? 0 : targetVX * rightOffset)
                                };
                            } else {
                                car.turnPoint = {
                                    x: gridX - (vZ + targetVZ) * rightOffset,
                                    z: gridZ + (vX + targetVX) * rightOffset
                                };
                            }
                        } else {
                            car.turnPoint = null; // 直行不需要转向点
                        }
                    }
                }

                // 检查是否到达转向点
                if (car.turnPoint) {
                    const vX = Math.round(car.velocity.x);
                    const vZ = Math.round(car.velocity.z);
                    let passed = false;
                    
                    if (vX === 1 && car.mesh.position.x >= car.turnPoint.x) passed = true;
                    else if (vX === -1 && car.mesh.position.x <= car.turnPoint.x) passed = true;
                    else if (vZ === 1 && car.mesh.position.z >= car.turnPoint.z) passed = true;
                    else if (vZ === -1 && car.mesh.position.z <= car.turnPoint.z) passed = true;

                    if (passed) {
                        // 瞬间对齐到交点，执行转向
                        car.mesh.position.x = car.turnPoint.x;
                        car.mesh.position.z = car.turnPoint.z;
                        
                        car.velocity.copy(car.targetVelocity);
                        car.mesh.rotation.y = car.targetRotY;
                        
                        car.turnPoint = null; // 转向完成
                    }
                }

                // 如果开出边界或开出道路，则销毁车辆或掉头
                const limit = gridSize / 2;
                let isOutOfBounds = car.mesh.position.x < -limit || car.mesh.position.x > limit || 
                                    car.mesh.position.z < -limit || car.mesh.position.z > limit;
                
                if (isOutOfBounds) {
                    carsGroup.remove(car.mesh);
                    activeCars.splice(i, 1);
                } else if (!currentRoad) {
                    // 如果在网格内但开出了道路(比如断头路)，则让小车掉头
                    car.velocity.set(-car.velocity.x, 0, -car.velocity.z);
                    car.mesh.rotation.y += Math.PI;
                    
                    // 切换到对向物理车道
                    const rightOffset = 0.2;
                    if (Math.abs(car.velocity.x) > 0.5) {
                        car.mesh.position.z = gridZ + car.velocity.x * rightOffset;
                    } else {
                        car.mesh.position.x = gridX - car.velocity.z * rightOffset;
                    }

                    car.mesh.position.addScaledVector(car.velocity, car.speed * 2);
                    car.currentGridKey = null; // 强制重新计算所在网格逻辑
                }
            }
        }

        // 清理特定网格内的所有车辆
        function cleanupCarsInGrid(gridKey) {
            for (let i = activeCars.length - 1; i >= 0; i--) {
                const car = activeCars[i];
                const gridX = Math.floor(car.mesh.position.x) + 0.5;
                const gridZ = Math.floor(car.mesh.position.z) + 0.5;
                if (`${gridX},${gridZ}` === gridKey) {
                    carsGroup.remove(car.mesh);
                    activeCars.splice(i, 1);
                }
            }
        }

        // --- 6. 交互系统 (光标与点击) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // 悬浮光标提示
        const cursorGeo = new THREE.BoxGeometry(1, 0.1, 1);
        const cursorMat = new THREE.MeshBasicMaterial({ 
            color: 0x4f46e5, 
            opacity: 0.5, 
            transparent: true,
            depthWrite: false
        });
        const cursor = new THREE.Mesh(cursorGeo, cursorMat);
        cursor.visible = false;
        scene.add(cursor);

        // 监听鼠标移动
        function onPointerMove(event) {
            // 兼容触摸和鼠标
            const clientX = event.clientX || (event.touches && event.touches[0].clientX);
            const clientY = event.clientY || (event.touches && event.touches[0].clientY);
            
            if (clientX === undefined) return;

            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // 优先通过底面网格确定 x, z
            const intersectsPlane = raycaster.intersectObject(interactPlane);

            if (intersectsPlane.length > 0) {
                const intersect = intersectsPlane[0];
                // 计算对齐到网格的坐标
                const x = Math.floor(intersect.point.x) + 0.5;
                const z = Math.floor(intersect.point.z) + 0.5;
                const key = `${x},${z}`;

                // 直接根据 cityMap 中该网格的最高层级计算光标高度
                let targetY = 0.05; // 默认地面高度
                if (currentTool === 'demolish' || elevationMode || currentTool === 'pointer') {
                    if (cityMap.has(key)) {
                        const cellObjs = cityMap.get(key);
                        if (cellObjs && cellObjs.length > 0) {
                            const topObj = cellObjs[cellObjs.length - 1];
                            targetY = topObj.level * 0.5 + 0.05; // 层级 * 0.5 作为物理高度，加上 0.05 悬浮偏移
                        }
                    }
                }
                
                // 限制在网格范围内
                const limit = gridSize / 2;
                
                let size = ['school', 'hospital', 'fire_station', 'police_station', 'amusement_park', 'oriental_pearl'].includes(currentTool) ? 2 : 1;
                let offsetX = ['school', 'hospital', 'fire_station', 'police_station', 'amusement_park', 'oriental_pearl'].includes(currentTool) ? 0.5 : 0;
                let offsetZ = ['school', 'hospital', 'fire_station', 'police_station', 'amusement_park', 'oriental_pearl'].includes(currentTool) ? 0.5 : 0;
                
                if (x >= -limit && x + (size - 1) <= limit && z >= -limit && z + (size - 1) <= limit) {
                    cursor.position.set(x + offsetX, targetY, z + offsetZ);
                    cursor.scale.set(size, 1, size);
                    cursor.visible = true;
                    
                    // 根据工具状态更新光标颜色
                    if (elevationMode === 'up' || elevationMode === 'down') {
                        cursorMat.color.setHex(0x9333ea); // 紫色表示高度模式
                        cursorMat.opacity = 0.8;
                    } else if (elevationMode === 'ramp') {
                        cursorMat.color.setHex(0x3b82f6); // 蓝色表示坡道模式
                        cursorMat.opacity = 0.8;
                    } else if (currentTool === 'demolish') {
                        cursorMat.color.setHex(0xef4444); // 红色
                    } else if (currentTool === 'pointer') {
                        cursorMat.color.setHex(0xffffff); // 白色 (选择模式)
                        cursorMat.opacity = 0.8;
                    } else {
                        cursorMat.opacity = 0.5; // 恢复默认透明度
                        let occupied = false;
                        for(let i = 0; i < size; i++) {
                            for(let j = 0; j < size; j++) {
                                if (cityMap.has(`${x+i},${z+j}`)) {
                                    occupied = true;
                                }
                            }
                        }
                        if (occupied) {
                            cursorMat.color.setHex(0x9ca3af); // 灰色 (已占用)
                        } else {
                            cursorMat.color.setHex(0x4f46e5); // 靛蓝色 (可放置)
                        }
                    }
                } else {
                    cursor.visible = false;
                }
            } else {
                cursor.visible = false;
            }
        }

        // 记录手指/鼠标按下的初始坐标
        let pointerDownCoords = { x: 0, y: 0 };

        function onPointerDown(event) {
            // 如果点击的是 UI 元素，则不执行 3D 交互
            if (event.target.closest('.pointer-events-auto')) return;
            
            // 仅允许左键 (button 0) 触发记录，中键 (1) 和右键 (2) 仅用于视角控制
            if (event.button !== 0) return; 

            pointerDownCoords = { x: event.clientX, y: event.clientY };
        }

        // 放置或拆除物体
        function onPointerUp(event) {
            if (event.target.closest('.pointer-events-auto')) return;
            if (event.button !== 0) return;
            
            // 计算按下和抬起时的距离
            const dist = Math.hypot(event.clientX - pointerDownCoords.x, event.clientY - pointerDownCoords.y);
            // 如果距离大于 10px，判定为滑动（旋转/平移视角），不触发点击建造
            if (dist > 10) return;

            // 重新执行射线检测获取精确坐标（由于移动端没有hover状态，必须在此处重新检测）
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            // 如果当前工具是拆除工具，我们应该对所有场景物体进行射线检测，以便精准点选（无论是地面的房子还是高架桥）
            let intersectObj = null;
            if (currentTool === 'demolish' || elevationMode) {
                // 不仅仅检测地面，检测所有建筑和道路
                const allIntersects = raycaster.intersectObjects(objectsGroup.children, true);
                if (allIntersects.length > 0) {
                    // 向上查找，直到找到包含 userData 的 Mesh 或 Group
                    let hit = allIntersects[0].object;
                    while (hit && (!hit.userData || (!hit.userData.isRoad && !hit.userData.type && !hit.userData.isBuilding && !hit.userData.isTree && !hit.userData.isGreen && !hit.userData.isWater && !hit.parent?.userData?.isRoad && !hit.parent?.userData?.isBuilding))) {
                        hit = hit.parent;
                    }
                    if (hit) {
                        intersectObj = hit.userData.isRoad || hit.userData.type || hit.userData.isBuilding || hit.userData.isTree || hit.userData.isGreen || hit.userData.isWater ? hit : hit.parent;
                    }
                }
            }

            const intersectsPlane = raycaster.intersectObject(interactPlane);
            if (intersectsPlane.length === 0) return;

            const intersect = intersectsPlane[0];
            const rawGridX = Math.floor(intersect.point.x) + 0.5;
            const rawGridZ = Math.floor(intersect.point.z) + 0.5;

            let size = ['school', 'hospital', 'fire_station', 'police_station', 'amusement_park', 'oriental_pearl'].includes(currentTool) ? 2 : 1;
            
            const gridX = rawGridX;
            const gridZ = rawGridZ;
            const limit = gridSize / 2;

            // 边界检查
            if (!(gridX >= -limit && gridX + (size - 1) <= limit && gridZ >= -limit && gridZ + (size - 1) <= limit)) {
                return;
            }

            const key = `${gridX},${gridZ}`;

            // 获取该网格最高层的对象 (默认逻辑)
            const cellObjs = cityMap.get(key) || [];
            let topLevel = cellObjs.length > 0 ? cellObjs[cellObjs.length - 1].level : 0;
            let topObj = cellObjs.length > 0 ? cellObjs[cellObjs.length - 1] : null;

            // 如果精准点选到了某个特定的 3D 模型（用于拆除和高度调整），覆盖默认的 topObj
            if (intersectObj && cellObjs.length > 0) {
                const foundObj = cellObjs.find(o => o.mesh === intersectObj || (o.mainKey && getObjAtLevel(o.mainKey, o.level)?.mesh === intersectObj));
                if (foundObj) {
                    topObj = foundObj;
                    topLevel = foundObj.level;
                }
            }

            // 如果当前处于高度调整模式，处理道路的高度升降
            if (elevationMode) {
                if (topObj && (topObj.type.startsWith('road') || topObj.type === 'bridge' || topObj.type === 'ramp')) {
                    // 只允许对道路或桥梁调整高度
                    const currentLevel = topObj.level;
                    
                    // 手动坡道/压平逻辑
                    if (elevationMode === 'ramp') {
                        if (topObj.type === 'ramp') {
                            // 压平坡道，恢复为底层直道
                            const rampData = topObj.mesh.userData;
                            const baseLevel = Math.min(rampData.levelStart, rampData.levelEnd);
                            
                            objectsGroup.remove(topObj.mesh);
                            deleteObjAtLevel(key, currentLevel);
                            cleanupCarsInGrid(key);
                            
                            let newMesh;
                            if (baseLevel === 0) {
                                newMesh = createRoad(gridX, gridZ);
                                if (rampData.orientation !== undefined) {
                                    newMesh.rotation.y = rampData.orientation * (Math.PI / 2);
                                    newMesh.userData.orientation = rampData.orientation % 2;
                                }
                                setObjAtLevel(key, 0, { type: 'road', mesh: newMesh });
                            } else {
                                newMesh = createBridge(gridX, gridZ, baseLevel);
                                if (rampData.orientation !== undefined) {
                                    newMesh.rotation.y = rampData.orientation * (Math.PI / 2);
                                    newMesh.userData.orientation = rampData.orientation % 2;
                                }
                                setObjAtLevel(key, baseLevel, { type: 'bridge', mesh: newMesh });
                            }
                            if (newMesh) objectsGroup.add(newMesh);
                        } else {
                            // 尝试将直道变成坡道 (寻找相邻高度差为1的道路)
                            updateRampsAround(gridX, gridZ, currentLevel, true);
                        }
                        return;
                    }

                    // 如果是对坡道进行升降，不允许直接升降，只能先压平
                    if (topObj.type === 'ramp') return;

                    let targetLevel = currentLevel;
                    
                    if (elevationMode === 'up') targetLevel++;
                    if (elevationMode === 'down' && currentLevel > 0) targetLevel--;
                    
                    if (targetLevel !== currentLevel) {
                        // 移除旧网格
                        objectsGroup.remove(topObj.mesh);
                        deleteObjAtLevel(key, currentLevel);
                        
                        // 清理该网格上的车辆，防止卡顿
                        cleanupCarsInGrid(key);

                        let newMesh;
                        if (targetLevel === 0) {
                            // 降回到地面，变成普通道路
                            const type = topObj.type === 'bridge' || topObj.type === 'ramp' ? 'road' : topObj.type;
                            if (type === 'road') newMesh = createRoad(gridX, gridZ);
                            else if (type === 'road_curve') newMesh = createCurveRoad(gridX, gridZ);
                            else if (type === 'road_cross') newMesh = createCrossRoad(gridX, gridZ);
                            else if (type === 'road_t') newMesh = createTRoad(gridX, gridZ);
                            
                            if (newMesh && topObj.mesh.userData.orientation !== undefined) {
                                newMesh.rotation.y = topObj.mesh.userData.orientation * (Math.PI / 2);
                                newMesh.userData.orientation = topObj.mesh.userData.orientation;
                            }
                            setObjAtLevel(key, 0, { type: type, mesh: newMesh });
                        } else {
                            // 提升为桥梁/高架
                            newMesh = createBridge(gridX, gridZ, targetLevel);
                            if (topObj.mesh.userData.orientation !== undefined) {
                                newMesh.rotation.y = topObj.mesh.userData.orientation * (Math.PI / 2);
                                newMesh.userData.orientation = topObj.mesh.userData.orientation;
                            }
                            setObjAtLevel(key, targetLevel, { type: 'bridge', mesh: newMesh });
                        }
                        
                        if (newMesh) objectsGroup.add(newMesh);
                        // 关闭自动转换坡道
                        // updateRampsAround(gridX, gridZ, targetLevel);
                    }
                }
                return;
            }

            // 如果当前工具是“选择/指针”，且没有高度模式，则不执行任何操作
            if (currentTool === 'pointer') return;

            // 检查是否靠近边缘并触发自动扩建
            // 确保建筑距离边缘永远有两行以上 (即 limit - max(|gridX|, |gridZ|) <= 2)
            let needsExpansion = false;
            for(let i=0; i<size; i++) {
                for(let j=0; j<size; j++) {
                    const checkX = gridX + i;
                    const checkZ = gridZ + j;
                    if (limit - Math.abs(checkX) <= 2 || limit - Math.abs(checkZ) <= 2) {
                        needsExpansion = true;
                    }
                }
            }
            if (needsExpansion) {
                expandGrid();
            }

            if (currentTool === 'demolish') {
                // 拆除逻辑
                if (topObj) {
                    // 如果是在高度调整模式下，忽略拆除操作
                    if (elevationMode) return;
                    
                    // 清理该网格上的车辆，防止卡顿
                    if (topObj.type.startsWith('road') || topObj.type === 'bridge' || topObj.type === 'ramp') {
                        cleanupCarsInGrid(key);
                    }

                    // 桥梁特殊拆除逻辑：恢复水面
                    if (topObj.type === 'bridge') {
                        objectsGroup.remove(topObj.mesh);
                        deleteObjAtLevel(key, topLevel);
                        
                        // 检查下一层是否有水面，如果没有则生成
                        const baseObj = getObjAtLevel(key, 0);
                        if (!baseObj || baseObj.type !== 'water') {
                            const newWaterMesh = createWater(gridX, gridZ);
                            objectsGroup.add(newWaterMesh);
                            setObjAtLevel(key, 0, { type: 'water', mesh: newWaterMesh });
                        }
                        return;
                    }

                    // 如果是占多格的建筑（非主节点）
                    if (topObj.mainKey) {
                        const mainObj = getObjAtLevel(topObj.mainKey, topLevel);
                        if (mainObj) {
                            objectsGroup.remove(mainObj.mesh);
                            if (mainObj.mesh.userData.occupiedKeys) {
                                mainObj.mesh.userData.occupiedKeys.forEach(k => deleteObjAtLevel(k, topLevel));
                            }
                        }
                    } else {
                        objectsGroup.remove(topObj.mesh);
                        if (topObj.mesh.userData.occupiedKeys) {
                            topObj.mesh.userData.occupiedKeys.forEach(k => deleteObjAtLevel(k, topLevel));
                        } else {
                            deleteObjAtLevel(key, topLevel);
                        }
                    }
                }
            } else {
                // 检查是否被占用
                let occupied = false;
                for(let i=0; i<size; i++) {
                    for(let j=0; j<size; j++) {
                        const checkKey = `${gridX+i},${gridZ+j}`;
                        if (getObjAtLevel(checkKey, 0)) {
                            occupied = true;
                        }
                    }
                }

                // 建造或旋转逻辑
                if (occupied) {
                    const clickedObj = getObjAtLevel(`${rawGridX},${rawGridZ}`, 0);
                    if (!clickedObj) return;
                    const mainObj = clickedObj.mainKey ? getObjAtLevel(clickedObj.mainKey, 0) : clickedObj;

                    // 水面上建桥逻辑：当前工具是直路且点击的是水面
                    if (mainObj.type === 'water' && currentTool === 'road') {
                        // 移除原来的水面
                        objectsGroup.remove(mainObj.mesh);
                        deleteObjAtLevel(`${rawGridX},${rawGridZ}`, 0);
                        
                        // 建立第一层桥梁 (level = 1)
                        let newMesh = createBridge(rawGridX, rawGridZ, 1);
                        objectsGroup.add(newMesh);
                        setObjAtLevel(`${rawGridX},${rawGridZ}`, 1, { type: 'bridge', mesh: newMesh });
                        
                        // 补回底层的纯水面
                        let baseWater = createWater(rawGridX, rawGridZ);
                        objectsGroup.add(baseWater);
                        setObjAtLevel(`${rawGridX},${rawGridZ}`, 0, { type: 'water', mesh: baseWater });
                        
                        return;
                    }

                    // 旋转逻辑：同种工具点击，且属于可旋转类型
                    const rotatableTypes = ['school', 'hospital', 'fire_station', 'police_station', 'amusement_park', 'oriental_pearl', 'road', 'road_curve', 'road_cross', 'road_t', 'bridge'];
                    if ((mainObj.type === currentTool && rotatableTypes.includes(currentTool)) || 
                        (mainObj.type === 'bridge' && currentTool === 'road')) { // 用道路工具点击桥也能旋转
                        mainObj.mesh.rotation.y += Math.PI / 2;
                        mainObj.mesh.userData.orientation = ((mainObj.mesh.userData.orientation || 0) + 1) % 4;
                        return;
                    }

                    // 更换样式逻辑：同种工具点击
                    if (mainObj.type === currentTool && currentTool === 'commercial') {
                        objectsGroup.remove(mainObj.mesh);
                        let nextStyle = (mainObj.mesh.userData.style + 1) % 8; // 增加到8种样式
                        // 保持原有的颜色和高度，仅更换形状
                        let newMesh = createCommercial(mainObj.mesh.position.x, mainObj.mesh.position.z, nextStyle, mainObj.mesh.userData.color, mainObj.mesh.userData.height);
                        objectsGroup.add(newMesh);
                        setObjAtLevel(`${rawGridX},${rawGridZ}`, 0, { type: currentTool, mesh: newMesh });
                        
                        // 简单的弹出动画效果
                        newMesh.scale.set(0.8, 0.8, 0.8);
                        const animateIn = () => {
                            let s = newMesh.scale.x;
                            s += 0.05;
                            if(s <= 1) {
                                newMesh.scale.setScalar(s);
                                requestAnimationFrame(animateIn);
                            } else {
                                newMesh.scale.setScalar(1);
                            }
                        };
                        animateIn();
                        return;
                    }

                    // 道路替换逻辑
                    if (mainObj.type.startsWith('road') && currentTool.startsWith('road')) {
                        objectsGroup.remove(mainObj.mesh);
                        let newMesh;
                        switch (currentTool) {
                            case 'road': newMesh = createRoad(rawGridX, rawGridZ); break;
                            case 'road_curve': newMesh = createCurveRoad(rawGridX, rawGridZ); break;
                            case 'road_cross': newMesh = createCrossRoad(rawGridX, rawGridZ); break;
                            case 'road_t': newMesh = createTRoad(rawGridX, rawGridZ); break;
                        }
                        newMesh.rotation.y = mainObj.mesh.rotation.y;
                        newMesh.userData.orientation = mainObj.mesh.userData.orientation;
                        
                        objectsGroup.add(newMesh);
                        setObjAtLevel(`${rawGridX},${rawGridZ}`, 0, { type: currentTool, mesh: newMesh });
                    }
                    return; // 如果被占用，无论是否发生旋转/替换，都不再执行后续建造
                } else {
                    // 建造逻辑
                    let newMesh;
                    switch (currentTool) {
                        case 'residential': newMesh = createResidential(gridX, gridZ); break;
                        case 'commercial': newMesh = createCommercial(gridX, gridZ); break;
                        case 'tree': newMesh = createTree(gridX, gridZ); break;
                        case 'road': newMesh = createRoad(gridX, gridZ); break;
                        case 'road_curve': newMesh = createCurveRoad(gridX, gridZ); break;
                        case 'road_cross': newMesh = createCrossRoad(gridX, gridZ); break;
                        case 'road_t': newMesh = createTRoad(gridX, gridZ); break;
                        case 'water': newMesh = createWater(gridX, gridZ); break;
                        case 'flower': newMesh = createFlowerField(gridX, gridZ); break;
                        case 'hospital': newMesh = createHospital(gridX, gridZ); break;
                        case 'school': newMesh = createSchool(gridX, gridZ); break;
                        case 'fire_station': newMesh = createFireStation(gridX, gridZ); break;
                        case 'police_station': newMesh = createPoliceStation(gridX, gridZ); break;
                        case 'amusement_park': newMesh = createAmusementPark(gridX, gridZ); break;
                        case 'oriental_pearl': newMesh = createOrientalPearl(gridX, gridZ); break;
                    }

                    if (newMesh) {
                        // 简单的弹出动画效果
                        newMesh.scale.set(0.1, 0.1, 0.1);
                        const animateIn = () => {
                            let s = newMesh.scale.x;
                            s += 0.1;
                            if(s <= 1) {
                                newMesh.scale.setScalar(s);
                                requestAnimationFrame(animateIn);
                            }
                        };
                        animateIn();

                        objectsGroup.add(newMesh);
                        
                        const occupiedKeys = [];
                        for(let i=0; i<size; i++) {
                            for(let j=0; j<size; j++) {
                                const k = `${gridX+i},${gridZ+j}`;
                                occupiedKeys.push(k);
                                if (i === 0 && j === 0) {
                                    setObjAtLevel(k, 0, { type: currentTool, mesh: newMesh });
                                } else {
                                    setObjAtLevel(k, 0, { type: currentTool, mesh: newMesh, mainKey: key });
                                }
                            }
                        }
                        newMesh.userData.occupiedKeys = occupiedKeys;
                    }
                }
            }
        }

        // 注册事件监听器到容器上
        renderer.domElement.addEventListener('pointermove', onPointerMove);
        renderer.domElement.addEventListener('pointerdown', onPointerDown);
        renderer.domElement.addEventListener('pointerup', onPointerUp);

        // --- 6. UI 逻辑 ---
        const toolBtns = document.querySelectorAll('.tool-btn');
        toolBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // 移除所有激活状态
                toolBtns.forEach(b => {
                    b.classList.remove('active');
                    if(b.dataset.tool !== 'demolish') b.classList.add('text-gray-600');
                });
                
                // 设置当前激活状态
                btn.classList.add('active');
                if(btn.dataset.tool !== 'demolish') btn.classList.remove('text-gray-600');
                
                currentTool = btn.dataset.tool;
                
                // 主动触发一次鼠标移动以更新光标颜色
                onPointerMove({ clientX: window.innerWidth / 2, clientY: window.innerHeight / 2 });
            });
        });

        // --- 7. 天气与环境系统 ---
        const timeBtn = document.getElementById('time-btn');
        const timeIcon = document.getElementById('time-icon');
        const timeText = document.getElementById('time-text');
        
        const weatherBtn = document.getElementById('weather-btn');
        const weatherIcon = document.getElementById('weather-icon');
        const weatherText = document.getElementById('weather-text');

        // 切换昼夜
        timeBtn.addEventListener('click', () => {
            isNight = !isNight;
            if (isNight) {
                timeIcon.textContent = '🌙';
                timeText.textContent = '夜晚';
                scene.background = new THREE.Color(0x0f172a); // 深蓝色夜空
                scene.fog.color.setHex(0x0f172a);
                ambientLight.intensity = 0.1;
                dirLight.intensity = 0.2;
                // 开启建筑和车辆发光
                windowMaterials.forEach(mat => {
                    if (mat.userData && mat.userData.isCarLight) {
                        mat.opacity = 1; // 车灯通过透明度控制显示
                    } else if (mat.userData && mat.userData.isStructureRing) {
                        mat.emissiveIntensity = 0.3; // 春笋大厦的结构线微亮
                    } else if (mat.userData && mat.userData.isCloud) {
                        mat.color.setHex(0x334155); // 云朵在夜晚变暗
                    } else {
                        // 如果是汽车车身/车顶，发光弱一点，如果是建筑，发光强一点
                        mat.emissiveIntensity = mat.userData && mat.userData.isCarBody ? 0.4 : 0.7;
                    }
                });
            } else {
                timeIcon.textContent = '☀️';
                timeText.textContent = '白天';
                const skyColor = isRaining ? 0x64748b : 0x87CEEB;
                scene.background = new THREE.Color(skyColor); // 恢复白天天空
                scene.fog.color.setHex(skyColor);
                ambientLight.intensity = isRaining ? 0.4 : 0.6;
                dirLight.intensity = isRaining ? 0.3 : 0.8;
                // 关闭建筑和车辆发光
                windowMaterials.forEach(mat => {
                    if (mat.userData && mat.userData.isCarLight) {
                        mat.opacity = 0;
                    } else if (mat.userData && mat.userData.isCloud) {
                        mat.color.setHex(isRaining ? 0x94a3b8 : 0xffffff); // 云朵在白天恢复白色或阴天灰
                    } else {
                        mat.emissiveIntensity = 0;
                    }
                });
            }
        });

        // 切换天气
        weatherBtn.addEventListener('click', () => {
            isRaining = !isRaining;
            if (isRaining) {
                weatherIcon.textContent = '🌧️';
                weatherText.textContent = '雨天';
                rainSystem.visible = true;
                // 雨天光线变暗
                if (!isNight) {
                    scene.background = new THREE.Color(0x64748b); // 阴天灰色
                    scene.fog.color.setHex(0x64748b);
                    ambientLight.intensity = 0.4;
                    dirLight.intensity = 0.3;
                    // 云层变暗
                    windowMaterials.forEach(mat => {
                        if (mat.userData && mat.userData.isCloud) {
                            mat.color.setHex(0x94a3b8);
                        }
                    });
                }
            } else {
                weatherIcon.textContent = '🌤️';
                weatherText.textContent = '晴天';
                rainSystem.visible = false;
                // 恢复光线
                if (!isNight) {
                    scene.background = new THREE.Color(0x87CEEB);
                    scene.fog.color.setHex(0x87CEEB);
                    ambientLight.intensity = 0.6;
                    dirLight.intensity = 0.8;
                    // 云层恢复白色
                    windowMaterials.forEach(mat => {
                        if (mat.userData && mat.userData.isCloud) {
                            mat.color.setHex(0xffffff);
                        }
                    });
                }
            }
        });

        // --- 8. 存档系统 (保存与读取) ---
        const saveBtn = document.getElementById('save-btn');
        const loadBtn = document.getElementById('load-btn');
        const exportBtn = document.getElementById('export-btn');
        const importBtn = document.getElementById('import-btn');
        const fileInput = document.getElementById('file-input');
        const saveStatus = document.getElementById('save-status');

        function showStatus(msg, color) {
            saveStatus.textContent = msg;
            saveStatus.style.color = color;
            setTimeout(() => saveStatus.textContent = '', 3000);
        }

        // 获取当前城市的序列化数据
        function getCityData() {
            const dataToSave = [];
            cityMap.forEach((arr, key) => {
                arr.forEach(obj => {
                    // 只保存主节点的数据
                    if (obj.mainKey) return;

                    const item = {
                        key: key,
                        level: obj.level, // 新增 level 字段
                        type: obj.type,
                        x: obj.mesh.position.x - (obj.mesh.userData.size ? 0.5 : 0),
                        z: obj.mesh.position.z - (obj.mesh.userData.size ? 0.5 : 0),
                        orientation: obj.mesh.userData.orientation !== undefined ? obj.mesh.userData.orientation : 0,
                        style: obj.mesh.userData.style,
                        color: obj.mesh.userData.color,
                        height: obj.mesh.userData.height,
                        levelStart: obj.mesh.userData.levelStart,
                        levelEnd: obj.mesh.userData.levelEnd
                    };
                    dataToSave.push(item);
                });
            });
            return {
                gridSize: gridSize,
                buildings: dataToSave
            };
        }

        // 根据数据重建城市
        function loadCityData(data) {
            // 兼容旧版存档
            let buildingsData = Array.isArray(data) ? data : data.buildings;
            let savedGridSize = Array.isArray(data) ? 30 : (data.gridSize || 30);

            // 1. 恢复网格大小
            if (savedGridSize > gridSize) {
                while (gridSize < savedGridSize) {
                    expandGrid();
                }
            }

            // 2. 清空当前城市
            cityMap.forEach((arr, key) => {
                arr.forEach(obj => {
                    if (obj.mesh) objectsGroup.remove(obj.mesh);
                });
            });
            cityMap.clear();
            
            // 清空动态车辆
            activeCars.forEach(car => carsGroup.remove(car.mesh));
            activeCars.length = 0;
            
            // 清理之前的发光材质缓存
            windowMaterials.length = 0; 

            // 3. 重建城市
            buildingsData.forEach(item => {
                let newMesh;
                // 兼容旧存档中没有 level 字段的数据，默认放到 level 0，如果是 bridge 放到 level 1
                const itemLevel = item.level !== undefined ? item.level : (item.type === 'bridge' ? 1 : 0);

                switch (item.type) {
                    case 'residential': 
                        newMesh = createResidential(item.x, item.z, item.style); 
                        break;
                    case 'commercial': 
                        newMesh = createCommercial(item.x, item.z, item.style, item.color, item.height); 
                        break;
                    case 'tree': 
                        newMesh = createTree(item.x, item.z, item.style, item.color); 
                        break;
                    case 'road': 
                        newMesh = createRoad(item.x, item.z); 
                        if (item.orientation) {
                            newMesh.rotation.y = item.orientation * (Math.PI / 2);
                            newMesh.userData.orientation = item.orientation;
                        }
                        break;
                    case 'road_curve': 
                        newMesh = createCurveRoad(item.x, item.z); 
                        if (item.orientation) {
                            newMesh.rotation.y = item.orientation * (Math.PI / 2);
                            newMesh.userData.orientation = item.orientation;
                        }
                        break;
                    case 'road_cross': 
                        newMesh = createCrossRoad(item.x, item.z); 
                        if (item.orientation) {
                            newMesh.rotation.y = item.orientation * (Math.PI / 2);
                            newMesh.userData.orientation = item.orientation;
                        }
                        break;
                    case 'road_t': 
                        newMesh = createTRoad(item.x, item.z); 
                        if (item.orientation) {
                            newMesh.rotation.y = item.orientation * (Math.PI / 2);
                            newMesh.userData.orientation = item.orientation;
                        }
                        break;
                    case 'water': 
                        newMesh = createWater(item.x, item.z); 
                        break;
                    case 'bridge':
                        newMesh = createBridge(item.x, item.z, itemLevel);
                        if (item.orientation) {
                            newMesh.rotation.y = item.orientation * (Math.PI / 2);
                            newMesh.userData.orientation = item.orientation;
                        }
                        break;
                    case 'ramp':
                        newMesh = createRamp(item.x, item.z, item.levelStart || 0, item.levelEnd || 1, item.orientation || 0);
                        if (item.orientation) {
                            newMesh.rotation.y = item.orientation * (Math.PI / 2);
                        }
                        break;
                    case 'flower':
                        newMesh = createFlowerField(item.x, item.z);
                        break;
                    case 'hospital':
                        newMesh = createHospital(item.x, item.z);
                        if (item.orientation) {
                            newMesh.rotation.y = item.orientation * (Math.PI / 2);
                            newMesh.userData.orientation = item.orientation;
                        }
                        break;
                    case 'school':
                        newMesh = createSchool(item.x, item.z);
                        if (item.orientation) {
                            newMesh.rotation.y = item.orientation * (Math.PI / 2);
                            newMesh.userData.orientation = item.orientation;
                        }
                        break;
                    case 'fire_station':
                        newMesh = createFireStation(item.x, item.z);
                        if (item.orientation) {
                            newMesh.rotation.y = item.orientation * (Math.PI / 2);
                            newMesh.userData.orientation = item.orientation;
                        }
                        break;
                    case 'police_station':
                        newMesh = createPoliceStation(item.x, item.z);
                        if (item.orientation) {
                            newMesh.rotation.y = item.orientation * (Math.PI / 2);
                            newMesh.userData.orientation = item.orientation;
                        }
                        break;
                    case 'amusement_park':
                        newMesh = createAmusementPark(item.x, item.z);
                        if (item.orientation) {
                            newMesh.rotation.y = item.orientation * (Math.PI / 2);
                            newMesh.userData.orientation = item.orientation;
                        }
                        break;
                    case 'oriental_pearl':
                        newMesh = createOrientalPearl(item.x, item.z);
                        if (item.orientation) {
                            newMesh.rotation.y = item.orientation * (Math.PI / 2);
                            newMesh.userData.orientation = item.orientation;
                        }
                        break;
                }
                
                if (newMesh) {
                    objectsGroup.add(newMesh);
                    
                    let size = newMesh.userData.size || 1;
                    const occupiedKeys = [];
                    for(let i=0; i<size; i++) {
                        for(let j=0; j<size; j++) {
                            const k = `${item.x+i},${item.z+j}`;
                            occupiedKeys.push(k);
                            if (i === 0 && j === 0) {
                                setObjAtLevel(k, itemLevel, { type: item.type, mesh: newMesh });
                            } else {
                                setObjAtLevel(k, itemLevel, { type: item.type, mesh: newMesh, mainKey: item.key });
                            }
                        }
                    }
                    newMesh.userData.occupiedKeys = occupiedKeys;
                }
            });
            
            // 如果当前是夜晚，重新应用夜间材质效果
            if (isNight) {
                windowMaterials.forEach(mat => {
                    if (mat.userData && mat.userData.isCarLight) {
                        mat.opacity = 1;
                    } else {
                        mat.emissiveIntensity = mat.userData && mat.userData.isCarBody ? 0.4 : 0.7;
                    }
                });
            }
        }

        // --- 9. 评估系统 ---
        const evaluateBtn = document.getElementById('evaluate-btn');
        const evaluationModal = document.getElementById('evaluation-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const confirmModalBtn = document.getElementById('confirm-modal-btn');
        const scoreDisplay = document.getElementById('score-display');
        const statsContainer = document.getElementById('stats-container');
        const suggestionsContainer = document.getElementById('suggestions-container');

        function evaluateCity() {
            let residentialCount = 0;
            let commercialCount = 0;
            let treeCount = 0;
            let roadCount = 0;
            let waterCount = 0;
            let flowerCount = 0;
            let hospitalCount = 0;
            let schoolCount = 0;
            let fireStationCount = 0;
            let policeStationCount = 0;
            let amusementParkCount = 0;
            let landmarkCount = 0;

            // 统计各类型数量
            cityMap.forEach((arr) => {
                arr.forEach((obj) => {
                    if (obj.mainKey) return; // 避免重复统计多格建筑

                    if (obj.type === 'residential') residentialCount++;
                    else if (obj.type === 'commercial') commercialCount++;
                    else if (obj.type === 'tree') treeCount++;
                    else if (obj.type.startsWith('road') || obj.type === 'bridge' || obj.type === 'ramp') roadCount++;
                    else if (obj.type === 'water') waterCount++;
                    else if (obj.type === 'flower') flowerCount++;
                    else if (obj.type === 'hospital') hospitalCount++;
                    else if (obj.type === 'school') schoolCount++;
                    else if (obj.type === 'fire_station') fireStationCount++;
                    else if (obj.type === 'police_station') policeStationCount++;
                    else if (obj.type === 'amusement_park') amusementParkCount++;
                    else if (obj.type === 'oriental_pearl') landmarkCount++;
                });
            });

            const totalObjects = residentialCount + commercialCount + treeCount + roadCount + waterCount + flowerCount + hospitalCount + schoolCount + fireStationCount + policeStationCount + amusementParkCount + landmarkCount;
            let score = 100;
            let suggestions = [];

            // 规则 1：规模太小
            if (totalObjects < 10) {
                score -= 30;
                suggestions.push("城市规模太小，请继续建设更多设施！");
            } else {
                // 规则 2：职住平衡 (住宅与商业比例)
                if (residentialCount === 0 && commercialCount > 0) {
                    score -= 20;
                    suggestions.push("缺乏住宅区，市民没有地方居住，建议增加住宅。");
                } else if (commercialCount === 0 && residentialCount > 0) {
                    score -= 15;
                    suggestions.push("缺乏商业区，经济发展缓慢，建议增加商业建筑。");
                } else if (residentialCount > 0 && commercialCount > 0) {
                    const ratio = residentialCount / commercialCount;
                    if (ratio > 4) {
                        score -= 10;
                        suggestions.push("住宅过多而商业配套不足，可能导致睡城效应，建议增加商业区。");
                    } else if (ratio < 0.5) {
                        score -= 10;
                        suggestions.push("商业区比例过高，住宅配套不足，建议增加住宅。");
                    } else {
                        score += 10; // 奖励分
                        suggestions.push("✅ 职住比例平衡，城市活力良好！");
                    }
                }

                // 规则 3：绿化率
                const greenRatio = (treeCount + flowerCount) / totalObjects;
                if (greenRatio < 0.1) {
                    score -= 15;
                    suggestions.push("绿化严重不足，空气质量堪忧，请多种树或花田！🌳🌸");
                } else if (greenRatio > 0.4) {
                    score -= 5;
                    suggestions.push("绿化率极高，生态极佳，但要注意预留足够的建设用地。");
                } else {
                    score += 5; // 奖励分
                    suggestions.push("✅ 绿化覆盖率适中，生态环境优美！");
                }

                // 规则：公共服务
                const publicServiceCount = hospitalCount + schoolCount + fireStationCount + policeStationCount;
                if (residentialCount > 2 && publicServiceCount === 0) {
                    score -= 10;
                    suggestions.push("城市缺乏基础公共服务，市民生活不便，建议建设医院、学校、消防局或警察局！🏥");
                } else if (publicServiceCount > 0) {
                    score += 5;
                    suggestions.push("✅ 公共服务设施完善，城市配套良好！");
                }

                // 规则 4：交通网络
                if (roadCount === 0 && (residentialCount > 0 || commercialCount > 0)) {
                    score -= 20;
                    suggestions.push("没有道路连接建筑，交通瘫痪，请修建道路！🛣️");
                } else {
                    const roadRatio = roadCount / totalObjects;
                    if (roadRatio < 0.15) {
                        score -= 10;
                        suggestions.push("道路网络可能过于稀疏，容易拥堵，建议增加路网密度。");
                    }
                }
                
                // 规则 5：水资源
                if (waterCount > 0) {
                    score += 5;
                    suggestions.push("✅ 拥有水体景观，提升了城市整体品质！");
                }
                // 规则 6：道路通达性 (建筑是否临街)
                let isolatedBuildings = 0;
                let totalBuildings = 0;
                let buildingNearWater = 0;
                let buildingNearGreen = 0;

                cityMap.forEach((arr, key) => {
                    arr.forEach((obj) => {
                        if (obj.mainKey) return; // 避免重复统计多格建筑
                        
                        if (['residential', 'commercial', 'hospital', 'school', 'fire_station', 'police_station', 'amusement_park', 'oriental_pearl'].includes(obj.type)) {
                            totalBuildings++;
                            const [baseX, baseZ] = key.split(',').map(Number);
                            const size = obj.mesh.userData.size || 1;
                            
                            let hasRoad = false;
                            let hasWater = false;
                            let hasGreen = false;

                            // 检查多格建筑的所有边缘四周
                            for(let i=0; i<size; i++) {
                                for(let j=0; j<size; j++) {
                                    const x = baseX + i;
                                    const z = baseZ + j;
                                    
                                    const neighbors = [
                                        `${x+1},${z}`, `${x-1},${z}`, 
                                        `${x},${z+1}`, `${x},${z-1}`
                                    ];

                                    neighbors.forEach(nKey => {
                                        // 排除自身占用的格子
                                        if (obj.mesh.userData.occupiedKeys && obj.mesh.userData.occupiedKeys.includes(nKey)) return;

                                        if (cityMap.has(nKey)) {
                                            const cellObjs = cityMap.get(nKey);
                                            cellObjs.forEach(nObj => {
                                                const nType = nObj.type;
                                                if (nType.startsWith('road') || nType === 'bridge' || nType === 'ramp') hasRoad = true;
                                                if (nType === 'water') hasWater = true;
                                                if (nType === 'tree' || nType === 'flower') hasGreen = true;
                                            });
                                        }
                                    });
                                }
                            }

                            if (!hasRoad) isolatedBuildings++;
                            if (hasWater) buildingNearWater++;
                            if (hasGreen) buildingNearGreen++;
                        }
                    });
                });

                if (totalBuildings > 0) {
                    const isolatedRatio = isolatedBuildings / totalBuildings;
                    if (isolatedRatio > 0.3) {
                        score -= 15;
                        suggestions.push(`有 ${isolatedBuildings} 栋建筑没有临街，交通极其不便，请确保建筑旁边有道路！🚗`);
                    } else if (isolatedRatio > 0) {
                        score -= 5;
                        suggestions.push(`部分建筑未连接道路，建议完善路网。`);
                    } else {
                        score += 5;
                        suggestions.push(`✅ 所有建筑都临街，交通通达性极佳！`);
                    }

                    // 规则 7：宜居性 (建筑附近是否有绿化或水系)
                    const ecoFriendlyRatio = (buildingNearWater + buildingNearGreen) / totalBuildings;
                    if (ecoFriendlyRatio > 0.5) {
                        score += 10;
                        suggestions.push(`✅ 许多建筑依水而建或被绿化环绕，居住环境非常优越！`);
                    } else if (ecoFriendlyRatio < 0.2 && treeCount > 0) {
                        score -= 5;
                        suggestions.push(`绿化和水系分布不均，建议将树木种在建筑周围以提升宜居度。`);
                    }
                }
            }

            // 人口估测算法
            // 基础人口：每个住宅区算 100 人，多格住宅算 400 人
            // 就业岗位：每个商业区提供 150 个岗位，多格提供 600 个
            // 吸引力乘数：受环境（绿化、水）、公共服务、交通影响
            let basePopulation = 0;
            let jobs = 0;
            
            cityMap.forEach((arr) => {
                arr.forEach((obj) => {
                    if (obj.mainKey) return;
                    const sizeMultiplier = obj.mesh.userData.size === 2 ? 4 : 1;
                    
                    if (obj.type === 'residential') {
                        basePopulation += 100 * sizeMultiplier;
                    } else if (obj.type === 'commercial') {
                        jobs += 150 * sizeMultiplier;
                    }
                });
            });

            // 吸引力系数 (基于城市评分，50分为基准，每多1分增加1%吸引力，最多1.5倍)
            const attractiveness = Math.max(0.5, Math.min(1.5, score / 100 + 0.5));
            
            // 实际人口 = 基础人口 * 吸引力。同时受限于工作岗位（不能超过岗位的 1.5 倍）
            let estimatedPopulation = Math.floor(basePopulation * attractiveness);
            if (jobs > 0 && estimatedPopulation > jobs * 1.5) {
                estimatedPopulation = Math.floor(jobs * 1.5);
                suggestions.push("⚠️ 人口增长受限于工作岗位，请建造更多商业区以提供就业！");
            } else if (jobs > estimatedPopulation * 2) {
                suggestions.push("💡 城市劳动力短缺，商业发展受限，建议建造更多住宅区吸引人口！");
            }

            // 限制分数范围
            score = Math.max(0, Math.min(100, Math.round(score)));

            // 渲染结果
            scoreDisplay.textContent = score;
            if (score >= 85) scoreDisplay.className = "text-5xl font-black mb-2 text-green-500";
            else if (score >= 60) scoreDisplay.className = "text-5xl font-black mb-2 text-yellow-500";
            else scoreDisplay.className = "text-5xl font-black mb-2 text-red-500";

            statsContainer.innerHTML = `
                <div>🏠 住宅: <span class="font-bold">${residentialCount}</span></div>
                <div>🏢 商业: <span class="font-bold">${commercialCount}</span></div>
                <div>🌳 树木: <span class="font-bold">${treeCount}</span></div>
                <div>🌸 花田: <span class="font-bold">${flowerCount}</span></div>
                <div>🏥 医疗: <span class="font-bold">${hospitalCount}</span></div>
                <div>🏫 教育: <span class="font-bold">${schoolCount}</span></div>
                <div>🚒 消防: <span class="font-bold">${fireStationCount}</span></div>
                <div>🚓 警局: <span class="font-bold">${policeStationCount}</span></div>
                <div>🎡 游乐园: <span class="font-bold">${amusementParkCount}</span></div>
                <div>🗼 地标: <span class="font-bold">${landmarkCount}</span></div>
                <div>🛣️ 道路: <span class="font-bold">${roadCount}</span></div>
                <div>🌊 水面: <span class="font-bold">${waterCount}</span></div>
                <div>🏗️ 总计: <span class="font-bold">${totalObjects}</span></div>
                <div class="col-span-2 mt-2 pt-2 border-t border-gray-200 text-indigo-700">
                    👥 估测人口: <span class="font-black text-lg">${estimatedPopulation.toLocaleString()}</span> 人
                </div>
            `;

            if (suggestions.length === 0) {
                suggestions.push("完美的城市规划！没有可以挑剔的地方。");
            }

            suggestionsContainer.innerHTML = suggestions.map(s => `<li>${s}</li>`).join('');
            
            // 显示弹窗
            evaluationModal.classList.remove('hidden');
        }

        function closeEvaluationModal() {
            evaluationModal.classList.add('hidden');
        }

        evaluateBtn.addEventListener('click', evaluateCity);
        closeModalBtn.addEventListener('click', closeEvaluationModal);
        confirmModalBtn.addEventListener('click', closeEvaluationModal);
        
        // 点击弹窗外部关闭
        evaluationModal.addEventListener('click', (e) => {
            if (e.target === evaluationModal) closeEvaluationModal();
        });


        // --- 10. 渲染循环与窗口自适应 ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // 必须调用，以支持 Damping
            
            // 更新车流动画
            updateTraffic();

            // 更新雨滴动画
            if (isRaining) {
                const positions = rainSystem.geometry.attributes.position.array;
                for(let i=0; i<rainCount; i++) {
                    positions[i*3+1] -= rainVelocities[i]; // y轴下降
                    // 如果落到地面以下，重置到顶部
                    if (positions[i*3+1] < 0) {
                        positions[i*3+1] = 20;
                    }
                }
                rainSystem.geometry.attributes.position.needsUpdate = true;
            }
            
            renderer.render(scene, camera);
        }
        
        // 确保资源加载完毕后开始渲染
        window.onload = function() {
            animate();
            
            // 预先放置一些中心广场（道路）
            const centerPositions = [
                {x: 0.5, z: 0.5}, {x: -0.5, z: 0.5},
                {x: 0.5, z: -0.5}, {x: -0.5, z: -0.5}
            ];
            centerPositions.forEach(pos => {
                const mesh = createRoad(pos.x, pos.z);
                objectsGroup.add(mesh);
                setObjAtLevel(`${pos.x},${pos.z}`, 0, { type: 'road', mesh: mesh });
            });
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
