<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>迷你城市规划师</title>
    <!-- 添加 Emoji 作为网页图标 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏙️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Three.js (优先使用 jsDelivr, 失败则回退) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js" onerror="this.onerror=null;this.src='https://unpkg.com/three@0.128.0/build/three.min.js';"></script>
    <!-- 引入 OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" onerror="this.onerror=null;this.src='https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js';"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* 天蓝色背景 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* 禁用默认的触摸操作，防止在手机上滑动时拖动整个页面 */
            touch-action: none; 
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* 隐藏滚动条 */
        ::-webkit-scrollbar { display: none; }
        
        .tool-btn {
            transition: all 0.2s ease-in-out;
        }
        .tool-btn.active {
            background-color: #4f46e5; /* indigo-600 */
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
        }
        .tool-btn:hover:not(.active) {
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="antialiased">

    <!-- 3D 渲染容器 -->
    <div id="canvas-container"></div>

    <!-- UI 层 -->
    <div class="absolute top-0 left-0 w-full h-full pointer-events-none z-10 flex flex-col justify-between p-4 md:p-6">
        
        <!-- 顶部标题面板 -->
        <div class="bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-lg pointer-events-auto border border-gray-100 self-start max-w-sm w-full">
            <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-4 4h1m-1 4h1" />
                </svg>
                迷你城市规划师
            </h1>
            <!-- 桌面端提示 -->
            <p class="text-xs text-gray-500 leading-relaxed hidden md:block">
                <span class="font-semibold text-gray-700">操作指南：</span><br/>
                左键：点击放置 / 拖动旋转视角<br/>
                右键：拖动平移视角<br/>
                滚轮：缩放视角
            </p>
            <!-- 移动端提示 -->
            <p class="text-xs text-gray-500 leading-relaxed md:hidden">
                <span class="font-semibold text-gray-700">操作指南：</span><br/>
                单指点击：放置 / 切换样式<br/>
                单指滑动：旋转视角<br/>
                双指滑动：缩放 / 平移视角
            </p>
        </div>

        <!-- 底部工具栏 -->
        <div class="bg-white/90 backdrop-blur-md p-2 rounded-2xl shadow-xl pointer-events-auto border border-gray-100 self-center flex gap-2 overflow-x-auto max-w-full">
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="pointer">
                <span class="text-2xl mb-1">🖱️</span>
                <span class="text-xs font-medium">选择</span>
            </button>
            <div class="w-px bg-gray-200 mx-1 my-2"></div> <!-- 分隔线 -->
            <button class="tool-btn active flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px]" data-tool="residential">
                <span class="text-2xl mb-1">🏠</span>
                <span class="text-xs font-medium">住宅</span>
            </button>
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="commercial">
                <span class="text-2xl mb-1">🏢</span>
                <span class="text-xs font-medium">商业</span>
            </button>
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="tree">
                <span class="text-2xl mb-1">🌳</span>
                <span class="text-xs font-medium">树木</span>
            </button>
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="road">
                <span class="text-2xl mb-1">🛣️</span>
                <span class="text-xs font-medium">直道</span>
            </button>
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="road_curve">
                <span class="text-2xl mb-1">↪️</span>
                <span class="text-xs font-medium">弯道</span>
            </button>
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="road_cross">
                <span class="text-2xl mb-1">🔀</span>
                <span class="text-xs font-medium">十字路</span>
            </button>
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="road_t">
                <span class="text-2xl mb-1">┳</span>
                <span class="text-xs font-medium">T型路</span>
            </button>
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="water">
                <span class="text-2xl mb-1">💧</span>
                <span class="text-xs font-medium">水面</span>
            </button>
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="flower">
                <span class="text-2xl mb-1">🌸</span>
                <span class="text-xs font-medium">花田</span>
            </button>
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="hospital">
                <span class="text-2xl mb-1">🏥</span>
                <span class="text-xs font-medium">医院</span>
            </button>
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="school">
                <span class="text-2xl mb-1">🏫</span>
                <span class="text-xs font-medium">学校</span>
            </button>
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="fire_station">
                <span class="text-2xl mb-1">🚒</span>
                <span class="text-xs font-medium">消防局</span>
            </button>
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="police_station">
                <span class="text-2xl mb-1">🚓</span>
                <span class="text-xs font-medium">警察局</span>
            </button>
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="amusement_park">
                <span class="text-2xl mb-1">🎡</span>
                <span class="text-xs font-medium">游乐园</span>
            </button>
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-gray-600" data-tool="oriental_pearl">
                <span class="text-2xl mb-1">🗼</span>
                <span class="text-xs font-medium">东方明珠</span>
            </button>
            <div class="w-px bg-gray-200 mx-1 my-2"></div> <!-- 分隔线 -->
            <button class="tool-btn flex flex-col items-center justify-center p-3 rounded-xl min-w-[70px] text-red-500 hover:text-red-600 hover:bg-red-50" data-tool="demolish">
                <span class="text-2xl mb-1">🔨</span>
                <span class="text-xs font-medium">拆除</span>
            </button>
        </div>
    </div>

    <!-- 评估按钮 (悬浮在右上角) -->
    <div class="absolute top-4 right-4 z-20 flex flex-col gap-2">
        <button id="evaluate-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-xl shadow-lg transition-transform transform hover:scale-105 flex items-center justify-center gap-2">
            <span>📊</span> 评估城市规划
        </button>
        
        <!-- 天气系统控制面板 -->
        <div class="bg-white/90 backdrop-blur-md p-2 rounded-xl shadow-lg border border-gray-100 flex flex-col gap-2 pointer-events-auto">
            <div class="text-xs font-bold text-gray-500 text-center uppercase tracking-wider mb-1">环境控制</div>
            <div class="flex gap-2">
                <button id="time-btn" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-1.5 px-3 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-1">
                    <span id="time-icon">☀️</span> <span id="time-text">白天</span>
                </button>
                <button id="weather-btn" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-1.5 px-3 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-1">
                    <span id="weather-icon">🌤️</span> <span id="weather-text">晴天</span>
                </button>
            </div>
        </div>

        <!-- 存档系统面板 -->
        <div class="bg-white/90 backdrop-blur-md p-2 rounded-xl shadow-lg border border-gray-100 flex flex-col gap-2 pointer-events-auto mt-2">
            <div class="text-xs font-bold text-gray-500 text-center uppercase tracking-wider mb-1">高度控制</div>
            <div class="flex gap-2">
                <button id="elevate-btn" class="flex-1 bg-purple-100 hover:bg-purple-200 text-purple-700 py-1.5 px-3 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-1" title="提升道路高度(建高架)">
                    <span>⬆️</span> 提升
                </button>
                <button id="lower-btn" class="flex-1 bg-orange-100 hover:bg-orange-200 text-orange-700 py-1.5 px-3 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-1" title="降低道路高度">
                    <span>⬇️</span> 降低
                </button>
            </div>
            <div class="flex gap-2">
                <button id="ramp-btn" class="flex-1 bg-blue-100 hover:bg-blue-200 text-blue-700 py-1.5 px-3 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-1" title="手动生成或压平坡道">
                    <span>📐</span> 坡道/压平
                </button>
            </div>
            <div class="text-xs font-bold text-gray-500 text-center uppercase tracking-wider mb-1 mt-1">存档管理</div>
            <div class="flex gap-2">
                <button id="save-btn" class="flex-1 bg-green-100 hover:bg-green-200 text-green-700 py-1.5 px-3 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-1" title="保存到浏览器">
                    <span>💾</span> 保存
                </button>
                <button id="load-btn" class="flex-1 bg-blue-100 hover:bg-blue-200 text-blue-700 py-1.5 px-3 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-1" title="从浏览器读取">
                    <span>📁</span> 读取
                </button>
            </div>
            <div class="flex gap-2">
                <button id="export-btn" class="flex-1 bg-purple-100 hover:bg-purple-200 text-purple-700 py-1.5 px-3 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-1" title="导出为文件">
                    <span>📤</span> 导出
                </button>
                <button id="import-btn" class="flex-1 bg-orange-100 hover:bg-orange-200 text-orange-700 py-1.5 px-3 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-1" title="从文件导入">
                    <span>📥</span> 导入
                </button>
            </div>
            <div id="save-status" class="text-xs text-center text-gray-500 h-4"></div>
            <!-- 隐藏的文件上传 input -->
            <input type="file" id="file-input" accept=".json" class="hidden">
        </div>
    </div>

    <!-- 评估结果弹窗 -->
    <div id="evaluation-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 transform transition-all">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-gray-800">🏙️ 城市规划评估报告</h2>
                <button id="close-modal-btn" class="text-gray-400 hover:text-gray-600 text-2xl font-bold">&times;</button>
            </div>
            
            <div class="mb-6 flex items-center justify-center flex-col">
                <div class="text-5xl font-black mb-2" id="score-display">0</div>
                <div class="text-sm text-gray-500 uppercase tracking-wider">综合评分</div>
            </div>

            <div class="space-y-4">
                <div>
                    <h3 class="font-semibold text-gray-700 border-b pb-1 mb-2">📊 数据统计</h3>
                    <div id="stats-container" class="grid grid-cols-2 gap-2 text-sm text-gray-600">
                        <!-- 统计数据动态插入 -->
                    </div>
                </div>
                
                <div>
                    <h3 class="font-semibold text-gray-700 border-b pb-1 mb-2">💡 规划建议</h3>
                    <ul id="suggestions-container" class="text-sm text-gray-600 space-y-2 list-disc pl-4">
                        <!-- 建议动态插入 -->
                    </ul>
                </div>
            </div>
            
            <button id="confirm-modal-btn" class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-xl transition-colors">
                继续规划
            </button>
        </div>
    </div>

    <script>
        // --- 0. 检查依赖加载情况 ---
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'SCRIPT') {
                console.error('脚本加载失败: ' + e.target.src);
                const msg = document.createElement('div');
                msg.style = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border:2px solid red;z-index:9999;border-radius:10px;text-align:center;';
                msg.innerHTML = '<h3 style="color:red;font-weight:bold;">依赖加载失败！</h3><p>由于网络原因，3D 引擎脚本未能成功加载。</p><p>请尝试刷新页面，或检查网络连接。</p><p style="font-size:12px;color:#666;">无法加载：' + e.target.src.split("/").pop() + '</p>';
                document.body.appendChild(msg);
            }
        }, true);

        // --- 1. 基础场景设置 ---
        const container = document.getElementById('canvas-container');
        
        // 确保 THREE 已加载并正常初始化
        if (typeof THREE === 'undefined') {
            console.error('THREE 库未加载，停止脚本运行');
            throw new Error('THREE 库未加载');
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // 天蓝色背景
        scene.fog = new THREE.Fog(0x87CEEB, 20, 50); // 添加雾化效果增加深度

        // 相机设置 (透视相机)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 15, 15);
        camera.lookAt(0, 0, 0);

        // 渲染器设置
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true; // 开启阴影
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // 控制器设置
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // 平滑控制
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // 限制不要看到地平线以下
        controls.minDistance = 5;
        controls.maxDistance = 40;

        // 优化鼠标按键逻辑：左键点击放置，左键拖动旋转视角，右键长按平移，滚轮缩放
        controls.mouseButtons = {
            LEFT: THREE.MOUSE.ROTATE, // 恢复左键为旋转（点击建造逻辑通过 onPointerUp 的距离防抖实现）
            MIDDLE: THREE.MOUSE.DOLLY,
            RIGHT: THREE.MOUSE.PAN
        };
        
        // 优化触摸操作：单指用于旋转视角，双指用于缩放和平移
        controls.touches = {
            ONE: THREE.TOUCH.ROTATE, // 改为单指旋转
            TWO: THREE.TOUCH.DOLLY_PAN
        };

        // --- 2. 灯光与天气系统设置 ---
        // 天气状态变量
        let isNight = false;
        let isRaining = false;
        
        // 材质缓存（用于在夜晚开启发光效果）
        const windowMaterials = [];

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // 环境光
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); // 太阳光/月光
        dirLight.position.set(20, 30, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 100;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        scene.add(dirLight);

        // 雨滴粒子系统
        const rainCount = 15000;
        const rainGeo = new THREE.BufferGeometry();
        const rainPositions = new Float32Array(rainCount * 3);
        const rainVelocities = [];
        
        for(let i=0; i<rainCount; i++) {
            rainPositions[i*3] = (Math.random() - 0.5) * 40;     // x
            rainPositions[i*3+1] = Math.random() * 20;           // y (高度)
            rainPositions[i*3+2] = (Math.random() - 0.5) * 40;   // z
            rainVelocities.push(0.1 + Math.random() * 0.1);      // 下落速度
        }
        
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
        const rainMat = new THREE.PointsMaterial({
            color: 0xaaaaaa,
            size: 0.1,
            transparent: true,
            opacity: 0.6
        });
        const rainSystem = new THREE.Points(rainGeo, rainMat);
        rainSystem.visible = false; // 默认晴天隐藏
        scene.add(rainSystem);

        // --- 3. 环境与地面设置 ---
        // 生成云朵系统
        const cloudsGroup = new THREE.Group();
        scene.add(cloudsGroup);

        function createCloud() {
            const cloud = new THREE.Group();
            const puffCount = 3 + Math.floor(Math.random() * 4);
            const cloudMat = new THREE.MeshLambertMaterial({ 
                color: 0xffffff,
                transparent: true,
                opacity: 0.8
            });
            windowMaterials.push(cloudMat); // 加入缓存以便在夜间或雨天变暗
            cloudMat.userData = { isCloud: true };

            for (let i = 0; i < puffCount; i++) {
                const puffSize = 0.5 + Math.random() * 1.5;
                const puffGeo = new THREE.SphereGeometry(puffSize, 7, 7);
                const puff = new THREE.Mesh(puffGeo, cloudMat);
                puff.position.set(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 1,
                    (Math.random() - 0.5) * 2
                );
                cloud.add(puff);
            }
            return cloud;
        }

        // 随机在天空中散布一些云朵
        for (let i = 0; i < 15; i++) {
            const cloud = createCloud();
            // 分布在较高的天空中，且在较广的范围内
            cloud.position.set(
                (Math.random() - 0.5) * 60,
                15 + Math.random() * 10,
                (Math.random() - 0.5) * 60
            );
            // 随机缩放
            const scale = 1 + Math.random() * 1.5;
            cloud.scale.set(scale, scale * 0.6, scale);
            cloudsGroup.add(cloud);
        }

        let gridSize = 30; // 初始 30x30 的网格
        const cellSize = 1;

        // 不可见的交互平面（用于射线检测）
        let interactPlaneGeo = new THREE.PlaneGeometry(gridSize, gridSize);
        interactPlaneGeo.rotateX(-Math.PI / 2);
        let interactPlane = new THREE.Mesh(interactPlaneGeo, new THREE.MeshBasicMaterial({ visible: false }));
        scene.add(interactPlane);

        // 可视化的网格线
        let gridHelper = new THREE.GridHelper(gridSize, gridSize, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.1;
        gridHelper.material.transparent = true;
        gridHelper.position.y = 0.01; // 稍微抬高避免Z冲突
        scene.add(gridHelper);

        // 绿地平面
        let groundGeo = new THREE.PlaneGeometry(gridSize, gridSize);
        groundGeo.rotateX(-Math.PI / 2);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x55aa55 }); // 草绿色
        let ground = new THREE.Mesh(groundGeo, groundMat);
        ground.receiveShadow = true;
        scene.add(ground);

        // 动态扩展网格函数
        function expandGrid() {
            gridSize += 4; // 每次扩展4行（两边各扩展两行）
            
            // 移除旧的网格、交互平面和地面
            scene.remove(interactPlane);
            scene.remove(gridHelper);
            scene.remove(ground);
            
            // 释放旧几何体内存
            interactPlaneGeo.dispose();
            groundGeo.dispose();
            
            // 重新创建并添加
            interactPlaneGeo = new THREE.PlaneGeometry(gridSize, gridSize);
            interactPlaneGeo.rotateX(-Math.PI / 2);
            interactPlane = new THREE.Mesh(interactPlaneGeo, new THREE.MeshBasicMaterial({ visible: false }));
            scene.add(interactPlane);
            
            gridHelper = new THREE.GridHelper(gridSize, gridSize, 0x000000, 0x000000);
            gridHelper.material.opacity = 0.1;
            gridHelper.material.transparent = true;
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);
            
            groundGeo = new THREE.PlaneGeometry(gridSize, gridSize);
            groundGeo.rotateX(-Math.PI / 2);
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.receiveShadow = true;
            scene.add(ground);
            
            console.log(`地图已自动扩展，当前大小: ${gridSize}x${gridSize}`);
        }

        // --- 4. 城市数据与构建系统 ---
        let currentTool = 'residential';
        // 数据结构升级：cityMap 支持多层高度，键名依然为 "x,z" 但值为数组
        // 形如：{ "1,2": [ { level: 0, type: 'water', mesh: ... }, { level: 1, type: 'bridge', mesh: ... } ] }
        const cityMap = new Map(); // 存储网格上的对象: "x,z" -> [{level, type, mesh}]
        
        // 辅助函数：获取指定层级的对象
        function getObjAtLevel(key, level) {
            const arr = cityMap.get(key);
            if (!arr) return null;
            return arr.find(item => item.level === level) || null;
        }

        // 辅助函数：设置指定层级的对象
        function setObjAtLevel(key, level, objData) {
            let arr = cityMap.get(key);
            if (!arr) {
                arr = [];
                cityMap.set(key, arr);
            }
            const existingIndex = arr.findIndex(item => item.level === level);
            objData.level = level;
            if (existingIndex >= 0) {
                arr[existingIndex] = objData;
            } else {
                arr.push(objData);
            }
            // 按 level 升序排序
            arr.sort((a, b) => a.level - b.level);
        }

        // 辅助函数：删除指定层级的对象
        function deleteObjAtLevel(key, level) {
            let arr = cityMap.get(key);
            if (!arr) return;
            const newArr = arr.filter(item => item.level !== level);
            if (newArr.length === 0) {
                cityMap.delete(key);
            } else {
                cityMap.set(key, newArr);
            }
        }

        const objectsGroup = new THREE.Group();
        scene.add(objectsGroup);

        // 生成住宅 (House) - 支持多种样式，提高小红屋的比例

                group.add(wall);
                group.add(roof);
            } else {
                // --- 样式 3: 浅蓝双层公寓 ---
                const baseGeo = new THREE.BoxGeometry(0.7, 1.0, 0.7);

                }); // 浅蓝色墙

                const trim = new THREE.Mesh(trimGeo, trimMat);

        // 生成商业楼 (Skyscraper) - 多样化形状与颜色
        function createCommercial(x, z, forcedStyle = null, forcedColor = null, forcedHeight = null) {
            const group = new THREE.Group();
            
            // 随机高度和基础颜色 (去掉了黑色/暗夜蓝)
            const height = forcedHeight !== null ? forcedHeight : 1.8 + Math.random() * 2.5; 
            const glassColors = [
                0x3b82f6, // 经典蓝
                0x60a5fa, // 浅蓝
                0x1e3a8a, // 深海蓝
                0x94a3b8, // 银灰玻璃
                0x38bdf8, // 天蓝
                0x818cf8  // 亮蓝
            ];
            const baseColor = forcedColor !== null ? forcedColor : glassColors[Math.floor(Math.random() * glassColors.length)];
            
            // 随机建筑形状样式
            const shapeStyle = forcedStyle !== null ? forcedStyle : Math.floor(Math.random() * 8); // 扩展到8种样式
            
            // 记录到 userData
            group.userData = { isBuilding: true, style: shapeStyle, color: baseColor, height: height };

            // 玻璃材质 (稍微带点反光感)
            const mat = new THREE.MeshPhongMaterial({ 
                color: baseColor,
                specular: 0xffffff,
                shininess: 80,
                transparent: true,
                opacity: 0.85,
                emissive: new THREE.Color(0xffffaa),
                emissiveIntensity: isNight ? 0.7 : 0 // 默认白天不发光
            });
            windowMaterials.push(mat); // 缓存材质以便夜晚控制发光
            
            if (shapeStyle === 0) {
                // --- 样式 0: 经典长方体 ---
                const geo = new THREE.BoxGeometry(0.8, height, 0.8);
                const building = new THREE.Mesh(geo, mat);
                building.position.y = height / 2;
                building.castShadow = true;
                building.receiveShadow = true;
                group.add(building);
                
                // 顶部天线
                const antGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.6);
                const antMat = new THREE.MeshBasicMaterial({ color: 0x666666 });
                const antenna = new THREE.Mesh(antGeo, antMat);
                antenna.position.y = height + 0.3;
                group.add(antenna);
                
            } else if (shapeStyle === 1) {
                // --- 样式 1: 圆柱形塔楼 ---
                const geo = new THREE.CylinderGeometry(0.4, 0.4, height, 16);
                const building = new THREE.Mesh(geo, mat);
                building.position.y = height / 2;
                building.castShadow = true;
                building.receiveShadow = true;
                group.add(building);
                
                // 停机坪/顶部圆盘
                const padGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.05, 16);
                const padMat = new THREE.MeshLambertMaterial({ color: 0x9ca3af });
                const pad = new THREE.Mesh(padGeo, padMat);
                pad.position.y = height;
                group.add(pad);
                
            } else if (shapeStyle === 2) {
                // --- 样式 2: 阶梯状大厦 (类似帝国大厦) ---
                const steps = 3;
                const stepHeight = height / steps;
                for(let i=0; i<steps; i++) {
                    const width = 0.8 - (i * 0.15); // 逐层变窄
                    const geo = new THREE.BoxGeometry(width, stepHeight, width);
                    const stepMesh = new THREE.Mesh(geo, mat);
                    stepMesh.position.y = (i * stepHeight) + (stepHeight / 2);
                    stepMesh.castShadow = true;
                    stepMesh.receiveShadow = true;
                    group.add(stepMesh);
                }
                
                // 顶部尖塔
                const spireGeo = new THREE.ConeGeometry(0.1, 0.5, 4);
                const spireMat = new THREE.MeshLambertMaterial({ color: 0xcbd5e1 });
                const spire = new THREE.Mesh(spireGeo, spireMat);
                spire.position.y = height + 0.25;
                spire.rotation.y = Math.PI / 4;
                group.add(spire);
                
            } else if (shapeStyle === 3) {
                // --- 样式 3: 扭曲多边形/双子塔组合 ---
                // 主塔
                const geo1 = new THREE.BoxGeometry(0.4, height, 0.4);
                const t1 = new THREE.Mesh(geo1, mat);
                t1.position.set(0.15, height/2, 0.15);
                t1.castShadow = true;
                t1.receiveShadow = true;
                
                // 副塔 (稍矮)
                const geo2 = new THREE.BoxGeometry(0.4, height * 0.7, 0.4);
                const t2 = new THREE.Mesh(geo2, mat);
                t2.position.set(-0.15, (height*0.7)/2, -0.15);
                t2.castShadow = true;
                t2.receiveShadow = true;
                
                // 连接廊桥
                const bridgeGeo = new THREE.BoxGeometry(0.5, 0.1, 0.5);
                const bridgeMat = new THREE.MeshLambertMaterial({ color: 0x64748b });
                const bridge = new THREE.Mesh(bridgeGeo, bridgeMat);
                bridge.position.set(0, height * 0.6, 0);
                
                group.add(t1);
                group.add(t2);
                group.add(bridge);
            } else if (shapeStyle === 4) {
                // --- 样式 4: 春笋大厦 (类似深圳华润春笋) ---
                // 使用锥形来模拟春笋的子弹头形状
                const geo = new THREE.CylinderGeometry(0.05, 0.45, height, 32);
                const building = new THREE.Mesh(geo, mat);
                building.position.y = height / 2;
                building.castShadow = true;
                building.receiveShadow = true;
                
                // 为了体现"竹笋"的网状结构，添加一些金属质感的环形结构
                const ringCount = Math.floor(height * 2.5);
                for(let i=1; i<ringCount; i++) {
                    const yPos = (i / ringCount) * height;
                    // 计算当前高度的半径 (与 CylinderGeometry 的锥度保持一致)
                    const ratio = yPos / height;
                    const r = 0.45 * (1 - ratio) + 0.05 * ratio + 0.01; 
                    const ringGeo = new THREE.TorusGeometry(r, 0.015, 8, 32);
                    const ringMat = new THREE.MeshStandardMaterial({ 
                        color: 0xe2e8f0, 
                        metalness: 0.8, 
                        roughness: 0.2,
                        emissive: new THREE.Color(0xffffff),
                        emissiveIntensity: isNight ? 0.3 : 0 // 夜晚结构线微亮
                    });
                    // 将材质缓存用于昼夜切换
                    windowMaterials.push(ringMat);
                    ringMat.userData = { isStructureRing: true };

                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.rotation.x = Math.PI / 2;
                    ring.position.y = yPos;
                    group.add(ring);
                }
                
                group.add(building);
            } else if (shapeStyle === 5) {
                // --- 样式 5: 扭转大厦 (类似上海中心大厦) ---
                // 使用多层稍微旋转的多边形叠加，模拟扭转上升的效果
                const segments = Math.floor(height * 4); // 层数
                const segmentHeight = height / segments;
                const twistAngle = Math.PI * 0.6; // 总扭转角度约 108 度
                
                // 为了性能，我们合并几何体，但这里简化用一个 Group 包含多个切片
                const towerGroup = new THREE.Group();
                for (let i = 0; i < segments; i++) {
                    // 底部粗，顶部细
                    const scale = 1 - (i / segments) * 0.4;
                    // 每一层的截面是一个圆角三角形（这里用圆柱体模拟平滑多边形）
                    const sliceGeo = new THREE.CylinderGeometry(0.35 * scale, 0.35 * scale, segmentHeight, 9);
                    const slice = new THREE.Mesh(sliceGeo, mat);
                    
                    slice.position.y = i * segmentHeight + segmentHeight / 2;
                    slice.rotation.y = (i / segments) * twistAngle;
                    slice.castShadow = true;
                    slice.receiveShadow = true;
                    towerGroup.add(slice);
                }
                group.add(towerGroup);
                
                // 顶部装饰
                const crownGeo = new THREE.CylinderGeometry(0.01, 0.35 * 0.6, 0.2, 9);
                const crown = new THREE.Mesh(crownGeo, mat);
                crown.position.y = height + 0.1;
                crown.rotation.y = twistAngle;
                group.add(crown);
                
            } else if (shapeStyle === 6) {
                // --- 样式 6: 倒角四方塔 (类似平安金融中心) ---
                // 底部宽，顶部窄，四面呈斜坡状收缩
                const geo = new THREE.CylinderGeometry(0.15, 0.45, height, 4); // 4段代表四边形
                // 旋转45度使其面对正面
                const building = new THREE.Mesh(geo, mat);
                building.rotation.y = Math.PI / 4;
                building.position.y = height / 2;
                building.castShadow = true;
                building.receiveShadow = true;
                group.add(building);
                
                // 标志性针状塔尖
                const spireGeo = new THREE.CylinderGeometry(0.01, 0.05, 0.6, 8);
                const spireMat = new THREE.MeshStandardMaterial({ 
                    color: 0xe2e8f0, 
                    metalness: 0.9, 
                    roughness: 0.1 
                });
                const spire = new THREE.Mesh(spireGeo, spireMat);
                spire.position.y = height + 0.3;
                group.add(spire);
                
            } else {
                // --- 样式 7: 细长直柱带顶环 (类似广州国际金融中心/西塔风格简化) ---
                // 主体结构呈流线型
                const geo = new THREE.CylinderGeometry(0.25, 0.4, height, 32);
                const building = new THREE.Mesh(geo, mat);
                building.position.y = height / 2;
                building.castShadow = true;
                building.receiveShadow = true;
                group.add(building);
                
                // 顶部的停机坪和网状结构
                const topRingGeo = new THREE.TorusGeometry(0.25, 0.02, 8, 32);
                const topRingMat = new THREE.MeshStandardMaterial({ 
                    color: 0x94a3b8,
                    metalness: 0.5,
                    emissive: new THREE.Color(0xffaa00),
                    emissiveIntensity: isNight ? 0.8 : 0 // 夜晚发出橙黄色光
                });
                windowMaterials.push(topRingMat);
                topRingMat.userData = { isStructureRing: true };
                
                const topRing = new THREE.Mesh(topRingGeo, topRingMat);
                topRing.rotation.x = Math.PI / 2;
                topRing.position.y = height;
                group.add(topRing);
            }

            group.position.set(x, 0, z);
            return group;
        }

        // 生成树木 (Tree) - 支持多种样式和多种颜色
        function createTree(x, z, forcedStyle = null, forcedColor = null) {
            const group = new THREE.Group();
            const style = forcedStyle !== null ? forcedStyle : Math.floor(Math.random() * 4); // 0: 圆形阔叶树, 1: 尖顶针叶树, 2: 矮灌木, 3: 粉色樱花树

            // 树干 (共通或根据样式调整)
            const trunkMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 }); // 棕色

            // 树叶颜色池 (包含深绿、浅绿、秋季黄、橙色、红褐色)
            const leafColors = [
                0x22c55e, // 翠绿
                0x166534, // 深绿
                0x4ade80, // 嫩绿
                0xeab308, // 金黄 (秋季)
                0xf97316, // 橙色 (秋季)
                0x991b1b  // 红褐 (深秋)
            ];
            
            let leavesMat;
            let leafColor = 0xfbcfe8; // 默认粉色
            
            if (style === 3) {
                // 樱花树专用材质
                leavesMat = new THREE.MeshLambertMaterial({ color: 0xfbcfe8 }); // 粉色樱花
            } else {
                leafColor = forcedColor !== null ? forcedColor : leafColors[Math.floor(Math.random() * leafColors.length)];
                leavesMat = new THREE.MeshLambertMaterial({ color: leafColor });
            }
            
            // 记录到 userData
            group.userData = { isTree: true, style: style, color: leafColor };

            if (style === 0 || style === 3) {
                // --- 样式 0 & 3: 圆形阔叶树 / 樱花树 ---
                const trunkGeo = new THREE.CylinderGeometry(0.1, 0.15, 0.5, 8);
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.y = 0.25;
                trunk.castShadow = true;
                group.add(trunk);

                // 樱花树可以使用更复杂一点的几何体使其显得蓬松
                const leavesGeo = style === 3 ? new THREE.DodecahedronGeometry(0.45, 1) : new THREE.DodecahedronGeometry(0.4);
                const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                leaves.position.y = 0.7;
                leaves.castShadow = true;
                group.add(leaves);
                
                if (style === 3) {
                    // 给樱花树额外添加一些散落的“花瓣”簇
                    for(let i=0; i<3; i++) {
                        const petalGeo = new THREE.DodecahedronGeometry(0.2, 0);
                        const petal = new THREE.Mesh(petalGeo, leavesMat);
                        petal.position.set(
                            (Math.random() - 0.5) * 0.6,
                            0.5 + Math.random() * 0.4,
                            (Math.random() - 0.5) * 0.6
                        );
                        group.add(petal);
                    }
                }
            } else if (style === 1) {
                // --- 样式 1: 尖顶针叶树 (松树) ---
                const trunkGeo = new THREE.CylinderGeometry(0.08, 0.12, 0.4, 8);
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.y = 0.2;
                trunk.castShadow = true;
                group.add(trunk);

                for (let i = 0; i < 3; i++) {
                    const leavesGeo = new THREE.ConeGeometry(0.4 - i * 0.1, 0.5, 8);
                    const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                    leaves.position.y = 0.5 + i * 0.3;
                    leaves.castShadow = true;
                    group.add(leaves);
                }
            } else {
                // --- 样式 2: 矮灌木 ---
                for (let i = 0; i < 5; i++) {
                    const leavesGeo = new THREE.SphereGeometry(0.2);
                    const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                    leaves.position.set(
                        (Math.random() - 0.5) * 0.4,
                        0.15 + Math.random() * 0.2,
                        (Math.random() - 0.5) * 0.4
                    );
                    leaves.castShadow = true;
                    group.add(leaves);
                }
            }
            
            // 稍微随机化位置，不要完全在网格正中心
            const offsetX = (Math.random() - 0.5) * 0.4;
            const offsetZ = (Math.random() - 0.5) * 0.4;
            group.position.set(x + offsetX, 0, z + offsetZ);
            
            const scale = 0.7 + Math.random() * 0.6;
            group.scale.set(scale, scale, scale);

            return group;
        }

        // 生成道路 (Road) - 增加标线细节
        function createRoad(x, z) {
            const group = new THREE.Group();
            group.userData = { isRoad: true, roadType: 'straight', orientation: 0 }; // 0: 纵向, 1: 横向
            
            // 路面
            const roadGeo = new THREE.PlaneGeometry(1, 1);
            roadGeo.rotateX(-Math.PI / 2);
            const roadMat = new THREE.MeshLambertMaterial({ color: 0x334155 }); // 更深的沥青色
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.position.y = 0.02;
            road.receiveShadow = true;
            group.add(road);

            // 中心虚线 (简化逻辑：假设道路多为纵向或横向，这里统一加一个十字标线或根据某种逻辑)
            // 这里我们为每块道路添加中心标线，当多块连接时自然形成长线
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            // 纵向标线 (Center Dash)
            const vLineGeo = new THREE.PlaneGeometry(0.05, 0.4);
            vLineGeo.rotateX(-Math.PI / 2);
            const vLine = new THREE.Mesh(vLineGeo, lineMat);
            vLine.position.y = 0.021;
            group.add(vLine);

            // 道路边缘线 (Side lines)
            const sideLineGeo = new THREE.PlaneGeometry(0.02, 1);
            sideLineGeo.rotateX(-Math.PI / 2);
            
            const leftLine = new THREE.Mesh(sideLineGeo, lineMat);
            leftLine.position.set(-0.48, 0.021, 0);
            group.add(leftLine);
            
            const rightLine = new THREE.Mesh(sideLineGeo, lineMat);
            rightLine.position.set(0.48, 0.021, 0);
            group.add(rightLine);

            group.position.set(x, 0, z);
            return group;
        }

        // 生成弯道 (Curve Road)
        function createCurveRoad(x, z) {
            const group = new THREE.Group();
            group.userData = { isRoad: true, roadType: 'curve', orientation: 0 };
            
            const roadMat = new THREE.MeshLambertMaterial({ color: 0x334155 });
            
            // 路面：使用圆环形状(RingGeometry)只保留弯道部分，不覆盖四个角落
            // 内径0外径1的四分之一圆环
            const roadGeo = new THREE.RingGeometry(0.01, 1.0, 32, 1, 0, Math.PI / 2);
            roadGeo.rotateX(-Math.PI / 2);
            const road = new THREE.Mesh(roadGeo, roadMat);
            // 默认方向：连接左侧(x=-1)和下方(z=1)，所以圆心在左下角
            road.position.set(-0.5, 0.02, 0.5);
            road.receiveShadow = true;
            group.add(road);

            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            // 外侧边缘线
            const outerLineGeo = new THREE.RingGeometry(0.96, 0.98, 32, 1, 0, Math.PI / 2);
            outerLineGeo.rotateX(-Math.PI / 2);
            const outerLine = new THREE.Mesh(outerLineGeo, lineMat);
            outerLine.position.set(-0.5, 0.021, 0.5);
            group.add(outerLine);

            // 内侧边缘线
            const innerLineGeo = new THREE.RingGeometry(0.02, 0.04, 16, 1, 0, Math.PI / 2);
            innerLineGeo.rotateX(-Math.PI / 2);
            const innerLine = new THREE.Mesh(innerLineGeo, lineMat);
            innerLine.position.set(-0.5, 0.021, 0.5);
            group.add(innerLine);

            // 中心虚线
            for (let i = 0; i < 3; i++) {
                const dashGeo = new THREE.RingGeometry(0.48, 0.52, 16, 1, i * (Math.PI / 6) + 0.05, Math.PI / 12);
                dashGeo.rotateX(-Math.PI / 2);
                const dash = new THREE.Mesh(dashGeo, lineMat);
                dash.position.set(-0.5, 0.021, 0.5);
                group.add(dash);
            }

            group.position.set(x, 0, z);
            return group;
        }

        // 生成十字路口 (Cross Road)
        function createCrossRoad(x, z) {
            const group = new THREE.Group();
            group.userData = { isRoad: true, roadType: 'cross', orientation: 0 };
            
            const roadGeo = new THREE.PlaneGeometry(1, 1);
            roadGeo.rotateX(-Math.PI / 2);
            const roadMat = new THREE.MeshLambertMaterial({ color: 0x334155 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.position.y = 0.02;
            road.receiveShadow = true;
            group.add(road);

            // 十字路口通常没有中心线，而是有四个角的边缘线（人行道斑马线简化版）
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            // 四个角落的边缘弧线或短线
            const cornerPositions = [
                [-0.48, -0.48], [0.48, -0.48], [-0.48, 0.48], [0.48, 0.48]
            ];
            
            cornerPositions.forEach(pos => {
                const cornerGeo = new THREE.PlaneGeometry(0.1, 0.1);
                cornerGeo.rotateX(-Math.PI / 2);
                const corner = new THREE.Mesh(cornerGeo, lineMat);
                corner.position.set(pos[0], 0.021, pos[1]);
                group.add(corner);
            });
            
            // 添加延伸到路口的中心车道虚线
            const dashGeo = new THREE.PlaneGeometry(0.05, 0.2);
            dashGeo.rotateX(-Math.PI / 2);
            
            // 上方虚线
            const dashTop = new THREE.Mesh(dashGeo, lineMat);
            dashTop.position.set(0, 0.021, -0.35);
            group.add(dashTop);
            
            // 下方虚线
            const dashBottom = new THREE.Mesh(dashGeo, lineMat);
            dashBottom.position.set(0, 0.021, 0.35);
            group.add(dashBottom);
            
            // 左侧虚线
            const dashLeft = new THREE.Mesh(dashGeo, lineMat);
            dashLeft.rotation.y = Math.PI / 2;
            dashLeft.position.set(-0.35, 0.021, 0);
            group.add(dashLeft);
            
            // 右侧虚线
            const dashRight = new THREE.Mesh(dashGeo, lineMat);
            dashRight.rotation.y = Math.PI / 2;
            dashRight.position.set(0.35, 0.021, 0);
            group.add(dashRight);

            group.position.set(x, 0, z);
            return group;
        }

        // 生成T型路口 (T-Junction)
        function createTRoad(x, z) {
            const group = new THREE.Group();
            group.userData = { isRoad: true, roadType: 't_junction', orientation: 0 }; // 默认上方是平的一条线，下面是分支
            
            const roadGeo = new THREE.PlaneGeometry(1, 1);
            roadGeo.rotateX(-Math.PI / 2);
            const roadMat = new THREE.MeshLambertMaterial({ color: 0x334155 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.position.y = 0.02;
            road.receiveShadow = true;
            group.add(road);

            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            // 顶部连续边缘线
            const topEdgeGeo = new THREE.PlaneGeometry(1, 0.02);
            topEdgeGeo.rotateX(-Math.PI / 2);
            const topEdge = new THREE.Mesh(topEdgeGeo, lineMat);
            topEdge.position.set(0, 0.021, -0.48);
            group.add(topEdge);
            
            // 左下角和右下角的直角边缘线
            const cornerLGeo = new THREE.PlaneGeometry(0.1, 0.1);
            cornerLGeo.rotateX(-Math.PI / 2);
            const cornerL = new THREE.Mesh(cornerLGeo, lineMat);
            cornerL.position.set(-0.48, 0.021, 0.48);
            group.add(cornerL);
            
            const cornerR = new THREE.Mesh(cornerLGeo, lineMat);
            cornerR.position.set(0.48, 0.021, 0.48);
            group.add(cornerR);
            
            // 添加车道虚线
            const dashGeo = new THREE.PlaneGeometry(0.05, 0.2);
            dashGeo.rotateX(-Math.PI / 2);
            
            // 主干道横向贯通虚线 (为了不与中间冲突，分成左右两段)
            const mainDashL = new THREE.Mesh(dashGeo, lineMat);
            mainDashL.rotation.y = Math.PI / 2;
            mainDashL.position.set(-0.35, 0.021, 0);
            group.add(mainDashL);
            
            const mainDashR = new THREE.Mesh(dashGeo, lineMat);
            mainDashR.rotation.y = Math.PI / 2;
            mainDashR.position.set(0.35, 0.021, 0);
            group.add(mainDashR);
            
            // 分支车道纵向虚线
            const branchDash = new THREE.Mesh(dashGeo, lineMat);
            branchDash.position.set(0, 0.021, 0.35);
            group.add(branchDash);

            group.position.set(x, 0, z);
            return group;
        }

        // 生成水面 (Water) - 添加动态波纹和更真实的材质效果
        function createWater(x, z) {
            const group = new THREE.Group();
            
            // 水面主体 (使用更细分的网格以便稍后做顶点动画，虽然这里简化只用材质)
            const geo = new THREE.PlaneGeometry(1, 1, 4, 4);
            geo.rotateX(-Math.PI / 2);
            
            // 更真实的水面材质：深蓝色、高反光、半透明
            const mat = new THREE.MeshPhysicalMaterial({ 
                color: 0x0284c7,          // 较深的湖蓝色
                emissive: 0x0ea5e9,       // 自发光(微弱的亮蓝色)
                emissiveIntensity: 0.2,
                roughness: 0.1,           // 非常光滑
                metalness: 0.1,           // 略带金属感反光
                transparent: true, 
                opacity: 0.85,
                side: THREE.DoubleSide
            });
            
            const water = new THREE.Mesh(geo, mat);
            water.position.set(0, 0.015, 0); // 略高于地面
            water.receiveShadow = true;
            
            // 在水面上添加一些随机的“波纹”或“睡莲”作为装饰
            const decorGeo = new THREE.CircleGeometry(0.1 + Math.random() * 0.1, 8);
            decorGeo.rotateX(-Math.PI / 2);
            const decorMat = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.2 
            });
            const ripple = new THREE.Mesh(decorGeo, decorMat);
            ripple.position.set(
                (Math.random() - 0.5) * 0.6, 
                0.016, 
                (Math.random() - 0.5) * 0.6
            );
            
            group.add(water);
            group.add(ripple);
            
            group.position.set(x, 0, z);
            return group;
        }

        // 生成桥梁 (Bridge) - 跨越水面的道路，支持多层
        function createBridge(x, z, level = 1) {
            const group = new THREE.Group();
            group.userData = { isRoad: true, roadType: 'straight', orientation: 0, level: level };
            
            // 计算当前层级的绝对高度
            // 地面高度 0，每层高度设为 0.5
            const levelHeight = 0.5;
            const bridgeHeight = level * levelHeight;
            
            // 1. 桥面主体
            const deckGeo = new THREE.BoxGeometry(0.8, 0.05, 1);
            const deckMat = new THREE.MeshLambertMaterial({ color: 0x475569 }); // 沥青色
            const deck = new THREE.Mesh(deckGeo, deckMat);
            deck.position.set(0, bridgeHeight, 0);
            deck.castShadow = true;
            deck.receiveShadow = true;
            group.add(deck);
            
            // 车道中心虚线
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const dashGeo = new THREE.PlaneGeometry(0.05, 0.4);
            dashGeo.rotateX(-Math.PI / 2);
            
            const dash1 = new THREE.Mesh(dashGeo, lineMat);
            dash1.position.set(0, bridgeHeight + 0.026, 0.25);
            group.add(dash1);
            
            const dash2 = new THREE.Mesh(dashGeo, lineMat);
            dash2.position.set(0, bridgeHeight + 0.026, -0.25);
            group.add(dash2);
            
            // 2. 桥梁护栏
            const railGeo = new THREE.BoxGeometry(0.05, 0.15, 1);
            const railMat = new THREE.MeshLambertMaterial({ color: 0x94a3b8 }); // 浅灰色护栏
            
            const railL = new THREE.Mesh(railGeo, railMat);
            railL.position.set(-0.375, bridgeHeight + 0.1, 0);
            railL.castShadow = true;
            group.add(railL);
            
            const railR = new THREE.Mesh(railGeo, railMat);
            railR.position.set(0.375, bridgeHeight + 0.1, 0);
            railR.castShadow = true;
            group.add(railR);
            
            // 3. 桥墩 (支撑到底部，高度为 bridgeHeight)
            // 为了防止桥墩穿透底下的道路，桥墩只在四角且较细
            const pillarGeo = new THREE.CylinderGeometry(0.05, 0.05, bridgeHeight, 8);
            const pillarMat = new THREE.MeshLambertMaterial({ color: 0x64748b });
            
            const p1 = new THREE.Mesh(pillarGeo, pillarMat);
            p1.position.set(-0.3, bridgeHeight / 2, 0.4);
            p1.castShadow = true;
            group.add(p1);
            
            const p2 = new THREE.Mesh(pillarGeo, pillarMat);
            p2.position.set(0.3, bridgeHeight / 2, 0.4);
            p2.castShadow = true;
            group.add(p2);
            
            const p3 = new THREE.Mesh(pillarGeo, pillarMat);
            p3.position.set(-0.3, bridgeHeight / 2, -0.4);
            p3.castShadow = true;
            group.add(p3);
            
            const p4 = new THREE.Mesh(pillarGeo, pillarMat);
            p4.position.set(0.3, bridgeHeight / 2, -0.4);
            p4.castShadow = true;
            group.add(p4);

            group.position.set(x, 0, z);
            return group;
        }

        // 生成坡道 (Ramp)
        function createRamp(x, z, levelStart = 0, levelEnd = 1, orientation = 0) {
            const group = new THREE.Group();
            group.userData = { isRoad: true, roadType: 'ramp', orientation: orientation, levelStart: levelStart, levelEnd: levelEnd };
            
            const levelHeight = 0.5;
            const startH = levelStart * levelHeight;
            const endH = levelEnd * levelHeight;
            
            // 坡道主体
            const length = 1; // 跨越一个格子
            const thickness = 0.05;
            const width = 0.8;
            
            const deckGeo = new THREE.BoxGeometry(width, thickness, length);
            const deckMat = new THREE.MeshLambertMaterial({ color: 0x475569 });
            const deck = new THREE.Mesh(deckGeo, deckMat);
            
            // 计算倾斜角度 (俯仰角)
            const heightDiff = endH - startH;
            const angle = Math.atan2(heightDiff, length);
            
            // 设置中心点高度
            deck.position.set(0, (startH + endH) / 2, 0);
            deck.rotation.x = -angle; // 倾斜
            
            deck.castShadow = true;
            deck.receiveShadow = true;
            group.add(deck);

            // 坡道虚线标线
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const dashGeo = new THREE.PlaneGeometry(0.05, 0.4);
            dashGeo.rotateX(-Math.PI / 2);
            
            const dash1 = new THREE.Mesh(dashGeo, lineMat);
            dash1.position.set(0, (startH + endH) / 2 + 0.026, 0.25);
            dash1.rotation.x = -angle;
            group.add(dash1);
            
            const dash2 = new THREE.Mesh(dashGeo, lineMat);
            dash2.position.set(0, (startH + endH) / 2 + 0.026, -0.25);
            dash2.rotation.x = -angle;
            group.add(dash2);

            // 护栏
            const railGeo = new THREE.BoxGeometry(0.05, 0.15, length);
            const railMat = new THREE.MeshLambertMaterial({ color: 0x94a3b8 });
            
            const railL = new THREE.Mesh(railGeo, railMat);
            railL.position.set(-0.375, (startH + endH) / 2 + 0.1, 0);
            railL.rotation.x = -angle;
            group.add(railL);
            
            const railR = new THREE.Mesh(railGeo, railMat);
            railR.position.set(0.375, (startH + endH) / 2 + 0.1, 0);
            railR.rotation.x = -angle;
            group.add(railR);

            group.position.set(x, 0, z);
            return group;
        }

        // 更新周围的坡道 (forceRamp: 是否强制转换，由手动坡道工具触发)
        function updateRampsAround(x, z, targetLevel, forceRamp = false) {
            const directions = [
                { dx: 0, dz: -1, orientation: 0 }, // 北 -> 南
                { dx: 0, dz: 1, orientation: 2 },  // 南 -> 北
                { dx: -1, dz: 0, orientation: 1 }, // 西 -> 东
                { dx: 1, dz: 0, orientation: 3 }   // 东 -> 西
            ];

            directions.forEach(dir => {
                const nx = x + dir.dx;
                const nz = z + dir.dz;
                const nKey = `${nx},${nz}`;
                const cellObjs = cityMap.get(nKey) || [];
                if (cellObjs.length === 0) return;

                // 获取相邻网格的最高层对象
                const topObj = cellObjs[cellObjs.length - 1];
                if (!topObj || !(topObj.type.startsWith('road') || topObj.type === 'bridge' || topObj.type === 'ramp')) return;

                const nLevel = topObj.level;
                
                // 如果相邻道路高度差为 1，且开启了强制转换 (手动坡道工具)
                if (Math.abs(nLevel - targetLevel) === 1 && forceRamp) {
                    objectsGroup.remove(topObj.mesh);
                    deleteObjAtLevel(nKey, nLevel);
                    cleanupCarsInGrid(nKey);
                    
                    const newRamp = createRamp(nx, nz, nLevel, targetLevel, dir.orientation);
                    newRamp.rotation.y = dir.orientation * (Math.PI / 2); // 旋转以对齐
                    objectsGroup.add(newRamp);
                    setObjAtLevel(nKey, nLevel, { type: 'ramp', mesh: newRamp });
                } 
                // 如果相邻本来是坡道，且现在两者高度一致了，将相邻变为平路/桥
                else if (nLevel === targetLevel && topObj.type === 'ramp') {
                    objectsGroup.remove(topObj.mesh);
                    deleteObjAtLevel(nKey, nLevel);
                    cleanupCarsInGrid(nKey);
                    
                    let newMesh;
                    if (targetLevel === 0) {
                        newMesh = createRoad(nx, nz);
                        setObjAtLevel(nKey, 0, { type: 'road', mesh: newMesh });
                    } else {
                        newMesh = createBridge(nx, nz, targetLevel);
                        setObjAtLevel(nKey, targetLevel, { type: 'bridge', mesh: newMesh });
                    }
                    if (newMesh) objectsGroup.add(newMesh);
                }
            });
        }

        // 生成花田 (Flower Field) - 平面贴图样式
        function createFlowerField(x, z) {
            const group = new THREE.Group();
            group.userData = { isGreen: true };
            
            // 使用 Canvas 生成百花齐放的贴图
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // 绘制草地背景
            ctx.fillStyle = '#4ade80'; // 嫩绿色草地
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制散落的花朵
            const flowerColors = ['#f43f5e', '#fbbf24', '#a855f7', '#60a5fa', '#ff7edd', '#ffffff', '#f97316'];
            
            // 绘制 200 朵小花
            for(let i=0; i<200; i++) {
                const fx = Math.random() * canvas.width;
                const fy = Math.random() * canvas.height;
                const size = 3 + Math.random() * 6; // 3~9px 大小的花朵
                const color = flowerColors[Math.floor(Math.random() * flowerColors.length)];
                
                // 画花瓣 (简单的圆或五瓣花)
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(fx, fy, size, 0, Math.PI * 2);
                ctx.fill();
                
                // 偶尔画一些复杂的五瓣花
                if(Math.random() > 0.5) {
                    for(let j=0; j<5; j++) {
                        const angle = (j / 5) * Math.PI * 2;
                        const px = fx + Math.cos(angle) * size;
                        const py = fy + Math.sin(angle) * size;
                        ctx.beginPath();
                        ctx.arc(px, py, size * 0.8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    // 花蕊
                    ctx.fillStyle = '#fef08a';
                    ctx.beginPath();
                    ctx.arc(fx, fy, size * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            // 增加一点草的纹理线条
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 2;
            for(let i=0; i<300; i++) {
                const lx = Math.random() * canvas.width;
                const ly = Math.random() * canvas.height;
                ctx.beginPath();
                ctx.moveTo(lx, ly);
                ctx.lineTo(lx + (Math.random()-0.5)*10, ly - Math.random()*15);
                ctx.stroke();
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            
            // 贴图基底
            const soilGeo = new THREE.PlaneGeometry(1, 1);
            soilGeo.rotateX(-Math.PI / 2);
            const soilMat = new THREE.MeshLambertMaterial({ 
                map: texture,
                side: THREE.DoubleSide
            });
            const soil = new THREE.Mesh(soilGeo, soilMat);
            soil.position.y = 0.015; // 稍微高于地面，避免Z冲突
            soil.receiveShadow = true;
            group.add(soil);
            
            group.position.set(x, 0, z);
            return group;
        }

        // 生成学校 (School)
        function createSchool(x, z) {
            const group = new THREE.Group();
            group.userData = { isBuilding: true, isPublicService: true, multiGrid: true, size: 2 };

        // 创建文字纹理
        function createTextTexture(text, bgColor, textColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = 'bold 80px Arial';
            ctx.fillStyle = textColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        // 生成游乐园 (Amusement Park) - 2x2 优化版
        function createAmusementPark(x, z) {
            const group = new THREE.Group();
            group.userData = { isBuilding: true, isEntertainment: true, multiGrid: true, size: 2 };

            // 游乐园彩色地基
            const groundGeo = new THREE.PlaneGeometry(1.9, 1.9);
            groundGeo.rotateX(-Math.PI / 2);
            
            // 绘制活泼的底色贴图
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // 基础绿地
            ctx.fillStyle = '#86efac'; 
            ctx.fillRect(0, 0, 512, 512);
            
            // 彩色步道
            ctx.fillStyle = '#fde047';
            ctx.beginPath();
            ctx.arc(256, 256, 180, 0, Math.PI*2);
            ctx.fill();
            
            // 内部粉色广场
            ctx.fillStyle = '#fca5a5';
            ctx.beginPath();
            ctx.arc(256, 256, 120, 0, Math.PI*2);
            ctx.fill();
            
            const groundTex = new THREE.CanvasTexture(canvas);
            const groundMat = new THREE.MeshLambertMaterial({ map: groundTex });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.position.y = 0.015;
            ground.receiveShadow = true;
            group.add(ground);

            // 1. 摩天轮 (主视觉 - 左后方)
            const wheelGroup = new THREE.Group();
            wheelGroup.position.set(-0.4, 0.9, -0.4);
            
            // 支架 (A字型)
            const supportGeo = new THREE.CylinderGeometry(0.04, 0.08, 1.4, 6);
            const supportMat = new THREE.MeshLambertMaterial({ color: 0x94a3b8 });
            
            const support1 = new THREE.Mesh(supportGeo, supportMat);
            support1.position.set(-0.2, -0.2, 0.3); support1.rotation.x = -0.35; support1.rotation.z = 0.1;
            const support2 = new THREE.Mesh(supportGeo, supportMat);
            support2.position.set(0.2, -0.2, 0.3); support2.rotation.x = -0.35; support2.rotation.z = -0.1;
            const support3 = new THREE.Mesh(supportGeo, supportMat);
            support3.position.set(-0.2, -0.2, -0.3); support3.rotation.x = 0.35; support3.rotation.z = 0.1;
            const support4 = new THREE.Mesh(supportGeo, supportMat);
            support4.position.set(0.2, -0.2, -0.3); support4.rotation.x = 0.35; support4.rotation.z = -0.1;
            wheelGroup.add(support1, support2, support3, support4);
            
            // 轮盘主轴
            const axleGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.5);
            axleGeo.rotateZ(Math.PI/2);
            const axle = new THREE.Mesh(axleGeo, new THREE.MeshLambertMaterial({ color: 0x475569 }));
            wheelGroup.add(axle);
            
            // 摩天轮主圈和辐条

            const ringMat = new THREE.MeshLambertMaterial({ color: 0x3b82f6 });

            wheelGroup.add(ring);
            
            // 内圈

            innerRingGeo.rotateY(Math.PI/2);

            wheelGroup.add(innerRing);

            merryRoof.position.y = 0.6;
            merryGroup.add(merryRoof);
            
            // 中心柱
            const centerPillarGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.5);
            const centerPillar = new THREE.Mesh(centerPillarGeo, new THREE.MeshLambertMaterial({ color: 0xfde047 }));
            centerPillar.position.y = 0.35;
            merryGroup.add(centerPillar);
            
            // 木马和小柱子
            for(let i=0; i<6; i++) {
                const angle = (i/6) * Math.PI * 2;
                // 柱子
                const pGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.5);
                const pMat = new THREE.MeshLambertMaterial({ color: 0xd1d5db });
                const p = new THREE.Mesh(pGeo, pMat);
                p.position.set(Math.cos(angle)*0.3, 0.35, Math.sin(angle)*0.3);
                merryGroup.add(p);
                
                // 简易木马
                const horseGeo = new THREE.BoxGeometry(0.06, 0.1, 0.15);
                const horseMat = new THREE.MeshLambertMaterial({ color: cabinColors[i] });
                const horse = new THREE.Mesh(horseGeo, horseMat);
                // 让木马高低错落
                const hY = 0.25 + (i%2) * 0.1;
                horse.position.set(Math.cos(angle)*0.3, hY, Math.sin(angle)*0.3);
                // 木马朝向切线方向
                horse.rotation.y = -angle;
                merryGroup.add(horse);
            }
            merryGroup.castShadow = true;
            group.add(merryGroup);

            // 3. 售票处/主入口大门 (正前方偏左)
            const gateGroup = new THREE.Group();
            gateGroup.position.set(-0.3, 0, 0.8);
            
            // 两侧柱子
            const pillarGeo = new THREE.BoxGeometry(0.2, 0.6, 0.2);
            const pillarMat = new THREE.MeshLambertMaterial({ color: 0xec4899 });
            const pillar1 = new THREE.Mesh(pillarGeo, pillarMat); pillar1.position.set(-0.4, 0.3, 0); gateGroup.add(pillar1);
            const pillar2 = new THREE.Mesh(pillarGeo, pillarMat); pillar2.position.set(0.4, 0.3, 0); gateGroup.add(pillar2);
            
            // 拱门顶

            const arch = new THREE.Mesh(archGeo, archMat);

                new THREE.BoxGeometry(0.3, 0.3, 0.3),
                new THREE.MeshLambertMaterial({ color: 0x6ee7b7 })
            );
            stallBase.position.y = 0.15;
            stallGroup.add(stallBase);

                new THREE.ConeGeometry(0.25, 0.2, 4),
                new THREE.MeshLambertMaterial({ color: 0xf43f5e })

            group.add(stallGroup);

            group.position.set(x + 0.5, 0, z + 0.5);
