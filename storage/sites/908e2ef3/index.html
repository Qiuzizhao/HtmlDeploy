<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* 游戏主面板 */
        #game-board {
            border: 3px solid #fff;
            background-color: #111;
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(20, 30px);
        }

        /* 方块格子样式 */
        .cell {
            width: 30px;
            height: 30px;
            border: 1px solid #222;
        }

        /* 信息面板 */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 180px;
        }

        .score-box, .next-box, .controls {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #fff;
        }

        h3 {
            margin-bottom: 10px;
            color: #ffd700;
            text-align: center;
        }

        p {
            font-size: 18px;
            text-align: center;
            margin: 5px 0;
        }

        /* 下一个方块预览区 */
        #next-piece {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 30px);
            grid-template-rows: repeat(4, 30px);
            background-color: #111;
            border: 2px solid #fff;
        }

        /* 按钮样式 */
        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        #start-btn {
            background: #4CAF50;
            color: white;
        }

        #pause-btn {
            background: #ff9800;
            color: white;
        }

        #reset-btn {
            background: #f44336;
            color: white;
        }

        button:hover {
            opacity: 0.8;
        }

        /* 游戏结束遮罩 */
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 100;
        }

        .game-over h2 {
            color: #ff4444;
            font-size: 36px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 游戏主区域 -->
        <div id="game-board"></div>
        
        <!-- 右侧信息面板 -->
        <div class="info-panel">
            <div class="score-box">
                <h3>当前得分</h3>
                <p id="score">0</p>
            </div>

            <div class="next-box">
                <h3>下一个方块</h3>
                <div id="next-piece"></div>
            </div>

            <div class="controls">
                <h3>操作控制</h3>
                <p>↑ 旋转</p>
                <p>↓ 加速</p>
                <p>←→ 移动</p>
                <button id="start-btn">开始游戏</button>
                <button id="pause-btn">暂停游戏</button>
                <button id="reset-btn">重新开始</button>
            </div>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="game-over" id="game-over">
        <h2>游戏结束</h2>
        <p>最终得分：<span id="final-score">0</span></p>
        <button onclick="restartGame()">再来一局</button>
    </div>

    <script>
        // 游戏基础配置
        const ROWS = 20;
        const COLS = 10;
        const CELL_SIZE = 30;
        let score = 0;
        let gameInterval;
        let isGameOver = false;
        let isPaused = false;

        // 获取DOM元素
        const gameBoard = document.getElementById('game-board');
        const nextPieceBoard = document.getElementById('next-piece');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        // 俄罗斯方块7种形状定义（二维数组）
        const TETROMINOS = [
            { shape: [[1,1,1,1]], color: '#00ffff' }, // I
            { shape: [[1,1],[1,1]], color: '#ffff00' }, // O
            { shape: [[0,1,0],[1,1,1]], color: '#a020f0' }, // T
            { shape: [[1,0,0],[1,1,1]], color: '#ff7f50' }, // L
            { shape: [[0,0,1],[1,1,1]], color: '#0000ff' }, // J
            { shape: [[0,1,1],[1,1,0]], color: '#00ff00' }, // S
            { shape: [[1,1,0],[0,1,1]], color: '#ff0000' } // Z
        ];

        // 初始化游戏棋盘
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let currentPiece = null;
        let nextPiece = null;

        // 初始化棋盘DOM
        function initBoard() {
            gameBoard.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    gameBoard.appendChild(cell);
                }
            }
        }

        // 初始化预览区
        function initNextBoard() {
            nextPieceBoard.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `next-cell-${r}-${c}`;
                    nextPieceBoard.appendChild(cell);
                }
            }
        }

        // 随机生成方块
        function getRandomTetromino() {
            const randomIndex = Math.floor(Math.random() * TETROMINOS.length);
            return TETROMINOS[randomIndex];
        }

        // 绘制方块
        function drawPiece(piece, boardElement, offsetX = 0, offsetY = 0) {
            const shape = piece.shape;
            const color = piece.color;
            
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const x = offsetX + c;
                        const y = offsetY + r;
                        const cell = boardElement.querySelector(`#${boardElement.id}-${y}-${x}`);
                        if (cell) {
                            cell.style.backgroundColor = color;
                        }
                    }
                }
            }
        }

        // 清除方块
        function clearPiece(piece, boardElement, offsetX = 0, offsetY = 0) {
            const shape = piece.shape;
            
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const x = offsetX + c;
                        const y = offsetY + r;
                        const cell = boardElement.querySelector(`#${boardElement.id}-${y}-${x}`);
                        if (cell) {
                            cell.style.backgroundColor = '';
                        }
                    }
                }
            }
        }

        // 渲染整个棋盘
        function renderBoard() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    cell.style.backgroundColor = board[r][c] ? board[r][c] : '';
                }
            }
        }

        // 渲染预览方块
        function renderNextPiece() {
            // 清空预览区
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cell = document.getElementById(`next-cell-${r}-${c}`);
                    cell.style.backgroundColor = '';
                }
            }
            drawPiece(nextPiece, nextPieceBoard, 0, 0);
        }

        // 碰撞检测
        function checkCollision(piece, x, y) {
            const shape = piece.shape;
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const newX = x + c;
                        const newY = y + r;
                        // 超出边界或与已有方块碰撞
                        if (newX < 0 || newX >= COLS || newY >= ROWS || (newY >= 0 && board[newY][newX])) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // 旋转方块
        function rotatePiece() {
            if (isGameOver || isPaused) return;
            
            const originalShape = currentPiece.shape;
            // 矩阵旋转算法
            currentPiece.shape = currentPiece.shape[0].map((_, index) => 
                currentPiece.shape.map(row => row[index]).reverse()
            );
            
            if (checkCollision(currentPiece, currentX, currentY)) {
                currentPiece.shape = originalShape; // 碰撞则恢复原状
            } else {
                clearPiece(currentPiece, gameBoard, currentX, currentY);
                drawPiece(currentPiece, gameBoard, currentX, currentY);
            }
        }

        // 移动方块
        function movePiece(dx, dy) {
            if (isGameOver || isPaused) return;
            
            if (!checkCollision(currentPiece, currentX + dx, currentY + dy)) {
                clearPiece(currentPiece, gameBoard, currentX, currentY);
                currentX += dx;
                currentY += dy;
                drawPiece(currentPiece, gameBoard, currentX, currentY);
                return true;
            }
            
            // 向下移动碰撞 = 方块落地
            if (dy > 0) {
                lockPiece();
                return false;
            }
            return false;
        }

        // 锁定方块到棋盘
        function lockPiece() {
            const shape = currentPiece.shape;
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const x = currentX + c;
                        const y = currentY + r;
                        if (y < 0) {
                            gameOver(); // 触顶游戏结束
                            return;
                        }
                        board[y][x] = currentPiece.color;
                    }
                }
            }
            clearLines(); // 消除满行
            spawnNewPiece(); // 生成新方块
        }

        // 消除满行
        function clearLines() {
            let linesCleared = 0;
            
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(cell => cell)) {
                    // 删除满行，顶部添加空行
                    board.splice(r, 1);
                    board.unshift(Array(COLS).fill(0));
                    r++; // 重新检查当前行
                    linesCleared++;
                }
            }

            // 计分规则
            if (linesCleared > 0) {
                score += linesCleared * 100;
                scoreElement.textContent = score;
            }
        }

        // 生成新方块
        function spawnNewPiece() {
            currentPiece = nextPiece || getRandomTetromino();
            nextPiece = getRandomTetromino();
            currentX = Math.floor(COLS / 2) - Math.floor(currentPiece.shape[0].length / 2);
            currentY = 0;
            
            renderNextPiece();
            drawPiece(currentPiece, gameBoard, currentX, currentY);
            
            // 新方块生成就碰撞 = 游戏结束
            if (checkCollision(currentPiece, currentX, currentY)) {
                gameOver();
            }
        }

        // 自动下落
        function dropDown() {
            movePiece(0, 1);
        }

        // 游戏结束
        function gameOver() {
            isGameOver = true;
            clearInterval(gameInterval);
            finalScoreElement.textContent = score;
            gameOverElement.style.display = 'block';
        }

        // 开始游戏
        function startGame() {
            if (isGameOver) return;
            if (!isPaused) {
                initBoard();
                initNextBoard();
                board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                score = 0;
                scoreElement.textContent = score;
                spawnNewPiece();
            }
            isPaused = false;
            gameInterval = setInterval(dropDown, 800);
        }

        // 暂停游戏
        function pauseGame() {
            if (isGameOver) return;
            isPaused = !isPaused;
            if (isPaused) {
                clearInterval(gameInterval);
            } else {
                gameInterval = setInterval(dropDown, 800);
            }
        }

        // 重新开始游戏
        function restartGame() {
            isGameOver = false;
            isPaused = false;
            clearInterval(gameInterval);
            gameOverElement.style.display = 'none';
            startGame();
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (isGameOver) return;
            
            switch(e.keyCode) {
                case 37: // 左箭头
                    movePiece(-1, 0);
                    break;
                case 39: // 右箭头
                    movePiece(1, 0);
                    break;
                case 38: // 上箭头
                    rotatePiece();
                    break;
                case 40: // 下箭头
                    movePiece(0, 1);
                    break;
            }
        });

        // 按钮事件绑定
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('pause-btn').addEventListener('click', pauseGame);
        document.getElementById('reset-btn').addEventListener('click', restartGame);

        // 初始化游戏
        initBoard();
        initNextBoard();
    </script>
</body>
</html>
