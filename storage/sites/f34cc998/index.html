<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>简易抖音</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }
    /* 主容器 - 全屏竖屏 */
    .douyin {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    /* 视频列表容器 - 纵向滑动 */
    .video-wrap {
      height: 100vh;
      transition: transform 0.3s ease;
    }
    /* 单个视频页 */
    .video-item {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    .video-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* 右侧功能栏：点赞/评论/收藏/分享 */
    .action-bar {
      position: absolute;
      right: 15px;
      bottom: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
    }
    .action-item {
      margin: 18px 0;
      text-align: center;
    }
    .action-item img {
      width: 35px;
      height: 35px;
      margin-bottom: 5px;
    }
    .action-item span {
      font-size: 12px;
    }
    /* 底部文案区 */
    .info {
      position: absolute;
      left: 20px;
      right: 80px;
      bottom: 50px;
      color: #fff;
    }
    .author {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .desc {
      font-size: 14px;
      line-height: 1.5;
    }
    /* 头像关注 */
    .avatar {
      position: absolute;
      right: 15px;
      bottom: 220px;
    }
    .avatar img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: 2px solid #fff;
    }
    .follow {
      width: 20px;
      height: 20px;
      background: #fe2c55;
      border-radius: 50%;
      color: #fff;
      text-align: center;
      line-height: 20px;
      font-size: 16px;
      margin: -10px auto 0;
    }
  </style>
</head>
<body>
<div class="douyin">
  <div class="video-wrap" id="videoWrap">
    <!-- 视频1 -->
    <div class="video-item">
      <video src="https://www.w3school.com.cn/i/movie.mp4" autoplay loop muted playsinline></video>
      <div class="avatar">
        <img src="https://picsum.photos/100/100" alt="头像">
        <div class="follow">+</div>
      </div>
      <div class="action-bar">
        <div class="action-item">
          <img src="https://img.icons8.com/fluency/96/000000/like.png" alt="点赞">
          <span>12.5w</span>
        </div>
        <div class="action-item">
          <img src="https://img.icons8.com/fluency/96/000000/comments.png" alt="评论">
          <span>3289</span>
        </div>
        <div class="action-item">
          <img src="https://img.icons8.com/fluency/96/000000/bookmark.png" alt="收藏">
          <span>8960</span>
        </div>
        <div class="action-item">
          <img src="https://img.icons8.com/fluency/96/000000/share.png" alt="分享">
          <span>分享</span>
        </div>
      </div>
      <div class="info">
        <div class="author">@趣味生活</div>
        <div class="desc">今日日常碎片✨ #生活 #日常 #短视频</div>
      </div>
    </div>

    <!-- 视频2 -->
    <div class="video-item">
      <video src="https://www.w3school.com.cn/i/movie.mp4" autoplay loop muted playsinline></video>
      <div class="avatar">
        <img src="https://picsum.photos/101/101" alt="头像">
        <div class="follow">+</div>
      </div>
      <div class="action-bar">
        <div class="action-item">
          <img src="https://img.icons8.com/fluency/96/000000/like.png" alt="点赞">
          <span>8.2w</span>
        </div>
        <div class="action-item">
          <img src="https://img.icons8.com/fluency/96/000000/comments.png" alt="评论">
          <span>2156</span>
        </div>
        <div class="action-item">
          <img src="https://img.icons8.com/fluency/96/000000/bookmark.png" alt="收藏">
          <span>5620</span>
        </div>
        <div class="action-item">
          <img src="https://img.icons8.com/fluency/96/000000/share.png" alt="分享">
          <span>分享</span>
        </div>
      </div>
      <div class="info">
        <div class="author">@旅行日记</div>
        <div class="desc">风景治愈一切🌿 #旅行 #风景</div>
      </div>
    </div>

    <!-- 视频3 -->
    <div class="video-item">
      <video src="https://www.w3school.com.cn/i/movie.mp4" autoplay loop muted playsinline></video>
      <div class="avatar">
        <img src="https://picsum.photos/102/102" alt="头像">
        <div class="follow">+</div>
      </div>
      <div class="action-bar">
        <div class="action-item">
          <img src="https://img.icons8.com/fluency/96/000000/like.png" alt="点赞">
          <span>20w</span>
        </div>
        <div class="action-item">
          <img src="https://img.icons8.com/fluency/96/000000/comments.png" alt="评论">
          <span>6890</span>
        </div>
        <div class="action-item">
          <img src="https://img.icons8.com/fluency/96/000000/bookmark.png" alt="收藏">
          <span>1.2w</span>
        </div>
        <div class="action-item">
          <img src="https://img.icons8.com/fluency/96/000000/share.png" alt="分享">
          <span>分享</span>
        </div>
      </div>
      <div class="info">
        <div class="author">@美食探店</div>
        <div class="desc">好吃到停不下来😋 #美食 #探店</div>
      </div>
    </div>
  </div>
</div>

<script>
  const videoWrap = document.getElementById('videoWrap');
  const videoItems = document.querySelectorAll('.video-item');
  let currentIndex = 0;
  const itemHeight = window.innerHeight;

  // 触摸滑动逻辑（手机端上下滑切换视频）
  let startY = 0;
  let moveY = 0;

  // 监听触摸开始
  document.addEventListener('touchstart', (e) => {
    startY = e.touches[0].clientY;
  });

  // 监听触摸移动
  document.addEventListener('touchmove', (e) => {
    moveY = e.touches[0].clientY;
  });

  // 监听触摸结束，切换视频
  document.addEventListener('touchend', () => {
    const diff = startY - moveY;
    // 上滑 -> 下一个视频
    if (diff > 50 && currentIndex < videoItems.length - 1) {
      currentIndex++;
      videoWrap.style.transform = `translateY(-${currentIndex * itemHeight}px)`;
    }
    // 下滑 -> 上一个视频
    else if (diff < -50 && currentIndex > 0) {
      currentIndex--;
      videoWrap.style.transform = `translateY(-${currentIndex * itemHeight}px)`;
    }
  });

  // 鼠标滚轮（电脑端预览）
  window.addEventListener('wheel', (e) => {
    if (e.deltaY > 0 && currentIndex < videoItems.length - 1) {
      currentIndex++;
    } else if (e.deltaY < 0 && currentIndex > 0) {
      currentIndex--;
    }
    videoWrap.style.transform = `translateY(-${currentIndex * itemHeight}px)`;
  });
</script>
</body>
</html>
