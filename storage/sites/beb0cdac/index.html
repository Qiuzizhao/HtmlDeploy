<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原神祈愿模拟器｜无限纠缠之缘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif}
body{
    background:#191426 url(https://p.qqan.com/up/2022-9/1663162433834390.jpg) center/cover fixed;
    min-height:100vh;color:#fff;padding:20px;
}
.mask{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:-1}
.wrap{max-width:1100px;margin:0 auto;position:relative;z-index:2}
.top-info{
    background:rgba(30,22,48,0.75);border:1px solid #9d4edd55;
    border-radius:16px;padding:22px;margin-bottom:25px;backdrop-filter:blur(6px);
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;
}
.title h1{color:#ffd733;text-shadow:0 0 12px #ffc107;font-size:28px}
.data-box{display:flex;gap:30px}
.data-item{text-align:center}
.data-item p:nth-child(1){opacity:0.7;font-size:14px}
.data-item p:nth-child(2){font-size:24px;font-weight:bold}
.yuan{color:#ffd733}
.baodi{color:#c77dff}

/*抽卡展示区*/
.result-box{
    min-height:280px;background:rgba(30,22,48,0.75);border-radius:16px;
    padding:25px;margin-bottom:25px;backdrop-filter:blur(6px);
    display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:16px;
}
.empty-tip{grid-column:1/-1;text-align:center;padding:80px 0;opacity:0.6;font-size:18px}

/*卡牌样式 - 原神原版风格*/
.card{
    border-radius:12px;padding:14px;text-align:center;position:relative;
    animation:cardShow 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    display:flex;flex-direction:column;align-items:center;gap:8px;
}
.card img{
    width:100px;height:100px;object-fit:cover;border-radius:8px;
    border:2px solid rgba(255,255,255,0.2);
}
.star5{
    border:2px solid #ffd733;
    background:linear-gradient(180deg,#4a3a22,#2d2213);
    box-shadow:0 0 20px #ffd73399;
}
.star4{
    border:2px solid #b159ff;
    background:linear-gradient(180deg,#3d2a52,#2a1e3b);
    box-shadow:0 0 15px #b159ff88;
}
.star3{
    border:2px solid #6489ff88;
    background:linear-gradient(180deg,#253052,#1a223b);
}
@keyframes cardShow{
    from{transform:scale(0.2) rotate(5deg);opacity:0}
    to{transform:scale(1) rotate(0);opacity:1}
}

/*按钮区*/
.btn-group{display:flex;gap:20px;justify-content:center;margin-bottom:25px;flex-wrap:wrap}
button{
    padding:16px 40px;border:none;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer;
    transition:0.25s all;
}
.single{background:#7b2cbf;color:#fff;box-shadow:0 0 12px #7b2cbf77}
.ten{background:linear-gradient(90deg,#7b2cbf,#ffc107);color:#000;font-weight:bold}
button:hover{transform:scale(1.08)}
button:active{transform:scale(0.95)}

/*记录区*/
.record{
    background:rgba(30,22,48,0.75);border-radius:16px;padding:20px;backdrop-filter:blur(6px);
    max-height:280px;overflow-y:auto;border:1px solid #9d4edd55;
}
.record h3{margin-bottom:12px;color:#ffd733}
.record-item{padding:8px 0;border-bottom:1px solid #ffffff22;font-size:15px}

/*五星全屏弹窗 - 原神金色传说特效*/
.five-pop{
    position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:999;
    display:none;flex-direction:column;align-items:center;justify-content:center;
    animation:popIn 0.5s ease-out;
}
@keyframes popIn{from{opacity:0}to{opacity:1}}
.five-pop h2{
    font-size:56px;color:#ffd733;
    text-shadow:0 0 25px gold,0 0 40px #ff9900;
    animation:goldAni 1.2s infinite alternate;
    margin-bottom:30px;
}
@keyframes goldAni{
    from{filter:brightness(1) scale(1)}
    to{filter:brightness(1.5) scale(1.05)}
}
.five-char-img{
    width:300px;height:300px;object-fit:cover;
    border-radius:16px;border:3px solid #ffd733;
    box-shadow:0 0 30px #ffd733;
    margin-bottom:20px;
}
.close-pop{
    padding:16px 45px;background:#7b2cbf;color:#fff;
    font-size:20px;border-radius:12px;
}
</style>
</head>
<body>
<div class="mask"></div>
<div class="wrap">
    <div class="top-info">
        <div class="title">
            <h1>角色活动祈愿</h1>
            <p style="opacity:0.7">无限纠缠之缘｜复刻原神官方抽卡概率</p>
        </div>
        <div class="data-box">
            <div class="data-item">
                <p>纠缠之缘</p>
                <p class="yuan">∞</p>
            </div>
            <div class="data-item">
                <p>五星保底计数</p>
                <p id="pityNum" class="baodi">0</p>
            </div>
        </div>
    </div>

    <div id="resultBox" class="result-box">
        <div class="empty-tip">点击下方按钮开始祈愿</div>
    </div>

    <div class="btn-group">
        <button class="single" onclick="pullOne()">单抽×1</button>
        <button class="ten" onclick="pullTen()">十连×10</button>
    </div>

    <div class="record">
        <h3>📜 抽卡记录</h3>
        <div id="recordList"></div>
    </div>
</div>

<!-- 五星角色弹窗 -->
<div id="fiveWinPop" class="five-pop">
    <h2>★五星角色登场★</h2>
    <img id="popCharImg" class="five-char-img" src="">
    <button class="close-pop" onclick="closePop()">确认收下</button>
</div>

<script>
// 卡池数据 + 五星角色对应图片链接
const pool = {
    five: [
        { name: '芙宁娜', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602282.jpg' },
        { name: '那维莱特', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602283.jpg' },
        { name: '钟离', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602284.jpg' },
        { name: '枫原万叶', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602285.jpg' },
        { name: '雷电将军', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602286.jpg' },
        { name: '胡桃', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602287.jpg' },
        { name: '神里绫华', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602288.jpg' },
        { name: '夜兰', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602289.jpg' }
    ],
    four: [
        { name: '班尼特', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602290.jpg' },
        { name: '香菱', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602291.jpg' },
        { name: '行秋', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602292.jpg' },
        { name: '砂糖', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602293.jpg' },
        { name: '诺艾尔', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602294.jpg' },
        { name: '菲谢尔', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602295.jpg' },
        { name: '莱依拉', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602296.jpg' },
        { name: '九条裟罗', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602297.jpg' }
    ],
    three: [
        { name: '讨龙英杰谭', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602298.jpg' },
        { name: '魔导绪论', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602299.jpg' },
        { name: '铁影阔剑', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602300.jpg' },
        { name: '弹弓', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602301.jpg' },
        { name: '神射手之誓', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602302.jpg' },
        { name: '翡玉法球', img: 'https://img.588ku.com/avatar/2024/07/05/14/1717564602303.jpg' }
    ]
}

// 全局变量
let pity = 0;
let recordArr = [];
let currentFiveImg = '';

const resultDom = document.getElementById('resultBox');
const pityDom = document.getElementById('pityNum');
const recordDom = document.getElementById('recordList');
const pop = document.getElementById('fiveWinPop');
const popCharImg = document.getElementById('popCharImg');

// 随机抽卡单张
function getOneCard() {
    pity++;
    let rate5 = 0.006;
    // 90抽必出五星
    if (pity >= 89) rate5 = 1;
    let rand = Math.random();
    let res, star;

    if (rand < rate5) {
        // 抽中五星
        const randomItem = pool.five[Math.floor(Math.random() * pool.five.length)];
        res = randomItem;
        star = 5;
        currentFiveImg = randomItem.img;
        pity = 0;
        setTimeout(() => {
            popCharImg.src = currentFiveImg;
            pop.style.display = 'flex';
        }, 500);
    } else if (rand < rate5 + 0.051) {
        // 抽中四星
        res = pool.four[Math.floor(Math.random() * pool.four.length)];
        star = 4;
    } else {
        // 抽中三星
        res = pool.three[Math.floor(Math.random() * pool.three.length)];
        star = 3;
    }

    pityDom.innerText = pity;
    return { name: res.name, star: star, img: res.img };
}

// 渲染卡牌（带图片）
function renderCard(list) {
    resultDom.innerHTML = '';
    list.forEach((item, index) => {
        setTimeout(() => {
            let d = document.createElement('div');
            d.className = `card star${item.star}`;
            d.innerHTML = `
                <img src="${item.img}" alt="${item.name}">
                <div style="font-size:24px;margin:4px 0">${'★'.repeat(item.star)}</div>
                <div style="font-weight:bold">${item.name}</div>
            `;
            resultDom.appendChild(d);
        }, index * 100); // 依次弹出卡牌，还原原神抽卡动画
    });
}

// 新增记录
function addLog(str) {
    recordArr.unshift(str);
    recordDom.innerHTML = '';
    recordArr.forEach(i => {
        let d = document.createElement('div');
        d.className = 'record-item';
        d.innerText = i;
        recordDom.appendChild(d);
    });
}

// 单抽
function pullOne() {
    let card = getOneCard();
    renderCard([card]);
    addLog(`单抽｜${card.star}星：${card.name}`);
}

// 十连（必出至少1四星）
function pullTen() {
    let tenList = [];
    let hasFour = false;
    for (let i = 0; i < 10; i++) {
        let c = getOneCard();
        if (c.star >= 4) hasFour = true;
        tenList.push(c);
    }
    // 未出四星则强制替换一张为四星
    if (!hasFour) {
        let fourCard = pool.four[Math.floor(Math.random() * pool.four.length)];
        tenList[Math.floor(Math.random() * 10)] = {
            name: fourCard.name,
            star: 4,
            img: fourCard.img
        };
    }
    renderCard(tenList);
    let fiveNum = tenList.filter(x => x.star === 5).length;
    let fourNum = tenList.filter(x => x.star === 4).length;
    addLog(`十连｜五星×${fiveNum} 四星×${fourNum}`);
}

// 关闭五星弹窗
function closePop() {
    pop.style.display = 'none';
}
</script>
</body>
</html>
