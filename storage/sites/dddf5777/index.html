<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>引力微星 - 矢量修正物理版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #03030c;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }

        #score-board {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #a5b4fc;
            display: flex;
            gap: 20px;
        }

        #game-container {
            position: relative;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(99, 102, 241, 0.25);
            background: radial-gradient(circle, #08081e 0%, #03030c 100%);
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(3, 3, 12, 0.9);
            border-radius: 50%;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 28px;
            color: #818cf8;
            margin: 0 0 10px 0;
            text-shadow: 0 0 15px rgba(129, 140, 248, 0.6);
            letter-spacing: 1px;
        }

        p {
            font-size: 13px;
            color: #9ca3af;
            max-width: 280px;
            line-height: 1.6;
            margin: 0 0 20px 0;
        }

        .btn {
            padding: 10px 30px;
            font-size: 15px;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        /* 矢量修正提示标签 */
        .badge {
            font-size: 10px;
            background: #10b981;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>

    <div id="score-board">
        <div>ORBITS: <span id="score" style="color: #fbbf24; font-weight: bold;">0</span></div>
    </div>

    <div id="game-container">
        <canvas id="spaceCanvas" width="500" height="500"></canvas>
        
        <div id="menu">
            <div class="badge">矢量物理引擎已修正 (v2.0)</div>
            <h1 id="menu-title">GRAVITY ORBIT</h1>
            <p id="menu-desc">点击屏幕或按【空格键】释放卫星。<br>增加了<b>“瞬时切线指示器”</b>，确保变轨物理矢量绝对精准！</p>
            <button class="btn" id="action-btn" onclick="startGame()">进入轨道</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const menu = document.getElementById('menu');
        const menuTitle = document.getElementById('menu-title');
        const menuDesc = document.getElementById('menu-desc');
        const actionBtn = document.getElementById('action-btn');

        let gameActive = false;
        let score = 0;
        let asteroids = [];
        let particles = []; // 尾迹粒子效果
        let asteroidTimer = 0;

        // 星球定义（核心引力源）
        const planets = [
            { id: 0, x: 160, y: 250, radius: 45, color: '#38bdf8', pulse: 0 },
            { id: 1, x: 340, y: 250, radius: 45, color: '#fbbf24', pulse: 0 }
        ];

        // 玩家卫星定义
        const satellite = {
            x: 0,
            y: 0,
            radius: 6,
            color: '#e0e7ff',
            currentPlanet: 0, 
            angle: 0,        
            orbitRadius: 85, 
            speed: 0.04,     // 公转角速度（其正负号决定了顺时针/逆时针）
            isFlying: false, 
            vx: 0,           
            vy: 0            
        };

        // 绑定交互事件
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') triggerJump(); });
        canvas.addEventListener('mousedown', triggerJump);

        // 触发卫星脱离轨道跳跃
        function triggerJump() {
            if (!gameActive || satellite.isFlying) return;

            // 获取当前的公转旋转方向：1（顺时针）或 -1（逆时针）
            const rotationDirection = Math.sign(satellite.speed);

            // 【关键物理Bug修复】：切线向量必须乘上旋转方向因子
            const tangentX = -Math.sin(satellite.angle) * rotationDirection;
            const tangentY = Math.cos(satellite.angle) * rotationDirection;
            const launchSpeed = 6.5; // 发射速度

            satellite.vx = tangentX * launchSpeed;
            satellite.vy = tangentY * launchSpeed;
            satellite.isFlying = true;
        }

        function startGame() {
            score = 0;
            asteroids = [];
            particles = [];
            asteroidTimer = 0;
            scoreDisplay.innerText = score;
            
            satellite.currentPlanet = 0;
            satellite.angle = 0;
            satellite.speed = 0.04; // 初始为顺时针
            satellite.isFlying = false;
            updateSatellitePosition();

            menu.style.display = 'none';
            gameActive = true;
            animate();
        }

        // 根据轨道角度更新卫星位置
        function updateSatellitePosition() {
            const planet = planets[satellite.currentPlanet];
            satellite.x = planet.x + Math.cos(satellite.angle) * satellite.orbitRadius;
            satellite.y = planet.y + Math.sin(satellite.angle) * satellite.orbitRadius;
        }

        // 核心更新逻辑
        function update() {
            // 1. 卫星轨道公转 or 直线飞行
            if (!satellite.isFlying) {
                satellite.angle += satellite.speed;
                updateSatellitePosition();
            } else {
                satellite.x += satellite.vx;
                satellite.y += satellite.vy;

                // 产生喷气尾迹粒子
                if (Math.random() > 0.3) {
                    particles.push({
                        x: satellite.x,
                        y: satellite.y,
                        vx: (Math.random() - 0.5) * 1 - satellite.vx * 0.2,
                        vy: (Math.random() - 0.5) * 1 - satellite.vy * 0.2,
                        size: Math.random() * 3 + 1,
                        alpha: 1,
                        color: '#818cf8'
                    });
                }

                // 检查是否飞出太空深处
                if (satellite.x < 0 || satellite.x > canvas.width || satellite.y < 0 || satellite.y > canvas.height) {
                    gameOver("卫星动力不足，漂失在茫茫深空中...");
                    return;
                }

                // 检查是否被另一个星球的引力轨道捕获
                const targetPlanetId = satellite.currentPlanet === 0 ? 1 : 0;
                const target = planets[targetPlanetId];
                
                const dx = satellite.x - target.x;
                const dy = satellite.y - target.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // 当刚好飞入目标星球的轨道环带内
                if (distance <= satellite.orbitRadius + 4 && distance >= satellite.orbitRadius - 12) {
                    satellite.isFlying = false;
                    satellite.currentPlanet = targetPlanetId;
                    
                    // 计算捕获瞬间切入轨道的圆弧夹角
                    satellite.angle = Math.atan2(dy, dx);
                    
                    // 完美换向：捕获后公转方向自然反转（维持引力弹弓效应）
                    satellite.speed = -satellite.speed; 
                    
                    score++;
                    scoreDisplay.innerText = score;

                    // 成功捕获时释放一圈庆祝粒子
                    for (let i = 0; i < 12; i++) {
                        const pAngle = Math.random() * Math.PI * 2;
                        particles.push({
                            x: satellite.x,
                            y: satellite.y,
                            vx: Math.cos(pAngle) * (Math.random() * 3 + 1),
                            vy: Math.sin(pAngle) * (Math.random() * 3 + 1),
                            size: Math.random() * 4 + 1.5,
                            alpha: 1,
                            color: '#38bdf8'
                        });
                    }
                }
                
                // 撞击星球表面
                if (distance < target.radius) {
                    gameOver("警告：卫星未能成功逃逸，坠毁在行星表面！");
                    return;
                }
            }

            // 2. 陨石生成与移动
            asteroidTimer++;
            if (asteroidTimer % 80 === 0) {
                const size = Math.random() * 5 + 6;
                asteroids.push({
                    x: Math.random() * canvas.width,
                    y: -15,
                    vx: (Math.random() - 0.5) * 2.5,
                    vy: Math.random() * 2 + 1.8,
                    radius: size
                });
            }

            for (let i = asteroids.length - 1; i >= 0; i--) {
                let a = asteroids[i];
                a.x += a.vx;
                a.y += a.vy;

                // 碰撞检测：卫星与陨石
                const distS = Math.sqrt((satellite.x - a.x)**2 + (satellite.y - a.y)**2);
                if (distS < satellite.radius + a.radius) {
                    gameOver("发生灾难性碰撞！卫星被陨石击碎！");
                    return;
                }

                // 移出屏幕的陨石清理
                if (a.y > canvas.height + 20) asteroids.splice(i, 1);
            }

            // 3. 更新尾迹粒子生命周期
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.025;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            // 星球视觉脉冲
            planets.forEach(p => p.pulse += 0.025);
        }

        // 精美画布渲染
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 绘制轨道引导虚线
            planets.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, satellite.orbitRadius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(99, 102, 241, 0.08)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([6, 10]);
                ctx.stroke();
                ctx.setLineDash([]); // 重置
            });

            // 2. 【核心亮点】绘制瞬时切线指示导轨（当小球在轨道上时）
            if (!satellite.isFlying && gameActive) {
                const rotationDirection = Math.sign(satellite.speed);
                // 使用包含了方向修正因子的完美矢量
                const tx = -Math.sin(satellite.angle) * rotationDirection;
                const ty = Math.cos(satellite.angle) * rotationDirection;

                ctx.beginPath();
                ctx.moveTo(satellite.x, satellite.y);
                // 绘制一条向前延伸的虚线，指示未来的物理抛物切线
                ctx.lineTo(satellite.x + tx * 60, satellite.y + ty * 60);
                ctx.strokeStyle = 'rgba(165, 180, 252, 0.45)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([3, 4]);
                ctx.stroke();
                ctx.setLineDash([]);

                // 切线箭头小头部
                ctx.beginPath();
                ctx.arc(satellite.x + tx * 60, satellite.y + ty * 60, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = '#a5b4fc';
                ctx.fill();
            }

            // 3. 绘制双星核心实体
            planets.forEach(p => {
                // 外层大气微弱发光脉冲
                let glow = p.radius + Math.sin(p.pulse) * 3;
                ctx.beginPath();
                ctx.arc(p.x, p.y, glow, 0, Math.PI * 2);
                ctx.fillStyle = p.color + '10'; 
                ctx.fill();

                // 星球主体
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 25;
                ctx.shadowColor = p.color;
                ctx.fill();
                ctx.shadowBlur = 0; // 重置阴影避免污染
            });

            // 4. 绘制粒子尾迹
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.restore();
            });

            // 5. 绘制玩家小卫星
            ctx.beginPath();
            ctx.arc(satellite.x, satellite.y, satellite.radius, 0, Math.PI * 2);
            ctx.fillStyle = satellite.color;
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ffffff';
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0;

            // 6. 绘制障碍陨石
            asteroids.forEach(a => {
                ctx.beginPath();
                ctx.arc(a.x, a.y, a.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ef4444';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ef4444';
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        // 游戏结束
        function gameOver(msg) {
            gameActive = false;
            menu.style.display = 'flex';
            menuTitle.innerText = "任务中断";
            menuTitle.style.color = "#ef4444";
            menuDesc.innerHTML = `${msg}<br>你成功变轨了 <strong style="color:#fbbf24">${score}</strong> 次。`;
            actionBtn.innerText = "重启推进器";
        }

        // 动画帧循环
        function animate() {
            if (!gameActive) return;
            update();
            draw();
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
