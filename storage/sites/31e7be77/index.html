<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级太空战机射击</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #000518;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            color: #fff;
            user-select: none;
        }
        #ui {
            width: 650px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 17px;
        }
        .btns {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 4px;
        }
        .btns button {
            padding: 5px 12px;
            background: #257cff;
            border: 0;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .btns button:hover {
            background: #3a8cff;
        }
        .btns span {
            font-size: 14px;
            color: #aac;
        }
        #gameWrap {
            position: relative;
        }
        #game {
            border: 2px solid #3698ff;
            background: #000;
            display: block;
        }
        #gameOverBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 35px 45px;
            border: 2px solid #4af;
            border-radius: 12px;
            text-align: center;
            display: none;
            backdrop-filter: blur(4px);
            min-width: 260px;
        }
        #gameOverBox h2 {
            color: #f33;
            font-size: 34px;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }
        #gameOverBox p {
            font-size: 18px;
            color: #cdf;
            margin-bottom: 6px;
        }
        #restart {
            margin-top: 16px;
            padding: 8px 28px;
            font-size: 17px;
            background: #f44;
            border: 0;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        #restart:hover {
            background: #ff6666;
        }
        @media (max-width: 700px) {
            #ui {
                width: 96vw;
                font-size: 14px;
                flex-wrap: wrap;
                justify-content: center;
                gap: 4px 16px;
            }
            #game {
                width: 96vw;
                height: auto;
                aspect-ratio: 650/800;
            }
            .btns span {
                font-size: 12px;
            }
            #gameOverBox {
                padding: 20px 24px;
                min-width: 200px;
            }
            #gameOverBox h2 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>得分：<span id="score">0</span> ｜ 最高分：<span id="maxScore">0</span> ｜ 等级：<span id="lv">1</span></div>
        <div>HP：<span id="hp">100</span> ｜ 护盾：<span id="shield">0</span></div>
    </div>
    <div class="btns">
        <button id="audioBtn">关闭音效</button>
        <span>AD / 方向键移动 ｜ 空格开火 ｜ P 暂停</span>
    </div>
    <div id="gameWrap">
        <canvas id="game" width="650" height="800"></canvas>
        <div id="gameOverBox">
            <h2>游戏结束</h2>
            <p>本局得分：<span id="finalSc">0</span></p>
            <button id="restart">重新开始</button>
        </div>
    </div>
    <script>
        (function() {
            'use strict';

            // ---------- DOM 引用 ----------
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            const scoreDom = document.getElementById('score');
            const maxDom = document.getElementById('maxScore');
            const lvDom = document.getElementById('lv');
            const hpDom = document.getElementById('hp');
            const shDom = document.getElementById('shield');
            const overBox = document.getElementById('gameOverBox');
            const finalSc = document.getElementById('finalSc');
            const restartBtn = document.getElementById('restart');
            const audioBtn = document.getElementById('audioBtn');

            // ---------- 常量 ----------
            const CANVAS_W = 650;
            const CANVAS_H = 800;
            const PLAYER_W = 44;
            const PLAYER_H = 50;
            const PLAYER_SPEED = 7;
            const MAX_HP = 100;
            const MAX_PARTICLES = 300;
            const SHIELD_MAX = 200;

            // ---------- 音效系统 ----------
            let audioOn = true;
            audioBtn.textContent = '关闭音效';

            // 极简音效 (base64 WAV 短促声)
            const SND_DATA = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAA==';

            function playShootSound() {
                if (!audioOn) return;
                try {
                    const a = new Audio(SND_DATA);
                    a.volume = 0.25;
                    a.play().catch(function() { /* 静默忽略 */ });
                } catch (_) { /* 忽略 */ }
            }

            audioBtn.onclick = function() {
                audioOn = !audioOn;
                audioBtn.textContent = audioOn ? '关闭音效' : '开启音效';
            };

            // ---------- 本地存储 ----------
            let maxScore = 0;
            try {
                const saved = localStorage.getItem('shootMax');
                if (saved !== null) maxScore = Number(saved) || 0;
            } catch (_) { /* 忽略 */ }
            maxDom.textContent = maxScore;

            function saveMaxScore(val) {
                try {
                    localStorage.setItem('shootMax', String(val));
                } catch (_) { /* 忽略 */ }
            }

            // ---------- 游戏状态 ----------
            const game = {
                score: 0,
                level: 1,
                hp: MAX_HP,
                shield: 0,
                pause: false,
                running: true,
                fireType: 1, // 1=单发, 2=三连
                fireCd: 220, // 毫秒
                over: false,
            };

            // ---------- 游戏对象 ----------
            const player = {
                x: (CANVAS_W - PLAYER_W) / 2,
                y: CANVAS_H - 70,
                w: PLAYER_W,
                h: PLAYER_H,
                color: '#0cf',
            };

            // 星空
            const stars = [];
            for (let i = 0; i < 140; i++) {
                stars.push({
                    x: Math.random() * CANVAS_W,
                    y: Math.random() * CANVAS_H,
                    size: Math.random() * 2 + 0.4,
                    speed: Math.random() * 2.2 + 0.2,
                });
            }

            // 动态数组
            let bullets = [];
            let enemies = [];
            let items = [];
            let particles = [];
            let boss = null;

            // 按键状态
            const keys = { left: false, right: false, shoot: false };

            // 时间相关
            let lastShotTime = 0;
            let lastEnemySpawn = 0;
            let spawnInterval = 1100;
            let animId = null;

            // ---------- 工具函数 ----------
            function rectCollide(a, b) {
                return a.x < b.x + b.w &&
                    a.x + a.w > b.x &&
                    a.y < b.y + b.h &&
                    a.y + a.h > b.y;
            }

            function clamp(v, min, max) {
                return v < min ? min : v > max ? max : v;
            }

            function rand(min, max) {
                return Math.random() * (max - min) + min;
            }

            function randInt(min, max) {
                return Math.floor(rand(min, max + 1));
            }

            // ---------- 粒子系统 ----------
            function createBoom(x, y, color, num) {
                num = num || 12;
                const count = Math.min(num, MAX_PARTICLES - particles.length);
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: x,
                        y: y,
                        dx: (Math.random() - 0.5) * 6,
                        dy: (Math.random() - 0.5) * 6,
                        s: Math.random() * 3 + 1,
                        color: color,
                        life: 35 + Math.floor(Math.random() * 10),
                    });
                }
                // 超出限制时裁掉最早的多余粒子
                if (particles.length > MAX_PARTICLES) {
                    particles.splice(0, particles.length - MAX_PARTICLES);
                }
            }

            // ---------- 道具系统 ----------
            const ITEM_TYPES = ['hp', 'shield', 'multishot', 'double'];
            const ITEM_W = 26;
            const ITEM_H = 26;
            const ITEM_SPEED = 2.2;

            function createItem(x, y) {
                const type = ITEM_TYPES[Math.floor(Math.random() * ITEM_TYPES.length)];
                items.push({
                    x: x - ITEM_W / 2,
                    y: y,
                    w: ITEM_W,
                    h: ITEM_H,
                    type: type,
                    speed: ITEM_SPEED,
                });
            }

            function applyItem(it) {
                switch (it.type) {
                    case 'hp':
                        game.hp = Math.min(game.hp + 35, MAX_HP);
                        break;
                    case 'shield':
                        game.shield = Math.min(game.shield + 45, SHIELD_MAX);
                        break;
                    case 'multishot':
                        game.fireType = 2;
                        game.fireCd = 160;
                        setTimeout(function() {
                            if (!game.over) {
                                game.fireType = 1;
                                game.fireCd = 220;
                            }
                        }, 8000);
                        break;
                    case 'double':
                        game.score *= 2;
                        setTimeout(function() {
                            if (!game.over) {
                                game.score = Math.floor(game.score / 2);
                            }
                        }, 6000);
                        break;
                }
            }

            // ---------- 敌人生成 ----------
            function spawnEnemy() {
                if (game.pause || !game.running || game.over) return;
                const r = Math.random();
                const spd = 2 + game.level * 0.25;
                if (r < 0.55) {
                    // 小型
                    enemies.push({
                        x: Math.random() * (CANVAS_W - 36),
                        y: -42,
                        w: 36,
                        h: 38,
                        hp: 1,
                        spd: spd,
                        sc: 10,
                        color: '#f44',
                    });
                } else if (r < 0.88) {
                    // 中型
                    enemies.push({
                        x: Math.random() * (CANVAS_W - 55),
                        y: -58,
                        w: 55,
                        h: 56,
                        hp: 3,
                        spd: spd * 0.65,
                        sc: 35,
                        color: '#f90',
                    });
                } else {
                    // BOSS
                    if (boss === null) {
                        const hpBase = 22 + game.level * 4;
                        boss = {
                            x: CANVAS_W / 2 - 65,
                            y: -130,
                            w: 130,
                            h: 90,
                            hp: hpBase,
                            maxHp: hpBase,
                            spd: 1.2,
                            sc: 300,
                            color: '#c3f',
                        };
                    }
                }
            }

            // 动态生成计时 (替代 setInterval)
            function updateSpawn(now) {
                if (game.pause || !game.running || game.over) return;
                const interval = Math.max(420, 1100 - game.level * 70);
                spawnInterval = interval;
                if (now - lastEnemySpawn >= interval) {
                    spawnEnemy();
                    lastEnemySpawn = now;
                }
            }

            // ---------- 射击 ----------
            function handleShoot(now) {
                if (!keys.shoot || game.pause || !game.running || game.over) return;
                if (now - lastShotTime < game.fireCd) return;
                lastShotTime = now;
                playShootSound();
                const px = player.x + player.w / 2;
                const py = player.y;
                if (game.fireType === 1) {
                    bullets.push({ x: px - 3, y: py, w: 6, h: 16, sp: -13, color: '#0ff' });
                } else {
                    // 三连发
                    bullets.push({ x: px - 16, y: py + 6, w: 5, h: 16, sp: -13, color: '#0ff' });
                    bullets.push({ x: px - 2, y: py, w: 6, h: 18, sp: -13, color: '#0ff' });
                    bullets.push({ x: px + 12, y: py + 6, w: 5, h: 16, sp: -13, color: '#0ff' });
                }
            }

            // ---------- 更新 UI ----------
            function refreshUI() {
                scoreDom.textContent = game.score;
                lvDom.textContent = game.level;
                hpDom.textContent = game.hp;
                shDom.textContent = Math.max(0, game.shield);
                if (game.score > maxScore) {
                    maxScore = game.score;
                    maxDom.textContent = maxScore;
                    saveMaxScore(maxScore);
                }
            }

            // ---------- 游戏结束 ----------
            function gameOver() {
                if (game.over) return;
                game.over = true;
                game.running = false;
                finalSc.textContent = game.score;
                if (game.score > maxScore) {
                    maxScore = game.score;
                    maxDom.textContent = maxScore;
                    saveMaxScore(maxScore);
                }
                overBox.style.display = 'block';
                if (animId !== null) {
                    cancelAnimationFrame(animId);
                    animId = null;
                }
            }

            // ---------- 重置游戏 ----------
            function resetGame() {
                overBox.style.display = 'none';
                game.score = 0;
                game.level = 1;
                game.hp = MAX_HP;
                game.shield = 0;
                game.pause = false;
                game.running = true;
                game.fireType = 1;
                game.fireCd = 220;
                game.over = false;

                player.x = (CANVAS_W - PLAYER_W) / 2;
                player.y = CANVAS_H - 70;

                bullets = [];
                enemies = [];
                items = [];
                particles = [];
                boss = null;

                lastShotTime = 0;
                lastEnemySpawn = 0;

                refreshUI();

                // 清除可能残留的动画帧
                if (animId !== null) {
                    cancelAnimationFrame(animId);
                    animId = null;
                }
                // 重新启动循环
                animId = requestAnimationFrame(mainLoop);
            }

            restartBtn.onclick = resetGame;

            // ---------- 键盘事件 ----------
            document.addEventListener('keydown', function(e) {
                const key = e.key;
                if (key === 'a' || key === 'A' || key === 'ArrowLeft') { keys.left = true;
                    e.preventDefault(); }
                if (key === 'd' || key === 'D' || key === 'ArrowRight') { keys.right = true;
                    e.preventDefault(); }
                if (key === ' ') { keys.shoot = true;
                    e.preventDefault(); }

                if (key.toLowerCase() === 'p') {
                    e.preventDefault();
                    if (game.over) return;
                    if (game.running) {
                        game.pause = !game.pause;
                        // 暂停时停止循环以节省资源
                        if (game.pause) {
                            if (animId !== null) {
                                cancelAnimationFrame(animId);
                                animId = null;
                            }
                            // 显示暂停提示
                            ctx.fillStyle = 'rgba(0,0,0,0.5)';
                            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                            ctx.fillStyle = '#fff';
                            ctx.font = '40px "Microsoft Yahei",sans-serif';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText('⏸ 暂停中', CANVAS_W / 2, CANVAS_H / 2);
                            ctx.textAlign = 'start';
                            ctx.textBaseline = 'alphabetic';
                        } else {
                            // 恢复循环
                            if (animId === null) {
                                animId = requestAnimationFrame(mainLoop);
                            }
                        }
                    }
                }
            });

            document.addEventListener('keyup', function(e) {
                const key = e.key;
                if (key === 'a' || key === 'A' || key === 'ArrowLeft') { keys.left = false;
                    e.preventDefault(); }
                if (key === 'd' || key === 'D' || key === 'ArrowRight') { keys.right = false;
                    e.preventDefault(); }
                if (key === ' ') { keys.shoot = false;
                    e.preventDefault(); }
            });

            // ---------- 主循环 ----------
            function mainLoop(timestamp) {
                // 如果游戏已结束或暂停，停止循环 (暂停时由外部控制恢复)
                if (game.over) {
                    animId = null;
                    return;
                }
                if (game.pause) {
                    animId = null;
                    return;
                }
                if (!game.running) {
                    animId = null;
                    return;
                }

                const now = timestamp || performance.now();

                // ---- 更新逻辑 ----
                updateSpawn(now);
                handleShoot(now);

                // 玩家移动
                if (keys.left && player.x > 0) player.x -= PLAYER_SPEED;
                if (keys.right && player.x + player.w < CANVAS_W) player.x += PLAYER_SPEED;

                // 等级更新
                game.level = Math.floor(game.score / 280) + 1;
                if (game.level < 1) game.level = 1;
                if (game.shield < 0) game.shield = 0;
                if (game.shield > SHIELD_MAX) game.shield = SHIELD_MAX;
                if (game.hp > MAX_HP) game.hp = MAX_HP;

                // ---- 子弹更新 ----
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i];
                    b.y += b.sp;
                    if (b.y < -20 || b.y > CANVAS_H + 20) {
                        bullets.splice(i, 1);
                    }
                }

                // ---- 敌人更新 + 碰撞检测 ----
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    e.y += e.spd;

                    // 子弹碰撞
                    for (let j = bullets.length - 1; j >= 0; j--) {
                        const b = bullets[j];
                        if (rectCollide(b, e)) {
                            bullets.splice(j, 1);
                            e.hp--;
                            createBoom(b.x, b.y, '#ff0', 6);
                            if (e.hp <= 0) {
                                createBoom(e.x + e.w / 2, e.y + e.h / 2, e.color, 22);
                                game.score += e.sc;
                                if (Math.random() < 0.28) {
                                    createItem(e.x + e.w / 2, e.y + e.h / 2);
                                }
                                enemies.splice(i, 1);
                            }
                            break;
                        }
                    }
                    if (i >= enemies.length) continue; // 已被移除

                    // 玩家碰撞
                    if (rectCollide(e, player)) {
                        if (game.shield > 0) {
                            game.shield = Math.max(0, game.shield - 32);
                        } else {
                            game.hp -= 22;
                        }
                        createBoom(e.x + e.w / 2, e.y + e.h / 2, '#f33', 16);
                        enemies.splice(i, 1);
                        continue;
                    }

                    if (e.y > CANVAS_H + 60) {
                        enemies.splice(i, 1);
                    }
                }

                // ---- BOSS 逻辑 ----
                if (boss !== null) {
                    boss.y += boss.spd;

                    // 子弹碰撞
                    for (let j = bullets.length - 1; j >= 0; j--) {
                        const b = bullets[j];
                        if (rectCollide(b, boss)) {
                            bullets.splice(j, 1);
                            boss.hp--;
                            createBoom(b.x, b.y, '#ff2', 5);
                            if (boss.hp <= 0) {
                                const bx = boss.x + boss.w / 2;
                                const by = boss.y + boss.h / 2;
                                const bw = boss.w;
                                createBoom(bx, by, '#f9f', 40);
                                game.score += boss.sc;
                                // 掉落道具 (保存坐标后再置 null)
                                const dropX = boss.x;
                                const dropY = boss.y;
                                const dropW = boss.w;
                                boss = null;
                                for (let k = 0; k < 3; k++) {
                                    createItem(dropX + Math.random() * dropW, dropY + 20);
                                }
                            }
                            break;
                        }
                    }

                    // 玩家碰撞 (如果 boss 还没被移除)
                    if (boss !== null && rectCollide(boss, player)) {
                        if (game.shield > 0) {
                            game.shield = Math.max(0, game.shield - 60);
                        } else {
                            game.hp -= 35;
                        }
                        createBoom(boss.x + boss.w / 2, boss.y + boss.h / 2, '#f9f', 20);
                        boss = null;
                    }
                }

                // ---- 道具更新 ----
                for (let i = items.length - 1; i >= 0; i--) {
                    const it = items[i];
                    it.y += it.speed;
                    if (rectCollide(it, player)) {
                        applyItem(it);
                        items.splice(i, 1);
                        continue;
                    }
                    if (it.y > CANVAS_H + 30) {
                        items.splice(i, 1);
                    }
                }

                // ---- 粒子更新 ----
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.dx;
                    p.y += p.dy;
                    p.life--;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }
                // 粒子数量限制
                if (particles.length > MAX_PARTICLES) {
                    particles.splice(0, particles.length - MAX_PARTICLES);
                }

                // ---- 检查游戏结束 ----
                if (game.hp <= 0) {
                    game.hp = 0;
                    refreshUI();
                    gameOver();
                    return;
                }

                // ---- 渲染 ----
                render(now);

                // ---- 更新 UI ----
                refreshUI();

                // ---- 继续循环 ----
                animId = requestAnimationFrame(mainLoop);
            }

            // ---------- 渲染 ----------
            function render(now) {
                // 清空背景
                ctx.fillStyle = '#000512';
                ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

                // 星空
                for (let i = 0; i < stars.length; i++) {
                    const s = stars[i];
                    s.y += s.speed;
                    if (s.y > CANVAS_H) {
                        s.y = 0;
                        s.x = Math.random() * CANVAS_W;
                    }
                    ctx.globalAlpha = s.size / 3.5;
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(s.x, s.y, s.size, s.size);
                }
                ctx.globalAlpha = 1;

                // ---- 玩家 ----
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x, player.y, player.w, player.h);

                // 护盾光圈
                if (game.shield > 0) {
                    const ratio = game.shield / SHIELD_MAX;
                    ctx.strokeStyle = '#0cf';
                    ctx.lineWidth = 2 + ratio * 3;
                    ctx.globalAlpha = 0.5 + ratio * 0.5;
                    ctx.beginPath();
                    ctx.arc(player.x + player.w / 2, player.y + player.h / 2, 36, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                // ---- 子弹 ----
                for (let i = 0; i < bullets.length; i++) {
                    const b = bullets[i];
                    ctx.fillStyle = b.color;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                }

                // ---- 敌人 ----
                for (let i = 0; i < enemies.length; i++) {
                    const e = enemies[i];
                    ctx.fillStyle = e.color;
                    ctx.fillRect(e.x, e.y, e.w, e.h);
                    // 简单光泽
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.fillRect(e.x + 4, e.y + 4, e.w * 0.3, e.h * 0.3);
                }

                // ---- BOSS ----
                if (boss !== null) {
                    ctx.fillStyle = boss.color;
                    ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
                    // 暗部细节
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(boss.x + 10, boss.y + 10, boss.w - 20, boss.h - 20);
                    // 血条
                    ctx.fillStyle = '#333';
                    ctx.fillRect(boss.x, boss.y - 14, boss.w, 8);
                    const hpRatio = boss.hp / boss.maxHp;
                    ctx.fillStyle = hpRatio > 0.5 ? '#2f2' : hpRatio > 0.25 ? '#fa0' : '#f22';
                    ctx.fillRect(boss.x, boss.y - 14, boss.w * hpRatio, 8);
                    ctx.strokeStyle = '#888';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(boss.x, boss.y - 14, boss.w, 8);
                }

                // ---- 道具 ----
                for (let i = 0; i < items.length; i++) {
                    const it = items[i];
                    let color = '#0f0';
                    switch (it.type) {
                        case 'shield':
                            color = '#0cf';
                            break;
                        case 'multishot':
                            color = '#ff0';
                            break;
                        case 'double':
                            color = '#f3f';
                            break;
                    }
                    ctx.fillStyle = color;
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 12;
                    ctx.fillRect(it.x, it.y, it.w, it.h);
                    ctx.shadowBlur = 0;
                    // 内发光
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(it.x + 4, it.y + 4, 6, 6);
                }

                // ---- 粒子 ----
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    ctx.globalAlpha = Math.max(0, p.life / 35);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.s, p.s);
                }
                ctx.globalAlpha = 1;

                // ---- 暂停状态 (如果暂停时仍然在绘制) ----
                // (暂停时循环已停止，不会进入 render)
            }

            // ---------- 启动游戏 ----------
            function init() {
                resetGame();
            }

            init();

        })();
    </script>
</body>
</html>
