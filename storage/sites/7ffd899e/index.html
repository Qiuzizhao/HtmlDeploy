<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>横版2D恐怖逃生</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game {
            position: relative;
            width: 800px;
            height: 500px;
            border: 3px solid #222;
            background: #111;
        }
        #canvas {
            display: block;
            background: #0a0a0a;
        }
        .ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #ff3333;
            font-family: monospace;
            font-size: 16px;
            text-shadow: 0 0 5px #000;
            z-index: 10;
        }
        .gameover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            color: red;
            font-size: 48px;
            font-family: monospace;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .win {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            font-size: 48px;
            font-family: monospace;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div id="game">
        <div class="ui">
            钥匙：<span id="keys">0</span>/1 | 电量：<span id="battery">100</span>%
        </div>
        <canvas id="canvas" width="800" height="500"></canvas>
        <div class="gameover" id="gameover">被鬼魂抓住了！</div>
        <div class="win" id="win">成功逃出！</div>
    </div>

    <script>
        // === 游戏基础设置 ===
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const keysText = document.getElementById('keys');
        const batteryText = document.getElementById('battery');
        const gameoverScreen = document.getElementById('gameover');
        const winScreen = document.getElementById('win');

        // 玩家
        const player = {
            x: 50, y: 200, width: 30, height: 30, 
            speed: 4, jumpPower: 15, gravity: 0.8,
            velocityY: 0, onGround: false,
            keys: 0, battery: 100, alive: true
        };

        // 地图
        const platforms = [];
        const keys = [];
        const ghosts = [];
        let exit = { x: 700, y: 200, width: 30, height: 30 };

        // 按键
        const keysPressed = {};

        // === 生成地图 ===
        function createMap() {
            // 地面和平台
            platforms.push({x:0, y:450, width:800, height:50});
            platforms.push({x:200, y:350, width:150, height:20});
            platforms.push({x:400, y:250, width:150, height:20});
            platforms.push({x:600, y:150, width:150, height:20});
        }

        // === 生成钥匙 ===
        function createKeys() {
            keys.push({
                x: 450, y: 220, 
                width: 20, height: 20
            });
        }

        // === 生成鬼魂 (追踪型) ===
        function createGhosts() {
            ghosts.push({
                x: 300, y: 420, 
                width: 30, height: 30, 
                speed: 2.5, 
                health: 100
            });
        }

        // === 碰撞检测 ===
        function checkCollision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        // === 玩家移动和跳跃 ===
        function updatePlayer() {
            if (!player.alive) return;

            // 水平移动
            if (keysPressed['a'] || keysPressed['arrowleft']) {
                player.x -= player.speed;
            }
            if (keysPressed['d'] || keysPressed['arrowright']) {
                player.x += player.speed;
            }

            // 跳跃 (只能在地面跳)
            if ((keysPressed['w'] || keysPressed['arrowup'] || keysPressed[' ']) && player.onGround) {
                player.velocityY = -player.jumpPower;
                player.onGround = false;
            }

            // 重力
            player.velocityY += player.gravity;
            player.y += player.velocityY;
            player.onGround = false;

            // 平台碰撞
            platforms.forEach(p => {
                if (checkCollision(player, p)) {
                    if (player.velocityY > 0) { // 从上方落下
                        player.y = p.y - player.height;
                        player.velocityY = 0;
                        player.onGround = true;
                    } else if (player.velocityY < 0) { // 碰到平台底部
                        player.y = p.y + p.height;
                        player.velocityY = 0;
                    }
                }
            });

            // 边界检查
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

            // 耗电
            player.battery -= 0.05;
            if (player.battery < 0) player.battery = 0;
        }

        // === 鬼魂AI (追踪玩家) ===
        function updateGhosts() {
            ghosts.forEach(g => {
                // 简单的追踪AI: 朝着玩家的水平位置移动
                if (player.x > g.x) {
                    g.x += g.speed;
                } else if (player.x < g.x) {
                    g.x -= g.speed;
                }

                // 重力
                g.y += 3;
                g.onGround = false;

                // 平台碰撞
                platforms.forEach(p => {
                    if (checkCollision(g, p)) {
                        g.y = p.y - g.height;
                        g.onGround = true;
                    }
                });

                // 碰到玩家
                if (checkCollision(player, g) && player.alive) {
                    player.alive = false;
                    gameoverScreen.style.display = 'flex';
                }
            });
        }

        // === 拾取钥匙 ===
        function checkKeys() {
            for (let i = keys.length - 1; i >= 0; i--) {
                const key = keys[i];
                if (checkCollision(player, key)) {
                    keys.splice(i, 1);
                    player.keys++;
                    keysText.innerText = player.keys;
                }
            }
        }

        // === 检查出口 ===
        function checkExit() {
            if (player.keys >= 1 && checkCollision(player, exit)) {
                player.alive = false;
                winScreen.style.display = 'flex';
            }
        }

        // === 绘制游戏 ===
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 黑暗背景
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 手电筒效果
            if (player.battery > 0) {
                const gradient = ctx.createRadialGradient(
                    player.x + player.width/2, player.y + player.height/2, 0,
                    player.x + player.width/2, player.y + player.height/2, 150
                );
                gradient.addColorStop(0, 'rgba(255, 255, 200, 0.8)');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0.2)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(
                    player.x + player.width/2, 
                    player.y + player.height/2, 
                    150, 
                    0, 
                    Math.PI * 2
                );
                ctx.fill();
            }

            // 绘制平台
            ctx.fillStyle = '#333';
            platforms.forEach(p => ctx.fillRect(p.x, p.y, p.width, p.height));

            // 绘制钥匙
            ctx.fillStyle = '#ff0';
            keys.forEach(k => ctx.fillRect(k.x, k.y, k.width, k.height));

            // 绘制出口
            ctx.fillStyle = '#0f0';
            ctx.fillRect(exit.x, exit.y, exit.width, exit.height);

            // 绘制鬼魂
            ctx.fillStyle = '#500';
            ghosts.forEach(g => ctx.fillRect(g.x, g.y, g.width, g.height));

            // 绘制玩家
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        // === 游戏循环 ===
        function gameLoop() {
            if (!player.alive) return;
            
            updatePlayer();
            updateGhosts();
            checkKeys();
            checkExit();
            draw();
            
            batteryText.innerText = Math.floor(player.battery);
            requestAnimationFrame(gameLoop);
        }

        // === 按键监听 ===
        document.addEventListener('keydown', e => {
            keysPressed[e.key.toLowerCase()] = true;
        });
        document.addEventListener('keyup', e => {
            keysPressed[e.key.toLowerCase()] = false;
        });

        // === 启动游戏 ===
        createMap();
        createKeys();
        createGhosts();
        gameLoop();
    </script>
</body>
</html>
