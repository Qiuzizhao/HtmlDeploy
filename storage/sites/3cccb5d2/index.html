<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>【超难】2D物理跑酷</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
  body{background:#1a1a1a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
  #game{border:4px solid #fff;background:#87CEEB}
  .ui{position:absolute;top:15px;left:20px;color:#fff;font-size:26px;text-shadow:2px 2px #000}
  .tips{position:absolute;top:55px;left:20px;color:#ff3333;font-size:16px;font-weight:bold}
  .over{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);text-align:center;display:none}
  #gameOver{font-size:60px;color:#ff2222;margin-bottom:20px;text-shadow:0 0 10px #000}
  #restart{padding:10px 25px;font-size:20px;background:#222;color:#fff;border:2px solid #fff;cursor:pointer}
</style>
</head>
<body>

<div class="ui">分数：<span id="score">0</span></div>
<div class="tips">【极难模式】A/D 移动 | 空格跳跃 | 红框=碰撞箱</div>
<div class="over">
  <div id="gameOver">你输了!</div>
  <button id="restart" onclick="restartGame()">再来一次</button>
</div>

<canvas id="game" width="1000" height="550"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let score = 0;
let gameRun = true;

// ======================
// 🔥 超难核心参数
// ======================
const GRAVITY = 0.7;        // 更强重力
const JUMP_FORCE = -15;      // 跳跃力度
const RUN_SPEED = 8;         // 极快自动前进（难度核心）
const PLAYER_SPEED = 5.5;    // 左右移动速度

// 按键
const keys = { A:false, D:false, Space:false };
document.addEventListener("keydown", e => {
  if(e.code==="KeyA") keys.A = true;
  if(e.code==="KeyD") keys.D = true;
  if(e.code==="Space") keys.Space = true;
});
document.addEventListener("keyup", e => {
  if(e.code==="KeyA") keys.A = false;
  if(e.code==="KeyD") keys.D = false;
  if(e.code==="Space") keys.Space = false;
});

// 玩家（带碰撞箱）
const player = {
  x: 150, y: 200, w: 28, h: 44,
  vx: 0, vy: 0, onGround: false
};

// 地图 & 障碍物 & 陷阱
let grounds = [];
let obstacles = [];
let cameraX = 0;

// 生成【超难地图】
function generateHardMap() {
  grounds = [];
  obstacles = [];

  // 超长地面
  for(let i=0;i<200;i++){
    grounds.push({x:i*170, y:500, w:170, h:50});
  }

  // 🔥 极密浮空平台（超小、超难跳）
  for(let i=3;i<180;i+=2){
    grounds.push({
      x: i*160 + Math.random()*40,
      y: 320 + Math.random()*120,
      w: 40 + Math.random()*25,  // 超窄平台
      h: 16
    });
  }

  // 🔥 密集障碍物（几乎封死）
  for(let i=4;i<175;i+=1.3){
    obstacles.push({
      x: i*155 + Math.random()*30,
      y: 452,
      w: 32,
      h: 48
    });
    // 双层障碍
    if(Math.random()>0.6){
      obstacles.push({
        x: i*150 + 20,
        y: 380 - Math.random()*80,
        w: 28,
        h: 40
      });
    }
  }
}

// 碰撞检测
function rectCollision(a, b) {
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

// 游戏逻辑更新
function update() {
  if(!gameRun) return;

  // 计分
  score += 0.15;
  document.getElementById("score").innerText = Math.floor(score);

  // 🔥 超高速地图滚动
  cameraX += RUN_SPEED;

  // 左右移动
  player.vx = 0;
  if(keys.A) player.vx = -PLAYER_SPEED;
  if(keys.D) player.vx = PLAYER_SPEED;

  // 跳跃
  if(keys.Space && player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
  }

  // 重力
  player.vy += GRAVITY;
  player.x += player.vx;
  player.y += player.vy;

  // 边界限制
  if(player.x < 0) player.x = 0;
  if(player.x + player.w > canvas.width) player.x = canvas.width - player.w;

  // 地面碰撞
  player.onGround = false;
  for(let g of grounds) {
    const gx = g.x - cameraX;
    const pBox = {x:player.x, y:player.y, w:player.w, h:player.h};
    const gBox = {x:gx, y:g.y, w:g.w, h:g.h};

    if(rectCollision(pBox, gBox)) {
      if(player.vy > 0 && player.y + player.h < g.y + 20) {
        player.y = g.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  // 障碍物碰撞 = 立即死亡
  for(let o of obstacles) {
    const ox = o.x - cameraX;
    const pBox = {x:player.x, y:player.y, w:player.w, h:player.h};
    const oBox = {x:ox, y:o.y, w:o.w, h:o.h};
    if(rectCollision(pBox, oBox)) gameOver();
  }

  // 掉落 = 死亡
  if(player.y > canvas.height + 100) gameOver();
}

// 渲染画面
function render() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 地面
  ctx.fillStyle = "#3a7d44";
  for(let g of grounds) {
    const gx = g.x - cameraX;
    if(gx > -g.w && gx < canvas.width) {
      ctx.fillRect(gx, g.y, g.w, g.h);
    }
  }

  // 障碍物（致命）
  ctx.fillStyle = "#b82727";
  for(let o of obstacles) {
    const ox = o.x - cameraX;
    if(ox > -o.w && ox < canvas.width) {
      ctx.fillRect(ox, o.y, o.w, o.h);
    }
  }

  // 玩家
  ctx.fillStyle = "#ff6b35";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // ========== 可视化碰撞箱（红色边框）==========
  ctx.strokeStyle = "#ff0000";
  ctx.lineWidth = 2;
  ctx.strokeRect(player.x, player.y, player.w, player.h);
}

// 游戏结束
function gameOver() {
  gameRun = false;
  document.querySelector(".over").style.display = "block";
}

// 重启
function restartGame() {
  window.location.reload();
}

// 主循环
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// 启动
generateHardMap();
gameLoop();
</script>
</body>
</html>
