<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D生化突围 - 网页版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
        canvas { display: block; }
        
        /* UI 增强样式 */
        .ui-container {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 999;
            pointer-events: none;
        }
        .stat-item {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #hp-bar-container {
            width: 200px;
            height: 15px;
            background: rgba(255,0,0,0.3);
            border: 2px solid #fff;
            border-radius: 5px;
            overflow: hidden;
        }
        #hp-bar {
            width: 100%;
            height: 100%;
            background: #ff3333;
            transition: width 0.1s;
        }
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 999;
        }
        /* 十字准星 */
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: #00ff00;
        }
        .crosshair::before { top: 7px; left: 0; width: 16px; height: 2px; }
        .crosshair::after { top: 0; left: 7px; width: 2px; height: 16px; }

        .tips {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
        }
        
        /* 游戏结束/开始遮罩 */
        #mask {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }
        #mask h1 { font-size: 48px; margin-bottom: 20px; color: #ff3333; }
        #mask p { font-size: 20px; color: #bbb; }
    </style>
</head>
<body>
    <div id="mask">
        <h1 id="mask-title">生化突围 3D</h1>
        <p id="mask-desc">点击屏幕 锁定鼠标 进入游戏</p>
    </div>

    <div class="ui-container">
        <div class="stat-item">得分: <span id="score">0</span></div>
        <div class="stat-item" style="font-size:16px;">生命值:</div>
        <div id="hp-bar-container"><div id="hp-bar"></div></div>
    </div>
    
    <div class="crosshair"></div>
    <div class="tips">WASD 移动 | 鼠标控制视角 | 鼠标左键射击</div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
        // --- 核心场景设置 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a24);
        scene.fog = new THREE.FogExp2(0x1a1a24, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 游戏状态变量 ---
        let gameActive = false;
        let score = 0;
        let hp = 100;
        const playerY = 1.8;
        
        const movement = { forward: false, back: false, left: false, right: false };
        let mouseX = 0, mouseY = 0;

        // UI 元素
        const scoreElement = document.getElementById('score');
        const hpBar = document.getElementById('hp-bar');
        const mask = document.getElementById('mask');
        const maskTitle = document.getElementById('mask-title');
        const maskDesc = document.getElementById('mask-desc');

        // --- 指针锁定控制 ---
        mask.addEventListener('click', () => {
            if (hp <= 0) restartGame();
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                mask.style.display = 'none';
                gameActive = true;
            } else {
                if (hp > 0) {
                    mask.style.display = 'flex';
                    maskTitle.innerText = '游戏暂停';
                    maskDesc.innerText = '点击恢复游戏';
                }
                gameActive = false;
            }
        });

        // --- 灯光 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- 地面与环境 ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 简易网格地板线，增强空间移动感
        const grid = new THREE.GridHelper(100, 50, 0x444444, 0x222222);
        grid.position.y = 0.01;
        scene.add(grid);

        // 边界墙体
        function createWall(x, z, w, d) {
            const geo = new THREE.BoxGeometry(w, 6, d);
            const mat = new THREE.MeshStandardMaterial({ color: 0x22222b });
            const wall = new THREE.Mesh(geo, mat);
            wall.position.set(x, 3, z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
        }
        createWall(0, -50, 100, 1);
        createWall(0, 50, 100, 1);
        createWall(-50, 0, 1, 100);
        createWall(50, 0, 1, 100);

        // --- 简易第一人称持枪视觉效果 ---
        const gunGroup = new THREE.Group();
        const gunGeo = new THREE.BoxGeometry(0.1, 0.1, 0.5);
        const gunMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8 });
        const gun = new THREE.Mesh(gunGeo, gunMat);
        gun.position.set(0.2, -0.25, -0.5); // 位于右下方
        gunGroup.add(gun);
        camera.add(gunGroup);
        scene.add(camera);

        // --- 敌人系统 ---
        const enemies = [];
        const enemySpeed = 0.04;

        function createEnemy() {
            // 在玩家外围随机生成敌人
            let x, z;
            do {
                x = (Math.random() - 0.5) * 80;
                z = (Math.random() - 0.5) * 80;
            } while (Math.sqrt(x*x + z*z) < 15); // 确保不会直接刷在脸上

            const geo = new THREE.CylinderGeometry(0.5, 0.5, 2, 8);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff3333, roughness: 0.5 });
            const enemy = new THREE.Mesh(geo, mat);
            enemy.position.set(x, 1, z);
            enemy.castShadow = true;
            
            // 存储敌人血量
            enemy.userData = { hp: 100 };
            
            scene.add(enemy);
            enemies.push(enemy);
        }

        // 初始化生成 8 个敌人
        for (let i = 0; i < 8; i++) createEnemy();

        // --- 子弹系统 ---
        const bullets = [];
        function shoot() {
            if (!gameActive || hp <= 0) return;

            // 枪口微调后仰动画效果
            gun.position.z = -0.4;
            setTimeout(() => gun.position.z = -0.5, 50);

            const bulletGeo = new THREE.SphereGeometry(0.08, 8, 8);
            const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            
            // 从相机位置出发
            bullet.position.copy(camera.position);
            // 沿右下角枪口位置做少许偏移，让子弹看起来像从枪口射出
            bullet.position.add(new THREE.Vector3(0.15, -0.2, -0.4).applyQuaternion(camera.quaternion));

            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir); // 获取准星方向
            
            bullet.userData = { velocity: dir.multiplyScalar(1.2) }; // 子弹速度
            scene.add(bullet);
            bullets.push(bullet);
        }

        // --- 事件监听 ---
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body && gameActive) {
                mouseX += e.movementX * 0.002;
                mouseY += e.movementY * 0.002;
                // 限制仰角和俯角
                mouseY = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, mouseY));
                
                camera.rotation.order = 'YXZ';
                camera.rotation.y = -mouseX;
                camera.rotation.x = -mouseY;
            }
        });

        document.addEventListener('mousedown', (e) => {
            if (e.button === 0) shoot();
        });

        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': case 'ArrowUp': movement.forward = true; break;
                case 'KeyS': case 'ArrowDown': movement.back = true; break;
                case 'KeyA': case 'ArrowLeft': movement.left = true; break;
                case 'KeyD': case 'ArrowRight': movement.right = true; break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': case 'ArrowUp': movement.forward = false; break;
                case 'KeyS': case 'ArrowDown': movement.back = false; break;
                case 'KeyA': case 'ArrowLeft': movement.left = false; break;
                case 'KeyD': case 'ArrowRight': movement.right = false; break;
            }
        });

        // --- 重新开始逻辑 ---
        function restartGame() {
            score = 0;
            hp = 100;
            scoreElement.textContent = score;
            hpBar.style.width = '100%';
            camera.position.set(0, playerY, 0);
            
            // 清空旧敌人和子弹
            enemies.forEach(e => scene.remove(e));
            enemies.length = 0;
            bullets.forEach(b => scene.remove(b));
            bullets.length = 0;

            for (let i = 0; i < 8; i++) createEnemy();
        }

        // --- 主游戏循环 ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            if (!gameActive || hp <= 0) {
                renderer.render(scene, camera);
                return;
            }

            const delta = clock.getDelta();

            // 1. 修复后的玩家移动逻辑
            const moveSpeed = 8 * delta; 
            const camDirection = new THREE.Vector3();
            camera.getWorldDirection(camDirection);
            
            // 提取水平面方向（防止看天空时往前走变成向上飞）
            const forward = new THREE.Vector3(camDirection.x, 0, camDirection.z).normalize();
            // 计算右方向（通过与世界轴叉乘）
            const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

            if (movement.forward) camera.position.addScaledVector(forward, moveSpeed);
            if (movement.back) camera.position.addScaledVector(forward, -moveSpeed);
            if (movement.left) camera.position.addScaledVector(right, moveSpeed); // 注意这里符号修正
            if (movement.right) camera.position.addScaledVector(right, -moveSpeed);
            
            // 限制玩家不出围墙
            camera.position.x = Math.max(-48, Math.min(48, camera.position.x));
            camera.position.z = Math.max(-48, Math.min(48, camera.position.z));
            camera.position.y = playerY;

            // 2. 敌人 AI & 玩家受击检测
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                const distanceToPlayer = enemy.position.distanceTo(camera.position);

                // 追击玩家
                const dir = new THREE.Vector3();
                dir.subVectors(camera.position, enemy.position);
                dir.y = 0; // 只在水平面上追击
                dir.normalize();
                enemy.position.addScaledVector(dir, enemySpeed);

                // 转向玩家
                enemy.lookAt(camera.position.x, enemy.position.y, camera.position.z);

                // 伤害检测 (靠得太近扣血)
                if (distanceToPlayer < 1.5) {
                    hp -= 20 * delta; // 每秒扣 20 血
                    if (hp < 0) hp = 0;
                    hpBar.style.width = hp + '%';

                    if (hp <= 0) {
                        gameActive = false;
                        document.exitPointerLock();
                        mask.style.display = 'flex';
                        maskTitle.innerText = '你被僵尸吃掉了！';
                        maskDesc.innerText = `最终得分: ${score} 。点击屏幕重新开始`;
                    }
                }
            }

            // 3. 子弹更新与碰撞检测
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.add(b.userData.velocity);

                // 距离过远销毁
                if (b.position.distanceTo(camera.position) > 60) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                    continue;
                }

                // 子弹击中敌人
                let bulletDestroyed = false;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    // 计算子弹和敌人中心的距离（考虑胶囊体高度，主要判定 XZ 距离和 Y 轴范围）
                    const distXZ = Math.sqrt(Math.pow(b.position.x - e.position.x, 2) + Math.pow(b.position.z - e.position.z, 2));
                    
                    if (distXZ < 0.8 && b.position.y > 0 && b.position.y < 2.5) {
                        // 击中敌人
                        scene.remove(e);
                        enemies.splice(j, 1);
                        
                        scene.remove(b);
                        bullets.splice(i, 1);
                        bulletDestroyed = true;

                        score += 10;
                        scoreElement.textContent = score;

                        // 补怪：死一个马上在远处再刷一个，保持刺激感
                        createEnemy();
                        break;
                    }
                }
                if (bulletDestroyed) continue;
            }

            renderer.render(scene, camera);
        }

        // --- 窗口自适应 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 默认让相机先稍微往后站一点
        camera.position.set(0, playerY, 5);
        animate();
    </script>
</body>
</html>
