<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>私立永夜中学·守序逃生</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑"}
        body{background:#222;color:#eee;padding:20px;max-width:800px;margin:0 auto}
        .box{border:2px solid #555;padding:20px;border-radius:8px;background:#333}
        .info{display:flex;justify-content:space-between;margin-bottom:15px;font-size:18px}
        .scene{min-height:320px;border:1px solid #666;padding:15px;margin:15px 0}
        .btn{padding:10px 18px;margin:5px;background:#446;border:none;color:#fff;border-radius:4px;cursor:pointer}
        .btn:hover{background:#558}
        .msg{margin:15px 0;font-size:17px;color:#ffc}
    </style>
</head>
<body>
    <div class="box">
        <h2>私立永夜中学·守序逃生｜存活7天即可通关</h2>
        <div class="info">
            <span>当前天数：<span id="day">1</span>/7</span>
            <span>剩余容错：<span id="life">3</span>次</span>
            <span id="place">当前位置：校门</span>
        </div>
        <div class="scene" id="sceneBox">
            <p>【校门场景】校规：1.入校不可回头；2.上交随身物品</p>
            <p class="msg">选择你的操作：</p>
            <button class="btn" onclick="goIn()">正常入校</button>
            <button class="btn" onclick="turnBack()">回头张望</button>
        </div>
        <div id="tips"></div>
    </div>
<script>
let day = 1;
let life = 3;
let pos = "校门";
const sceneData = {
    gate:{
        text:"【校门场景】校规：1.入校不可回头；2.上交随身物品",
        opt:[{name:"正常入校",fn:goIn},{name:"回头张望",fn:turnBack}]
    },
    class:{
        text:"【教学楼教室】守则：上课只准看黑板，不可低头看桌面，铃响静坐10秒再起身",
        opt:[{name:"紧盯黑板听课",fn:okClass},{name:"低头偷看桌面",fn:errOper}]
    },
    canteen:{
        text:"【食堂】规则：只能取白色餐盘，必须吃光饭菜，餐盘放到左侧收纳柜",
        opt:[{name:"白盘就餐规范放盘",fn:okCan},{name:"拿彩色餐盘",fn:errOper}]
    },
    dorm:{
        text:"【宿舍夜晚】22点准时上床熄灯，门外脚步声响起需蒙被，禁止偷看房门",
        opt:[{name:"准时上床蒙被",fn:okDorm},{name:"扒门缝偷看",fn:errOper}]
    }
}
function updateUI(){
    document.getElementById("day").innerText = day;
    document.getElementById("life").innerText = life;
    document.getElementById("place").innerText = "当前位置："+pos;
    let sc = sceneData[pos==="校门"?"gate":pos==="教室"?"class":pos==="食堂"?"canteen":"dorm"];
    let html = `<p>${sc.text}</p><p class="msg">选择操作：</p>`;
    sc.opt.forEach(item=>html+=`<button class='btn' onclick='${item.fn.name}()'>${item.name}</button>`)
    document.getElementById("sceneBox").innerHTML = html;
}
function showTip(str){document.getElementById("tips").innerHTML = `<p style="color:#fa8">${str}</p>`}
//正确操作切换场景
function goIn(){pos="教室";showTip("顺利入校，前往教室上课");updateUI()}
function okClass(){pos="食堂";showTip("遵守课堂规则，下课前往食堂");updateUI()}
function okCan(){pos="宿舍";showTip("规范用餐，傍晚回到宿舍");updateUI()}
function okDorm(){
    day++;
    if(day>7){showTip("恭喜！成功熬过7天，顺利离校通关！");return;}
    pos="校门";
    showTip(`安稳过夜，第${day}天清晨来到校门，新一天开始`);
    updateUI();
}
//错误扣容错
function errOper(){
    life--;
    if(life<=0){showTip("容错耗尽，游戏结束，请刷新页面重新挑战");return;}
    showTip("违反校规，扣除1次容错！");
    updateUI();
}
function turnBack(){errOper();showTip("违规回头，浓雾侵扰，扣除容错！")}
updateUI();
</script>
</body>
</html>
