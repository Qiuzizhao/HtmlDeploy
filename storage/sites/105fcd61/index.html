<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无畏契约 - 文字小游戏</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            background: rgba(20, 20, 40, 0.9);
            border-radius: 20px;
            padding: 30px 25px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(4px);
        }
        h1 {
            text-align: center;
            font-size: 2.2rem;
            letter-spacing: 4px;
            color: #ff4655;
            text-shadow: 0 0 20px rgba(255,70,85,0.4);
            margin-bottom: 20px;
            font-weight: 700;
        }
        .game-log {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 18px 16px;
            min-height: 320px;
            max-height: 420px;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.7;
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 18px;
            scroll-behavior: smooth;
        }
        .game-log::-webkit-scrollbar {
            width: 6px;
        }
        .game-log::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .game-log::-webkit-scrollbar-thumb {
            background: #ff4655;
            border-radius: 10px;
        }
        .log-entry {
            margin-bottom: 6px;
            word-break: break-word;
        }
        .log-entry.system {
            color: #a0a0c0;
        }
        .log-entry.info {
            color: #7ec8e3;
        }
        .log-entry.success {
            color: #6fcf97;
        }
        .log-entry.warning {
            color: #f2c94c;
        }
        .log-entry.danger {
            color: #ff4655;
        }
        .log-entry.battle {
            color: #f2994a;
        }
        .log-entry.ultimate {
            color: #bb6bd9;
            font-weight: 600;
        }
        .log-entry.victory {
            color: #ffd700;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .log-entry.defeat {
            color: #ff6b6b;
            font-weight: 600;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .input-area input:focus {
            border-color: #ff4655;
            box-shadow: 0 0 12px rgba(255,70,85,0.3);
        }
        .input-area input::placeholder {
            color: #888;
        }
        .input-area button {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            background: #ff4655;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            letter-spacing: 1px;
        }
        .input-area button:hover {
            background: #e63e4d;
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(255,70,85,0.4);
        }
        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            padding: 10px 16px;
            border-radius: 30px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-item .label {
            color: #aaa;
        }
        .status-item .value {
            font-weight: 700;
            color: #fff;
        }
        .status-item .value.hp {
            color: #6fcf97;
        }
        .status-item .value.enemy-hp {
            color: #ff6b6b;
        }
        .status-item .value.coins {
            color: #f2c94c;
        }
        .status-item .value.ult {
            color: #bb6bd9;
        }
        .hidden {
            display: none;
        }
        .restart-btn {
            display: block;
            margin: 12px auto 0;
            padding: 10px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #e0e0e0;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .restart-btn:hover {
            background: rgba(255,70,85,0.2);
            border-color: #ff4655;
            color: #ff4655;
        }
        @media (max-width: 480px) {
            .game-container {
                padding: 20px 15px;
            }
            h1 {
                font-size: 1.6rem;
            }
            .game-log {
                min-height: 240px;
                max-height: 320px;
                font-size: 0.85rem;
            }
            .input-area {
                flex-direction: column;
            }
            .input-area button {
                width: 100%;
            }
            .status-bar {
                flex-wrap: wrap;
                gap: 6px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>无畏契约</h1>
    <div class="status-bar" id="statusBar">
        <div class="status-item"><span class="label">❤️ HP</span><span class="value hp" id="playerHpDisplay">100</span></div>
        <div class="status-item"><span class="label">👾 敌人</span><span class="value enemy-hp" id="enemyHpDisplay">100</span></div>
        <div class="status-item"><span class="label">💰</span><span class="value coins" id="coinsDisplay">800</span></div>
        <div class="status-item"><span class="label">⚡ 大招</span><span class="value ult" id="ultDisplay">未就绪</span></div>
    </div>
    <div class="game-log" id="gameLog"></div>
    <div class="input-area" id="inputArea">
        <input type="text" id="userInput" placeholder="输入你的选择..." autocomplete="off" autofocus>
        <button id="submitBtn">确认</button>
    </div>
    <button class="restart-btn hidden" id="restartBtn">🔄 重新开始</button>
</div>
<script>
    (function() {
        // ---------- 游戏状态 ----------
        const state = {
            phase: 'init',          // init | chooseChar | buyWeapon | battle | gameOver
            playerName: '',
            playerCharacter: '',
            playerHp: 100,
            enemyHp: 100,
            coins: 800,
            playerDamage: 25,
            isUltimateReady: false,
            roundNum: 1,
            characters: ['捷风', '炼狱', '贤者', '雷兹', '零'],
            weapons: {
                1: { name: '标配手枪', damage: 25, price: 0 },
                2: { name: '鬼魅', damage: 35, price: 500 },
                3: { name: '狂徒', damage: 45, price: 800 }
            },
            // 用于战斗中的临时状态
            pendingAction: null,
        };

        // DOM 引用
        const logEl = document.getElementById('gameLog');
        const inputEl = document.getElementById('userInput');
        const submitBtn = document.getElementById('submitBtn');
        const restartBtn = document.getElementById('restartBtn');
        const playerHpDisplay = document.getElementById('playerHpDisplay');
        const enemyHpDisplay = document.getElementById('enemyHpDisplay');
        const coinsDisplay = document.getElementById('coinsDisplay');
        const ultDisplay = document.getElementById('ultDisplay');

        // ---------- 工具函数 ----------
        function rand(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function addLog(text, className = 'system') {
            const div = document.createElement('div');
            div.className = 'log-entry ' + className;
            div.textContent = text;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function clearLog() {
            logEl.innerHTML = '';
        }

        function updateUI() {
            playerHpDisplay.textContent = Math.max(0, state.playerHp);
            enemyHpDisplay.textContent = Math.max(0, state.enemyHp);
            coinsDisplay.textContent = state.coins;
            ultDisplay.textContent = state.isUltimateReady ? '就绪' : '未就绪';
            // 颜色提示
            if (state.isUltimateReady) {
                ultDisplay.style.color = '#bb6bd9';
            } else {
                ultDisplay.style.color = '#888';
            }
        }

        function setInputPlaceholder(text) {
            inputEl.placeholder = text;
        }

        function focusInput() {
            inputEl.value = '';
            inputEl.focus();
        }

        function disableInput(disabled = true) {
            inputEl.disabled = disabled;
            submitBtn.disabled = disabled;
            if (disabled) {
                inputEl.blur();
            } else {
                focusInput();
            }
        }

        function showRestartButton(show = true) {
            restartBtn.classList.toggle('hidden', !show);
        }

        // ---------- 游戏流程控制 ----------
        function startGame() {
            clearLog();
            state.phase = 'init';
            state.playerHp = 100;
            state.enemyHp = 100;
            state.coins = 800;
            state.isUltimateReady = false;
            state.roundNum = 1;
            state.playerDamage = 25;
            state.playerCharacter = '';
            state.playerName = '';
            state.pendingAction = null;
            updateUI();
            showRestartButton(false);
            disableInput(false);
            addLog('🎮 欢迎来到 无畏契约 文字小游戏！', 'system');
            setInputPlaceholder('请输入你的名字...');
            state.phase = 'init';
            focusInput();
        }

        // 处理输入
        function handleInput(value) {
            const trimmed = value.trim();
            if (trimmed === '') return;

            switch (state.phase) {
                case 'init':
                    // 输入名字
                    state.playerName = trimmed;
                    addLog(`你的名字：${state.playerName}`, 'info');
                    showCharacterSelection();
                    break;
                case 'chooseChar':
                    handleCharacterChoice(trimmed);
                    break;
                case 'buyWeapon':
                    handleWeaponBuy(trimmed);
                    break;
                case 'battle':
                    handleBattleAction(trimmed);
                    break;
                case 'gameOver':
                    // 忽略输入
                    break;
                default:
                    break;
            }
        }

        // 角色选择
        function showCharacterSelection() {
            state.phase = 'chooseChar';
            addLog('', 'system');
            addLog('===== 可选角色 =====', 'system');
            state.characters.forEach((char, index) => {
                addLog(`${index + 1}. ${char}`, 'info');
            });
            setInputPlaceholder('输入数字选择角色 (1-5)...');
            focusInput();
        }

        function handleCharacterChoice(input) {
            const num = parseInt(input, 10);
            if (isNaN(num) || num < 1 || num > state.characters.length) {
                addLog('⚠️ 请输入 1 到 5 之间的数字', 'warning');
                setInputPlaceholder('重新输入数字 (1-5)...');
                focusInput();
                return;
            }
            state.playerCharacter = state.characters[num - 1];
            addLog(`✅ 你选择了：【${state.playerCharacter}】，准备战斗！`, 'success');
            // 进入武器商店
            showWeaponShop();
        }

        // 武器商店
        function showWeaponShop() {
            state.phase = 'buyWeapon';
            addLog('', 'system');
            addLog('===== 武器商店 =====', 'system');
            for (const [key, weapon] of Object.entries(state.weapons)) {
                addLog(`${key}. ${weapon.name} | 伤害：${weapon.damage} | 价格：${weapon.price}`, 'info');
            }
            setInputPlaceholder('输入数字购买武器 (1-3)...');
            focusInput();
        }

        function handleWeaponBuy(input) {
            const num = parseInt(input, 10);
            if (isNaN(num) || num < 1 || num > 3) {
                addLog('⚠️ 请输入 1 到 3 之间的数字', 'warning');
                setInputPlaceholder('重新输入数字 (1-3)...');
                focusInput();
                return;
            }
            const weapon = state.weapons[num];
            if (state.coins >= weapon.price) {
                state.coins -= weapon.price;
                state.playerDamage = weapon.damage;
                addLog(`✅ 购买成功！剩余金币：${state.coins}`, 'success');
                updateUI();
            } else {
                addLog('❌ 金币不足，自动装备标配手枪', 'warning');
                state.playerDamage = state.weapons[1].damage;
            }
            // 进入战斗
            startBattle();
        }

        // 战斗开始
        function startBattle() {
            state.phase = 'battle';
            state.enemyHp = 100;
            state.playerHp = 100;
            state.roundNum = 1;
            state.isUltimateReady = false;
            updateUI();
            addLog('', 'system');
            addLog('===== 战斗开始！敌方已出现 =====', 'danger');
            showBattleMenu();
        }

        function showBattleMenu() {
            addLog(`\n--- 第 ${state.roundNum} 回合 ---`, 'system');
            addLog(`🧍 你的HP：${state.playerHp} | 👾 敌人HP：${state.enemyHp}`, 'info');
            addLog('===== 你的行动 =====', 'system');
            addLog('1. 普通攻击', 'info');
            addLog('2. 使用技能（消耗10HP）', 'info');
            addLog('3. 大招（满能量才能用）', 'info');
            setInputPlaceholder('输入 1/2/3 选择行动...');
            focusInput();
        }

        function handleBattleAction(input) {
            const action = input.trim();
            if (!['1', '2', '3'].includes(action)) {
                addLog('⚠️ 请输入 1、2 或 3', 'warning');
                setInputPlaceholder('重新输入 1/2/3...');
                focusInput();
                return;
            }

            // 玩家行动
            let playerActed = false;
            let skipEnemy = false;

            if (action === '1') {
                // 普通攻击
                const damage = rand(state.playerDamage - 5, state.playerDamage + 5);
                state.enemyHp -= damage;
                addLog(`🔫 你对敌人造成了 ${damage} 点伤害！`, 'battle');
                playerActed = true;
            } else if (action === '2') {
                // 技能
                if (state.playerHp > 10) {
                    const damage = rand(40, 60);
                    state.playerHp -= 10;
                    state.enemyHp -= damage;
                    addLog(`✨ 使用技能！造成 ${damage} 伤害，自身消耗10HP`, 'battle');

                    // 不消耗回合？原逻辑是消耗回合但没行动，这里保持原样：不执行敌人攻击？原代码中如果技能失败，仍然会执行敌人攻击（因为没break）
                    // 为了保留原玩法，这里让玩家重新选择（原代码会继续执行敌人攻击，但这里更友好）
                    // 但为了完全保留原逻辑，我们允许重新选择，但原代码中技能失败后仍然会执行敌人攻击，所以这里我们模拟：不消耗回合，重新显示菜单
                    // 但为了更接近原代码，我们让玩家重新选择，不执行敌人攻击（原代码中技能失败后仍然会执行敌人攻击，但这里我们保持一致性）
                    // 修正：按照原代码，技能失败后仍然会执行敌人攻击，所以这里我们让玩家行动无效，但继续执行敌人攻击
