<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蛋仔派对 - 蛋蛋心动日记</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        egg: '#FFD6E4',
                        eggdark: '#FF9CBC',
                        eggblue: '#9ED6FF',
                        eggyellow: '#FFE8A3',
                        eggpurple: '#D9B8FF',
                        eggpink: '#FFA8D8',
                    },
                    fontFamily: {
                        cute: ['"Microsoft YaHei"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(to bottom, #FFF0F5, #FFE6EF);
            background-attachment: fixed;
        }
        .egg-bounce {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .dialog-fade {
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .choice-hover {
            transition: all 0.3s;
        }
        .choice-hover:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="font-cute text-gray-800 min-h-screen">
    <!-- 游戏容器 -->
    <div id="game" class="max-w-2xl mx-auto p-4">
        <!-- 标题界面 -->
        <div id="title-screen" class="flex flex-col items-center justify-center min-h-screen text-center">
            <div class="egg-bounce mb-6">
                <div class="w-32 h-32 bg-egg rounded-full relative shadow-lg">
                    <div class="absolute w-8 h-8 bg-white rounded-full top-8 left-6"></div>
                    <div class="absolute w-8 h-8 bg-white rounded-full top-8 right-6"></div>
                    <div class="absolute w-4 h-4 bg-black rounded-full top-11 left-8"></div>
                    <div class="absolute w-4 h-4 bg-black rounded-full top-11 right-8"></div>
                    <div class="absolute w-10 h-4 bg-eggdark rounded-full bottom-10 left-1/2 -translate-x-1/2"></div>
                </div>
            </div>
            <h1 class="text-4xl font-bold text-eggpink mb-2">蛋蛋心动日记</h1>
            <p class="text-lg text-gray-600 mb-8">蛋仔派对 · 剧情向恋爱游戏</p>
            <button onclick="startGame()" class="bg-eggpink text-white px-8 py-3 rounded-full text-xl font-bold shadow-lg hover:bg-pink-400 transition-all">
                开始游戏
            </button>
            <p class="mt-6 text-sm text-gray-500">© 蛋仔粉丝同人游戏 非官方</p>
        </div>

        <!-- 主游戏界面 -->
        <div id="game-screen" class="hidden">
            <!-- 好感度栏 -->
            <div class="bg-white/80 backdrop-blur rounded-full p-3 flex items-center gap-3 shadow-md mb-4 sticky top-0 z-10">
                <div id="character-icon" class="w-10 h-10 bg-eggblue rounded-full flex items-center justify-center font-bold">?</div>
                <div class="flex-1">
                    <div class="flex justify-between text-sm mb-1">
                        <span id="character-name">等待相遇...</span>
                        <span>好感度 <span id="love-point">0</span></span>
                    </div>
                    <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                        <div id="love-bar" class="h-full bg-eggpink w-0 transition-all"></div>
                    </div>
                </div>
            </div>

            <!-- 角色展示 -->
            <div class="flex justify-center my-6">
                <div id="character-display" class="w-40 h-40 rounded-full shadow-lg flex items-center justify-center text-white text-2xl font-bold bg-gradient-to-br from-eggblue to-egg">
                    蛋仔
                </div>
            </div>

            <!-- 对话框 -->
            <div class="bg-white rounded-2xl p-5 shadow-md min-h-[180px] dialog-fade">
                <p id="dialog-text" class="text-lg leading-relaxed">与可爱的蛋仔们相遇，开启甜甜的恋爱故事吧～</p>
            </div>

            <!-- 选项按钮 -->
            <div id="choices" class="grid gap-3 mt-6">
                <!-- 选项会动态生成 -->
            </div>
        </div>

        <!-- 结局界面 -->
        <div id="ending-screen" class="hidden flex flex-col items-center justify-center min-h-screen text-center p-6">
            <div class="egg-bounce mb-4">
                <div id="ending-egg" class="w-36 h-36 rounded-full shadow-lg flex items-center justify-center text-white text-3xl font-bold"></div>
            </div>
            <h2 id="ending-title" class="text-3xl font-bold text-eggpink mb-4"></h2>
            <p id="ending-desc" class="text-lg text-gray-600 mb-8 leading-relaxed"></p>
            <button onclick="restartGame()" class="bg-eggpink text-white px-8 py-3 rounded-full text-xl font-bold shadow-lg hover:bg-pink-400 transition-all">
                再玩一次
            </button>
        </div>
    </div>

    <script>
        // 游戏数据
        const gameData = {
            characters: {
                soft: {
                    name: "软萌蛋",
                    color: "bg-gradient-to-br from-eggpink to-egg",
                    intro: "软软糯糯，喜欢撒娇，超级容易害羞～",
                    start: "你好呀...我、我是软萌蛋！第一次见到你，心跳好快哦...",
                    choices: [
                        { text: "你好可爱！我好喜欢你～", love: 15 },
                        { text: "你好呀，很高兴认识你～", love: 8 },
                        { text: "嗯...你看起来软软的", love: 3 }
                    ],
                    mid: "真的吗？！我、我也超级喜欢你！和你在一起好开心～",
                    midChoices: [
                        { text: "以后我一直陪着你", love: 20 },
                        { text: "我们做最好的朋友吧", love: 10 }
                    ],
                    endingTitle: "💗 甜蜜心动结局",
                    endingDesc: "你和软萌蛋成为了最甜蜜的一对，每天都黏在一起，幸福满满～"
                },
                cool: {
                    name: "帅气蛋",
                    color: "bg-gradient-to-br from-blue-400 to-blue-600",
                    intro: "外表酷酷的，内心很温柔，默默守护你～",
                    start: "...你好。我是帅气蛋。没什么事的话，我就在你身边。",
                    choices: [
                        { text: "你好酷呀！我超喜欢你这种类型～", love: 15 },
                        { text: "你好呀，以后多多指教", love: 8 },
                        { text: "你看起来好冷淡哦", love: -5 }
                    ],
                    mid: "......笨蛋。其实，我只对你特别温柔。其他人我才不理呢。",
                    midChoices: [
                        { text: "我只喜欢你！", love: 25 },
                        { text: "谢谢你一直陪着我", love: 15 }
                    ],
                    endingTitle: "💙 温柔守护结局",
                    endingDesc: "酷酷的帅气蛋只对你敞开心扉，用最温柔的方式守护你一辈子～"
                },
                warm: {
                    name: "温柔蛋",
                    color: "bg-gradient-to-br from-eggyellow to-orange-300",
                    intro: "像小太阳一样温暖，总是照顾你～",
                    start: "你好呀～我是温柔蛋！希望能给你带来一整天的好心情哦！",
                    choices: [
                        { text: "你真的像小太阳一样温暖！", love: 15 },
                        { text: "谢谢你，心情真的变好了～", love: 10 },
                        { text: "嗯，知道啦", love: 2 }
                    ],
                    mid: "能让你开心就是我最幸福的事情啦～以后每天都给你带来阳光！",
                    midChoices: [
                        { text: "我好喜欢你的温暖！", love: 20 },
                        { text: "有你在真好", love: 12 }
                    ],
                    endingTitle: "☀️ 阳光陪伴结局",
                    endingDesc: "温柔蛋每天都用温暖包围着你，你们的生活充满阳光与幸福～"
                },
                naughty: {
                    name: "调皮蛋",
                    color: "bg-gradient-to-br from-eggpurple to-purple-400",
                    intro: "活泼爱闹，喜欢逗你笑，是你的开心果～",
                    start: "嘿嘿嘿！我是调皮蛋！来和我一起玩吧～肯定超开心！",
                    choices: [
                        { text: "好呀好呀！我最喜欢玩了！", love: 18 },
                        { text: "你看起来好有活力呀", love: 10 },
                        { text: "别闹啦，安静一点", love: -8 }
                    ],
                    mid: "哇哦！你太懂我啦！我们就是全世界最合拍的最佳搭档！",
                    midChoices: [
                        { text: "我们永远一起玩！", love: 22 },
                        { text: "和你在一起超快乐～", love: 14 }
                    ],
                    endingTitle: "🎉 欢乐搭档结局",
                    endingDesc: "你和调皮蛋每天都充满欢笑，打打闹闹，成为最快乐的一对～"
                }
            },
            // 游戏状态
            state: {
                step: 0,
                currentChar: null,
                love: 0
            }
        };

        // DOM元素
        const titleScreen = document.getElementById('title-screen');
        const gameScreen = document.getElementById('game-screen');
        const endingScreen = document.getElementById('ending-screen');
        const dialogText = document.getElementById('dialog-text');
        const choices = document.getElementById('choices');
        const characterName = document.getElementById('character-name');
        const characterIcon = document.getElementById('character-icon');
        const characterDisplay = document.getElementById('character-display');
        const lovePoint = document.getElementById('love-point');
        const loveBar = document.getElementById('love-bar');
        const endingTitle = document.getElementById('ending-title');
        const endingDesc = document.getElementById('ending-desc');
        const endingEgg = document.getElementById('ending-egg');

        // 开始游戏
        function startGame() {
            titleScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            chooseCharacter();
        }

        // 选择角色
        function chooseCharacter() {
            gameData.state.step = 0;
            dialogText.textContent = "欢迎来到蛋仔岛！请选择你想要邂逅的蛋仔～";
            choices.innerHTML = `
                <button onclick="selectChar('soft')" class="choice-hover bg-white p-4 rounded-xl shadow text-left">💗 软萌蛋 - 软软糯糯，容易害羞</button>
                <button onclick="selectChar('cool')" class="choice-hover bg-white p-4 rounded-xl shadow text-left">💙 帅气蛋 - 外表酷酷，内心温柔</button>
                <button onclick="selectChar('warm')" class="choice-hover bg-white p-4 rounded-xl shadow text-left">☀️ 温柔蛋 - 阳光温暖，细心照顾</button>
                <button onclick="selectChar('naughty')" class="choice-hover bg-white p-4 rounded-xl shadow text-left">🎉 调皮蛋 - 活泼爱闹，开心果</button>
            `;
        }

        // 选择角色
        function selectChar(charKey) {
            const char = gameData.characters[charKey];
            gameData.state.currentChar = charKey;
            gameData.state.love = 0;
            gameData.state.step = 1;
            
            characterName.textContent = char.name;
            characterIcon.className = "w-10 h-10 rounded-full flex items-center justify-center font-bold text-white";
            characterIcon.classList.add(...char.color.split(' '));
            characterDisplay.className = "w-40 h-40 rounded-full shadow-lg flex items-center justify-center text-white text-2xl font-bold";
            characterDisplay.classList.add(...char.color.split(' '));
            characterDisplay.textContent = char.name;
            
            updateLove();
            dialogText.textContent = char.start;
            showChoices(char.choices);
        }

        // 显示选项
        function showChoices(choiceList) {
            choices.innerHTML = "";
            choiceList.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = "choice-hover bg-white p-4 rounded-xl shadow text-left dialog-fade";
                btn.textContent = choice.text;
                btn.onclick = () => makeChoice(choice.love);
                choices.appendChild(btn);
            });
        }

        // 做出选择
        function makeChoice(loveAdd) {
            gameData.state.love += loveAdd;
            if (gameData.state.love < 0) gameData.state.love = 0;
            updateLove();

            if (gameData.state.step === 1) {
                gameData.state.step = 2;
                const char = gameData.characters[gameData.state.currentChar];
                dialogText.textContent = char.mid;
                showChoices(char.midChoices);
            } else {
                showEnding();
            }
        }

        // 更新好感度
        function updateLove() {
            lovePoint.textContent = gameData.state.love;
            let percent = Math.min(gameData.state.love, 100);
            loveBar.style.width = percent + "%";
        }

        // 显示结局
        function showEnding() {
            gameScreen.classList.add('hidden');
            endingScreen.classList.remove('hidden');
            const char = gameData.characters[gameData.state.currentChar];
            
            endingEgg.className = "w-36 h-36 rounded-full shadow-lg flex items-center justify-center text-white text-3xl font-bold";
            endingEgg.classList.add(...char.color.split(' '));
            endingEgg.textContent = char.name;
            
            endingTitle.textContent = char.endingTitle;
            endingDesc.textContent = char.endingDesc;
        }

        // 重新开始
        function restartGame() {
            endingScreen.classList.add('hidden');
            titleScreen.classList.remove('hidden');
            gameData.state = { step: 0, currentChar: null, love: 0 };
        }
    </script>
</body>
</html>
