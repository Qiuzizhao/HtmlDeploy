<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOJO纯CSS格斗网页游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 游戏容器 纯渐变背景，无图片 */
        .game-container {
            width: 1000px;
            height: 600px;
            background: linear-gradient(#100520, #251040, #080808);
            border: 4px solid #c9a227;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px #c9a22740;
        }

        /* 血条UI */
        .hp-bar {
            position: absolute;
            top: 20px;
            width: 350px;
            height: 30px;
            background: #222;
            border: 2px solid #fff;
            border-radius: 4px;
            overflow: hidden;
        }
        .player-hp { left: 30px; }
        .enemy-hp { right: 30px; }
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3333, #aa0000);
            transition: width 0.2s ease-out;
        }
        .hp-text {
            position: absolute;
            top: -25px;
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
        }

        /* 角色通用样式 纯色块绘制 */
        .character {
            width: 140px;
            height: 200px;
            position: absolute;
            bottom: 100px;
            transition: all 0.1s ease;
            z-index: 10;
            border-radius: 12px;
        }
        /* 承太郎 蓝黑配色 */
        .player { 
            left: 200px; 
            background: linear-gradient(#152060, #0a1030);
            border:3px solid #6699ff;
        }
        /* DIO 黄黑配色 镜像 */
        .enemy { 
            right: 200px; 
            background: linear-gradient(#704000, #352000);
            border:3px solid #ffdd00;
            transform: scaleX(-1);
        }
        /* 替身简易标识 */
        .character::after{
            content:"替身";
            position:absolute;
            width:100%;
            text-align:center;
            bottom:10px;
            color:#fff;
            font-weight:bold;
        }

        /* 技能按钮面板 */
        .skill-panel {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .skill-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #c9a227;
            background: #1a1a1a;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s, background 0.1s;
            position: relative;
            overflow: hidden;
        }
        .skill-btn:active { transform: scale(0.9); background: #333; }
        .skill-cooldown {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            display: none;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 18px;
        }

        /* 奥义按钮 */
        .ultimate-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid #ffd000;
            background: linear-gradient(#885000,#503000);
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-left: 10px;
        }
        .ultimate-btn:disabled { background: #222; border-color: #555; cursor: not-allowed; opacity: 0.6; }

        /* 战斗特效 纯渐变色块，无图片 */
        .effect {
            position: absolute;
            z-index: 5;
            pointer-events: none;
        }
        .hit-effect {
            width: 90px;
            height: 90px;
            border-radius:50%;
            background: radial-gradient(#fff,#ffdd00,transparent);
            animation: hit 0.3s forwards;
        }
        .ultimate-effect {
            width: 100%;
            height: 100%;
            background: radial-gradient(#ffdd00 0%, transparent 70%);
            animation: ultimate 1.2s forwards;
        }

        /* 动画帧 */
        @keyframes hit {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        @keyframes ultimate {
            0% { transform: scale(0.4); opacity: 0; }
            40% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        /* 移动方向按钮 */
        .move-buttons {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: flex;
            gap: 15px;
        }
        .move-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #fff;
            background: #1a1a1a;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .move-btn:active { transform: scale(0.9); background: #333; }

        /* 底部操作提示 */
        .tip-text {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            color: #ddd;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 双方血条 -->
        <div class="hp-bar player-hp">
            <div class="hp-text">空条承太郎</div>
            <div class="hp-fill" style="width:100%"></div>
        </div>
        <div class="hp-bar enemy-hp">
            <div class="hp-text" style="right:0;text-align:right;">DIO</div>
            <div class="hp-fill" style="width:100%"></div>
        </div>

        <!-- 对战角色（纯CSS色块，无任何图片） -->
        <div class="character player" id="player"></div>
        <div class="character enemy" id="enemy"></div>

        <!-- 移动按钮 -->
        <div class="move-buttons">
            <button class="move-btn" onclick="moveLeft()">←</button>
            <button class="move-btn" onclick="moveRight()">→</button>
        </div>

        <!-- 技能按钮组 -->
        <div class="skill-panel">
            <button class="skill-btn" onclick="normalAttack()">普攻</button>
            <button class="skill-btn" onclick="skill1()">
                欧拉拳
                <div class="skill-cooldown" id="cd1"></div>
            </button>
            <button class="skill-btn" onclick="skill2()">
                时停冲击
                <div class="skill-cooldown" id="cd2"></div>
            </button>
            <button class="ultimate-btn" id="ultimateBtn" onclick="ultimateSkill()" disabled>白金之星</button>
        </div>

        <!-- 操作文字提示 -->
        <div class="tip-text">
            键盘：A/←左移 | D/→右移 | J普攻 | K欧拉拳 | L时停冲击 | U奥义白金之星
        </div>
    </div>

    <script>
        // 游戏全局数据
        let playerHP = 100;
        let enemyHP = 100;
        let ultimateEnergy = 0;
        const player = document.getElementById('player');
        const enemy = document.getElementById('enemy');
        const ultimateBtn = document.getElementById('ultimateBtn');
        const cdTimers = {};

        // 左移动
        function moveLeft() {
            let left = parseInt(window.getComputedStyle(player).left);
            if (left > 50) player.style.left = left - 30 + 'px';
        }
        // 右移动
        function moveRight() {
            let left = parseInt(window.getComputedStyle(player).left);
            if (left < 700) player.style.left = left + 30 + 'px';
        }

        // 普通攻击
        function normalAttack() {
            player.style.transform = 'translateX(20px)';
            createEffect(enemy.offsetLeft + 40, enemy.offsetTop + 30, 'hit-effect');
            damageEnemy(5);
            addUltimateEnergy(10);
            setTimeout(() => player.style.transform = 'translateX(0)', 100);
        }

        // 技能1 欧拉重拳
        function skill1() {
            if(checkCooldown('cd1')) return;
            player.style.transform = 'translateX(40px) scale(1.1)';
            createEffect(enemy.offsetLeft + 20, enemy.offsetTop, 'hit-effect');
            damageEnemy(15);
            addUltimateEnergy(20);
            setCooldown('cd1', 3);
            setTimeout(() => player.style.transform = 'translateX(0)', 150);
        }

        // 技能2 时停冲击
        function skill2() {
            if(checkCooldown('cd2')) return;
            player.style.transform = 'translateX(50px) scale(1.2)';
            createEffect(enemy.offsetLeft, enemy.offsetTop - 30, 'hit-effect');
            damageEnemy(20);
            addUltimateEnergy(25);
            setCooldown('cd2', 5);
            setTimeout(() => player.style.transform = 'translateX(0)', 200);
        }

        // 全屏奥义大招
        function ultimateSkill() {
            if(ultimateEnergy < 100) return;
            createEffect(0, 0, 'ultimate-effect');
            damageEnemy(50);
            ultimateEnergy = 0;
            ultimateBtn.disabled = true;
        }

        // 敌人扣血+胜利重置
        function damageEnemy(dmg) {
            enemyHP = Math.max(0, enemyHP - dmg);
            document.querySelector('.enemy-hp .hp-fill').style.width = enemyHP + '%';
            if(enemyHP <= 0) {
                setTimeout(() => {
                    alert('承太郎 欧拉欧拉欧拉！击败DIO，胜利！');
                    enemyHP = 100;
                    document.querySelector('.enemy-hp .hp-fill').style.width = '100%';
                    ultimateEnergy = 0;
                    ultimateBtn.disabled = true;
                }, 300);
            }
        }

        // 奥义能量积攒
        function addUltimateEnergy(num) {
            ultimateEnergy = Math.min(100, ultimateEnergy + num);
            if(ultimateEnergy >= 100) ultimateBtn.disabled = false;
        }

        // 冷却倒计时管理
        function setCooldown(id, time) {
            const cd = document.getElementById(id);
            if(cdTimers[id]) clearInterval(cdTimers[id]);
            cd.style.display = 'flex';
            let count = time;
            cd.innerText = count;
            cdTimers[id] = setInterval(() => {
                count--;
                cd.innerText = count;
                if(count <= 0) {
                    clearInterval(cdTimers[id]);
                    delete cdTimers[id];
                    cd.style.display = 'none';
                }
            }, 1000);
        }

        function checkCooldown(id) {
            return document.getElementById(id).style.display === 'flex';
        }

        // 生成战斗特效（纯CSS，无图片）
        function createEffect(x, y, className) {
            const effect = document.createElement('div');
            effect.className = `effect ${className}`;
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.querySelector('.game-container').appendChild(effect);
            setTimeout(() => effect.remove(), 1200);
        }

        // 键盘按键监听
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'a': case 'ArrowLeft': moveLeft(); break;
                case 'd': case 'ArrowRight': moveRight(); break;
                case 'j': normalAttack(); break;
                case 'k': skill1(); break;
                case 'l': skill2(); break;
                case 'u': ultimateSkill(); break;
            }
        });
    </script>
</body>
</html>
