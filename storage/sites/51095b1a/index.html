<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倒霉打工人闯关</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f0e8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .game-container {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 30px 28px 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.10), 0 8px 24px rgba(0, 0, 0, 0.06);
            transition: box-shadow 0.3s;
        }
        .game-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .game-title {
            font-size: 28px;
            font-weight: 700;
            color: #2d2d2d;
            Letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .game-title .emoji-big {
            font-size: 34px;
            line-height: 1;
        }
        .game-subtitle {
            font-size: 15px;
            color: #5a5a5a;
            background: #f0ede8;
            border-radius: 20px;
            padding: 8px 18px;
            margin-top: 10px;
            display: inline-block;
            line-height: 1.5;
            max-width: 100%;
        }
        .game-subtitle span {
            white-space: nowrap;
        }
        .status-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 22px;
        }
        .status-card {
            flex: 1 1 120px;
            min-width: 100px;
            background: #f9f7f4;
            border-radius: 18px;
            padding: 14px 12px 12px;
            text-align: center;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.02);
            border: 1px solid #efebe6;
        }
        .status-card .label {
            font-size: 13px;
            color: #7a7a7a;
            font-weight: 500;
            letter-spacing: 0.3px;
            display: block;
            margin-bottom: 4px;
        }
        .status-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #2d2d2d;
            line-height: 1.2;
        }
        .status-card .value.money {
            color: #2a9d8f;
        }
        .status-card .value.pos {
            color: #e76f51;
        }
        .status-card .value.dice {
            color: #264653;
            font-size: 34px;
        }
        .dice-box {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
        }
        .dice-box .dice-anim {
            transition: transform 0.1s;
        }
        .dice-box .dice-anim.rolling {
            animation: diceShake 0.12s infinite alternate;
        }
        @keyframes diceShake {
            0% {
                transform: rotate(-6deg) scale(1.05);
            }
            100% {
                transform: rotate(6deg) scale(0.95);
            }
        }
        .path-section {
            margin: 6px 0 18px;
            position: relative;
        }
        .path-track {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 6px 0 10px;
            scrollbar-width: thin;
            scrollbar-color: #d5d0c8 #f0ede8;
            -webkit-overflow-scrolling: touch;
        }
        .path-track::-webkit-scrollbar {
            height: 6px;
        }
        .path-track::-webkit-scrollbar-track {
            background: #f0ede8;
            border-radius: 10px;
        }
        .path-track::-webkit-scrollbar-thumb {
            background: #d5d0c8;
            border-radius: 10px;
        }
        .path-item {
            flex: 0 0 46px;
            height: 58px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #6a6a6a;
            background: #f0ede8;
            border: 2px solid transparent;
            transition: all 0.25s ease;
            position: relative;
            min-width: 0;
        }
        .path-item .pi-num {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.2;
        }
        .path-item .pi-label {
            font-size: 9px;
            font-weight: 500;
            color: #8a8a8a;
            line-height: 1.1;
            margin-top: 1px;
        }
        .path-item.active {
            background: #e76f51;
            border-color: #c75a3e;
            color: #fff;
            transform: scale(1.08);
            box-shadow: 0 6px 18px rgba(231, 111, 81, 0.35);
            z-index: 2;
        }
        .path-item.active .pi-label {
            color: rgba(255, 255, 255, 0.85);
        }
        .path-item.done {
            background: #f4d4c8;
            border-color: #e8c0b0;
            color: #8a5a4a;
        }
        .path-item.done .pi-label {
            color: #a07a6a;
        }
        .path-item.start {
            background: #e9c46a;
            border-color: #d4ad4a;
            color: #5a4a20;
        }
        .path-item.start .pi-label {
            color: #7a6a3a;
        }
        .path-item.finish {
            background: #2a9d8f;
            border-color: #1f8a7a;
            color: #fff;
        }
        .path-item.finish .pi-label {
            color: rgba(255, 255, 255, 0.85);
        }
        .path-item.finish.active {
            background: #e76f51;
            border-color: #c75a3e;
            box-shadow: 0 6px 18px rgba(231, 111, 81, 0.35);
        }
        .event-area {
            background: #f9f7f4;
            border-radius: 18px;
            padding: 18px 20px;
            min-height: 80px;
            margin: 6px 0 20px;
            border: 1px solid #efebe6;
            transition: background 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .event-area .event-empty {
            color: #9a9a9a;
            font-size: 15px;
            text-align: center;
            padding: 6px 0;
        }
        .event-area .event-result {
            animation: eventFadeIn 0.35s ease;
        }
        @keyframes eventFadeIn {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .event-result .event-type {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .event-result .event-desc {
            font-size: 15px;
            color: #3d3d3d;
            line-height: 1.5;
        }
        .event-result .event-desc .punish {
            color: #b05a4a;
            font-weight: 500;
            background: #f5e8e4;
            padding: 2px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 4px;
            font-size: 14px;
        }
        .event-result .event-desc .highlight-green {
            color: #2a9d8f;
            font-weight: 600;
        }
        .event-result .event-desc .highlight-red {
            color: #d95a4a;
            font-weight: 600;
        }
        .event-result .event-desc .highlight-gold {
            color: #c9a84a;
            font-weight: 600;
        }
        .event-type.good {
            color: #2a9d8f;
        }
        .event-type.bad {
            color: #d95a4a;
        }
        .event-type.special {
            color: #c9a84a;
        }
        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            align-items: center;
            margin-top: 6px;
        }
        .btn {
            border: none;
            border-radius: 60px;
            padding: 14px 40px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #264653;
            color: #fff;
            box-shadow: 0 6px 20px rgba(38, 70, 83, 0.25);
            letter-spacing: 0.5px;
            min-width: 160px;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(38, 70, 83, 0.30);
            background: #1d3640;
        }
        .btn:active:not(:disabled) {
            transform: translateY(0px);
            box-shadow: 0 4px 12px rgba(38, 70, 83, 0.20);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .btn-secondary {
            background: #e9c46a;
            color: #3d3020;
            box-shadow: 0 6px 20px rgba(233, 196, 106, 0.30);
        }
        .btn-secondary:hover:not(:disabled) {
            background: #dbb85a;
            box-shadow: 0 10px 28px rgba(233, 196, 106, 0.35);
            transform: translateY(-2px);
        }
        .btn-secondary:active:not(:disabled) {
            transform: translateY(0px);
        }
        .btn-restart {
            background: #e76f51;
            box-shadow: 0 6px 20px rgba(231, 111, 81, 0.30);
        }
        .btn-restart:hover:not(:disabled) {
            background: #d55a3e;
            box-shadow: 0 10px 28px rgba(231, 111, 81, 0.35);
            transform: translateY(-2px);
        }
        .btn-restart:active:not(:disabled) {
            transform: translateY(0px);
        }
        .game-over-overlay {
            display: none;
            text-align: center;
            padding: 10px 0 4px;
            animation: eventFadeIn 0.4s ease;
        }
        .game-over-overlay.show {
            display: block;
        }
        .game-over-overlay .go-title {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .game-over-overlay .go-desc {
            font-size: 16px;
            color: #5a5a5a;
            margin-bottom: 14px;
        }
        .game-over-overlay .go-actions {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .footer-note {
            text-align: center;
            font-size: 13px;
            color: #aaa;
            margin-top: 22px;
            border-top: 1px solid #f0ede8;
            padding-top: 18px;
            letter-spacing: 0.3px;
        }
        .footer-note span {
            white-space: nowrap;
        }
        @media (max-width: 600px) {
            .game-container {
                padding: 18px 14px 22px;
                border-radius: 24px;
            }
            .game-title {
                font-size: 22px;
            }
            .game-title .emoji-big {
                font-size: 28px;
            }
            .game-subtitle {
                font-size: 13px;
                padding: 6px 14px;
            }
            .status-card .value {
                font-size: 22px;
            }
            .status-card .value.dice {
                font-size: 28px;
            }
            .status-card {
                flex: 1 1 80px;
                min-width: 70px;
                padding: 10px 8px 8px;
            }
            .path-item {
                flex: 0 0 34px;
                height: 46px;
                font-size: 11px;
                border-radius: 10px;
            }
            .path-item .pi-num {
                font-size: 12px;
            }
            .path-item .pi-label {
                font-size: 7px;
            }
            .path-track {
                gap: 3px;
                padding: 4px 0 8px;
            }
            .btn {
                padding: 12px 28px;
                font-size: 17px;
                min-width: 120px;
            }
            .event-area {
                padding: 14px 16px;
                min-height: 64px;
            }
            .event-result .event-type {
                font-size: 16px;
            }
            .event-result .event-desc {
                font-size: 14px;
            }
            .game-over-overlay .go-title {
                font-size: 24px;
            }
        }
        @media (max-width: 400px) {
            .path-item {
                flex: 0 0 28px;
                height: 38px;
                font-size: 10px;
                border-radius: 8px;
            }
            .path-item .pi-num {
                font-size: 10px;
            }
            .path-item .pi-label {
                font-size: 6px;
            }
            .path-track {
                gap: 2px;
            }
            .status-card .value {
                font-size: 18px;
            }
            .status-card .value.dice {
                font-size: 24px;
            }
            .btn {
                padding: 10px 20px;
                font-size: 15px;
                min-width: 100px;
            }
            .game-title {
                font-size: 18px;
            }
        }
        .hidden {
            display: none !important;
        }
        .fade-transition {
            transition: opacity 0.25s ease;
        }
    </style>
</head>
<body>

    <div class="game-container" id="app">
        <!-- Header -->
        <div class="game-header">
            <div class="game-title">
                <span class="emoji-big">🏢</span>
                倒霉打工人闯关
                <span class="emoji-big">💼</span>
            </div>
            <div class="game-subtitle">
                <span>🎯 走到 20 格下班通关</span>
                <span>｜💰 初始工资 100 元，没钱就被开除！</span>
            </div>
        </div>

        <!-- Status -->
        <div class="status-row">
            <div class="status-card">
                <span class="label">💰 工资</span>
                <div class="value money" id="moneyDisplay">100</div>
            </div>
            <div class="status-card">
                <span class="label">📍 位置</span>
                <div class="value pos" id="posDisplay">0 / 20</div>
            </div>
            <div class="status-card">
                <span class="label">🎲 骰子</span>
                <div class="value dice" id="diceDisplay">
                    <div class="dice-box">
                        <span class="dice-anim" id="diceAnim">🎲</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Path -->
        <div class="path-section">
            <div class="path-track" id="pathTrack">
                <!-- 由 JS 动态生成 0 ~ 20 -->
            </div>
        </div>

        <!-- Event -->
        <div class="event-area" id="eventArea">
            <div class="event-empty" id="eventEmpty">👆 点击下方按钮摇骰子，开始打工之旅！</div>
            <div class="event-result hidden" id="eventResult"></div>
        </div>

        <!-- Actions -->
        <div class="action-row" id="actionRow">
            <button class="btn" id="rollBtn">🎲 摇骰子</button>
        </div>

        <!-- Game Over -->
        <div class="game-over-overlay" id="gameOverOverlay">
            <div class="go-title" id="goTitle">🎉</div>
            <div class="go-desc" id="goDesc"></div>
            <div class="go-actions">
                <button class="btn btn-restart" id="restartBtn">🔄 再来一次</button>
            </div>
        </div>

        <div class="footer-note">
            <span>😅 打工人不易</span>
            <span>｜</span>
            <span>💪 加油闯关下班！</span>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ----- 游戏状态 -----
            const state = {
                pos: 0,
                money: 100,
                gameOver: false,
                isRolling: false,
                won: false,
            };

            // ----- DOM 引用 -----
            const moneyDisplay = document.getElementById('moneyDisplay');
            const posDisplay = document.getElementById('posDisplay');
            const diceDisplay = document.getElementById('diceDisplay');
            const diceAnim = document.getElementById('diceAnim');
            const pathTrack = document.getElementById('pathTrack');
            const eventArea = document.getElementById('eventArea');
            const eventEmpty = document.getElementById('eventEmpty');
            const eventResult = document.getElementById('eventResult');
            const rollBtn = document.getElementById('rollBtn');
            const restartBtn = document.getElementById('restartBtn');
            const gameOverOverlay = document.getElementById('gameOverOverlay');
            const goTitle = document.getElementById('goTitle');
            const goDesc = document.getElementById('goDesc');

            // ----- 事件库（与原 Python 完全一致） -----
            const GOOD_EVENTS = [
                { name: '老板发下午茶补贴', add: 30 },
                { name: '摸鱼被老板夸奖效率高', add: 50 },
                { name: '同事请喝奶茶白嫖', add: 20 },
            ];
            const BAD_EVENTS = [
                { name: '工位漏水泡坏电脑', sub: -30, punish: '原地学鸭子叫三声' },
                { name: '强制加班做无用报表', sub: -40, punish: '夹子音说：老板最英明' },
                { name: '外卖被偷吃', sub: -20, punish: '挨个夸在场所有人颜值爆表' },
                { name: '迟到被扣全勤', sub: -50, punish: '模仿招财猫摆手10次' },
                { name: '被迫帮同事背锅罚款', sub: -25, punish: '做五个鬼脸' },
            ];
            const RAND_EVENTS = ['抢别人30工资', '替别人扛一次倒霉', '向前跳5格'];

            // ----- 工具函数 -----
            function randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            function pickRandom(arr) {
                return arr[Math.floor(Math.random() * arr.length)];
            }

            // ----- 更新UI -----
            function updateStatus() {
                moneyDisplay.textContent = state.money + '元';
                posDisplay.textContent = state.pos + ' / 20';
                // 骰子显示保留上次结果，rolling 时由动画控制
            }

            function buildPath() {
                pathTrack.innerHTML = '';
                for (let i = 0; i <= 20; i++) {
                    const div = document.createElement('div');
                    div.className = 'path-item';
                    div.dataset.index = i;

                    const numSpan = document.createElement('span');
                    numSpan.className = 'pi-num';
                    const labelSpan = document.createElement('span');
                    labelSpan.className = 'pi-label';

                    if (i === 0) {
                        numSpan.textContent = '🚪';
                        labelSpan.textContent = '起点';
                        div.classList.add('start');
                    } else if (i === 20) {
                        numSpan.textContent = '🏁';
                        labelSpan.textContent = '下班';
                        div.classList.add('finish');
                    } else {
                        numSpan.textContent = i;
                    }

                    div.appendChild(numSpan);
                    div.appendChild(labelSpan);
                    pathTrack.appendChild(div);
                }
                // 初始状态：位置0高亮
                updatePathHighlight();
            }

            function updatePathHighlight() {
                const items = pathTrack.querySelectorAll('.path-item');
                const pos = state.pos;
                items.forEach((item, idx) => {
                    item.classList.remove('active', 'done');
                    if (idx === pos) {
                        item.classList.add('active');
                        // 如果pos=20，保留 finish 类但 active 覆盖颜色
                    } else if (idx < pos) {
                        item.classList.add('done');
                    }
                    // 起点和终点类保留
                    if (idx === 0) item.classList.add('start');
                    if (idx === 20) item.classList.add('finish');
                });
                // 如果pos=20，确保active覆盖finish颜色，但保留finish标签
                if (pos === 20) {
                    const finishItem = items[20];
                    finishItem.classList.add('active');
                    finishItem.classList.remove('done');
                }
                // 滚动到active可见
                const activeItem = pathTrack.querySelector('.path-item.active');
                if (activeItem) {
                    activeItem.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                }
            }

            // ----- 显示事件 -----
            function showEvent(html, typeClass) {
                eventEmpty.classList.add('hidden');
                eventResult.classList.remove('hidden');
                eventResult.className = 'event-result';
                if (typeClass) {
                    eventResult.classList.add(typeClass);
                }
                eventResult.innerHTML = html;
                // 重新触发动画
                eventResult.style.animation = 'none';
                void eventResult.offsetWidth;
                eventResult.style.animation = 'eventFadeIn 0.35s ease';
            }

            function showEventEmpty() {
                eventEmpty.classList.remove('hidden');
                eventResult.classList.add('hidden');
                eventResult.innerHTML = '';
            }

            // ----- 游戏结束 -----
            function endGame(won) {
                state.gameOver = true;
                state.won = won;
                rollBtn.disabled = true;
                gameOverOverlay.classList.add('show');
                if (won) {
                    goTitle.textContent = '🎉 恭喜通关！';
                    goDesc.textContent = '🎊 成功下班，成为幸运打工人！游戏胜利！';
                    // 播放一点小彩蛋
                    diceAnim.textContent = '🏆';
                } else {
                    goTitle.textContent = '💀 被开除了！';
                    goDesc.textContent = '😵 工资归零，被老板开除！游戏失败！';
                    diceAnim.textContent = '💸';
                }
                // 隐藏操作按钮
                document.getElementById('actionRow').querySelector('.btn')?.classList.add('hidden');
                // 但保留重启按钮在overlay中
            }

            // ----- 重置游戏 -----
            function resetGame() {
                state.pos = 0;
                state.money = 100;
                state.gameOver = false;
                state.isRolling = false;
                state.won = false;

                rollBtn.disabled = false;
                rollBtn.classList.remove('hidden');
                gameOverOverlay.classList.remove('show');
                diceAnim.textContent = '🎲';
                diceAnim.classList.remove('rolling');

                showEventEmpty();
                updateStatus();
                updatePathHighlight();

                // 清空事件区域
                eventResult.classList.add('hidden');
                eventResult.innerHTML = '';
                eventEmpty.classList.remove('hidden');
                eventEmpty.textContent = '👆 点击下方按钮摇骰子，开始打工之旅！';
            }

            // ----- 核心游戏逻辑（一次摇骰子） -----
            function rollDice() {
                if (state.gameOver || state.isRolling) return;

                state.isRolling = true;
                rollBtn.disabled = true;
                diceAnim.classList.add('rolling');

                // 骰子滚动动画：快速变化数字
                let rollCount = 0;
                const maxRolls = 10 + randomInt(0, 6);
                let interval = setInterval(function() {
                    const randFace = randomInt(1, 6);
                    const faces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
                    diceAnim.textContent = faces[randFace - 1];
                    rollCount++;
                    if (rollCount >= maxRolls) {
                        clearInterval(interval);
                        // 最终结果
                        const finalDice = randomInt(1, 6);
                        const finalFace = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'][finalDice - 1];
                        diceAnim.textContent = finalFace;
                        diceAnim.classList.remove('rolling');
                        // 执行游戏逻辑
                        executeTurn(finalDice);
                    }
                }, 60 + randomInt(0, 30));
            }

            function executeTurn(dice) {
                // 移动
                state.pos += dice;
                if (state.pos > 20) state.pos = 20; // 不超过终点

                // 更新路径和状态
                updatePathHighlight();
                updateStatus();

                // 检查胜利
                if (state.pos >= 20) {
                    // 强制设为20
                    state.pos = 20;
                    updatePathHighlight();
                    updateStatus();
                    showEvent('<div class="event-type good">🎉 到达终点！</div><div class="event-desc">成功下班，闯关胜利！</div>');
                    endGame(true);
                    state.isRolling = false;
                    return;
                }

                // 随机事件（与原 Python 逻辑一致）
                const ran = Math.random();
                let eventHtml = '';

                if (ran < 0.3) {
                    // 好运
                    const ev = pickRandom(GOOD_EVENTS);
                    state.money += ev.add;
                    eventHtml =
                        `<div class="event-type good">✨ 好运事件</div><div class="event-desc">${ev.name}，<span class="highlight-green">+${ev.add}元</span></div>`;
                } else if (ran < 0.65) {
                    // 倒霉
                    const ev = pickRandom(BAD_EVENTS);
                    state.money += ev.sub;
                    eventHtml =
                        `<div class="event-type bad">💥 倒霉事件</div><div class="event-desc">${ev.name}，<span class="highlight-red">${ev.sub}元</span><br><span class="punish">😈 惩罚：${ev.punish}</span></div>`;
                } else {
                    // 特殊随机
                    const ev = pickRandom(RAND_EVENTS);
                    let extra = '';
                    if (ev === '抢别人30工资') {
                        state.money += 30;
                        extra = '，<span class="highlight-green">+30元</span>';
                    } else if (ev === '向前跳5格') {
                        const oldPos = state.pos;
                        state.pos = Math.min(state.pos + 5, 20);
                        extra = `，从 ${oldPos} 格跳到 ${state.pos} 格`;
                        updatePathHighlight();
                        updateStatus();
                    } else if (ev === '替别人扛一次倒霉') {
                        extra = '，啥也没发生 🤷';
                    }
                    eventHtml =
                        `<div class="event-type special">🎲 特殊事件</div><div class="event-desc">${ev}${extra}</div>`;
                }

                // 更新金钱显示
                updateStatus();

                // 检查破产
                if (state.money <= 0) {
                    state.money = 0;
                    updateStatus();
                    showEvent(eventHtml);
                    endGame(false);
                    state.isRolling = false;
                    return;
                }

                // 显示事件
                showEvent(eventHtml);

                // 如果pos更新后>=20（比如特殊事件跳跃导致），检查胜利
                if (state.pos >= 20) {
                    state.pos = 20;
                    updatePathHighlight();
                    updateStatus();
                    showEvent('<div class="event-type good">🎉 到达终点！</div><div class="event-desc">成功下班，闯关胜利！</div>');
                    endGame(true);
                    state.isRolling = false;
                    return;
                }

                // 恢复按钮
                state.isRolling = false;
                rollBtn.disabled = false;
            }

            // ----- 事件绑定 -----
            rollBtn.addEventListener('click', rollDice);
            restartBtn.addEventListener('click', resetGame);

            // ----- 键盘支持（回车摇骰子，与原版一致） -----
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    if (!state.gameOver && !state.isRolling) {
                        rollDice();
                    } else if (state.gameOver) {
                        // 游戏结束后按回车触发重启
                        resetGame();
                    }
                }
            });

            // ----- 初始化 -----
            buildPath();
            updateStatus();
            updatePathHighlight();
            showEventEmpty();
            diceAnim.textContent = '🎲';

            // 如果有人在游戏结束点击空白区域误触，防止意外
            console.log('🏢 倒霉打工人闯关已加载！按回车或点击按钮摇骰子。');
        })();
    </script>

</body>
