<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易跑酷小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f0f0f0;
            padding-top: 20px;
        }
        #gameBox {
            width: 800px;
            height: 300px;
            border: 2px solid #333;
            background: #fff;
            position: relative;
            overflow: hidden;
        }
        /* 地面 */
        #ground {
            width: 100%;
            height: 40px;
            background: #666;
            position: absolute;
            bottom: 0;
        }
        /* 玩家角色 */
        #player {
            width: 50px;
            height: 50px;
            background: #2196F3;
            border-radius: 8px;
            position: absolute;
            bottom: 40px;
            left: 80px;
        }
        /* 障碍物 */
        .barrier {
            width: 30px;
            height: 50px;
            background: #f44336;
            position: absolute;
            bottom: 40px;
        }
        #scoreText {
            font-size: 24px;
            margin-bottom:10px;
        }
        #tips {
            margin-top:8px;
            color:#555;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-size:40px;
            color:red;
            display:none;
            text-align:center;
        }
        #restartBtn {
            margin-top:20px;
            padding:8px 20px;
            font-size:18px;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <div id="scoreText">得分：<span id="score">0</span></div>
    <div id="gameBox">
        <div id="player"></div>
        <div id="ground"></div>
        <div id="gameOver">
            游戏结束！
            <br>
