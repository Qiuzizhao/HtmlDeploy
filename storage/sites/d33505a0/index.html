<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>蓝湛心动攻略</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"微软雅黑",sans-serif;
}
body{
  background:#f3e9e9;
  text-align:center;
  padding:20px;
  background-image:linear-gradient(to bottom,#f8eaea,#ffeaea);
}
.game-box{
  width:700px;
  margin:20px auto;
  background:white;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.1);
  padding:25px;
  position:relative;
}
.title{
  font-size:28px;
  color:#557d9c;
  margin-bottom:10px;
}
.subtitle{
  color:#999;
  margin-bottom:20px;
}
.heart-box{
  margin:15px 0;
  font-size:18px;
  color:#c74a65;
}
#heart{
  font-weight:bold;
  font-size:22px;
}
.img-box{
  width:260px;
  height:320px;
  margin:0 auto;
  background:#f8f1f1;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.img-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.dialog{
  margin:20px 0;
  font-size:17px;
  min-height:50px;
  color:#333;
}
.choice-btn{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  justify-content:center;
  margin:20px 0;
}
.choice-btn button{
  padding:10px 18px;
  font-size:16px;
  background:#7aa5c7;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
.choice-btn button:hover{
  background:#557d9c;
}
.reset-btn{
  padding:10px 25px;
  background:#c74a65;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  margin-top:10px;
}
.kiss-anim{
  animation:kiss 0.6s ease-in-out;
}
@keyframes kiss{
  0%{transform:scale(1);}
  50%{transform:scale(1.12);}
  100%{transform:scale(1);}
}
</style>
</head>
<body>

<div class="game-box">
  <div class="title">蓝湛心动攻略</div>
  <div class="subtitle">魏婴，快来打动清冷的含光君吧～</div>

  <div class="heart-box">
    当前心动值：<span id="heart">0</span>
  </div>

  <div class="img-box">
    <img id="lanImg" src="https://p.qqan.com/up/2021-3/16165574647064908.jpg">
  </div>

  <div class="dialog" id="dialog">
    你来到云深不知处，蓝忘机安静坐在静室看书，对你毫无波澜。
  </div>

  <div class="choice-btn">
    <button onclick="choose(1)">递上一壶天子笑</button>
    <button onclick="choose(2)">安静陪在他身边</button>
    <button onclick="choose(3)">轻轻牵他的手</button>
    <button onclick="choose(4)">凑过去逗他笑</button>
  </div>

  <button class="reset-btn" onclick="resetGame()">重新开始攻略</button>
</div>

<script>
let heart = 0;
const maxHeart = 100;
const dialog = document.getElementById('dialog');
const heartText = document.getElementById('heart');
const lanImg = document.getElementById('lanImg');

// 图片资源（正常 / 害羞 / 亲吻）
const imgs = {
  normal:"https://p.qqan.com/up/2021-3/16165574647064908.jpg",
  shy:"https://p.qqan.com/up/2021-3/16165574765016273.jpg",
  kiss:"https://p.qqan.com/up/2021-4/16172956659666966.jpg"
}

function updateUI(){
  heartText.innerText = heart;
  if(heart >= 80){
    lanImg.src = imgs.shy;
  }else{
    lanImg.src = imgs.normal;
  }
}

function choose(type){
  switch(type){
    case 1:
      heart +=15;
      dialog.innerText="你递上天子笑，蓝忘机耳尖微红，没有拒绝。心动+15";
      break;
    case 2:
      heart +=10;
      dialog.innerText="你安静陪着他，蓝忘机悄悄看了你一眼。心动+10";
      break;
    case 3:
      heart +=25;
      dialog.innerText="你轻轻牵住他的手，他身体一僵，没有躲开。心动+25！";
      break;
    case 4:
      heart +=20;
      dialog.innerText="你凑过去逗他，含光君脸颊微微泛红。心动+20";
      break;
  }

  if(heart>maxHeart) heart=maxHeart;
  updateUI();
  checkEnding();
}

// 检查心动结局
function checkEnding(){
  if(heart >= 100){
    dialog.innerText="🎉 心动值已满！蓝忘机主动吻了你，攻略成功！";
    lanImg.src = imgs.kiss;
    lanImg.classList.add("kiss-anim");
    // 禁用按钮
    document.querySelectorAll(".choice-btn button").forEach(btn=>btn.disabled=true);
  }
}

// 重置游戏
function resetGame(){
  heart=0;
  updateUI();
  lanImg.classList.remove("kiss-anim");
  document.querySelectorAll(".choice-btn button").forEach(btn=>btn.disabled=false);
  dialog.innerText="你来到云深不知处，蓝忘机安静坐在静室看书，对你毫无波澜。";
}

updateUI();
</script>
</body>
</html>
