<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>崩坏：星穹铁道 - 回合战斗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        starrail: {
                            blue: '#0A2342',
                            light: '#2A4365',
                            gold: '#D4AF37',
                            silver: '#C0C8D8',
                            dark: '#05101F',
                            skill: '#4F46E5',
                            ultimate: '#DB2777'
                        }
                    },
                    fontFamily: {
                        starrail: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 0 0 8px rgba(212, 175, 55, 0.6);
            }
            .border-star {
                border: 1px solid rgba(212, 175, 55, 0.3);
            }
            .animate-hit {
                animation: hit 0.3s ease-in-out;
            }
            .animate-ultimate {
                animation: ultimate 0.8s ease-in-out;
            }
            .animate-appear {
                animation: appear 0.5s ease-out forwards;
            }
        }

        @keyframes hit {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-10px); }
        }

        @keyframes ultimate {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes appear {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        body {
            background-color: #05101F;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(42, 67, 101, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .skill-effect {
            background: radial-gradient(circle, rgba(79, 70, 229, 0.4) 0%, transparent 70%);
        }

        .ultimate-effect {
            background: radial-gradient(circle, rgba(219, 39, 119, 0.5) 0%, transparent 70%);
        }
    </style>
</head>
<body class="font-strail text-white min-h-screen">
    <!-- 游戏容器 -->
    <div id="game" class="max-w-6xl mx-auto p-4">
        <!-- 开始界面 -->
        <div id="start-screen" class="animate-appear flex flex-col items-center justify-center min-h-[80vh] text-center">
            <h1 class="text-[clamp(2rem,8vw,4.5rem)] font-bold text-starrail-gold text-shadow mb-8">
                崩坏：星穹铁道
            </h1>
            <p class="text-starrail-silver text-xl mb-12">回合战斗小游戏</p>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 w-full max-w-4xl px-4">
                <!-- 角色1：开拓者 -->
                <div class="character-card bg-starrail-blue/80 hover:bg-starrail-light rounded-lg p-5 border-star cursor-pointer transition-all hover:scale-105" data-character="开拓者">
                    <div class="h-40 bg-starrail-dark rounded-md mb-4 flex items-center justify-center">
                        <i class="fa-solid fa-user text-6xl text-starrail-gold"></i>
                    </div>
                    <h3 class="text-xl font-bold text-starrail-gold">开拓者</h3>
                    <p class="text-sm text-starrail-silver mt-2">均衡型角色 | 普攻稳定</p>
                    <div class="mt-3 text-left text-sm">
                        <p>血量: 100</p>
                        <p>普攻: 15伤害</p>
                        <p>技能: 25伤害</p>
                        <p>终结技: 40伤害</p>
                    </div>
                </div>

                <!-- 角色2：希儿 -->
                <div class="character-card bg-starrail-blue/80 hover:bg-starrail-light rounded-lg p-5 border-star cursor-pointer transition-all hover:scale-105" data-character="希儿">
                    <div class="h-40 bg-starrail-dark rounded-md mb-4 flex items-center justify-center">
                        <i class="fa-solid fa-bolt text-6xl text-blue-400"></i>
                    </div>
                    <h3 class="text-xl font-bold text-starrail-gold">希儿</h3>
                    <p class="text-sm text-starrail-silver mt-2">高速输出 | 爆发高</p>
                    <div class="mt-3 text-left text-sm">
                        <p>血量: 90</p>
                        <p>普攻: 18伤害</p>
                        <p>技能: 30伤害</p>
                        <p>终结技: 50伤害</p>
                    </div>
                </div>

                <!-- 角色3：景元 -->
                <div class="character-card bg-starrail-blue/80 hover:bg-starrail-light rounded-lg p-5 border-star cursor-pointer transition-all hover:scale-105" data-character="景元">
                    <div class="h-40 bg-starrail-dark rounded-md mb-4 flex items-center justify-center">
                        <i class="fa-solid fa-sun text-6xl text-yellow-400"></i>
                    </div>
                    <h3 class="text-xl font-bold text-starrail-gold">景元</h3>
                    <p class="text-sm text-starrail-silver mt-2">群体伤害 | 高伤法师</p>
                    <div class="mt-3 text-left text-sm">
                        <p>血量: 85</p>
                        <p>普攻: 16伤害</p>
                        <p>技能: 32伤害</p>
                        <p>终结技: 55伤害</p>
                    </div>
                </div>
            </div>

            <button id="start-btn" class="bg-starrail-gold hover:bg-yellow-600 text-starrail-dark font-bold py-3 px-10 rounded-md text-lg transition-all">
                选择角色开始游戏
            </button>
        </div>

        <!-- 战斗界面 -->
        <div id="battle-screen" class="hidden">
            <!-- 顶部信息 -->
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-starrail-gold" id="player-name">开拓者</h2>
                <div class="text-starrail-silver">回合: <span id="turn-count">1</span></div>
            </div>

            <!-- 战斗区域 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <!-- 敌人 -->
                <div class="bg-starrail-blue/40 rounded-lg p-6 border-star relative">
                    <h3 class="text-xl font-bold mb-4 text-red-400">敌方：虚卒</h3>
                    <div class="relative">
                        <div class="w-full h-4 bg-gray-700 rounded-full overflow-hidden">
                            <div id="enemy-health-bar" class="h-full bg-red-500 transition-all" style="width: 100%"></div>
                        </div>
                        <p id="enemy-health" class="text-center mt-2">血量: 150/150</p>
                    </div>
                    <div class="h-48 flex items-center justify-center mt-4">
                        <i class="fa-solid fa-skull-crossbones text-8xl text-red-500/70"></i>
                    </div>
                </div>

                <!-- 玩家 -->
                <div class="bg-starrail-blue/40 rounded-lg p-6 border-star relative">
                    <h3 class="text-xl font-bold mb-4 text-starrail-gold" id="battle-char-name">开拓者</h3>
                    <!-- 血量条 -->
                    <div class="mb-4">
                        <div class="w-full h-4 bg-gray-700 rounded-full overflow-hidden">
                            <div id="player-health-bar" class="h-full bg-green-500 transition-all" style="width: 100%"></div>
                        </div>
                        <p id="player-health" class="text-center mt-2">血量: 100/100</p>
                    </div>
                    <!-- 能量条 -->
                    <div class="mb-6">
                        <div class="w-full h-3 bg-gray-700 rounded-full overflow-hidden">
                            <div id="player-energy-bar" class="h-full bg-purple-500 transition-all" style="width: 0%"></div>
                        </div>
                        <p id="player-energy" class="text-center mt-1 text-xs">能量: 0/100</p>
                    </div>
                    <div class="h-48 flex items-center justify-center mt-4">
                        <i id="char-icon" class="fa-solid fa-user text-8xl text-starrail-gold/70"></i>
                    </div>
                </div>
            </div>

            <!-- 技能按钮 -->
            <div class="bg-starrail-dark/70 rounded-lg p-5 border-star mb-6">
                <h3 class="text-lg font-semibold mb-4 text-starrail-silver">技能选择</h3>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <button id="attack-btn" class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-4 rounded-md transition-all">
                        <i class="fa-solid fa-hand-fist mr-2"></i>普攻
                    </button>
                    <button id="skill-btn" class="bg-starrail-skill hover:bg-indigo-600 text-white font-bold py-4 rounded-md transition-all">
                        <i class="fa-solid fa-burst mr-2"></i>技能
                    </button>
                    <button id="ultimate-btn" class="bg-starrail-ultimate hover:bg-pink-600 text-white font-bold py-4 rounded-md transition-all opacity-50 cursor-not-allowed">
                        <i class="fa-solid fa-star mr-2"></i>终结技
                    </button>
                </div>
            </div>

            <!-- 战斗日志 -->
            <div class="bg-starrail-blue/30 rounded-lg p-4 border-star h-40 overflow-y-auto">
                <h3 class="text-sm font-semibold mb-2 text-starrail-silver">战斗日志</h3>
                <div id="battle-log" class="text-sm space-y-1">
                    <p>战斗开始！击败虚卒获得胜利！</p>
                </div>
            </div>
        </div>

        <!-- 结果界面 -->
        <div id="result-screen" class="hidden animate-appear fixed top-0 left-0 w-full h-full bg-black/80 flex items-center justify-center z-50">
            <div class="bg-starrail-blue rounded-lg p-10 text-center max-w-md w-full border-star">
                <h2 id="result-title" class="text-4xl font-bold mb-6 text-starrail-gold">胜利！</h2>
                <p id="result-desc" class="text-xl mb-8">你击败了虚卒！</p>
                <button id="restart-btn" class="bg-starrail-gold hover:bg-yellow-600 text-starrail-dark font-bold py-3 px-8 rounded-md transition-all">
                    重新开始
                </button>
            </div>
        </div>
    </div>

    <script>
        // 游戏数据
        const gameData = {
            selectedCharacter: null,
            characters: {
                '开拓者': { hp: 100, maxHp: 100, attack: 15, skill: 25, ultimate: 40, energy: 0, maxEnergy: 100, icon: 'fa-user' },
                '希儿': { hp: 90, maxHp: 90, attack: 18, skill: 30, ultimate: 50, energy: 0, maxEnergy: 100, icon: 'fa-bolt' },
                '景元': { hp: 85, maxHp: 85, attack: 16, skill: 32, ultimate: 55, energy: 0, maxEnergy: 100, icon: 'fa-sun' }
            },
            enemy: { name: '虚卒', hp: 150, maxHp: 150, attack: 12 },
            turn: 1,
            playerTurn: true
        };

        // DOM元素
        const startScreen = document.getElementById('start-screen');
        const battleScreen = document.getElementById('battle-screen');
        const resultScreen = document.getElementById('result-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const attackBtn = document.getElementById('attack-btn');
        const skillBtn = document.getElementById('skill-btn');
        const ultimateBtn = document.getElementById('ultimate-btn');
        const battleLog = document.getElementById('battle-log');
        const turnCount = document.getElementById('turn-count');
        
        // 角色选择
        const characterCards = document.querySelectorAll('.character-card');
        characterCards.forEach(card => {
            card.addEventListener('click', () => {
                characterCards.forEach(c => c.classList.remove('ring-4', 'ring-starrail-gold'));
                card.classList.add('ring-4', 'ring-starrail-gold');
                gameData.selectedCharacter = card.dataset.character;
            });
        });

        // 开始游戏
        startBtn.addEventListener('click', () => {
            if (!gameData.selectedCharacter) {
                addLog('请先选择一个角色！');
                return;
            }
            startGame();
        });

        // 重新开始
        restartBtn.addEventListener('click', () => {
            location.reload();
        });

        // 技能按钮事件
        attackBtn.addEventListener('click', () => playerAction('attack'));
        skillBtn.addEventListener('click', () => playerAction('skill'));
        ultimateBtn.addEventListener('click', () => {
            if (gameData.characters[gameData.selectedCharacter].energy >= 100) {
                playerAction('ultimate');
            }
        });

        // 开始游戏
        function startGame() {
            startScreen.classList.add('hidden');
            battleScreen.classList.remove('hidden');
            
            const char = gameData.characters[gameData.selectedCharacter];
            document.getElementById('player-name').textContent = gameData.selectedCharacter;
            document.getElementById('battle-char-name').textContent = gameData.selectedCharacter;
            document.getElementById('char-icon').className = `fa-solid ${char.icon} text-8xl text-starrail-gold/70`;
            
            updateBars();
            addLog(`你选择了${gameData.selectedCharacter}，战斗开始！`);
        }

        // 玩家行动
        function playerAction(type) {
            if (!gameData.playerTurn) return;
            
            const char = gameData.characters[gameData.selectedCharacter];
            let damage = 0;
            let energyGain = 20;

            switch(type) {
                case 'attack':
                    damage = char.attack;
                    addLog(`${gameData.selectedCharacter} 使用普攻，造成${damage}点伤害！`);
                    break;
                case 'skill':
                    damage = char.skill;
                    energyGain = 15;
                    addLog(`${gameData.selectedCharacter} 使用技能，造成${damage}点伤害！`);
                    break;
                case 'ultimate':
                    damage = char.ultimate;
                    char.energy = 0;
                    addLog(`${gameData.selectedCharacter} 释放终结技！造成${damage}点伤害！`);
                    showEffect('ultimate');
                    break;
            }

            // 伤害敌人
            gameData.enemy.hp = Math.max(0, gameData.enemy.hp - damage);
            char.energy = Math.min(100, char.energy + energyGain);
            
            updateBars();
            checkGameEnd();
            
            if (gameData.enemy.hp > 0) {
                gameData.playerTurn = false;
                setTimeout(enemyTurn, 1000);
            }
        }

        // 敌人回合
        function enemyTurn() {
            const damage = gameData.enemy.attack;
            const char = gameData.characters[gameData.selectedCharacter];
            
            char.hp = Math.max(0, char.hp - damage);
            addLog(`${gameData.enemy.name} 攻击，造成${damage}点伤害！`);
            
            gameData.turn++;
            gameData.playerTurn = true;
            
            updateBars();
            checkGameEnd();
        }

        // 更新血条/能量条
        function updateBars() {
            const char = gameData.characters[gameData.selectedCharacter];
            const enemy = gameData.enemy;
            
            // 玩家血条
            const playerHpPercent = (char.hp / char.maxHp) * 100;
            document.getElementById('player-health-bar').style.width = `${playerHpPercent}%`;
            document.getElementById('player-health').textContent = `血量: ${char.hp}/${char.maxHp}`;
            
            // 玩家能量条
            const energyPercent = (char.energy / char.maxEnergy) * 100;
            document.getElementById('player-energy-bar').style.width = `${energyPercent}%`;
            document.getElementById('player-energy').textContent = `能量: ${char.energy}/${char.maxEnergy}`;
            
            // 敌人血条
            const enemyHpPercent = (enemy.hp / enemy.maxHp) * 100;
            document.getElementById('enemy-health-bar').style.width = `${enemyHpPercent}%`;
            document.getElementById('enemy-health').textContent = `血量: ${enemy.hp}/${enemy.maxHp}`;
            
            // 回合数
            turnCount.textContent = gameData.turn;
            
            // 终结技按钮状态
            if (char.energy >= 100) {
                ultimateBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                ultimateBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        // 检查游戏结束
        function checkGameEnd() {
            const char = gameData.characters[gameData.selectedCharacter];
            
            if (gameData.enemy.hp <= 0) {
                endGame(true);
            } else if (char.hp <= 0) {
                endGame(false);
            }
        }

        // 游戏结束
        function endGame(isWin) {
            battleScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            if (isWin) {
                document.getElementById('result-title').textContent = '胜利！';
                document.getElementById('result-desc').textContent = `你使用${gameData.selectedCharacter}击败了虚卒！`;
            } else {
                document.getElementById('result-title').textContent = '失败';
                document.getElementById('result-desc').textContent = '你被虚卒击败了...';
            }
        }

        // 添加战斗日志
        function addLog(text) {
            const p = document.createElement('p');
            p.textContent = text;
            battleLog.appendChild(p);
            battleLog.scrollTop = battleLog.scrollHeight;
        }

        // 显示技能特效
        function showEffect(type) {
            const effect = document.createElement('div');
            effect.className = `${type}-effect fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 rounded-full animate-ultimate z-40 pointer-events-none`;
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 1000);
        }
    </script>
</body>
</html>
