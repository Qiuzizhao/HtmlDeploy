<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>雷霆射击小游戏发射O键</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:Arial;background:#87CEEB}
        #game{
            width:100vw;height:100vh;
            position:relative;
            overflow:hidden;
            cursor:none;
        }
        .forest{
            width:100%;height:75%;
            background:linear-gradient(#87CEEB 0%,#90EE90 65%,#228B22 100%);
            position:absolute;bottom:0;
        }
        .tree{
            position:absolute;bottom:20%;
            width:40px;height:120px;
            background:#654321;border-radius:5px;
        }
        .tree::after{
            content:"";position:absolute;top:-60px;left:-30px;
            width:100px;height:80px;background:#006400;border-radius:50%;
        }
        .player{
            width:36px;height:36px;background:#32CD32;border-radius:50%;
            position:absolute;z-index:9;
            border:2px solid #006400;
            will-change:transform;
        }
        .enemy{
            width:36px;height:36px;background:#ff4444;border-radius:50%;
            position:absolute;z-index:9;
            border:2px solid #990000;
            will-change:transform;
        }
        .bullet{
            width:12px;height:12px;background:#fff;border-radius:50%;
            box-shadow:0 0 6px #ffffff;
            position:absolute;
            will-change:transform;
        }
        .weather{
            width:100%;height:100%;position:absolute;top:0;left:0;pointer-events:none;z-index:100;
        }
        .rain{
            position:absolute;background:#aaddff;width:2px;height:20px;opacity:0.6;
        }
        .snow{
            position:absolute;background:#fff;width:6px;height:6px;border-radius:50%;opacity:0.9;
        }
        .ui{
            position:absolute;top:20px;left:20px;font-size:22px;color:#222;
            background:rgba(255,255,255,0.7);padding:8px 16px;border-radius:8px;z-index:999;
            user-select:none;
        }
    </style>
</head>
<body>
<div id="game">
    <div class="ui">敌人血量：<span id="hpNum">20</span>/20｜WASD移动｜O键发射(瞄准鼠标位置)</div>
    <div class="forest" id="forest"></div>
    <div class="weather" id="weatherBox"></div>
    <div class="player" id="player"></div>
</div>

<script>
(function(){
    const game = document.getElementById('game')
    const player = document.getElementById('player')
    const forest = document.getElementById('forest')
    const weatherBox = document.getElementById('weatherBox')
    const hpText = document.getElementById('hpNum')
    const enemyMaxHp = 20
    let enemyHp = enemyMaxHp

    let playerX = 100, playerY = window.innerHeight*0.6
    const speed = 5
    const bullets = []
    let enemy = null
    let enemyX = 0, enemyY = 0
    const enemySpeed = 2
    const key = {}
    const weatherType = ['sun','rain','cloud','snow']
    let nowWeather = ''
    let mouseX = 0, mouseY = 0
    let animFrameId = null
    let weatherIntervalId = null
    let rainAnimIds = []
    let snowAnimIds = []

    // 生成森林树木
    for(let i=0;i<12;i++){
        const tree = document.createElement('div')
        tree.className = 'tree'
        tree.style.left = Math.random()*95 + '%'
        forest.appendChild(tree)
    }

    player.style.left = playerX+'px'
    player.style.top = playerY+'px'

    document.addEventListener('mousemove',function(e){
        mouseX = e.clientX
        mouseY = e.clientY
    })

    function clearWeatherAnimations(){
        rainAnimIds.forEach(id => cancelAnimationFrame(id))
        snowAnimIds.forEach(id => cancelAnimationFrame(id))
        rainAnimIds = []
        snowAnimIds = []
    }

    function changeWeather(){
        clearWeatherAnimations()
        weatherBox.innerHTML = ''
        nowWeather = weatherType[Math.floor(Math.random()*weatherType.length)]
        if(nowWeather === 'rain'){
            for(let i=0;i<220;i++) createRain()
        }else if(nowWeather === 'snow'){
            for(let i=0;i<160;i++) createSnow()
        }else if(nowWeather === 'cloud'){
            game.style.background = '#b8c8d8'
        }else{
            game.style.background = ''
        }
    }

    function createRain(){
        const r = document.createElement('div')
        r.className = 'rain'
        r.style.left = Math.random()*100+'%'
        r.style.top = Math.random()*100+'%'
        weatherBox.appendChild(r)
        function drop(){
            let top = parseFloat(r.style.top)
            top+=3
            if(top>100) top=-5
            r.style.top = top+'%'
            const id = requestAnimationFrame(drop)
            rainAnimIds.push(id)
        }
        drop()
    }

    function createSnow(){
        const s = document.createElement('div')
        s.className = 'snow'
        s.style.left = Math.random()*100+'%'
        s.style.top = Math.random()*-20+'%'
        weatherBox.appendChild(s)
        function fall(){
            let top = parseFloat(s.style.top)
            let left = parseFloat(s.style.left)
            top+=1.2
            left += (Math.random()-0.5)*0.3
            if(top>100){top=-5;left=Math.random()*100}
            s.style.top = top+'%'
            s.style.left = left+'%'
            const id = requestAnimationFrame(fall)
            snowAnimIds.push(id)
        }
        fall()
    }

    weatherIntervalId = setInterval(changeWeather,12000)
    changeWeather()

    function createEnemy(){
        if(enemy) enemy.remove()
        enemy = document.createElement('div')
        enemy.className = 'enemy'
        enemyX = Math.random()*(window.innerWidth-80)+40
        enemyY = Math.random()*(window.innerHeight*0.5)+window.innerHeight*0.3
        enemyHp = enemyMaxHp
        hpText.innerText = enemyHp
        enemy.style.left = enemyX+'px'
        enemy.style.top = enemyY+'px'
        game.appendChild(enemy)
    }
    createEnemy()

    window.addEventListener('keydown',function(e){
        key[e.code]=true
        if(e.code==='KeyO') shootBullet()
    })
    window.addEventListener('keyup',function(e){key[e.code]=false})

    function shootBullet(){
        const b = document.createElement('div')
        b.className = 'bullet'
        const startX = playerX+18
        const startY = playerY+18
        b.style.left = startX+'px'
        b.style.top = startY+'px'
        game.appendChild(b)
        const dx = mouseX - startX
        const dy = mouseY - startY
        const len = Math.sqrt(dx*dx+dy*dy)
        if(len === 0) return
        const vx = dx/len*8
        const vy = dy/len*8
        bullets.push({dom:b,x:startX,y:startY,vx,vy})
    }

    function loop(){
        if(key['KeyW']&&playerY>0) playerY -= speed
        if(key['KeyS']&&playerY<window.innerHeight-50) playerY += speed
        if(key['KeyA']&&playerX>0) playerX -= speed
        if(key['KeyD']&&playerX<window.innerWidth-50) playerX += speed
        player.style.left = playerX+'px'
        player.style.top = playerY+'px'

        const ran = Math.random()
        if(ran<0.02){
            enemyX += (Math.random()-0.5)*enemySpeed*25
            enemyY += (Math.random()-0.5)*enemySpeed*25
            enemyX = Math.max(10,Math.min(window.innerWidth-50,enemyX))
            enemyY = Math.max(window.innerHeight*0.2,Math.min(window.innerHeight-60,enemyY))
        }
        enemy.style.left = enemyX+'px'
        enemy.style.top = enemyY+'px'

        for(let i=bullets.length-1;i>=0;i--){
            const bl = bullets[i]
            bl.x += bl.vx
            bl.y += bl.vy
            bl.dom.style.left = bl.x+'px'
            bl.dom.style.top = bl.y+'px'
            if(bl.x<0||bl.x>window.innerWidth||bl.y<0||bl.y>window.innerHeight){
                bl.dom.remove()
                bullets.splice(i,1)
                continue
            }
            const dis = Math.hypot(bl.x-enemyX-18,bl.y-enemyY-18)
            if(dis<28){
                bl.dom.remove()
                bullets.splice(i,1)
                enemyHp -= 1
                hpText.innerText = enemyHp
                if(enemyHp <= 0){
                    createEnemy()
                }
            }
        }

        animFrameId = requestAnimationFrame(loop)
    }
    loop()

    window.addEventListener('resize',function(){
        playerX = Math.min(playerX, window.innerWidth-50)
        playerY = Math.min(playerY, window.innerHeight-50)
        enemyX = Math.min(enemyX, window.innerWidth-50)
        enemyY = Math.min(enemyY, window.innerHeight-50)
    })

    window.addEventListener('beforeunload',function(){
        if(animFrameId) cancelAnimationFrame(animFrameId)
        if(weatherIntervalId) clearInterval(weatherIntervalId)
        clearWeatherAnimations()
    })
})();
</script>
</body>
</html>
