<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARDS 简化卡牌游戏</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .game-container {
            max-width: 1000px;
            width: 100%;
            background: #16213e;
            border-radius: 32px;
            padding: 24px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid #0f3460;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f3460;
            padding: 12px 20px;
            border-radius: 40px;
            margin-bottom: 20px;
            color: #e0e0ff;
            font-weight: 600;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header .turn {
            background: #e94560;
            padding: 4px 16px;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
        }
        .player-panel {
            background: #1a1a40;
            border-radius: 24px;
            padding: 16px 18px;
            margin-bottom: 16px;
            border: 1px solid #2a2a5a;
        }
        .player-panel.enemy {
            background: #1e2a3a;
        }
        .player-panel.ally {
            background: #1e2a3a;
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 12px;
            margin-bottom: 8px;
        }
        .player-name {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .mana-badge {
            background: #533483;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .hp-badge {
            background: #c0392b;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 600;
        }
        .field-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 70px;
            padding: 8px 0;
        }
        .unit-card {
            background: #2d2d5e;
            border-radius: 16px;
            padding: 8px 14px;
            border-left: 4px solid #e94560;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
            font-size: 0.9rem;
        }
        .unit-card .name {
            font-weight: 700;
            font-size: 0.95rem;
        }
        .unit-card .stats {
            display: flex;
            gap: 12px;
            margin-top: 4px;
            color: #b0b0ff;
        }
        .unit-card .stats span {
            background: #1a1a3e;
            padding: 0 8px;
            border-radius: 20px;
        }
        .hand-area {
            background: #0d1b2a;
            border-radius: 24px;
            padding: 14px 16px;
            margin: 12px 0 8px;
        }
        .hand-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }
        .hand-card {
            background: #233554;
            border-radius: 16px;
            padding: 8px 14px;
            border-left: 4px solid #f0a500;
            cursor: default;
            transition: 0.1s ease;
            font-size: 0.85rem;
            min-width: 70px;
        }
        .hand-card .cost {
            background: #f0a500;
            color: #000;
            font-weight: 700;
            padding: 0 8px;
            border-radius: 20px;
            display: inline-block;
            margin-right: 6px;
        }
        .controls {
            background: #0f1a2b;
            border-radius: 40px;
            padding: 14px 18px;
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .controls input {
            flex: 2;
            min-width: 140px;
            background: #1a2a44;
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            color: white;
            font-size: 0.95rem;
            outline: 1px solid #2a4a6a;
        }
        .controls input:focus {
            outline: 2px solid #e94560;
        }
        .controls button {
            background: #e94560;
            border: none;
            color: white;
            font-weight: 700;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 0 #a02a40;
        }
        .controls button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #a02a40;
        }
        .controls button.secondary {
            background: #2a4a6a;
            box-shadow: 0 4px 0 #1a2a44;
        }
        .log-area {
            background: #0a0f1e;
            border-radius: 20px;
            padding: 12px 16px;
            margin-top: 16px;
            max-height: 160px;
            overflow-y: auto;
            font-size: 0.85rem;
            border: 1px solid #1e2a4a;
            color: #b0c4de;
        }
        .log-area div {
            padding: 2px 0;
            border-bottom: 1px solid #1a1a3a;
        }
        .log-area div:last-child {
            border-bottom: none;
        }
        .empty-message {
            opacity: 0.5;
            font-style: italic;
        }
        .game-over-message {
            background: #e94560;
            color: white;
            font-weight: 700;
            padding: 12px 20px;
            border-radius: 40px;
            text-align: center;
            margin: 10px 0;
        }
        @media (max-width: 600px) {
            .game-container { padding: 12px; }
            .unit-card { min-width: 65px; font-size: 0.8rem; }
            .hand-card { font-size: 0.75rem; min-width: 60px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <div class="header">
        <span>⚔️ KARDS 简化版</span>
        <span class="turn" id="turnDisplay">回合 1</span>
        <span id="gameStatus" style="font-size:0.9rem;">进行中</span>
    </div>

    <!-- 敌方面板 -->
    <div class="player-panel enemy">
        <div class="player-header">
            <span class="player-name" id="enemyName">电脑</span>
            <span class="hp-badge" id="enemyHp">❤️ 20</span>
            <span class="mana-badge" id="enemyMana">⚡ 0/0</span>
        </div>
        <div class="field-row" id="enemyField"></div>
    </div>

    <!-- 我方面板 -->
    <div class="player-panel ally">
        <div class="player-header">
            <span class="player-name" id="allyName">玩家</span>
            <span class="hp-badge" id="allyHp">❤️ 20</span>
            <span class="mana-badge" id="allyMana">⚡ 0/0</span>
        </div>
        <div class="field-row" id="allyField"></div>
    </div>

    <!-- 手牌区 -->
    <div class="hand-area">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <strong>📜 手牌</strong>
            <span style="font-size:0.8rem; opacity:0.7;" id="handCount">0 张</span>
        </div>
        <div class="hand-cards" id="handContainer"></div>
    </div>

    <!-- 控制区 -->
    <div class="controls">
        <input type="text" id="commandInput" placeholder="指令: play 0 / attack 1 / attack hq / end" autofocus>
        <button id="executeBtn">执行</button>
        <button class="secondary" id="endTurnBtn">结束回合</button>
    </div>

    <!-- 日志 -->
    <div class="log-area" id="logContainer">
        <div>⚡ 游戏启动</div>
    </div>
</div>

<script>
    (function() {
        // ---------- 纯逻辑 (无 DOM 依赖) ----------
        class UnitCard {
            constructor(name, cost, attack, health, desc = "") {
                this.name = name;
                this.cost = cost;
                this.attack = attack;
                this.health = health;
                this.desc = desc;
                this.canAttack = false;
            }
            takeDamage(dmg) { this.health -= dmg; }
            isAlive() { return this.health > 0; }
            toString() {
                return `【${this.name}】 费用:${this.cost} | 攻:${this.attack} 血:${this.health} | ${this.desc}`;
            }
        }

        class Player {
            constructor(name) {
                this.name = name;
                this.hp = 20;
                this.maxMana = 0;
                this.mana = 0;
                this.deck = [];
                this.hand = [];
                this.field = [];
            }
            resetMana() {
                this.maxMana = Math.min(this.maxMana + 1, 10);
                this.mana = this.maxMana;
            }
            draw(n = 1) {
                for (let i = 0; i < n; i++) {
                    if (this.deck.length > 0) {
                        this.hand.push(this.deck.shift());
                    }
                }
            }
            playCard(cardIdx) {
                if (cardIdx < 0 || cardIdx >= this.hand.length) return false;
                const card = this.hand[cardIdx];
                if (this.mana >= card.cost) {
                    this.mana -= card.cost;
                    this.field.push(card);
                    this.hand.splice(cardIdx, 1);
                    card.canAttack = false;
                    return true;
                }
                return false;
            }
            enableAttack() {
                for (const unit of this.field) {
                    unit.canAttack = true;
                }
            }
        }

        // ---------- 游戏状态 ----------
        let p1, p2, turn, gameOver;
        let logEntries = [];

        function createDecks() {
            const baseCards = [
                new UnitCard("步兵", 1, 2, 2, "基础步兵"),
                new UnitCard("坦克", 3, 4, 3, "重装甲单位"),
                new UnitCard("侦察兵", 2, 3, 1, "高攻低血"),
                new UnitCard("工程师", 2, 1, 4, "肉盾单位")
            ];
            const deck1 = [];
            const deck2 = [];
            for (let i = 0; i < 5; i++) {
                for (const c of baseCards) {
                    deck1.push(new UnitCard(c.name, c.cost, c.attack, c.health, c.desc));
                    deck2.push(new UnitCard(c.name, c.cost, c.attack, c.health, c.desc));
                }
            }
            shuffle(deck1);
            shuffle(deck2);
            return [deck1, deck2];
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function initGame() {
            const [deck1, deck2] = createDecks();
            p1 = new Player("玩家");
            p2 = new Player("电脑");
            p1.deck = deck1;
            p2.deck = deck2;
            turn = 1;
            gameOver = false;
            logEntries = [];
            addLog("=== KARDS 简化卡牌游戏启动 ===");
            p1.draw(4);
            p2.draw(4);
            // 第一回合开始 (玩家先手)
            startTurn(p1, p2);
        }

        // 当前攻击方 / 防守方
        let currentAttacker, currentDefender;

        function startTurn(attacker, defender) {
            if (gameOver) return;
            currentAttacker = attacker;
            currentDefender = defender;
            attacker.resetMana();
            attacker.draw();
            attacker.enableAttack();
            addLog(`===== 【${attacker.name}】 第${turn}回合 =====`);
            renderAll();
        }

        // 执行指令
        function executeCommand(cmdStr) {
            if (gameOver) {
                addLog("⚠️ 游戏已结束，请刷新重开");
                renderAll();
                return;
            }
            const parts = cmdStr.trim().split(/\s+/);
            if (parts.length === 0) return;
            const cmd = parts[0].toLowerCase();
            const attacker = currentAttacker;
            const defender = currentDefender;
            if (!attacker || !defender) return;

            if (cmd === "end") {
                endCurrentTurn();
                return;
            }

            if (cmd === "play" && parts.length >= 2) {
                const idx = parseInt(parts[1], 10);
                if (isNaN(idx)) {
                    addLog("❌ 请输入有效序号");
                } else {
                    if (attacker.playCard(idx)) {
                        addLog(`✅ 出牌成功`);
                    } else {
                        addLog("❌ 费用不足或无效卡牌");
                    }
                }
                renderAll();
                return;
            }

            if (cmd === "attack" && parts.length >= 2) {
                if (attacker.field.length === 0) {
                    addLog("⚠️ 没有单位可以攻击！");
                    renderAll();
                    return;
                }
                if (parts[1] === "hq") {
                    let damage = 0;
                    for (const u of attacker.field) {
                        if (u.canAttack) damage += u.attack;
                    }
                    if (damage === 0) {
                        addLog("⚠️ 没有单位可以攻击 (可能已攻击过)");
                        renderAll();
                        return;
                    }
                    defender.hp -= damage;
                    for (const u of attacker.field) u.canAttack = false;
                    addLog(`💥 对敌方基地造成 ${damage} 点伤害！`);
                    checkGameOver();
                    renderAll();
                    return;
                } else {
                    const atkIdx = parseInt(parts[1], 10);
                    if (isNaN(atkIdx) || atkIdx < 0 || atkIdx >= attacker.field.length) {
                        addLog("❌ 无此攻击单位");
                        renderAll();
                        return;
                    }
                    const atkUnit = attacker.field[atkIdx];
                    if (!atkUnit.canAttack) {
                        addLog("⚠️ 该单位本回合不能攻击");
                        renderAll();
                        return;
                    }
                    // 选择目标 (简化: 自动选择第一个敌方单位)
                    if (defender.field.length === 0) {
                        addLog("⚠️ 敌方没有单位可攻击");
                        renderAll();
                        return;
                    }
                    // 默认攻击第一个敌方单位 (可优化)
                    const defUnit = defender.field[0];
                    // 互相伤害
                    atkUnit.takeDamage(defUnit.attack);
                    defUnit.takeDamage(atkUnit.attack);
                    atkUnit.canAttack = false;
                    addLog(`⚔️ ${atkUnit.name} ↔ ${defUnit.name} 交换伤害！`);
                    // 清理死亡
                    attacker.field = attacker.field.filter(u => u.isAlive());
                    defender.field = defender.field.filter(u => u.isAlive());
                    checkGameOver();
                    renderAll();
                    return;
                }
            }
            addLog("❌ 未知指令。可用: play [序号], attack [序号/hq], end");
            renderAll();
        }

        function endCurrentTurn() {
            if (gameOver) return;
            // 切换回合
            if (currentAttacker === p1) {
                // 轮到电脑
                startTurn(p2, p1);
            } else {
                // 轮到玩家，回合数+1
                turn++;
                startTurn(p1, p2);
            }
        }

        function checkGameOver() {
            if (p1.hp <= 0) {
                gameOver = true;
                addLog(`🏆 ${p2.name} 胜利！`);
            } else if (p2.hp <= 0) {
                gameOver = true;
                addLog(`🏆 ${p1.name} 胜利！`);
            }
            if (gameOver) {
                renderAll();
            }
        }

        // ---------- DOM 渲染 ----------
        function renderAll() {
            // 更新玩家信息
            document.getElementById('enemyName').textContent = p2.name;
            document.getElementById('enemyHp').textContent = `❤️ ${p2.hp}`;
            document.getElementById('enemyMana').textContent = `⚡ ${p2.mana}/${p2.maxMana}`;
            document.getElementById('allyName').textContent = p1.name;
            document.getElementById('allyHp').textContent = `❤️ ${p1.hp}`;
            document.getElementById('allyMana').textContent = `⚡ ${p1.mana}/${p1.maxMana}`;
            document.getElementById('turnDisplay').textContent = `回合 ${turn}`;
            document.getElementById('gameStatus').textContent = gameOver ? '🏁 已结束' : '进行中';

            // 渲染战场
            renderField('enemyField', p2.field);
            renderField('allyField', p1.field);

            // 渲染手牌
            const handContainer = document.getElementById('handContainer');
            handContainer.innerHTML = '';
            document.getElementById('handCount').textContent = `${p1.hand.length} 张`;
            if (p1.hand.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-message';
                emptyDiv.textContent = '手牌为空';
                handContainer.appendChild(emptyDiv);
            } else {
                p1.hand.forEach((card, idx) => {
                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'hand-card';
                    cardDiv.innerHTML = `<span class="cost">${card.cost}</span> ${card.name} <span style="color:#aaa;">(${card.attack}/${card.health})</span>`;
                    cardDiv.title = card.desc || card.toString();
                    handContainer.appendChild(cardDiv);
                });
            }

            // 日志
            const logContainer = document.getElementById('logContainer');
            logContainer.innerHTML = '';
            // 显示最近10条
            const recent = logEntries.slice(-12);
            for (const entry of recent) {
                const div = document.createElement('div');
                div.textContent = entry;
                logContainer.appendChild(div);
            }
            logContainer.scrollTop = logContainer.scrollHeight;

            // 如果游戏结束，禁用输入?
            // 不强制禁用，但指令会提示
        }

        function renderField(elementId, units) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            if (units.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-message';
                emptyDiv.textContent = '战场为空';
                container.appendChild(emptyDiv);
            } else {
                for (const unit of units) {
                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'unit-card';
                    const canAtk = unit.canAttack ? '⚔️' : '🛡️';
                    cardDiv.innerHTML = `
                        <div class="name">${unit.name}</div>
                        <div class="stats">
                            <span>⚔️${unit.attack}</span>
                            <span>❤️${unit.health}</span>
                            <span style="font-size:0.7rem;">${canAtk}</span>
                        </div>
                    `;
                    cardDiv.title = unit.desc || unit.toString();
                    container.appendChild(cardDiv);
                }
            }
        }

        function addLog(msg) {
            logEntries.push(msg);
            if (logEntries.length > 50) logEntries.shift();
        }

        // ---------- 事件绑定 ----------
        document.addEventListener('DOMContentLoaded', function() {
            initGame();

            const input = document.getElementById('commandInput');
            const executeBtn = document.getElementById('executeBtn');
            const endBtn = document.getElementById('endTurnBtn');

            function handleExecute() {
                const cmd = input.value.trim();
                if (cmd) {
                    executeCommand(cmd);
                    input.value = '';
                    input.focus();
                }
            }

            executeBtn.addEventListener('click', handleExecute);
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleExecute();
                }
            });
            endBtn.addEventListener('click', function() {
                if (!gameOver) {
                    executeCommand('end');
                } else {
                    addLog('游戏已结束，无法结束回合');
                    renderAll();
                }
                input.focus();
            });

            // 初始渲染
            renderAll();
        });
    })();
</script>
</body>
</html>
