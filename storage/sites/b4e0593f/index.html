<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡通瞄准射击小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: #87CEEB;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }
        h1 {
            color: #fff;
            text-shadow: 2px 2px 4px #333;
            margin-bottom: 10px;
        }
        .tip {
            color: #222;
            font-size: 16px;
            margin-bottom: 10px;
        }
        #gameCanvas {
            border: 8px solid #FFB90F;
            border-radius: 12px;
            background: #90EE90;
            cursor: none; /* 隐藏默认鼠标 */
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <h1>🎯 卡通瞄准射击</h1>
    <div class="tip">左键 = 射击 | 右键 = 开镜瞄准</div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let mouseX = 0, mouseY = 0;
        let isAim = false; // 是否瞄准状态
        let targets = [];  // 目标数组
        let bullets = [];  // 子弹数组
        let score = 0;

        // 卡通目标类
        class Target {
            constructor() {
                this.r = 30;
                this.x = Math.random() * (canvas.width - 80) + 40;
                this.y = Math.random() * (canvas.height - 80) + 40;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                // 边界反弹
                if(this.x < this.r || this.x > canvas.width - this.r) this.speedX *= -1;
                if(this.y < this.r || this.y > canvas.height - this.r) this.speedY *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
                // 卡通表情
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x - 10, this.y - 8, 4, 0, Math.PI * 2);
                ctx.arc(this.x + 10, this.y - 8, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x, this.y + 12, 10, 0.2, Math.PI - 0.2);
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // 子弹类
        class Bullet {
            constructor(x, y, tx, ty) {
                this.x = x;
                this.y = y;
                const angle = Math.atan2(ty - y, tx - x);
                this.vx = Math.cos(angle) * 8;
                this.vy = Math.sin(angle) * 8;
                this.r = 6;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = '#FF4500';
                ctx.fill();
            }
            outOfScreen() {
                return this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height;
            }
        }

        // 初始化目标
        function initTarget() {
            for(let i = 0; i < 6; i++) {
                targets.push(new Target());
            }
        }

        // 绘制准星/瞄准镜
        function drawCross() {
            const cx = mouseX;
            const cy = mouseY;
            if(isAim) {
                // 右键瞄准：放大瞄准镜样式
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 2;
                // 外圈
                ctx.beginPath();
                ctx.arc(cx, cy, 40, 0, Math.PI * 2);
                ctx.stroke();
                // 十字线
                ctx.beginPath();
                ctx.moveTo(cx - 40, cy);
                ctx.lineTo(cx + 40, cy);
                ctx.moveTo(cx, cy - 40);
                ctx.lineTo(cx, cy + 40);
                ctx.stroke();
                // 中心点
                ctx.fillStyle = '#f00';
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // 普通准星
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(cx, cy, 15, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx - 18, cy);
                ctx.lineTo(cx + 18, cy);
                ctx.moveTo(cx, cy - 18);
                ctx.lineTo(cx, cy + 18);
                ctx.stroke();
            }
        }

        // 碰撞检测
        function checkHit() {
            bullets.forEach((b, bi) => {
                targets.forEach((t, ti) => {
                    const dx = b.x - t.x;
                    const dy = b.y - t.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < t.r + b.r) {
                        // 击中目标
                        targets.splice(ti, 1);
                        targets.push(new Target());
                        bullets.splice(bi, 1);
                        score += 10;
                    }
                });
            });
        }

        // 游戏主循环
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制分数
            ctx.fillStyle = '#000';
            ctx.font = '24px 微软雅黑';
            ctx.fillText(`分数：${score}`, 20, 35);

            // 更新绘制目标
            targets.forEach(t => {
                t.update();
                t.draw();
            });

            // 更新绘制子弹
            bullets.forEach((b, idx) => {
                b.update();
                b.draw();
                if(b.outOfScreen()) bullets.splice(idx, 1);
            });

            // 检测击中
            checkHit();

            // 绘制准星
            drawCross();

            requestAnimationFrame(gameLoop);
        }

        // 鼠标移动
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        // 左键射击
        canvas.addEventListener('mousedown', e => {
            if(e.button === 0) { // 左键
                bullets.push(new Bullet(mouseX, mouseY, mouseX, mouseY));
            }
        });

        // 右键瞄准
        canvas.addEventListener('contextmenu', e => {
            e.preventDefault(); // 阻止浏览器右键菜单
            isAim = true;
        });

        // 松开右键取消瞄准
        canvas.addEventListener('mouseup', e => {
            if(e.button === 2) {
                isAim = false;
            }
        });

        // 启动游戏
        initTarget();
        gameLoop();
    </script>
</body>
</html>
