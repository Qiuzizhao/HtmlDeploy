<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>慢节奏休闲音游</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#1a1a22;display:flex;justify-content:center}
        #game{width:480px;height:700px;position:relative;overflow:hidden;background:#222733}
        .line{position:absolute;bottom:120px;width:100%;height:4px;background:#4cf}
        .key{position:absolute;width:110px;height:30px;border-radius:6px;background:#39f;top:-40px}
        .btn{position:absolute;bottom:30px;width:110px;height:70px;border:2px solid #5cf;border-radius:8px}
        #b1{left:10px}#b2{left:130px}#b3{left:250px}#b4{left:370px}
    </style>
</head>
<body>
<div id="game">
    <div class="line"></div>
    <div class="btn" id="b1"></div>
    <div class="btn" id="b2"></div>
    <div class="btn" id="b3"></div>
    <div class="btn" id="b4"></div>
</div>

<script>
const game = document.getElementById("game");
// 四键横坐标
const pos = [10,130,250,370];
// 慢速配置：下落速度px/帧，数值越小下落越慢
const fallSpeed = 1.2;
// 慢速谱面 [按键序号, 出现时间ms]
const noteData = [
    [0,800],[1,1600],[2,2500],[3,3300],
    [0,4500],[2,5400],[1,6300],[3,7200]
];
let noteList = [];
let time = 0;
let score = 0;
let spawnIdx = 0;

// 生成音符
function addNote(idx){
    let div = document.createElement("div");
    div.className="key";
    div.style.left = pos[idx]+"px";
    game.appendChild(div);
    noteList.push({dom:div,key:idx,y:-40});
}

// 键盘监听 A S K L
const keyMap = {65:0,83:1,75:2,76:3};
document.onkeydown=e=>{
    let k = keyMap[e.keyCode];
    if(k===undefined)return;
    // 命中判定线范围：100~140y
    for(let i=noteList.length-1;i>=0;i--){
        let n = noteList[i];
        if(n.key===k && n.y>90&&n.y<150){
            score+=100;
            n.dom.remove();
            noteList.splice(i,1);
            break;
        }
    }
}

// 游戏主循环
function loop(){
    time+=16;
    // 按时间生成音符
    while(spawnIdx<noteData.length && noteData[spawnIdx][1]<time){
        addNote(noteData[spawnIdx][0]);
        spawnIdx++;
    }
    // 更新音符位置
    for(let i=noteList.length-1;i>=0;i--){
        let n=noteList[i];
        n.y+=fallSpeed;
        n.dom.style.top = n.y+"px";
        // 超出底部移除
        if(n.y>720){
            n.dom.remove();
            noteList.splice(i,1);
        }
    }
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
