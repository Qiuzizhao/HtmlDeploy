<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>经典贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            color: white;
        }

        h1 {
            margin-bottom: 15px;
            color: #4CAF50;
        }

        #score {
            font-size: 20px;
            margin-bottom: 10px;
        }

        #gameCanvas {
            border: 3px solid #4CAF50;
            background-color: #000;
        }

        #tips {
            margin-top: 15px;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇小游戏</h1>
    <div id="score">得分: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="tips">操作：方向键 ↑ ↓ ← → 控制移动</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;
        const MOVE_INTERVAL = 100;

        let snake = [{x: 10, y: 10}];
        let dx = 0;
        let dy = 0;
        let food = {x: 15, y: 15};
        let score = 0;
        let gameOver = false;
        let gameLoopId = null;

        let pendingDirection = null;

        function init() {
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            score = 0;
            gameOver = false;
            pendingDirection = null;
            scoreElement.textContent = '得分: 0';
            generateFood();
            draw();
            if (gameLoopId) {
                clearInterval(gameLoopId);
            }
            gameLoopId = setInterval(update, MOVE_INTERVAL);
        }

        function update() {
            if (gameOver) return;

            if (pendingDirection) {
                const newDx = pendingDirection.dx;
                const newDy = pendingDirection.dy;
                if (!(dx + newDx === 0 && dy + newDy === 0)) {
                    dx = newDx;
                    dy = newDy;
                }
                pendingDirection = null;
            }

            if (dx === 0 && dy === 0) {
                draw();
                return;
            }

            const newHead = {x: snake[0].x + dx, y: snake[0].y + dy};

            if (newHead.x < 0 || newHead.x >= TILE_COUNT || newHead.y < 0 || newHead.y >= TILE_COUNT) {
                endGame();
                return;
            }

            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(newHead);

            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                scoreElement.textContent = '得分: ' + score;
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#4CAF50';
            for (let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                ctx.fillRect(seg.x * GRID_SIZE, seg.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
            }

            ctx.fillStyle = '#ff3333';
            ctx.fillRect(food.x * GRID_SIZE, food.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
        }

        function generateFood() {
            let newFoodX, newFoodY;
            let overlaps;
            let attempts = 0;
            const maxAttempts = TILE_COUNT * TILE_COUNT;

            do {
                newFoodX = Math.floor(Math.random() * TILE_COUNT);
                newFoodY = Math.floor(Math.random() * TILE_COUNT);
                overlaps = false;
                for (let i = 0; i < snake.length; i++) {
                    if (snake[i].x === newFoodX && snake[i].y === newFoodY) {
                        overlaps = true;
                        break;
                    }
                }
                attempts++;
                if (attempts > maxAttempts) break;
            } while (overlaps);

            food.x = newFoodX;
            food.y = newFoodY;
        }

        function endGame() {
            if (gameOver) return;
            gameOver = true;
            if (gameLoopId) {
                clearInterval(gameLoopId);
                gameLoopId = null;
            }
            setTimeout(function() {
                alert('游戏结束！最终得分：' + score + '\n点击确定重新开始');
                init();
            }, 50);
        }

        function changeDirection(event) {
            if (gameOver) return;

            const key = event.key;
            let newDx = 0;
            let newDy = 0;

            if (key === 'ArrowUp') {
                newDx = 0;
                newDy = -1;
            } else if (key === 'ArrowDown') {
                newDx = 0;
                newDy = 1;
            } else if (key === 'ArrowLeft') {
                newDx = -1;
                newDy = 0;
            } else if (key === 'ArrowRight') {
                newDx = 1;
                newDy = 0;
            } else {
                return;
            }

            event.preventDefault();

            const curDx = pendingDirection ? pendingDirection.dx : dx;
            const curDy = pendingDirection ? pendingDirection.dy : dy;

            if (curDx + newDx === 0 && curDy + newDy === 0) {
                return;
            }

            pendingDirection = {dx: newDx, dy: newDy};
        }

        document.addEventListener('keydown', changeDirection);

        init();
    </script>
</body>
</html>
