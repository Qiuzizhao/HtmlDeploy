!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极速摩托Pro｜精致高清摩托版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00ffcc',
                        secondary: '#ff006e',
                        dark: '#0a0e17',
                        neon: '#7b2cbf',
                        gold:'#ffd700'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-neon {text-shadow: 0 0 6px #00ffcc,0 0 12px #00ffcc;}
            .text-neon-red {text-shadow:0 0 6px #ff006e,0 0 12px #ff006e;}
            .border-neon{box-shadow:0 0 8px #00ffcc;}
            .btn-animate{transition:0.3s;}
            .btn-animate:hover{transform:translateY(-2px);box-shadow:0 0 15px #ff006e;}
            .shake{animation:shake 0.1s infinite;}
            @keyframes shake{50%{transform:translateX(3px);}}
            .pop{animation:pop 0.4s ease;}
            @keyframes pop{0%{scale:0}100%{scale:1}}
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-dark text-white font-[Orbitron] overflow-hidden select-none">
<!-- 音效资源 -->
<audio id="bgm" loop preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-fast-game-music-loop-1184.mp3">

<audio id="engine" loop preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-small-car-engine-idle-1358.mp3">

<audio id="boostSound" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-jet-engine-boost-946.mp3">

<audio id="itemGet" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3">

<audio id="crash" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-car-crash-and-explosion-1137.mp3">

<audio id="levelUp" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3">



<div class="w-full h-screen relative">
    <!-- 顶部信息栏 -->
    <div class="absolute top-3 left-4 z-20">
        <div class="text-primary text-neon text-xl">分数:<span id="score">0</span></div>
        <div class="text-secondary text-neon-red text-xl">关卡:<span id="level">1</span>/5</div>
        <div class="text-gold text-lg">金币:<span id="coin">0</span></div>
    </div>
    <div class="absolute top-3 right-4 z-20">
        <div class="text-secondary text-neon-red text-xl"><i class="fa fa-tachometer"></i> <span id="speed">0</span>Km/h</div>
        <div class="text-primary mt-1">道具: <span id="itemTip">无</span></div>
    </div>

    <!-- 开始主页 -->
    <div id="startPage" class="absolute inset-0 z-30 bg-dark/95 flex flex-col items-center justify-center">
        <h1 class="text-5xl md:text-7xl text-primary text-neon mb-6">极速摩托PRO</h1>
        <div class="flex gap-4 mb-6">
            <button id="skinBtn" class="px-5 py-2 border-neon bg-primary/20 btn-animate">🛵 皮肤商城</button>
            <button id="startGameBtn" class="px-6 py-3 bg-primary text-dark rounded-lg border-neon btn-animate text-xl">开始闯关</button>
        </div>
        <p class="text-gray-300">←→移动｜空格加速｜拾取道具获得增益</p>
        <p class="text-gray-400 mt-2">共5大关卡，通关解锁全部摩托皮肤</p>
    </div>

    <!-- 皮肤弹窗 -->
    <div id="skinBox" class="hidden absolute inset-0 z-40 bg-black/85 flex items-center justify-center">
        <div class="bg-dark p-6 rounded-lg border border-primary pop max-w-lg w-[90%]">
            <h2 class="text-2xl text-primary text-neon mb-4 text-center">摩托皮肤商店</h2>
            <div id="skinList" class="grid grid-cols-3 gap-3 mb-5"></div>
            <div class="text-center">
                <span class="text-gold">当前金币：<span id="skinCoin">0</span></span>
                <button id="closeSkin" class="ml-4 px-4 py-2 bg-secondary rounded">关闭</button>
            </div>
        </div>
    </div>

    <!-- 过关弹窗 -->
    <div id="levelWin" class="hidden absolute inset-0 z-35 bg-black/80 flex items-center justify-center">
        <div class="p-6 bg-dark border border-primary rounded-lg text-center pop">
            <h2 class="text-3xl text-primary text-neon mb-3">关卡通关！</h2>
            <p>获得金币+<span id="levelCoinReward">0</span></p>
            <button id="nextLevel" class="mt-4 px-5 py-2 bg-primary text-dark rounded">下一关</button>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div id="overBox" class="hidden absolute inset-0 z-30 bg-black/85 flex items-center justify-center">
        <div class="p-6 bg-dark border border-secondary rounded-lg text-center pop">
            <h2 class="text-3xl text-secondary text-neon-red mb-3">撞车结束</h2>
            <p>得分:<span id="overScore">0</span></p>
            <div class="flex gap-3 justify-center mt-4">
                <button id="restartBtn" class="px-4 py-2 bg-primary rounded">重新本局</button>
                <button id="homeBtn" class="px-4 py-2 bg-secondary rounded">返回首页</button>
            </div>
        </div>
    </div>

    <!-- 游戏画布 -->
    <canvas id="gameCanvas" class="w-full h-full"></canvas>

    <!-- 移动端虚拟按键 -->
    <div class="absolute bottom-8 left-0 right-0 flex justify-between px-6 md:hidden z-20">
        <button id="mobLeft" class="w-16 h-16 rounded-full border-2 border-primary bg-dark/50 text-3xl">←</button>
        <button id="mobBoost" class="w-20 h-16 rounded-full border-2 border-secondary bg-dark/50 text-xl">加速</button>
        <button id="mobRight" class="w-16 h-16 rounded-full border-2 border-primary bg-dark/50 text-3xl">→</button>
    </div>
</div>

<script>
// ==========全局音效与资源
const audio = {
    bg:document.getElementById('bgm'),
    engine:document.getElementById('engine'),
    boost:document.getElementById('boostSound'),
    get:document.getElementById('itemGet'),
    crash:document.getElementById('crash'),
    levelup:document.getElementById('levelUp')
}
// 5套摩托皮肤配置
const skinData = [
    {name:'原版红摩托',color:'#ff006e',neon:'#00ffcc',wheel:'#222222',price:0,unlock:true},
    {name:'寒冰蓝摩托',color:'#00bfff',neon:'#00ffff',wheel:'#113344',price:300,unlock:false},
    {name:'黑金赛车',color:'#333333',neon:'#ffd700',wheel:'#000000',price:500,unlock:false},
    {name:'紫电跑车',color:'#9922ff',neon:'#ff44ff',wheel:'#220033',price:800,unlock:false},
    {name:'烈焰至尊',color:'#ff3300',neon:'#ffdd00',wheel:'#331100',price:1200,unlock:false},
]
// 3种道具
const itemType = [
    {name:'护盾',color:'#00eeff',effect:'shield',desc:'5秒无敌防撞'},
    {name:'极速',color:'#ffdd00',effect:'speedUp',desc:'短暂极速加成'},
    {name:'双倍分',color:'#ff33bb',effect:'doubleScore',desc:'10秒得分翻倍'}
]
// 关卡配置 5关
const levelCfg = [
    {target:300,baseSpeed:2.2,spawnRate:1100},
    {target:600,baseSpeed:2.8,spawnRate:950},
    {target:1000,baseSpeed:3.5,spawnRate:800},
    {target:1500,baseSpeed:4.2,spawnRate:650},
    {target:2200,baseSpeed:5,spawnRate:500},
]

// dom
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
// 界面元素
const scoreDom = document.getElementById('score');
const coinDom = document.getElementById('coin');
const levelDom = document.getElementById('level');
const speedDom = document.getElementById('speed');
const itemTipDom = document.getElementById('itemTip');
const startPage = document.getElementById('startPage');
const overBox = document.getElementById('overBox');
const levelWin = document.getElementById('levelWin');
const skinBox = document.getElementById('skinBox');
const skinListDom = document.getElementById('skinList');
const skinCoinDom = document.getElementById('skinCoin');

// 游戏变量
let gameRun = false;
let score = 0;
let coin = 0;
let nowLevel = 1;
let selectSkinIdx = 0;
let skinOwn = [true,false,false,false,false];
let nowItem = null;
let itemTimer = 0;
let obstacles = [];
let items = [];
let roadLines = [];
let obstacleTimer = null;

// 摩托尺寸（加大精细绘制空间）
const bike = {x:0,y:0,w:86,h:116,moveSp:9}
// 道路
const road = {w:580,lane:3,laneW:193}
//按键
const key = {left:false,right:false,space:false}
//手机按键
const mobLeft = document.getElementById('mobLeft');
const mobRight = document.getElementById('mobRight');
const mobBoost = document.getElementById('mobBoost');

// 画布自适应
function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    road.x = canvas.width/2 - road.w/2;
    bike.x = canvas.width/2 - bike.w/2;
    bike.y = canvas.height - 160;
}
resize();
window.onresize = resize;

// 初始化皮肤面板
function initSkinUI(){
    skinListDom.innerHTML = '';
    skinCoinDom.innerText = coin;
    skinData.forEach((s,i)=>{
        const div = document.createElement('div');
        div.className = 'p-3 border rounded text-center '+ (selectSkinIdx==i?'border-primary':'border-gray-600');
        div.innerHTML = `
            <div class="h-12 rounded mb-2" style="background:${s.color};box-shadow:0 0 6px ${s.neon}"></div>
            <div class="text-sm">${s.name}</div>
            <div class="text-gold text-xs">${skinOwn[i]?'已拥有':s.price+'金币'}</div>
        `
        div.onclick = ()=>{
            if(skinOwn[i]){
                selectSkinIdx = i;
                initSkinUI();
            }else if(coin>=s.price){
                coin -= s.price;
                skinOwn[i]=true;
                selectSkinIdx=i;
                coinDom.innerText=coin;
                initSkinUI();
            }
        }
        skinListDom.appendChild(div);
    })
}

// 生成障碍物
function createObs(){
    const lv = levelCfg[nowLevel-1];
    const ranW = [75,95,115];
    const w = ranW[Math.floor(Math.random()*3)];
    const laneIdx = Math.floor(Math.random()*road.lane);
    const ox = road.x + laneIdx*road.laneW + (road.laneW-w)/2;
    obstacles.push({x:ox,y:-120,w:w,h:w+10,c:'#'+Math.floor(Math.random()*16777215).toString(16)});
    //随机生成道具
    if(Math.random()>0.65){
        const it = itemType[Math.floor(Math.random()*3)];
        const ix = road.x + Math.floor(Math.random()*3)*road.laneW +60;
        items.push({x:ix,y:-80,w:38,h:38,...it});
    }
}

// 绘制道路
function drawRoad(){
    ctx.fillStyle='#18182c';
    ctx.fillRect(road.x,0,road.w,canvas.height);
    ctx.strokeStyle='#00ffcc';
    ctx.lineWidth=5;
    ctx.strokeRect(road.x,0,road.w,canvas.height);
    //车道虚线
    ctx.setLineDash([35,35]);
    ctx.strokeStyle='#fff';
    ctx.lineWidth=3;
    for(let i=1;i<road.lane;i++){
        const lx = road.x+i*road.laneW;
        ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,canvas.height);ctx.stroke();
    }
    ctx.setLineDash([]);
}
//道路标线初始化
function initLine(){
    roadLines=[];
    for(let i=0;i<22;i++) roadLines.push({x:road.x+road.w/2-5,y:i*90,w:10,h:45})
}
function drawLine(speed){
    roadLines.forEach(l=>{
        ctx.fillStyle='#fff';
        ctx.fillRect(l.x,l.y,l.w,l.h);
        l.y += speed;
        if(l.y>canvas.height) l.y=-60;
    })
}

// ==========【重写精致摩托车绘制】分层绘制：轮胎/车架/油箱/车座/车灯/排气管 ==========
function drawBike(){
    const s = skinData[selectSkinIdx];
    const x = bike.x;
    const y = bike.y;
    const w = bike.w;
    const h = bike.h;

    // 整体霓虹外发光
    ctx.shadowColor = s.neon;
    ctx.shadowBlur = 20;

    // 1.前后轮胎
    ctx.fillStyle = s.wheel;
    //前轮
    ctx.beginPath();
    ctx.arc(x+12, y+h-12, 14,0,Math.PI*2);
    ctx.fill();
    //后轮
    ctx.beginPath();
    ctx.arc(x+w-12, y+h-12,14,0,Math.PI*2);
    ctx.fill();

    //2.车架主体
    ctx.fillStyle = s.color;
    //车身大壳体
    ctx.fillRect(x+6,y+22,w-12,h-38);

    //3.油箱高光（亮白色装饰）
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillRect(x+12,y+28,w-24,16);

    //4.坐垫
    ctx.fillStyle="#111111";
    ctx.fillRect(x+16,y+52,w-32,14);

    //5.车头大灯
    ctx.fillStyle="#ffffff";
    ctx.beginPath();
    ctx.arc(x+12,y+28,7,0,Math.PI*2);
    ctx.fill();

    //6.排气管
    ctx.fillStyle="#555555";
    ctx.fillRect(x+w-18,y+68,12,28);

    //7.车把
    ctx.fillStyle="#222";
    ctx.fillRect(x+4,y+12,w-8,5);

    ctx.shadowBlur=0;
}

//绘制障碍物&道具
function drawObsAndItem(speed){
    //障碍物
    for(let i=obstacles.length-1;i>=0;i--){
        const o = obstacles[i];
        ctx.shadowColor=o.c;
        ctx.shadowBlur=12;
        ctx.fillStyle=o.c;
        ctx.fillRect(o.x,o.y,o.w,o.h);
        ctx.shadowBlur=0;
        o.y+=speed;
        //出屏幕加分
        if(o.y>canvas.height){
            obstacles.splice(i,1);
            const add = nowItem?.effect=='doubleScore'?20:10;
            score += add;
            scoreDom.innerText=score;
            //判断关卡通关
            if(score>=levelCfg[nowLevel-1].target){
                levelComplete();
            }
        }
        //碰撞检测（护盾免疫）
        if(nowItem?.effect!=='shield'){
            if(bike.x<bike.w+o.x && bike.x+bike.w>o.x && bike.y+bike.h>o.y && bike.y<o.y+o.h){
                gameOver();
                return;
            }
        }
    }
    //道具
    for(let i=items.length-1;i>=0;i--){
        const it = items[i];
        ctx.shadowColor=it.color;
        ctx.shadowBlur=15;
        ctx.fillStyle=it.color;
        ctx.beginPath();ctx.arc(it.x+it.w/2,it.y+it.h/2,it.w/2,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
        it.y+=speed;
        //拾取道具
        if(bike.x+bike.w>it.x && bike.x<it.x+it.w && bike.y+bike.h>it.y && bike.y<it.y+it.h){
            audio.get.currentTime=0;audio.get.play();
            items.splice(i,1);
            nowItem = it;
            itemTipDom.innerText = it.name;
            //持续时间
            itemTimer = it.effect=='doubleScore'?600:(it.effect=='shield'?300:200);
            continue;
        }
        if(it.y>canvas.height) items.splice(i,1);
    }
}

//更新摩托位置
function updateBike(speedBase){
    if(key.left && bike.x>road.x+12) bike.x -= bike.moveSp;
    if(key.right && bike.x<road.x+road.w-bike.w-12) bike.x += bike.moveSp;
    let realSpeed = speedBase;
    //道具加速
    if(nowItem?.effect=='speedUp') realSpeed *=1.6;
    //空格加速
    if(key.space){
        realSpeed +=1.2;
        canvas.classList.add('shake');
        if(audio.boost.paused){audio.boost.currentTime=0;audio.boost.play()}
    }else canvas.classList.remove('shake');
    speedDom.innerText = Math.floor(realSpeed*19);
    //倒计时道具
    if(itemTimer>0){
        itemTimer--;
    }else{
        nowItem=null;
        itemTipDom.innerText='无';
        audio.boost.pause();
    }
    return realSpeed;
}

//通关关卡
function levelComplete(){
    gameRun=false;
    clearInterval(obstacleTimer);
    audio.levelup.play();
    const reward = nowLevel*120;
    coin += reward;
    coinDom.innerText=coin;
    document.getElementById('levelCoinReward').innerText=reward;
    levelWin.classList.remove('hidden');
    audio.engine.pause();
}

//下一关
document.getElementById('nextLevel').onclick=()=>{
    levelWin.classList.add('hidden');
    if(nowLevel<5){
        nowLevel++;
        levelDom.innerText=nowLevel;
    }else{
        alert('恭喜全部通关！解锁全部皮肤！');
        skinOwn=[true,true,true,true,true];
        initSkinUI();
        backHome();
        return;
    }
    startNewRound();
}

//游戏结束
function gameOver(){
    gameRun=false;
    clearInterval(obstacleTimer);
    audio.crash.play();
    audio.engine.pause();
    document.getElementById('overScore').innerText=score;
    overBox.classList.remove('hidden');
}

//新一局初始化
function startNewRound(){
    score=0;
    obstacles=[];items=[];nowItem=null;itemTipDom.innerText='无';
    const lv = levelCfg[nowLevel-1];
    scoreDom.innerText=score;
    initLine();
    bike.x = canvas.width/2 - bike.w/2;
    //生成障碍物定时器
    clearInterval(obstacleTimer);
    obstacleTimer = setInterval(createObs,lv.spawnRate);
    gameRun=true;
    audio.engine.volume=0.3;
    audio.engine.play();
    gameLoop();
}

//游戏主循环
function gameLoop(){
    if(!gameRun)return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    //星空背景
    ctx.fillStyle='#fff';
    for(let i=0;i<80;i++){
        ctx.beginPath();ctx.arc(Math.random()*canvas.width,Math.random()*canvas.height,Math.random()*1.8,0,Math.PI*2);ctx.fill();
    }
    const lvSet = levelCfg[nowLevel-1];
    let sp = updateBike(lvSet.baseSpeed);
    drawRoad();
    drawLine(sp);
    drawObsAndItem(sp);
    drawBike();
    requestAnimationFrame(gameLoop);
}

//返回首页
function backHome(){
    overBox.classList.add('hidden');
    startPage.classList.remove('hidden');
    audio.bgm.play();
    audio.engine.pause();
}

//按键绑定
document.addEventListener('keydown',e=>{
    if(e.key=='ArrowLeft')key.left=true;
    if(e.key=='ArrowRight')key.right=true;
    if(e.key==' ')key.space=true;
})
document.addEventListener('keyup',e=>{
    if(e.key=='ArrowLeft')key.left=false;
    if(e.key=='ArrowRight')key.right=false;
    if(e.key==' ')key.space=false;
})
//手机触控
mobLeft.ontouchstart=()=>key.left=true;mobLeft.ontouchend=()=>key.left=false;
mobRight.ontouchstart=()=>key.right=true;mobRight.ontouchend=()=>key.right=false;
mobBoost.ontouchstart=()=>key.space=true;mobBoost.ontouchend=()=>key.space=false;

//按钮事件
document.getElementById('startGameBtn').onclick=()=>{
    startPage.classList.add('hidden');
    audio.bgm.pause();
    startNewRound();
}
document.getElementById('skinBtn').onclick=()=>{skinBox.classList.remove('hidden');initSkinUI();}
document.getElementById('closeSkin').onclick=()=>skinBox.classList.add('hidden');
document.getElementById('restartBtn').onclick=()=>{overBox.classList.add('hidden');startNewRound();}
document.getElementById('homeBtn').onclick=backHome;

//初始化
initSkinUI();
audio.bgm.volume=0.2;
audio.bgm.play();
</script>
</body>
</html>
