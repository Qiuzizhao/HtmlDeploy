<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极速摩托Pro｜精致高清摩托版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00ffcc',
                        secondary: '#ff006e',
                        dark: '#0a0e17',
                        neon: '#7b2cbf',
                        gold: '#ffd700'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-neon {
                text-shadow: 0 0 6px #00ffcc, 0 0 12px #00ffcc;
            }
            .text-neon-red {
                text-shadow: 0 0 6px #ff006e, 0 0 12px #ff006e;
            }
            .border-neon {
                box-shadow: 0 0 8px #00ffcc;
            }
            .btn-animate {
                transition: transform 0.3s ease, box-shadow 0.3s ease;
            }
            .btn-animate:hover {
                transform: translateY(-2px);
                box-shadow: 0 0 15px #ff006e;
            }
            .shake {
                animation: shake 0.1s infinite;
            }
            @keyframes shake {
                50% {
                    transform: translateX(3px);
                }
            }
            .pop {
                animation: pop 0.4s ease;
            }
            @keyframes pop {
                0% {
                    scale: 0;
                }
                100% {
                    scale: 1;
                }
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-dark text-white font-[Orbitron] overflow-hidden select-none touch-none">
    <!-- 音效资源 -->
    <audio id="bgm" loop preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-fast-game-music-loop-1184.mp3" type="audio/mpeg">
    </audio>
    <audio id="engine" loop preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-small-car-engine-idle-1358.mp3" type="audio/mpeg">
    </audio>
    <audio id="boostSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-jet-engine-boost-946.mp3" type="audio/mpeg">
    </audio>
    <audio id="itemGet" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3" type="audio/mpeg">
    </audio>
    <audio id="crash" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-car-crash-and-explosion-1137.mp3" type="audio/mpeg">
    </audio>
    <audio id="levelUp" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3" type="audio/mpeg">
    </audio>

    <div class="w-full h-screen relative">
        <!-- 顶部信息栏 -->
        <div class="absolute top-3 left-4 z-20 pointer-events-none">
            <div class="text-primary text-neon text-xl">分数:<span id="score">0</span></div>
            <div class="text-secondary text-neon-red text-xl">关卡:<span id="level">1</span>/5</div>
            <div class="text-gold text-lg">金币:<span id="coin">0</span></div>
        </div>
        <div class="absolute top-3 right-4 z-20 pointer-events-none">
            <div class="text-secondary text-neon-red text-xl"><i class="fa fa-tachometer"></i> <span id="speed">0</span>Km/h</div>
            <div class="text-primary mt-1">道具: <span id="itemTip">无</span></div>
        </div>

        <!-- 开始主页 -->
        <div id="startPage" class="absolute inset-0 z-30 bg-dark/95 flex flex-col items-center justify-center">
            <h1 class="text-5xl md:text-7xl text-primary text-neon mb-6">极速摩托PRO</h1>
            <div class="flex gap-4 mb-6">
                <button id="skinBtn" class="px-5 py-2 border-neon bg-primary/20 btn-animate rounded">🛵 皮肤商城</button>
                <button id="startGameBtn" class="px-6 py-3 bg-primary text-dark rounded-lg border-neon btn-animate text-xl">开始闯关</button>
            </div>
            <p class="text-gray-300">← → 移动 ｜ 空格加速 ｜ 拾取道具获得增益</p>
            <p class="text-gray-400 mt-2">共5大关卡，通关解锁全部摩托皮肤</p>
        </div>

        <!-- 皮肤弹窗 -->
        <div id="skinBox" class="hidden absolute inset-0 z-40 bg-black/85 flex items-center justify-center">
            <div class="bg-dark p-6 rounded-lg border border-primary pop max-w-lg w-[90%]">
                <h2 class="text-2xl text-primary text-neon mb-4 text-center">摩托皮肤商店</h2>
                <div id="skinList" class="grid grid-cols-3 gap-3 mb-5"></div>
                <div class="text-center">
                    <span class="text-gold">当前金币：<span id="skinCoin">0</span></span>
                    <button id="closeSkin" class="ml-4 px-4 py-2 bg-secondary rounded">关闭</button>
                </div>
            </div>
        </div>

        <!-- 过关弹窗 -->
        <div id="levelWin" class="hidden absolute inset-0 z-35 bg-black/80 flex items-center justify-center">
            <div class="p-6 bg-dark border border-primary rounded-lg text-center pop">
                <h2 class="text-3xl text-primary text-neon mb-3">关卡通关！</h2>
                <p>获得金币+<span id="levelCoinReward">0</span></p>
                <button id="nextLevel" class="mt-4 px-5 py-2 bg-primary text-dark rounded">下一关</button>
            </div>
        </div>

        <!-- 游戏结束弹窗 -->
        <div id="overBox" class="hidden absolute inset-0 z-30 bg-black/85 flex items-center justify-center">
            <div class="p-6 bg-dark border border-secondary rounded-lg text-center pop">
                <h2 class="text-3xl text-secondary text-neon-red mb-3">撞车结束</h2>
                <p>得分:<span id="overScore">0</span></p>
                <div class="flex gap-3 justify-center mt-4">
                    <button id="restartBtn" class="px-4 py-2 bg-primary rounded">重新本局</button>
                    <button id="homeBtn" class="px-4 py-2 bg-secondary rounded">返回首页</button>
                </div>
            </div>
        </div>

        <!-- 游戏画布 -->
        <canvas id="gameCanvas" class="w-full h-full"></canvas>

        <!-- 移动端虚拟按键 -->
        <div class="absolute bottom-8 left-0 right-0 flex justify-between px-6 md:hidden z-20 pointer-events-none">
            <button id="mobLeft" class="w-16 h-16 rounded-full border-2 border-primary bg-dark/50 text-3xl pointer-events-auto">←</button>
            <button id="mobBoost" class="w-20 h-16 rounded-full border-2 border-secondary bg-dark/50 text-xl pointer-events-auto">加速</button>
            <button id="mobRight" class="w-16 h-16 rounded-full border-2 border-primary bg-dark/50 text-3xl pointer-events-auto">→</button>
        </div>
    </div>

    <script>
        // ============================================================
        //  全局配置与状态
        // ============================================================

        // 5 套摩托皮肤
        const SKIN_DATA = [
            { name: '原版红摩托', color: '#ff006e', neon: '#00ffcc', wheel: '#222222', price: 0, unlock: true },
            { name: '寒冰蓝摩托', color: '#00bfff', neon: '#00ffff', wheel: '#113344', price: 300, unlock: false },
            { name: '黑金赛车', color: '#333333', neon: '#ffd700', wheel: '#000000', price: 500, unlock: false },
            { name: '紫电跑车', color: '#9922ff', neon: '#ff44ff', wheel: '#220033', price: 800, unlock: false },
            { name: '烈焰至尊', color: '#ff3300', neon: '#ffdd00', wheel: '#331100', price: 1200, unlock: false },
        ];

        // 3 种道具
        const ITEM_TYPES = [
            { name: '护盾', color: '#00eeff', effect: 'shield', desc: '5秒无敌防撞' },
            { name: '极速', color: '#ffdd00', effect: 'speedUp', desc: '短暂极速加成' },
            { name: '双倍分', color: '#ff33bb', effect: 'doubleScore', desc: '10秒得分翻倍' }
        ];

        // 5 关配置
        const LEVEL_CFG = [
            { target: 300, baseSpeed: 2.2, spawnRate: 1100 },
            { target: 600, baseSpeed: 2.8, spawnRate: 950 },
            { target: 1000, baseSpeed: 3.5, spawnRate: 800 },
            { target: 1500, baseSpeed: 4.2, spawnRate: 650 },
            { target: 2200, baseSpeed: 5.0, spawnRate: 500 },
        ];

        // 游戏状态枚举
        const STATE = {
            MENU: 'menu',
            PLAYING: 'playing',
            LEVEL_WIN: 'levelWin',
            GAME_OVER: 'gameOver'
        };

        // ============================================================
        //  DOM 引用
        // ============================================================

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const dom = {
            score: document.getElementById('score'),
            coin: document.getElementById('coin'),
            level: document.getElementById('level'),
            speed: document.getElementById('speed'),
            itemTip: document.getElementById('itemTip'),
            startPage: document.getElementById('startPage'),
            overBox: document.getElementById('overBox'),
            levelWin: document.getElementById('levelWin'),
            skinBox: document.getElementById('skinBox'),
            skinList: document.getElementById('skinList'),
            skinCoin: document.getElementById('skinCoin'),
            overScore: document.getElementById('overScore'),
            levelCoinReward: document.getElementById('levelCoinReward'),
            nextLevel: document.getElementById('nextLevel'),
            restartBtn: document.getElementById('restartBtn'),
            homeBtn: document.getElementById('homeBtn'),
            startGameBtn: document.getElementById('startGameBtn'),
            skinBtn: document.getElementById('skinBtn'),
            closeSkin: document.getElementById('closeSkin'),
            mobLeft: document.getElementById('mobLeft'),
            mobRight: document.getElementById('mobRight'),
            mobBoost: document.getElementById('mobBoost'),
        };

        // ============================================================
        //  音效管理
        // ============================================================

        const audio = {
            bg: document.getElementById('bgm'),
            engine: document.getElementById('engine'),
            boost: document.getElementById('boostSound'),
            get: document.getElementById('itemGet'),
            crash: document.getElementById('crash'),
            levelup: document.getElementById('levelUp'),
        };

        // 预加载音效，静默处理加载失败
        Object.values(audio).forEach(function(el) {
            if (el) {
                el.addEventListener('error', function() { /* 忽略加载失败 */ });
                el.load();
            }
        });

        function playSound(el) {
            if (!el) return;
            try {
                el.currentTime = 0;
                var playPromise = el.play();
                if (playPromise && typeof playPromise.catch === 'function') {
                    playPromise.catch(function() { /* 忽略自动播放限制 */ });
                }
            } catch (e) { /* 忽略 */ }
        }

        function stopSound(el) {
            if (!el) return;
            try { el.pause();
                el.currentTime = 0; } catch (e) { /* 忽略 */ }
        }

        // ============================================================
        //  游戏状态变量
        // ============================================================

        var gameState = STATE.MENU;
        var score = 0;
        var coin = 0;
        var currentLevel = 1;
        var selectedSkinIdx = 0;
        var skinOwned = [true, false, false, false, false];

        // 游戏对象
        var bike = { x: 0, y: 0, w: 86, h: 116, moveSp: 9 };
        var road = { w: 580, lane: 3, laneW: 193, x: 0 };
        var obstacles = [];
        var items = [];
        var roadLines = [];
        var obstacleTimerId = null;
        var animFrameId = null;

        // 道具状态
        var activeItem = null; // { type, timeLeft }  timeLeft 单位为秒
        var itemTimerId = null;

        // 按键
        var keys = { left: false, right: false, space: false };

        // 星空（预生成）
        var stars = [];

        // 时间增量
        var lastTimestamp = 0;
        var speedBoost = 0; // 由道具或空格提供的额外速度

        // ============================================================
        //  画布自适应
        // ============================================================

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            road.x = canvas.width / 2 - road.w / 2;
            bike.x = canvas.width / 2 - bike.w / 2;
            bike.y = canvas.height - 160;
            generateStars();
        }

        function generateStars() {
            stars = [];
            var count = Math.min(120, Math.floor(canvas.width * canvas.height / 8000));
            for (var i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.8 + 0.4,
                    a: Math.random() * 0.7 + 0.3
                });
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ============================================================
        //  道路标线初始化
        // ============================================================

        function initRoadLines() {
            roadLines = [];
            var count = Math.ceil(canvas.height / 90) + 2;
            for (var i = 0; i < count; i++) {
                roadLines.push({
                    x: road.x + road.w / 2 - 5,
                    y: i * 90,
                    w: 10,
                    h: 45
                });
            }
        }

        // ============================================================
        //  皮肤 UI
        // ============================================================

        function renderSkinUI() {
            dom.skinList.innerHTML = '';
            dom.skinCoin.textContent = coin;
            SKIN_DATA.forEach(function(s, i) {
                var div = document.createElement('div');
                div.className = 'p-3 border rounded text-center cursor-pointer transition-all duration-200 ' +
                    (selectedSkinIdx === i ? 'border-primary bg-primary/10' : 'border-gray-600 hover:border-gray-400');
                div.innerHTML =
                    '<div class="h-12 rounded mb-2" style="background:' + s.color + ';box-shadow:0 0 6px ' + s.neon + '"></div>' +
                    '<div class="text-sm">' + s.name + '</div>' +
                    '<div class="text-gold text-xs">' + (skinOwned[i] ? '✓ 已拥有' : s.price + '金币') + '</div>';
                div.addEventListener('click', function() {
                    if (skinOwned[i]) {
                        selectedSkinIdx = i;
                        renderSkinUI();
                    } else if (coin >= s.price) {
                        coin -= s.price;
                        skinOwned[i] = true;
                        selectedSkinIdx = i;
                        dom.coin.textContent = coin;
                        renderSkinUI();
                    }
                });
                dom.skinList.appendChild(div);
            });
        }

        // ============================================================
        //  道具系统
        // ============================================================

        function applyItem(item) {
            activeItem = {
                type: item,
                timeLeft: item.effect === 'doubleScore' ? 10 : (item.effect === 'shield' ? 5 : 3)
            };
            dom.itemTip.textContent = item.name;
            if (itemTimerId) { clearInterval(itemTimerId);
                itemTimerId = null; }
            itemTimerId = setInterval(function() {
                if (gameState !== STATE.PLAYING) return;
                if (activeItem) {
                    activeItem.timeLeft -= 0.1;
                    if (activeItem.timeLeft <= 0) {
                        activeItem = null;
                        dom.itemTip.textContent = '无';
                        clearInterval(itemTimerId);
                        itemTimerId = null;
                        stopSound(audio.boost);
                    }
                }
            }, 100);
        }

        function isItemActive(effect) {
            return activeItem && activeItem.type.effect === effect;
        }

        // ============================================================
        //  障碍物与道具生成
        // ============================================================

        function spawnObstacle() {
            if (gameState !== STATE.PLAYING) return;
            var cfg = LEVEL_CFG[currentLevel - 1];
            var widths = [75, 95, 115];
            var w = widths[Math.floor(Math.random() * widths.length)];
            var laneIdx = Math.floor(Math.random() * road.lane);
            var ox = road.x + laneIdx * road.laneW + (road.laneW - w) / 2;
            var color = '#' + Math.floor(Math.random() * 0x1000000).toString(16).padStart(6, '0');
            obstacles.push({ x: ox, y: -120, w: w, h: w + 10, color: color });

            // 随机生成道具
            if (Math.random() > 0.6) {
                var it = ITEM_TYPES[Math.floor(Math.random() * ITEM_TYPES.length)];
                var ix = road.x + Math.floor(Math.random() * 3) * road.laneW + 60;
                items.push({ x: ix, y: -80, w: 38, h: 38, data: it });
            }
        }

        // ============================================================
        //  绘制函数
        // ============================================================

        function drawStars(bgSpeed) {
            for (var i = 0; i < stars.length; i++) {
                var s = stars[i];
                ctx.globalAlpha = s.a;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
                s.y += bgSpeed * 0.3;
                if (s.y > canvas.height) {
                    s.y = -2;
                    s.x = Math.random() * canvas.width;
                }
            }
            ctx.globalAlpha = 1;
        }

        function drawRoadway() {
            // 路面
            ctx.fillStyle = '#18182c';
            ctx.fillRect(road.x, 0, road.w, canvas.height);
            // 边框
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 5;
            ctx.strokeRect(road.x, 0, road.w, canvas.height);
            // 车道虚线
            ctx.setLineDash([35, 35]);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            for (var i = 1; i < road.lane; i++) {
                var lx = road.x + i * road.laneW;
                ctx.beginPath();
                ctx.moveTo(lx, 0);
                ctx.lineTo(lx, canvas.height);
                ctx.stroke();
            }
            ctx.setLineDash([]);
        }

        function drawRoadLines(speed) {
            for (var i = 0; i < roadLines.length; i++) {
                var l = roadLines[i];
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(l.x, l.y, l.w, l.h);
                l.y += speed;
                if (l.y > canvas.height) {
                    l.y = -l.h - 10;
                }
            }
        }

        function drawMotorcycle() {
            var s = SKIN_DATA[selectedSkinIdx];
            var x = bike.x,
                y = bike.y,
                w = bike.w,
                h = bike.h;

            ctx.shadowColor = s.neon;
            ctx.shadowBlur = 22;

            // 前后轮胎
            ctx.fillStyle = s.wheel;
            ctx.beginPath();
            ctx.arc(x + 14, y + h - 12, 14, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + w - 14, y + h - 12, 14, 0, Math.PI * 2);
            ctx.fill();

            // 车身主体
            ctx.fillStyle = s.color;
            ctx.fillRect(x + 6, y + 22, w - 12, h - 38);

            // 油箱高光
            ctx.fillStyle = 'rgba(255,255,255,0.65)';
            ctx.fillRect(x + 12, y + 28, w - 24, 16);

            // 坐垫
            ctx.fillStyle = '#111111';
            ctx.fillRect(x + 16, y + 52, w - 32, 14);

            // 车头灯
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(x + 14, y + 28, 7, 0, Math.PI * 2);
            ctx.fill();

            // 排气管
            ctx.fillStyle = '#555555';
            ctx.fillRect(x + w - 18, y + 68, 12, 28);

            // 车把
            ctx.fillStyle = '#222222';
            ctx.fillRect(x + 4, y + 12, w - 8, 5);

            ctx.shadowBlur = 0;
        }

        function drawObstaclesAndItems(speed) {
            var bikeX = bike.x,
                bikeY = bike.y,
                bikeW = bike.w,
                bikeH = bike.h;
            var shieldActive = isItemActive('shield');
            var doubleScore = isItemActive('doubleScore');

            // 障碍物
            for (var i = obstacles.length - 1; i >= 0; i--) {
                var o = obstacles[i];
                ctx.shadowColor = o.color;
                ctx.shadowBlur = 12;
                ctx.fillStyle = o.color;
                ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.shadowBlur = 0;

                o.y += speed;

                // 移出屏幕 → 加分
                if (o.y > canvas.height) {
                    obstacles.splice(i, 1);
                    var add = doubleScore ? 20 : 10;
                    score += add;
                    dom.score.textContent = score;
                    // 通关检查
                    if (score >= LEVEL_CFG[currentLevel - 1].target && gameState === STATE.PLAYING) {
                        triggerLevelComplete();
                        return;
                    }
                    continue;
                }

                // 碰撞检测（护盾免疫）
                if (!shieldActive && gameState === STATE.PLAYING) {
                    if (bikeX < o.x + o.w && bikeX + bikeW > o.x &&
                        bikeY < o.y + o.h && bikeY + bikeH > o.y) {
                        triggerGameOver();
                        return;
                    }
                }
            }

            // 道具
            for (var j = items.length - 1; j >= 0; j--) {
                var it = items[j];
                var d = it.data;
                ctx.shadowColor = d.color;
                ctx.shadowBlur = 15;
                ctx.fillStyle = d.color;
                ctx.beginPath();
                ctx.arc(it.x + it.w / 2, it.y + it.h / 2, it.w / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                it.y += speed;

                // 拾取
                if (bikeX + bikeW > it.x && bikeX < it.x + it.w &&
                    bikeY + bikeH > it.y && bikeY < it.y + it.h) {
                    items.splice(j, 1);
                    playSound(audio.get);
                    applyItem(d);
                    continue;
                }

                if (it.y > canvas.height) {
                    items.splice(j, 1);
                }
            }
        }

        // ============================================================
        //  游戏逻辑
        // ============================================================

        function updateBike(deltaTime) {
            var moveAmount = bike.moveSp * deltaTime * 60;
            if (keys.left && bike.x > road.x + 12) bike.x -= moveAmount;
            if (keys.right && bike.x < road.x + road.w - bike.w - 12) bike.x += moveAmount;

            var cfg = LEVEL_CFG[currentLevel - 1];
            var sp = cfg.baseSpeed;

            // 道具加速
            if (isItemActive('speedUp')) sp *= 1.6;

            // 空格键额外加速
            if (keys.space) {
                sp += 1.2;
                canvas.classList.add('shake');
                if (audio.boost.paused) {
                    playSound(audio.boost);
                }
            } else {
                canvas.classList.remove('shake');
                if (!isItemActive('speedUp')) {
                    stopSound(audio.boost);
                }
            }

            // 显示速度
            dom.speed.textContent = Math.floor(sp * 19);
            return sp;
        }

        function triggerLevelComplete() {
            if (gameState !== STATE.PLAYING) return;
            gameState = STATE.LEVEL_WIN;
            clearInterval(obstacleTimerId);
            obstacleTimerId = null;
            if (itemTimerId) { clearInterval(itemTimerId);
                itemTimerId = null; }
            stopSound(audio.engine);
            stopSound(audio.boost);
            playSound(audio.levelup);

            var reward = currentLevel * 120;
            coin += reward;
            dom.coin.textContent = coin;
            dom.levelCoinReward.textContent = reward;
            dom.levelWin.classList.remove('hidden');
        }

        function triggerGameOver() {
            if (gameState !== STATE.PLAYING) return;
            gameState = STATE.GAME_OVER;
            clearInterval(obstacleTimerId);
            obstacleTimerId = null;
            if (itemTimerId) { clearInterval(itemTimerId);
                itemTimerId = null; }
            stopSound(audio.engine);
            stopSound(audio.boost);
            playSound(audio.crash);

            dom.overScore.textContent = score;
            dom.overBox.classList.remove('hidden');
            canvas.classList.remove('shake');
        }

        // ============================================================
        //  游戏循环
        // ============================================================

        function gameLoop(timestamp) {
            if (gameState !== STATE.PLAYING) {
                animFrameId = null;
                return;
            }

            var deltaTime = 0;
            if (lastTimestamp > 0) {
                deltaTime = Math.min((timestamp - lastTimestamp) / 1000, 0.05);
            }
            lastTimestamp = timestamp;

            // 清屏
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 星空背景
            var cfg = LEVEL_CFG[currentLevel - 1];
            drawStars(cfg.baseSpeed);

            // 更新 & 绘制道路
            var speed = updateBike(deltaTime);
            drawRoadway();
            drawRoadLines(speed);

            // 障碍物 & 道具（含碰撞检测）
            drawObstaclesAndItems(speed);

            // 绘制摩托车
            drawMotorcycle();

            animFrameId = requestAnimationFrame(gameLoop);
        }

        // ============================================================
        //  游戏控制
        // ============================================================

        function startNewRound() {
            // 重置状态
            score = 0;
            obstacles = [];
            items = [];
            activeItem = null;
            dom.itemTip.textContent = '无';
            dom.score.textContent = score;
            dom.speed.textContent = '0';
            canvas.classList.remove('shake');

            // 重置位置
            bike.x = canvas.width / 2 - bike.w / 2;
            initRoadLines();

            // 清除旧定时器
            if (obstacleTimerId) { clearInterval(obstacleTimerId);
                obstacleTimerId = null; }
            if (itemTimerId) { clearInterval(itemTimerId);
                itemTimerId = null; }
            if (animFrameId) { cancelAnimationFrame(animFrameId);
                animFrameId = null; }
            stopSound(audio.boost);

            gameState = STATE.PLAYING;
            var cfg = LEVEL_CFG[currentLevel - 1];
            obstacleTimerId = setInterval(spawnObstacle, cfg.spawnRate);

            // 播放引擎音效
            audio.engine.volume = 0.3;
            audio.engine.loop = true;
            var p = audio.engine.play();
            if (p && typeof p.catch === 'function') { p.catch(function() {}); }

            lastTimestamp = 0;
            if (animFrameId) cancelAnimationFrame(animFrameId);
            animFrameId = requestAnimationFrame(gameLoop);
        }

        function goHome() {
            gameState = STATE.MENU;
            dom.overBox.classList.add('hidden');
            dom.levelWin.classList.add('hidden');
            dom.skinBox.classList.add('hidden');
            dom.startPage.classList.remove('hidden');

            if (obstacleTimerId) { clearInterval(obstacleTimerId);
                obstacleTimerId = null; }
            if (itemTimerId) { clearInterval(itemTimerId);
                itemTimerId = null; }
            if (animFrameId) { cancelAnimationFrame(animFrameId);
                animFrameId = null; }
            stopSound(audio.engine);
            stopSound(audio.boost);
            canvas.classList.remove('shake');

            audio.bgm.volume = 0.2;
            audio.bgm.loop = true;
            var p = audio.bgm.play();
            if (p && typeof p.catch === 'function') { p.catch(function() {}); }
        }

        // ============================================================
        //  事件绑定
        // ============================================================

        // 键盘
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') { keys.left = true;
                e.preventDefault(); }
            if (e.key === 'ArrowRight') { keys.right = true;
                e.preventDefault(); }
            if (e.key === ' ') { keys.space = true;
                e.preventDefault(); }
        });
        document.addEventListener('keyup', function(e) {
            if (e.key === 'ArrowLeft') { keys.left = false;
                e.preventDefault(); }
            if (e.key === 'ArrowRight') { keys.right = false;
                e.preventDefault(); }
            if (e.key === ' ') { keys.space = false;
                e.preventDefault(); }
        });

        // 移动端触控（同时支持 mouse 事件以兼容部分设备）
        function bindMobileButton(el, keyName) {
            if (!el) return;
            var start = function(e) { e.preventDefault();
                keys[keyName] = true; };
            var end = function(e) { e.preventDefault();
                keys[keyName] = false; };
            el.addEventListener('touchstart', start, { passive: false });
            el.addEventListener('touchend', end, { passive: false });
            el.addEventListener('touchcancel', end, { passive: false });
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', end);
            el.addEventListener('mouseleave', end);
        }
        bindMobileButton(dom.mobLeft, 'left');
        bindMobileButton(dom.mobRight, 'right');
        bindMobileButton(dom.mobBoost, 'space');

        // --- UI 按钮 ---

        dom.startGameBtn.addEventListener('click', function() {
            dom.startPage.classList.add('hidden');
            stopSound(audio.bg);
            currentLevel = 1;
            dom.level.textContent = currentLevel;
            startNewRound();
        });

        dom.skinBtn.addEventListener('click', function() {
            dom.skinBox.classList.remove('hidden');
            renderSkinUI();
        });

        dom.closeSkin.addEventListener('click', function() {
            dom.skinBox.classList.add('hidden');
        });

        dom.nextLevel.addEventListener('click', function() {
            dom.levelWin.classList.add('hidden');
            if (currentLevel < 5) {
                currentLevel++;
                dom.level.textContent = currentLevel;
                startNewRound();
            } else {
                // 全部通关
                skinOwned = [true, true, true, true, true];
                renderSkinUI();
                alert('🏆 恭喜全部通关！已解锁全部皮肤！');
                goHome();
            }
        });

        dom.restartBtn.addEventListener('click', function() {
            dom.overBox.classList.add('hidden');
            startNewRound();
        });

        dom.homeBtn.addEventListener('click', function() {
            dom.overBox.classList.add('hidden');
            goHome();
        });

        // 点击皮肤弹窗外部关闭
        dom.skinBox.addEventListener('click', function(e) {
            if (e.target === dom.skinBox) dom.skinBox.classList.add('hidden');
        });

        // 防止画布上右键菜单
        canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });

        // ============================================================
        //  初始化
        // ============================================================

        renderSkinUI();
        initRoadLines();
        audio.bgm.volume = 0.2;
        audio.bgm.loop = true;
        var bgmPlay = audio.bgm.play();
        if (bgmPlay && typeof bgmPlay.catch === 'function') { bgmPlay.catch(function() {}); }

        console.log('🏍️ 极速摩托Pro 已加载 — 优化版');
        console.log('🎮 操作: ← → 移动 | 空格加速 | 拾取道具');
    </script>
</body>
</html>
