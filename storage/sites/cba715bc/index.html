<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王者1v1单挑小游戏 · 后羿 vs 亚瑟</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #0b1a2e 0%, #1a2f3f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 16px;
        }
        .game-container {
            max-width: 700px;
            width: 100%;
            background: rgba(22, 40, 56, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 215, 150, 0.2);
            padding: 24px 24px 32px;
            border: 1px solid rgba(255, 215, 150, 0.25);
            transition: all 0.2s;
        }
        h1 {
            text-align: center;
            font-weight: 600;
            font-size: 2.1rem;
            letter-spacing: 2px;
            color: #f7e3b2;
            text-shadow: 0 2px 8px #b8863b, 0 0 4px #ffd78a;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 1rem;
            background: #2d4b5e;
            padding: 4px 14px;
            border-radius: 40px;
            color: #d4c29b;
            font-weight: 400;
            letter-spacing: 0;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.5);
        }
        .status-board {
            background: #1d3343;
            border-radius: 60px;
            padding: 16px 20px;
            margin: 12px 0 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px 8px;
            border: 1px solid #5f7e8c;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.6);
        }
        .hero-stat {
            flex: 1 1 180px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .hero-stat .name {
            font-weight: 600;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hero-stat .name .tag {
            background: #c9a24b;
            color: #0f1f2b;
            font-size: 0.7rem;
            padding: 2px 12px;
            border-radius: 30px;
            font-weight: 700;
        }
        .hp-bar {
            background: #2d4a4f;
            height: 18px;
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            border: 1px solid #6f8f96;
            box-shadow: inset 0 2px 4px #0f1f26;
        }
        .hp-fill {
            height: 100%;
            width: 100%;
            background: #d94f4f;
            background: linear-gradient(90deg, #e35d5d, #b32c2c);
            transition: width 0.25s ease;
            border-radius: 40px;
        }
        .hp-fill.enemy {
            background: #d9773b;
            background: linear-gradient(90deg, #e38d4a, #b85e1e);
        }
        .hp-text {
            font-size: 0.9rem;
            font-weight: 500;
            color: #dcd5c0;
            display: flex;
            justify-content: space-between;
        }
        .action-panel {
            background: #1b3140;
            border-radius: 40px;
            padding: 18px 16px 16px;
            margin: 16px 0 10px;
            border: 1px solid #4b6b78;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 8px 0 4px;
        }
        .action-btn {
            background: #2f4e5e;
            border: none;
            border-radius: 60px;
            padding: 10px 18px;
            font-weight: 600;
            font-size: 1rem;
            color: #f2e5cf;
            box-shadow: 0 4px 0 #0f1f2b, 0 6px 12px rgba(0,0,0,0.4);
            transition: all 0.08s linear;
            cursor: pointer;
            flex: 1 0 auto;
            min-width: 70px;
            border: 1px solid #6b8b99;
            letter-spacing: 0.5px;
        }
        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0f1f2b;
        }
        .action-btn:disabled {
            opacity: 0.5;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0f1f2b;
            cursor: not-allowed;
            background: #3d535f;
        }
        .action-btn.ult {
            background: #b8863b;
            border-color: #e7b85c;
            color: #0f1f1f;
            text-shadow: 0 1px 2px #ffdd99;
        }
        .action-btn.heal {
            background: #3d7a5a;
            border-color: #6fb08a;
        }
        .log-area {
            background: #0f212e;
            border-radius: 30px;
            padding: 14px 18px;
            margin: 16px 0 6px;
            min-height: 80px;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid #4b6f7a;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.7);
            color: #d6d0bd;
            font-size: 0.95rem;
            line-height: 1.5;
            scroll-behavior: smooth;
        }
        .log-area div {
            padding: 2px 0;
            border-bottom: 1px solid #2b4753;
        }
        .log-area div:last-child {
            border-bottom: none;
        }
        .crit {
            color: #f5c542;
            font-weight: 600;
        }
        .reset-area {
            display: flex;
            justify-content: center;
            margin-top: 12px;
        }
        .reset-btn {
            background: #4d2e2e;
            border: none;
            border-radius: 60px;
            padding: 10px 32px;
            font-weight: 600;
            font-size: 1.2rem;
            color: #edd7b0;
            box-shadow: 0 4px 0 #2a1818;
            transition: 0.08s linear;
            cursor: pointer;
            border: 1px solid #a0744a;
            letter-spacing: 1px;
        }
        .reset-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #2a1818;
        }
        .footer-hint {
            text-align: center;
            color: #7b9ba8;
            margin-top: 12px;
            font-size: 0.8rem;
            opacity: 0.8;
        }
        .cooldown-badge {
            background: #1f2f38;
            border-radius: 30px;
            padding: 0 12px;
            font-size: 0.8rem;
            color: #b8b09a;
            margin-left: 6px;
        }
        @media (max-width: 480px) {
            .game-container { padding: 16px; }
            .action-btn { font-size: 0.9rem; padding: 8px 12px; min-width: 60px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <h1>
        ⚔️ 王
        <small>后羿 vs 亚瑟</small>
    </h1>
    <div class="status-board">
        <div class="hero-stat">
            <div class="name"><span>🏹 后羿</span> <span class="tag">玩家</span></div>
            <div class="hp-bar"><div class="hp-fill" id="playerHpFill" style="width:100%"></div></div>
            <div class="hp-text"><span id="playerHpText">3200/3200</span><span>⚔️ 380</span></div>
        </div>
        <div class="hero-stat">
            <div class="name"><span>🛡️ 亚瑟</span> <span class="tag">AI</span></div>
            <div class="hp-bar"><div class="hp-fill enemy" id="enemyHpFill" style="width:100%"></div></div>
            <div class="hp-text"><span id="enemyHpText">3500/3500</span><span>⚔️ 320</span></div>
        </div>
    </div>
    <div class="action-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 0 6px;">
            <span style="color:#c9bda2;">⚡ 你的回合</span>
            <span id="ultCooldownDisplay" style="color:#c9a24b; font-size:0.9rem;">大招就绪</span>
        </div>
        <div class="action-buttons">
            <button class="action-btn" data-action="1">🗡️ 普攻</button>
            <button class="action-btn" data-action="2">🏹 一技能</button>
            <button class="action-btn ult" data-action="3">🦅 大招</button>
            <button class="action-btn heal" data-action="4">🏠 回城</button>
        </div>
    </div>
    <div class="log-area" id="logContainer">
        <div>⚔️ 王者对决 · 后羿 vs 亚瑟</div>
        <div>💬 选择你的行动</div>
    </div>
    <div class="reset-area">
        <button class="reset-btn" id="resetBtn">🔄 重新开局</button>
    </div>
    <div class="footer-hint">暴击率25% · 暴击伤害1.5倍 · 大招冷却3回合</div>
</div>

<script>
    (function() {
        let player = {};
        let enemy = {};
        let gameOver = false;
        let isProcessing = false;

        const playerHpFill = document.getElementById('playerHpFill');
        const enemyHpFill = document.getElementById('enemyHpFill');
        const playerHpText = document.getElementById('playerHpText');
        const enemyHpText = document.getElementById('enemyHpText');
        const logContainer = document.getElementById('logContainer');
        const ultCooldownDisplay = document.getElementById('ultCooldownDisplay');
        const actionBtns = document.querySelectorAll('[data-action]');
        const resetBtn = document.getElementById('resetBtn');

        function initHeroes() {
            player = {
                name: '后羿',
                hp: 3200,
                maxHp: 3200,
                atk: 380,
                skill1: 1.8,
                ult: 3.2,
                cdUlt: 0
            };
            enemy = {
                name: '亚瑟',
                hp: 3500,
                maxHp: 3500,
                atk: 320,
                skill1: 1.6,
                ult: 2.9,
                cdUlt: 0
            };
            gameOver = false;
            isProcessing = false;
            updateUI();
            updateUltDisplay();
            enableActions(true);
            clearLog();
            addLog('⚔️ 新对局开始 · 后羿 vs 亚瑟');
            addLog('💬 选择你的行动');
        }

        function updateUI() {
            const pHpPercent = Math.max(0, (player.hp / player.maxHp) * 100);
            playerHpFill.style.width = pHpPercent + '%';
            playerHpText.textContent = `${Math.max(0, player.hp)}/${player.maxHp}`;
            const eHpPercent = Math.max(0, (enemy.hp / enemy.maxHp) * 100);
            enemyHpFill.style.width = eHpPercent + '%';
            enemyHpText.textContent = `${Math.max(0, enemy.hp)}/${enemy.maxHp}`;
            updateUltDisplay();
        }

        function updateUltDisplay() {
            if (player.cdUlt > 0) {
                ultCooldownDisplay.textContent = `⏳ 大招冷却 ${player.cdUlt} 回合`;
                ultCooldownDisplay.style.color = '#c9a24b';
            } else {
                ultCooldownDisplay.textContent = '🦅 大招就绪';
                ultCooldownDisplay.style.color = '#b8d0b0';
            }
        }

        function enableActions(enabled) {
            actionBtns.forEach(btn => {
                btn.disabled = !enabled || gameOver;
            });
        }

        function addLog(message, isCrit = false) {
            const div = document.createElement('div');
            if (isCrit) {
                div.innerHTML = message.replace(/💥/g, '<span class="crit">💥</span>');
            } else {
                div.textContent = message;
            }
            logContainer.appendChild(div);
            logContainer.scrollTop = logContainer.scrollHeight;
            while (logContainer.children.length > 30) {
                logContainer.removeChild(logContainer.firstChild);
            }
        }

        function clearLog() {
            logContainer.innerHTML = '';
        }

        function calcDamage(baseAtk, rate) {
            let dmg = baseAtk * rate;
            const crit = Math.random() < 0.25;
            if (crit) {
                dmg *= 1.5;
                return { damage: Math.round(dmg), crit: true };
            }
            return { damage: Math.round(dmg), crit: false };
        }

        function aiTurn() {
            if (gameOver) return;
            let skillRoll = Math.random();
            if (enemy.cdUlt > 0) {
                skillRoll = 0.6;
            }
            let dmgObj;
            let actionMsg = '';
            if (skillRoll < 0.35) {
                dmgObj = calcDamage(enemy.atk, 1);
                actionMsg = `亚瑟普攻挥剑，造成 ${dmgObj.damage} 伤害`;
            } else if (skillRoll < 0.7) {
                dmgObj = calcDamage(enemy.atk, enemy.skill1);
                actionMsg = `亚瑟一技能沉默劈砍，造成 ${dmgObj.damage} 伤害`;
            } else {
                dmgObj = calcDamage(enemy.atk, enemy.ult);
                enemy.cdUlt = 3;
                actionMsg = `亚瑟圣剑大招劈砍！造成 ${dmgObj.damage} 巨额伤害，大招冷却3回合`;
            }
            player.hp = Math.max(0, player.hp - dmgObj.damage);
            const critTag = dmgObj.crit ? ' 💥暴击！' : '';
            addLog(`👉 敌方亚瑟行动：${actionMsg}${critTag}`, dmgObj.crit);
            updateUI();
            if (player.hp <= 0) {
                gameOver = true;
                addLog('❌ 战败！后羿被亚瑟击杀，挑战失败！');
                enableActions(false);
            }
        }

        function handlePlayerAction(actionId) {
            if (gameOver || isProcessing) return;
            if (player.hp <= 0 || enemy.hp <= 0) {
                gameOver = true;
                enableActions(false);
                return;
            }
            isProcessing = true;
            enableActions(false);

            let dmgObj = null;
            let actionMsg = '';

            switch (actionId) {
                case 1:
                    dmgObj = calcDamage(player.atk, 1);
                    enemy.hp = Math.max(0, enemy.hp - dmgObj.damage);
                    actionMsg = `后羿普攻射出箭矢，造成 ${dmgObj.damage} 点伤害！`;
                    break;
                case 2:
                    dmgObj = calcDamage(player.atk, player.skill1);
                    enemy.hp = Math.max(0, enemy.hp - dmgObj.damage);
                    actionMsg = `后羿开启一技能分裂箭，造成 ${dmgObj.damage} 点伤害！`;
                    break;
                case 3:
                    if (player.cdUlt > 0) {
                        addLog(`⛔ 大招冷却中，还剩 ${player.cdUlt} 回合，换技能！`);
                        isProcessing = false;
                        enableActions(true);
                        return;
                    }
                    dmgObj = calcDamage(player.atk, player.ult);
                    enemy.hp = Math.max(0, enemy.hp - dmgObj.damage);
                    player.cdUlt = 3;
                    actionMsg = `后羿大鸟命中亚瑟，巨额伤害 ${dmgObj.damage} ！大招进入3回合冷却`;
                    break;
                case 4:
                    const heal = Math.round(player.maxHp * 0.3);
                    player.hp = Math.min(player.hp + heal, player.maxHp);
                    actionMsg = `后羿原地回城，恢复 ${heal} 血量，当前血量 ${player.hp}`;
                    break;
                default:
                    isProcessing = false;
                    enableActions(true);
                    return;
            }

            const critTag = (dmgObj && dmgObj.crit) ? ' 💥暴击！' : '';
            if (actionMsg) {
                addLog(`🏹 ${actionMsg}${critTag}`, dmgObj ? dmgObj.crit : false);
            }
            updateUI();
            updateUltDisplay();

            if (enemy.hp <= 0) {
                gameOver = true;
                addLog('✅ 胜利！亚瑟血量归零，后羿拿下单挑胜利！');
                enableActions(false);
                isProcessing = false;
                return;
            }

            if (player.cdUlt > 0) player.cdUlt -= 1;
            if (enemy.cdUlt > 0) enemy.cdUlt -= 1;

            if (!gameOver) {
                aiTurn();
            }
            isProcessing = false;
            if (!gameOver) {
                enableActions(true);
            }
        }

        actionBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const action = parseInt(this.getAttribute('data-action'), 10);
                handlePlayerAction(action);
            });
        });

        resetBtn.addEventListener('click', function() {
            initHeroes();
        });

        initHeroes();
    })();
</script>
</body>
</html>
