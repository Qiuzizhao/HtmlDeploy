<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>荒野生存 - 网页小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .game-container {
            background: #ecf0f1;
            width: 100%;
            max-width: 600px;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #34495e;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .status-item {
            text-align: center;
        }

        .resources {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .resource-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-success {
            background: #2ecc71;
            color: white;
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .craft-section {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .craft-title {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .game-log {
            background: #34495e;
            color: #ecf0f1;
            padding: 10px;
            border-radius: 10px;
            height: 120px;
            overflow-y: auto;
            font-size: 14px;
        }

        .day-night {
            font-weight: bold;
            color: #f1c40f;
        }

        /* 滚动条样式 */
        .game-log::-webkit-scrollbar {
            width: 5px;
        }
        .game-log::-webkit-scrollbar-thumb {
            background: #95a5a6;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h2>🌳 荒野生存 🌳</h2>
            <p>收集资源、制作工具、活下去！</p>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-item">❤️ 生命: <span id="hp">100</span></div>
            <div class="status-item">🍖 饥饿: <span id="hunger">80</span></div>
            <div class="status-item">🌞 白天 <span id="day">1</span> 天</div>
        </div>

        <!-- 资源栏 -->
        <div class="resources">
            <div class="resource-card">
                <h3>🪵 木头</h3>
                <p id="wood">0</p>
            </div>
            <div class="resource-card">
                <h3>🪨 石头</h3>
                <p id="stone">0</p>
            </div>
            <div class="resource-card">
                <h3>🍎 食物</h3>
                <p id="food">0</p>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="collectWood()">砍树 🪓</button>
            <button class="btn btn-primary" onclick="collectStone()">采石 ⛏️</button>
            <button class="btn btn-success" onclick="collectFood()">采摘 🍄</button>
            <button class="btn btn-warning" onclick="eatFood()">进食 🍖</button>
        </div>

        <!-- 制作系统 -->
        <div class="craft-section">
            <h3 class="craft-title">🛠️ 制作台</h3>
            <div class="action-buttons">
                <button class="btn btn-success" onclick="craftAxe()">制作斧头 (5木2石)</button>
                <button class="btn btn-warning" onclick="craftPickaxe()">制作镐子 (4木3石)</button>
            </div>
        </div>

        <!-- 游戏日志 -->
        <div class="game-log" id="log">
            === 游戏开始！努力生存吧！ ===<br>
        </div>
    </div>

    <script>
        // 游戏核心数据
        const game = {
            hp: 100,
            hunger: 80,
            day: 1,
            isDay: true,
            // 资源
            wood: 0,
            stone: 0,
            food: 0,
            // 工具
            axe: false,
            pickaxe: false,
            // 游戏循环
            gameLoop: null
        };

        // DOM元素
        const hpEl = document.getElementById('hp');
        const hungerEl = document.getElementById('hunger');
        const dayEl = document.getElementById('day');
        const woodEl = document.getElementById('wood');
        const stoneEl = document.getElementById('stone');
        const foodEl = document.getElementById('food');
        const logEl = document.getElementById('log');
        const dayNightEl = document.querySelector('.day-night');

        // 初始化游戏
        startGame();

        // 开始游戏
        function startGame() {
            addLog("游戏开始！白天收集资源，晚上小心怪物！");
            // 每3秒触发一次生存逻辑
            game.gameLoop = setInterval(survivalTick, 3000);
            updateUI();
        }

        // 生存循环
        function survivalTick() {
            // 饥饿值下降
            game.hunger = Math.max(0, game.hunger - 2);
            
            // 饥饿导致掉血
            if(game.hunger === 0) {
                game.hp = Math.max(0, game.hp - 5);
                addLog("⚠️ 你太饿了！生命值下降！");
            }

            // 昼夜交替
            if(Math.random() > 0.7) {
                game.isDay = !game.isDay;
                game.day += game.isDay ? 1 : 0;
                dayNightEl.textContent = game.isDay ? "🌞 白天" : "🌙 夜晚";
                if(!game.isDay) {
                    addLog("🌙 夜幕降临！怪物出没！");
                    // 夜晚怪物袭击
                    if(Math.random() > 0.5) {
                        const damage = Math.floor(Math.random() * 15) + 5;
                        game.hp = Math.max(0, game.hp - damage);
                        addLog(`👹 怪物袭击！你受到 ${damage} 点伤害！`);
                    }
                } else {
                    addLog("🌞 新的一天开始了！");
                }
            }

            // 游戏结束判断
            if(game.hp <= 0) {
                gameOver();
                return;
            }

            updateUI();
        }

        // 收集木头
        function collectWood() {
            const amount = game.axe ? 5 : 2;
            game.wood += amount;
            addLog(`🪵 你砍到了 ${amount} 个木头`);
            updateUI();
        }

        // 收集石头
        function collectStone() {
            const amount = game.pickaxe ? 4 : 1;
            game.stone += amount;
            addLog(`🪨 你采集到 ${amount} 个石头`);
            updateUI();
        }

        // 收集食物
        function collectFood() {
            game.food += 3;
            addLog(`🍎 你采摘到 3 个食物`);
            updateUI();
        }

        // 进食
        function eatFood() {
            if(game.food >= 1) {
                game.food -= 1;
                game.hunger = Math.min(100, game.hunger + 20);
                game.hp = Math.min(100, game.hp + 5);
                addLog("🍖 你吃了食物，恢复了饥饿和生命");
                updateUI();
            } else {
                addLog("❌ 没有食物可以吃了！");
            }
        }

        // 制作斧头
        function craftAxe() {
            if(game.wood >=5 && game.stone >=2 && !game.axe) {
                game.wood -=5;
                game.stone -=2;
                game.axe = true;
                addLog("✅ 你制作了斧头！砍树效率提升！");
                updateUI();
            } else if(game.axe) {
                addLog("❌ 你已经拥有斧头了！");
            } else {
                addLog("❌ 材料不足！需要5木头+2石头");
            }
        }

        // 制作镐子
        function craftPickaxe() {
            if(game.wood >=4 && game.stone >=3 && !game.pickaxe) {
                game.wood -=4;
                game.stone -=3;
               .gamepickaxe = true;
                addLog("✅ 你制作了镐子！采石效率提升！");
                updateUI();
            } else if(game.pickaxe) {
                addLog("❌ 你已经拥有镐子了！");
            } else {
                addLog("❌ 材料不足！需要4木头+3石头");
            }
        }

        // 更新界面
        function updateUI() {
            hpEl.textContent = game.hp;
            hungerEl.textContent = game.hunger;
            dayEl.textContent = game.day;
            woodEl.textContent = game.wood;
            stoneEl.textContent = game.stone;
            foodEl.textContent = game.food;
        }

        // 添加日志
        function addLog(text) {
            logEl.innerHTML += text + "<br>";
            logEl.scrollTop = logEl.scrollHeight;
        }

        // 游戏结束
        function gameOver() {
            clearInterval(game.gameLoop);
            addLog(`💀 你生存了 ${game.day} 天后死亡！游戏结束！`);
            alert(`游戏结束！你坚持了 ${game.day} 天！`);
        }
    </script>
</body>
</html>
