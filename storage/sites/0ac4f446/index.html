<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小公主化妆日记</title>
    <style>
        :root {
            --primary-pink: #ff5e94;
            --border-pink: #ffb6c1;
            --bg-pink: #fff0f6;
            --shadow-pink: rgba(255, 105, 180, 0.3);
            --max-width: 900px;
            --border-radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Rounded MT Bold', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffd6e0, #f8c8dc);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            width: 100%;
            max-width: var(--max-width);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 25px var(--shadow-pink);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .title {
            text-align: center;
            color: var(--primary-pink);
            font-size: 28px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            letter-spacing: 1px;
        }

        .main-content {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .princess-area {
            width: 300px;
            height: 500px;
            background: #fef4f8;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            border: 3px solid var(--border-pink);
        }

        .princess {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .part {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            user-select: none;
        }

        .base {
            display: block;
            width: 280px;
            bottom: 0;
        }

        .hair1 { display: block; width: 220px; top: 20px; }
        .hair2 { display: none; width: 230px; top: 20px; }
        .hair3 { display: none; width: 240px; top: 15px; }

        .eyeshadow1 { display: none; width: 80px; top: 145px; left: 95px; }
        .eyeshadow2 { display: none; width: 80px; top: 145px; left: 210px; }
        .lipstick1 { display: none; width: 40px; top: 220px; }
        .blush1 { display: none; width: 100px; top: 180px; }

        .crown1 { display: none; width: 120px; top: 10px; }
        .earring1 { display: none; width: 30px; top: 170px; left: 80px; }
        .earring2 { display: none; width: 30px; top: 170px; left: 200px; }
        .necklace1 { display: none; width: 70px; top: 260px; }

        .tool-area {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .tool-group {
            background: var(--bg-pink);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #ffc0d0;
        }

        .tool-title {
            color: var(--primary-pink);
            margin-bottom: 10px;
            font-size: 16px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .style-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            background: var(--border-pink);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s, transform 0.2s;
            will-change: transform;
        }

        .style-btn:hover {
            background: var(--primary-pink);
            transform: scale(1.05);
        }

        .style-btn:active {
            transform: scale(0.95);
        }

        .reset-btn {
            background: #ff6b6b;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
        }

        .reset-btn:hover {
            background: #ff3333;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="title">💖 小公主化妆日记 💖</h1>

        <div class="main-content">
            <div class="princess-area">
                <div class="princess">
                    <img src="https://i.ibb.co/SVxf8tL/princess-base.png" class="part base" alt="公主基础形象">
                    <img src="https://i.ibb.co/5jvLb4f/hair1.png" class="part hair1" data-part="hair" alt="金色长发">
                    <img src="https://i.ibb.co/Z2HdR0y/hair2.png" class="part hair2" data-part="hair" data-reset="hide" alt="棕色卷发">
                    <img src="https://i.ibb.co/44XnBk0/hair3.png" class="part hair3" data-part="hair" data-reset="hide" alt="粉色短发">
                    <img src="https://i.ibb.co/9s3vGmP/eyeshadow1.png" class="part eyeshadow1" data-part="toggle" data-reset="hide" alt="粉色眼影">
                    <img src="https://i.ibb.co/5kDvLm7/eyeshadow2.png" class="part eyeshadow2" data-part="toggle" data-reset="hide" alt="紫色眼影">
                    <img src="https://i.ibb.co/4Y7J8tL/lipstick1.png" class="part lipstick1" data-part="toggle" data-reset="hide" alt="口红">
                    <img src="https://i.ibb.co/55vGz4Q/blush1.png" class="part blush1" data-part="toggle" data-reset="hide" alt="腮红">
                    <img src="https://i.ibb.co/2PwVqCn/crown1.png" class="part crown1" data-part="toggle" data-reset="hide" alt="皇冠">
                    <img src="https://i.ibb.co/6XQHf7L/earring1.png" class="part earring1" data-part="earring" data-reset="hide" alt="左耳环">
                    <img src="https://i.ibb.co/6XQHf7L/earring1.png" class="part earring2" data-part="earring" data-reset="hide" alt="右耳环">
                    <img src="https://i.ibb.co/7XQpLc0/necklace1.png" class="part necklace1" data-part="toggle" data-reset="hide" alt="项链">
                </div>
            </div>

            <div class="tool-area">
                <div class="tool-group">
                    <h3 class="tool-title">👑 选择发型</h3>
                    <div class="btn-group">
                        <button class="style-btn" data-action="set-hair" data-target="hair1">金色长发</button>
                        <button class="style-btn" data-action="set-hair" data-target="hair2">棕色卷发</button>
                        <button class="style-btn" data-action="set-hair" data-target="hair3">粉色短发</button>
                    </div>
                </div>

                <div class="tool-group">
                    <h3 class="tool-title">🎨 化妆打扮</h3>
                    <div class="btn-group">
                        <button class="style-btn" data-action="toggle" data-target="eyeshadow1">粉色眼影</button>
                        <button class="style-btn" data-action="toggle" data-target="eyeshadow2">紫色眼影</button>
                        <button class="style-btn" data-action="toggle" data-target="lipstick1">口红</button>
                        <button class="style-btn" data-action="toggle" data-target="blush1">腮红</button>
                    </div>
                </div>

                <div class="tool-group">
                    <h3 class="tool-title">✨ 搭配饰品</h3>
                    <div class="btn-group">
                        <button class="style-btn" data-action="toggle" data-target="crown1">皇冠</button>
                        <button class="style-btn" data-action="toggle-earring">耳环</button>
                        <button class="style-btn" data-action="toggle" data-target="necklace1">项链</button>
                    </div>
                </div>

                <button class="style-btn reset-btn" data-action="reset">🔄 一键重置装扮</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const MakeupApp = {
                init: function() {
                    this.cacheElements();
                    this.bindEvents();
                    this.reset();
                },

                cacheElements: function() {
                    this.princess = document.querySelector('.princess');
                    this.hairParts = this.princess.querySelectorAll('[data-part="hair"]');
                    this.toggleParts = this.princess.querySelectorAll('[data-part="toggle"]');
                    this.earringParts = this.princess.querySelectorAll('[data-part="earring"]');
                    this.resetParts = this.princess.querySelectorAll('[data-reset="hide"]');
                },

                bindEvents: function() {
                    document.querySelector('.tool-area').addEventListener('click', (e) => {
                        const btn = e.target.closest('.style-btn');
                        if (!btn) return;

                        const action = btn.dataset.action;

                        switch (action) {
                            case 'set-hair':
                                this.setHair(btn.dataset.target);
                                break;
                            case 'toggle':
                                this.togglePart(btn.dataset.target);
                                break;
                            case 'toggle-earring':
                                this.toggleEarring();
                                break;
                            case 'reset':
                                this.reset();
                                break;
                        }
                    });
                },

                setHair: function(targetId) {
                    this.hairParts.forEach(el => {
                        el.style.display = 'none';
                    });
                    const target = this.princess.querySelector('.' + targetId);
                    if (target) {
                        target.style.display = 'block';
                    }
                },

                togglePart: function(targetId) {
                    const element = this.princess.querySelector('.' + targetId);
                    if (!element) return;

                    const currentDisplay = element.style.display || getComputedStyle(element).display;
                    element.style.display = currentDisplay === 'none' ? 'block' : 'none';
                },

                toggleEarring: function() {
                    const ear1 = this.princess.querySelector('.earring1');
                    const ear2 = this.princess.querySelector('.earring2');

                    if (ear1 && ear2) {
                        const currentDisplay = ear1.style.display || getComputedStyle(ear1).display;
                        const newDisplay = currentDisplay === 'none' ? 'block' : 'none';
                        ear1.style.display = newDisplay;
                        ear2.style.display = newDisplay;
                    }
                },

                reset: function() {
                    this.setHair('hair1');
                    this.resetParts.forEach(el => {
                        el.style.display = 'none';
                    });
                }
            };

            MakeupApp.init();
        })();
    </script>
</body>
</html>
