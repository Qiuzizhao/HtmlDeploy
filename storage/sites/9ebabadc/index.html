<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳动音符游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #3a3a5c);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .game-container {
            position: relative;
            margin-top: 20px;
        }

        #gameCanvas {
            border: 3px solid #7b68ee;
            border-radius: 10px;
            background: #121212;
            box-shadow: 0 0 30px rgba(123, 104, 238, 0.5);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            width: 800px;
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: bold;
        }

        #restartBtn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
            background: #7b68ee;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: none;
        }

        #restartBtn:hover {
            background: #6a5acd;
            transform: scale(1.05);
        }

        .title {
            font-size: 36px;
            margin-bottom: 10px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }
    </style>
</head>
<body>
    <div class="title">🎵 跳动音符游戏 🎵</div>
    <div class="game-info">
        <div>得分: <span id="score">0</span></div>
        <div>生命值: <span id="health">5</span></div>
    </div>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <button id="restartBtn">重新开始游戏</button>

    <script>
        // 获取DOM元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const healthElement = document.getElementById('health');
        const restartBtn = document.getElementById('restartBtn');

        // 游戏基础配置
        let gameScore = 0;
        let gameHealth = 5;
        let gameOver = false;
        let notes = [];
        let noteSpeed = 2;
        let spawnInterval;

        // 音符颜色库
        const noteColors = [
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', 
            '#ffeaa7', '#dda0dd', '#ffb347', '#87ceeb'
        ];

        // 音频资源
        const clickSound = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmImBze5u+wVRwASe7UAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=');
        const bgMusic = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-ethereal-fairy-win-sound-2019.mp3');
        bgMusic.loop = true;

        // 音符类
        class Note {
            constructor() {
                this.x = Math.random() * (canvas.width - 40) + 20;
                this.y = -50;
                this.size = 35;
                this.color = noteColors[Math.floor(Math.random() * noteColors.length)];
                this.speed = noteSpeed + Math.random() * 1;
            }

            // 绘制音符
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                // 绘制音符形状
                ctx.ellipse(this.x, this.y, this.size/2, this.size, 0, 0, Math.PI * 2);
                ctx.rect(this.x - this.size/6, this.y - this.size, this.size/3, this.size * 1.5);
                ctx.fill();
            }

            // 更新音符位置
            update() {
                this.y += this.speed;
                this.draw();
            }
        }

        // 生成音符
        function spawnNote() {
            if (!gameOver) {
                notes.push(new Note());
            }
        }

        // 碰撞检测（点击音符）
        canvas.addEventListener('click', (e) => {
            if (gameOver) return;
            
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            for (let i = notes.length - 1; i >= 0; i--) {
                const note = notes[i];
                const distance = Math.sqrt(
                    Math.pow(clickX - note.x, 2) + Math.pow(clickY - note.y, 2)
                );

                if (distance < note.size) {
                    // 消除音符，加分
                    clickSound.currentTime = 0;
                    clickSound.play();
                    notes.splice(i, 1);
                    gameScore++;
                    updateScore();
                    break;
                }
            }
        });

        // 更新分数
        function updateScore() {
            scoreElement.textContent = gameScore;
        }

        // 更新生命值
        function updateHealth() {
            healthElement.textContent = gameHealth;
            if (gameHealth <= 0) {
                endGame();
            }
        }

        // 游戏结束
        function endGame() {
            gameOver = true;
            bgMusic.pause();
            restartBtn.style.display = 'block';
            
            // 绘制游戏结束文字
            ctx.fillStyle = '#ff4444';
            ctx.font = '60px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束!', canvas.width/2, canvas.height/2 - 30);
            ctx.font = '30px Arial';
            ctx.fillText(`最终得分: ${gameScore}`, canvas.width/2, canvas.height/2 + 20);
        }

        // 重新开始游戏
        restartBtn.addEventListener('click', () => {
            gameScore = 0;
            gameHealth = 5;
            gameOver = false;
            notes = [];
            updateScore();
            updateHealth();
            restartBtn.style.display = 'none';
            bgMusic.currentTime = 0;
            bgMusic.play();
        });

        // 游戏主循环
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!gameOver) {
                // 更新所有音符
                for (let i = notes.length - 1; i >= 0; i--) {
                    const note = notes[i];
                    note.update();

                    // 音符漏到底部，扣血
                    if (note.y > canvas.height + note.size) {
                        notes.splice(i, 1);
                        gameHealth--;
                        updateHealth();
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        function startGame() {
            gameLoop();
            spawnInterval = setInterval(spawnNote, 1000); // 每秒生成一个音符
            bgMusic.play().catch(err => console.log('音频自动播放被浏览器限制，点击游戏后播放'));
        }

        // 开始运行游戏
        startGame();
    </script>
</body>
</html>
