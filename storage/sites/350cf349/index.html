<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🍳 厨房模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            background: #fdf6ec;
            padding: 20px;
        }

        .kitchen-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .title {
            text-align: center;
            color: #e67e22;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .main-area {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* 食材区 */
        .ingredients-panel {
            width: 250px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .panel-title {
            color: #333;
            margin-bottom: 10px;
            font-size: 18px;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 5px;
        }

        .ingredient-btn {
            display: block;
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            background: #ecf0f1;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .ingredient-btn:hover {
            background: #e67e22;
            color: white;
        }

        /* 烹饪区 */
        .cook-area {
            flex: 1;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .pot {
            width: 200px;
            height: 120px;
            background: #7f8c8d;
            margin: 20px auto;
            border-radius: 10px 10px 50px 50px;
            position: relative;
            overflow: hidden;
        }

        .food-in-pot {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            min-height: 40px;
            background: #d35400;
            transition: 0.3s;
            display: none;
        }

        .cook-status {
            margin: 15px 0;
            padding: 10px;
            background: white;
            border-radius: 5px;
            min-height: 60px;
            line-height: 1.5;
        }

        /* 控制按钮 */
        .control-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .control-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .cut-btn { background: #9b59b6; color: white; }
        .fire-high { background: #e74c3c; color: white; }
        .fire-low { background: #f39c12; color: white; }
        .fire-off { background: #95a5a6; color: white; }
        .stir-btn { background: #3498db; color: white; }
        .finish-btn { background: #2ecc71; color: white; }
        .reset-btn { background: #e74c3c; color: white; }

        /* 成品展示 */
        .result-area {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .result-title {
            color: #e67e22;
            font-size: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="kitchen-container">
    <h1 class="title">🍳 我的厨房模拟器</h1>

    <div class="main-area">
        <!-- 左侧食材区 -->
        <div class="ingredients-panel">
            <h3 class="panel-title">🥦 选择食材</h3>
            <button class="ingredient-btn" onclick="addIngredient('鸡蛋')">鸡蛋</button>
            <button class="ingredient-btn" onclick="addIngredient('西红柿')">西红柿</button>
            <button class="ingredient-btn" onclick="addIngredient('青菜')">青菜</button>
            <button class="ingredient-btn" onclick="addIngredient('猪肉')">猪肉</button>
            <button class="ingredient-btn" onclick="addIngredient('米饭')">米饭</button>
            <button class="ingredient-btn" onclick="addIngredient('面条')">面条</button>
            <br>
            <h3 class="panel-title">🧂 调料</h3>
            <button class="ingredient-btn" onclick="addIngredient('盐')">盐</button>
            <button class="ingredient-btn" onclick="addIngredient('油')">油</button>
            <button class="ingredient-btn" onclick="addIngredient('酱油')">酱油</button>
        </div>

        <!-- 右侧烹饪区 -->
        <div class="cook-area">
            <h3 class="panel-title">🍳 烹饪台</h3>
            <div class="pot">
                <div class="food-in-pot" id="food"></div>
            </div>

            <div class="cook-status" id="status">
                请先选择食材～
            </div>

            <div class="control-buttons">
                <button class="control-btn cut-btn" onclick="cutFood()">🔪 切菜</button>
                <button class="control-btn fire-high" onclick="setFire('大火')">🔥 大火</button>
                <button class="control-btn fire-low" onclick="setFire('小火')">🔥 小火</button>
                <button class="control-btn fire-off" onclick="setFire('关火')">⏹️ 关火</button>
                <button class="control-btn stir-btn" onclick="stirFood()">🔄 翻炒</button>
                <button class="control-btn finish-btn" onclick="finishCook()">✅ 完成</button>
                <button class="control-btn reset-btn" onclick="resetKitchen()">🔄 重置厨房</button>
            </div>
        </div>
    </div>

    <!-- 成品展示区 -->
    <div class="result-area" id="result">
        <h3 class="result-title">🍽️ 菜品完成！</h3>
        <p id="resultText"></p>
    </div>
</div>

<script>
    // 游戏状态
    let selectedIngredients = [];
    let isCut = false;
    let fireStatus = "关火";
    let cookTime = 0;
    let stirCount = 0;

    // 添加食材
    function addIngredient(food) {
        if(selectedIngredients.includes(food)) return;
        selectedIngredients.push(food);
        document.getElementById('status').innerText = `已加入：${selectedIngredients.join('、')}`;
    }

    // 切菜
    function cutFood() {
        if(selectedIngredients.length === 0) {
            document.getElementById('status').innerText = "先加入食材再切菜！";
            return;
        }
        isCut = true;
        document.getElementById('status').innerText = `切好了：${selectedIngredients.join('、')}，可以开火烹饪啦`;
    }

    // 设置火候
    function setFire(status) {
        if(selectedIngredients.length === 0) {
            document.getElementById('status').innerText = "没有食材，无法开火！";
            return;
        }
        if(!isCut) {
            document.getElementById('status').innerText = "先切菜再烹饪！";
            return;
        }
        fireStatus = status;
        document.getElementById('food').style.display = 'block';
        document.getElementById('status').innerText = `当前火候：${fireStatus} | 已翻炒：${stirCount}次`;
    }

    // 翻炒
    function stirFood() {
        if(fireStatus === "关火") {
            document.getElementById('status').innerText = "开火后才能翻炒！";
            return;
        }
        stirCount++;
        document.getElementById('status').innerText = `当前火候：${fireStatus} | 已翻炒：${stirCount}次`;
    }

    // 完成烹饪
    function finishCook() {
        const resultDiv = document.getElementById('result');
        const resultText = document.getElementById('resultText');
        const foodDiv = document.getElementById('food');

        if(selectedIngredients.length === 0) {
            document.getElementById('status').innerText = "没有食材，无法完成烹饪！";
            return;
        }

        // 菜品评价逻辑
        let level;
        if(fireStatus !== "关火" && stirCount >= 3 && isCut) {
            level = "🌟 完美！色香味俱全！";
            foodDiv.style.background = "#f39c12";
        } else if(stirCount >= 1) {
            level = "✅ 做得还不错，可以吃！";
            foodDiv.style.background = "#e67e22";
        } else {
            level = "❌ 烹饪失败，翻车了！";
            foodDiv.style.background = "#7f8c8d";
        }

        resultText.innerText = `你做了：${selectedIngredients.join('+')}\n评价：${level}`;
        resultDiv.style.display = "block";
        document.getElementById('status').innerText = "烹饪结束！";
    }

    // 重置厨房
    function resetKitchen() {
        selectedIngredients = [];
        isCut = false;
        fireStatus = "关火";
        cookTime = 0;
        stirCount = 0;
        
        document.getElementById('status').innerText = "厨房已重置，请重新选择食材～";
        document.getElementById('food').style.display = 'none';
        document.getElementById('result').style.display = 'none';
    }
</script>
</body>
</html>
