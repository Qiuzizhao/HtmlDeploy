<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定轨下落音游</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background: #121212;
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        /* 顶部信息栏 */
        .top-bar {
            width: 100%;
            height: 60px;
            background: #1e1e1e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-bottom: 2px solid #444;
        }

        .score-info {
            font-size: 20px;
        }

        .ctrl-btn {
            padding: 8px 16px;
            background: #2980b9;
            border: none;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 0 5px;
        }

        .ctrl-btn:hover {
            background: #3498db;
        }

        /* 游戏主区域 */
        .game-container {
            display: flex;
            margin-top: 20px;
            gap: 4px;
        }

        /* 单条轨道 */
        .lane {
            width: 80px;
            height: 600px;
            background: #222;
            border: 1px solid #444;
            position: relative;
            overflow: hidden;
        }

        /* 判定线 */
        .judge-line {
            position: absolute;
            bottom: 80px;
            width: 100%;
            height: 4px;
            background: #2ecc71;
            box-shadow: 0 0 10px #2ecc71;
        }

        /* 按键提示区 */
        .key-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #999;
        }

        .key-hint.active {
            color: #2ecc71;
            text-shadow: 0 0 8px #2ecc71;
        }

        /* 音符样式 */
        .note {
            position: absolute;
            width: 70px;
            height: 20px;
            left: 5px;
            border-radius: 3px;
            background: #e74c3c;
            box-shadow: 0 0 6px #e74c3c;
        }

        /* 判定文字弹窗 */
        .judge-text {
            position: absolute;
            bottom: 120px;
            width: 100%;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .perfect { color: #f1c40f; }
        .great { color: #3498db; }
        .miss { color: #7f8c8d; }

        /* 游戏提示 */
        .tip {
            margin-top: 15px;
            font-size: 16px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <!-- 顶部信息栏 -->
    <div class="top-bar">
        <div class="score-info">
            分数：<span id="score">0</span> &nbsp;&nbsp;
            连击：<span id="combo">0</span> &nbsp;&nbsp;
            最大连击：<span id="maxCombo">0</span>
        </div>
        <div class="control">
            <button class="ctrl-btn" id="speedUp">速度+</button>
            <button class="ctrl-btn" id="speedDown">速度-</button>
            <button class="ctrl-btn" id="pauseBtn">暂停</button>
            <button class="ctrl-btn" id="restartBtn">重新开始</button>
        </div>
    </div>

    <!-- 游戏轨道区域 -->
    <div class="game-container" id="gameBox">
        <div class="lane" data-key="d">
            <div class="judge-line"></div>
            <div class="key-hint">D</div>
            <div class="judge-text"></div>
        </div>
        <div class="lane" data-key="f">
            <div class="judge-line"></div>
            <div class="key-hint">F</div>
            <div class="judge-text"></div>
        </div>
        <div class="lane" data-key="j">
            <div class="judge-line"></div>
            <div class="key-hint">J</div>
            <div class="judge-text"></div>
        </div>
        <div class="lane" data-key="k">
            <div class="judge-line"></div>
            <div class="key-hint">K</div>
            <div class="judge-text"></div>
        </div>
    </div>

    <div class="tip">操作按键：D F J K | 按对应按键击打下落音符</div>

    <!-- 音频标签 -->
    <audio id="bgm" loop preload="auto">
        <source src="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3" type="audio/mpeg">
    
    <audio id="hitSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3" type="audio/mpeg">
    

    <script>
        // 全局游戏配置
        const game = {
            speed: 4,        // 音符下落速度
            score: 0,        // 总分
            combo: 0,        // 当前连击
            maxCombo: 0,     // 最大连击
            isPause: false,  // 暂停状态
            noteList: [],    // 所有音符数组
            lanes: [],       // 轨道DOM集合
            keyMap: {d:0, f:1, j:2, k:3}, // 按键对应轨道
            judgeOffset: 15  // 判定容错范围
        };

        // DOM元素获取
        const scoreDom = document.getElementById('score');
        const comboDom = document.getElementById('combo');
        const maxComboDom = document.getElementById('maxCombo');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const speedUp = document.getElementById('speedUp');
        const speedDown = document.getElementById('speedDown');
        const bgm = document.getElementById('bgm');
        const hitSound = document.getElementById('hitSound');
        game.lanes = Array.from(document.querySelectorAll('.lane'));

        // 初始化游戏
        function initGame() {
            game.score = 0;
            game.combo = 0;
            game.maxCombo = 0;
            game.isPause = false;
            game.noteList = [];
            game.speed = 4;

            // 清空所有音符
            document.querySelectorAll('.note').forEach(n => n.remove());
            // 重置判定文字
            document.querySelectorAll('.judge-text').forEach(t => {
                t.textContent = '';
                t.style.opacity = 0;
            });
            // 重置按键高亮
            document.querySelectorAll('.key-hint').forEach(k => k.classList.remove('active'));

            updateUI();
            bgm.currentTime = 0;
            bgm.play();
            pauseBtn.textContent = '暂停';

            // 生成随机音符序列
            createNoteSequence();
        }

        // 生成随机音符（模拟谱面）
        function createNoteSequence() {
            let count = 80; // 总音符数量
            let delay = 0;
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    if (game.isPause) return;
                    const randomLane = Math.floor(Math.random() * 4);
                    createNote(randomLane);
                }, delay);
                delay += 600; // 音符生成间隔
            }
        }

        // 创建单个音符
        function createNote(laneIndex) {
            const lane = game.lanes[laneIndex];
            const note = document.createElement('div');
            note.className = 'note';
            note.style.top = '0px';
            lane.appendChild(note);

            // 音符数据
            const noteData = {
                dom: note,
                lane: laneIndex,
                y: 0,
                isHit: false
            };
            game.noteList.push(noteData);
        }

        // 游戏主循环
        function gameLoop() {
            if (game.isPause) {
                requestAnimationFrame(gameLoop);
                return;
            }

            // 遍历所有音符，更新位置
            game.noteList.forEach(note => {
                if (note.isHit) return;
                note.y += game.speed;
                note.dom.style.top = note.y + 'px';

                // 音符超出底部 = Miss
                const laneHeight = 600;
                const judgePos = laneHeight - 80; // 判定线位置
                if (note.y > judgePos + game.judgeOffset) {
                    showJudge(note.lane, 'miss');
                    note.isHit = true;
                    game.combo = 0;
                    updateUI();
                }
            });

            requestAnimationFrame(gameLoop);
        }

        // 按键击打判定
        function keyHit(laneIndex) {
            if (game.isPause) return;
            const lane = game.lanes[laneIndex];
            const judgePos = 600 - 80;
            let hasHit = false;

            // 遍历当前轨道未被击中的音符
            game.noteList.forEach(note => {
                if (note.isHit || note.lane !== laneIndex) return;

                // 判定区间
                const diff = Math.abs(note.y - judgePos);
                if (diff <= game.judgeOffset) {
                    // Perfect 判定
                    if (diff <= 5) {
                        game.score += 100;
                        showJudge(laneIndex, 'perfect');
                    } 
                    // Great 判定
                    else {
                        game.score += 50;
                        showJudge(laneIndex, 'great');
                    }
                    game.combo++;
                    if (game.combo > game.maxCombo) game.maxCombo = game.combo;
                    note.isHit = true;
                    note.dom.remove();
                    hasHit = true;
                    hitSound.currentTime = 0;
                    hitSound.play();
                }
            });

            // 按键高亮
            const keyHint = lane.querySelector('.key-hint');
            keyHint.classList.add('active');
            setTimeout(() => keyHint.classList.remove('active'), 100);

            updateUI();
        }

        // 显示判定文字
        function showJudge(laneIndex, type) {
            const judgeText = game.lanes[laneIndex].querySelector('.judge-text');
            judgeText.className = 'judge-text ' + type;
            switch(type) {
                case 'perfect': judgeText.textContent = 'PERFECT'; break;
                case 'great': judgeText.textContent = 'GREAT'; break;
                case 'miss': judgeText.textContent = 'MISS'; break;
            }
            judgeText.style.opacity = 1;
            setTimeout(() => judgeText.style.opacity = 0, 400);
        }

        // 更新界面数据
        function updateUI() {
            scoreDom.textContent = game.score;
            comboDom.textContent = game.combo;
            maxComboDom.textContent = game.maxCombo;
        }

        // 键盘监听
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (game.keyMap.hasOwnProperty(key)) {
                keyHit(game.keyMap[key]);
            }
        });

        // 按钮事件
        pauseBtn.addEventListener('click', () => {
            game.isPause = !game.isPause;
            pauseBtn.textContent = game.isPause ? '继续' : '暂停';
            game.isPause ? bgm.pause() : bgm.play();
        });

        restartBtn.addEventListener('click', initGame);

        speedUp.addEventListener('click', () => {
            if (game.speed < 10) game.speed++;
        });

        speedDown.addEventListener('click', () => {
            if (game.speed > 1) game.speed--;
        });

        // 启动游戏
        window.onload = () => {
            initGame();
            gameLoop();
        };
    </script>
</body>
</html>
