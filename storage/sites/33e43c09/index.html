<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奶龙大冒险</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 50%, #90EE90 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "微软雅黑", sans-serif;
        }

        /* 游戏容器 */
        .game-container {
            width: 100%;
            max-width: 800px;
            height: 500px;
            position: relative;
            border: 4px solid #ff9bbb;
            border-radius: 15px;
            background: #fdf6ff;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
        }

        /* 奶龙本体 */
        .nailong {
            width: 120px;
            height: 140px;
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background-image: url('https://i.imgur.com/8z9k3X7.png'); /* 可爱奶龙图 */
            background-size: 100% 100%;
            background-repeat: no-repeat;
            transition: left 0.08s linear;
            z-index: 10;
        }

        /* 地面 */
        .ground {
            width: 100%;
            height: 60px;
            background: #d2b48c;
            position: absolute;
            bottom: 0;
            border-top: 5px solid #553925;
        }

        /* 操作提示 */
        .tips {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff5e89;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 2px white;
            z-index: 5;
        }

        /* 移动端按钮 */
        .mobile-controls {
            position: absolute;
            bottom: 80px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 20;
        }

        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 182, 193, 0.8);
            border: 3px solid #ff5e89;
            font-size: 30px;
            color: white;
            font-weight: bold;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="tips">电脑：← → 左右移动 | 手机：点击按钮</div>
        <div class="nailong" id="nailong"></div>
        <div class="ground"></div>

        <!-- 移动端控制 -->
        <div class="mobile-controls">
            <button class="control-btn" id="leftBtn">←</button>
            <button class="control-btn" id="rightBtn">→</button>
        </div>
    </div>

    <script>
        const nailong = document.getElementById('nailong');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const gameContainer = document.querySelector('.game-container');

        // 奶龙位置与速度
        let x = gameContainer.clientWidth / 2 - 60;
        const speed = 15;

        // 更新奶龙位置
        function updateNailong() {
            // 边界限制
            if (x < 0) x = 0;
            if (x > gameContainer.clientWidth - 120) {
                x = gameContainer.clientWidth - 120;
            }
            nailong.style.left = x + 'px';
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') x -= speed;
            if (e.key === 'ArrowRight') x += speed;
            updateNailong();
        });

        // 手机按钮控制
        leftBtn.addEventListener('touchstart', () => {
            x -= speed * 1.5;
            updateNailong();
        });

        rightBtn.addEventListener('touchstart', () => {
            x += speed * 1.5;
            updateNailong();
        });

        // 窗口大小变化时重新计算
        window.addEventListener('resize', () => {
            x = gameContainer.clientWidth / 2 - 60;
            updateNailong();
        });
    </script>
</body>
</html>
