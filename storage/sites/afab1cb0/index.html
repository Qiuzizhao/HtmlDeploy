<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>简易无畏契约-可射击</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#191919}
#game{width:100vw;height:100vh}
/*准星*/
.crosshair{
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    color:#fff;font-size:28px;
    pointer-events:none;user-select:none;
}
.ui{
    position:fixed;color:#fff;font-size:18px;
    font-family:Microsoft Yahei;
}
.ammo{top:20px;left:20px}
.hp{top:50px;left:20px}
.tips{bottom:20px;left:50%;transform:translateX(-50%);color:#aaa;font-size:13px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="crosshair">+</div>
<div class="ui ammo">弹药:30/90</div>
<div class="ui hp">血量:100</div>
<div class="tips">点击画面锁定鼠标 | WASD移动 | 鼠标转头 | 左键射击 | ESC解锁鼠标</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>
<script>
let scene,camera,renderer,controls;
let ammo=30,maxAmmo=90,hp=100;
const key={w:false,a:false,s:false,d:false};
let bulletList=[],enemyList=[];
const moveSpeed=0.07;

//初始化场景
function init(){
    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x2b2b2b);
    camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,200);
    camera.position.set(0,1.7,0);

    renderer=new THREE.WebGLRenderer({canvas:document.getElementById('game')});
    renderer.setSize(innerWidth,innerHeight);

    controls=new THREE.PointerLockControls(camera,document.body);

    //灯光
    const dirLight=new THREE.DirectionalLight(0xffffff,0.9);
    dirLight.position.set(30,40,20);
    scene.add(dirLight);
    scene.add(new THREE.AmbientLight(0x777777,0.25));

    createMap();
    createEnemy();
    bindEvent();
    animate();
}

//创建地图地面墙体
function createMap(){
    //地面
    const floorGeo=new THREE.PlaneGeometry(70,70);
    const floorMat=new THREE.MeshLambertMaterial({color:0x333333});
    const floor=new THREE.Mesh(floorGeo,floorMat);
    floor.rotation.x=-Math.PI/2;
    scene.add(floor);

    //墙体
    const wallMat=new THREE.MeshLambertMaterial({color:0x445566});
    const walls=[
        {x:0,y:3,z:-35,w:70,h:6,d:1},
        {x:0,y:3,z:35,w:70,h:6,d:1},
        {x:-35,y:3,z:0,w:1,h:6,d:70},
        {x:35,y:3,z:0,w:1,h:6,d:70},
        {x:15,y:3,z:10,w:20,h:6,d:1},
        {x:-18,y:3,z:-12,w:1,h:6,d:18}
    ];
    walls.forEach(data=>{
        const wall=new THREE.Mesh(new THREE.BoxGeometry(data.w,data.h,data.d),wallMat);
        wall.position.set(data.x,data.y,data.z);
        scene.add(wall);
    })
}

//生成敌方靶子(可被射击击毁)
function createEnemy(){
    const enemyMat=new THREE.MeshLambertMaterial({color:0xdd3333});
    const pos=[[12,2,-10],[-14,2,9],[9,2,16],[-7,2,-14],[22,2,0]];
    pos.forEach(p=>{
        const enemy=new THREE.Mesh(new THREE.BoxGeometry(1.3,2.3,0.7),enemyMat);
        enemy.position.set(p[0],p[1],p[2]);
        enemy.userData.hp=4;
        enemyList.push(enemy);
        scene.add(enemy);
    })
}

//射击生成子弹
function fire(){
    if(ammo<=0)return;
    ammo--;
    document.querySelector('.ammo').innerText=`弹药:${ammo}/${maxAmmo}`;
    //生成子弹
    const bGeo=new THREE.SphereGeometry(0.13);
    const bMat=new THREE.MeshBasicMaterial({color:0xffee22});
    const bullet=new THREE.Mesh(bGeo,bMat);
    bullet.position.copy(camera.position);
    const dir=new THREE.Vector3();
    camera.getWorldDirection(dir);
    bullet.userData.speed=dir.multiplyScalar(1.4);
    bulletList.push(bullet);
    scene.add(bullet);
}

//按键绑定
function bindEvent(){
    //点击锁定鼠标
    document.body.onclick=()=>controls.lock();
    //键盘按下松开
    document.addEventListener('keydown',e=>{
        let k=e.key.toLowerCase();
        if(k in key)key[k]=true;
    })
    document.addEventListener('keyup',e=>{
        let k=e.key.toLowerCase();
        if(k in key)key[k]=false;
    })
    //鼠标左键射击
    document.addEventListener('mousedown',e=>{
        if(e.button===0&&controls.isLocked)fire();
    })
    //窗口缩放
    window.onresize=()=>{
        camera.aspect=innerWidth/innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth,innerHeight);
    }
}

//游戏循环
function animate(){
    requestAnimationFrame(animate);
    //玩家移动
    let move=new THREE.Vector3();
    if(key.w)move.z-=1;
    if(key.s)move.z+=1;
    if(key.a)move.x-=1;
    if(key.d)move.x+=1;
    if(move.length()>0)move.normalize().multiplyScalar(moveSpeed);
    camera.position.add(move);

    //子弹飞行+碰撞敌人
    for(let i=bulletList.length-1;i>=0;i--){
        const b=bulletList[i];
        b.position.add(b.userData.speed);

        //命中敌人判定
        for(let j=enemyList.length-1;j>=0;j--){
            const e=enemyList[j];
            if(b.position.distanceTo(e.position)<1.6){
                e.userData.hp--;
                scene.remove(b);bulletList.splice(i,1);
                if(e.userData.hp<=0){
                    scene.remove(e);enemyList.splice(j,1);
                }
                break;
            }
        }
        //子弹飞出地图销毁
        if(b.position.length()>80){
            scene.remove(b);bulletList.splice(i,1);
        }
    }

    renderer.render(scene,camera);
}

init();
</script>
</body>
</html>
