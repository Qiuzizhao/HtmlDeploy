<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>趣味涂鸦画板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: #f0f2f5;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #222;
            margin-bottom: 15px;
        }
        .tool-bar {
            margin: 10px auto;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
            width: 800px;
            box-shadow: 0 2px 8px #ccc;
        }
        button, select, input {
            padding: 6px 12px;
            margin: 0 8px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #409eff;
            color: #fff;
        }
        button:hover {
            background: #66b1ff;
        }
        #canvas {
            border: 3px solid #333;
            background: #fff;
            border-radius: 4px;
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <h1>趣味涂鸦画板</h1>
    <div class="tool-bar">
        <button id="clear">清空画布</button>
        <button id="eraser">橡皮擦</button>
        <button id="save">保存画作</button>
        <span>画笔颜色：</span>
        <input type="color" id="color" value="#000000">
        <span>画笔粗细：</span>
        <select id="size">
            <option value="2">细 (2px)</option>
            <option value="6" selected>中 (6px)</option>
            <option value="12">粗 (12px)</option>
            <option value="20">特粗 (20px)</option>
        </select>
    </div>
    <br>
    <canvas id="canvas" width="800" height="500"></canvas>

    <script>
        // 获取元素
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorInput = document.getElementById('color');
        const sizeSelect = document.getElementById('size');
        const clearBtn = document.getElementById('clear');
        const eraserBtn = document.getElementById('eraser');
        const saveBtn = document.getElementById('save');

        // 全局变量
        let isDraw = false;
        let drawColor = "#000000";
        let drawSize = 6;
        let isEraser = false;

        // 初始化画笔样式
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        // 鼠标按下 - 开始绘画
        canvas.addEventListener('mousedown', (e) => {
            isDraw = true;
            // 修正画布坐标
            const rect = canvas.getBoundingClientRect();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        });

        // 鼠标移动 - 绘画中
        canvas.addEventListener('mousemove', (e) => {
            if (!isDraw) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.beginPath();
            ctx.moveTo(ctx.lastX || x, ctx.lastY || y);
            ctx.lineTo(x, y);
            ctx.strokeStyle = isEraser ? "#ffffff" : drawColor;
            ctx.lineWidth = drawSize;
            ctx.stroke();

            // 记录上一次坐标
            ctx.lastX = x;
            ctx.lastY = y;
        });

        // 鼠标抬起/移出 - 结束绘画
        canvas.addEventListener('mouseup', () => {
            isDraw = false;
            ctx.lastX = null;
            ctx.lastY = null;
        });
        canvas.addEventListener('mouseleave', () => {
            isDraw = false;
            ctx.lastX = null;
            ctx.lastY = null;
        });

        // 切换颜色
        colorInput.addEventListener('input', () => {
            drawColor = colorInput.value;
            isEraser = false;
            eraserBtn.style.background = "#409eff";
        });

        // 切换粗细
        sizeSelect.addEventListener('change', () => {
            drawSize = Number(sizeSelect.value);
        });

        // 橡皮擦
        eraserBtn.addEventListener('click', () => {
            isEraser = !isEraser;
            if (isEraser) {
                eraserBtn.style.background = "#f56c6c";
            } else {
                eraserBtn.style.background = "#409eff";
            }
        });

        // 清空画布
        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // 保存图片
        saveBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = "我的画作.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    </script>
</body>
</html>
