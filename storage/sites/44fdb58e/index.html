<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网页射击游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #111;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        #game {
            border: 3px solid #fff;
            background: #000;
        }
        .ui {
            color: white;
            font-size: 22px;
            margin-bottom: 10px;
            display: flex;
            gap: 30px;
        }
        #gameOver {
            position: absolute;
            color: red;
            font-size: 48px;
            font-weight: bold;
            display: none;
            text-shadow: 0 0 10px #000;
        }
        .tips {
            color: #ccc;
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="ui">
        <div>得分: <span id="score">0</span></div>
        <div>生命: <span id="hp">3</span></div>
    </div>
    <div id="gameOver">游戏结束</div>
    <canvas id="game" width="480" height="650"></canvas>
    <div class="tips">操作：WASD移动 | 空格键射击 | 刷新页面重新开始</div>

    <script>
        // 获取画布和上下文
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const hpEl = document.getElementById('hp');
        const gameOverEl = document.getElementById('gameOver');

        // ========== 游戏数据 ==========
        let score = 0;
        let hp = 3;
        let gameOver = false;

        // 玩家
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 60,
            w: 50,
            h: 50,
            speed: 6,
            color: '#00ff00'
        };

        // 子弹
        let bullets = [];
        // 敌机
        let enemies = [];

        // 键盘控制
        const keys = {
            w: false, a: false, s: false, d: false, space: false
        };

        // ========== 键盘监听 ==========
        document.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'w': keys.w = true; break;
                case 'a': keys.a = true; break;
                case 's': keys.s = true; break;
                case 'd': keys.d = true; break;
                case ' ': keys.space = true; shoot(); break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.key.toLowerCase()) {
                case 'w': keys.w = false; break;
                case 'a': keys.a = false; break;
                case 's': keys.s = false; break;
                case 'd': keys.d = false; break;
                case ' ': keys.space = false; break;
            }
        });

        // ========== 发射子弹 ==========
        function shoot() {
            if(gameOver) return;
            bullets.push({
                x: player.x + player.w/2 - 3,
                y: player.y,
                w: 6,
                h: 15,
                speed: 8,
                color: '#ffff00'
            });
        }

        // ========== 生成敌机 ==========
        function spawnEnemy() {
            if(gameOver) return;
            enemies.push({
                x: Math.random() * (canvas.width - 40),
                y: -50,
                w: 40,
                h: 40,
                speed: 2 + Math.random() * 2,
                color: '#ff4444'
            });
        }
        setInterval(spawnEnemy, 1000);

        // ========== 碰撞检测 ==========
        function isCollide(a, b) {
            return a.x < b.x + b.w &&
                   a.x + a.w > b.x &&
                   a.y < b.y + b.h &&
                   a.y + a.h > b.y;
        }

        // ========== 更新游戏逻辑 ==========
        function update() {
            if(gameOver) return;

            // 玩家移动
            if(keys.w && player.y > 0) player.y -= player.speed;
            if(keys.s && player.y < canvas.height - player.h) player.y += player.speed;
            if(keys.a && player.x > 0) player.x -= player.speed;
            if(keys.d && player.x < canvas.width - player.w) player.x += player.speed;

            // 子弹移动
            bullets.forEach((b, i) => {
                b.y -= b.speed;
                if(b.y < 0) bullets.splice(i, 1);
            });

            // 敌机移动
            enemies.forEach((e, i) => {
                e.y += e.speed;
                if(e.y > canvas.height) {
                    enemies.splice(i, 1);
                    hp--;
                    updateHp();
                }
            });

            // 子弹 vs 敌机
            bullets.forEach((b, i) => {
                enemies.forEach((e, j) => {
                    if(isCollide(b, e)) {
                        bullets.splice(i, 1);
                        enemies.splice(j, 1);
                        score += 10;
                        updateScore();
                    }
                });
            });

            // 玩家 vs 敌机
            enemies.forEach((e) => {
                if(isCollide(player, e)) {
                    hp--;
                    updateHp();
                    enemies.splice(enemies.indexOf(e), 1);
                }
            });
        }

        // ========== UI更新 ==========
        function updateScore() { scoreEl.textContent = score; }
        function updateHp() {
            hpEl.textContent = hp;
            if(hp <= 0) {
                gameOver = true;
                gameOverEl.style.display = 'block';
            }
        }

        // ========== 绘制游戏画面 ==========
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 玩家
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // 子弹
            bullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.w, b.h);
            });

            // 敌机
            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x, e.y, e.w, e.h);
            });
        }

        // ========== 游戏主循环 ==========
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
