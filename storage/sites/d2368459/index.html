<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恐怖村庄 - 幽冥低语</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans;
            cursor: none;
        }
        #game {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* 游戏UI */
        .ui {
            position: fixed;
            z-index: 100;
            color: #c41e1e;
            text-shadow: 0 0 10px #000;
        }
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            z-index: 999;
            pointer-events: none;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,50,50,0.8);
        }
        .crosshair::before {
            width: 2px; height: 20px; left: 9px; top: 0;
        }
        .crosshair::after {
            width: 20px; height: 2px; left: 0; top: 9px;
        }
        .tips {
            bottom: 20px;
            left: 20px;
            font-size: 14px;
            opacity: 0.7;
        }
        .jumpscare {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .jumpscare img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <div class="crosshair"></div>
    <div class="ui tips">WASD移动 | 鼠标控制视角 | 小心黑暗中的东西...</div>
    <div class="jumpscare" id="jumpscare">
        <img src="">
    </div>

    <script>
        // —————— 基础游戏设置 ——————
        let scene, camera, renderer, player;
        let keys = {};
        let mouseX = 0, mouseY = 0;
        let moveSpeed = 5;
        let isScared = false;

        // 恐怖角色惊吓图片（网络恐怖角色经典形象）
        const horrorCharacters = [
            "https://i.imgur.com/2Ld8fXa.jpg", // 瘦长鬼影
            "https://i.imgur.com/4fzHfZy.jpg", // 恐怖修女
            "https://i.imgur.com/8nVZ9XQ.jpg", // 幽灵女孩
            "https://i.imgur.com/A9t0YVJ.jpg"  // 僵尸屠夫
        ];

        // —————— 初始化3D场景 ——————
        function init() {
            // 场景
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0a0a, 10, 60);

            // 相机（第一人称视角）
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 10);

            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.setClearColor(0x0a0a0a);
            document.getElementById('game').appendChild(renderer.domElement);

            // —————— 灯光（恐怖氛围） ——————
            const ambientLight = new THREE.AmbientLight(0x222222, 0.3);
            scene.add(ambientLight);

            const moonLight = new THREE.DirectionalLight(0x3a3a6a, 0.8);
            moonLight.position.set(50, 100, 50);
            moonLight.castShadow = true;
            scene.add(moonLight);

            // —————— 生成恐怖村庄 ——————
            createVillage();
            
            // —————— 生成恐怖角色 ——————
            spawnHorrorEntities();

            // —————— 音效 ——————
            playBackgroundSound();

            // —————— 控制 ——————
            document.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
            document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            document.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement === renderer.domElement) {
                    mouseX += e.movementX * 0.002;
                    mouseY += e.movementY * 0.002;
                    mouseY = Math.max(-Math.PI/3, Math.min(Math.PI/3, mouseY));
                }
            });
            renderer.domElement.addEventListener('click', () => {
                renderer.domElement.requestPointerLock();
            });

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        // —————— 创建村庄场景 ——————
        function createVillage() {
            // 地面
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshStandardMaterial({ 
                color: 0x1a1a1a,
                roughness: 0.9
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // 随机生成破旧房屋
            for(let i=0; i<15; i++) {
                createHouse(
                    (Math.random() - 0.5) * 120,
                    (Math.random() - 0.5) * 120
                );
            }

            // 枯树
            for(let i=0; i<30; i++) {
                createDeadTree(
                    (Math.random() - 0.5) * 150,
                    (Math.random() - 0.5) * 150
                );
            }
        }

        // 创建破旧房屋
        function createHouse(x, z) {
            const houseGroup = new THREE.Group();
            const wallGeo = new THREE.BoxGeometry(6 + Math.random()*4, 8, 8);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x221a1a });
            const walls = new THREE.Mesh(wallGeo, wallMat);
            walls.castShadow = true;
            houseGroup.add(walls);
            houseGroup.position.set(x, 4, z);
            scene.add(houseGroup);
        }

        // 创建枯树
        function createDeadTree(x, z) {
            const treeGroup = new THREE.Group();
            const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, 6);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 3;
            treeGroup.add(trunk);
            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
        }

        // —————— 生成恐怖角色 ——————
        let horrorEntities = [];
        function spawnHorrorEntities() {
            for(let i=0; i<4; i++) {
                const entity = new THREE.Mesh(
                    new THREE.BoxGeometry(1.5, 4, 1),
                    new THREE.MeshStandardMaterial({ 
                        color: 0x000000,
                        transparent: true,
                        opacity: 0
                    })
                );
                entity.position.set(
                    (Math.random() - 0.5) * 80,
                    2,
                    (Math.random() - 0.5) * 80
                );
                entity.userData = { type: i, speed: 1 + Math.random() };
                horrorEntities.push(entity);
                scene.add(entity);
            }
        }

        // —————— 惊吓系统 ——————
        function triggerJumpscare() {
            if(isScared) return;
            isScared = true;
            
            const scareImg = document.getElementById('jumpscare');
            scareImg.querySelector('img').src = horrorCharacters[Math.floor(Math.random() * horrorCharacters.length)];
            scareImg.style.display = 'flex';
            
            // 恐怖音效
            const audio = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-horror-jumpscare-sting-2699.mp3');
            audio.volume = 1;
            audio.play();
            
            setTimeout(() => {
                scareImg.style.display = 'none';
                isScared = false;
            }, 1500);
        }

        // —————— 背景音乐 ——————
        function playBackgroundSound() {
            const bgSound = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-horrible-ghost-wail-2698.mp3');
            bgSound.loop = true;
            bgSound.volume = 0.3;
            bgSound.play().catch(err => {});
            
            // 随机恐怖音效
            setInterval(() => {
                if(Math.random() > 0.97) {
                    const sound = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-creepy-whisper-2700.mp3');
                    sound.volume = 0.6;
                    sound.play();
                }
            }, 8000);
        }

        // —————— 玩家移动控制 ——————
        function updatePlayer() {
            camera.rotation.y = mouseX;
            camera.rotation.x = mouseY;

            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            direction.y = 0;
            direction.normalize();

            const right = new THREE.Vector3();
            right.crossVectors(direction, new THREE.Vector3(0,1,0));

            // WASD移动
            if(keys['w']) camera.position.addScaledVector(direction, moveSpeed * 0.016);
            if(keys['s']) camera.position.addScaledVector(direction, -moveSpeed * 0.016);
            if(keys['a']) camera.position.addScaledVector(right, moveSpeed * 0.016);
            if(keys['d']) camera.position.addScaledVector(right, -moveSpeed * 0.016);

            // 边界限制
            camera.position.x = Math.max(-90, Math.min(90, camera.position.x));
            camera.position.z = Math.max(-90, Math.min(90, camera.position.z));
        }

        // —————— 恐怖角色AI ——————
        function updateHorrorAI() {
            horrorEntities.forEach(entity => {
                const dx = camera.position.x - entity.position.x;
                const dz = camera.position.z - entity.position.z;
                const distance = Math.sqrt(dx*dx + dz*dz);

                // 靠近玩家
                if(distance > 20) {
                    entity.position.x += (dx / distance) * entity.userData.speed * 0.016;
                    entity.position.z += (dz / distance) * entity.userData.speed * 0.016;
                }

                // 触发惊吓
                if(distance < 8 && !isScared) {
                    triggerJumpscare();
                }
            });
        }

        // —————— 动画循环 ——————
        function animate() {
            requestAnimationFrame(animate);
            updatePlayer();
            updateHorrorAI();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 启动游戏
        init();
    </script>
</body>
</html>
