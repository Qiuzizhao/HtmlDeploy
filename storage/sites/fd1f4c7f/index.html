<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>多科技T1-T6战争模拟器</title>
<style>
*{box-sizing:border-box;font-family:Microsoft Yahei}
body{max-width:1200px;margin:10px auto;padding:10px;background:#f5f5f5}
.wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.box{background:#fff;padding:15px;border-radius:8px;box-shadow:0 0 6px #ccc}
h3{margin-top:0;color:#333;border-bottom:1px solid #ddd;padding-bottom:6px}
.btn{padding:6px 12px;margin:3px;background:#2b7bcc;color:#fff;border:none;border-radius:4px;cursor:pointer}
.btn:hover{background:#1f60a0}
.info{line-height:1.7;font-size:14px}
#log{height:220px;overflow-y:auto;border:1px solid #ddd;padding:8px;background:#fafafa}
.ctrl{margin:8px 0}
</style>
</head>
<body>
<h2 style="text-align:center">经济科技战争模拟器｜T1~T6兵种+克制+建筑升级+多分支科技</h2>
<div class="wrap">
<!--红方面板-->
<div class="box">
    <h3>🔴红方帝国</h3>
    <div class="info" id="redInfo"></div>
    <div class="ctrl">
        <button class="btn" onclick="buildUp('red')">升级建筑</button>
        <button class="btn" onclick="openTech('red')">研发科技</button>
        <button class="btn" onclick="openRecruit('red')">招募兵种</button>
    </div>
</div>
<!--蓝方面板-->
<div class="box">
    <h3>🔵蓝方联邦</h3>
    <div class="info" id="blueInfo"></div>
    <div class="ctrl">
        <button class="btn" onclick="buildUp('blue')">升级建筑</button>
        <button class="btn" onclick="openTech('blue')">研发科技</button>
        <button class="btn" onclick="openRecruit('blue')">招募兵种</button>
    </div>
</div>
</div>
<div class="box" style="margin-top:15px">
    <h3>战斗与回合操作</h3>
    <div class="ctrl">
        <button class="btn" onclick="nextTurn()">下一回合(自动结算金币)</button>
        <button class="btn" onclick="startBattle()">发起全军对战</button>
    </div>
    <div>战斗日志：</div>
    <div id="log"></div>
</div>

<script>
//克制规则：infantry步兵>cavalry骑兵 | cavalry骑兵>archer弓兵 | archer弓兵>infantry步兵 克制伤害*1.5
const克制={
    infantry:"cavalry",
    cavalry:"archer",
    archer:"infantry"
}
//T1-T6兵种数据
const unitData={
    infantry:[null,
        {cost:40,hp:15,atk:5},{cost:70,hp:28,atk:9},{cost:110,hp:45,atk:14},
        {cost:170,hp:70,atk:21},{cost:250,hp:100,atk:29},{cost:360,hp:140,atk:38}
    ],
    archer:[null,
        {cost:55,hp:10,atk:8},{cost:85,hp:18,atk:13},{cost:130,hp:28,atk:19},
        {cost:190,hp:42,atk:27},{cost:270,hp:60,atk:36},{cost:380,hp:85,atk:47}
    ],
    cavalry:[null,
        {cost:90,hp:25,atk:12},{cost:130,hp:40,atk:18},{cost:180,hp:60,atk:25},
        {cost:250,hp:85,atk:33},{cost:340,hp:115,atk:42},{cost:460,hp:150,atk:53}
    ]
}
//五大分支科技：infantry/archer/cavalry/economy/defense 每项0~6级
function createCountry(){
    return{
        gold:800,
        baseIncome:30,
        goldLv:1,    //金矿等级 建筑升级
        barrackLv:1, //兵营等级
        maxArmy:200,
        tech:{infantry:0,archer:0,cavalry:0,economy:0,defense:0},
        infantry:[0,0,0,0,0,0,0],//T1~T6下标1-6
        archer:[0,0,0,0,0,0,0],
        cavalry:[0,0,0,0,0,0,0]
    }
}
let red=createCountry(),blue=createCountry();
let turn=1;
const logDom=document.getElementById("log");
function addLog(txt){logDom.innerHTML+=txt+"<br>";logDom.scrollTop=logDom.scrollHeight;}

//刷新面板数据
function refreshUI(){
    function render(cnt,domId,name){
        let total=sumArmy(cnt);
        let str=`
金币：${cnt.gold}<br>
金矿Lv${cnt.goldLv}｜兵营Lv${cnt.barrackLv}｜兵力${total}/${cnt.maxArmy}<br>
科技：步T${cnt.tech.infantry} 弓T${cnt.tech.archer} 骑T${cnt.tech.cavalry} 经济T${cnt.tech.economy} 城防T${cnt.tech.defense}<br>
步兵:T1-${cnt.infantry[1]} T2-${cnt.infantry[2]} T3-${cnt.infantry[3]} T4-${cnt.infantry[4]} T5-${cnt.infantry[5]} T6-${cnt.infantry[6]}<br>
弓兵:T1-${cnt.archer[1]} T2-${cnt.archer[2]} T3-${cnt.archer[3]} T4-${cnt.archer[4]} T5-${cnt.archer[5]} T6-${cnt.archer[6]}<br>
骑兵:T1-${cnt.cavalry[1]} T2-${cnt.cavalry[2]} T3-${cnt.cavalry[3]} T4-${cnt.cavalry[4]} T5-${cnt.cavalry[5]} T6-${cnt.cavalry[6]}
        `;
        document.getElementById(domId).innerHTML=str;
    }
    render(red,"redInfo","红方");render(blue,"blueInfo","蓝方");
}
function sumArmy(c){
    return c.infantry.reduce((a,b)=>a+b)+c.archer.reduce((a,b)=>a+b)+c.cavalry.reduce((a,b)=>a+b);
}

//建筑升级
function buildUp(side){
    let c=side=="red"?red:blue;
    let opt=prompt("1升级金矿(提升产金) 2升级兵营(提升兵力上限)");
    if(opt=="1"){
        let cost=c.goldLv*220;
        if(c.gold>=cost){
            c.gold-=cost;c.goldLv++;c.baseIncome+=12;
            addLog(`${side=="red"?"红方":"蓝方"}金矿升级至Lv${c.goldLv},基础收入+12`);
        }else addLog("金币不足");
    }else if(opt=="2"){
        let cost=c.barrackLv*260;
        if(c.gold>=cost){
            c.gold-=cost;c.barrackLv++;c.maxArmy+=80;
            addLog(`${side=="red"?"红方":"蓝方"}兵营升级至Lv${c.barrackLv},兵力上限+80`);
        }else addLog("金币不足");
    }
    refreshUI();
}

//研发科技
function openTech(side){
    let c=side=="red"?red:blue;
    let ks=["infantry(步兵)","archer(弓兵)","cavalry(骑兵)","economy(经济)","defense(城防)"];
    let sel=prompt(`选择科技：\n1${ks[0]}\n2${ks[1]}\n3${ks[2]}\n4${ks[3]}\n5${ks[4]}`);
    const keyMap={1:"infantry",2:"archer",3:"cavalry",4:"economy",5:"defense"};
    let tk=keyMap[sel];if(!tk)return;
    let lv=c.tech[tk];
    if(lv>=6){addLog("该科技已满6级");return;}
    let cost=180+lv*150;
    if(c.gold>=cost){
        c.gold-=cost;c.tech[tk]++;
        addLog(`${side=="red"?"红方":"蓝方"}${tk}升级→Lv${c.tech[tk]} 消耗${cost}金`);
    }else addLog("金币不足");
    refreshUI();
}

//征兵
function openRecruit(side){
    let c=side=="red"?red:blue;
    let type=prompt("兵种：1步兵 2弓兵 3骑兵");
    let t=parseInt(prompt("T等级1~6"));
    let num=parseInt(prompt("征召数量"));
    const tMap={1:"infantry",2:"archer",3:"cavalry"};
    let ut=tMap[type];if(!ut||t<1||t>6||!num)return;
    //校验科技是否解锁
    if(c.tech[ut]<t){addLog(`未解锁T${t},当前${ut}科技${c.tech[ut]}级`);return;}
    let cost=unitData[ut][t].cost*num;
    let all=sumArmy(c);
    if(c.gold>=cost&&all+num<=c.maxArmy){
        c.gold-=cost;
        if(ut=="infantry")c.infantry[t]+=num;
        if(ut=="archer")c.archer[t]+=num;
        if(ut=="cavalry")c.cavalry[t]+=num;
        addLog(`${side=="red"?"红方":"蓝方"}征召${ut}T${t}×${num}`);
    }else addLog("金币不足/兵力超限");
    refreshUI();
}

//下一回合结算金币
function nextTurn(){
    let rAdd=Math.floor(red.baseIncome*(1+red.tech.economy*0.25));
    let bAdd=Math.floor(blue.baseIncome*(1+blue.tech.economy*0.25));
    red.gold+=rAdd;blue.gold+=bAdd;
    addLog(`====第${turn++}回合结算｜红+${rAdd}金｜蓝+${bAdd}金====`);
    refreshUI();
}

//战力计算+克制伤害
function calcTotal(c,enemy){
    let totalHp=0,totalAtk=0;
    //城防科技血量加成
    let hpRate=1+c.tech.defense*0.15;
    function calc(typeArr,typeKey){
        for(let t=1;t<=6;t++){
            let cnt=typeArr[t];if(cnt==0)continue;
            let d=unitData[typeKey][t];
            totalHp+=cnt*d.hp*hpRate;
            //统计克制加成
            let isRestrain=克制[typeKey];
            let enemyHasRestrainUnit=getUnitCount(enemy,isRestrain)>0;
            let atkBonus=enemyHasRestrainUnit?1.5:1;
            totalAtk+=cnt*d.atk*atkBonus;
        }
    }
    calc(c.infantry,"infantry");calc(c.archer,"archer");calc(c.cavalry,"cavalry");
    return {hp:Math.floor(totalHp),atk:Math.floor(totalAtk)};
}
function getUnitCount(c,key){
    if(key=="infantry")return c.infantry.reduce((a,b)=>a+b);
    if(key=="archer")return c.archer.reduce((a,b)=>a+b);
    if(key=="cavalry")return c.cavalry.reduce((a,b)=>a+b);
}

//开战
function startBattle(){
    addLog("⚔️红蓝全面开战！");
    let r=calcTotal(red,blue),b=calcTotal(blue,red);
    let rh=r.hp,rah=r.atk,bh=b.hp,bah=b.atk;
    if(rh<=0||bh<=0){addLog("某方无兵力无法开战");return;}
    let round=1;
    while(rh>0&&bh>0){
        let dmgB=Math.floor(rah*(0.8+Math.random()*0.4));
        let dmgR=Math.floor(bah*(0.8+Math.random()*0.4));
        bh-=dmgB;rh-=dmgR;
        addLog(`战${round}:红打蓝${dmgB}伤｜蓝打红${dmgR}伤｜红剩余血${Math.max(0,rh)}｜蓝剩余血${Math.max(0,bh)}`);
        round++;
    }
    //按血量比例损耗兵力
    function lossCut(c,oriHp,leftHp){
        let rate=Math.max(0,leftHp/oriHp);
        for(let i=1;i<=6;i++){
            c.infantry[i]=Math.floor(c.infantry[i]*rate);
            c.archer[i]=Math.floor(c.archer[i]*rate);
            c.cavalry[i]=Math.floor(c.cavalry[i]*rate);
        }
    }
    lossCut(red,r.hp,rh);lossCut(blue,b.hp,bh);
    if(rh>bh)addLog("🏆红方获得本场胜利");
    else addLog("🏆蓝方获得本场胜利");
    refreshUI();
}
refreshUI();
</script>
</body>
</html>
