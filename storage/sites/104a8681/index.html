<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三走几中无数 · 种树</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #0c1445, #1a235e);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 160px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 120px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            animation: twinkle 3s infinite alternate;
            z-index: -1;
        }

        @keyframes twinkle {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .title {
            font-size: 28px;
            margin: 20px 0;
            text-align: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .score-box {
            background: rgba(255,255,255,0.1);
            padding: 10px 25px;
            border-radius: 30px;
            margin-bottom: 20px;
            font-size: 18px;
            backdrop-filter: blur(10px);
        }

        .garden {
            width: 320px;
            height: 450px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 30px;
            cursor: pointer;
            transition: background 0.3s;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .garden:hover {
            background: rgba(255,255,255,0.08);
        }

        .tree {
            transition: all 0.8s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tree-1 .trunk {
            width: 6px;
            height: 30px;
            background: #8b5a2b;
            border-radius: 3px;
        }
        .tree-1 .leaves {
            width: 25px;
            height: 25px;
            background: #7fbf7b;
            border-radius: 50%;
            margin-bottom: -5px;
        }

        .tree-2 .trunk {
            width: 8px;
            height: 60px;
            background: #8b5a2b;
            border-radius: 4px;
        }
        .tree-2 .leaves {
            width: 50px;
            height: 50px;
            background: #5ab95a;
            border-radius: 50%;
            margin-bottom: -8px;
        }

        .tree-3 .trunk {
            width: 12px;
            height: 100px;
            background: #7b4b22;
            border-radius: 6px;
        }
        .tree-3 .leaves {
            width: 90px;
            height: 90px;
            background: #3cad3c;
            border-radius: 50%;
            margin-bottom: -12px;
            box-shadow: 0 0 20px rgba(60, 173, 60, 0.4);
        }

        .effect {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: clickEffect 0.6s forwards;
            pointer-events: none;
        }

        @keyframes clickEffect {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .tip {
            opacity: 0.6;
            font-size: 14px;
            margin-top: 10px;
        }

        .copyright {
            margin-top: 40px;
            opacity: 0.4;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="stars"></div>

    <div class="title">三走几中无数</div>
    <div class="subtitle">一款安静治愈的种树小游戏</div>

    <div class="score-box">
        已种树木：<span id="score">0</span> 棵
    </div>

    <div class="garden" id="garden">
        <div class="tree tree-1" id="tree">
            <div class="leaves"></div>
            <div class="trunk"></div>
        </div>
    </div>

    <div class="tip">点击花园区域就能种树 · 自动成长</div>

    <div class="copyright">简单治愈 · 随心种植</div>

    <script>
        (function() {
            let score = 0;
            let level = 1;
            const maxLevel = 3;
            const tree = document.getElementById('tree');
            const garden = document.getElementById('garden');
            const scoreText = document.getElementById('score');

            function updateTree() {
                tree.className = 'tree tree-' + level;
            }

            function createEffect(x, y) {
                const eff = document.createElement('div');
                eff.className = 'effect';
                eff.style.left = (x - 20) + 'px';
                eff.style.top = (y - 20) + 'px';
                document.body.appendChild(eff);
                requestAnimationFrame(function() {
                    setTimeout(function() {
                        if (eff.parentNode) {
                            eff.parentNode.removeChild(eff);
                        }
                    }, 600);
                });
            }

            garden.addEventListener('click', function(e) {
                score++;
                scoreText.textContent = score;

                if (level < maxLevel) {
                    level++;
                } else {
                    level = 1;
                }
                updateTree();

                var rect = garden.getBoundingClientRect();
                var x = e.clientX;
                var y = e.clientY;
                createEffect(x, y);
            });

            updateTree();
        })();
    </script>
</body>
</html>
