<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>射击小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game {
            border: 3px solid #fff;
            background: #222;
        }
        #score {
            color: white;
            font-size: 24px;
            position: absolute;
            top: 20px;
            left: 20px;
        }
    </style>
</head>
<body>
    <div id="score">分数: 0</div>
    <canvas id="game" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('score');

        // ========== 玩家 ==========
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 30,
            speed: 5,
            color: '#0ff'
        };

        // ========== 按键控制 ==========
        const keys = {
            w: false, a: false, s: false, d: false
        };

        // ========== 子弹、手雷、怪物数组 ==========
        let bullets = [];
        let grenades = [];
        let monsters = [];
        let score = 0;

        // ========== 生成怪物 ==========
        function spawnMonster() {
            const size = 25;
            let x, y;
            
            // 随机从屏幕外出现
            if (Math.random() > 0.5) {
                x = Math.random() > 0.5 ? -size : canvas.width + size;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() > 0.5 ? -size : canvas.height + size;
            }

            const speed = Math.random() * 2 + 1;
            monsters.push({ x, y, size, speed });
        }

        // ========== 发射子弹 ==========
        function shootBullet() {
            bullets.push({
                x: player.x,
                y: player.y,
                size: 5,
                color: '#fff',
                speed: 10
            });
        }

        // ========== 发射手雷 ==========
        function throwGrenade() {
            grenades.push({
                x: player.x,
                y: player.y,
                size: 8,
                color: '#f40',
                speed: 7,
                explode: false,
                explodeTimer: 0
            });
        }

        // ========== 按键监听 ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === 'w') keys.w = true;
            if (e.key === 'a') keys.a = true;
            if (e.key === 's') keys.s = true;
            if (e.key === 'd') keys.d = true;
            if (e.key === ' ') shootBullet();    // 空格 = 普通子弹
            if (e.key === 'f') throwGrenade();    // F = 手雷
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'w') keys.w = false;
            if (e.key === 'a') keys.a = false;
            if (e.key === 's') keys.s = false;
            if (e.key === 'd') keys.d = false;
        });

        // ========== 碰撞检测 ==========
        function checkCollision(a, b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < a.size + b.size;
        }

        // ========== 游戏主循环 ==========
        function gameLoop() {
            // 清空画布
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 玩家移动
            if (keys.w && player.y > player.size) player.y -= player.speed;
            if (keys.s && player.y < canvas.height - player.size) player.y += player.speed;
            if (keys.a && player.x > player.size) player.x -= player.speed;
            if (keys.d && player.x < canvas.width - player.size) player.x += player.speed;

            // 绘制玩家
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();

            // ========== 更新并绘制子弹 ==========
            bullets = bullets.filter(bullet => {
                bullet.y -= bullet.speed;

                // 出屏幕移除
                if (bullet.y < 0) return false;

                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.size, 0, Math.PI * 2);
                ctx.fillStyle = bullet.color;
                ctx.fill();
                return true;
            });

            // ========== 更新并绘制手雷 ==========
            grenades = grenades.filter(grenade => {
                if (!grenade.explode) {
                    grenade.y -= grenade.speed;
                    if (grenade.y < 0) {
                        grenade.explode = true;
                        grenade.explodeTimer = 20;
                    }
                } else {
                    grenade.explodeTimer--;
                    if (grenade.explodeTimer <= 0) return false;
                }

                // 绘制
                if (!grenade.explode) {
                    ctx.beginPath();
                    ctx.arc(grenade.x, grenade.y, grenade.size, 0, Math.PI * 2);
                    ctx.fillStyle = grenade.color;
                    ctx.fill();
                } else {
                    // 爆炸范围
                    ctx.beginPath();
                    ctx.arc(grenade.x, grenade.y, 50, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,60,0,0.5)';
                    ctx.fill();
                }
                return true;
            });

            // ========== 更新并绘制怪物 ==========
            monsters = monsters.filter(monster => {
                const dx = player.x - monster.x;
                const dy = player.y - monster.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                monster.x += (dx / dist) * monster.speed;
                monster.y += (dy / dist) * monster.speed;

                // 碰到玩家 = 游戏结束
                if (checkCollision(monster, player)) {
                    alert('游戏结束！得分：' + score);
                    document.location.reload();
                }

                ctx.beginPath();
                ctx.arc(monster.x, monster.y, monster.size, 0, Math.PI * 2);
                ctx.fillStyle = '#f00';
                ctx.fill();
                return true;
            });

            // ========== 子弹打怪物 ==========
            bullets = bullets.filter(bullet => {
                for (let i = 0; i < monsters.length; i++) {
                    if (checkCollision(bullet, monsters[i])) {
                        monsters.splice(i, 1);
                        score += 10;
                        scoreText.innerText = '分数: ' + score;
                        return false;
                    }
                }
                return true;
            });

            // ========== 手雷范围伤害 ==========
            grenades.forEach(grenade => {
                if (grenade.explode) {
                    monsters = monsters.filter(monster => {
                        if (checkCollision(grenade, monster)) {
                            score += 15;
                            scoreText.innerText = '分数: ' + score;
                            return false;
                        }
                        return true;
                    });
                }
            });

            requestAnimationFrame(gameLoop);
        }

        // 自动生成怪物
        setInterval(spawnMonster, 800);

        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
