<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹琴键 - 别踩白块</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff007f;
            --neon-purple: #9d00ff;
            --bg-dark: #060511;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Inter', system-ui, sans-serif;
            color: #fff;
            overflow: hidden;
            user-select: none;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #game-frame {
            position: relative;
            width: 100%;
            max-width: 440px;
            height: 100vh;
            max-height: 800px;
            background: linear-gradient(180deg, #09071c 0%, #030207 100%);
            border: 2px solid rgba(157, 0, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(157, 0, 255, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 5, 17, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease;
        }

        .neon-title {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            margin-bottom: 5px;
        }

        .btn-glow {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 3px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn-glow:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.7);
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 5;
        }

        .shake {
            animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
    </style>
</head>
<body>

    <div id="game-frame">
        <div class="hud text-xs tracking-widest font-semibold uppercase">
            <div class="px-3 py-1.5 bg-[#0d0a21]/80 rounded-lg border border-[#9d00ff]/30 backdrop-blur">
                Score: <span id="hud-score" class="text-cyan-400 font-bold text-sm">0</span>
            </div>
            <div id="hud-combo-wrap" class="px-3 py-1.5 bg-[#0d0a21]/80 rounded-lg border border-[#ff007f]/30 backdrop-blur opacity-0 transition-opacity duration-200">
                Combo: <span id="hud-combo" class="text-pink-500 font-bold text-sm">0</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="start-modal" class="modal">
            <h1 class="neon-title">NEON PIANO</h1>
            <p class="text-xs tracking-widest text-[#9d00ff] font-semibold mb-6">赛博琴键 · 无限加速版</p>
            <div class="p-5 bg-[#120e2e]/50 border border-white/5 rounded-xl text-left text-xs leading-relaxed text-gray-400 max-w-xs mb-8">
                🎹 <strong>更新日志：</strong><br>
                1. 初始速度提升至 8。<br>
                2. <b>每 20 分</b>速度自动提升。<br>
                3. <b>速度无上限</b>，挑战你的神经极限！
            </div>
            <button class="btn-glow" onclick="initGameSystem()">同步脑机接口</button>
        </div>

        <div id="over-modal" class="modal" style="display: none;">
            <h1 class="text-3xl font-extrabold text-[#ff007f] tracking-wider mb-2">NEURAL OVERLOAD</h1>
            <p class="text-xs text-gray-400 mb-6">链路中断，神经载荷过载</p>
            <div class="mb-8">
                <div class="text-xs text-gray-500 uppercase tracking-widest mb-1">Final Score</div>
                <div id="final-score" class="text-4xl font-black text-cyan-400 tracking-wider">0</div>
                <div class="text-xs text-gray-500 uppercase tracking-widest mt-4 mb-1">Max Combo</div>
                <div id="final-combo" class="text-lg font-bold text-pink-500">0</div>
            </div>
            <button class="btn-glow" onclick="initGameSystem()">重启音轨链路</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameFrame = document.getElementById('game-frame');
        const startModal = document.getElementById('start-modal');
        const overModal = document.getElementById('over-modal');
        const hudScore = document.getElementById('hud-score');
        const hudCombo = document.getElementById('hud-combo');
        const hudComboWrap = document.getElementById('hud-combo-wrap');
        const finalScore = document.getElementById('final-score');
        const finalCombo = document.getElementById('final-combo');

        const melody = [74, 78, 81, 86, 83, 79, 83, 86, 81, 78, 81, 83, 79, 74, 79, 81, 78, 74, 78, 79, 76, 73, 76, 78, 74, 71, 74, 76, 73, 69, 73, 74, 86, 81, 83, 78, 79, 74, 79, 81, 78, 74, 76, 73, 74, 78, 81, 86, 83, 79, 83, 86, 81, 78, 81, 83, 79, 74, 79, 81, 78, 74, 78, 79];
        let noteIndex = 0;

        let gameActive = false;
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let speed = 8; // 初始速度设为 8
        let rows = [];
        let particles = [];
        let screenShakeAmount = 0;

        const cols = 4;
        let colWidth = 0;
        let rowHeight = 0;

        let audioCtx = null;
        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
        }

        function playNote(midiNum) {
            initAudio();
            if (!audioCtx || audioCtx.state === 'suspended') audioCtx.resume();
            const freq = 440 * Math.pow(2, (midiNum - 69) / 12);
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const subOsc = audioCtx.createOscillator();
            const filter = audioCtx.createBiquadFilter();
            const gainNode = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, now);
            subOsc.type = 'sine'; subOsc.frequency.setValueAtTime(freq * 2, now);
            filter.type = 'lowpass'; filter.frequency.setValueAtTime(1200, now);
            filter.frequency.exponentialRampToValueAtTime(100, now + 0.8);
            gainNode.gain.setValueAtTime(0.0, now);
            gainNode.gain.linearRampToValueAtTime(0.35, now + 0.005);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
            osc.connect(filter); subOsc.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(now); subOsc.start(now); osc.stop(now + 1.0); subOsc.stop(now + 1.0);
        }

        function playOverloadNoise() {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
            osc.frequency.linearRampToValueAtTime(40, now + 0.3);
            gainNode.gain.setValueAtTime(0.15, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.3);
        }

        function resizeGameCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            colWidth = rect.width / cols;
            rowHeight = rect.height / 4.2;
        }
        window.addEventListener('resize', resizeGameCanvas);

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const s = Math.random() * 5 + 2;
                particles.push({ x, y, vx: Math.cos(angle) * s, vy: Math.sin(angle) * s, radius: Math.random() * 3 + 1, color, alpha: 1, decay: Math.random() * 0.03 + 0.015 });
            }
        }

        function initGameSystem() {
            initAudio();
            gameActive = true;
            score = 0; combo = 0; maxCombo = 0; speed = 8; noteIndex = 0; rows = []; particles = []; screenShakeAmount = 0;
            hudScore.innerText = score; hudComboWrap.style.opacity = '0';
            startModal.style.display = 'none'; overModal.style.opacity = '0';
            setTimeout(() => { overModal.style.display = 'none'; }, 300);
            resizeGameCanvas();
            for (let i = 0; i < 5; i++) {
                rows.push({ y: -(i + 1) * rowHeight, blackCol: Math.floor(Math.random() * cols), clicked: false, errorClickedCol: -1 });
            }
            animate();
        }

        function handleInteraction(clientX, clientY) {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const clickX = clientX - rect.left;
            const clickY = clientY - rect.top;
            const clickCol = Math.floor(clickX / colWidth);
            let targetRowIndex = -1;
            for (let i = 0; i < rows.length; i++) { if (!rows[i].clicked) { targetRowIndex = i; break; } }
            if (targetRowIndex !== -1) {
                const row = rows[targetRowIndex];
                if (clickY > row.y && clickY < row.y + rowHeight + 35) {
                    if (clickCol === row.blackCol) {
                        row.clicked = true;
                        playNote(melody[noteIndex++ % melody.length]);
                        createExplosion(clickX, clickY, '#00f0ff');
                        combo++; if (combo > maxCombo) maxCombo = combo;
                        score += 10 + Math.floor(combo / 5) * 2;
                        hudScore.innerText = score; hudCombo.innerText = combo;
                        if (combo >= 3) hudComboWrap.style.opacity = '1';
                        // 逻辑修改：每 20 分速度增加，无上限
                        if (score % 20 === 0) speed += 0.5;
                    } else {
                        row.errorClickedCol = clickCol;
                        triggerSystemFailure();
                    }
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => handleInteraction(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => { if (e.touches.length > 0) handleInteraction(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });

        function triggerSystemFailure() {
            gameActive = false; screenShakeAmount = 20; playOverloadNoise();
            const logicalWidth = canvas.width / window.devicePixelRatio;
            const logicalHeight = canvas.height / window.devicePixelRatio;
            createExplosion(logicalWidth / 2, logicalHeight / 2, '#ff007f');
            setTimeout(() => {
                overModal.style.display = 'flex';
                setTimeout(() => { overModal.style.opacity = '1'; }, 50);
                finalScore.innerText = score; finalCombo.innerText = maxCombo;
            }, 800);
        }

        function update() {
            if (!gameActive) return;
            const logicalHeight = canvas.height / window.devicePixelRatio;
            for (let i = 0; i < rows.length; i++) rows[i].y += speed;
            if (rows.length > 0 && rows[0].y > logicalHeight && !rows[0].clicked) { triggerSystemFailure(); return; }
            if (rows.length > 0 && rows[0].y > logicalHeight) {
                rows.shift();
                rows.push({ y: rows[rows.length - 1].y - rowHeight, blackCol: Math.floor(Math.random() * cols), clicked: false, errorClickedCol: -1 });
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
                if (p.alpha <= 0) particles.splice(i, 1);
            }
            if (screenShakeAmount > 0) screenShakeAmount *= 0.88;
        }

        function draw() {
            ctx.save();
            if (screenShakeAmount > 0) { ctx.translate((Math.random() - 0.5) * screenShakeAmount, (Math.random() - 0.5) * screenShakeAmount); gameFrame.classList.add('shake'); }
            else gameFrame.classList.remove('shake');
            ctx.fillStyle = 'rgba(6, 5, 17, 0.35)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            rows.forEach(row => {
                if (!row.clicked) {
                    ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = 'var(--neon-purple)';
                    ctx.fillStyle = 'rgba(157, 0, 255, 0.9)';
                    drawRoundRect(ctx, row.blackCol * colWidth + 4, row.y + 4, colWidth - 8, rowHeight - 8, 8);
                    ctx.fill(); ctx.restore();
                } else {
                    ctx.fillStyle = 'rgba(0, 240, 255, 0.08)';
                    ctx.fillRect(row.blackCol * colWidth + 2, row.y + 2, colWidth - 4, rowHeight - 4);
                }
                if (row.errorClickedCol !== -1) {
                    ctx.save(); ctx.shadowBlur = 20; ctx.shadowColor = 'var(--neon-pink)';
                    ctx.fillStyle = 'rgba(255, 0, 127, 0.85)';
                    drawRoundRect(ctx, row.errorClickedCol * colWidth + 4, row.y + 4, colWidth - 8, rowHeight - 8, 8);
                    ctx.fill(); ctx.restore();
                }
            });
            particles.forEach(p => {
                ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.shadowBlur = 10; ctx.shadowColor = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            });
            ctx.restore();
        }

        function drawRoundRect(c, x, y, w, h, r) {
            c.beginPath(); c.moveTo(x + r, y); c.lineTo(x + w - r, y); c.quadraticCurveTo(x + w, y, x + w, y + r);
            c.lineTo(x + w, y + h - r); c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            c.lineTo(x + r, y + h); c.quadraticCurveTo(x, y + h, x, y + h - r);
            c.lineTo(x, y + r); c.quadraticCurveTo(x, y, x + r, y); c.closePath();
        }

        function animate() { if (!gameActive) return; update(); draw(); requestAnimationFrame(animate); }
        resizeGameCanvas();
    </script>
</body>
</html>
