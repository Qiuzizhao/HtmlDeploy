<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道具版跑酷游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .game-container {
            width: 800px;
            height: 300px;
            background: #fafafa;
            border: 2px solid #333;
            position: relative;
            overflow: hidden;
        }
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 20px;
            background: #666;
        }
        .player {
            width: 50px;
            height: 50px;
            background: #ff4757;
            border-radius: 5px;
            position: absolute;
            bottom: 20px;
            left: 100px;
        }
        /*护盾发光效果*/
        .player.shield{
            box-shadow: 0 0 12px 6px #0099ff;
        }
        /*高跳状态*/
        .player.highJump{
            transition: bottom 0.22s ease;
        }
        .player.normalJump{
            transition: bottom 0.3s ease;
        }
        .obstacle {
            width: 30px;
            height: 50px;
            background: #2ed573;
            position: absolute;
            bottom: 20px;
            right: -30px;
        }
        /*道具样式*/
        .item{
            width:28px;
            height:28px;
            border-radius:50%;
            position:absolute;
        }
        .scoreItem{background:#ffd700;}/*金币双倍分*/
        .shieldItem{background:#0099ff;}/*护盾*/
        .jumpItem{background:#00cc66;}/*高跳鞋*/

        .score {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        .buffTip{
            height:22px;
            font-size:16px;
            color:#c0392b;
            margin-bottom:6px;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            color: #ff4757;
            font-weight: bold;
            display: none;
            text-align: center;
        }
        .restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background: #3742fa;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
        .restart-btn:hover {
            background: #1e90ff;
        }
    </style>
</head>
<body>
    <div class="score">分数：0</div>
    <div class="buffTip" id="buffTip"></div>
    <div class="game-container" id="gameBox">
        <div class="player normalJump" id="player"></div>
        <div class="obstacle" id="obstacle"></div>
        <div class="ground"></div>
        <div class="game-over">游戏结束</div>
    </div>
    <button class="restart-btn" id="restartBtn">重新开始</button>

    <script>
        //DOM
        const player = document.getElementById('player');
        const obstacle = document.getElementById('obstacle');
        const scoreText = document.querySelector('.score');
        const gameOverText = document.querySelector('.game-over');
        const restartBtn = document.getElementById('restartBtn');
        const gameBox = document.getElementById('gameBox');
        const buffTip = document.getElementById('buffTip');

        //游戏数据
        let score = 0;
        let isGameOver = false;
        let obstacleSpeed = 5;
        let scoreInterval, obstacleInterval, itemCreateInterval, itemMoveInterval;
        //buff状态
        let hasShield = false;
        let isDoubleScore = false;
        let isHighJump = false;
        const normalJumpH = 120;
        const highJumpH = 170;
        let itemList = []; //存放所有道具

        //跳跃逻辑
        function jump() {
            if (isGameOver) return;
            let jumpH = isHighJump ? highJumpH : normalJumpH;
            player.style.bottom = jumpH + 'px';
            setTimeout(()=>{
                player.style.bottom = '20px';
            }, isHighJump ? 220 : 300);
        }
        //操作绑定
        document.addEventListener('keydown',e=>{
            if(e.code==='Space') jump();
        })
        gameBox.addEventListener('click',jump);

        //生成随机道具
        function createItem(){
            if(isGameOver) return;
            //随机三种道具 0双倍分 1护盾 2高跳
            let rand = Math.floor(Math.random()*3);
            let item = document.createElement('div');
            item.className = 'item';
            if(rand===0){
                item.classList.add('scoreItem');
                item.dataset.type = "double";
            }else if(rand===1){
                item.classList.add('shieldItem');
                item.dataset.type = "shield";
            }else{
                item.classList.add('jumpItem');
                item.dataset.type = "highjump";
            }
            //随机高度离地20~130
            let randomBottom = 20 + Math.random()*110;
            item.style.bottom = randomBottom+'px';
            item.style.left = '800px';
            gameBox.appendChild(item);
            itemList.push(item);
        }
        //道具移动+拾取碰撞
        function moveItems(){
            if(isGameOver) return;
            for(let i=itemList.length-1;i>=0;i--){
                let it = itemList[i];
                let left = parseInt(it.style.left);
                it.style.left = left - obstacleSpeed + 'px';
                //移出屏幕删除
                if(left < -30){
                    it.remove();
                    itemList.splice(i,1);
                    continue;
                }
                //道具碰撞玩家
                const pRect = player.getBoundingClientRect();
                const iRect = it.getBoundingClientRect();
                if(pRect.left < iRect.right && pRect.right>iRect.left && pRect.bottom>iRect.top && pRect.top < iRect.bottom){
                    pickItem(it.dataset.type);
                    it.remove();
                    itemList.splice(i,1);
                }
            }
        }
        //拾取道具效果
        function pickItem(type){
            buffTip.innerText = "";
            if(type==="double"){
                isDoubleScore = true;
                buffTip.innerText = "✨双倍得分生效(5秒)";
                setTimeout(()=>{
                    isDoubleScore = false;
                    buffTip.innerText = "";
                },5000);
            }else if(type==="shield"){
                hasShield = true;
                player.classList.add('shield');
                buffTip.innerText = "🛡护盾已获得，可挡一次伤害";
            }else if(type==="highjump"){
                isHighJump = true;
                player.classList.remove('normalJump');
                player.classList.add('highJump');
                buffTip.innerText = "🦘高跳鞋生效(5秒)";
                setTimeout(()=>{
                    isHighJump = false;
                    player.classList.remove('highJump');
                    player.classList.add('normalJump');
                    buffTip.innerText = "";
                },5000);
            }
        }

        //计分
        function startScore(){
            scoreInterval = setInterval(()=>{
                if(isGameOver) return;
                let add = isDoubleScore ? 2 : 1;
                score += add;
                scoreText.textContent = `分数：${score}`;
                //提速
                if(score%50===0) obstacleSpeed +=0.5;
            },100);
        }
        //障碍物移动+碰撞
        function moveObstacle(){
            obstacleInterval = setInterval(()=>{
                if(isGameOver) return;
                let left = parseInt(obstacle.style.left||800);
                obstacle.style.left = left - obstacleSpeed + 'px';
                if(left < -50) obstacle.style.left = '800px';
                checkCollision();
            },20);
        }
        //碰撞检测（护盾免死）
        function checkCollision(){
            const pRect = player.getBoundingClientRect();
            const oRect = obstacle.getBoundingClientRect();
            if(pRect.left < oRect.right && pRect.right>oRect.left && pRect.bottom>oRect.top){
                if(hasShield){
                    //消耗护盾
                    hasShield = false;
                    player.classList.remove('shield');
                    buffTip.innerText = "护盾抵挡伤害！护盾消失";
                    obstacle.style.left = '800px';
                }else{
                    gameOver();
                }
            }
        }
        //游戏结束
        function gameOver(){
            isGameOver = true;
            gameOverText.style.display = 'block';
            restartBtn.style.display = 'block';
            clearAllTimer();
        }
        function clearAllTimer(){
            clearInterval(scoreInterval);
            clearInterval(obstacleInterval);
            clearInterval(itemCreateInterval);
            clearInterval(itemMoveInterval);
        }
        //重置游戏
        function restartGame(){
            clearAllTimer();
            //清空道具
            itemList.forEach(it=>it.remove());
            itemList = [];
            //重置数据
            score = 0;
            isGameOver = false;
            obstacleSpeed = 5;
            hasShield = false;
            isDoubleScore = false;
            isHighJump = false;
            player.className = "player normalJump";
            buffTip.innerText = "";
            scoreText.textContent = `分数：0`;
            gameOverText.style.display = 'none';
            restartBtn.style.display = 'none';
            obstacle.style.left = '800px';
            startGameLoop();
        }
        restartBtn.addEventListener('click',restartGame);

        //启动全部循环
        function startGameLoop(){
            startScore();
            moveObstacle();
            itemCreateInterval = setInterval(createItem,2200);//2.2秒随机刷道具
            itemMoveInterval = setInterval(moveItems,20);
        }
        startGameLoop();
    </script>
</body>
</html>
