<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>躲避球小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            padding-top: 20px;
        }

        #game {
            border: 3px solid #4fc3f7;
            background: #263238;
        }

        #score {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffeb3b;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            color: #f44336;
            display: none;
            text-shadow: 0 0 10px black;
        }
    </style>
</head>
<body>
    <div id="score">分数: 0</div>
    <canvas id="game" width="400" height="600"></canvas>
    <div id="gameOver">游戏结束！按空格键重新开始</div>

    <script>
        // 获取画布和上下文
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');

        // ========== 游戏配置 ==========
        const player = {
            x: canvas.width / 2 - 15,
            y: canvas.height - 40,
            width: 30,
            height: 30,
            speed: 5
        };

        let balls = [];       // 障碍物球数组
        let keys = {};        // 按键状态
        let score = 0;
        let gameRunning = true;
        let spawnInterval;

        // ========== 键盘控制 ==========
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            // 空格键重置游戏
            if (!gameRunning && e.key === ' ') {
                resetGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // ========== 生成障碍物球 ==========
        function spawnBall() {
            const size = Math.random() * 20 + 10;  // 球大小 10-30
            balls.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                size: size,
                speed: Math.random() * 3 + 2      // 下落速度 2-5
            });
        }

        // ========== 碰撞检测 ==========
        function checkCollision(player, ball) {
            return player.x < ball.x + ball.size &&
                   player.x + player.width > ball.x &&
                   player.y < ball.y + ball.size &&
                   player.y + player.height > ball.y;
        }

        // ========== 游戏重置 ==========
        function resetGame() {
            player.x = canvas.width / 2 - 15;
            player.y = canvas.height - 40;
            balls = [];
            score = 0;
            gameRunning = true;
            gameOverElement.style.display = 'none';
            updateScore();
        }

        // ========== 更新分数 ==========
        function updateScore() {
            scoreElement.textContent = `分数: ${score}`;
        }

        // ========== 游戏主循环 ==========
        function gameLoop() {
            if (!gameRunning) return;

            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 玩家移动（边界限制）
            if (keys['ArrowLeft'] && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
            if (keys['ArrowUp'] && player.y > 0) {
                player.y -= player.speed;
            }
            if (keys['ArrowDown'] && player.y < canvas.height - player.height) {
                player.y += player.speed;
            }

            // 绘制玩家
            ctx.fillStyle = '#4fc3f7';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // 更新并绘制球
            for (let i = balls.length - 1; i >= 0; i--) {
                const ball = balls[i];
                ball.y += ball.speed;

                // 绘制球
                ctx.beginPath();
                ctx.arc(ball.x + ball.size/2, ball.y + ball.size/2, ball.size/2, 0, Math.PI * 2);
                ctx.fillStyle = '#f44336';
                ctx.fill();

                // 碰撞检测
                if (checkCollision(player, ball)) {
                    gameRunning = false;
                    gameOverElement.style.display = 'block';
                    clearInterval(spawnInterval);
                }

                // 超出屏幕删除球 + 加分
                if (ball.y > canvas.height) {
                    balls.splice(i, 1);
                    score++;
                    updateScore();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // 每 800ms 生成一个球
        spawnInterval = setInterval(spawnBall, 800);
        gameLoop();
    </script>
</body>
</html>
