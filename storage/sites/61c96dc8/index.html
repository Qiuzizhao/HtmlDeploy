<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园生活模拟器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            max-width: 700px;
            width: 100%;
            padding: 30px 25px;
            transition: all 0.3s;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 12px;
        }
        .attr-panel {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 8px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }
        .attr-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }
        .attr-label {
            font-size: 13px;
            color: #555;
            font-weight: 600;
        }
        .attr-value {
            font-size: 22px;
            font-weight: 700;
            color: #2c3e50;
            margin-top: 2px;
        }
        .attr-value.low {
            color: #e74c3c;
        }
        .attr-value.high {
            color: #27ae60;
        }
        .day-info {
            background: #eaf2f8;
            border-radius: 10px;
            padding: 10px 16px;
            text-align: center;
            font-weight: 600;
            color: #1a5276;
            margin-bottom: 16px;
            font-size: 16px;
        }
        .stage-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
            margin: 12px 0 8px;
            padding-left: 4px;
            border-left: 4px solid #3498db;
            padding-left: 10px;
        }
        .options {
            background: #fefefe;
            border-radius: 10px;
            padding: 12px 16px;
            margin: 8px 0 14px;
            border: 1px solid #dee2e6;
            line-height: 1.7;
            font-size: 15px;
            color: #2d3436;
        }
        .options span {
            display: block;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin: 10px 0 16px;
            flex-wrap: wrap;
        }
        .input-area input {
            flex: 1;
            min-width: 120px;
            padding: 10px 14px;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }
        .input-area input:focus {
            border-color: #3498db;
        }
        .btn {
            padding: 10px 24px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }
        .btn:hover {
            background: #2980b9;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-secondary {
            background: #636e72;
        }
        .btn-secondary:hover {
            background: #2d3436;
        }
        .event-box {
            background: #ffeaa7;
            border-radius: 10px;
            padding: 12px 16px;
            margin: 12px 0;
            border-left: 5px solid #fdcb6e;
            font-weight: 500;
            color: #2d3436;
        }
        .message {
            background: #dfe6e9;
            border-radius: 8px;
            padding: 10px 14px;
            margin: 8px 0;
            color: #2d3436;
            font-size: 15px;
        }
        .game-over {
            text-align: center;
            padding: 20px;
            background: #f8d7da;
            border-radius: 12px;
            border: 1px solid #f5c6cb;
            color: #721c24;
            margin-top: 16px;
        }
        .game-over h2 {
            margin-bottom: 10px;
        }
        .ending-box {
            background: #d4edda;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #c3e6cb;
            color: #155724;
            margin-top: 16px;
        }
        .ending-box h2 {
            margin-bottom: 8px;
        }
        .hidden {
            display: none !important;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #b2bec3;
            font-size: 13px;
        }
        @media (max-width: 500px) {
            .container { padding: 20px 15px; }
            .attr-panel { padding: 12px; }
            .attr-item { min-width: 50px; }
            .attr-value { font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>🏫 校园生活模拟器</h1>
    <div class="subtitle">规则：一共7天(5上课+2周末)，合理安排行动，达成不同结局！</div>

    <!-- 属性面板 -->
    <div class="attr-panel" id="attrPanel">
        <div class="attr-item"><span class="attr-label">学业</span><span class="attr-value" id="attr-学业">10</span></div>
        <div class="attr-item"><span class="attr-label">体力</span><span class="attr-value" id="attr-体力">10</span></div>
        <div class="attr-item"><span class="attr-label">人缘</span><span class="attr-value" id="attr-人缘">10</span></div>
        <div class="attr-item"><span class="attr-label">金钱</span><span class="attr-value" id="attr-金钱">50</span></div>
        <div class="attr-item"><span class="attr-label">心情</span><span class="attr-value" id="attr-心情">10</span></div>
    </div>

    <!-- 天数信息 -->
    <div class="day-info" id="dayInfo">第 1 天 | 上学日</div>

    <!-- 主要游戏区域 -->
    <div id="gameArea">
        <div id="stageTitle" class="stage-title">早自习</div>
        <div id="optionsBox" class="options">
            <span>1.认真早读(学业+3,体力-2)</span>
            <span>2.趴桌睡觉(体力+4,学业-3,30%被抓扣人缘心情)</span>
            <span>3.和同桌闲聊(人缘+3,学业-2,心情+2)</span>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入选项 1/2/3..." autocomplete="off">
            <button class="btn" id="submitBtn">确认</button>
        </div>
        <div id="messageBox" class="message hidden"></div>
        <div id="eventBox" class="event-box hidden"></div>
    </div>

    <!-- 游戏结束 / 结局 -->
    <div id="gameOverBox" class="game-over hidden"></div>
    <div id="endingBox" class="ending-box hidden"></div>

    <!-- 继续按钮 (用于事件/阶段切换) -->
    <div id="continueArea" class="hidden" style="margin-top:12px; text-align:center;">
        <button class="btn btn-secondary" id="continueBtn">继续</button>
    </div>

    <div class="footer">按回车或点击确认进行操作</div>
</div>

<script>
    (function() {
        'use strict';

        // ---------- 游戏状态 ----------
        const student = {
            学业: 10,
            体力: 10,
            人缘: 10,
            金钱: 50,
            心情: 10
        };
        const MAX_ATTR = 30;
        const MIN_ATTR = 0;
        const DAY_TOTAL = 7;
        let today = 1;
        let currentStageIndex = 0;          // 0-3 对应早自习/午休/放学后/夜晚
        let weekendActionCount = 0;         // 周末已行动次数 (0-2)
        let gameActive = true;
        let waitingForEvent = false;        // 是否在等待突发事件处理
        let eventCallback = null;           // 突发事件完成后的回调
        let isWeekend = false;
        let isEnding = false;

        // DOM 引用
        const attrPanel = document.getElementById('attrPanel');
        const dayInfo = document.getElementById('dayInfo');
        const stageTitle = document.getElementById('stageTitle');
        const optionsBox = document.getElementById('optionsBox');
        const userInput = document.getElementById('userInput');
        const submitBtn = document.getElementById('submitBtn');
        const messageBox = document.getElementById('messageBox');
        const eventBox = document.getElementById('eventBox');
        const gameOverBox = document.getElementById('gameOverBox');
        const endingBox = document.getElementById('endingBox');
        const continueArea = document.getElementById('continueArea');
        const continueBtn = document.getElementById('continueBtn');
        const gameArea = document.getElementById('gameArea');

        // ---------- 工具函数 ----------
        function clamp(num) {
            return Math.max(MIN_ATTR, Math.min(MAX_ATTR, num));
        }

        function updateAttrDisplay() {
            for (const key of Object.keys(student)) {
                const el = document.getElementById('attr-' + key);
                if (el) {
                    el.textContent = student[key];
                    el.className = 'attr-value';
                    if (student[key] <= 3) el.classList.add('low');
                    else if (student[key] >= 25) el.classList.add('high');
                }
            }
        }

        function showMessage(text, isError) {
            messageBox.textContent = text;
            messageBox.className = 'message';
            if (isError) messageBox.style.background = '#f8d7da';
            else messageBox.style.background = '#d1ecf1';
            messageBox.classList.remove('hidden');
        }

        function hideMessage() {
            messageBox.classList.add('hidden');
        }

        function showEvent(text) {
            eventBox.textContent = text;
            eventBox.classList.remove('hidden');
        }

        function hideEvent() {
            eventBox.classList.add('hidden');
        }

        function showContinueButton(callback) {
            continueArea.classList.remove('hidden');
            continueBtn.onclick = function() {
                continueArea.classList.add('hidden');
                if (typeof callback === 'function') callback();
            };
        }

        function hideContinueButton() {
            continueArea.classList.add('hidden');
        }

        function disableInput(disabled) {
            userInput.disabled = disabled;
            submitBtn.disabled = disabled;
            if (disabled) {
                userInput.style.background = '#f0f0f0';
                submitBtn.style.background = '#b2bec3';
            } else {
                userInput.style.background = '#fff';
                submitBtn.style.background = '#3498db';
            }
        }

        function clearInput() {
            userInput.value = '';
            userInput.focus();
        }

        // ---------- 属性归零检查 ----------
        function checkAttrZero() {
            for (const key of Object.keys(student)) {
                if (student[key] <= 0) {
                    return true;
                }
            }
            return false;
        }

        // ---------- 随机事件 ----------
        function triggerRandomEvent(callback) {
            if (Math.random() >= 0.33) {
                // 没有事件
                if (typeof callback === 'function') callback();
                return;
            }

            const events = [
                {
                    msg: '老师突击小测！',
                    action: function(done) {
                        if (student['学业'] >= 15) {
                            student['学业'] = clamp(student['学业'] + 3);
                            showMessage('学业+3 (基础扎实，发挥不错)');
                        } else {
                            student['学业'] = clamp(student['学业'] - 4);
                            showMessage('学业-4 (基础不牢，考砸了)', true);
                        }
                        student['心情'] = clamp(student['心情'] - 3);
                        setTimeout(done, 600);
                    }
                },
                {
                    msg: '同学过生日邀约！花费15元，人缘+6 (输入1参加，0拒绝)',
                    action: function(done) {
                        showEvent('同学过生日邀约！花费15元，人缘+6 (输入1参加，0拒绝)');
                        waitingForEvent = true;
                        eventCallback = function(choice) {
                            waitingForEvent = false;
                            hideEvent();
                            if (choice === '1' && student['金钱'] >= 15) {
                                student['金钱'] -= 15;
                                student['人缘'] = clamp(student['人缘'] + 6);
                                showMessage('你参加生日聚会，人缘大幅提升！');
                            } else {
                                student['人缘'] = clamp(student['人缘'] - 4);
                                showMessage('拒绝邀约，人缘下降', true);
                            }
                            setTimeout(done, 600);
                        };
                        // 等待输入
                        disableInput(false);
                        clearInput();
                        // 临时修改提交逻辑
                        const tempSubmit = function() {
                            const val = userInput.value.trim();
                            if (val === '1' || val === '0') {
                                const cb = eventCallback;
                                eventCallback = null;
                                disableInput(true);
                                if (cb) cb(val);
                                submitBtn.removeEventListener('click', tempSubmit);
                                userInput.removeEventListener('keydown', tempKey);
                            } else {
                                showMessage('请输入 1 或 0', true);
                            }
                        };
                        const tempKey = function(e) {
                            if (e.key === 'Enter') tempSubmit();
                        };
                        submitBtn.addEventListener('click', tempSubmit);
                        userInput.addEventListener('keydown', tempKey);
                        // 存储清理函数
                        window._tempEventClean = function() {
                            submitBtn.removeEventListener('click', tempSubmit);
                            userInput.removeEventListener('keydown', tempKey);
                        };
                    }
                },
                {
                    msg: '路上捡到零花钱，金钱+25，心情+2',
                    action: function(done) {
                        student['金钱'] += 25;
                        student['心情'] = clamp(student['心情'] + 2);
                        showMessage('金钱+25，心情+2');
                        setTimeout(done, 600);
                    }
                },
                {
                    msg: '被罚打扫卫生，体力-5，人缘+2',
                    action: function(done) {
                        student['体力'] = clamp(student['体力'] - 5);
                        student['人缘'] = clamp(student['人缘'] + 2);
                        showMessage('体力-5，人缘+2');
                        setTimeout(done, 600);
                    }
                },
                {
                    msg: '暴雨停课半天，今日少一个行动回合，心情+3',
                    action: function(done) {
                        student['心情'] = clamp(student['心情'] + 3);
                        showMessage('心情+3 (暴雨停课，休息半天)');
                        // 标记少一个行动回合 (在normal_day中处理)
                        window._skipNextStage = true;
                        setTimeout(done, 600);
                    }
                }
            ];

            const chosen = events[Math.floor(Math.random() * events.length)];
            showEvent('【突发事件】' + chosen.msg);
            disableInput(true);
            chosen.action(function() {
                hideEvent();
                updateAttrDisplay();
                // 检查属性归零
                if (checkAttrZero()) {
                    gameOver('某项属性归零，游戏提前结束！');
                    return;
                }
                if (typeof callback === 'function') callback();
            });
        }

        // ---------- 阶段处理 ----------
        function processStage(choice) {
            hideMessage();
            const stage = getStageName(currentStageIndex);
            let needContinue = true;

            // 周末特殊处理
            if (isWeekend) {
                processWeekendAction(choice);
                return;
            }

            switch (stage) {
                case '早自习':
                    if (choice === '1') {
                        student['学业'] = clamp(student['学业'] + 3);
                        student['体力'] = clamp(student['体力'] - 2);
                        showMessage('认真早读：学业+3，体力-2');
                    } else if (choice === '2') {
                        student['体力'] = clamp(student['体力'] + 4);
                        student['学业'] = clamp(student['学业'] - 3);
                        if (Math.random() < 0.3) {
                            student['人缘'] = clamp(student['人缘'] - 2);
                            student['心情'] = clamp(student['心情'] - 3);
                            showMessage('被班主任抓到睡觉！人缘-2，心情-3', true);
                        } else {
                            showMessage('趴桌睡觉：体力+4，学业-3');
                        }
                    } else if (choice === '3') {
                        student['人缘'] = clamp(student['人缘'] + 3);
                        student['学业'] = clamp(student['学业'] - 2);
                        student['心情'] = clamp(student['心情'] + 2);
                        showMessage('和同桌闲聊：人缘+3，学业-2，心情+2');
                    } else {
                        showMessage('无效选项，请重新输入', true);
                        needContinue = false;
                    }
                    break;
                case '午休':
                    if (choice === '1') {
                        student['学业'] = clamp(student['学业'] + 4);
                        student['体力'] = clamp(student['体力'] - 3);
                        student['金钱'] -= 5;
                        showMessage('图书馆刷题：学业+4，体力-3，金钱-5');
                    } else if (choice === '2') {
                        student['体力'] = clamp(student['体力'] + 5);
                        student['人缘'] = clamp(student['人缘'] + 2);
                        student['心情'] = clamp(student['心情'] + 3);
                        showMessage('操场运动：体力+5，人缘+2，心情+3');
                    } else if (choice === '3') {
                        student['金钱'] += 15;
                        student['体力'] = clamp(student['体力'] - 4);
                        student['学业'] = clamp(student['学业'] - 1);
                        showMessage('食堂兼职：金钱+15，体力-4，学业-1');
                    } else {
                        showMessage('无效选项，请重新输入', true);
                        needContinue = false;
                    }
                    break;
                case '放学后':
                    if (choice === '1') {
                        student['人缘'] = clamp(student['人缘'] + 4);
                        if (Math.random() < 0.5) {
                            student['学业'] = clamp(student['学业'] + 2);
                        } else {
                            student['体力'] = clamp(student['体力'] + 4);
                        }
                        student['心情'] = clamp(student['心情'] + 3);
                        showMessage('参加社团：人缘+4，随机学业/体力+2/4，心情+3');
                    } else if (choice === '2') {
                        student['金钱'] += 30;
                        student['体力'] = clamp(student['体力'] - 6);
                        student['学业'] = clamp(student['学业'] - 3);
                        showMessage('校外打工：金钱+30，体力-6，学业-3');
                    } else if (choice === '3') {
                        student['金钱'] -= 20;
                        student['人缘'] = clamp(student['人缘'] + 5);
                        student['心情'] = clamp(student['心情'] + 5);
                        showMessage('结伴逛街：金钱-20，人缘+5，心情+5');
                    } else if (choice === '4') {
                        student['学业'] = clamp(student['学业'] + 5);
                        student['体力'] = clamp(student['体力'] - 3);
                        showMessage('在家自习：学业+5，体力-3');
                    } else {
                        showMessage('无效选项，请重新输入', true);
                        needContinue = false;
                    }
                    break;
                case '夜晚':
                    if (choice === '1') {
                        student['学业'] = clamp(student['学业'] + 6);
                        student['体力'] = clamp(student['体力'] - 8);
                        showMessage('熬夜刷题：学业+6，体力-8');
                    } else if (choice === '2') {
                        student['心情'] = clamp(student['心情'] + 4);
                        student['学业'] = clamp(student['学业'] - 4);
                        student['体力'] = clamp(student['体力'] - 3);
                        showMessage('玩手机追剧：心情+4，学业-4，体力-3');
                    } else if (choice === '3') {
                        student['体力'] = clamp(student['体力'] + 7);
                        showMessage('早睡休息：体力+7');
                    } else {
                        showMessage('无效选项，请重新输入', true);
                        needContinue = false;
                    }
                    break;
                default:
                    showMessage('未知阶段', true);
                    needContinue = false;
            }

            if (needContinue) {
                updateAttrDisplay();
                // 检查属性归零
                if (checkAttrZero()) {
                    gameOver('某项属性归零，游戏提前结束！');
                    return;
                }
                // 进入下一阶段或结束一天
                disableInput(true);
                // 如果是夜晚阶段，则结束一天
                if (stage === '夜晚') {
                    // 每日零花钱
                    student['金钱'] += 10;
                    updateAttrDisplay();
                    // 触发随机事件
                    showContinueButton(function() {
                        triggerRandomEvent(function() {
                            // 检查属性归零
                            if (checkAttrZero()) {
                                gameOver('某项属性归零，游戏提前结束！');
                                return;
                            }
                            // 进入下一天
                            nextDay();
                        });
                    });
                } else {
                    // 检查是否因为暴雨跳过下一阶段
                    if (window._skipNextStage) {
                        window._skipNextStage = false;
                        // 跳过下一个阶段 (直接增加索引)
                        currentStageIndex++;
                        if (currentStageIndex >= 4) {
                            // 如果跳过导致超出，则结束一天
                            student['金钱'] += 10;
                            updateAttrDisplay();
                            showContinueButton(function() {
                                triggerRandomEvent(function() {
                                    if (checkAttrZero()) {
                                        gameOver('某项属性归零，游戏提前结束！');
                                        return;
                                    }
                                    nextDay();
                                });
                            });
                            return;
                        }
                    }
                    // 进入下一阶段
                    showContinueButton(function() {
                        currentStageIndex++;
                        renderStage();
                    });
                }
            } else {
                // 无效输入，重新启用输入
                disableInput(false);
                clearInput();
            }
        }

        // ---------- 周末行动处理 ----------
        function processWeekendAction(choice) {
            hideMessage();
            if (choice === '1') {
                student['学业'] = clamp(student['学业'] + 8);
                student['体力'] = clamp(student['体力'] - 4);
                showMessage('全天补课：学业+8，体力-4');
            } else if (choice === '2') {
                student['金钱'] += 45;
                student['体力'] = clamp(student['体力'] - 7);
                showMessage('全天兼职：金钱+45，体力-7');
            } else if (choice === '3') {
                student['金钱'] -= 30;
                student['人缘'] = clamp(student['人缘'] + 6);
                student['心情'] = clamp(student['心情'] + 7);
                showMessage('出门游玩：金钱-30，人缘+6，心情+7');
            } else if (choice === '4') {
                student['体力'] = clamp(student['体力'] + 10);
                student['心情'] = clamp(student['心情'] + 3);
                showMessage('宅家休养：体力+10，心情+3');
            } else {
                showMessage('无效选项，请重新输入 (1-4)', true);
                disableInput(false);
                clearInput();
                return;
            }

            updateAttrDisplay();
            if (checkAttrZero()) {
                gameOver('某项属性归零，游戏提前结束！');
                return;
            }

            weekendActionCount++;
            if (weekendActionCount >= 3) {
                // 周末三个行动结束
                disableInput(true);
                // 触发随机事件
                showContinueButton(function() {
                    triggerRandomEvent(function() {
                        if (checkAttrZero()) {
                            gameOver('某项属性归零，游戏提前结束！');
                            return;
                        }
                        nextDay();
                    });
                });
            } else {
                // 继续周末行动
                disableInput(true);
                showContinueButton(function() {
                    renderWeekendStage();
                });
            }
        }

        // ---------- 渲染阶段 ----------
        function getStageName(index) {
            const stages = ['早自习', '午休', '放学后', '夜晚'];
            return stages[index] || '';
        }

        function renderStage() {
            if (!gameActive) return;
            const stage = getStageName(currentStageIndex);
            stageTitle.textContent = stage;
            let optText = '';
            switch (stage) {
                case '早自习':
                    optText = '1.认真早读(学业+3,体力-2)\n2.趴桌睡觉(体力+4,学业-3,30%被抓扣人缘心情)\n3.和同桌闲聊(人缘+3,学业-2,心情+2)';
                    break;
                case '午休':
                    optText = '1.图书馆刷题(学业+4,体力-3,金钱-5)\n2.操场运动(体力+5,人缘+2,心情+3)\n3.食堂兼职(金钱+15,体力-4,学业-1)';
                    break;
                case '放学后':
                    optText = '1.参加社团(人缘+4,学业/体力+4,心情+3)\n2.校外打工(金钱+30,体力-6,学业-3)\n3.结伴逛街(金钱-20,人缘+5,心情+5)\n4.在家自习(学业+5,体力-3)';
                    break;
                case '夜晚':
                    optText = '1.熬夜刷题(学业+6,体力-8)\n2.玩手机追剧(心情+4,学业-4,体力-3)\n3.早睡休息(体力+7)';
                    break;
                default:
                    optText = '未知阶段';
            }
            optionsBox.innerHTML = optText.replace(/\n/g, '<br>');
            hideMessage();
            hideEvent();
            disableInput(false);
            clearInput();
            // 移除临时事件监听
            if (window._tempEventClean) {
                window._tempEventClean();
                window._tempEventClean = null;
            }
            // 重新绑定提交
            submitBtn.onclick = function() {
                handleUserSubmit();
            };
            userInput.onkeydown = function(e) {
                if (e.key === 'Enter') handleUserSubmit();
            };
        }

        function renderWeekendStage() {
            if (!gameActive) return;
            stageTitle.textContent = '周末行动 (' + (weekendActionCount + 1) + '/3)';
            optionsBox.innerHTML = '1.全天补课(学业+8,体力-4)<br>2.全天兼职(金钱+45,体力-7)<br>3.出门游玩(金钱-30,人缘+6,心情+7)<br>4.宅家休养(体力+10,心情+3)';
            hideMessage();
            hideEvent();
            disableInput(false);
            clearInput();
            if (window._tempEventClean) {
                window._tempEventClean();
                window._tempEventClean = null;
            }
            submitBtn.onclick = function() {
                handleUserSubmit();
            };
            userInput.onkeydown = function(e) {
                if (e.key === 'Enter') handleUserSubmit();
            };
        }

        function handleUserSubmit() {
            if (!gameActive) return;
            if (waitingForEvent) return; // 由事件处理
            const val = userInput.value.trim();
            if (val === '') {
                showMessage('请输入选项', true);
                return;
            }
            disableInput(true);
            processStage(val);
        }

        // ---------- 下一天 ----------
        function nextDay() {
            if (!gameActive) return;
            today++;
            if (today > DAY_TOTAL) {
                // 游戏结束，结算
                showEnding();
                return;
            }
            // 重置阶段
            currentStageIndex = 0;
            weekendActionCount = 0;
            isWeekend = today > 5;
            window._skipNextStage = false;

            // 更新天数显示
            if (isWeekend) {
                dayInfo.textContent = '第 ' + today + ' 天 | 周末';
            } else {
                dayInfo.textContent = '第 ' + today + ' 天 | 上学日';
            }

            hideMessage();
            hideEvent();
            hideContinueButton();
            disableInput(false);

            if (isWeekend) {
                renderWeekendStage();
            } else {
                renderStage();
            }
        }

        // ---------- 游戏结束 ----------
        function gameOver(reason) {
            gameActive = false;
            gameArea.classList.add('hidden');
            gameOverBox.classList.remove('hidden');
            gameOverBox.innerHTML = '<h2>💔 游戏结束</h2><p>' + reason + '</p>';
            hideContinueButton();
            disableInput(true);
        }

        // ---------- 结局 ----------
        function showEnding() {
            gameActive = false;
            gameArea.classList.add('hidden');
            gameOverBox.classList.add('hidden');
            endingBox.classList.remove('hidden');

            const xue = student['学业'];
            const ren = student['人缘'];
            const qian = student['金钱'];
            const xin = student['心情'];

            let endingText = '';
            if (xue >= 25 && ren >= 18 && qian >= 80) {
                endingText = '【完美学霸结局】成绩优异，保送重点实验班！通关！🎉';
            } else if (ren >= 25 && xin >= 22) {
                endingText = '【阳光社牛结局】当选学生会干部，人缘爆棚！🌟';
            } else if (qian >= 150) {
                endingText = '【务实打工结局】攒够巨款，买到心仪数码产品！💰';
            } else if (xue < 8 || checkAttrZero()) {
                endingText = '【坏结局】挂科过多/状态崩盘，留级退学，游戏失败！😢';
            } else {
                endingText = '【普通毕业结局】平稳度过校园生活，正常升学~ 📚';
            }
            endingBox.innerHTML = '<h2>🎓 学期结束，结算结局</h2><p style="font-size:18px;font-weight:600;">' + endingText + '</p>';
            hideContinueButton();
            disableInput(true);
        }

        // ---------- 初始化 ----------
        function initGame() {
            gameActive = true;
            today = 1;
            currentStageIndex = 0;
            weekendActionCount = 0;
            isWeekend = false;
            isEnding = false;
            window._skipNextStage = false;
            window._tempEventClean = null;
            waitingForEvent = false;
            eventCallback = null;

            // 重置属性
            student['学业'] = 10;
            student['体力'] = 10;
            student['人缘'] = 10;
            student['金钱'] = 50;
            student['心情'] = 10;

            updateAttrDisplay();
            dayInfo.textContent = '第 1 天 | 上学日';
            gameArea.classList.remove('hidden');
            gameOverBox.classList.add('hidden');
            endingBox.classList.add('hidden');
            hideContinueButton();
            hideMessage();
            hideEvent();
            disableInput(false);

            renderStage();
        }

        // 启动
        initGame();

        // 暴露重启（可选）
        window.restartGame = initGame;

    })();
</script>
</body>
</html>
