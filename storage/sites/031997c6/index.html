<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D手速训练小游戏</title>
    <style>
        *{margin:0;padding:0}
        body{overflow:hidden;background:#1a1a1a;color:#fff;font-family:Arial}
        #info{position:absolute;top:10px;left:10px;font-size:20px;z-index:99}
    </style>
</head>
<body>
    <div id="info">得分：<span id="score">0</span>｜剩余时间：<span id="time">30</span>s</div>
    <!-- 引入Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script>
        // 基础场景初始化
        let scene,camera,renderer,ballArr=[];
        let score=0,surplusTime=30,timer;
        const scoreDom=document.getElementById('score');
        const timeDom=document.getElementById('time');

        init();
        animate();

        function init(){
            // 场景
            scene=new THREE.Scene();
            scene.background=new THREE.Color(0x222233);
            // 相机
            camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
            camera.position.z=15;
            // 渲染器
            renderer=new THREE.WebGLRenderer({antialias:true});
            renderer.setSize(window.innerWidth,window.innerHeight);
            document.body.appendChild(renderer.domElement);
            // 灯光
            const light=new THREE.PointLight(0xffffff,1);
            light.position.set(10,10,10);
            scene.add(light);

            // 定时生成小球
            createBall();
            const spawnTimer=setInterval(createBall,800);

            // 倒计时
            timer=setInterval(()=>{
                surplusTime--;
                timeDom.innerText=surplusTime;
                if(surplusTime<=0){
                    clearInterval(timer);
                    clearInterval(spawnTimer);
                    alert(`游戏结束！最终得分：${score}`);
                }
            },1000);

            // 窗口自适应
            window.addEventListener('resize',()=>{
                camera.aspect=window.innerWidth/window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth,window.innerHeight);
            })
        }

        // 创建可点击小球
        function createBall(){
            const geo=new THREE.SphereGeometry(0.8,16,16);
            const mat=new THREE.MeshBasicMaterial({
                color:Math.random()*0xffffff
            });
            const ball=new THREE.Mesh(geo,mat);
            // 随机位置
            ball.position.set(
                (Math.random()-0.5)*12,
                (Math.random()-0.5)*8,
                (Math.random()-0.5)*5
            );
            ball.userData.isClick=true;
            scene.add(ball);
            ballArr.push(ball);
        }

        // 鼠标点击拾取3D物体
        const raycaster=new THREE.Raycaster();
        const mouse=new THREE.Vector2();
        renderer.domElement.addEventListener('click',(e)=>{
            mouse.x=(e.clientX/window.innerWidth)*2-1;
            mouse.y=-(e.clientY/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse,camera);
            const intersects=raycaster.intersectObjects(ballArr);
            if(intersects.length>0){
                const hitObj=intersects[0].object;
                scene.remove(hitObj);
                let idx=ballArr.indexOf(hitObj);
                ballArr.splice(idx,1);
                score+=10;
                scoreDom.innerText=score;
            }
        })

        function animate(){
            requestAnimationFrame(animate);
            // 小球自转
            ballArr.forEach(item=>{
                item.rotation.x+=0.01;
                item.rotation.y+=0.02;
            })
            renderer.render(scene,camera);
        }
    </script>
</body>
</html>
