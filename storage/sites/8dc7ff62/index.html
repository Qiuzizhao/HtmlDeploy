<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>三年暗恋 · 双女主版（三结局）</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"微软雅黑","黑体",sans-serif;
        }

        body{
            background:#f0f4f8;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .game-box{
            width:100%;
            max-width:650px;
            background:white;
            border-radius:20px;
            box-shadow:0 10px 40px rgba(0,0,0,0.1);
            overflow:hidden;
        }

        .header{
            background:#3d5a80;
            color:white;
            padding:20px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
        }

        .scene{
            padding:25px;
            color:#2d3436;
            min-height:140px;
            background:#fff;
            font-size:16px;
            line-height:1.8;
        }

        .name{
            font-weight:bold;
            margin-bottom:8px;
            font-size:17px;
        }

        .yu{
            color:#2c3e50;
        }

        .tang{
            color:#e74c3c;
        }

        .dialog{
            padding:16px 20px;
            background:#f8f9fa;
            border-left:5px solid #3d5a80;
            margin:12px 0;
            border-radius:10px;
        }

        .choices{
            display:flex;
            flex-direction:column;
            gap:12px;
            padding:25px;
            background:#fafbfc;
        }

        .btn{
            padding:16px;
            border:none;
            border-radius:12px;
            background:#3d5a80;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:all 0.3s;
        }

        .btn:hover{
            background:#2a3d5a;
            transform:translateY(-2px);
        }

        .ending{
            text-align:center;
            padding:40px 25px;
            font-size:18px;
            color:#3d5a80;
            font-weight:bold;
            line-height:2;
        }

        .hide{
            display:none;
        }
    </style>
</head>

<body>
<div class="game-box">
    <div class="header">三年暗恋 · 双女主（三结局完整版）</div>
    
    <div class="scene" id="scene">
        我是江禹封。
        <br>
        别人都觉得我冷淡、安静、难以接近。
        <br>
        只有我自己知道，我已经悄悄喜欢凌雨棠……三年了。
    </div>

    <div class="choices" id="choices">
        <button class="btn" onclick="start()">开始故事</button>
    </div>
</div>

<script>
    let scene = document.getElementById('scene');
    let choices = document.getElementById('choices');

    function clean(){
        scene.innerHTML = '';
        choices.innerHTML = '';
    }

    // 开头
    function start(){
        clean();
        scene.innerHTML = `
        <div class="name tang">凌雨棠（笑着挥手）</div>
        <div class="dialog">禹封！早上好呀！</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p1()">嗯，早。</button>
        <button class="btn" onclick="p2()">……（不敢回应）</button>
        `;
    }

    function p1(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">我不敢多说话，怕情绪暴露。</div>
        <div class="name tang">凌雨棠</div>
        <div class="dialog">一起去教室吗？</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p3()">好。</button>
        <button class="btn" onclick="p4()">我自己走。</button>
        `;
    }

    function p2(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">我太紧张，不敢看她。</div>
        <div class="name tang">凌雨棠（小声）</div>
        <div class="dialog">那……我先走啦。</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="ending1()">选择沉默（进入结局1）</button>
        `;
    }

    function p3(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">她走在我身边，我心跳得很快。</div>
        <div class="name tang">凌雨棠</div>
        <div class="dialog">禹封，你人真好。</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p5()">（沉默）</button>
        <button class="btn" onclick="p6()">……嗯。</button>
        `;
    }

    function p4(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">我说了违心的话。我其实舍不得。</div>
        <div class="name tang">凌雨棠（失落）</div>
        <div class="dialog">好吧……</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="ending1()">选择退缩（进入结局1）</button>
        `;
    }

    function p5(){
        clean();
        scene.innerHTML = `
        <div class="name tang">凌雨棠</div>
        <div class="dialog">我笔记忘带了，可以借我吗？</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p7()">给你。</button>
        `;
    }

    function p6(){
        clean();
        scene.innerHTML = `
        <div class="name tang">凌雨棠（开心）</div>
        <div class="dialog">那以后我天天找你！笔记借我好不好？</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p7()">给你。</button>
        `;
    }

    function p7(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">指尖碰到一起，我瞬间红了耳尖。</div>
        <div class="name tang">凌雨棠</div>
        <div class="dialog">谢谢你！</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p8()">下午体育课见。</button>
        `;
    }

    function p8(){
        clean();
        scene.innerHTML = `
        <div class="name tang">凌雨棠（跑完步）</div>
        <div class="dialog">好渴……</div>
        <div class="name yu">我（内心）</div>
        <div class="dialog">我手里一直握着准备给她的水。</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p9()">给你水。</button>
        `;
    }

    function p9(){
        clean();
        scene.innerHTML = `
        <div class="name tang">凌雨棠</div>
        <div class="dialog">禹封你也太温柔了！</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p10()">放学等我。</button>
        `;
    }

    function p10(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">下雨了。我撑伞走向她。</div>
        <div class="name tang">凌雨棠</div>
        <div class="dialog">禹封，我们一起走吧！</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="finalChoose()">进入最终选择</button>
        `;
    }

    // 最终三选一
    function finalChoose(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">伞下很近，她看着我。
        <br>这一刻，我要做出选择。</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="ending1()">（沉默，不告白）</button>
        <button class="btn" onclick="ending2()">（告白，我喜欢你）</button>
        <button class="btn" onclick="ending3()">（隐藏：我一直带病喜欢你）</button>
        `;
    }

    // ===================== 三大结局 =====================

    // 结局1：没告白 → 多年后参加她的婚礼
    function ending1(){
        clean();
        scene.innerHTML = `<div class="ending">
        【结局一 · 余生遗憾】
        <br><br>
        我终究没有说出口。
        <br>我把喜欢藏了一辈子。
        <br><br>
        多年后，我收到了请柬。
        <br>凌雨棠结婚了。
        <br><br>
        我坐在婚礼台下，看着她穿着白裙，笑得很幸福。
        <br>她看向我，轻轻喊了一声：
        <br>“禹封，谢谢你来。”
        <br><br>
        我笑着点头，心里却空了一生。
        <br>那年未说出口的喜欢，成了永远的秘密。
        </div>`;
        choices.innerHTML = `<button class="btn" onclick="lingStart()">看凌雨棠番外</button>`;
    }

    // 结局2：告白成功 → 在一起
    function ending2(){
        clean();
        scene.innerHTML = `<div class="ending">
        【结局二 · 双向奔赴】
        <br><br>
        我看着她，认真地说：
        <br>“雨棠，我喜欢你，喜欢了三年。”
        <br><br>
        她愣住，然后扑进我怀里，眼眶发红：
        <br>“禹封，我也是啊……我等你这句话好久了。”
        <br><br>
        雨还在下，伞下却特别暖。
        <br>我们没有错过。
        <br>暗恋，终于变成了相爱。
        <br><br>
        未来的每一天，我都会陪着你。
        </div>`;
        choices.innerHTML = `<button class="btn" onclick="lingStart()">看凌雨棠番外</button>`;
    }

    // 结局3：江禹封病逝
    function ending3(){
        clean();
        scene.innerHTML = `<div class="ending">
        【结局三 · 永别】
        <br><br>
        我其实一直有病，身体越来越差。
        <br>我撑着所有力气，陪她走完这段青春。
        <br><br>
        那天伞下，我轻轻说：
        <br>“雨棠，我很喜欢你……
        <br>可我可能，不能陪你走下去了。”
        <br><br>
        不久后，我离开了人世。
        <br><br>
        我把所有温柔和喜欢，
        <br>全部留在了她的青春里。
        <br>从此，世间再无江禹封。
        <br><br>
        我爱你，此生未尽。
        </div>`;
        choices.innerHTML = `<button class="btn" onclick="lingStart()">看凌雨棠番外</button>`;
    }

    // ===================== 番外：凌雨棠视角 =====================
    function lingStart(){
        clean();
        scene.innerHTML = `
        <div class="name tang">【番外 · 凌雨棠视角】</div>
        <div class="dialog">
        我知道禹封看起来冷淡，可她比谁都温柔。
        <br>我也喜欢她，整整三年。
        <br>只是我没想到，我们的结局会如此不同……
        </div>`;
        choices.innerHTML = `<button class="btn" onclick="ling1()">下一页</button>`;
    }

    function ling1(){
        clean();
        scene.innerHTML = `
        <div class="name tang">凌雨棠（内心）</div>
        <div class="dialog">
        我每天都在等她靠近，等她多看我一眼。
        <br>她默默给我递水、借我笔记、雨天为我撑伞。
        </div>
        `;
        choices.innerHTML = `<button class="btn" onclick="ling2()">下一页</button>`;
    }

    function ling2(){
        clean();
        scene.innerHTML = `
        <div class="name tang">凌雨棠（内心）</div>
        <div class="dialog">
        如果她选择沉默——
        <br>我会遗憾，她从未知道我也爱她。

        <br><br>
        如果她选择告白——
        <br>我会奔向她，再也不放开。

        <br><br>
        如果她离开——
        <br>我会记着她一辈子。
        </div>
        `;
        choices.innerHTML = `<button class="btn" onclick="lingEnd()">完结</button>`;
    }

    function lingEnd(){
        clean();
        scene.innerHTML = `<div class="ending">
        人的一生会遇到很多人。
        <br>可我最难忘的，始终是那个叫江禹封的女孩。
        <br><br>
        —— 全文完 ——
        </div>`;
        choices.innerHTML = `<button class="btn" onclick="start()">重新开始游戏</button>`;
    }
</script>
</body>
</html>
