<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>足球射门小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #87CEEB, #98FB98);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 90vw;
            max-width: 800px;
            height: 600px;
            background: #2E8B57;
            border: 3px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        /* 草坪纹理 */
        .field {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(#2E8B57 0%, #32CD32 100%);
        }

        .grass-line {
            position: absolute;
            bottom: 120px;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.5);
        }

        /* 球门样式 */
        .goal {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 120px;
            border-bottom: 8px solid #fff;
            border-left: 8px solid #fff;
            border-right: 8px solid #fff;
            border-radius: 5px;
        }

        .goal-net {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.3) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.3) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 守门员 */
        .goalkeeper {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 60px;
            background: #FF4500;
            border-radius: 5px;
            transition: left 0.3s ease;
            z-index: 2;
        }

        .goalkeeper::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 25px;
            background: #FFD700;
            border-radius: 50%;
        }

        /* 足球 */
        .ball {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.05s linear;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            z-index: 3;
            background-image: radial-gradient(circle at 30% 30%, #fff 0%, #f0f0f0 100%);
        }

        .ball::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: 
                linear-gradient(45deg, transparent 48%, #000 48%, #000 52%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, #000 48%, #000 52%, transparent 52%);
        }

        /* 瞄准线 */
        .aim-line {
            position: absolute;
            height: 2px;
            background: rgba(255,255,0,0.8);
            transform-origin: bottom center;
            bottom: 50px;
            left: 50%;
            z-index: 1;
            pointer-events: none;
            display: none;
        }

        /* 力量条 */
        .power-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
            overflow: hidden;
        }

        .power-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, green, yellow, red);
            transition: width 0.05s linear;
        }

        /* 计分板 */
        .scoreboard {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* 提示文字 */
        .tips {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 18px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* 进球效果 */
        .goal-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
            opacity: 0;
            z-index: 100;
            animation: goalAnim 1.5s ease forwards;
        }

        @keyframes goalAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        /* 游戏标题 */
        .game-title {
            color: white;
            font-size: 32px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <h1 class="game-title">⚽ 足球射门小游戏</h1>
    
    <div class="game-container">
        <div class="field">
            <div class="grass-line"></div>
        </div>
        
        <!-- 球门 -->
        <div class="goal">
            <div class="goal-net"></div>
        </div>
        
        <!-- 守门员 -->
        <div class="goalkeeper"></div>
        
        <!-- 足球 -->
        <div class="ball"></div>
        
        <!-- 瞄准线 -->
        <div class="aim-line"></div>
        
        <!-- 力量条 -->
        <div class="power-container">
            <div class="power-bar"></div>
        </div>
        
        <!-- 计分板 -->
        <div class="scoreboard">进球: <span id="goals">0</span> | 射门: <span id="shots">0</span></div>
        
        <!-- 游戏提示 -->
        <div class="tips">按住鼠标蓄力，松开射门</div>
    </div>

    <script>
        // 获取DOM元素
        const ball = document.querySelector('.ball');
        const goalkeeper = document.querySelector('.goalkeeper');
        const aimLine = document.querySelector('.aim-line');
        const powerBar = document.querySelector('.power-bar');
        const goalsEl = document.getElementById('goals');
        const shotsEl = document.getElementById('shots');
        const gameContainer = document.querySelector('.game-container');
        
        // 游戏状态
        let isCharging = false;
        let power = 0;
        let powerInterval;
        let goals = 0;
        let shots = 0;
        let ballMoving = false;
        
        // 初始位置
        const ballStartX = gameContainer.offsetWidth / 2;
        const ballStartY = gameContainer.offsetHeight - 50;
        
        // 鼠标移动控制瞄准
        gameContainer.addEventListener('mousemove', (e) => {
            if (ballMoving) return;
            
            const rect = gameContainer.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            // 计算角度
            const deltaX = mouseX - ballStartX;
            const deltaY = mouseY - ballStartY;
            const angle = Math.atan2(deltaY, deltaX) * 180 / Math.PI;
            
            // 设置瞄准线
            aimLine.style.display = 'block';
            aimLine.style.width = Math.sqrt(deltaX * deltaX + deltaY * deltaY) + 'px';
            aimLine.style.transform = `rotate(${angle - 90}deg)`;
        });

        // 鼠标按下 - 开始蓄力
        gameContainer.addEventListener('mousedown', () => {
            if (ballMoving) return;
            
            isCharging = true;
            power = 0;
            
            // 蓄力动画
            powerInterval = setInterval(() => {
                if (power < 100) {
                    power += 2;
                    powerBar.style.width = power + '%';
                }
            }, 50);
        });

        // 鼠标松开 - 射门
        gameContainer.addEventListener('mouseup', () => {
            if (!isCharging || ballMoving) return;
            
            clearInterval(powerInterval);
            isCharging = false;
            ballMoving = true;
            
            // 增加射门次数
            shots++;
            shotsEl.textContent = shots;
            
            // 隐藏瞄准线
            aimLine.style.display = 'none';
            
            // 获取射门方向
            const aimRect = aimLine.getBoundingClientRect();
            const containerRect = gameContainer.getBoundingClientRect();
            
            const aimAngle = parseFloat(aimLine.style.transform.replace('rotate(', '').replace('deg)', ''));
            const radians = (aimAngle + 90) * Math.PI / 180;
            
            // 计算射门速度
            const speed = power * 1.2;
            
            // 射门动画
            const ballSpeedX = Math.cos(radians) * speed;
            const ballSpeedY = Math.sin(radians) * speed * -1;
            
            let ballX = ballStartX;
            let ballY = ballStartY;
            
            // 守门员扑救
            const goalX = (gameContainer.offsetWidth - 200) / 2;
            const savePosition = Math.random() * 180 + goalX;
            goalkeeper.style.left = savePosition + 'px';
            
            // 动画循环
            const shootInterval = setInterval(() => {
                ballX += ballSpeedX;
                ballY += ballSpeedY;
                
                // 重力效果
                ballSpeedY += 0.3;
                
                // 更新足球位置
                ball.style.left = ballX + 'px';
                ball.style.bottom = (gameContainer.offsetHeight - ballY) + 'px';
                
                // 检测是否进球
                const isGoal = checkGoal(ballX, ballY);
                
                // 边界检测
                if (ballY < 0 || ballX < 0 || ballX > gameContainer.offsetWidth || isGoal) {
                    clearInterval(shootInterval);
                    
                    if (isGoal) {
                        // 进球处理
                        goals++;
                        goalsEl.textContent = goals;
                        
                        // 显示进球效果
                        const goalEffect = document.createElement('div');
                        goalEffect.className = 'goal-effect';
                        goalEffect.textContent = '进球！';
                        gameContainer.appendChild(goalEffect);
                        
                        // 移除效果元素
                        setTimeout(() => {
                            goalEffect.remove();
                        }, 1500);
                    }
                    
                    // 重置足球
                    setTimeout(resetBall, 1000);
                }
            }, 30);
        });

        // 检测是否进球
        function checkGoal(ballX, ballY) {
            const goalLeft = (gameContainer.offsetWidth - 200) / 2;
            const goalRight = goalLeft + 200;
            const goalTop = 50;
            const goalBottom = 170;
            
            // 检查球是否在球门区域内
            return ballX > goalLeft && ballX < goalRight && 
                   ballY > goalTop && ballY < goalBottom;
        }

        // 重置足球位置
        function resetBall() {
            ball.style.left = ballStartX + 'px';
            ball.style.bottom = '50px';
            ballMoving = false;
            powerBar.style.width = '0%';
            goalkeeper.style.left = '50%';
        }

        // 鼠标离开游戏区域
        gameContainer.addEventListener('mouseleave', () => {
            aimLine.style.display = 'none';
        });

        // 初始化
        resetBall();
    </script>
</body>
</html>
