<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>颜文字卡通跑酷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            text-align: center;
            font-family: "微软雅黑", sans-serif;
        }
        .title {
            margin:12px 0 6px;
            font-size:28px;
            color:#2d3436;
        }
        .tip {
            font-size:16px;
            color:#636e72;
            margin-bottom:8px;
        }
        /*游戏主框*/
        .game-wrap {
            width:800px;
            height:340px;
            margin:0 auto;
            border:4px solid #6ab0ff;
            border-radius:12px;
            position:relative;
            overflow:hidden;
            background: linear-gradient(#74b9ff,#d6eaf8);
        }
        /*远山背景*/
        .mountain {
            position:absolute;
            bottom:40px;
            width:0;
            height:0;
            border-style:solid;
            border-color:transparent transparent #a2d9ce transparent;
        }
        /*草地地面*/
        .ground {
            width:100%;
            height:42px;
            background:linear-gradient(#78e082,#38ada9);
            position:absolute;
            bottom:0;
        }
        /*小草装饰*/
        .grass {
            position:absolute;
            bottom:38px;
            width:4px;
            height:14px;
            background:#27ae60;
            border-radius:3px 3px 0 0;
        }
        /*云朵*/
        .cloud {
            position:absolute;
            background:#fff;
            border-radius:50%;
            opacity:0.9;
        }
        /*玩家角色容器*/
        #player {
            width:46px;
            height:58px;
            position:absolute;
            bottom:42px;
            left:100px;
            z-index:10;
        }
        .player-head {
            width:33px;
            height:33px;
            margin:0 auto;
            background:#ffdfb8;
            border-radius:50%;
            border:2px solid #333;
            position:relative;
        }
        /*小人眼睛腮红*/
        .eye {
            width:5px;
            height:6px;
            background:#222;
            border-radius:50%;
            position:absolute;
            top:11px;
        }
        .eye-l {left:7px;}
        .eye-r {right:7px;}
        .blush {
            width:7px;
            height:4px;
            background:#ff9999;
            border-radius:50%;
            position:absolute;
            top:19px;
        }
        .blush-l {left:5px;}
        .blush-r {right:5px;}
        .player-body {
            width:31px;
            height:22px;
            margin:0 auto;
            background:#ff6b6b;
            border-radius:7px;
            border:2px solid #333;
        }
        /*障碍物通用*/
        .obs-rock {
            width:40px;
            height:50px;
            background:linear-gradient(#bdc3c7,#636e72);
            border-radius:35% 65% 40% 60%;
            border:2px solid #2d3436;
            position:absolute;
            bottom:42px;
        }
        .obs-mush {
            width:34px;
            height:42px;
            position:absolute;
            bottom:42px;
        }
        .mush-top {
            width:34px;
            height:22px;
            background:#ff7675;
            border-radius:50% 50% 0 0;
            border:2px solid #333;
        }
        .mush-stick {
            width:14px;
            height:20px;
            margin:0 auto;
            background:#ffeaa7;
            border:2px solid #333;
            border-radius:3px;
        }
        /*飘出颜文字*/
        .face-text {
            position:absolute;
            font-size:22px;
            font-weight:bold;
            pointer-events:none;
            animation:floatUp 1s ease-out forwards;
            z-index:99;
        }
        @keyframes floatUp{
            0%{opacity:1;transform:translateY(0);}
            100%{opacity:0;transform:translateY(-70px);}
        }
        /*分数面板*/
        .score-box {
            position:absolute;
            top:12px;
            left:18px;
            font-size:24px;
            font-weight:bold;
            color:#222;
            background:rgba(255,255,255,0.6);
            padding:4px 12px;
            border-radius:8px;
        }
    </style>
</head>
<body>
    <div class="title">٩(๑>◡<๑)۶ 可爱颜文字跑酷</div>
    <div class="tip">空格键跳跃 | 躲开石头和小蘑菇，躲过会冒出开心颜文字！撞到会出现难过表情</div>
    <div class="game-wrap">
        <div class="ground"></div>
        <div class="score-box">得分：<span id="score">0</span></div>
        <!--玩家人物-->
        <div id="player">
            <div class="player-head">
                <div class="eye eye-l"></div>
                <div class="eye eye-r"></div>
                <div class="blush blush-l"></div>
                <div class="blush blush-r"></div>
            </div>
            <div class="player-body"></div>
        </div>
    </div>

<script>
const gameWrap = document.querySelector('.game-wrap');
const player = document.getElementById('player');
const scoreDom = document.getElementById('score');

//颜文字库
const happyFace = ['٩(๑>◡<๑)۶','(≧∇≦)ﾉ','ヽ(✿ﾟ▽ﾟ)ノ','ヾ(≧▽≦*)o','(๑•̀ㅂ•́)و✧'];
const sadFace = ['(｡•́︿•̀｡)','(╥﹏╥)','(T﹏T)','｡･ﾟﾟ･(>д<)･ﾟﾟ･｡'];

//游戏数据
let isJumping = false;
let gravity = 2.2;
let playerBottom = 42;
let gameSpeed = 5.2;
let score = 0;
let gameOver = false;
const jumpMax = 158;

//随机生成远山
function addHill(){
    let hill = document.createElement('div');
    hill.className='mountain';
    let w = Math.random()*120+70;
    hill.style.borderWidth=`0 ${w/2}px ${w*0.7}px ${w/2}px`;
    hill.style.left = (Math.random()*750)+'px';
    gameWrap.appendChild(hill);
}
for(let i=0;i<6;i++) addHill();

//随机地面小草
function addGrass(){
    let g = document.createElement('div');
    g.className='grass';
    g.style.left = Math.random()*790+'px';
    gameWrap.appendChild(g);
}
for(let i=0;i<25;i++) addGrass();

//漂浮云朵
function createCloud(){
    let cloud = document.createElement('div');
    cloud.className='cloud';
    let s = Math.random()*32+22;
    cloud.style.width=s+'px';
    cloud.style.height=(s*0.65)+'px';
    cloud.style.left='820px';
    cloud.style.top=(Math.random()*140)+'px';
    gameWrap.appendChild(cloud);
    let x=820;
    function move(){
        x -=1.1;
        cloud.style.left=x+'px';
        if(x<-60) cloud.remove();
        else requestAnimationFrame(move);
    }
    move();
    setTimeout(createCloud,3200);
}
createCloud();

//弹出颜文字
function popFace(x,y,isHappy){
    let span = document.createElement('div');
    span.className='face-text';
    let arr = isHappy?happyFace:sadFace;
    span.innerText = arr[Math.floor(Math.random()*arr.length)];
    span.style.left = x+'px';
    span.style.top = y+'px';
    gameWrap.appendChild(span);
    setTimeout(()=>span.remove(),1000);
}

//跳跃
function jump(){
    if(isJumping||gameOver)return;
    isJumping=true;
    let up = setInterval(()=>{
        playerBottom +=9;
        player.style.bottom = playerBottom+'px';
        if(playerBottom>=jumpMax){
            clearInterval(up);
            let down = setInterval(()=>{
                playerBottom -= gravity;
                player.style.bottom = playerBottom+'px';
                if(playerBottom<=42){
                    playerBottom=42;
                    player.style.bottom='42px';
                    clearInterval(down);
                    isJumping=false;
                }
            },20)
        }
    },20)
}

//生成障碍物（随机石头/蘑菇）
function spawnObs(){
    if(gameOver)return;
    let isMush = Math.random()>0.4;
    let obs;
    if(isMush){
        obs = document.createElement('div');
        obs.className='obs-mush';
        obs.innerHTML=`<div class="mush-top"></div><div class="mush-stick"></div>`;
    }else{
        obs = document.createElement('div');
        obs.className='obs-rock';
    }
    gameWrap.appendChild(obs);
    let ox = 800;
    obs.style.left = ox+'px';

    function moveObs(){
        ox -= gameSpeed;
        obs.style.left = ox+'px';
        //跑出屏幕加分+开心颜文字
        if(ox < -50){
            obs.remove();
            score++;
            scoreDom.innerText = score;
            let pRect = player.getBoundingClientRect();
            let wrapRect = gameWrap.getBoundingClientRect();
            popFace(pRect.left-wrapRect.left+10,pRect.top-wrapRect.top,true);
            return;
        }
        //碰撞检测
        let p = player.getBoundingClientRect();
        let o = obs.getBoundingClientRect();
        let wrap = gameWrap.getBoundingClientRect();
        const px = p.left-wrap.left;
        const py = p.top-wrap.top;
        const oxpos = o.left-wrap.left;
        const oypos = o.top-wrap.top;
        if(px<oxpos+40 && px+46>oxpos && py<oypos+50 && py+58>oypos){
            gameOverFunc(px,py);
            return;
        }
        requestAnimationFrame(moveObs);
    }
    moveObs();
    setTimeout(spawnObs,Math.random()*1700+850);
}

//游戏结束
function gameOverFunc(x,y){
    gameOver=true;
    popFace(x,y,false);
    alert(`(>﹏<)游戏结束！得分：${score}\n按空格键重新开始`);
}

//重置游戏
function resetGame(){
    gameOver=false;
    score=0;
    scoreDom.innerText=score;
    playerBottom=42;
    player.style.bottom='42px';
    document.querySelectorAll('.obs-rock,.obs-mush').forEach(v=>v.remove());
    setTimeout(spawnObs,700);
}

//空格监听
document.addEventListener('keydown',e=>{
    if(e.code==='Space'){
        e.preventDefault();
        gameOver?resetGame():jump();
    }
})

spawnObs();
</script>
</body>
</html>
