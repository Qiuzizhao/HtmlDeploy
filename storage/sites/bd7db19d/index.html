<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>枪战小游戏-无限连发版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            user-select: none;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 游戏画布 */
        #game {
            border: 3px solid #0ff;
            border-radius: 8px;
            background: #000;
            box-shadow: 0 0 30px #0ff;
        }

        /* UI界面 */
        .ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 20px;
            text-shadow: 0 0 5px #000;
            display: flex;
            gap: 30px;
        }

        /* 血条 */
        .health-bar {
            width: 200px;
            height: 20px;
            border: 2px solid #fff;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: #ff3333;
            transition: width 0.2s;
        }

        /* 结束界面 */
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff3333;
            text-align: center;
            display: none;
        }

        .game-over h1 {
            font-size: 60px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff0000;
        }

        .restart-btn {
            padding: 15px 30px;
            font-size: 20px;
            background: #0ff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .restart-btn:hover {
            background: #09c;
        }
    </style>
</head>
<body>
    <div class="ui">
        <div>分数: <span id="score">0</span></div>
        <div class="health-bar">
            <div class="health-fill" id="healthFill"></div>
        </div>
        <div style="color:#0f0">无限连发开启</div>
    </div>

    <canvas id="game" width="800" height="600"></canvas>

    <div class="game-over" id="gameOver">
        <h1>游戏结束</h1>
        <p>最终分数: <span id="finalScore">0</span></p>
        <button class="restart-btn" id="restartBtn">重新开始</button>
    </div>

    <script>
        // 获取画布
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const healthFill = document.getElementById('healthFill');
        const gameOverUI = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');

        // 玩家对象
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 25,
            speed: 5,
            health: 100,
            maxHealth: 100,
            color: '#0ff'
        };

        // 子弹、敌人、特效数组
        let bullets = [];
        let enemies = [];
        let effects = [];
        let score = 0;
        let gameRunning = true;

        // 连发配置
        let mouseDown = false;
        let shootTimer = null;
        const shootInterval = 120; // 连发间隔(毫秒)，越小射速越快

        // 按键控制
        const keys = {
            w: false, a: false, s: false, d: false
        };

        // 鼠标位置
        let mouse = { x: 0, y: 0 };

        // 键盘监听
        document.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'w': keys.w = true; break;
                case 'a': keys.a = true; break;
                case 's': keys.s = true; break;
                case 'd': keys.d = true; break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch(e.key.toLowerCase()) {
                case 'w': keys.w = false; break;
                case 'a': keys.a = false; break;
                case 's': keys.s = false; break;
                case 'd': keys.d = false; break;
            }
        });

        // 鼠标瞄准
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        // 鼠标按下开启连发
        canvas.addEventListener('mousedown', (e)=>{
            if(e.button === 0){
                mouseDown = true;
                shoot();
                shootTimer = setInterval(shoot, shootInterval);
            }
        })
        // 鼠标松开停止连发
        canvas.addEventListener('mouseup', (e)=>{
            if(e.button === 0){
                mouseDown = false;
                clearInterval(shootTimer);
            }
        })
        canvas.addEventListener('mouseleave',()=>{
            mouseDown = false;
            clearInterval(shootTimer);
        })

        // 射击函数【无限子弹】
        function shoot() {
            if(!gameRunning) return;
            
            const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            bullets.push({
                x: player.x,
                y: player.y,
                speed: 10,
                size: 5,
                color: '#fff',
                angle: angle
            });

            // 射击音效
            const audio = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-light-saber-swing-1667.mp3');
            audio.volume = 0.2;
            audio.play().catch(()=>{});
        }

        // 创建敌人
        function spawnEnemy() {
            if(!gameRunning) return;
            
            // 随机从屏幕边缘生成
            let x, y;
            const side = Math.floor(Math.random() * 4);
            
            if(side === 0) { x = Math.random() * canvas.width; y = -30; }
            else if(side === 1) { x = canvas.width + 30; y = Math.random() * canvas.height; }
            else if(side === 2) { x = Math.random() * canvas.width; y = canvas.height + 30; }
            else { x = -30; y = Math.random() * canvas.height; }

            enemies.push({
                x: x,
                y: y,
                size: 20,
                speed: 2,
                color: '#f33'
            });
        }

        // 玩家移动
        function movePlayer() {
            if(keys.w && player.y > player.size) player.y -= player.speed;
            if(keys.a && player.x > player.size) player.x -= player.speed;
            if(keys.s && player.y < canvas.height - player.size) player.y += player.speed;
            if(keys.d && player.x < canvas.width - player.size) player.x += player.speed;
        }

        // 子弹移动
        function moveBullets() {
            bullets.forEach((b, i) => {
                b.x += Math.cos(b.angle) * b.speed;
                b.y += Math.sin(b.angle) * b.speed;

                // 超出屏幕删除
                if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                }
            });
        }

        // 敌人移动
        function moveEnemies() {
            enemies.forEach((e, index) => {
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * e.speed;
                e.y += Math.sin(angle) * e.speed;

                // 敌人碰撞玩家
                if(distance(e.x, e.y, player.x, player.y) < e.size + player.size) {
                    player.health -= 10;
                    updateHealth();
                    createEffect(e.x, e.y);
                    enemies.splice(index, 1);
                    
                    if(player.health <= 0) endGame();
                }
            });
        }

        // 碰撞检测
        function checkCollisions() {
            bullets.forEach((b, i) => {
                enemies.forEach((e, j) => {
                    if(distance(b.x, b.y, e.x, e.y) < b.size + e.size) {
                        // 击中特效
                        createEffect(e.x, e.y);
                        
                        // 删除子弹和敌人
                        bullets.splice(i, 1);
                        enemies.splice(j, 1);
                        
                        // 加分
                        score += 10;
                        updateScore();
                        
                        // 击中音效
                        const audio = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-explosion-1698.mp3');
                        audio.volume = 0.2;
                        audio.play().catch(()=>{});
                    }
                });
            });
        }

        // 爆炸特效
        function createEffect(x, y) {
            effects.push({
                x: x, y: y,
                size: 0, maxSize: 30,
                alpha: 1, speed: 2
            });
        }

        // 更新特效
        function updateEffects() {
            effects.forEach((eff, i) => {
                eff.size += eff.speed;
                eff.alpha -= 0.05;
                
                if(eff.alpha <= 0) effects.splice(i, 1);
            });
        }

        // 距离计算
        function distance(x1, y1, x2, y2) {
            return Math.hypot(x2 - x1, y2 - y1);
        }

        // 绘制
        function draw() {
            // 清空画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制玩家
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.closePath();

            // 绘制准星
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 10, 0, Math.PI * 2);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();

            // 绘制子弹
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
                ctx.closePath();
            });

            // 绘制敌人
            enemies.forEach(e => {
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                ctx.fillStyle = e.color;
                ctx.fill();
                ctx.closePath();
            });

            // 绘制爆炸特效
            effects.forEach(eff => {
                ctx.beginPath();
                ctx.arc(eff.x, eff.y, eff.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 100, 0, ${eff.alpha})`;
                ctx.fill();
                ctx.closePath();
            });
        }

        // 更新分数
        function updateScore() {
            scoreEl.textContent = score;
        }

        // 更新血量
        function updateHealth() {
            healthFill.style.width = (player.health / player.maxHealth * 100) + '%';
        }

        // 游戏结束
        function endGame() {
            gameRunning = false;
            clearInterval(shootTimer);
            finalScoreEl.textContent = score;
            gameOverUI.style.display = 'block';
        }

        // 重新开始
        function restartGame() {
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.health = player.maxHealth;
            bullets = [];
            enemies = [];
            effects = [];
            score = 0;
            gameRunning = true;
            gameOverUI.style.display = 'none';
            updateScore();
            updateHealth();
        }

        restartBtn.addEventListener('click', restartGame);

        // 游戏循环
        function gameLoop() {
            if(gameRunning) {
                movePlayer();
                moveBullets();
                moveEnemies();
                checkCollisions();
                updateEffects();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 每1秒生成敌人
        setInterval(spawnEnemy, 1000);

        // 启动游戏
        gameLoop();
        updateScore();
        updateHealth();
    </script>
</body>
</html>
