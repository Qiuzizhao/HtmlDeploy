<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>精致双人竞速赛车</title>
<style>
*{margin:0;padding:0;font-family:"Microsoft Yahei",sans-serif}
body{background:#1a3620;text-align:center;padding:12px}
canvas{border-radius:10px;box-shadow:0 0 25px #0008;border:3px solid #777}
.info{color:#fff;font-size:20px;margin-bottom:8px;display:flex;justify-content:center;gap:60px}
.ctrl{color:#cff;margin:6px 0 10px;font-size:15px}
</style>
</head>
<body>
<div class="info">
<span>🚗红方玩家1耗时：<span id="t1">0.00</span> s</span>
<span>🚙蓝方玩家2耗时：<span id="t2">0.00</span> s</span>
</div>
<div class="ctrl">
玩家1：WASD | 玩家2：方向键 ↑↓←→ | 驶过绿色终点起跑，一圈冲线获胜
</div>
<canvas id="game" width="880" height="520"></canvas>

<script>
const cvs = document.getElementById("game");
const ctx = cvs.getContext("2d");
const domT1 = document.getElementById("t1");
const domT2 = document.getElementById("t2");

// 赛道数据
const trackOuter = [
    {x:30,y:30,w:820,h:90},
    {x:760,y:120,w:90,h:290},
    {x:30,y:410,w:820,h:80},
    {x:30,y:120,w:90,h:290}
]
const trackInner = [
    {x:120,y:100,w:640,h:35},
    {x:725,y:135,w:35,h:220},
    {x:120,y:375,w:640,h:35},
    {x:120,y:135,w:35,h:220}
]
const finishLine = {x:390,y:32,w:100,h:22};

// 赛车数据 + 尾气粒子数组
const car1 = {
    x:70,y:72,w:36,h:22,speed:3.6,color:"#ff2b2b",
    vx:0,vy:0,time:0,started:false,lap:0,smoke:[]
}
const car2 = {
    x:70,y:108,w:36,h:22,speed:3.6,color:"#2b7bff",
    vx:0,vy:0,time:0,started:false,lap:0,smoke:[]
}
const keyMap = {};

// 键盘监听
document.addEventListener("keydown",e=>keyMap[e.code]=true);
document.addEventListener("keyup",e=>keyMap[e.code]=false);

// 草地+道路碰撞检测
function isOnRoad(car){
    let inOuter=false,inInner=false;
    for(let r of trackOuter){
        if(car.x<r.x+r.w&&car.x+car.w>r.x&&car.y<r.y+r.h&&car.y+car.h>r.y) inOuter=true;
    }
    for(let r of trackInner){
        if(car.x<r.x+r.w&&car.x+car.w>r.x&&car.y<r.y+r.h&&car.y+car.h>r.y) inInner=true;
    }
    return inOuter&&!inInner;
}

// 冲线判定
function checkFinish(car,dom){
    const f = finishLine;
    if(car.x<f.x+f.w&&car.x+car.w>f.x&&car.y<f.y+f.h&&car.y+car.h>f.y){
        if(!car.started){
            car.started=true;
        }else{
            car.lap++;
            if(car.lap>=2){
                alert(car.color=="#ff2b2b"?"🏆红方玩家1夺冠！":"🏆蓝方玩家2夺冠！"+`用时${car.time.toFixed(2)}秒`);
                location.reload();
            }
        }
    }
}

// 尾气生成
function addSmoke(car){
    if(car.vx!==0||car.vy!==0){
        car.smoke.push({
            x:car.x+car.w/2,y:car.y+car.h,size:Math.random()*4+2,alpha:1
        })
    }
}

// 赛车移动逻辑
function moveCar(car){
    let oldX=car.x,oldY=car.y;
    car.x+=car.vx;
    car.y+=car.vy;
    // 出赛道回退
    if(!isOnRoad(car)){
        car.x=oldX;car.y=oldY;
    }
    // 画布边界锁死
    car.x=Math.max(0,Math.min(cvs.width-car.w,car.x));
    car.y=Math.max(0,Math.min(cvs.height-car.h,car.y));
    addSmoke(car);
    // 尾气衰减
    for(let i=car.smoke.length-1;i>=0;i--){
        let p=car.smoke[i];
        p.alpha-=0.025;
        p.size+=0.12;
        if(p.alpha<=0) car.smoke.splice(i,1);
    }
}

// 绘制精致赛道
function drawTrack(){
    // 背景草地
    ctx.fillStyle="#3b7d3b";
    ctx.fillRect(0,0,cvs.width,cvs.height);

    // 外环路面
    ctx.fillStyle="#444444";
    trackOuter.forEach(r=>ctx.fillRect(r.x,r.y,r.w,r.h));
    // 内环绿地
    ctx.fillStyle="#3b7d3b";
    trackInner.forEach(r=>ctx.fillRect(r.x,r.y,r.w,r.h));

    // 白色赛道边线
    ctx.strokeStyle="#fff";ctx.lineWidth=3;
    trackOuter.forEach(r=>{
        ctx.strokeRect(r.x,r.y,r.w,r.h);
    })
    trackInner.forEach(r=>{
        ctx.strokeRect(r.x,r.y,r.w,r.h);
    })

    // 终点渐变绿条
    let grad = ctx.createLinearGradient(finishLine.x,0,finishLine.x+finishLine.w,0);
    grad.addColorStop(0,"#0dff45");
    grad.addColorStop(1,"#00b832");
    ctx.fillStyle=grad;
    ctx.fillRect(finishLine.x,finishLine.y,finishLine.w,finishLine.h);
}

// 绘制渐变赛车+轮胎+尾气
function drawCar(car){
    // 尾气
    car.smoke.forEach(p=>{
        ctx.beginPath();
        ctx.fillStyle=`rgba(180,180,180,${p.alpha})`;
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    })
    // 车身渐变
    let carGrad = ctx.createLinearGradient(car.x,car.y,car.x+car.w,car.y);
    carGrad.addColorStop(0,car.color);
    carGrad.addColorStop(1,"#222");
    ctx.fillStyle=carGrad;
    ctx.fillRect(car.x,car.y,car.w,car.h);
    // 黑色轮胎
    ctx.fillStyle="#111";
    ctx.fillRect(car.x-3,car.y-3,6,car.h+6);
    ctx.fillRect(car.x+car.w-3,car.y-3,6,car.h+6);
}

let lastTime = Date.now();
function gameLoop(){
    let now = Date.now();
    let dt = (now-lastTime)/1000;
    lastTime = now;

    // 玩家1 WASD
    car1.vx=0;car1.vy=0;
    if(keyMap["KeyW"]) car1.vy=-car1.speed;
    if(keyMap["KeyS"]) car1.vy=car1.speed;
    if(keyMap["KeyA"]) car1.vx=-car1.speed;
    if(keyMap["KeyD"]) car1.vx=car1.speed;

    // 玩家2 方向键
    car2.vx=0;car2.vy=0;
    if(keyMap["ArrowUp"]) car2.vy=-car2.speed;
    if(keyMap["ArrowDown"]) car2.vy=car2.speed;
    if(keyMap["ArrowLeft"]) car2.vx=-car2.speed;
    if(keyMap["ArrowRight"]) car2.vx=car2.speed;

    moveCar(car1);moveCar(car2);

    // 计时
    if(car1.started){car1.time+=dt;domT1.textContent=car1.time.toFixed(2)}
    if(car2.started){car2.time+=dt;domT2.textContent=car2.time.toFixed(2)}

    checkFinish(car1);checkFinish(car2);

    // 渲染
    drawTrack();
    drawCar(car1);drawCar(car2);

    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
