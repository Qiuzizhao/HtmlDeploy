<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易跑酷小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f0f0f0;
            padding-top: 20px;
        }
        #gameBox {
            width: 800px;
            height: 300px;
            border: 2px solid #333;
            background: #fff;
            position: relative;
            overflow: hidden;
        }
        /* 地面 */
        #ground {
            width: 100%;
            height: 40px;
            background: #666;
            position: absolute;
            bottom: 0;
        }
        /* 玩家角色 */
        #player {
            width: 50px;
            height: 50px;
            background: #2196F3;
            border-radius: 8px;
            position: absolute;
            bottom: 40px;
            left: 80px;
        }
        /* 障碍物 */
        .barrier {
            width: 30px;
            height: 50px;
            background: #f44336;
            position: absolute;
            bottom: 40px;
        }
        #scoreText {
            font-size: 24px;
            margin-bottom:10px;
        }
        #tips {
            margin-top:8px;
            color:#555;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-size:40px;
            color:red;
            display:none;
            text-align:center;
        }
        #restartBtn {
            margin-top:20px;
            padding:8px 20px;
            font-size:18px;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <div id="scoreText">得分：<span id="score">0</span></div>
    <div id="gameBox">
        <div id="player"></div>
        <div id="ground"></div>
        <div id="gameOver">
            游戏结束！
            <br>
            <button id="restartBtn">重新开始</button>
        </div>
    </div>
    <div id="tips">点击屏幕 / 空格键 跳跃，躲避红色障碍物</div>

    <script>
        // 获取元素
        const gameBox = document.getElementById('gameBox');
        const player = document.getElementById('player');
        const scoreDom = document.getElementById('score');
        const gameOverDom = document.getElementById('gameOver');
        const restartBtn = document.getElementById('restartBtn');

        // 游戏参数
        let isJump = false;
        let jumpSpeed = 0;
        const gravity = 2; // 重力
        let playerBottom = 40;
        let score = 0;
        let gameSpeed = 6;
        let gameStatus = true; // true正常游戏 false结束
        let barrierArr = []; // 存放所有障碍物
        let timerGame, timerBarrier;

        // 跳跃逻辑
        function jump() {
            if(isJump || !gameStatus) return;
            isJump = true;
            jumpSpeed = -35; // 向上初速度
        }

        // 生成障碍物
        function createBarrier() {
            if(!gameStatus) return;
            const div = document.createElement('div');
            div.className = 'barrier';
            gameBox.appendChild(div);
            let left = 800;
            div.style.left = left + 'px';
            barrierArr.push(div);
        }

        // 障碍物移动+碰撞检测
        function barrierMove() {
            for(let i=0;i<barrierArr.length;i++){
                let item = barrierArr[i];
                let nowLeft = parseInt(item.style.left);
                nowLeft -= gameSpeed;
                item.style.left = nowLeft + 'px';

                // 出屏幕删除
                if(nowLeft < -30){
                    item.remove();
                    barrierArr.splice(i,1);
                    // 加分
                    score++;
                    scoreDom.innerText = score;
                    // 提速
                    if(score%10===0) gameSpeed +=0.3;
                }

                // 碰撞检测
                const pLeft = player.offsetLeft;
                const pRight = pLeft + 50;
                const pTop = 300 - playerBottom - 50;
                const pBottom = 300 - playerBottom;

                const bLeft = nowLeft;
                const bRight = nowLeft +30;
                const bTop = 300 - 40 -50;
                const bBottom = 300 -40;

                // 矩形碰撞
                if(!(pRight < bLeft || pLeft > bRight || pBottom < bTop || pTop > bBottom)){
                    gameOver();
                }
            }
        }

        // 玩家重力下落
        function playerGravity() {
            if(isJump){
                playerBottom += jumpSpeed;
                jumpSpeed += gravity;
                // 落地
                if(playerBottom >= 40){
                    playerBottom = 40;
                    isJump = false;
                }
            }
            player.style.bottom = playerBottom + 'px';
        }

        // 游戏结束
        function gameOver() {
            gameStatus = false;
            clearInterval(timerGame);
            clearInterval(timerBarrier);
            gameOverDom.style.display = 'block';
        }

        // 重置游戏
        function resetGame() {
            // 清空障碍物
            barrierArr.forEach(item=>item.remove());
            barrierArr = [];
            score = 0;
            gameSpeed =6;
            scoreDom.innerText = score;
            playerBottom =40;
            player.style.bottom = playerBottom+'px';
            gameOverDom.style.display = 'none';
            gameStatus = true;
            startGame();
        }

        // 启动游戏循环
        function startGame(){
            timerGame = setInterval(()=>{
                playerGravity();
                barrierMove();
            },25)
            // 随机生成障碍 800~1400ms
            function randomTime(){
                let time = Math.floor(Math.random()*600 +800);
                timerBarrier = setTimeout(()=>{
                    createBarrier();
                    if(gameStatus) randomTime();
                },time)
            }
            randomTime();
        }

        // 绑定事件
        document.addEventListener('keydown',(e)=>{
            if(e.code==='Space') jump();
        })
        gameBox.addEventListener('click',jump);
        restartBtn.addEventListener('click',resetGame);

        // 初始化启动
        startGame();
    </script>
</body>
</html>
