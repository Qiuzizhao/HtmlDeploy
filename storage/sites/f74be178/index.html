<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>三角洲特种部队 - 网页版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* 游戏容器 */
        #gameContainer {
            position: relative;
            width: 1200px;
            height: 700px;
            border: 3px solid #333;
            background: #7a9667;
            /* 草地底色 */
            background-image:
                radial-gradient(circle, #8a2be2 1px, transparent 1px),
                linear-gradient(#6b8a58 1px, transparent 1px),
                linear-gradient(90deg, #6b8a58 1px, transparent 1px);
            background-size: 40px 40px;
            touch-action: none;
            cursor: crosshair;
        }

        /* 玩家 */
        #player {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #0066ff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #0066ff;
            z-index: 10;
            will-change: left, top;
        }

        /* 子弹 */
        .bullet {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ff0;
            border-radius: 50%;
            z-index: 5;
            will-change: left, top;
            pointer-events: none;
        }

        /* 敌人 */
        .enemy {
            position: absolute;
            width: 28px;
            height: 28px;
            background: #ff3300;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px #ff3300;
            z-index: 8;
            will-change: left, top;
            pointer-events: none;
        }

        /* UI面板 */
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 3px #000;
            z-index: 999;
            user-select: none;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff3300;
            font-size: 60px;
            font-weight: bold;
            text-shadow: 0 0 20px #000;
            display: none;
            z-index: 9999;
            user-select: none;
            text-align: center;
            line-height: 1.4;
            pointer-events: none;
        }

        #gameOver .restart-hint {
            font-size: 20px;
            color: #ffcc00;
            text-shadow: 0 0 10px #000;
            margin-top: 10px;
            font-weight: normal;
        }

        /* 伤害闪烁效果 */
        #player.damaged {
            box-shadow: 0 0 30px #ff0000, 0 0 60px #ff0000;
            transition: box-shadow 0.05s;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            血量: <span id="hp">100</span> | 杀敌: <span id="score">0</span>
        </div>
        <div id="player"></div>
        <div id="gameOver">任务失败！<div class="restart-hint">点击页面重新开始</div></div>
    </div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            // 1. 游戏配置
            // ============================================================
            var CONFIG = {
                MAP_WIDTH: 1200,
                MAP_HEIGHT: 700,
                PLAYER_RADIUS: 15,
                ENEMY_RADIUS: 14,
                BULLET_RADIUS: 3,
                MOVE_SPEED: 5,
                BULLET_SPEED: 12,
                ENEMY_SPEED: 1.6,
                ENEMY_SPAWN_INTERVAL: 2000,
                DAMAGE_COOLDOWN: 500, // 毫秒
                MAX_BULLETS: 150,
                COLLISION_DIST: 24,
                PLAYER_MAX_HP: 100,
                BOUNDARY_PADDING: 15,
                ENEMY_SPAWN_MARGIN: 28
            };

            // ============================================================
            // 2. DOM 引用
            // ============================================================
            var container = document.getElementById('gameContainer');
            var playerEl = document.getElementById('player');
            var hpText = document.getElementById('hp');
            var scoreText = document.getElementById('score');
            var gameOverEl = document.getElementById('gameOver');

            // ============================================================
            // 3. 游戏状态
            // ============================================================
            var state = {
                playerX: CONFIG.MAP_WIDTH / 2,
                playerY: CONFIG.MAP_HEIGHT / 2,
                playerHp: CONFIG.PLAYER_MAX_HP,
                score: 0,
                isOver: false,
                lastDamageTime: 0,
                animFrameId: null,
                spawnTimerId: null,
                keys: { w: false, a: false, s: false, d: false },
                bullets: [],
                enemies: []
            };

            // ============================================================
            // 4. 工具函数
            // ============================================================
            function clamp(val, min, max) {
                return Math.min(Math.max(val, min), max);
            }

            function distance(x1, y1, x2, y2) {
                var dx = x2 - x1;
                var dy = y2 - y1;
                return Math.hypot(dx, dy);
            }

            function isOutOfBounds(x, y, margin) {
                margin = margin || 0;
                return x < -margin || x > CONFIG.MAP_WIDTH + margin ||
                    y < -margin || y > CONFIG.MAP_HEIGHT + margin;
            }

            // ============================================================
            // 5. 输入管理
            // ============================================================
            function onKeyDown(e) {
                var key = e.key.toLowerCase();
                if (key in state.keys) {
                    state.keys[key] = true;
                    e.preventDefault();
                }
            }

            function onKeyUp(e) {
                var key = e.key.toLowerCase();
                if (key in state.keys) {
                    state.keys[key] = false;
                    e.preventDefault();
                }
            }

            function resetKeys() {
                for (var k in state.keys) {
                    if (state.keys.hasOwnProperty(k)) {
                        state.keys[k] = false;
                    }
                }
            }

            // 页面失焦时复位按键，防止玩家"卡方向"
            window.addEventListener('blur', resetKeys);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // ============================================================
            // 6. 射击逻辑
            // ============================================================
            function shoot(e) {
                if (state.isOver) return;

                var rect = container.getBoundingClientRect();
                var mouseX = e.clientX - rect.left;
                var mouseY = e.clientY - rect.top;

                var dx = mouseX - state.playerX;
                var dy = mouseY - state.playerY;
                var dist = Math.hypot(dx, dy);

                // 防止除以零（鼠标正好在玩家位置上）
                if (dist < 0.001) return;

                // 限制最大子弹数，防止性能爆炸
                if (state.bullets.length >= CONFIG.MAX_BULLETS) {
                    var oldest = state.bullets.shift();
                    if (oldest && oldest.el && oldest.el.parentNode) {
                        oldest.el.parentNode.removeChild(oldest.el);
                    }
                }

                var bulletEl = document.createElement('div');
                bulletEl.className = 'bullet';
                bulletEl.style.left = state.playerX + 'px';
                bulletEl.style.top = state.playerY + 'px';
                container.appendChild(bulletEl);

                var speed = CONFIG.BULLET_SPEED;
                state.bullets.push({
                    el: bulletEl,
                    x: state.playerX,
                    y: state.playerY,
                    vx: (dx / dist) * speed,
                    vy: (dy / dist) * speed
                });
            }

            // 鼠标 & 触屏射击
            container.addEventListener('click', shoot);
            container.addEventListener('touchstart', function(e) {
                e.preventDefault();
                var touch = e.touches[0];
                if (touch) {
                    var rect = container.getBoundingClientRect();
                    var fakeEvent = {
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    };
                    shoot(fakeEvent);
                }
            }, { passive: false });

            // ============================================================
            // 7. 敌人生成
            // ============================================================
            function spawnEnemy() {
                if (state.isOver) return;

                var enemyEl = document.createElement('div');
                enemyEl.className = 'enemy';
                container.appendChild(enemyEl);

                var margin = CONFIG.ENEMY_SPAWN_MARGIN;
                var x, y;
                if (Math.random() > 0.5) {
                    x = Math.random() > 0.5 ? -margin : CONFIG.MAP_WIDTH + margin;
                    y = Math.random() * CONFIG.MAP_HEIGHT;
                } else {
                    x = Math.random() * CONFIG.MAP_WIDTH;
                    y = Math.random() > 0.5 ? -margin : CONFIG.MAP_HEIGHT + margin;
                }

                state.enemies.push({
                    el: enemyEl,
                    x: x,
                    y: y,
                    speed: CONFIG.ENEMY_SPEED
                });
            }

            function startEnemySpawner() {
                if (state.spawnTimerId !== null) return;
                // 初始生成几个敌人，让游戏不空旷
                for (var i = 0; i < 3; i++) {
                    spawnEnemy();
                }
                state.spawnTimerId = setInterval(spawnEnemy, CONFIG.ENEMY_SPAWN_INTERVAL);
            }

            function stopEnemySpawner() {
                if (state.spawnTimerId !== null) {
                    clearInterval(state.spawnTimerId);
                    state.spawnTimerId = null;
                }
            }

            // ============================================================
            // 8. 游戏主循环
            // ============================================================
            function updatePlayer() {
                var keys = state.keys;
                var speed = CONFIG.MOVE_SPEED;
                var pad = CONFIG.BOUNDARY_PADDING;
                var px = state.playerX;
                var py = state.playerY;

                if (keys.w && py > pad) py -= speed;
                if (keys.s && py < CONFIG.MAP_HEIGHT - pad) py += speed;
                if (keys.a && px > pad) px -= speed;
                if (keys.d && px < CONFIG.MAP_WIDTH - pad) px += speed;

                state.playerX = px;
                state.playerY = py;
                playerEl.style.left = px + 'px';
                playerEl.style.top = py + 'px';
            }

            function updateBullets() {
                var bullets = state.bullets;
                var enemies = state.enemies;
                var toRemoveBullets = [];
                var toRemoveEnemies = [];
                var hitMap = {}; // 子弹索引 -> 敌人索引

                // 第一遍：更新子弹位置，标记出界和碰撞
                for (var i = bullets.length - 1; i >= 0; i--) {
                    var b = bullets[i];
                    b.x += b.vx;
                    b.y += b.vy;
                    b.el.style.left = b.x + 'px';
                    b.el.style.top = b.y + 'px';

                    // 出界检测
                    if (isOutOfBounds(b.x, b.y, 10)) {
                        toRemoveBullets.push(i);
                        continue;
                    }

                    // 碰撞检测
                    for (var j = enemies.length - 1; j >= 0; j--) {
                        var e = enemies[j];
                        var dist = distance(b.x, b.y, e.x, e.y);
                        if (dist < CONFIG.COLLISION_DIST) {
                            toRemoveBullets.push(i);
                            toRemoveEnemies.push(j);
                            break; // 一颗子弹只击中一个敌人
                        }
                    }
                }

                // 去重排序（从后往前删除）
                toRemoveBullets.sort(function(a, b) { return b - a; });
                toRemoveEnemies.sort(function(a, b) { return b - a; });

                // 删除子弹（去重）
                var seenB = {};
                for (var bi = 0; bi < toRemoveBullets.length; bi++) {
                    var idxB = toRemoveBullets[bi];
                    if (!seenB[idxB]) {
                        seenB[idxB] = true;
                        var bullet = bullets[idxB];
                        if (bullet && bullet.el && bullet.el.parentNode) {
                            bullet.el.parentNode.removeChild(bullet.el);
                        }
                        bullets.splice(idxB, 1);
                    }
                }

                // 删除敌人（去重）
                var seenE = {};
                for (var ei = 0; ei < toRemoveEnemies.length; ei++) {
                    var idxE = toRemoveEnemies[ei];
                    if (!seenE[idxE]) {
                        seenE[idxE] = true;
                        var enemy = enemies[idxE];
                        if (enemy && enemy.el && enemy.el.parentNode) {
                            enemy.el.parentNode.removeChild(enemy.el);
                        }
                        enemies.splice(idxE, 1);
                        state.score++;
                        scoreText.textContent = state.score;
                    }
                }
            }

            function updateEnemies() {
                var enemies = state.enemies;
                var px = state.playerX;
                var py = state.playerY;
                var now = performance.now();
                var tookDamage = false;

                for (var i = enemies.length - 1; i >= 0; i--) {
                    var e = enemies[i];

                    var dx = px - e.x;
                    var dy = py - e.y;
                    var dist = Math.hypot(dx, dy);

                    if (dist > 0.001) {
                        e.x += (dx / dist) * e.speed;
                        e.y += (dy / dist) * e.speed;
                    }

                    e.el.style.left = e.x + 'px';
                    e.el.style.top = e.y + 'px';

                    // 敌人碰到玩家（带冷却）
                    if (dist < CONFIG.COLLISION_DIST + 2) {
                        if (now - state.lastDamageTime > CONFIG.DAMAGE_COOLDOWN) {
                            state.playerHp -= 1;
                            state.lastDamageTime = now;
                            tookDamage = true;
                            if (state.playerHp < 0) {
                                state.playerHp = 0;
                            }
                            hpText.textContent = state.playerHp;
                        }
                    }
                }

                // 受伤视觉反馈
                if (tookDamage) {
                    playerEl.classList.add('damaged');
                    setTimeout(function() {
                        playerEl.classList.remove('damaged');
                    }, 100);
                }
            }

            function checkGameOver() {
                if (state.playerHp <= 0 && !state.isOver) {
                    state.isOver = true;
                    state.playerHp = 0;
                    hpText.textContent = '0';
                    gameOverEl.style.display = 'block';
                    stopEnemySpawner();
                    // 停止主循环
                    if (state.animFrameId !== null) {
                        cancelAnimationFrame(state.animFrameId);
                        state.animFrameId = null;
                    }
                    return true;
                }
                return false;
            }

            function gameLoop(timestamp) {
                if (state.isOver) return;

                // 更新玩家
                updatePlayer();

                // 更新子弹（含碰撞）
                updateBullets();

                // 更新敌人（含攻击）
                updateEnemies();

                // 检查游戏结束
                if (checkGameOver()) return;

                // 继续下一帧
                state.animFrameId = requestAnimationFrame(gameLoop);
            }

            // ============================================================
            // 9. 游戏重启
            // ============================================================
            function restartGame() {
                // 清理旧状态
                if (state.animFrameId !== null) {
                    cancelAnimationFrame(state.animFrameId);
                    state.animFrameId = null;
                }
                stopEnemySpawner();

                // 移除所有子弹和敌人
                var bullets = state.bullets;
                for (var i = 0; i < bullets.length; i++) {
                    var b = bullets[i];
                    if (b && b.el && b.el.parentNode) {
                        b.el.parentNode.removeChild(b.el);
                    }
                }
                var enemies = state.enemies;
                for (var j = 0; j < enemies.length; j++) {
                    var e = enemies[j];
                    if (e && e.el && e.el.parentNode) {
                        e.el.parentNode.removeChild(e.el);
                    }
                }

                // 重置状态
                state.playerX = CONFIG.MAP_WIDTH / 2;
                state.playerY = CONFIG.MAP_HEIGHT / 2;
                state.playerHp = CONFIG.PLAYER_MAX_HP;
                state.score = 0;
                state.isOver = false;
                state.lastDamageTime = 0;
                state.bullets = [];
                state.enemies = [];
                resetKeys();

                // 重置 UI
                playerEl.style.left = state.playerX + 'px';
                playerEl.style.top = state.playerY + 'px';
                playerEl.classList.remove('damaged');
                hpText.textContent = state.playerHp;
                scoreText.textContent = '0';
                gameOverEl.style.display = 'none';

                // 启动敌人生成器
                startEnemySpawner();

                // 启动主循环
                state.animFrameId = requestAnimationFrame(gameLoop);
            }

            // 点击游戏结束画面重启
            gameOverEl.addEventListener('click', function() {
                if (state.isOver) {
                    restartGame();
                }
            });

            // 也支持键盘 R 键重启
            document.addEventListener('keydown', function(e) {
                if (e.key.toLowerCase() === 'r' && state.isOver) {
                    restartGame();
                }
            });

            // ============================================================
            // 10. 启动游戏
            // ============================================================
            function init() {
                // 初始玩家位置
                playerEl.style.left = state.playerX + 'px';
                playerEl.style.top = state.playerY + 'px';
                hpText.textContent = state.playerHp;
                scoreText.textContent = '0';
                gameOverEl.style.display = 'none';

                startEnemySpawner();
                state.animFrameId = requestAnimationFrame(gameLoop);
            }

            init();

            // 窗口大小变化时，保证游戏容器可见（但不缩放）
            // 无额外操作，保持原样

        })();
    </script>
</body>
</html>
