<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音游</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0b0b1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: manipulation;
        }
        .game-container {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 32px;
            padding: 20px 20px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.08);
            max-width: 420px;
            width: 100%;
            margin: 16px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px 16px;
            color: #c8d6e5;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .score-box {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.06);
            font-size: 1.2rem;
        }
        .combo-box {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.06);
            font-size: 1rem;
            color: #feca57;
        }
        .canvas-wrapper {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7), 0 8px 32px rgba(0,0,0,0.5);
            background: #0f0f23;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            background: #0f0f23;
            touch-action: none;
            cursor: pointer;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            background: linear-gradient(135deg, #2d3436, #1e272e);
            border: none;
            color: #dfe6e9;
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 60px;
            box-shadow: 0 6px 0 #0b0b1a, 0 8px 20px rgba(0,0,0,0.4);
            transition: all 0.08s ease;
            letter-spacing: 0.5px;
            touch-action: manipulation;
            cursor: pointer;
            min-width: 100px;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0b0b1a, 0 4px 12px rgba(0,0,0,0.4);
        }
        .btn-primary {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            box-shadow: 0 6px 0 #3d3a7a, 0 8px 20px rgba(108,92,231,0.3);
        }
        .btn-primary:active {
            box-shadow: 0 2px 0 #3d3a7a, 0 4px 12px rgba(108,92,231,0.3);
        }
        .btn-success {
            background: linear-gradient(135deg, #00b894, #55efc4);
            color: #0b0b1a;
            box-shadow: 0 6px 0 #00856a, 0 8px 20px rgba(0,184,148,0.3);
        }
        .btn-success:active {
            box-shadow: 0 2px 0 #00856a, 0 4px 12px rgba(0,184,148,0.3);
        }
        .status-tip {
            text-align: center;
            color: #636e72;
            font-size: 0.85rem;
            margin-top: 14px;
            letter-spacing: 0.3px;
            opacity: 0.8;
        }
        @media (max-width: 480px) {
            .game-container { padding: 12px 12px 20px; }
            .btn { padding: 10px 18px; font-size: 0.9rem; min-width: 80px; }
            .score-box, .combo-box { font-size: 1rem; padding: 6px 14px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="score-box">🎵 <span id="scoreDisplay">0</span></div>
        <div class="combo-box">🔥 <span id="comboDisplay">0</span></div>
    </div>
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>
    <div class="controls">
        <button class="btn btn-primary" id="startBtn">▶ 开始</button>
        <button class="btn btn-success" id="restartBtn">⟳ 重来</button>
    </div>
    <div class="status-tip" id="statusTip">点击「开始」跟随节奏</div>
</div>
<script>
    (function() {
        'use strict';

        // DOM 引用
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const comboSpan = document.getElementById('comboDisplay');
        const statusTip = document.getElementById('statusTip');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // 尺寸常量
        const SIZE = 400;
        const LANE_COUNT = 4;
        const LANE_WIDTH = SIZE / LANE_COUNT; // 100
        const NOTE_RADIUS = 14;
        const HIT_ZONE_Y = SIZE - 40;
        const HIT_THRESHOLD = 30; // 判定距离

        // 游戏状态
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let gameActive = false;
        let gameOver = false;
        let animationId = null;
        let lastTimestamp = 0;

        // 音符数据
        let notes = [];
        let spawnTimer = 0;
        const SPAWN_INTERVAL = 0.6; // 秒
        const NOTE_SPEED = 180; // 像素/秒

        // 粒子特效
        let particles = [];

        // 判定反馈
        let feedbackText = '';
        let feedbackTimer = 0;

        // 重置所有状态
        function resetGame() {
            // 停止动画
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            // 重置变量
            score = 0;
            combo = 0;
            maxCombo = 0;
            gameActive = false;
            gameOver = false;
            notes = [];
            particles = [];
            spawnTimer = 0;
            feedbackText = '';
            feedbackTimer = 0;
            lastTimestamp = 0;
            // 更新UI
            updateUI();
            statusTip.textContent = '点击「开始」跟随节奏';
            // 重绘
            draw();
        }

        // 更新分数/连击显示
        function updateUI() {
            scoreSpan.textContent = score;
            comboSpan.textContent = combo;
        }

        // 生成音符 (随机轨道)
        function spawnNote() {
            const lane = Math.floor(Math.random() * LANE_COUNT);
            const x = lane * LANE_WIDTH + LANE_WIDTH / 2;
            notes.push({
                x: x,
                y: -NOTE_RADIUS,
                lane: lane,
                active: true,
                missed: false
            });
        }

        // 添加粒子
        function addParticles(x, y, color, count) {
            count = count || 12;
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 60 + Math.random() * 120;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 30,
                    life: 1.0,
                    decay: 0.02 + Math.random() * 0.03,
                    size: 3 + Math.random() * 5,
                    color: color
                });
            }
        }

        // 判定击打
        function hitNote(lane) {
            if (!gameActive || gameOver) return false;

            let closest = null;
            let closestDist = Infinity;

            for (let i = 0; i < notes.length; i++) {
                const n = notes[i];
                if (!n.active || n.missed) continue;
                if (n.lane !== lane) continue;
                const dist = Math.abs(n.y - HIT_ZONE_Y);
                if (dist < closestDist) {
                    closestDist = dist;
                    closest = i;
                }
            }

            if (closest === null || closestDist > HIT_THRESHOLD) {
                // 空挥 / 太远
                combo = 0;
                updateUI();
                feedbackText = 'MISS';
                feedbackTimer = 0.4;
                statusTip.textContent = 'MISS';
                return false;
            }

            // 命中
            const note = notes[closest];
            note.active = false;
            combo++;
            if (combo > maxCombo) maxCombo = combo;

            // 分数：连击加成
            const baseScore = 100;
            const comboBonus = Math.min(combo, 50) * 2;
            const addScore = baseScore + comboBonus;
            score += addScore;
            updateUI();

            // 粒子
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            addParticles(note.x, HIT_ZONE_Y, color, 16);

            // 反馈
            if (closestDist < 10) {
                feedbackText = 'PERFECT';
                feedbackTimer = 0.5;
                statusTip.textContent = 'PERFECT!';
            } else if (closestDist < 20) {
                feedbackText = 'GREAT';
                feedbackTimer = 0.45;
                statusTip.textContent = 'GREAT!';
            } else {
                feedbackText = 'GOOD';
                feedbackTimer = 0.4;
                statusTip.textContent = 'GOOD';
            }

            return true;
        }

        // 更新逻辑 (基于delta时间)
        function update(dt) {
            if (!gameActive || gameOver) return;

            // 生成音符
            spawnTimer += dt;
            if (spawnTimer >= SPAWN_INTERVAL) {
                spawnTimer -= SPAWN_INTERVAL;
                spawnNote();
            }

            // 更新音符位置
            for (let i = notes.length - 1; i >= 0; i--) {
                const n = notes[i];
                if (!n.active) {
                    // 已击中的音符保留短暂时间用于粒子，但移除
                    notes.splice(i, 1);
                    continue;
                }
                n.y += NOTE_SPEED * dt;

                // 超出底部且未击中 -> 漏击
                if (n.y > SIZE + NOTE_RADIUS) {
                    if (!n.missed) {
                        n.missed = true;
                        combo = 0;
                        updateUI();
                        feedbackText = 'MISS';
                        feedbackTimer = 0.4;
                        statusTip.textContent = 'MISS';
                    }
                    notes.splice(i, 1);
                }
            }

            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.vy += 200 * dt; // 重力
                p.life -= p.decay;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // 更新反馈计时
            if (feedbackTimer > 0) {
                feedbackTimer -= dt;
                if (feedbackTimer <= 0) {
                    feedbackText = '';
                    if (gameActive && !gameOver) {
                        statusTip.textContent = '继续演奏';
                    }
                }
            }
        }

        // 绘制
        function draw() {
            ctx.clearRect(0, 0, SIZE, SIZE);

            // 背景网格
            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 1;
            for (let i = 1; i < LANE_COUNT; i++) {
                const x = i * LANE_WIDTH;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, SIZE);
                ctx.stroke();
            }

            // 判定线
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.shadowBlur = 10;
            ctx.strokeStyle = '#48dbfb';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, HIT_ZONE_Y);
            ctx.lineTo(SIZE, HIT_ZONE_Y);
            ctx.stroke();
            ctx.shadowBlur = 0;

            // 判定线发光
            const grad = ctx.createLinearGradient(0, HIT_ZONE_Y - 8, 0, HIT_ZONE_Y + 8);
            grad.addColorStop(0, 'rgba(72,219,251,0)');
            grad.addColorStop(0.4, 'rgba(72,219,251,0.15)');
            grad.addColorStop(0.6, 'rgba(72,219,251,0.15)');
            grad.addColorStop(1, 'rgba(72,219,251,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, HIT_ZONE_Y - 8, SIZE, 16);

            // 绘制音符
            for (const n of notes) {
                if (!n.active) continue;
                const x = n.x;
                const y = n.y;
                // 外发光
                ctx.shadowColor = 'rgba(255,107,107,0.5)';
                ctx.shadowBlur = 20;
                // 渐变圆
                const gradient = ctx.createRadialGradient(x-4, y-4, 2, x, y, NOTE_RADIUS);
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(0.7, '#ee5a24');
                gradient.addColorStop(1, '#c0392b');
                ctx.beginPath();
                ctx.arc(x, y, NOTE_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.shadowBlur = 0;
                // 高光
                ctx.beginPath();
                ctx.arc(x-4, y-4, NOTE_RADIUS * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fill();
            }

            // 绘制粒子
            for (const p of particles) {
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.shadowBlur = 12;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // 反馈文字
            if (feedbackText) {
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 16;
                ctx.font = 'bold 32px "Segoe UI", system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                let color = '#feca57';
                if (feedbackText === 'PERFECT') color = '#ff6b6b';
                else if (feedbackText === 'GREAT') color = '#48dbfb';
                else if (feedbackText === 'GOOD') color = '#55efc4';
                else if (feedbackText === 'MISS') color = '#636e72';
                ctx.fillStyle = color;
                ctx.fillText(feedbackText, SIZE/2, 60);
                ctx.shadowBlur = 0;
            }

            // 游戏结束遮罩
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, SIZE, SIZE);
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 20;
                ctx.font = 'bold 40px "Segoe UI", system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#dfe6e9';
                ctx.fillText('游戏结束', SIZE/2, SIZE/2 - 20);
                ctx.font = '24px "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = '#feca57';
                ctx.fillText('得分: ' + score, SIZE/2, SIZE/2 + 40);
                ctx.shadowBlur = 0;
            }
        }

        // 主循环
        function gameLoop(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.05); // 限制最大dt
            lastTimestamp = timestamp;

            update(dt);
            draw();

            animationId = requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        function startGame() {
            if (gameActive && !gameOver) return;
            // 重置但保留分数？ 开始新游戏重置所有
            resetGame();
            gameActive = true;
            gameOver = false;
            spawnTimer = 0;
            notes = [];
            particles = [];
            feedbackText = '';
            feedbackTimer = 0;
            statusTip.textContent = '演奏中...';
            updateUI();
            if (animationId) cancelAnimationFrame(animationId);
            lastTimestamp = 0;
            animationId = requestAnimationFrame(gameLoop);
        }

        // 结束游戏
        function endGame() {
            if (!gameActive || gameOver) return;
            gameActive = false;
            gameOver = true;
            statusTip.textContent = '最终得分: ' + score + ' | 最大连击: ' + maxCombo;
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            draw();
        }

        // 键盘事件 (数字键1-4 或 Q-P)
        function handleKeyDown(e) {
            const key = e.key;
            let lane = -1;
            if (key >= '1' && key <= '4') {
                lane = parseInt(key) - 1;
            } else if (key === 'q' || key === 'Q') lane = 0;
            else if (key === 'w' || key === 'W') lane = 1;
            else if (key === 'e' || key === 'E') lane = 2;
            else if (key === 'r' || key === 'R') lane = 3;
            if (lane >= 0 && lane < LANE_COUNT) {
                e.preventDefault();
                hitNote(lane);
            }
        }

        // 鼠标/触摸点击canvas
        function handleCanvasClick(e) {
            if (!gameActive || gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            if (x < 0 || x > SIZE || y < 0 || y > SIZE) return;
            const lane = Math.floor(x / LANE_WIDTH);
            if (lane >= 0 && lane < LANE_COUNT) {
                hitNote(lane);
            }
        }

        // 绑定事件
        document.addEventListener('keydown', handleKeyDown);
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', handleCanvasClick, { passive: false });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', function() {
            resetGame();
            // 如果之前游戏结束，重置后不自动开始
            statusTip.textContent = '已重置，点击「开始」';
            draw();
        });

        // 初始绘制
        resetGame();

        // 窗口resize不额外处理，canvas保持比例
    })();
</script>
</body>
</html>
