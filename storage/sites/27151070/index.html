<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>崩坏：星穹铁道 - 抽卡模拟器【无限星琼·50抽五星保底】</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#63d2ff',
                        secondary: '#8f70ff',
                        rarity5: '#ffb13b',
                        rarity4: '#a251e6',
                        rarity3: '#3d86d1',
                        dark: '#0a0e17',
                        light: '#151a27',
                    },
                    fontFamily: {
                        starrail: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                        'shine': 'shine 2s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        shine: {
                            '0%': { backgroundPosition: '-100px' },
                            '100%': { backgroundPosition: '200px' },
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .bg-gradient-starrail {
                background: linear-gradient(135deg, #0a0e17 0%, #151a27 100%);
            }
            .card-rarity-5 {
                background: linear-gradient(135deg, #3d2b1f 0%, #4a3627 50%, #3d2b1f 100%);
                box-shadow: 0 0 25px rgba(255, 177, 59, 0.5);
            }
            .card-rarity-4 {
                background: linear-gradient(135deg, #3a2b4a 0%, #47345c 50%, #3a2b4a 100%);
                box-shadow: 0 0 20px rgba(162, 81, 230, 0.4);
            }
            .card-rarity-3 {
                background: linear-gradient(135deg, #2b3b4a 0%, #344a5c 50%, #2b3b4a 100%);
                box-shadow: 0 0 15px rgba(61, 134, 209, 0.3);
            }
            .text-shine {
                background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
                background-size: 200px 100%;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                animation: shine 2s linear infinite;
            }
            .particle {
                position: absolute;
                border-radius: 50%;
                background: white;
                pointer-events: none;
            }
        }
    </style>
</head>
<body class="font-starrail bg-gradient-starrail text-white min-h-screen flex flex-col">
    <!-- 导航栏 -->
    <header class="bg-light/80 backdrop-blur-md border-b border-primary/20 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://webstatic.mihoyo.com/upload/static-resource/2023/04/14/1c6b784448a603688b41fb8cd031aa46_1681459602704.png" 
                     alt="星穹铁道" class="h-10 w-auto">
                <h1 class="text-xl md:text-2xl font-bold text-primary">抽卡模拟器 <span class="text-rarity5 text-sm">无限星琼·50抽保底</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden md:flex items-center gap-2">
                    <i class="fa-solid fa-star text-rarity5"></i>
                    <span id="guarantee-5" class="font-medium">0/50</span>
                </div>
                <div class="hidden md:flex items-center gap-2">
                    <i class="fa-solid fa-star text-rarity4"></i>
                    <span id="guarantee-4" class="font-medium">0/10</span>
                </div>
                <div class="flex items-center gap-2 bg-rarity5/20 px-3 py-1 rounded-full">
                    <i class="fa-solid fa-gem text-rarity5"></i>
                    <span id="stellar-jade" class="font-bold text-rarity5">∞ 无限</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="flex-1 container mx-auto px-4 py-8 flex flex-col items-center justify-center">
        <!-- 祈愿卡池 -->
        <div class="w-full max-w-4xl mb-8 relative">
            <div class="relative rounded-xl overflow-hidden border-2 border-primary/30 h-64 md:h-80">
                <img src="https://uploadstatic.mihoyo.com/hk4e/2024/01/26/6814574997595471182/562f87514a0ce90fa5599285622d4618.jpeg" 
                     alt="卡池封面" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-dark/90 to-transparent"></div>
                <div class="absolute bottom-0 left-0 p-6">
                    <h2 class="text-2xl md:text-3xl font-bold text-white mb-2">群星跃迁</h2>
                    <p class="text-white/80">限时5星角色概率提升 · 50抽必出五星 · 无限抽卡</p>
                </div>
            </div>
        </div>

        <!-- 抽卡按钮 -->
        <div class="flex flex-col sm:flex-row gap-6 mb-12 items-center">
            <button id="single-pull" class="bg-primary hover:bg-primary/80 text-dark font-bold py-3 px-8 rounded-lg transition-all duration-300 transform hover:scale-105 flex items-center gap-2 shadow-lg shadow-primary/20">
                <i class="fa-solid fa-hand-sparkles"></i>
                单次祈愿（160星琼）
            </button>
            <button id="multi-pull" class="bg-secondary hover:bg-secondary/80 text-white font-bold py-3 px-8 rounded-lg transition-all duration-300 transform hover:scale-105 flex items-center gap-2 shadow-lg shadow-secondary/20">
                <i class="fa-solid fa-random"></i>
                十连祈愿（1600星琼）
            </button>
        </div>

        <!-- 结果展示区 -->
        <div id="results-container" class="w-full max-w-6xl grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4 mb-8 hidden">
            <!-- 抽卡结果将在这里动态生成 -->
        </div>

        <!-- 动画展示区 -->
        <div id="animation-container" class="fixed inset-0 bg-dark/95 z-50 flex items-center justify-center hidden">
            <div class="relative">
                <div id="animation-card" class="scale-0 transition-transform duration-1000">
                    <div class="w-64 h-96 rounded-xl flex flex-col items-center justify-center">
                        <div id="animation-rarity" class="text-4xl mb-4 flex">
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                        </div>
                        <img id="animation-image" src="" alt="物品" class="h-40 w-40 object-cover mb-4 rounded-full animate-float">
                        <h3 id="animation-name" class="text-2xl font-bold text-shine"></h3>
                        <p id="animation-type" class="text-white/70 mt-2"></p>
                    </div>
                </div>
                <button id="skip-animation" class="absolute bottom-4 right-4 bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full transition-colors">
                    跳过动画
                </button>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-light/50 border-t border-white/10 py-4">
        <div class="container mx-auto px-4 text-center text-white/50 text-sm">
            <p>本游戏为粉丝制作，非官方游戏，所有素材版权均归米哈游所有</p>
            <p class="mt-1">崩坏：星穹铁道 无限星琼抽卡模拟器｜五星50抽保底</p>
        </footer>
    </footer>

    <script>
        // 卡池数据
        const fiveStarCharacters = [
            { name: "景元", type: "角色", image: "https://uploadstatic.mihoyo.com/hk4e/2023/05/12/9824361990979192279/thumb.png" },
            { name: "希儿", type: "角色", image: "https://uploadstatic.mihoyo.com/hk4e/2023/04/24/9824361990979176666/thumb.png" },
            { name: "布洛妮娅", type: "角色", image: "https://uploadstatic.mihoyo.com/hk4e/2023/04/24/9824361990979176669/thumb.png" },
            { name: "刃", type: "角色", image: "https://uploadstatic.mihoyo.com/hk4e/2023/08/14/9824361990979223366/thumb.png" },
            { name: "饮月", type: "角色", image: "https://uploadstatic.mihoyo.com/hk4e/2023/11/02/9824361990979254122/thumb.png" }
        ];
        
        const fourStarCharacters = [
            { name: "停云", type: "角色", image: "https://uploadstatic.mihoyo.com/hk4e/2023/04/24/9824361990979176670/thumb.png" },
            { name: "佩拉", type: "角色", image: "https://uploadstatic.mihoyo.com/hk4e/2023/04/24/9824361990979176668/thumb.png" },
            { name: "虎克", type: "角色", image: "https://uploadstatic.mihoyo.com/hk4e/2023/04/24/9824361990979176665/thumb.png" },
            { name: "桑博", type: "角色", image: "https://uploadstatic.mihoyo.com/hk4e/2023/04/24/9824361990979176663/thumb.png" },
            { name: "娜塔莎", type: "角色", image: "https://uploadstatic.mihoyo.com/hk4e/2023/04/24/9824361990979176667/thumb.png" }
        ];
        
        const threeStarWeapons = [
            { name: "洞虚", type: "光锥", image: "https://uploadstatic.mihoyo.com/hk4e/2023/04/24/9824361990979176662/thumb.png" },
            { name: "灵钥", type: "光锥", image: "https://uploadstatic.mihoyo.com/hk4e/2023/04/24/9824361990979176661/thumb.png" },
            { name: "晚祷", type: "光锥", image: "https://uploadstatic.mihoyo.com/hk4e/2023/04/24/9824361990979176660/thumb.png" },
            { name: "幽邃", type: "光锥", image: "https://uploadstatic.mihoyo.com/hk4e/2023/04/24/9824361990979176659/thumb.png" }
        ];

        // 游戏状态（无限星琼，五星50抽保底）
        let gameState = {
            pity5: 0,
            pity4: 0,
            isAnimating: false
        };

        // DOM元素
        const singlePullBtn = document.getElementById('single-pull');
        const multiPullBtn = document.getElementById('multi-pull');
        const resultsContainer = document.getElementById('results-container');
        const animationContainer = document.getElementById('animation-container');
        const animationCard = document.getElementById('animation-card');
        const animationName = document.getElementById('animation-name');
        const animationImage = document.getElementById('animation-image');
        const animationType = document.getElementById('animation-type');
        const animationRarity = document.getElementById('animation-rarity');
        const skipAnimationBtn = document.getElementById('skip-animation');
        const guarantee5El = document.getElementById('guarantee-5');
        const guarantee4El = document.getElementById('guarantee-4');

        // 事件监听
        singlePullBtn.addEventListener('click', () => performPull(1));
        multiPullBtn.addEventListener('click', () => performPull(10));
        skipAnimationBtn.addEventListener('click', hideAnimation);

        // 初始化UI
        updateUI();

        // 抽卡逻辑：无限星琼无消耗
        function performPull(count) {
            if (gameState.isAnimating) return;
            const results = [];
            for (let i = 0; i < count; i++) {
                results.push(doSinglePull());
            }
            showResults(results);
            updateUI();
        }

        // 单抽逻辑：五星50抽保底
        function doSinglePull() {
            gameState.pity5++;
            gameState.pity4++;
            
            // 核心修改：50抽必出五星
            if (gameState.pity5 >= 50) {
                gameState.pity5 = 0;
                gameState.pity4 = 0;
                return getRandomItem(fiveStarCharacters, 5);
            }
            
            if (gameState.pity4 >= 10) {
                gameState.pity4 = 0;
                return getRandomItem(fourStarCharacters, 4);
            }
            
            const random = Math.random();
            // 基础1%五星概率不变
            if (random < 0.01) {
                gameState.pity5 = 0;
                gameState.pity4 = 0;
                return getRandomItem(fiveStarCharacters, 5);
            }
            // 10%四星概率不变
            if (random < 0.11) {
                gameState.pity4 = 0;
                return getRandomItem(fourStarCharacters, 4);
            }
            return getRandomItem(threeStarWeapons, 3);
        }

        function getRandomItem(array, rarity) {
            const item = {...array[Math.floor(Math.random() * array.length)]};
            item.rarity = rarity;
            return item;
        }

        function showResults(results) {
            gameState.isAnimating = true;
            resultsContainer.innerHTML = '';
            resultsContainer.classList.remove('hidden');
            
            if (results.length === 1) {
                showAnimation(results[0]);
            } else {
                results.forEach((result, index) => {
                    setTimeout(() => createResultCard(result), index * 200);
                });
                gameState.isAnimating = false;
            }
        }

        function createResultCard(item) {
            const card = document.createElement('div');
            card.className = `card-rarity-${item.rarity} rounded-xl p-4 flex flex-col items-center transition-all duration-500 scale-0 opacity-0`;
            setTimeout(() => {
                card.classList.remove('scale-0', 'opacity-0');
                card.classList.add('scale-100', 'opacity-100');
            }, 100);
            
            const stars = document.createElement('div');
            stars.className = `text-${item.rarity === 5 ? 'rarity5' : item.rarity === 4 ? 'rarity4' : 'rarity3'} mb-2 flex`;
            for (let i = 0; i < item.rarity; i++) stars.innerHTML += '<i class="fa-solid fa-star"></i>';
            
            const img = document.createElement('img');
            img.src = item.image;
            img.alt = item.name;
            img.className = 'w-20 h-20 object-cover rounded-full mb-3';
            
            const name = document.createElement('h3');
            name.className = 'font-bold text-center';
            name.textContent = item.name;
            
            const type = document.createElement('p');
            type.className = 'text-white/60 text-sm mt-1';
            type.textContent = item.type;
            
            card.append(stars, img, name, type);
            resultsContainer.appendChild(card);
            if (item.rarity >= 4) createParticles(card);
        }

        function showAnimation(item) {
            animationContainer.classList.remove('hidden');
            animationName.textContent = item.name;
            animationImage.src = item.image;
            animationType.textContent = item.type;
            animationRarity.className = `text-4xl mb-4 flex ${item.rarity === 5 ? 'text-rarity5' : item.rarity === 4 ? 'text-rarity4' : 'text-rarity3'}`;
            setTimeout(() => {
                animationCard.classList.remove('scale-0');
                animationCard.classList.add('scale-100');
                setTimeout(() => {
                    hideAnimation();
                    createResultCard(item);
                }, 3000);
            }, 500);
        }

        function hideAnimation() {
            animationContainer.classList.add('hidden');
            animationCard.classList.remove('scale-100');
            animationCard.classList.add('scale-0');
            gameState.isAnimating = false;
        }

        function createParticles(element) {
            const rect = element.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 5 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 60 + 40;
                const endX = x + Math.cos(angle) * distance;
                const endY = y + Math.sin(angle) * distance;
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                document.body.appendChild(particle);
                setTimeout(() => {
                    particle.style.transition = `all 0.8s ease-out`;
                    particle.style.left = `${endX}px`;
                    particle.style.top = `${endY}px`;
                    particle.style.opacity = '0';
                    setTimeout(() => particle.remove(), 800);
                }, 10);
            }
        }

        // 更新保底显示
        function updateUI() {
            guarantee5El.textContent = `${gameState.pity5}/50`;
            guarantee4El.textContent = `${gameState.pity4}/10`;
        }
    </script>
</body>
</html>
