<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚔️ 石头剪刀布 - 赛博至尊版</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root {
  --primary: #6366f1;
  --primary-glow: rgba(99, 102, 241, 0.5);
  --accent: #ff007f;
  --win-color: #10b981;
  --lose-color: #ef4444;
  --tie-color: #64748b;
  --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b, #311042);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
}

body {
  background: var(--bg-gradient);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-x: hidden;
  color: #f8fafc;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  max-width: 650px;
  width: 100%;
  border-radius: 28px;
  padding: 35px 25px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
              inset 0 1px 0px 0px rgba(255, 255, 255, 0.1);
  text-align: center;
  position: relative;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

h1 {
  font-size: 36px;
  background: linear-gradient(to right, #fff, #a5b4fc, #ff007f);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
  font-weight: 800;
  letter-spacing: 1px;
}

.desc {
  color: #94a3b8;
  margin-bottom: 25px;
  font-size: 14px;
}

/* 计分板美化 */
.score-row {
  display: flex;
  justify-content: space-between;
  gap: 15px;
  margin-bottom: 20px;
}

.score-box {
  flex: 1;
  background: rgba(15, 23, 42, 0.6);
  padding: 15px;
  border-radius: 18px;
  border: 1px solid rgba(255, 255, 255, 0.03);
  position: relative;
  overflow: hidden;
}

.score-box::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; width: 100%; height: 3px;
}
.score-box.user-box::after { background: var(--primary); }
.score-box.cpu-box::after { background: var(--accent); }

.score-box h3 {
  font-size: 13px;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.score-box .num {
  font-size: 36px;
  font-weight: 800;
  font-family: 'Courier New', Courier, monospace;
  transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.user-box .num { color: #818cf8; }
.cpu-box .num { color: #f43f5e; }

.num.bump {
  transform: scale(1.4);
}

/* 连胜特效 */
.streak {
  display: inline-block;
  margin: 5px 0 20px;
  font-size: 14px;
  color: #fff;
  background: rgba(244, 63, 94, 0.2);
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid rgba(244, 63, 94, 0.3);
  font-weight: 600;
  transition: all 0.3s;
}
.streak.high {
  background: linear-gradient(90deg, #ff007f, #ff7300);
  box-shadow: 0 0 15px #ff007f;
  animation: pulse 1s infinite alternate;
}

@keyframes pulse {
  0% { transform: scale(1); }
  100% { transform: scale(1.05); box-shadow: 0 0 25px #ff007f; }
}

/* 核心PK舞台 */
.stage {
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: rgba(15, 23, 42, 0.4);
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 25px;
  border: 1px dashed rgba(255,255,255,0.1);
}

.stage-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100px;
}

.stage-card .icon {
  font-size: 48px;
  transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
}

.stage-card .label {
  font-size: 12px;
  color: #64748b;
  margin-top: 8px;
}

.vs-text {
  font-size: 24px;
  font-weight: 900;
  font-style: italic;
  color: #475569;
  animation: flashVS 2s infinite;
}

@keyframes flashVS {
  0%, 100% { color: #475569; text-shadow: none; }
  50% { color: #38bdf8; text-shadow: 0 0 10px #38bdf8; }
}

/* 动效关键帧 */
.animate-user { animation: shakeLeft 0.4s ease-in-out 2; }
.animate-cpu { animation: shakeRight 0.4s ease-in-out 2; }

@keyframes shakeLeft {
  0%, 100% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(-25deg) scale(1.15); }
}
@keyframes shakeRight {
  0%, 100% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate
