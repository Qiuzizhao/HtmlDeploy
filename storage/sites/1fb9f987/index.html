<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* 游戏主区域 */
        #game-board {
            border: 3px solid #ffffff;
            background-color: #111;
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(20, 30px);
        }

        /* 方块单元格样式 */
        .cell {
            width: 30px;
            height: 30px;
            border: 1px solid #222;
        }

        /* 信息面板 */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .score-box, .next-box, .controls {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #fff;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #ffd700;
        }

        #score {
            font-size: 24px;
            font-weight: bold;
        }

        /* 下一个方块预览区 */
        #next-piece {
            display: grid;
            grid-template-columns: repeat(4, 20px);
            grid-template-rows: repeat(4, 20px);
            gap: 1px;
        }

        #next-piece .cell {
            width: 20px;
            height: 20px;
        }

        /* 按钮样式 */
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background: #ffd700;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin: 5px;
        }

        button:hover {
            background: #ffed4e;
            transform: scale(1.05);
        }

        /* 游戏结束遮罩 */
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            border: 3px solid #ff0000;
            display: none;
        }

        .game-over h1 {
            color: #ff0000;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 游戏主面板 -->
        <div id="game-board"></div>
        
        <!-- 右侧信息面板 -->
        <div class="info-panel">
            <div class="score-box">
                <h2>当前分数</h2>
                <div id="score">0</div>
            </div>

            <div class="next-box">
                <h2>下一个方块</h2>
                <div id="next-piece"></div>
            </div>

            <div class="controls">
                <h2>操作说明</h2>
                <p>↑：旋转</p>
                <p>↓：加速下落</p>
                <p>←→：左右移动</p>
                <p>空格：瞬间落地</p>
                <button id="start-btn">开始游戏</button>
                <button id="pause-btn">暂停游戏</button>
            </div>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="game-over" id="game-over">
        <h1>游戏结束</h1>
        <p>最终得分：<span id="final-score">0</span></p>
        <button id="restart-btn">重新开始</button>
    </div>

    <script>
        // 游戏基础配置
        const BOARD_WIDTH = 10;  // 宽度10列
        const BOARD_HEIGHT = 20; // 高度20行
        const COLORS = [
            null,
            '#00ffff', // I
            '#0000ff', // J
            '#ffa500', // L
            '#ffff00', // O
            '#00ff00', // S
            '#800080', // T
            '#ff0000'  // Z
        ];

        // 获取DOM元素
        const gameBoard = document.getElementById('game-board');
        const nextPieceBoard = document.getElementById('next-piece');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const gameOverModal = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');

        // 游戏变量
        let board = [];
        let currentPiece;
        let currentPosition;
        let nextPiece;
        let score = 0;
        let gameInterval;
        let isGameRunning = false;
        let isPaused = false;

        // 定义所有方块形状
        const SHAPES = [
            [],
            [[0,0],[1,0],[2,0],[3,0]], // I
            [[0,0],[0,1],[1,1],[2,1]], // J
            [[2,0],[0,1],[1,1],[2,1]], // L
            [[1,0],[2,0],[1,1],[2,1]], // O
            [[1,0],[2,0],[0,1],[1,1]], // S
            [[1,0],[0,1],[1,1],[2,1]], // T
            [[0,0],[1,0],[1,1],[2,1]]  // Z
        ];

        // 初始化游戏面板
        function initBoard() {
            gameBoard.innerHTML = '';
            nextPieceBoard.innerHTML = '';
            board = Array(BOARD_HEIGHT).fill().map(() => Array(BOARD_WIDTH).fill(0));
            
            // 绘制主棋盘
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    gameBoard.appendChild(cell);
                }
            }

            // 绘制预览棋盘
            for (let y = 0; y < 4; y++) {
                for (let x = 0; x < 4; x++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    nextPieceBoard.appendChild(cell);
                }
            }
        }

        // 随机生成方块
        function randomPiece() {
            return Math.floor(Math.random() * 7) + 1;
        }

        // 创建新方块
        function createPiece(type) {
            return SHAPES[type].map(coord => [...coord]);
        }

        // 绘制方块
        function drawPiece(piece, pos, boardElement, isNext = false) {
            const cells = boardElement.querySelectorAll('.cell');
            piece.forEach(([x, y]) => {
                const newX = x + pos.x;
                const newY = y + pos.y;
                if (newX >= 0 && newX < (isNext ? 4 : BOARD_WIDTH) && newY >= 0 && newY < (isNext ? 4 : BOARD_HEIGHT)) {
                    const index = newY * (isNext ? 4 : BOARD_WIDTH) + newX;
                    cells[index].style.backgroundColor = COLORS[piece.type];
                }
            });
        }

        // 清除方块
        function undrawPiece(piece, pos, boardElement, isNext = false) {
            const cells = boardElement.querySelectorAll('.cell');
            piece.forEach(([x, y]) => {
                const newX = x + pos.x;
                const newY = y + pos.y;
                if (newX >= 0 && newX < (isNext ? 4 : BOARD_WIDTH) && newY >= 0 && newY < (isNext ? 4 : BOARD_HEIGHT)) {
                    const index = newY * (isNext ? 4 : BOARD_WIDTH) + newX;
                    cells[index].style.backgroundColor = '';
                }
            });
        }

        // 碰撞检测
        function checkCollision(piece, pos) {
            return piece.some(([x, y]) => {
                const newX = x + pos.x;
                const newY = y + pos.y;
                return (
                    newX < 0 ||
                    newX >= BOARD_WIDTH ||
                    newY >= BOARD_HEIGHT ||
                    (newY >= 0 && board[newY][newX] !== 0)
                );
            });
        }

        // 合并方块到棋盘
        function mergePiece() {
            currentPiece.forEach(([x, y]) => {
                const newX = x + currentPosition.x;
                const newY = y + currentPosition.y;
                if (newY >= 0) {
                    board[newY][newX] = currentPiece.type;
                }
            });
        }

        // 消除满行
        function clearLines() {
            let linesCleared = 0;
            for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    // 消除当前行，上方行下落
                    board.splice(y, 1);
                    board.unshift(Array(BOARD_WIDTH).fill(0));
                    y++; // 检查新落下来的行
                    linesCleared++;
                }
            }

            // 计分规则：消除行数越多得分越高
            if (linesCleared > 0) {
                score += linesCleared * 100 * linesCleared;
                updateScore();
            }
        }

        // 刷新棋盘显示
        function drawBoard() {
            const cells = gameBoard.querySelectorAll('.cell');
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    const index = y * BOARD_WIDTH + x;
                    cells[index].style.backgroundColor = COLORS[board[y][x]] || '';
                }
            }
        }

        // 下落方块
        function moveDown() {
            if (!isGameRunning || isPaused) return;
            
            const newPos = { x: currentPosition.x, y: currentPosition.y + 1 };
            if (!checkCollision(currentPiece, newPos)) {
                undrawPiece(currentPiece, currentPosition, gameBoard);
                currentPosition = newPos;
                drawPiece(currentPiece, currentPosition, gameBoard);
            } else {
                // 无法下落，合并方块
                mergePiece();
                clearLines();
                drawBoard();
                
                // 生成新方块
                currentPiece = nextPiece;
                currentPosition = { x: Math.floor(BOARD_WIDTH / 2) - 1, y: 0 };
                nextPiece = createPiece(randomPiece());
                nextPiece.type = randomPiece();
                
                // 游戏结束判定
                if (checkCollision(currentPiece, currentPosition)) {
                    gameOver();
                }
                
                // 绘制下一个方块预览
                undrawPiece(nextPiece, { x: 0, y: 0 }, nextPieceBoard, true);
                drawPiece(nextPiece, { x: 0, y: 0 }, nextPieceBoard, true);
            }
        }

        // 左右移动
        function moveSide(dir) {
            if (!isGameRunning || isPaused) return;
            const newPos = { x: currentPosition.x + dir, y: currentPosition.y };
            if (!checkCollision(currentPiece, newPos)) {
                undrawPiece(currentPiece, currentPosition, gameBoard);
                currentPosition = newPos;
                drawPiece(currentPiece, currentPosition, gameBoard);
            }
        }

        // 旋转方块
        function rotatePiece() {
            if (!isGameRunning || isPaused) return;
            
            // 旋转矩阵
            const rotated = currentPiece.map(([x, y]) => [y, -x]);
            const newPos = { ...currentPosition };
            
            if (!checkCollision(rotated, newPos)) {
                undrawPiece(currentPiece, currentPosition, gameBoard);
                currentPiece = rotated;
                drawPiece(currentPiece, currentPosition, gameBoard);
            }
        }

        // 瞬间落地
        function dropInstantly() {
            if (!isGameRunning || isPaused) return;
            while (!checkCollision(currentPiece, { x: currentPosition.x, y: currentPosition.y + 1 })) {
                currentPosition.y++;
            }
            undrawPiece(currentPiece, currentPosition, gameBoard);
            drawPiece(currentPiece, currentPosition, gameBoard);
        }

        // 更新分数
        function updateScore() {
            scoreElement.textContent = score;
        }

        // 游戏开始
        function startGame() {
            if (isGameRunning) return;
            
            initBoard();
            score = 0;
            updateScore();
            isGameRunning = true;
            isPaused = false;
            gameOverModal.style.display = 'none';
            
            // 初始化第一个方块和下一个方块
            currentPiece = createPiece(randomPiece());
            currentPiece.type = randomPiece();
            currentPosition = { x: Math.floor(BOARD_WIDTH / 2) - 1, y: 0 };
            nextPiece = createPiece(randomPiece());
            nextPiece.type = randomPiece();
            
            drawPiece(currentPiece, currentPosition, gameBoard);
            drawPiece(nextPiece, { x: 0, y: 0 }, nextPieceBoard, true);
            
            // 设置下落定时器
            gameInterval = setInterval(moveDown, 800);
        }

        // 暂停/继续游戏
        function togglePause() {
            if (!isGameRunning) return;
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '继续游戏' : '暂停游戏';
        }

        // 游戏结束
        function gameOver() {
            isGameRunning = false;
            clearInterval(gameInterval);
            finalScoreElement.textContent = score;
            gameOverModal.style.display = 'block';
        }

        // 键盘控制
        document.addEventListener('keydown', e => {
            if (!isGameRunning) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    moveSide(-1);
                    break;
                case 'ArrowRight':
                    moveSide(1);
                    break;
                case 'ArrowDown':
                    moveDown();
                    break;
                case 'ArrowUp':
                    rotatePiece();
                    break;
                case ' ':
                    dropInstantly();
                    break;
            }
        });

        // 按钮事件绑定
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', startGame);

        // 初始化页面
        initBoard();
    </script>
</body>
</html>
