<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣味猜拳小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .score {
            font-size: 20px;
            margin: 20px 0;
            color: #555;
            display: flex;
            justify-content: space-around;
        }

        .result-area {
            margin: 30px 0;
            min-height: 100px;
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .choice-btn {
            width: 100px;
            height: 100px;
            border: none;
            border-radius: 50%;
            font-size: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f0f0f0;
        }

        .choice-btn:hover {
            transform: scale(1.1);
            background: #e0e0e0;
        }

        .result-text {
            font-size: 24px;
            font-weight: bold;
            margin: 15px 0;
            color: #333;
        }

        .fight-text {
            font-size: 18px;
            color: #666;
        }

        .reset-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            background: #ff6b6b;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .reset-btn:hover {
            background: #ff5252;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>✊✋✌️ 猜拳小游戏</h1>
        <div class="score">
            <div>玩家：<span id="playerScore">0</span></div>
            <div>电脑：<span id="computerScore">0</span></div>
        </div>

        <div class="result-area">
            <div class="fight-text" id="fight">请出拳开始游戏！</div>
            <div class="result-text" id="result"></div>
        </div>

        <div class="choices">
            <button class="choice-btn" data-choice="rock">✊</button>
            <button class="choice-btn" data-choice="paper">✋</button>
            <button class="choice-btn" data-choice="scissors">✌️</button>
        </div>

        <button class="reset-btn" id="reset">重置游戏</button>
    </div>

    <script>
        // 获取元素
        const choiceBtns = document.querySelectorAll('.choice-btn');
        const resultText = document.getElementById('result');
        const fightText = document.getElementById('fight');
        const playerScoreEl = document.getElementById('playerScore');
        const computerScoreEl = document.getElementById('computerScore');
        const resetBtn = document.getElementById('reset');

        // 初始化分数
        let playerScore = 0;
        let computerScore = 0;

        // 电脑随机出拳
        function computerChoose() {
            const choices = ['rock', 'paper', 'scissors'];
            const random = Math.floor(Math.random() * 3);
            return choices[random];
        }

        // 转换为表情文字
        function convertToEmoji(choice) {
            if(choice === 'rock') return '✊石头';
            if(choice === 'paper') return '✋布';
            return '✌️剪刀';
        }

        // 游戏逻辑
        function game(playerChoice) {
            const computerChoice = computerChoose();
            
            // 显示双方出拳
            fightText.textContent = `玩家：${convertToEmoji(playerChoice)}  VS  电脑：${convertToEmoji(computerChoice)}`;

            // 判断胜负
            if(playerChoice === computerChoice) {
                resultText.textContent = '平局！';
                resultText.style.color = '#666';
                return;
            }

            if(
                (playerChoice === 'rock' && computerChoice === 'scissors') ||
                (playerChoice === 'scissors' && computerChoice === 'paper') ||
                (playerChoice === 'paper' && computerChoice === 'rock')
            ) {
                resultText.textContent = '你赢了！🎉';
                resultText.style.color = '#4caf50';
                playerScore++;
                playerScoreEl.textContent = playerScore;
            } else {
                resultText.textContent = '电脑赢了！💻';
                resultText.style.color = '#f44336';
                computerScore++;
                computerScoreEl.textContent = computerScore;
            }
        }

        // 绑定点击事件
        choiceBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const playerChoice = btn.getAttribute('data-choice');
                game(playerChoice);
            });
        });

        // 重置游戏
        resetBtn.addEventListener('click', () => {
            playerScore = 0;
            computerScore = 0;
            playerScoreEl.textContent = 0;
            computerScoreEl.textContent = 0;
            fightText.textContent = '请出拳开始游戏！';
            resultText.textContent = '';
        });
    </script>
</body>
</html>
