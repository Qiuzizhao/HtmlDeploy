<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>猛鬼宿舍-精致版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #0f1423;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .game-title {
            font-size: 30px;
            color: #ff4444;
            margin-bottom:15px;
            text-shadow: 0 0 12px #f00;
            letter-spacing:2px;
        }
        .game-info {
            display: flex;
            gap:35px;
            margin-bottom:16px;
            font-size:18px;
        }
        .game-container {
            width:820px;
            height:520px;
            background: linear-gradient(#182238,#101a30);
            border:4px solid #253b66;
            position:relative;
            overflow:hidden;
            border-radius:8px;
            box-shadow:inset 0 0 60px #050918;
        }
        /* 精致床铺 */
        .bed-wrap{
            width:110px;
            height:65px;
            position:absolute;
            left:345px;
            top:225px;
        }
        .bed-base{
            width:110px;
            height:22px;
            background:#693fa0;
            border-radius:4px;
            box-shadow:0 4px 0 #3e2460;
            position:absolute;
            bottom:0;
        }
        .bed-matt{
            width:92px;
            height:38px;
            background:#945fd8;
            border-radius:6px 6px 2px 2px;
            position:absolute;
            top:0;
            left:9px;
            box-shadow:inset 0 0 8px #c9a8ff;
        }
        /* 精致大门分层 */
        .door-wrap{
            width:66px;
            height:130px;
            position:absolute;
            left:367px;
            top:95px;
        }
        .door-frame{
            width:66px;
            height:130px;
            background:#4a2c1a;
            border-radius:4px;
            padding:4px;
            box-shadow:inset 0 0 0 3px #2d1a0f;
        }
        .door-body{
            width:100%;
            height:100%;
            background:linear-gradient(90deg,#915732,#b47c4c,#915732);
            border-radius:3px;
            transition:all 0.3s ease;
            position:relative;
        }
        .door-handle{
            width:8px;
            height:22px;
            background:#ffd770;
            border-radius:4px;
            position:absolute;
            right:8px;
            top:50%;
            transform:translateY(-50%);
            box-shadow:0 0 6px #ffdd88;
        }
        /* 建造物件样式 */
        .build-item {
            position:absolute;
            width:44px;
            height:44px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:11px;
            border-radius:5px;
            border:2px solid rgba(255,255,255,0.25);
            box-shadow:0 0 8px rgba(255,255,255,0.15);
        }
        /* 精致猛鬼 */
        .game-ghost {
            width:54px;
            height:54px;
            background:radial-gradient(#ff2929,#990000);
            border-radius:50% 50% 45% 45%;
            position:absolute;
            left:710px;
            top:115px;
            box-shadow:0 0 20px #ff2222;
            animation:ghostFloat 1s infinite alternate ease-in-out;
        }
        .game-ghost::after{
            content:"👻";
            font-size:32px;
            display:flex;
            align-items:center;
            justify-content:center;
            height:100%;
        }
        @keyframes ghostFloat {
            0% { transform: translateY(0); }
            100% { transform: translateY(-12px); }
        }
        /* 建造按钮 */
        .build-panel {
            margin-top:18px;
            display:flex;
            gap:12px;
        }
        .build-btn {
            padding:9px 14px;
            background:#1f3359;
            color:#fff;
            border:2px solid #603fa0;
            border-radius:6px;
            cursor:pointer;
            font-size:14px;
            transition:0.2s;
        }
        .build-btn:hover {
            background:#523786;
            box-shadow:0 0 8px #8758d866;
        }
        .game-over, .game-win {
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            font-size:44px;
            font-weight:bold;
            display:none;
        }
        .game-over{
            color:#ff3333;
            text-shadow:0 0 22px #f00;
        }
        .game-win {
            color:#39ff5b;
            text-shadow:0 0 22px #0f0;
        }
    </style>
</head>
<body>
    <div class="game-title">猛鬼宿舍·精致优化版</div>
    <div class="game-info">
        <div>金币：<span id="gold">50</span></div>
        <div>门耐久：<span id="doorHp">150</span></div>
        <div>玩家血量：<span id="playerHp">100</span></div>
        <div>猛鬼血量：<span id="ghostHp">500</span></div>
    </div>

    <div class="game-container" id="game">
        <!-- 床铺分层 -->
        <div class="bed-wrap">
            <div class="bed-matt"></div>
            <div class="bed-base"></div>
        </div>
        <!-- 分层大门 -->
        <div class="door-wrap" id="doorWrap">
            <div class="door-frame">
                <div class="door-body" id="door">
                    <div class="door-handle"></div>
                </div>
            </div>
        </div>
        <div class="game-ghost" id="ghost"></div>
        <div class="game-over" id="over">游戏失败！宿舍被攻破</div>
        <div class="game-win" id="win">成功击退猛鬼！胜利</div>
    </div>

    <div class="build-panel">
        <button class="build-btn" onclick="build('door')">升级铁门(50金币)</button>
        <button class="build-btn" onclick="build('game')">游戏机(30金币)</button>
        <button class="build-btn" onclick="build('tower')">防御炮台(40金币)</button>
        <button class="build-btn" onclick="build('fix')">维修台(20金币)</button>
    </div>

    <script>
        // 初始门耐久修改为150
        let gameData = {
            gold: 50,
            doorHp: 150,
            maxDoorHp: 150,
            playerHp: 100,
            ghostHp: 500,
            ghostAtk: 10,
            goldSpeed: 1,
            isGameOver: false
        };

        // DOM绑定
        const goldEl = document.getElementById('gold');
        const doorHpEl = document.getElementById('doorHp');
        const playerHpEl = document.getElementById('playerHp');
        const ghostHpEl = document.querySelector('.game-info span:nth-child(4)');
        const gameEl = document.getElementById('game');
        const doorEl = document.getElementById('door');
        const ghostEl = document.getElementById('ghost');
        const overEl = document.getElementById('over');
        const winEl = document.getElementById('win');

        // 金币每秒自动增加
        setInterval(() => {
            if(gameData.isGameOver) return;
            gameData.gold += gameData.goldSpeed;
            updateUI();
        }, 1000);

        // 刷新界面+大门血量变色
        function updateUI() {
            goldEl.textContent = gameData.gold;
            doorHpEl.textContent = gameData.doorHp;
            playerHpEl.textContent = gameData.playerHp;
            ghostHpEl.textContent = gameData.ghostHp;
            // 大门残血变色
            let half = gameData.maxDoorHp / 2;
            let quart = gameData.maxDoorHp / 4;
            if(gameData.doorHp <= half && gameData.doorHp>quart){
                doorEl.style.background = "linear-gradient(90deg,#a15228,#cc7240,#a15228)";
            }else if(gameData.doorHp <= quart){
                doorEl.style.background = "linear-gradient(90deg,#942c2c,#d14545,#942c2c)";
            }else{
                doorEl.style.background = "linear-gradient(90deg,#915732,#b47c4c,#915732)";
            }
        }

        // 建造系统
        function build(type) {
            if(gameData.isGameOver) return;
            switch(type) {
                case 'door':
                    if(gameData.gold >= 50) {
                        gameData.gold -= 50;
                        gameData.maxDoorHp += 100;
                        gameData.doorHp = gameData.maxDoorHp;
                        createBuild('铁门','#794c30',315,95);
                    }
                    break;
                case 'game':
                    if(gameData.gold >= 30) {
                        gameData.gold -= 30;
                        gameData.goldSpeed += 1;
                        createBuild('游戏机','#3c79b9',275,225);
                    }
                    break;
                case 'tower':
                    if(gameData.gold >= 40) {
                        gameData.gold -= 40;
                        createBuild('炮台','#2b8836',425,182);
                        setInterval(()=>{
                            if(!gameData.isGameOver) gameData.ghostHp -=5;
                            updateUI();
                        },1000)
                    }
                    break;
                case 'fix':
                    if(gameData.gold >= 20) {
                        gameData.gold -= 20;
                        createBuild('维修台','#e6bc22',318,282);
                        setInterval(()=>{
                            if(!gameData.isGameOver && gameData.doorHp<gameData.maxDoorHp){
                                gameData.doorHp +=2;
                                updateUI();
                            }
                        },1000)
                    }
                    break;
            }
            updateUI();
        }

        // 生成建筑
        function createBuild(name,color,x,y){
            let div = document.createElement('div');
            div.className = 'build-item';
            div.style.background = color;
            div.style.left = x+'px';
            div.style.top = y+'px';
            div.innerText = name;
            gameEl.appendChild(div);
        }

        // 猛鬼AI行动
        function ghostAI() {
            if(gameData.isGameOver) return;
            let curX = Number(ghostEl.style.left||710);
            let targetX = 367+66;
            if(curX>targetX){
                ghostEl.style.left = (curX-5)+'px';
            }else{
                // 攻击大门
                gameData.doorHp -= gameData.ghostAtk;
                if(gameData.doorHp<=0){
                    gameData.playerHp -= gameData.ghostAtk;
                    if(gameData.playerHp<=0) gameOver();
                }
            }
            // 击败猛鬼胜利
            if(gameData.ghostHp<=0) gameWin();
            updateUI();
            setTimeout(ghostAI,500);
        }

        function gameOver(){
            gameData.isGameOver = true;
            overEl.style.display = 'block';
        }
        function gameWin(){
            gameData.isGameOver = true;
            winEl.style.display = 'block';
        }
        ghostAI();
    </script>
</body>
</html>
