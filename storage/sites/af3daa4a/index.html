<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字排序大挑战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#d0d4e8;font-family:'Consolas','Microsoft YaHei',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{max-width:500px;width:100%;text-align:center}
h1{font-size:20px;color:#7c8cf8;letter-spacing:2px;margin-bottom:6px}
.info{font-size:12px;color:#555;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.info span{color:#8090b0}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
.cell{aspect-ratio:1;background:#181b26;border:1px solid #252838;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;color:#7c8cf8;cursor:pointer;transition:all 0.15s;user-select:none}
.cell:hover:not(.done):not(.disabled){background:#1e2235;border-color:#7c8cf8;transform:scale(1.05)}
.cell.done{background:#1e3a2e;border-color:#2a5a3e;color:#4ade80;cursor:default}
.cell.disabled{opacity:0.3;cursor:default}
.cell.wrong{background:#3d1f1f;border-color:#f87171;color:#f87171;animation:shake 0.3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.status{font-size:13px;min-height:24px;margin-bottom:10px}
button{padding:10px 28px;border-radius:8px;border:none;font-size:13px;font-family:inherit;cursor:pointer;font-weight:bold;transition:all 0.2s}
.btn-p{background:#7c8cf8;color:#fff}
.btn-p:hover{background:#5a6cf0}
.btn-s{background:#2d3a2e;color:#4ade80;border:1px solid #2a5a3e}
.btn-s:hover{background:#1e2e20}
.btn-r{background:#3d1f1f;color:#f87171;border:1px solid #3a2a2a}
.btn-r:hover{background:#2e1515}
.hidden{display:none}
.result{background:#181b26;border:1px solid #252838;border-radius:10px;padding:16px;margin-top:10px}
.result .time{font-size:28px;color:#7c8cf8;font-weight:bold}
.result .lbl{font-size:11px;color:#555;margin-top:4px}
.result .reward{font-size:16px;color:#4ade80;margin-top:8px}
.back-link{display:inline-block;margin-top:14px;font-size:11px;color:#555;text-decoration:none}
.back-link:hover{color:#888}
</style>
</head>
<body>
<div class="wrap">
<h1>🔢 数字排序</h1>
<p style="font-size:11px;color:#444;margin-bottom:8px">按 1→25 的顺序点击数字，越快越好！</p>

<div class="info">
  <span>⏱ <b id="timer">0.0</b>s</span>
  <span>🎯 <b id="nextNum">1</b>/25</span>
  <span>📊 <b id="bestScore">-</b></span>
  <span>💰 <b id="balanceDisplay">-</b></span>
</div>

<div class="grid" id="grid"></div>
<div class="status" id="status">点击「开始游戏」挑战</div>
<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
  <button class="btn-p" id="btnStart" onclick="startGame()">开始游戏</button>
  <button class="btn-s hidden" id="btnNext" onclick="startGame()">再来一局</button>
</div>

<div class="result hidden" id="result">
  <div class="lbl">完成时间</div>
  <div class="time" id="resultTime">0.0s</div>
  <div class="reward" id="resultReward"></div>
  <div style="font-size:11px;color:#555;margin-top:6px" id="resultToday"></div>
</div>
</div>

<script>
let numbers = [];
let currentNum = 1;
let startTime = null;
let timerInterval = null;
let gameRunning = false;
let bestTime = localStorage.getItem('game_best_time') || null;
let gameTokenPromise = Promise.resolve('');
function updBal(){try{const u=JSON.parse(localStorage.getItem('mail_hall_user')||'null');document.getElementById('balanceDisplay').textContent=u?u.balance:'未登录'}catch(e){}}}
updBal();

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  numbers.forEach((n, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = n;
    cell.dataset.idx = i;
    cell.onclick = () => clickCell(i);
    grid.appendChild(cell);
  });
  document.getElementById('nextNum').textContent = '1';
}

function startGame() {
  document.getElementById('result').classList.add('hidden');
  document.getElementById('btnNext').classList.add('hidden');
  document.getElementById('btnStart').classList.add('hidden');
  document.getElementById('status').textContent = '开始！';
  document.getElementById('status').style.color = '#4ade80';
  numbers = shuffle([...Array(25).keys()].map(i => i + 1));
  currentNum = 1;
  gameRunning = true;
  // 后台获取游戏凭证，不阻塞游戏
  gameTokenPromise = (async()=>{try{const u=JSON.parse(localStorage.getItem('mail_hall_user')||'null');if(!u)return '';const r=await fetch('api.php',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'action=game_start&user_id='+u.id+'&game=sort'});const d=await r.json();return d.ok?d.token:''}catch(e){return ''}})();
  startTime = Date.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    document.getElementById('timer').textContent = elapsed.toFixed(1);
  }, 100);
  document.getElementById('nextNum').textContent = '1';
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('done','wrong','disabled'));
}

function clickCell(idx) {
  if (!gameRunning) return;
  const val = numbers[idx];
  const cells = document.querySelectorAll('.cell');
  if (cells[idx].classList.contains('done')) return;
  if (val === currentNum) {
    cells[idx].classList.add('done');
    currentNum++;
    document.getElementById('nextNum').textContent = currentNum > 25 ? '✓' : currentNum;
    if (currentNum > 25) {
      gameDone();
    }
  } else {
    cells[idx].classList.add('wrong');
    setTimeout(() => cells[idx].classList.remove('wrong'), 300);
    document.getElementById('status').textContent = `点错了！应该点 ${currentNum}`;
    document.getElementById('status').style.color = '#f87171';
  }
}

async function gameDone() {
  gameRunning = false;
  clearInterval(timerInterval);
  const elapsed = (Date.now() - startTime) / 1000;
  const time = elapsed.toFixed(1);
  document.getElementById('timer').textContent = time;
  document.getElementById('status').textContent = '🎉 完成！';
  document.getElementById('status').style.color = '#4ade80';
  if (!bestTime || elapsed < parseFloat(bestTime)) {
    bestTime = time;
    localStorage.setItem('game_best_time', time);
  }
  document.getElementById('bestScore').textContent = bestTime + 's';
  document.getElementById('resultTime').textContent = time + 's';
  document.getElementById('result').classList.remove('hidden');
  document.querySelectorAll('.cell').forEach(c => c.classList.add('disabled'));

  // 请求奖励（等待完成后再显示"再来一局"，避免竞态）
  const userData = localStorage.getItem('mail_hall_user');
  if (!userData) {
    document.getElementById('resultReward').textContent = '请先登录任务大厅';
    document.getElementById('resultReward').style.color = '#fbbf24';
  } else {
    try {
      const u = JSON.parse(userData);
      const gameToken = await gameTokenPromise;
      const resp = await fetch('api.php', {method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'action=game_reward&user_id='+u.id+'&game=sort&token='+gameToken});
      const d = await resp.json();
      if (d.ok) {
        document.getElementById('resultReward').textContent = '+2 ✓ 今日 '+d.today_earn+'/'+d.max_earn;
        document.getElementById('resultReward').style.color = '#4ade80';
        u.balance = d.balance;
        localStorage.setItem('mail_hall_user', JSON.stringify(u));
      } else {
        document.getElementById('resultReward').textContent = d.msg;
        document.getElementById('resultReward').style.color = '#fbbf24';
      }
      document.getElementById('resultToday').textContent = '今日已领 '+(d.today_count||0)+' 次 / 最多 5 次';
    } catch(e) {
      document.getElementById('resultReward').textContent = '网络错误，请重试';
      document.getElementById('resultReward').style.color = '#f87171';
    }
  }
  updBal();
  document.getElementById('btnNext').classList.remove('hidden');
}

// 初始化
if (bestTime) document.getElementById('bestScore').textContent = bestTime + 's';
</script>
</body>
</html>
