<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豆包快问快答小游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#52c4fa',
                        dubg: '#43b9f8',
                        lightblue: '#e6f7ff',
                    },
                    fontFamily: {
                        sans: ['Microsoft YaHei', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        /* 侧边豆包悬浮样式 */
        .doubao-box {
            position: fixed;
            left: 10px;
            bottom: 30px;
            z-index:99;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,100%{transform: translateY(0px);}
            50%{transform: translateY(-12px);}
        }
        .option-btn:hover{
            transform: scale(1.03);
            transition: all 0.2s ease;
        }
        .card-shadow{
            box-shadow: 0 8px 30px rgba(82,196,250,0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-50 to-blue-100 min-h-screen font-sans">
<!-- 侧边悬浮豆包 -->
<div class="doubao-box">
    <div class="w-[110px] bg-white rounded-3xl p-3 card-shadow text-center">
        <div class="text-[60px]">🤖</div>
        <p class="text-dubg font-bold text-sm mt-1">豆包陪你答题</p>
        <p class="text-xs text-gray-500">加油闯关！</p>
    </div>
</div>

<!-- 主游戏容器 -->
<div class="container mx-auto py-10 px-4 max-w-3xl">
    <div class="text-center mb-8">
        <h1 class="text-[clamp(1.8rem,5vw,2.8rem)] font-bold text-primary">
            <i class="fa fa-question-circle mr-2"></i>豆包快问快答
        </h1>
        <p class="text-gray-600 mt-2">答对得分，挑战你的小知识！</p>
    </div>

    <!-- 信息栏：分数+倒计时 -->
    <div class="flex justify-between bg-white rounded-xl p-4 mb-6 card-shadow">
        <div class="flex items-center gap-2">
            <i class="fa fa-trophy text-yellow-500 text-xl"></i>
            <span class="font-semibold">当前得分：<span id="score" class="text-primary text-lg">0</span></span>
        </div>
        <div class="flex items-center gap-2">
            <i class="fa fa-clock-o text-orange-500 text-xl"></i>
            <span class="font-semibold">剩余时间：<span id="time" class="text-orange-500 text-lg">30</span>s</span>
        </div>
    </div>

    <!-- 答题卡片 -->
    <div class="bg-white rounded-2xl p-6 md:p-8 card-shadow">
        <!-- 题目区域 -->
        <div class="min-h-[100px] mb-6">
            <span class="inline-block bg-primary/10 text-primary px-3 py-1 rounded-full text-sm mb-3">题目 <span id="qIndex">1</span>/<span id="totalNum">5</span></span>
            <h2 id="question" class="text-xl md:text-2xl font-medium text-gray-800">题目加载中...</h2>
        </div>
        <!-- 选项区域 -->
        <div id="optionBox" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        </div>
        <!-- 提示&下一题按钮 -->
        <div class="flex flex-wrap gap-3 mt-8 justify-center">
            <button id="nextBtn" class="hidden bg-primary text-white px-6 py-3 rounded-xl option-btn">
                <i class="fa fa-arrow-right mr-1"></i>下一题
            </button>
            <button id="restartBtn" class="bg-gray-200 text-gray-700 px-6 py-3 rounded-xl option-btn">
                <i class="fa fa-refresh mr-1"></i>重新开始
            </button>
        </div>
        <!-- 答题提示 -->
        <div id="tips" class="mt-5 text-center text-base h-7"></div>
    </div>
</div>

<script>
// 题库（可自行增删题目）
const questionList = [
    {q:"一年有几个季节？",opts:["2个","4个","6个","8个"],ans:1},
    {q:"什么动物被称为国宝？",opts:["老虎","熊猫","猴子","大象"],ans:1},
    {q:"太阳从哪个方向升起？",opts:["西边","南边","东边","北边"],ans:2},
    {q:"彩虹有几种基础颜色？",opts:["5种","7种","9种","3种"],ans:1},
    {q:"地球是什么形状？",opts:["正方体","球形","三角形","长方体"],ans:1}
];

// 全局变量
let nowIndex = 0;
let score = 0;
let timer = null;
let leftTime = 30;
const scoreDom = document.getElementById('score');
const timeDom = document.getElementById('time');
const qDom = document.getElementById('question');
const optBox = document.getElementById('optionBox');
const tipsDom = document.getElementById('tips');
const nextBtn = document.getElementById('nextBtn');
const restartBtn = document.getElementById('restartBtn');
const qIndexDom = document.getElementById('qIndex');
const totalDom = document.getElementById('totalNum');

totalDom.innerText = questionList.length;

// 渲染单题
function renderQuestion(){
    tipsDom.innerText = '';
    nextBtn.classList.add('hidden');
    const item = questionList[nowIndex];
    qIndexDom.innerText = nowIndex+1;
    qDom.innerText = item.q;
    optBox.innerHTML = '';
    // 生成选项按钮
    item.opts.forEach((opt,idx)=>{
        let btn = document.createElement('button');
        btn.className = 'option-btn border-2 border-primary/20 rounded-xl p-4 text-left hover:bg-primary/5 transition-all';
        btn.innerHTML = `<span class="inline-block w-7 h-7 rounded-full bg-primary/10 text-primary text-center mr-2">${String.fromCharCode(65+idx)}</span>${opt}`;
        btn.onclick = ()=>checkAnswer(idx,item.ans);
        optBox.appendChild(btn);
    })
}

// 答案校验
function checkAnswer(select,right){
    const allBtns = optBox.querySelectorAll('button');
    // 禁止重复选择
    allBtns.forEach(b=>b.disabled=true);
    if(select === right){
        score +=20;
        scoreDom.innerText = score;
        tipsDom.innerHTML = '<span class="text-green-500"><i class="fa fa-check-circle"></i>回答正确！+20分</span>';
    }else{
        tipsDom.innerHTML = `<span class="text-red-500"><i class="fa fa-times-circle"></i>答错啦，正确答案是：${String.fromCharCode(65+right)}：${questionList[nowIndex].opts[right]}</span>`;
    }
    nextBtn.classList.remove('hidden');
}

// 下一题
nextBtn.onclick = function(){
    nowIndex++;
    if(nowIndex >= questionList.length){
        tipsDom.innerHTML = `<span class="text-primary text-lg">闯关完成！最终得分：${score}分，点击重新开始再来一局</span>`;
        nextBtn.classList.add('hidden');
        clearInterval(timer);
        return;
    }
    renderQuestion();
}

// 重置游戏
restartBtn.onclick = resetGame;
function resetGame(){
    clearInterval(timer);
    nowIndex = 0;
    score = 0;
    leftTime =30;
    scoreDom.innerText=0;
    timeDom.innerText=leftTime;
    renderQuestion();
    startTimer();
}

// 倒计时
function startTimer(){
    clearInterval(timer);
    timer = setInterval(()=>{
        leftTime--;
        timeDom.innerText = leftTime;
        if(leftTime<=0){
            clearInterval(timer);
            tipsDom.innerHTML = '<span class="text-orange-500">时间到！游戏结束</span>';
            optBox.querySelectorAll('button').forEach(b=>b.disabled=true);
            nextBtn.classList.remove('hidden');
        }
    },1000)
}

// 初始化启动
renderQuestion();
startTimer();
</script>
</body>
</html>
