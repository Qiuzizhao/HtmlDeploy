<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>三年暗恋 · 江禹封视角</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"微软雅黑","黑体",sans-serif;
        }

        body{
            background:#f6f9fc;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .game-box{
            width:100%;
            max-width:600px;
            background:white;
            border-radius:16px;
            box-shadow:0 8px 30px rgba(0,0,0,0.1);
            overflow:hidden;
        }

        .header{
            background:#425a70;
            color:white;
            padding:18px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
        }

        .scene{
            padding:20px;
            color:#333;
            min-height:120px;
            background:#fdfefe;
            font-size:16px;
            line-height:1.7;
        }

        .name{
            font-weight:bold;
            color:#425a70;
            margin-bottom:6px;
        }

        .yu{
            color:#2c3e50;
        }

        .tang{
            color:#e74c3c;
        }

        .dialog{
            padding:14px 20px;
            background:#f8f9fa;
            border-left:4px solid #425a70;
            margin:10px 0;
            border-radius:8px;
        }

        .choices{
            display:flex;
            flex-direction:column;
            gap:10px;
            padding:20px;
        }

        .btn{
            padding:14px;
            border:none;
            border-radius:10px;
            background:#425a70;
            color:white;
            font-size:15px;
            cursor:pointer;
            transition:0.2s;
        }

        .btn:hover{
            background:#33475b;
        }

        .ending{
            text-align:center;
            padding:30px 20px;
            font-size:17px;
            color:#425a70;
            font-weight:bold;
        }

        .hide{
            display:none;
        }
    </style>
</head>

<body>
<div class="game-box">
    <div class="header">三年暗恋 · 江禹封视角</div>
    <div class="scene" id="scene">
        我是江禹封。
        <br>
        别人都觉得我冷淡、难接近。
        <br>
        只有我自己知道，我已经默默喜欢凌雨棠……三年了。
    </div>

    <div class="choices" id="choices">
        <button class="btn" onclick="start()">开始与凌雨棠的相遇</button>
    </div>
</div>

<script>
    let scene = document.getElementById('scene');
    let choices = document.getElementById('choices');

    function clean(){
        scene.innerHTML = '';
        choices.innerHTML = '';
    }

    function start(){
        clean();
        scene.innerHTML = `
        <div class="name tang">凌雨棠（笑着挥手）</div>
        <div class="dialog">江禹封！早上好呀！</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p1()">嗯，早。（冷淡）</button>
        <button class="btn" onclick="p2()">……（假装没听见，心跳却很快）</button>
        `;
    }

    function p1(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">我只敢发出最简单的声音，怕多说一句就暴露情绪。</div>
        <div class="name tang">凌雨棠</div>
        <div class="dialog">你今天还是这么酷～一起去教室吗？</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="p3()">……好。</button>
        <button class="btn" onclick="p4">我自己走。</button>
        `;
    }

    function p2(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">我不敢回应。我怕她听出我声音在抖。</div>
        <div class="name tang">凌雨棠（小声）</div>
        <div class="dialog">嗯……那我不打扰你啦，拜拜～</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="end1()">看着她离开（暗恋日常）</button>
        `;
    }

    function p3(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">她走在我旁边，阳光落在她头发上。
        <br>我心跳快得要炸开，却依旧面无表情。</div>
        <div class="name tang">凌雨棠</div>
        <div class="dialog">江禹封，你是不是其实人很好呀？</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="end2()">……（不敢回答）</button>
        <button class="btn" onclick="end3()">（轻声）……嗯。</button>
        `;
    }

    function p4(){
        clean();
        scene.innerHTML = `
        <div class="name yu">我（内心）</div>
        <div class="dialog">我说了违心的话。
        <br>我其实想和她一起走。</div>
        <div class="name tang">凌雨棠（失落）</div>
        <div class="dialog">哦……好吧。</div>
        `;
        choices.innerHTML = `
        <button class="btn" onclick="end1()">沉默离开</button>
        `;
    }

    // 结局
    function end1(){
        clean();
        scene.innerHTML = `<div class="ending">暗恋，就是一场无人知晓的心动。
        <br>我会继续等。</div>`;
    }

    function end2(){
        clean();
        scene.innerHTML = `<div class="ending">凌雨棠笑了笑，没有再追问。
        <br>她不知道，我早已喜欢她三年。</div>`;
    }

    function end3(){
        clean();
        scene.innerHTML = `<div class="ending">我第一次，认真回应了她。
        <br>凌雨棠眼睛一亮：
        <br>“那以后我天天找你一起走！”
        <br>
        <br>我的三年暗恋，好像终于要迎来光了。</div>`;
    }
</script>
</body>
</html>
