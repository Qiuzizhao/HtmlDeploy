<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插管排序小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .game-title {
            color: white;
            font-size: 2.5rem;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .game-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            max-width: 900px;
            margin: 30px 0;
        }

        /* 试管样式 */
        .tube {
            width: 70px;
            height: 220px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid white;
            border-radius: 0 0 35px 35px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .tube:hover {
            transform: translateY(-5px);
        }

        .tube.selected {
            transform: scale(1.05);
            border-color: #ffd700;
            box-shadow: 0 0 15px #ffd700;
        }

        /* 液体样式 */
        .liquid {
            position: absolute;
            bottom: 0;
            width: 100%;
            transition: height 0.3s ease;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            background: white;
            color: #764ba2;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        /* 胜利弹窗 */
        .win-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .win-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .win-content h2 {
            color: #764ba2;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .win-content p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1 class="game-title">插管排序小游戏</h1>
    
    <div class="game-container" id="gameContainer"></div>
    
    <div class="controls">
        <button onclick="restartGame()">重新开始</button>
    </div>

    <!-- 胜利弹窗 -->
    <div class="win-modal" id="winModal">
        <div class="win-content">
            <h2>🎉 恭喜通关！</h2>
            <p>你成功完成了插管排序挑战！</p>
            <button onclick="closeWinModal()">继续游戏</button>
            <button onclick="restartGame()">再来一局</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const TUBE_COUNT = 6;       // 总试管数
        const COLORS_PER_TUBE = 4;  // 每个试管液体层数
        const COLORS = ['#FF5252', '#FFD740', '#40C4FF', '#69F0AE', '#EA80FC', '#7C4DFF'];
        
        let tubes = [];    // 存储所有试管数据
        let selectedTube = null;  // 选中的试管

        // 初始化游戏
        function initGame() {
            tubes = [];
            selectedTube = null;
            document.getElementById('winModal').style.display = 'none';
            
            // 生成随机液体数组
            let allLiquids = [];
            for(let i = 0; i < COLORS_PER_TUBE - 1; i++) {
                allLiquids.push(...COLORS);
            }
            
            // 打乱顺序
            allLiquids.sort(() => Math.random() - 0.5);
            
            // 分配液体到试管
            for(let i = 0; i < TUBE_COUNT - 1; i++) {
                const tubeLiquids = allLiquids.splice(0, COLORS_PER_TUBE - 1);
                tubes.push([...tubeLiquids]);
            }
            
            // 添加空试管
            tubes.push([]);
            tubes.push([]);
            
            renderTubes();
        }

        // 渲染试管界面
        function renderTubes() {
            const container = document.getElementById('gameContainer');
            container.innerHTML = '';
            
            tubes.forEach((tube, index) => {
                const tubeEl = document.createElement('div');
                tubeEl.className = `tube ${selectedTube === index ? 'selected' : ''}`;
                tubeEl.onclick = () => selectTube(index);
                
                let currentHeight = 0;
                // 倒序渲染液体（底部先显示）
                [...tube].reverse().forEach(color => {
                    const liquidEl = document.createElement('div');
                    liquidEl.className = 'liquid';
                    liquidEl.style.background = color;
                    liquidEl.style.height = `${100 / COLORS_PER_TUBE}%`;
                    liquidEl.style.bottom = `${currentHeight}%`;
                    tubeEl.appendChild(liquidEl);
                    currentHeight += 100 / COLORS_PER_TUBE;
                });
                
                container.appendChild(tubeEl);
            });
        }

        // 选择试管
        function selectTube(index) {
            // 未选中时
            if(selectedTube === null) {
                if(tubes[index].length > 0) {
                    selectedTube = index;
                    renderTubes();
                }
            } 
            // 已选中，尝试倾倒
            else {
                if(selectedTube !== index) {
                    pourLiquid(selectedTube, index);
                }
                selectedTube = null;
                renderTubes();
            }
        }

        // 倾倒液体
        function pourLiquid(from, to) {
            const source = tubes[from];
            const target = tubes[to];
            
            // 目标试管未满 + 顶部颜色相同 或 目标为空
            if(
                target.length < COLORS_PER_TUBE - 1 && 
                (target.length === 0 || target[target.length - 1] === source[source.length - 1])
            ) {
                target.push(source.pop());
                checkWin();
            }
        }

        // 检查是否通关
        function checkWin() {
            let win = true;
            
            tubes.forEach(tube => {
                if(tube.length === 0) return;
                // 检查所有液体颜色是否一致
                const firstColor = tube[0];
                if(!tube.every(color => color === firstColor) || tube.length > COLORS_PER_TUBE - 1) {
                    win = false;
                }
            });
            
            if(win) {
                document.getElementById('winModal').style.display = 'flex';
            }
        }

        // 重新开始游戏
        function restartGame() {
            initGame();
        }

        // 关闭胜利弹窗
        function closeWinModal() {
            document.getElementById('winModal').style.display = 'none';
        }

        // 启动游戏
        window.onload = initGame;
    </script>
</body>
</html>
