<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D跑酷游戏 - 二段跳+多障碍物</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { overflow: hidden; background: #1a1a1a; }
        canvas { display: block; }
        
        /* 游戏UI */
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 100;
        }
        .score { font-size: 32px; margin-bottom: 10px; text-shadow: 0 0 10px #00ff00; }
        .jump-tip { font-size: 16px; color: #ccc; margin-bottom: 8px; }
        .difficulty { margin: 10px 0; }
        .difficulty button {
            padding: 8px 16px;
            margin-right: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            background: #333;
            color: white;
        }
        .difficulty button.active { background: #00ff00; color: black; }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            font-size: 48px;
            text-shadow: 0 0 20px white;
            display: none;
            z-index: 100;
            text-align: center;
        }
        .restart {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            background: #00ff00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 游戏UI -->
    <div class="ui">
        <div class="score">分数: 0</div>
        <div class="jump-tip">支持二段跳！连续按空格</div>
        <div class="difficulty">
            <button id="easy" class="active">简单</button>
            <button id="normal">普通</button>
            <button id="hard">困难</button>
        </div>
    </div>
    <div class="game-over" id="gameOver">
        游戏结束!
        <button class="restart" id="restartBtn">重新开始</button>
    </div>

    <script>
        // 基础游戏配置
        let gameSpeed = 0.2;
        let score = 0;
        let isGameOver = false;
        let obstacles = [];
        let playerVelocityY = 0;
        let jumpCount = 0; // 跳跃计数，实现二段跳
        const MAX_JUMP = 2; // 最大跳跃次数
        const GRAVITY = -0.015;

        // 难度设置
        document.getElementById('easy').onclick = () => { setDifficulty(0.2); }
        document.getElementById('normal').onclick = () => { setDifficulty(0.35); }
        document.getElementById('hard').onclick = () => { setDifficulty(0.5); }
        
        function setDifficulty(speed) {
            gameSpeed = speed;
            document.querySelectorAll('.difficulty button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Three.js 3D场景初始化
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 10, 100);

        // 相机
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 10);
        camera.lookAt(0, 0, 0);

        // 渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 5);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        // 地面
        const groundGeometry = new THREE.PlaneGeometry(20, 200);
        const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x228b22 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 玩家（3D立方体）
        const playerGeometry = new THREE.BoxGeometry(1, 1, 1);
        const playerMaterial = new THREE.MeshLambertMaterial({ color: 0xff0000 });
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.position.set(0, 0.5, 0);
        player.castShadow = true;
        scene.add(player);

        // 键盘控制
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            // 二段跳逻辑：空格、未结束游戏、跳跃次数未满
            if(e.code === 'Space' && !isGameOver && jumpCount < MAX_JUMP) {
                playerVelocityY = 0.32;
                jumpCount++;
            }
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // 生成多种障碍物
        function createObstacle() {
            let obstacle;
            const randType = Math.random();

            // 类型1：普通立柱
            if (randType < 0.4) {
                const obsGeometry = new THREE.BoxGeometry(1, 2, 1);
                const obsMaterial = new THREE.MeshLambertMaterial({ color: 0xff8800 });
                obstacle = new THREE.Mesh(obsGeometry, obsMaterial);
            }
            // 类型2：宽墙体
            else if (randType < 0.7) {
                const obsGeometry = new THREE.BoxGeometry(3, 1.5, 1);
                const obsMaterial = new THREE.MeshLambertMaterial({ color: 0x4488ff });
                obstacle = new THREE.Mesh(obsGeometry, obsMaterial);
            }
            // 类型3：高柱体
            else {
                const obsGeometry = new THREE.BoxGeometry(1.2, 3, 1.2);
                const obsMaterial = new THREE.MeshLambertMaterial({ color: 0xcc4444 });
                obstacle = new THREE.Mesh(obsGeometry, obsMaterial);
            }
            
            // 随机左右位置
            obstacle.position.x = (Math.random() - 0.5) * 12;
            obstacle.position.y = 1;
            obstacle.position.z = -50 - Math.random() * 40;
            obstacle.castShadow = true;
            scene.add(obstacle);
            obstacles.push(obstacle);
        }

        // 碰撞检测
        function checkCollision() {
            const playerBox = new THREE.Box3().setFromObject(player);
            for(let obs of obstacles) {
                const obsBox = new THREE.Box3().setFromObject(obs);
                if(playerBox.intersectsBox(obsBox)) {
                    gameOver();
                }
            }
        }

        // 游戏结束
        function gameOver() {
            isGameOver = true;
            document.getElementById('gameOver').style.display = 'block';
        }

        // 重新开始
        document.getElementById('restartBtn').onclick = () => {
            score = 0;
            isGameOver = false;
            jumpCount = 0;
            playerVelocityY = 0;
            player.position.set(0, 0.5, 0);
            
            // 清除障碍物
            obstacles.forEach(obs => scene.remove(obs));
            obstacles = [];
            document.getElementById('gameOver').style.display = 'none';
            document.querySelector('.score').textContent = `分数: ${score}`;
        }

        // 游戏主循环
        function animate() {
            requestAnimationFrame(animate);
            if(isGameOver) return;

            // 地面滚动
            ground.position.z += gameSpeed;
            if(ground.position.z > 50) ground.position.z = 0;

            // 障碍物移动、计分、销毁
            obstacles.forEach((obs, index) => {
                obs.position.z += gameSpeed;
                if(obs.position.z > 20) {
                    scene.remove(obs);
                    obstacles.splice(index, 1);
                    score += 10;
                    document.querySelector('.score').textContent = `分数: ${score}`;
                }
            });

            // 提升障碍物生成概率，障碍物更多
            if(Math.random() < 0.04) createObstacle();

            // 跳跃物理 + 二段跳落地重置
            playerVelocityY += GRAVITY;
            player.position.y += playerVelocityY;
            if(player.position.y <= 0.5) {
                player.position.y = 0.5;
                playerVelocityY = 0;
                jumpCount = 0; // 落地重置跳跃次数
            }

            // 左右移动
            if((keys['KeyA'] || keys['ArrowLeft']) && player.position.x > -9) {
                player.position.x -= 0.2;
            }
            if((keys['KeyD'] || keys['ArrowRight']) && player.position.x < 9) {
                player.position.x += 0.2;
            }

            // 前后移动
            if((keys['KeyW'] || keys['ArrowUp']) && player.position.z < 5) {
                player.position.z += 0.2;
            }
            if((keys['KeyS'] || keys['ArrowDown']) && player.position.z > -5) {
                player.position.z -= 0.2;
            }

            // 碰撞检测
            checkCollision();

            renderer.render(scene, camera);
        }

        // 窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 启动游戏
        animate();
    </script>
</body>
</html>
