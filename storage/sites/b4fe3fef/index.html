<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大学校园模拟器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }
        .game-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15), 0 6px 12px rgba(0, 0, 0, 0.05);
            padding: 24px 20px 32px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #1e293b;
            text-align: center;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        h1 small {
            font-size: 16px;
            font-weight: 400;
            color: #64748b;
            background: #e2e8f0;
            padding: 2px 12px;
            border-radius: 40px;
        }
        .status-panel {
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 18px 16px;
            margin: 16px 0 20px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.04), 0 8px 12px -8px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.7);
        }
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 12px;
            gap: 4px 8px;
        }
        .day-grade {
            font-weight: 600;
            color: #0f172a;
            font-size: 18px;
        }
        .student-name {
            color: #334155;
            font-weight: 500;
            background: #eef2f6;
            padding: 0 12px;
            border-radius: 30px;
            font-size: 15px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 16px;
            margin-top: 6px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 16px;
            color: #1e293b;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            border: 1px solid #ffffff;
        }
        .stat-item .label {
            color: #475569;
            min-width: 44px;
        }
        .stat-value {
            font-weight: 600;
            color: #0f172a;
        }
        .stat-value.credit { color: #2563eb; }
        .stat-value.money { color: #16a34a; }
        .stat-value.health { color: #dc2626; }
        .stat-value.mood { color: #d97706; }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px 8px;
            margin: 20px 0 16px;
        }
        .action-btn {
            background: white;
            border: none;
            padding: 10px 16px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 15px;
            color: #1e293b;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
            border: 1px solid #e9edf2;
            transition: all 0.15s ease;
            cursor: pointer;
            flex: 0 1 auto;
            min-width: 56px;
            background: #f8fafc;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .action-btn:hover {
            background: #ffffff;
            border-color: #cbd5e1;
            box-shadow: 0 6px 10px -4px rgba(0,0,0,0.08);
            transform: scale(0.97);
        }
        .action-btn:active {
            transform: scale(0.94);
            background: #f1f5f9;
        }
        .action-btn.end-day {
            background: #eef2ff;
            border-color: #a5b4fc;
            color: #1e3a8a;
        }
        .action-btn.exit-btn {
            background: #fef2f2;
            border-color: #fca5a5;
            color: #991b1b;
        }
        .log-area {
            background: #f1f5f9e0;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 16px 18px;
            margin: 12px 0 6px;
            min-height: 80px;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid #ffffff;
            font-size: 15px;
            line-height: 1.5;
            color: #1e293b;
            scroll-behavior: smooth;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
        }
        .log-area p {
            margin: 4px 0;
            padding: 2px 0;
            border-bottom: 1px dashed #d1d9e6;
        }
        .log-area p:last-child {
            border-bottom: none;
        }
        .log-area .event-log {
            color: #075985;
            font-weight: 500;
        }
        .log-area .warning {
            color: #b91c1c;
        }
        .game-over-message {
            text-align: center;
            font-weight: 600;
            color: #b91c1c;
            background: #fee2e2;
            padding: 10px 16px;
            border-radius: 60px;
            margin: 12px 0 0;
        }
        .footer-hint {
            text-align: center;
            color: #64748b;
            font-size: 13px;
            margin-top: 16px;
            border-top: 1px solid #dce2eb;
            padding-top: 14px;
            letter-spacing: 0.3px;
        }
        .footer-hint span {
            background: #e9edf2;
            padding: 2px 10px;
            border-radius: 30px;
        }
        @media (max-width: 480px) {
            .game-container { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
            .stat-item { font-size: 14px; padding: 4px 10px; }
            .action-btn { font-size: 14px; padding: 8px 14px; min-width: 48px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <h1>🎓 大学 <small>模拟器</small></h1>

    <div class="status-panel" id="statusPanel">
        <div class="status-header">
            <span class="day-grade" id="dayGrade">📅 第1天 · 大一</span>
            <span class="student-name" id="studentName">🧑 新生小明</span>
        </div>
        <div class="stats-grid">
            <div class="stat-item"><span class="label">📚 学分</span><span class="stat-value credit" id="creditVal">0</span></div>
            <div class="stat-item"><span class="label">💰 生活费</span><span class="stat-value money" id="moneyVal">1500</span></div>
            <div class="stat-item"><span class="label">❤️ 健康</span><span class="stat-value health" id="healthVal">100</span></div>
            <div class="stat-item"><span class="label">😊 心情</span><span class="stat-value mood" id="moodVal">80</span></div>
        </div>
    </div>

    <div class="action-bar" id="actionBar">
        <button class="action-btn" data-action="study">📖 上课</button>
        <button class="action-btn" data-action="eat">🍜 吃饭</button>
        <button class="action-btn" data-action="club">🎭 社团</button>
        <button class="action-btn" data-action="work">💼 打工</button>
        <button class="action-btn" data-action="sleep">🛌 睡觉</button>
        <button class="action-btn end-day" data-action="nextday">🌙 结束当天</button>
        <button class="action-btn exit-btn" data-action="exit">🚪 退学</button>
    </div>

    <div class="log-area" id="logArea">
        <p>🏁 欢迎来到大学校园！选择你的行动。</p>
    </div>
    <div id="gameOverContainer" style="min-height: 20px;"></div>
    <div class="footer-hint"><span>1上课 · 2吃饭 · 3社团 · 4打工 · 5睡觉 · 0结束 · exit退出</span></div>
</div>

<script>
    (function() {
        // ---------- 学生对象 (纯数据) ----------
        const student = {
            name: "新生小明",
            credit: 0,
            money: 1500,
            health: 100,
            mood: 80,
            day: 1,
            grade: "大一"
        };

        // DOM 元素
        const dayGradeEl = document.getElementById('dayGrade');
        const studentNameEl = document.getElementById('studentName');
        const creditVal = document.getElementById('creditVal');
        const moneyVal = document.getElementById('moneyVal');
        const healthVal = document.getElementById('healthVal');
        const moodVal = document.getElementById('moodVal');
        const logArea = document.getElementById('logArea');
        const gameOverContainer = document.getElementById('gameOverContainer');

        let gameOver = false;

        // ---------- 辅助函数 ----------
        function limitAttributes() {
            student.health = Math.max(0, Math.min(100, Math.round(student.health)));
            student.mood = Math.max(0, Math.min(100, Math.round(student.mood)));
            student.credit = Math.max(0, Math.round(student.credit));
            if (student.money < 0) student.money = 0;
            student.money = Math.round(student.money);
        }

        // 更新UI
        function updateUI() {
            dayGradeEl.textContent = `📅 第${student.day}天 · ${student.grade}`;
            studentNameEl.textContent = `🧑 ${student.name}`;
            creditVal.textContent = student.credit;
            moneyVal.textContent = student.money;
            healthVal.textContent = student.health;
            moodVal.textContent = student.mood;

            // 健康归零检测 (游戏结束)
            if (student.health <= 0 && !gameOver) {
                gameOver = true;
                const msg = document.createElement('div');
                msg.className = 'game-over-message';
                msg.textContent = '⚠️ 健康值归零，生病退学，游戏结束！';
                gameOverContainer.appendChild(msg);
                // 禁用所有操作按钮 (除了exit)
                document.querySelectorAll('.action-btn:not(.exit-btn)').forEach(btn => {
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                    btn.style.pointerEvents = 'none';
                });
                addLog('💔 健康归零，你被迫退学了...', 'warning');
            }
        }

        // 添加日志
        function addLog(message, type = 'normal') {
            const p = document.createElement('p');
            if (type === 'event') p.className = 'event-log';
            else if (type === 'warning') p.className = 'warning';
            p.textContent = message;
            logArea.appendChild(p);
            logArea.scrollTop = logArea.scrollHeight;
            // 限制日志数量
            if (logArea.children.length > 12) {
                logArea.removeChild(logArea.children[0]);
            }
        }

        // 清除游戏结束状态 (重新开始用)
        function resetGameOverState() {
            gameOver = false;
            gameOverContainer.innerHTML = '';
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            });
        }

        // ---------- 随机事件 ----------
        function randomEvent() {
            const eventList = [
                { name: "捡到150元零花钱", credit: 0, money: 150, health: 5, mood: 0 },
                { name: "发烧感冒去校医院", credit: -2, money: -80, health: -25, mood: -15 },
                { name: "社团抽奖中奖200", credit: 0, money: 200, health: 10, mood: 8 },
                { name: "考试挂科扣学分", credit: -4, money: 0, health: -5, mood: -20 },
                { name: "室友请客吃饭", credit: 0, money: 0, health: 15, mood: 12 },
                { name: "丢了200生活费", credit: 0, money: -200, health: -10, mood: -18 }
            ];
            const evt = eventList[Math.floor(Math.random() * eventList.length)];
            addLog(`✨ 【随机事件】${evt.name}`, 'event');
            student.credit += evt.credit;
            student.money += evt.money;
            student.health += evt.health;
            student.mood += evt.mood;
            limitAttributes();
            updateUI();
        }

        // ---------- 行动函数 ----------
        function studyClass() {
            if (gameOver) return;
            const gain = Math.floor(Math.random() * 5) + 2; // 2~6
            const costHealth = Math.floor(Math.random() * 11) + 8; // 8~18
            student.credit += gain;
            student.health -= costHealth;
            student.mood -= 5;
            limitAttributes();
            addLog(`📚 上课学习 · 学分 +${gain}，健康 -${costHealth}，心情 -5`);
            updateUI();
        }

        function eatCanteen() {
            if (gameOver) return;
            const cost = Math.floor(Math.random() * 24) + 12; // 12~35
            const heal = Math.floor(Math.random() * 17) + 12; // 12~28
            student.money -= cost;
            student.health += heal;
            student.mood += 6;
            limitAttributes();
            addLog(`🍱 食堂就餐 · 花费 ${cost}元，健康 +${heal}，心情 +6`);
            updateUI();
        }

        function joinClub() {
            if (gameOver) return;
            const addCredit = Math.floor(Math.random() * 3) + 1; // 1~3
            const costHp = Math.floor(Math.random() * 8) + 5; // 5~12
            student.credit += addCredit;
            student.health -= costHp;
            student.mood += 15;
            limitAttributes();
            addLog(`🎭 社团活动 · 学分 +${addCredit}，健康 -${costHp}，心情 +15`);
            updateUI();
        }

        function partTime() {
            if (gameOver) return;
            const earn = Math.floor(Math.random() * 141) + 80; // 80~220
            const hpDown = Math.floor(Math.random() * 16) + 15; // 15~30
            student.money += earn;
            student.health -= hpDown;
            student.mood -= 8;
            limitAttributes();
            addLog(`💼 校内兼职 · 收入 ${earn}元，健康 -${hpDown}，心情 -8`);
            updateUI();
        }

        function sleepDorm() {
            if (gameOver) return;
            const hpUp = Math.floor(Math.random() * 21) + 25; // 25~45
            const moodUp = Math.floor(Math.random() * 13) + 8; // 8~20
            student.health += hpUp;
            student.mood += moodUp;
            limitAttributes();
            addLog(`🛌 宿舍休息 · 健康 +${hpUp}，心情 +${moodUp}`);
            updateUI();
        }

        function nextDay() {
            if (gameOver) return;
            student.day += 1;
            // 年级更新 (简单映射)
            if (student.day >= 1 && student.day <= 30) student.grade = "大一";
            else if (student.day <= 60) student.grade = "大二";
            else if (student.day <= 90) student.grade = "大三";
            else student.grade = "大四";

            addLog(`🌅 第${student.day}天开始 (${student.grade})`);
            // 25% 随机事件
            if (Math.random() < 0.25) {
                randomEvent();
            }
            updateUI();
        }

        function exitGame() {
            if (gameOver) {
                // 如果已经game over, 重置游戏
                resetGameOverState();
                // 重置学生数据
                student.name = "新生小明";
                student.credit = 0;
                student.money = 1500;
                student.health = 100;
                student.mood = 80;
                student.day = 1;
                student.grade = "大一";
                logArea.innerHTML = '<p>🔄 重新开始！新的人生。</p>';
                updateUI();
                addLog('🎯 游戏已重置，加油！');
                return;
            }
            addLog(`🚪 退出校园模拟器，在校${student.day}天，最终学分：${student.credit}`, 'warning');
            // 禁用所有操作 (保留重置能力)
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.style.pointerEvents = 'none';
            });
            // 但保留exit按钮可点击 (重新开始)
            const exitBtn = document.querySelector('.action-btn.exit-btn');
            if (exitBtn) {
                exitBtn.disabled = false;
                exitBtn.style.opacity = '1';
                exitBtn.style.pointerEvents = 'auto';
                exitBtn.textContent = '🔄 重新开始';
            }
            gameOver = true;
        }

        // ---------- 事件绑定 ----------
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const action = this.dataset.action;
                if (gameOver && action !== 'exit') return; // 游戏结束只能exit(重置)

                switch (action) {
                    case 'study': studyClass(); break;
                    case 'eat': eatCanteen(); break;
                    case 'club': joinClub(); break;
                    case 'work': partTime(); break;
                    case 'sleep': sleepDorm(); break;
                    case 'nextday': nextDay(); break;
                    case 'exit': exitGame(); break;
                    default: break;
                }
            });
        });

        // 键盘快捷键支持 (1~5, 0, exit)
        document.addEventListener('keydown', function(e) {
            const key = e.key;
            if (key === '1') document.querySelector('[data-action="study"]')?.click();
            else if (key === '2') document.querySelector('[data-action="eat"]')?.click();
            else if (key === '3') document.querySelector('[data-action="club"]')?.click();
            else if (key === '4') document.querySelector('[data-action="work"]')?.click();
            else if (key === '5') document.querySelector('[data-action="sleep"]')?.click();
            else if (key === '0') document.querySelector('[data-action="nextday"]')?.click();
            else if (key === 'Escape' || key === 'e' || key === 'E') {
                // 按E或ESC触发退出/重置
                document.querySelector('[data-action="exit"]')?.click();
            }
        });

        // 初始化UI
        updateUI();
        addLog('💡 按数字键1~5快速行动，0结束当天，E退出/重置');
    })();
</script>
</body>
</html>
