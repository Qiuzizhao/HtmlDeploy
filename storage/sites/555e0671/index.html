<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>穿越白雪公主 - 森林冒险</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        body {
            background: linear-gradient(#a8e0ff, #8eeeaf);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .game-box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            padding: 20px;
            width: 100%;
            max-width: 750px;
        }

        .title {
            text-align: center;
            font-size: 26px;
            color: #e0568b;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .info {
            display: flex;
            justify-content: space-between;
            background: #ffd6e0;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #663300;
        }

        #game {
            border: 3px solid #7ccd7c;
            border-radius: 10px;
            background: #f0fff0;
            display: block;
            margin: 0 auto;
        }

        .tips {
            text-align: center;
            margin-top: 12px;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="game-box">
        <div class="title">✨ 穿越白雪公主 · 森林大冒险 ✨</div>
        <div class="info">
            <div>分数：<span id="score">0</span></div>
            <div>生命：<span id="life">3</span></div>
            <div>状态：<span id="status">游戏中</span></div>
        </div>
        <canvas id="game" width="700" height="450"></canvas>
        <div class="tips">方向键 ↑ ↓ ← → 控制移动 | 收集爱心 | 躲避皇后 | 找到小矮人即可通关</div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // 游戏数据
        let score = 0;
        let life = 3;
        let gameOver = false;
        let win = false;

        // 白雪公主（你）
        let player = {
            x: 350,
            y: 220,
            w: 40,
            h: 50,
            speed: 5
        };

        // 爱心
        let hearts = [];
        for (let i = 0; i < 8; i++) {
            hearts.push({
                x: Math.random() * (canvas.width - 20),
                y: Math.random() * (canvas.height - 20),
                w: 20,
                h: 20
            });
        }

        // 坏皇后
        let queens = [];
        for (let i = 0; i < 4; i++) {
            queens.push({
                x: Math.random() * (canvas.width - 35),
                y: Math.random() * (canvas.height - 35),
                w: 35,
                h: 45,
                speed: 1.5
            });
        }

        // 小矮人（终点）
        let dwarf = {
            x: Math.random() * (canvas.width - 40),
            y: Math.random() * (canvas.height - 40),
            w: 40,
            h: 50
        };

        // 按键控制
        let keys = {};
        document.addEventListener('keydown', (e) => { keys[e.key] = true });
        document.addEventListener('keyup', (e) => { keys[e.key] = false });

        // 碰撞检测
        function hit(a, b) {
            return a.x < b.x + b.w &&
                a.x + a.w > b.x &&
                a.y < b.y + b.h &&
                a.y + a.h > b.y;
        }

        // 主循环
        function loop() {
            if (gameOver || win) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 移动玩家
            if (keys['ArrowUp'] && player.y > 0) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y < canvas.height - player.h) player.y += player.speed;
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;

            // 画白雪公主
            ctx.fillStyle = '#ffb6c1';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = '#000';
            ctx.fillText('你', player.x + 12, player.y + 30);

            // 画爱心
            ctx.fillStyle = '#ff3366';
            hearts.forEach((h, i) => {
                ctx.beginPath();
                ctx.arc(h.x + 10, h.y + 10, 10, 0, Math.PI * 2);
                ctx.fill();

                if (hit(player, h)) {
                    score += 10;
                    document.getElementById('score').innerText = score;
                    hearts.splice(i, 1);
                }
            });

            // 画皇后
            ctx.fillStyle = '#9932cc';
            queens.forEach(q => {
                ctx.fillRect(q.x, q.y, q.w, q.h);
                ctx.fillStyle = '#fff';
                ctx.fillText('皇后', q.x + 5, q.y + 25);
                ctx.fillStyle = '#9932cc';

                // 移动
                if (q.x < player.x) q.x += q.speed;
                else q.x -= q.speed;
                if (q.y < player.y) q.y += q.speed;
                else q.y -= q.speed;

                if (hit(player, q)) {
                    life--;
                    document.getElementById('life').innerText = life;
                    player.x = 350;
                    player.y = 220;

                    if (life <= 0) {
                        gameOver = true;
                        document.getElementById('status').innerText = "游戏失败";
                        alert('😢 被皇后抓住了！游戏结束');
                    }
                }
            });

            // 画小矮人
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(dwarf.x, dwarf.y, dwarf.w, dwarf.h);
            ctx.fillStyle = '#000';
            ctx.fillText('小矮人', dwarf.x + 5, dwarf.y + 30);

            if (hit(player, dwarf)) {
                win = true;
                document.getElementById('status').innerText = "通关成功";
                alert('🎉 恭喜你！找到小矮人，成功通关！');
            }

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
