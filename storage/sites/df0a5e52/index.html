<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D射击小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #111;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        /* UI界面 */
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            z-index: 100;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            font-size: 60px;
            font-weight: bold;
            display: none;
            z-index: 200;
            text-shadow: 0 0 20px black;
        }
        .victory {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 60px;
            font-weight: bold;
            display: none;
            z-index: 200;
            text-shadow: 0 0 20px black;
        }
        .tips {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ccc;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="ui">
        分数: <span id="score">0</span> | 生命: <span id="health">100</span>
    </div>
    <div class="game-over" id="gameOver">游戏结束</div>
    <div class="victory" id="victory">你赢了!</div>
    <div class="tips">WASD移动 | 鼠标瞄准 | 左键射击</div>

    <!-- 引入Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script>
        // 基础场景初始化
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

        // 相机（第一人称视角）
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        // 渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 5);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        // 地面
        const groundGeometry = new THREE.PlaneGeometry(200, 200);
        const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x55aa55 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 玩家数据
        let score = 0;
        let health = 100;
        const scoreElement = document.getElementById('score');
        const healthElement = document.getElementById('health');
        const gameOverElement = document.getElementById('gameOver');
        const victoryElement = document.getElementById('victory');
        let isGameOver = false;

        // 移动控制
        const keys = {};
        let mouseX = 0, mouseY = 0;
        const moveSpeed = 0.3;

        // 子弹数组
        const bullets = [];
        const bulletSpeed = 1;

        // 敌人数组
        const enemies = [];
        const enemyCount = 8;
        let aliveEnemies = enemyCount;

        // 创建敌人
        function createEnemy() {
            const geometry = new THREE.SphereGeometry(1, 16, 16);
            const material = new THREE.MeshLambertMaterial({ color: 0xff2222 });
            const enemy = new THREE.Mesh(geometry, material);
            
            // 随机生成位置
            const angle = Math.random() * Math.PI * 2;
            const radius = 20 + Math.random() * 20;
            enemy.position.set(
                Math.cos(angle) * radius,
                1,
                Math.sin(angle) * radius
            );
            
            enemy.castShadow = true;
            enemy.userData = { speed: 0.08 };
            scene.add(enemy);
            enemies.push(enemy);
        }

        // 生成所有敌人
        for (let i = 0; i < enemyCount; i++) {
            createEnemy();
        }

        // 创建子弹
        function shoot() {
            if (isGameOver) return;
            
            const geometry = new THREE.SphereGeometry(0.2, 8, 8);
            const material = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const bullet = new THREE.Mesh(geometry, material);
            
            // 子弹从相机位置发射
            bullet.position.copy(camera.position);
            // 子弹朝向相机前方
            bullet.rotation.copy(camera.rotation);
            
            scene.add(bullet);
            bullets.push(bullet);
        }

        // 鼠标控制视角
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                // 限制上下视角
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        // 点击锁定鼠标
        renderer.domElement.addEventListener('click', () => {
            if (!isGameOver) {
                renderer.domElement.requestPointerLock();
            }
        });

        // 鼠标射击
        document.addEventListener('mousedown', (e) => {
            if (e.button === 0) shoot();
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
        });
        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // 窗口适配
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 碰撞检测
        function checkCollision(obj1, obj2, distance = 1.5) {
            return obj1.position.distanceTo(obj2.position) < distance;
        }

        // 游戏主循环
        function animate() {
            requestAnimationFrame(animate);
            if (isGameOver) {
                renderer.render(scene, camera);
                return;
            }

            // 玩家移动
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            forward.y = 0;
            right.y = 0;
            forward.normalize();
            right.normalize();

            if (keys['KeyW']) camera.position.addScaledVector(forward, moveSpeed);
            if (keys['KeyS']) camera.position.addScaledVector(forward, -moveSpeed);
            if (keys['KeyA']) camera.position.addScaledVector(right, -moveSpeed);
            if (keys['KeyD']) camera.position.addScaledVector(right, moveSpeed);

            // 限制玩家高度
            camera.position.y = 2;

            // 子弹移动
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(bullet.quaternion);
                bullet.position.addScaledVector(forward, bulletSpeed);

                // 子弹超出范围删除
                if (bullet.position.distanceTo(camera.position) > 50) {
                    scene.remove(bullet);
                    bullets.splice(i, 1);
                }
            }

            // 敌人移动 & 碰撞
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                
                // 敌人朝向玩家移动
                const direction = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
                enemy.position.addScaledVector(direction, enemy.userData.speed);

                // 子弹击中敌人
                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (checkCollision(bullets[j], enemy)) {
                        scene.remove(bullets[j]);
                        bullets.splice(j, 1);
                        scene.remove(enemy);
                        enemies.splice(i, 1);
                        score += 10;
                        aliveEnemies--;
                        scoreElement.textContent = score;
                        break;
                    }
                }

                // 敌人碰到玩家
                if (checkCollision(enemy, camera, 2)) {
                    health -= 1;
                    healthElement.textContent = health;
                    if (health <= 0) {
                        gameOver();
                    }
                }
            }

            // 胜利条件
            if (aliveEnemies <= 0) {
                victory();
            }

            renderer.render(scene, camera);
        }

        // 游戏结束
        function gameOver() {
            isGameOver = true;
            gameOverElement.style.display = 'block';
            document.exitPointerLock();
        }

        // 游戏胜利
        function victory() {
            isGameOver = true;
            victoryElement.style.display = 'block';
            document.exitPointerLock();
        }

        // 启动游戏
        animate();
    </script>
</body>
</html>
