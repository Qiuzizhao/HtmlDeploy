<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>熊大快跑 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #98FB98 100%);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        .score {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
            will-change: contents;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            display: none;
            text-align: center;
            pointer-events: none;
        }
        .restart {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff9800;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            pointer-events: all;
            display: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.15s, box-shadow 0.15s;
            will-change: transform;
        }
        .restart:hover {
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }
        .restart:active {
            transform: translate(-50%, -50%) scale(0.95);
        }
        .tips {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 18px;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
            white-space: nowrap;
        }
        @media (max-width: 600px) {
            .score {
                font-size: 24px;
                top: 12px;
                left: 12px;
            }
            .game-over {
                font-size: 36px;
            }
            .restart {
                padding: 12px 24px;
                font-size: 17px;
            }
            .tips {
                font-size: 14px;
                bottom: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score" id="score">分数: 0</div>
        <div class="game-over" id="gameOver">游戏结束!</div>
        <button class="restart" id="restartBtn">重新开始</button>
        <div class="tips">按空格键 / 点击屏幕 跳跃</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js">
    </script>
    <script>
        (function() {
            'use strict';

            // ============================================================
            // 常量配置
            // ============================================================
            var CONFIG = {
                gravity: -0.015,
                jumpPower: 0.30,
                gameSpeed: 0.15,
                groundLength: 200,
                groundWidth: 20,
                obstacleCount: 10,
                obstacleSize: 1,
                obstacleColor: 0x8B4513,
                spawnZMin: 20,
                spawnZMax: 70,
                resetZThreshold: 10,
                resetZMin: 20,
                resetZMax: 50,
                spreadX: 6,
                scorePerPass: 10,
                cameraPos: { x: 0, y: 3, z: 8 },
                cameraLook: { x: 0, y: 0, z: -5 },
                fogNear: 10,
                fogFar: 100,
                fogColor: 0x87CEEB
            };

            // ============================================================
            // DOM 引用
            // ============================================================
            var scoreEl = document.getElementById('score');
            var gameOverEl = document.getElementById('gameOver');
            var restartBtn = document.getElementById('restartBtn');

            // ============================================================
            // Three.js 核心变量
            // ============================================================
            var scene, camera, renderer;
            var xiongdaGroup;
            var groundMesh;
            var obstacles = [];
            var score = 0;
            var isJumping = false;
            var jumpVelocity = 0;
            var gameActive = true;

            // 缓存 Box3 对象，避免每帧创建
            var boxXiongda = new THREE.Box3();
            var boxObstacle = new THREE.Box3();

            // 跳跃状态标记 (防止重复跳跃)
            var jumpTriggered = false;

            // ============================================================
            // 初始化
            // ============================================================
            function init() {
                // ---------- 场景 ----------
                scene = new THREE.Scene();
                scene.fog = new THREE.Fog(CONFIG.fogColor, CONFIG.fogNear, CONFIG.fogFar);

                // ---------- 相机 ----------
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(CONFIG.cameraPos.x, CONFIG.cameraPos.y, CONFIG.cameraPos.z);
                camera.lookAt(CONFIG.cameraLook.x, CONFIG.cameraLook.y, CONFIG.cameraLook.z);

                // ---------- 渲染器 ----------
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                renderer.domElement.id = 'gameCanvas';
                document.body.prepend(renderer.domElement);

                // ---------- 灯光 ----------
                var ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);

                var directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(10, 20, 5);
                directionalLight.castShadow = true;
                directionalLight.shadow.mapSize.width = 1024;
                directionalLight.shadow.mapSize.height = 1024;
                scene.add(directionalLight);

                // ---------- 地面 ----------
                createGround();

                // ---------- 熊大 ----------
                createXiongDa();

                // ---------- 障碍物 ----------
                spawnObstacles();

                // ---------- 事件绑定 ----------
                bindEvents();

                // ---------- 窗口自适应 ----------
                window.addEventListener('resize', onWindowResize);
            }

            // ============================================================
            // 创建地面
            // ============================================================
            function createGround() {
                var geo = new THREE.PlaneGeometry(CONFIG.groundWidth, CONFIG.groundLength);
                var mat = new THREE.MeshLambertMaterial({ color: 0x32CD32 });
                groundMesh = new THREE.Mesh(geo, mat);
                groundMesh.rotation.x = -Math.PI / 2;
                groundMesh.position.y = 0;
                groundMesh.receiveShadow = true;
                scene.add(groundMesh);
            }

            // ============================================================
            // 创建熊大 (3D 卡通模型)
            // ============================================================
            function createXiongDa() {
                xiongdaGroup = new THREE.Group();
                scene.add(xiongdaGroup);

                // 身体
                var bodyGeo = new THREE.SphereGeometry(0.8, 16, 16);
                var bodyMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
                var body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 1;
                body.castShadow = true;
                xiongdaGroup.add(body);

                // 头部
                var headGeo = new THREE.SphereGeometry(0.6, 16, 16);
                var headMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
                var head = new THREE.Mesh(headGeo, headMat);
                head.position.y = 2.2;
                head.castShadow = true;
                xiongdaGroup.add(head);

                // 耳朵
                var earGeo = new THREE.SphereGeometry(0.2, 8, 8);
                var earMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
                var earL = new THREE.Mesh(earGeo, earMat);
                earL.position.set(-0.4, 2.6, 0);
                var earR = new THREE.Mesh(earGeo, earMat);
                earR.position.set(0.4, 2.6, 0);
                xiongdaGroup.add(earL, earR);

                // 眼睛
                var eyeGeo = new THREE.SphereGeometry(0.08, 8, 8);
                var eyeMat = new THREE.MeshLambertMaterial({ color: 0x000000 });
                var eyeL = new THREE.Mesh(eyeGeo, eyeMat);
                eyeL.position.set(-0.2, 2.3, 0.5);
                var eyeR = new THREE.Mesh(eyeGeo, eyeMat);
                eyeR.position.set(0.2, 2.3, 0.5);
                xiongdaGroup.add(eyeL, eyeR);

                // 肚子
                var bellyGeo = new THREE.SphereGeometry(0.5, 16, 16);
                var bellyMat = new THREE.MeshLambertMaterial({ color: 0xFFF8DC });
                var belly = new THREE.Mesh(bellyGeo, bellyMat);
                belly.position.set(0, 0.9, 0.3);
                xiongdaGroup.add(belly);

                xiongdaGroup.position.set(0, 0, 0);
            }

            // ============================================================
            // 创建单个障碍物
            // ============================================================
            function createObstacle() {
                var group = new THREE.Group();

                var geo = new THREE.BoxGeometry(CONFIG.obstacleSize, CONFIG.obstacleSize, CONFIG.obstacleSize);
                var mat = new THREE.MeshLambertMaterial({ color: CONFIG.obstacleColor });
                var mesh = new THREE.Mesh(geo, mat);
                mesh.castShadow = true;
                group.add(mesh);

                // 随机初始位置 (z 在相机前方远处)
                group.position.x = (Math.random() - 0.5) * CONFIG.spreadX;
                group.position.y = CONFIG.obstacleSize / 2;
                group.position.z = -(CONFIG.spawnZMin + Math.random() * (CONFIG.spawnZMax - CONFIG.spawnZMin));

                scene.add(group);
                obstacles.push(group);
                return group;
            }

            // ============================================================
            // 批量生成障碍物
            // ============================================================
            function spawnObstacles() {
                for (var i = 0; i < CONFIG.obstacleCount; i++) {
                    createObstacle();
                }
            }

            // ============================================================
            // 跳跃
            // ============================================================
            function jump() {
                if (isJumping || !gameActive) return;
                isJumping = true;
                jumpVelocity = CONFIG.jumpPower;
            }

            // ============================================================
            // 碰撞检测 (使用缓存的 Box3)
            // ============================================================
            function checkCollision() {
                boxXiongda.setFromObject(xiongdaGroup);

                for (var i = 0; i < obstacles.length; i++) {
                    var obs = obstacles[i];
                    boxObstacle.setFromObject(obs);
                    if (boxXiongda.intersectsBox(boxObstacle)) {
                        return true;
                    }
                }
                return false;
            }

            // ============================================================
            // 游戏结束
            // ============================================================
            function endGame() {
                if (!gameActive) return;
                gameActive = false;
                gameOverEl.style.display = 'block';
                restartBtn.style.display = 'block';
            }

            // ============================================================
            // 重新开始
            // ============================================================
            function restartGame() {
                // 重置状态
                score = 0;
                gameActive = true;
                isJumping = false;
                jumpVelocity = 0;
                jumpTriggered = false;
                scoreEl.textContent = '分数: 0';

                // 重置熊大位置
                xiongdaGroup.position.y = 0;

                // 移除所有旧障碍物
                for (var i = obstacles.length - 1; i >= 0; i--) {
                    scene.remove(obstacles[i]);
                }
                obstacles = [];

                // 生成新障碍物
                spawnObstacles();

                // 隐藏 UI
                gameOverEl.style.display = 'none';
                restartBtn.style.display = 'none';
            }

            // ============================================================
            // 窗口自适应
            // ============================================================
            function onWindowResize() {
                var w = window.innerWidth;
                var h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            }

            // ============================================================
            // 事件绑定 (键盘 + 点击 + 触摸)
            // ============================================================
            function bindEvents() {
                // 键盘 - 空格跳跃
                document.addEventListener('keydown', function(e) {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        jump();
                    }
                });

                // 鼠标点击跳跃
                document.addEventListener('click', function(e) {
                    // 如果点击的是重启按钮，不触发跳跃
                    if (e.target === restartBtn) return;
                    jump();
                });

                // 触摸跳跃 (移动端)
                document.addEventListener('touchstart', function(e) {
                    var target = e.target;
                    if (target === restartBtn) return;
                    // 阻止默认行为，防止页面滚动/缩放
                    e.preventDefault();
                    jump();
                }, { passive: false });

                // 重启按钮
                restartBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    restartGame();
                });
                restartBtn.addEventListener('touchend', function(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    restartGame();
                });
            }

            // ============================================================
            // 更新障碍物逻辑
            // ============================================================
            function updateObstacles() {
                for (var i = 0; i < obstacles.length; i++) {
                    var obs = obstacles[i];
                    obs.position.z += CONFIG.gameSpeed;

                    // 障碍物通过玩家 (移出屏幕右侧)，重置位置并加分
                    if (obs.position.z > CONFIG.resetZThreshold) {
                        obs.position.z = -(CONFIG.resetZMin + Math.random() * (CONFIG.resetZMax - CONFIG.resetZMin));
                        obs.position.x = (Math.random() - 0.5) * CONFIG.spreadX;

                        if (gameActive) {
                            score += CONFIG.scorePerPass;
                            scoreEl.textContent = '分数: ' + score;
                        }
                    }
                }
            }

            // ============================================================
            // 更新跳跃物理
            // ============================================================
            function updateJump() {
                if (!isJumping) return;

                xiongdaGroup.position.y += jumpVelocity;
                jumpVelocity += CONFIG.gravity;

                if (xiongdaGroup.position.y <= 0) {
                    xiongdaGroup.position.y = 0;
                    isJumping = false;
                    jumpVelocity = 0;
                }
            }

            // ============================================================
            // 游戏主循环
            // ============================================================
            function animate() {
                requestAnimationFrame(animate);

                if (gameActive) {
                    // 跳跃物理
                    updateJump();

                    // 移动障碍物
                    updateObstacles();

                    // 碰撞检测
                    if (checkCollision()) {
                        endGame();
                    }
                }

                renderer.render(scene, camera);
            }

            // ============================================================
            // 启动游戏
            // ============================================================
            init();
            animate();

        })();
    </script>
</body>
</html>
