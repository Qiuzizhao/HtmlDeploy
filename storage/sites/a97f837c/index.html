<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>穿越白雪公主</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei}
body{background:#375935;display:flex;flex-direction:column;align-items:center;padding:15px}
.gamewrap{background:#fff;border-radius:16px;padding:18px;box-shadow:0 0 30px #222}
.topinfo{display:flex;justify-content:space-between;background:#ffd9cc;padding:10px 16px;border-radius:10px;margin-bottom:12px;font-weight:bold;color:#592600;font-size:16px}
#game{border:4px solid #2d5c2b;border-radius:8px;background:#73ad6c;display:block}
.desc{margin-top:10px;color:#fff;text-align:center;font-size:18px;font-weight:bold}
.title-text{
    text-align:center;
    font-size:32px;
    color:#ff3333;
    font-weight:bold;
    margin-bottom:10px;
    text-shadow:2px 2px #ffdd00;
}
</style>
</head>
<body>
<div class="title-text">朔墨牛逼</div>
<div class="gamewrap">
    <div class="topinfo">
        <span>得分：<span id="score">0</span></span>
        <span>生命值：<span id="hp">3</span></span>
        <span>状态：<span id="state">森林探险中</span></span>
    </div>
    <canvas id="game" width="720" height="480"></canvas>
</div>
<div class="desc">↑↓←→移动｜收集红苹果加分｜躲避黑衣皇后｜抵达林间小屋找小矮人通关</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let score=0,hp=3,gameEnd=false,isWin=false;
const player={x:60,y:380,w:36,h:46,speed:5};
const trees=[
    {x:120,y:80,w:55,h:72},{x:320,y:150,w:60,h:78},
    {x:520,y:90,w:52,h:70},{x:180,y:260,w:58,h:75},
    {x:440,y:320,w:54,h:71},{x:620,y:200,w:56,h:73}
];
let appleList=[];
for(let i=0;i<12;i++){
    appleList.push({
        x:Math.floor(Math.random()*(canvas.width-30)),
        y:Math.floor(Math.random()*(canvas.height-30)),
        size:22
    })
}
let queenList=[];
for(let i=0;i<3;i++){
    queenList.push({
        x:Math.random()*canvas.width,y:Math.random()*canvas.height,
        w:38,h:48,speed:1.2
    })
}
const cabin={x:610,y:55,w:75,h:68};
const key={};
document.addEventListener('keydown',e=>key[e.key]=true);
document.addEventListener('keyup',e=>key[e.key]=false);
function crash(a,b){
    return a.x<b.x+(b.w||b.size)&&a.x+a.w>b.x&&a.y<b.y+(b.h||b.size)&&a.y+a.h>b.y
}
function run(){
    if(gameEnd||isWin)return;
    ctx.fillStyle="#73ad6c";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#599453";
    for(let i=0;i<80;i++){
        let x=Math.random()*canvas.width,y=Math.random()*canvas.height;
        ctx.fillRect(x,y,3,8);
    }
    trees.forEach(t=>{
        ctx.fillStyle='#784f38';
        ctx.fillRect(t.x+18,t.y+32,t.w-36,t.h-32);
        ctx.fillStyle='#2d7029';
        ctx.beginPath();
        ctx.arc(t.x+t.w/2,t.y+22,t.w/2,0,Math.PI*2);
        ctx.fill();
    })
    appleList.forEach((ap,idx)=>{
        ctx.fillStyle='#e62c2c';
        ctx.beginPath();
        ctx.arc(ap.x,ap.y,ap.size/2,0,Math.PI*2);
        ctx.fill();
        if(crash(player,ap)){
            score+=5;
            document.getElementById('score').innerText=score;
            appleList.splice(idx,1);
        }
    })
    ctx.fillStyle='#914e32';
    ctx.beginPath();
    ctx.moveTo(cabin.x,cabin.y+cabin.h/2);
    ctx.lineTo(cabin.x+cabin.w/2,cabin.y);
    ctx.lineTo(cabin.x+cabin.w,cabin.y+cabin.h/2);
    ctx.fill();
    ctx.fillStyle='#c99669';
    ctx.fillRect(cabin.x+8,cabin.y+cabin.h/3,cabin.w-16,cabin.h*0.68);
    ctx.fillStyle='#5c3c27';
    ctx.fillRect(cabin.x+cabin.w*0.35,cabin.y+cabin.h*0.45,cabin.w*0.32,cabin.h*0.55);
    if(crash(player,cabin)){
        isWin=true;
        document.getElementById('state').innerText="成功找到小矮人，通关！";
        alert('🎉朔墨牛逼！闯关成功！');
    }
    queenList.forEach(q=>{
        ctx.fillStyle='#422559';
        ctx.fillRect(q.x,q.y,q.w,q.h);
        ctx.fillStyle='#fff';
        ctx.fillText('皇后',q.x+4,q.y+26);
        q.x+=player.x>q.x?q.speed:-q.speed;
        q.y+=player.y>q.y?q.speed:-q.speed;
        if(crash(player,q)){
            hp--;
            document.getElementById('hp').innerText=hp;
            player.x=60;player.y=380;
            if(hp<=0){
                gameEnd=true;
                document.getElementById('state').innerText="被皇后抓到，游戏失败";
                alert('💀再接再厉，朔墨依旧牛逼！');
            }
        }
    })
    ctx.fillStyle='#ffcce0';
    ctx.fillRect(player.x,player.y,player.w,player.h);
    ctx.fillStyle='#222';
    ctx.fillText('你',player.x+10,player.y+28);
    let nx=player.x,ny=player.y;
    if(key['ArrowUp'])ny-=player.speed;
    if(key['ArrowDown'])ny+=player.speed;
    if(key['ArrowLeft'])nx-=player.speed;
    if(key['ArrowRight'])nx+=player.speed;
    nx=Math.max(0,Math.min(canvas.width-player.w,nx));
    ny=Math.max(0,Math.min(canvas.height-player.h,ny));
    let canMove=true;
    let temp={x:nx,y:ny,w:player.w,h:player.h};
    trees.forEach(t=>{if(crash(temp,t))canMove=false})
    if(canMove){player.x=nx;player.y=ny}
    requestAnimationFrame(run);
}
run();
</script>
</body>
</html>
