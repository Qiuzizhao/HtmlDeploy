<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恐怖学校 - 躲避妖怪</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
            color: white;
        }
        canvas {
            display: block;
        }
        .ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: all;
            text-align: center;
        }
        .start-screen h1 {
            font-size: 48px;
            color: #ff3333;
            margin-bottom: 20px;
            text-shadow: 0 0 10px red;
        }
        .start-screen p {
            font-size: 18px;
            margin-bottom: 30px;
            max-width: 600px;
        }
        .start-btn {
            padding: 15px 40px;
            font-size: 22px;
            background: #ff2222;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        .start-btn:hover {
            background: #cc0000;
            transform: scale(1.1);
        }
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: all;
        }
        .game-over h2 {
            font-size: 60px;
            color: #ff0000;
            text-shadow: 0 0 20px red;
            margin-bottom: 20px;
        }
        .restart-btn {
            padding: 12px 30px;
            font-size: 20px;
            background: #ff3333;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        .health-bar {
            width: 300px;
            height: 25px;
            border: 2px solid white;
            background: #222;
        }
        .health-fill {
            height: 100%;
            background: #ff3333;
            width: 100%;
            transition: width 0.3s;
        }
        .tips {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="start-screen" id="startScreen">
            <h1>恐怖学校</h1>
            <p>深夜被遗弃的学校中藏着妖怪<br>WASD移动，鼠标控制视角，躲避妖怪，活下去！</p>
            <button class="start-btn" id="startBtn">开始游戏</button>
        </div>
        <div class="game-over" id="gameOver">
            <h2>你被抓住了！</h2>
            <button class="restart-btn" id="restartBtn">重新开始</button>
        </div>
        <div class="hud">
            <div class="health-bar">
                <div class="health-fill" id="healthFill"></div>
            </div>
        </div>
        <div class="tips">
            WASD移动 | 鼠标视角 | 空格跳跃 | 躲避妖怪
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            let scene, camera, renderer, controls;
            let player = { speed: 5, health: 100, isDead: false };
            let monsters = [];
            let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
            let clock = new THREE.Clock();
            let walls = [];
            let animationId = null;
            let damageCooldown = 0;
            let audioContext = null;
            let audioBuffer = null;
            let audioSource = null;
            let isAudioPlaying = false;

            function init() {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x0a0a0a);
                scene.fog = new THREE.Fog(0x0a0a0a, 10, 40);

                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 2, 0);

                renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                document.body.appendChild(renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0x222222, 0.2);
                scene.add(ambientLight);

                const flashlight = new THREE.SpotLight(0xffffff, 1.5);
                flashlight.angle = Math.PI / 5;
                flashlight.penumbra = 0.1;
                flashlight.distance = 30;
                flashlight.position.set(0, 2, 0);
                flashlight.target = camera;
                flashlight.castShadow = true;
                scene.add(flashlight);

                createSchool();
                createMonsters(4);

                controls = new THREE.PointerLockControls(camera, document.body);

                document.getElementById('startBtn').addEventListener('click', startGame);
                document.getElementById('restartBtn').addEventListener('click', restartGame);
                window.addEventListener('keydown', onKeyDown);
                window.addEventListener('keyup', onKeyUp);
                window.addEventListener('resize', onWindowResize);
            }

            function createSchool() {
                const floorGeometry = new THREE.PlaneGeometry(100, 100);
                const floorMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x333333,
                    roughness: 0.9,
                    metalness: 0.1
                });
                const floor = new THREE.Mesh(floorGeometry, floorMaterial);
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                scene.add(floor);

                const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2d });
                
                createWall(0, 0, 50, 100, 6, 0.5, wallMat);
                createWall(0, 0, -50, 100, 6, 0.5, wallMat);
                createWall(50, 0, 0, 100, 6, 0.5, wallMat, true);
                createWall(-50, 0, 0, 100, 6, 0.5, wallMat, true);

                for(let i = -40; i <= 40; i += 20) {
                    for(let j = -40; j <= 40; j += 20) {
                        if(Math.random() > 0.3) {
                            createWall(i, 0, j+10, 8, 6, 0.5, wallMat);
                        }
                    }
                }
            }

            function createWall(x, y, z, w, h, d, mat, rotate = false) {
                const geo = rotate ? new THREE.BoxGeometry(d, h, w) : new THREE.BoxGeometry(w, h, d);
                const wall = new THREE.Mesh(geo, mat);
                wall.position.set(x, y, z);
                wall.castShadow = true;
                wall.receiveShadow = true;
                scene.add(wall);
                walls.push(wall);
            }

            function createMonsters(count) {
                const monsterMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x220000 });
                
                for(let i = 0; i < count; i++) {
                    const monsterGroup = new THREE.Group();
                    
                    const bodyGeo = new THREE.BoxGeometry(1.5, 3, 1);
                    const body = new THREE.Mesh(bodyGeo, monsterMat);
                    body.position.y = 1.5;
                    monsterGroup.add(body);
                    
                    const headGeo = new THREE.SphereGeometry(0.8);
                    const head = new THREE.Mesh(headGeo, monsterMat);
                    head.position.y = 4;
                    monsterGroup.add(head);
                    
                    monsterGroup.position.set(
                        (Math.random() - 0.5) * 80,
                        0,
                        (Math.random() - 0.5) * 80
                    );
                    
                    monsterGroup.userData = {
                        speed: 1 + Math.random() * 0.8,
                        dirX: Math.random() - 0.5,
                        dirZ: Math.random() - 0.5,
                        changeTimer: 0
                    };
                    
                    scene.add(monsterGroup);
                    monsters.push(monsterGroup);
                }
            }

            function startGame() {
                controls.lock();
                document.getElementById('startScreen').style.display = 'none';
                playBackgroundSound();
            }

            function animate() {
                animationId = requestAnimationFrame(animate);
                const delta = Math.min(clock.getDelta(), 0.05);

                if(!player.isDead && controls.isLocked) {
                    let velocity = new THREE.Vector3();
                    if(moveForward) velocity.z -= player.speed * delta;
                    if(moveBackward) velocity.z += player.speed * delta;
                    if(moveLeft) velocity.x -= player.speed * delta;
                    if(moveRight) velocity.x += player.speed * delta;
                    
                    controls.moveRight(velocity.x);
                    controls.moveForward(velocity.z);

                    camera.position.x = THREE.MathUtils.clamp(camera.position.x, -48, 48);
                    camera.position.z = THREE.MathUtils.clamp(camera.position.z, -48, 48);

                    updateMonsters(delta);
                    checkCollision(delta);
                }

                renderer.render(scene, camera);
            }

            function updateMonsters(delta) {
                monsters.forEach(monster => {
                    monster.userData.changeTimer += delta;
                    if(monster.userData.changeTimer > 1 + Math.random() * 2) {
                        monster.userData.dirX = (Math.random() - 0.5) * 2;
                        monster.userData.dirZ = (Math.random() - 0.5) * 2;
                        monster.userData.changeTimer = 0;
                    }

                    monster.position.x += monster.userData.dirX * monster.userData.speed * delta;
                    monster.position.z += monster.userData.dirZ * monster.userData.speed * delta;

                    if(Math.abs(monster.position.x) > 45) monster.userData.dirX *= -1;
                    if(Math.abs(monster.position.z) > 45) monster.userData.dirZ *= -1;

                    monster.lookAt(
                        monster.position.x + monster.userData.dirX,
                        2,
                        monster.position.z + monster.userData.dirZ
                    );
                });
            }

            function checkCollision(delta) {
                damageCooldown -= delta;
                if(damageCooldown > 0) return;

                monsters.forEach(monster => {
                    const dist = camera.position.distanceTo(monster.position);
                    if(dist < 2.5) {
                        takeDamage(15);
                        damageCooldown = 0.5;
                    }
                });
            }

            function takeDamage(amount) {
                if(player.isDead) return;
                
                player.health -= amount;
                player.health = Math.max(0, player.health);
                document.getElementById('healthFill').style.width = player.health + '%';

                renderer.domElement.style.filter = 'brightness(0.5)';
                setTimeout(() => {
                    renderer.domElement.style.filter = 'brightness(1)';
                }, 100);

                if(player.health <= 0) {
                    gameOver();
                }
            }

            function gameOver() {
                player.isDead = true;
                controls.unlock();
                document.getElementById('gameOver').style.display = 'flex';
                stopBackgroundSound();
            }

            function restartGame() {
                player.health = 100;
                player.isDead = false;
                damageCooldown = 0;
                document.getElementById('healthFill').style.width = '100%';
                document.getElementById('gameOver').style.display = 'none';
                camera.position.set(0, 2, 0);
                
                monsters.forEach(monster => {
                    monster.position.set(
                        (Math.random() - 0.5) * 80,
                        0,
                        (Math.random() - 0.5) * 80
                    );
                    monster.userData.dirX = Math.random() - 0.5;
                    monster.userData.dirZ = Math.random() - 0.5;
                    monster.userData.changeTimer = 0;
                });
                
                controls.lock();
                playBackgroundSound();
            }

            function onKeyDown(event) {
                switch(event.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space': 
                        if(camera.position.y <= 2.1) camera.position.y += 0.3; 
                        break;
                }
            }

            function onKeyUp(event) {
                switch(event.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            }

            function playBackgroundSound() {
                if(isAudioPlaying) return;
                
                try {
                    if(!audioContext) {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(60, audioContext.currentTime);
                    oscillator.frequency.linearRampToValueAtTime(50, audioContext.currentTime + 2);
                    
                    gainNode.gain.setValueAtTime(0.08, audioContext.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.05, audioContext.currentTime + 2);
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.start();
                    audioSource = oscillator;
                    isAudioPlaying = true;
                    
                    oscillator.onended = function() {
                        isAudioPlaying = false;
                    };
                } catch(e) {
                    console.log('音频播放失败:', e);
                }
            }

            function stopBackgroundSound() {
                if(audioSource && audioSource.stop) {
                    try {
                        audioSource.stop();
                    } catch(e) {}
                    isAudioPlaying = false;
                }
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            function cleanup() {
                if(animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                stopBackgroundSound();
                if(audioContext) {
                    audioContext.close().catch(function(){});
                }
                renderer.dispose();
            }

            window.addEventListener('beforeunload', cleanup);

            init();
            animate();
        })();
    </script>
</body>
</html>
