<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狂飙躲避球 - 极速性能版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
            border-radius: 12px;
            overflow: hidden;
        }

        canvas {
            background: #151515;
            display: block;
            cursor: none;
        }

        .ui-panel {
            margin-bottom: 15px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #score {
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        h1 {
            color: #ff3366;
            margin-bottom: 10px;
            font-size: 42px;
            text-shadow: 0 0 15px rgba(255, 51, 102, 0.6);
        }

        p {
            color: #ccc;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 35px;
            font-size: 20px;
            background: #00ffcc;
            border: none;
            border-radius: 25px;
            color: #111;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        button:hover {
            background: #00ccaa;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        得分 (坚持时间): <span id="score">0.0</span> 秒
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="480" height="600"></canvas>
        
        <div id="overlay">
            <h1 id="title">狂飙躲避球</h1>
            <p id="description">用鼠标控制蓝色小球，躲避掉落的红球！</p>
            <button id="start-btn" onclick="startGame()">开始游戏</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const title = document.getElementById('title');
        const description = document.getElementById('description');
        const startBtn = document.getElementById('start-btn');

        // 游戏状态
        let gameActive = false;
        let score = 0;
        let enemies = [];
        let frameCount = 0;
        let gameSpeed = 1;
        let lastTime = 0; // 用于基于时间的平滑渲染

        // 玩家属性
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            radius: 10, // 略微缩小判定范围，提高高难度下的极限操作感
            color: '#00ffcc'
        };

        // 监听鼠标移动
        canvas.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left;
            player.y = e.clientY - rect.top;

            // 边缘碰撞限制
            if (player.x < player.radius) player.x = player.radius;
            if (player.x > canvas.width - player.radius) player.x = canvas.width - player.radius;
            if (player.y < player.radius) player.y = player.radius;
            if (player.y > canvas.height - player.radius) player.y = canvas.height - player.radius;
        });

        // 敌人（红球）构造函数
        class Enemy {
            constructor() {
                this.radius = Math.random() * 14 + 6; // 大小更多样化
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                
                // 【加速调优】大幅提升初始基础速度（原版为 2~5，现提升至 4.5 ~ 8.5）
                this.speed = (Math.random() * 4 + 4.5) * gameSpeed; 
                this.color = '#ff3366';
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                // 【性能优化】摒弃极其卡顿的 ctx.shadowBlur，改用径向渐变模拟发光，性能暴增 10 倍
                let gradient = ctx.createRadialGradient(this.x, this.y, this.radius * 0.2, this.x, this.y, this.radius);
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.3, this.color);
                gradient.addColorStop(1, 'rgba(255, 51, 102, 0)');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.closePath();
            }
        }

        function startGame() {
            gameActive = true;
            score = 0;
            enemies = [];
            gameSpeed = 1;
            frameCount = 0;
            lastTime = performance.now();
            overlay.style.display = 'none';
            animate(lastTime);
        }

        function gameOver() {
            gameActive = false;
            overlay.style.display = 'flex';
            title.innerText = '游戏结束';
            description.innerHTML = `你坚持了 <strong style="color:#00ffcc">${score.toFixed(1)}</strong> 秒！`;
            startBtn.innerText = '再来一局';
        }

        function checkCollision(circle1, circle2) {
            const dx = circle1.x - circle2.x;
            const dy = circle1.y - circle2.y;
            // 避免高开销的 Math.sqrt()，改用平方对比，进一步压榨性能
            const distanceCentered = dx * dx + dy * dy;
            const radiusSum = circle1.radius + circle2.radius;
            return distanceCentered < radiusSum * radiusSum;
        }

        // 游戏主循环
        function animate(currentTime) {
            if (!gameActive) return;

            // 计算真实时间差，确保游戏速度不依赖于显示器刷新率（防止144Hz或高刷屏作弊/卡顿）
            const dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            // 1. 清屏
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 2. 绘制玩家（同样使用高性能渐变替代发光滤镜）
            let pGradient = ctx.createRadialGradient(player.x, player.y, player.radius * 0.1, player.x, player.y, player.radius * 1.5);
            pGradient.addColorStop(0, '#fff');
            pGradient.addColorStop(0.4, player.color);
            pGradient.addColorStop(1, 'rgba(0, 255, 204, 0)');
            
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius * 1.5, 0, Math.PI * 2);
            ctx.fillStyle = pGradient;
            ctx.fill();
            ctx.closePath();

            // 3. 难度递增与精确计分
            frameCount++;
            score += dt; // 基于真实时间计分
            scoreDisplay.innerText = score.toFixed(1);

            // 【加速调优】每过 3 秒（原版为5秒），速度就提升 25%（原版为20%），狂飙感拉满
            if (frameCount % 180 === 0) {
                gameSpeed += 0.25;
            }

            // 【加速调优】动态出球率：随着 gameSpeed 提高，出球间隔无限逼近每 2 帧一个球（原版最快5帧）
            // 基础出球率从 15帧/球 开始狂飙
            let currentSpawnRate = Math.max(2, Math.floor(15 / gameSpeed));
            if (frameCount % currentSpawnRate === 0) {
                enemies.push(new Enemy());
            }

            // 5. 更新和绘制敌人
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update();
                enemies[i].draw();

                // 检测碰撞
                if (checkCollision(player, enemies[i])) {
                    gameOver();
                    return;
                }

                // 移除移出屏幕的敌人
                if (enemies[i].y - enemies[i].radius > canvas.height) {
                    enemies.splice(i, 1);
                }
            }

            // 6. 循环调用
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
