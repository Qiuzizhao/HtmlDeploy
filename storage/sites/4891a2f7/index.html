<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>三角洲行动 - 射击小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            background: #111;
            font-family: 'Arial', sans-serif;
            color: white;
            touch-action: none;
        }

        /* 游戏容器 */
        #game {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), #1a1a2e url('https://img0.baidu.com/it/u=889622105,2358272704&fm=253&fmt=auto&app=138&f=JPEG?w=889&h=500') no-repeat center;
            background-size: cover;
            cursor: none;
            overflow: hidden;
        }

        /* 准星 */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 25px;
            height: 25px;
            pointer-events: none;
            z-index: 100;
            will-change: transform;
        }

        .crosshair-line {
            position: absolute;
            background: #0f0;
            box-shadow: 0 0 5px #0f0;
        }

        .crosshair-h {
            width: 20px;
            height: 2px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .crosshair-v {
            width: 2px;
            height: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 敌人 */
        .enemy {
            position: absolute;
            width: 60px;
            height: 120px;
            background: #3d2b1f url('https://img2.baidu.com/it/u=1420818377,2562816104&fm=253&fmt=auto&app=120&f=JPEG?w=500&h=751') no-repeat center;
            background-size: cover;
            border-radius: 5px;
            will-change: transform;
            pointer-events: none;
            z-index: 10;
        }

        /* 子弹孔特效 */
        .bullet-hole {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #ff4444, #cc0000);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            animation: fadeOut 0.5s forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            60% {
                opacity: 1;
                transform: scale(1.2);
            }
            100% {
                opacity: 0;
                transform: scale(0.2);
            }
        }

        /* UI面板 */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 50;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.9), 0 0 8px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        #health {
            color: #ff4444;
        }
        #score {
            color: #ffdd44;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ff2222;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6), 0 0 40px rgba(0, 0, 0, 0.8);
            display: none;
            z-index: 200;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 40px 60px;
            border-radius: 12px;
            border: 2px solid rgba(255, 0, 0, 0.4);
            backdrop-filter: blur(4px);
        }

        #restart {
            margin-top: 24px;
            padding: 12px 32px;
            font-size: 20px;
            font-weight: bold;
            background: #222;
            color: #fff;
            border: 2px solid #0f0;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            outline: none;
            letter-spacing: 2px;
        }
        #restart:hover {
            background: #333;
        }
        #restart:active {
            transform: scale(0.96);
            background: #111;
        }

        #ammo {
            position: absolute;
            bottom: 30px;
            right: 30px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.9), 0 0 8px rgba(0, 0, 0, 0.5);
            text-align: right;
            z-index: 50;
        }
        #current-ammo {
            color: #ffdd44;
        }
        #max-ammo {
            color: #aaa;
        }

        /* 换弹提示 */
        #reload-hint {
            position: absolute;
            bottom: 80px;
            right: 30px;
            font-size: 16px;
            color: #ffaa44;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.9);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
            pointer-events: none;
        }
        #reload-hint.show {
            opacity: 1;
        }

        /* 低血量警告 */
        #ui.low-health #health {
            color: #ff0000;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            0% {
                text-shadow: 0 0 8px rgba(255, 0, 0, 0.8);
            }
            100% {
                text-shadow: 0 0 20px rgba(255, 0, 0, 1);
            }
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            #ui {
                font-size: 14px;
                top: 12px;
                left: 12px;
            }
            #ammo {
                font-size: 18px;
                bottom: 20px;
                right: 20px;
            }
            #game-over {
                font-size: 32px;
                padding: 24px 32px;
            }
            #restart {
                font-size: 16px;
                padding: 10px 24px;
            }
            .enemy {
                width: 48px;
                height: 96px;
            }
            #crosshair {
                width: 20px;
                height: 20px;
            }
            .crosshair-h {
                width: 16px;
                height: 2px;
            }
            .crosshair-v {
                width: 2px;
                height: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="game">
        <!-- 准星 -->
        <div id="crosshair">
            <div class="crosshair-line crosshair-h"></div>
            <div class="crosshair-line crosshair-v"></div>
        </div>

        <!-- UI信息 -->
        <div id="ui">
            血量: <span id="health">100</span> | 分数: <span id="score">0</span>
        </div>

        <div id="ammo">
            弹药: <span id="current-ammo">30</span>/<span id="max-ammo">90</span>
        </div>

        <!-- 换弹提示 -->
        <div id="reload-hint">按 R 换弹</div>

        <!-- 游戏结束 -->
        <div id="game-over">
            任务失败
            <button id="restart">重新开始</button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ============================
            // 游戏核心数据
            // ============================
            const game = {
                health: 100,
                score: 0,
                currentAmmo: 30,
                reserveAmmo: 90, // 备用弹药（原 maxAmmo）
                magSize: 30,
                isReloading: false,
                isGameOver: false,
                fireRate: 300, // 毫秒
                lastFire: 0,
                // 敌人管理
                enemies: [], // { element, x, y, active }
                spawnInterval: null,
                animFrameId: null,
                // 鼠标/触摸位置
                pointerX: window.innerWidth / 2,
                pointerY: window.innerHeight / 2,
                pointerActive: false
            };

            // ============================
            // DOM 引用
            // ============================
            const gameContainer = document.getElementById('game');
            const crosshair = document.getElementById('crosshair');
            const healthEl = document.getElementById('health');
            const scoreEl = document.getElementById('score');
            const currentAmmoEl = document.getElementById('current-ammo');
            const maxAmmoEl = document.getElementById('max-ammo');
            const gameOverEl = document.getElementById('game-over');
            const restartBtn = document.getElementById('restart');
            const reloadHint = document.getElementById('reload-hint');
            const uiPanel = document.getElementById('ui');

            // ============================
            // 准星控制 (RAF 节流)
            // ============================
            function updatePointerPosition(clientX, clientY) {
                game.pointerX = clientX;
                game.pointerY = clientY;
                game.pointerActive = true;
            }

            function updateCrosshair() {
                if (game.isGameOver) return;
                crosshair.style.left = game.pointerX + 'px';
                crosshair.style.top = game.pointerY + 'px';
            }

            // 鼠标事件
            document.addEventListener('mousemove', function(e) {
                updatePointerPosition(e.clientX, e.clientY);
            });

            // 触摸事件
            document.addEventListener('touchmove', function(e) {
                e.preventDefault();
                const touch = e.touches[0];
                if (touch) {
                    updatePointerPosition(touch.clientX, touch.clientY);
                }
            }, { passive: false });

            document.addEventListener('touchstart', function(e) {
                const touch = e.touches[0];
                if (touch) {
                    updatePointerPosition(touch.clientX, touch.clientY);
                    // 触摸即射击
                    handleFire(touch.clientX, touch.clientY);
                }
            }, { passive: false });

            // 阻止触摸上下文菜单
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });

            // ============================
            // 开火逻辑
            // ============================
            function handleFire(x, y) {
                if (game.isGameOver || game.isReloading || game.currentAmmo <= 0) {
                    // 无弹药时提示换弹
                    if (game.currentAmmo <= 0 && !game.isReloading && !game.isGameOver) {
                        showReloadHint(true);
                    }
                    return;
                }

                const now = Date.now();
                if (now - game.lastFire < game.fireRate) return;
                game.lastFire = now;

                // 消耗弹药
                game.currentAmmo--;
                updateAmmoUI();

                // 子弹孔特效
                createBulletHole(x, y);

                // 击中检测
                checkHit(x, y);

                // 自动换弹提示
                if (game.currentAmmo === 0 && game.reserveAmmo > 0 && !game.isReloading) {
                    showReloadHint(true);
                }
            }

            document.addEventListener('click', function(e) {
                handleFire(e.clientX, e.clientY);
            });

            // ============================
            // 换弹逻辑
            // ============================
            document.addEventListener('keydown', function(e) {
                if (e.key.toLowerCase() === 'r' && !game.isReloading && !game.isGameOver) {
                    if (game.currentAmmo < game.magSize && game.reserveAmmo > 0) {
                        reload();
                    }
                }
            });

            function reload() {
                if (game.isReloading) return;
                game.isReloading = true;
                showReloadHint(false);

                const needed = game.magSize - game.currentAmmo;
                if (game.reserveAmmo >= needed) {
                    game.reserveAmmo -= needed;
                    game.currentAmmo = game.magSize;
                } else {
                    game.currentAmmo += game.reserveAmmo;
                    game.reserveAmmo = 0;
                }

                updateAmmoUI();

                // 换弹耗时 1 秒
                setTimeout(function() {
                    game.isReloading = false;
                    if (game.currentAmmo === 0 && game.reserveAmmo > 0 && !game.isGameOver) {
                        showReloadHint(true);
                    }
                }, 1000);
            }

            // ============================
            // 弹药 UI
            // ============================
            function updateAmmoUI() {
                currentAmmoEl.textContent = game.currentAmmo;
                maxAmmoEl.textContent = game.reserveAmmo;
            }

            // ============================
            // 换弹提示
            // ============================
            var reloadHintTimer = null;

            function showReloadHint(show) {
                if (show) {
                    reloadHint.classList.add('show');
                    // 3 秒后自动隐藏
                    clearTimeout(reloadHintTimer);
                    reloadHintTimer = setTimeout(function() {
                        reloadHint.classList.remove('show');
                    }, 3000);
                } else {
                    reloadHint.classList.remove('show');
                    clearTimeout(reloadHintTimer);
                }
            }

            // ============================
            // 子弹孔特效
            // ============================
            function createBulletHole(x, y) {
                var hole = document.createElement('div');
                hole.className = 'bullet-hole';
                hole.style.left = (x - 4) + 'px';
                hole.style.top = (y - 4) + 'px';
                gameContainer.appendChild(hole);

                // 动画结束后移除
                setTimeout(function() {
                    if (hole.parentNode) {
                        hole.parentNode.removeChild(hole);
                    }
                }, 500);
            }

            // ============================
            // 击中检测
            // ============================
            function checkHit(x, y) {
                // 从后往前遍历，提高移除效率
                for (var i = game.enemies.length - 1; i >= 0; i--) {
                    var enemy = game.enemies[i];
                    if (!enemy || !enemy.active) continue;

                    var el = enemy.element;
                    var rect = el.getBoundingClientRect();

                    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                        // 击中
                        el.remove();
                        enemy.active = false;
                        game.enemies.splice(i, 1);

                        game.score += 10;
                        scoreEl.textContent = game.score;

                        // 击中反馈：轻微缩放
                        el.style.transform = 'scale(0.6)';
                        break; // 一枪只打中一个敌人
                    }
                }
            }

            // ============================
            // 敌人管理 (全局 RAF 驱动)
            // ============================
            var enemySpeed = 120; // 像素/秒

            function spawnEnemy() {
                if (game.isGameOver) return;

                var el = document.createElement('div');
                el.className = 'enemy';

                var gameW = gameContainer.clientWidth;
                var gameH = gameContainer.clientHeight;

                // 随机从四边出现
                var side = Math.floor(Math.random() * 4);
                var x, y;
                var margin = 100;

                switch (side) {
                    case 0: // 上边
                        x = Math.random() * gameW;
                        y = -margin;
                        break;
                    case 1: // 右边
                        x = gameW + margin;
                        y = Math.random() * gameH;
                        break;
                    case 2: // 下边
                        x = Math.random() * gameW;
                        y = gameH + margin;
                        break;
                    case 3: // 左边
                        x = -margin;
                        y = Math.random() * gameH;
                        break;
                    default:
                        x = 0;
                        y = 0;
                }

                el.style.left = x + 'px';
                el.style.top = y + 'px';

                gameContainer.appendChild(el);

                // 加入敌人数组
                var enemyObj = {
                    element: el,
                    x: x,
                    y: y,
                    active: true,
                    reachedCenter: false // 防止重复扣血
                };
                game.enemies.push(enemyObj);
            }

            // 更新所有敌人位置 (每帧调用)
            function updateEnemies(deltaTime) {
                if (game.isGameOver) return;

                var gameW = gameContainer.clientWidth;
                var gameH = gameContainer.clientHeight;
                var centerX = gameW / 2;
                var centerY = gameH / 2;
                var damageRadius = 100;
                var speedDelta = enemySpeed * deltaTime; // 基于时间的移动距离

                for (var i = game.enemies.length - 1; i >= 0; i--) {
                    var enemy = game.enemies[i];
                    if (!enemy || !enemy.active) {
                        if (enemy) game.enemies.splice(i, 1);
                        continue;
                    }

                    var el = enemy.element;
                    if (!el.isConnected) {
                        enemy.active = false;
                        game.enemies.splice(i, 1);
                        continue;
                    }

                    var dx = centerX - enemy.x;
                    var dy = centerY - enemy.y;
                    var dist = Math.hypot(dx, dy);

                    // 防止除以零
                    if (dist < 0.01) {
                        dist = 0.01;
                    }

                    // 向中心移动
                    var moveX = (dx / dist) * speedDelta;
                    var moveY = (dy / dist) * speedDelta;

                    // 如果距离小于移动距离，直接到达中心
                    if (dist < speedDelta) {
                        enemy.x = centerX;
                        enemy.y = centerY;
                    } else {
                        enemy.x += moveX;
                        enemy.y += moveY;
                    }

                    // 更新 DOM 位置
                    el.style.left = enemy.x + 'px';
                    el.style.top = enemy.y + 'px';

                    // 检查是否到达中心附近 (扣血)
                    var currentDist = Math.hypot(centerX - enemy.x, centerY - enemy.y);
                    if (currentDist < damageRadius && !enemy.reachedCenter) {
                        enemy.reachedCenter = true;

                        game.health -= 10;
                        if (game.health < 0) game.health = 0;
                        healthEl.textContent = game.health;

                        // 低血量警告
                        if (game.health <= 30) {
                            uiPanel.classList.add('low-health');
                        } else {
                            uiPanel.classList.remove('low-health');
                        }

                        // 移除敌人
                        el.remove();
                        enemy.active = false;
                        game.enemies.splice(i, 1);

                        // 检查游戏结束
                        if (game.health <= 0) {
                            gameOver();
                            return;
                        }
                    }
                }
            }

            // ============================
            // 主循环 (RequestAnimationFrame)
            // ============================
            var lastTime = 0;

            function gameLoop(timestamp) {
                if (!lastTime) lastTime = timestamp;
                var deltaTime = Math.min((timestamp - lastTime) / 1000, 0.05); // 限制最大步长
                lastTime = timestamp;

                // 更新准星
                updateCrosshair();

                // 更新敌人
                updateEnemies(deltaTime);

                // 继续循环
                if (!game.isGameOver) {
                    game.animFrameId = requestAnimationFrame(gameLoop);
                }
            }

            // ============================
            // 游戏结束
            // ============================
            function gameOver() {
                if (game.isGameOver) return;
                game.isGameOver = true;

                // 取消动画循环
                if (game.animFrameId) {
                    cancelAnimationFrame(game.animFrameId);
                    game.animFrameId = null;
                }

                // 停止生成敌人
                if (game.spawnInterval) {
                    clearInterval(game.spawnInterval);
                    game.spawnInterval = null;
                }

                // 清理所有敌人
                for (var i = game.enemies.length - 1; i >= 0; i--) {
                    var enemy = game.enemies[i];
                    if (enemy && enemy.element && enemy.element.parentNode) {
                        enemy.element.remove();
                    }
                }
                game.enemies = [];

                // 清理子弹孔
                document.querySelectorAll('.bullet-hole').forEach(function(el) {
                    el.remove();
                });

                // 显示游戏结束
                gameOverEl.style.display = 'block';
                showReloadHint(false);
            }

            // ============================
            // 重启游戏
            // ============================
            function resetGame() {
                // 取消所有动画和定时器
                if (game.animFrameId) {
                    cancelAnimationFrame(game.animFrameId);
                    game.animFrameId = null;
                }
                if (game.spawnInterval) {
                    clearInterval(game.spawnInterval);
                    game.spawnInterval = null;
                }

                // 重置状态
                game.health = 100;
                game.score = 0;
                game.currentAmmo = 30;
                game.reserveAmmo = 90;
                game.isGameOver = false;
                game.isReloading = false;
                game.lastFire = 0;
                game.pointerX = window.innerWidth / 2;
                game.pointerY = window.innerHeight / 2;

                // 清理所有敌人
                for (var i = game.enemies.length - 1; i >= 0; i--) {
                    var enemy = game.enemies[i];
                    if (enemy && enemy.element && enemy.element.parentNode) {
                        enemy.element.remove();
                    }
                }
                game.enemies = [];

                // 清理子弹孔
                document.querySelectorAll('.bullet-hole').forEach(function(el) {
                    el.remove();
                });

                // 更新 UI
                healthEl.textContent = game.health;
                scoreEl.textContent = game.score;
                updateAmmoUI();
                uiPanel.classList.remove('low-health');

                // 隐藏游戏结束界面
                gameOverEl.style.display = 'none';
                showReloadHint(false);

                // 重置准星到屏幕中心
                crosshair.style.left = '50%';
                crosshair.style.top = '50%';
                crosshair.style.transform = 'translate(-50%, -50%)';

                // 重新开始生成敌人和主循环
                startGame();
            }

            restartBtn.addEventListener('click', resetGame);

            // ============================
            // 启动游戏
            // ============================
            function startGame() {
                // 重置时间
                lastTime = 0;

                // 开始生成敌人 (每 1.5 秒)
                game.spawnInterval = setInterval(spawnEnemy, 1500);

                // 启动主循环
                game.animFrameId = requestAnimationFrame(gameLoop);

                // 初始生成几个敌人
                for (var i = 0; i < 2; i++) {
                    setTimeout(spawnEnemy, i * 400);
                }
            }

            // ============================
            // 窗口变化处理
            // ============================
            var resizeTimer = null;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    // 重新调整敌人位置边界 (但不强制移动)
                }, 200);
            });

            // ============================
            // 图片加载失败 fallback
            // ============================
            // 敌人生成时已通过 CSS background-color 提供 fallback
            // 额外处理：当图片加载失败时保持显示
            document.querySelectorAll('.enemy, #game').forEach(function(el) {
                var bg = window.getComputedStyle(el).backgroundImage;
                if (bg && bg !== 'none') {
                    var img = new Image();
                    img.onerror = function() {
                        // 图片加载失败，CSS fallback 已生效
                    };
                    // 提取 URL
                    var match = bg.match(/url\(["']?([^"')]+)["']?\)/);
                    if (match) {
                        img.src = match[1];
                    }
                }
            });

            // ============================
            // 初始化
            // ============================
            updateAmmoUI();
            startGame();

            // 预置提示：换弹快捷键
            showReloadHint(true);
            setTimeout(function() {
                if (!game.isGameOver) {
                    showReloadHint(false);
                }
            }, 4000);

        })();
    </script>
</body>
</html>
