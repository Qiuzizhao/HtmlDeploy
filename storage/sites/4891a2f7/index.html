<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三角洲行动 - 射击小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #111;
            font-family: 'Arial', sans-serif;
            color: white;
        }

        /* 游戏容器 */
        #game {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://img0.baidu.com/it/u=889622105,2358272704&fm=253&fmt=auto&app=138&f=JPEG?w=889&h=500') no-repeat center;
            background-size: cover;
            cursor: none;
        }

        /* 准星 */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 25px;
            height: 25px;
            pointer-events: none;
            z-index: 100;
        }

        .crosshair-line {
            position: absolute;
            background: #0f0;
            box-shadow: 0 0 5px #0f0;
        }

        .crosshair-h {
            width: 20px;
            height: 2px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .crosshair-v {
            width: 2px;
            height: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 敌人 */
        .enemy {
            position: absolute;
            width: 60px;
            height: 120px;
            background: url('https://img2.baidu.com/it/u=1420818377,2562816104&fm=253&fmt=auto&app=120&f=JPEG?w=500&h=751') no-repeat center;
            background-size: cover;
            border-radius: 5px;
            transition: left 0.1s, top 0.1s;
        }

        /* 子弹孔特效 */
        .bullet-hole {
            position: absolute;
            width: 8px;
            height: 8px;
            background: red;
            border-radius: 50%;
            pointer-events: none;
            animation: fadeOut 0.5s forwards;
        }

        @keyframes fadeOut {
            100% { opacity: 0; transform: scale(0); }
        }

        /* UI面板 */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 50;
            font-size: 18px;
            text-shadow: 1px 1px 2px black;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: red;
            text-shadow: 0 0 10px black;
            display: none;
            z-index: 200;
            text-align: center;
        }

        #restart {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            background: #222;
            color: white;
            border: 2px solid #0f0;
            cursor: pointer;
        }

        #ammo {
            position: absolute;
            bottom: 30px;
            right: 30px;
            font-size: 24px;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div id="game">
        <!-- 准星 -->
        <div id="crosshair">
            <div class="crosshair-line crosshair-h"></div>
            <div class="crosshair-line crosshair-v"></div>
        </div>

        <!-- UI信息 -->
        <div id="ui">
            血量: <span id="health">100</span> | 分数: <span id="score">0</span>
        </div>

        <div id="ammo">
            弹药: <span id="current-ammo">30</span>/<span id="max-ammo">90</span>
        </div>

        <!-- 游戏结束 -->
        <div id="game-over">
            任务失败
            <button id="restart">重新开始</button>
        </div>
    </div>

    <script>
        // 游戏核心数据
        const game = {
            health: 100,
            score: 0,
            currentAmmo: 30,
            maxAmmo: 90,
            isReloading: false,
            isGameOver: false,
            fireRate: 300,
            lastFire: 0
        };

        const gameContainer = document.getElementById('game');
        const crosshair = document.getElementById('crosshair');
        const healthEl = document.getElementById('health');
        const scoreEl = document.getElementById('score');
        const currentAmmoEl = document.getElementById('current-ammo');
        const gameOverEl = document.getElementById('game-over');
        const restartBtn = document.getElementById('restart');

        // 鼠标控制准星
        document.addEventListener('mousemove', (e) => {
            if(game.isGameOver) return;
            crosshair.style.left = e.clientX + 'px';
            crosshair.style.top = e.clientY + 'px';
        });

        // 开火逻辑
        document.addEventListener('click', (e) => {
            if(game.isGameOver || game.isReloading || game.currentAmmo <= 0) return;
            
            const now = Date.now();
            if(now - game.lastFire < game.fireRate) return;
            game.lastFire = now;

            // 消耗弹药
            game.currentAmmo--;
            updateAmmo();

            // 子弹孔特效
            createBulletHole(e.clientX, e.clientY);

            // 击中检测
            checkHit(e.clientX, e.clientY);
        });

        // 换弹 - R键
        document.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'r' && !game.isReloading && !game.isGameOver && game.currentAmmo < 30) {
                reload();
            }
        });

        // 创建子弹特效
        function createBulletHole(x, y) {
            const hole = document.createElement('div');
            hole.className = 'bullet-hole';
            hole.style.left = (x - 4) + 'px';
            hole.style.top = (y - 4) + 'px';
            gameContainer.appendChild(hole);
            
            setTimeout(() => hole.remove(), 500);
        }

        // 击中敌人
        function checkHit(x, y) {
            const enemies = document.querySelectorAll('.enemy');
            enemies.forEach(enemy => {
                const rect = enemy.getBoundingClientRect();
                if(x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    enemy.remove();
                    game.score += 10;
                    scoreEl.textContent = game.score;
                }
            });
        }

        // 生成敌人
        function spawnEnemy() {
            if(game.isGameOver) return;
            
            const enemy = document.createElement('div');
            enemy.className = 'enemy';
            
            // 随机位置
            const side = Math.floor(Math.random() * 4);
            const gameW = gameContainer.clientWidth;
            const gameH = gameContainer.clientHeight;
            
            switch(side) {
                case 0: enemy.style.left = Math.random() * gameW + 'px'; enemy.style.top = '-100px'; break;
                case 1: enemy.style.left = gameW + 'px'; enemy.style.top = Math.random() * gameH + 'px'; break;
                case 2: enemy.style.left = Math.random() * gameW + 'px'; enemy.style.top = gameH + 'px'; break;
                case 3: enemy.style.left = '-100px'; enemy.style.top = Math.random() * gameH + 'px'; break;
            }
            
            gameContainer.appendChild(enemy);
            moveEnemy(enemy);
        }

        // 敌人移动逻辑
        function moveEnemy(enemy) {
            if(game.isGameOver) return;
            
            const moveInterval = setInterval(() => {
                if(!enemy.isConnected) {
                    clearInterval(moveInterval);
                    return;
                }

                const rect = enemy.getBoundingClientRect();
                const centerX = rect.left + rect.width/2;
                const centerY = rect.top + rect.height/2;
                const gameW = gameContainer.clientWidth;
                const gameH = gameContainer.clientHeight;

                // 向屏幕中心移动
                const speed = 2;
                const dx = (gameW/2 - centerX) / Math.hypot(gameW/2 - centerX, gameH/2 - centerY);
                const dy = (gameH/2 - centerY) / Math.hypot(gameW/2 - centerX, gameH/2 - centerY);
                
                enemy.style.left = (rect.left + dx * speed) + 'px';
                enemy.style.top = (rect.top + dy * speed) + 'px';

                // 敌人到达中心 - 玩家掉血
                if(Math.hypot(gameW/2 - centerX, gameH/2 - centerY) < 100) {
                    game.health -= 10;
                    healthEl.textContent = game.health;
                    enemy.remove();
                    
                    if(game.health <= 0) gameOver();
                }
            }, 30);
        }

        // 换弹
        function reload() {
            game.isReloading = true;
            const needed = 30 - game.currentAmmo;
            
            if(game.maxAmmo >= needed) {
                game.maxAmmo -= needed;
                game.currentAmmo = 30;
            } else {
                game.currentAmmo += game.maxAmmo;
                game.maxAmmo = 0;
            }
            
            updateAmmo();
            setTimeout(() => game.isReloading = false, 1000);
        }

        // 更新弹药UI
        function updateAmmo() {
            currentAmmoEl.textContent = game.currentAmmo;
            document.getElementById('max-ammo').textContent = game.maxAmmo;
        }

        // 游戏结束
        function gameOver() {
            game.isGameOver = true;
            gameOverEl.style.display = 'block';
        }

        // 重启游戏
        restartBtn.addEventListener('click', () => {
            game.health = 100;
            game.score = 0;
            game.currentAmmo = 30;
            game.maxAmmo = 90;
            game.isGameOver = false;
            
            healthEl.textContent = game.health;
            scoreEl.textContent = game.score;
            updateAmmo();
            
            gameOverEl.style.display = 'none';
            document.querySelectorAll('.enemy, .bullet-hole').forEach(el => el.remove());
        });

        // 自动生成敌人
        setInterval(spawnEnemy, 1500);
        updateAmmo();
    </script>
</body>
</html>
