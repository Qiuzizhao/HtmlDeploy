<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小动物喂养小游戏</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:#90EE90;padding:30px;text-align:center}
        .game-box{
            max-width:600px;
            margin:0 auto;
            background:#fff;
            padding:25px;
            border-radius:16px;
            box-shadow:0 0 12px #ccc;
        }
        .animal{
            font-size:120px;
            margin:20px 0;
            transition:0.3s;
        }
        .info{
            font-size:18px;margin:10px 0;
        }
        .bar-box{
            width:80%;height:25px;border:2px solid #333;margin:15px auto;border-radius:12px;overflow:hidden;
        }
        .hunger-bar{
            height:100%;background:#ff6b6b;transition:0.3s;
        }
        .feed-btn{
            padding:12px 30px;font-size:18px;background:#ffb703;border:none;border-radius:8px;margin:8px;cursor:pointer;
        }
        .reset{background:#4299e1;color:#fff}
    </style>
</head>
<body>
<div class="game-box">
    <h1>🐾喂养小动物</h1>
    <div class="animal" id="pet">🐱</div>
    <div class="info">
        <p>饥饿值：<span id="hunger">100</span>/100</p>
        <p>喂食得分：<span id="score">0</span></p>
        <p id="tip">小猫饿啦，快来投喂食物！</p>
    </div>
    <div class="bar-box">
        <div class="hunger-bar" id="bar"></div>
    </div>
    <div>
        <button class="feed-btn" onclick="feed('fish')">🐟喂小鱼</button>
        <button class="feed-btn" onclick="feed('meat')">🍖喂肉</button>
        <button class="feed-btn reset" onclick="resetGame()">🔄重置游戏</button>
    </div>
</div>

<script>
// 游戏数据
let hunger = 100;
let score = 0;
const petDom = document.getElementById('pet');
const hungerDom = document.getElementById('hunger');
const scoreDom = document.getElementById('score');
const barDom = document.getElementById('bar');
const tipDom = document.getElementById('tip');

// 投喂逻辑
function feed(type){
    let add = 0;
    if(type==='fish') add=15;
    if(type==='meat') add=25;

    if(hunger <=0){
        tipDom.innerText="小动物太饱啦，不能再喂食！";
        return;
    }
    // 减少饥饿（吃饱饥饿降低）
    hunger = Math.max(0, hunger-add);
    score += add;

    // 更新界面
    updateUI();
}

// 更新页面数据
function updateUI(){
    hungerDom.innerText = hunger;
    scoreDom.innerText = score;
    barDom.style.width = hunger+'%';

    // 根据饥饿更换表情
    if(hunger >=70){
        petDom.innerText = "😿🐱";
        tipDom.innerText:"小动物很饿，快喂食！";
        barDom.style.background='#ff6b6b';
    }else if(hunger>=30){
        petDom.innerText = "🐱";
        tipDom.innerText:"吃了一些，还没吃饱~";
        barDom.style.background='#ffdd44';
    }else{
        petDom.innerText = "😺🐱";
        tipDom.innerText:"饱饱啦！超开心！";
        barDom.style.background='#4cd964';
    }
}

// 重置游戏
function resetGame(){
    hunger = 100;
    score = 0;
    tipDom.innerText="小猫饿啦，快来投喂食物！";
    updateUI();
}
// 初始化
updateUI();
</script>
</body>
</html>
