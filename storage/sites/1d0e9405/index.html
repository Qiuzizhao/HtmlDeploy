===== index.html =====
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园生活模拟器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif}
        body{background:#f0f5ff;padding:20px}
        .wrap{max-width:800px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 0 15px #cce0ff;padding:25px}
        h1{text-align:center;color:#2b5cad;margin-bottom:20px;border-bottom:2px solid #487ed9;padding-bottom:10px}
        /* 属性面板 */
        .status{display:grid;grid-template-columns: repeat(4,1fr);gap:12px;margin-bottom:25px}
        .item{background:#e8f1ff;padding:12px;border-radius:8px;text-align:center}
        .item h3{color:#2b5cad;font-size:15px;margin-bottom:6px}
        .num{font-size:22px;font-weight:bold;color:#d63031}
        /* 行动按钮区 */
        .btn-box{display:grid;grid-template-columns: repeat(4,1fr);gap:12px;margin-bottom:25px}
        button{padding:14px;border:none;border-radius:8px;background:#487ed9;color:#fff;font-size:15px;cursor:pointer;transition:0.2s}
        button:hover{background:#2b5cad}
        button:active{scale:0.97}
        /* 日志区域 */
        .log{border:1px solid #c9dfff;border-radius:8px;padding:15px;height:220px;overflow-y:auto;background:#f8fbff}
        .log h3{color:#2b5cad;margin-bottom:10px}
        .msg{line-height:1.8;color:#333;padding:3px 0;border-bottom:1px dashed #e0eaff}
        .tip{margin-top:15px;color:#666;font-size:14px;text-align:center}
    </style>
</head>
<body>
<div class="wrap">
    <h1>🏫 校园生活模拟器</h1>
    <!-- 属性面板 -->
    <div class="status">
        <div class="item">
            <h3>📖 学力</h3>
            <div class="num" id="study">50</div>
        </div>
        <div class="item">
            <h3>💪 体力</h3>
            <div class="num" id="hp">80</div>
        </div>
        <div class="item">
            <h3>💰 金钱</h3>
            <div class="num" id="money">100</div>
        </div>
        <div class="item">
            <h3>😊 心情</h3>
            <div class="num" id="mood">70</div>
        </div>
    </div>
    <!-- 操作按钮 -->
    <div class="btn-box">
        <button onclick="goClass()">📚 上课学习</button>
        <button onclick="partJob()">🛠️ 校外打工</button>
        <button onclick="sleep()">😴 回家睡觉</button>
        <button onclick="play()">🎮 休闲娱乐</button>
    </div>
    <!-- 游戏日志 -->
    <div class="log">
        <h3>📜 生活日志</h3>
        <div id="logBox"></div>
    </div>
    <div class="tip">提示：学力≥90成功升学｜体力/心情≤0游戏失败</div>
</div>

<script>
    // 初始化属性
    let data = {
        study:50,
        hp:80,
        money:100,
        mood:70
    }
    const studyDom = document.getElementById('study')
    const hpDom = document.getElementById('hp')
    const moneyDom = document.getElementById('money')
    const moodDom = document.getElementById('mood')
    const logBox = document.getElementById('logBox')

    // 更新页面数值
    function updateUI(){
        studyDom.innerText = data.study
        hpDom.innerText = data.hp
        moneyDom.innerText = data.money
        moodDom.innerText = data.mood
        checkGame()
    }
    // 添加日志
    function addLog(str){
        let div = document.createElement('div')
        div.className = 'msg'
        div.innerText = str
        logBox.appendChild(div)
        logBox.scrollTop = logBox.scrollHeight
    }
    // 游戏胜负判定
    function checkGame(){
        if(data.study >=90){
            addLog("🎉 恭喜！学力达标，成功升学，游戏通关！");
            disableBtn()
        }
        if(data.hp <=0 || data.mood <=0){
            addLog("💔 属性归零，学业荒废，游戏结束！");
            disableBtn()
        }
    }
    // 禁用全部按钮
    function disableBtn(){
        document.querySelectorAll('button').forEach(item=>item.disabled=true)
    }

    // 1.上课
    function goClass(){
        data.study += Math.floor(Math.random()*8+3)
        data.hp -= Math.floor(Math.random()*7+4)
        data.mood -= Math.floor(Math.random()*5+2)
        addLog(`【上课】认真听课，学力+${Math.floor(Math.random()*8+3)}，消耗体力、心情`)
        updateUI()
    }
    //2.打工
    function partJob(){
        let earn = Math.floor(Math.random()*30+15)
        data.money += earn
        data.hp -= Math.floor(Math.random()*12+6)
        data.mood -= Math.floor(Math.random()*6+3)
        addLog(`【打工】兼职赚到${earn}元，身心疲惫，体力心情下降`)
        updateUI()
    }
    //3.睡觉
    function sleep(){
        let addHp = Math.floor(Math.random()*25+15)
        let addMood = Math.floor(Math.random()*12+5)
        data.hp = Math.min(data.hp+addHp,100)
        data.mood = Math.min(data.mood+addMood,100)
        data.study -= Math.floor(Math.random()*4+1)
        addLog(`【睡觉】休息恢复体力+${addHp}、心情+${addMood}，偷懒小幅降低学力`)
        updateUI()
    }
    //4.娱乐
    function play(){
        let cost = Math.floor(Math.random()*12+5)
        if(data.money < cost){
            addLog(`【娱乐】金钱不足${cost}元，无法出去玩！`)
            return;
        }
        data.money -= cost
        data.mood = Math.min(data.mood+Math.floor(Math.random()*20+10),100)
        data.hp -= Math.floor(Math.random()*5+2)
        addLog(`【娱乐】花费${cost}元休闲，心情大幅提升，轻微消耗体力`)
        updateUI()
    }
    //开局日志
    addLog("游戏开始！你是一名普通高中生，合理安排日常完成升学！")
</script>
</body>
</html>
