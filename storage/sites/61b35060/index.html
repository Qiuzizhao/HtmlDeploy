<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>彩色画板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        /* 控制面板样式 */
        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 颜色按钮 */
        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        /* 清除按钮 */
        #clear {
            padding: 10px 20px;
            font-size: 16px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #clear:hover {
            background: #ff3742;
        }

        /* 画布样式 */
        #canvas {
            border: 3px solid #333;
            border-radius: 10px;
            background: white;
            cursor: crosshair;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>
    <h2>🎨 彩色简易画板</h2>
    <br>
    
    <!-- 颜色选择区 共10种颜色 -->
    <div class="controls">
        <button class="color-btn" style="background: black;" data-color="black"></button>
        <button class="color-btn" style="background: red;" data-color="red"></button>
        <button class="color-btn" style="background: blue;" data-color="blue"></button>
        <button class="color-btn" style="background: green;" data-color="green"></button>
        <button class="color-btn" style="background: orange;" data-color="orange"></button>
        <button class="color-btn" style="background: purple;" data-color="purple"></button>
        <button class="color-btn" style="background: yellow;" data-color="yellow"></button>
        <button class="color-btn" style="background: pink;" data-color="pink"></button>
        <button class="color-btn" style="background: brown;" data-color="brown"></button>
        <button class="color-btn" style="background: cyan;" data-color="cyan"></button>
        <button id="clear">清空画布</button>
    </div>

    <!-- 画板 -->
    <canvas id="canvas" width="800" height="500"></canvas>

    <script>
        // 获取画布和上下文
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 默认设置
        let isDrawing = false;
        let currentColor = 'black';
        ctx.lineWidth = 3; // 画笔粗细
        ctx.lineCap = 'round'; // 圆润笔触
        ctx.strokeStyle = currentColor;

        // 颜色按钮点击事件
        const colorBtns = document.querySelectorAll('.color-btn');
        colorBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                currentColor = btn.dataset.color;
                ctx.strokeStyle = currentColor;
            });
        });

        // 清空画布
        document.getElementById('clear').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // 开始绘画
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const x = e.offsetX;
            const y = e.offsetY;
            ctx.beginPath();
            ctx.moveTo(x, y);
        });

        // 移动绘画
        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const x = e.offsetX;
            const y = e.offsetY;
            ctx.lineTo(x, y);
            ctx.stroke();
        });

        // 结束绘画
        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });
        canvas.addEventListener('mouseout', () => {
            isDrawing = false;
        });
    </script>
</body>
</html>
