<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>经典俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            color: white;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        #game-board {
            border: 3px solid #ffffff;
            background-color: #000;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-size: 18px;
        }

        .score, .level, .next-piece {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        #next-board {
            border: 2px solid #fff;
            background: #000;
            margin-top: 10px;
        }

        button {
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        .controls {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 游戏主面板 -->
        <canvas id="game-board" width="300" height="600"></canvas>
        
        <!-- 信息面板 -->
        <div class="info-panel">
            <div class="score">
                得分: <span id="score">0</span>
            </div>
            <div class="level">
                等级: <span id="level">1</span>
            </div>
            <div class="next-piece">
                下一个方块
                <canvas id="next-board" width="120" height="120"></canvas>
            </div>
            <button id="start-btn">开始游戏</button>
            <div class="controls">
                ← → 移动<br>
                ↑ 旋转<br>
                ↓ 加速下落
            </div>
        </div>
    </div>

    <script>
        // 获取画布和上下文
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-board');
        const nextCtx = nextCanvas.getContext('2d');

        // 游戏配置
        const ROWS = 20;
        const COLS = 10;
        const BLOCK_SIZE = 30;
        let score = 0;
        let level = 1;
        let gameInterval;
        let gameRunning = false;

        // 方块颜色
        const COLORS = [
            '#00ffff', '#0000ff', '#ffa500', '#ffff00',
            '#00ff00', '#800080', '#ff0000'
        ];

        // 7种经典俄罗斯方块形状
        const SHAPES = [
            [[1,1,1,1]], // I
            [[1,1],[1,1]], // O
            [[0,1,0],[1,1,1]], // T
            [[1,0,0],[1,1,1]], // L
            [[0,0,1],[1,1,1]], // J
            [[0,1,1],[1,1,0]], // S
            [[1,1,0],[0,1,1]]  // Z
        ];

        // 游戏棋盘
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let currentPiece = null;
        let nextPiece = null;

        // 初始化当前方块
        function createPiece() {
            const type = Math.floor(Math.random() * SHAPES.length);
            const shape = SHAPES[type];
            return {
                shape,
                color: COLORS[type],
                x: Math.floor(COLS / 2) - Math.floor(shape[0].length / 2),
                y: 0
            };
        }

        // 绘制单个方块
        function drawBlock(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
        }

        // 绘制棋盘
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) {
                        drawBlock(ctx, c, r, board[r][c]);
                    }
                }
            }
        }

        // 绘制当前方块
        function drawCurrentPiece() {
            for (let r = 0; r < currentPiece.shape.length; r++) {
                for (let c = 0; c < currentPiece.shape[r].length; c++) {
                    if (currentPiece.shape[r][c]) {
                        drawBlock(
                            ctx,
                            currentPiece.x + c,
                            currentPiece.y + r,
                            currentPiece.color
                        );
                    }
                }
            }
        }

        // 绘制下一个方块
        function drawNextPiece() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            for (let r = 0; r < nextPiece.shape.length; r++) {
                for (let c = 0; c < nextPiece.shape[r].length; c++) {
                    if (nextPiece.shape[r][c]) {
                        nextCtx.fillStyle = nextPiece.color;
                        nextCtx.fillRect(
                            c * 24 + 24,
                            r * 24 + 24,
                            23, 23
                        );
                    }
                }
            }
        }

        // 碰撞检测
        function collision(x, y, shape) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const newX = x + c;
                        const newY = y + r;
                        if (
                            newX < 0 || newX >= COLS ||
                            newY >= ROWS ||
                            (newY >= 0 && board[newY][newX])
                        ) return true;
                    }
                }
            }
            return false;
        }

        // 旋转方块
        function rotatePiece() {
            const rotated = currentPiece.shape[0].map((_, i) =>
                currentPiece.shape.map(row => row[i]).reverse()
            );
            if (!collision(currentPiece.x, currentPiece.y, rotated)) {
                currentPiece.shape = rotated;
            }
        }

        // 固定方块到棋盘
        function lockPiece() {
            for (let r = 0; r < currentPiece.shape.length; r++) {
                for (let c = 0; c < currentPiece.shape[r].length; c++) {
                    if (currentPiece.shape[r][c]) {
                        const y = currentPiece.y + r;
                        const x = currentPiece.x + c;
                        if (y < 0) {
                            gameOver();
                            return;
                        }
                        board[y][x] = currentPiece.color;
                    }
                }
            }
            clearLines();
            currentPiece = nextPiece;
            nextPiece = createPiece();
            if (collision(currentPiece.x, currentPiece.y, currentPiece.shape)) {
                gameOver();
            }
        }

        // 消除满行
        function clearLines() {
            let lines = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(cell => cell)) {
                    board.splice(r, 1);
                    board.unshift(Array(COLS).fill(0));
                    r++;
                    lines++;
                }
            }
            if (lines) {
                score += lines * 100 * level;
                level = Math.floor(score / 500) + 1;
                updateInfo();
                adjustSpeed();
            }
        }

        // 下落
        function moveDown() {
            if (!collision(currentPiece.x, currentPiece.y + 1, currentPiece.shape)) {
                currentPiece.y++;
            } else {
                lockPiece();
            }
        }

        // 左右移动
        function move(dir) {
            if (!collision(currentPiece.x + dir, currentPiece.y, currentPiece.shape)) {
                currentPiece.x += dir;
            }
        }

        // 更新分数等级
        function updateInfo() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
        }

        // 调整游戏速度
        function adjustSpeed() {
            clearInterval(gameInterval);
            const speed = Math.max(100, 800 - (level - 1) * 100);
            gameInterval = setInterval(moveDown, speed);
        }

        // 游戏结束
        function gameOver() {
            clearInterval(gameInterval);
            gameRunning = false;
            alert('游戏结束！得分：' + score);
            document.getElementById('start-btn').disabled = false;
        }

        // 开始游戏
        function startGame() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0;
            level = 1;
            gameRunning = true;
            currentPiece = createPiece();
            nextPiece = createPiece();
            updateInfo();
            drawNextPiece();
            adjustSpeed();
            document.getElementById('start-btn').disabled = true;
        }

        // 游戏主循环
        function gameLoop() {
            if (gameRunning) {
                drawBoard();
                drawCurrentPiece();
            }
            requestAnimationFrame(gameLoop);
        }

        // 键盘控制
        document.addEventListener('keydown', e => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft') move(-1);
            if (e.key === 'ArrowRight') move(1);
            if (e.key === 'ArrowDown') moveDown();
            if (e.key === 'ArrowUp') rotatePiece();
        });

        // 按钮事件
        document.getElementById('start-btn').addEventListener('click', startGame);

        // 启动游戏循环
        gameLoop();
    </script>
</body>
</html>
