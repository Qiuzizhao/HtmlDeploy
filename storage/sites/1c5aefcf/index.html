<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>双人迷宫追逃升级版</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",system-ui}
        body {
            background: linear-gradient(135deg,#232946,#192038);
            display:flex;flex-direction:column;align-items:center;padding:24px;color:#fff;
        }
        .info-bar{
            display:flex;gap:40px;margin-bottom:16px;font-size:18px;
            background:rgba(255,255,255,0.1);
            padding:10px 30px;border-radius:12px;
            border:1px solid rgba(255,255,255,0.2);
        }
        .tip-text{margin-bottom:12px;font-size:15px;opacity:0.9;line-height:1.7;text-align:center}
        #gameBox {
            width:700px;height:550px;
            background:#f6f6f8;
            border:6px solid #333955;
            border-radius:8px;position:relative;
            overflow:hidden;box-shadow:0 0 25px #0003;
        }
        .player {
            width:32px;height:32px;border-radius:8px;
            position:absolute;box-shadow:0 2px 8px #0004;
        }
        #runner {
            background:linear-gradient(145deg,#3498ff,#0066cc);
        }
        #chaser {
            background:linear-gradient(145deg,#ff4757,#c02030);
        }
        .wall {
            background:linear-gradient(145deg,#444966,#2d314c);
            position:absolute;border-radius:3px;
        }
        .cool-tip{font-size:13px;opacity:0.8}
    </style>
</head>
<body>
    <div class="info-bar">
        <div>剩余时间：<span id="timeText" style="color:#ffdd55;font-size:22px;font-weight:bold">90</span> s</div>
        <div>🔵逃生：WASD｜穿梭冷却3秒 <span class="cool-tip" id="runCool">就绪</span></div>
        <div>🔴追捕：方向键｜穿梭冷却1秒 <span class="cool-tip" id="chasCool">就绪</span></div>
    </div>
    <div class="tip-text">
        逃出地图边缘可穿梭到对面（冷却期间无法穿梭）<br>倒计时结束→逃生胜利｜红色碰到蓝色→追捕胜利
    </div>
    <div id="gameBox">
        <!-- 密集迷宫墙体 -->
        <div class="wall" style="width:220px;height:22px;top:70px;left:50px"></div>
        <div class="wall" style="width:22px;height:160px;top:70px;left:270px"></div>
        <div class="wall" style="width:260px;height:22px;top:220px;left:220px"></div>
        <div class="wall" style="width:22px;height:200px;top:120px;left:500px"></div>
        <div class="wall" style="width:180px;height:22px;top:360px;left:40px"></div>
        <div class="wall" style="width:22px;height:130px;top:360px;left:220px"></div>
        <div class="wall" style="width:200px;height:22px;top:450px;left:300px"></div>
        <div class="wall" style="width:22px;height:150px;top:280px;left:380px"></div>
        <div class="wall" style="width:150px;height:22px;top:160px;left:450px"></div>
        <div class="wall" style="width:22px;height:120px;top:60px;left:120px"></div>
        <div class="wall" style="width:180px;height:22px;top:300px;left:520px"></div>
        <!-- 玩家 -->
        <div id="runner" class="player"></div>
        <div id="chaser" class="player"></div>
    </div>

    <script>
        // 游戏配置
        const game = {
            width:700,height:550,size:32,speed:5,
            totalTime:90,remainTime:90,
            runner:{x:40,y:40},
            chaser:{x:620,y:480},
            key:{},
            walls:[],
            // 穿梭冷却
            runCd:3000,runLast:0,
            chasCd:1000,chasLast:0,
            timer:null
        }
        const runnerDom = document.getElementById('runner')
        const chaserDom = document.getElementById('chaser')
        const gameBox = document.getElementById('gameBox')
        const timeText = document.getElementById('timeText')
        const runCoolTip = document.getElementById('runCool')
        const chasCoolTip = document.getElementById('chasCool')
        const nowTime = ()=>Date.now()

        // 加载墙体
        document.querySelectorAll('.wall').forEach(el=>{
            const p = gameBox.getBoundingClientRect()
            const r = el.getBoundingClientRect()
            game.walls.push({
                x:r.left-p.left,y:r.top-p.top,
                w:el.offsetWidth,h:el.offsetHeight
            })
        })

        // 键盘监听
        document.addEventListener('keydown',e=>game.key[e.code]=true)
        document.addEventListener('keyup',e=>game.key[e.code]=false)

        // 碰撞检测
        function isHit(ax,ay,bx,by,bw,bh){
            return ax < bx+bw && ax+game.size > bx && ay < by+bh && ay+game.size > by
        }
        function hitWall(x,y){
            for(let w of game.walls)
                if(isHit(x,y,w.x,w.y,w.w,w.h)) return true
            return false
        }

        // 重置位置
        function resetPos(){
            game.runner={x:40,y:40}
            game.chaser={x:620,y:480}
            game.remainTime = game.totalTime
            timeText.textContent = game.remainTime
        }

        // 倒计时启动
        function startCountDown(){
            clearInterval(game.timer)
            game.timer = setInterval(()=>{
                game.remainTime--
                timeText.textContent = game.remainTime
                if(game.remainTime<=0){
                    clearInterval(game.timer)
                    alert('⏰时间耗尽！逃生方胜利！')
                    resetPos()
                    startCountDown()
                }
            },1000)
        }

        // 游戏主循环
        function loop(){
            let rx=game.runner.x,ry=game.runner.y
            let cx=game.chaser.x,cy=game.chaser.y
            const spd=game.speed
            const cur = nowTime()

            // 更新冷却文字
            runCoolTip.textContent = (cur-game.runLast>=game.runCd)?"就绪":"冷却中"
            chasCoolTip.textContent = (cur-game.chasLast>=game.chasCd)?"就绪":"冷却中"

            // 逃生者 WASD
            if(game.key['KeyW']&&!hitWall(rx,ry-spd)) ry-=spd
            if(game.key['KeyS']&&!hitWall(rx,ry+spd)) ry+=spd
            if(game.key['KeyA']&&!hitWall(rx-spd,ry)) rx-=spd
            if(game.key['KeyD']&&!hitWall(rx+spd,ry)) rx+=spd

            // 追捕者 方向键
            if(game.key['ArrowUp']&&!hitWall(cx,cy-spd)) cy-=spd
            if(game.key['ArrowDown']&&!hitWall(cx,cy+spd)) cy+=spd
            if(game.key['ArrowLeft']&&!hitWall(cx-spd,cy)) cx-=spd
            if(game.key['ArrowRight']&&!hitWall(cx+spd,cy)) cx+=spd

            // =====边界穿梭逻辑=====
            // 逃生者穿梭 冷却3秒
            if(rx+game.size<0){
                if(cur-game.runLast>=game.runCd){
                    rx = game.width-game.size
                    game.runLast = cur
                }else rx=0
            }else if(rx>game.width){
                if(cur-game.runLast>=game.runCd){
                    rx=0
                    game.runLast = cur
                }else rx=game.width-game.size
            }
            if(ry+game.size<0){
                if(cur-game.runLast>=game.runCd){
                    ry = game.height-game.size
                    game.runLast = cur
                }else ry=0
            }else if(ry>game.height){
                if(cur-game.runLast>=game.runCd){
                    ry=0
                    game.runLast = cur
                }else ry=game.height-game.size
            }

            // 追捕者穿梭 冷却1秒
            if(cx+game.size<0){
                if(cur-game.chasLast>=game.chasCd){
                    cx = game.width-game.size
                    game.chasLast = cur
                }else cx=0
            }else if(cx>game.width){
                if(cur-game.chasLast>=game.chasCd){
                    cx=0
                    game.chasLast = cur
                }else cx=game.width-game.size
            }
            if(cy+game.size<0){
                if(cur-game.chasLast>=game.chasCd){
                    cy = game.height-game.size
                    game.chasLast = cur
                }else cy=0
            }else if(cy>game.height){
                if(cur-game.chasLast>=game.chasCd){
                    cy=0
                    game.chasLast = cur
                }else cy=game.height-game.size
            }

            game.runner.x=rx;game.runner.y=ry
            game.chaser.x=cx;game.chaser.y=cy

            // 渲染坐标
            runnerDom.style.left=rx+'px'
            runnerDom.style.top=ry+'px'
            chaserDom.style.left=cx+'px'
            chaserDom.style.top=cy+'px'

            // 抓到判定
            if(isHit(rx,ry,cx,cy,game.size,game.size)){
                alert('🔴追捕成功！红方获胜，重新开局')
                resetPos()
            }

            requestAnimationFrame(loop)
        }

        resetPos()
        startCountDown()
        loop()
    </script>
</body>
</html>
