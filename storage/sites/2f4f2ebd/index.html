<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>无限太空地图 - 星辰探索</title>
    <style>
        :root {
            --bg: #050510;
            --panel-bg: rgba(10, 10, 30, 0.78);
            --text: #c8d0e0;
            --accent: #8ab4f8;
            --gold: #ffb347;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: #030308;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            cursor: crosshair;
            position: fixed;
            top: 0;
            left: 0;
        }
        body.dragging {
            cursor: grabbing;
        }
        body.pointer-cursor {
            cursor: pointer;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto;
        }

        /* 左上信息面板 */
        #ui-panel {
            position: fixed;
            top: 18px;
            left: 18px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 16px 20px;
            color: var(--text);
            font-size: 12.5px;
            line-height: 1.75;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 0.025em;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.55);
            min-width: 170px;
            transition: opacity 0.3s;
        }
        #ui-panel .row {
            display: flex;
            justify-content: space-between;
            gap: 14px;
        }
        #ui-panel .lab {
            color: #7a8ca0;
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            font-weight: 500;
        }
        #ui-panel .val {
            color: #d4dff0;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Consolas', 'Menlo', 'Courier New', monospace;
            font-size: 12px;
            text-align: right;
        }
        #ui-panel .val.highlight {
            color: var(--gold);
            font-weight: 700;
            font-size: 13px;
        }
        #ui-panel .divider {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin: 8px 0;
        }

        /* 底部提示 */
        #hint-panel {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 30, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 9px 20px;
            color: #7a8ca0;
            font-size: 11px;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 0.03em;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
        }
        #hint-panel span {
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        #hint-panel .kbd {
            display: inline-block;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 5px;
            padding: 2px 7px;
            font-size: 10px;
            font-weight: 600;
            color: #bcc4d4;
            letter-spacing: 0.05em;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* 天体悬停提示 */
        #tooltip {
            position: fixed;
            pointer-events: none;
            z-index: 20;
            background: rgba(12, 12, 36, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 11px;
            padding: 8px 14px;
            color: #e2e8f4;
            font-size: 13px;
            letter-spacing: 0.03em;
            opacity: 0;
            transition: opacity 0.18s ease;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.6);
            white-space: nowrap;
            left: -999px;
            top: -999px;
        }
        #tooltip.visible {
            opacity: 1;
        }
        #tooltip .tt-name {
            font-weight: 600;
            color: #ffcc80;
            font-size: 14px;
        }
        #tooltip .tt-sub {
            color: #94a6be;
            font-size: 10.5px;
            margin-top: 1px;
        }

        @media (max-width: 600px) {
            #ui-panel {
                top: 8px;
                left: 8px;
                padding: 10px 14px;
                font-size: 10.5px;
                border-radius: 13px;
                min-width: 130px;
            }
            #ui-panel .val {
                font-size: 10px;
            }
            #hint-panel {
                bottom: 12px;
                padding: 7px 12px;
                font-size: 9.5px;
                gap: 7px;
                border-radius: 22px;
            }
            #tooltip {
                font-size: 11px;
                padding: 6px 10px;
                border-radius: 8px;
            }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-panel">
        <div class="row"><span class="lab">📍 坐标 X</span><span class="val" id="coord-x">0</span></div>
        <div class="row"><span class="lab">📍 坐标 Y</span><span class="val" id="coord-y">0</span></div>
        <div class="divider"></div>
        <div class="row"><span class="lab">🔭 缩放</span><span class="val highlight" id="zoom-display">1.00×</span></div>
        <div class="row"><span class="lab">⭐ 可见天体</span><span class="val" id="obj-count">0</span></div>
    </div>

    <div id="hint-panel">
        <span><span class="kbd">🖱拖拽</span> 平移</span>
        <span><span class="kbd">🖱滚轮</span> 缩放</span>
        <span><span class="kbd">R</span> 重置</span>
        <span><span class="kbd">+/-</span> 缩放</span>
    </div>

    <div id="tooltip"></div>

    <script>
        (function() {
            // ==================== DOM 元素 ====================
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const tooltip = document.getElementById('tooltip');
            const coordXEl = document.getElementById('coord-x');
            const coordYEl = document.getElementById('coord-y');
            const zoomDisplayEl = document.getElementById('zoom-display');
            const objCountEl = document.getElementById('obj-count');
            const bodyEl = document.body;

            let W, H, dpr;
            let animFrameId;

            // ==================== 常量配置 ====================
            const CHUNK_SIZE = 380;
            const NEBULA_CHUNK = 860;
            const BG_CELL_FAR = 44;
            const BG_CELL_NEAR = 32;
            const BG_PROB_FAR = 0.32;
            const BG_PROB_NEAR = 0.22;
            const ZOOM_MIN = 0.035;
            const ZOOM_MAX = 7.5;
            const MAX_VISIBLE_CHUNKS = 280;
            const PLANET_MIN_SCREEN_R = 0.35;
            const STAR_MIN_SCREEN_R = 0.5;

            // ==================== 哈希函数（确定性伪随机） ====================
            function hashInt(x, y, seed) {
                let h = (x * 374761393 + y * 668265263 + seed * 1274126177 + 1013904223) | 0;
                h = ((h ^ (h >>> 13)) * 1274126177) | 0;
                h = (h ^ (h >>> 16)) | 0;
                return (h >>> 0) / 4294967295;
            }

            function hashRange(x, y, seed, min, max) {
                return min + hashInt(x, y, seed) * (max - min);
            }

            function hashIntRange(x, y, seed, min, max) {
                return Math.floor(hashRange(x, y, seed, min, max + 0.999));
            }

            function hashBool(x, y, seed, thresh = 0.5) {
                return hashInt(x, y, seed) < thresh;
            }

            // ==================== 颜色工具 ====================
            function hexToRgb(hex) {
                const clean = hex.replace('#', '');
                return {
                    r: parseInt(clean.substring(0, 2), 16),
                    g: parseInt(clean.substring(2, 4), 16),
                    b: parseInt(clean.substring(4, 6), 16),
                };
            }

            function rgbToHex(r, g, b) {
                const clamp = (v) => Math.max(0, Math.min(255, Math.round(v)));
                return '#' + [clamp(r), clamp(g), clamp(b)].map(c => c.toString(16).padStart(2, '0')).join('');
            }

            function lightenColor(hex, amount) {
                const { r, g, b } = hexToRgb(hex);
                return rgbToHex(r + amount, g + amount, b + amount);
            }

            function darkenColor(hex, amount) {
                const { r, g, b } = hexToRgb(hex);
                return rgbToHex(r - amount, g - amount, b - amount);
            }

            // ==================== 相机系统 ====================
            const camera = {
                x: 0,
                y: 0,
                zoom: 0.7,
                targetZoom: 0.7,
                velX: 0,
                velY: 0,
            };
            const FRICTION = 0.86;
            const VEL_THRESHOLD = 0.04;
            const ZOOM_LERP = 0.18;

            function screenToWorld(sx, sy) {
                return {
                    wx: (sx - W / 2) / camera.zoom + camera.x,
                    wy: (sy - H / 2) / camera.zoom + camera.y,
                };
            }

            function worldToScreen(wx, wy) {
                return {
                    sx: (wx - camera.x) * camera.zoom + W / 2,
                    sy: (wy - camera.y) * camera.zoom + H / 2,
                };
            }

            function getScreenRadius(worldRadius) {
                return worldRadius * camera.zoom;
            }

            // ==================== 天体类型定义 ====================
            const STAR_TYPES = [
                { name: '黄矮星', cls: 'G型主序星', coreR: 3.5, haloR: 28, cInner: '#fffef2', cMid: '#ffda80',
                    cOuter: 'rgba(255,160,40,0.0)', weight: 48 },
                { name: '红矮星', cls: 'M型主序星', coreR: 2.0, haloR: 17, cInner: '#fff8f0', cMid: '#ff9966',
                    cOuter: 'rgba(255,100,30,0.0)', weight: 28 },
                { name: '蓝巨星', cls: 'O/B型巨星', coreR: 7.0, haloR: 48, cInner: '#f8fbff', cMid: '#aaccff',
                    cOuter: 'rgba(120,170,255,0.0)', weight: 9 },
                { name: '红巨星', cls: 'K/M型巨星', coreR: 9.5, haloR: 58, cInner: '#fff6ea', cMid: '#ff7040',
                    cOuter: 'rgba(255,60,15,0.0)', weight: 7 },
                { name: '白矮星', cls: '简并矮星', coreR: 1.3, haloR: 9, cInner: '#ffffff', cMid: '#ddeeff',
                    cOuter: 'rgba(180,200,240,0.0)', weight: 5 },
                { name: '蓝矮星', cls: 'A型主序星', coreR: 4.5, haloR: 34, cInner: '#fafeff', cMid: '#c8ddff',
                    cOuter: 'rgba(140,190,255,0.0)', weight: 3 },
            ];
            const STAR_TOTAL_W = STAR_TYPES.reduce((s, t) => s + t.weight, 0);

            const PLANET_PRESETS = [
                { type: '岩石行星', colors: ['#c8b8a8', '#b0a090', '#9a8a78', '#d4c4b4'], sz: [4, 13], ringCh: 0.02,
                    atmoCh: 0.14, weight: 32 },
                { type: '气态巨行星', colors: ['#e8c880', '#d4a850', '#c09040', '#e0cc90', '#dbb860'], sz: [17, 36],
                    ringCh: 0.40, atmoCh: 0.0, weight: 20 },
                { type: '冰行星', colors: ['#c8dce8', '#a8c8d8', '#e0eef8', '#b8d4e4', '#d0e4f0'], sz: [5, 15],
                ringCh: 0.07, atmoCh: 0.48, weight: 18 },
                { type: '类地行星', colors: ['#88b8d8', '#70a0c0', '#90c8a0', '#80b0b0', '#78b8c8'], sz: [6, 16],
                    ringCh: 0.04, atmoCh: 0.62, weight: 16 },
                { type: '沙漠行星', colors: ['#d8b890', '#c8a070', '#b89060', '#e0c8a0'], sz: [5, 14], ringCh: 0.03,
                    atmoCh: 0.18, weight: 10 },
                { type: '熔岩行星', colors: ['#e84020', '#d03018', '#f05030', '#c02510', '#e83818'], sz: [3, 10],
                    ringCh: 0.01, atmoCh: 0.04, weight: 5 },
                { type: '海洋行星', colors: ['#5098c8', '#4088b8', '#60a8d8', '#3880a8'], sz: [7, 17], ringCh: 0.03,
                    atmoCh: 0.75, weight: 4 },
            ];
            const PLANET_TOTAL_W = PLANET_PRESETS.reduce((s, p) => s + p.weight, 0);

            const NEBULA_COLORS = [
                { r: 65, g: 25, b: 105, a: 0.055 },
                { r: 20, g: 40, b: 95, a: 0.05 },
                { r: 85, g: 30, b: 65, a: 0.045 },
                { r: 18, g: 65, b: 85, a: 0.05 },
                { r: 50, g: 18, b: 75, a: 0.06 },
                { r: 30, g: 55, b: 100, a: 0.048 },
                { r: 70, g: 40, b: 90, a: 0.042 },
            ];

            // ==================== 选择函数 ====================
            function pickStarType(h) {
                let cum = 0;
                for (const st of STAR_TYPES) {
                    cum += st.weight;
                    if (h < cum / STAR_TOTAL_W) return st;
                }
                return STAR_TYPES[0];
            }

            function pickPlanetPreset(h) {
                let cum = 0;
                for (const pp of PLANET_PRESETS) {
                    cum += pp.weight;
                    if (h < cum / PLANET_TOTAL_W) return pp;
                }
                return PLANET_PRESETS[0];
            }

            // ==================== Chunk天体生成 ====================
            function generateChunkObjects(cx, cy) {
                const objects = [];
                const baseHash = hashInt(cx, cy, 0);
                const hasSystem = baseHash < 0.44;

                if (!hasSystem) {
                    // 流浪行星
                    if (hashInt(cx, cy, 700) < 0.055) {
                        const px = cx * CHUNK_SIZE + hashRange(cx, cy, 701, -CHUNK_SIZE * 0.44, CHUNK_SIZE * 0.44);
                        const py = cy * CHUNK_SIZE + hashRange(cx, cy, 702, -CHUNK_SIZE * 0.44, CHUNK_SIZE * 0.44);
                        const preset = pickPlanetPreset(hashInt(cx, cy, 703));
                        const sz = hashRange(cx, cy, 704, preset.sz[0], preset.sz[1]);
                        const ci = hashIntRange(cx, cy, 705, 0, preset.colors.length - 1);
                        objects.push({
                            type: 'rogue_planet',
                            wx: px,
                            wy: py,
                            radius: sz,
                            color: preset.colors[ci],
                            presetType: preset.type,
                            hasRing: hashBool(cx, cy, 706, preset.ringCh),
                            hasAtmo: hashBool(cx, cy, 707, preset.atmoCh),
                            ringAngle: hashRange(cx, cy, 708, -0.55, 0.55),
                            ringColor: preset.type === '气态巨行星' ? '#d4b870' : '#c0b8a8',
                        });
                    }
                    // 黑洞（稀有）
                    if (hashInt(cx, cy, 800) < 0.007) {
                        const bpx = cx * CHUNK_SIZE + hashRange(cx, cy, 801, -CHUNK_SIZE * 0.38, CHUNK_SIZE * 0.38);
                        const bpy = cy * CHUNK_SIZE + hashRange(cx, cy, 802, -CHUNK_SIZE * 0.38, CHUNK_SIZE * 0.38);
                        const bhr = hashRange(cx, cy, 803, 20, 44);
                        objects.push({
                            type: 'black_hole',
                            wx: bpx,
                            wy: bpy,
                            radius: bhr,
                            diskInner: bhr * 1.25,
                            diskOuter: bhr * 2.9,
                            diskAngle: hashRange(cx, cy, 804, -0.65, 0.65),
                        });
                    }
                    return objects;
                }

                // 恒星系统
                const starCountH = hashInt(cx, cy, 10);
                let starCount = 1;
                if (starCountH < 0.10) starCount = 3;
                else if (starCountH < 0.35) starCount = 2;

                const sysCX = cx * CHUNK_SIZE + hashRange(cx, cy, 11, -CHUNK_SIZE * 0.32, CHUNK_SIZE * 0.32);
                const sysCY = cy * CHUNK_SIZE + hashRange(cx, cy, 12, -CHUNK_SIZE * 0.32, CHUNK_SIZE * 0.32);

                const stars = [];
                for (let s = 0; s < starCount; s++) {
                    const sType = pickStarType(hashInt(cx, cy, 20 + s));
                    let sx, sy;
                    if (starCount === 1) { sx = sysCX;
                        sy = sysCY; } else if (starCount === 2) {
                        const sep = hashRange(cx, cy, 30 + s, 20, 60);
                        const ang = hashRange(cx, cy, 31 + s, 0, Math.PI * 2);
                        sx = sysCX + Math.cos(ang) * sep * (s === 0 ? 0.5 : -0.5);
                        sy = sysCY + Math.sin(ang) * sep * (s === 0 ? 0.5 : -0.5);
                    } else {
                        const sep = hashRange(cx, cy, 40 + s, 16, 52);
                        const ang = (Math.PI * 2 / 3) * s + hashRange(cx, cy, 41 + s, -0.45, 0.45);
                        sx = sysCX + Math.cos(ang) * sep;
                        sy = sysCY + Math.sin(ang) * sep;
                    }
                    stars.push({ wx: sx, wy: sy, starType: sType, idx: s });
                }

                // 系统质心
                let centX = 0,
                    centY = 0;
                for (const st of stars) { centX += st.wx;
                    centY += st.wy; }
                centX /= stars.length;
                centY /= stars.length;

                const planetCount = hashIntRange(cx, cy, 50, 1, 8);
                const planets = [];
                const usedRadii = [];
                for (let p = 0; p < planetCount; p++) {
                    const preset = pickPlanetPreset(hashInt(cx, cy, 60 + p));
                    const sz = hashRange(cx, cy, 70 + p, preset.sz[0], preset.sz[1]);
                    let orbitR;
                    let attempts = 0;
                    do {
                        orbitR = hashRange(cx, cy, 80 + p + attempts * 113, 32, 210);
                        attempts++;
                    } while (attempts < 18 && usedRadii.some(r => Math.abs(r - orbitR) < sz + 7));
                    usedRadii.push(orbitR);
                    const initAngle = hashRange(cx, cy, 90 + p, 0, Math.PI * 2);
                    const orbSpeed = hashRange(cx, cy, 95 + p, 0.0008, 0.0055);
                    const ci = hashIntRange(cx, cy, 100 + p, 0, preset.colors.length - 1);
                    const hasRing = hashBool(cx, cy, 110 + p, preset.ringCh);
                    const hasAtmo = hashBool(cx, cy, 120 + p, preset.atmoCh);
                    planets.push({
                        type: 'planet',
                        orbitCX: centX,
                        orbitCY: centY,
                        orbitR,
                        initAngle,
                        orbSpeed,
                        radius: sz,
                        color: preset.colors[ci],
                        presetType: preset.type,
                        hasRing,
                        hasAtmo,
                        ringAngle: hashRange(cx, cy, 130 + p, -0.55, 0.55),
                        ringColor: preset.type === '气态巨行星' ? '#d4b870' : '#c0b8a8',
                        pIdx: p,
                    });
                }

                for (const st of stars) {
                    objects.push({
                        type: 'star',
                        wx: st.wx,
                        wy: st.wy,
                        starType: st.starType,
                        starIdx: st.idx,
                        allStars: stars,
                        allPlanets: planets,
                        centX,
                        centY,
                    });
                }
                for (const pl of planets) objects.push(pl);

                return objects;
            }

            function getPlanetWorldPos(pl, timeSec) {
                const angle = pl.initAngle + timeSec * pl.orbSpeed;
                return {
                    wx: pl.orbitCX + Math.cos(angle) * pl.orbitR,
                    wy: pl.orbitCY + Math.sin(angle) * pl.orbitR,
                };
            }

            // ==================== 可见chunk遍历 ====================
            function getVisibleChunkRange() {
                const margin = CHUNK_SIZE * 1.3;
                const tl = screenToWorld(-margin, -margin);
                const br = screenToWorld(W + margin, H + margin);
                const minCX = Math.floor(Math.min(tl.wx, br.wx) / CHUNK_SIZE) - 1;
                const maxCX = Math.floor(Math.max(tl.wx, br.wx) / CHUNK_SIZE) + 1;
                const minCY = Math.floor(Math.min(tl.wy, br.wy) / CHUNK_SIZE) - 1;
                const maxCY = Math.floor(Math.max(tl.wy, br.wy) / CHUNK_SIZE) + 1;
                const totalChunks = (maxCX - minCX + 1) * (maxCY - minCY + 1);
                let cMinCX = minCX,
                    cMaxCX = maxCX,
                    cMinCY = minCY,
                    cMaxCY = maxCY;
                if (totalChunks > MAX_VISIBLE_CHUNKS) {
                    const side = Math.floor(Math.sqrt(MAX_VISIBLE_CHUNKS));
                    const midCX = Math.floor((minCX + maxCX) / 2);
                    const midCY = Math.floor((minCY + maxCY) / 2);
                    const half = Math.floor(side / 2);
                    cMinCX = midCX - half;
                    cMaxCX = midCX + half;
                    cMinCY = midCY - half;
                    cMaxCY = midCY + half;
                }
                return { minCX: cMinCX, maxCX: cMaxCX, minCY: cMinCY, maxCY: cMaxCY };
            }

            function getVisibleObjects(timeSec) {
                const { minCX, maxCX, minCY, maxCY } = getVisibleChunkRange();
                const all = [];
                const seen = new Set();
                for (let cx = minCX; cx <= maxCX; cx++) {
                    for (let cy = minCY; cy <= maxCY; cy++) {
                        const key = `${cx},${cy}`;
                        if (seen.has(key)) continue;
                        seen.add(key);
                        const objs = generateChunkObjects(cx, cy);
                        for (const o of objs) {
                            if (o.type === 'planet') {
                                const pos = getPlanetWorldPos(o, timeSec);
                                all.push({ ...o, curWX: pos.wx, curWY: pos.wy });
                            } else {
                                all.push({ ...o, curWX: o.wx, curWY: o.wy });
                            }
                        }
                    }
                }
                return all;
            }

            function getVisibleNebulae() {
                const margin = NEBULA_CHUNK * 1.5;
                const tl = screenToWorld(-margin, -margin);
                const br = screenToWorld(W + margin, H + margin);
                const minNCX = Math.floor(Math.min(tl.wx, br.wx) / NEBULA_CHUNK) - 1;
                const maxNCX = Math.floor(Math.max(tl.wx, br.wx) / NEBULA_CHUNK) + 1;
                const minNCY = Math.floor(Math.min(tl.wy, br.wy) / NEBULA_CHUNK) - 1;
                const maxNCY = Math.floor(Math.max(tl.wy, br.wy) / NEBULA_CHUNK) + 1;
                const nebulae = [];
                const seen = new Set();
                for (let nx = minNCX; nx <= maxNCX; nx++) {
                    for (let ny = minNCY; ny <= maxNCY; ny++) {
                        const key = `${nx},${ny}`;
                        if (seen.has(key)) continue;
                        seen.add(key);
                        if (hashInt(nx, ny, 999) < 0.065) {
                            const ci = hashIntRange(nx, ny, 1000, 0, NEBULA_COLORS.length - 1);
                            const offX = hashRange(nx, ny, 1001, -NEBULA_CHUNK * 0.38, NEBULA_CHUNK * 0.38);
                            const offY = hashRange(nx, ny, 1002, -NEBULA_CHUNK * 0.38, NEBULA_CHUNK * 0.38);
                            const rad = hashRange(nx, ny, 1003, NEBULA_CHUNK * 0.45, NEBULA_CHUNK * 1.15);
                            nebulae.push({
                                cx: nx * NEBULA_CHUNK + offX,
                                cy: ny * NEBULA_CHUNK + offY,
                                radius: rad,
                                color: NEBULA_COLORS[ci],
                            });
                        }
                    }
                }
                return nebulae;
            }

            // ==================== 背景星星生成 ====================
            function getBgStars(cellSize, prob, seedOffset, depthCoeff) {
                const margin = cellSize * 2;
                const tl = screenToWorld(-margin, -margin);
                const br = screenToWorld(W + margin, H + margin);
                // 深度偏移：背景层移动较慢
                const offX = camera.x * (1 - depthCoeff);
                const offY = camera.y * (1 - depthCoeff);
                const adjTLwx = tl.wx * depthCoeff + offX;
                const adjTLwy = tl.wy * depthCoeff + offY;
                const adjBRwx = br.wx * depthCoeff + offX;
                const adjBRwy = br.wy * depthCoeff + offY;
                const minCX = Math.floor(Math.min(adjTLwx, adjBRwx) / cellSize) - 1;
                const maxCX = Math.floor(Math.max(adjTLwx, adjBRwx) / cellSize) + 1;
                const minCY = Math.floor(Math.min(adjTLwy, adjBRwy) / cellSize) - 1;
                const maxCY = Math.floor(Math.max(adjTLwy, adjBRwy) / cellSize) + 1;
                const stars = [];
                const seen = new Set();
                for (let cx = minCX; cx <= maxCX; cx++) {
                    for (let cy = minCY; cy <= maxCY; cy++) {
                        const key = `${cx},${cy}`;
                        if (seen.has(key)) continue;
                        seen.add(key);
                        if (hashInt(cx, cy, seedOffset) < prob) {
                            const wx = cx * cellSize + hashRange(cx, cy, seedOffset + 1, 0, cellSize);
                            const wy = cy * cellSize + hashRange(cx, cy, seedOffset + 2, 0, cellSize);
                            const brightness = hashRange(cx, cy, seedOffset + 3, 0.35, 1.0);
                            const size = hashRange(cx, cy, seedOffset + 4, 0.25, 1.4);
                            const tintH = hashIntRange(cx, cy, seedOffset + 5, 0, 2);
                            let tint = '#ffffff';
                            if (tintH === 0) tint = '#ffe8d0';
                            if (tintH === 1) tint = '#d8e8ff';
                            stars.push({ wx, wy, brightness, size, tint, depthCoeff });
                        }
                    }
                }
                return stars;
            }

            // ==================== 渲染函数 ====================
            function drawBgStar(ctx, worldX, worldY, brightness, size, tint, depthCoeff) {
                const sx = (worldX - camera.x) * camera.zoom * depthCoeff + W / 2 + camera.x * camera.zoom * (1 -
                    depthCoeff);
                const sy = (worldY - camera.y) * camera.zoom * depthCoeff + H / 2 + camera.y * camera.zoom * (1 -
                    depthCoeff);
                if (sx < -8 || sx > W + 8 || sy < -8 || sy > H + 8) return;
                const alpha = brightness * 0.85;
                const sz = size * camera.zoom * depthCoeff + 0.15;
                if (sz < 0.08) return;
                ctx.fillStyle = tint.replace(')', `,${alpha})`).replace('rgb',
                    'rgba');
                if (tint.startsWith('#')) {
                    const { r, g, b } = hexToRgb(tint);
                    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                }
                ctx.beginPath();
                ctx.arc(sx, sy, Math.max(sz, 0.2), 0, Math.PI * 2);
                ctx.fill();
                if (brightness > 0.7 && sz > 0.6) {
                    ctx.fillStyle = `rgba(255,255,255,${alpha*0.3})`;
                    ctx.beginPath();
                    ctx.arc(sx, sy, sz * 2.2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawNebula(ctx, neb) {
                const { sx, sy } = worldToScreen(neb.cx, neb.cy);
                const screenR = neb.radius * camera.zoom;
                if (screenR < 6 || sx < -screenR * 2 || sx > W + screenR * 2 || sy < -screenR * 2 || sy > H + screenR *
                    2) return;
                const grad = ctx.createRadialGradient(sx, sy, screenR * 0.08, sx, sy, screenR);
                const { r, g, b, a } = neb.color;
                grad.addColorStop(0, `rgba(${r},${g},${b},${a})`);
                grad.addColorStop(0.3, `rgba(${r},${g},${b},${a*0.7})`);
                grad.addColorStop(0.6, `rgba(${r},${g},${b},${a*0.25})`);
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(sx, sy, screenR, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawStarObj(ctx, sx, sy, starType, screenRadius) {
                const haloR = Math.max(screenRadius * 0.9, 3.5);
                const coreR = Math.max(screenRadius * 0.1, 0.7);
                const grad = ctx.createRadialGradient(sx, sy, coreR * 0.4, sx, sy, haloR);
                grad.addColorStop(0, starType.cInner);
                grad.addColorStop(0.06, starType.cMid);
                grad.addColorStop(0.3, starType.cMid.replace('ff', 'bb').replace('fff', 'ddd'));
                grad.addColorStop(0.65, 'rgba(50,25,8,0.06)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(sx, sy, haloR, 0, Math.PI * 2);
                ctx.fill();
                const cg = ctx.createRadialGradient(sx, sy, 0, sx, sy, coreR * 2);
                cg.addColorStop(0, '#ffffff');
                cg.addColorStop(0.4, starType.cInner);
                cg.addColorStop(1, 'rgba(255,200,100,0)');
                ctx.fillStyle = cg;
                ctx.beginPath();
                ctx.arc(sx, sy, coreR * 2, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawPlanetObj(ctx, sx, sy, radius, color, hasRing, ringAngle, ringColor, hasAtmo, presetType) {
                const sr = Math.max(radius, 0.3);
                if (hasAtmo && sr > 2) {
                    const ag = ctx.createRadialGradient(sx, sy, sr * 0.82, sx, sy, sr * 1.3);
                    ag.addColorStop(0, 'rgba(130,195,250,0)');
                    ag.addColorStop(0.45, 'rgba(130,195,250,0.22)');
                    ag.addColorStop(1, 'rgba(130,195,250,0)');
                    ctx.fillStyle = ag;
                    ctx.beginPath();
                    ctx.arc(sx, sy, sr * 1.3, 0, Math.PI * 2);
                    ctx.fill();
                }
                if (hasRing && sr > 2.5) {
                    ctx.save();
                    ctx.translate(sx, sy);
                    ctx.rotate(ringAngle);
                    ctx.scale(1, 0.26);
                    const ri = sr * 1.35;
                    const ro = sr * 2.3;
                    const rg = ctx.createRadialGradient(0, 0, ri, 0, 0, ro);
                    rg.addColorStop(0, 'rgba(0,0,0,0)');
                    rg.addColorStop(0.3, ringColor + 'cc');
                    rg.addColorStop(0.5, ringColor + '88');
                    rg.addColorStop(0.7, ringColor + '33');
                    rg.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = rg;
                    ctx.beginPath();
                    ctx.arc(0, 0, ro, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
                const lx = sx - sr * 0.28;
                const ly = sy - sr * 0.32;
                const bg = ctx.createRadialGradient(lx, ly, sr * 0.04, sx, sy, sr);
                bg.addColorStop(0, '#ffffff');
                bg.addColorStop(0.14, lightenColor(color, 45));
                bg.addColorStop(0.48, color);
                bg.addColorStop(0.82, darkenColor(color, 50));
                bg.addColorStop(1, darkenColor(color, 72));
                ctx.fillStyle = bg;
                ctx.beginPath();
                ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                ctx.fill();
                if (presetType === '气态巨行星' && sr > 9) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                    ctx.clip();
                    const sc = Math.floor(sr / 4.5);
                    for (let i = 0; i < sc; i++) {
                        const yOff = sy - sr + (sr * 2 / sc) * (i + 0.5);
                        ctx.fillStyle = `rgba(170,130,80,${0.07+Math.abs(Math.sin(i*1.8))*0.10})`;
                        ctx.fillRect(sx - sr, yOff - sr / sc * 0.3, sr * 2, sr / sc * 0.6);
                    }
                    ctx.restore();
                }
                if (hasRing && sr > 2.5) {
                    ctx.save();
                    ctx.translate(sx, sy);
                    ctx.rotate(ringAngle);
                    ctx.scale(1, 0.26);
                    const rm = sr * 1.8;
                    ctx.strokeStyle = ringColor + '44';
                    ctx.lineWidth = sr * 0.2;
                    ctx.beginPath();
                    ctx.arc(0, 0, rm, -0.55, 0.55);
                    ctx.stroke();
                    ctx.restore();
                }
            }
