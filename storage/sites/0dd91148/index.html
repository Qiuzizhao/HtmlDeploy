<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>雷霆奶龙跑酷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#191930;display:flex;flex-direction:column;align-items:center;padding:10px}
#game{
    width:min(95vw,800px);height:500px;
    background:linear-gradient(#2058b8,#94ccff);
    position:relative;overflow:hidden;border:3px solid gold;border-radius:10px;
}
/* 正版奶龙本体：圆脑袋黄皮肤、小恐龙耳朵、雷霆闪电特效 */
#nailong{
    width:70px;height:72px;position:absolute;bottom:80px;left:60px;
    background:#ffdf29;border-radius:50%;z-index:2;
    /* 雷霆发光效果 */
    box-shadow:0 0 15px #0cf,0 0 30px #00aaff,0 0 45px #22ccff;
}
/* 奶龙左耳 */
#nailong:before{
    content:"";width:22px;height:30px;background:#ffdf29;
    position:absolute;top:-12px;left:2px;border-radius:50% 50% 30% 30%;
}
/* 奶龙右耳 */
#nailong:after{
    content:"";width:22px;height:30px;background:#ffdf29;
    position:absolute;top:-12px;right:2px;border-radius:50% 50% 30% 30%;
}
/* 眼睛 */
.eye1{
    width:12px;height:16px;background:#000;border-radius:50%;
    position:absolute;top:22px;left:16px;
}
.eye2{
    width:12px;height:16px;background:#000;border-radius:50%;
    position:absolute;top:22px;right:16px;
}
/* 雷霆闪电环绕 */
.thunder{
    position:absolute;font-size:28px;color:#0ff;
    text-shadow:0 0 12px cyan;animation:flash 0.35s infinite alternate;
}
@keyframes flash{0{opacity:0.3}100%{opacity:1}}
.ground{width:100%;height:80px;background:#7b4c2c;position:absolute;bottom:0}
.lightItem{font-size:34px;color:#0ff;text-shadow:0 0 10px #0cf;position:absolute;}
.rock{width:70px;height:45px;background:#333;border-radius:40%;position:absolute;}
.info{color:#fff;width:min(95vw,800px);display:flex;justify-content:space-between;padding:6px 0;font-size:18px}
button{padding:7px 16px;background:#ffd300;border:none;border-radius:6px;font-weight:bold;margin-top:8px;cursor:pointer}
.tips{color:#ccc;font-size:13px;margin-top:5px}
</style>
</head>
<body>
<div class="info">
    <span>得分：<span id="score">0</span></span>
    <span>最高分：<span id="max">0</span></span>
</div>
<div id="game">
    <div id="nailong">
        <div class="eye1"></div>
        <div class="eye2"></div>
        <div class="thunder" style="right:-16px;top:20px">⚡</div>
    </div>
    <div class="ground"></div>
</div>
<button onclick="restart()">重新开始</button>
<div class="tips">←→移动｜空格跳跃｜点击屏幕跳跃｜收集闪电⚡，躲避黑石头</div>

<script>
const gameBox=document.getElementById('game');
const nailong=document.getElementById('nailong');
let px=60,py=80,speed=7,jump=-17,g=0.7,onFloor=true,vy=0;
let score=0,maxS=localStorage.getItem('maxNailong')||0;
document.getElementById('max').innerText=maxS;
let lights=[],rocks=[],running=true,spd=3;
const key={L:false,R:false};

//按键
document.onkeydown=e=>{
    if(e.code==='ArrowLeft')key.L=true;
    if(e.code==='ArrowRight')key.R=true;
    if(e.code==='Space'&&onFloor&&running){vy=jump;onFloor=false}
}
document.onkeyup=e=>{
    if(e.code==='ArrowLeft')key.L=false;
    if(e.code==='ArrowRight')key.R=false;
}
gameBox.onclick=()=>{if(onFloor&&running){vy=jump;onFloor=false}}

//生成闪电
function makeLight(){
    if(!running)return;
    let d=document.createElement('div');
    d.className='lightItem';d.innerText='⚡';
    d.style.left=gameBox.offsetWidth+'px';
    d.style.top=(Math.random()*270+50)+'px';
    gameBox.appendChild(d);
    lights.push({dom:d,x:gameBox.offsetWidth})
}
//生成障碍物
function makeRock(){
    if(!running)return;
    let d=document.createElement('div');
    d.className='rock';
    d.style.left=gameBox.offsetWidth+'px';
    d.style.top=(Math.random()*230+40)+'px';
    gameBox.appendChild(d);
    rocks.push({dom:d,x:gameBox.offsetWidth})
}

//碰撞
function hit(x1,y1,w1,h1,x2,y2,w2,h2){
    return x1<x2+w2&&x1+w1>x2&&y1<y2+h2&&y1+h1>y2
}

//主循环
function frame(){
    if(!running)return;
    if(key.L&&px>0)px-=speed;
    if(key.R&&px<gameBox.offsetWidth-70)px+=speed;
    py+=vy;vy+=g;
    if(py<=80){py=80;onFloor=true;vy=0}
    nailong.style.left=px+'px';
    nailong.style.bottom=py+'px';

    //闪电遍历
    lights.forEach((it,i)=>{
        it.x-=spd;it.dom.style.left=it.x+'px';
        let t=parseInt(it.dom.style.top);
        if(hit(px,gameBox.offsetHeight-py-72,70,72,it.x,t,34,36)){
            score+=10;document.getElementById('score').innerText=score;
            it.dom.remove();lights.splice(i,1)
        }
        if(it.x<-40){it.dom.remove();lights.splice(i,1)}
    })
    //石头遍历
    rocks.forEach((it,i)=>{
        it.x-=spd;it.dom.style.left=it.x+'px';
        let t=parseInt(it.dom.style.top);
        if(hit(px,gameBox.offsetHeight-py-72,70,72,it.x,t,70,45))gameOver();
        if(it.x<-80){it.dom.remove();rocks.splice(i,1)}
    })
    requestAnimationFrame(frame)
}

setInterval(makeLight,1200);
setInterval(makeRock,2400);

function gameOver(){
    running=false;
    if(score>maxS){maxS=score;localStorage.setItem('maxNailong',maxS);document.getElementById('max').innerText=maxS}
    alert(`游戏结束！得分：${score}\n最高分：${maxS}`)
}
function restart(){
    lights.map(v=>v.dom.remove());rocks.map(v=>v.dom.remove());
    lights=[];rocks=[];px=60;py=80;vy=0;score=0;running=true;onFloor=true;
    document.getElementById('score').innerText=0;frame()
}
frame()
</script>
</body>
</html>
