<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典俄罗斯方块</title>
    <style>
        /* 全局重置与基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #121212, #232323);
            color: #ffffff;
            overflow: hidden;
        }

        /* 游戏外层容器 */
        .game-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            padding: 20px;
            background: rgba(40, 40, 40, 0.8);
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 主游戏画布 */
        #game-board {
            border: 3px solid #00ffff;
            background-color: #000;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        /* 信息面板 */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-size: 18px;
            min-width: 160px;
        }

        .score, .level, .next-piece {
            background: #2a2a2a;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .score span, .level span {
            font-size: 24px;
            font-weight: bold;
            color: #00ffff;
            margin-left: 8px;
        }

        /* 下一个方块预览画布 */
        #next-board {
            border: 2px solid #fff;
            background: #000;
            margin: 12px auto 0;
            border-radius: 4px;
        }

        /* 按钮样式 */
        button {
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #4CAF50, #2e7d32);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(76, 175, 80, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.7;
        }

        /* 操作说明 */
        .controls {
            margin-top: 10px;
            font-size: 14px;
            color: #cccccc;
            line-height: 1.8;
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        /* 游戏结束弹窗优化（可选） */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 游戏主画布 -->
        <canvas id="game-board" width="300" height="600"></canvas>

        <!-- 右侧信息面板 -->
        <div class="info-panel">
            <div class="score">
                得分: <span id="score">0</span>
            </div>
            <div class="level">
                等级: <span id="level">1</span>
            </div>
            <div class="next-piece">
                下一个方块
                <canvas id="next-board" width="120" height="120"></canvas>
            </div>
            <button id="start-btn">开始游戏</button>
            <div class="controls">
                ← → 左右移动<br>
                ↑ 方块旋转<br>
                ↓ 加速下落
            </div>
        </div>
    </div>

    <script>
        // ========== 全局DOM与画布上下文 ==========
        const gameCanvas = document.getElementById('game-board');
        const gameCtx = gameCanvas.getContext('2d');
        const nextCanvas = document.getElementById('next-board');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreDom = document.getElementById('score');
        const levelDom = document.getElementById('level');
        const startBtn = document.getElementById('start-btn');

        // ========== 游戏基础配置 ==========
        const ROWS = 20;          // 总行数
        const COLS = 10;          // 总列数
        const BLOCK_SIZE = 30;    // 单个方块尺寸
        const NEXT_BLOCK_SIZE = 24;// 预览区方块尺寸
        let score = 0;
        let level = 1;
        let gameTimer = null;     // 下落定时器
        let gameRunning = false;  // 游戏运行状态
        let lastKeyTime = 0;      // 按键防抖时间戳

        // 方块配色
        const COLORS = [
            '#00ffff', '#0000ff', '#ffa500', '#ffff00',
            '#00ff00', '#800080', '#ff0000'
        ];

        // 七种经典方块形状
        const SHAPES = [
            [[1,1,1,1]],                // I 长条
            [[1,1],[1,1]],              // O 方块
            [[0,1,0],[1,1,1]],          // T 三角
            [[1,0,0],[1,1,1]],          // L L型
            [[0,0,1],[1,1,1]],          // J 反L
            [[0,1,1],[1,1,0]],          // S 右折
            [[1,1,0],[0,1,1]]           // Z 左折
        ];

        // 游戏棋盘二维数组
        let gameBoard = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let currentPiece = null; // 当前下落方块
        let nextPiece = null;    // 下一个预览方块

        // ========== 核心工具函数 ==========
        /**
         * 生成随机新方块
         * @returns {Object} 方块对象
         */
        function createPiece() {
            const type = Math.floor(Math.random() * SHAPES.length);
            const shape = SHAPES[type];
            return {
                shape,
                color: COLORS[type],
                x: Math.floor(COLS / 2) - Math.floor(shape[0].length / 2),
                y: 0
            };
        }

        /**
         * 绘制单个方块（带描边，增强立体感）
         * @param {CanvasRenderingContext2D} ctx 画布上下文
         * @param {number} x 列坐标
         * @param {number} y 行坐标
         * @param {number} size 方块尺寸
         * @param {string} color 颜色
         */
        function drawBlock(ctx, x, y, size, color) {
            const gap = 1;
            // 主体填充
            ctx.fillStyle = color;
            ctx.fillRect(x * size + gap, y * size + gap, size - gap * 2, size - gap * 2);
            // 浅色上描边
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 1;
            ctx.strokeRect(x * size + gap, y * size + gap, size - gap * 2, size - gap * 2);
        }

        /**
         * 绘制主游戏棋盘
         */
        function drawGameBoard() {
            gameCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (gameBoard[r][c]) {
                        drawBlock(gameCtx, c, r, BLOCK_SIZE, gameBoard[r][c]);
                    }
                }
            }
        }

        /**
         * 绘制当前下落方块
         */
        function drawCurrentPiece() {
            const { shape, color, x, y } = currentPiece;
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        drawBlock(gameCtx, x + c, y + r, BLOCK_SIZE, color);
                    }
                }
            }
        }

        /**
         * 绘制下一个预览方块（居中显示）
         */
        function drawNextPiece() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            const { shape, color } = nextPiece;
            // 自动居中偏移
            const offsetX = (nextCanvas.width - shape[0].length * NEXT_BLOCK_SIZE) / 2;
            const offsetY = (nextCanvas.height - shape.length * NEXT_BLOCK_SIZE) / 2;

            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        nextCtx.fillStyle = color;
                        nextCtx.fillRect(
                            c * NEXT_BLOCK_SIZE + offsetX + 1,
                            r * NEXT_BLOCK_SIZE + offsetY + 1,
                            NEXT_BLOCK_SIZE - 2,
                            NEXT_BLOCK_SIZE - 2
                        );
                    }
                }
            }
        }

        /**
         * 碰撞检测
         * @param {number} x 目标X坐标
         * @param {number} y 目标Y坐标
         * @param {Array} shape 方块形状
         * @returns {boolean} 是否碰撞
         */
        function checkCollision(x, y, shape) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const newX = x + c;
                        const newY = y + r;
                        // 左右边界、底部边界、已有方块碰撞
                        if (newX < 0 || newX >= COLS || newY >= ROWS) return true;
                        // y<0 表示方块还在顶部外，不判定碰撞
                        if (newY >= 0 && gameBoard[newY][newX]) return true;
                    }
                }
            }
            return false;
        }

        /**
         * 旋转方块
         */
        function rotatePiece() {
            const oldShape = currentPiece.shape;
            // 矩阵旋转算法
            const newShape = oldShape[0].map((_, idx) => 
                oldShape.map(row => row[idx]).reverse()
            );
            // 无碰撞才执行旋转
            if (!checkCollision(currentPiece.x, currentPiece.y, newShape)) {
                currentPiece.shape = newShape;
            }
        }

        /**
         * 将方块固定到棋盘上
         */
        function lockPieceToBoard() {
            const { shape, color, x, y } = currentPiece;
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const boardY = y + r;
                        const boardX = x + c;
                        // 方块顶部超出画布 → 游戏结束
                        if (boardY < 0) {
                            gameOver();
                            return;
                        }
                        gameBoard[boardY][boardX] = color;
                    }
                }
            }
            // 消除满行
            clearFullLines();
            // 切换下一个方块
            currentPiece = nextPiece;
            nextPiece = createPiece();
            drawNextPiece();
            // 新方块生成即碰撞 → 游戏结束
            if (checkCollision(currentPiece.x, currentPiece.y, currentPiece.shape)) {
                gameOver();
            }
        }

        /**
         * 消除满行并计分
         */
        function clearFullLines() {
            let clearLines = 0;
            // 从下往上遍历
            for (let r = ROWS - 1; r >= 0; r--) {
                if (gameBoard[r].every(cell => cell)) {
                    // 删除当前行，顶部补空行
                    gameBoard.splice(r, 1);
                    gameBoard.unshift(Array(COLS).fill(0));
                    r++; // 行删除后下标回退
                    clearLines++;
                }
            }

            if (clearLines > 0) {
                // 计分规则
                score += clearLines * 100 * level;
                // 升级规则：每500分升一级
                level = Math.floor(score / 500) + 1;
                updateGameInfo();
                resetGameSpeed();
            }
        }

        /**
         * 方块向下移动一格
         */
        function moveDown() {
            if (!checkCollision(currentPiece.x, currentPiece.y + 1, currentPiece.shape)) {
                currentPiece.y++;
            } else {
                lockPieceToBoard();
            }
        }

        /**
         * 左右移动
         * @param {number} dir 方向 -1左 / 1右
         */
        function moveHorizontal(dir) {
            if (!checkCollision(currentPiece.x + dir, currentPiece.y, currentPiece.shape)) {
                currentPiece.x += dir;
            }
        }

        /**
         * 更新分数、等级显示
         */
        function updateGameInfo() {
            scoreDom.textContent = score;
            levelDom.textContent = level;
        }

        /**
         * 根据等级重置下落速度
         */
        function resetGameSpeed() {
            clearInterval(gameTimer);
            // 最低速度100ms，等级越高速度越快
            const speed = Math.max(100, 800 - (level - 1) * 100);
            gameTimer = setInterval(moveDown, speed);
        }

        /**
         * 游戏结束
         */
        function gameOver() {
            clearInterval(gameTimer);
            gameRunning = false;
            alert(`游戏结束！\n最终得分：${score}\n到达等级：${level}`);
            startBtn.disabled = false;
        }

        /**
         * 开始/重置游戏
         */
        function startGame() {
            // 重置所有数据
            gameBoard = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0;
            level = 1;
            gameRunning = true;

            currentPiece = createPiece();
            nextPiece = createPiece();

            updateGameInfo();
            drawNextPiece();
            resetGameSpeed();

            startBtn.disabled = true;
        }

        // ========== 游戏主循环（渲染） ==========
        function gameRenderLoop() {
            if (gameRunning) {
                drawGameBoard();
                drawCurrentPiece();
            }
            requestAnimationFrame(gameRenderLoop);
        }

        // ========== 键盘控制（增加防抖，防止连按） ==========
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            const now = Date.now();
            // 100ms 按键防抖，防止连续触发
            if (now - lastKeyTime < 100) return;
            lastKeyTime = now;

            switch (e.key) {
                case 'ArrowLeft':
                    moveHorizontal(-1);
                    break;
                case 'ArrowRight':
                    moveHorizontal(1);
                    break;
                case 'ArrowDown':
                    moveDown();
                    break;
                case 'ArrowUp':
                    rotatePiece();
                    break;
            }
        });

        // ========== 绑定按钮事件 ==========
        startBtn.addEventListener('click', startGame);

        // 启动渲染循环
        gameRenderLoop();
    </script>
</body>
</html>
