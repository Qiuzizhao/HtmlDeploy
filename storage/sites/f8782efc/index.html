<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳一跳小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(#87CEEB, #98FB98);
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }

        /* 分数展示 */
        .score {
            position: absolute;
            top: 20px;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px rgba(0,0,0,0.3);
            z-index: 100;
        }

        /* 游戏画布 */
        #game {
            background: #f9f9f9;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        /* 提示文字 */
        .tips {
            margin-top: 15px;
            color: #333;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="score" id="score">0</div>
    <canvas id="game" width="400" height="600"></canvas>
    <div class="tips">长按鼠标/空格蓄力，松开跳跃</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        // 游戏配置
        const config = {
            player: {
                x: 50,
                y: 400,
                size: 20,
                jumpPower: 0,
                isJumping: false,
                vx: 0,
                vy: 0,
                gravity: 0.5
            },
            platforms: [
                { x: 30, y: 420, w: 80, h: 20 },
                { x: 200, y: 350, w: 80, h: 20 },
                { x: 100, y: 280, w: 80, h: 20 },
                { x: 300, y: 210, w: 80, h: 20 }
            ],
            isHolding: false,
            holdTime: 0,
            score: 0
        };

        // 生成新平台
        function createPlatform() {
            const lastPlatform = config.platforms[config.platforms.length - 1];
            const newPlatform = {
                x: Math.random() * 300 + 20,
                y: lastPlatform.y - 70,
                w: 80,
                h: 20
            };
            config.platforms.push(newPlatform);
        }

        // 绘制游戏元素
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制平台
            ctx.fillStyle = '#4CAF50';
            config.platforms.forEach(platform => {
                ctx.fillRect(platform.x, platform.y, platform.w, platform.h);
            });

            // 绘制角色
            ctx.fillStyle = '#FF5722';
            ctx.beginPath();
            ctx.arc(config.player.x, config.player.y, config.player.size, 0, Math.PI * 2);
            ctx.fill();

            // 绘制蓄力条
            if (config.isHolding) {
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(config.player.x - 10, config.player.y - 50, 20, config.holdTime * 2);
            }
        }

        // 物理更新
        function update() {
            const p = config.player;

            // 跳跃物理
            if (p.isJumping) {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
            }

            // 碰撞检测
            if (!p.isJumping) {
                config.platforms.forEach(platform => {
                    if (
                        p.x > platform.x &&
                        p.x < platform.x + platform.w &&
                        p.y + p.size > platform.y &&
                        p.y + p.size < platform.y + platform.h + 10
                    ) {
                        p.y = platform.y - p.size;
                        p.isJumping = false;
                        p.vx = 0;
                        p.vy = 0;
                        config.score++;
                        scoreEl.textContent = config.score;
                        createPlatform();
                    }
                });
            }

            // 掉落重置
            if (p.y > canvas.height) {
                resetGame();
            }

            // 屏幕边界限制
            if (p.x < 0 || p.x > canvas.width) {
                resetGame();
            }
        }

        // 游戏重置
        function resetGame() {
            config.player.x = 50;
            config.player.y = 400;
            config.player.jumpPower = 0;
            config.player.isJumping = false;
            config.player.vx = 0;
            config.player.vy = 0;
            config.platforms = [
                { x: 30, y: 420, w: 80, h: 20 },
                { x: 200, y: 350, w: 80, h: 20 },
                { x: 100, y: 280, w: 80, h: 20 },
                { x: 300, y: 210, w: 80, h: 20 }
            ];
            config.score = 0;
            scoreEl.textContent = 0;
        }

        // 游戏循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 事件监听
        // 长按蓄力
        document.addEventListener('mousedown', () => {
            if (!config.player.isJumping) {
                config.isHolding = true;
                config.holdTime = 0;
            }
        });

        // 蓄力计时
        document.addEventListener('mousemove', () => {
            if (config.isHolding) {
                config.holdTime += 1;
                if (config.holdTime > 50) config.holdTime = 50;
            }
        });

        // 松开跳跃
        document.addEventListener('mouseup', () => {
            if (config.isHolding && !config.player.isJumping) {
                config.isHolding = false;
                config.player.isJumping = true;
                const power = config.holdTime * 0.8;
                config.player.vx = power;
                config.player.vy = -power * 0.8;
            }
        });

        // 空格支持
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !config.player.isJumping && !config.isHolding) {
                config.isHolding = true;
                config.holdTime = 0;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && config.isHolding) {
                config.isHolding = false;
                config.player.isJumping = true;
                const power = config.holdTime * 0.8;
                config.player.vx = power;
                config.player.vy = -power * 0.8;
            }
        });

        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
