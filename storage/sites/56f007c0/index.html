<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D射击游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Arial', sans-serif;
            cursor: none;
        }
        
        #game {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            outline: none;
        }
        
        /* UI界面 */
        .ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            color: #fff;
            font-size: 24px;
            text-align: center;
            line-height: 20px;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        .hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        .score {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .ammo {
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .reload {
            color: #ff4444;
            animation: pulse 1s infinite;
        }
        
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 14px;
            line-height: 1.6;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 10px;
        }
        
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 200;
            cursor: pointer;
        }
        
        .start-title {
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        
        .start-btn {
            background: #ff4444;
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .start-btn:hover {
            background: #ff6666;
            transform: scale(1.05);
        }
        
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 150;
        }
        
        .game-over-title {
            font-size: 60px;
            color: #ff4444;
            margin-bottom: 20px;
        }
        
        .final-score {
            font-size: 32px;
            margin-bottom: 30px;
        }
        
        .restart-btn {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .restart-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .hitmarker {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-size: 30px;
            opacity: 0;
            animation: hitmarker 0.3s ease-out;
            pointer-events: none;
        }
        
        @keyframes hitmarker {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div id="game"></div>
    
    <!-- UI界面 -->
    <div class="ui">
        <div class="crosshair">+</div>
        <div class="hud">
            <div class="score">分数: <span id="score">0</span></div>
            <div class="ammo">
                弹药: <span id="currentAmmo">30</span>/<span id="totalAmmo">120</span>
                <span class="reload" id="reloadText" style="display:none">[R 换弹]</span>
            </div>
        </div>
        <div class="controls">
            <div>🎮 操作说明</div>
            <div>WASD - 移动</div>
            <div>鼠标 - 瞄准射击</div>
            <div>空格 - 跳跃</div>
            <div>R - 换弹</div>
            <div>ESC - 退出全屏</div>
        </div>
        <div class="hitmarker" id="hitmarker">✕</div>
    </div>
    
    <!-- 开始界面 -->
    <div class="start-screen" id="startScreen">
        <div class="start-title">3D 射击游戏</div>
        <div style="font-size: 18px; text-align: center; line-height: 1.8;">
            消灭所有敌人，获得高分！<br>
            点击开始后点击鼠标锁定视角
        </div>
        <button class="start-btn" id="startBtn">开始游戏</button>
    </div>
    
    <!-- 游戏结束界面 -->
    <div class="game-over" id="gameOver">
        <div class="game-over-title">游戏结束</div>
        <div class="final-score">最终分数: <span id="finalScore">0</span></div>
        <button class="restart-btn" id="restartBtn">重新开始</button>
    </div>

    <!-- 引入Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 游戏主类
        class ShooterGame {
            constructor() {
                // 基础设置
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.setClearColor(0x87ceeb);
                document.getElementById('game').appendChild(this.renderer.domElement);
                
                // 游戏状态
                this.gameStarted = false;
                this.gameOver = false;
                this.score = 0;
                this.mouse = { x: 0, y: 0 };
                this.keys = {};
                
                // 枪械设置
                this.weapon = {
                    currentAmmo: 30,
                    maxAmmo: 30,
                    totalAmmo: 120,
                    reloading: false,
                    fireRate: 150,
                    lastShot: 0
                };
                
                // 玩家设置
                this.player = {
                    velocity: new THREE.Vector3(),
                    direction: new THREE.Vector3(),
                    speed: 5,
                    jumpPower: 7,
                    gravity: -9.8,
                    onGround: false,
                    health: 100
                };
                
                // 游戏对象数组
                this.enemies = [];
                this.bullets = [];
                this.particles = [];
                
                this.init();
                this.setupControls();
                this.gameLoop();
            }
            
            // 初始化游戏
            init() {
                // 光照
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                this.scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(10, 20, 5);
                directionalLight.castShadow = true;
                directionalLight.shadow.mapSize.width = 2048;
                directionalLight.shadow.mapSize.height = 2048;
                this.scene.add(directionalLight);
                
                // 地面
                const groundGeometry = new THREE.PlaneGeometry(100, 100);
                const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x3a5f3a });
                const ground = new THREE.Mesh(groundGeometry, groundMaterial);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                this.scene.add(ground);
                
                // 相机位置
                this.camera.position.y = 1.6;
                
                // 生成障碍物
                this.createObstacles();
                
                // 生成敌人
                this.spawnEnemies();
                
                // 创建枪械模型
                this.createWeapon();
            }
            
            // 创建障碍物
            createObstacles() {
                // 墙体
                const wallMaterial = new THREE.MeshLambertMaterial({ color: 0x666666 });
                
                for (let i = 0; i < 15; i++) {
                    const wallGeometry = new THREE.BoxGeometry(3, 4, 0.5);
                    const wall = new THREE.Mesh(wallGeometry, wallMaterial);
                    wall.position.set(
                        (Math.random() - 0.5) * 80,
                        2,
                        (Math.random() - 0.5) * 80
                    );
                    wall.castShadow = true;
                    wall.receiveShadow = true;
                    this.scene.add(wall);
                }
            }
            
            // 创建枪械
            createWeapon() {
                const weaponGroup = new THREE.Group();
                this.weapon.model = weaponGroup;
                
                // 枪身
                const gunGeometry = new THREE.BoxGeometry(0.1, 0.15, 0.8);
                const gunMaterial = new THREE.MeshLambertMaterial({ color: 0x222222 });
                const gun = new THREE.Mesh(gunGeometry, gunMaterial);
                gun.position.z = -0.4;
                weaponGroup.add(gun);
                
                // 枪管
                const barrelGeometry = new THREE.BoxGeometry(0.05, 0.05, 0.6);
                const barrel = new THREE.Mesh(barrelGeometry, gunMaterial);
                barrel.position.z = -0.8;
                barrel.position.y = 0.05;
                weaponGroup.add(barrel);
                
                // 初始位置
                weaponGroup.position.set(0.2, -0.15, -0.3);
                weaponGroup.rotation.set(0.1, 0, 0);
                this.camera.add(weaponGroup);
            }
            
            // 生成敌人
            spawnEnemies() {
                const enemyGeometry = new THREE.BoxGeometry(1, 2, 1);
                const enemyMaterial = new THREE.MeshLambertMaterial({ color: 0xff4444 });
                
                for (let i = 0; i < 8; i++) {
                    const enemy = new THREE.Mesh(enemyGeometry, enemyMaterial);
                    enemy.position.set(
                        (Math.random() - 0.5) * 60,
                        1,
                        (Math.random() - 0.5) * 60
                    );
                    enemy.castShadow = true;
                    enemy.userData = {
                        health: 100,
                        speed: 1.5 + Math.random() * 1,
                        type: 'enemy'
                    };
                    this.scene.add(enemy);
                    this.enemies.push(enemy);
                }
            }
            
            // 设置控制
            setupControls() {
                // 键盘事件
                document.addEventListener('keydown', (e) => {
                    this.keys[e.code] = true;
                    
                    // R键换弹
                    if (e.code === 'KeyR' && !this.weapon.reloading && this.weapon.currentAmmo < this.weapon.maxAmmo && this.weapon.totalAmmo > 0) {
                        this.reload();
                    }
                });
                
                document.addEventListener('keyup', (e) => {
                    this.keys[e.code] = false;
                });
                
                // 鼠标移动
                document.addEventListener('mousemove', (e) => {
                    if (document.pointerLockElement === this.renderer.domElement) {
                        const sensitivity = 0.15;
                        this.camera.rotation.y -= e.movementX * sensitivity * 0.002;
                        this.camera.rotation.x -= e.movementY * sensitivity * 0.002;
                        this.camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, this.camera.rotation.x));
                    }
                });
                
                // 鼠标点击
                this.renderer.domElement.addEventListener('click', () => {
                    if (this.gameStarted && !this.gameOver) {
                        this.renderer.domElement.requestPointerLock();
                    }
                });
                
                // 鼠标射击
                document.addEventListener('mousedown', () => {
                    if (this.gameStarted && !this.gameOver && document.pointerLockElement === this.renderer.domElement) {
                        this.shoot();
                    }
                });
            }
            
            // 射击
            shoot() {
                if (this.weapon.reloading || this.weapon.currentAmmo <= 0) return;
                
                const now = Date.now();
                if (now - this.weapon.lastShot < this.weapon.fireRate) return;
                
                this.weapon.lastShot = now;
                this.weapon.currentAmmo--;
                this.updateAmmoUI();
                
                // 枪械后坐力
                this.weapon.model.rotation.x = 0.3 + Math.random() * 0.1;
                setTimeout(() => {
                    this.weapon.model.rotation.x = 0.1;
                }, 50);
                
                // 创建射线检测击中
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(), this.camera);
                
                const intersects = raycaster.intersectObjects(this.enemies);
                
                if (intersects.length > 0) {
                    const hitEnemy = intersects[0].object;
                    hitEnemy.userData.health -= 50;
                    
                    // 击中标记
                    this.showHitmarker();
                    
                    if (hitEnemy.userData.health <= 0) {
                        this.killEnemy(hitEnemy);
                    }
                }
                
                // 射击音效（模拟）
                this.playSound(0.1);
            }
            
            // 换弹
            reload() {
                if (this.weapon.totalAmmo <= 0 || this.weapon.currentAmmo === this.weapon.maxAmmo) return;
                
                this.weapon.reloading = true;
                document.getElementById('reloadText').style.display = 'none';
                
                // 换弹动画
                setTimeout(() => {
                    const needed = this.weapon.maxAmmo - this.weapon.currentAmmo;
                    const reloadAmount = Math.min(needed, this.weapon.totalAmmo);
                    
                    this.weapon.currentAmmo += reloadAmount;
                    this.weapon.totalAmmo -= reloadAmount;
                    this.weapon.reloading = false;
                    
                    this.updateAmmoUI();
                }, 1000);
            }
            
            // 击杀敌人
            killEnemy(enemy) {
                const index = this.enemies.indexOf(enemy);
                if (index > -1) {
                    this.scene.remove(enemy);
                    this.enemies.splice(index, 1);
                    
                    // 加分
                    this.score += 100;
                    document.getElementById('score').textContent = this.score;
                    
                    // 生成新敌人
                    setTimeout(() => this.spawnEnemies(), 2000);
                }
            }
            
            // 显示击中标记
            showHitmarker() {
                const hitmarker = document.getElementById('hitmarker');
                hitmarker.style.animation = 'none';
                hitmarker.offsetHeight; // 重置动画
                hitmarker.style.animation = 'hitmarker 0.3s ease-out';
            }
            
            // 播放音效
            playSound(volume) {
                const audio = new AudioContext();
                const oscillator = audio.createOscillator();
                const gain = audio.createGain();
                
                oscillator.type = 'square';
                oscillator.frequency.value = 300;
                gain.gain.value = volume;
                
                oscillator.connect(gain);
                gain.connect(audio.destination);
                
                oscillator.start();
                setTimeout(() => {
                    oscillator.stop();
                }, 50);
            }
            
            // 更新UI
            updateAmmoUI() {
                document.getElementById('currentAmmo').textContent = this.weapon.currentAmmo;
                document.getElementById('totalAmmo').textContent = this.weapon.totalAmmo;
                
                if (this.weapon.currentAmmo === 0 && !this.weapon.reloading) {
                    document.getElementById('reloadText').style.display = 'inline';
                } else {
                    document.getElementById('reloadText').style.display = 'none';
                }
            }
            
            // 更新玩家移动
            updatePlayer(deltaTime) {
                if (!this.gameStarted || this.gameOver) return;
                
                const speed = this.player.speed;
                const direction = this.player.direction;
                
                direction.z = Number(this.keys.KeyW) - Number(this.keys.KeyS);
                direction.x = Number(this.keys.KeyD) - Number(this.keys.KeyA);
                direction.normalize();
                
                // 移动计算
                const forward = new THREE.Vector3();
                this.camera.getWorldDirection(forward);
                forward.y = 0;
                forward.normalize();
                
                const right = new THREE.Vector3();
                right.crossVectors(forward, new THREE.Vector3(0, 1, 0));
                
                const velocity = this.player.velocity;
                velocity.x = 0;
                velocity.z = 0;
                
                if (direction.z) {
                    velocity.add(forward.multiplyScalar(direction.z * speed));
                }
                if (direction.x) {
                    velocity.add(right.multiplyScalar(direction.x * speed));
                }
                
                // 跳跃
                if (this.keys.Space && this.player.onGround) {
                    velocity.y = this.player.jumpPower;
                    this.player.onGround = false;
                }
                
                // 重力
                velocity.y += this.player.gravity * deltaTime;
                
                // 移动相机
                this.camera.position.x += velocity.x * deltaTime;
                this.camera.position.y += velocity.y * deltaTime;
                this.camera.position.z += velocity.z * deltaTime;
                
                // 地面碰撞
                if (this.camera.position.y <= 1.6) {
                    this.camera.position.y = 1.6;
                    velocity.y = 0;
                    this.player.onGround = true;
                }
                
                // 边界限制
                this.camera.position.x = Math.max(-45, Math.min(45, this.camera.position.x));
                this.camera.position.z = Math.max(-45, Math.min(45, this.camera.position.z));
            }
            
            // 更新敌人AI
            updateEnemies(deltaTime) {
                for (let enemy of this.enemies) {
                    const direction = new THREE.Vector3();
                    direction.subVectors(this.camera.position, enemy.position);
                    direction.y = 0;
                    direction.normalize();
                    
                    enemy.position.add(direction.multiplyScalar(enemy.userData.speed * deltaTime));
                    enemy.lookAt(this.camera.position.x, enemy.position.y, this.camera.position.z);
                    
                    // 敌人靠近玩家
                    const distance = enemy.position.distanceTo(this.camera.position);
                    if (distance < 2) {
                        this.endGame();
                    }
                }
            }
            
            // 开始游戏
            startGame() {
                this.gameStarted = true;
                document.getElementById('startScreen').style.display = 'none';
                this.renderer.domElement.requestPointerLock();
            }
            
            // 游戏结束
            endGame() {
                this.gameOver = true;
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOver').style.display = 'flex';
                document.exitPointerLock();
            }
            
            // 重新开始
            restartGame() {
                window.location.reload();
            }
            
            // 游戏循环
            gameLoop() {
                const clock = new THREE.Clock();
                
                const animate = () => {
                    requestAnimationFrame(animate);
                    
                    const deltaTime = clock.getDelta();
                    
                    if (this.gameStarted && !this.gameOver) {
                        this.updatePlayer(deltaTime);
                        this.updateEnemies(deltaTime);
                    }
                    
                    this.renderer.render(this.scene, this.camera);
                };
                
                animate();
            }
        }
        
        // 启动游戏
        document.addEventListener('DOMContentLoaded', () => {
            const game = new ShooterGame();
            
            // 开始按钮
            document.getElementById('startBtn').addEventListener('click', () => {
                game.startGame();
            });
            
            // 重新开始按钮
            document.getElementById('restartBtn').addEventListener('click', () => {
                game.restartGame();
            });
            
            // 窗口调整大小
            window.addEventListener('resize', () => {
                game.camera.aspect = window.innerWidth / window.innerHeight;
                game.camera.updateProjectionMatrix();
                game.renderer.setSize(window.innerWidth, window.innerHeight);
            });
        });
    </script>
</body>
</html>
