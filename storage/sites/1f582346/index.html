<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .game-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .score {
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        #game-board {
            border: 3px solid #fff;
            border-radius: 8px;
            background: #111;
            display: block;
        }

        .tips {
            margin-top: 15px;
            font-size: 16px;
            opacity: 0.8;
        }

        #restart-btn {
            margin-top: 15px;
            padding: 8px 20px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }

        #restart-btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score">得分: <span id="score">0</span></div>
        <canvas id="game-board" width="400" height="400"></canvas>
        <div class="tips">方向键 ↑ ↓ ← → 控制移动</div>
        <button id="restart-btn">重新开始</button>
    </div>

    <script>
        // 获取DOM元素
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const restartBtn = document.getElementById('restart-btn');

        // 游戏基础设置
        const gridSize = 20; // 网格大小
        const tileCount = canvas.width / gridSize; // 网格数量

        // 蛇的初始属性
        let snake = [
            {x: 10, y: 10} // 蛇头初始位置
        ];
        let dx = 0; // X轴移动速度
        let dy = 0; // Y轴移动速度

        // 食物
        let food = {x: 15, y: 15};

        // 游戏状态
        let score = 0;
        let gameLoop;
        let gameOver = false;

        // 键盘控制
        document.addEventListener('keydown', changeDirection);
        restartBtn.addEventListener('click', restartGame);

        // 开始游戏循环
        startGame();

        // 游戏主循环
        function startGame() {
            // 200毫秒走一步，速度变慢，想要更慢改成300
            gameLoop = setInterval(updateGame, 200);
        }

        // 更新游戏状态
        function updateGame() {
            if(gameOver) return;

            // 移动蛇
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // 检测是否吃到食物
            if(head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                generateFood(); // 生成新食物
            } else {
                snake.pop(); // 没吃到就移除尾部
            }

            // 检测碰撞
            checkCollision();

            // 绘制游戏
            drawGame();
        }

        // 绘制游戏画面
        function drawGame() {
            // 清空画布
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制蛇
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#4CAF50' : '#8BC34A';
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });

            // 绘制食物
            ctx.fillStyle = '#FF5722';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        // 控制方向
        function changeDirection(event) {
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            // 防止蛇反向移动
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingLeft = dx === -1;
            const goingRight = dx === 1;

            switch(event.keyCode) {
                case LEFT_KEY:
                    if(!goingRight) {
                        dx = -1;
                        dy = 0;
                    }
                    break;
                case UP_KEY:
                    if(!goingDown) {
                        dx = 0;
                        dy = -1;
                    }
                    break;
                case RIGHT_KEY:
                    if(!goingLeft) {
                        dx = 1;
                        dy = 0;
                    }
                    break;
                case DOWN_KEY:
                    if(!goingUp) {
                        dx = 0;
                        dy = 1;
                    }
                    break;
            }
        }

        // 生成随机食物
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // 避免食物生成在蛇身上
            snake.forEach(segment => {
                if(segment.x === food.x && segment.y === food.y) {
                    generateFood();
                }
            });
        }

        // 碰撞检测
        function checkCollision() {
            // 撞墙检测
            if(snake[0].x < 0 || snake[0].x >= tileCount ||
               snake[0].y < 0 || snake[0].y >= tileCount) {
                gameOverHandler();
            }

            // 撞到自己检测
            for(let i = 1; i < snake.length; i++) {
                if(snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
                    gameOverHandler();
                }
            }
        }

        // 游戏结束处理
        function gameOverHandler() {
            gameOver = true;
            clearInterval(gameLoop);
            restartBtn.style.display = 'inline-block';
            
            // 显示游戏结束文字
            ctx.fillStyle = 'red';
            ctx.font = '40px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束', canvas.width/2, canvas.height/2 - 20);
            ctx.font = '20px Microsoft YaHei';
            ctx.fillText(`最终得分: ${score}`, canvas.width/2, canvas.height/2 + 20);
        }

        // 重新开始游戏
        function restartGame() {
            // 重置所有数据
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            gameOver = false;
            restartBtn.style.display = 'none';
            generateFood();
            startGame();
        }
    </script>
</body>
</html>
