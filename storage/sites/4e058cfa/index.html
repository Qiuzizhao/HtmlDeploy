<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星光音游 - Star Rhythm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        /* 粒子背景 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .game-header {
            text-align: center;
        }

        .game-title {
            font-size: 42px;
            background: linear-gradient(90deg, #00d4ff, #ff2e63, #9d4edd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(157, 62, 221, 0.3);
        }

        .game-subtitle {
            color: #aaa;
            font-size: 16px;
            margin-top: 5px;
        }

        .game-stats {
            display: flex;
            gap: 40px;
            font-size: 20px;
            font-weight: 600;
        }

        .stat-item {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .stat-item span {
            color: #00d4ff;
        }

        /* 音游主面板 */
        .game-board {
            width: 460px;
            height: 580px;
            background: rgba(22, 33, 62, 0.8);
            border-radius: 20px;
            border: 2px solid rgba(157, 78, 221, 0.3);
            box-shadow: 0 0 50px rgba(157, 78, 221, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* 轨道线 */
        .tracks {
            display: flex;
            height: 100%;
            position: relative;
        }

        .track {
            flex: 1;
            border-left: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        /* 判定线 */
        .hit-line {
            position: absolute;
            bottom: 100px;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ff2e63, #9d4edd);
            box-shadow: 0 0 15px #ff2e63;
            z-index: 10;
        }

        /* 按键区 */
        .key-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            display: flex;
            padding: 10px;
            gap: 8px;
        }

        .key-btn {
            flex: 1;
            border-radius: 12px;
            background: linear-gradient(180deg, rgba(15,52,96,0.6), rgba(15,52,96,0.3));
            border: 2px solid rgba(0,212,255,0.3);
            color: #00d4ff;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .key-btn.active {
            background: linear-gradient(180deg, #00d4ff, #00aaff);
            color: #0f3460;
            transform: translateY(-4px);
            box-shadow: 0 0 20px #00d4ff;
        }

        /* 音符 */
        .note {
            position: absolute;
            width: 21%;
            height: 24px;
            border-radius: 8px;
            top: -30px;
            background: linear-gradient(90deg, #ff2e63, #9d4edd);
            box-shadow: 0 0 12px rgba(255,46,99,0.6);
            animation: fall linear forwards;
            z-index: 5;
        }

        @keyframes fall {
            to { top: 480px; }
        }

        /* 判定文字 */
        .judge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            opacity: 0;
            z-index: 99;
            text-shadow: 0 0 15px currentColor;
            pointer-events: none;
        }

        .judge.perfect { color: #ffdf00; animation: show 0.6s forwards; }
        .judge.great { color: #00d4ff; animation: show 0.6s forwards; }
        .judge.good { color: #4ade80; animation: show 0.6s forwards; }
        .judge.miss { color: #ff4444; animation: show 0.6s forwards; }

        @keyframes show {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* 结束弹窗 */
        .game-end {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(22,33,62,0.95);
            padding: 40px 60px;
            border-radius: 20px;
            border: 2px solid #9d4edd;
            text-align: center;
            box-shadow: 0 0 60px rgba(157,78,221,0.4);
            display: none;
            z-index: 999;
            backdrop-filter: blur(20px);
        }

        .game-end h2 {
            font-size: 36px;
            color: #ff2e63;
            margin-bottom: 20px;
        }

        .end-score {
            font-size: 24px;
            margin: 10px 0;
            color: #00d4ff;
        }

        .restart {
            margin-top: 25px;
            padding: 12px 30px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, #9d4edd, #ff2e63);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(157,78,221,0.4);
        }

        .restart:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="particles"></div>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">⭐ 星光音游 ⭐</h1>
            <p class="game-subtitle">Perfect / Great / Good / Miss</p>
        </div>

        <div class="game-stats">
            <div class="stat-item">分数: <span id="score">0</span></div>
            <div class="stat-item">生命: <span id="hp">100</span></div>
        </div>

        <div class="game-board">
            <div class="tracks">
                <div class="track"></div><div class="track"></div>
                <div class="track"></div><div class="track"></div>
            </div>
            <div class="hit-line"></div>
            <div class="judge" id="judge"></div>
            <div class="key-area">
                <div class="key-btn" data-lane="0">D</div>
                <div class="key-btn" data-lane="1">F</div>
                <div class="key-btn" data-lane="2">J</div>
                <div class="key-btn" data-lane="3">K</div>
            </div>
        </div>
    </div>

    <div class="game-end" id="endPanel">
        <h2>游戏结束</h2>
        <p class="end-score">最终得分: <span id="final">0</span></p>
        <button class="restart" onclick="restart()">再来一局</button>
    </div>

    <script>
        const scoreText = document.getElementById('score');
        const hpText = document.getElementById('hp');
        const judgeText = document.getElementById('judge');
        const endPanel = document.getElementById('endPanel');
        const board = document.querySelector('.game-board');
        const keys = document.querySelectorAll('.key-btn');

        let score = 0;
        let hp = 100;
        let game = true;
        const speed = 1.8;
        const hitPos = 420;

        const keyBind = { d:0, f:1, j:2, k:3, D:0, F:1, J:2, K:3 };

        // 生成音符
        function spawn() {
            if (!game) return;
            const note = document.createElement('div');
            note.classList.add('note');
            const lane = Math.floor(Math.random()*4);
            note.style.left = `${lane*25 + 2}%`;
            note.style.animationDuration = `${speed}s`;
            board.appendChild(note);

            setTimeout(() => {
                if (note.parentElement && game) {
                    note.remove();
                    showJudge('MISS');
                    hp -= 12; updateHp();
                }
            }, speed*1000);
        }

        // 按键
        document.addEventListener('keydown', e => {
            if (!game) return;
            const l = keyBind[e.key];
            if (l===undefined) return;
            keys[l].classList.add('active');
            setTimeout(()=>keys[l].classList.remove('active'),80);
            hit(l);
        });

        // 击中判定
        function hit(lane) {
            const notes = document.querySelectorAll('.note');
            let ok = false;

            notes.forEach(n => {
                const y = n.offsetTop;
                const d = Math.abs(y - hitPos);

                if (d < 45) {
                    n.remove(); ok=true;
                    if (d<20) { showJudge('PERFECT'); score+=20; }
                    else if (d<35) { showJudge('GREAT'); score+=12; }
                    else { showJudge('GOOD'); score+=6; }
                    updateScore();
                }
            });

            if (!ok) { showJudge('MISS'); hp-=8; updateHp(); }
        }

        // 显示判定
        function showJudge(t) {
            judgeText.className = 'judge ' + t.toLowerCase();
            judgeText.innerText = t;
        }

        function updateScore() { scoreText.innerText = score; }
        function updateHp() {
            hp = Math.max(0, hp);
            hpText.innerText = hp;
            if (hp<=0) gameOver();
        }

        function gameOver() {
            game = false;
            document.getElementById('final').innerText = score;
            endPanel.style.display = 'block';
        }

        function restart() {
            score=0; hp=100; game=true;
            updateScore(); updateHp();
            endPanel.style.display = 'none';
            document.querySelectorAll('.note').forEach(n=>n.remove());
        }

        setInterval(spawn, 720);
    </script>
</body>
</html>
