<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<title>3D网页FPS修复完整版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;color:#fff;font-family:Arial}

#ui{
    position:fixed;top:15px;left:15px;z-index:10;
    font-size:20px;text-shadow:2px 2px #000;
    display:flex;gap:25px
}

.cross{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    width:24px;height:24px;z-index:9;pointer-events:none
}
.cross>div{position:absolute;background:#fff}
.h{width:24px;height:2px;top:11px;left:0}
.v{width:2px;height:24px;left:11px;top:0}

#tip{
    position:fixed;bottom:20px;width:100%;
    text-align:center;z-index:10;font-size:16px;
    color:#ccc
}

#muzzle{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:80px;height:80px;
    background:radial-gradient(yellow,orange,red);
    border-radius:50%;opacity:0;
    z-index:8;pointer-events:none;
    transition:opacity 0.08s ease
}

.hitmark{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:30px;height:30px;
    border:2px solid #ff4444;
    border-radius:50%;opacity:0;
    z-index:8;pointer-events:none;
    animation:hit 0.3s ease forwards
}
@keyframes hit{0%{transform:translate(-50%,-50%) scale(0.5);opacity:1}100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}
</style>
</head>
<body>
<div id="ui">
    <div>分数: <span id="score">0</span></div>
    <div>HP: <span id="hp">100</span></div>
    <div>弹药: <span id="ammo">30</span>/<span id="bag">90</span></div>
</div>
<div class="cross"><div class="h"></div><div class="v"></div></div>
<div id="muzzle"></div>
<div id="tip">点击画面锁定鼠标 | WASD移动 | 鼠标转头 | 左键射击 | R换弹 | 绿色方块回血</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>
<script>
// 游戏数据
let score = 0;
let hp = 100;
let ammo = 30;
const maxAmmo = 30;
let bagAmmo = 90;
let recoilOffset = 0;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// ========== 内置生成音效（无外链，100%可用）==========
function genSound(freq, dur, type='square', vol=0.2) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
}
const Audio = {
    shoot:()=>genSound(120,0.08,'saw',0.25),
    hit:()=>genSound(600,0.06,'sine',0.12),
    empty:()=>genSound(180,0.04,'square',0.08),
    reload:()=>genSound(320,0.12,'triangle',0.18),
    step:()=>genSound(90,0.03,'sine',0.06),
    heal:()=>genSound(520,0.15,'sine',0.22),
    hurt:()=>genSound(100,0.1,'saw',0.2),
    die:()=>genSound(60,0.3,'saw',0.3)
}

// 场景初始化
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222831);
scene.fog = new THREE.Fog(0x222831, 15, 70);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 光照
const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
dirLight.position.set(20,40,15);
scene.add(dirLight);
scene.add(new THREE.AmbientLight(0xaaaaaa, 0.5));

// 鼠标锁定
const controls = new THREE.PointerLockControls(camera, document.body);
document.body.addEventListener('click',()=>{
    if(audioCtx.state === 'suspended') audioCtx.resume();
    controls.lock();
});

// 地面
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(150,150),
    new THREE.MeshLambertMaterial({color:0x444444})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// 墙体建造
function wall(x,z,w){
    const m = new THREE.Mesh(
        new THREE.BoxGeometry(w,5,2),
        new THREE.MeshLambertMaterial({color:0x6c5b7b})
    );
    m.position.set(x,2.5,z);
    scene.add(m);
}
wall(-40,0,30); wall(40,0,30);
wall(0,-45,35); wall(0,45,35);
wall(-25,-25,20); wall(25,20,24);
wall(-15,20,18); wall(20,-22,22);

camera.position.set(0,2,0);

// 按键
const keys = {w:false,a:false,s:false,d:false};
document.addEventListener('keydown', e=>{
    const k = e.key.toLowerCase();
    if(k==='w')keys.w=true;
    if(k==='s')keys.s=true;
    if(k==='a')keys.a=true;
    if(k==='d')keys.d=true;
    if(k==='r')reload();
});
document.addEventListener('keyup', e=>{
    const k = e.key.toLowerCase();
    if(k==='w')keys.w=false;
    if(k==='s')keys.s=false;
    if(k==='a')keys.a=false;
    if(k==='d')keys.d=false;
});

// 敌人&血包
let enemies = [];
let healthPacks = [];

// 普通僵尸
function spawnEnemy(){
    const enemy = new THREE.Mesh(
        new THREE.BoxGeometry(1.7,2.1,1.7),
        new THREE.MeshLambertMaterial({color:0xe23e3e})
    );
    const angle = Math.random()*Math.PI*2;
    const dist = 62 + Math.random()*15;
    enemy.position.set(Math.cos(angle)*dist, 1.05, Math.sin(angle)*dist);
    enemy.userData = {speed:0.05 + Math.random()*0.025, hp:3};
    enemies.push(enemy);
    scene.add(enemy);
}
// 速攻怪
function spawnFastEnemy(){
    const enemy = new THREE.Mesh(
        new THREE.BoxGeometry(1.4,1.8,1.4),
        new THREE.MeshLambertMaterial({color:0xff9f01})
    );
    const angle = Math.random()*Math.PI*2;
    const dist = 65 + Math.random()*15;
    enemy.position.set(Math.cos(angle)*dist, 1.0, Math.sin(angle)*dist);
    enemy.userData = {speed:0.09 + Math.random()*0.02, hp:2};
    enemies.push(enemy);
    scene.add(enemy);
}
// 血包
function spawnHealth(){
    const pack = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        new THREE.MeshLambertMaterial({color:0x00ff88})
    );
    pack.position.set((Math.random()-0.5)*65, 0.5, (Math.random()-0.5)*65);
    healthPacks.push(pack);
    scene.add(pack);
}

// 初始化生成
for(let i=0;i<6;i++) spawnEnemy();
for(let i=0;i<3;i++) spawnFastEnemy();
for(let i=0;i<4;i++) spawnHealth();

// UI刷新
function updateUI(){
    document.getElementById('score').innerText = score;
    document.getElementById('hp').innerText = Math.max(0, Math.floor(hp));
    document.getElementById('ammo').innerText = ammo;
    document.getElementById('bag').innerText = bagAmmo;
}

// 枪口闪光
function muzzleFlash(){
    const flash = document.getElementById('muzzle');
    flash.style.opacity = 0.9;
    setTimeout(()=>flash.style.opacity=0, 70);
}
// 命中红点
function hitMarker(){
    const div = document.createElement('div');
    div.className = 'hitmark';
    document.body.appendChild(div);
    setTimeout(()=>div.remove(), 300);
}
// 后坐力
function applyRecoil(){
    recoilOffset = -0.12;
    setTimeout(()=>recoilOffset=0,90);
}

// 换弹
function reload(){
    if(bagAmmo <=0 || ammo === maxAmmo) return;
    Audio.reload();
    const need = maxAmmo - ammo;
    const add = Math.min(need, bagAmmo);
    ammo += add;
    bagAmmo -= add;
    updateUI();
}

// 射击
document.addEventListener('mousedown', e=>{
    if(e.button!==0 || hp<=0) return;
    if(ammo <= 0){
        Audio.empty();
        return;
    }
    Audio.shoot();
    muzzleFlash();
    applyRecoil();
    ammo--;
    updateUI();

    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = ray.intersectObjects(enemies);

    if(hits.length>0){
        const target = hits[0].object;
        Audio.hit();
        hitMarker();
        target.userData.hp--;
        if(target.userData.hp <=0){
            score +=15;
            scene.remove(target);
            enemies = enemies.filter(v=>v!==target);
            Math.random()>0.4 ? spawnEnemy() : spawnFastEnemy();
            updateUI();
        }
    }
});

// 移动+脚步声
let stepTimer = 0;
function playerMove(){
    const speed = 0.17;
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    dir.y = 0;
    dir.normalize();
    const right = new THREE.Vector3().crossVectors(dir, camera.up).normalize();
    let moving = false;

    if(keys.w){ camera.position.addScaledVector(dir, speed); moving=true }
    if(keys.s){ camera.position.addScaledVector(dir, -speed); moving=true }
    if(keys.a){ camera.position.addScaledVector(right, -speed); moving=true }
    if(keys.d){ camera.position.addScaledVector(right, speed); moving=true }

    if(moving && Date.now()-stepTimer>320){
        Audio.step();
        stepTimer = Date.now();
    }
    // 边界锁定，防止出地图
    camera.position.x = THREE.MathUtils.clamp(camera.position.x, -62,62);
    camera.position.z = THREE.MathUtils.clamp(camera.position.z, -62,62);
    camera.position.y = 2 + recoilOffset;
}

// 敌人AI
function enemyLogic(){
    enemies.forEach(en=>{
        const dx = camera.position.x - en.position.x;
        const dz = camera.position.z - en.position.z;
        const dist = Math.hypot(dx,dz);
        if(dist>2.2){
            en.position.x += dx * en.userData.speed;
            en.position.z += dz * en.userData.speed;
        }
        if(dist <2.1){
            hp -=0.12;
            Audio.hurt();
            updateUI();
            if(hp<=0){
                Audio.die();
                setTimeout(()=>{
                    alert(`游戏结束！得分：${score}`);
                    location.reload();
                },200);
            }
        }
    })
}

// 拾取血包
function healthPickup(){
    for(let i=healthPacks.length-1;i>=0;i--){
        const p = healthPacks[i];
        const d = Math.hypot(camera.position.x-p.position.x,camera.position.z-p.position.z);
        if(d<3){
            hp = Math.min(100, hp+30);
            Audio.heal();
            scene.remove(p);
            healthPacks.splice(i,1);
            setTimeout(spawnHealth,8000);
            updateUI();
        }
    }
}

// 窗口缩放
window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
})

// 渲染循环
function loop(){
    requestAnimationFrame(loop);
    if(hp>0){
        playerMove();
        enemyLogic();
        healthPickup();
    }
    renderer.render(scene,camera);
}
updateUI();
loop();
</script>
</body>
</html>
