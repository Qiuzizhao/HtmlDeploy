<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雪山极速滑雪 | 精美小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(180deg, #81c7ff 0%, #c7e6ff 100%);
            overflow: hidden;
            padding: 20px 0;
        }
        /* 顶部分数面板 */
        .header-bar {
            width: 420px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: linear-gradient(135deg, #2980b9, #3498db);
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(0,60,120,0.3);
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        /* 游戏主容器 */
        #gameBox {
            position: relative;
            width: 420px;
            height: 640px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            border: 4px solid #ffffff;
        }
        /* 远景雪山 */
        .mountain-bg {
            position: absolute;
            width: 100%;
            height: 220px;
            top: 0;
            background: linear-gradient(180deg, #b8e0ff 0%, transparent 100%);
            z-index: 1;
        }
        .mountain {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-style: solid;
        }
        .m1 { left: -40px; border-width: 0 110px 160px 110px; border-color: transparent transparent #e8f4fd transparent; }
        .m2 { left: 130px; border-width: 0 90px 130px 90px; border-color: transparent transparent #d0e8f8 transparent; }
        .m3 { left: 260px; border-width: 0 100px 145px 100px; border-color: transparent transparent #e0f0fc transparent; }
        /* 雪地赛道 */
        .snow-road {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            background: linear-gradient(180deg, #f7fbff 0%, #e3f0fb 100%);
            z-index: 2;
        }
        /* 赛道中间黄线 */
        .road-line {
            position: absolute;
            width: 8px;
            height: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #ffd300, #ffea60);
            border-radius: 4px;
            box-shadow: 0 0 6px rgba(255,210,0,0.6);
            z-index: 3;
        }
        /* 雪花粒子 */
        .snowflake {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            filter: blur(1px);
            z-index: 2;
        }
        /* 滑雪人物 立体美化 */
        #skier {
            position: absolute;
            width: 44px;
            height: 66px;
            bottom: 90px;
            left: 188px;
            z-index: 10;
            transition: left 0.06s ease-out;
        }
        .skier-body {
            width: 40px;
            height: 46px;
            margin: 0 auto;
            background: linear-gradient(145deg, #ff3c3c, #d62828);
            border-radius: 10px 10px 6px 6px;
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.15);
            position: relative;
        }
        .skier-head {
            width: 26px;
            height: 26px;
            background: linear-gradient(145deg, #ffe2b8, #ffcd96);
            border-radius: 50%;
            position: absolute;
            top: -20px;
            left: 7px;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.1);
        }
        .skier-hat {
            width: 30px;
            height: 12px;
            background: #111;
            border-radius: 6px 6px 0 0;
            position: absolute;
            top: -26px;
            left: 5px;
        }
        .ski-board {
            width: 36px;
            height: 10px;
            background: linear-gradient(180deg, #222, #000);
            border-radius: 3px;
            position: absolute;
            bottom: -8px;
            left: 2px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        /* 障碍物通用 */
        .obstacle {
            position: absolute;
            z-index: 4;
        }
        /* 立体树木 */
        .tree {
            width: 34px;
            height: 56px;
        }
        .tree-leaf {
            width: 34px;
            height: 44px;
            background: linear-gradient(180deg, #43a047, #2e7d32);
            border-radius: 50% 50% 10% 10%;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2);
        }
        .tree-trunk {
            width: 10px;
            height: 18px;
            background: linear-gradient(90deg, #8d6e63, #5d4037);
            margin: -6px auto 0;
            border-radius: 3px;
        }
        /* 立体石头 */
        .rock {
            width: 40px;
            height: 30px;
            background: linear-gradient(135deg, #bdbdbd, #757575);
            border-radius: 45% 55% 50% 50%;
            box-shadow: inset -6px -4px 10px rgba(0,0,0,0.25);
        }
        /* 游戏结束遮罩 */
        #gameOver {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.72);
            top: 0;
            z-index: 99;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(3px);
        }
        #gameOver h2 {
            font-size: 46px;
            margin-bottom: 16px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }
        #gameOver p.score-text {
            font-size: 26px;
            margin-bottom: 32px;
            opacity: 0.95;
        }
        #restartBtn {
            padding: 14px 40px;
            font-size: 22px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff7043, #f4511e);
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(244,81,30,0.4);
            transition: all 0.2s ease;
        }
        #restartBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 9px 20px rgba(244,81,30,0.5);
        }
        #restartBtn:active {
            transform: translateY(1px);
        }
        .space-tip {
            margin-top: 18px;
            font-size: 16px;
            opacity: 0.8;
        }
        /* 底部操作提示 */
        .control-tip {
            margin-top: 16px;
            color: #1a4b70;
            font-size: 17px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- 顶部分数栏 -->
    <div class="header-bar">
        <span>🏂 分数：<span id="score">0</span></span>
        <span>🏆 最高分：<span id="maxScore">0</span></span>
    </div>

    <!-- 游戏画布 -->
    <div id="gameBox">
        <!-- 远景雪山 -->
        <div class="mountain-bg">
            <div class="mountain m1"></div>
            <div class="mountain m2"></div>
            <div class="mountain m3"></div>
        </div>
        <!-- 雪地赛道 -->
        <div class="snow-road"></div>
        <!-- 滑雪人物 -->
        <div id="skier">
            <div class="skier-hat"></div>
            <div class="skier-head"></div>
            <div class="skier-body"></div>
            <div class="ski-board"></div>
        </div>
        <!-- 结束弹窗 -->
        <div id="gameOver">
            <h2>撞击障碍物！</h2>
            <p class="score-text">本次得分：<span id="finalScore">0</span></p>
            <button id="restartBtn">再来一局</button>
            <p class="space-tip">快捷键：空格键快速重开</p>
        </div>
    </div>

    <p class="control-tip">操作：← → 左右控制滑雪方向</p>

    <script>
        // DOM 元素
        const gameBox = document.getElementById("gameBox");
        const skier = document.getElementById("skier");
        const scoreDom = document.getElementById("score");
        const maxScoreDom = document.getElementById("maxScore");
        const gameOverBox = document.getElementById("gameOver");
        const finalScoreDom = document.getElementById("finalScore");
        const restartBtn = document.getElementById("restartBtn");

        // 游戏基础配置
        const boxWidth = 420;
        const skierWidth = 44;
        let skierX = 188;
        const skierSpeed = 9;

        let score = 0;
        let maxScore = Number(localStorage.getItem("skiMaxBeautiful")) || 0;
        maxScoreDom.innerText = maxScore;

        let gameSpeed = 6;
        let gameRun = true;
        let obstacleList = [];
        let roadLines = [];
        let snowFlakes = [];
        const keyState = { left: false, right: false };

        // 创建赛道中间滚动黄线
        function createRoadLine() {
            for(let i = 0; i < 9; i++) {
                const line = document.createElement("div");
                line.className = "road-line";
                line.style.top = i * 105 + "px";
                gameBox.appendChild(line);
                roadLines.push(line);
            }
        }
        createRoadLine();

        // 生成雪花粒子
        function createSnowflake() {
            if(!gameRun) return;
            const flake = document.createElement("div");
            flake.className = "snowflake";
            const size = Math.random() * 4 + 1;
            flake.style.width = size + "px";
            flake.style.height = size + "px";
            flake.style.left = Math.random() * boxWidth + "px";
            flake.style.top = "-10px";
            gameBox.appendChild(flake);
            snowFlakes.push({
                dom: flake,
                x: parseFloat(flake.style.left),
                y: -10,
                size,
                speed: Math.random() * 1.2 + 0.6
            });
        }

        // 更新雪花下落
        function updateSnow() {
            for(let i = snowFlakes.length - 1; i >= 0; i--) {
                const f = snowFlakes[i];
                f.y += f.speed + gameSpeed * 0.1;
                f.dom.style.top = f.y + "px";
                // 飘出底部删除
                if(f.y > 640) {
                    f.dom.remove();
                    snowFlakes.splice(i, 1);
                }
            }
        }

        // 创建障碍物（树/石头分层结构）
        function createObstacle() {
            if(!gameRun) return;
            const obsWrap = document.createElement("div");
            obsWrap.className = "obstacle";
            const isTree = Math.random() > 0.42;

            if(isTree) {
                obsWrap.classList.add("tree");
                const leaf = document.createElement("div");
                leaf.className = "tree-leaf";
                const trunk = document.createElement("div");
                trunk.className = "tree-trunk";
                obsWrap.appendChild(leaf);
                obsWrap.appendChild(trunk);
            } else {
                obsWrap.classList.add("rock");
            }

            const maxX = boxWidth - 44;
            const randomX = Math.floor(Math.random() * maxX);
            obsWrap.style.left = randomX + "px";
            obsWrap.style.top = "-70px";
            gameBox.appendChild(obsWrap);

            let w, h;
            if(isTree) { w = 34; h = 56; }
            else { w = 40; h = 30; }

            obstacleList.push({
                dom: obsWrap,
                x: randomX,
                y: -70,
                w, h,
                isTree
            });
        }

        // 键盘监听
        document.addEventListener("keydown", e => {
            if(e.key === "ArrowLeft") keyState.left = true;
            if(e.key === "ArrowRight") keyState.right = true;
            if(e.key === " ") resetGame();
        });
        document.addEventListener("keyup", e => {
            if(e.key === "ArrowLeft") keyState.left = false;
            if(e.key === "ArrowRight") keyState.right = false;
        });
        restartBtn.addEventListener("click", resetGame);

        // 滑雪者左右移动
        function updateSkier() {
            if(keyState.left) skierX -= skierSpeed;
            if(keyState.right) skierX += skierSpeed;
            // 边界限制
            skierX = Math.max(0, Math.min(boxWidth - skierWidth, skierX));
            skier.style.left = skierX + "px";
        }

        // 赛道黄线滚动
        function moveRoadLine() {
            roadLines.forEach(line => {
                let top = parseInt(line.style.top);
                top += gameSpeed;
                if(top > 640) top = -95;
                line.style.top = top + "px";
            });
        }

        // 障碍物移动 + 碰撞检测
        function updateObstacles() {
            for(let i = obstacleList.length - 1; i >= 0; i--) {
                const obs = obstacleList[i];
                obs.y += gameSpeed;
                obs.dom.style.top = obs.y + "px";
                // 滑出屏幕移除
                if(obs.y > 640) {
                    obs.dom.remove();
                    obstacleList.splice(i, 1);
                    continue;
                }
                // 碰撞矩形判定
                const skierTop = 640 - 90 - 66;
                const skierBot = 640 - 90;
                const skierL = skierX;
                const skierR = skierX + skierWidth;

                const obsT = obs.y;
                const obsB = obs.y + obs.h;
                const obsL = obs.x;
                const obsR = obs.x + obs.w;

                if(!(skierR < obsL || skierL > obsR || skierBot < obsT || skierTop > obsB)) {
                    gameOver();
                }
            }
        }

        // 游戏结束逻辑
        function gameOver() {
            gameRun = false;
            finalScoreDom.innerText = score;
            if(score > maxScore) {
                maxScore = score;
                localStorage.setItem("skiMaxBeautiful", maxScore);
                maxScoreDom.innerText = maxScore;
            }
            gameOverBox.style.display = "flex";
        }

        // 重置游戏
        function resetGame() {
            // 清空障碍物
            obstacleList.forEach(item => item.dom.remove());
            obstacleList = [];
            // 清空雪花
            snowFlakes.forEach(f => f.dom.remove());
            snowFlakes = [];
            // 重置数值
            score = 0;
            gameSpeed = 6;
            skierX = 188;
            skier.style.left = skierX + "px";
            scoreDom.innerText = "0";
            gameOverBox.style.display = "none";
            gameRun = true;
        }

        // 游戏主循环
        let frameCount = 0;
        function gameLoop() {
            if(gameRun) {
                frameCount++;
                updateSkier();
                moveRoadLine();
                updateObstacles();
                updateSnow();
                // 生成雪花
                if(frameCount % 8 === 0) createSnowflake();
                // 障碍物生成，分数越高刷新越快
                const spawnRate = Math.max(12, 36 - Math.floor(score / 90));
                if(frameCount % spawnRate === 0) createObstacle();
                // 加分、提速
                if(frameCount % 10 === 0) {
                    score++;
                    scoreDom.innerText = score;
                    if(gameSpeed < 16 && score % 100 === 0) gameSpeed += 0.45;
                }
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
