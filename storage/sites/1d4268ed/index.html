<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>升级版AI射击FPS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;font-family:Arial;color:#fff;background:#000}
#ui{position:fixed;top:12px;left:12px;z-index:999;background:rgba(0,0,0,0.6);padding:10px;border-radius:8px}
#cross{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;pointer-events:none}
#tip{position:fixed;bottom:20px;left:50%;transform:translate(-50%,);background:rgba(0,0,0,0.5);padding:6px 12px;border-radius:6px}
</style>
</head>
<body>
<div id="ui">
血量:<span id="hp">100</span>｜击杀:<span id="kill">0</span><br>
武器:<span id="gun">步枪</span>｜弹药:<span id="ammo">30</span>/<span id="maxAmmo">90</span>
</div>
<div id="cross">+</div>
<div id="tip">WASD移动｜鼠标左键射击｜R换弹｜1/2切换武器｜点击屏幕锁鼠标</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/PointerLockControls.js"></script>
<script>
//=====音效资源=====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
async function playSound(url){
  const res=await fetch(url);
  const buf=await audioCtx.decodeAudioData(await res.arrayBuffer());
  const src=audioCtx.createBufferSource();
  src.buffer=buf;src.connect(audioCtx.destination);src.start();
}
const soundShoot="https://assets.mixkit.co/sfx/preview/mixkit-game-gun-shot-1089.mp3";
const soundReload="https://assets.mixkit.co/sfx/preview/mixkit-metal-weapon-reload-1357.mp3";
const soundHurt="https://assets.mixkit.co/sfx/preview/mixkit-small-hit-in-a-game-2448.mp3";
const soundKill="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3";

//=====场景初始化=====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x77aadd);
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xbbbbbb,0.7));
const dirLight=new THREE.DirectionalLight(0xffffff,0.9);
dirLight.position.set(30,50,30);
scene.add(dirLight);

//地面
const ground=new THREE.Mesh(
  new THREE.PlaneGeometry(120,120),
  new THREE.MeshLambertMaterial({color:0x447722})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

//随机墙体障碍物
const walls=[];
function createWall(){
  for(let i=0;i<22;i++){
    const wGeo=new THREE.BoxGeometry(
      THREE.MathUtils.randFloat(3,9),
      THREE.MathUtils.randFloat(3,6),
      THREE.MathUtils.randFloat(3,9)
    );
    const wMat=new THREE.MeshLambertMaterial({color:0x775533});
    const wall=new THREE.Mesh(wGeo,wMat);
    let x=THREE.MathUtils.randFloat(-55,55);
    let z=THREE.MathUtils.randFloat(-55,55);
    if(Math.hypot(x,z)<12)continue;
    wall.position.set(x,wall.geometry.parameters.height/2,z);
    walls.push(wall);scene.add(wall);
  }
}
createWall();

//鼠标视角锁定
const controls=new THREE.PointerLockControls(camera,document.body);
document.body.onclick=()=>{audioCtx.resume();controls.lock()};

//按键
const keys={w:false,a:false,s:false,d:false,r:false,key1:false,key2:false};
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(keys.hasOwnProperty(k))keys[k]=true;
  if(k==="1")keys.key1=true;
  if(k==="2")keys.key2=true;
})
document.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  if(keys.hasOwnProperty(k))keys[k]=false;
})

//=====武器系统=====
let weaponType=1;//1步枪 2手枪
let ammo=30,maxClip=30,backupAmmo=90;
let hp=100,kill=0,playerSpeed=0.16;
camera.position.set(0,2,0);

//子弹
const bullets=[];
const bulletGeo=new THREE.SphereGeometry(0.18);
const bulletMat=new THREE.MeshBasicMaterial({color:0xffee00});

//换弹
function reload(){
  if(weaponType===2||backupAmmo<=0||ammo===maxClip)return;
  playSound(soundReload);
  let need=maxClip-ammo;
  let add=Math.min(need,backupAmmo);
  ammo+=add;backupAmmo-=add;
  updateUI();
}

//切换武器
function switchGun(t){
  weaponType=t;
  if(t===1){
    document.getElementById("gun").innerText="步枪";
    maxClip=30;if(ammo>maxClip)ammo=maxClip;
  }else{
    document.getElementById("gun").innerText="手枪";
    maxClip=9999;ammo=9999;
  }
  updateUI();
}

//开枪
document.addEventListener('mousedown',async e=>{
  if(e.button!==0)return;
  if(weaponType===1&&ammo<=0)return;
  playSound(soundShoot);
  if(weaponType===1)ammo--;

  const bullet=new THREE.Mesh(bulletGeo,bulletMat);
  bullet.position.copy(camera.position);
  const dir=new THREE.Vector3();
  camera.getWorldDirection(dir);
  bullet.userData.v=dir.multiplyScalar(1.8);
  bullets.push(bullet);scene.add(bullet);
  updateUI();
})

//=====AI敌人=====
const enemies=[];
const enemyGeo=new THREE.BoxGeometry(1,2.2,1);
const enemyMat=new THREE.MeshLambertMaterial({color:0xdd2222});

function spawnEnemy(){
  const en=new THREE.Mesh(enemyGeo,enemyMat);
  let ang=Math.random()*Math.PI*2;
  let dis=THREE.MathUtils.randFloat(32,55);
  en.position.set(Math.cos(ang)*dis,1.1,Math.sin(ang)*dis);
  en.userData.hp=40;en.userData.dmgCD=0;
  enemies.push(en);scene.add(en);
}
setInterval(spawnEnemy,2200);
spawnEnemy();spawnEnemy();spawnEnemy();

//UI刷新
function updateUI(){
  document.getElementById("hp").innerText=hp.toFixed(1);
  document.getElementById("kill").innerText=kill;
  document.getElementById("ammo").innerText=weaponType===2?"∞":ammo;
  document.getElementById("maxAmmo").innerText=weaponType===2?"∞":backupAmmo;
  if(hp<=0)alert(`游戏结束，击杀：${kill}`);
}

//=====游戏主循环=====
function loop(){
  requestAnimationFrame(loop);

  //玩家移动+穿墙阻断简易判定
  const move=new THREE.Vector3();
  if(keys.w)move.z-=1;if(keys.s)move.z+=1;
  if(keys.a)move.x-=1;if(keys.d)move.x+=1;
  if(move.length()>0)move.normalize().multiplyScalar(playerSpeed);
  camera.position.add(move);

  //R换弹、1/2切枪
  if(keys.r){reload();keys.r=false;}
  if(keys.key1){switchGun(1);keys.key1=false;}
  if(keys.key2){switchGun(2);keys.key2=false;}

  //子弹更新
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.position.add(b.userData.v);
    if(b.position.length()>90){scene.remove(b);bullets.splice(i,1)}
  }

  //AI逻辑：追踪玩家、撞人扣血、中弹受伤
  for(let ei=enemies.length-1;ei>=0;ei--){
    const e=enemies[ei];
    //朝玩家移动
    let dirP=new THREE.Vector3().subVectors(camera.position,e.position);
    dirP.y=0;dirP.normalize();
    e.position.add(dirP.multiplyScalar(0.035));
    e.lookAt(camera.position.x,e.position.y,camera.position.z);

    //子弹命中敌人
    for(let bi=bullets.length-1;bi>=0;bi--){
      const b=bullets[bi];
      if(b.position.distanceTo(e.position)<1.4){
        e.userData.hp-=12;
        scene.remove(b);bullets.splice(bi,1);
        //敌人死亡
        if(e.userData.hp<=0){
          playSound(soundKill);
          scene.remove(e);enemies.splice(ei,1);kill++;updateUI();break;
        }
      }
    }
    //AI近身掉血
    if(e.position.distanceTo(camera.position)<2.3&&e.userData.dmgCD<=0){
      hp-=0.6;e.userData.dmgCD=50;
      playSound(soundHurt);updateUI();
    }
    if(e.userData.dmgCD>0)e.userData.dmgCD--;
  }

  renderer.render(scene,camera);
}
loop();

//窗口缩放
window.onresize=()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
}
</script>
</body>
</html>
