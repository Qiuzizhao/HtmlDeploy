<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D恐怖学校 · 第一人称逃生</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: sans-serif; }

        #startUI {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #startUI h1 {
            font-size: 48px;
            color: #ff3333;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #ff0000;
        }

        #startUI .desc {
            max-width: 600px;
            font-size: 18px;
            line-height: 1.7;
            color: #ccc;
            text-align: center;
            margin-bottom: 40px;
        }

        #startUI .tips {
            color: #ffaa00;
            font-size: 20px;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        #gameTips {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 10px 14px;
            border-radius: 6px;
            z-index: 100;
            display: none;
        }
        #clickTip{
            position:fixed;top:70px;left:10px;color:#f66;background:rgba(0,0,0,0.7);padding:6px;border-radius:4px;display:none;
        }
    </style>
</head>
<body>

<!-- 开始界面 -->
<div id="startUI">
    <h1>恐怖学校 · 午夜逃生</h1>
    <div class="desc">
        午夜十二点，你被困在废弃的校园里。<br>
        走廊昏暗、雾气弥漫，诡异的幽灵在四处游荡。<br>
        你必须保持冷静，小心移动，不要被它们发现……<br><br>
        <strong>操作：</strong><br>
        WASD 移动 | 鼠标控制视角 | ESC 退出鼠标锁定
    </div>
    <div class="tips">按 空格键 进入游戏</div>
</div>

<!-- 游戏提示 -->
<div id="gameTips">WASD 移动 · 鼠标转头 · ESC 松开鼠标</div>
<div id="clickTip">点击画面锁定鼠标开始操控</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>

<script>
    let scene, camera, renderer, controls;
    let moveForward = false, moveBack = false, moveLeft = false, moveRight = false;
    const moveSpeed = 3.5;
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    let ghosts = [];
    let gameStarted = false;

    const startUI = document.getElementById('startUI');
    const gameTips = document.getElementById('gameTips');
    const clickTip = document.getElementById('clickTip');

    // 空格开局：只关UI，不锁鼠标
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !gameStarted) {
            gameStarted = true;
            startUI.style.display = 'none';
            gameTips.style.display = 'block';
            clickTip.style.display = 'block';
        }
    });
    // 点击画布才锁定鼠标（浏览器规则，必须人为点击）
    document.body.addEventListener('click',()=>{
        if(gameStarted && !controls.isLocked){
            controls.lock();
            clickTip.style.display = 'none';
        }
    })

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0d);
        scene.fog = new THREE.Fog(0x0a0a0d, 12, 70);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        controls = new THREE.PointerLockControls(camera, document.body);

        createLight();
        createMap();
        createGhosts(10);
        bindKeys();
        window.addEventListener('resize', onResize);
        animate();
    }

    function createLight() {
        const ambient = new THREE.AmbientLight(0x222233, 0.2);
        scene.add(ambient);

        const lights = [
            [0, 5, -15], [10, 5, -15], [-10, 5, -15],
            [0, 5, 15], [10, 5, 15], [-10, 5, 15]
        ];
        lights.forEach(p => {
            const light = new THREE.SpotLight(0xff6633, 0.4, 35, Math.PI / 3, 0.5);
            light.position.set(...p);
            light.castShadow = true;
            scene.add(light);
        });
    }

    function createMap() {
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(60, 60),
            new THREE.MeshLambertMaterial({ color: 0x222222 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const wallMat = new THREE.MeshLambertMaterial({ color: 0x333333 });

        const walls = [
            { w: 60, h: 7, d: 1, x: 0, y: 3.5, z: -30 },
            { w: 60, h: 7, d: 1, x: 0, y: 3.5, z: 30 },
            { w: 1, h: 7, d: 60, x: -30, y: 3.5, z: 0 },
            { w: 1, h: 7, d: 60, x: 30, y: 3.5, z: 0 },
        ];
        walls.forEach(x => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(x.w, x.h, x.d), wallMat);
            m.position.set(x.x, x.y, x.z);
            m.castShadow = true;
            scene.add(m);
        });

        for (let x = -25; x <= 25; x += 10) {
            if (x === 0) continue;
            const w = new THREE.Mesh(new THREE.BoxGeometry(1, 7, 25), wallMat);
            w.position.set(x, 3.5, 0);
            scene.add(w);
        }
    }

    function createGhosts(num) {
        const g = new THREE.SphereGeometry(0.9, 8, 8);
        const m = new THREE.MeshBasicMaterial({ color: 0xff2222, transparent: true, opacity: 0.5 });
        for (let i = 0; i < num; i++) {
            const ghost = new THREE.Mesh(g, m);
            ghost.position.set(
                (Math.random() - 0.5) * 50,
                1.5,
                (Math.random() - 0.5) * 50
            );
            ghost.userData = {
                speed: Math.random() * 0.7 + 0.4,
                dir: new THREE.Vector3(
                    Math.random() - 0.5,
                    0,
                    Math.random() - 0.5
                ).normalize()
            };
            ghosts.push(ghost);
            scene.add(ghost);
        }
    }

    function bindKeys() {
        document.addEventListener('keydown', e => {
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBack = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
            }
        });
        document.addEventListener('keyup', e => {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBack = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = 0.016;
        if (gameStarted && controls.isLocked) {
            velocity.x -= velocity.x * 10 * delta;
            velocity.z -= velocity.z * 10 * delta;

            direction.z = Number(moveForward) - Number(moveBack);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBack) velocity.z -= direction.z * moveSpeed;
            if (moveLeft || moveRight) velocity.x -= direction.x * moveSpeed;

            controls.moveRight(-velocity.x * delta);
            controls.moveForward(-velocity.z * delta);
        }

        ghosts.forEach(gh => {
            gh.position.addScaledVector(gh.userData.dir, gh.userData.speed * delta);
            if (Math.abs(gh.position.x) > 28 || Math.abs(gh.position.z) > 28) {
                gh.userData.dir.multiplyScalar(-1);
            }
            gh.position.y = 1.5 + Math.sin(Date.now() / 900 + gh.position.x) * 0.7;
        });

        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
