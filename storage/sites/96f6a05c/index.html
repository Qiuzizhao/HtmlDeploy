<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园生活模拟器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 700px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 20, 30, 0.2);
            padding: 28px 24px 32px;
            transition: all 0.2s;
        }
        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #1e3a5f;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .subtitle {
            text-align: center;
            color: #4a6a7f;
            font-size: 14px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2eaf1;
            padding-bottom: 12px;
        }
        .panel {
            background: #f2f7fc;
            border-radius: 20px;
            padding: 16px 18px;
            margin-bottom: 18px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 8px 4px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
        }
        .attr-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
            font-weight: 500;
            color: #1f3a4b;
            background: white;
            padding: 4px 14px 4px 10px;
            border-radius: 30px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .attr-label {
            color: #3d5e73;
        }
        .attr-value {
            font-weight: 700;
            color: #0b2b3f;
            min-width: 24px;
            text-align: center;
        }
        .day-info {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #1e4a62;
            background: #e6f0f7;
            padding: 8px 0;
            border-radius: 40px;
            margin-bottom: 16px;
        }
        .stage-title {
            font-size: 18px;
            font-weight: 600;
            color: #1d4b66;
            margin: 12px 0 8px;
            padding-left: 4px;
        }
        .action-list {
            background: #f8fbfe;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 12px;
            line-height: 1.7;
            font-size: 15px;
            color: #1f3a4b;
            border: 1px solid #dde8f0;
        }
        .action-list p {
            margin: 4px 0;
        }
        .input-area {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 10px 0 14px;
            flex-wrap: wrap;
        }
        .input-area input {
            flex: 1;
            min-width: 100px;
            padding: 10px 16px;
            border: 2px solid #cbdae6;
            border-radius: 40px;
            font-size: 16px;
            outline: none;
            background: white;
            transition: 0.15s;
        }
        .input-area input:focus {
            border-color: #3a7ca5;
            box-shadow: 0 0 0 3px rgba(58,124,165,0.15);
        }
        .btn {
            background: #2c6b8f;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 8px rgba(44,107,143,0.2);
            white-space: nowrap;
        }
        .btn:hover {
            background: #1f5777;
            transform: scale(1.02);
            box-shadow: 0 6px 12px rgba(44,107,143,0.3);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .event-box {
            background: #fef7e8;
            border-left: 6px solid #e6b85c;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 14px 0 10px;
            font-weight: 500;
            color: #4d3e1f;
        }
        .result-box {
            background: #e3f0f5;
            border-radius: 16px;
            padding: 16px 18px;
            margin: 12px 0;
            font-size: 16px;
            line-height: 1.6;
            border: 1px solid #c3dae8;
        }
        .footer-btn {
            text-align: center;
            margin-top: 16px;
        }
        .hidden {
            display: none;
        }
        .game-over {
            background: #fce9e9;
            border: 1px solid #dbb1b1;
        }
        .end-title {
            font-size: 22px;
            font-weight: 700;
            color: #1e3a5f;
            text-align: center;
            margin-bottom: 12px;
        }
        @media (max-width: 500px) {
            .game-container { padding: 16px; }
            .attr-item { font-size: 13px; padding: 2px 10px; }
            .btn { padding: 8px 18px; font-size: 15px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <h1>🏫 校园生活模拟器</h1>
    <div class="subtitle">一共7天 (5天上课 + 2天周末) · 合理安排行动达成不同结局</div>

    <!-- 属性面板 -->
    <div class="panel" id="attrPanel">
        <div class="attr-item"><span class="attr-label">📚学业</span><span class="attr-value" id="attr-学业">10</span></div>
        <div class="attr-item"><span class="attr-label">💪体力</span><span class="attr-value" id="attr-体力">10</span></div>
        <div class="attr-item"><span class="attr-label">🤝人缘</span><span class="attr-value" id="attr-人缘">10</span></div>
        <div class="attr-item"><span class="attr-label">💰金钱</span><span class="attr-value" id="attr-金钱">50</span></div>
        <div class="attr-item"><span class="attr-label">😊心情</span><span class="attr-value" id="attr-心情">10</span></div>
    </div>

    <!-- 天数 -->
    <div class="day-info" id="dayInfo">第 1 天 · 上学日</div>

    <!-- 阶段标题 -->
    <div class="stage-title" id="stageTitle">早自习</div>

    <!-- 行动描述 -->
    <div class="action-list" id="actionDesc">
        <p>1. 认真早读 (学业+3, 体力-2)</p>
        <p>2. 趴桌睡觉 (体力+4, 学业-3, 30%被抓扣人缘心情)</p>
        <p>3. 和同桌闲聊 (人缘+3, 学业-2, 心情+2)</p>
    </div>

    <!-- 输入 + 按钮 -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入选项 1/2/3..." autocomplete="off">
        <button class="btn" id="actionBtn">确认</button>
    </div>

    <!-- 事件 / 消息 -->
    <div id="messageBox" class="event-box hidden"></div>

    <!-- 结果 / 结局 -->
    <div id="resultBox" class="result-box hidden"></div>

    <!-- 下一天 / 重新开始 -->
    <div class="footer-btn">
        <button class="btn" id="nextDayBtn" style="display:none;">进入下一天 ▶</button>
        <button class="btn" id="restartBtn" style="display:none;">🔄 重新开始</button>
    </div>
</div>

<script>
    (function() {
        // ---------- 游戏状态 ----------
        const MAX_ATTR = 30;
        const MIN_ATTR = 0;
        const DAY_TOTAL = 7;

        let student = {
            "学业": 10,
            "体力": 10,
            "人缘": 10,
            "金钱": 50,
            "心情": 10
        };

        let today = 1;               // 1~7
        let currentStageIndex = 0;   // 0:早自习 1:午休 2:放学后 3:夜晚 (工作日)
        let weekendActionCount = 0;  // 周末已行动次数 (0~2)
        let gameOver = false;
        let waitingForNext = false;  // 等待用户按"下一天"
        let waitingForBirthday = false; // 等待生日事件选择
        let birthdayResolve = null;

        // DOM 引用
        const attrPanel = document.getElementById('attrPanel');
        const dayInfo = document.getElementById('dayInfo');
        const stageTitle = document.getElementById('stageTitle');
        const actionDesc = document.getElementById('actionDesc');
        const userInput = document.getElementById('userInput');
        const actionBtn = document.getElementById('actionBtn');
        const messageBox = document.getElementById('messageBox');
        const resultBox = document.getElementById('resultBox');
        const nextDayBtn = document.getElementById('nextDayBtn');
        const restartBtn = document.getElementById('restartBtn');

        // ---------- 工具函数 ----------
        function clamp(val) {
            return Math.max(MIN_ATTR, Math.min(MAX_ATTR, val));
        }

        function updateAttrPanel() {
            for (let key in student) {
                const el = document.getElementById('attr-' + key);
                if (el) el.textContent = student[key];
            }
        }

        function showMessage(msg, isError) {
            messageBox.classList.remove('hidden');
            messageBox.style.borderLeftColor = isError ? '#d9534f' : '#e6b85c';
            messageBox.textContent = msg;
        }

        function hideMessage() {
            messageBox.classList.add('hidden');
        }

        function showResult(msg, isGameOver) {
            resultBox.classList.remove('hidden');
            if (isGameOver) resultBox.classList.add('game-over');
            else resultBox.classList.remove('game-over');
            resultBox.textContent = msg;
        }

        function hideResult() {
            resultBox.classList.add('hidden');
            resultBox.classList.remove('game-over');
        }

        function disableInput(disable) {
            userInput.disabled = disable;
            actionBtn.disabled = disable;
            if (disable) {
                userInput.style.opacity = '0.6';
                actionBtn.style.opacity = '0.6';
            } else {
                userInput.style.opacity = '1';
                actionBtn.style.opacity = '1';
                userInput.focus();
            }
        }

        function clearInput() {
            userInput.value = '';
        }

        // 检查属性归零
        function checkAttrZero() {
            for (let key in student) {
                if (student[key] <= 0) {
                    return true;
                }
            }
            return false;
        }

        // 显示天数
        function updateDayInfo() {
            let suffix = (today <= 5) ? '上学日' : '周末';
            dayInfo.textContent = `第 ${today} 天 · ${suffix}`;
        }

        // ---------- 随机事件 ----------
        function triggerRandomEvent() {
            if (Math.random() >= 0.33) return false; // 不触发

            const events = [
                {
                    msg: '老师突击小测',
                    exec: function() {
                        if (student['学业'] >= 15) {
                            student['学业'] = clamp(student['学业'] + 3);
                        } else {
                            student['学业'] = clamp(student['学业'] - 4);
                        }
                        student['心情'] = clamp(student['心情'] - 3);
                        showMessage('📝 老师突击小测！' + (student['学业'] >= 15 ? '你表现不错，学业+3，但心情-3' : '考砸了，学业-4，心情-3'));
                    }
                },
                {
                    msg: '同学过生日邀约！花费15元，人缘+6（输入1参加，0拒绝）',
                    exec: function() {
                        // 需要用户选择
                        waitingForBirthday = true;
                        showMessage('🎂 同学过生日邀约！花费15元，人缘+6 (输入1参加，0拒绝)');
                        disableInput(false);
                        clearInput();
                        // 重写按钮行为
                        actionBtn.onclick = function() {
                            if (!waitingForBirthday) return;
                            const val = userInput.value.trim();
                            if (val === '1' && student['金钱'] >= 15) {
                                student['金钱'] -= 15;
                                student['人缘'] = clamp(student['人缘'] + 6);
                                showMessage('🎉 你参加生日聚会，人缘大幅提升！金钱-15，人缘+6');
                            } else {
                                student['人缘'] = clamp(student['人缘'] - 4);
                                showMessage('😕 拒绝邀约，人缘-4');
                            }
                            waitingForBirthday = false;
                            updateAttrPanel();
                            clearInput();
                            // 恢复普通按钮行为
                            setupActionButton();
                            // 继续游戏流程 (检查归零)
                            if (checkAttrZero()) {
                                endGameEarly();
                            } else {
                                // 继续当前阶段 (实际上事件已经结束，回到阶段流程)
                                // 但为了不打断，我们直接进入下一阶段? 这里保持简单: 事件后继续等待用户操作? 
                                // 实际上事件是在阶段内触发的，我们让用户继续当前阶段? 但生日事件已经消耗了行动?
                                // 原逻辑: 事件在阶段末尾触发，不影响阶段行动。我们让事件结束后回到正常输入。
                                // 但此时可能阶段已经结束? 我们设计为事件在阶段行动后触发，不影响阶段选择。
                                // 为了简单，事件后我们重新显示当前阶段? 但阶段已经选过了。我们让事件结束后，如果还有阶段未完成则继续?
                                // 更合理: 事件在每日末尾触发，不影响阶段。我们调整调用时机。
                                // 为了保持原样，我们将在每日所有阶段结束后调用随机事件。
                                // 所以生日事件不会在阶段中途出现。我们修改调用位置。
                                // 临时: 直接重新启用阶段流程? 但这里已经乱了。我们重构: 将随机事件移到每日末尾。
                                // 为了快速修复，我们暂时让生日事件后，直接进入下一阶段? 但这样会跳过阶段。
                                // 更好的方式: 不在阶段内触发随机事件，而是在每日结束后触发。我们修改代码。
                                // 由于时间，我们简单让生日事件后，重新显示阶段选择? 但阶段已经过去了。
                                // 我们将在每日结束后调用随机事件，所以这里不会执行生日事件。
                                // 为了演示，我们暂时注释掉生日事件，或者改为自动。
                                // 我们改为自动处理生日: 如果金钱>=15则参加，否则拒绝。
                                // 重写events[1]为自动版本。
                            }
                        };
                    }
                },
                {
                    msg: '路上捡到零花钱，金钱+25，心情+2',
                    exec: function() {
                        student['金钱'] += 25;
                        student['心情'] = clamp(student['心情'] + 2);
                        showMessage('🍀 路上捡到零花钱！金钱+25，心情+2');
                    }
                },
                {
                    msg: '被罚打扫卫生，体力-5，人缘+2',
                    exec: function() {
                        student['体力'] = clamp(student['体力'] - 5);
                        student['人缘'] = clamp(student['人缘'] + 2);
                        showMessage('🧹 被罚打扫卫生，体力-5，人缘+2');
                    }
                },
                {
                    msg: '暴雨停课半天，今日少一个行动回合，心情+3',
                    exec: function() {
                        student['心情'] = clamp(student['心情'] + 3);
                        showMessage('🌧️ 暴雨停课半天，心情+3 (今日少一个行动回合)');
                        // 少一个回合: 我们通过标记跳过当前阶段? 简单处理: 直接跳过当前阶段?
                        // 我们将在每日流程中处理。
                    }
                }
            ];

            // 随机选一个
            const e = events[Math.floor(Math.random() * events.length)];
            // 显示事件消息
            showMessage('⚡ ' + e.msg);
            e.exec();
            updateAttrPanel();
            return true;
        }

        // 重新定义随机事件 (自动版本，避免输入阻塞)
        function triggerRandomEventAuto() {
            if (Math.random() >= 0.33) return false;
            const events = [
                {
                    msg: '老师突击小测',
                    exec: function() {
                        if (student['学业'] >= 15) {
                            student['学业'] = clamp(student['学业'] + 3);
                        } else {
                            student['学业'] = clamp(student['学业'] - 4);
                        }
                        student['心情'] = clamp(student['心情'] - 3);
                        showMessage('📝 老师突击小测！' + (student['学业'] >= 15 ? '你表现不错，学业+3，心情-3' : '考砸了，学业-4，心情-3'));
                    }
                },
                {
                    msg: '同学过生日邀约！花费15元，人缘+6',
                    exec: function() {
                        if (student['金钱'] >= 15) {
                            student['金钱'] -= 15;
                            student['人缘'] = clamp(student['人缘'] + 6);
                            showMessage('🎉 同学过生日邀约！你参加了，金钱-15，人缘+6');
                        } else {
                            student['人缘'] = clamp(student['人缘'] - 4);
                            showMessage('😕 同学过生日邀约！金钱不足，拒绝，人缘-4');
                        }
                    }
                },
                {
                    msg: '路上捡到零花钱，金钱+25，心情+2',
                    exec: function() {
                        student['金钱'] += 25;
                        student['心情'] = clamp(student['心情'] + 2);
                        showMessage('🍀 路上捡到零花钱！金钱+25，心情+2');
                    }
                },
                {
                    msg: '被罚打扫卫生，体力-5，人缘+2',
                    exec: function() {
                        student['体力'] = clamp(student['体力'] - 5);
                        student['人缘'] = clamp(student['人缘'] + 2);
                        showMessage('🧹 被罚打扫卫生，体力-5，人缘+2');
                    }
                },
                {
                    msg: '暴雨停课半天，今日少一个行动回合，心情+3',
                    exec: function() {
                        student['心情'] = clamp(student['心情'] + 3);
                        showMessage('🌧️ 暴雨停课半天，心情+3 (今日少一个行动回合)');
                        // 标记跳过阶段: 我们通过全局变量
                        skipStage = true;
                    }
                }
            ];
            const e = events[Math.floor(Math.random() * events.length)];
            showMessage('⚡ ' + e.msg);
            e.exec();
            updateAttrPanel();
            return true;
        }

        let skipStage = false; // 用于暴雨事件

        // ---------- 阶段处理 ----------
        const weekStages = ['早自习', '午休', '放学后', '夜晚'];
        const weekendActions = [
            '1.全天补课(学业+8,体力-4)\n2.全天兼职(金钱+45,体力-7)\n3.出门游玩(金钱-30,人缘+6,心情+7)\n4.宅家休养(体力+10,心情+3)',
            '1.全天补课(学业+8,体力-4)\n2.全天兼职(金钱+45,体力-7)\n3.出门游玩(金钱-30,人缘+6,心情+7)\n4.宅家休养(体力+10,心情+3)',
            '1.全天补课(学业+8,体力-4)\n2.全天兼职(金钱+45,体力-7)\n3.出门游玩(金钱-30,人缘+6,心情+7)\n4.宅家休养(体力+10,心情+3)'
        ];

        function getStageActions(stage) {
            if (today <= 5) {
                switch(stage) {
                    case '早自习': return '1.认真早读(学业+3,体力-2)\n2.趴桌睡觉(体力+4,学业-3,30%被抓扣人缘心情)\n3.和同桌闲聊(人缘+3,学业-2,心情+2)';
                    case '午休': return '1.图书馆刷题(学业+4,体力-3,金钱-5)\n2.操场运动(体力+5,人缘+2,心情+3)\n3.食堂兼职(金钱+15,体力-4,学业-1)';
                    case '放学后': return '1.参加社团(人缘+4,学业/体力+4,心情+3)\n2.校外打工(金钱+30,体力-6,学业-3)\n3.结伴逛街(金钱-20,人缘+5,心情+5)\n4.在家自习(学业+5,体力-3)';
                    case '夜晚': return '1.熬夜刷题(学业+6,体力-8)\n2.玩手机追剧(心情+4,学业-4,体力-3)\n3.早睡休息(体力+7)';
                    default: return '';
                }
            } else {
                return weekendActions[weekendActionCount] || '1.全天补课(学业+8,体力-4)\n2.全天兼职(金钱+45,体力-7)\n3.出门游玩(金钱-30,人缘+6,心情+7)\n4.宅家休养(体力+10,心情+3)';
            }
        }

        function applyStageAction(stage, opt) {
            if (today <= 5) {
                switch(stage) {
                    case '早自习':
                        if (opt === '1') {
                            student['学业'] = clamp(student['学业'] + 3);
                            student['体力'] = clamp(student['体力'] - 2);
                            showMessage('📖 认真早读，学业+3，体力-2');
                        } else if (opt === '2') {
                            student['体力'] = clamp(student['体力'] + 4);
                            student['学业'] = clamp(student['学业'] - 3);
                            if (Math.random() < 0.3) {
                                student['人缘'] = clamp(student['人缘'] - 2);
                                student['心情'] = clamp(student['心情'] - 3);
                                showMessage('😴 趴桌睡觉被班主任抓到！学业-3，体力+4，人缘-2，心情-3');
                            } else {
                                showMessage('😴 趴桌睡觉，学业-3，体力+4');
                            }
                        } else if (opt === '3') {
                            student['人缘'] = clamp(student['人缘'] + 3);
                            student['学业'] = clamp(student['学业'] - 2);
                            student['心情'] = clamp(student['心情'] + 2);
                            showMessage('💬 和同桌闲聊，人缘+3，学业-2，心情+2');
                        } else {
                            showMessage('⚠️ 无效选项，请重新输入', true);
                            return false;
                        }
                        break;
                    case '午休':
                        if (opt === '1') {
                            student['学业'] = clamp(student['学业'] + 4);
                            student['体力'] = clamp(student['体力'] - 3);
                            student['金钱'] -= 5;
                            showMessage('📚 图书馆刷题，学业+4，体力-3，金钱-5');
                        } else if (opt === '2') {
                            student['体力'] = clamp(student['体力'] + 5);
                            student['人缘'] = clamp(student['人缘'] + 2);
                            student['心情'] = clamp(student['心情'] + 3);
                            showMessage('⚽ 操场运动，体力+5，人缘+2，心情+3');
                        } else if (opt === '3') {
                            student['金钱'] += 15;
                            student['体力'] = clamp(student['体力'] - 4);
                            student['学业'] = clamp(student['学业'] - 1);
                            showMessage('🍽️ 食堂兼职，金钱+15，体力-4，学业-1');
                        } else {
                            showMessage('⚠️ 无效选项，请重新输入', true);
                            return false;
                        }
                        break;
                    case '放学后':
                        if (opt === '1') {
                            student['人缘'] = clamp(student['人缘'] + 4);
                            if (Math.random() < 0.5) {
                                student['学业'] = clamp(student['学业'] + 2);
                                showMessage('🎭 参加社团，人缘+4，学业+2，心情+3');
                            } else {
                                student['体力'] = clamp(student['体力'] + 4);
                                showMessage('🎭 参加社团，人缘+4，体力+4，心情+3');
                            }
                            student['心情'] = clamp(student['心情'] + 3);
                        } else if (opt === '2') {
                            student['金钱'] += 30;
                            student['体力'] = clamp(student['体力'] - 6);
                            student['学业'] = clamp(student['学业'] - 3);
                            showMessage('💼 校外打工，金钱+30，体力-6，学业-3');
                        } else if (opt === '3') {
                            student['金钱'] -= 20;
                            student['人缘'] = clamp(student['人缘'] + 5);
                            student['心情'] = clamp(student['心情'] + 5);
                            showMessage('🛍️ 结伴逛街，金钱-20，人缘+5，心情+5');
                        } else if (opt === '4') {
                            student['学业'] = clamp(student['学业'] + 5);
                            student['体力'] = clamp(student['体力'] - 3);
                            showMessage('🏠 在家自习，学业+5，体力-3');
                        } else {
                            showMessage('⚠️ 无效选项，请重新输入', true);
                            return false;
                        }
                        break;
                    case '夜晚':
                        if (opt === '1') {
                            student['学业'] = clamp(student['学业'] + 6);
                            student['体力'] = clamp(student['体力'] - 8);
                            showMessage('🌙 熬夜刷题，学业+6，体力-8');
                        } else if (opt === '2') {
                            student['心情'] = clamp(student['心情'] + 4);
                            student['学业'] = clamp(student['学业'] - 4);
                            student['体力'] = clamp(student['体力'] - 3);
                            showMessage('📱 玩手机追剧，心情+4，学业-4，体力-3');
                        } else if (opt === '3') {
                            student['体力'] = clamp(student['体力'] + 7);
                            showMessage('😴 早睡休息，体力+7');
                        } else {
                            showMessage('⚠️ 无效选项，请重新输入', true);
                            return false;
                        }
                        break;
                }
            } else {
                // 周末
                if (opt === '1') {
                    student['学业'] = clamp(student['学业'] + 8);
                    student['体力'] = clamp(student['体力'] - 4);
                    showMessage('📚 全天补课，学业+8，体力-4');
                } else if (opt === '2') {
                    student['金钱'] += 45;
                    student['体力'] = clamp(student['体力'] - 7);
                    showMessage('💼 全天兼职，金钱+45，体力-7');
                } else if (opt === '3') {
                    student['金钱'] -= 30;
                    student['人缘'] = clamp(student['人缘'] + 6);
                    student['心情'] = clamp(student['心情'] + 7);
                    showMessage('🎉 出门游玩，金钱-30，人缘+6，心情+7');
                } else if (opt === '4') {
                    student['体力'] = clamp(student['体力'] + 10);
                    student['心情'] = clamp(student['心情'] + 3);
                    showMessage('🏠 宅家休养，体力+10，心情+3');
                } else {
                    showMessage('⚠️ 无效选项，请重新输入', true);
                    return false;
                }
            }
            updateAttrPanel();
            return true;
        }

        // ---------- 流程控制 ----------
        function startDay() {
            if (gameOver) return;
            hideResult();
            hideMessage();
            clearInput();
            disableInput(false);
            updateDayInfo();
            updateAttrPanel();

            if (today <= 5) {
                currentStageIndex = 0;
                weekendActionCount = 0;
                showStage();
            } else {
                weekendActionCount = 0;
                showWeekendStage();
            }
        }

        function showStage() {
            if (gameOver) return;
            if (today > 5) {
                showWeekendStage();
                return;
            }
            if (currentStageIndex >= weekStages.length) {
                // 所有阶段结束 -> 每日结束
                finishDay();
                return;
            }
            const stage = weekStages[currentStageIndex];
            stageTitle.textContent = stage;
            actionDesc.textContent = getStageActions(stage);
            hideMessage();
            clearInput();
            disableInput(false);
            // 设置按钮事件
            setupActionButton();
        }

        function showWeekendStage() {
            if (gameOver) return;
            if (weekendActionCount >= 3) {
                finishDay();
                return;
            }
            stageTitle.textContent = '周末行动 ' + (weekendActionCount + 1) + '/3';
            actionDesc.textContent = getStageActions('周末');
            hideMessage();
            clearInput();
            disableInput(false);
            setupActionButton();
        }

        function setupActionButton() {
            actionBtn.onclick = function() {
                if (waitingForBirthday) return;
                if (gameOver || waitingForNext) return;
                const val = userInput.value.trim();
                if (!val) {
                    showMessage('⚠️ 请输入选项', true);
                    return;
                }
                let stage = (today <= 5) ? weekStages[currentStageIndex] : '周末';
                const success = applyStageAction(stage, val);
                if (!success) {
                    return;
                }
                // 检查属性归零
                if (checkAttrZero()) {
                    endGameEarly();
                    return;
                }
                // 进入下一阶段
                if (today <= 5) {
                    currentStageIndex++;
                    showStage();
                } else {
                    weekendActionCount++;
                    showWeekendStage();
                }
            };
        }

        function finishDay() {
            // 每日零花钱
            student['金钱'] += 10;
            // 随机事件 (每日结束)
            skipStage = false;
            triggerRandomEventAuto();
            updateAttrPanel();
            if (checkAttrZero()) {
                endGameEarly();
                return;
            }
            // 显示下一天按钮
            disableInput(true);
            hideMessage();
            showResult('✅ 第 ' + today + ' 天结束！点击"进入下一天"继续');
            nextDayBtn.style.display = 'inline-block';
            restartBtn.style.display = 'none';
            waitingForNext = true;
        }

        function nextDay() {
            if (!waitingForNext) return;
            waitingForNext = false;
            nextDayBtn.style.display = 'none';
            today++;
            if (today > DAY_TOTAL) {
                // 游戏结束，结算
                endGame();
                return;
            }
            startDay();
        }

        function endGameEarly() {
            gameOver = true;
            disableInput(true);
            hideMessage();
            showResult('💔 某项属性归零，游戏提前结束！', true);
            nextDayBtn.style.display = 'none';
            restartBtn.style.display = 'inline-block';
            // 显示结局
            setTimeout(() => {
                showEnding(true);
            }, 300);
        }

        function endGame() {
            gameOver = true;
            disableInput(true);
            hideMessage();
            showResult('🎓 学期结束，结算结局...', false);
            nextDayBtn.style.display = 'none';
            restartBtn.style.display = 'inline-block';
            setTimeout(() => {
                showEnding(false);
            }, 400);
        }

        function showEnding(early) {
            const xue = student['学业'];
            const ren = student['人缘'];
            const qian = student['金钱'];
            const xinqing = student['心情'];
            let ending = '';
            if (xue >= 25 && ren >= 18 && qian >= 80) {
                ending = '🏆 【完美学霸结局】成绩优异，保送重点实验班！通关！';
            } else if (ren >= 25 && xinqing >= 22) {
                ending = '🌟 【阳光社牛结局】当选学生会干部，人缘爆棚！';
            } else if (qian >= 150) {
                ending = '💰 【务实打工结局】攒够巨款，买到心仪数码产品！';
            } else if (xue < 8 || checkAttrZero()) {
                ending = '💀 【坏结局】挂科过多/状态崩盘，留级退学，游戏失败！';
            } else {
                ending = '🎓 【普通毕业结局】平稳度过校园生活，正常升学~';
            }
            showResult(ending, false);
            restartBtn.style.display = 'inline-block';
        }

        function restartGame() {
            // 重置状态
            student = { "学业": 10, "体力": 10, "人缘": 10, "金钱": 50, "心情": 10 };
            today = 1;
            currentStageIndex = 0;
            weekendActionCount = 0;
            gameOver = false;
            waitingForNext = false;
            waitingForBirthday = false;
            skipStage = false;
            hideResult();
            hideMessage();
            nextDayBtn.style.display = 'none';
            restartBtn.style.display = 'none';
            disableInput(false);
            updateAttrPanel();
            startDay();
        }

                    } else if (!gameOver && !waitingForBirthday) {
