<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2D格斗小游戏 - 连招版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            color: white;
        }

        .game-container {
            position: relative;
            display: inline-block;
        }

        .health-bar-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 30px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
            display: flex;
            overflow: hidden;
        }

        #player1Health {
            width: 50%;
            height: 100%;
            background: #ff4757;
            transition: width 0.2s;
        }

        #player2Health {
            width: 50%;
            height: 100%;
            background: #3742fa;
            transition: width 0.2s;
        }

        #gameCanvas {
            border: 3px solid #fff;
            background: #2d3436;
            border-radius: 8px;
        }

        .tips {
            margin-top: 15px;
            text-align: center;
            line-height: 1.6;
            font-size: 16px;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #000;
            display: none;
        }

        .combo-tip {
            position: absolute;
            top: 80px;
            font-size: 28px;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            display: none;
        }
        #combo1 { left: 15%; }
        #combo2 { right: 15%; }

        .restart {
            margin-top: 15px;
            padding: 10px 25px;
            font-size: 18px;
            background: #00b894;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .restart:hover {
            background: #00a085;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="health-bar-container">
            <div id="player1Health"></div>
            <div id="player2Health"></div>
        </div>
        <div id="combo1" class="combo-tip">连招!</div>
        <div id="combo2" class="combo-tip">连招!</div>
        <canvas id="gameCanvas" width="1000" height="500"></canvas>
        <div id="gameOver">游戏结束</div>
    </div>
    <button class="restart" onclick="restartGame()">重新开始</button>
    <div class="tips">
        玩家1(红)：W跳跃 | A左 | D右 | S普通攻击 | 连按S = 连招(高伤害)<br>
        玩家2(蓝)：↑跳跃 | ←左 | →右 | ↓普通攻击 | 连按↓ = 连招(高伤害)
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverText = document.getElementById('gameOver');
        const p1Health = document.getElementById('player1Health');
        const p2Health = document.getElementById('player2Health');
        const comboTip1 = document.getElementById('combo1');
        const comboTip2 = document.getElementById('combo2');

        let gameOver = false;

        class Player {
            constructor(x, color, controls, comboTip) {
                this.x = x;
                this.y = 380;
                this.width = 50;
                this.height = 100;
                this.speed = 8;
                this.jumpPower = 15;
                this.vy = 0;
                this.gravity = 0.7;
                this.grounded = true;
                this.color = color;
                this.health = 100;
                this.attacking = false;
                this.attackRange = 60;
                this.controls = controls;
                this.comboTip = comboTip;

                // 连招相关
                this.attackCount = 0;
                this.lastAttackTime = 0;
                this.comboTime = 300; // 连招判定间隔(毫秒)
                this.isCombo = false;
                this.normalDmg = 0.5;
                this.comboDmg = 1.2; // 连招伤害更高
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // 普通攻击范围
                if(this.attacking && !this.isCombo) {
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(this.x - this.attackRange/2, this.y, this.width + this.attackRange, this.height);
                }
                // 连招范围（更大、特效更深）
                if(this.isCombo) {
                    ctx.fillStyle = 'rgba(255,215,0,0.5)';
                    ctx.fillRect(this.x - this.attackRange, this.y - 10, this.width + this.attackRange * 2, this.height + 20);
                }
            }

            update(opponent) {
                if(gameOver) return;
                const now = Date.now();

                // 重力与落地
                this.vy += this.gravity;
                this.y += this.vy;
                if(this.y + this.height > canvas.height - 20) {
                    this.y = canvas.height - 20 - this.height;
                    this.vy = 0;
                    this.grounded = true;
                }

                // 移动
                if(keys[this.controls.left] && this.x > 0) this.x -= this.speed;
                if(keys[this.controls.right] && this.x + this.width < canvas.width) this.x += this.speed;
                if(keys[this.controls.jump] && this.grounded) {
                    this.vy = -this.jumpPower;
                    this.grounded = false;
                }

                // 连招逻辑
                this.attacking = keys[this.controls.attack];
                if(this.attacking) {
                    if (now - this.lastAttackTime < this.comboTime) {
                        this.attackCount++;
                    } else {
                        this.attackCount = 1;
                    }
                    this.lastAttackTime = now;

                    // 连续2次攻击 = 触发连招
                    this.isCombo = this.attackCount >= 2;

                    // 显示连招提示
                    if(this.isCombo) {
                        this.comboTip.style.display = 'block';
                    }

                    // 攻击命中扣血
                    if(this.checkHit(opponent)) {
                        let dmg = this.isCombo ? this.comboDmg : this.normalDmg;
                        opponent.health -= dmg;
                        if(opponent.health < 0) opponent.health = 0;
                        updateHealthBars();
                        checkWinner();
                    }
                } else {
                    // 松开攻击键，隐藏连招提示、重置状态
                    this.comboTip.style.display = 'none';
                    this.isCombo = false;
                }

                this.draw();
            }

            checkHit(opponent) {
                let range = this.isCombo ? this.attackRange * 1.5 : this.attackRange;
                return (
                    this.x - range < opponent.x + opponent.width &&
                    this.x + this.width + range > opponent.x &&
                    this.y < opponent.y + opponent.height &&
                    this.y + this.height > opponent.y
                );
            }
        }

        const keys = {
            83: false, 65: false, 68: false, 87: false,
            40: false, 37: false, 39: false, 38: false
        };

        let player1, player2;
        initGame();

        function initGame() {
            gameOver = false;
            gameOverText.style.display = 'none';
            player1 = new Player(200, '#ff4757', {
                left: 65, right: 68, jump: 87, attack: 83
            }, comboTip1);
            player2 = new Player(750, '#3742fa', {
                left: 37, right: 39, jump: 38, attack: 40
            }, comboTip2);
            updateHealthBars();
            animate();
        }

        function updateHealthBars() {
            p1Health.style.width = player1.health + '%';
            p2Health.style.width = player2.health + '%';
        }

        function checkWinner() {
            if(player1.health <= 0) {
                gameOverText.textContent = '蓝色玩家胜利！';
                endGame();
            }
            if(player2.health <= 0) {
                gameOverText.textContent = '红色玩家胜利！';
                endGame();
            }
        }

        function endGame() {
            gameOver = true;
            gameOverText.style.display = 'block';
        }

        function restartGame() {
            cancelAnimationFrame(animate);
            initGame();
        }

        function animate() {
            if(gameOver) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#636e72';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

            player1.update(player2);
            player2.update(player1);
            requestAnimationFrame(animate);
        }

        document.addEventListener('keydown', (e) => keys[e.keyCode] = true);
        document.addEventListener('keyup', (e) => keys[e.keyCode] = false);
    </script>
</body>
</html>
