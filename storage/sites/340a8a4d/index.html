<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国杀斗地主 - 界徐盛地主版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "微软雅黑", sans-serif; }
        body { background: #2c2c2c; color: #fff; padding: 10px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #ffd700; margin: 15px 0; }

        .role-area { display: flex; justify-content: space-around; margin: 20px 0; }
        .player {
            width: 220px;
            background: #444;
            border: 2px solid #888;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .landlord { border-color: #e74c3c; box-shadow: 0 0 10px #e74c3c; }
        .farmer { border-color: #3498db; box-shadow: 0 0 10px #3498db; }
        .hp { font-size: 24px; color: #ff4444; margin: 10px 0; }
        .name { font-size: 18px; margin: 8px 0; }
        .tip { font-size: 14px; color: #ccc; }

        .card-box { margin: 30px 0; }
        .hand-cards { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; min-height: 120px; padding: 10px; background: #333; border-radius: 8px; }
        .card {
            width: 70px;
            height: 100px;
            background: #fff;
            color: #000;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 2px 2px 5px #000;
            font-size: 12px;
            text-align:center;
            padding:2px;
        }
        .card:hover { transform: translateY(-8px); }
        .sha { color: #e74c3c; }
        .shan { color: #27ae60; }
        .tao { color: #f39c12; }
        .jin { color: #9b59b6; background:#f0e6ff; }

        .operate { text-align: center; margin: 20px 0; }
        button {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 8px;
        }
        #startBtn { background: #ffd700; color: #000; }
        #playBtn { background: #2ecc71; color: #fff; }
        #passBtn { background: #95a5a6; color: #fff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .log {
            width: 100%;
            height: 150px;
            background: #111;
            border: 1px solid #555;
            padding: 10px;
            overflow-y: auto;
            margin-top: 20px;
            color: #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>三国杀斗地主 - 界徐盛（地主）</h1>

        <div class="role-area">
            <div class="player farmer" id="player2">
                <div class="name">农民甲</div>
                <div class="tip">体力</div>
                <div class="hp" id="hp2">❤❤❤</div>
                <div class="tip" id="status2">等待开局</div>
            </div>

            <div class="player landlord" id="player1">
                <div class="name">界徐盛（地主）</div>
                <div class="tip">体力</div>
                <div class="hp" id="hp1">❤❤❤❤</div>
                <div class="tip" id="status1">等待开局</div>
            </div>

            <div class="player farmer" id="player3">
                <div class="name">农民乙</div>
                <div class="tip">体力</div>
                <div class="hp" id="hp3">❤❤❤</div>
                <div class="tip" id="status3">等待开局</div>
            </div>
        </div>

        <div class="card-box">
            <div class="hand-cards" id="handCards"></div>
        </div>

        <div class="operate">
            <button id="startBtn">开始游戏</button>
            <button id="playBtn" disabled>出牌</button>
            <button id="passBtn" disabled>不出牌</button>
        </div>

        <div class="log" id="gameLog">游戏日志：等待点击【开始游戏】<br></div>
    </div>

    <script>
        const GAME_CONFIG = {
            maxHp: { landlord: 4, farmer: 3 },
            basicTypes: ['杀','闪','桃'],
            trickTypes: ['无中生有','顺手牵羊','过河拆桥','决斗','南蛮入侵','万箭齐发','无懈可击'],
            cardNum: 8
        };

        let players = [
            { 
                id:1, name:'界徐盛', role:'landlord', hp:4, alive:true, cards:[],
                isJieXuSheng:true // 标记界徐盛
            },
            { id:2, name:'农民甲', role:'farmer', hp:3, alive:true, cards:[] },
            { id:3, name:'农民乙', role:'farmer', hp:3, alive:true, cards:[] }
        ];

        let gameStart = false;
        let currentTurn = 0;
        let selectCard = null;
        let pendingWuXie = false; // 用于无懈可击

        const startBtn = document.getElementById('startBtn');
        const playBtn = document.getElementById('passBtn');
        const passBtn = document.getElementById('passBtn');
        const handCardsDom = document.getElementById('handCards');
        const gameLogDom = document.getElementById('gameLog');

        startBtn.addEventListener('click', startGame);
        playBtn.addEventListener('click', playCard);
        passBtn.addEventListener('click', passTurn);

        function startGame() {
            gameStart = true;
            currentTurn = 0;
            selectCard = null;
            pendingWuXie = false;
            gameLogDom.innerHTML = '游戏开始！界徐盛先手行动<br>';
            
            players.forEach((p, idx) => {
                p.alive = true;
                p.hp = p.role === 'landlord' ? 4 : 3;
                p.cards = dealCard(GAME_CONFIG.cardNum);
                updatePlayerUI(idx);
            });

            renderHandCards();
            updateBtnStatus();
            setTurnTip();
        }

        function dealCard(count) {
            let cards = [];
            const all = [...GAME_CONFIG.basicTypes, ...GAME_CONFIG.trickTypes];
            for (let i=0; i<count; i++) {
                let rnd = Math.floor(Math.random()*all.length);
                cards.push(all[rnd]);
            }
            return cards;
        }

        function renderHandCards() {
            handCardsDom.innerHTML = '';
            const curr = players[currentTurn];
            curr.cards.forEach((card, idx) => {
                let d = document.createElement('div');
                d.className = `card ${
                    card==='杀'?'sha':
                    card==='闪'?'shan':
                    card==='桃'?'tao':'jin'
                }`;
                d.innerHTML = `<span>${card}</span>`;
                d.dataset.index = idx;
                d.addEventListener('click', () => {
                    document.querySelectorAll('.card').forEach(c=>c.style.border='none');
                    d.style.border = '3px solid #ff0';
                    selectCard = {type:card, index:idx};
                });
                handCardsDom.appendChild(d);
            });
        }

        function playCard() {
            if (!selectCard) { addLog('请先选牌！'); return; }
            const curr = players[currentTurn];
            const card = selectCard.type;
            const idx = selectCard.index;
            curr.cards.splice(idx,1);
            selectCard = null;
            renderHandCards();

            // 基本牌
            if (card === '杀') {
                let target = getAttackTarget();
                addLog(`${curr.name} 打出【杀】→ ${target.name}`);
                // 界徐盛破军
                if (curr.isJieXuSheng) {
                    const X = target.hp;
                    const remove = Math.min(X, target.cards.length);
                    let removed = [];
                    for (let i=0; i<remove; i++) removed.push(target.cards.pop());
                    addLog(`【破军】移出 ${target.name} ${remove} 张牌，回合结束归还`);
                    // 加伤判断：手牌+装备（这里装备简化为0）≤自己
                    if (target.cards.length <= curr.cards.length) {
                        addLog(`【破军】满足条件，伤害+1`);
                        target.hp -= 2;
                    } else {
                        target.hp -= 1;
                    }
                    // 归还
                    target.cards.push(...removed);
                } else {
                    // 普通杀
                    let hasShan = target.cards.includes('闪');
                    if (hasShan) {
                        let si = target.cards.indexOf('闪');
                        target.cards.splice(si,1);
                        addLog(`${target.name} 闪掉！`);
                    } else {
                        target.hp -= 1;
                        addLog(`${target.name} 掉1血！`);
                    }
                }
                checkDie(target);
            }
            else if (card === '闪') { addLog('闪不能主动出！'); curr.cards.push('闪'); }
            else if (card === '桃') {
                if (curr.hp < GAME_CONFIG.maxHp[curr.role]) {
                    curr.hp++; addLog(`${curr.name} 吃桃回1血`);
                } else { addLog('满血桃无效'); curr.cards.push('桃'); }
            }
            // 锦囊
            else if (card === '无中生有') {
                addLog(`${curr.name} 无中生有，摸2牌`);
                curr.cards.push(...dealCard(2));
            }
            else if (card === '顺手牵羊') {
                let target = getAttackTarget();
                if (target.cards.length>0) {
                    let c = target.cards.pop();
                    curr.cards.push(c);
                    addLog(`顺走 ${target.name} 一张牌`);
                } else addLog('对方没牌可顺');
            }
            else if (card === '过河拆桥') {
                let target = getAttackTarget();
                if (target.cards.length>0) {
                    target.cards.pop();
                    addLog(`拆掉 ${target.name} 一张牌`);
                } else addLog('对方没牌可拆');
            }
            else if (card === '决斗') {
                let target = getAttackTarget();
                addLog(`${curr.name} 决斗 ${target.name}`);
                let currSha = curr.cards.filter(x=>x==='杀').length;
                let tarSha = target.cards.filter(x=>x==='杀').length;
                if (tarSha >= currSha) {
                    target.hp--; addLog(`${target.name} 决斗输，掉1血`);
                } else {
                    curr.hp--; addLog(`${curr.name} 决斗输，掉1血`);
                }
                checkDie(curr); checkDie(target);
            }
            else if (card === '南蛮入侵') {
                addLog(`${curr.name} 南蛮入侵！`);
                players.forEach(p=>{
                    if (p.id!==curr.id && p.alive) {
                        if (p.cards.includes('杀')) {
                            let i = p.cards.indexOf('杀'); p.cards.splice(i,1);
                            addLog(`${p.name} 出杀响应南蛮`);
                        } else {
                            p.hp--; addLog(`${p.name} 掉1血`);
                            checkDie(p);
                        }
                    }
                });
            }
            else if (card === '万箭齐发') {
                addLog(`${curr.name} 万箭齐发！`);
                players.forEach(p=>{
                    if (p.id!==curr.id && p.alive) {
                        if (p.cards.includes('闪')) {
                            let i = p.cards.indexOf('闪'); p.cards.splice(i,1);
                            addLog(`${p.name} 出闪响应万箭`);
                        } else {
                            p.hp--; addLog(`${p.name} 掉1血`);
                            checkDie(p);
                        }
                    }
                });
            }
            else if (card === '无懈可击') {
                addLog('无懈可击：下一张锦囊无效（本AI简化）');
                pendingWuXie = true;
            }

            updateAllUI();
            if (!checkGameOver()) nextTurn();
        }

        function passTurn() {
            addLog(`${players[currentTurn].name} 跳过`);
            nextTurn();
        }

        function nextTurn() {
            do { currentTurn=(currentTurn+1)%3; } while(!players[currentTurn].alive);
            setTurnTip(); renderHandCards(); updateBtnStatus();
        }

        function getAttackTarget() {
            const curr = players[currentTurn];
            if (curr.role==='landlord') {
                let fs = players.filter(p=>p.role==='farmer'&&p.alive);
                return fs[Math.floor(Math.random()*fs.length)];
            } else return players[0];
        }

        function checkDie(p) {
            if (p.hp<=0) { p.alive=false; addLog(`【${p.name}】阵亡！`); }
        }

        function checkGameOver() {
            const land = players[0].alive;
            const farm = players.some(p=>p.role==='farmer'&&p.alive);
            if (!land) { addLog('===== 农民胜利 ====='); gameStart=false; updateBtnStatus(); return true; }
            if (!farm) { addLog('===== 界徐盛胜利 ====='); gameStart=false; updateBtnStatus(); return true; }
            return false;
        }

        function updatePlayerUI(idx) {
            const p = players[idx];
            const hp = document.getElementById(`hp${idx+1}`);
            let s=''; for(let i=0;i<p.hp;i++) s+='❤';
            hp.innerText = s || '阵亡';
        }
        function updateAllUI() { players.forEach((_,i)=>updatePlayerUI(i)); }
        function setTurnTip() {
            players.forEach((p,i)=>{
                const st = document.getElementById(`status${i+1}`);
                st.innerText = !p.alive ? '阵亡' : (i===currentTurn ? '▶行动' : '等待');
            });
        }
        function updateBtnStatus() {
            startBtn.disabled = gameStart;
            playBtn.disabled = !gameStart;
            passBtn.disabled = !gameStart;
        }
        function addLog(t) { gameLogDom.innerHTML += t+'<br>'; gameLogDom.scrollTop=gameLogDom.scrollHeight; }
    </script>
</body>
</html>
