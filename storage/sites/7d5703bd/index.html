<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷霆奶龙大冒险</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:#0a1028;display:flex;flex-direction:column;align-items:center;padding:10px}
        #gameBox{
            width:min(95vw,800px);height:500px;background:linear-gradient(#3474e6,#87cefa);
            position:relative;overflow:hidden;border:3px solid #ffd100;border-radius:12px;
        }
        /* 雷霆奶龙样式 */
        #nailong{
            width:60px;height:65px;position:absolute;bottom:80px;left:80px;
            background:#ffdd22;border-radius:50% 50% 45% 45%;
            border:3px solid #ffaa00;z-index:2;
            box-shadow:0 0 12px #fff,0 0 22px #0cf,0 0 35px #0099ff;
        }
        #nailong::before{
            content:"";position:absolute;width:16px;height:22px;background:#0cf;top:-18px;left:22px;
            clip-path:polygon(50% 0,0 100%,100% 100%);box-shadow:0 0 8px #0ff;
        }
        #nailong::after{
            content:"⚡";position:absolute;right:-14px;top:12px;font-size:24px;color:#0ff;
            text-shadow:0 0 10px #0cf;animation:lightning 0.4s infinite alternate;
        }
        @keyframes lightning{from{opacity:0.4}to{opacity:1}}
        /* 地面 */
        .ground{width:100%;height:80px;background:#8b5a2b;position:absolute;bottom:0}
        /* 闪电道具 */
        .light{width:32px;height:36px;position:absolute;color:#0ff;font-size:32px;text-shadow:0 0 10px cyan}
        /* 乌云障碍 */
        .cloud{width:75px;height:42px;background:#333;border-radius:50%;position:absolute;box-shadow:inset 0 0 10px #111}
        /* UI面板 */
        .ui{width:min(95vw,800px);display:flex;justify-content:space-between;color:#fff;padding:8px 0;font-size:18px}
        .btn-box{margin-top:8px;display:flex;gap:10px}
        button{padding:6px 16px;border:none;border-radius:6px;background:#ffd100;color:#000;font-weight:bold;cursor:pointer}
        .tip{color:#ccc;font-size:13px;margin-top:6px}
    </style>
</head>
<body>
    <div class="ui">
        <span>得分：<span id="score">0</span></span>
        <span>最高分：<span id="maxScore">0</span></span>
    </div>
    <div id="gameBox">
        <div id="nailong"></div>
        <div class="ground"></div>
    </div>
    <div class="btn-box">
        <button onclick="restartGame()">重新开始</button>
    </div>
    <div class="tip">键盘 ← → 左右移动｜空格跳跃｜手机点击屏幕跳跃</div>

    <script>
        (function(){
            const game = document.getElementById('gameBox')
            const nailong = document.getElementById('nailong')
            const scoreSpan = document.getElementById('score')
            const maxScoreSpan = document.getElementById('maxScore')

            // 游戏状态
            let x = 80
            let y = 80
            const speed = 7
            const jumpPower = -16
            const gravity = 0.7
            let onGround = true
            let vy = 0
            let score = 0
            let maxScore = parseInt(localStorage.getItem('nailongMax')) || 0
            maxScoreSpan.innerText = maxScore

            let lightList = []
            let cloudList = []
            let gameRun = true
            let gameSpeed = 3

            const key = { left: false, right: false }

            // 缓存游戏区域尺寸
            let gameWidth = game.offsetWidth
            let gameHeight = game.offsetHeight

            // 键盘监听
            document.addEventListener('keydown', function(e){
                if(e.code === 'ArrowLeft') key.left = true
                if(e.code === 'ArrowRight') key.right = true
                if(e.code === 'Space' && onGround && gameRun){
                    vy = jumpPower
                    onGround = false
                }
            })
            document.addEventListener('keyup', function(e){
                if(e.code === 'ArrowLeft') key.left = false
                if(e.code === 'ArrowRight') key.right = false
            })
            // 手机点击跳跃
            game.addEventListener('click', function(){
                if(onGround && gameRun){
                    vy = jumpPower
                    onGround = false
                }
            })

            // 碰撞检测
            function isCrash(objX, objY, objW, objH){
                const nx = x
                const ny = gameHeight - y - 65
                const nw = 60
                const nh = 65
                return nx < objX + objW && nx + nw > objX && ny < objY + objH && ny + nh > objY
            }

            // 更新分数显示
            function updateScore(newScore){
                score = newScore
                scoreSpan.innerText = score
            }

            // 创建闪电道具
            function createLight(){
                if(!gameRun) return
                const el = document.createElement('div')
                el.className = 'light'
                el.innerText = '⚡'
                const top = Math.random() * 260 + 60
                el.style.left = gameWidth + 'px'
                el.style.top = top + 'px'
                game.appendChild(el)
                lightList.push({ dom: el, x: gameWidth, top: top })
            }

            // 创建乌云障碍
            function createCloud(){
                if(!gameRun) return
                const el = document.createElement('div')
                el.className = 'cloud'
                const top = Math.random() * 220 + 40
                el.style.left = gameWidth + 'px'
                el.style.top = top + 'px'
                game.appendChild(el)
                cloudList.push({ dom: el, x: gameWidth, top: top })
            }

            // 游戏主循环
            let lastLightTime = 0
            let lastCloudTime = 0
            const lightInterval = 1100
            const cloudInterval = 2200

            function loop(timestamp){
                // 更新尺寸（窗口可能缩放）
                gameWidth = game.offsetWidth
                gameHeight = game.offsetHeight

                // 生成道具（基于时间）
                if(!lastLightTime) lastLightTime = timestamp
                if(!lastCloudTime) lastCloudTime = timestamp
                if(gameRun){
                    if(timestamp - lastLightTime >= lightInterval){
                        createLight()
                        lastLightTime = timestamp
                    }
                    if(timestamp - lastCloudTime >= cloudInterval){
                        createCloud()
                        lastCloudTime = timestamp
                    }
                }

                // 左右移动
                if(key.left && x > 0) x -= speed
                if(key.right && x < gameWidth - 60) x += speed

                // 跳跃与重力
                y += vy
                vy += gravity
                const groundH = 80
                if(y <= groundH){
                    y = groundH
                    onGround = true
                    vy = 0
                }
                nailong.style.left = x + 'px'
                nailong.style.bottom = y + 'px'

                // 更新闪电道具
                for(let i = lightList.length - 1; i >= 0; i--){
                    const item = lightList[i]
                    item.x -= gameSpeed
                    item.dom.style.left = item.x + 'px'
                    // 碰撞检测
                    if(isCrash(item.x, item.top, 32, 36)){
                        updateScore(score + 10)
                        item.dom.remove()
                        lightList.splice(i, 1)
                        continue
                    }
                    if(item.x < -40){
                        item.dom.remove()
                        lightList.splice(i, 1)
                    }
                }

                // 更新乌云障碍
                for(let i = cloudList.length - 1; i >= 0; i--){
                    const item = cloudList[i]
                    item.x -= gameSpeed
                    item.dom.style.left = item.x + 'px'
                    // 碰撞检测
                    if(isCrash(item.x, item.top, 75, 42)){
                        gameOver()
                        return // 停止循环
                    }
                    if(item.x < -80){
                        item.dom.remove()
                        cloudList.splice(i, 1)
                    }
                }

                requestAnimationFrame(loop)
            }

            // 游戏结束
            function gameOver(){
                if(!gameRun) return
                gameRun = false
                if(score > maxScore){
                    maxScore = score
                    localStorage.setItem('nailongMax', maxScore)
                    maxScoreSpan.innerText = maxScore
                }
                alert('游戏结束！本次得分：' + score + '\n历史最高分：' + maxScore)
            }

            // 重新开局
            window.restartGame = function(){
                // 清除所有道具
                lightList.forEach(function(item){ item.dom.remove() })
                cloudList.forEach(function(item){ item.dom.remove() })
                lightList = []
                cloudList = []
                // 重置变量
                x = 80
                y = 80
                vy = 0
                score = 0
                gameRun = true
                onGround = true
                key.left = false
                key.right = false
                updateScore(0)
                // 重置时间标记，避免立即生成
                lastLightTime = 0
                lastCloudTime = 0
                // 重新启动循环
                requestAnimationFrame(loop)
            }

            // 启动主循环
            requestAnimationFrame(loop)
        })()
    </script>
</body>
</html>
