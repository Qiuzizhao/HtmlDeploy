<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>雷霆奶龙大冒险</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none;
        }
        body {
            background: #0a1028;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            min-height: 100vh;
            justify-content: center;
            touch-action: manipulation;
        }
        #gameBox {
            width: min(95vw, 800px);
            height: 500px;
            background: linear-gradient(#3474e6, #87cefa);
            position: relative;
            overflow: hidden;
            border: 3px solid #ffd100;
            border-radius: 12px;
            touch-action: none;
            will-change: transform;
            contain: layout style;
        }
        #nailong {
            width: 60px;
            height: 65px;
            position: absolute;
            left: 0;
            bottom: 0;
            background: #ffdd22;
            border-radius: 50% 50% 45% 45%;
            border: 3px solid #ffaa00;
            z-index: 2;
            box-shadow: 0 0 12px #fff, 0 0 22px #0cf, 0 0 35px #0099ff;
            will-change: transform;
            transform: translate3d(80px, -80px, 0);
            contain: layout style;
            pointer-events: none;
        }
        #nailong::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 22px;
            background: #0cf;
            top: -18px;
            left: 22px;
            clip-path: polygon(50% 0, 0 100%, 100% 100%);
            box-shadow: 0 0 8px #0ff;
        }
        #nailong::after {
            content: "⚡";
            position: absolute;
            right: -14px;
            top: 12px;
            font-size: 24px;
            color: #0ff;
            text-shadow: 0 0 10px #0cf;
            animation: lightning 0.4s infinite alternate;
        }
        @keyframes lightning {
            from {
                opacity: 0.4;
            }
            to {
                opacity: 1;
            }
        }
        .ground {
            width: 100%;
            height: 80px;
            background: #8b5a2b;
            position: absolute;
            bottom: 0;
            pointer-events: none;
        }
        .light {
            width: 32px;
            height: 36px;
            position: absolute;
            color: #0ff;
            font-size: 32px;
            text-shadow: 0 0 10px cyan;
            will-change: transform;
            pointer-events: none;
            z-index: 1;
        }
        .cloud {
            width: 75px;
            height: 42px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            box-shadow: inset 0 0 10px #111, 0 4px 12px rgba(0, 0, 0, 0.3);
            will-change: transform;
            pointer-events: none;
            z-index: 1;
        }
        .ui {
            width: min(95vw, 800px);
            display: flex;
            justify-content: space-between;
            color: #fff;
            padding: 8px 0;
            font-size: 18px;
            font-weight: 500;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }
        .btn-box {
            margin-top: 8px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            background: #ffd100;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: transform 0.1s, background 0.2s;
            touch-action: manipulation;
            min-height: 36px;
            min-width: 80px;
        }
        button:active {
            transform: scale(0.95);
            background: #e6bc00;
        }
        button:hover {
            background: #ffe44d;
        }
        .tip {
            color: #ccc;
            font-size: 13px;
            margin-top: 6px;
            text-align: center;
            max-width: min(95vw, 800px);
        }
        #gameOverlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 16, 40, 0.85);
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 10px;
            animation: fadeIn 0.35s ease;
        }
        #gameOverlay.show {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        #gameOverlay .overlay-title {
            font-size: 38px;
            color: #ffd100;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 209, 0, 0.4);
            margin-bottom: 10px;
        }
        #gameOverlay .overlay-score {
            font-size: 22px;
            color: #fff;
            margin: 6px 0;
        }
        #gameOverlay .overlay-best {
            font-size: 18px;
            color: #87cefa;
            margin-bottom: 18px;
        }
        #gameOverlay .overlay-btn {
            padding: 10px 36px;
            border: none;
            border-radius: 30px;
            background: #ffd100;
            color: #000;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(255, 209, 0, 0.3);
            touch-action: manipulation;
        }
        #gameOverlay .overlay-btn:active {
            transform: scale(0.94);
        }
        #gameOverlay .overlay-btn:hover {
            box-shadow: 0 6px 28px rgba(255, 209, 0, 0.5);
        }
        .score-popup {
            position: absolute;
            color: #ffd100;
            font-weight: bold;
            font-size: 22px;
            pointer-events: none;
            z-index: 5;
            animation: popUp 0.6s ease forwards;
            text-shadow: 0 0 10px rgba(255, 209, 0, 0.5);
        }
        @keyframes popUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.3);
            }
        }
        @media (max-width: 600px) {
            #gameBox {
                height: 380px;
            }
            .ui {
                font-size: 15px;
            }
            #nailong {
                width: 48px;
                height: 52px;
            }
            #nailong::before {
                width: 13px;
                height: 18px;
                top: -15px;
                left: 17px;
            }
            #nailong::after {
                font-size: 18px;
                right: -10px;
                top: 8px;
            }
            .light {
                width: 26px;
                height: 30px;
                font-size: 26px;
            }
            .cloud {
                width: 60px;
                height: 34px;
            }
            #gameOverlay .overlay-title {
                font-size: 28px;
            }
            #gameOverlay .overlay-score {
                font-size: 18px;
            }
            #gameOverlay .overlay-btn {
                font-size: 17px;
                padding: 8px 28px;
            }
        }
        @media (max-width: 400px) {
            #gameBox {
                height: 300px;
            }
            .tip {
                font-size: 11px;
            }
            button {
                font-size: 13px;
                min-height: 32px;
                min-width: 64px;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="ui">
        <span>得分：<span id="score">0</span></span>
        <span>最高分：<span id="maxScore">0</span></span>
    </div>
    <div id="gameBox">
        <div id="nailong"></div>
        <div class="ground"></div>
        <div id="gameOverlay">
            <div class="overlay-title">⚡ 游戏结束</div>
            <div class="overlay-score">本次得分：<span id="finalScore">0</span></div>
            <div class="overlay-best">🏆 历史最高：<span id="finalBest">0</span></div>
            <button class="overlay-btn" id="restartBtn">再来一局</button>
        </div>
    </div>
    <div class="btn-box">
        <button id="restartTopBtn">重新开始</button>
    </div>
    <div class="tip">键盘 ← → 左右移动｜手机点击屏幕移动</div>

    <script>
        (function() {
            'use strict';

            const game = document.getElementById('gameBox');
            const nailong = document.getElementById('nailong');
            const scoreSpan = document.getElementById('score');
            const maxScoreSpan = document.getElementById('maxScore');
            const overlay = document.getElementById('gameOverlay');
            const finalScoreSpan = document.getElementById('finalScore');
            const finalBestSpan = document.getElementById('finalBest');
            const restartBtn = document.getElementById('restartBtn');
            const restartTopBtn = document.getElementById('restartTopBtn');

            const GROUND_H = 80;
            const NAILONG_W = 60;
            const NAILONG_H = 65;
            const LIGHT_W = 32;
            const LIGHT_H = 36;
            const CLOUD_W = 75;
            const CLOUD_H = 42;
            const SPEED_X = 7;
            const BASE_GAME_SPEED = 3;
            const LIGHT_INTERVAL_MS = 1100;
            const CLOUD_INTERVAL_MS = 2200;
            const MAX_SPEED = 9;
            const SPEED_INCREASE_PER_SCORE = 0.04;

            let x = 80;
            let y = GROUND_H;
            let score = 0;
            let maxScore = parseInt(localStorage.getItem('nailongMax'), 10) || 0;
            let gameRun = false;
            let gameSpeed = BASE_GAME_SPEED;
            let animId = null;
            let lastTimestamp = 0;

            let lightList = [];
            let cloudList = [];

            const key = { left: false, right: false };

            let lastLightTime = 0;
            let lastCloudTime = 0;

            let gameW = game.offsetWidth;
            let gameH = game.offsetHeight;

            function setNailongPos(px, py) {
                nailong.style.transform = 'translate3d(' + px + 'px, ' + (-py) + 'px, 0)';
            }

            function setElPos(el, px, py) {
                el.style.transform = 'translate3d(' + px + 'px, ' + py + 'px, 0)';
            }

            function showScorePopup(px, py) {
                const popup = document.createElement('div');
                popup.className = 'score-popup';
                popup.textContent = '+10';
                popup.style.left = px + 'px';
                popup.style.top = py + 'px';
                game.appendChild(popup);
                setTimeout(function() {
                    if (popup.parentNode) popup.remove();
                }, 650);
            }

            function isCrash(objX, objY, objW, objH) {
                const nx = x;
                const ny = gameH - y - NAILONG_H;
                return nx < objX + objW && nx + NAILONG_W > objX &&
                    ny < objY + objH && ny + NAILONG_H > objY;
            }

            function updateScoreUI() {
                scoreSpan.textContent = score;
                if (score > maxScore) {
                    maxScore = score;
                    localStorage.setItem('nailongMax', maxScore);
                    maxScoreSpan.textContent = maxScore;
                }
            }

            function createLight() {
                if (!gameRun) return;
                const el = document.createElement('div');
                el.className = 'light';
                el.textContent = '⚡';
                const top = Math.random() * 260 + 60;
                el.style.left = '0px';
                el.style.top = '0px';
                setElPos(el, gameW, top);
                game.appendChild(el);
                lightList.push({ dom: el, x: gameW, top: top, w: LIGHT_W, h: LIGHT_H });
            }

            function createCloud() {
                if (!gameRun) return;
                const el = document.createElement('div');
                el.className = 'cloud';
                const top = Math.random() * 220 + 40;
                el.style.left = '0px';
                el.style.top = '0px';
                setElPos(el, gameW, top);
                game.appendChild(el);
                cloudList.push({ dom: el, x: gameW, top: top, w: CLOUD_W, h: CLOUD_H });
            }

            function gameOver() {
                if (!gameRun) return;
                gameRun = false;
                if (score > maxScore) {
                    maxScore = score;
                    localStorage.setItem('nailongMax', maxScore);
                }
                maxScoreSpan.textContent = maxScore;
                finalScoreSpan.textContent = score;
                finalBestSpan.textContent = maxScore;
                overlay.classList.add('show');
            }

            function restartGame() {
                overlay.classList.remove('show');

                for (let i = 0; i < lightList.length; i++) {
                    if (lightList[i].dom.parentNode) lightList[i].dom.remove();
                }
                for (let i = 0; i < cloudList.length; i++) {
                    if (cloudList[i].dom.parentNode) cloudList[i].dom.remove();
                }
                lightList = [];
                cloudList = [];

                x = 80;
                y = GROUND_H;
                score = 0;
                gameSpeed = BASE_GAME_SPEED;
                key.left = false;
                key.right = false;
                lastLightTime = 0;
                lastCloudTime = 0;
                lastTimestamp = 0;

                setNailongPos(x, y);
                updateScoreUI();
                scoreSpan.textContent = '0';

                if (!gameRun) {
                    gameRun = true;
                    if (animId) cancelAnimationFrame(animId);
                    animId = requestAnimationFrame(loop);
                } else {
                    gameRun = true;
                }
            }

            function loop(timestamp) {
                if (!gameRun) {
                    animId = null;
                    return;
                }

                if (lastTimestamp === 0) {
                    lastTimestamp = timestamp;
                    lastLightTime = timestamp;
                    lastCloudTime = timestamp;
                }

                var dt = Math.min(timestamp - lastTimestamp, 40);
                lastTimestamp = timestamp;

                var newW = game.offsetWidth;
                var newH = game.offsetHeight;
                if (newW !== gameW || newH !== gameH) {
                    gameW = newW;
                    gameH = newH;
                }

                var speedBoost = Math.min(score / 10 * SPEED_INCREASE_PER_SCORE, MAX_SPEED - BASE_GAME_SPEED);
                gameSpeed = BASE_GAME_SPEED + speedBoost;

                if (timestamp - lastLightTime >= LIGHT_INTERVAL_MS) {
                    createLight();
                    lastLightTime = timestamp;
                }
                if (timestamp - lastCloudTime >= CLOUD_INTERVAL_MS) {
                    createCloud();
                    lastCloudTime = timestamp;
                }

                if (key.left && x > 0) x -= SPEED_X;
                if (key.right && x < gameW - NAILONG_W) x += SPEED_X;

                setNailongPos(x, y);

                var step = gameSpeed * (dt / 16.667);
                for (var i = lightList.length - 1; i >= 0; i--) {
                    var item = lightList[i];
                    item.x -= step;
                    setElPos(item.dom, item.x, item.top);

                    if (isCrash(item.x, item.top, item.w, item.h)) {
                        score += 10;
                        updateScoreUI();
                        var popX = item.x + 4;
                        var popY = item.top - 10;
                        showScorePopup(popX, popY);
                        if (item.dom.parentNode) item.dom.remove();
                        lightList.splice(i, 1);
                        continue;
                    }
                    if (item.x < -40) {
                        if (item.dom.parentNode) item.dom.remove();
                        lightList.splice(i, 1);
                    }
                }

                for (var j = cloudList.length - 1; j >= 0; j--) {
                    var c = cloudList[j];
                    c.x -= step;
                    setElPos(c.dom, c.x, c.top);

                    if (isCrash(c.x, c.top, c.w, c.h)) {
                        gameOver();
                        animId = null;
                        return;
                    }
                    if (c.x < -80) {
                        if (c.dom.parentNode) c.dom.remove();
                        cloudList.splice(j, 1);
                    }
                }

                animId = requestAnimationFrame(loop);
            }

            function onKeyDown(e) {
                if (e.code === 'ArrowLeft') { key.left = true;
                    e.preventDefault(); }
                if (e.code === 'ArrowRight') { key.right = true;
                    e.preventDefault(); }
            }

            function onKeyUp(e) {
                if (e.code === 'ArrowLeft') { key.left = false;
                    e.preventDefault(); }
                if (e.code === 'ArrowRight') { key.right = false;
                    e.preventDefault(); }
            }

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            function handleMove(e) {
                if (e.target && (e.target.closest('#gameOverlay') || e.target.closest('.btn-box') || e.target.closest(
                        '.overlay-btn') || e.target.id === 'restartTopBtn')) {
                    return;
                }
                if (!gameRun) return;

                const rect = game.getBoundingClientRect();
                let clientX;
                if (e.type === 'touchstart' || e.type === 'touchmove') {
                    clientX = e.touches[0].clientX;
                    e.preventDefault();
                } else {
                    clientX = e.clientX;
                }

                const relativeX = clientX - rect.left;
                const targetX = relativeX - NAILONG_W / 2;
                x = Math.max(0, Math.min(gameW - NAILONG_W, targetX));
                setNailongPos(x, y);
            }

            game.addEventListener('click', handleMove);
            game.addEventListener('touchstart', handleMove, { passive: false });
            game.addEventListener('touchmove', handleMove, { passive: false });

            function onRestart() {
                restartGame();
            }
            restartBtn.addEventListener('click', onRestart);
            restartTopBtn.addEventListener('click', onRestart);

            function onResize() {
                gameW = game.offsetWidth;
                gameH = game.offsetHeight;
                if (x + NAILONG_W > gameW) {
                    x = gameW - NAILONG_W;
                    setNailongPos(x, y);
                }
            }
            window.addEventListener('resize', onResize);

            function onVisibilityChange() {
                if (document.hidden && gameRun) {
                    if (animId) {
                        cancelAnimationFrame(animId);
                        animId = null;
                    }
                } else if (!document.hidden && gameRun && !animId) {
                    lastTimestamp = 0;
                    animId = requestAnimationFrame(loop);
                }
            }
            document.addEventListener('visibilitychange', onVisibilityChange);

            maxScoreSpan.textContent = maxScore;
            setNailongPos(x, y);
            gameRun = true;
            animId = requestAnimationFrame(loop);

            window.restartGame = restartGame;

            window.addEventListener('beforeunload', function() {
                if (animId) cancelAnimationFrame(animId);
                animId = null;
                gameRun = false;
            });

        })();
    </script>
</body>
</html>
