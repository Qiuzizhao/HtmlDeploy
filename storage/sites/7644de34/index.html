<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D我的世界小游戏</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #87CEEB; }
        canvas { display: block; }
        
        /* UI样式 */
        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-family: Arial, sans-serif;
            text-shadow: 1px 1px 2px black;
            z-index: 100;
        }
        
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
        
        .hotbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            z-index: 100;
        }
        
        .hotbar-slot {
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #666;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }
        
        .hotbar-slot.active {
            border-color: white;
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="ui">
        <div>WASD移动 | 鼠标视角 | 左键破坏 | 右键放置 | 滚轮切换物品</div>
    </div>
    <div class="crosshair">+</div>
    <div class="hotbar" id="hotbar"></div>

    <script>
        // 基础场景设置
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 鼠标控制
        let mouseX = 0, mouseY = 0;
        let pitch = 0, yaw = 0;
        const sensitivity = 0.002;
        let pointerLocked = false;

        // 玩家状态
        const player = {
            x: 0, y: 2, z: 0,
            velocityY: 0,
            onGround: false,
            speed: 0.15,
            health: 20
        };

        // 世界与方块
        const world = new Map();
        const blockTypes = {
            grass: { color: 0x3A5F37, name: "草方块" },
            dirt: { color: 0x8B4513, name: "泥土" },
            stone: { color: 0x808080, name: "石头" },
            wood: { color: 0xA0522D, name: "木头" },
            leaves: { color: 0x228B22, name: "树叶" }
        };

        // 物品栏 & 背包
        const hotbarSlots = [
            { type: "sword", name: "木剑", damage: 2 },
            { type: "grass", name: "草方块" },
            { type: "dirt", name: "泥土" },
            { type: "stone", name: "石头" },
            { type: "wood", name: "木头" },
            { type: "leaves", name: "树叶" }
        ];
        let selectedSlot = 0;

        // 怪物列表
        const mobs = [];
        const mobCount = 8;

        // 键盘控制
        const keys = {};
        document.addEventListener("keydown", e => keys[e.code] = true);
        document.addEventListener("keyup", e => keys[e.code] = false);

        // 鼠标锁定
        document.addEventListener("click", () => {
            if(!pointerLocked) document.body.requestPointerLock();
        });
        document.addEventListener("pointerlockchange", () => {
            pointerLocked = document.pointerLockElement === document.body;
        });

        // 鼠标视角
        document.addEventListener("mousemove", e => {
            if(!pointerLocked) return;
            yaw += e.movementX * sensitivity;
            pitch += e.movementY * sensitivity;
            pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
        });

        // 破坏/放置
        document.addEventListener("mousedown", e => {
            if(!pointerLocked) return;
            if(e.button === 0) breakBlock(); // 左键破坏
            if(e.button === 2) placeBlock(); // 右键放置
        });

        // 滚轮切换物品
        document.addEventListener("wheel", e => {
            selectedSlot = (selectedSlot + (e.deltaY > 0 ? 1 : -1) + hotbarSlots.length) % hotbarSlots.length;
            updateHotbar();
        });

        // 禁止右键菜单
        document.addEventListener("contextmenu", e => e.preventDefault());

        // 创建方块
        function createBlock(x, y, z, type) {
            const geometry = new THREE.BoxGeometry(1,1,1);
            const material = new THREE.MeshLambertMaterial({ color: blockTypes[type].color });
            const block = new THREE.Mesh(geometry, material);
            block.position.set(x, y, z);
            block.castShadow = true;
            block.receiveShadow = true;
            block.userData = { type, x, y, z };
            scene.add(block);
            world.set(`${x},${y},${z}`, block);
            return block;
        }

        // 创建地面
        function generateWorld() {
            for(let x = -20; x <= 20; x++) {
                for(let z = -20; z <= 20; z++) {
                    createBlock(x, 0, z, "grass");
                }
            }
        }

        // 创建怪物（弱怪）
        function createMob(x, z) {
            const geometry = new THREE.BoxGeometry(0.8,1.8,0.8);
            const material = new THREE.MeshLambertMaterial({ color: 0xFF6347 });
            const mob = new THREE.Mesh(geometry, material);
            mob.position.set(x, 1, z);
            mob.castShadow = true;
            mob.userData = { health: 5, speed: 0.03, attack: 1 };
            scene.add(mob);
            mobs.push(mob);
        }

        // 生成怪物
        function spawnMobs() {
            for(let i = 0; i < mobCount; i++) {
                const x = (Math.random() - 0.5) * 30;
                const z = (Math.random() - 0.5) * 30;
                createMob(x, z);
            }
        }

        // 射线检测
        function raycast() {
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            const raycaster = new THREE.Raycaster(camera.position, dir, 0, 5);
            return raycaster.intersectObjects(Array.from(world.values()));
        }

        // 破坏方块
        function breakBlock() {
            const intersects = raycast();
            if(intersects.length > 0) {
                const block = intersects[0].object;
                world.delete(`${block.userData.x},${block.userData.y},${block.userData.z}`);
                scene.remove(block);
            }
        }

        // 放置方块
        function placeBlock() {
            const item = hotbarSlots[selectedSlot];
            if(!blockTypes[item.type]) return;
            
            const intersects = raycast();
            if(intersects.length > 0) {
                const pos = intersects[0].object.position.clone();
                const norm = intersects[0].face.normal.clone();
                norm.transformDirection(intersects[0].object.matrixWorld);
                pos.add(norm);
                
                if(!world.has(`${pos.x},${pos.y},${pos.z}`)) {
                    createBlock(pos.x, pos.y, pos.z, item.type);
                }
            }
        }

        // 更新物品栏UI
        function updateHotbar() {
            const hotbar = document.getElementById("hotbar");
            hotbar.innerHTML = "";
            hotbarSlots.forEach((slot, i) => {
                const div = document.createElement("div");
                div.className = "hotbar-slot" + (i === selectedSlot ? " active" : "");
                div.textContent = slot.name;
                hotbar.appendChild(div);
            });
        }

        // 移动逻辑
        function updatePlayer() {
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            dir.y = 0;
            dir.normalize();
            
            const right = new THREE.Vector3();
            right.crossVectors(dir, new THREE.Vector3(0,1,0)).normalize();
            
            player.velocityY -= 0.008; // 重力
            
            // WASD移动
            if(keys["KeyW"]) player.x += dir.x * player.speed, player.z += dir.z * player.speed;
            if(keys["KeyS"]) player.x -= dir.x * player.speed, player.z -= dir.z * player.speed;
            if(keys["KeyA"]) player.x -= right.x * player.speed, player.z -= right.z * player.speed;
            if(keys["KeyD"]) player.x += right.x * player.speed, player.z += right.z * player.speed;
            
            // 跳跃
            if(keys["Space"] && player.onGround) {
                player.velocityY = 0.2;
                player.onGround = false;
            }
            
            // 地面碰撞
            if(player.y <= 2) {
                player.y = 2;
                player.velocityY = 0;
                player.onGround = true;
            }
            
            player.y += player.velocityY;
            camera.position.set(player.x, player.y, player.z);
        }

        // 怪物AI
        function updateMobs() {
            mobs.forEach(mob => {
                const dx = player.x - mob.position.x;
                const dz = player.z - mob.position.z;
                const dist = Math.hypot(dx, dz);
                
                if(dist > 2) {
                    mob.position.x += (dx / dist) * mob.userData.speed;
                    mob.position.z += (dz / dist) * mob.userData.speed;
                }
            });
        }

        // 光照
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        scene.add(sun);

        // 初始化
        generateWorld();
        spawnMobs();
        updateHotbar();

        // 渲染循环
        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.set(pitch, yaw, 0);
            updatePlayer();
            updateMobs();
            renderer.render(scene, camera);
        }
        animate();

        // 窗口适配
        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
