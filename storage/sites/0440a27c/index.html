<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>原创精灵大陆-宠物对战</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{background:#87CEEB;padding:20px}
        .box{max-width:700px;margin:0 auto;background:#fff;padding:20px;border-radius:10px}
        .pet-box{display:flex;justify-content:space-around;margin:30px 0}
        .pet{text-align:center;border:1px solid #ccc;padding:15px;border-radius:8px;width:220px}
        .hp{height:12px;background:#eee;border-radius:6px;margin:8px 0}
        .hp-inner{height:100%;background:#2ecc71;border-radius:6px}
        .btn-group{text-align:center}
        button{padding:8px 16px;margin:0 5px;cursor:pointer;border:none;background:#3498db;color:#fff;border-radius:5px}
        #log{margin-top:20px;border:1px solid #eee;padding:10px;height:150px;overflow:auto}
    </style>
</head>
<body>
<div class="box">
    <h2 align="center">原创精灵回合对战</h2>
    <div class="pet-box">
        <div class="pet">
            <h3>焰毛兽(我方)</h3>
            <p>血量:<span id="myHp">100</span>/100</p>
            <div class="hp"><div class="hp-inner" id="myHpBar" style="width:100%"></div></div>
        </div>
        <div class="pet">
            <h3>叶尾蜥(敌方)</h3>
            <p>血量:<span id="enHp">100</span>/100</p>
            <div class="hp"><div class="hp-inner" id="enHpBar" style="width:100%"></div></div>
        </div>
    </div>
    <div class="btn-group">
        <button onclick="attack()">使用技能【火焰冲击】</button>
        <button onclick="resetGame()">重新开局</button>
    </div>
    <div id="log">战斗日志：</div>
</div>

<script>
// 宠物血量数据
let myHP = 100, enHP = 100;
const logDom = document.getElementById('log');
const myHpDom = document.getElementById('myHp');
const enHpDom = document.getElementById('enHp');
const myBar = document.getElementById('myHpBar');
const enBar = document.getElementById('enHpBar');

// 我方攻击
function attack(){
    //我方伤害15~25随机
    let dmg = Math.floor(Math.random()*11)+15;
    enHP -= dmg;
    if(enHP<0) enHP=0;
    logDom.innerHTML += `<br>焰毛兽发动火焰冲击，造成${dmg}点伤害！`;
    refreshHp();
    if(enHP<=0){
        logDom.innerHTML += '<br>敌方叶尾蜥战败！战斗胜利！';
        return;
    }
    //敌方反击
    let edmg = Math.floor(Math.random()*9)+12;
    myHP -= edmg;
    if(myHP<0) myHP=0;
    logDom.innerHTML += `<br>叶尾蜥反击，造成${edmg}点伤害！`;
    refreshHp();
    if(myHP<=0){
        logDom.innerHTML += '<br>我方焰毛兽战败，战斗失败！';
    }
    logDom.scrollTop = logDom.scrollHeight;
}

//刷新血条
function refreshHp(){
    myHpDom.innerText = myHP;
    enHpDom.innerText = enHP;
    myBar.style.width = myHP+'%';
    enBar.style.width = enHP+'%';
    //残血变色
    enBar.style.background = enHP<30?'#e74c3c':'#2ecc71';
    myBar.style.background = myHP<30?'#e74c3c':'#2ecc71';
}

//重置游戏
function resetGame(){
    myHP=100;enHP=100;
    logDom.innerHTML='战斗日志：';
    refreshHp();
}
</script>
</body>
</html>
