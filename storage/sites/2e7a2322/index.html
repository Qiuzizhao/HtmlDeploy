<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>猜数字小游戏</title>
    <style>
        body { text-align: center; margin-top: 100px; font-size: 20px; }
        input { padding: 8px; font-size: 18px; width: 150px; }
        button { padding: 8px 20px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>猜数字游戏（1 - 100）</h2>
    <p id="tip">请输入你猜测的数字：</p>
    <input type="number" id="numInput" placeholder="输入数字">
    <br><br>
    <button onclick="guess()">提交猜测</button>
    <p id="count">猜测次数：0</p>

    <script>
        // 生成 1~100 随机数
        const target = Math.floor(Math.random() * 100) + 1;
        let count = 0;

        function guess() {
            let input = document.getElementById('numInput');
            let num = parseInt(input.value);
            let tip = document.getElementById('tip');
            let countDom = document.getElementById('count');

            if (isNaN(num)) {
                tip.innerText = "请输入合法数字！";
                return;
            }

            count++;
            countDom.innerText = `猜测次数：${count}`;

            if (num > target) {
                tip.innerText = "猜大了！再试试更小的数";
            } else if (num < target) {
                tip.innerText = "猜小了！再试试更大的数";
            } else {
                tip.innerText = `恭喜你猜对啦！答案就是 ${target}，一共猜了 ${count} 次`;
            }
        }
    </script>
</body>
</html>
