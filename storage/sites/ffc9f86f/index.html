<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中超联赛模拟器 2025</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #0d2b1a 0%, #1a5c2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 28px 30px 30px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 215, 0, 0.15);
        }
        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px 20px;
            margin-bottom: 22px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .logo-icon {
            font-size: 38px;
            line-height: 1;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.3));
        }
        .title h1 {
            font-size: 26px;
            font-weight: 700;
            color: #ffd700;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.2);
        }
        .title .sub {
            font-size: 13px;
            color: #a8d5b0;
            letter-spacing: 1px;
            margin-top: 2px;
            display: block;
        }
        .season-info {
            background: rgba(255, 215, 0, 0.12);
            padding: 8px 20px;
            border-radius: 60px;
            color: #ffd700;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid rgba(255, 215, 0, 0.2);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .season-info span {
            color: #fff;
            font-weight: 400;
        }
        /* 主体布局 */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 22px;
        }
        @media (max-width: 860px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 18px 14px 20px;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .header-left {
                justify-content: center;
            }
            .season-info {
                justify-content: center;
            }
        }
        /* 积分榜 */
        .table-wrapper {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 18px;
            padding: 16px 14px 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            overflow-x: auto;
        }
        .table-wrapper h2 {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
        }
        .table-wrapper h2 small {
            font-size: 13px;
            font-weight: 400;
            color: #b8d8c0;
            letter-spacing: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 620px;
        }
        thead th {
            background: rgba(255, 215, 0, 0.12);
            color: #ffd700;
            font-weight: 600;
            padding: 10px 6px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 215, 0, 0.15);
            white-space: nowrap;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        thead th:first-child {
            border-radius: 8px 0 0 0;
            padding-left: 10px;
        }
        thead th:last-child {
            border-radius: 0 8px 0 0;
            padding-right: 10px;
        }
        tbody td {
            padding: 8px 6px;
            text-align: center;
            color: #e8f0e8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.2s;
            white-space: nowrap;
        }
        tbody tr:hover td {
            background: rgba(255, 215, 0, 0.04);
        }
        tbody tr:last-child td {
            border-bottom: none;
        }
        .rank-num {
            font-weight: 700;
            color: #ffd700;
            width: 32px;
            display: inline-block;
            text-align: center;
        }
        .rank-1 {
            color: #ff6b35;
        }
        .rank-2 {
            color: #ffb347;
        }
        .rank-3 {
            color: #4fc3f7;
        }
        .team-name {
            font-weight: 600;
            text-align: left !important;
            padding-left: 8px !important;
            color: #fff;
            min-width: 80px;
        }
        .team-name .emoji {
            margin-right: 6px;
            opacity: 0.7;
        }
        .gd-positive {
            color: #66e07d;
        }
        .gd-negative {
            color: #ff7a7a;
        }
        .gd-zero {
            color: #b0b0b0;
        }
        .points-cell {
            font-weight: 700;
            font-size: 16px;
            color: #ffd700 !important;
        }
        /* 右侧面板 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        /* 按钮组 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.06);
            color: #d4e8d4;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            user-select: none;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
        }
        .btn:active:not(:disabled) {
            transform: translateY(0px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2e7d4e, #1a5c2a);
            color: #fff;
            border-color: rgba(255, 215, 0, 0.2);
        }
        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #3a9260, #2a7a3a);
        }
        .btn-gold {
            background: linear-gradient(135deg, #e6b800, #cc9a00);
            color: #1a2a1a;
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.15);
        }
        .btn-gold:hover:not(:disabled) {
            background: linear-gradient(135deg, #ffcc00, #e6b800);
            box-shadow: 0 8px 24px rgba(255, 215, 0, 0.25);
        }
        .btn-danger {
            background: rgba(180, 60, 60, 0.25);
            color: #ff9999;
            border-color: rgba(255, 100, 100, 0.15);
        }
        .btn-danger:hover:not(:disabled) {
            background: rgba(200, 70, 70, 0.35);
        }
        .btn .icon {
            font-size: 18px;
        }
        /* 日志 */
        .log-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 12px 14px 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 180px;
            max-height: 320px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .log-panel h3 {
            color: #b8d8c0;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .log-panel h3 .badge {
            font-size: 11px;
            background: rgba(255, 215, 0, 0.12);
            padding: 0 10px;
            border-radius: 30px;
            color: #ffd700;
            font-weight: 400;
        }
        .log-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            min-height: 100px;
            max-height: 240px;
        }
        .log-area::-webkit-scrollbar {
            width: 4px;
        }
        .log-area::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }
        .log-area::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.2);
            border-radius: 10px;
        }
        .log-entry {
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 13px;
            color: #d0e0d0;
            margin-bottom: 3px;
            line-height: 1.5;
            border-left: 3px solid rgba(255, 215, 0, 0.1);
            background: rgba(255, 255, 255, 0.02);
            animation: fadeIn 0.3s ease;
        }
        .log-entry .log-round {
            color: #ffd700;
            font-weight: 600;
            margin-right: 6px;
        }
        .log-entry .log-score {
            color: #fff;
            font-weight: 500;
        }
        .log-entry .log-vs {
            color: #88aa88;
            margin: 0 4px;
        }
        .log-entry.log-info {
            border-left-color: #4fc3f7;
            color: #b0d8f0;
        }
        .log-entry.log-champion {
            border-left-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
            color: #ffd700;
            font-weight: 600;
            font-size: 15px;
        }
        .log-entry.log-reset {
            border-left-color: #ff7a7a;
            color: #ffb0b0;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .log-empty {
            color: #6a8a6a;
            font-size: 13px;
            padding: 20px 8px;
            text-align: center;
            font-style: italic;
        }
        /* 状态条 */
        .status-bar {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 13px;
            color: #8ab08a;
        }
        .status-bar .progress {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-bar .progress .bar-bg {
            width: 120px;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
        }
        .status-bar .progress .bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffd700, #ffb300);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .status-bar .matches-count {
            color: #b8d8c0;
        }
        .status-bar .matches-count strong {
            color: #fff;
            font-weight: 600;
        }
        /* 响应式调整 */
        @media (max-width: 480px) {
            .title h1 {
                font-size: 20px;
            }
            .logo-icon {
                font-size: 28px;
            }
            .btn {
                font-size: 14px;
                padding: 10px 14px;
            }
            table {
                font-size: 12px;
                min-width: 480px;
            }
            thead th,
            tbody td {
                padding: 6px 4px;
            }
            .team-name {
                min-width: 60px;
                font-size: 12px;
            }
            .season-info {
                font-size: 13px;
                padding: 6px 14px;
            }
            .log-entry {
                font-size: 12px;
                padding: 4px 6px;
            }
        }
        @media (max-width: 380px) {
            table {
                min-width: 360px;
                font-size: 11px;
            }
            thead th,
            tbody td {
                padding: 4px 2px;
            }
            .team-name {
                min-width: 48px;
                font-size: 11px;
                padding-left: 4px !important;
            }
            .rank-num {
                width: 22px;
            }
        }
        /* 辅助 */
        .text-center {
            text-align: center;
        }
        .mt-1 {
            margin-top: 6px;
        }
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <!-- 头部 -->
        <header class="header">
            <div class="header-left">
                <div class="logo-icon">⚽</div>
                <div class="title">
                    <h1>中超联赛模拟器 <span style="font-weight:300;font-size:22px;color:#c8e0c8;">2025</span></h1>
                    <span class="sub">🏆 中国足球协会超级联赛 · 16支球队 · 群雄逐鹿</span>
                </div>
            </div>
            <div class="season-info">
                📅 赛季进度 <span id="roundDisplay">第 0 轮</span> <span style="color:#8ab08a;font-weight:400;">/ 30</span>
            </div>
        </header>

        <!-- 主网格 -->
        <div class="main-grid">
            <!-- 积分榜 -->
            <div class="table-wrapper">
                <h2>
                    🏆 积分榜
                    <small id="tableSub">— 初始状态</small>
                </h2>
                <div id="tableContainer">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:38px;">#</th>
                                <th style="text-align:left;padding-left:10px;">球队</th>
                                <th>场次</th>
                                <th>胜</th>
                                <th>平</th>
                                <th>负</th>
                                <th>进球</th>
                                <th>失球</th>
                                <th>净胜</th>
                                <th style="color:#ffd700;">积分</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- 由 JS 渲染 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 右侧面板 -->
            <div class="right-panel">
                <!-- 按钮 -->
                <div class="btn-group">
                    <button class="btn btn-gold" id="btnRound" title="随机配对所有球队，模拟一轮比赛">
                        <span class="icon">🎮</span> 模拟一轮
                    </button>
                    <button class="btn btn-primary" id="btnSeason" title="连续模拟 30 轮完整赛季">
                        <span class="icon">🏁</span> 模拟完整赛季
                    </button>
                    <button class="btn btn-danger" id="btnReset" title="重置所有数据，开始新赛季">
                        <span class="icon">🔄</span> 重置赛季
                    </button>
                </div>

                <!-- 日志 -->
                <div class="log-panel">
                    <h3>
                        📋 比赛日志
                        <span class="badge" id="logCount">0</span>
                    </h3>
                    <div class="log-area" id="logArea">
                        <div class="log-empty">⚽ 点击「模拟一轮」开始精彩对决</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="progress">
                <span>📊 赛季进度</span>
                <div class="bar-bg">
                    <div class="bar-fill" id="progressFill" style="width:0%;"></div>
                </div>
                <span id="progressText">0%</span>
            </div>
            <div class="matches-count">
                ⚡ 已赛 <strong id="totalMatches">0</strong> 场
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===================== 1. 球队数据 =====================
            const INITIAL_TEAMS = [
                { name: "上海海港", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "山东泰山", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "成都蓉城", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "上海申花", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "浙江队", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "武汉三镇", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "北京国安", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "天津津门虎", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "长春亚泰", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "河南队", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "梅州客家", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "大连英博", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "青岛海牛", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "青岛西海岸", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "深圳新鹏城", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 },
                { name: "云南玉昆", wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, points: 0 }
            ];

            // ===================== 2. 状态 =====================
            let teams = [];
            let currentRound = 0;
            let totalMatches = 0;
            let logs = [];
            let isSimulating = false;
            let seasonTimer = null;
            let seasonRoundIndex = 0;

            // DOM 引用
            const tbody = document.getElementById('tableBody');
            const logArea = document.getElementById('logArea');
            const logCount = document.getElementById('logCount');
            const roundDisplay = document.getElementById('roundDisplay');
            const totalMatchesEl = document.getElementById('totalMatches');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const tableSub = document.getElementById('tableSub');

            const btnRound = document.getElementById('btnRound');
            const btnSeason = document.getElementById('btnSeason');
            const btnReset = document.getElementById('btnReset');

            // ===================== 3. 核心函数 =====================

            // 深拷贝球队数据
            function cloneTeams(src) {
                return src.map(t => ({ ...t }));
            }

            // 重置赛季
            function resetSeason() {
                if (isSimulating) return;
                teams = cloneTeams(INITIAL_TEAMS);
                currentRound = 0;
                totalMatches = 0;
                logs = [];
                renderTable();
                updateUIStats();
                renderLogs();
                logArea.innerHTML = '<div class="log-empty">⚽ 赛季已重置，点击「模拟一轮」开始新征程</div>';
                logCount.textContent = '0';
                if (tableSub) tableSub.textContent = '— 新赛季';
                clearSeasonTimer();
                enableButtons(true);
            }

            // 模拟单场比赛
            function simulateMatch(home, away) {
                const homeGoals = Math.floor(Math.random() * 4); // 0-3
                const awayGoals = Math.floor(Math.random() * 4);

                home.goalsFor += homeGoals;
                home.goalsAgainst += awayGoals;
                away.goalsFor += awayGoals;
                away.goalsAgainst += homeGoals;

                if (homeGoals > awayGoals) {
                    home.wins += 1;
                    away.losses += 1;
                    home.points += 3;
                } else if (homeGoals < awayGoals) {
                    away.wins += 1;
                    home.losses += 1;
                    away.points += 3;
                } else {
                    home.draws += 1;
                    away.draws += 1;
                    home.points += 1;
                    away.points += 1;
                }

                totalMatches++;
                return { home, away, homeGoals, awayGoals };
            }

            // 模拟一轮（随机配对）
            function simulateRound() {
                if (isSimulating) return [];
                const shuffled = [...teams];
                // Fisher-Yates 洗牌
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                const results = [];
                for (let i = 0; i < shuffled.length; i += 2) {
                    if (i + 1 < shuffled.length) {
                        const res = simulateMatch(shuffled[i], shuffled[i + 1]);
                        results.push(res);
                    }
                }
                currentRound++;
                return results;
            }

            // 获取排序后的球队（积分→净胜球→进球）
            function getSortedTeams() {
                return [...teams].sort((a, b) => {
                    if (b.points !== a.points) return b.points - a.points;
                    const gdA = a.goalsFor - a.goalsAgainst;
                    const gdB = b.goalsFor - b.goalsAgainst;
                    if (gdB !== gdA) return gdB - gdA;
                    return b.goalsFor - a.goalsFor;
                });
            }

            // ===================== 4. 渲染 =====================

            function renderTable() {
                const sorted = getSortedTeams();
                let html = '';
                sorted.forEach((team, idx) => {
                    const rank = idx + 1;
                    const played = team.wins + team.draws + team.losses;
                    const gd = team.goalsFor - team.goalsAgainst;
                    let gdClass = 'gd-zero';
                    if (gd > 0) gdClass = 'gd-positive';
                    else if (gd < 0) gdClass = 'gd-negative';

                    let rankClass = 'rank-num';
                    if (rank === 1) rankClass += ' rank-1';
                    else if (rank === 2) rankClass += ' rank-2';
                    else if (rank === 3) rankClass += ' rank-3';

                    const emojiMap = {
                        '上海海港': '⚓',
                        '山东泰山': '⛰️',
                        '成都蓉城': '🐼',
                        '上海申花': '🌸',
                        '浙江队': '🌊',
                        '武汉三镇': '🏯',
                        '北京国安': '🏛️',
                        '天津津门虎': '🐯',
                        '长春亚泰': '🏔️',
                        '河南队': '🌾',
                        '梅州客家': '🏘️',
                        '大连英博': '⚓',
                        '青岛海牛': '🐂',
                        '青岛西海岸': '🌅',
                        '深圳新鹏城': '🦅',
                        '云南玉昆': '🌺'
                    };
                    const emoji = emojiMap[team.name] || '⚽';

                    html += `<tr>
                        <td><span class="${rankClass}">${rank}</span></td>
                        <td class="team-name"><span class="emoji">${emoji}</span>${team.name}</td>
                        <td>${played}</td>
                        <td>${team.wins}</td>
                        <td>${team.draws}</td>
                        <td>${team.losses}</td>
                        <td>${team.goalsFor}</td>
                        <td>${team.goalsAgainst}</td>
                        <td class="${gdClass}">${gd > 0 ? '+' + gd : gd}</td>
                        <td class="points-cell">${team.points}</td>
                    </tr>`;
                });
                tbody.innerHTML = html;

                // 更新副标题
                if (currentRound === 0) {
                    tableSub.textContent = '— 赛季尚未开始';
                } else if (currentRound >= 30) {
                    tableSub.textContent = '— 🎉 赛季完结';
                } else {
                    tableSub.textContent = `— 第 ${currentRound} / 30 轮`;
                }
            }

            function renderLogs() {
                // 只渲染最新的日志（保留所有日志在数组中，但DOM只显示最近50条）
                const recentLogs = logs.slice(-60);
                if (recentLogs.length === 0) {
                    logArea.innerHTML = '<div class="log-empty">⚽ 暂无比赛记录</div>';
                    logCount.textContent = '0';
                    return;
                }
                let html = '';
                for (const entry of recentLogs) {
                    let cls = 'log-entry';
                    if (entry.type === 'info') cls += ' log-info';
                    else if (entry.type === 'champion') cls += ' log-champion';
                    else if (entry.type === 'reset') cls += ' log-reset';
                    else if (entry.type === 'round-title') cls += ' log-info';
                    html += `<div class="${cls}">${entry.text}</div>`;
                }
                logArea.innerHTML = html;
                logCount.textContent = logs.length;
                // 自动滚动到底部
                logArea.scrollTop = logArea.scrollHeight;
            }

            function updateUIStats() {
                roundDisplay.textContent = `第 ${currentRound} 轮`;
                totalMatchesEl.textContent = totalMatches;
                const pct = Math.min(100, Math.round((currentRound / 30) * 100));
                progressFill.style.width = pct + '%';
                progressText.textContent = pct + '%';
            }

            // ===================== 5. 添加日志 =====================

            function addLog(text, type) {
                logs.push({ text, type: type || 'normal' });
                renderLogs();
            }

            function addRoundLogs(results, roundNum) {
                addLog(`📅 ── 第 ${roundNum} 轮 ──`, 'round-title');
                for (const r of results) {
                    const text = `${r.home.name} ${r.homeGoals} - ${r.awayGoals} ${r.away.name}`;
                    addLog(`⚽ ${text}`, 'normal');
                }
                // 本轮结束后显示积分榜变化提示
                const sorted = getSortedTeams();
                const leader = sorted[0];
                addLog(`📊 本轮结束，榜首：${leader.name}（${leader.points}分）`, 'info');
            }

            // ===================== 6. 操作函数 =====================

            function doRound() {
                if (isSimulating) return;
                if (currentRound >= 30) {
                    addLog('⛔ 赛季已结束，请重置后继续', 'info');
                    return;
                }
                const results = simulateRound();
                if (results.length === 0) return;
                addRoundLogs(results, currentRound);
                renderTable();
                updateUIStats();
                // 检查是否赛季结束
                if (currentRound >= 30) {
                    const champ = getSortedTeams()[0];
                    addLog(`🏆🎉 赛季结束！冠军：${champ.name}  🎉🏆`, 'champion');
                    tableSub.textContent = '— 🎉 赛季完结';
                }
            }

            function doSeason() {
                if (isSimulating) return;
                if (currentRound >= 30) {
                    addLog('⛔ 赛季已结束，请重置后重新开始', 'info');
                    return;
                }
                if (currentRound > 0) {
                    addLog('🔄 继续模拟剩余轮次...', 'info');
                }

                isSimulating = true;
                enableButtons(false);
                seasonRoundIndex = currentRound + 1;
                addLog('🏁 开始模拟完整赛季...', 'info');

                // 使用定时器逐步模拟，每轮间隔 150ms
                seasonTimer = setInterval(function() {
                    if (currentRound >= 30) {
                        clearSeasonTimer();
                        const champ = getSortedTeams()[0];
                        addLog(`🏆🎉 赛季结束！冠军：${champ.name}  🎉🏆`, 'champion');
                        tableSub.textContent = '— 🎉 赛季完结';
                        enableButtons(true);
                        return;
                    }
                    const results = simulateRound();
                    if (results.length > 0) {
                        addRoundLogs(results, currentRound);
                        renderTable();
                        updateUIStats();
                    }
                    if (currentRound >= 30) {
                        clearSeasonTimer();
                        const champ = getSortedTeams()[0];
                        addLog(`🏆🎉 赛季结束！冠军：${champ.name}  🎉🏆`, 'champion');
                        tableSub.textContent = '— 🎉 赛季完结';
                        enableButtons(true);
                    }
                }, 150);
            }

            function clearSeasonTimer() {
                if (seasonTimer) {
                    clearInterval(seasonTimer);
                    seasonTimer = null;
                }
                isSimulating = false;
            }

            function enableButtons(enabled) {
                const val = enabled ? false : true;
                btnRound.disabled = val;
                btnSeason.disabled = val;
                btnReset.disabled = val;
                if (!enabled) {
                    btnRound.textContent = '⏳ 模拟中...';
                    btnSeason.textContent = '⏳ 模拟中...';
                } else {
                    btnRound.innerHTML = '<span class="icon">🎮</span> 模拟一轮';
                    btnSeason.innerHTML = '<span class="icon">🏁</span> 模拟完整赛季';
                }
            }

            // ===================== 7. 初始化 & 事件绑定 =====================

            function init() {
                resetSeason();

                btnRound.addEventListener('click', doRound);
                btnSeason.addEventListener('click', doSeason);
                btnReset.addEventListener('click', function() {
                    if (isSimulating) return;
                    clearSeasonTimer();
                    resetSeason();
                    addLog('🔄 赛季已重置，一切归零', 'reset');
                });

                // 键盘快捷键支持：1=一轮，2=赛季，3=重置
                document.addEventListener('keydown', function(e) {
                    if (e.key === '1' && !e.ctrlKey && !e.metaKey && !e.altKey) {
                        e.preventDefault();
                        btnRound.click();
                    } else if (e.key === '2' && !e.ctrlKey && !e.metaKey && !e.altKey) {
                        e.preventDefault();
                        btnSeason.click();
                    } else if (e.key === '3' && !e.ctrlKey && !e.metaKey && !e.altKey) {
                        e.preventDefault();
                        btnReset.click();
                    }
                });
            }

            // 页面加载完成后初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
