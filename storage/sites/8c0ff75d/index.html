<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能搜索小游戏 | 大数据检索平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00f2ea',
                        secondary: '#fe2c55',
                        dark: '#121212',
                        light: '#ffffff',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .gradient-text {
                @apply bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary;
            }
            .neon-glow {
                box-shadow: 0 0 15px rgba(0, 242, 234, 0.5), 0 0 30px rgba(254, 44, 85, 0.3);
            }
            .data-wave {
                animation: wave 8s infinite linear;
                background: linear-gradient(90deg, rgba(0,242,234,0.1), rgba(254,44,85,0.1), rgba(0,242,234,0.1));
            }
            .float-animation {
                animation: float 3s ease-in-out infinite;
            }
            .search-animation {
                animation: searchPulse 2s infinite;
            }
        }
        @keyframes wave {0% { background-position: 0 0; } 100% { background-position: 200% 0; }}
        @keyframes float {0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); }}
        @keyframes searchPulse {0%,100% { transform: scale(1); } 50% { transform: scale(1.02); }}
        .hot-item {transition: all 0.3s ease;}
        .hot-item:hover {transform: translateX(5px); background: rgba(0,242,234,0.1);}
    </style>
</head>
<body class="bg-dark text-light min-h-screen flex flex-col">
    <!-- 顶部导航 -->
    <header class="w-full bg-black/80 backdrop-blur-lg fixed top-0 z-50 border-b border-gray-800">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-full bg-gradient-to-r from-primary to-secondary flex items-center justify-center">
                    <i class="fa fa-search text-white text-xl"></i>
                </div>
                <h1 class="text-xl font-bold gradient-text">智能搜索平台</h1>
            </div>
            <div class="hidden md:flex gap-6">
                <span class="hover:text-primary cursor-pointer transition-colors">首页</span>
                <span class="hover:text-primary cursor-pointer transition-colors">大数据</span>
                <span class="hover:text-primary cursor-pointer transition-colors">休闲游戏</span>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="flex-1 container mx-auto px-4 pt-24 pb-16">
        <!-- 搜索核心区 -->
        <section class="max-w-3xl mx-auto mt-10 mb-12">
            <div class="text-center mb-8">
                <h2 class="text-[clamp(1.8rem,4vw,3rem)] font-bold mb-3 gradient-text">
                    全网智能搜索
                </h2>
                <p class="text-gray-400 text-lg mb-8">输入关键词，检索资讯、热点、知识，搭配趣味小游戏</p>
                
                <div class="relative search-animation">
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="请输入你要搜索的内容..."
                        class="w-full px-6 py-4 rounded-full bg-gray-900/70 border border-gray-700 focus:border-primary focus:outline-none text-lg pl-12 pr-16 transition-all"
                        onkeydown="if(event.key==='Enter') doSearch()"
                    >
                    <i class="fa fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
                    <button 
                        onclick="doSearch()"
                        class="absolute right-3 top-1/2 -translate-y-1/2 bg-primary hover:bg-primary/80 text-black font-medium px-4 py-2 rounded-full transition-all"
                    >
                        搜索
                    </button>
                </div>
                <!-- 搜索联想提示 -->
                <div id="tips" class="mt-3 text-gray-500 text-sm">
                    试试：抖音、短视频、大数据、游戏、美食、旅游、学习
                </div>
            </div>
            <!-- 搜索结果展示区域 -->
            <div id="searchResultBox" class="mt-8 bg-gray-900/50 rounded-2xl p-6 border border-gray-800 hidden">
                <h3 class="text-lg font-bold mb-4 flex items-center">
                    <i class="fa fa-file-text-o text-primary mr-2"></i>搜索结果
                </h3>
                <div id="resultList" class="space-y-4"></div>
            </div>
        </section>

        <!-- 抖音大数据面板 -->
        <section class="mb-16">
            <div class="flex flex-col md:flex-row gap-6">
                <div class="md:w-2/3 bg-gray-900/50 rounded-2xl p-6 border border-gray-800">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold">
                            <i class="fa fa-line-chart text-primary mr-2"></i>抖音实时大数据
                        </h3>
                        <span class="text-xs bg-secondary/20 text-secondary px-3 py-1 rounded-full">实时更新</span>
                    </div>
                    <div class="h-64">
                        <canvas id="dataChart"></canvas>
                    </div>
                    <div class="mt-6 h-12 rounded-full data-wave"></div>
                </div>
                <div class="md:w-1/3 bg-gray-900/50 rounded-2xl p-6 border border-gray-800">
                    <h3 class="text-xl font-bold mb-6">
                        <i class="fa fa-fire text-secondary mr-2"></i>抖音热点榜
                    </h3>
                    <div class="space-y-3 max-h-80 overflow-y-auto" id="hotList"></div>
                </div>
            </div>
        </section>

        <!-- 小游戏区域 -->
        <section class="mb-16">
            <div class="bg-gray-900/50 rounded-2xl p-6 border border-gray-800">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold">
                        <i class="fa fa-gamepad text-primary mr-2"></i>趣味小游戏
                    </h3>
                    <span id="gameScore" class="bg-primary/20 text-primary px-3 py-1 rounded-full text-sm">得分: 0</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-black/30 rounded-xl p-5 float-animation cursor-pointer hover:neon-glow transition-all" onclick="playGame(1)">
                        <div class="text-center">
                            <i class="fa fa-bullseye text-4xl text-primary mb-3"></i>
                            <h4 class="font-bold mb-2">热点匹配</h4>
                            <p class="text-gray-400 text-sm">匹配热门关键词</p>
                        </div>
                    </div>
                    <div class="bg-black/30 rounded-xl p-5 float-animation cursor-pointer hover:neon-glow transition-all" onclick="playGame(2)" style="animation-delay: 0.5s">
                        <div class="text-center">
                            <i class="fa fa-database text-4xl text-secondary mb-3"></i>
                            <h4 class="font-bold mb-2">数据收集</h4>
                            <p class="text-gray-400 text-sm">收集大数据方块</p>
                        </div>
                    </div>
                    <div class="bg-black/30 rounded-xl p-5 float-animation cursor-pointer hover:neon-glow transition-all" onclick="playGame(3)" style="animation-delay: 1s">
                        <div class="text-center">
                            <i class="fa fa-tachometer text-4xl text-primary mb-3"></i>
                            <h4 class="font-bold mb-2">流量预测</h4>
                            <p class="text-gray-400 text-sm">预测视频流量</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 游戏弹窗 -->
    <div id="gameModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden items-center justify-center">
        <div class="bg-gray-900 w-full max-w-lg rounded-2xl p-6 border border-gray-700 mx-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold gradient-text" id="gameTitle">游戏</h3>
                <button onclick="closeGameModal()" class="text-gray-400 hover:text-white text-xl">&times;</button>
            </div>
            <div id="gameContent" class="mb-6 min-h-[120px]"></div>
            <button onclick="closeGameModal()" class="w-full bg-primary text-black py-3 rounded-full font-medium hover:neon-glow">关闭</button>
        </div>
    </div>

    <footer class="bg-black/80 py-6 border-t border-gray-800">
        <div class="container mx-auto px-4 text-center text-gray-500">
            <p>智能搜索平台 &copy; 2026 | 搜索+大数据+休闲游戏</p>
        </div>
    </footer>

    <script>
        // 1. 本地搜索知识库（可自行增删内容）
        const searchLibrary = [
            {kw: "抖音", title: "抖音短视频平台", desc: "抖音是热门短视频社交平台，拥有海量创作者与短视频内容，实时更新全网热点。"},
            {kw: "短视频", title: "短视频行业介绍", desc: "短视频是当下主流内容形式，时长短、内容丰富，涵盖娱乐、知识、生活等各类题材。"},
            {kw: "大数据", title: "大数据概念解析", desc: "大数据指海量、多样化的信息集合，常用于用户分析、热点统计、流量预测等场景。"},
            {kw: "游戏", title: "休闲小游戏合集", desc: "休闲小游戏操作简单、趣味性强，适合碎片化时间娱乐，本次平台内置多款互动小游戏。"},
            {kw: "美食", title: "热门美食推荐", desc: "全网热门美食、家常菜谱、特色小吃盘点，是短视频高频热门内容分类。"},
            {kw: "旅游", title: "国内旅游景点", desc: "各地网红景点、游玩攻略、出行指南，也是短视频热门创作方向。"},
            {kw: "学习", title: "线上学习资源", desc: "知识类短视频、网课、学习技巧分享，利用短视频可以高效碎片化学习。"},
            {kw: "流量", title: "短视频流量规则", desc: "短视频流量由播放、点赞、评论、转发等数据综合决定，是创作者核心关注指标。"}
        ];

        let score = 0;

        // 2. 执行搜索核心逻辑
        function doSearch() {
            const inputVal = document.getElementById('searchInput').value.trim();
            const resultBox = document.getElementById('searchResultBox');
            const resultList = document.getElementById('resultList');

            if (!inputVal) {
                alert("请输入搜索关键词！");
                return;
            }

            // 模糊匹配搜索
            const matchResult = searchLibrary.filter(item => 
                item.kw.includes(inputVal) || item.title.includes(inputVal) || item.desc.includes(inputVal)
            );

            resultBox.classList.remove('hidden');
            resultList.innerHTML = "";

            if (matchResult.length === 0) {
                resultList.innerHTML = `
                    <div class="text-center py-8 text-gray-400">
                        <i class="fa fa-search-minus text-3xl mb-3"></i>
                        <p>未找到与「${inputVal}」相关的内容，请更换关键词重试</p>
                    </div>
                `;
                return;
            }

            // 渲染搜索结果
            matchResult.forEach(item => {
                const div = document.createElement('div');
                div.className = "p-4 bg-black/30 rounded-lg hover:bg-black/50 transition-all";
                div.innerHTML = `
                    <h4 class="text-primary font-bold text-lg">${item.title}</h4>
                    <p class="text-gray-300 mt-2">${item.desc}</p>
                `;
                resultList.appendChild(div);
            });

            // 搜索加分
            score += 3;
            document.getElementById('gameScore').innerText = `得分: ${score}`;
        }

        // 3. 加载抖音热点榜（点击直接搜索）
        function loadHotList() {
            const hotList = document.getElementById('hotList');
            const hotWords = ["抖音", "短视频", "大数据", "美食", "旅游", "流量", "游戏", "学习"];
            hotWords.forEach((word, idx) => {
                const item = document.createElement('div');
                item.className = 'hot-item p-3 rounded-lg flex items-center gap-3 cursor-pointer';
                item.innerHTML = `
                    <span class="w-6 h-6 rounded-full bg-primary/20 text-primary flex items-center justify-center font-bold">${idx+1}</span>
                    <span>${word}</span>
                `;
                item.onclick = () => {
                    document.getElementById('searchInput').value = word;
                    doSearch();
                };
                hotList.appendChild(item);
            });
        }

        // 4. 初始化数据图表
        function initChart() {
            const ctx = document.getElementById('dataChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['1月', '2月', '3月', '4月', '5月', '6月'],
                    datasets: [{
                        label: '用户活跃度',
                        data: [65, 78, 82, 95, 88, 100],
                        borderColor: '#00f2ea',
                        backgroundColor: 'rgba(0, 242, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }, {
                        label: '内容发布量',
                        data: [42, 58, 66, 72, 85, 90],
                        borderColor: '#fe2c55',
                        backgroundColor: 'rgba(254, 44, 85, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#fff' } },
                        x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#fff' } }
                    }
                }
            });
        }

        // 5. 小游戏弹窗
        function playGame(type) {
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('gameTitle');
            const content = document.getElementById('gameContent');
            score += 10;
            document.getElementById('gameScore').innerText = `得分: ${score}`;

            switch(type) {
                case 1:
                    title.innerText = "热点匹配游戏";
                    content.innerHTML = "<p class='text-center text-lg'>根据热点词汇进行匹配，锻炼眼力与反应速度！<br class='mt-2 text-gray-400'>本次游玩获得10积分</p>";
                    break;
                case 2:
                    title.innerText = "数据收集游戏";
                    content.innerHTML = "<p class='text-center text-lg'>点击收集掉落的大数据方块，累计更多分数！<br class='mt-2 text-gray-400'>本次游玩获得10积分</p>";
                    break;
                case 3:
                    title.innerText = "流量预测游戏";
                    content.innerHTML = "<p class='text-center text-lg'>根据数据走势，预测短视频播放流量！<br class='mt-2 text-gray-400'>本次游玩获得10积分</p>";
                    break;
            }
            modal.style.display = 'flex';
        }
        function closeGameModal() {
            document.getElementById('gameModal').style.display = 'none';
        }

        // 页面加载初始化
        window.onload = function() {
            initChart();
            loadHotList();
        };
    </script>
</body>
</html>
