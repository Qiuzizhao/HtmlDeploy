<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易跑酷小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f7f7f7;
            font-family: Arial, sans-serif;
        }

        /* 游戏容器 */
        .game-container {
            width: 800px;
            height: 300px;
            background: #e3f2fd;
            border: 2px solid #333;
            position: relative;
            overflow: hidden;
        }

        /* 地面 */
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background: #8d6e63;
        }

        /* 跑酷角色 */
        .player {
            width: 50px;
            height: 50px;
            background: #ff5722;
            border-radius: 5px;
            position: absolute;
            bottom: 50px;
            left: 100px;
        }

        /* 跳跃动画 */
        .jump {
            animation: jump 0.5s linear;
        }

        @keyframes jump {
            0% { bottom: 50px; }
            50% { bottom: 150px; }
            100% { bottom: 50px; }
        }

        /* 障碍物 */
        .obstacle {
            width: 30px;
            height: 50px;
            background: #4caf50;
            position: absolute;
            bottom: 50px;
            right: -30px;
            animation: obstacle 1.5s infinite linear;
        }

        @keyframes obstacle {
            0% { right: -30px; }
            100% { right: 800px; }
        }

        /* 分数 */
        .score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        /* 游戏结束提示 */
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            color: #d32f2f;
            font-weight: bold;
            display: none;
            text-align: center;
        }

        .game-over p {
            font-size: 18px;
            margin-top: 10px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score">分数：0</div>
        <div class="player"></div>
        <div class="obstacle"></div>
        <div class="ground"></div>
        <div class="game-over">
            游戏结束！
            <p>按回车键重新开始</p>
        </div>
    </div>

    <script>
        // 获取元素
        const player = document.querySelector('.player');
        const obstacle = document.querySelector('.obstacle');
        const scoreText = document.querySelector('.score');
        const gameOverText = document.querySelector('.game-over');
        const gameContainer = document.querySelector('.game-container');

        let score = 0;
        let isGameOver = false;
        let obstacleAnimation;

        // 跳跃功能
        function jump() {
            if(isGameOver) return;
            if(!player.classList.contains('jump')) {
                player.classList.add('jump');
                // 移除跳跃类，实现重复跳跃
                setTimeout(() => {
                    player.classList.remove('jump');
                }, 500);
            }
        }

        // 键盘/屏幕控制
        document.addEventListener('keydown', (e) => {
            if(e.code === 'Space') jump(); // 空格跳跃
            if(e.code === 'Enter' && isGameOver) restartGame(); // 回车重启
        });

        // 点击屏幕也能跳跃（手机适配）
        gameContainer.addEventListener('click', jump);

        // 碰撞检测
        function checkCollision() {
            const playerRect = player.getBoundingClientRect();
            const obstacleRect = obstacle.getBoundingClientRect();

            // 碰撞判定
            if(
                playerRect.left < obstacleRect.right &&
                playerRect.right > obstacleRect.left &&
                playerRect.bottom > obstacleRect.top
            ) {
                gameOver();
            }
        }

        // 游戏结束
        function gameOver() {
            isGameOver = true;
            obstacle.style.animation = 'none'; // 停止障碍物
            gameOverText.style.display = 'block';
            clearInterval(scoreInterval);
        }

        // 重新开始游戏
        function restartGame() {
            isGameOver = false;
            score = 0;
            scoreText.textContent = `分数：0`;
            obstacle.style.animation = 'obstacle 1.5s infinite linear';
            gameOverText.style.display = 'none';
            startScore();
        }

        // 计分
        let scoreInterval;
        function startScore() {
            clearInterval(scoreInterval);
            scoreInterval = setInterval(() => {
                if(!isGameOver) {
                    score++;
                    scoreText.textContent = `分数：${score}`;
                }
            }, 100);
        }

        // 游戏主循环
        function gameLoop() {
            if(!isGameOver) {
                checkCollision();
            }
            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        startScore();
        gameLoop();
    </script>
</body>
</html>
