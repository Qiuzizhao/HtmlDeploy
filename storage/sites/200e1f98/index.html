<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>午夜惊魂 - 恐怖密室逃脱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- 配置Tailwind自定义颜色 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        horror: {
                            dark: '#0a0a0a',
                            red: '#8b0000',
                            gray: '#1a1a1a',
                            light: '#333333'
                        }
                    },
                    fontFamily: {
                        horror: ['Creepster', 'cursive', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000;
            }
            .hover-shadow {
                transition: all 0.3s;
            }
            .hover-shadow:hover {
                box-shadow: 0 0 15px #ff0000;
            }
            .jump-scare {
                animation: scare 0.5s ease-in-out;
            }
            @keyframes scare {
                0% { transform: scale(1); opacity: 0; }
                50% { transform: scale(1.5); opacity: 1; }
                100% { transform: scale(1); opacity: 0; }
            }
            .flicker {
                animation: flicker 0.1s infinite alternate;
            }
            @keyframes flicker {
                0% { opacity: 1; }
                100% { opacity: 0.8; }
            }
        }
    </style>
    
    <!-- 导入恐怖字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
</head>
<body class="bg-horror-dark text-white min-h-screen flex flex-col" id="game-body">
    <!-- 游戏容器 -->
    <div id="game-container" class="flex-1 flex flex-col relative overflow-hidden">
        <!-- 开始界面 -->
        <div id="start-screen" class="flex-1 flex flex-col items-center justify-center z-20 bg-horror-dark p-4">
            <h1 class="text-horror-red text-[clamp(2rem,8vw,5rem)] font-horror mb-8 text-shadow tracking-wider">
                午夜惊魂
            </h1>
            <p class="text-gray-400 text-[clamp(1rem,3vw,1.5rem)] mb-4 max-w-md text-center">
                你被困在一个废弃的精神病院，黑暗中似乎有什么东西在注视着你...
            </p>
            <p class="text-gray-500 text-sm mb-12 max-w-md text-center">
                警告：游戏包含恐怖音效、突然惊吓画面和恐怖元素，胆小者慎入
            </p>
            
            <button id="start-btn" class="bg-horror-red hover:bg-red-900 text-white px-8 py-3 rounded text-lg transition-all hover-scale hover-shadow mt-6">
                开始游戏 <i class="fa fa-play ml-2"></i>
            </button>
            
            <button id="sound-toggle" class="mt-6 text-gray-400 hover:text-white flex items-center">
                <i class="fa fa-volume-up mr-2"></i> 音效开启
            </button>
        </div>
        
        <!-- 游戏主界面 -->
        <div id="game-screen" class="hidden flex-1 flex flex-col relative">
            <!-- 顶部状态栏 -->
            <div class="bg-horror-gray p-3 flex justify-between items-center border-b border-horror-red">
                <div class="flex items-center">
                    <i class="fa fa-heart text-horror-red mr-2"></i>
                    <div id="health-bar" class="w-24 h-3 bg-horror-light rounded">
                        <div class="h-full bg-horror-red rounded" style="width: 100%"></div>
                    </div>
                </div>
                
                <div class="text-gray-400 text-sm">
                    <span id="time">00:00</span>
                </div>
                
                <button id="pause-btn" class="text-gray-400 hover:text-white">
                    <i class="fa fa-pause"></i>
                </button>
            </div>
            
            <!-- 游戏场景 -->
            <div id="game-scene" class="flex-1 relative overflow-hidden bg-black">
                <img src="https://picsum.photos/id/1040/1200/800" alt="恐怖密室" 
                     class="w-full h-full object-cover opacity-70">
                
                <!-- 可交互物品 -->
                <div id="item-1" class="absolute top-[30%] left-[20%] w-12 h-12 cursor-pointer hover:scale-110 transition-transform">
                    <i class="fa fa-key text-yellow-500 text-2xl"></i>
                </div>
                
                <div id="item-2" class="absolute top-[40%] right-[25%] w-16 h-16 cursor-pointer hover:scale-110 transition-transform">
                    <i class="fa fa-file-text-o text-gray-300 text-2xl"></i>
                </div>
                
                <div id="door" class="absolute top-[20%] left-[45%] w-24 h-32 cursor-pointer hover:scale-105 transition-transform">
                    <div class="w-full h-full bg-horror-light rounded opacity-80"></div>
                </div>
            </div>
            
            <!-- 底部物品栏 -->
            <div class="bg-horror-gray p-2 border-t border-horror-red">
                <div class="flex gap-2">
                    <div id="inventory-slot-1" class="w-10 h-10 bg-horror-light rounded flex items-center justify-center">
                        <span class="text-gray-600 text-xs">空</span>
                    </div>
                    <div id="inventory-slot-2" class="w-10 h-10 bg-horror-light rounded flex items-center justify-center">
                        <span class="text-gray-600 text-xs">空</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 惊吓效果层 -->
        <div id="scare-layer" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black">
            <img src="https://picsum.photos/id/237/500/700" alt="惊吓" 
                 class="max-h-screen jump-scare opacity-0">
        </div>
        
        <!-- 消息提示框 -->
        <div id="message-box" class="fixed top-1/4 left-1/2 transform -translate-x-1/2 bg-horror-gray p-4 rounded border border-horror-red z-10 hidden max-w-sm">
            <p id="message-text" class="text-gray-300"></p>
            <button id="message-ok" class="mt-3 bg-horror-red px-4 py-1 rounded text-sm">
                确定
            </button>
        </div>
    </div>
    
    <!-- 恐怖音效 -->
    <audio id="background-sound" loop>
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-horror-suspense-score-265.mp3" type="audio/mpeg">
    </audio>
    <audio id="scare-sound">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-scream-horror-1113.mp3" type="audio/mpeg">
    </audio>
    <audio id="click-sound">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-door-creak-1101.mp3" type="audio/mpeg">
    </audio>
    
    <script>
        // 游戏状态管理
        const gameState = {
            isStarted: false,
            isSoundOn: true,
            inventory: [],
            health: 100,
            time: 0,
            timer: null,
            hasKey: false,
            hasPaper: false
        };
        
        // DOM元素
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const startBtn = document.getElementById('start-btn');
        const soundToggle = document.getElementById('sound-toggle');
        const scareLayer = document.getElementById('scare-layer');
        const messageBox = document.getElementById('message-box');
        const messageText = document.getElementById('message-text');
        const messageOk = document.getElementById('message-ok');
        const timeDisplay = document.getElementById('time');
        const healthBar = document.getElementById('health-bar').firstElementChild;
        
        // 音效元素
        const backgroundSound = document.getElementById('background-sound');
        const scareSound = document.getElementById('scare-sound');
        const clickSound = document.getElementById('click-sound');
        
        // 可交互物品
        const item1 = document.getElementById('item-1');
        const item2 = document.getElementById('item-2');
        const door = document.getElementById('door');
        
        // 初始化游戏
        function initGame() {
            // 重置游戏状态
            gameState.inventory = [];
            gameState.health = 100;
            gameState.time = 0;
            gameState.hasKey = false;
            gameState.hasPaper = false;
            
            updateHealth();
            updateTime();
        }
        
        // 开始游戏
        function startGame() {
            gameState.isStarted = true;
            startScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            
            // 播放背景音乐
            if (gameState.isSoundOn) {
                backgroundSound.volume = 0.3;
                backgroundSound.play();
            }
            
            // 启动计时器
            gameState.timer = setInterval(() => {
                gameState.time++;
                updateTime();
                
                // 随机触发惊吓事件
                if (Math.random() < 0.01) {
                    triggerScare();
                }
            }, 1000);
            
            showMessage("你在黑暗中醒来，必须找到逃离这里的方法...");
        }
        
        // 触发惊吓效果
        function triggerScare() {
            if (gameState.isSoundOn) {
                scareSound.play();
            }
            
            scareLayer.classList.remove('hidden');
            scareLayer.querySelector('img').classList.add('jump-scare');
            
            // 减少生命值
            gameState.health -= 10;
            updateHealth();
            
            // 检查游戏是否结束
            if (gameState.health <= 0) {
                gameOver();
                return;
            }
            
            // 3秒后隐藏惊吓效果
            setTimeout(() => {
                scareLayer.classList.add('hidden');
                scareLayer.querySelector('img').classList.remove('jump-scare');
            }, 1000);
        }
        
        // 游戏结束
        function gameOver() {
            clearInterval(gameState.timer);
            backgroundSound.pause();
            showMessage("你被恐惧吞噬了...游戏结束");
            
            setTimeout(() => {
                location.reload();
            }, 3000);
        }
        
        // 显示消息
        function showMessage(text) {
            messageText.textContent = text;
            messageBox.classList.remove('hidden');
        }
        
        // 更新时间显示
        function updateTime() {
            const minutes = Math.floor(gameState.time / 60).toString().padStart(2, '0');
            const seconds = (gameState.time % 60).toString().padStart(2, '0');
            timeDisplay.textContent = `${minutes}:${seconds}`;
        }
        
        // 更新生命值
        function updateHealth() {
            healthBar.style.width = `${gameState.health}%`;
            
            if (gameState.health < 30) {
                healthBar.classList.remove('bg-horror-red');
                healthBar.classList.add('bg-red-500', 'flicker');
            }
        }
        
        // 获取物品
        function collectItem(item) {
            if (gameState.isSoundOn) {
                clickSound.play();
            }
            
            if (item === 'key' && !gameState.hasKey) {
                gameState.hasKey = true;
                gameState.inventory.push('key');
                item1.style.display = 'none';
                document.getElementById('inventory-slot-1').innerHTML = 
                    '<i class="fa fa-key text-yellow-500"></i>';
                showMessage("你找到了一把生锈的钥匙，它看起来能打开什么...");
            } else if (item === 'paper' && !gameState.hasPaper) {
                gameState.hasPaper = true;
                gameState.inventory.push('paper');
                item2.style.display = 'none';
                document.getElementById('inventory-slot-2').innerHTML = 
                    '<i class="fa fa-file-text-o text-gray-300"></i>';
                showMessage("日记：'离开这里的唯一方法是找到正确的门...它们在午夜时分会打开'");
            }
        }
        
        // 使用门
        function useDoor() {
            if (gameState.hasKey) {
                showMessage("恭喜！你成功逃离了精神病院！");
                clearInterval(gameState.timer);
                backgroundSound.pause();
                
                setTimeout(() => {
                    location.reload();
                }, 3000);
            } else {
                triggerScare();
                showMessage("门被锁住了，你需要找到钥匙...");
            }
        }
        
        // 事件监听
        startBtn.addEventListener('click', startGame);
        
        soundToggle.addEventListener('click', () => {
            gameState.isSoundOn = !gameState.isSoundOn;
            
            if (gameState.isSoundOn) {
                soundToggle.innerHTML = '<i class="fa fa-volume-up mr-2"></i> 音效开启';
                if (gameState.isStarted) {
                    backgroundSound.play();
                }
            } else {
                soundToggle.innerHTML = '<i class="fa fa-volume-off mr-2"></i> 音效关闭';
                backgroundSound.pause();
            }
        });
        
        messageOk.addEventListener('click', () => {
            messageBox.classList.add('hidden');
        });
        
        // 物品点击事件
        item1.addEventListener('click', () => collectItem('key'));
        item2.addEventListener('click', () => collectItem('paper'));
        door.addEventListener('click', useDoor);
        
        // 初始化
        initGame();
    </script>
</body>
</html>
