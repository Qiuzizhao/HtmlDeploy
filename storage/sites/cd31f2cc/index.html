<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人联机枪战完整版</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei}
        body {background:#121218;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
        #gameContainer {position:relative;border:4px solid #333;border-radius:10px}
        #gameCanvas {display:block;background:#181822}
        .ui-wrap {position:absolute;top:0;left:0;width:100%;padding:10px;display:flex;justify-content:space-between;pointer-events:none;z-index:10}
        .ui-left,.ui-right {background:rgba(0,0,0,0.65);color:#fff;padding:10px 14px;border-radius:8px;font-size:14px}
        .ui-left div {margin:4px 0}
        .team-red {color:#ff4747;font-weight:bold}
        .team-blue {color:#47a8ff;font-weight:bold}
        .weapon-tag {color:#ffd000}
        #startMenu {position:absolute;inset:0;background:rgba(0,0,0,0.92);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:12px}
        #startMenu h1 {color:#0fdd99;margin-bottom:10px}
        .row {display:flex;gap:10px;align-items:center}
        label {width:80px;text-align:right}
        input,select {padding:8px 10px;width:220px;border:0;border-radius:4px;font-size:16px}
        .color-boxs {display:flex;gap:6px;margin:8px 0}
        .color-item {width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent}
        .color-item.active {border-color:#fff}
        #startBtn {margin-top:12px;padding:10px 32px;background:#0fdd99;border:none;border-radius:6px;font-size:18px;font-weight:bold;cursor:pointer}
        #startBtn:hover {background:#0bb97f}
        #deadMenu {position:absolute;inset:0;background:rgba(0,0,0,0.75);z-index:998;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff}
        #deadMenu h2 {color:#ff5555;font-size:36px;margin-bottom:16px}
        #respawnBtn {padding:10px 26px;background:#0fdd99;border:none;border-radius:6px;font-size:16px;cursor:pointer}
        .tip-bottom {position:absolute;bottom:8px;left:50%;transform:translateX(-50%);color:#aaa;font-size:13px}
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="1100" height="650"></canvas>
    <div class="ui-wrap">
        <div class="ui-left">
            <div>昵称：<span id="pName"></span></div>
            <div>队伍：<span id="pTeam"></span></div>
            <div>血量：<span id="hpNum">100</span>/100</div>
            <div>武器：<span class="weapon-tag" id="weaponName">步枪</span></div>
            <div>弹药：<span id="ammo">30</span>/<span id="maxAmmo">30</span></div>
            <div>击杀：<span id="killNum">0</span></div>
        </div>
        <div class="ui-right">
            <div class="team-red">红队总分：<span id="redScore">0</span></div>
            <div class="team-blue">蓝队总分：<span id="blueScore">0</span></div>
            <div>在线人数：<span id="onlineCount">0</span></div>
        </div>
    </div>

    <!-- 开始菜单 -->
    <div id="startMenu">
        <h1>多人在线枪战对战</h1>
        <div class="row">
            <label>昵称</label>
            <input id="nickInput" placeholder="输入游戏昵称" maxlength="10">
        </div>
        <div class="row">
            <label>房间号</label>
            <input id="roomInput" value="fight001">
        </div>
        <div class="row">
            <label>选择队伍</label>
            <select id="teamSelect">
                <option value="red">红队</option>
                <option value="blue">蓝队</option>
            </select>
        </div>
        <div>
            <label>角色皮肤：</label>
            <div class="color-boxs" id="colorBoxWrap">
                <div class="color-item active" data-c="#0fdd99" style="background:#0fdd99"></div>
                <div class="color-item" data-c="#ff4747" style="background:#ff4747"></div>
                <div class="color-item" data-c="#47a8ff" style="background:#47a8ff"></div>
                <div class="color-item" data-c="#ffdd33" style="background:#ffdd33"></div>
                <div class="color-item" data-c="#c847ff" style="background:#c847ff"></div>
                <div class="color-item" data-c="#ff8833" style="background:#ff8833"></div>
                <div class="color-item" data-c="#33ffb8" style="background:#33ffb8"></div>
                <div class="color-item" data-c="#aaaaaa" style="background:#aaaaaa"></div>
            </div>
        </div>
        <button id="startBtn" onclick="startGame()">进入战场</button>
        <div style="margin-top:10px;color:#aaa;font-size:13px">操作：WASD移动 | 鼠标瞄准左键射击 | R换弹 | 1/2/3切换武器</div>
    </div>

    <!-- 死亡界面 -->
    <div id="deadMenu">
        <h2>你已阵亡</h2>
        <div style="font-size:16px;margin-bottom:12px">复活倒计时：<span id="respawnTimer">5</span>s</div>
        <button id="respawnBtn" onclick="respawnNow()">立即复活</button>
    </div>
    <div class="tip-bottom">相同房间号玩家联机对战 | 红/蓝两队对抗计分</div>
</div>

<script>
// 全局常量
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;
const WS_URL = "wss://ws.ifelse.io"; // 稳定公共websocket联机服务器

// 音效生成器（无外部音频文件）
const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type){
    const osc = AudioCtx.createOscillator();
    const gain = AudioCtx.createGain();
    osc.connect(gain); gain.connect(AudioCtx.destination);
    const now = AudioCtx.currentTime;
    switch(type){
        case "shoot":
            osc.type = "square"; osc.frequency.setValueAtTime(180,now);
            gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.1);
            osc.start(now); osc.stop(now+0.1); break;
        case "sniper":
            osc.type = "saw"; osc.frequency.setValueAtTime(90,now);
            gain.gain.setValueAtTime(0.18,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.25);
            osc.start(now); osc.stop(now+0.25); break;
        case "shotgun":
            osc.type = "triangle"; osc.frequency.setValueAtTime(120,now);
            gain.gain.setValueAtTime(0.15,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.15);
            osc.start(now); osc.stop(now+0.15); break;
        case "hit":
            osc.type = "sine"; osc.frequency.setValueAtTime(320,now);
            gain.gain.setValueAtTime(0.08,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.06);
            osc.start(now); osc.stop(now+0.06); break;
        case "kill":
            osc.type = "sine"; osc.frequency.setValueAtTime(520,now);
            gain.gain.setValueAtTime(0.1,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.3);
            osc.start(now); osc.stop(now+0.3); break;
        case "reload":
            osc.type = "square"; osc.frequency.setValueAtTime(440,now);
            gain.gain.setValueAtTime(0.06,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.2);
            osc.start(now); osc.stop(now+0.2); break;
    }
}

// 武器配置
const WEAPONS = {
    1: {name:"步枪",dmg:12,ammo:30,speed:14,fireRate:140,pen:false,sound:"shoot"},
    2: {name:"狙击枪",dmg:55,ammo:8,speed:22,fireRate:900,pen:true,sound:"sniper"},
    3: {name:"霰弹枪",dmg:8,ammo:6,speed:11,fireRate:600,pen:false,bulletCount:6,sound:"shotgun"}
};

// 地图掩体
const obstacles = [
    {x:150,y:120,w:90,h:90},{x:480,y:200,w:110,h:70},
    {x:820,y:130,w:90,h:90},{x:220,y:420,w:70,h:120},
    {x:560,y:450,w:130,h:80},{x:900,y:380,w:80,h:110}
];

// 队伍出生点
const spawnPoint = {
    red: [{x:80,y:320},{x:120,y:180},{x:90,y:480}],
    blue: [{x:W-90,y:320},{x:W-130,y:180},{x:W-100,y:480}]
};

// 全局变量
let ws,playerId = Math.random().toString(36).slice(2,10);
let gameStart = false, selectedColor = "#0fdd99";
let teamScore = {red:0,blue:0};
let respawnCountdown = 0;
let lastFireTime = 0;
let floatingTexts = [], hitEffects = [];

// 本地玩家数据
let player = {
    nick:"游客",room:"fight001",team:"red",color:selectedColor,
    x:100,y:320,hp:100,maxHp:100,kill:0,
    weapon:1,ammo:30,maxAmmo:30,speed:5,alive:true
};
let otherPlayers = {}, bullets = [];
const keys = {w:false,a:false,s:false,d:false};
const mouse = {x:0,y:0,down:false};

// 皮肤选择绑定
document.querySelectorAll(".color-item").forEach(el=>{
    el.onclick = ()=>{
        document.querySelectorAll(".color-item").forEach(e=>e.classList.remove("active"));
        el.classList.add("active");
        selectedColor = el.dataset.c;
    }
});

// UI更新
function refreshUI(){
    document.getElementById("pName").innerText = player.nick;
    document.getElementById("pTeam").innerText = player.team==="red"?"红队":"蓝队";
    document.getElementById("pTeam").className = player.team==="red"?"team-red":"team-blue";
    document.getElementById("hpNum").innerText = Math.max(0,player.hp);
    const wp = WEAPONS[player.weapon];
    document.getElementById("weaponName").innerText = wp.name;
    document.getElementById("ammo").innerText = player.ammo;
    document.getElementById("maxAmmo").innerText = wp.ammo;
    document.getElementById("killNum").innerText = player.kill;
    document.getElementById("redScore").innerText = teamScore.red;
    document.getElementById("blueScore").innerText = teamScore.blue;
    document.getElementById("onlineCount").innerText = Object.keys(otherPlayers).length+1;
}

// 连接服务器
function connectWS(){
    ws = new WebSocket(WS_URL);
    ws.onopen = ()=>sendPlayerState();
    ws.onmessage = e=>{
        try{
            const data = JSON.parse(e.data);
            if(data.id === playerId || data.room !== player.room) return;
            otherPlayers[data.id] = data;
        }catch(err){}
    };
    ws.onclose = ()=>setTimeout(connectWS,2000);
}

// 发送玩家同步数据
function sendPlayerState(){
    if(!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({...player,id:playerId}));
}

// 碰撞检测
function isBlock(x,y,r=20){
    for(let o of obstacles){
        if(x+r>o.x && x-r<o.x+o.w && y+r>o.y && y-r<o.y+o.h) return true;
    }
    return false;
}

// 生成队伍随机出生点
function getSpawn(t){
    const arr = spawnPoint[t];
    return arr[Math.floor(Math.random()*arr.length)];
}

// 复活逻辑
function respawnNow(){
    respawnCountdown = 0;
    const sp = getSpawn(player.team);
    player.x = sp.x; player.y = sp.y;
    player.hp = player.maxHp; player.alive = true;
    document.getElementById("deadMenu").style.display = "none";
    refreshUI();
}

// 玩家移动
function playerMove(){
    if(!player.alive) return;
    let nx = player.x, ny = player.y;
    if(keys.w) ny -= player.speed;
    if(keys.s) ny += player.speed;
    if(keys.a) nx -= player.speed;
    if(keys.d) nx += player.speed;
    // 边界限制
    if(nx<30||nx>W-30||ny<30||ny>H-30) return;
    if(!isBlock(nx,ny)){ player.x=nx; player.y=ny; }
}

// 射击生成子弹
function fireBullet(){
    if(!player.alive) return;
    const wp = WEAPONS[player.weapon];
    const now = Date.now();
    if(now - lastFireTime < wp.fireRate || player.ammo <= 0) return;
    lastFireTime = now;
    player.ammo--;
    playSound(wp.sound);
    refreshUI();
    const dx = mouse.x - player.x;
    const dy = mouse.y - player.y;
    const dist = Math.hypot(dx,dy)||1;
    const count = wp.bulletCount || 1;
    for(let i=0;i<count;i++){
        let offX = 0, offY = 0;
        if(count>1){
            offX = (Math.random()-0.5)*25;
            offY = (Math.random()-0.5)*25;
        }
        const vx = (dx/dist)*wp.speed + offX/12;
        const vy = (dy/dist)*wp.speed + offY/12;
        bullets.push({
            x:player.x,y:player.y,vx,vy,dmg:wp.dmg,pen:wp.pen,owner:playerId,ownerTeam:player.team
        });
    }
}

// 换弹
function reloadGun(){
    if(!player.alive) return;
    player.ammo = WEAPONS[player.weapon].ammo;
    playSound("reload");
    refreshUI();
}

// 更新子弹、击中判定
function updateBullets(){
    for(let i=bullets.length-1;i>=0;i--){
        const b = bullets[i];
        b.x += b.vx; b.y += b.vy;
        // 出界/撞掩体清除
        if(b.x<0||b.x>W||b.y<0||b.y>H||(!b.pen&&isBlock(b.x,b.y,5))){
            bullets.splice(i,1); continue;
        }
        // 击中其他玩家
        for(let pid in otherPlayers){
            const p = otherPlayers[pid];
            if(!p.alive || p.team === b.ownerTeam) continue;
            if(Math.hypot(b.x-p.x,b.y-p.y) < 24){
                p.hp -= b.dmg;
                hitEffects.push({x:b.x,y:b.y,life:12});
                playSound("hit");
                if(p.hp <= 0){
                    p.alive = false;
                    // 击杀加分
                    teamScore[b.ownerTeam]++;
                    player.kill++;
                    floatingTexts.push({x:p.x,y:p.y-40,text:"击杀!",color:"#ffdd33",life:60});
                    playSound("kill");
                }
                if(!b.pen) bullets.splice(i,1);
                break;
            }
        }
    }
}

// 渲染所有内容
function render(){
    ctx.fillStyle = "#181822";
    ctx.fillRect(0,0,W,H);
    // 掩体
    ctx.fillStyle = "#444858";
    obstacles.forEach(o=>ctx.fillRect(o.x,o.y,o.w,o.h));
    // 击中闪光特效
    hitEffects.forEach((ef,idx)=>{
        ctx.fillStyle = `rgba(255,80,80,${ef.life/12})`;
        ctx.beginPath(); ctx.arc(ef.x,ef.y,8,0,Math.PI*2); ctx.fill();
        ef.life--; if(ef.life<=0) hitEffects.splice(idx,1);
    });
    // 子弹
    ctx.fillStyle = "#ffdd22";
    bullets.forEach(b=>{
        ctx.beginPath(); ctx.arc(b.x,b.y,4,0,Math.PI*2); ctx.fill();
    });
    // 其他玩家
    for(let pid in otherPlayers){
        const p = otherPlayers[pid];
        if(!p.alive) continue;
        // 人物本体
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,24,0,Math.PI*2); ctx.fill();
        // 队伍外圈
        ctx.strokeStyle = p.team==="red"?"#ff4747":"#47a8ff";
        ctx.lineWidth = 3; ctx.stroke();
        // 昵称
        ctx.fillStyle = "#fff"; ctx.font = "13px Microsoft YaHei"; ctx.textAlign = "center";
        ctx.fillText(p.nick,p.x,p.y-32);
        // 血条
        ctx.fillStyle = "#222"; ctx.fillRect(p.x-24,p.y-28,48,6);
        ctx.fillStyle = "#ff4444"; ctx.fillRect(p.x-24,p.y-28,(p.hp/p.maxHp)*48,6);
    }
    // 本地玩家
    if(player.alive){
        ctx.fillStyle = player.color;
        ctx.beginPath(); ctx.arc(player.x,player.y,24,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = player.team==="red"?"#ff4747":"#47a8ff";
        ctx.lineWidth = 3; ctx.stroke();
        // 瞄准线
        ctx.strokeStyle = "rgba(255,255,255,0.35)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(mouse.x,mouse.y); ctx.stroke();
    }
    // 击杀飘字
    floatingTexts.forEach((t,idx)=>{
        ctx.fillStyle = t.color; ctx.font = "bold 22px Microsoft YaHei"; ctx.textAlign = "center";
        ctx.fillText(t.text,t.x,t.y - (60-t.life)*0.6);
        t.life--; if(t.life<=0) floatingTexts.splice(idx,1);
    });
}

// 游戏主循环
function gameLoop(){
    if(!gameStart) return;
    playerMove();
    updateBullets();
    render();
    sendPlayerState();
    // 死亡倒计时
    if(!player.alive){
        if(respawnCountdown<=0){
            document.getElementById("deadMenu").style.display = "flex";
            respawnCountdown = 300;
        }
        respawnCountdown--;
        document.getElementById("respawnTimer").innerText = Math.ceil(respawnCountdown/60);
        if(respawnCountdown<=0) respawnNow();
    }
    refreshUI();
    requestAnimationFrame(gameLoop);
}

// 开始游戏
function startGame(){
    const nick = document.getElementById("nickInput").value.trim() || "游客";
    const room = document.getElementById("roomInput").value.trim() || "fight001";
    const team = document.getElementById("teamSelect").value;
    player.nick = nick; player.room = room; player.team = team; player.color = selectedColor;
    const sp = getSpawn(team);
    player.x = sp.x; player.y = sp.y;
    document.getElementById("startMenu").style.display = "none";
    gameStart = true;
    connectWS();
    gameLoop();
}

// 键盘监听
document.addEventListener("keydown",e=>{
    const k = e.key.toLowerCase();
    if(k==="w") keys.w=true; if(k==="s") keys.s=true;
    if(k==="a") keys.a=true; if(k==="d") keys.d=true;
    if(k==="r") reloadGun();
    if(["1","2","3"].includes(k)){
        player.weapon = Number(k);
        player.ammo = WEAPONS[player.weapon].ammo;
        refreshUI();
    }
});
document.addEventListener("keyup",e=>{
    const k = e.key.toLowerCase();
    if(k==="w") keys.w=false; if(k==="s") keys.s=false;
    if(k==="a") keys.a=false; if(k==="d") keys.d=false;
});
// 鼠标监听
canvas.addEventListener("mousemove",e=>{
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top;
});
canvas.addEventListener("mousedown",()=>mouse.down=true);
canvas.addEventListener("mouseup",()=>mouse.down=false);
// 持续射击定时器
setInterval(()=>{if(mouse.down&&gameStart) fireBullet();},40);
</script>
</body>
</html>
