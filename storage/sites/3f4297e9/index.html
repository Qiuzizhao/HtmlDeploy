<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 3D 网页版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
        }
        #gameCanvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        .ui {
            position: fixed;
            z-index: 100;
            color: white;
            user-select: none;
        }
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border-left: 2px solid white;
            border-right: 2px solid white;
            z-index: 100;
            pointer-events: none;
        }
        .block-select {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 10px;
        }
        .block-item {
            width: 50px;
            height: 50px;
            border: 2px solid #333;
            cursor: pointer;
        }
        .block-item.active {
            border-color: white;
        }
        .tips {
            top: 10px;
            left: 10px;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="crosshair"></div>
    <div class="ui block-select" id="blockSelector"></div>
    <div class="ui tips">
        WASD 移动 | 鼠标控制视角 | 空格跳跃<br>
        左键放置方块 | 右键删除方块 | 滚轮切换方块
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
        (function() {
            'use strict';

            // ----- 常量配置 -----
            const PLAYER_HEIGHT = 1.8;
            const EYE_HEIGHT = 1.6;
            const PLAYER_SPEED = 8.0;
            const JUMP_POWER = 10.0;
            const GRAVITY = -28.0;
            const BLOCK_SIZE = 1;
            const MOUSE_SENSITIVITY = 0.002;
            const WORLD_RADIUS = 20;

            const BLOCK_TYPES = ['grass', 'stone', 'wood', 'sand', 'brick'];
            const BLOCK_COLORS = {
                grass: 0x3D9970,
                stone: 0x808080,
                wood: 0x8B4513,
                sand: 0xF4A460,
                brick: 0xCD5C5C
            };

            // ----- 场景初始化 -----
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // ----- 共享几何体与材质 -----
            const blockGeometry = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);

            const materials = {};
            for (const type of BLOCK_TYPES) {
                materials[type] = new THREE.MeshLambertMaterial({ color: BLOCK_COLORS[type] });
            }

            // ----- 光照 -----
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(50, 100, 50);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            // ----- 世界数据 -----
            const world = new Map();
            const worldMeshes = [];

            let currentBlock = 'grass';

            function getBlockKey(x, y, z) {
                return `${x},${y},${z}`;
            }

            function createBlock(x, y, z, type) {
                const mesh = new THREE.Mesh(blockGeometry, materials[type]);
                mesh.position.set(x, y, z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.userData.blockType = type;
                scene.add(mesh);

                const key = getBlockKey(x, y, z);
                world.set(key, { mesh, type });
                worldMeshes.push(mesh);
                return mesh;
            }

            function removeBlock(x, y, z) {
                const key = getBlockKey(x, y, z);
                const entry = world.get(key);
                if (!entry) return;

                scene.remove(entry.mesh);
                world.delete(key);

                const idx = worldMeshes.indexOf(entry.mesh);
                if (idx !== -1) {
                    worldMeshes.splice(idx, 1);
                }
            }

            function getBlock(x, y, z) {
                const key = getBlockKey(Math.floor(x), Math.floor(y), Math.floor(z));
                return world.get(key);
            }

            // ----- 生成地形 -----
            function generateGround() {
                for (let x = -WORLD_RADIUS; x <= WORLD_RADIUS; x++) {
                    for (let z = -WORLD_RADIUS; z <= WORLD_RADIUS; z++) {
                        createBlock(x, 0, z, 'grass');
                    }
                }
            }
            generateGround();

            // ----- 玩家状态 -----
            const player = {
                x: 0,
                y: 1.0,
                z: 0,
                velocityY: 0,
                onGround: false
            };
            camera.position.set(player.x, player.y + EYE_HEIGHT, player.z);

            // ----- 鼠标视角控制 -----
            let yaw = 0;
            let pitch = 0;

            document.addEventListener('click', () => {
                document.body.requestPointerLock();
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body) {
                    yaw -= e.movementX * MOUSE_SENSITIVITY;
                    pitch -= e.movementY * MOUSE_SENSITIVITY;
                    pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));

                    camera.rotation.order = 'YXZ';
                    camera.rotation.set(pitch, yaw, 0);
                }
            });

            // ----- 键盘输入 -----
            const keys = { w: false, a: false, s: false, d: false, space: false };

            document.addEventListener('keydown', (e) => {
                switch (e.key) {
                    case 'w': keys.w = true; break;
                    case 'a': keys.a = true; break;
                    case 's': keys.s = true; break;
                    case 'd': keys.d = true; break;
                    case ' ':
                        keys.space = true;
                        e.preventDefault();
                        break;
                }
            });

            document.addEventListener('keyup', (e) => {
                switch (e.key) {
                    case 'w': keys.w = false; break;
                    case 'a': keys.a = false; break;
                    case 's': keys.s = false; break;
                    case 'd': keys.d = false; break;
                    case ' ':
                        keys.space = false;
                        e.preventDefault();
                        break;
                }
            });

            // ----- 玩家移动与碰撞 -----
            function updatePlayer(delta) {
                // 防止 delta 过大导致穿模
                delta = Math.min(delta, 0.1);

                // 计算移动方向
                const forward = new THREE.Vector3();
                camera.getWorldDirection(forward);
                forward.y = 0;
                forward.normalize();

                const right = new THREE.Vector3();
                right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

                let moveX = 0;
                let moveZ = 0;

                if (keys.w) { moveX += forward.x; moveZ += forward.z; }
                if (keys.s) { moveX -= forward.x; moveZ -= forward.z; }
                if (keys.a) { moveX -= right.x; moveZ -= right.z; }
                if (keys.d) { moveX += right.x; moveZ += right.z; }

                const len = Math.sqrt(moveX * moveX + moveZ * moveZ);
                if (len > 0) {
                    moveX = moveX / len * PLAYER_SPEED * delta;
                    moveZ = moveZ / len * PLAYER_SPEED * delta;
                }

                // 重力与跳跃
                player.velocityY += GRAVITY * delta;
                if (keys.space && player.onGround) {
                    player.velocityY = JUMP_POWER * delta;
                    player.onGround = false;
                }

                const stepY = player.velocityY * delta;

                // — 水平碰撞检测（X轴） —
                const newX = player.x + moveX;
                const feetY = Math.floor(player.y);
                const headY = Math.floor(player.y + PLAYER_HEIGHT);

                const blockAtFeetX = getBlock(newX, feetY, player.z);
                const blockAtHeadX = getBlock(newX, headY, player.z);

                if (blockAtFeetX || blockAtHeadX) {
                    if (moveX > 0) {
                        player.x = Math.floor(newX) - 0.5;
                    } else if (moveX < 0) {
                        player.x = Math.floor(newX) + 0.5;
                    }
                } else {
                    player.x = newX;
                }

                // — 水平碰撞检测（Z轴） —
                const newZ = player.z + moveZ;
                const blockAtFeetZ = getBlock(player.x, feetY, newZ);
                const blockAtHeadZ = getBlock(player.x, headY, newZ);

                if (blockAtFeetZ || blockAtHeadZ) {
                    if (moveZ > 0) {
                        player.z = Math.floor(newZ) - 0.5;
                    } else if (moveZ < 0) {
                        player.z = Math.floor(newZ) + 0.5;
                    }
                } else {
                    player.z = newZ;
                }

                // — 垂直碰撞检测（Y轴） —
                const newY = player.y + stepY;
                const blockAtFeetY = getBlock(player.x, newY, player.z);
                const blockAtHeadY = getBlock(player.x, newY + PLAYER_HEIGHT, player.z);

                if (blockAtFeetY || blockAtHeadY) {
                    if (stepY > 0) {
                        player.y = Math.floor(newY) - PLAYER_HEIGHT;
                    } else if (stepY < 0) {
                        player.y = Math.floor(newY) + 1.0;
                        player.onGround = true;
                    }
                    player.velocityY = 0;
                } else {
                    player.y = newY;
                    if (stepY !== 0) {
                        player.onGround = false;
                    }
                }

                // 更新相机位置
                camera.position.set(player.x, player.y + EYE_HEIGHT, player.z);
            }

            // ----- 方块交互（射线投射） -----
            const raycaster = new THREE.Raycaster();

            document.addEventListener('mousedown', (e) => {
                if (document.pointerLockElement !== document.body) return;

                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const intersects = raycaster.intersectObjects(worldMeshes);

                if (intersects.length === 0) return;

                const hit = intersects[0];
                const normal = hit.face.normal.clone();
                const point = hit.point.clone().add(normal.multiplyScalar(0.5));
                const bx = Math.round(point.x);
                const by = Math.round(point.y);
                const bz = Math.round(point.z);

                // 左键放置
                if (e.button === 0) {
                    if (!world.has(getBlockKey(bx, by, bz))) {
                        createBlock(bx, by, bz, currentBlock);
                    }
                }
                // 右键删除
                else if (e.button === 2) {
                    e.preventDefault();
                    const pos = hit.object.position;
                    const px = Math.round(pos.x);
                    const py = Math.round(pos.y);
                    const pz = Math.round(pos.z);
                    // 保护地面层（y=0）
                    if (py !== 0) {
                        removeBlock(px, py, pz);
                    }
                }
            });

            // 禁用右键菜单
            document.addEventListener('contextmenu', (e) => {
                e.preventDefault();
            });

            // ----- 滚轮切换方块 -----
            document.addEventListener('wheel', (e) => {
                const idx = BLOCK_TYPES.indexOf(currentBlock);
                if (e.deltaY > 0) {
                    currentBlock = BLOCK_TYPES[(idx + 1) % BLOCK_TYPES.length];
                } else {
                    currentBlock = BLOCK_TYPES[(idx - 1 + BLOCK_TYPES.length) % BLOCK_TYPES.length];
                }
                updateBlockSelector();
            });

            // ----- 方块选择器 UI -----
            const selector = document.getElementById('blockSelector');
            function initBlockSelector() {
                BLOCK_TYPES.forEach((type) => {
                    const div = document.createElement('div');
                    div.className = 'block-item';
                    div.style.background = '#' + BLOCK_COLORS[type].toString(16).padStart(6, '0');
                    div.dataset.type = type;
                    div.addEventListener('click', () => {
                        currentBlock = type;
                        updateBlockSelector();
                    });
                    selector.appendChild(div);
                });
                updateBlockSelector();
            }

            function updateBlockSelector() {
                document.querySelectorAll('.block-item').forEach(item => {
                    item.classList.toggle('active', item.dataset.type === currentBlock);
                });
            }
            initBlockSelector();

            // ----- 窗口自适应 -----
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // ----- 游戏循环 -----
            let lastTime = 0;

            function animate(time) {
                requestAnimationFrame(animate);

                const delta = lastTime ? (time - lastTime) / 1000 : 0.016;
                lastTime = time;

                updatePlayer(delta);
                renderer.render(scene, camera);
            }

            animate(0);
        })();
    </script>
</body>
</html>
