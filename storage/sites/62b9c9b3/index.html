<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>经典俄罗斯方块</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei}
body{background:#222;color:#fff;display:flex;justify-content:center;padding:30px}
#wrap{display:flex;gap:20px}
#game{border:3px solid #666;background:#111}
#info{width:160px}
.info-item{margin:15px 0;font-size:18px}
#nextBox{border:2px solid #555;background:#111;width:120px;height:120px}
button{
    width:100%;padding:8px 0;margin:6px 0;
    background:#369;color:#fff;border:none;border-radius:4px;
    cursor:pointer;font-size:16px
}
</style>
</head>
<body>
<div id="wrap">
    <canvas id="game" width="240" height="480"></canvas>
    <div id="info">
        <div class="info-item">分数：<span id="score">0</span></div>
        <div class="info-item">等级：<span id="lv">1</span></div>
        <div class="info-item">下一个</div>
        <canvas id="nextBox" width="120" height="120"></canvas>
        <button id="start">开始/重新开始</button>
        <div>←→左右移动｜↓下沉｜↑旋转</div>
    </div>
</div>

<script>
//画布
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
const nextCvs = document.getElementById('nextBox');
const nextCtx = nextCvs.getContext('2d');
const blockSize = 30;
const col = 8;
const row = 16;
let score=0,level=1,speed=800;
let timer=null;
//方块颜色
const color=[null,'#0ff','#f0f','#ff0','#f80','#0f0','#00f','#f33'];
//7种方块形状
const shape=[
    [[0,1],[1,1],[2,1],[3,1]],//I
    [[1,0],[0,1],[1,1],[2,1]],//T
    [[0,0],[0,1],[1,1],[1,2]],//L
    [[2,0],[0,1],[1,1],[2,1]],//J
    [[1,1],[2,1],[1,2],[2,2]],//O
    [[1,0],[2,0],[0,1],[1,1]],//S
    [[0,0],[1,0],[1,1],[2,1]] //Z
];
let map=Array(row).fill().map(()=>Array(col).fill(0));
let now={type:0,x:3,y:0,arr:[]};
let next={type:0,arr:[]};

//随机生成方块
function randomBlock(){
    let t=Math.floor(Math.random()*7)+1;
    return {type:t,arr:shape[t-1]}
}
//绘制单个方块
function drawBlock(x,y,c,ctx=cvs.getContext('2d'),sz=blockSize){
    ctx.fillStyle=color[c];
    ctx.fillRect(x*sz,y*sz,sz-1,sz-1);
}
//刷新主地图
function render(){
    ctx.fillStyle='#111';
    ctx.fillRect(0,0,cvs.width,cvs.height);
    //画已落地方块
    for(let y=0;y<row;y++){
        for(let x=0;x<col;x++){
            if(map[y][x]) drawBlock(x,y,map[y][x]);
        }
    }
    //画当前下落方块
    now.arr.forEach(p=>{
        drawBlock(p[0]+now.x,p[1]+now.y,now.type);
    })
}
//预览下一个
function drawNext(){
    nextCtx.fillStyle='#111';
    nextCtx.fillRect(0,0,nextCvs.width,nextCvs.height);
    next.arr.forEach(p=>{
        drawBlock(p[0]+1,p[1]+1,next.type,nextCtx,30);
    })
}
//碰撞检测
function check(x,y,arr){
    for(let p of arr){
        let nx=p[0]+x,ny=p[1]+y;
        if(nx<0||nx>=col||ny>=row)return false;
        if(ny>=0&&map[ny][nx])return false;
    }
    return true;
}
//落地固化
function fix(){
    now.arr.forEach(p=>{
        let px=p[0]+now.x,py=p[1]+now.y;
        map[py][px]=now.type;
    })
    clearLine();
    //生成新方块
    now={type:next.type,x:3,y:0,arr:next.arr};
    next=randomBlock();
    drawNext();
    //游戏结束
    if(!check(now.x,now.y,now.arr)){
        clearInterval(timer);
        alert('游戏结束！得分：'+score);
    }
}
//消行
function clearLine(){
    let del=0;
    for(let y=row-1;y>=0;y--){
        if(map[y].every(v=>v!==0)){
            map.splice(y,1);
            map.unshift(Array(col).fill(0));
            del++;y++;
        }
    }
    if(del>0){
        score+=del*100;
        document.getElementById('score').innerText=score;
        //升级提速
        level=Math.floor(score/500)+1;
        document.getElementById('lv').innerText=level;
        speed=Math.max(200,800-level*80);
        restartTimer();
    }
}
//下落
function down(){
    if(check(now.x,now.y+1,now.arr)) now.y++;
    else fix();
    render();
}
//左右移动
function move(dir){
    if(check(now.x+dir,now.y,now.arr)) now.x+=dir;
    render();
}
//旋转
function rotate(){
    let temp=now.arr.map(p=>[p[1],-p[0]]);
    if(check(now.x,now.y,temp)) now.arr=temp;
    render();
}
//重置定时器
function restartTimer(){
    clearInterval(timer);
    timer=setInterval(down,speed);
}
//开局初始化
function startGame(){
    score=0;level=1;speed=800;
    document.getElementById('score').innerText=score;
    document.getElementById('lv').innerText=level;
    map=Array(row).fill().map(()=>Array(col).fill(0));
    now=randomBlock();now.x=3;now.y=0;
    next=randomBlock();
    drawNext();render();
    restartTimer();
}

//按键监听
document.addEventListener('keydown',e=>{
    switch(e.key){
        case 'ArrowLeft':move(-1);break;
        case 'ArrowRight':move(1);break;
        case 'ArrowDown':down();break;
        case 'ArrowUp':rotate();break;
    }
})
document.getElementById('start').onclick=startGame;
startGame();
</script>
</body>
</html>
