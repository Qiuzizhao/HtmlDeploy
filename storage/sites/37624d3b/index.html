<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>叶罗丽魔法换装</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background: linear-gradient(#a8d8ff, #e8c8f5);
            font-family: "微软雅黑";
            text-align: center;
            padding: 20px;
        }
        h1{
            color: #8020a0;
            text-shadow: 2px 2px 4px #fff;
            margin-bottom: 20px;
        }
        .game-box{
            width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.6);
            border-radius: 15px;
            padding: 20px;
        }
        #role{
            width: 300px;
            height: 400px;
            margin: 0 auto 20px;
            line-height: 400px;
            font-size: 24px;
            color: #666;
            border: 2px dashed #b070d0;
            border-radius: 10px;
            background: #f9f0ff;
        }
        .btn-group{
            margin: 20px 0;
        }
        button{
            padding: 10px 20px;
            margin: 0 8px;
            border: none;
            border-radius: 8px;
            background: #b070d0;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover{
            background: #8020a0;
        }
        .tip{
            margin-top: 15px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>
<body>
    <h1>叶罗丽魔法换装小游戏</h1>
    <div class="game-box">
        <div id="role">选择角色开始游戏</div>
        <div class="btn-group">
            <button onclick="changeRole('罗丽')">罗丽仙子</button>
            <button onclick="changeRole('冰公主')">冰公主</button>
            <button onclick="changeRole('王默')">王默</button>
            <button onclick="magic()">施展叶罗丽魔法</button>
        </div>
        <p class="tip">点击角色切换形象，点击魔法触发特效~</p>
    </div>

    <script>
        let nowRole = "";
        const roleText = {
            "罗丽": "✨ 罗丽 - 爱心仙子 ✨",
            "冰公主": "❄️ 冰公主 - 冰雪之力 ❄️",
            "王默": "💖 王默 - 叶罗丽战士 💖"
        };

        // 切换角色
        function changeRole(name){
            nowRole = name;
            document.getElementById("role").innerText = roleText[name];
            document.getElementById("role").style.background = "#f9f0ff";
        }

        // 魔法特效
        function magic(){
            if(!nowRole){
                alert("请先选择一位叶罗丽角色！");
                return;
            }
            let colorArr = ["#ffd8f0","#d0e8ff","#ffe8d0","#e0d8ff"];
            let ranColor = colorArr[Math.floor(Math.random()*colorArr.length)];
            document.getElementById("role").style.background = ranColor;
            alert(`叶罗丽魔法！${nowRole} 发动力量啦！`);
        }
    </script>
</body>
</html>
