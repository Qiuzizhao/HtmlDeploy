<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极致手速测试 | 左键点击挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #312e81, #4c1d95);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }
        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* 粒子容器 */
        #particleBox {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            top: 0;
            left: 0;
        }
        .wrap-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 32px;
            padding: 45px 35px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
            text-align: center;
            max-width: 420px;
            width: 92%;
        }
        .title {
            font-size: 32px;
            background: linear-gradient(90deg,#ff7eb3,#fffd7e);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom:12px;
            letter-spacing:2px;
        }
        .desc {
            color:#cbd5e1;
            font-size:15px;
            margin-bottom:28px;
        }
        .data-row {
            display:flex;
            justify-content:space-around;
            margin-bottom:26px;
            gap:10px;
        }
        .data-item {
            flex:1;
            background:rgba(255,255,255,0.07);
            padding:14px 8px;
            border-radius:18px;
            border:1px solid rgba(255,255,255,0.1);
        }
        .data-label {
            font-size:13px;
            color:#a5b4fc;
            margin-bottom:6px;
        }
        .data-num {
            font-size:32px;
            font-weight:bold;
        }
        /* 点击大圆按钮 */
        .click-circle {
            width:240px;
            height:240px;
            margin:0 auto 30px;
            border-radius:50%;
            background: linear-gradient(145deg,#ff4d6d,#c9184a);
            box-shadow: 0 0 35px rgba(255,77,109,0.55), 0 8px 25px rgba(0,0,0,0.3), inset 0 -8px 20px rgba(0,0,0,0.15), inset 0 6px 20px rgba(255,255,255,0.12);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:24px;
            font-weight:bold;
            cursor:pointer;
            user-select:none;
            transition: transform 0.12s ease, filter 0.2s;
        }
        .click-circle:active {
            transform: scale(0.91);
            filter: brightness(0.85);
        }
        .result-box {
            font-size:17px;
            line-height:1.8;
            color:#e2e8f0;
            display:none;
            padding:12px;
            background:rgba(255,255,255,0.05);
            border-radius:16px;
            margin-bottom:22px;
        }
        .restart-btn {
            padding:13px 38px;
            border:none;
            border-radius:99px;
            font-size:17px;
            color:#fff;
            background:linear-gradient(90deg,#38b000,#00e077);
            box-shadow:0 5px 20px rgba(56,176,0,0.35);
            cursor:pointer;
            transition:all 0.2s;
            display:none;
        }
        .restart-btn:hover {
            filter:brightness(1.15);
            transform:translateY(-2px);
        }
        .high-text {
            margin-top:14px;
            color:#ffd166;
            font-size:15px;
        }
    </style>
</head>
<body>
<div id="particleBox"></div>
<div class="wrap-card">
    <h2 class="title">⚡ 左键手速大挑战</h2>
    <p class="desc">仅限鼠标左键点击 | 10秒限时挑战，测你的极限手速</p>

    <div class="data-row">
        <div class="data-item">
            <div class="data-label">剩余时间</div>
            <div class="data-num" id="timeShow">10.0</div>
        </div>
        <div class="data-item">
            <div class="data-label">点击次数</div>
            <div class="data-num" id="countShow">0</div>
        </div>
    </div>

    <div class="click-circle" id="clickBtn">点我开始</div>

    <div class="result-box" id="resBox"></div>
    <button class="restart-btn" id="resetBtn">重新挑战</button>
    <div class="high-text" id="highScore">历史最高：0 次</div>
</div>

<script>
    //DOM元素
    const clickBtn = document.getElementById('clickBtn');
    const timeShow = document.getElementById('timeShow');
    const countShow = document.getElementById('countShow');
    const resBox = document.getElementById('resBox');
    const resetBtn = document.getElementById('resetBtn');
    const highScoreDom = document.getElementById('highScore');
    const particleWrap = document.getElementById('particleBox');

    //游戏数据
    let count = 0;
    let remainTime = 10.0;
    let isStart = false;
    let timer = null;
    //本地存储最高分
    let maxScore = Number(localStorage.getItem('clickMax')) || 0;
    highScoreDom.innerText = `历史最高：${maxScore} 次`;

    //创建点击粒子特效
    function createParticle(x,y){
        for(let i=0;i<8;i++){
            let span = document.createElement('span');
            let size = Math.random()*8+4;
            span.style.cssText = `
                position:absolute;
                left:${x}px;top:${y}px;
                width:${size}px;height:${size}px;
                background:${['#ff7eb3','#fffd7e','#38b000','#4cc9f0'][Math.floor(Math.random()*4)]};
                border-radius:50%;
                opacity:0.9;
                pointer-events:none;
                transform:translate(-50%,-50%);
            `
            particleWrap.appendChild(span);
            //粒子动画
            let tx = (Math.random()-0.5)*120;
            let ty = (Math.random()-0.5)*120;
            span.animate([
                {transform:`translate(-50%,-50%) scale(1)`,opacity:1},
                {transform:`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(0)`,opacity:0}
            ],{duration:600,easing:'ease-out'});
            setTimeout(()=>span.remove(),600);
        }
    }

    //左键点击事件
    clickBtn.addEventListener('mousedown',e=>{
        if(e.button !== 0) return; //只允许左键
        if(remainTime <= 0) return;
        //粒子坐标
        const rect = clickBtn.getBoundingClientRect();
        createParticle(e.clientX,e.clientY);

        if(!isStart){
            isStart = true;
            startCountDown();
            clickBtn.innerText = '疯狂点击！';
        }
        count++;
        countShow.innerText = count;
    })

    //倒计时
    function startCountDown(){
        timer = setInterval(()=>{
            remainTime -= 0.1;
            remainTime = Number(Math.max(remainTime,0).toFixed(1));
            timeShow.innerText = remainTime;
            //倒计时变色
            if(remainTime <=3) timeShow.style.color='#ff5c5c';
            else if(remainTime <=6) timeShow.style.color='#ffd166';
            else timeShow.style.color='#80ed99';

            if(remainTime <=0){
                clearInterval(timer);
                gameOver();
            }
        },100)
    }

    //游戏结束
    function gameOver(){
        clickBtn.style.pointerEvents = 'none';
        clickBtn.style.opacity = '0.55';
        resetBtn.style.display = 'inline-block';
        resBox.style.display = 'block';

        const cps = (count/10).toFixed(1);
        let rank;
        if(cps >=9) rank = '🏆 绝世手速天花板';
        else if(cps >=6) rank = '⚡ 职业级手速大佬';
        else if(cps >=3.5) rank = '👍 优秀选手水准';
        else if(cps >=1.8) rank = '🙂 普通正常人';
        else rank = '🐢 手速有待练习';

        //更新最高分
        if(count>maxScore){
            maxScore = count;
            localStorage.setItem('clickMax',maxScore);
            highScoreDom.innerText = `历史最高：${maxScore} 次【新纪录！】`;
        }

        resBox.innerHTML = `
        ⏱ 限时10秒结束<br>
        ✅ 总点击：${count} 次<br>
        📈 每秒点击：${cps} CPS<br>
        🎖 评级：${rank}
        `
    }

    //重置游戏
    resetBtn.onclick = ()=>{
        count = 0;
        remainTime = 10.0;
        isStart = false;
        countShow.innerText = 0;
        timeShow.innerText = '10.0';
        timeShow.style.color='#80ed99';
        clickBtn.innerText = '点我开始';
        clickBtn.style.pointerEvents = 'auto';
        clickBtn.style.opacity = '1';
        resBox.style.display = 'none';
        resetBtn.style.display = 'none';
        clearInterval(timer);
    }
</script>
</body>
</html>
