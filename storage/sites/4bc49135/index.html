<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字消消乐 - 小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .title {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .score-box {
            font-size: 22px;
            color: #ff5e62;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(6, 50px);
            grid-template-rows: repeat(6, 50px);
            gap: 6px;
            margin: 0 auto;
        }

        .tile {
            width: 50px;
            height: 50px;
            background: #e0f7fa;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #00796b;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .tile:hover {
            transform: scale(1.05);
            background: #b2ebf2;
        }

        .tile.empty {
            background: transparent;
            cursor: default;
            transform: scale(1);
        }

        .restart-btn {
            margin-top: 25px;
            padding: 10px 25px;
            font-size: 16px;
            background: #ff5e62;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .restart-btn:hover {
            background: #ff3b3f;
        }

        @media (max-width: 400px) {
            .board {
                grid-template-columns: repeat(6, 42px);
                grid-template-rows: repeat(6, 42px);
            }
            .tile {
                width: 42px;
                height: 42px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">数字消消乐</div>
        <div class="score-box">分数: <span id="score">0</span></div>
        <div class="board" id="board"></div>
        <button class="restart-btn" onclick="initGame()">重新开始</button>
    </div>

    <script>
        const size = 6;
        let score = 0;
        let board = [];
        const boardEl = document.getElementById('board');
        const scoreEl = document.getElementById('score');

        // 初始化游戏
        function initGame() {
            score = 0;
            updateScore();
            board = [];
            boardEl.innerHTML = '';
            
            // 生成随机棋盘
            for (let r = 0; r < size; r++) {
                const row = [];
                for (let c = 0; c < size; c++) {
                    const num = Math.floor(Math.random() * 4) + 1;
                    row.push(num);
                    
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    tile.textContent = num;
                    tile.dataset.r = r;
                    tile.dataset.c = c;
                    tile.onclick = () => clickTile(r, c);
                    boardEl.appendChild(tile);
                }
                board.push(row);
            }
        }

        // 点击方块
        function clickTile(r, c) {
            const val = board[r][c];
            if (val === 0) return;

            // 收集相连相同数字
            const visited = Array(size).fill().map(() => Array(size).fill(false));
            const group = [];
            dfs(r, c, val, visited, group);

            if (group.length < 2) return;

            // 消除得分
            score += group.length * 10;
            updateScore();

            // 清空方块
            group.forEach(([x, y]) => {
                board[x][y] = 0;
                const tile = getTile(x, y);
                tile.classList.add('empty');
                tile.textContent = '';
            });

            // 下落动画
            setTimeout(dropTiles, 300);
        }

        // 深度搜索相连方块
        function dfs(x, y, val, visited, group) {
            if (x < 0 || x >= size || y < 0 || y >= size) return;
            if (visited[x][y] || board[x][y] !== val) return;
            visited[x][y] = true;
            group.push([x, y]);
            dfs(x+1, y, val, visited, group);
            dfs(x-1, y, val, visited, group);
            dfs(x, y+1, val, visited, group);
            dfs(x, y-1, val, visited, group);
        }

        // 方块下落
        function dropTiles() {
            for (let c = 0; c < size; c++) {
                let col = [];
                for (let r = 0; r < size; r++) {
                    if (board[r][c] !== 0) col.push(board[r][c]);
                }
                const newCol = Array(size - col.length).fill(0).concat(col);
                for (let r = 0; r < size; r++) {
                    board[r][c] = newCol[r];
                    const tile = getTile(r, c);
                    tile.textContent = newCol[r] || '';
                    tile.classList.toggle('empty', newCol[r] === 0);
                }
            }
        }

        function getTile(r, c) {
            return document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
        }

        function updateScore() {
            scoreEl.textContent = score;
        }

        // 启动游戏
        window.onload = initGame;
    </script>
</body>
</html>
