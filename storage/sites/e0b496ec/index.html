<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>点圈圈</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{background:#0f1117;color:#d0d4e8;font-family:'Consolas','Microsoft YaHei',monospace;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden}
.wrap{max-width:500px;width:100%;text-align:center}
h1{font-size:18px;color:#7c8cf8;letter-spacing:2px;margin-bottom:4px}
.sub{font-size:11px;color:#444;margin-bottom:10px}
.info{display:flex;justify-content:space-around;font-size:11px;color:#555;margin-bottom:12px}
.info b{color:#8090b0}
#arena{position:relative;width:100%;aspect-ratio:1;background:#0c0f1a;border:1px solid #1e2235;border-radius:14px;overflow:hidden;margin-bottom:10px}
.circle{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;color:#fff;cursor:pointer;user-select:none;z-index:2;transition:none}
.status{font-size:12px;min-height:20px;margin-bottom:8px}
.btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
button{padding:10px 24px;border-radius:8px;border:none;font-size:13px;font-family:inherit;cursor:pointer;font-weight:bold}
.btn-p{background:#7c8cf8;color:#fff}.btn-p:hover{background:#5a6cf0}
.btn-s{background:#2d3a2e;color:#4ade80;border:1px solid #2a5a3e}.btn-s:hover{background:#1e2e20}
.hidden{display:none}
.back-link{display:inline-block;margin-top:12px;font-size:11px;color:#555;text-decoration:none}
.result-box{background:#181b26;border:1px solid #252838;border-radius:10px;padding:14px;margin-top:10px}
.result-box .big{font-size:24px;color:#7c8cf8;font-weight:bold}
.result-box .lbl{font-size:10px;color:#555;margin-top:2px}
.result-box .reward{font-size:14px;color:#4ade80;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
<h1>⭕ 点圈圈</h1>
<p class="sub">点中圈圈得1分，漏掉扣1分，15秒倒计时</p>
<div class="info">
  <span>⏱ <b id="timer">15</b>s</span>
  <span>🎯 <b id="score">0</b>分</span>
  <span>🔥 <b id="combo">0</b>连击</span>
  <span>💰 <b id="balanceDisplay">-</b></span>
</div>
<div id="arena" ontouchstart="return false"></div>
<div class="status" id="status">准备好了吗？</div>
<div class="btns">
  <button class="btn-p" id="btnStart" onclick="startGame()">开始游戏</button>
  <button class="btn-s hidden" id="btnNext" onclick="startGame()">再来一局</button>
</div>
<div class="result-box hidden" id="result">
  <div class="lbl">最终得分</div>
  <div class="big" id="resultScore">0</div>
  <div class="reward" id="resultReward"></div>
</div>
<a href="task_hall.html" class="back-link">← 返回任务大厅</a>
</div>

<script>
let running=false,timer=15,score=0,combo=0,ci=null,gt=null;
const a=document.getElementById('arena');
let gameTokenPromise = Promise.resolve('');
function updBal(){try{const u=JSON.parse(localStorage.getItem('mail_hall_user')||'null');document.getElementById('balanceDisplay').textContent=u?u.balance:'未登录'}catch(e){}}
updBal();
function rnd(m,M){return Math.random()*(M-m)+m}
function startGame(){
  score=0;combo=0;timer=15;
  for(let e of['score','combo','timer'])document.getElementById(e).textContent=e==='timer'?'15':'0';
  document.getElementById('status').textContent='开始！';
  document.getElementById('status').style.color='#4ade80';
  document.getElementById('result').classList.add('hidden');
  document.getElementById('btnStart').classList.add('hidden');
  document.getElementById('btnNext').classList.add('hidden');
  a.innerHTML='';running=true;
  gameTokenPromise=(async()=>{try{const u=JSON.parse(localStorage.getItem('mail_hall_user')||'null');if(!u)return '';const r=await fetch('api.php',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'action=game_start&user_id='+u.id+'&game=tap'});const d=await r.json();return d.ok?d.token:''}catch(e){return ''}})();
  if(ci)clearInterval(ci);if(gt)clearInterval(gt);
  mk();
  ci=setInterval(()=>{if(running)mk()},800);
  gt=setInterval(()=>{timer--;document.getElementById('timer').textContent=timer;if(timer<=0)end()},1000);
}
function mk(){
  if(!running)return;
  const s=Math.min(a.offsetWidth,a.offsetHeight)*0.16;
  const x=rnd(5,a.offsetWidth-s-5),y=rnd(5,a.offsetHeight-s-5);
  const cs=['#7c8cf8','#4ade80','#fbbf24','#f87171','#a78bfa','#60a5fa'];
  const el=document.createElement('div');
  el.className='circle';
  el.style.cssText='width:'+s+'px;height:'+s+'px;left:'+x+'px;top:'+y+'px;background:'+cs[Math.floor(Math.random()*cs.length)]+';box-shadow:0 0 12px rgba(255,255,255,0.08),inset 0 0 8px rgba(255,255,255,0.1)';
  el.onpointerdown=function(e){e.preventDefault();hit(this)};
  a.appendChild(el);
  setTimeout(()=>{if(el.parentNode){el.remove();miss()}},1500);
}
function hit(el){
  if(!running)return;
  el.remove();score++;combo++;
  document.getElementById('score').textContent=score;
  document.getElementById('combo').textContent=combo;
}
function miss(){
  if(!running)return;
  combo=0;score=Math.max(0,score-1);
  document.getElementById('combo').textContent='0';
  document.getElementById('score').textContent=score;
}
async function end(){
  running=false;
  if(ci)clearInterval(ci);if(gt)clearInterval(gt);
  a.innerHTML='';
  document.getElementById('status').textContent='⏰ 时间到！得分：'+score;
  document.getElementById('status').style.color='#fbbf24';
  document.getElementById('resultScore').textContent=score+'分';
  document.getElementById('result').classList.remove('hidden');
  if(score>=3){
    const ud=localStorage.getItem('mail_hall_user');
    if(ud){
      try{
        const u=JSON.parse(ud);
        const gameToken=await gameTokenPromise;
        const r=await fetch('api.php',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'action=game_reward&user_id='+u.id+'&game=tap&token='+gameToken});
        const d=await r.json();
        if(d.ok){document.getElementById('resultReward').textContent='+2 ✓ 今日 '+d.today_earn+'/'+d.max_earn;u.balance=d.balance;localStorage.setItem('mail_hall_user',JSON.stringify(u))}
        else{document.getElementById('resultReward').textContent=d.msg;document.getElementById('resultReward').style.color='#fbbf24'}
      }catch(e){document.getElementById('resultReward').textContent='网络错误，请重试';document.getElementById('resultReward').style.color='#f87171'}
    }
  }else{document.getElementById('resultReward').textContent='得分 ≥3 才能领奖';document.getElementById('resultReward').style.color='#555'}
  updBal();
  document.getElementById('btnNext').classList.remove('hidden');
}
</script>
</body>
</html>
