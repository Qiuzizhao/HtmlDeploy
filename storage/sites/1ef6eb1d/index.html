<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>起床战争 - 网页版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
body { background:#222; display:flex; flex-direction:column; align-items:center; padding:10px; color:#fff; }
#info { display:flex; gap:20px; margin-bottom:8px; font-size:18px; }
#gameCanvas { border:3px solid #444; background:#333; }
#tip { margin-top:10px; color:#ccc; font-size:14px; }
</style>
</head>
<body>
<div id="info">
  <span>队伍：<span id="team">红队</span></span>
  <span>铁：<span id="iron">0</span></span>
  <span>金：<span id="gold">0</span></span>
  <span>钻石：<span id="diamond">0</span></span>
  <span>血量：<span id="hp">100</span></span>
</div>
<canvas id="gameCanvas" width="900" height="600"></canvas>
<div id="tip">WASD移动 | 鼠标左键攻击/挖床 | 右键放方块 | 1/2/3买物品 | 保护床，拆掉别人的床！</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const info = {
  team:document.getElementById('team'),
  iron:document.getElementById('iron'),
  gold:document.getElementById('gold'),
  diamond:document.getElementById('diamond'),
  hp:document.getElementById('hp')
};

// 游戏配置
const TILE = 30;
const TEAMS = [
  {name:'红队', color:'#ff4444', bed:true, x:100, y:100},
  {name:'蓝队', color:'#4444ff', bed:true, x:800, y:100},
  {name:'绿队', color:'#44ff44', bed:true, x:100, y:500},
  {name:'黄队', color:'#ffff44', bed:true, x:800, y:500}
];
let myTeam = TEAMS[0];
let players = [];
let blocks = [];
let beds = [];
let resources = [];

// 玩家
const me = {
  x:myTeam.x, y:myTeam.y, size:14, speed:3, hp:100,
  iron:0, gold:0, diamond:0, color:myTeam.color,
  hasBed:true, dead:false
};

// 按键
const keys = {w:false,a:false,s:false,d:false};
document.addEventListener('keydown',e=>{
  const k = e.key.toLowerCase();
  if(keys.hasOwnProperty(k)) keys[k]=true;
  if(k==='1') buy('block');
  if(k==='2') buy('sword');
  if(k==='3') buy('armor');
});
document.addEventListener('keyup',e=>{
  const k = e.key.toLowerCase();
  if(keys.hasOwnProperty(k)) keys[k]=false;
});

// 鼠标
let mouseX=0, mouseY=0;
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouseX=e.clientX-rect.left; mouseY=e.clientY-rect.top;
});
canvas.addEventListener('mousedown',e=>{
  if(e.button===0) attackOrBreak();
  if(e.button===2) placeBlock();
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// 初始化地图：4个空岛+中间资源岛
function initMap(){
  // 床
  TEAMS.forEach(t=>{
    beds.push({x:t.x, y:t.y, team:t, size:20});
    // 岛（3x3）
    for(let dx=-1;dx<=1;dx++)
      for(let dy=-1;dy<=1;dy++)
        blocks.push({x:t.x+dx*TILE, y:t.y+dy*TILE, size:TILE, color:t.color});
  });
  // 中间钻石岛
  const cx=canvas.width/2, cy=canvas.height/2;
  for(let dx=-2;dx<=2;dx++)
    for(let dy=-2;dy<=2;dy++)
      blocks.push({x:cx+dx*TILE, y:cy+dy*TILE, size:TILE, color:'#888'});
  // 资源生成器
  setInterval(spawnResource,1500);
}

function spawnResource(){
  TEAMS.forEach(t=>{
    if(Math.random()<0.6) resources.push({x:t.x+(Math.random()-0.5)*60, y:t.y+(Math.random()-0.5)*60, type:'iron', size:8});
    if(Math.random()<0.2) resources.push({x:t.x+(Math.random()-0.5)*60, y:t.y+(Math.random()-0.5)*60, type:'gold', size:8});
  });
  // 中间钻石
  if(Math.random()<0.15) resources.push({x:canvas.width/2+(Math.random()-0.5)*80, y:canvas.height/2+(Math.random()-0.5)*80, type:'diamond', size:10});
}

// 购买
function buy(type){
  if(type==='block' && me.iron>=5){ me.iron-=5; }
  if(type==='sword' && me.gold>=3){ me.gold-=3; me.sword=true; }
  if(type==='armor' && me.diamond>=2){ me.diamond-=2; me.armor=true; }
  updateUI();
}

// 放方块
function placeBlock(){
  const bx = Math.floor(mouseX/TILE)*TILE;
  const by = Math.floor(mouseY/TILE)*TILE;
  if(!blocks.some(b=>b.x===bx && b.y===by)){
    blocks.push({x:bx, y:by, size:TILE, color:myTeam.color});
  }
}

// 攻击/挖床
function attackOrBreak(){
  // 挖床
  for(let b of beds){
    const d=Math.hypot(mouseX-b.x, mouseY-b.y);
    if(d<b.size && b.team!==myTeam){
      b.team.bed=false;
      beds=beds.filter(x=>x!==b);
      return;
    }
  }
  // 攻击玩家（简单AI）
  players.forEach(p=>{
    const d=Math.hypot(mouseX-p.x, mouseY-p.y);
    if(d<30){
      p.hp-=me.sword?25:15;
      if(p.hp<=0) respawn(p);
    }
  });
}

// 复活
function respawn(p){
  const team = p.team;
  if(team.bed){
    p.x=team.x; p.y=team.y; p.hp=100;
  }else{
    p.dead=true;
  }
}

// 捡资源
function pickupResources(){
  for(let i=resources.length-1;i>=0;i--){
    const r=resources[i];
    const d=Math.hypot(me.x-r.x, me.y-r.y);
    if(d<20){
      if(r.type==='iron') me.iron++;
      if(r.type==='gold') me.gold++;
      if(r.type==='diamond') me.diamond++;
      resources.splice(i,1);
    }
  }
}

// 更新玩家
function updatePlayer(){
  if(me.dead) return;
  let nx=me.x, ny=me.y;
  if(keys.w) ny-=me.speed;
  if(keys.s) ny+=me.speed;
  if(keys.a) nx-=me.speed;
  if(keys.d) nx+=me.speed;
  // 简单碰撞（不能穿方块）
  const blocked = blocks.some(b=>
    nx+me.size>b.x && nx-me.size<b.x+b.size &&
    ny+me.size>b.y && ny-me.size<b.y+b.size
  );
  if(!blocked){ me.x=nx; me.y=ny; }
  // 边界
  me.x=Math.max(me.size, Math.min(canvas.width-me.size, me.x));
  me.y=Math.max(me.size, Math.min(canvas.height-me.size, me.y));
  pickupResources();
}

// 生成AI玩家（每队1个）
function initAI(){
  TEAMS.forEach(t=>{
    players.push({
      x:t.x, y:t.y, size:14, speed:2.5, hp:100,
      color:t.color, team:t, dead:false,
      iron:0, gold:0, diamond:0
    });
  });
}

// AI简单行为：捡资源、搭路、靠近敌人
function updateAI(){
  players.forEach(p=>{
    if(p.dead || !p.team.bed) return;
    // 捡资源
    let target = resources[0];
    if(target){
      const angle=Math.atan2(target.y-p.y, target.x-p.x);
      p.x+=Math.cos(angle)*p.speed;
      p.y+=Math.sin(angle)*p.speed;
    }
    // 简单边界
    p.x=Math.max(p.size, Math.min(canvas.width-p.size, p.x));
    p.y=Math.max(p.size, Math.min(canvas.height-p.size, p.y));
  });
}

function updateUI(){
  info.team.innerText=myTeam.name;
  info.iron.innerText=me.iron;
  info.gold.innerText=me.gold;
  info.diamond.innerText=me.diamond;
  info.hp.innerText=me.hp;
}

// 绘制
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // 方块
  blocks.forEach(b=>{
    ctx.fillStyle=b.color;
    ctx.fillRect(b.x, b.y, b.size, b.size);
  });
  // 床
  beds.forEach(b=>{
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(b.x,b.y,b.size,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=b.team.color; ctx.lineWidth=3; ctx.stroke();
  });
  // 资源
  resources.forEach(r=>{
    ctx.fillStyle=r.type==='iron'?'#aaa':r.type==='gold'?'#ff0':'#0ff';
    ctx.beginPath(); ctx.arc(r.x,r.y,r.size,0,Math.PI*2); ctx.fill();
  });
  // AI玩家
  players.forEach(p=>{
    if(p.dead) return;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
  });
  // 自己
  if(!me.dead){
    ctx.fillStyle=me.color;
    ctx.beginPath(); ctx.arc(me.x,me.y,me.size,0,Math.PI*2); ctx.fill();
    // 瞄准线
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(me.x,me.y); ctx.lineTo(mouseX,mouseY); ctx.stroke();
  }
}

// 主循环
function gameLoop(){
  updatePlayer();
  updateAI();
  draw();
  updateUI();
  requestAnimationFrame(gameLoop);
}

// 启动
initMap();
initAI();
gameLoop();
</script>
</body>
</html>
