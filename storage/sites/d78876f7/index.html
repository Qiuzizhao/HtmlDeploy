<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地铁跑酷 - 网页版（带道具）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background-color: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            color: #fff;
        }

        h1 {
            margin-bottom: 15px;
            color: #00d8ff;
            text-shadow: 0 0 10px #00d8ff;
        }

        .game-info {
            display: flex;
            gap: 40px;
            font-size: 20px;
            margin-bottom: 10px;
        }

        #gameCanvas {
            border: 3px solid #00d8ff;
            border-radius: 8px;
            box-shadow: 0 0 20px #00d8ff50;
        }

        .btn-box {
            margin-top: 15px;
        }

        button {
            padding: 8px 25px;
            font-size: 18px;
            background: #00d8ff;
            border: none;
            border-radius: 6px;
            color: #000;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #00b8d9;
        }

        .tip {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }

        /* 道具效果提示 */
        .powerup-indicator {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .powerup-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .powerup-icon.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>🚇 网页版地铁跑酷（带道具）</h1>
    <div class="game-info">
        <div>分数：<span id="score">0</span></div>
        <div>状态：<span id="status">准备开始</span></div>
        <div>道具：<span id="powerupStatus">无</span></div>
    </div>

    <!-- 游戏画布 -->
    <canvas id="gameCanvas" width="480" height="600"></canvas>

    <div class="btn-box">
        <button id="startBtn">开始游戏</button>
    </div>
    <div class="tip">操作：← → 切换轨道 | ↑ / 空格 跳跃 | 吃到道具触发特殊效果</div>

    <!-- 道具效果指示器 -->
    <div class="powerup-indicator">
        <div id="magnetIcon" class="powerup-icon" style="background: #ff6b6b;">磁铁</div>
        <div id="doubleIcon" class="powerup-icon" style="background: #4ecdc4;">双倍</div>
        <div id="shieldIcon" class="powerup-icon" style="background: #ffe66d;">护盾</div>
        <div id="speedIcon" class="powerup-icon" style="background: #ff8a80;">冲刺</div>
    </div>

    <script>
        // ========== 1. 获取DOM元素 & 画布初始化 ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDom = document.getElementById('score');
        const statusDom = document.getElementById('status');
        const powerupStatusDom = document.getElementById('powerupStatus');
        const startBtn = document.getElementById('startBtn');
        const magnetIcon = document.getElementById('magnetIcon');
        const doubleIcon = document.getElementById('doubleIcon');
        const shieldIcon = document.getElementById('shieldIcon');
        const speedIcon = document.getElementById('speedIcon');

        // 画布尺寸
        const W = canvas.width;
        const H = canvas.height;

        // ========== 2. 游戏基础配置 ==========
        // 3条轨道配置（横向三等分）
        const trackCount = 3;
        const trackWidth = W / trackCount;
        // 每条轨道的中心X坐标
        const trackX = [
            trackWidth * 0.5,
            trackWidth * 1.5,
            trackWidth * 2.5
        ];

        // 游戏全局变量
        let gameRunning = false;    // 游戏是否运行
        let baseSpeed = 5;          // 基础速度
        let gameSpeed = baseSpeed;  // 整体移动速度
        let score = 0;               // 分数
        let bgOffset = 0;            // 背景滚动偏移量

        // 玩家角色配置
        const player = {
            track: 1,                // 当前所在轨道 0/1/2（默认中间）
            x: trackX[1],
            y: H - 120,
            w: 40,
            h: 60,
            jump: false,             // 是否跳跃
            jumpHeight: 0,           // 跳跃高度
            jumpSpeed: 12,           // 跳跃初速度
            gravity: 0.6,            // 重力
            maxJump: 120,            // 最大跳跃高度
            shield: false,           // 是否有护盾
            shieldCount: 0,          // 护盾次数
            magnet: false,           // 磁铁效果
            doublePoints: false,     // 双倍积分
            speedBoost: false,       // 冲刺效果
            powerupTimers: {}        // 道具计时器
        };

        let obstacles = []; // 障碍物数组
        let coins = [];     // 金币数组
        let powerups = [];  // 道具数组

        // 道具类型定义
        const POWERUP_TYPES = {
            MAGNET: { 
                name: 'magnet', 
                color: '#ff6b6b', 
                duration: 8000,  // 持续8秒
                effect: () => { player.magnet = true; }
            },
            DOUBLE_POINTS: { 
                name: 'doublePoints', 
                color: '#4ecdc4', 
                duration: 10000, // 持续10秒
                effect: () => { player.doublePoints = true; }
            },
            SHIELD: { 
                name: 'shield', 
                color: '#ffe66d', 
                duration: 0,     // 一次性效果
                effect: () => { player.shield = true; player.shieldCount = 1; }
            },
            SPEED_BOOST: { 
                name: 'speedBoost', 
                color: '#ff8a80', 
                duration: 5000,  // 持续5秒
                effect: () => { 
                    player.speedBoost = true; 
                    gameSpeed = baseSpeed * 1.8; // 速度提升80%
                }
            }
        };

        // ========== 3. 游戏初始化（重置所有数据） ==========
        function initGame() {
            gameRunning = true;
            score = 0;
            baseSpeed = 5;
            gameSpeed = baseSpeed;
            bgOffset = 0;
            obstacles = [];
            coins = [];
            powerups = [];

            // 重置玩家
            player.track = 1;
            player.x = trackX[1];
            player.y = H - 120;
            player.jump = false;
            player.jumpHeight = 0;
            player.shield = false;
            player.shieldCount = 0;
            player.magnet = false;
            player.doublePoints = false;
            player.speedBoost = false;
            player.powerupTimers = {};

            // 重置道具UI
            updatePowerupUI();
            powerupStatusDom.innerText = "无";

            // 更新页面显示
            scoreDom.innerText = score;
            statusDom.innerText = "游戏中";
            startBtn.innerText = "重新开始";

            // 启动游戏循环
            gameLoop();
        }

        // ========== 4. 绘制背景（隧道滚动效果） ==========
        function drawBg() {
            // 主背景 深灰色隧道
            ctx.fillStyle = '#222831';
            ctx.fillRect(0, 0, W, H);

            // 绘制轨道分割线 + 滚动纹路
            ctx.strokeStyle = '#393e46';
            ctx.lineWidth = 2;
            // 三条轨道分割线
            ctx.beginPath();
            ctx.moveTo(trackWidth, 0);
            ctx.lineTo(trackWidth, H);
            ctx.moveTo(trackWidth * 2, 0);
            ctx.lineTo(trackWidth * 2, H);
            ctx.stroke();

            // 轨道横向滚动线条（模拟向前跑）
            ctx.strokeStyle = '#4a4f58';
            ctx.lineWidth = 1;
            for (let y = -20; y < H; y += 40) {
                let lineY = y + bgOffset;
                ctx.beginPath();
                ctx.moveTo(0, lineY);
                ctx.lineTo(W, lineY);
                ctx.stroke();
            }
            bgOffset += gameSpeed;
            if (bgOffset >= 40) bgOffset = 0;
        }

        // ========== 5. 绘制玩家角色 ==========
        function drawPlayer() {
            // 计算跳跃后的Y坐标
            let realY = player.y - player.jumpHeight;

            // 如果有护盾，绘制护盾光环
            if (player.shield) {
                ctx.strokeStyle = '#ffe66d';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(player.x, realY + player.h/2, player.w/2 + 10, 0, Math.PI * 2);
                ctx.stroke();
            }

            // 角色身体（矩形代替，可自行换图片）
            ctx.fillStyle = '#ff4757';
            ctx.fillRect(
                player.x - player.w / 2,
                realY,
                player.w,
                player.h
            );

            // 角色头部
            ctx.fillStyle = '#ffd32a';
            ctx.beginPath();
            ctx.arc(player.x, realY + 15, 18, 0, Math.PI * 2);
            ctx.fill();
        }

        // ========== 6. 跳跃物理逻辑 ==========
        function updateJump() {
            if (!player.jump) return;

            // 上升阶段
            if (player.jumpHeight < player.maxJump) {
                player.jumpHeight += player.jumpSpeed;
            }
            // 到达最高点后下落
            player.jumpSpeed -= player.gravity;

            // 落地判定
            if (player.jumpHeight <= 0) {
                player.jumpHeight = 0;
                player.jump = false;
                player.jumpSpeed = 12; // 重置跳跃速度
            }
        }

        // ========== 7. 生成障碍物 & 金币 & 道具 ==========
        function spawnObject() {
            // 随机生成障碍物（概率 30%）
            if (Math.random() < 0.03) {
                let track = Math.floor(Math.random() * trackCount);
                obstacles.push({
                    x: trackX[track],
                    y: -60,
                    w: 35,
                    h: 50,
                    track: track
                });
            }

            // 随机生成金币（概率 50%）
            if (Math.random() < 0.06) {
                let track = Math.floor(Math.random() * trackCount);
                coins.push({
                    x: trackX[track],
                    y: -30,
                    r: 12,
                    track: track,
                    get: false // 是否被吃掉
                });
            }

            // 随机生成道具（概率 8%）
            if (Math.random() < 0.02 && gameRunning) {
                let track = Math.floor(Math.random() * trackCount);
                // 随机选择一种道具
                const powerupKeys = Object.keys(POWERUP_TYPES);
                const randomType = powerupKeys[Math.floor(Math.random() * powerupKeys.length)];
                const powerup = POWERUP_TYPES[randomType];
                
                powerups.push({
                    x: trackX[track],
                    y: -40,
                    w: 35,
                    h: 35,
                    type: randomType,
                    powerup: powerup,
                    track: track
                });
            }
        }

        // ========== 8. 更新 & 绘制障碍物 ==========
        function updateObstacles() {
            ctx.fillStyle = '#2ed573';
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.y += gameSpeed;

                // 绘制障碍物
                ctx.fillRect(obs.x - obs.w / 2, obs.y, obs.w, obs.h);

                // 移出屏幕则删除
                if (obs.y > H) {
                    obstacles.splice(i, 1);
                }
            }
        }

        // ========== 9. 更新 & 绘制金币（支持磁铁效果） ==========
        function updateCoins() {
            ctx.fillStyle = '#ffd700';
            for (let i = coins.length - 1; i >= 0; i--) {
                let coin = coins[i];
                if (coin.get) {
                    coins.splice(i, 1);
                    continue;
                }

                // 磁铁效果：金币向玩家移动
                if (player.magnet) {
                    const distX = player.x - coin.x;
                    const distY = (player.y - player.jumpHeight + 30) - coin.y;
                    const distance = Math.hypot(distX, distY);
                    
                    if (distance < 200) { // 磁铁吸引范围
                        coin.x += distX * 0.05;
                        coin.y += distY * 0.05;
                    }
                } else {
                    coin.y += gameSpeed;
                }

                // 绘制圆形金币
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, coin.r, 0, Math.PI * 2);
                ctx.fill();

                // 移出屏幕则删除
                if (coin.y > H) {
                    coins.splice(i, 1);
                }
            }
        }

        // ========== 10. 更新 & 绘制道具 ==========
        function updatePowerups() {
            for (let i = powerups.length - 1; i >= 0; i--) {
                let p = powerups[i];
                p.y += gameSpeed;

                // 绘制道具（带边框）
                ctx.fillStyle = p.powerup.color;
                ctx.fillRect(p.x - p.w / 2, p.y, p.w, p.h);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x - p.w / 2, p.y, p.w, p.h);

                // 绘制道具图标文字
                ctx.fillStyle = '#000';
                ctx.font = "12px Microsoft Yahei";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                let text = '';
                switch(p.type) {
                    case 'MAGNET': text = '磁'; break;
                    case 'DOUBLE_POINTS': text = '×2'; break;
                    case 'SHIELD': text = '盾'; break;
                    case 'SPEED_BOOST': text = '冲'; break;
                }
                ctx.fillText(text, p.x, p.y + p.h/2);

                // 移出屏幕则删除
                if (p.y > H) {
                    powerups.splice(i, 1);
                }
            }
        }

        // ========== 11. 道具效果管理 & 倒计时 ==========
        function activatePowerup(powerupType) {
            const powerup = POWERUP_TYPES[powerupType];
            if (!powerup) return;

            // 执行道具效果
            powerup.effect();
            
            // 更新UI显示
            powerupStatusDom.innerText = powerup.name;
            updatePowerupUI();
            
            // 记录激活时间
            const currentTime = Date.now();
            player.powerupTimers[powerupType] = currentTime;
            
            // 显示获取提示
            showPowerupMessage(`获得${getPowerupName(powerupType)}!`);

            // 非一次性道具设置过期时间
            if (powerup.duration > 0) {
                setTimeout(() => {
                    deactivatePowerup(powerupType);
                }, powerup.duration);
            }
        }

        function deactivatePowerup(powerupType) {
            const powerup = POWERUP_TYPES[powerupType];
            if (!powerup) return;

            // 取消道具效果
            switch(powerupType) {
                case 'MAGNET': player.magnet = false; break;
                case 'DOUBLE_POINTS': player.doublePoints = false; break;
                case 'SPEED_BOOST': 
                    player.speedBoost = false;
                    gameSpeed = baseSpeed; // 恢复基础速度
                    break;
            }
            
            // 清除计时器
            delete player.powerupTimers[powerupType];
            
            // 更新UI
            updatePowerupUI();
            powerupStatusDom.innerText = "无";
        }

        function updatePowerupUI() {
            // 更新道具图标显示状态
            magnetIcon.classList.toggle('active', player.magnet);
            doubleIcon.classList.toggle('active', player.doublePoints);
            shieldIcon.classList.toggle('active', player.shield);
            speedIcon.classList.toggle('active', player.speedBoost);

            // 绘制道具倒计时
            if (gameRunning) {
                const currentTime = Date.now();
                ctx.fillStyle = '#fff';
                ctx.font = "14px Microsoft Yahei";
                ctx.textAlign = "left";
                
                let yPos = 20;
                for (const type in player.powerupTimers) {
                    const powerup = POWERUP_TYPES[type];
                    if (powerup.duration > 0) {
                        const elapsed = currentTime - player.powerupTimers[type];
                        const remaining = Math.max(0, powerup.duration - elapsed);
                        const remainingSec = (remaining / 1000).toFixed(1);
                        
                        ctx.fillStyle = powerup.color;
                        ctx.fillText(`${getPowerupName(type)}: ${remainingSec}s`, 10, yPos);
                        yPos += 20;
                    }
                }
            }
        }

        function getPowerupName(type) {
            switch(type) {
                case 'MAGNET': return '磁铁';
                case 'DOUBLE_POINTS': return '双倍积分';
                case 'SHIELD': return '护盾';
                case 'SPEED_BOOST': return '冲刺';
                default: return '未知道具';
            }
        }

        function showPowerupMessage(text) {
            // 显示短暂的道具获取提示
            const originalText = powerupStatusDom.innerText;
            powerupStatusDom.innerText = text;
            setTimeout(() => {
                if (powerupStatusDom.innerText === text) {
                    powerupStatusDom.innerText = originalText;
                }
            }, 2000);
        }

        // ========== 12. 碰撞检测（支持道具收集和护盾效果） ==========
        function checkCollision() {
            let pLeft = player.x - player.w / 2;
            let pRight = player.x + player.w / 2;
            let pTop = player.y - player.jumpHeight;
            let pBottom = pTop + player.h;

            // 1. 检测收集道具
            for (let i = powerups.length - 1; i >= 0; i--) {
                let p = powerups[i];
                let pwrLeft = p.x - p.w / 2;
                let pwrRight = p.x + p.w / 2;
                let pwrTop = p.y;
                let pwrBottom = p.y + p.h;

                if (pRight > pwrLeft && pLeft < pwrRight && pBottom > pwrTop && pTop < pwrBottom) {
                    activatePowerup(p.type);
                    powerups.splice(i, 1);
                }
            }

            // 2. 检测和障碍物碰撞
            for (let obs of obstacles) {
                let oLeft = obs.x - obs.w / 2;
                let oRight = obs.x + obs.w / 2;
                let oTop = obs.y;
                let oBottom = obs.y + obs.h;

                if (pRight > oLeft && pLeft < oRight && pBottom > oTop && pTop < oBottom) {
                    if (player.shield) {
                        // 护盾抵消一次碰撞
                        player.shield = false;
                        player.shieldCount = 0;
                        updatePowerupUI();
                        showPowerupMessage('护盾已消耗!');
                    } else {
                        gameOver();
                        return;
                    }
                }
            }

            // 3. 检测吃金币（支持双倍积分）
            for (let coin of coins) {
                if (coin.get) continue;
                let dist = Math.hypot(player.x - coin.x, (player.y - player.jumpHeight + 30) - coin.y);
                if (dist < player.w / 2 + coin.r) {
                    coin.get = true;
                    // 双倍积分效果
                    const points = player.doublePoints ? 20 : 10;
                    score += points;
                    scoreDom.innerText = score;
                    
                    // 难度递增：分数越高速度越快
                    if (score % 100 === 0 && baseSpeed < 10) {
                        baseSpeed += 0.5;
                        if (!player.speedBoost) {
                            gameSpeed = baseSpeed;
                        }
                    }
                }
            }
        }

        // ========== 13. 游戏结束 ==========
        function gameOver() {
            gameRunning = false;
            statusDom.innerText = "游戏结束";
            // 绘制结束遮罩
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#fff';
            ctx.font = "30px Microsoft Yahei";
            ctx.textAlign = "center";
            ctx.fillText("游戏结束！", W / 2, H / 2 - 40);
            ctx.fillText(`最终分数：${score}`, W / 2, H / 2);
            ctx.font = "20px Microsoft Yahei";
            ctx.fillText("点击重新开始按钮再来一局", W / 2, H / 2 + 40);
        }

        // ========== 14. 主游戏循环 ==========
        function gameLoop() {
            if (!gameRunning) return;

            // 清空画布
            ctx.clearRect(0, 0, W, H);

            // 依次绘制更新
            drawBg();
            spawnObject();
            updateObstacles();
            updateCoins();
            updatePowerups();
            updateJump();
            drawPlayer();
            checkCollision();
            updatePowerupUI(); // 更新道具UI和倒计时

            // 持续循环
            requestAnimationFrame(gameLoop);
        }

        // ========== 15. 键盘控制 ==========
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            const key = e.keyCode;

            // 左箭头：切换到左轨道
            if (key === 37) {
                if (player.track > 0) {
                    player.track--;
                    player.x = trackX[player.track];
                }
            }
            // 右箭头：切换到右轨道
            if (key === 39) {
                if (player.track < 2) {
                    player.track++;
                    player.x = trackX[player.track];
                }
            }
            // 上箭头 / 空格：跳跃
            if ((key === 38 || key === 32) && !player.jump) {
                player.jump = true;
            }
        });

        // ========== 16. 开始按钮点击事件 ==========
        startBtn.addEventListener('click', initGame);

        // 初始绘制静态界面
        drawBg();
        drawPlayer();
    </script>
</body>
</html>
