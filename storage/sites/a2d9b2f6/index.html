<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .game-box {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .title {
            font-size: 28px;
            color: #2d3436;
            margin-bottom: 15px;
        }

        .score {
            font-size: 20px;
            color: #e17055;
            margin-bottom: 15px;
            font-weight: bold;
        }

        #gameCanvas {
            border: 3px solid #636e72;
            border-radius: 8px;
            background: #f1f2f6;
            display: block;
            margin: 0 auto;
        }

        .tips {
            margin-top: 15px;
            color: #636e72;
            font-size: 14px;
        }

        #startBtn {
            margin-top: 10px;
            padding: 10px 25px;
            font-size: 16px;
            background: #00b894;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        #startBtn:hover {
            background: #00a085;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="game-box">
        <h1 class="title">🐍 经典贪吃蛇</h1>
        <div class="score" id="score">得分：0</div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <button id="startBtn">开始游戏</button>
        <div class="tips">操作：↑ ↓ ← → 方向键控制</div>
    </div>

    <script>
        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');

        // 游戏设置
        const gridSize = 20;   // 格子大小
        const tileCount = canvas.width / gridSize;

        // 蛇
        let snake = [
            {x: 10, y: 10}
        ];
        let dx = 0;  // X方向速度
        let dy = 0;  // Y方向速度

        // 食物
        let food = {x: 15, y: 15};

        // 游戏状态
        let score = 0;
        let gameRunning = false;
        let gameLoop;

        // 开始游戏
        startBtn.addEventListener('click', () => {
            if(gameRunning) return;
            initGame();
            gameRunning = true;
            gameLoop = setInterval(drawGame, 100);
        });

        // 初始化游戏
        function initGame() {
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            score = 0;
            updateScore();
            spawnFood();
        }

        // 随机生成食物
        function spawnFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // 避免食物生成在蛇身上
            snake.forEach(segment => {
                if(segment.x === food.x && segment.y === food.y) {
                    spawnFood();
                }
            });
        }

        // 绘制游戏
        function drawGame() {
            // 背景
            ctx.fillStyle = '#f1f2f6';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 移动蛇
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // 吃到食物
            if(head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                spawnFood();
            } else {
                snake.pop();
            }

            // 碰撞检测
            if(
                head.x < 0 || 
                head.x >= tileCount || 
                head.y < 0 || 
                head.y >= tileCount ||
                snake.slice(1).some(segment => segment.x === head.x && segment.y === head.y)
            ) {
                clearInterval(gameLoop);
                gameRunning = false;
                alert('游戏结束！得分：' + score);
                return;
            }

            // 绘制蛇
            ctx.fillStyle = '#00b894';
            snake.forEach(segment => {
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });

            // 绘制食物
            ctx.fillStyle = '#e17055';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        // 更新分数
        function updateScore() {
            scoreText.textContent = '得分：' + score;
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if(!gameRunning) return;

            switch(e.keyCode) {
                case 37: // 左
                    if(dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 38: // 上
                    if(dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 39: // 右
                    if(dx !== -1) { dx = 1; dy = 0; }
                    break;
                case 40: // 下
                    if(dy !== -1) { dx = 0; dy = 1; }
                    break;
            }
        });
    </script>
</body>
</html>
