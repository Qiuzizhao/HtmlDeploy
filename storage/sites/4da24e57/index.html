<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>躺平发育 - 猛鬼宿舍（豪华优化版）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Helvetica Neue", Helvetica, Arial, "Microsoft YaHei", sans-serif; user-select: none; }
        body { background: #0c0c14; color: #fff; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* 游戏主容器 */
        .game-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1e1e38 0%, #080810 100%); position: relative; }
        .game-header { font-size: 32px; font-weight: bold; margin-bottom: 20px; color: #00ffcc; text-shadow: 0 0 15px rgba(0,255,204,0.6); letter-spacing: 2px; }
        
        /* 顶部信息栏 */
        .game-info { display: flex; gap: 20px; margin-bottom: 20px; z-index: 10; }
        .info-item { padding: 10px 20px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(5px); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); font-size: 16px; min-width: 130px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.3s; }
        .info-item span { font-weight: bold; color: #ffeb3b; font-size: 18px; }
        #ghost-hp { color: #ff3366; }

        /* 游戏地图 */
        .game-map { width: 900px; height: 550px; background: #14141f; border: 4px solid #2d2d44; border-radius: 16px; position: relative; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        
        /* 房间样式 */
        .room { width: 160px; height: 140px; background: #1b1b2a; border: 2px solid #3d3d5c; border-radius: 12px; position: absolute; transition: border-color 0.3s; }
        .room-empty { background: #12121d; border-style: dashed; animation: roomPulse 2s infinite; cursor: pointer; }
        .room-empty:hover { border-color: #00ffcc; background: #171726; }
        @keyframes roomPulse { 0% { border-color: #3d3d5c; } 50% { border-color: #00ffcc; } 100% { border-color: #3d3d5c; } }
        
        /* 门与血条 */
        .room-door { width: 25px; height: 60px; background: #4a4a6a; border: 2px solid #6c6c9c; position: absolute; right: -12px; top: 40px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; writing-mode: vertical-lr; color: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 2; }
        .door-hp-bar { position: absolute; right: -10px; top: 25px; width: 20px; height: 6px; background: #444; border-radius: 3px; overflow: hidden; }
        .door-hp-fill { width: 100%; height: 100%; background: #22c55e; transition: width 0.2s, background-color 0.2s; }

        /* 床与金币飘字 */
        .room-bed { width: 45px; height: 45px; background: #eab308; border: 3px solid #fef08a; border-radius: 12px; position: absolute; left: 25px; top: 45px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 14px; box-shadow: 0 0 15px rgba(234,179,8,0.4); }
        .coin-float { position: absolute; color: #22c55e; font-weight: bold; font-size: 16px; animation: floatUp 0.8s ease-out forwards; pointer-events: none; z-index: 10; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-30px); } }

        /* 炮台与网格放置 */
        .tower { width: 35px; height: 35px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border: 2px solid #60a5fa; border-radius: 8px; position: absolute; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #fff; box-shadow: 0 0 12px rgba(59,130,246,0.6); z-index: 3; transition: transform 0.1s; }
        
        /* 猛鬼 */
        .ghost { width: 55px; height: 55px; background: linear-gradient(135deg, #a855f7, #6b21a8); border: 2px solid #c084fc; border-radius: 50%; position: absolute; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 13px; box-shadow: 0 0 20px rgba(168,85,247,0.7); z-index: 5; animation: ghostFloat 1.5s infinite alternate ease-in-out; }
        @keyframes ghostFloat { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-8px) scale(1.05); } }
        
        /* 战斗受击与特效 */
        .hit-flash { animation: flashRed 0.15s ease-in-out; }
        @keyframes flashRed { 0% { background: #ef4444; transform: scale(1.1); } 100% { transform: scale(1); } }
        .laser-line { position: absolute; height: 3px; background: #3b82f6; box-shadow: 0 0 8px #60a5fa; transform-origin: left center; pointer-events: none; z-index: 4; animation: fadeLaser 0.2s forwards; }
        @keyframes fadeLaser { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* 建造面板 */
        .build-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(15, 15, 25, 0.85); padding: 12px 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 10; }
        .build-btn { padding: 10px 16px; background: #27273a; color: #e2e8f0; border: 1px solid #44445c; border-radius: 10px; cursor: pointer; font-size: 14px; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .build-btn:hover:not(.disabled) { background: #3b82f6; border-color: #60a5fa; color: #fff; transform: translateY(-2px); box-shadow: 0 5px 10px rgba(59,130,246,0.3); }
        .build-btn:active:not(.disabled) { transform: translateY(0); }
        .build-btn .cost { font-size: 12px; color: #94a3b8; }
        .build-btn:hover:not(.disabled) .cost { color: #fff; }
        .build-btn.disabled { background: #161622; color: #4b5563; border-color: #27273a; cursor: not-allowed; }
        .build-btn.disabled .cost { color: #4b5563; }

        /* 弹出层 */
        .game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 10, 0.85); backdrop-filter: blur(8px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.3s; }
        .over-content { background: #1a1a2e; padding: 40px 60px; border-radius: 24px; border: 3px solid #ef4444; text-align: center; box-shadow: 0 20px 50px rgba(239,68,68,0.3); }
        .game-over h2 { font-size: 40px; color: #ef4444; margin-bottom: 15px; text-shadow: 0 0 15px rgba(239,68,68,0.5); }
        .game-over p { font-size: 18px; color: #94a3b8; margin-bottom: 25px; }
        .restart-btn { padding: 12px 35px; background: linear-gradient(135deg, #ef4444, #b91c1c); color: #fff; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(239,68,68,0.4); transition: transform 0.2s; }
        .restart-btn:hover { transform: scale(1.05); }
        .win .over-content { border-color: #10b981; box-shadow: 0 20px 50px rgba(16,185,129,0.3); }
        .win h2 { color: #10b981; text-shadow: 0 0 15px rgba(16,185,129,0.5); }
        .win .restart-btn { background: linear-gradient(135deg, #10b981, #047857); box-shadow: 0 5px 15px rgba(16,185,129,0.4); }
        
        .hide { display: none !important; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">🛏️ 躺平发育 · 猛鬼宿舍</div>
        
        <div class="game-info">
            <div class="info-item">🪙 金币：<span id="gold">50</span></div>
            <div class="info-item">🚪 门等级：<span id="door-level">1</span></div>
            <div class="info-item">🛌 床等级：<span id="bed-level">1</span></div>
            <div class="info-item">👹 鬼血量：<span id="ghost-hp">100</span>/100</div>
        </div>
        
        <div class="game-map" id="map">
            <div class="room room-empty" id="room1" style="top:150px; left:150px">
                <div class="door-hp-bar"><div class="door-hp-fill" id="door-hp-bar"></div></div>
                <div class="room-door" id="door">1级铁门</div>
                <div class="room-bed" id="bed">+1</div>
            </div>
            
            <div class="ghost hide" id="ghost">猛鬼</div>
            
            <div class="build-panel">
                <button class="build-btn" id="build-door"><span>升级大门</span><span class="cost" id="cost-door">🪙 50</span></button>
                <button class="build-btn" id="build-bed"><span>升级床铺</span><span class="cost" id="cost-bed">🪙 50</span></button>
                <button class="build-btn" id="build-tower"><span>建造炮台</span><span class="cost" id="cost-tower">🪙 80</span></button>
            </div>
        </div>
    </div>

    <div class="game-over hide" id="game-over">
        <div class="over-content">
            <h2 id="result-title">游戏结束</h2>
            <p id="result-desc">提示文本</p>
            <button class="restart-btn" onclick="restartGame()">再来一局</button>
        </div>
    </div>

    <script>
        // 游戏核心数据配置
        const game = {
            gold: 50,
            doorLevel: 1,
            doorMaxHp: 100,
            doorHp: 100,
            bedLevel: 1,
            ghostMaxHp: 100,
            ghostHp: 100,
            ghostAttack: 8,
            isStarted: false,
            isGameOver: false,
            // 预设房间周围可以造炮台的相对槽位坐标(防止炮台堆叠)
            towerSlots: [
                { top: 100, left: 150, occupied: false },
                { top: 100, left: 210, occupied: false },
                { top: 250, left: 150, occupied: false },
                { top: 250, left: 210, occupied: false },
                { top: 200, left: 95, occupied: false }
            ],
            intervals: [] // 统一管理定时器
        }

        // DOM 元素缓存
        const el = {
            gold: document.getElementById('gold'),
            doorLevel: document.getElementById('door-level'),
            bedLevel: document.getElementById('bed-level'),
            ghostHp: document.getElementById('ghost-hp'),
            room: document.getElementById('room1'),
            door: document.getElementById('door'),
            doorHpBar: document.getElementById('door-hp-bar'),
            bed: document.getElementById('bed'),
            ghost: document.getElementById('ghost'),
            map: document.getElementById('map'),
            gameOver: document.getElementById('game-over'),
            resultTitle: document.getElementById('result-title'),
            resultDesc: document.getElementById('result-desc'),
            btnDoor: document.getElementById('build-door'),
            btnBed: document.getElementById('build-bed'),
            btnTower: document.getElementById('build-tower'),
            costDoor: document.getElementById('cost-door'),
            costBed: document.getElementById('cost-bed'),
            costTower: document.getElementById('cost-tower')
        }

        // 点击房间开始游戏（躺平）
        el.room.onclick = () => {
            if (game.isStarted || game.isGameOver) return;
            startGame();
        }

        function startGame() {
            game.isStarted = true;
            el.room.classList.remove('room-empty');
            
            // 初始化猛鬼位置（生成在门右侧准备进攻）
            el.ghost.classList.remove('hide');
            el.ghost.style.top = '145px';
            el.ghost.style.left = '360px';
            
            // 1. 动态床产金币与飘字动画
            const goldTimer = setInterval(() => {
                const earnings = game.bedLevel;
                game.gold += earnings;
                createCoinFloatAnimation(earnings);
                updateUI();
            }, 1000);
            game.intervals.push(goldTimer);

            // 2. 猛鬼攻击循环
            const ghostTimer = setInterval(ghostAttack, 1200);
            game.intervals.push(ghostTimer);

            // 3. 绑定建造升级按钮
            el.btnDoor.onclick = upgradeDoor;
            el.btnBed.onclick = upgradeBed;
            el.btnTower.onclick = buildTower;

            updateUI();
        }

        // 更新UI状态与按钮可用性
        function updateUI() {
            el.gold.textContent = game.gold;
            el.doorLevel.textContent = game.doorLevel;
            el.bedLevel.textContent = game.bedLevel;
            el.ghostHp.textContent = Math.max(0, game.ghostHp);
            
            // 门文本与血条更新
            el.door.textContent = `${game.doorLevel}级大门`;
            const doorHpPercent = (game.doorHp / game.doorMaxHp) * 100;
            el.doorHpBar.style.width = `${Math.max(0, doorHpPercent)}%`;
            if(doorHpPercent < 30) el.doorHpBar.style.backgroundColor = '#ef4444';
            else if(doorHpPercent < 60) el.doorHpBar.style.backgroundColor = '#f59e0b';
            else el.doorHpBar.style.backgroundColor = '#22c55e';

            el.bed.textContent = `+${game.bedLevel}`;

            // 动态控制建造面板按钮的灰色不可点状态
            const doorCost = game.doorLevel * 50;
            const bedCost = game.bedLevel * 50;
            const towerCost = 80;

            el.costDoor.textContent = `🪙 ${doorCost}`;
            el.costBed.textContent = `🪙 ${bedCost}`;
            
            toggleBtnState(el.btnDoor, game.gold >= doorCost);
            toggleBtnState(el.btnBed, game.gold >= bedCost);
            // 检查是否有空余槽位建造炮台
            const hasFreeSlot = game.towerSlots.some(s => !s.occupied);
            toggleBtnState(el.btnTower, game.gold >= towerCost && hasFreeSlot);
            if(!hasFreeSlot) el.costTower.textContent = '满员';
        }

        function toggleBtnState(button, clickable) {
            if (clickable) button.classList.remove('disabled');
            else button.classList.add('disabled');
        }

        // 金币飘字微动效
        function createCoinFloatAnimation(num) {
            const floatText = document.createElement('div');
            floatText.className = 'coin-float';
            floatText.textContent = `+${num}`;
            // 定位在床的附近
            floatText.style.top = `${el.room.offsetTop + 40}px`;
            floatText.style.left = `${el.room.offsetLeft + 40}px`;
            el.map.appendChild(floatText);
            setTimeout(() => floatText.remove(), 800);
        }

        // 升级门
        function upgradeDoor() {
            const cost = game.doorLevel * 50;
            if (game.gold < cost || game.isGameOver) return;
            game.gold -= cost;
            game.doorLevel++;
            game.doorMaxHp = game.doorLevel * 100;
            game.doorHp = game.doorMaxHp; // 升级顺便回满血
            updateUI();
        }

        // 升级床
        function upgradeBed() {
            const cost = game.bedLevel * 50;
            if (game.gold < cost || game.isGameOver) return;
            game.gold -= cost;
            game.bedLevel++;
            updateUI();
        }

        // 建造炮台逻辑（引入格子避免重叠）
        function buildTower() {
            if (game.gold < 80 || game.isGameOver) return;
            
            // 寻找空闲的炮台位
            const slot = game.towerSlots.find(s => !s.occupied);
            if (!slot) return; 

            game.gold -= 80;
            slot.occupied = true;

            const tower = document.createElement('div');
            tower.className = 'tower';
            tower.textContent = '⚡';
            tower.style.top = `${slot.top}px`;
            tower.style.left = `${slot.left}px`;
            el.map.appendChild(tower);

            updateUI();

            // 炮台自动对准猛鬼攻击
            const towerTimer = setInterval(() => {
                if (game.ghostHp <= 0 || game.isGameOver) {
                    clearInterval(towerTimer);
                    return;
                }
                // 伤害结算
                ghostDamage(4);
                // 渲染发射激光动效
                createLaserEffect(tower, el.ghost);
            }, 1000);
            game.intervals.push(towerTimer);
        }

        // 炮台发射激光动画效果
        function createLaserEffect(fromEl, toEl) {
            const laser = document.createElement('div');
            laser.className = 'laser-line';
            
            // 计算两点之间的中心与角度
            const x1 = fromEl.offsetLeft + 17;
            const y1 = fromEl.offsetTop + 17;
            const x2 = toEl.offsetLeft + 27;
            const y2 = toEl.offsetTop + 27;
            
            const distance = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;

            laser.style.width = `${distance}px`;
            laser.style.left = `${x1}px`;
            laser.style.top = `${y1}px`;
            laser.style.transform = `rotate(${angle}deg)`;

            el.map.appendChild(laser);
            setTimeout(() => laser.remove(), 200);
        }

        // 猛鬼攻击门
        function ghostAttack() {
            if (game.isGameOver) return;
            
            game.doorHp -= game.ghostAttack;
            
            // 门受击红光闪烁动画
            el.door.classList.add('hit-flash');
            setTimeout(() => el.door.classList.remove('hit-flash'), 150);

            if (game.doorHp <= 0) {
                game.doorHp = 0;
                gameOver(false);
            }
            updateUI();
        }

        // 猛鬼受到伤害
        function ghostDamage(damage) {
            if (game.ghostHp <= 0 || game.isGameOver) return;
            game.ghostHp -= damage;
            
            // 鬼受击闪烁
            el.ghost.classList.add('hit-flash');
            setTimeout(() => el.ghost.classList.remove('hit-flash'), 150);

            if (game.ghostHp <= 0) {
                game.ghostHp = 0;
                gameOver(true);
            }
            updateUI();
        }

        // 游戏结束处理
        function gameOver(isWin) {
            game.isGameOver = true;
            // 清除所有的定时器阻止后续伤害/加钱
            game.intervals.forEach(clearInterval);
            
            el.gameOver.classList.remove('hide');
            if (isWin) {
                el.gameOver.classList.add('win');
                el.resultTitle.textContent = '🎉 游戏胜利';
                el.resultDesc.textContent = '不愧是宿舍躺平流大师，猛鬼已被成功击退！';
            } else {
                el.gameOver.classList.remove('win');
                el.resultTitle.textContent = '💀 游戏失败';
                el.resultDesc.textContent = '大门被无情撕碎，猛鬼冲进了你的宿舍...';
            }
        }

        function restartGame() {
            location.reload();
        }
    </script>
</body>
</html>
